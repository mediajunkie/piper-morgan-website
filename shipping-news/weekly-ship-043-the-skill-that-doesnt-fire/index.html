mplateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[2469,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"394\",\"static/chunks/app/(public)/shipping-news/%5Bslug%5D/page-4e3b74e4c3ec433b.js\"],\"ShipPostContent\"]\n1a:T4291,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 8–14, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe team has been writing the methodology down faster than ever — six anti-patterns formally indexed in one morning, four commit-discipline entries pinned across the week, a verification rubric branched mid-stream from a methodology codified about two weeks earlier. The codification side is working.\u003c/p\u003e\n\u003cp\u003eAnd then, on Wednesday May 13, the lead-developer role ran a self-audit on its own recent issue closures and found a skill that had been in skill files for months hadn't fired on thirteen out of thirteen closures. Every one of them missed the same step.\u003c/p\u003e\n\u003cp\u003eThis week is about that gap. Writing discipline down is real progress. Writing it down is not the same as making it happen.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚀 Shipped this week\u003c/h1\u003e\n\u003ch2\u003e🎯 Product \u0026 experience\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eCross-session memory moved from \"designed but unimplemented\" to production.\u003c/strong\u003e Thursday May 14 closed M2g-B with the lead-developer role shipping #1021 UserHistoryService Layer 3 DB backend end-to-end — schema migration, four new conversation columns, three indexes, repository, heuristic topic extraction, preview maintenance, four API routes, and floor wiring through the context assembler. Two-hundred-forty-five tests green. ADR-054 Layer 3 and PDR-002 adaptive greetings now produce real signal rather than describing intent.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBuild milestone gates moved on schedule.\u003c/strong\u003e The M2f milestone closed across the window — Groups A+B end-to-end on Saturday May 9, Group C end-to-end on Monday May 11. M2g-A landed Thursday May 14 (owner-reviews on services/auth #1000 + services/mcp/consumer #999). Run 9 of the canonical baseline was locked Wednesday May 13 as the M2g-entry reference point. The product-management role (Piper Alpha) consolidated the M2d gate-decision criteria into a single memo on Sunday May 10, giving the developer a clear pass/fail surface across the sub-epics.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA new UI scope plan opened.\u003c/strong\u003e Thursday May 14, the lead-developer role filed #1090 UI-1.0-PLAN after the experience-design role (CXO) surfaced a coverage gap — seven UI surfaces beyond the current MUX scope that need explicit shape decisions before 1.0. The work doesn't begin this window. The fact that the gap is now named and tracked is the artifact.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRoadmap v15 → v16 swap closed an arc that crossed four roles.\u003c/strong\u003e Documentation Management asked for the version bump May 4, the product-management role drafted v16 (held for review) May 10, the CEO ratified the same day, and Documentation Management swapped the canonical file the next morning — with the prior weekly docs audit retained as a backstop per Chesterton's-fence framing. Sub-daily methodology-to-canonical pipeline, end to end.\u003c/p\u003e\n\u003ch2\u003e⚙️ Engineering \u0026 architecture\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThree substantive backend ships across three days.\u003c/strong\u003e Sunday May 10: #921 FastAPI / Starlette / httpx upgrade merged on directional evidence — conservative pin (fastapi 0.115.14, starlette 0.46.2, httpx 0.28.1), six test-helper sites migrated to the new \u003ccode\u003eAsyncClient(transport=ASGITransport(app=app))\u003c/code\u003e pattern, full-suite verification deferred to a follow-up ticket (also closed by Monday). Monday May 11: #857 token refresh shipped end-to-end — new \u003ccode\u003ePOST /api/v1/auth/refresh\u003c/code\u003e endpoint with token rotation, 7-day max-age refresh cookie at login, frontend wrapper intercepts 401 with silent refresh and retry. Same day: #1071 audit-log gap closed for pre-beta hardening (\u003ccode\u003eAction.KEY_VALIDATION_FAILED\u003c/code\u003e enum wired through the validation-failure path with PII protection — first 8 chars of the key only).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTwo evaluation-and-search ships landed Wednesday May 13.\u003c/strong\u003e #1070 multi-turn evaluation harness shipped end-to-end, and #304 NOTION search-only activation went from \"designed but inert\" to live.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA new verification rubric got branched mid-stream from a recently-codified methodology, with full provenance.\u003c/strong\u003e On Sunday May 10, the product-management role proposed extending the current milestone's verification rubric in place. The experience-design role caught it within the same session as an instance of \u003cem\u003eparallel-authoring-drift\u003c/em\u003e — exactly what the \u003cem\u003eBranch-or-Anchor\u003c/em\u003e methodology had been codified to prevent about two weeks earlier. The product-management role branched to a new artifact (UI Lifecycle Verification Rubric v0.1), and the architecture role ratified it as the first clean worked example of the methodology operating end-to-end. About ninety minutes, three roles, full provenance trail.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBranch-drift discipline ladders got another four layers.\u003c/strong\u003e Five separate version-control incidents in the cycle drove four new commit-discipline memory entries — pre-commit branch verification, pre-edit diff-against-HEAD, index-clearing on shared main, and post-commit verification with \u003ccode\u003egit show --stat\u003c/code\u003e. Each layer catches what the prior layer missed. Each is grounded in a specific incident from the week, not a projection.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA working-tree-path fragmentation child instance was caught at sub-sixty-minute blast radius.\u003c/strong\u003e The innovation-officer role had backlog edits stranded overnight May 10–11 — edited via the main checkout while the worktree's \u003ccode\u003egit status\u003c/code\u003e showed clean. P-17 joined the Pattern-067 family the same morning. The parent meta-pattern is now actively catching its own children.\u003c/p\u003e\n\u003ch2\u003e🔬 Methodology \u0026 process innovation\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe skill that didn't fire.\u003c/strong\u003e On Wednesday May 13, the lead-developer role ran a self-audit on its own recent issue closures — a hunch that something in the closure routine had been slipping. The audit found thirteen recent closures. On all thirteen, the description checkboxes had stayed unchecked. The evidence comments had landed. The work had been done. The small mechanical step that turns a closed issue into a closed issue's record had not happened. The skill that should have caught this was in the file. It hadn't fired.\u003c/p\u003e\n\u003cp\u003eThe remediation that landed the same afternoon had three layers, all stacked. A \u003cstrong\u003ememory entry\u003c/strong\u003e pinned to the top of the project's memory index, so future sessions of the lead-developer role see it on first read. A new \u003cstrong\u003etooling issue (#1083)\u003c/strong\u003e filed for a lint that would catch the checkbox-leftover mechanically — the kind of thing that doesn't depend on remembering. And a \u003cstrong\u003estanding floor of discipline\u003c/strong\u003e written into the closure process itself, so every closure now starts with the description checkboxes rather than ending with them. Vocabulary plus mechanism plus sequence — each covers what the prior layer misses.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe pattern catalog ran a sweep on itself.\u003c/strong\u003e The innovation-officer role compiled the second pattern sweep on Saturday May 9, formally indexing six anti-patterns the cohort had been calling by working names (\"branch drift,\" \"comment-only close,\" \"issue-body reality mismatch\"). The names became canonical, the parent-child relationships got mapped, and within forty-eight hours the cohort was using the indexed names in mid-stream catches without consulting the catalog.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePattern-067 fired six times in five days.\u003c/strong\u003e The issue-body-reality-mismatch family — filed by the lead-developer role on Saturday May 9 — stayed the most active surface of the week. Named and instrumented-against in real time rather than retrospectively. Notable: when the innovation-officer role attempted to file a different pattern at the same Pattern-067 slot on Monday May 11, the collision was resolved same-day via first-filed-wins, with the innovation officer renumbering to slots 068 and 069. The recurring-failure surface was being instrumented faster than it was firing.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWorking memory layer is now substrate.\u003c/strong\u003e Four commit-discipline entries pinned to per-agent memory across the week. Each one captures a specific failure mode and its fix, at the per-agent layer, where the discipline absorbs immediately. The first observed downstream applications of recently-pinned memories appeared roughly three days after pin — a real compounding loop is visible.\u003c/p\u003e\n\u003ch2\u003e🌍 External relations \u0026 community\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eFour pieces published in the window, with one held\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eMay 11 (Mon): \"\u003ca href=\"https://pipermorgan.ai/blog/the-inchworm-position\"\u003eThe Inchworm Position\u003c/a\u003e\" — insight on a notation system for naming exactly where you are in a nested work hierarchy\u003c/li\u003e\u003cli\u003eMay 12 (Tue): \"\u003ca href=\"https://pipermorgan.ai/blog/audit-and-talk\"\u003eAudit and Talk\u003c/a\u003e\" — building narrative on April 17, an IA Conference talk on ethics-as-architecture running parallel to the innovation-officer role opening the M1 methodology audit\u003c/li\u003e\u003cli\u003eMay 13 (Wed): \"\u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-042-what-was-working-got-written-down\"\u003eWeekly Ship #042: What Was Working Got Written Down\u003c/a\u003e\"\u003c/li\u003e\u003cli\u003eMay 14 (Thu): \"\u003ca href=\"https://pipermorgan.ai/blog/same-failure-six-agents-ninety-minutes\"\u003eSame Failure, Six Agents, Ninety Minutes\u003c/a\u003e\" — building narrative on April 19, six leadership-role workstream-review memos kicking off inside ten minutes on an Acela between Philly and DC, then a ninety-minute correction arc when an omnibus-log upload gap surfaced\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003ca href=\"https://pipermorgan.ai/blog/same-failure-six-agents-ninety-minutes/\"\u003e\u003cimg src=\"https://pipermorgan.ai/assets/blog-images/same-failure-six-agents-ninety-minutes.webp\" alt=\"A high-speed train entering a rail junction where six parallel tracks branch into different analytical landscapes before merging again, with one exaggerated claim diverted onto a repair siding.\" /\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eThe one held: \"Permission to Pause,\" an insight originally scheduled May 10 (Sun), renamed May 9 to disambiguate from a March 22 narrative with the same title. Slot to be reassigned.\u003c/p\u003e\n\u003cp\u003eThe publishing pipeline caught six pre-publication fabrications during a fact-scrub against archived 2025 session logs — second Code-era instance of pre-publication fact-verification as procedure. The shape is consistent: bracketed fact-check markers at draft time when a comparative or numeric claim can't be verified, resolved before handoff. Replicable as a draft-time check, not a heroic late catch.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVoice discipline moved upstream.\u003c/strong\u003e Ship #042 came in at 1,252 words against the recent 1,800–2,500 range — about a third shorter, with no substance loss flagged. The four-category opacity sweep that used to be improvised at the editing stage is now a named draft-time step. Seven new voice-guide entries stacked for one editing-pass sweep — moves the publishing pipeline used to catch are now absorbed back into drafting.\u003c/p\u003e\n\u003ch2\u003e📊 Governance \u0026 operations\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eMetrics (May 8–14)\u003c/strong\u003e:\u003c/p\u003e\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eMetric\u003c/th\u003e\u003cth\u003eValue\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003eBuild milestones closed\u003c/td\u003e\u003ctd\u003eM2f (Groups A+B May 9, Group C May 11) + M2g-A and M2g-B (May 14)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eMajor backend ships\u003c/td\u003e\u003ctd\u003e#921 (May 10), #857 (May 11), #1071 (May 11), #1021 (May 14), #1070 + #304 (May 13)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003ePattern catalog grew\u003c/td\u003e\u003ctd\u003e67 → 69 patterns (P-067 stayed, P-068 + P-069 new)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003ePattern catalog sweep entries\u003c/td\u003e\u003ctd\u003e6 anti-patterns indexed (May 9)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003ePattern-067 family firings\u003c/td\u003e\u003ctd\u003e6 in 5 days\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eCommit-discipline memory entries pinned\u003c/td\u003e\u003ctd\u003e4\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eComment-Only-Close audit\u003c/td\u003e\u003ctd\u003e13 of 13 missed — 3-layer remediation same day\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003ePublications shipped\u003c/td\u003e\u003ctd\u003e4 (1 held)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eShip #042 word count\u003c/td\u003e\u003ctd\u003e~1,252 (down ~32% from recent baseline)\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eDiscipline that fires without its authors present.\u003c/strong\u003e The experience-design role was offline six of seven days in the window. The trust-and-relationships role (Head of Sapient Trust) the same. The cohort's cadence held. The methodology operated, the catches happened, the patterns got named. The single active day for each absent role produced concentrated substantive output — one role-health-check plus a team-structure refresh from the trust role, one mid-stream catch and a same-day branched rubric from the experience-design role.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSkill spec versus skill firing — a watch-item across the cohort.\u003c/strong\u003e The thirteen-of-thirteen catch on closure discipline raises a structural question: which other skills are in the same shape? Written down, in the files, and not observed firing recently. The watch is now standing.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🎯 Coming up next week\u003c/h1\u003e\n\u003cp\u003eThe next milestone gate is in flight with the verification rubric branched cleanly. The publishing pipeline will start absorbing the seven stacked voice-guide additions into drafting practice. A separate forensics arc on the working-tree-path fragmentation family continues — the Pattern-067 parent meta-pattern is now doing the diagnostic work the cohort named it to do.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚧 Blockers \u0026 asks\u003c/h1\u003e\n\u003cp\u003eNo current blockers. Several discovery-thread responses are queued on natural cadence. A cross-agent coordination conversation is convening to address structural failure modes that the methodology layer has named but the operational layer is still working through.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🔎 This week's learning pattern\u003c/h1\u003e\n\u003ch2\u003eCodifying discipline does not enforce discipline\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eDiscovery\u003c/strong\u003e: When a team writes its discipline down, the shared vocabulary that results is real progress — but vocabulary alone leaves a gap that is structurally invisible from inside the cohort. Discipline that lives only in language can stop firing without anyone noticing.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eExample from this week\u003c/strong\u003e: The lead-developer role audited its own recent issue closures on May 13 — a hunch that something in the routine had slipped. The audit found thirteen closures. On every one, the description checkboxes had stayed unchecked. The skill that was supposed to catch this had been in the file for months. It hadn't fired. The remediation landed the same afternoon and had three layers: a memory entry (refreshing the vocabulary), a tooling issue for a lint (giving the discipline a mechanism that does not depend on remembering), and a standing floor written into the closure process itself (changing the sequence so the riskiest step runs when attention is sharpest).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhy it matters\u003c/strong\u003e: The default move for teams maturing into shared methodology is to celebrate the vocabulary. Vocabulary is real progress. Vocabulary lets a cohort coordinate without re-deriving first principles every time. The risk is that the vocabulary's existence becomes a proxy signal for the discipline being practiced — and once that substitution sets in, no amount of refining the vocabulary closes the gap. The only way to spot the gap is to audit specific work and count. The only way to keep it closed is to give the discipline something to lean on besides reminded recall.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eApplication beyond this week\u003c/strong\u003e: The shape generalizes. Any skill that has been written but has not been observed firing recently is a candidate. Any memory entry pinned weeks ago without a fresh application trail is a candidate. Any process step that everyone in the team can describe in conversation and nobody can point at a recent example of running is a candidate. The remediation pattern that worked here is the one to carry forward: vocabulary plus mechanism plus sequence. Each layer covers what the prior layer misses. None of them work alone.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRelated patterns\u003c/strong\u003e: The Pattern-067 family (issue-body-reality-mismatch) catches a related failure shape — implicit architectural claims that drift when undocumented. The Branch-or-Anchor methodology, ratified earlier this spring, governs when to extend an existing artifact versus branching to a new one. The three-layer remediation here applies the same logic at the discipline layer rather than the artifact layer.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eThanks,\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003exian + Piper Morgan Development Team\u003c/p\u003e\n\u003cp\u003eThis is Weekly Ship #043. Previous: \u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-042-what-was-working-got-written-down/\"\u003e#042 \"What Was Working Got Written Down\"\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.S. Last week's Ship named the methodology getting written down. This week's Ship names what writing it down doesn't do on its own. Both are real. Both have to happen.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.P.S. Full session logs and technical details available in the \u003ca href=\"https://github.com/mediajunkie/piper-morgan-product\"\u003eGitHub repository\u003c/a\u003e and \u003ca href=\"https://pmorgan.tech\"\u003edocumentation site\u003c/a\u003e. Yes, you can copy it. That just makes our protocol stronger.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eWeek of May 8–14, 2026 | Phase: MVP Build (M2d gate criteria landed, M2g in flight)\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Weekly Ship #043: The Skill That Doesn't Fire\",\"slug\":\"weekly-ship-043-the-skill-that-doesnt-fire\",\"guid\":\"blog-first-88c23173bba6\",\"url\":\"/blog/weekly-ship-043-the-skill-that-doesnt-fire\",\"publishedAt\":\"May 20, 2026\",\"publishedAtISO\":\"2026-05-20T00:00:00.000Z\",\"workDate\":\"May 8, 2026\",\"author\":\"christian crumlish\",\"linkedinURL\":\"$undefined\"},\"content\":{\"title\":\"Weekly Ship #043: The Skill That Doesn't Fire\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Weekly Ship #043: The Skill That Doesn't Fire | The Shipping News | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Weekly development update from the Piper Morgan team.\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"4\",{\"name\":\
