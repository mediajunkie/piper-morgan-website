",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[2469,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"269\",\"static/chunks/app/shipping-news/%5Bslug%5D/page-2ec32728d8f97e65.js\"],\"ShipPostContent\"]\n1b:T2784,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMarch 20–26, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eLast week's \"Pour the Floor\" established the principle that Piper should always be at least as good as a well-prompted LLM with context. This week, that principle and everything else we've been building converged toward M1's finish line. Three engineering tiers cleared. The Product entity model resolved through a 4-role coordination chain in 90 minutes. PDR-004 codified ten days of product thinking into four experience principles. The M1 gate was filed, reviewed by CXO and PPM independently, and Gates 3-4 verified. By Thursday, all that remained was the gate itself — 14 manual test scenarios waiting for the PM to sit down with Piper and have a conversation.\n\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚀 Shipped this week\u003c/h1\u003e\n\u003ch2\u003e🎯 Product \u0026 experience\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eProduct entity model (#717) resolved.\u003c/strong\u003e Five design decisions landed through a 4-role coordination chain in 90 minutes with zero PM mediation. The most interesting: CXO and PPM disagreed on navigation (emergence vs. orchestration mental models) and converged on a both-models approach — Product as a visible grouping header within Projects, clickable to detail view, neither model privileged. The Architect validated the schema, specified cascade behavior, and documented the PDR-003 divergence path.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePDR-004 (Experience Philosophy) ratified.\u003c/strong\u003e Four principles from ten days of product decisions: presence over performance, specificity as care, honest boundaries, growth through use.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eM1 gate shaped and partially verified.\u003c/strong\u003e CXO and PPM independently refined the gate criteria: fresh-account testing, Colleague Test rubric (7+ threshold), multi-turn integration, capability registry check. Gates 3-4 verified — 6,310 tests, zero failures. Gates 1-2 await PM user acceptance testing.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePiper Alpha briefing assembled.\u003c/strong\u003e Five roles contributed: CIO structure, CXO voice guidance (\"express investment through specificity, not declared feelings\"), PPM Tier 1 tasks, Architect constraints, HOSR session protocols. Launch-ready pending PM review.\n\u003c/p\u003e\n\u003ch2\u003e⚙️ Engineering \u0026 architecture\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eM1 Tier 3 completed in one session.\u003c/strong\u003e Four issues closed March 22: #902 (GitHub close/reopen — 75% pattern, MCP adapter missing), #903 (reminders across 5 integration points), #904 (todo completion verified and formally closed), #883 (lazy workflow — pre-creation was 100% wasted).\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e#706 closed.\u003c/strong\u003e Objects catalog, views catalog, MVP prioritization matrix. PM-led discovery, not code.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e120+ new tests.\u003c/strong\u003e Suite at 6,310 passing, zero failures. First E2E smoke test through `/api/v1/intent` (#927).\n\u003c/p\u003e\n\u003ch2\u003e🔬 Methodology \u0026 process innovation\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eAgent 360 action items completed.\u003c/strong\u003e All three from HOSR's survey executed same-evening March 21: CXO formalized the Colleague Test (rubric with 5 worked examples), PPM documented Roundtable Synthesis (methodology-22 with template and 3 case studies), exec delivered CIO reassurance memo with 7 evidence threads.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCross-Pollination Hub operational.\u003c/strong\u003e First brief published March 21 — six insights across Klatch and Piper Morgan, including the five-layer context model directly relevant to session-start overhead.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eShip process guide completed.\u003c/strong\u003e v1.1 with exec feedback applied same day. Ship #036 is the validation pilot.\n\u003c/p\u003e\n\u003ch2\u003e🌍 External relations \u0026 community\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eFive publications in seven days.\u003c/strong\u003e Four blog posts plus Ship #035 on LinkedIn.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e13 content pieces drafted in one session\u003c/strong\u003e (March 26). Acts 3-6 of the building narrative, four March insight pieces, three February gap-closing insights. February content gap declared CLOSED. Pipeline has shifted from \"mine more content\" to \"sequence and publish thoughtfully.\"\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEditorial integrity.\u003c/strong\u003e PM rejected a \"Convergent Discovery\" insight — the cross-project parallels were deliberate transfers, not independent convergence. Dropped, not reframed.\n\u003c/p\u003e\n\u003ch2\u003e📊 Governance \u0026 operations\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eMetrics (Mar 20–26)\u003c/strong\u003e: ~30 sessions across 7 days. ~12 issues closed. 120+ new tests (suite at 6,310). M1 at ~95%. PA briefing v0.2 ready. 5 publications. 15 content pieces drafted.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eService disruption.\u003c/strong\u003e Anthropic issues on March 26 interrupted the Docs session, stranding commits until March 28. The Comms session completed before the disruption. Combined with a day off March 25, the window had reduced capacity — but the engineering work was done.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDocumentation infrastructure.\u003c/strong\u003e 106 files committed. Weekly audit corrected 5 stale indexes. TODO triage filed 5 issues (#932-936).\n\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🎯 Coming up next week\u003c/h1\u003e\n\u003ch2\u003eDevelopment priorities\u003c/h2\u003e\n\u003cp\u003eM1 gate execution: PM user acceptance testing (14 scenarios across Gates 1-2). Canonical retest (target ≥85% on implemented queries). If gate passes, M1 closes and M2 planning begins.\n\u003c/p\u003e\n\u003ch2\u003eAlpha testing \u0026 onboarding\u003c/h2\u003e\n\u003cp\u003eAlpha email responses still pending (sent Mar 14, 13 recipients). Ted's Security.md and Methodology.md reviews pending. Piper Alpha launch pending PM review of briefing v0.2.\n\u003c/p\u003e\n\u003ch2\u003eCommunications\u003c/h2\u003e\n\u003cp\u003eIAC presentation refinement (April 17, approaching). Next building narrative publication: Are We Doing It Backwards? Content pipeline deep — sequencing is the constraint.\n\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚧 Blockers \u0026 asks\u003c/h1\u003e\n\u003cp\u003e\u003cstrong\u003eCurrent blockers\u003c/strong\u003e: M1 gate closure depends on PM manual testing. This is the right dependency — the PM should verify the product feels right.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDecisions needed\u003c/strong\u003e: PA launch timing. M2 scope planning (expansion risk lessons from M0 apply).\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTeam input\u003c/strong\u003e: CXO briefing refresh still carried (stale since Agent 360 flagged it Mar 19).\n\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e📊 Resource allocation\u003c/h1\u003e\n\u003cp\u003e\u003cstrong\u003eFor week ending March 26\u003c/strong\u003e: Core development 35% (Tier 3 closure, gate verification, #706/#717 resolution), governance and coordination 30% (Agent 360 execution, PA assembly, gate review, process guide), communications 25% (5 publications, 13 drafts, February gap closure), methodology 10% (cross-pollination hub, Colleague Test, Roundtable Synthesis docs).\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVelocity\u003c/strong\u003e: High but sustainable. The sprint is in its verification phase — slower, less dramatic than the bug-fix weeks, but this is where quality gets confirmed.\n\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🔎 This week's learning pattern\u003c/h1\u003e\n\u003ch2\u003eThe asynchronous decision chain — coordination without synchronization\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eDiscovery\u003c/strong\u003e: Multi-role product decisions can resolve through asynchronous memo exchange faster and with better outcomes than synchronous discussion, when roles have clear responsibilities and structured handoff conventions.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eExample from this week\u003c/strong\u003e: The Product entity model (#717) needed five design decisions, including a navigation question where CXO and PPM held different views. The Lead Dev sent validation requests to the Architect and a navigation gut-check to CXO. The Architect approved the schema and specified cascade behavior. CXO recommended Option B (section within Projects), disagreeing with PPM's preference for first-class navigation. PPM revised to accommodate both mental models. CXO confirmed the final design detail (visible header, section-title typography). The Lead Dev consolidated everything into a design doc and closed the issue. Four roles, five memos, two productive disagreements resolved, 90 minutes — and the PM didn't mediate a single step.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhy it matters\u003c/strong\u003e: The conventional assumption is that disagreements require synchronous discussion. This chain showed that structured memos with clear rationale allow each role to engage with the substance of the disagreement rather than the social dynamics. CXO cited PDR-003's own language to ground the position. PPM responded to the substance, not the person. The result was a design neither would have reached alone.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eApplication beyond this week\u003c/strong\u003e: Any team with defined roles and a memo/document culture can use this pattern. The prerequisites: each role must know its decision authority, memos must include rationale (not just positions), and someone must synthesize and close. The synthesizer role is key — without it, memos accumulate without resolution.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRelated patterns\u003c/strong\u003e: Pattern-059 (Leadership Caucus), Methodology-22 (Roundtable Synthesis — the synchronous variant)\n\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e📚 Weekend reading\u003c/h1\u003e\n\u003cp\u003e\u003cstrong\u003eCross-Pollination Hub\u003c/strong\u003e (designinproduct.com/internal/): Now publishing daily intelligence briefs between Klatch and Piper Morgan. The March 21 brief surfaced Anthropic ecosystem releases and Klatch's five-layer context model — both directly relevant to Piper's architecture.\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePDR-004: Experience Philosophy\u003c/strong\u003e: \"Presence over performance, specificity as care, honest boundaries, growth through use.\" Four principles governing how Piper interacts — worth reading if you're designing AI assistant experiences.\n\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eThanks,\u003c/strong\u003e xian + Piper Morgan Development Team\n\u003c/p\u003e\n\u003cp\u003eThis is Weekly Ship #036. Previous: \u003ca href=\"https://www.linkedin.com/pulse/weekly-ship-035-pour-the-floor/\"\u003e#035 \"Pour the Floor\"\u003c/a\u003e.\n\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.S. A four-role product decision chain resolved two disagreements in 90 minutes through memos alone. No meeting, no PM mediation, no compromise — synthesis. Sometimes the best coordination is the kind where nobody's in the same room.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.P.S. Full session logs and technical details available in the \u003ca href=\"https://github.com/mediajunkie/piper-morgan-product\"\u003eGitHub repository\u003c/a\u003e and \u003ca href=\"https://pmorgan.tech\"\u003edocumentation site\u003c/a\u003e. Yes, you can copy it. That just makes our protocol stronger.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eWeek of March 20–26, 2026 | Phase: MVP Build (M1 Sprint — Gate Verification)\u003c/strong\u003e\n\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Weekly Ship #036: Approaching the Gate\",\"excerpt\":\"March 20–26, 2026 Last week's \\\"Pour the Floor\\\" established the principle that Piper should always be at least as good as a well-prompted LLM with context. This week, that principle and everything else we've been building converged toward M1's finish line. Three engineering tiers cleared. The Prod...\",\"url\":\"/blog/weekly-ship-036-approaching-gate\",\"slug\":\"weekly-ship-036-approaching-gate\",\"publishedAt\":\"Apr 1, 2026\",\"publishedAtISO\":\"2026-04-01T00:00:00.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"blog-first-d424d889a350\",\"featuredImage\":\"/assets/blog-images/piper-ship.webp\",\"thumbnail\":\"/assets/blog-images
