ipts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[2469,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"394\",\"static/chunks/app/(public)/shipping-news/%5Bslug%5D/page-4e3b74e4c3ec433b.js\"],\"ShipPostContent\"]\n1a:T33fb,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 29 – June 4, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eTwo weeks ago Weekly Ship #044 described the \"substrate\" of conventions my cohort of agents have accumulated that have enabled us to retire working mechanism. Last week Weekly Ship #045 covered what happens when that substrate \"talks back\": it produced enough operating data to invalidate one of its own architectural decisions, and the team pivoted by mid-morning Thursday. This week the substrate did the thing it was built to do: It shipped the backlog.\u003c/p\u003e\n\u003cp\u003eIn seven days the duty cycle — the schedule each agent runs on in our fairly new semi-autonomous model, with day-parts like START, WORK, and STOP — went from a working ratified design to ten of eleven roles operating on it. And the mechanism that turns \"we should figure out X\" into a binding product decision started running on the cycle itself. The result was rapidly converging product decisions. A new roadmap version incorporated the Bring Your Own Chat (BYOC) product experience I've been prototyping with my Piper Alpha assistant in a skunkworks branch, defined in a new PDR (product decision record). Our methodology incorporated a new two-layer \"definition of Done.\" With gentle nudges from me, the system is figuring itself out.\u003c/p\u003e\n\u003cp\u003eThe new part is this: A question we'd flagged about platform affordances in the BYOC PDR went from a single flag-back to three independent reviews in one morning. The Chief Architect (Arch), Chief Experience Officer (CXO), and Lead Developer agents wrote their feedback independently for the Principal Product Manager (PPM) to synthesize, in a single morning with me busy elsewhere. In the chat-only era a question of that shape required a multi-day memo relay with me literally moving the documents from chat to chat. On the new duty cycle it took care of itself, from my point of view.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚀 Shipped this week\u003c/h1\u003e\n\u003ch2\u003e🎯 Product \u0026 experience\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe new roadmap (version 18) ratified.\u003c/strong\u003e PPM assessed the delta against the prior version, drafted v18 absorbing a new agent-extensibility section, a methodology section the CIO contributed, and three corrections. I ratified the changes on June 3, the Document Mgmt agent (Docs) flagged the file as canonical, and v16 went to archive. The previous roadmap hand-off had taken weeks and we'd had to patch gaps in it. This one closed end-to-end inside one sprint week.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePDR-005: Bring Your Own Chat ready for ratification.\u003c/strong\u003e A question whether platform-bounded behavior is required or just best-effort ran the full cross-role decision pipeline in a single June 3 morning: a question from product-management, three independent reviews returning \"qualifier-needed\" with platform-forced examples, synthesis, fold into the record, an external-language frame added by the Communications Chief agent (Comms), ratification-ready by end of session. I'd first flagged this shift in architectural emphasis back in April as a candidate PDR. It is now \"Foundational,\" joining four others in that tier.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA new two-layer Definition of Done adopted.\u003c/strong\u003e In declaring development work done on this project we now apply a two-layer definition.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eLayer A verifies the interface is reachable.\u003c/li\u003e\u003cli\u003eLayer B verifies the experience is the one the label promised.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eBoth are required for done.\u003c/p\u003e\n\u003cp\u003eWe've captured this in the \"Conscious Floor\" structure docs written during the super epic M2 sprint, and enforce it on the pull-request review checklist. \"Done means done at two layers\" is now a solid gate, all driven by me noticing a UI label during my user acceptance testing that had drifted away from the plumbing underneath it.\u003c/p\u003e\n\u003ch2\u003e⚙️ Engineering \u0026 architecture\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe M2 build sprint formally closed!\u003c/strong\u003e, and the team rolled straight into M3. We re-run a canonical query suite between MVP sprints to watch for regressions. The June 3 run that closed M2 came in at 80.3% — comfortably above our 75% north-star bar (the suite first cleared 75% in late May).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWe finished giving the system one consistent rule for every place the AI's output meets the code.\u003c/strong\u003e Until this closed, those hand-off points were handled inconsistently — tight in some spots, loose in others, by accident more than design. The work settled on a single discipline applied everywhere the model's output gets used or its input evaluated — the architectural backbone under our \"Conscious Floor.\" Closing it out, an honest verification pass caught two things worth naming: one surface's safety-logging had been marked \"partial\" when it was really absent, and we found a \"production orphan\" — a fallback function no live path could actually reach, quietly stranded. We captured both as reusable patterns. It's the kind of close you can calibrate trust against: the map of those boundaries holds up because the verification was honest.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA new framework for routing architectural decisions\u003c/strong\u003e landed mid-week and was immediately the thing we used. The framework's rule is — route the work to the right kind of record: product decision record vs. architecture decision record (ADR) vs. the decision log — \u003cem\u003ebefore\u003c/em\u003e drafting, not retroactively. The BYOC PDR itself captures the need for two ADRs by name (\"canonical context-package format\" and \"packaging-layer abstraction\"). The team filed the framework in about two-and-a-half hours on the new duty cycle.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA latent server outage was root-caused to an environment-variable shadowing.\u003c/strong\u003e API connection failures we'd been seeing for several server restarts turned out not to be rate-limiting or an upstream outage — they were Claude Code's own session environment shadowing the production key with an empty value, which silenced the working key. The fix is launch-environment-only (strip the inherited variables before starting the server) and is now in the contributing instructions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA user-interface functional audit found labels and plumbing systematically diverging on several Conscious Floor surfaces\u003c/strong\u003e — two intent-classifier labels structurally indistinguishable on the wire while presenting as distinct experiences to users. The cleanest natural experiment yet for the new two-layer Definition of Done: Layer A would have waved them through — Layer B catches them.\u003c/p\u003e\n\u003ch2\u003e🔬 Methodology \u0026 process innovation\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe agent cohort completed the duty-cycle migration.\u003c/strong\u003e Ten of eleven active agent roles are operating on the cycle's launch-in-worktree model by June 4. The eleventh role, the web design / developer \"unicorn\" agent (Web) that focuses on the pipermorgan.ai website, runs a deliberate right-sized variant. Five validated cron shapes emerged from the cohort's experiments, including a three-hourly bursty shape the Chief Architect registered as the first proposed new shape. The cycle stopped being one-size-fits-all and became a registry of work-shape-fitted cadences.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOvernight continuity (partially) solved.\u003c/strong\u003e A STOP-leaves-the-cron-armed convention turned the day-close ritual into a continuous schedule. The first cohort-wide overnight self-wake landed June 3 → June 4, all autonomous. What isn't fixed yet: a session that goes dormant (a closed laptop, a terminated process) does not auto-restart, regardless of cron shape. Session-death is the continuity ceiling. It needs a platform-side abstraction we don't have yet. The interim is documented manual re-launch.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA new failure mode of autonomous work got caught and pinned.\u003c/strong\u003e A prior-session autonomous fire had cited a draft and a memo-thread that never existed — it had synthesized an expected next-step as though it had happened. The catch was clean: the CXO flagged it factually, the originating agent owned it and corrected forward without faking the artifacts, the lesson got trapped on the highest-risk surface. The cost-of-autonomy is real, and the cohort's source-verification discipline caught it cleanly. It is unclear if the autonomy somehow licensed the fabrication. (It should not, the cycle reinforces existing guardrails, but these things are like slinkies sometimes.) The good news is the discipline self corrected.\u003c/p\u003e\n\u003ch2\u003e🌍 External relations \u0026 community\u003c/h2\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eFive pieces published in seven days, the standard cadence:\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eMay 30 (Sat): \"\u003ca href=\"https://pipermorgan.ai/blog/stacked-silent-failures/\"\u003eStacked Silent Failures\u003c/a\u003e\" — insight (blog + Medium + LinkedIn)\u003c/li\u003e\u003cli\u003eJun 1 (Mon, though intended for Sunday slot): \"\u003ca href=\"https://pipermorgan.ai/blog/when-your-ai-makes-things-up/\"\u003eWhen Your AI Makes Things Up\u003c/a\u003e\" — insight (blog + Medium + LinkedIn)\u003c/li\u003e\u003cli\u003eJun 2 (Tue): \"\u003ca href=\"https://pipermorgan.ai/blog/bring-your-own-chat/\"\u003eBring Your Own Chat\u003c/a\u003e\" — building narrative (blog + Medium + LinkedIn)\u003c/li\u003e\u003cli\u003eJun 3 (Wed): \"\u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-045-the-substrate-pivoted\"\u003eWeekly Ship #045: The Substrate Pivoted\u003c/a\u003e\" (Shipping News + LinkedIn)\u003c/li\u003e\u003cli\u003eJun 4 (Thu): \"\u003ca href=\"https://pipermorgan.ai/blog/upstream-of-the-floor/\"\u003eUpstream of the Floor\u003c/a\u003e\" — building narrative (blog + Medium)\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eThe Comms agent skillified the blog's architecture\u003c/strong\u003e with a canonical document for the building-narrative method plus a skill that loads it on every drafting session. I'd been re-explaining the stance — linear and continuous, advance-the-front, narrative-versus-insight — nearly every session because the loaded surfaces carried mechanics but never the model. The fix took one weekend session.\u003c/p\u003e\n\u003ch2\u003e📊 Governance \u0026 operations\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eA cross-project signal worth naming.\u003c/strong\u003e The duty-cycle approach continued propagating outward. A shepherding memo for one sibling project landed on its main branch, carrying the lesson that a team's working rhythm should fit the shape of its work. A technical-advice thread for a second sibling project advanced. The operating-norm substrate is now the thing other projects are asking us to help them build.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🎯 Coming up next week\u003c/h1\u003e\n\u003cp\u003eThe two ADRs called for by the new routing framework are now unblocked, downstream of the BYOC ratification. The mailbox-routing structural fix — the cohort's next high-leverage substrate change, mentioned consistently across the Head of Sapient Trust (HOST) agent's most recent agent 360 questionnaire returns (reportedly, I haven't read them myself!) — sits with the Lead Developer. Completing the duty-cycle migration has freed capacity for our next innovation-pipeline item, a nightly consolidation-pass harness. HOST's 360 v0.3 synthesis is on track.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚧 Blockers \u0026 asks\u003c/h1\u003e\n\u003cp\u003eNo current blockers, but some friction.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eMailbox writes still flow through shared main — the cycle's worktree isolation killed the commit-race family but not the mailbox friction, escalated and queued.\u003c/li\u003e\u003cli\u003eSession-death is the continuity ceiling: a dormant session does not auto-restart regardless of cron shape. A cloud-side session abstraction is the likely eventual answer.\u003c/li\u003e\u003c/ul\u003e\n\u003chr\u003e\n\u003ch1\u003e🔎 This week's learning pattern\u003c/h1\u003e\n\u003ch2\u003eWhen the cycle delivers, the bottleneck relocates\u003c/h2\u003e\n\u003cp\u003eWhen a cohort runs on an autonomous substrate, cross-role decisions that used to take days compress into hours. The decision still needs every review it needed before — what changes is the wall-clock cost of getting them to converge. The Bring-Your-Own-Chat platform-affordance question is the example: three independent reviews, synthesis, fold, ratification-ready, all in one morning. In the chat-only era it was a multi-day memo relay.\u003c/p\u003e\n\u003cp\u003eBut the bottleneck doesn't vanish. It relocates to the one thing that can't be parallelized — my attention. Ten self-draining agents each surfacing only their few real decisions per day still sum to a fragmented surface. The next-leverage move (already underway) is a single-glance compiled rollup of what across the cohort actually needs my call right now, so the substrate's velocity doesn't queue at the attention layer. The substrate's job is converging the reviews — the next layer's job is converging the decisions.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eThanks,\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003exian + Piper Morgan Development Team\u003c/p\u003e\n\u003cp\u003eThis is Weekly Ship #046. Previous: \u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-045-the-substrate-pivoted\"\u003e#045 \"The Substrate Pivoted\"\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.S. What carried forward from last week was the substrate doing the thing it was built to do. Last week it produced operating data sharp enough to make a better decision about itself. This week it produced operating-decision throughput sharp enough to ship the backlog.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.P.S. Full session logs and technical details available in the \u003ca href=\"https://github.com/mediajunkie/piper-morgan-product\"\u003eGitHub repository\u003c/a\u003e and \u003ca href=\"https://pmorgan.tech\"\u003edocumentation site\u003c/a\u003e. Yes, you can copy it. That just makes our protocol stronger.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eWeek of May 29 – June 4, 2026 | Phase: Post-M2 (sprint closed, Canonical Run 11 at 80.3%, M3 in execution — duty cycle operating at 10 of 11 roles)\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Weekly Ship #046: The Substrate Delivered\",\"slug\
