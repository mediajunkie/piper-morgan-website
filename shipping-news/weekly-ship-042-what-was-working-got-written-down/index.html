ing.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚀 Shipped this week\u003c/h1\u003e\n\u003ch2\u003e🎯 Product \u0026 experience\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe current build milestone closed Sunday May 3.\u003c/strong\u003e Eight related improvements shipped in one working session — features around how Piper composts conversations into structured records, how those records surface back to users, lifecycle handling for the user-experience layer, and a refactor of the calendar-offer policy (that is, when and how Piper offers to connect your calendar). The architect role later named that last one a model of what a clean policy-decision function should look like.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTwo days earlier, the audit-log durability work shipped.\u003c/strong\u003e The audit trail now lives in PostgreSQL instead of in memory, and a failed audit write can no longer roll back an ethics decision — the two live in separate transactions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe team's detection-and-response architecture was formally ratified May 4\u003c/strong\u003e — a two-layer setup that keeps the ethics check structurally separate from the response generation.\u003c/p\u003e\n\u003ch2\u003e⚙️ Engineering \u0026 architecture\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe architecture role published an audit of three weeks of the developer's work.\u003c/strong\u003e About 700 commits, seven major workstreams. Verdict: structurally sound; 79% of code-touching commits include tests; all clean-shipping.\u003c/p\u003e\n\u003cp\u003eThe interesting part was the short cleanup list that surfaced. Five items, all closed or tracked within two days. One of them named a pattern the team had been seeing in different costumes: \u003cem\u003eExtension Without Integration\u003c/em\u003e — code that ships, passes its own tests, but isn't actually wired into production paths. Two days later the first wild instance turned out to be a real bug: a logging call referencing an object that was never initialized, the resulting error silently hidden by an overly-broad error catch. The pattern was now diagnostic, not just descriptive.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe team also ran its first delegated-subagent task end-to-end under a three-gate audit discipline\u003c/strong\u003e (gate before the work starts, gate during execution, gate after the work finishes). It caught what it was meant to catch.\u003c/p\u003e\n\u003ch2\u003e🔬 Methodology \u0026 process innovation\u003c/h2\u003e\n\u003cp\u003eThree process documents landed May 4:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eA \u003cstrong\u003ereview-gate policy\u003c/strong\u003e from the product-management role: five categories of change that need product-management eyes before shipping, with a fail-soft default when that role is unavailable.\u003c/li\u003e\u003cli\u003eA \u003cstrong\u003ecompletion checklist\u003c/strong\u003e for the current build milestone — quality thresholds, verification protocol, and a conceptual-integrity test. The same structure now applies to the next two milestones.\u003c/li\u003e\u003cli\u003eThe opening of a \u003cstrong\u003ediscovery conversation\u003c/strong\u003e on how users will eventually bring their own AI assistants (the BYOC project) — a decision-debt that had been deferred since the previous role-holder handed off.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eEach artifact names a triggering surface, not a procedure. None of them creates new authority. Each makes existing authority systematic.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWorking memory moved.\u003c/strong\u003e About a dozen new memory entries landed across the team's agents in seven days — roughly one every half day. Each one captures a specific failure mode and its fix, at the per-agent layer, where the discipline absorbs immediately instead of waiting for a project-wide document update.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOne catch worth naming.\u003c/strong\u003e When the product-management role (Piper Alpha) wrote the new completion checklist, it silently extended the team's voice-quality rubric in a way the team had named two weeks earlier as something to avoid. The experience-design role (CXO) caught it the same day; the rubric got branched explicitly rather than extended in place. The team's own rule governed an artifact none of its original authors had written.\u003c/p\u003e\n\u003ch2\u003e🌍 External relations \u0026 community\u003c/h2\u003e\n\u003cp\u003eFive pieces published in the window:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eMay 2 (Sat): \"\u003ca href=\"https://pipermorgan.ai/blog/the-drift-you-dont-notice/\"\u003eThe Drift You Don't Notice\u003c/a\u003e\", insight from February on what slips past attention in everyday process work, syndicated on Medium and in this LinkedIn newsletter\u003c/li\u003e\u003cli\u003eMay 3 (Sun): \"\u003ca href=\"https://pipermorgan.ai/blog/friction-focused-feedback/\"\u003eFriction-Focused Feedback\u003c/a\u003e\", insight from March on treating friction in feedback as a signal worth reading, also syndicated on Medium and here\u003c/li\u003e\u003cli\u003eMay 5 (Tue): \"\u003ca href=\"https://pipermorgan.ai/blog/six-issues-before-dinner/\"\u003eSix Issues Before Dinner\u003c/a\u003e\", building narrative covering work done April 14 and 15 on a developer's afternoon where months of preparation finally compounded, syndicated on Medium\u003c/li\u003e\u003cli\u003eMay 7 (Thu): \"\u003ca href=\"https://pipermorgan.ai/blog/a-hail-of-memos/\"\u003eA Hail of Memos\u003c/a\u003e\", building narrative on April 16, the day a coordination-bottleneck through one human node became visible, syndicated on Medium\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eThe publishing pipeline caught three voice-discipline issues during the final edit pass without coming back as redraft asks: a numeric headline renamed to something more direct, a Claude-favored word swapped for plainer prose, and a forward-tease cadence corrected.\u003c/p\u003e\n\u003cp\u003eObservation from the communications role: catching the same patterns repeatedly at the edit pass means the discipline should move upstream into drafting. Queued.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://pipermorgan.ai/assets/blog-images/a-hail-of-memos.webp\"\u003e![Figure at center of a radial storm of incoming message-slips, struggling to catch them while working.\u003c/a\u003e](https://pipermorgan.ai/blog/a-hail-of-memos/)\u003c/p\u003e\n\u003ch2\u003e📊 Governance \u0026 operations\u003c/h2\u003e\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eMetric\u003c/th\u003e\u003cth\u003eValue\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003eDeveloper commits\u003c/td\u003e\u003ctd\u003e~50 across the window\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eBuild milestone scope\u003c/td\u003e\u003ctd\u003eClosed Sunday (8 improvements end-to-end)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eAudit cleanup closure\u003c/td\u003e\u003ctd\u003e2 days (all 5 items closed or tracked)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eAudit-log durability cluster\u003c/td\u003e\u003ctd\u003e4 issues closed in one merge\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eNew agent-memory entries\u003c/td\u003e\u003ctd\u003e12+ in 7 days\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003ePublications\u003c/td\u003e\u003ctd\u003e5 (full weekly cadence)\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\n\u003cp\u003eVersion-control coordination friction continued — four incidents in the window, each producing a recovery template and a memory entry. Whether to move from recovery to prevention is now being scoped.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🎯 Coming up next week\u003c/h1\u003e\n\u003cp\u003eNext milestone in flight: a queue of context-assembly improvements plus the final conceptual-integrity and acceptance-test passes. The communications role will start absorbing the edit-pass patterns into drafting practice. A density-and-concision conversation is queued for after current cycle commitments land.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚧 Blockers \u0026 asks\u003c/h1\u003e\n\u003cp\u003eNo current blockers. A roadmap update was overdue in this time window and is awaiting ratification. Several discovery-thread responses are queued on natural cadence.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🔎 This week's learning pattern\u003c/h1\u003e\n\u003ch2\u003eCodifying practice is downstream of practice — and that's where the value is\u003c/h2\u003e\n\u003cp\u003eWhen a team is operating well, the discipline gets named after it works, not before. Writing it down makes the practice legible to the team itself, which is what lets the discipline survive role rotation, refine under load, and catch its own drift.\u003c/p\u003e\n\u003cp\u003eThis week's clearest instance: the new completion checklist formalized a verification process the developer had already used to ship eight improvements the previous Sunday. Within hours, that same checklist caught a problem in its own quality rubric — extending another rubric in a way the team had previously named as something to avoid. The codification made the catch possible.\u003c/p\u003e\n\u003cp\u003eThe instinct in process work is to document something in order to teach it. That works when the practice doesn't exist yet. When it does, documentation does different work: it lets the team recognize the pattern, name its dimensions, and call out drift when the pattern recurs somewhere the original authors didn't anticipate.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eThanks,\u003c/strong\u003e\u003cbr /\u003exian + Piper Morgan Development Team\u003c/p\u003e\n\u003cp\u003eThis is Weekly Ship #042. Previous: \u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-041-the-methodology-closes-its-own-loops/\"\u003e#041 \"The Methodology Closes Its Own Loops\"\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.S. The milestone closed Sunday afternoon after eight related improvements shipped in one working session. The three process documents that landed Monday formalized the practice that produced the closure. The team is fluent enough now that the writing happens after the work.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.P.S. Full session logs and technical details available in the [GitHub repository](https://github.com/mediajunkie/piper-morgan-product) and [documentation site](https://pmorgan.tech). Yes, you can copy it. That just makes our protocol stronger.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eWeek of May 1–7, 2026 | Phase: MVP Build (current milestone closed; next two in flight)\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Weekly Ship #042: What Was Working Got Written Down\",\"slug\":\"weekly-ship-042-what-was-working-got-written-down\",\"guid\":\"blog-first-4904bbda14aa\",\"url\":\"/blog/weekly-ship-042-what-was-working-got-written-down\",\"publishedAt\":\"May 13, 2026\",\"publishedAtISO\":\"2026-05-13T00:00:00.000Z\",\"workDate\":\"May 1, 2026\",\"author\":\"christian crumlish\",\"linkedinURL\":\"$undefined\"},\"content\":{\"title\":\"Weekly Ship #042: What Was Working Got Written Down\",\"content\":\"$1b\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1c:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Weekly Ship #042: What Was Working Got Written Down | The Shipping News | Piper Morgan\"}],[\"$\",\"meta\"
