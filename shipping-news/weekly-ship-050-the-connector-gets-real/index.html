ipts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[2469,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"394\",\"static/chunks/app/(public)/shipping-news/%5Bslug%5D/page-e11e238cc9723c3e.js\"],\"ShipPostContent\"]\n1a:T2681,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eJune 26–July 2, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe GitHub connector stopped pretending this week. What had been running against a simulated backend went live — verified by pulling 179 real issues through real authentication, not test fixtures. The calendar connector got the same treatment on the same shared contract. A security gap that opened when an unrelated change removed a safeguard was found one day and fixed the next. And in three separate places, the team replaced \"remember to check this\" with something that checks itself.\u003c/p\u003e\n\u003cp\u003eThere's an irony here worth owning: the very first Piper Morgan proof of concept could do this competently. That version served exactly one user, with personal credentials wired straight in — this one does it with real per-user authentication, on a contract every connector shares. Coming back around to where you started, for real this time, is a lot of what shipping actually is.\u003c/p\u003e\n\u003cp\u003eThe plugin also got its first serious outside install attempt this week — which failed, and taught us more than a clean install would have. More on that below, because we count it honestly.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚀 Shipped this week\u003c/h1\u003e\n\u003ch2\u003e🎯 Product \u0026 experience\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eA failed install that paid for itself.\u003c/strong\u003e Our first external tester tried to get the plugin running this week, and his feedback drove three same-day releases — including a packaging fix that would have broken installation for the next person too. What it didn't produce: a working install. His Claude interface never showed the install entry point, and we haven't cracked why yet. The feedback loop is the win. The install experience is the honest gap, and it's named, not buried.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSlack setup got a real onboarding flow.\u003c/strong\u003e The experience-design role (CXO) spec'd the full Settings surface — setup steps, three plain-language status states (listening, connecting, not yet enabled), copy for each — and it was built and shipped to spec within the window.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePiper stopped claiming success it hadn't earned.\u003c/strong\u003e A live moment surfaced where Piper said \"Milestone created\" when nothing had actually been created. Caught in real use, answered within a day with a rule that generalizes: if the system can't verify an action actually happened, it says so rather than claiming it did.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSmaller fixes\u003c/strong\u003e: setting a default GitHub repo is now a plain conversation instead of a settings screen, and a confusing connection status (simultaneously \"connected\" and \"invalid token\") got cleaned up.\u003c/p\u003e\n\u003ch2\u003e⚙️ Engineering \u0026 architecture\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eGitHub, for real.\u003c/strong\u003e The connector that talks to GitHub moved off a simulated backend onto a real one, live-verified by pulling 179 actual issues through a real authenticated round-trip. The calendar connector was ported onto the same shared contract — one protocol both now implement, instead of two one-off implementations that could quietly diverge.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA security gap opened and closed inside the week.\u003c/strong\u003e An unrelated infrastructure change had quietly removed a safeguard, opening a narrow window where a request could fall back to using the system's own credentials instead of the user's. Found one day, deployed as a fix the next.\u003c/p\u003e\n\u003ch2\u003e🔬 Methodology \u0026 process innovation\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eVigilance keeps losing to mechanism, on purpose.\u003c/strong\u003e Three separate times this week, the team took something that depended on a person remembering to check it and turned it into something that checks itself. A stale-session monitor that used to need hand-tuned thresholds now derives them automatically from each role's own schedule. A version-consistency script got wired into the release process as a non-skippable step, after a real mismatch had slipped through before. And an early attempt at automatically waking stalled sessions got built, proven unreliable by its own self-test the next morning, and retired on the spot rather than left half-working.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOwning a mistake in public, fast.\u003c/strong\u003e An architectural call about a piece of code turned out to be wrong — it looked live but was actually unreachable. The person who made the original call corrected it the same day someone else's trace disproved it. No defensiveness, just a fix.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe team tightened its own belt in a day.\u003c/strong\u003e A cost-conscious pace reduction rolled out across the whole team in a single day, catching and fixing a false-alarm side effect in the same sitting.\u003c/p\u003e\n\u003ch2\u003e🌍 External relations \u0026 community\u003c/h2\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eFive pieces published this week:\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eJun 27: \"\u003ca href=\"https://pipermorgan.ai/blog/the-triad-model\"\u003eThe Triad Model\u003c/a\u003e\" — insight\u003c/li\u003e\u003cli\u003eJun 29: \"\u003ca href=\"https://pipermorgan.ai/blog/relationship-first-ethics/\"\u003eRelationship-first Ethics\u003c/a\u003e\" — insight\u003c/li\u003e\u003cli\u003eJun 30: \"\u003ca href=\"https://pipermorgan.ai/blog/from-briefing-to-vision/\"\u003eFrom Briefing to Vision\u003c/a\u003e\" — building narrative\u003c/li\u003e\u003cli\u003eJul 1: \u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-049-the-team-builds-its-own-reliability\"\u003eWeekly Ship #049\u003c/a\u003e — shipping news\u003c/li\u003e\u003cli\u003eJul 2: \"\u003ca href=\"https://pipermorgan.ai/blog/the-airport-corrections\"\u003eThe Airport Corrections\u003c/a\u003e\" — building narrative\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003ca href=\"https://pipermorgan.ai/blog/the-airport-corrections\"\u003e\u003cimg src=\"https://pipermorgan.ai/assets/blog-images/the-airport-corrections.webp\" alt=\"At an airport gate, a traveler supervises a whimsical team of glowing AI helpers tending an autonomous work loop while planes wait outside the windows.\" /\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Now don't stray too far before boarding!\" — from \"\u003ca href=\"https://pipermorgan.ai/blog/the-airport-corrections\"\u003eThe Airport Corrections\u003c/a\u003e\"\u003c/em\u003e\u003c/p\u003e\n\u003ch2\u003e📊 Governance \u0026 operations\u003c/h2\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eMetrics (Jun 26–Jul 2):\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\u003cstrong\u003eIssues closed:\u003c/strong\u003e 25\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eConnectors on the shared protocol:\u003c/strong\u003e 2 (GitHub, Calendar)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSecurity gaps found and fixed inside the week:\u003c/strong\u003e 1\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eThe milestone ladder got pinned down\u003c/strong\u003e: beta ships as version 0.9.0, production as 1.0, with a fast-follow milestone behind it.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA no-destructive-git rule for the team's shared workspace was formally ratified\u003c/strong\u003e, after a near-miss made clear it needed to be a rule rather than a habit.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🎯 Coming up next week\u003c/h1\u003e\n\u003cp\u003eThe connector work continues past GitHub and calendar. A registration-security gap identified at the very end of this window is the top priority to close. The team is also moving toward its own dedicated infrastructure accounts — a deliberate, unhurried transition with weeks of runway.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚧 Blockers \u0026 asks\u003c/h1\u003e\n\u003cp\u003e\u003cstrong\u003eOpen registration gap\u003c/strong\u003e: a safeguard around new-account creation needs closing before it's fully resolved. In hand at week's close, not yet shipped.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe plugin install mystery\u003c/strong\u003e: our first external install attempt is blocked on an interface element that simply doesn't appear for the tester, and we don't yet know why. If you've seen a Claude plugin install where the add button never shows up — we're listening.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🔎 This week's learning pattern\u003c/h1\u003e\n\u003ch2\u003eStop trusting yourself to remember\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eDiscovery\u003c/strong\u003e: three unrelated fixes this week shared the same shape — each one took a rule that depended on someone remembering to follow it, and moved it into something that enforces itself.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eExample from this week\u003c/strong\u003e: a monitor that watches for stalled work sessions used to need someone to hand-tune how long is \"too long\" for each role. This week it started deriving that threshold automatically from each role's own schedule, so it can't drift out of sync the way a hand-set number eventually does. Separately, a version-mismatch bug had slipped through releases before — the fix wasn't a reminder to check next time, it was a script wired directly into the release process that won't let a release proceed with a mismatch.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhy it matters\u003c/strong\u003e: rules that live in someone's memory, or in a step someone has to remember to run, fail quietly. Nobody notices until the thing they were supposed to prevent has already happened. Encoding the rule into the mechanism itself removes the step where a person has to remember.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eApplication beyond this week\u003c/strong\u003e: the same test applies to almost any recurring discipline — if the only thing standing between \"works\" and \"silently breaks\" is someone remembering to check, that's worth converting into something structural. It won't always be possible, but it's always worth asking.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRelated patterns\u003c/strong\u003e: the security fix earlier in the week is the same instinct under more pressure — closing a gap by making the correct behavior the only path, rather than trusting a rule to be followed.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eThanks,\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003exian + Piper Morgan Development Team\u003c/p\u003e\n\u003cp\u003eThis is Weekly Ship #050. Previous: \u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-049-the-team-builds-its-own-reliability\"\u003e#049 \"The Team Builds Its Own Reliability\"\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.S. The plugin's first outside test didn't produce a working install — it produced three same-day fixes and an unsolved mystery about a missing plus sign. I'll take that trade for now. The loop is the thing. The polish comes next.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.P.S. Full session logs and technical details available in the \u003ca href=\"https://github.com/mediajunkie/piper-morgan-product\"\u003eGitHub repository\u003c/a\u003e and \u003ca href=\"https://pmorgan.tech\"\u003edocumentation site\u003c/a\u003e. Yes, you can copy it. That just makes our protocol stronger.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eWeek of June 26–July 2, 2026 | Phase: Alpha testing, connector cutover\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Weekly Ship #050: The Connector Gets Real\",\"slug\":\"weekly-ship-050-the-connector-gets-real\",\"guid\":\"blog-first-f5eb18e35ee6\",\"url\":\"/blog/weekly-ship-050-the-connector-gets-real\",\"publishedAt\":\"Jul 8, 2026\",\"publishedAtISO\":\"2026-07-08T00:00:00.000Z\",\"workDate\":\"Jun 26, 2026\",\"author\":\"christian crumlish\",\"linkedinURL\":\"$undefined\"},\"content\":{\"title\":\"Weekly Ship #050: The Connector Gets Real\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Weekly Ship #050: The Connector Gets Real | The Shipping News | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Weekly development update from the Piper Morgan team.\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Pub
