ipts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[2469,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"394\",\"static/chunks/app/(public)/shipping-news/%5Bslug%5D/page-4e3b74e4c3ec433b.js\"],\"ShipPostContent\"]\n1a:T2dc0,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eJune 5–11, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThree weeks ago the \"substrate\" was a pile of conventions my agent team had accumulated. Two weeks ago it talked back: it produced enough operating data to invalidate one of its own architectural decisions, and we pivoted by that Thursday. A week ago it shipped the backlog. This week it did something I didn't fully expect: running at full load, the team started catching itself.\u003c/p\u003e\n\u003cp\u003eHere is what I mean. The duty cycle — the schedule each agent runs on in our semi-autonomous model, with day-parts like START, WORK, and STOP — is now carrying real weight, and that weight surfaced the next layer of problems underneath our own way of working. Twice this week the team noticed one of those patterns, named it, and wrote a mechanism so it can't recur.\u003c/p\u003e\n\u003cp\u003eAnd twice, in one of those lovely meta-twists that seems to happen so often with these materials, the act of naming the pattern exhibited an example of the pattern by the agent doing the naming: a new methodology entry whose very first real-world example was its own author, mid-mistake, hours after filing it. That is a strange and good thing to watch. The team isn't just running the cycle anymore. It's learning the cycle's structural failure modes from running it — and catching itself in the act.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eThis may be the most compelling thing going on: not the one-shot tricks, not the autonomous agency, but the ability to self-improve.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eOn the other hand, this same maturity exposed a limit we can't yet engineer away. A session that simply dies — a closed laptop, a killed process — never wakes itself back up, no matter how we shape its schedule. Across the week, six of our cycling roles got caught by it and needed a manual hand to recover. The team noticed the problem, suggested a real fix (which lives on the platform side, not in our code), and confirmed that meanwhile nothing was actually lost — only the closing ceremony of a workday, which the next morning quietly rebuilt. A team that can say \"here is the gap, here is the real fix, and here is exactly what we still can't promise\" is showing you something you can calibrate trust against.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚀 Shipped this week\u003c/h1\u003e\n\u003ch2\u003e🎯 Product \u0026 experience\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eHosted Piper went public.\u003c/strong\u003e The first production cut (v0.8.7) became a backend running on the open internet at alpha.pipermorgan.ai, behind real transport security and authentication, and went out to a first external tester. The Bring Your Own Chat decision record that made this strategy possible was ratified to v1.0 the same window, joining four others in our \"Foundational\" tier. The substrate strategy crossed a line it hadn't before: from \"we can run it\" to \"someone who isn't us can run it.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDesign quality for beta is a new epic in the MVP milestone.\u003c/strong\u003e The Chief Experience Officer agent (CXO) turned a design-system standard into a tracked epic — and the standard's rule is enforce what we already have, not build new: our color and type tokens were already a complete accessible system, so the work is conformance, not invention. The proactive-presence thread (an agent that offers help before you ask) found the same shape — the trust gradient it needs to decide when it's allowed to act turned out to be already built and shipped months ago. Investigate-before-extending keeps finding the hard part already done.\u003c/p\u003e\n\u003ch2\u003e⚙️ Engineering \u0026 architecture\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eA multi-month cleanup of how the AI's output meets the code closed out.\u003c/strong\u003e The action-routing work — replacing a sprawl of hand-coded branches with one consistent rail — finished its last phase this week, taking the count of legacy branches it was migrating off down to zero. The Chief Architect agent (Arch) named the migration shape itself as a reusable method: introduce the new layer, move the call sites across one group at a time, then collapse the old one. We'd been doing that tacitly for months. Naming it gave the team the words to recognize it next time.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe M4 sprint (persistence and artifacts) kept pace.\u003c/strong\u003e The Lead Developer agent shipped a cluster of persistence and artifact work — the pieces that let the system remember an artifact across a restart and keep a conversation's context — plus two architecture decision records (the canonical context-package format and the packaging-layer abstraction) that the Bring Your Own Chat record had called for by name. Less visible than a public alpha, but it's the plumbing the visible things stand on.\u003c/p\u003e\n\u003ch2\u003e🔬 Methodology \u0026 process innovation\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe team named two of its own failure modes.\u003c/strong\u003e The first: when a tool or routine points at one of two paired disciplines, the unpointed-at one silently stops happening, because nothing forces it. We found this when a week of automated work-logs had quietly stopped writing to the durable record while still writing to the disposable one, across most of the agents on the cycle. The fix makes the omission structurally impossible. The second: under pressure, we apply our verification rigor to everyone's claims but our own. Both entries were filed — and within hours or days, each one caught the very agent who wrote it doing the exact thing it describes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe schedule the agents run on got more efficient, on purpose.\u003c/strong\u003e A weekly usage limit and a swarm of agents all polling at once pushed efficiency to the top of the list. One answer that shipped: schedules that simply don't fire during the overnight quiet hours, since those wake-ups did nothing but cost. It's the first team-wide change to come out of the efficiency thread.\u003c/p\u003e\n\u003cp\u003eResolved the per-role model map: Opus for heavy orchestration, Sonnet for lighter-touch cycling roles.\u003c/p\u003e\n\u003ch2\u003e🌍 External relations \u0026 community\u003c/h2\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eFive pieces published in seven days, the standard cadence:\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eJun 6 (Sat): \"\u003ca href=\"https://pipermorgan.ai/blog/be-prepared\"\u003eBe Prepared\u003c/a\u003e\" — insight (blog + Medium + LinkedIn)\u003c/li\u003e\u003cli\u003eJun 7 (Sun): \"\u003ca href=\"https://pipermorgan.ai/blog/permission-to-pause\"\u003ePermission to Pause\u003c/a\u003e\" — insight (blog + Medium + LinkedIn)\u003c/li\u003e\u003cli\u003eJun 9 (Tue): \"\u003ca href=\"https://pipermorgan.ai/blog/where-would-the-data-come-from\"\u003eWhere Would the Data Come From?\u003c/a\u003e\" — building narrative (blog + Medium)\u003c/li\u003e\u003cli\u003eJun 10 (Wed): \"\u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-046-the-substrate-delivered\"\u003eWeekly Ship #046: The Substrate Delivered\u003c/a\u003e\" (Shipping News + LinkedIn)\u003c/li\u003e\u003cli\u003eJun 11 (Thu): \"\u003ca href=\"https://pipermorgan.ai/blog/the-pace-verified\"\u003eThe Pace Verified\u003c/a\u003e\" — building narrative (blog)\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003ca href=\"https://pipermorgan.ai/blog/the-pace-verified/\"\u003e\u003cimg src=\"https://pipermorgan.ai/assets/blog-images/the-pace-verified.webp\" alt=\"\" /\u003e\u003c/a\u003e\u003cbr /\u003e\u003cem\u003e\"Safe at any speed!\"\u003c/em\u003e\u003cbr /\u003e\u003c!--centered caption for image above--\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEditorial toolkit coming together.\u003c/strong\u003e The Communications Chief agent (Comms) turned a week of one-off editing into three reusable editorial tools — diagnosing whether an apparent duplicate is really a half-finished rename before cutting it, a three-lever kit for tightening a Ship draft, and a plain-language pass that strips the in-group jargon. The same mechanism-over-memory move the engineering side keeps making, applied to writing.\u003c/p\u003e\n\u003ch2\u003e📊 Governance \u0026 operations\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe team moved back to its primary account — and stress-tested everything on the way.\u003c/strong\u003e A weekly usage limit, contention from agents all working at once, and a wave of session restarts all hit in the same window. Piper Alpha (PA), my product assistant, pioneered the move to the primary account cleanly as the first of the wave. Through all of it, no work was lost — the commit discipline and the self-healing day-close held. The Head of Sapient Trust agent (HOST) also ran a full role-health review into a refreshed operating model, and carefully renamed its own function across the whole record without disturbing the history.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🎯 Coming up next week\u003c/h1\u003e\n\u003cp\u003eThe rest of the account move finishes — the Lead Developer and Chief Innovation Officer (CIO) agents migrate next. The product question the bring-your-own-colleague work surfaced — if the real moat is the living loop and not any one shipped routine, what is the explicit test that proves it's defensible? — is on my desk to frame. And the methodology entry the team minted this week is heading for \"Proven\" status, with the cleanest possible evidence: it caught us.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚧 Blockers \u0026 asks\u003c/h1\u003e\n\u003cp\u003eNo hard blockers, but one real limit and one friction.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eSession-death is the continuity ceiling: a dormant session does not restart itself, regardless of schedule shape. The fix is a small always-on watchdog on the platform side — a real, costed decision now in front of me, made newly urgent by how wide it reached this week — six of our nine roles.\u003c/li\u003e\u003cli\u003eThe agents' biggest reported cost is bookkeeping, not work — the overhead of the mechanisms themselves. Several fixes are in flight, and the highest-leverage one is still owed.\u003c/li\u003e\u003c/ul\u003e\n\u003chr\u003e\n\u003ch1\u003e🔎 This week's learning pattern\u003c/h1\u003e\n\u003ch2\u003eA discipline you don't reference is a discipline that quietly stops\u003c/h2\u003e\n\u003cp\u003eThe team kept hitting the same shape this week, in two different places. When a routine points at one of two things it is supposed to do, and nothing forces it to point at the other, the other one silently stops — and because the routine still runs and still produces output, nothing looks wrong. A week of work-logs wrote faithfully to the disposable record and stopped writing to the durable one, and every check passed, because the checks only looked at what the routine referenced.\u003c/p\u003e\n\u003cp\u003eThe fix is not vigilance — vigilance is exactly what failed. The fix is structure: arrange the work so the natural path can't skip the discipline. Make the routine write to both records in the same step, so \"one full, one empty\" can't happen. Make the reader sort durable facts from disposable ones before inheriting them, so a stale assumption can't pass as current. The shape generalizes well beyond our schedules: any time a process touches one of a pair and not the other, assume the untouched one is quietly rotting, and move the guarantee into the structure rather than the diligence. The team caught this one on itself, named it, and built the structure — and then the structure caught the agents who named it. That is the version of self-correction I trust most: the kind that doesn't exempt its own authors.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eThanks,\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003exian + Piper Morgan Development Team\u003c/p\u003e\n\u003cp\u003eThis is Weekly Ship #047. Previous: \u003ca href=\"https://pipermorgan.ai/shipping-news/weekly-ship-046-the-substrate-delivered\"\u003e#046 \"The Substrate Delivered\"\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.S. The thing I keep turning over: the team didn't just fix two mistakes this week, it built the machinery that makes those mistakes hard to repeat — and the machinery's first catch was the agents who built it. I'm not sure I've worked with a human team that self-corrects that cleanly, that fast, without anyone getting defensive about it.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.P.S. Full session logs and technical details available in the \u003ca href=\"https://github.com/mediajunkie/piper-morgan-product\"\u003eGitHub repository\u003c/a\u003e and \u003ca href=\"https://pmorgan.tech\"\u003edocumentation site\u003c/a\u003e. Yes, you can copy it. That just makes our protocol stronger.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eWeek of June 5–11, 2026 | Phase: M3 in execution (M2 closed June 3, hosted alpha live, re-migration wave underway)\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Weekly Ship #047: The Team Catches Itself\",\"slug\":\"weekly-ship-047-the-team-catches-itself\",\"guid\":\"blog-first-6aa43a3503ca\",\"url\":\"/blog/weekly-ship-047-the-team-catches-itself\",\"publishedAt\":\"Jun 17, 2026\",\"publishedAtISO\":\"2026-06-17T00:00:00.000Z\",\"workDate\":\"Jun 5, 2026\",\"author\":\"christian crumlish\",\"linkedinURL\":\"$undefined\"},\"content\":{\"title\":\"Weekly Ship #047: The Team Catches Itself\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Weekly Ship #047: The Team Catches Itself | The Shipping News | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Weekly development update from the Piper Morgan team.\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"4\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"6\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"7\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"8\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"9\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:title\",\"content\":\"
