"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[2469,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"394\",\"static/chunks/app/(public)/shipping-news/%5Bslug%5D/page-4e3b74e4c3ec433b.js\"],\"ShipPostContent\"]\n1a:T399d,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 15–21, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThis week the team experimented with the first version of a new operating mechanism. The CIO built it, extended it, and then we tore it down a few days later.\u003c/p\u003e\n\u003cp\u003eWe extended the mechanism — an autonomous duty cycle for individual agents, designed Saturday — to two more agents Sunday. We observed the results for a few days, and killed the v1 on Thursday. The design had taught what the team needed to know to design something better, and that what needed to carry forward was not the specific mechanism we built the first time around but much of the functional substrate underneath it.\u003c/p\u003e\n\u003cp\u003eThe week added four new entries to the methodology corpus, promoted a pattern from Emerging to Proven on the strength of eleven independent instances surfaced across five different agents in thirty-six hours, and codified a cohort-wide operational shift to dedicated working trees for substantive output. None of that retired when the mechanism did (and version two of the Duty Cycle experiment is still in the offing).\u003c/p\u003e\n\u003cp\u003eThe mechanism will be cheap to replace. The substrate has been expensive to build but will be cheap to carry forward.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚀 Shipped this week\u003c/h1\u003e\n\u003ch2\u003e🎯 Product \u0026 experience\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eA foundational decision document moved through three versions in four days.\u003c/strong\u003e My product assistant, Piper Alpha's BYOC (bring your own chat) distribution decision-rules document (PDR-005, governing how users will eventually bring their own AI assistants) went from v0.3 to v0.4 to v0.5 across the week. Each version absorbed a different role's contribution as a verbatim section — the architecture role's Consequences-for-architecture fill-in landed mid-week, the experience-design role's (CXO) Consequences-for-experience fill-in landed late-week. The work that would have taken multi-day cohort iteration in a less mature cycle compressed into roughly six-hour turnaround per version.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe first three of seven planned user-experience surfaces shipped first-draft documents.\u003c/strong\u003e The experience-design role produced version-0.1 documents for Surface 7 (audit envelope read), Surface 2 (per-conversation privacy), and Surface 4 (integration wizards) across three sessions — the offer-first cluster trio. The communications role's voice-pass cycle on the cluster returned same-day a week later. Cross-lens convergence between architecture, experience-design, communications, and lead-developer worked as designed, with no re-litigation between lanes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA major build-milestone closed an integration sub-epic within an hour of scope ratification.\u003c/strong\u003e The lead-developer role closed Phase 2.1 of the MUX/UI Round 2 work (Surfaces 1 and 7 slices) within one hour and four minutes of the morning's scoping memo being filed. The architectural work on the same surfaces shipped as three new architecture decision records earlier the same week.\u003c/p\u003e\n\u003ch2\u003e⚙️ Engineering \u0026 architecture\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe week's headline deletion was structural.\u003c/strong\u003e The lead-developer role shipped issue #1094, removing the now-superseded orchestration engine and workflow factory. Net change across fifty-nine files: minus 10,734 lines of code. That landing fired the fourth-consumer trigger for a pattern the architecture role had been tracking (registries that grow into architectural shapes), which then promoted from Emerging to Proven the same day on the strength of model dispatch, calibration, output filter, and Slack dispatch all building on the same primitive.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThree architecture decision records landed in a single week.\u003c/strong\u003e The records covered the project-scope end-to-end test suite phase-zero scoping, the user-facing audit envelope read surface (closing the read-side gap a prior decision record left), and the project-scope search index architecture. The architecture role identified what made the three-record delivery possible: pre-drafting sequencing was settled at a product-management walkthrough before any drafting started, which let context for each record stay loaded between drafts.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA new lint hook shipped to enforce a recurring failure-mode at the tool layer.\u003c/strong\u003e The lead-developer role shipped issue #1083 (a hook enforcing the close-issue-properly discipline whose absence had triggered the recurring failure mode that became the spine of last week's Ship #043). The hook self-dogfooded twice the same day it landed. A retroactive test against the prior week's thirteen closures would have flagged three at commit time.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA documentation-versus-behavior drift pattern got named, filed, and promoted to Proven in three days.\u003c/strong\u003e The pattern (named \u003cem\u003eDocumentation-Asserted-Behavior Drift\u003c/em\u003e) accumulated eleven instances across nine narrative-artifact layers and five different agents in roughly thirty-six hours after the initial filing. The cleanest reference case so far for the team's framework of pattern formation via successful imitation.\u003c/p\u003e\n\u003ch2\u003e🔬 Methodology \u0026 process innovation\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eThe methodology corpus added six entries.\u003c/strong\u003e Three landed early in the window (pre-filing slot-availability check, type-2 dreaming, pattern formation via successful imitation). Three landed mid-week (append-only autonomous-cycle architecture, Postel's law for memo headers, session-type determines git-permission scope), with consumer-trace verification queued and filed the same day. A seventh (the cohort-discipline-as-moat framing) was filed at the close of the cycle as the strategic-altitude entry that names what the team accumulates that platform productizations do not.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePiper A brought a cohort-wide operational directive on day one of the window.\u003c/strong\u003e Substantive output from any role now defaults to a dedicated \u003ccode\u003eclaude/*\u003c/code\u003e branch and working tree. Shared main is the exception, for short mailbox-discipline operations only. The directive emerged from four distinct foreign-state-capture incidents observed in one morning across multiple agents — discipline layers surfaced the problem but could not prevent it. Only working-tree separation prevents it structurally. The documentation role codified the directive into CLAUDE.md the same evening.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe autonomous duty cycle ran a complete adoption-to-retirement lifecycle in five days.\u003c/strong\u003e The innovation-officer role (CIO) designed version one Saturday. Cohort extension to the sapient-trust role (HOST) and the documentation role happened Sunday. Two days of observation. Thursday, the product-management role brought seven sketches of a richer design, and version one retired. What carried forward: the four methodology entries the version-one era produced, the operating-norm substrate the cohort had built underneath, the cohort's demonstrated capacity to hold \"this worked and we are killing it\" without sunk-cost defense.\u003c/p\u003e\n\u003ch2\u003e🌍 External relations \u0026 community\u003c/h2\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eFive pieces published in seven days:\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eMay 16 (Sat): \"\u003ca href=\"https://pipermorgan.ai/blog/the-family-resemblance\"\u003eThe Family Resemblance\u003c/a\u003e\" — first end-to-end publish through the new infrastructure, insights drawn from March to April\u003c/li\u003e\u003cli\u003eMay 17 (Sun): \"\u003ca href=\"https://pipermorgan.ai/blog/from-protocol-to-infrastructure\"\u003eFrom Protocol to Infrastructure\u003c/a\u003e\" — insights drawn from February 25 to May 12\u003c/li\u003e\u003cli\u003eMay 19 (Tue): \"\u003ca href=\"https://pipermorgan.ai/blog/the-log-that-fact-checked-itself\"\u003eThe Log That Fact-Checked Itself\u003c/a\u003e\" — building narrative from April 22\u003c/li\u003e\u003cli\u003eMay 20 (Wed): \"\u003ca href=\"https://pipermorgan.ai/blog/weekly-ship-43\"\u003eWeekly Ship #043: The Skill That Doesn't Fire\u003c/a\u003e\" — Shipping News\u003c/li\u003e\u003cli\u003eMay 21 (Thu): \"\u003ca href=\"https://pipermorgan.ai/blog/the-voice-of-a-denial\"\u003eThe Voice of a Denial\u003c/a\u003e\" — building narrative, also from April 22\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003ca href=\"https://pipermorgan.ai/blog/the-log-that-fact-checked-itself\"\u003e\u003cimg src=\"https://pipermorgan.ai/assets/blog-images/the-log-that-fact-checked-itself.webp\" alt=\"Glowing ethereal beings amending a giant ledger book, reintegrating missing pages into the official record while the book appears to point out its own omissions\" /\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\"Not so fast!\" — from \u003ca href=\"https://pipermorgan.ai/blog/the-log-that-fact-checked-itself\"\u003eThe Log That Fact-Checked Itself\u003c/a\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe publishing pipeline shipped end-to-end mid-week.\u003c/strong\u003e The web role (Unicorn Web Designer) returned from a six-and-a-half-week dormancy and shipped a publish-post script + a status dashboard + a first end-to-end publish all on Saturday May 16. A second command-line tool (the publishing-flow CLI) got fully designed in a thirty-minute discussion the next afternoon. The week's publication count is the result of that infrastructure landing — five pieces in seven days, against existing infrastructure now that the pipeline does what the team needs it to do.\u003c/p\u003e\n\u003ch2\u003e📊 Governance \u0026 operations\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eMetrics (May 15–21)\u003c/strong\u003e:\u003c/p\u003e\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eMetric\u003c/th\u003e\u003cth\u003eValue\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003eBuild milestones closed\u003c/td\u003e\u003ctd\u003eM2f groups A+B+C earlier — M2g sub-epic in flight — MUX/UI Round 2 Phase 2.1 closed\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eMajor code deletion\u003c/td\u003e\u003ctd\u003e#1094 ENGINE-DELETION net -10,734 LOC across 59 files\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eArchitecture decision records filed\u003c/td\u003e\u003ctd\u003e3 (ADR-062, 063, 064)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003ePattern catalog\u003c/td\u003e\u003ctd\u003e+1 filed Emerging (Pattern-070), 2 promoted to Proven (Pattern-072 sub-day, Pattern-073 in 3 days)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eMethodology corpus entries\u003c/td\u003e\u003ctd\u003e+6 (methodology-27 through 33) plus methodology-34 candidate\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003ePublications shipped\u003c/td\u003e\u003ctd\u003e5 (against existing infrastructure now that pipeline shipped)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eCohort coordination\u003c/td\u003e\u003ctd\u003eV1 duty cycle adopted by 3 roles then retired — worktree-default codified cohort-wide\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eThe cohort's coordination discipline scaled.\u003c/strong\u003e The migration checklist (Chat → Code role migration playbook Host authored) went from v1.0 through v1.1 through v1.2 through product-management ratification across the window, closing the corresponding 360-commitment cleanly. The 360-commitments tracker itself was refreshed with status-per-item evidence twenty-four days after synthesis.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🎯 Coming up next week\u003c/h1\u003e\n\u003cp\u003eThe newly-assigned Anthropic Outcomes investigation lane starts work on Monday — the product-management role (Piper Alpha) leads the spec-read and paper-comparison, the innovation-officer role co-authors the strategic synthesis, lead-developer stays focused on delivery. The duty-cycle redesign (version two) enters pilot observation Monday with cohort re-adoption following pilot validation. The communications role has a nine-beat narrative slate sequenced for publication May 26 through June 23.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🚧 Blockers \u0026 asks\u003c/h1\u003e\n\u003cp\u003eNo current blockers. Several discovery-thread responses are queued on natural cadence. A Host commitment on handoff-review-pattern codification is on track for end-of-month delivery.\u003c/p\u003e\n\u003chr\u003e\n\u003ch1\u003e🔎 This week's learning pattern\u003c/h1\u003e\n\u003ch2\u003eMechanism retires, substrate carries forward\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eDiscovery\u003c/strong\u003e: When a working mechanism is retired in favor of a richer redesign, what makes the retirement work is whether the team has accumulated substrate (operating norms, methodology entries, working disciplines) underneath the mechanism. If the substrate exists, retirement is moat-deepening rather than sunk-cost defense.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eExample from this week\u003c/strong\u003e: Version one of the autonomous duty cycle. Five-day arc from design through cohort extension to retirement. What retired: the cron mechanism, the append-only architecture specifics, the manual-fire patterns. What carried forward: four methodology entries describing disciplines that survive the version-one retirement intact, a cohort-wide operational shift to working-tree-default, a strategic framing (\u003cem\u003ecohort-discipline as moat\u003c/em\u003e) that names what the team is accumulating that platform productizations do not.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhy it matters\u003c/strong\u003e: Mechanism is cheap to replace if the team can name it as \"the implementation of an underlying discipline.\" Substrate is expensive to build but cheap to carry forward across mechanism changes. Teams that conflate the two end up either defending sunk-cost (because the mechanism IS their operational pattern) or paralyzing on new mechanism design (because every retirement feels like loss). Teams that separate them iterate faster.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eApplication beyond this week\u003c/strong\u003e: For any working mechanism, ask \"what substrate did this build underneath it?\" If the answer is \"specific disciplines, methodology entries, working norms,\" retirement frees the team to redesign without losing accumulated value. If the answer is \"nothing yet, the mechanism is the operational pattern,\" then either the team holds the mechanism longer (build substrate first), or the retirement is harder than it looks. The asymmetry is also a pre-design question — every new mechanism is an opportunity to build substrate that survives it.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRelated patterns\u003c/strong\u003e: The methodology-29 framing (\u003cem\u003epattern formation via successful imitation\u003c/em\u003e) names how substrate accretes — recognition runs ahead of codification when failure modes are vivid. The methodology-34 candidate (\u003cem\u003ecohort-discipline as moat\u003c/em\u003e) names what the substrate is good for at the strategic level. Last week's Ship #043 learning pattern (\u003cem\u003ecodifying discipline does not enforce discipline\u003c/em\u003e) names what mechanism is for — the binding layer that closes the gap vocabulary alone cannot close. This week's pattern names what survives when a specific binding layer is replaced.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eThanks,\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003exian + Piper Morgan Development Team\u003c/p\u003e\n\u003cp\u003eThis is Weekly Ship #044. Previous: \u003ca href=\"https://pipermorgan.ai/blog/weekly-ship-43\"\u003e#043 \"The Skill That Doesn't Fire\"\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.S. The mechanism the team built and retired this week was running cleanly when it retired. The retirement was an act of design discipline, not failure recovery. The substrate it produced is the part that mattered all along.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eP.P.S. Full session logs and technical details available in the \u003ca href=\"https://github.com/mediajunkie/piper-morgan-product\"\u003eGitHub repository\u003c/a\u003e and \u003ca href=\"https://pmorgan.tech\"\u003edocumentation site\u003c/a\u003e. Yes, you can copy it. That just makes our protocol stronger.\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eWeek of May 15–21, 2026 | Phase: MVP Build (M2g sub-epic in flight, MUX/UI Round 2 Phase 2.1 closed)\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Weekly Ship #044: What Survives an Experiment\",\"slug\":\"weekly-ship-044-what-survives-an-experiment\",\"guid\":\"blog-first-b96fc9196826\",\"url\":\"/blog/weekly-ship-044-what-survives-an-experiment\",\"publishedAt\":\"May 27, 2026\",\"publishedAtISO\":\"2026-05-27T00:00:00.000Z\",\"workDate\":\"May 27, 2026\",\"author\":\"christian crumlish\",\"linkedinURL\":\"$undefined\"},\"content\":{\"title\":\"Weekly Ship #044: What Survives an Experiment\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Weekly Ship #044: What Survives an Experiment | The Shipping News | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Weekly development update from the Piper Morgan team.\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"4\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"6\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"7\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"8\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"9\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:title\",\"content\"
