$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T2823,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A friendly robot yoga instructor holds a clipboard full of sliders and icons while asking a nervous beginner on a yoga mat how intense they want their enlightenment\" src=\"https://cdn-images-1.medium.com/max/1024/1*0HMfNZkQCsCNimkZfnNc7Q.png\" /\u003e\u003cfigcaption\u003e“It’s my first day”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 26\u003c/em\u003e\u003c/p\u003e\u003cp\u003eEvery setting in your product is an admission that you couldn’t decide. Every preference panel is accumulated indecision. Every “let the user choose” is a question the product team didn’t answer.\u003c/p\u003e\u003cp\u003eObviously, it’s not wrong to offer settings and to allow people to choose their preferences. Some choices genuinely depend on user context. But far more often, settings are where hard decisions go to hide.\u003c/p\u003e\u003ch3\u003eThe yoga class principle\u003c/h3\u003e\u003cp\u003eWhen you walk into a beginner yoga class, the instructor doesn’t hand you a settings panel.\u003c/p\u003e\u003cp\u003e“Welcome! Before we begin, please configure your preferences. Would you prefer hatha, vinyasa, or yin flow? How many sun salutations per session? Ambient sound: nature, singing bowls, or silence? Room temperature range?”\u003c/p\u003e\u003cp\u003eThat would be absurd. You’re a beginner. You don’t know what you want. You came to learn from someone who does.\u003c/p\u003e\u003cp\u003eGood yoga instructors have a point of view about what beginners need. They’ve thought about the progression from simple to complex. They’ve seen hundreds of students. They lead with their expertise.\u003c/p\u003e\u003cp\u003eThe first class usually focuses on breathing alone. Perhaps a post that involves lying still on your back. That sort of thing. And the class isn’t one-size-fits-all. The instructor adjusts based on who shows up. They don’t outsource the curriculum to preference settings.\u003c/p\u003e\u003ch3\u003eWhy we add settings\u003c/h3\u003e\u003cp\u003eSettings feel user-friendly. “Let the user choose” sounds respectful. It feels democratic, accommodating, flexible.\u003c/p\u003e\u003cp\u003eBut trace the decision history behind most settings and you’ll find:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDisagreement on the team\u003c/strong\u003e: Design wanted A, engineering wanted B, PM couldn’t resolve it. Solution: add a setting, let users pick.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFear of complaints\u003c/strong\u003e: “Some users might not like this.” True. But giving everyone a toggle doesn’t solve their problem — it just makes them do your work.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEdge cases mistaken for primary use\u003c/strong\u003e: A few power users requested a feature. Instead of deciding whether to build it into the main flow, we hid it in settings.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePremature abstraction\u003c/strong\u003e: “We might need flexibility here someday.” We add settings for possibilities that never materialize.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAvoiding hard research\u003c/strong\u003e: Finding out what users actually need takes work. Settings let us skip that work and defer to “user choice.”\u003c/p\u003e\u003cp\u003eNone of these are about serving users better. They’re about avoiding difficult decisions.\u003c/p\u003e\u003ch3\u003eThe cost of not deciding\u003c/h3\u003e\u003cp\u003eEvery setting has costs:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCognitive load\u003c/strong\u003e: Users must understand what the setting does, evaluate their preference, make a choice, and remember what they chose. Multiply by the number of settings.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTesting burden\u003c/strong\u003e: Every setting multiplies test scenarios. Two boolean settings means four combinations. Ten settings with three options each means 59,049 possible configurations. Nobody tests all of them.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSupport complexity\u003c/strong\u003e: “It doesn’t work right.” “What are your settings?” Half of support conversations become archaeology through preference panels.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDesign fragmentation\u003c/strong\u003e: When users can configure everything, there’s no coherent experience to optimize. You can’t improve what you can’t define.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe paradox of choice\u003c/strong\u003e: Research consistently shows that more options often reduce satisfaction. Users don’t want infinite configuration. They want good defaults.\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhen is the last time you had to adjust your setting on Zoom? Did you make it back in one piece?\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe setting you add to solve one user’s complaint creates ongoing costs for everyone.\u003c/p\u003e\u003ch3\u003eWhat having a point of view means\u003c/h3\u003e\u003cp\u003eHaving a point of view doesn’t mean being rigid. It means:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResearch your users\u003c/strong\u003e: Know what most of them need. Design for that. Don’t design for imagined edge cases.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMake decisions\u003c/strong\u003e: When the team disagrees, decide. Document the reasoning. Ship one answer, not a toggle.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAccept that some users won’t like it\u003c/strong\u003e: This is okay. No product serves everyone perfectly. Trying to please everyone through settings pleases no one.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProvide escape hatches, not control panels\u003c/strong\u003e: Power users who need different behavior should have ways to get it. But the escape hatch can be small and hidden, not a prominent settings page.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRevisit decisions with evidence\u003c/strong\u003e: If research or usage data suggests the decision was wrong, change the default. Don’t add a setting.\u003c/p\u003e\u003cp\u003eThe yoga instructor adjusts for the room. If everyone is struggling with a pose, they modify the sequence. But they don’t hand out preference forms.\u003c/p\u003e\u003ch3\u003eWhen settings are right\u003c/h3\u003e\u003cp\u003eSettings aren’t always abdication. They’re appropriate when:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe preference is genuinely personal\u003c/strong\u003e: Dark mode vs. light mode. Nobody’s “right” here. Let users choose.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe context varies legitimately\u003c/strong\u003e: Time zones. Languages. Accessibility needs. These aren’t product decisions — they’re user realities.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePower users have demonstrated needs\u003c/strong\u003e: After shipping the opinionated default, some users legitimately need different behavior for their specific workflow. Add the setting for them, not preemptively for hypothetical users.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRegulatory or policy requirements\u003c/strong\u003e: Some industries require certain behaviors. Settings enable compliance.\u003c/p\u003e\u003cp\u003eThe test: Could a good product team, with sufficient research, determine the right answer for most users? If yes, make the decision. If no — if the choice genuinely depends on personal preference or context — then a setting is appropriate.\u003c/p\u003e\u003ch3\u003eThe courage to be opinionated\u003c/h3\u003e\u003cp\u003eBuilding an opinionated product takes courage.\u003c/p\u003e\u003cp\u003eYou have to say “we think this is right” knowing some people will disagree. You have to resolve internal debates instead of punting them to users. You have to do the research to know what’s actually needed.\u003c/p\u003e\u003cp\u003eIt’s easier to add a setting. It feels safer. It shifts responsibility.\u003c/p\u003e\u003cp\u003eBut users don’t want responsibility for your product decisions. They want a product that works well. They want someone who thought about what they need and built accordingly.\u003c/p\u003e\u003cp\u003eThe yoga instructor who shows up prepared, who leads with intention, who adjusts based on reading the room — that instructor creates a better experience than one who hands out preference forms.\u003c/p\u003e\u003cp\u003eProducts work the same way.\u003c/p\u003e\u003ch3\u003eThe accumulation problem\u003c/h3\u003e\u003cp\u003eSettings accumulate. Each one seems reasonable in isolation. “Just a small toggle.” “Users will appreciate the flexibility.”\u003c/p\u003e\u003cp\u003eFive years later, there’s a settings panel with forty options. Nobody knows what half of them do. Changing any of them might break something. New team members are afraid to touch them.\u003c/p\u003e\u003cp\u003eThis is accumulated abdication. Forty decisions the product team didn’t make, now frozen in the interface, creating ongoing costs.\u003c/p\u003e\u003cp\u003eThe fix isn’t a settings audit (though that helps). It’s changing the culture that creates settings in the first place.\u003c/p\u003e\u003cp\u003eWhen someone proposes a new setting, ask: “What decision are we avoiding? Can we make that decision instead?”\u003c/p\u003e\u003ch3\u003eSettings as teaching\u003c/h3\u003e\u003cp\u003eThere’s one more frame worth considering.\u003c/p\u003e\u003cp\u003eGood settings teach users about the product. “You can adjust X” implies X matters. “Choose between A and B” implies A and B produce meaningfully different experiences.\u003c/p\u003e\u003cp\u003eMost settings don’t teach anything useful. They expose implementation details or team disagreements. They tell users “we couldn’t figure this out, so you have to.”\u003c/p\u003e\u003cp\u003eBut some settings genuinely expand user understanding. “How much risk are you comfortable with?” teaches that risk tolerance matters. “How far in advance should we remind you?” teaches that timing affects usefulness.\u003c/p\u003e\u003cp\u003eIf a setting helps users think about something they wouldn’t have considered, it might be worth including. If it just exposes a dial, it’s probably abdication.\u003c/p\u003e\u003ch3\u003eThe principle\u003c/h3\u003e\u003cp\u003eEvery time you’re tempted to add a setting, ask:\u003c/p\u003e\u003col\u003e\u003cli\u003eWhat decision am I avoiding?\u003c/li\u003e\u003cli\u003eCould research tell me the right answer for most users?\u003c/li\u003e\u003cli\u003eWhat’s the ongoing cost of this setting?\u003c/li\u003e\u003cli\u003eWould a good yoga instructor ask beginners this question?\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eIf you can make the decision, make it. Document your reasoning. Ship the opinionated choice.\u003c/p\u003e\u003cp\u003eAccept that some users won’t like it. That’s the price of having a point of view.\u003c/p\u003e\u003cp\u003eThe alternative — a product that doesn’t know what it thinks, that outsources every hard choice to preference panels, that dies by a thousand toggles — serves nobody well.\u003c/p\u003e\u003cp\u003eSettings aren’t user-friendly. Decisions are.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Eight Decisions in 44 Minutes on a sort of “lightning round” we used to make a bunch of critical product-design decisions, instead of punting.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you added settings instead of making decisions? What accumulated settings became unmaintainable? When has an opinionated product served you better than a configurable one?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=2536c923a72c\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/settings-abdication-2536c923a72c\"\u003eSettings = Abdication\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3a8f,"])</script><script>self.__next_f.push([1,"\u003csection name=\"3053\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"8497\" id=\"8497\" class=\"graf graf--h3 graf--leading graf--title\"\u003eSettings = Abdication\u003c/h3\u003e\u003cfigure name=\"1fab\" id=\"1fab\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*0HMfNZkQCsCNimkZfnNc7Q.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A friendly robot yoga instructor holds a clipboard full of sliders and icons while asking a nervous beginner on a yoga mat how intense they want their enlightenment\" src=\"https://cdn-images-1.medium.com/max/800/1*0HMfNZkQCsCNimkZfnNc7Q.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“It’s my first day”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"d6bc\" id=\"d6bc\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 26\u003c/em\u003e\u003c/p\u003e\u003cp name=\"deef\" id=\"deef\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eE\u003c/span\u003every setting in your product is an admission that you couldn’t decide. Every preference panel is accumulated indecision. Every “let the user choose” is a question the product team didn’t answer.\u003c/p\u003e\u003cp name=\"a8fb\" id=\"a8fb\" class=\"graf graf--p graf-after--p\"\u003eObviously, it’s not wrong to offer settings and to allow people to choose their preferences. Some choices genuinely depend on user context. But far more often, settings are where hard decisions go to hide.\u003c/p\u003e\u003ch3 name=\"145f\" id=\"145f\" class=\"graf graf--h3 graf-after--p\"\u003eThe yoga class principle\u003c/h3\u003e\u003cp name=\"a4cc\" id=\"a4cc\" class=\"graf graf--p graf-after--h3\"\u003eWhen you walk into a beginner yoga class, the instructor doesn’t hand you a settings panel.\u003c/p\u003e\u003cp name=\"eb54\" id=\"eb54\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e“Welcome! Before we begin, please configure your preferences. Would you prefer hatha, vinyasa, or yin flow? How many sun salutations per session? Ambient sound: nature, singing bowls, or silence? Room temperature range?”\u003c/p\u003e\u003cp name=\"d6f6\" id=\"d6f6\" class=\"graf graf--p graf-after--p\"\u003eThat would be absurd. You’re a beginner. You don’t know what you want. You came to learn from someone who does.\u003c/p\u003e\u003cp name=\"f5b2\" id=\"f5b2\" class=\"graf graf--p graf-after--p\"\u003eGood yoga instructors have a point of view about what beginners need. They’ve thought about the progression from simple to complex. They’ve seen hundreds of students. They lead with their expertise.\u003c/p\u003e\u003cp name=\"d064\" id=\"d064\" class=\"graf graf--p graf-after--p\"\u003eThe first class usually focuses on breathing alone. Perhaps a post that involves lying still on your back. That sort of thing. And the class isn’t one-size-fits-all. The instructor adjusts based on who shows up. They don’t outsource the curriculum to preference settings.\u003c/p\u003e\u003ch3 name=\"9dd1\" id=\"9dd1\" class=\"graf graf--h3 graf-after--p\"\u003eWhy we add settings\u003c/h3\u003e\u003cp name=\"8a55\" id=\"8a55\" class=\"graf graf--p graf-after--h3\"\u003eSettings feel user-friendly. “Let the user choose” sounds respectful. It feels democratic, accommodating, flexible.\u003c/p\u003e\u003cp name=\"f189\" id=\"f189\" class=\"graf graf--p graf-after--p\"\u003eBut trace the decision history behind most settings and you’ll find:\u003c/p\u003e\u003cp name=\"eddd\" id=\"eddd\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDisagreement on the team\u003c/strong\u003e: Design wanted A, engineering wanted B, PM couldn’t resolve it. Solution: add a setting, let users pick.\u003c/p\u003e\u003cp name=\"17ae\" id=\"17ae\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFear of complaints\u003c/strong\u003e: “Some users might not like this.” True. But giving everyone a toggle doesn’t solve their problem — it just makes them do your work.\u003c/p\u003e\u003cp name=\"cfec\" id=\"cfec\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEdge cases mistaken for primary use\u003c/strong\u003e: A few power users requested a feature. Instead of deciding whether to build it into the main flow, we hid it in settings.\u003c/p\u003e\u003cp name=\"3dd0\" id=\"3dd0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePremature abstraction\u003c/strong\u003e: “We might need flexibility here someday.” We add settings for possibilities that never materialize.\u003c/p\u003e\u003cp name=\"854f\" id=\"854f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAvoiding hard research\u003c/strong\u003e: Finding out what users actually need takes work. Settings let us skip that work and defer to “user choice.”\u003c/p\u003e\u003cp name=\"bb18\" id=\"bb18\" class=\"graf graf--p graf-after--p\"\u003eNone of these are about serving users better. They’re about avoiding difficult decisions.\u003c/p\u003e\u003ch3 name=\"e085\" id=\"e085\" class=\"graf graf--h3 graf-after--p\"\u003eThe cost of not deciding\u003c/h3\u003e\u003cp name=\"a5bf\" id=\"a5bf\" class=\"graf graf--p graf-after--h3\"\u003eEvery setting has costs:\u003c/p\u003e\u003cp name=\"0616\" id=\"0616\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCognitive load\u003c/strong\u003e: Users must understand what the setting does, evaluate their preference, make a choice, and remember what they chose. Multiply by the number of settings.\u003c/p\u003e\u003cp name=\"2744\" id=\"2744\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTesting burden\u003c/strong\u003e: Every setting multiplies test scenarios. Two boolean settings means four combinations. Ten settings with three options each means 59,049 possible configurations. Nobody tests all of them.\u003c/p\u003e\u003cp name=\"66c6\" id=\"66c6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSupport complexity\u003c/strong\u003e: “It doesn’t work right.” “What are your settings?” Half of support conversations become archaeology through preference panels.\u003c/p\u003e\u003cp name=\"461a\" id=\"461a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDesign fragmentation\u003c/strong\u003e: When users can configure everything, there’s no coherent experience to optimize. You can’t improve what you can’t define.\u003c/p\u003e\u003cp name=\"00e6\" id=\"00e6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe paradox of choice\u003c/strong\u003e: Research consistently shows that more options often reduce satisfaction. Users don’t want infinite configuration. They want good defaults.\u003c/p\u003e\u003cp name=\"2339\" id=\"2339\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eWhen is the last time you had to adjust your setting on Zoom? Did you make it back in one piece?\u003c/em\u003e\u003c/p\u003e\u003cp name=\"1ccf\" id=\"1ccf\" class=\"graf graf--p graf-after--p\"\u003eThe setting you add to solve one user’s complaint creates ongoing costs for everyone.\u003c/p\u003e\u003ch3 name=\"c9b5\" id=\"c9b5\" class=\"graf graf--h3 graf-after--p\"\u003eWhat having a point of view means\u003c/h3\u003e\u003cp name=\"6c14\" id=\"6c14\" class=\"graf graf--p graf-after--h3\"\u003eHaving a point of view doesn’t mean being rigid. It means:\u003c/p\u003e\u003cp name=\"e989\" id=\"e989\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eResearch your users\u003c/strong\u003e: Know what most of them need. Design for that. Don’t design for imagined edge cases.\u003c/p\u003e\u003cp name=\"53c8\" id=\"53c8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMake decisions\u003c/strong\u003e: When the team disagrees, decide. Document the reasoning. Ship one answer, not a toggle.\u003c/p\u003e\u003cp name=\"ab34\" id=\"ab34\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAccept that some users won’t like it\u003c/strong\u003e: This is okay. No product serves everyone perfectly. Trying to please everyone through settings pleases no one.\u003c/p\u003e\u003cp name=\"fbe1\" id=\"fbe1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProvide escape hatches, not control panels\u003c/strong\u003e: Power users who need different behavior should have ways to get it. But the escape hatch can be small and hidden, not a prominent settings page.\u003c/p\u003e\u003cp name=\"ab72\" id=\"ab72\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRevisit decisions with evidence\u003c/strong\u003e: If research or usage data suggests the decision was wrong, change the default. Don’t add a setting.\u003c/p\u003e\u003cp name=\"a301\" id=\"a301\" class=\"graf graf--p graf-after--p\"\u003eThe yoga instructor adjusts for the room. If everyone is struggling with a pose, they modify the sequence. But they don’t hand out preference forms.\u003c/p\u003e\u003ch3 name=\"3856\" id=\"3856\" class=\"graf graf--h3 graf-after--p\"\u003eWhen settings are right\u003c/h3\u003e\u003cp name=\"9c89\" id=\"9c89\" class=\"graf graf--p graf-after--h3\"\u003eSettings aren’t always abdication. They’re appropriate when:\u003c/p\u003e\u003cp name=\"4fd0\" id=\"4fd0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe preference is genuinely personal\u003c/strong\u003e: Dark mode vs. light mode. Nobody’s “right” here. Let users choose.\u003c/p\u003e\u003cp name=\"5fc1\" id=\"5fc1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe context varies legitimately\u003c/strong\u003e: Time zones. Languages. Accessibility needs. These aren’t product decisions — they’re user realities.\u003c/p\u003e\u003cp name=\"90ba\" id=\"90ba\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePower users have demonstrated needs\u003c/strong\u003e: After shipping the opinionated default, some users legitimately need different behavior for their specific workflow. Add the setting for them, not preemptively for hypothetical users.\u003c/p\u003e\u003cp name=\"b8d6\" id=\"b8d6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRegulatory or policy requirements\u003c/strong\u003e: Some industries require certain behaviors. Settings enable compliance.\u003c/p\u003e\u003cp name=\"095c\" id=\"095c\" class=\"graf graf--p graf-after--p\"\u003eThe test: Could a good product team, with sufficient research, determine the right answer for most users? If yes, make the decision. If no — if the choice genuinely depends on personal preference or context — then a setting is appropriate.\u003c/p\u003e\u003ch3 name=\"ac12\" id=\"ac12\" class=\"graf graf--h3 graf-after--p\"\u003eThe courage to be opinionated\u003c/h3\u003e\u003cp name=\"7086\" id=\"7086\" class=\"graf graf--p graf-after--h3\"\u003eBuilding an opinionated product takes courage.\u003c/p\u003e\u003cp name=\"61e5\" id=\"61e5\" class=\"graf graf--p graf-after--p\"\u003eYou have to say “we think this is right” knowing some people will disagree. You have to resolve internal debates instead of punting them to users. You have to do the research to know what’s actually needed.\u003c/p\u003e\u003cp name=\"9797\" id=\"9797\" class=\"graf graf--p graf-after--p\"\u003eIt’s easier to add a setting. It feels safer. It shifts responsibility.\u003c/p\u003e\u003cp name=\"5006\" id=\"5006\" class=\"graf graf--p graf-after--p\"\u003eBut users don’t want responsibility for your product decisions. They want a product that works well. They want someone who thought about what they need and built accordingly.\u003c/p\u003e\u003cp name=\"9544\" id=\"9544\" class=\"graf graf--p graf-after--p\"\u003eThe yoga instructor who shows up prepared, who leads with intention, who adjusts based on reading the room — that instructor creates a better experience than one who hands out preference forms.\u003c/p\u003e\u003cp name=\"2a70\" id=\"2a70\" class=\"graf graf--p graf-after--p\"\u003eProducts work the same way.\u003c/p\u003e\u003ch3 name=\"ca49\" id=\"ca49\" class=\"graf graf--h3 graf-after--p\"\u003eThe accumulation problem\u003c/h3\u003e\u003cp name=\"a75d\" id=\"a75d\" class=\"graf graf--p graf-after--h3\"\u003eSettings accumulate. Each one seems reasonable in isolation. “Just a small toggle.” “Users will appreciate the flexibility.”\u003c/p\u003e\u003cp name=\"b003\" id=\"b003\" class=\"graf graf--p graf-after--p\"\u003eFive years later, there’s a settings panel with forty options. Nobody knows what half of them do. Changing any of them might break something. New team members are afraid to touch them.\u003c/p\u003e\u003cp name=\"4fe3\" id=\"4fe3\" class=\"graf graf--p graf-after--p\"\u003eThis is accumulated abdication. Forty decisions the product team didn’t make, now frozen in the interface, creating ongoing costs.\u003c/p\u003e\u003cp name=\"5db7\" id=\"5db7\" class=\"graf graf--p graf-after--p\"\u003eThe fix isn’t a settings audit (though that helps). It’s changing the culture that creates settings in the first place.\u003c/p\u003e\u003cp name=\"3769\" id=\"3769\" class=\"graf graf--p graf-after--p\"\u003eWhen someone proposes a new setting, ask: “What decision are we avoiding? Can we make that decision instead?”\u003c/p\u003e\u003ch3 name=\"18e8\" id=\"18e8\" class=\"graf graf--h3 graf-after--p\"\u003eSettings as teaching\u003c/h3\u003e\u003cp name=\"772e\" id=\"772e\" class=\"graf graf--p graf-after--h3\"\u003eThere’s one more frame worth considering.\u003c/p\u003e\u003cp name=\"33b2\" id=\"33b2\" class=\"graf graf--p graf-after--p\"\u003eGood settings teach users about the product. “You can adjust X” implies X matters. “Choose between A and B” implies A and B produce meaningfully different experiences.\u003c/p\u003e\u003cp name=\"5f1c\" id=\"5f1c\" class=\"graf graf--p graf-after--p\"\u003eMost settings don’t teach anything useful. They expose implementation details or team disagreements. They tell users “we couldn’t figure this out, so you have to.”\u003c/p\u003e\u003cp name=\"4444\" id=\"4444\" class=\"graf graf--p graf-after--p\"\u003eBut some settings genuinely expand user understanding. “How much risk are you comfortable with?” teaches that risk tolerance matters. “How far in advance should we remind you?” teaches that timing affects usefulness.\u003c/p\u003e\u003cp name=\"cce2\" id=\"cce2\" class=\"graf graf--p graf-after--p\"\u003eIf a setting helps users think about something they wouldn’t have considered, it might be worth including. If it just exposes a dial, it’s probably abdication.\u003c/p\u003e\u003ch3 name=\"87bd\" id=\"87bd\" class=\"graf graf--h3 graf-after--p\"\u003eThe principle\u003c/h3\u003e\u003cp name=\"829f\" id=\"829f\" class=\"graf graf--p graf-after--h3\"\u003eEvery time you’re tempted to add a setting, ask:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"f812\" id=\"f812\" class=\"graf graf--li graf-after--p\"\u003eWhat decision am I avoiding?\u003c/li\u003e\u003cli name=\"7193\" id=\"7193\" class=\"graf graf--li graf-after--li\"\u003eCould research tell me the right answer for most users?\u003c/li\u003e\u003cli name=\"6ee2\" id=\"6ee2\" class=\"graf graf--li graf-after--li\"\u003eWhat’s the ongoing cost of this setting?\u003c/li\u003e\u003cli name=\"54c9\" id=\"54c9\" class=\"graf graf--li graf-after--li\"\u003eWould a good yoga instructor ask beginners this question?\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"bf43\" id=\"bf43\" class=\"graf graf--p graf-after--li\"\u003eIf you can make the decision, make it. Document your reasoning. Ship the opinionated choice.\u003c/p\u003e\u003cp name=\"9421\" id=\"9421\" class=\"graf graf--p graf-after--p\"\u003eAccept that some users won’t like it. That’s the price of having a point of view.\u003c/p\u003e\u003cp name=\"6400\" id=\"6400\" class=\"graf graf--p graf-after--p\"\u003eThe alternative — a product that doesn’t know what it thinks, that outsources every hard choice to preference panels, that dies by a thousand toggles — serves nobody well.\u003c/p\u003e\u003cp name=\"8875\" id=\"8875\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eSettings aren’t user-friendly. Decisions are.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Settings = Abdication\",\"excerpt\":\"“It’s my first day”November 26Every setting in your product is an admission that you couldn’t decide. Every preference panel is accumulated indecision. Every “let the user choose” is a question the product team didn’t answer.Obviously, it’s not wrong to offer settings and to allow people to choos...\",\"url\":\"/blog/settings-abdication\",\"publishedAt\":\"Jan 24, 2026\",\"publishedAtISO\":\"Sat, 24 Jan 2026 14:07:08 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/2536c923a72c\",\"featuredImage\":\"/assets/blog-images/2536c923a72c-featured.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/settings-abdication-2536c923a72c?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"settings-abdication\",\"workDate\":\"Jan 24, 2026\",\"workDateISO\":\"2026-01-24T00:00:00.000Z\",\"category\":\"insight\"},\"content\":{\"title\":\"Settings = Abdication\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Settings = Abdication | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"Settings = Abdication\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"Settings = Abdication\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
