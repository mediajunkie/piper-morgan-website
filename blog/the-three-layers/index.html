s\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2d42,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot mechanic shows its human partner that a clock radio has working parts in a broken whole\" src=\"https://cdn-images-1.medium.com/max/1024/1*1Os82Mwq78eLm0Huyb8JtQ.png\" /\u003e\u003cfigcaption\u003e“Each piece is OK — it’s the connections!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eDecember 1–4\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe tests were passing. The features worked. Version 0.8.2 shipped on Tuesday with authentication, error recovery, the whole setup wizard. Clean deploys, no rollbacks. Everything looked good.\u003c/p\u003e\u003cp\u003eThen I tried to create a list.\u003c/p\u003e\u003cp\u003eThis is the story of what happened next — not a quick fix but a patient debugging marathon that revealed three separate layers of problems, all hiding behind a single symptom. It’s about what integration testing actually means, and why “the tests pass” is not the same as “users can use it.”\u003c/p\u003e\u003ch3\u003eWhen alpha testing becomes truth-telling\u003c/h3\u003e\u003cp\u003eMonday and Tuesday were productive. Auth infrastructure completed, five issues closed, new roles launching. My Principal Product Manager had their inaugural session, creating our first Product Decision Record. The Chief Architect was analyzing feedback from Ted Nadeau, who’d independently arrived at terminology compatible with our object model. Everything felt like forward motion.\u003c/p\u003e\u003cp\u003eWednesday afternoon, after getting Michelle onboarded, I resumed my own alpha testing. Seven bugs found. Two critical, one high-priority, four polish issues. The critical ones weren’t subtle: chat didn’t work, create buttons failed silently. Things we’d tested, things that had passed tests, things that \u003cem\u003eshould\u003c/em\u003e have worked — didn’t work when a real user tried to use them.\u003c/p\u003e\u003cp\u003eThe immediate issues were clear. Twenty-seven fetch calls across ten templates were missing credentials: \u0026#39;include\u0026#39; - the browser was sending cookies but our JavaScript wasn\u0026#39;t asking for them. The standup endpoint had four separate mismatches: wrong path, wrong method, wrong request format, wrong response parsing. All fixable. All fixed by Wednesday evening.\u003c/p\u003e\u003cp\u003eThursday morning, I pulled the fixes to the alpha laptop. I tried again. The chat still returned 401 errors. The standup still failed. Create buttons still didn’t work.\u003c/p\u003e\u003cp\u003eThat’s when we discovered this wasn’t about fetch calls or endpoints. This was about layers.\u003c/p\u003e\u003ch3\u003eLayer one: the routes never read cookies\u003c/h3\u003e\u003cp\u003eThe Wednesday fixes had added credentials: \u0026#39;include\u0026#39; to all the templates. The cookies were being sent. But Thursday morning\u0026#39;s debugging revealed the problem: the route dependencies weren\u0026#39;t reading them.\u003c/p\u003e\u003cp\u003eOur authentication middleware worked fine — it extracted cookies, validated tokens, great. But every endpoint using Depends(get_current_user) only checked the Authorization header. The dependency functions had HTTPBearer logic but no cookie fallback. The middleware extracted the token from the cookie and then... the routes ignored it because they were only looking at headers.\u003c/p\u003e\u003cp\u003eSixty-plus endpoints affected. All technically correct in isolation. All failing when integrated through browser usage.\u003c/p\u003e\u003cp\u003eThe fix took about an hour. Add request: Request parameters to the dependency functions, check request.cookies.get(\u0026quot;auth_token\u0026quot;) as fallback. Simple once you see it. Impossible to see until you\u0026#39;re actually testing in a browser with cookies instead of in unit tests with mocked auth.\u003c/p\u003e\u003ch3\u003eLayer two: components misused\u003c/h3\u003e\u003cp\u003eMidday Thursday. I’d fixed the cookie issue, verified it locally, pushed to production. I pulled again. Different error: “Failed to load” messages, warning icons appearing on create buttons, confirmation dialogs showing up for form actions.\u003c/p\u003e\u003cp\u003eI’d been about to implement a quick fix — just swap out the dialog component for something simpler. But I stopped and asked myself what the broader pattern was. Not “how do I make this error go away” but “what does this error reveal about how we’re building?”\u003c/p\u003e\u003cp\u003eThe pattern was component reuse without considering context. We had a confirmation dialog designed for destructive actions — Delete, Reset, things that should make you think twice. We’d reused it for forms because it was convenient. Create a list, upload a file, share a resource — all using a component designed for warnings.\u003c/p\u003e\u003cp\u003eThe component was working as designed. The design was being used inappropriately.\u003c/p\u003e\u003cp\u003eThis was where the Time Lord Doctrine came in handy. The Lead Developer had “felt pressure to rush” because “the PM was blocked.” But that’s not what priority means. Priority signals what to work on next. It doesn’t dictate how to work on it. The pace should remain deliberate, craft-focused. When you feel cross-pressured between speed and thoroughness, that’s the signal to stop and discuss.\u003c/p\u003e\u003cp\u003eWe implemented a dialog mode system. Confirmation mode for destructive actions (red button, warning icon). Form mode for creation actions (blue button, no icon). Same component, context-appropriate behavior. It took longer than a quick fix would have. It solved the actual problem instead of masking symptoms.\u003c/p\u003e\u003ch3\u003eLayer three: the swiss cheese\u003c/h3\u003e\u003cp\u003eEvening Thursday. I tried again. “Failed to load lists.” “Failed to create list: Unknown error.”\u003c/p\u003e\u003cp\u003eThree hours of debugging revealed not one bug but three separate issues, all presenting as the same symptom:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe API contract mismatch\u003c/strong\u003e: Frontend sending JSON request bodies, backend expecting query parameters. Result: 422 Unprocessable Entity, which the error handler translated to “Unknown error.” We implemented this test-first — wrote failing tests, added Pydantic models, verified all four endpoints (lists, todos, projects, files) now matched their contracts.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe dependency injection pattern\u003c/strong\u003e: All the endpoints expected request.state.db to be set by middleware. The middleware was never created. This is why the dependency injection pattern had never worked - we\u0026#39;d scaffolded the expectation but not the implementation. The fix changed from expecting middleware to using async generators with proper session management.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe CSS design tokens\u003c/strong\u003e: We’d defined all our colors and spacing in tokens.css. We just never linked it in five of our templates. The UI was invisibly broken - buttons and forms rendering but with no styling. Classic \u0026quot;75% complete\u0026quot; - the infrastructure existed, the integration didn\u0026#39;t.\u003c/p\u003e\u003cp\u003eAt 10:19 PM, after fixing all three issues, I deployed and tested one more time. I created a list. “List created successfully” appeared. The list showed up in the UI. It worked. Actually worked. For a real user, in a real browser, doing the thing the feature was supposed to enable.\u003c/p\u003e\u003cp\u003eThat’s when we knew we were done.\u003c/p\u003e\u003ch3\u003eWhat integration testing actually tests\u003c/h3\u003e\u003cp\u003eUnit tests verify that components work in isolation. Integration tests verify they work together. But there’s a subtler layer: they verify that the \u003cem\u003eway\u003c/em\u003e things work together matches how users will actually use them.\u003c/p\u003e\u003cp\u003eOur auth system passed all seventeen unit tests. Our feature endpoints passed their tests. But we’d never tested: log in with cookies in a browser, then try to use a feature. That gap — between “components work” and “users can use components” — is where these three layers hid.\u003c/p\u003e\u003cp\u003eThe cookie auth issue existed because we tested auth and features separately. The dialog misuse existed because we tested components in isolation from user context. The swiss cheese bugs existed because we tested that pieces were built, not that they were fully integrated.\u003c/p\u003e\u003cp\u003eThis isn’t an argument against unit tests. Unit tests caught real bugs and prevented regressions throughout this work. But unit tests passing is necessary, not sufficient. The discipline is to mark something done when a user can use it, not when the code is written.\u003c/p\u003e\u003ch3\u003eThe patient investigation model\u003c/h3\u003e\u003cp\u003eWednesday’s fixes took a few hours. Thursday’s took seventeen. Not because Thursday’s bugs were harder, but because Thursday required patient layer-by-layer investigation instead of quick fixes.\u003c/p\u003e\u003cp\u003eWhen I first reported the Thursday failures, each fix prompted the question: what’s the broader pattern? The cookie issue revealed that route dependencies needed to be cookie-aware. The dialog issue revealed component misuse. The swiss cheese revealed three separate “75% complete” patterns.\u003c/p\u003e\u003cp\u003eThis is what the methodology enables. Not speed — if anything, this approach is slower. But it prevents the cycle where quick fixes create technical debt that slows everything later. You pay for thoroughness now or you pay for rework later. We chose to pay now.\u003c/p\u003e\u003ch3\u003eThe work that happened in parallel\u003c/h3\u003e\u003cp\u003eWhile the debugging marathon unfolded, other work continued. The Chief Architect created our first Wardley map, revealing that our moat is coherence — Genesis components that work together. The Chief of Staff reorganized our workstreams from seven to six, recognizing that role proliferation needed systematic coordination. My Communications Director received an expansion brief, acknowledging earned growth into strategic responsibility.\u003c/p\u003e\u003cp\u003eNone of this work would have been possible if we’d been fighting fires from premature releases. The patient debugging approach freed other agents to do strategic work because they trusted the integration work was being done thoroughly.\u003c/p\u003e\u003cp\u003eTed Nadeau’s feedback kept arriving, independently validating our architecture. Sam Zimmerman’s ethics model kept refining. The security audit came back clean. Good work compounds when the foundation is solid.\u003c/p\u003e\u003ch3\u003eWhat we learned about “done”\u003c/h3\u003e\u003cp\u003eFour days. Building, releasing, testing, debugging. Tests passed on Tuesday. Real usage failed on Wednesday. Thursday revealed three layers. Thursday evening, it actually worked.\u003c/p\u003e\u003cp\u003eThe lesson isn’t “test more” — we were testing. The lesson is “test differently.” Test the way users will use it. Test integration, not just components. Test in browsers with cookies, not just in units with mocked auth. Test that pieces connect, not just that pieces exist.\u003c/p\u003e\u003cp\u003eAnd when users find problems — because they will — investigate patiently. Each fix is an opportunity to understand broader patterns. Quick fixes mask symptoms. Thorough investigation reveals systemic issues that improve everything after.\u003c/p\u003e\u003cp\u003eThe tests passing is not the end. Users being able to use what you built is the end. Everything before that is preparation.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Week After— when the basic alpha UI comes together (at least), and I have time to pay down some technical debt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhen has user testing revealed layers of integration issues? How do you know when something is actually done vs just passing tests? What’s your practice for patient investigation vs quick fixes?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=c6ada97a4971\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-three-layers-c6ada97a4971\"\u003eThe Three Layers\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3962,"])</script><script>self.__next_f.push([1,"\u003csection name=\"79f1\ e\u003ch3 name=\"3565\" id=\"3565\" class=\"graf graf--h3 graf-after--p\"\u003eWhen alpha testing becomes truth-telling\u003c/h3\u003e\u003cp name=\"74c5\" id=\"74c5\" class=\"graf graf--p graf-after--h3\"\u003eMonday and Tuesday were productive. Auth infrastructure completed, five issues closed, new roles launching. My Principal Product Manager had their inaugural session, creating our first Product Decision Record. The Chief Architect was analyzing feedback from Ted Nadeau, who’d independently arrived at terminology compatible with our object model. Everything felt like forward motion.\u003c/p\u003e\u003cp name=\"4993\" id=\"4993\" class=\"graf graf--p graf-after--p\"\u003eWednesday afternoon, after getting Michelle onboarded, I resumed my own alpha testing. Seven bugs found. Two critical, one high-priority, four polish issues. The critical ones weren’t subtle: chat didn’t work, create buttons failed silently. Things we’d tested, things that had passed tests, things that \u003cem class=\"markup--em markup--p-em\"\u003eshould\u003c/em\u003e have worked — didn’t work when a real user tried to use them.\u003c/p\u003e\u003cp name=\"4aaa\" id=\"4aaa\" class=\"graf graf--p graf-after--p\"\u003eThe immediate issues were clear. Twenty-seven fetch calls across ten templates were missing \u003ccode class=\"markup--code markup--p-code\"\u003ecredentials: \u0026#39;include\u0026#39;\u003c/code\u003e - the browser was sending cookies but our JavaScript wasn\u0026#39;t asking for them. The standup endpoint had four separate mismatches: wrong path, wrong method, wrong request format, wrong response parsing. All fixable. All fixed by Wednesday evening.\u003c/p\u003e\u003cp name=\"72e9\" id=\"72e9\" class=\"graf graf--p graf-after--p\"\u003eThursday morning, I pulled the fixes to the alpha laptop. I tried again. The chat still returned 401 errors. The standup still failed. Create buttons still didn’t work.\u003c/p\u003e\u003cp name=\"471a\" id=\"471a\" class=\"graf graf--p graf-after--p\"\u003eThat’s when we discovered this wasn’t about fetch calls or endpoints. This was about layers.\u003c/p\u003e\u003ch3 name=\"144e\" id=\"144e\" class=\"graf graf--h3 graf-after--p\"\u003eLayer one: the routes never read cookies\u003c/h3\u003e\u003cp name=\"2fc7\" id=\"2fc7\" class=\"graf graf--p graf-after--h3\"\u003eThe Wednesday fixes had added \u003ccode class=\"markup--code markup--p-code\"\u003ecredentials: \u0026#39;include\u0026#39;\u003c/code\u003e to all the templates. The cookies were being sent. But Thursday morning\u0026#39;s debugging revealed the problem: the route dependencies weren\u0026#39;t reading them.\u003c/p\u003e\u003cp name=\"0100\" id=\"0100\" class=\"graf graf--p graf-after--p\"\u003eOur authentication middleware worked fine — it extracted cookies, validated tokens, great. But every endpoint using \u003ccode class=\"markup--code markup--p-code\"\u003eDepends(get_current_user)\u003c/code\u003e only checked the Authorization header. The dependency functions had HTTPBearer logic but no cookie fallback. The middleware extracted the token from the cookie and then... the routes ignored it because they were only looking at headers.\u003c/p\u003e\u003cp name=\"9df6\" id=\"9df6\" class=\"graf graf--p graf-after--p\"\u003eSixty-plus endpoints affected. All technically correct in isolation. All failing when integrated through browser usage.\u003c/p\u003e\u003cp name=\"6369\" id=\"6369\" class=\"graf graf--p graf-after--p\"\u003eThe fix took about an hour. Add \u003ccode class=\"markup--code markup--p-code\"\u003erequest: Request\u003c/code\u003e parameters to the dependency functions, check \u003ccode class=\"markup--code markup--p-code\"\u003erequest.cookies.get(\u0026quot;auth_token\u0026quot;)\u003c/code\u003e as fallback. Simple once you see it. Impossible to see until you\u0026#39;re actually testing in a browser with cookies instead of in unit tests with mocked auth.\u003c/p\u003e\u003ch3 name=\"550a\" id=\"550a\" class=\"graf graf--h3 graf-after--p\"\u003eLayer two: components misused\u003c/h3\u003e\u003cp name=\"28c4\" id=\"28c4\" class=\"graf graf--p graf-after--h3\"\u003eMidday Thursday. I’d fixed the cookie issue, verified it locally, pushed to production. I pulled again. Different error: “Failed to load” messages, warning icons appearing on create buttons, confirmation dialogs showing up for form actions.\u003c/p\u003e\u003cp name=\"e184\" id=\"e184\" class=\"graf graf--p graf-after--p\"\u003eI’d been about to implement a quick fix — just swap out the dialog component for something simpler. But I stopped and asked myself what the broader pattern was. Not “how do I make this error go away” but “what does this error reveal about how we’re building?”\u003c/p\u003e\u003cp name=\"3aca\" id=\"3aca\" class=\"graf graf--p graf-after--p\"\u003eThe pattern was component reuse without considering context. We had a confirmation dialog designed for destructive actions — Delete, Reset, things that should make you think twice. We’d reused it for forms because it was convenient. Create a list, upload a file, share a resource — all using a component designed for warnings.\u003c/p\u003e\u003cp name=\"c04a\" id=\"c04a\" class=\"graf graf--p graf-after--p\"\u003eThe component was working as designed. The design was being used inappropriately.\u003c/p\u003e\u003cp name=\"1988\" id=\"1988\" class=\"graf graf--p graf-after--p\"\u003eThis was where the Time Lord Doctrine came in handy. The Lead Developer had “felt pressure to rush” because “the PM was blocked.” But that’s not what priority means. Priority signals what to work on next. It doesn’t dictate how to work on it. The pace should remain deliberate, craft-focused. When you feel cross-pressured between speed and thoroughness, that’s the signal to stop and discuss.\u003c/p\u003e\u003cp name=\"75a4\" id=\"75a4\" class=\"graf graf--p graf-after--p\"\u003eWe implemented a dialog mode system. Confirmation mode for destructive actions (red button, warning icon). Form mode for creation actions (blue button, no icon). Same component, context-appropriate behavior. It took longer than a quick fix would have. It solved the actual problem instead of masking symptoms.\u003c/p\u003e\u003ch3 name=\"f7d9\" id=\"f7d9\" class=\"graf graf--h3 graf-after--p\"\u003eLayer three: the swiss cheese\u003c/h3\u003e\u003cp name=\"f9cf\" id=\"f9cf\" class=\"graf graf--p graf-after--h3\"\u003eEvening Thursday. I tried again. “Failed to load lists.” “Failed to create list: Unknown error.”\u003c/p\u003e\u003cp name=\"9a7c\" id=\"9a7c\" class=\"graf graf--p graf-after--p\"\u003eThree hours of debugging revealed not one bug but three separate issues, all presenting as the same symptom:\u003c/p\u003e\u003cp name=\"8d68\" id=\"8d68\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe API contract mismatch\u003c/strong\u003e: Frontend sending JSON request bodies, backend expecting query parameters. Result: 422 Unprocessable Entity, which the error handler translated to “Unknown error.” We implemented this test-first — wrote failing tests, added Pydantic models, verified all four endpoints (lists, todos, projects, files) now matched their contracts.\u003c/p\u003e\u003cp name=\"7d5c\" id=\"7d5c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe dependency injection pattern\u003c/strong\u003e: All the endpoints expected \u003ccode class=\"markup--code markup--p-code\"\u003erequest.state.db\u003c/code\u003e to be set by middleware. The middleware was never created. This is why the dependency injection pattern had never worked - we\u0026#39;d scaffolded the expectation but not the implementation. The fix changed from expecting middleware to using async generators with proper session management.\u003c/p\u003e\u003cp name=\"a216\" id=\"a216\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe CSS design tokens\u003c/strong\u003e: We’d defined all our colors and spacing in \u003ccode class=\"markup--code markup--p-code\"\u003etokens.css\u003c/code\u003e. We just never linked it in five of our templates. The UI was invisibly broken - buttons and forms rendering but with no styling. Classic \u0026quot;75% complete\u0026quot; - the infrastructure existed, the integration didn\u0026#39;t.\u003c/p\u003e\u003cp name=\"036e\" id=\"036e\" class=\"graf graf--p graf-after--p\"\u003eAt 10:19 PM, after fixing all three issues, I deployed and tested one more time. I created a list. “List created successfully” appeared. The list showed up in the UI. It worked. Actually worked. For a real user, in a real browser, doing the thing the feature was supposed to enable.\u003c/p\u003e\u003cp name=\"c771\" id=\"c771\" class=\"graf graf--p graf-after--p\"\u003eThat’s when we knew we were done.\u003c/p\u003e\u003ch3 name=\"75c1\" id=\"75c1\" class=\"graf graf--h3 graf-after--p\"\u003eWhat integration testing actually tests\u003c/h3\u003e\u003cp name=\"86f2\" id=\"86f2\" class=\"graf graf--p graf-after--h3\"\u003eUnit tests verify that components work in isolation. Integration tests verify they work together. But there’s a subtler layer: they verify that the \u003cem class=\"markup--em markup--p-em\"\u003eway\u003c/em\u003e things work together matches how users will actually use them.\u003c/p\u003e\u003cp name=\"2506\" id=\"2506\" class=\"graf graf--p graf-after--p\"\u003eOur auth system passed all seventeen unit tests. Our feature endpoints passed their tests. But we’d never tested: log in with cookies in a browser, then try to use a feature. That gap — between “components work” and “users can use components” — is where these three layers hid.\u003c/p\u003e\u003cp name=\"bdb6\" id=\"bdb6\" class=\"graf graf--p graf-after--p\"\u003eThe cookie auth issue existed because we tested auth and features separately. The dialog misuse existed because we tested components in isolation from user context. The swiss cheese bugs existed because we tested that pieces were built, not that they were fully integrated.\u003c/p\u003e\u003cp name=\"710f\" id=\"710f\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t an argument against unit tests. Unit tests caught real bugs and prevented regressions throughout this work. But unit tests passing is necessary, not sufficient. The discipline is to mark something done when a user can use it, not when the code is written.\u003c/p\u003e\u003ch3 name=\"b083\" id=\"b083\" class=\"graf graf--h3 graf-after--p\"\u003eThe patient investigation model\u003c/h3\u003e\u003cp name=\"a219\" id=\"a219\" class=\"graf graf--p graf-after--h3\"\u003eWednesday’s fixes took a few hours. Thursday’s took seventeen. Not because Thursday’s bugs were harder, but because Thursday required patient layer-by-layer investigation instead of quick fixes.\u003c/p\u003e\u003cp name=\"97fc\" id=\"97fc\" class=\"graf graf--p graf-after--p\"\u003eWhen I first reported the Thursday failures, each fix prompted the question: what’s the broader pattern? The cookie issue revealed that route dependencies needed to be cookie-aware. The dialog issue revealed component misuse. The swiss cheese revealed three separate “75% complete” patterns.\u003c/p\u003e\u003cp name=\"6695\" id=\"6695\" class=\"graf graf--p graf-after--p\"\u003eThis is what the methodology enables. Not speed — if anything, this approach is slower. But it prevents the cycle where quick fixes create technical debt that slows everything later. You pay for thoroughness now or you pay for rework later. We chose to pay now.\u003c/p\u003e\u003ch3 name=\"c041\" id=\"c041\" class=\"graf graf--h3 graf-after--p\"\u003eThe work that happened in parallel\u003c/h3\u003e\u003cp name=\"867b\" id=\"867b\" class=\"graf graf--p graf-after--h3\"\u003eWhile the debugging marathon unfolded, other work continued. The Chief Architect created our first Wardley map, revealing that our moat is coherence — Genesis components that work together. The Chief of Staff reorganized our workstreams from seven to six, recognizing that role proliferation needed systematic coordination. My Communications Director received an expansion brief, acknowledging earned growth into strategic responsibility.\u003c/p\u003e\u003cp name=\"1d99\" id=\"1d99\" class=\"graf graf--p graf-after--p\"\u003eNone of this work would have been possible if we’d been fighting fires from premature releases. The patient debugging approach freed other agents to do strategic work because they trusted the integration work was being done thoroughly.\u003c/p\u003e\u003cp name=\"8dc2\" id=\"8dc2\" class=\"graf graf--p graf-after--p\"\u003eTed Nadeau’s feedback kept arriving, independently validating our architecture. Sam Zimmerman’s ethics model kept refining. The security audit came back clean. Good work compounds when the foundation is solid.\u003c/p\u003e\u003ch3 name=\"e470\" id=\"e470\" class=\"graf graf--h3 graf-after--p\"\u003eWhat we learned about “done”\u003c/h3\u003e\u003cp name=\"5202\" id=\"5202\" class=\"graf graf--p graf-after--h3\"\u003eFour days. Building, releasing, testing, debugging. Tests passed on Tuesday. Real usage failed on Wednesday. Thursday revealed three layers. Thursday evening, it actually worked.\u003c/p\u003e\u003cp name=\"bc4e\" id=\"bc4e\" class=\"graf graf--p graf-after--p\"\u003eThe lesson isn’t “test more” — we were testing. The lesson is “test differently.” Test the way users will use it. Test integration, not just components. Test in browsers with cookies, not just in units with mocked auth. Test that pieces connect, not just that pieces exist.\u003c/p\u003e\u003cp name=\"e8aa\" id=\"e8aa\" class=\"graf graf--p graf-after--p\"\u003eAnd when users find problems — because they will — investigate patiently. Each fix is an opportunity to understand broader patterns. Quick fixes mask symptoms. Thorough investigation reveals systemic issues that improve everything after.\u003c/p\u003e\u003cp name=\"969e\" id=\"969e\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe tests passing is not the end. Users being able to use what you built is the end. Everything before that is preparation.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Three Layers\",\"excerpt\":\"“Each piece is OK — it’s the connections!”December 1–4The tests were passing. The features worked. Version 0.8.2 shipped on Tuesday with authentication, error recovery, the whole setup wizard. Clean deploys, no rollbacks. Everything looked good.Then I tried to create a list.This is the story of w...\",\"url\":\"/blog/the-three-layers\",\"publishedAt\":\"Dec 16, 2025\",\"publishedAtISO\":\"2025-12-17T01:30:20.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/c6ada97a4971\",\"featuredImage\":\"/assets/blog-images/c6ada97a4971-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-three-layers-c6ada97a4971?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-three-layers\",\"workDate\":\"Dec 17, 2025\",\"workDateISO\":\"2025-12-17T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2025-12-17\",\"featured\":false},\"content\":{\"title\":\"The Three Layers\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Three Layers | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Three Layers\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Three Layers\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
