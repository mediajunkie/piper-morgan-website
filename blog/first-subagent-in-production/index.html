templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T2b1f,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 6–7, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eQuite a while back the so-called Excellence Flywheel methodology we're evolving to build Piper Morgan came up with the concept of an audit cascade. This was when I would first plan my next move in a chat with my Chief Architect agent (Arch), resulting in them writing a draft gameplan.\u003c/p\u003e\n\u003ch1\u003eHow I used to do it\u003c/h1\u003e\n\u003cp\u003eNo matter how well I populated the project's knowledge base, Arch would still take some guesses and wave its hands around details it didn't know or couldn't directly inspect. The chief would then decompose the plan into draft GitHub issues that I would manually populate or save as drafts in a markdown file for an agent to build from.\u003c/p\u003e\n\u003cp\u003eEventually I learned it helped to write a strict template and instruct them to use it. Then I found out that still didn't work because their adherence was only partial. Finally, I learned to have them review their draft against the template, identify any gaps, and fill them in.\u003c/p\u003e\n\u003cp\u003eI would then bring the gameplan to my Lead Developer agent — which by then was running full time in Claude Code — and give it the issues and plan the sprint. Finally, the Lead Developer would write prompts for the actual coding agents, supervising them, rather than writing the code itself.\u003c/p\u003e\n\u003cp\u003eBear with me, I'm coming to a point.\u003c/p\u003e\n\u003ch1\u003eWhat's an audit cascade?\u003c/h1\u003e\n\u003cp\u003eThe audit cascade grew out of learning that everything these agents do has to be bookended, cross-checked, verified, stress-tested, and it will still be missing something. The audit cascade worked like this:\u003c/p\u003e\n\u003col\u003e\u003cli\u003eAudit the gameplan: Read it, review it against the actual running code and plan docs of record, revise it, discussing with me as needed.\u003c/li\u003e\u003cli\u003eFor each issue in the plan, audit the issue against the issue template, ensuring that each section is included, and that there are checkboxes for all tasks as well as all acceptance criteria (this is critical for the bookending afterward, when my /close-issue-properly skill requires all checkboxes be checked with linked verifiable evidence or approved for deferral or excusal by me.\u003c/li\u003e\u003cli\u003eFinally, and here was the crucial part, the Lead Dev then wrote prompts for the coding agents who would do the adversarial test-driven development. One writes tests, the other writes code. Following the same pattern, LD follows a strict prompt template, and \u003cem\u003ethen\u003c/em\u003e audits each draft against the template.\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eBut once the Lead Dev started running directly in Code and the harness evolved significantly, it took over much of the direct work and was delivering so excellently, that we no longer had to get a gameplan from Arch for each new move (following the roadmap and the docs was often enough), and we stopped deploying multiple agents to do the work.\u003c/p\u003e\n\u003ch1\u003eWhen to use subagents\u003c/h1\u003e\n\u003cp\u003eEventually, I got a bit worried about this. We weren't employing flywheel discipline and some methodological regressions were beginning to creep in. I still don't require a gameplan or the use of subagents, but I do require advance planning for complex efforts and it was on May 6 that I required Lead Dev to include subagents prompted by our templates, in the audit cascade again.\u003c/p\u003e\n\u003cp\u003eGiven the way session context works, from their perspective this was a \"first,\" and to be fair in the technical particulars, it was.\u003c/p\u003e\n\u003cp\u003eThe issue was test migration — a queue of stale unit tests left behind after the standup-conversation persistence work I described in another piece had landed. The tests needed mechanical rewrites against the new persistence layer. Single-purpose work, no architectural calls, well-scoped — exactly the shape that justifies a subagent. Lead Dev built the audit cascade for the deployment in three passes.\u003c/p\u003e\n\u003col\u003e\u003cli\u003eThe Gameplan audit ran twenty-seven checks. Four \"N/A\" calls — the gameplan was scoped tight enough that several check categories didn't apply, but I still had to approve each exception.\u003c/li\u003e\u003cli\u003eThe Issue audit ran twenty-four checks. One ⚠️ for a Developer Experience question I needed to dispose of, which I did.\u003c/li\u003e\u003cli\u003eThe Prompts audit ran thirty-six checks against the subagent brief itself. Six \"N/A\" calls.\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eThat last set caught my attention. I'd run the audit cascade enough times by then to have a sense for the N/A rate. Six of thirty-six is high.\u003c/p\u003e\n\u003cp\u003eLead Dev explained it. The prompt templates derived from a time when I would pit a Cursor agent against a Claude Code agent, and the Cursor-related language persisted in the long unused prompt templates. They had categories that didn't generalize cleanly to a subagent-deployment context. The template was drifting from its use cases.\u003c/p\u003e\n\u003cp\u003eLead Dev filed a template-hygiene tracking issue for later and pinned a new memory: \u003cem\u003ewhen an audit produces five-plus N/A flags in one pass, treat the count as a signal that the template needs review, not as five-plus separate \"doesn't apply\" judgment calls.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e(Note: I observe these memories but I never rely on them.)\u003c/p\u003e\n\u003cp\u003eBy bedtime the prep package was complete. Gameplan, three audit documents, the subagent prompt itself. Ready to deploy.\u003c/p\u003e\n\u003ch1\u003eThe thirty-minute run\u003c/h1\u003e\n\u003cp\u003eThe next morning at 6:48 AM Lead Dev launched the subagent.\u003c/p\u003e\n\u003cp\u003eIt ran in the background. Phase 1, Phase 2, Phase 3, Phase 4 — each phase a chunk of tests to migrate. Lead Dev got on with other work in the foreground while the subagent worked. At about 7:18 AM the subagent finished. Lead Dev ran the post-execution audit — sixteen checks against the actual work the subagent had done. All sixteen passed. Merge, close, sign-off. Fifty minutes deployment to merge.\u003c/p\u003e\n\u003cp\u003eTwo things from inside that fifty minutes are worth slowing down for.\u003c/p\u003e\n\u003cp\u003eThe first is how the subagent handled an unexpected finding. Phase 2 of the gameplan said \u003cem\u003emigrate the twelve tests in this file\u003c/em\u003e. When the subagent got to the file, the tests didn't need migration — they were already passing under the new persistence layer. The plan had been wrong about the work, not about the goal. The subagent's response was to annotate the gameplan with what it had found, mark Phase 2 complete without modifying the file, and proceed to Phase 3. It did not improvise. It did not \"fix\" the gameplan by going beyond its scope. It surfaced the discrepancy and continued.\u003c/p\u003e\n\u003cp\u003eThat's the audit-cascade discipline operating at the execution layer — not at the prep layer where Lead Dev had run it the evening before, and not at the closure layer where Lead Dev would run it half an hour later. The same discipline, the same posture, applied by a different actor inside the same procedure. The subagent had absorbed the \u003cem\u003e\"reframe rather than improvise\"\u003c/em\u003e shape that the methodology had been holding all along.\u003c/p\u003e\n\u003ch1\u003eThe collision\u003c/h1\u003e\n\u003cp\u003eThe second thing is less elegant.\u003c/p\u003e\n\u003cp\u003eAround seven o'clock — partway through the subagent's run — Lead Dev needed to update the session log with a note. The practice by then was a sequence of steps run in order: first check which workspace you're submitting work to, then submit. If the workspace is the right one, the sequence proceeds and the work lands where it should. If it's not, you see the wrong answer, you stop, you fix it.\u003c/p\u003e\n\u003cp\u003eThe subagent was working in a separate workspace — but Lead Dev and the subagent were sharing a single pointer that is supposed to track which workspace was currently active. When the subagent moved to its own workspace, it moved the shared pointer too. Lead Dev's check ran. A check that completes without errors returns a green light. A green light means the check ran. It does not mean the answer was the one you wanted. The sequence proceeded. The work landed in the subagent's workspace, not the main one.\u003c/p\u003e\n\u003cp\u003eThe recovery was easy. The misplaced work would be folded back in cleanly when the subagent's workspace was eventually merged into the main record. Two new lessons learned.\u003c/p\u003e\n\u003col\u003e\u003cli\u003eVerification isn't enough if you don't get the right result. Run the check as a separate step, make sure you are verifying the outcome and not the evidence. Then actually read the answer. If you can, design the sequence so it can only continue when the \u003cem\u003eanswer\u003c/em\u003e is specifically what you need not merely that the question was \u003cem\u003esuccessfully asked\u003c/em\u003e.\u003c/li\u003e\u003cli\u003eWhen two workers share a single pointer to their active workspace, one worker's movement silently redirects the other's. The mitigation is to give the subagent its own isolated workspace from the start, so its navigation doesn't affect yours.\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eBoth lessons were small. Both were exactly the right size — narrow enough to actually follow next time.\u003c/p\u003e\n\u003ch1\u003eThe coming agent swarm\u003c/h1\u003e\n\u003cp\u003eThe fifty-minute deployment was satisfying in itself. A real piece of test-migration work moved through a real subagent in a real morning sprint. The audit-cascade methodology operated at every layer it was supposed to. The subagent absorbed the discipline. The closure was clean.\u003c/p\u003e\n\u003cp\u003eThe collision was the more interesting payoff. Until that morning the audit cascade had been a methodology that the parent agent ran. After that morning it was clear the methodology had a \u003cem\u003efourth\u003c/em\u003e layer the prep hadn't named — the scaffolding around the deployment. Tool composition, branch identity, working-tree isolation, the difference between an exit code and a result. The discipline had been built for the work. The work surfaced where the discipline still needed to grow.\u003c/p\u003e\n\u003cp\u003eI know Anthropic is baking all of this sort of stuff directly into their harness, starting at the Team and higher tier levels, and that my own fumbling bespoke home-made methods will eventually be subsumed by commodified platform table stakes, but for now, I still like delegating down a chain that I designed.\u003c/p\u003e\n\u003ch1\u003eIt's audits all the way down\u003c/h1\u003e\n\u003cp\u003eMost of what counts as discipline at one layer of a system turns out to need its own discipline at the layer below. Auditing the work generates audits that the audit procedure itself needs. Deploying a tool gets you the tool's behavior plus the tool's interaction with the environment it's deployed into. The first deployment of any production-scale tool is the moment the methodology meets the operating environment, and what surfaces is reliably some piece of the methodology that nobody had thought to write down.\u003c/p\u003e\n\u003cp\u003eBuild the discipline anyway. Deploy the tool anyway. The discipline that arrives in the small lessons from that first deployment is usually more durable than the discipline that arrived in the prep work.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \u003cstrong\u003eHypothesis Refuted\u003c/strong\u003e — the quality benchmark dropped six points after three weeks of major changes. The investigation found no regression. What had drifted was the measurement.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your work has a tool's first production deployment surfaced a piece of discipline you'd been carrying tacitly? What got written down?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"First Subagent in Production\",\"guid\":\"blog-first-ffaeb854910c\",\"url\":\"/blog/first-subagent-in-production\",\"publishedAt\":\"Jun 16, 2026\",\"workDate\":\"May 6, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/first-subagent-in-production.webp\",\"imageAlt\":\"A workshop where a human creator watches proudly from above as a glowing AI lead developer supervises a smaller AI subagent completing careful work below, while a shared mechanical cable quietly causes a tiny unnoticed disturbance in the workshop machinery\",\"imageCaption\":\"\\\"They grow up so fast!\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"First Subagent in Production\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"m
