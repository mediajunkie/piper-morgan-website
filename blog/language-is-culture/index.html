$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T6329,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"In office cubicles a robot mention “Cathedral doctrine” while a person mentioned “Inchworm protocol”\" src=\"https://cdn-images-1.medium.com/max/1024/1*8bk2ww0_8D6xyAL8TT0ceQ.png\" /\u003e\u003cfigcaption\u003e“Don’t forget the Excellence Flywheel!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 24 to November 6\u003c/em\u003e\u003c/p\u003e\u003cp\u003e“August broke the semantic analyzer.” This sentence appears in November 4’s session log. It’s simultaneously technical problem description, humor about meta-analysis, and cultural artifact. Will anyone reading Piper Morgan documentation six months from now will encounter this phrase and understand? “We analyze our own development patterns. Sometimes our analysis tools fail hilariously. We laugh about it while fixing it.”\u003c/p\u003e\u003cp\u003eThat’s language creating culture.\u003c/p\u003e\u003cp\u003e“The 75% pattern.” “Phase −1 investigation.” “Cathedral Doctrine.” “Time Lord Philosophy.” “The Excellence Flywheel.” “Archaeological discovery.” “Completion matrix.”\u003c/p\u003e\u003cp\u003eThese aren’t standard software engineering terms. They’re our terms. They emerged through methodological documentation. They get reinforced through repeated use. They create shared understanding between human and AI agents. They encode lessons learned. They transmit methodology.\u003c/p\u003e\u003cp\u003eThis is about how language shapes methodology. How documentation creates culture. How curated logs transmit values. And how this happens on AI teams similarly — but differently — than human teams.\u003c/p\u003e\u003ch3\u003eThe linguistic archaeology\u003c/h3\u003e\u003cp\u003eLet’s trace some key phrases through their evolution:\u003c/p\u003e\u003ch3\u003e“Phase −1” (Emerged October 2025)\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eFirst appearance\u003c/strong\u003e: Gameplan template v6.0, “Phase -1: Discovery \u0026amp; Assumption Verification”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContext\u003c/strong\u003e: After multiple instances of starting implementation only to discover existing infrastructure, we formalized investigation as mandatory first phase.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eInitially: “Check what exists before building”\u003c/li\u003e\u003cli\u003eThen: “Discovery phase”\u003c/li\u003e\u003cli\u003eFinally: “Phase -1 infrastructure verification”\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eWhy this name\u003c/strong\u003e: Standard project phases start at 0 or 1. By calling investigation “Phase −1,” we signal it happens \u003cem\u003ebefore\u003c/em\u003e normal work begins. It’s pre-implementation requirement, not optional preliminary.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCultural meaning\u003c/strong\u003e: “Phase −1” now carries weight. When agent says “beginning Phase −1 investigation,” everyone knows: We’re checking assumptions before acting. We’re preventing unnecessary work. We’re applying archaeological approach.\u003c/p\u003e\u003cp\u003eThe phrase encodes methodology. Anyone who reads “Phase −1” in documentation understands: Investigation before implementation. Always.\u003c/p\u003e\u003ch3\u003e“The 75% Pattern” (Emerged November 2025)\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eFirst appearance\u003c/strong\u003e: November 1 discovery of DocumentService\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContext\u003c/strong\u003e: Saturday sprint found DocumentService 75% complete. Sunday found todo infrastructure 75% complete. Monday found ActionHumanizer infrastructure complete. Pattern recognized.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSaturday: “DocumentService exists but not wired”\u003c/li\u003e\u003cli\u003eSunday: “Todo infrastructure discovered 75% complete”\u003c/li\u003e\u003cli\u003eMonday: “Another 75% pattern”\u003c/li\u003e\u003cli\u003eTuesday-forward: “The 75% Pattern” (capitalized, recognized phenomenon)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eWhy this name\u003c/strong\u003e: Specific percentage (75%) makes it concrete. Not “mostly done” or “almost finished” but quantified state. Database/service/domain layers (75%) exist, integration layers (25%) missing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCultural meaning\u003c/strong\u003e: “75% pattern” signals: Don’t assume missing. Investigate. Infrastructure probably exists at lower layers. Also encodes understanding: Good architecture builds deep (database/services) before wide (integration/UI).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLinguistic precision\u003c/strong\u003e: Could have called it “incomplete infrastructure pattern” or “unfinished features.” But “75% pattern” captures specific nature: Not 50% (half-done). Not 90% (nearly complete). But 75% (foundation solid, wiring missing).\u003c/p\u003e\u003ch3\u003e“Cathedral Doctrine” (Emerged August 2025)\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eFirst appearance\u003c/strong\u003e: ADR-000, “Meta-Platform Architecture”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContext\u003c/strong\u003e: Need to communicate long-term architectural vision to AI agents who live in present moment. How do you get agents to build toward 3-year vision when they only see current task?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eInitially: “Long-term architecture vision”\u003c/li\u003e\u003cli\u003eThen: “Cathedral metaphor” (building cathedrals took generations)\u003c/li\u003e\u003cli\u003eFinally: “Cathedral Doctrine” (formal methodological principle)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eWhy this name\u003c/strong\u003e: Cathedrals were built across generations. Workers who laid foundations never saw completion. Required shared vision transmitted through documentation. Perfect metaphor for AI-human collaboration where “generations” are different Claude instances.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCultural meaning\u003c/strong\u003e: When architect invokes “Cathedral Doctrine,” it means: This decision serves 3-year vision, not immediate need. Build for future capabilities. Document vision so future agents understand intent.\u003c/p\u003e\u003ch3\u003e“Time Lord Philosophy” (Emerged September 2025)\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eFirst appearance\u003c/strong\u003e: Session management protocols\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContext\u003c/strong\u003e: Development work often spans multiple days. Traditional project management uses hours/days. But Claude sessions don’t map to human time. Need different temporal framework.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eInitially: “Don’t work through the night”\u003c/li\u003e\u003cli\u003eThen: “Session-based time management”\u003c/li\u003e\u003cli\u003eFinally: “Time Lord Philosophy” (playful, memorable)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eWhy this name\u003c/strong\u003e: Doctor Who reference. Time Lords experience time non-linearly. Similarly, AI agents don’t experience continuous time. Each session is fresh context. Playful name makes serious methodological point memorable. It also emphasizes that the PM dictates facts to the LLMs. If I say we have 30 hours today, then so be it.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCultural meaning\u003c/strong\u003e: “Time Lord Philosophy” signals: Time is fluid in AI-human collaboration. Sessions can span days. Work can pause and resume. Don’t force artificial urgency. Use playful time units (jiffy, fortnight) to emphasize non-standard temporal relationship.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe humor\u003c/strong\u003e: Calling it “Time Lord Philosophy” rather than “Asynchronous Session Management” makes it more likely to be remembered and applied. Humor aids transmission.\u003c/p\u003e\u003ch3\u003e“Completion Matrix” (Emerged November 2025)\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eFirst appearance\u003c/strong\u003e: November 1, Saturday sprint preventing 80% pattern twice\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContext\u003c/strong\u003e: Code works but documentation missing. Or documentation exists but evidence not collected. Or evidence collected but related docs not updated. Three levels of completion all required.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eInitially: “Make sure it’s really done”\u003c/li\u003e\u003cli\u003eThen: “Three-level completion: code, docs, process”\u003c/li\u003e\u003cli\u003eFinally: “Completion Matrix” (formalized framework)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eWhy this name\u003c/strong\u003e: Matrix implies intersection of dimensions. Code level × documentation level × process level = complete when ALL cells satisfied.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCultural meaning\u003c/strong\u003e: “Completion Matrix” signals: Done means truly done. Not just code works. Not just documented. But all three levels verified. Prevents 80% pattern (stopping when “feels done” without systematic verification).\u003c/p\u003e\u003ch3\u003eHow language transmits methodology\u003c/h3\u003e\u003cp\u003eThe phrases aren’t just labels. They’re methodology transmission mechanisms.\u003c/p\u003e\u003ch4\u003eExample 1: Phase −1 becomes automatic\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eBefore formalization\u003c/strong\u003e: Agent starts implementation. Discovers existing infrastructure mid-work. Wastes time.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAfter “Phase \u003c/strong\u003e−\u003cstrong\u003e1” named\u003c/strong\u003e: Agent sees gameplan template. Reads “Phase −1: Infrastructure Verification.” Understands: Investigate first, always.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTransmission\u003c/strong\u003e: The phrase “Phase −1” in gameplan templates teaches methodology without explicit instruction. New agent reads template, sees Phase −1, investigates before implementing. Methodology transmitted through language.\u003c/p\u003e\u003ch4\u003eExample 2: 75% Pattern enables recognition\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eBefore naming\u003c/strong\u003e: Each discovery feels unique. “Oh, DocumentService exists.” “Oh, todos built.” No pattern recognized.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAfter “75% Pattern” named\u003c/strong\u003e: Third discovery: “Another 75% pattern.” Fourth discovery: “Standard 75% pattern.” Pattern becomes visible through naming.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTransmission\u003c/strong\u003e: Naming the pattern helps recognize it. When agent investigates and finds infrastructure, they document: “75% pattern confirmed.” Future agents reading logs see pattern, investigate more thoroughly themselves.\u003c/p\u003e\u003ch4\u003eExample 3: Cathedral Doctrine aligns decisions\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eBefore formalization\u003c/strong\u003e: Agent makes good short-term decision that blocks long-term architecture. PM has to explain why decision is wrong. Frustrating.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAfter “Cathedral Doctrine” named\u003c/strong\u003e: Agent reads ADR-000. Sees “Cathedral Doctrine: Build for 3-year vision.” Makes decision aligned with long-term architecture. Less human correction needed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTransmission\u003c/strong\u003e: The doctrine name + documentation creates shared understanding. Agent doesn’t need PM to explain each time why long-term matters. The principle is encoded in language.\u003c/p\u003e\u003ch3\u003eThe linguistic feedback loop\u003c/h3\u003e\u003cp\u003eLanguage doesn’t just transmit methodology. It refines methodology through usage.\u003c/p\u003e\u003ch4\u003eThe loop:\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003e1. Problem encountered\u003c/strong\u003e: Investigation reveals pattern (archaeological discovery)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Language emerges\u003c/strong\u003e: Name the pattern (“75% pattern”)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Documentation captures\u003c/strong\u003e: Logs record instances, explain pattern\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Agents adopt\u003c/strong\u003e: Future agents read logs, use terminology\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Usage refines\u003c/strong\u003e: Agents apply pattern, discover edge cases\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Language evolves\u003c/strong\u003e: Terminology adjusts to capture refinements\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Loop continues\u003c/strong\u003e: Better language → better understanding → better application → better language\u003c/p\u003e\u003ch4\u003eExample: “Phase −1” evolution\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eOriginal\u003c/strong\u003e: “Check if infrastructure exists before building”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProblem\u003c/strong\u003e: Too vague. What infrastructure? How to check? When to stop?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRefinement 1\u003c/strong\u003e: “Phase −1: Discovery phase”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProblem\u003c/strong\u003e: “Discovery” too general. Discovery of what?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRefinement 2\u003c/strong\u003e: “Phase −1: Infrastructure Verification”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBetter\u003c/strong\u003e: More specific. But what counts as verification?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRefinement 3\u003c/strong\u003e: “Phase −1: Infrastructure Verification (15–30 minutes minimum, all layers, symbol search)”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCurrent state\u003c/strong\u003e: Sustained duration, explicit methodology, tool specification.\u003c/p\u003e\u003cp\u003eThe language evolved through usage. Each agent applying it encountered ambiguity. Refinements addressed ambiguity. Now “Phase -1” has precise meaning transmitted through documentation.\u003c/p\u003e\u003ch3\u003eHuman teams vs AI teams: Similar but different\u003c/h3\u003e\u003cp\u003eLanguage creates culture on human teams too. But different dynamics:\u003c/p\u003e\u003ch4\u003eHuman team language evolution:\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eEmergence\u003c/strong\u003e: Informal. Phrase appears in standup, catches on, spreads through conversation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTransmission\u003c/strong\u003e: Social. New team member overhears phrase, asks meaning, gets explanation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRefinement\u003c/strong\u003e: Organic. Team discusses, phrase evolves through dialogue.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePersistence\u003c/strong\u003e: Cultural memory. Senior members remember origin stories.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFailure mode\u003c/strong\u003e: Tribal knowledge. New members miss context, use phrases incorrectly.\u003c/p\u003e\u003ch4\u003eAI team language evolution:\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eEmergence\u003c/strong\u003e: Formal. Phrase appears in documentation, gets adopted through reading. Individual human provides 90% of the novely and unique personality. (Though I will admit the LLMs named our “Excellence Flywheel.”)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTransmission\u003c/strong\u003e: Documentation. New agent reads logs/templates, applies terminology.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRefinement\u003c/strong\u003e: Explicit. Ambiguity surfaces, documentation updated, meaning clarified.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePersistence\u003c/strong\u003e: Written record. Every agent can trace phrase origin through git history.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFailure mode\u003c/strong\u003e: Documentation lag. Verbal understanding advances faster than written docs.\u003c/p\u003e\u003ch4\u003eThe hybrid (human + AI collaboration):\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eEmergence\u003c/strong\u003e: Human recognizes pattern, AI helps formalize naming.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTransmission\u003c/strong\u003e: Both. Humans explain verbally, AI agents read documentation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRefinement\u003c/strong\u003e: Collaborative. Humans identify ambiguity, AI agents propose clarifications.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePersistence\u003c/strong\u003e: Dual memory. Human cultural knowledge + comprehensive written record.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAdvantage\u003c/strong\u003e: Best of both. Informal emergence with formal documentation. Organic refinement with explicit capture.\u003c/p\u003e\u003ch3\u003eThe glossary we need\u003c/h3\u003e\u003cp\u003eIt usually takes me longer than it should to realize a product needs a glossary. That has happened again with Piper Morgan, where I am fnally realizing this, siz months in. It has become especially pressing now that for the first time I have other human people looking at the project and advising me on the architecture and code.\u003c/p\u003e\u003cp\u003eOur jargon has grown organically. Time to document systematically. The list below is an initial scan that my comms chief put together when preparing a draft of this article for me, but in the near future I will do another systematic sweep of project docs to tease out any other terms of art we’ve developed, and then I am going to edit the definitions to make sure no meaning has drifted or “flattened.”\u003c/p\u003e\u003ch4\u003eCore Methodology Terms (relatively unique to this project)\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003ePhase \u003c/strong\u003e−\u003cstrong\u003e1\u003c/strong\u003e: Infrastructure verification before implementation. 15–30 minutes minimum. Investigates all layers (database, services, routes, handlers). Uses symbol search tools. Outputs: infrastructure map + gap analysis. Mandatory before Phase 0.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e75% Pattern\u003c/strong\u003e: Infrastructure 75% complete at lower layers (database/services/domain) but missing 25% integration layers (routes/handlers/UI). Result of good architecture built “deep before wide.” Requires wiring not rebuilding.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCathedral Doctrine\u003c/strong\u003e: Build for 3-year vision, not immediate need. Document long-term architecture so future agents understand intent. Named for medieval cathedrals built across generations.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTime Lord Philosophy\u003c/strong\u003e: Time is fluid in AI-human collaboration. Sessions span days. Work pauses and resumes. No artificial urgency. Playful time units (jiffy, fortnight) emphasize non-standard temporal relationship.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCompletion Matrix\u003c/strong\u003e: Three-level completion requirement. Level 1: Code (tests passing, integration working). Level 2: Documentation (summaries, evidence, updates). Level 3: Process (criteria met, related docs updated). All levels required for “done.”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eArchaeological Approach\u003c/strong\u003e: Systematic investigation to find existing infrastructure before building new. Consistent 18–27:1 ROI. Also called “Phase −1 investigation.”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExcellence Flywheel\u003c/strong\u003e: Small improvements compound. Each success (and failure) teaches a lesson. Each lesson improves next success. Positive feedback loop of methodology refinement.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInchworm Protocol\u003c/strong\u003e: Systematic completion before proceeding. Finish phase completely, verify thoroughly, document comprehensively, then advance. Prevents 80% pattern.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVerification Pyramid\u003c/strong\u003e: Three tiers of validation. Bottom: Unit tests (fast, many). Middle: Integration tests (slower, fewer). Top: E2E tests (slowest, focused). All three tiers required.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eValidation-Driven Development\u003c/strong\u003e: Tests aren’t afterthought. They’re confidence mechanism. Comprehensive tests enable bold changes. 66 tests passing → migration is safe.\u003c/p\u003e\u003ch4\u003eCultural Artifacts (arise from conversation)\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003e“August broke the semantic analyzer”\u003c/strong\u003e: Meta-learning moment. Analysis tools revealing own limits. Going meta on meta. Humor about methodology complexity.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e“Different rhythms, different stages”\u003c/strong\u003e: Development velocity varies appropriately. June 100% → October 15%, both healthy. Match work to stage.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e“The long winding road”\u003c/strong\u003e: Non-linear path from start to done. Estimates revise as understanding deepens. Discovery-driven development, not failure.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e“Two parallel realities”\u003c/strong\u003e: Database sophisticated, web basic. Layers exist in different architectural universes. Gap invisible from within either reality.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e“Accidentally enterprise-ready”\u003c/strong\u003e: Infrastructure created for one purpose, suitable for another. Good practices accumulating into unexpected capability.\u003c/p\u003e\u003ch4\u003eProcess Terms (relatively ordinary)\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eGameplan\u003c/strong\u003e: Comprehensive implementation plan. Phases defined, acceptance criteria clear, stop conditions explicit. Template v9.0+ includes Phase -1 mandatory.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOmnibus Log\u003c/strong\u003e: Synthesis of multiple session logs into comprehensive narrative. Pattern-020 format. Creates complete story from fragmented sessions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSession Log\u003c/strong\u003e: Single agent/session documentation. Chronicles decisions, discoveries, outcomes. Raw material for omnibus logs.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eADR (Architectural Decision Record)\u003c/strong\u003e: Documents significant architecture decisions. Problem, options considered, decision made, rationale. Numbered sequentially (ADR-001, ADR-002…).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSTOP Conditions\u003c/strong\u003e: Explicit criteria for stopping work. Prevents scope creep. Examples: “Stop when tests pass” or “Stop when 80% coverage reached.”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAcceptance Criteria\u003c/strong\u003e: Specific, verifiable completion requirements. “All tests passing” or “Documentation updated” or “Related routes verified.”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvidence\u003c/strong\u003e: Concrete proof of completion. Commit SHAs, test results, SQL logs, performance metrics. Not opinion, measurable.\u003c/p\u003e\u003ch3\u003eWhat a glossary might enable\u003c/h3\u003e\u003cp\u003eFormalizing terminology may feel bureaucratic but ideally it should be a scaling mechanism.\u003c/p\u003e\u003ch4\u003eBefore glossary:\u003c/h4\u003e\u003cp\u003eAgent: “Should I check if infrastructure exists?”\u003c/p\u003e\u003cp\u003ePM: “Yes, do Phase −1 investigation. Check all layers. Use Serena for symbol search. Spend 15–30 minutes…”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCost\u003c/strong\u003e: 5 minutes explanation per agent, every time\u003c/p\u003e\u003ch3\u003eWith glossary:\u003c/h3\u003e\u003cp\u003eAgent: “Should I check if infrastructure exists?”\u003c/p\u003e\u003cp\u003ePM: “Yes, do Phase −1”\u003c/p\u003e\u003cp\u003eAgent: \u003cem\u003e[reads glossary entry if unfamiliar with term, understands complete methodology]\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCost\u003c/strong\u003e: 10 seconds, perfect transmission\u003c/p\u003e\u003ch3\u003eThe multiplication:\u003c/h3\u003e\u003cul\u003e\u003cli\u003e5 agents × 10 investigations each = 50 explanations\u003c/li\u003e\u003cli\u003eWithout glossary: 50 × 5 minutes = 250 minutes (4.2 hours)\u003c/li\u003e\u003cli\u003eWith glossary: 50 × 10 seconds = 8.3 minutes\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSavings\u003c/strong\u003e: 4 hours of explanation time\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eBut really that’s the kind of math AI’s like to do. The more important impact is consistency. A glossary ensures every agent gets same explanation. No drift. No telephone-game degradation. Perfect transmission every time.\u003c/p\u003e\u003ch3\u003eLanguage as culture transmission\u003c/h3\u003e\u003cp\u003eHere’s the key insight: \u003cstrong\u003eMethodology without language is intuition. Methodology with language is culture.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eI can intuitively understand that investigating before building saves time. But until we named it “Phase −1” and documented it systematically, each agent had to learn from scratch.\u003c/p\u003e\u003cp\u003eNow: Agent reads “Phase −1” in template. Looks up glossary. Understands ROI. Sees four discovery examples. Applies methodology. No explanation needed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLanguage encoded methodology. Documentation transmitted culture.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis is different from human teams where senior members carry cultural knowledge in memory. With AI agents:\u003c/p\u003e\u003cul\u003e\u003cli\u003eNo cultural memory between sessions\u003c/li\u003e\u003cli\u003eNo informal transmission through conversation\u003c/li\u003e\u003cli\u003eNo senior members modeling behavior\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAll transmission through documentation\u003c/strong\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWhich means: \u003cstrong\u003eLanguage precision matters more\u003c/strong\u003e. On human teams, vague phrases get clarified through context and discussion. With AI agents, vague phrases stay vague unless documentation clarifies.\u003c/p\u003e\u003ch3\u003eToday’s meta-observation\u003c/h3\u003e\u003cp\u003eWriting this post \u003cem\u003eis\u003c/em\u003e literally an example of the pattern it describes.\u003c/p\u003e\u003cp\u003eBy documenting how language creates culture, we’re using language to transmit cultural understanding about how language transmits culture. Meta-level.\u003c/p\u003e\u003cp\u003eFuture agents reading this will understand:\u003c/p\u003e\u003cul\u003e\u003cli\u003ePhrases encode methodology\u003c/li\u003e\u003cli\u003eDocumentation transmits culture\u003c/li\u003e\u003cli\u003eGlossaries enable scaling\u003c/li\u003e\u003cli\u003eLanguage precision matters\u003c/li\u003e\u003cli\u003eThis understanding itself transmitted through language\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe recursion is intentional. Methodology about methodology requires meta-language. “August broke the semantic analyzer” is funny because we’re aware we’re going meta. This post is deliberately self-referential because the subject is language creating self-awareness.\u003c/p\u003e\u003ch3\u003eWhat this means for other AI-human teams\u003c/h3\u003e\u003cp\u003eThe pattern applies beyond Piper Morgan:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAny team collaborating with AI agents should\u003c/strong\u003e:\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cstrong\u003eName patterns explicitly\u003c/strong\u003e: Don’t leave methodology implicit. When you recognize pattern, name it. Make it concrete through language.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eDocument systematically\u003c/strong\u003e: Don’t rely on verbal transmission. AI agents need written records. Comprehensive documentation enables perfect transmission.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCreate glossaries\u003c/strong\u003e: Formalize terminology as jargon emerges. Glossary enables scaling, ensures consistency, reduces explanation overhead.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eRefine through usage\u003c/strong\u003e: Language isn’t static. As agents apply methodology, capture edge cases, update documentation, improve precision.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eEmbrace humor\u003c/strong\u003e: Playful phrases (“Time Lord Philosophy,” “August broke…”) are more memorable than dry technical terms. Humor aids transmission.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGo meta intentionally\u003c/strong\u003e: Occasionally step back and analyze the language itself. How is methodology transmitted? What’s working? What needs clarification?\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eThe hybrid human-AI team has advantage: Human cultural intuition + AI documentation discipline. Best of both worlds if you leverage it intentionally.\u003c/p\u003e\u003ch3\u003eThe living glossary\u003c/h3\u003e\u003cp\u003eGlossary shouldn’t be static document. It should evolve as methodology evolves:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhen new pattern emerges\u003c/strong\u003e: Add entry. Name it, define it, document instances.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhen terminology drifts\u003c/strong\u003e: Update entry. Clarify meaning, add examples, distinguish from similar terms.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhen usage reveals ambiguity\u003c/strong\u003e: Refine entry. Add precision, specify edge cases, include anti-patterns.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhen better name appears\u003c/strong\u003e: Replace entry. Document evolution, explain why new term is clearer.\u003c/p\u003e\u003cp\u003eThe glossary is living document reflecting evolving culture. Not dictionary of fixed meanings. But changelog of methodology maturation.\u003c/p\u003e\u003cp\u003eAnd maintaining it is cultural practice: When agent encounters vague terminology, they propose clarification. When human explains concept repeatedly, they formalize in glossary. When methodology evolves, documentation updates.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLanguage creates culture. Documentation maintains culture. Refinement improves culture.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan we resume the build narrative on November 24 with “From 15 Agents to One User.”\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDo your teams develop shared jargon? How do you transmit methodology to new members — verbal or documented?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=41107523d04c\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/language-is-culture-how-methodological-documentation-creates-shared-understanding-41107523d04c\"\u003eLanguage is Culture: How Methodological Documentation Creates Shared Understanding\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:Ta25c,"])</script><script>self.__next_f.push([1,"\u003csection name=\"7f29\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"bbd8\" id=\"bbd8\" class=\"graf graf--h3 graf--leading graf--title\"\u003eLanguage is Culture: How Methodological Documentation Creates Shared Understanding\u003c/h3\u003e\u003cfigure name=\"2c50\" id=\"2c50\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*8bk2ww0_8D6xyAL8TT0ceQ.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"In office cubicles a robot mention “Cathedral doctrine” while a person mentioned “Inchworm protocol”\" src=\"https://cdn-images-1.medium.com/max/800/1*8bk2ww0_8D6xyAL8TT0ceQ.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Don’t forget the Excellence Flywheel!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"eebb\" id=\"eebb\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 24 to November 6\u003c/em\u003e\u003c/p\u003e\u003cp name=\"29d8\" id=\"29d8\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003e\u003cspan class=\"graf-dropCapQuote\"\u003e“\u003c/span\u003eA\u003c/span\u003eugust broke the semantic analyzer.” This sentence appears in November 4’s session log. It’s simultaneously technical problem description, humor about meta-analysis, and cultural artifact. Will anyone reading Piper Morgan documentation six months from now will encounter this phrase and understand? “We analyze our own development patterns. Sometimes our analysis tools fail hilariously. We laugh about it while fixing it.”\u003c/p\u003e\u003cp name=\"555b\" id=\"555b\" class=\"graf graf--p graf-after--p\"\u003eThat’s language creating culture.\u003c/p\u003e\u003cp name=\"b9b6\" id=\"b9b6\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e“The 75% pattern.” “Phase −1 investigation.” “Cathedral Doctrine.” “Time Lord Philosophy.” “The Excellence Flywheel.” “Archaeological discovery.” “Completion matrix.”\u003c/p\u003e\u003cp name=\"51c7\" id=\"51c7\" class=\"graf graf--p graf-after--p\"\u003eThese aren’t standard software engineering terms. They’re our terms. They emerged through methodological documentation. They get reinforced through repeated use. They create shared understanding between human and AI agents. They encode lessons learned. They transmit methodology.\u003c/p\u003e\u003cp name=\"4ab2\" id=\"4ab2\" class=\"graf graf--p graf-after--p\"\u003eThis is about how language shapes methodology. How documentation creates culture. How curated logs transmit values. And how this happens on AI teams similarly — but differently — than human teams.\u003c/p\u003e\u003ch3 name=\"f0dc\" id=\"f0dc\" class=\"graf graf--h3 graf-after--p\"\u003eThe linguistic archaeology\u003c/h3\u003e\u003cp name=\"8413\" id=\"8413\" class=\"graf graf--p graf-after--h3\"\u003eLet’s trace some key phrases through their evolution:\u003c/p\u003e\u003ch3 name=\"a0c3\" id=\"a0c3\" class=\"graf graf--h3 graf--startsWithDoubleQuote graf-after--p\"\u003e“Phase −1” (Emerged October 2025)\u003c/h3\u003e\u003cp name=\"2b64\" id=\"2b64\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst appearance\u003c/strong\u003e: Gameplan template v6.0, “Phase -1: Discovery \u0026amp; Assumption Verification”\u003c/p\u003e\u003cp name=\"5b30\" id=\"5b30\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eContext\u003c/strong\u003e: After multiple instances of starting implementation only to discover existing infrastructure, we formalized investigation as mandatory first phase.\u003c/p\u003e\u003cp name=\"87ca\" id=\"87ca\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"802d\" id=\"802d\" class=\"graf graf--li graf-after--p\"\u003eInitially: “Check what exists before building”\u003c/li\u003e\u003cli name=\"6aaf\" id=\"6aaf\" class=\"graf graf--li graf-after--li\"\u003eThen: “Discovery phase”\u003c/li\u003e\u003cli name=\"7173\" id=\"7173\" class=\"graf graf--li graf-after--li\"\u003eFinally: “Phase -1 infrastructure verification”\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"4cb4\" id=\"4cb4\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy this name\u003c/strong\u003e: Standard project phases start at 0 or 1. By calling investigation “Phase −1,” we signal it happens \u003cem class=\"markup--em markup--p-em\"\u003ebefore\u003c/em\u003e normal work begins. It’s pre-implementation requirement, not optional preliminary.\u003c/p\u003e\u003cp name=\"61b4\" id=\"61b4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCultural meaning\u003c/strong\u003e: “Phase −1” now carries weight. When agent says “beginning Phase −1 investigation,” everyone knows: We’re checking assumptions before acting. We’re preventing unnecessary work. We’re applying archaeological approach.\u003c/p\u003e\u003cp name=\"becb\" id=\"becb\" class=\"graf graf--p graf-after--p\"\u003eThe phrase encodes methodology. Anyone who reads “Phase −1” in documentation understands: Investigation before implementation. Always.\u003c/p\u003e\u003ch3 name=\"1fae\" id=\"1fae\" class=\"graf graf--h3 graf--startsWithDoubleQuote graf-after--p\"\u003e“The 75% Pattern” (Emerged November 2025)\u003c/h3\u003e\u003cp name=\"b9fa\" id=\"b9fa\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst appearance\u003c/strong\u003e: November 1 discovery of DocumentService\u003c/p\u003e\u003cp name=\"c1c7\" id=\"c1c7\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eContext\u003c/strong\u003e: Saturday sprint found DocumentService 75% complete. Sunday found todo infrastructure 75% complete. Monday found ActionHumanizer infrastructure complete. Pattern recognized.\u003c/p\u003e\u003cp name=\"6619\" id=\"6619\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"bb75\" id=\"bb75\" class=\"graf graf--li graf-after--p\"\u003eSaturday: “DocumentService exists but not wired”\u003c/li\u003e\u003cli name=\"4541\" id=\"4541\" class=\"graf graf--li graf-after--li\"\u003eSunday: “Todo infrastructure discovered 75% complete”\u003c/li\u003e\u003cli name=\"673f\" id=\"673f\" class=\"graf graf--li graf-after--li\"\u003eMonday: “Another 75% pattern”\u003c/li\u003e\u003cli name=\"d9b2\" id=\"d9b2\" class=\"graf graf--li graf-after--li\"\u003eTuesday-forward: “The 75% Pattern” (capitalized, recognized phenomenon)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"8bf2\" id=\"8bf2\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy this name\u003c/strong\u003e: Specific percentage (75%) makes it concrete. Not “mostly done” or “almost finished” but quantified state. Database/service/domain layers (75%) exist, integration layers (25%) missing.\u003c/p\u003e\u003cp name=\"2456\" id=\"2456\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCultural meaning\u003c/strong\u003e: “75% pattern” signals: Don’t assume missing. Investigate. Infrastructure probably exists at lower layers. Also encodes understanding: Good architecture builds deep (database/services) before wide (integration/UI).\u003c/p\u003e\u003cp name=\"111e\" id=\"111e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLinguistic precision\u003c/strong\u003e: Could have called it “incomplete infrastructure pattern” or “unfinished features.” But “75% pattern” captures specific nature: Not 50% (half-done). Not 90% (nearly complete). But 75% (foundation solid, wiring missing).\u003c/p\u003e\u003ch3 name=\"c2d3\" id=\"c2d3\" class=\"graf graf--h3 graf--startsWithDoubleQuote graf-after--p\"\u003e“Cathedral Doctrine” (Emerged August 2025)\u003c/h3\u003e\u003cp name=\"f63d\" id=\"f63d\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst appearance\u003c/strong\u003e: ADR-000, “Meta-Platform Architecture”\u003c/p\u003e\u003cp name=\"50c9\" id=\"50c9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eContext\u003c/strong\u003e: Need to communicate long-term architectural vision to AI agents who live in present moment. How do you get agents to build toward 3-year vision when they only see current task?\u003c/p\u003e\u003cp name=\"a53b\" id=\"a53b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"0d2f\" id=\"0d2f\" class=\"graf graf--li graf-after--p\"\u003eInitially: “Long-term architecture vision”\u003c/li\u003e\u003cli name=\"499a\" id=\"499a\" class=\"graf graf--li graf-after--li\"\u003eThen: “Cathedral metaphor” (building cathedrals took generations)\u003c/li\u003e\u003cli name=\"cc54\" id=\"cc54\" class=\"graf graf--li graf-after--li\"\u003eFinally: “Cathedral Doctrine” (formal methodological principle)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"df33\" id=\"df33\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy this name\u003c/strong\u003e: Cathedrals were built across generations. Workers who laid foundations never saw completion. Required shared vision transmitted through documentation. Perfect metaphor for AI-human collaboration where “generations” are different Claude instances.\u003c/p\u003e\u003cp name=\"ec3e\" id=\"ec3e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCultural meaning\u003c/strong\u003e: When architect invokes “Cathedral Doctrine,” it means: This decision serves 3-year vision, not immediate need. Build for future capabilities. Document vision so future agents understand intent.\u003c/p\u003e\u003ch3 name=\"36df\" id=\"36df\" class=\"graf graf--h3 graf--startsWithDoubleQuote graf-after--p\"\u003e“Time Lord Philosophy” (Emerged September 2025)\u003c/h3\u003e\u003cp name=\"a58e\" id=\"a58e\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst appearance\u003c/strong\u003e: Session management protocols\u003c/p\u003e\u003cp name=\"3734\" id=\"3734\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eContext\u003c/strong\u003e: Development work often spans multiple days. Traditional project management uses hours/days. But Claude sessions don’t map to human time. Need different temporal framework.\u003c/p\u003e\u003cp name=\"f6a3\" id=\"f6a3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"a078\" id=\"a078\" class=\"graf graf--li graf-after--p\"\u003eInitially: “Don’t work through the night”\u003c/li\u003e\u003cli name=\"0d08\" id=\"0d08\" class=\"graf graf--li graf-after--li\"\u003eThen: “Session-based time management”\u003c/li\u003e\u003cli name=\"2f84\" id=\"2f84\" class=\"graf graf--li graf-after--li\"\u003eFinally: “Time Lord Philosophy” (playful, memorable)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"846f\" id=\"846f\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy this name\u003c/strong\u003e: Doctor Who reference. Time Lords experience time non-linearly. Similarly, AI agents don’t experience continuous time. Each session is fresh context. Playful name makes serious methodological point memorable. It also emphasizes that the PM dictates facts to the LLMs. If I say we have 30 hours today, then so be it.\u003c/p\u003e\u003cp name=\"99a3\" id=\"99a3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCultural meaning\u003c/strong\u003e: “Time Lord Philosophy” signals: Time is fluid in AI-human collaboration. Sessions can span days. Work can pause and resume. Don’t force artificial urgency. Use playful time units (jiffy, fortnight) to emphasize non-standard temporal relationship.\u003c/p\u003e\u003cp name=\"ee5e\" id=\"ee5e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe humor\u003c/strong\u003e: Calling it “Time Lord Philosophy” rather than “Asynchronous Session Management” makes it more likely to be remembered and applied. Humor aids transmission.\u003c/p\u003e\u003ch3 name=\"7713\" id=\"7713\" class=\"graf graf--h3 graf--startsWithDoubleQuote graf-after--p\"\u003e“Completion Matrix” (Emerged November 2025)\u003c/h3\u003e\u003cp name=\"d302\" id=\"d302\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst appearance\u003c/strong\u003e: November 1, Saturday sprint preventing 80% pattern twice\u003c/p\u003e\u003cp name=\"9c7b\" id=\"9c7b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eContext\u003c/strong\u003e: Code works but documentation missing. Or documentation exists but evidence not collected. Or evidence collected but related docs not updated. Three levels of completion all required.\u003c/p\u003e\u003cp name=\"c7c0\" id=\"c7c0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvolution\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"d994\" id=\"d994\" class=\"graf graf--li graf-after--p\"\u003eInitially: “Make sure it’s really done”\u003c/li\u003e\u003cli name=\"ca55\" id=\"ca55\" class=\"graf graf--li graf-after--li\"\u003eThen: “Three-level completion: code, docs, process”\u003c/li\u003e\u003cli name=\"6abd\" id=\"6abd\" class=\"graf graf--li graf-after--li\"\u003eFinally: “Completion Matrix” (formalized framework)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"cbd8\" id=\"cbd8\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy this name\u003c/strong\u003e: Matrix implies intersection of dimensions. Code level × documentation level × process level = complete when ALL cells satisfied.\u003c/p\u003e\u003cp name=\"cc7f\" id=\"cc7f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCultural meaning\u003c/strong\u003e: “Completion Matrix” signals: Done means truly done. Not just code works. Not just documented. But all three levels verified. Prevents 80% pattern (stopping when “feels done” without systematic verification).\u003c/p\u003e\u003ch3 name=\"8362\" id=\"8362\" class=\"graf graf--h3 graf-after--p\"\u003eHow language transmits methodology\u003c/h3\u003e\u003cp name=\"d543\" id=\"d543\" class=\"graf graf--p graf-after--h3\"\u003eThe phrases aren’t just labels. They’re methodology transmission mechanisms.\u003c/p\u003e\u003ch4 name=\"2ff6\" id=\"2ff6\" class=\"graf graf--h4 graf-after--p\"\u003eExample 1: Phase −1 becomes automatic\u003c/h4\u003e\u003cp name=\"e732\" id=\"e732\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBefore formalization\u003c/strong\u003e: Agent starts implementation. Discovers existing infrastructure mid-work. Wastes time.\u003c/p\u003e\u003cp name=\"3b6a\" id=\"3b6a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAfter “Phase \u003c/strong\u003e−\u003cstrong class=\"markup--strong markup--p-strong\"\u003e1” named\u003c/strong\u003e: Agent sees gameplan template. Reads “Phase −1: Infrastructure Verification.” Understands: Investigate first, always.\u003c/p\u003e\u003cp name=\"5aff\" id=\"5aff\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTransmission\u003c/strong\u003e: The phrase “Phase −1” in gameplan templates teaches methodology without explicit instruction. New agent reads template, sees Phase −1, investigates before implementing. Methodology transmitted through language.\u003c/p\u003e\u003ch4 name=\"c43a\" id=\"c43a\" class=\"graf graf--h4 graf-after--p\"\u003eExample 2: 75% Pattern enables recognition\u003c/h4\u003e\u003cp name=\"ffef\" id=\"ffef\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBefore naming\u003c/strong\u003e: Each discovery feels unique. “Oh, DocumentService exists.” “Oh, todos built.” No pattern recognized.\u003c/p\u003e\u003cp name=\"9ca8\" id=\"9ca8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAfter “75% Pattern” named\u003c/strong\u003e: Third discovery: “Another 75% pattern.” Fourth discovery: “Standard 75% pattern.” Pattern becomes visible through naming.\u003c/p\u003e\u003cp name=\"8146\" id=\"8146\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTransmission\u003c/strong\u003e: Naming the pattern helps recognize it. When agent investigates and finds infrastructure, they document: “75% pattern confirmed.” Future agents reading logs see pattern, investigate more thoroughly themselves.\u003c/p\u003e\u003ch4 name=\"bcd0\" id=\"bcd0\" class=\"graf graf--h4 graf-after--p\"\u003eExample 3: Cathedral Doctrine aligns decisions\u003c/h4\u003e\u003cp name=\"d57e\" id=\"d57e\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBefore formalization\u003c/strong\u003e: Agent makes good short-term decision that blocks long-term architecture. PM has to explain why decision is wrong. Frustrating.\u003c/p\u003e\u003cp name=\"9001\" id=\"9001\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAfter “Cathedral Doctrine” named\u003c/strong\u003e: Agent reads ADR-000. Sees “Cathedral Doctrine: Build for 3-year vision.” Makes decision aligned with long-term architecture. Less human correction needed.\u003c/p\u003e\u003cp name=\"0427\" id=\"0427\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTransmission\u003c/strong\u003e: The doctrine name + documentation creates shared understanding. Agent doesn’t need PM to explain each time why long-term matters. The principle is encoded in language.\u003c/p\u003e\u003ch3 name=\"2f33\" id=\"2f33\" class=\"graf graf--h3 graf-after--p\"\u003eThe linguistic feedback loop\u003c/h3\u003e\u003cp name=\"c074\" id=\"c074\" class=\"graf graf--p graf-after--h3\"\u003eLanguage doesn’t just transmit methodology. It refines methodology through usage.\u003c/p\u003e\u003ch4 name=\"6356\" id=\"6356\" class=\"graf graf--h4 graf-after--p\"\u003eThe loop:\u003c/h4\u003e\u003col class=\"postList\"\u003e\u003cli name=\"a735\" id=\"a735\" class=\"graf graf--li graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eProblem encountered\u003c/strong\u003e: Investigation reveals pattern (archaeological discovery)\u003c/li\u003e\u003cli name=\"db5f\" id=\"db5f\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eLanguage emerges\u003c/strong\u003e: Name the pattern (“75% pattern”)\u003c/li\u003e\u003cli name=\"b797\" id=\"b797\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eDocumentation captures\u003c/strong\u003e: Logs record instances, explain pattern\u003c/li\u003e\u003cli name=\"907f\" id=\"907f\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eAgents adopt\u003c/strong\u003e: Future agents read logs, use terminology\u003c/li\u003e\u003cli name=\"5325\" id=\"5325\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eUsage refines\u003c/strong\u003e: Agents apply pattern, discover edge cases\u003c/li\u003e\u003cli name=\"3493\" id=\"3493\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eLanguage evolves\u003c/strong\u003e: Terminology adjusts to capture refinements\u003c/li\u003e\u003cli name=\"f93e\" id=\"f93e\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eLoop continues\u003c/strong\u003e: Better language → better understanding → better application → better language\u003c/li\u003e\u003c/ol\u003e\u003ch4 name=\"bfb9\" id=\"bfb9\" class=\"graf graf--h4 graf-after--li\"\u003eExample: “Phase −1” evolution\u003c/h4\u003e\u003cp name=\"5c9d\" id=\"5c9d\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOriginal\u003c/strong\u003e: “Check if infrastructure exists before building”\u003c/p\u003e\u003cp name=\"4f1a\" id=\"4f1a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProblem\u003c/strong\u003e: Too vague. What infrastructure? How to check? When to stop?\u003c/p\u003e\u003cp name=\"9685\" id=\"9685\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRefinement 1\u003c/strong\u003e: “Phase −1: Discovery phase”\u003c/p\u003e\u003cp name=\"dc57\" id=\"dc57\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProblem\u003c/strong\u003e: “Discovery” too general. Discovery of what?\u003c/p\u003e\u003cp name=\"417e\" id=\"417e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRefinement 2\u003c/strong\u003e: “Phase −1: Infrastructure Verification”\u003c/p\u003e\u003cp name=\"6175\" id=\"6175\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBetter\u003c/strong\u003e: More specific. But what counts as verification?\u003c/p\u003e\u003cp name=\"8858\" id=\"8858\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRefinement 3\u003c/strong\u003e: “Phase −1: Infrastructure Verification (15–30 minutes minimum, all layers, symbol search)”\u003c/p\u003e\u003cp name=\"b180\" id=\"b180\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCurrent state\u003c/strong\u003e: Sustained duration, explicit methodology, tool specification.\u003c/p\u003e\u003cp name=\"d990\" id=\"d990\" class=\"graf graf--p graf-after--p\"\u003eThe language evolved through usage. Each agent applying it encountered ambiguity. Refinements addressed ambiguity. Now “Phase -1” has precise meaning transmitted through documentation.\u003c/p\u003e\u003ch3 name=\"5530\" id=\"5530\" class=\"graf graf--h3 graf-after--p\"\u003eHuman teams vs AI teams: Similar but different\u003c/h3\u003e\u003cp name=\"3e57\" id=\"3e57\" class=\"graf graf--p graf-after--h3\"\u003eLanguage creates culture on human teams too. But different dynamics:\u003c/p\u003e\u003ch4 name=\"76ba\" id=\"76ba\" class=\"graf graf--h4 graf-after--p\"\u003eHuman team language evolution:\u003c/h4\u003e\u003cp name=\"267c\" id=\"267c\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEmergence\u003c/strong\u003e: Informal. Phrase appears in standup, catches on, spreads through conversation.\u003c/p\u003e\u003cp name=\"98e1\" id=\"98e1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTransmission\u003c/strong\u003e: Social. New team member overhears phrase, asks meaning, gets explanation.\u003c/p\u003e\u003cp name=\"4b86\" id=\"4b86\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRefinement\u003c/strong\u003e: Organic. Team discusses, phrase evolves through dialogue.\u003c/p\u003e\u003cp name=\"1572\" id=\"1572\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePersistence\u003c/strong\u003e: Cultural memory. Senior members remember origin stories.\u003c/p\u003e\u003cp name=\"0a2c\" id=\"0a2c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFailure mode\u003c/strong\u003e: Tribal knowledge. New members miss context, use phrases incorrectly.\u003c/p\u003e\u003ch4 name=\"a7ba\" id=\"a7ba\" class=\"graf graf--h4 graf-after--p\"\u003eAI team language evolution:\u003c/h4\u003e\u003cp name=\"62e2\" id=\"62e2\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEmergence\u003c/strong\u003e: Formal. Phrase appears in documentation, gets adopted through reading. Individual human provides 90% of the novely and unique personality. (Though I will admit the LLMs named our “Excellence Flywheel.”)\u003c/p\u003e\u003cp name=\"ab45\" id=\"ab45\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTransmission\u003c/strong\u003e: Documentation. New agent reads logs/templates, applies terminology.\u003c/p\u003e\u003cp name=\"b71f\" id=\"b71f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRefinement\u003c/strong\u003e: Explicit. Ambiguity surfaces, documentation updated, meaning clarified.\u003c/p\u003e\u003cp name=\"43da\" id=\"43da\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePersistence\u003c/strong\u003e: Written record. Every agent can trace phrase origin through git history.\u003c/p\u003e\u003cp name=\"62c0\" id=\"62c0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFailure mode\u003c/strong\u003e: Documentation lag. Verbal understanding advances faster than written docs.\u003c/p\u003e\u003ch4 name=\"a74f\" id=\"a74f\" class=\"graf graf--h4 graf-after--p\"\u003eThe hybrid (human + AI collaboration):\u003c/h4\u003e\u003cp name=\"319a\" id=\"319a\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEmergence\u003c/strong\u003e: Human recognizes pattern, AI helps formalize naming.\u003c/p\u003e\u003cp name=\"a506\" id=\"a506\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTransmission\u003c/strong\u003e: Both. Humans explain verbally, AI agents read documentation.\u003c/p\u003e\u003cp name=\"7b08\" id=\"7b08\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRefinement\u003c/strong\u003e: Collaborative. Humans identify ambiguity, AI agents propose clarifications.\u003c/p\u003e\u003cp name=\"3783\" id=\"3783\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePersistence\u003c/strong\u003e: Dual memory. Human cultural knowledge + comprehensive written record.\u003c/p\u003e\u003cp name=\"79d2\" id=\"79d2\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAdvantage\u003c/strong\u003e: Best of both. Informal emergence with formal documentation. Organic refinement with explicit capture.\u003c/p\u003e\u003ch3 name=\"7569\" id=\"7569\" class=\"graf graf--h3 graf-after--p\"\u003eThe glossary we need\u003c/h3\u003e\u003cp name=\"ea0a\" id=\"ea0a\" class=\"graf graf--p graf-after--h3\"\u003eIt usually takes me longer than it should to realize a product needs a glossary. That has happened again with Piper Morgan, where I am fnally realizing this, siz months in. It has become especially pressing now that for the first time I have other human people looking at the project and advising me on the architecture and code.\u003c/p\u003e\u003cp name=\"9787\" id=\"9787\" class=\"graf graf--p graf-after--p\"\u003eOur jargon has grown organically. Time to document systematically. The list below is an initial scan that my comms chief put together when preparing a draft of this article for me, but in the near future I will do another systematic sweep of project docs to tease out any other terms of art we’ve developed, and then I am going to edit the definitions to make sure no meaning has drifted or “flattened.”\u003c/p\u003e\u003ch4 name=\"441c\" id=\"441c\" class=\"graf graf--h4 graf-after--p\"\u003eCore Methodology Terms (relatively unique to this project)\u003c/h4\u003e\u003cp name=\"379d\" id=\"379d\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase \u003c/strong\u003e−\u003cstrong class=\"markup--strong markup--p-strong\"\u003e1\u003c/strong\u003e: Infrastructure verification before implementation. 15–30 minutes minimum. Investigates all layers (database, services, routes, handlers). Uses symbol search tools. Outputs: infrastructure map + gap analysis. Mandatory before Phase 0.\u003c/p\u003e\u003cp name=\"4cc6\" id=\"4cc6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e75% Pattern\u003c/strong\u003e: Infrastructure 75% complete at lower layers (database/services/domain) but missing 25% integration layers (routes/handlers/UI). Result of good architecture built “deep before wide.” Requires wiring not rebuilding.\u003c/p\u003e\u003cp name=\"8b33\" id=\"8b33\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCathedral Doctrine\u003c/strong\u003e: Build for 3-year vision, not immediate need. Document long-term architecture so future agents understand intent. Named for medieval cathedrals built across generations.\u003c/p\u003e\u003cp name=\"e22d\" id=\"e22d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTime Lord Philosophy\u003c/strong\u003e: Time is fluid in AI-human collaboration. Sessions span days. Work pauses and resumes. No artificial urgency. Playful time units (jiffy, fortnight) emphasize non-standard temporal relationship.\u003c/p\u003e\u003cp name=\"37cf\" id=\"37cf\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCompletion Matrix\u003c/strong\u003e: Three-level completion requirement. Level 1: Code (tests passing, integration working). Level 2: Documentation (summaries, evidence, updates). Level 3: Process (criteria met, related docs updated). All levels required for “done.”\u003c/p\u003e\u003cp name=\"321c\" id=\"321c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eArchaeological Approach\u003c/strong\u003e: Systematic investigation to find existing infrastructure before building new. Consistent 18–27:1 ROI. Also called “Phase −1 investigation.”\u003c/p\u003e\u003cp name=\"fd6a\" id=\"fd6a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eExcellence Flywheel\u003c/strong\u003e: Small improvements compound. Each success (and failure) teaches a lesson. Each lesson improves next success. Positive feedback loop of methodology refinement.\u003c/p\u003e\u003cp name=\"2f2b\" id=\"2f2b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInchworm Protocol\u003c/strong\u003e: Systematic completion before proceeding. Finish phase completely, verify thoroughly, document comprehensively, then advance. Prevents 80% pattern.\u003c/p\u003e\u003cp name=\"487c\" id=\"487c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eVerification Pyramid\u003c/strong\u003e: Three tiers of validation. Bottom: Unit tests (fast, many). Middle: Integration tests (slower, fewer). Top: E2E tests (slowest, focused). All three tiers required.\u003c/p\u003e\u003cp name=\"3808\" id=\"3808\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eValidation-Driven Development\u003c/strong\u003e: Tests aren’t afterthought. They’re confidence mechanism. Comprehensive tests enable bold changes. 66 tests passing → migration is safe.\u003c/p\u003e\u003ch4 name=\"dd00\" id=\"dd00\" class=\"graf graf--h4 graf-after--p\"\u003eCultural Artifacts (arise from conversation)\u003c/h4\u003e\u003cp name=\"a1ed\" id=\"a1ed\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e“August broke the semantic analyzer”\u003c/strong\u003e: Meta-learning moment. Analysis tools revealing own limits. Going meta on meta. Humor about methodology complexity.\u003c/p\u003e\u003cp name=\"2018\" id=\"2018\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e“Different rhythms, different stages”\u003c/strong\u003e: Development velocity varies appropriately. June 100% → October 15%, both healthy. Match work to stage.\u003c/p\u003e\u003cp name=\"cd30\" id=\"cd30\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e“The long winding road”\u003c/strong\u003e: Non-linear path from start to done. Estimates revise as understanding deepens. Discovery-driven development, not failure.\u003c/p\u003e\u003cp name=\"2197\" id=\"2197\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e“Two parallel realities”\u003c/strong\u003e: Database sophisticated, web basic. Layers exist in different architectural universes. Gap invisible from within either reality.\u003c/p\u003e\u003cp name=\"0b16\" id=\"0b16\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e“Accidentally enterprise-ready”\u003c/strong\u003e: Infrastructure created for one purpose, suitable for another. Good practices accumulating into unexpected capability.\u003c/p\u003e\u003ch4 name=\"f0ae\" id=\"f0ae\" class=\"graf graf--h4 graf-after--p\"\u003eProcess Terms (relatively ordinary)\u003c/h4\u003e\u003cp name=\"bf9c\" id=\"bf9c\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGameplan\u003c/strong\u003e: Comprehensive implementation plan. Phases defined, acceptance criteria clear, stop conditions explicit. Template v9.0+ includes Phase -1 mandatory.\u003c/p\u003e\u003cp name=\"184c\" id=\"184c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOmnibus Log\u003c/strong\u003e: Synthesis of multiple session logs into comprehensive narrative. Pattern-020 format. Creates complete story from fragmented sessions.\u003c/p\u003e\u003cp name=\"2c34\" id=\"2c34\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSession Log\u003c/strong\u003e: Single agent/session documentation. Chronicles decisions, discoveries, outcomes. Raw material for omnibus logs.\u003c/p\u003e\u003cp name=\"c556\" id=\"c556\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eADR (Architectural Decision Record)\u003c/strong\u003e: Documents significant architecture decisions. Problem, options considered, decision made, rationale. Numbered sequentially (ADR-001, ADR-002…).\u003c/p\u003e\u003cp name=\"d946\" id=\"d946\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSTOP Conditions\u003c/strong\u003e: Explicit criteria for stopping work. Prevents scope creep. Examples: “Stop when tests pass” or “Stop when 80% coverage reached.”\u003c/p\u003e\u003cp name=\"070a\" id=\"070a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAcceptance Criteria\u003c/strong\u003e: Specific, verifiable completion requirements. “All tests passing” or “Documentation updated” or “Related routes verified.”\u003c/p\u003e\u003cp name=\"fa33\" id=\"fa33\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvidence\u003c/strong\u003e: Concrete proof of completion. Commit SHAs, test results, SQL logs, performance metrics. Not opinion, measurable.\u003c/p\u003e\u003ch3 name=\"aa6d\" id=\"aa6d\" class=\"graf graf--h3 graf-after--p\"\u003eWhat a glossary might enable\u003c/h3\u003e\u003cp name=\"703e\" id=\"703e\" class=\"graf graf--p graf-after--h3\"\u003eFormalizing terminology may feel bureaucratic but ideally it should be a scaling mechanism.\u003c/p\u003e\u003ch4 name=\"1604\" id=\"1604\" class=\"graf graf--h4 graf-after--p\"\u003eBefore glossary:\u003c/h4\u003e\u003cp name=\"16f6\" id=\"16f6\" class=\"graf graf--p graf-after--h4\"\u003eAgent: “Should I check if infrastructure exists?”\u003c/p\u003e\u003cp name=\"95b6\" id=\"95b6\" class=\"graf graf--p graf-after--p\"\u003ePM: “Yes, do Phase −1 investigation. Check all layers. Use Serena for symbol search. Spend 15–30 minutes…”\u003c/p\u003e\u003cp name=\"8b85\" id=\"8b85\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCost\u003c/strong\u003e: 5 minutes explanation per agent, every time\u003c/p\u003e\u003ch3 name=\"d810\" id=\"d810\" class=\"graf graf--h3 graf-after--p\"\u003eWith glossary:\u003c/h3\u003e\u003cp name=\"8d2a\" id=\"8d2a\" class=\"graf graf--p graf-after--h3\"\u003eAgent: “Should I check if infrastructure exists?”\u003c/p\u003e\u003cp name=\"e865\" id=\"e865\" class=\"graf graf--p graf-after--p\"\u003ePM: “Yes, do Phase −1”\u003c/p\u003e\u003cp name=\"4a6b\" id=\"4a6b\" class=\"graf graf--p graf-after--p\"\u003eAgent: \u003cem class=\"markup--em markup--p-em\"\u003e[reads glossary entry if unfamiliar with term, understands complete methodology]\u003c/em\u003e\u003c/p\u003e\u003cp name=\"beb1\" id=\"beb1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCost\u003c/strong\u003e: 10 seconds, perfect transmission\u003c/p\u003e\u003ch3 name=\"2d80\" id=\"2d80\" class=\"graf graf--h3 graf-after--p\"\u003eThe multiplication:\u003c/h3\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"5514\" id=\"5514\" class=\"graf graf--li graf-after--h3\"\u003e5 agents × 10 investigations each = 50 explanations\u003c/li\u003e\u003cli name=\"f3f8\" id=\"f3f8\" class=\"graf graf--li graf-after--li\"\u003eWithout glossary: 50 × 5 minutes = 250 minutes (4.2 hours)\u003c/li\u003e\u003cli name=\"8a45\" id=\"8a45\" class=\"graf graf--li graf-after--li\"\u003eWith glossary: 50 × 10 seconds = 8.3 minutes\u003c/li\u003e\u003cli name=\"9cb6\" id=\"9cb6\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSavings\u003c/strong\u003e: 4 hours of explanation time\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"b1df\" id=\"b1df\" class=\"graf graf--p graf-after--li\"\u003eBut really that’s the kind of math AI’s like to do. The more important impact is consistency. A glossary ensures every agent gets same explanation. No drift. No telephone-game degradation. Perfect transmission every time.\u003c/p\u003e\u003ch3 name=\"7814\" id=\"7814\" class=\"graf graf--h3 graf-after--p\"\u003eLanguage as culture transmission\u003c/h3\u003e\u003cp name=\"fc45\" id=\"fc45\" class=\"graf graf--p graf-after--h3\"\u003eHere’s the key insight: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eMethodology without language is intuition. Methodology with language is culture.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"2b16\" id=\"2b16\" class=\"graf graf--p graf-after--p\"\u003eI can intuitively understand that investigating before building saves time. But until we named it “Phase −1” and documented it systematically, each agent had to learn from scratch.\u003c/p\u003e\u003cp name=\"bcab\" id=\"bcab\" class=\"graf graf--p graf-after--p\"\u003eNow: Agent reads “Phase −1” in template. Looks up glossary. Understands ROI. Sees four discovery examples. Applies methodology. No explanation needed.\u003c/p\u003e\u003cp name=\"37d6\" id=\"37d6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLanguage encoded methodology. Documentation transmitted culture.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"5276\" id=\"5276\" class=\"graf graf--p graf-after--p\"\u003eThis is different from human teams where senior members carry cultural knowledge in memory. With AI agents:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"6216\" id=\"6216\" class=\"graf graf--li graf-after--p\"\u003eNo cultural memory between sessions\u003c/li\u003e\u003cli name=\"3bbb\" id=\"3bbb\" class=\"graf graf--li graf-after--li\"\u003eNo informal transmission through conversation\u003c/li\u003e\u003cli name=\"6044\" id=\"6044\" class=\"graf graf--li graf-after--li\"\u003eNo senior members modeling behavior\u003c/li\u003e\u003cli name=\"87b9\" id=\"87b9\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eAll transmission through documentation\u003c/strong\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"d756\" id=\"d756\" class=\"graf graf--p graf-after--li\"\u003eWhich means: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eLanguage precision matters more\u003c/strong\u003e. On human teams, vague phrases get clarified through context and discussion. With AI agents, vague phrases stay vague unless documentation clarifies.\u003c/p\u003e\u003ch3 name=\"e490\" id=\"e490\" class=\"graf graf--h3 graf-after--p\"\u003eToday’s meta-observation\u003c/h3\u003e\u003cp name=\"e956\" id=\"e956\" class=\"graf graf--p graf-after--h3\"\u003eWriting this post \u003cem class=\"markup--em markup--p-em\"\u003eis\u003c/em\u003e literally an example of the pattern it describes.\u003c/p\u003e\u003cp name=\"18cc\" id=\"18cc\" class=\"graf graf--p graf-after--p\"\u003eBy documenting how language creates culture, we’re using language to transmit cultural understanding about how language transmits culture. Meta-level.\u003c/p\u003e\u003cp name=\"f965\" id=\"f965\" class=\"graf graf--p graf-after--p\"\u003eFuture agents reading this will understand:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"75ec\" id=\"75ec\" class=\"graf graf--li graf-after--p\"\u003ePhrases encode methodology\u003c/li\u003e\u003cli name=\"9921\" id=\"9921\" class=\"graf graf--li graf-after--li\"\u003eDocumentation transmits culture\u003c/li\u003e\u003cli name=\"8039\" id=\"8039\" class=\"graf graf--li graf-after--li\"\u003eGlossaries enable scaling\u003c/li\u003e\u003cli name=\"9da4\" id=\"9da4\" class=\"graf graf--li graf-after--li\"\u003eLanguage precision matters\u003c/li\u003e\u003cli name=\"727e\" id=\"727e\" class=\"graf graf--li graf-after--li\"\u003eThis understanding itself transmitted through language\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"8025\" id=\"8025\" class=\"graf graf--p graf-after--li\"\u003eThe recursion is intentional. Methodology about methodology requires meta-language. “August broke the semantic analyzer” is funny because we’re aware we’re going meta. This post is deliberately self-referential because the subject is language creating self-awareness.\u003c/p\u003e\u003ch3 name=\"eb8b\" id=\"eb8b\" class=\"graf graf--h3 graf-after--p\"\u003eWhat this means for other AI-human teams\u003c/h3\u003e\u003cp name=\"710e\" id=\"710e\" class=\"graf graf--p graf-after--h3\"\u003eThe pattern applies beyond Piper Morgan:\u003c/p\u003e\u003cp name=\"d0a5\" id=\"d0a5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAny team collaborating with AI agents should\u003c/strong\u003e:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"408b\" id=\"408b\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eName patterns explicitly\u003c/strong\u003e: Don’t leave methodology implicit. When you recognize pattern, name it. Make it concrete through language.\u003c/li\u003e\u003cli name=\"27a5\" id=\"27a5\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eDocument systematically\u003c/strong\u003e: Don’t rely on verbal transmission. AI agents need written records. Comprehensive documentation enables perfect transmission.\u003c/li\u003e\u003cli name=\"f315\" id=\"f315\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eCreate glossaries\u003c/strong\u003e: Formalize terminology as jargon emerges. Glossary enables scaling, ensures consistency, reduces explanation overhead.\u003c/li\u003e\u003cli name=\"434c\" id=\"434c\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eRefine through usage\u003c/strong\u003e: Language isn’t static. As agents apply methodology, capture edge cases, update documentation, improve precision.\u003c/li\u003e\u003cli name=\"2235\" id=\"2235\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eEmbrace humor\u003c/strong\u003e: Playful phrases (“Time Lord Philosophy,” “August broke…”) are more memorable than dry technical terms. Humor aids transmission.\u003c/li\u003e\u003cli name=\"2d25\" id=\"2d25\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGo meta intentionally\u003c/strong\u003e: Occasionally step back and analyze the language itself. How is methodology transmitted? What’s working? What needs clarification?\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"48cc\" id=\"48cc\" class=\"graf graf--p graf-after--li\"\u003eThe hybrid human-AI team has advantage: Human cultural intuition + AI documentation discipline. Best of both worlds if you leverage it intentionally.\u003c/p\u003e\u003ch3 name=\"7fec\" id=\"7fec\" class=\"graf graf--h3 graf-after--p\"\u003eThe living glossary\u003c/h3\u003e\u003cp name=\"8749\" id=\"8749\" class=\"graf graf--p graf-after--h3\"\u003eGlossary shouldn’t be static document. It should evolve as methodology evolves:\u003c/p\u003e\u003cp name=\"4c39\" id=\"4c39\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhen new pattern emerges\u003c/strong\u003e: Add entry. Name it, define it, document instances.\u003c/p\u003e\u003cp name=\"1c77\" id=\"1c77\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhen terminology drifts\u003c/strong\u003e: Update entry. Clarify meaning, add examples, distinguish from similar terms.\u003c/p\u003e\u003cp name=\"3744\" id=\"3744\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhen usage reveals ambiguity\u003c/strong\u003e: Refine entry. Add precision, specify edge cases, include anti-patterns.\u003c/p\u003e\u003cp name=\"d70d\" id=\"d70d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhen better name appears\u003c/strong\u003e: Replace entry. Document evolution, explain why new term is clearer.\u003c/p\u003e\u003cp name=\"a71b\" id=\"a71b\" class=\"graf graf--p graf-after--p\"\u003eThe glossary is living document reflecting evolving culture. Not dictionary of fixed meanings. But changelog of methodology maturation.\u003c/p\u003e\u003cp name=\"a60a\" id=\"a60a\" class=\"graf graf--p graf-after--p\"\u003eAnd maintaining it is cultural practice: When agent encounters vague terminology, they propose clarification. When human explains concept repeatedly, they formalize in glossary. When methodology evolves, documentation updates.\u003c/p\u003e\u003cp name=\"8f27\" id=\"8f27\" class=\"graf graf--p graf-after--p graf--trailing\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLanguage creates culture. Documentation maintains culture. Refinement improves culture.\u003c/strong\u003e\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Language is Culture: How Methodological Documentation Creates Shared Understanding\",\"excerpt\":\"“Don’t forget the Excellence Flywheel!”October 24 to November 6“August broke the semantic analyzer.” This sentence appears in November 4’s session log. It’s
