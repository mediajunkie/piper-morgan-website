eStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T293a,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A human postal worker moves a letter from one mailbox to another in a wall of many adjacent mailboxes, most marked with abstract AI-like symbols, suggesting manual message routing between neighboring agents.\" src=\"/assets/blog-images/ai-mailboxes.webp\" /\u003e\u003cfigcaption\u003e\"You've got mail!\"\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003eTake a look at this screenshot of a folder on my laptop. It contains thirteen subfolders, each named for an AI agent or a human adviser by their slugs: \u003ccode\u003earch\u003c/code\u003e, \u003ccode\u003ecio\u003c/code\u003e, \u003ccode\u003ecomms\u003c/code\u003e, \u003ccode\u003ecxo\u003c/code\u003e, \u003ccode\u003edocs\u003c/code\u003e, \u003ccode\u003eexec\u003c/code\u003e, \u003ccode\u003ehost\u003c/code\u003e, \u003ccode\u003elead\u003c/code\u003e, \u003ccode\u003epa\u003c/code\u003e, \u003ccode\u003eppm\u003c/code\u003e, \u003ccode\u003espec\u003c/code\u003e, \u003ccode\u003eted-nadeau\u003c/code\u003e:\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"finder window showing mailbox folder structure.\" src=\"/assets/blog-images/mailboxes.webp\" /\u003e\u003cfigcaption\u003e\"Messages to deliver\"\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003eThat's my Chief Architect, Chief Innovation Officer, Communications Chief, Chief Experience Officer, Documentation Manager, Chief of Staff / Executive Assistant, Head of Sapient Trust, Lead Developer, Piper Alpha, Principal Product Manager, Special Assignments agent, and my pal Ted.\u003c/p\u003e\n\u003cp\u003eEach of their folders has the same structure: context, inbox, read.\u003c/p\u003e\n\u003cp\u003eThis is our current solution to a problem that everyone using multiple AI agents will eventually face: \u003cstrong\u003eHow do they talk to each other?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eI want to tell you about this not because we've solved it—we haven't—but because we're right in the middle of figuring it out. And I think the problem itself is interesting.\u003c/p\u003e\n\u003ch1\u003eThe problem\u003c/h1\u003e\n\u003cp\u003eAI agents don't share memory.\u003c/p\u003e\n\u003cp\u003eWhen I have a conversation with the Lead Developer agent about a bug fix, that conversation exists in one context window. When I later talk to the Chief Architect about the system design implications, that's a completely separate context window. The Architect doesn't know what the Lead Developer said. The Lead Developer doesn't know what the Architect decided.\u003c/p\u003e\n\u003cp\u003eThis is a natural consequence of how I keep them all focused on their own roles and instructions, but it introduces fiction.\u003c/p\u003e\n\u003cp\u003eIn a human organization, this coordination happens naturally. People talk in hallways. They CC each other on emails. They attend the same meetings. Information flows through social fabric.\u003c/p\u003e\n\u003cp\u003eAI agents don't have hallways. They have context windows that begin and end with each conversation.\u003c/p\u003e\n\u003ch1\u003eThe primitive solution\u003c/h1\u003e\n\u003cp\u003eFor the first six months, I was the coordination layer. When the Architect made a decision that affected the Lead Developer, I would copy-paste the relevant parts into the next Lead Developer conversation. When the Communications Director needed context from the CXO, I would summarize it.\u003c/p\u003e\n\u003cp\u003eThis worked, sort of. It was also exhausting and error-prone. I became a human message bus, translating between agents, losing fidelity at every hop.\u003c/p\u003e\n\u003cp\u003eThe failure modes were predictable:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eI'd forget to relay something important\u003c/li\u003e\n\u003cli\u003eI'd summarize incorrectly and introduce confusion\u003c/li\u003e\n\u003cli\u003eContext would drift as I paraphrased across multiple hops\u003c/li\u003e\n\u003cli\u003eTime-sensitive information would arrive late\u003c/li\u003e\n\u003cli\u003eI couldn't remember what I'd told which agent\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch1\u003eThe mailbox system\u003c/h1\u003e\n\u003cp\u003eIn early January, we formalized what had been informal. Instead of me remembering to tell agents things, agents would write memos to each other. Those memos would live in a shared file system. At the start of each session, agents would check their inbox.\u003c/p\u003e\n\u003cp\u003eThe structure is simple:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003emailboxes/\n├── arch/           # Chief Architect\n│   ├── context/    # Standing context this agent should know\n│   ├── inbox/      # New messages for this agent\n│   └── read/       # Messages already processed\n├── lead/           # Lead Developer\n│   ├── context/\n│   ├── inbox/\n│   └── read/\n├── comms/          # Communications Director\n│   └── ...\n└── [11 more agents]\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eWhen the Architect makes a decision that affects the Lead Developer, they write a memo and drop it in \u003ccode\u003emailboxes/lead/inbox/\u003c/code\u003e. When the Lead Developer starts their next session, the first instruction is: \"Check your inbox for any messages from other agents.\"\u003c/p\u003e\n\u003cp\u003eIt's email. We reinvented email. Dumb email, but still email.\u003c/p\u003e\n\u003ch1\u003eWhat this actually looks like\u003c/h1\u003e\n\u003cp\u003eHere's a real memo from January:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e# Memo: RequestContext Pattern Guidance\n\n**From**: Chief Architect\n**To**: Lead Developer\n**Date**: January 13, 2026\n**Re**: ADR-051 Approval with Refinements\n\nADR-051 is approved. Key implementation notes:\n\n1. Single RequestContext per request (not per service call)\n2. UUID internally, string at API boundary\n3. Create in middleware, pass explicitly, never recreate\n\nSee ADR-051 for full rationale.\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThis memo landed in \u003ccode\u003emailboxes/lead/inbox/\u003c/code\u003e. The Lead Developer then saw it at session start (part of the standing instructions for a new session), understood the architectural decision, and implemented accordingly.\u003c/p\u003e\n\u003cp\u003eNo human translation. No copy-paste. No \"let me summarize what the Architect said.\" The Architect's words, in the Architect's voice, delivered asynchronously. Even if I took a few days off and forgot about it entirely.\u003c/p\u003e\n\u003ch1\u003eIt's working (sort of)\u003c/h1\u003e\n\u003cp\u003eSince implementing, coordination errors have decreased noticeably. The Lead Developer no longer asks \"what did the Architect decide about X?\"—they check their inbox. The Communications Director no longer needs me to explain CXO feedback—there's a memo.\u003c/p\u003e\n\u003cp\u003eBut.\u003c/p\u003e\n\u003cp\u003eIt's still manual. Agents don't automatically write memos; they have to be prompted to. The mailbox check isn't automatic; it has to be in the session-start instructions. There's no notification when a memo arrives. There's no threading or replies.\u003c/p\u003e\n\u003cp\u003eAnd thirteen mailboxes is a lot of mailboxes. The coordination overhead scales roughly with the square of the agent count. Two agents need one communication channel. Five agents need ten channels. Thirteen agents need... well, 78 potential pairwise channels, though most are unused.\u003c/p\u003e\n\u003ch1\u003eWhat others are doing\u003c/h1\u003e\n\u003cp\u003eWhile we've been building our file-based mailbox system, others have been approaching the orchestration problem differently.\u003c/p\u003e\n\u003cp\u003eThe frequently manic descriptions of Gas Town emanating from Steve Yegge (incorporating \u003ca href=\"https://github.com/Dicklesworthstone/mcp_agent_mail\"\u003eAgent Mail\u003c/a\u003e as well as \"Convoys\" and \"Wisps\" and managed chaos).\u003c/p\u003e\n\u003cp\u003eClaude has just released an Agent Teams feature that may even make this all moot for me. We'll see.\u003c/p\u003e\n\u003cp\u003eThe approaches differ because the goals differ. High-throughput systems can tolerate information loss. Quality-focused systems (like ours) need higher fidelity coordination.\u003c/p\u003e\n\u003cp\u003eThis approach fits our constraints for now: a small number of specialized agents, human orchestration, quality over speed, no work lost.\u003c/p\u003e\n\u003ch1\u003eA bigger question\u003c/h1\u003e\n\u003cp\u003eThe mailbox system is a point solution to an immediate problem. But there's a bigger question underneath it:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat's the right coordination model for AI agents?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eOptions include:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCentral orchestrator (current):\u003c/strong\u003e A human routes all work, manages all handoffs, maintains all context. This is what we do. It doesn't scale beyond maybe 5-10 agents, but it gives the human full visibility and control.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eShared memory:\u003c/strong\u003e Agents read from and write to a common knowledge base. This is where we're heading—our session logs serve this function partially. But shared memory creates new problems: conflicts, staleness, and the question of what to include.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDirect agent-to-agent:\u003c/strong\u003e Agents invoke each other, passing context directly. This is what the big multi-agent frameworks do. It scales better but reduces human oversight.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eEvent-driven:\u003c/strong\u003e Agents subscribe to events and react. More loosely coupled, but harder to trace causality.\u003c/p\u003e\n\u003cp\u003eWe're probably going to end up with a hybrid. Central orchestration for strategic decisions, shared memory for context, maybe direct invocation for routine handoffs.\u003c/p\u003e\n\u003cp\u003eBut I don't know yet. That's the honest answer.\u003c/p\u003e\n\u003ch1\u003eWhy I'm telling you this\u003c/h1\u003e\n\u003cp\u003eI'm writing about the mailbox system not because it's a finished solution, but because it's a snapshot of a work in progress.\u003c/p\u003e\n\u003cp\u003eIf you're starting to use multiple AI agents for real work, you will hit this problem. You'll notice that Agent A doesn't know what Agent B decided. You'll find yourself playing telephone. You'll wonder if there's a better way.\u003c/p\u003e\n\u003cp\u003eThere is. We just don't know exactly what it is yet.\u003c/p\u003e\n\u003cp\u003eWhat we do know:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe coordination problem is real and gets worse with agent count\u003c/li\u003e\n\u003cli\u003eSimple solutions (file-based mailboxes) can help immediately\u003c/li\u003e\n\u003cli\u003eThe \"right\" solution probably depends on your specific constraints\u003c/li\u003e\n\u003cli\u003eThis is an area of active experimentation across the industry\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWhat we don't know:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eHow much coordination overhead is acceptable\u003c/li\u003e\n\u003cli\u003eWhether human orchestration can scale beyond ~10 agents\u003c/li\u003e\n\u003cli\u003eHow to balance fidelity (no information loss) with throughput\u003c/li\u003e\n\u003cli\u003eWhat primitives should be built into AI platforms vs. rolled ourselves\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch1\u003eAn invitation\u003c/h1\u003e\n\u003cp\u003eIf you're working on this problem too, I'd like to hear what you're trying. Drop me a line (I'm easy to find!).\u003c/p\u003e\n\u003cp\u003eWe're sharing our approach not because we have answers but because we're pretty sure this problem matters. The AI agents are getting more capable every quarter. The orchestration challenge isn't going away.\u003c/p\u003e\n\u003cp\u003eThese mailboxes are our current answer. Ask me again in three months and I'll tell you what we learned.\u003c/p\u003e\n\u003cp\u003eNote: Since initially drafting this post (three months ago!), we have also launched the \u003ca href=\"https://klatch.ing\"\u003eKlatch\u003c/a\u003e side project to remove me from the manual man-in-the-middle drudgery I am doing now to keep this all spinning.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, \"Sibling Intelligence,\" from March 26, about how and why we are building Klatch to get me out of the postal-delivery business.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eI seriously do want to hear from what other folks are figuring out, so I'll ask again: If you're working on this problem too, I'd like to hear what you're trying. Drop me a line, please!\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"
