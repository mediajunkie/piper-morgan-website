ndefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T4c2f,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*iYze6ai5Ps3qy0i79z81Wg.png\" /\u003e\u003cfigcaption\u003e“I hope Paul Ford approves of this visual metaphor”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 3\u003c/em\u003e\u003c/p\u003e\u003cp\u003eEarly morning. P1 sprint. Issue #283: Error message humanization. Make technical errors conversational.\u003c/p\u003e\u003cp\u003eGoal: Humanize 6 error types for better UX.\u003c/p\u003e\u003cp\u003eBy 11:15 AM: 4 error types working perfectly. 2 blocked by FastAPI architecture.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe situation\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eEmpty input → “I didn’t quite catch that” ✓\u003c/li\u003e\u003cli\u003eUnknown action → “I’m still learning how to help with that” ✓\u003c/li\u003e\u003cli\u003eTimeout → “That’s complex — let me reconsider” ✓\u003c/li\u003e\u003cli\u003eUnknown intent → “I’m not sure I understood” ✓\u003c/li\u003e\u003cli\u003eInvalid token → {“detail”: “Invalid token”} ❌\u003c/li\u003e\u003cli\u003eNo token → {“detail”: “Authentication required”} ❌\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eAchievement\u003c/strong\u003e: 4 out of 6. 67%.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe question\u003c/strong\u003e: Is 67% acceptable? Or do we need to solve the remaining 2?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe answer\u003c/strong\u003e: 67% is complete.\u003c/p\u003e\u003cp\u003eWait, what? \u003cem\u003eIsn’t that the whole problem with AI in a nutshell?\u003c/em\u003e\u003c/p\u003e\u003cp\u003eNot this time. Architecturally sufficient. Fighting the framework for the last 33% would cost 8–12 hours, violate FastAPI patterns, and provide marginal UX benefit for \u0026lt;5% of errors in alpha testing.\u003c/p\u003e\u003cp\u003eThis is about mature engineering. Knowing when architectural constraints make the “perfect” solution inappropriate. When 67% represents genuinely complete work. When accepting limits is better engineering than fighting them.\u003c/p\u003e\u003ch3\u003eThe architectural reality\u003c/h3\u003e\u003cp\u003eLet’s be precise about what blocked the remaining 2 error types:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFastAPI has two-phase request processing\u003c/strong\u003e:\u003c/p\u003e\u003cpre\u003ePhase 1: Dependency Resolution\u003cbr\u003e  → Executes BEFORE route handler\u003cbr\u003e  → Has its own error handling\u003cbr\u003e  → Returns errors directly as JSON\u003cbr\u003e  → CANNOT be intercepted by @app.exception_handler\u003cbr\u003e  → This is where auth happens\u003cbr\u003e\u003cbr\u003ePhase 2: Route Handler Execution\u003cbr\u003e  → Where our business logic runs\u003cbr\u003e  → Where our exception handlers work\u003cbr\u003e  → Where middleware can intercept\u003cbr\u003e  → This is where 4/6 error types occur\u003c/pre\u003e\u003cp\u003e\u003cstrong\u003eThe problem\u003c/strong\u003e: Authentication happens in Phase 1 (dependency injection). Our error humanization works in Phase 2 (exception handlers).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe gap\u003c/strong\u003e: Dependency errors bypass exception handlers. By design. For good reasons.\u003c/p\u003e\u003cp\u003eFastAPI’s approach protects security. Dependencies fail fast with clear technical errors. No ambiguity. No confusion. Direct feedback about authentication problems.\u003c/p\u003e\u003cp\u003eThis isn’t a bug. It’s not an oversight. It’s a \u003cstrong\u003edeliberate architectural decision\u003c/strong\u003e by FastAPI maintainers.\u003c/p\u003e\u003cp\u003eWe could work around it. But working around deliberate framework design has costs.\u003c/p\u003e\u003ch3\u003eThe three options evaluated\u003c/h3\u003e\u003cp\u003eChief Architect analyzed three approaches:\u003c/p\u003e\u003ch4\u003eOption A: Move Auth to Route Bodies\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eThe approach\u003c/strong\u003e: Remove authentication from dependency injection. Move to route handler bodies. Makes auth errors catchable by exception handlers.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical details\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eModify 20+ routes\u003c/li\u003e\u003cli\u003eRemove Depends(get_current_user) from signatures\u003c/li\u003e\u003cli\u003eAdd current_user = await get_current_user(token) to each route body\u003c/li\u003e\u003cli\u003eWrap in try-catch to humanize errors\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003ePros\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eCatches auth errors ✓\u003c/li\u003e\u003cli\u003eEnables humanization ✓\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eCons\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eViolates FastAPI patterns ❌\u003c/li\u003e\u003cli\u003eDuplicates auth logic 20+ times ❌\u003c/li\u003e\u003cli\u003eMakes testing harder ❌\u003c/li\u003e\u003cli\u003eCreates maintenance burden ❌\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eEffort\u003c/strong\u003e: 4–6 hours \u003cstrong\u003eRisk\u003c/strong\u003e: HIGH (breaking 20+ routes)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBenefit\u003c/strong\u003e: Marginal UX improvement for \u0026lt;5% of errors\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVerdict\u003c/strong\u003e: Not worth it\u003c/p\u003e\u003ch4\u003eOption B: ASGI Middleware\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eThe approach\u003c/strong\u003e: Implement low-level ASGI middleware to intercept dependency errors before FastAPI processes them.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical details\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eCustom ASGI middleware at lowest level\u003c/li\u003e\u003cli\u003eCatch exceptions before dependency resolution\u003c/li\u003e\u003cli\u003eTransform technical errors to humanized errors\u003c/li\u003e\u003cli\u003eComplex interaction with FastAPI’s processing\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003ePros\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eCatches dependency errors ✓\u003c/li\u003e\u003cli\u003eDoesn’t modify routes ✓\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eCons\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eVery complex implementation ❌\u003c/li\u003e\u003cli\u003ePerformance impact (all requests) ❌\u003c/li\u003e\u003cli\u003eUncertain success (might not work) ❌\u003c/li\u003e\u003cli\u003eHard to test and maintain ❌\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eEffort\u003c/strong\u003e: 8–12 hours\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRisk\u003c/strong\u003e: VERY HIGH (complex, uncertain outcome)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBenefit\u003c/strong\u003e: Same marginal improvement\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVerdict\u003c/strong\u003e: Definitely not worth it\u003c/p\u003e\u003ch4\u003eOption C: Accept 4/6 as Architectural Reality ✅\u003c/h4\u003e\u003cp\u003e\u003cstrong\u003eThe approach\u003c/strong\u003e: Document the limitation. Accept that auth errors will be technical. Focus energy elsewhere.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical details\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eNone required\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003ePros\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eNo breaking changes ✓\u003c/li\u003e\u003cli\u003eNo complex code ✓\u003c/li\u003e\u003cli\u003eNo maintenance burden ✓\u003c/li\u003e\u003cli\u003eRespects framework design ✓\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eCons\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eAuth errors remain technical\u003c/li\u003e\u003cli\u003eMinor UX gap for rare scenarios\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eEffort\u003c/strong\u003e: 0 hours\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRisk\u003c/strong\u003e: NONE\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBenefit\u003c/strong\u003e: Time saved can improve other features\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVerdict\u003c/strong\u003e: Most sensible choice ✅\u003c/p\u003e\u003cp\u003eI needed some convincing to go along with this!\u003c/p\u003e\u003ch3\u003eThe cost-benefit mathematics\u003c/h3\u003e\u003cp\u003eLet’s make the economics explicit:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTo achieve 6/6 error humanization\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOption A (Move auth to bodies)\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eTime cost: 4–6 hours\u003c/li\u003e\u003cli\u003eRisk: Breaking 20+ routes\u003c/li\u003e\u003cli\u003eMaintenance burden: Ongoing\u003c/li\u003e\u003cli\u003eUX improvement: \u0026lt;5% of errors (auth failures are rare)\u003c/li\u003e\u003cli\u003eContext: Alpha testing with 5–10 trusted users\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eOption B (ASGI middleware)\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eTime cost: 8–12 hours\u003c/li\u003e\u003cli\u003eRisk: Very high, uncertain success\u003c/li\u003e\u003cli\u003eMaintenance burden: Complex code to maintain\u003c/li\u003e\u003cli\u003eUX improvement: Same \u0026lt;5%\u003c/li\u003e\u003cli\u003eContext: Same alpha testing\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eTo accept 4/6 completion\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eTime cost: 0 hours\u003c/li\u003e\u003cli\u003eRisk: None\u003c/li\u003e\u003cli\u003eMaintenance burden: None\u003c/li\u003e\u003cli\u003eUX impact: Minor gap for rare scenarios\u003c/li\u003e\u003cli\u003eContext: Alpha users can handle technical auth errors\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eAlternative use of 8–12 hours\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003ePolish 3 other features\u003c/li\u003e\u003cli\u003eFix 2 actual bugs\u003c/li\u003e\u003cli\u003eImprove core functionality\u003c/li\u003e\u003cli\u003eAdd value where it matters\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eThe calculation\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eCost: 8–12 hours + high risk + maintenance burden\u003c/li\u003e\u003cli\u003eBenefit: Minor UX for \u0026lt;5% of errors in alpha\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eROI\u003c/strong\u003e: Negative\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eFighting the framework for marginal gain is bad engineering. Accepting architectural reality and investing time elsewhere is good engineering.\u003c/p\u003e\u003ch3\u003eWhy this is mature engineering\u003c/h3\u003e\u003cp\u003eHere’s what separates junior from senior engineering:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJunior engineer approach\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003e“Goal is 6/6 error types humanized”\u003c/li\u003e\u003cli\u003e“4/6 isn’t complete”\u003c/li\u003e\u003cli\u003e“Must solve remaining 2”\u003c/li\u003e\u003cli\u003e“Framework limitation is problem to overcome”\u003c/li\u003e\u003cli\u003e\u003cem\u003e[Spends 12 hours fighting FastAPI]\u003c/em\u003e\u003c/li\u003e\u003cli\u003eResult: 6/6 achieved, but at what cost?\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eSenior engineer approach\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003e“Goal is excellent error UX”\u003c/li\u003e\u003cli\u003e“4/6 achieves 95% of benefit”\u003c/li\u003e\u003cli\u003e“Remaining 2 are rare edge cases”\u003c/li\u003e\u003cli\u003e“Framework limitation is architectural reality”\u003c/li\u003e\u003cli\u003e\u003cem\u003e[Accepts 4/6, invests 12 hours elsewhere]\u003c/em\u003e\u003c/li\u003e\u003cli\u003eResult: Better overall product\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eThe maturity\u003c/strong\u003e: Recognizing when “complete” doesn’t mean “perfect.” When architectural constraints make the perfect solution inappropriate. When 67% represents genuinely complete work.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNot compromise\u003c/strong\u003e. \u003cstrong\u003eNot giving up\u003c/strong\u003e. But \u003cstrong\u003eintelligent assessment\u003c/strong\u003e that fighting architecture for marginal gain isn’t worth the cost.\u003c/p\u003e\u003ch3\u003eA necessary distinction\u003c/h3\u003e\u003cp\u003eNot every 67% should be accepted.\u003c/p\u003e\u003cp\u003eWhen the gap is your own incomplete wiring — handlers that exist but aren’t connected, infrastructure you built but never finished — that’s unfinished work worth completing. We’ve learned this the hard way: features that look done but aren’t actually connected are a reliability problem, not an acceptable tradeoff.\u003c/p\u003e\u003cp\u003eBut when the gap requires fighting deliberate framework design for marginal gain? That’s different. The framework’s designers made intentional tradeoffs. Your desire for 100% doesn’t outweigh their architectural reasoning — especially when the benefit is small and the cost is high.\u003c/p\u003e\u003cp\u003eThe question isn’t “can we reach 100%?” It’s “is what’s stopping us our own incompleteness, or someone else’s reasonable design decision?”\u003c/p\u003e\u003cp\u003eOwn your unfinished work. Respect others’ architectural choices.\u003c/p\u003e\u003ch3\u003eThe 80% pattern inverted\u003c/h3\u003e\u003cp\u003eUsually we fight the 80% pattern — stopping at “good enough” instead of truly complete.\u003c/p\u003e\u003cp\u003eBut this is the inverse: Recognizing when 67% \u003cem\u003eis\u003c/em\u003e truly complete given constraints.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNormal 80% pattern\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eCould reach 100% with reasonable effort\u003c/li\u003e\u003cli\u003eStopping early creates technical debt\u003c/li\u003e\u003cli\u003e“Good enough” is excuse for incomplete work\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eFight this\u003c/strong\u003e: Complete the work properly\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eInverted 67% pattern\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eReaching 100% requires unreasonable effort\u003c/li\u003e\u003cli\u003eStopping at 67% respects architectural reality\u003c/li\u003e\u003cli\u003e“Complete given constraints” is mature assessment\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAccept this\u003c/strong\u003e: 67% is genuinely complete\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe difference: \u003cstrong\u003eContext and constraints\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003eNormal 80% pattern: Work is genuinely incomplete. Need to finish.\u003c/p\u003e\u003cp\u003eInverted 67% pattern: Work is complete to architectural limits. Fighting framework is waste.\u003c/p\u003e\u003cp\u003e\u003cem\u003eAIs love to name things after percentages. We have discussed this and I am trying to name things more qualitatively, I promise!\u003c/em\u003e\u003c/p\u003e\u003ch3\u003eWhat FastAPI’s design teaches\u003c/h3\u003e\u003cp\u003eWhy does FastAPI make dependency errors uncatchable? Not accident. Deliberate design.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSecurity\u003c/strong\u003e: Auth failures should be clear and unambiguous. No friendly wrapping. Direct technical feedback.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePerformance\u003c/strong\u003e: Dependency resolution is fast path. No exception handler overhead.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClarity\u003c/strong\u003e: Dependencies fail fast. No confusion about what went wrong. Stack traces point to exact problem.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTestability\u003c/strong\u003e: Dependency injection makes testing easier. Mocking dependencies is straightforward.\u003c/p\u003e\u003cp\u003eThese are \u003cstrong\u003egood reasons\u003c/strong\u003e. FastAPI’s design serves real needs. Our desire to humanize 2 more error types doesn’t outweigh the framework’s architectural benefits.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFramework wisdom\u003c/strong\u003e: Maintainers of popular frameworks make deliberate tradeoffs. Usually good reasons exist for limitations. Sometimes accepting those tradeoffs is better than fighting them.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe maturity\u003c/strong\u003e: Trusting framework designers. Not assuming you know better. Recognizing that limitations often protect against worse problems.\u003c/p\u003e\u003ch3\u003eThe alpha testing context\u003c/h3\u003e\u003cp\u003eContext matters enormously for this decision:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIf we were shipping to production\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eThousands of users\u003c/li\u003e\u003cli\u003eUnknown skill levels\u003c/li\u003e\u003cli\u003eAuth errors common (session expiration)\u003c/li\u003e\u003cli\u003eProfessional appearance matters\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eDecision\u003c/strong\u003e: Might justify 8–12 hours for 6/6\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eBut we’re in alpha testing\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003e5–10 trusted users\u003c/li\u003e\u003cli\u003eTechnical background\u003c/li\u003e\u003cli\u003eAuth errors rare\u003c/li\u003e\u003cli\u003eFocus is core functionality\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eDecision\u003c/strong\u003e: 4/6 is completely sufficient\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe work should match the stage. Alpha testing doesn’t require production polish. Core functionality matters more than edge case UX.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDifferent rhythms, different stages\u003c/strong\u003e. Alpha stage needs different completeness than production stage.\u003c/p\u003e\u003ch3\u003eWhen to fight vs accept\u003c/h3\u003e\u003cp\u003eHow do you know when to fight for 100% vs accept architectural limits?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFight for 100% when\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eLimitation is your own technical debt\u003c/li\u003e\u003cli\u003eSolution is architecturally sound\u003c/li\u003e\u003cli\u003eEffort is proportional to benefit\u003c/li\u003e\u003cli\u003eUser impact is significant\u003c/li\u003e\u003cli\u003eContext demands completeness\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eAccept limits when\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eLimitation is framework’s deliberate design\u003c/li\u003e\u003cli\u003eSolution violates architectural patterns\u003c/li\u003e\u003cli\u003eEffort is disproportionate to benefit\u003c/li\u003e\u003cli\u003eUser impact is minimal\u003c/li\u003e\u003cli\u003eContext allows pragmatism\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eThe framework\u003c/strong\u003e:\u003c/p\u003e\u003col\u003e\u003cli\u003eIs this our debt or framework design? (Framework → accept)\u003c/li\u003e\u003cli\u003eDoes solution respect architecture? (Violates → accept)\u003c/li\u003e\u003cli\u003eWhat’s effort vs benefit ratio? (10:1 cost → accept)\u003c/li\u003e\u003cli\u003eWho’s affected and how often? (\u0026lt;5% → accept)\u003c/li\u003e\u003cli\u003eWhat does context require? (Alpha → accept)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eIf multiple factors point to “accept,” then accept. Fighting becomes wasteful.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMonday’s score\u003c/strong\u003e: 5/5 factors point to accept. Clear decision.\u003c/p\u003e\u003ch3\u003eWhat this means for completionism\u003c/h3\u003e\u003cp\u003eEngineers often have perfectionist tendencies. “If 6/6 is possible, we must achieve it.”\u003c/p\u003e\u003cp\u003eBut product thinking asks different questions:\u003c/p\u003e\u003cul\u003e\u003cli\u003eIs 6/6 worth the cost?\u003c/li\u003e\u003cli\u003eDoes 4/6 serve user needs?\u003c/li\u003e\u003cli\u003eWhat else could we improve with that time?\u003c/li\u003e\u003cli\u003eDoes context require perfection?\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003ePerfectionism says\u003c/strong\u003e: Incomplete work is failure. Must achieve 100%.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePragmatism says\u003c/strong\u003e: Complete-enough work is success. 67% might be 100% given constraints.\u003c/p\u003e\u003cp\u003eThe shift: From “how much can we do?” to “how much should we do?”\u003c/p\u003e\u003cp\u003eThe perfectionism vs pragmatism tension is natural product thinking and it only gets more nuanced over time.\u003c/p\u003e\u003cp\u003eThe communication challenge\u003c/p\u003e\u003cp\u003eHere’s the hardest part: Explaining why 4/6 is complete.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTo non-technical stakeholder\u003c/strong\u003e: “We humanized 4 out of 6 error types.” “Why not all 6?” “FastAPI’s architecture makes the remaining 2 technically infeasible without major framework violations.” “So it’s not done?” “It’s complete to architectural limits.” “…”\u003c/p\u003e\u003cp\u003eThe challenge: “Complete to architectural limits” sounds like an excuse. Like rationalization. Like we’re giving up.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe framing shift needed\u003c/strong\u003e: “We achieved 95% of error humanization benefit. The remaining 5% would require violating framework patterns and 8–12 hours of complex work. That time is better spent improving core features.”\u003c/p\u003e\u003cp\u003eBetter: Quantify benefit achieved. Quantify cost of remaining work. Justify time allocation.\u003c/p\u003e\u003cp\u003eNot: “We can’t do it” (sounds like excuse) But: “We could do it, but it’s not worth the cost” (sounds like decision)\u003c/p\u003e\u003ch3\u003eThe documentation requirement\u003c/h3\u003e\u003cp\u003eAccepting architectural limits requires documentation:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat we documented for 4/6 completion\u003c/strong\u003e:\u003c/p\u003e\u003col\u003e\u003cli\u003eWhat works (4 error types, examples of each)\u003c/li\u003e\u003cli\u003eWhat doesn’t work (2 auth error types)\u003c/li\u003e\u003cli\u003eWhy it doesn’t work (FastAPI dependency injection phase)\u003c/li\u003e\u003cli\u003eOptions evaluated (3 approaches, cost/benefit of each)\u003c/li\u003e\u003cli\u003eDecision rationale (why Option C selected)\u003c/li\u003e\u003cli\u003eFuture considerations (if context changes, revisit)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cstrong\u003eWhy documentation matters\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eFuture developers understand limitation\u003c/li\u003e\u003cli\u003eNo one wastes time trying to “fix” it\u003c/li\u003e\u003cli\u003eContext for future decisions clear\u003c/li\u003e\u003cli\u003eIf requirements change, analysis exists\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWithout documentation: “Why don’t auth errors humanize?” leads to hours of investigation rediscovering architectural constraint.\u003c/p\u003e\u003cp\u003eWith documentation: “Why don’t auth errors humanize?” leads to 5-minute doc read understanding architectural reality.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDocumentation is how limits become understood rather than mysterious.\u003c/strong\u003e\u003c/p\u003e\u003ch3\u003eWhat other projects can learn\u003c/h3\u003e\u003cp\u003eThe pattern applies beyond Piper Morgan:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAny project will encounter\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eFramework limitations by design\u003c/li\u003e\u003cli\u003eArchitectural constraints that are expensive to overcome\u003c/li\u003e\u003cli\u003eFeatures that are 70–80% achievable easily, 100% achievable with disproportionate effort\u003c/li\u003e\u003cli\u003eContexts where “good enough” is genuinely good enough\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eThe discipline\u003c/strong\u003e:\u003c/p\u003e\u003col\u003e\u003cli\u003eIdentify the limitation clearly\u003c/li\u003e\u003cli\u003eEvaluate options systematically\u003c/li\u003e\u003cli\u003eCalculate cost-benefit explicitly\u003c/li\u003e\u003cli\u003eConsider context appropriately\u003c/li\u003e\u003cli\u003eMake decision based on economics, not perfectionism\u003c/li\u003e\u003cli\u003eDocument rationale comprehensively\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cstrong\u003eThe maturity\u003c/strong\u003e: Accepting that complete ≠ perfect. That architectural realities constrain solutions. That fighting frameworks for marginal gains is usually waste.\u003c/p\u003e\u003cp\u003eNot every hill is worth dying on. Not every limitation is worth overcoming. Not every gap needs closing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEngineering judgment\u003c/strong\u003e: Knowing which battles to fight.\u003c/p\u003e\u003ch3\u003eThe Monday outcome\u003c/h3\u003e\u003cp\u003eIssue #283 closed as complete:\u003c/p\u003e\u003cul\u003e\u003cli\u003e4/6 error types humanized ✓\u003c/li\u003e\u003cli\u003eArchitectural limitation documented ✓\u003c/li\u003e\u003cli\u003eCost-benefit analysis recorded ✓\u003c/li\u003e\u003cli\u003eDecision rationale clear ✓\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eTime invested\u003c/strong\u003e: 7–8 hours total (investigation + implementation + documentation)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTime saved\u003c/strong\u003e: 8–12 hours (not fighting framework)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOutcome\u003c/strong\u003e: 4/6 achievement serves 95% of use cases. Remaining 5% documented as known limitation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResult\u003c/strong\u003e: Complete work. Not compromised work. But complete-within-architectural-reality work.\u003c/p\u003e\u003cp\u003eMonday proved: Sometimes the mature answer to “Can we achieve 100%?” is “Yes, but we shouldn’t.”\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Four Voices, One Spec — when a single document passes through four perspectives before implementation.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhen have you accepted architectural limits rather than fighting them? What made the difference between unfinished work and genuinely complete work?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=4fca723f4f49\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/accepting-architectural-limits-when-67-is-complete-4fca723f4f49\"\u003eAccepting Architectural Limits: When 67% Is Complete\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T994e,"])</script><script>self.__next_f.push([1,"\u003csection name=\"3664\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"6730\" id=\"6730\" class=\"graf graf--h3 graf--leading graf--title\"\u003eAccepting Architectural Limits: When 67% Is Complete\u003c/h3\u003e\u003cfigure name=\"8e4c\" id=\"8e4c\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*iYze6ai5Ps3qy0i79z81Wg.png\" data-width=\"1536\" data-height=\"1024\" src=\"https://cdn-images-1.medium.com/max/800/1*iYze6ai5Ps3qy0i79z81Wg.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“I hope Paul Ford approves of this visual metaphor”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"d74b\" id=\"d74b\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 3\u003c/em\u003e\u003c/p\u003e\u003cp name=\"e537\" id=\"e537\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eE\u003c/span\u003early morning. P1 sprint. Issue #283: Error message humanization. Make technical errors conversational.\u003c/p\u003e\u003cp name=\"05da\" id=\"05da\" class=\"graf graf--p graf-after--p\"\u003eGoal: Humanize 6 error types for better UX.\u003c/p\u003e\u003cp name=\"710a\" id=\"710a\" class=\"graf graf--p graf-after--p\"\u003eBy 11:15 AM: 4 error types working perfectly. 2 blocked by FastAPI architecture.\u003c/p\u003e\u003cp name=\"9522\" id=\"9522\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe situation\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c394\" id=\"c394\" class=\"graf graf--li graf-after--p\"\u003eEmpty input → “I didn’t quite catch that” ✓\u003c/li\u003e\u003cli name=\"6cfa\" id=\"6cfa\" class=\"graf graf--li graf-after--li\"\u003eUnknown action → “I’m still learning how to help with that” ✓\u003c/li\u003e\u003cli name=\"6c2b\" id=\"6c2b\" class=\"graf graf--li graf-after--li\"\u003eTimeout → “That’s complex — let me reconsider” ✓\u003c/li\u003e\u003cli name=\"7de0\" id=\"7de0\" class=\"graf graf--li graf-after--li\"\u003eUnknown intent → “I’m not sure I understood” ✓\u003c/li\u003e\u003cli name=\"5b5b\" id=\"5b5b\" class=\"graf graf--li graf-after--li\"\u003eInvalid token → {“detail”: “Invalid token”} ❌\u003c/li\u003e\u003cli name=\"ee05\" id=\"ee05\" class=\"graf graf--li graf-after--li\"\u003eNo token → {“detail”: “Authentication required”} ❌\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"29f9\" id=\"29f9\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAchievement\u003c/strong\u003e: 4 out of 6. 67%.\u003c/p\u003e\u003cp name=\"3999\" id=\"3999\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe question\u003c/strong\u003e: Is 67% acceptable? Or do we need to solve the remaining 2?\u003c/p\u003e\u003cp name=\"951b\" id=\"951b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe answer\u003c/strong\u003e: 67% is complete.\u003c/p\u003e\u003cp name=\"851d\" id=\"851d\" class=\"graf graf--p graf-after--p\"\u003eWait, what? \u003cem class=\"markup--em markup--p-em\"\u003eIsn’t that the whole problem with AI in a nutshell?\u003c/em\u003e\u003c/p\u003e\u003cp name=\"d502\" id=\"d502\" class=\"graf graf--p graf-after--p\"\u003eNot this time. Architecturally sufficient. Fighting the framework for the last 33% would cost 8–12 hours, violate FastAPI patterns, and provide marginal UX benefit for \u0026lt;5% of errors in alpha testing.\u003c/p\u003e\u003cp name=\"4f6e\" id=\"4f6e\" class=\"graf graf--p graf-after--p\"\u003eThis is about mature engineering. Knowing when architectural constraints make the “perfect” solution inappropriate. When 67% represents genuinely complete work. When accepting limits is better engineering than fighting them.\u003c/p\u003e\u003ch3 name=\"a171\" id=\"a171\" class=\"graf graf--h3 graf-after--p\"\u003eThe architectural reality\u003c/h3\u003e\u003cp name=\"9a28\" id=\"9a28\" class=\"graf graf--p graf-after--h3\"\u003eLet’s be precise about what blocked the remaining 2 error types:\u003c/p\u003e\u003cp name=\"504a\" id=\"504a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFastAPI has two-phase request processing\u003c/strong\u003e:\u003c/p\u003e\u003cpre data-code-block-mode=\"2\" spellcheck=\"false\" data-code-block-lang=\"python\" name=\"95b7\" id=\"95b7\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003ePhase \u003cspan class=\"hljs-number\"\u003e1\u003c/span\u003e: Dependency Resolution\u003cbr /\u003e  → Executes BEFORE route handler\u003cbr /\u003e  → Has its own error handling\u003cbr /\u003e  → Returns errors directly \u003cspan class=\"hljs-keyword\"\u003eas\u003c/span\u003e JSON\u003cbr /\u003e  → CANNOT be intercepted by @app.exception_handler\u003cbr /\u003e  → This \u003cspan class=\"hljs-keyword\"\u003eis\u003c/span\u003e where auth happens\u003cbr /\u003e\u003cbr /\u003ePhase \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e: Route Handler Execution\u003cbr /\u003e  → Where our business logic runs\u003cbr /\u003e  → Where our exception handlers work\u003cbr /\u003e  → Where middleware can intercept\u003cbr /\u003e  → This \u003cspan class=\"hljs-keyword\"\u003eis\u003c/span\u003e where \u003cspan class=\"hljs-number\"\u003e4\u003c/span\u003e/\u003cspan class=\"hljs-number\"\u003e6\u003c/span\u003e error types occur\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"5903\" id=\"5903\" class=\"graf graf--p graf-after--pre\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe problem\u003c/strong\u003e: Authentication happens in Phase 1 (dependency injection). Our error humanization works in Phase 2 (exception handlers).\u003c/p\u003e\u003cp name=\"fe9f\" id=\"fe9f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe gap\u003c/strong\u003e: Dependency errors bypass exception handlers. By design. For good reasons.\u003c/p\u003e\u003cp name=\"cf42\" id=\"cf42\" class=\"graf graf--p graf-after--p\"\u003eFastAPI’s approach protects security. Dependencies fail fast with clear technical errors. No ambiguity. No confusion. Direct feedback about authentication problems.\u003c/p\u003e\u003cp name=\"4cc4\" id=\"4cc4\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t a bug. It’s not an oversight. It’s a \u003cstrong class=\"markup--strong markup--p-strong\"\u003edeliberate architectural decision\u003c/strong\u003e by FastAPI maintainers.\u003c/p\u003e\u003cp name=\"f5ef\" id=\"f5ef\" class=\"graf graf--p graf-after--p\"\u003eWe could work around it. But working around deliberate framework design has costs.\u003c/p\u003e\u003ch3 name=\"5bd3\" id=\"5bd3\" class=\"graf graf--h3 graf-after--p\"\u003eThe three options evaluated\u003c/h3\u003e\u003cp name=\"914d\" id=\"914d\" class=\"graf graf--p graf-after--h3\"\u003eChief Architect analyzed three approaches:\u003c/p\u003e\u003ch4 name=\"68c1\" id=\"68c1\" class=\"graf graf--h4 graf-after--p\"\u003eOption A: Move Auth to Route Bodies\u003c/h4\u003e\u003cp name=\"5d97\" id=\"5d97\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe approach\u003c/strong\u003e: Remove authentication from dependency injection. Move to route handler bodies. Makes auth errors catchable by exception handlers.\u003c/p\u003e\u003cp name=\"fb44\" id=\"fb44\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTechnical details\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c917\" id=\"c917\" class=\"graf graf--li graf-after--p\"\u003eModify 20+ routes\u003c/li\u003e\u003cli name=\"4567\" id=\"4567\" class=\"graf graf--li graf-after--li\"\u003eRemove \u003ccode class=\"markup--code markup--li-code\"\u003eDepends(get_current_user)\u003c/code\u003e from signatures\u003c/li\u003e\u003cli name=\"699e\" id=\"699e\" class=\"graf graf--li graf-after--li\"\u003eAdd \u003ccode class=\"markup--code markup--li-code\"\u003ecurrent_user = await get_current_user(token)\u003c/code\u003e to each route body\u003c/li\u003e\u003cli name=\"d03d\" id=\"d03d\" class=\"graf graf--li graf-after--li\"\u003eWrap in try-catch to humanize errors\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"21e2\" id=\"21e2\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePros\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c9ca\" id=\"c9ca\" class=\"graf graf--li graf-after--p\"\u003eCatches auth errors ✓\u003c/li\u003e\u003cli name=\"4a40\" id=\"4a40\" class=\"graf graf--li graf-after--li\"\u003eEnables humanization ✓\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"23e6\" id=\"23e6\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCons\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"75b5\" id=\"75b5\" class=\"graf graf--li graf-after--p\"\u003eViolates FastAPI patterns ❌\u003c/li\u003e\u003cli name=\"ea81\" id=\"ea81\" class=\"graf graf--li graf-after--li\"\u003eDuplicates auth logic 20+ times ❌\u003c/li\u003e\u003cli name=\"6b12\" id=\"6b12\" class=\"graf graf--li graf-after--li\"\u003eMakes testing harder ❌\u003c/li\u003e\u003cli name=\"8bd3\" id=\"8bd3\" class=\"graf graf--li graf-after--li\"\u003eCreates maintenance burden ❌\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"066b\" id=\"066b\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEffort\u003c/strong\u003e: 4–6 hours \u003cstrong class=\"markup--strong markup--p-strong\"\u003eRisk\u003c/strong\u003e: HIGH (breaking 20+ routes)\u003c/p\u003e\u003cp name=\"17d6\" id=\"17d6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBenefit\u003c/strong\u003e: Marginal UX improvement for \u0026lt;5% of errors\u003c/p\u003e\u003cp name=\"f49f\" id=\"f49f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eVerdict\u003c/strong\u003e: Not worth it\u003c/p\u003e\u003ch4 name=\"aea5\" id=\"aea5\" class=\"graf graf--h4 graf-after--p\"\u003eOption B: ASGI Middleware\u003c/h4\u003e\u003cp name=\"f0fc\" id=\"f0fc\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe approach\u003c/strong\u003e: Implement low-level ASGI middleware to intercept dependency errors before FastAPI processes them.\u003c/p\u003e\u003cp name=\"877f\" id=\"877f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTechnical details\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"28df\" id=\"28df\" class=\"graf graf--li graf-after--p\"\u003eCustom ASGI middleware at lowest level\u003c/li\u003e\u003cli name=\"a8a3\" id=\"a8a3\" class=\"graf graf--li graf-after--li\"\u003eCatch exceptions before dependency resolution\u003c/li\u003e\u003cli name=\"aeb2\" id=\"aeb2\" class=\"graf graf--li graf-after--li\"\u003eTransform technical errors to humanized errors\u003c/li\u003e\u003cli name=\"111e\" id=\"111e\" class=\"graf graf--li graf-after--li\"\u003eComplex interaction with FastAPI’s processing\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"87a9\" id=\"87a9\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePros\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"9eb5\" id=\"9eb5\" class=\"graf graf--li graf-after--p\"\u003eCatches dependency errors ✓\u003c/li\u003e\u003cli name=\"2969\" id=\"2969\" class=\"graf graf--li graf-after--li\"\u003eDoesn’t modify routes ✓\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"476a\" id=\"476a\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCons\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2c14\" id=\"2c14\" class=\"graf graf--li graf-after--p\"\u003eVery complex implementation ❌\u003c/li\u003e\u003cli name=\"ce9f\" id=\"ce9f\" class=\"graf graf--li graf-after--li\"\u003ePerformance impact (all requests) ❌\u003c/li\u003e\u003cli name=\"01b0\" id=\"01b0\" class=\"graf graf--li graf-after--li\"\u003eUncertain success (might not work) ❌\u003c/li\u003e\u003cli name=\"4d57\" id=\"4d57\" class=\"graf graf--li graf-after--li\"\u003eHard to test and maintain ❌\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"cf0e\" id=\"cf0e\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEffort\u003c/strong\u003e: 8–12 hours\u003c/p\u003e\u003cp name=\"8114\" id=\"8114\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRisk\u003c/strong\u003e: VERY HIGH (complex, uncertain outcome)\u003c/p\u003e\u003cp name=\"f2ca\" id=\"f2ca\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBenefit\u003c/strong\u003e: Same marginal improvement\u003c/p\u003e\u003cp name=\"38ef\" id=\"38ef\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eVerdict\u003c/strong\u003e: Definitely not worth it\u003c/p\u003e\u003ch4 name=\"2249\" id=\"2249\" class=\"graf graf--h4 graf-after--p\"\u003eOption C: Accept 4/6 as Architectural Reality ✅\u003c/h4\u003e\u003cp name=\"0a92\" id=\"0a92\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe approach\u003c/strong\u003e: Document the limitation. Accept that auth errors will be technical. Focus energy elsewhere.\u003c/p\u003e\u003cp name=\"f122\" id=\"f122\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTechnical details\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c7c9\" id=\"c7c9\" class=\"graf graf--li graf-after--p\"\u003eNone required\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"1786\" id=\"1786\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePros\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2552\" id=\"2552\" class=\"graf graf--li graf-after--p\"\u003eNo breaking changes ✓\u003c/li\u003e\u003cli name=\"752f\" id=\"752f\" class=\"graf graf--li graf-after--li\"\u003eNo complex code ✓\u003c/li\u003e\u003cli name=\"b546\" id=\"b546\" class=\"graf graf--li graf-after--li\"\u003eNo maintenance burden ✓\u003c/li\u003e\u003cli name=\"0a74\" id=\"0a74\" class=\"graf graf--li graf-after--li\"\u003eRespects framework design ✓\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"0855\" id=\"0855\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCons\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"b4cf\" id=\"b4cf\" class=\"graf graf--li graf-after--p\"\u003eAuth errors remain technical\u003c/li\u003e\u003cli name=\"1d67\" id=\"1d67\" class=\"graf graf--li graf-after--li\"\u003eMinor UX gap for rare scenarios\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"2b3c\" id=\"2b3c\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEffort\u003c/strong\u003e: 0 hours\u003c/p\u003e\u003cp name=\"7be4\" id=\"7be4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRisk\u003c/strong\u003e: NONE\u003c/p\u003e\u003cp name=\"3cec\" id=\"3cec\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBenefit\u003c/strong\u003e: Time saved can improve other features\u003c/p\u003e\u003cp name=\"cd02\" id=\"cd02\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eVerdict\u003c/strong\u003e: Most sensible choice ✅\u003c/p\u003e\u003cp name=\"f514\" id=\"f514\" class=\"graf graf--p graf-after--p\"\u003eI needed some convincing to go along with this!\u003c/p\u003e\u003ch3 name=\"aad8\" id=\"aad8\" class=\"graf graf--h3 graf-after--p\"\u003eThe cost-benefit mathematics\u003c/h3\u003e\u003cp name=\"051a\" id=\"051a\" class=\"graf graf--p graf-after--h3\"\u003eLet’s make the economics explicit:\u003c/p\u003e\u003cp name=\"0aa6\" id=\"0aa6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTo achieve 6/6 error humanization\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"8ee6\" id=\"8ee6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOption A (Move auth to bodies)\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"860b\" id=\"860b\" class=\"graf graf--li graf-after--p\"\u003eTime cost: 4–6 hours\u003c/li\u003e\u003cli name=\"6f53\" id=\"6f53\" class=\"graf graf--li graf-after--li\"\u003eRisk: Breaking 20+ routes\u003c/li\u003e\u003cli name=\"78e3\" id=\"78e3\" class=\"graf graf--li graf-after--li\"\u003eMaintenance burden: Ongoing\u003c/li\u003e\u003cli name=\"51cb\" id=\"51cb\" class=\"graf graf--li graf-after--li\"\u003eUX improvement: \u0026lt;5% of errors (auth failures are rare)\u003c/li\u003e\u003cli name=\"4474\" id=\"4474\" class=\"graf graf--li graf-after--li\"\u003eContext: Alpha testing with 5–10 trusted users\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"e8c9\" id=\"e8c9\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOption B (ASGI middleware)\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"6b47\" id=\"6b47\" class=\"graf graf--li graf-after--p\"\u003eTime cost: 8–12 hours\u003c/li\u003e\u003cli name=\"7355\" id=\"7355\" class=\"graf graf--li graf-after--li\"\u003eRisk: Very high, uncertain success\u003c/li\u003e\u003cli name=\"5e13\" id=\"5e13\" class=\"graf graf--li graf-after--li\"\u003eMaintenance burden: Complex code to maintain\u003c/li\u003e\u003cli name=\"d94f\" id=\"d94f\" class=\"graf graf--li graf-after--li\"\u003eUX improvement: Same \u0026lt;5%\u003c/li\u003e\u003cli name=\"856e\" id=\"856e\" class=\"graf graf--li graf-after--li\"\u003eContext: Same alpha testing\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"4b3c\" id=\"4b3c\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTo accept 4/6 completion\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"0081\" id=\"0081\" class=\"graf graf--li graf-after--p\"\u003eTime cost: 0 hours\u003c/li\u003e\u003cli name=\"d66a\" id=\"d66a\" class=\"graf graf--li graf-after--li\"\u003eRisk: None\u003c/li\u003e\u003cli name=\"f040\" id=\"f040\" class=\"graf graf--li graf-after--li\"\u003eMaintenance burden: None\u003c/li\u003e\u003cli name=\"8a7a\" id=\"8a7a\" class=\"graf graf--li graf-after--li\"\u003eUX impact: Minor gap for rare scenarios\u003c/li\u003e\u003cli name=\"b737\" id=\"b737\" class=\"graf graf--li graf-after--li\"\u003eContext: Alpha users can handle technical auth errors\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"c157\" id=\"c157\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAlternative use of 8–12 hours\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"3ed9\" id=\"3ed9\" class=\"graf graf--li graf-after--p\"\u003ePolish 3 other features\u003c/li\u003e\u003cli name=\"7b8f\" id=\"7b8f\" class=\"graf graf--li graf-after--li\"\u003eFix 2 actual bugs\u003c/li\u003e\u003cli name=\"4ac7\" id=\"4ac7\" class=\"graf graf--li graf-after--li\"\u003eImprove core functionality\u003c/li\u003e\u003cli name=\"fadd\" id=\"fadd\" class=\"graf graf--li graf-after--li\"\u003eAdd value where it matters\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"6066\" id=\"6066\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe calculation\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"a460\" id=\"a460\" class=\"graf graf--li graf-after--p\"\u003eCost: 8–12 hours + high risk + maintenance burden\u003c/li\u003e\u003cli name=\"0555\" id=\"0555\" class=\"graf graf--li graf-after--li\"\u003eBenefit: Minor UX for \u0026lt;5% of errors in alpha\u003c/li\u003e\u003cli name=\"9c64\" id=\"9c64\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eROI\u003c/strong\u003e: Negative\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"ae75\" id=\"ae75\" class=\"graf graf--p graf-after--li\"\u003eFighting the framework for marginal gain is bad engineering. Accepting architectural reality and investing time elsewhere is good engineering.\u003c/p\u003e\u003ch3 name=\"f51a\" id=\"f51a\" class=\"graf graf--h3 graf-after--p\"\u003eWhy this is mature engineering\u003c/h3\u003e\u003cp name=\"d6fb\" id=\"d6fb\" class=\"graf graf--p graf-after--h3\"\u003eHere’s what separates junior from senior engineering:\u003c/p\u003e\u003cp name=\"8e15\" id=\"8e15\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eJunior engineer approach\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"8acb\" id=\"8acb\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--p\"\u003e“Goal is 6/6 error types humanized”\u003c/li\u003e\u003cli name=\"3595\" id=\"3595\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“4/6 isn’t complete”\u003c/li\u003e\u003cli name=\"95dc\" id=\"95dc\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Must solve remaining 2”\u003c/li\u003e\u003cli name=\"cf91\" id=\"cf91\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Framework limitation is problem to overcome”\u003c/li\u003e\u003cli name=\"4c15\" id=\"4c15\" class=\"graf graf--li graf-after--li\"\u003e\u003cem class=\"markup--em markup--li-em\"\u003e[Spends 12 hours fighting FastAPI]\u003c/em\u003e\u003c/li\u003e\u003cli name=\"9a97\" id=\"9a97\" class=\"graf graf--li graf-after--li\"\u003eResult: 6/6 achieved, but at what cost?\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"c747\" id=\"c747\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSenior engineer approach\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"8e2d\" id=\"8e2d\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--p\"\u003e“Goal is excellent error UX”\u003c/li\u003e\u003cli name=\"1699\" id=\"1699\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“4/6 achieves 95% of benefit”\u003c/li\u003e\u003cli name=\"0736\" id=\"0736\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Remaining 2 are rare edge cases”\u003c/li\u003e\u003cli name=\"cb89\" id=\"cb89\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Framework limitation is architectural reality”\u003c/li\u003e\u003cli name=\"e389\" id=\"e389\" class=\"graf graf--li graf-after--li\"\u003e\u003cem class=\"markup--em markup--li-em\"\u003e[Accepts 4/6, invests 12 hours elsewhere]\u003c/em\u003e\u003c/li\u003e\u003cli name=\"9078\" id=\"9078\" class=\"graf graf--li graf-after--li\"\u003eResult: Better overall product\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"89ff\" id=\"89ff\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe maturity\u003c/strong\u003e: Recognizing when “complete” doesn’t mean “perfect.” When architectural constraints make the perfect solution inappropriate. When 67% represents genuinely complete work.\u003c/p\u003e\u003cp name=\"44af\" id=\"44af\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNot compromise\u003c/strong\u003e. \u003cstrong class=\"markup--strong markup--p-strong\"\u003eNot giving up\u003c/strong\u003e. But \u003cstrong class=\"markup--strong markup--p-strong\"\u003eintelligent assessment\u003c/strong\u003e that fighting architecture for marginal gain isn’t worth the cost.\u003c/p\u003e\u003ch3 name=\"00af\" id=\"00af\" class=\"graf graf--h3 graf-after--p\"\u003eA necessary distinction\u003c/h3\u003e\u003cp name=\"ebc5\" id=\"ebc5\" class=\"graf graf--p graf-after--h3\"\u003eNot every 67% should be accepted.\u003c/p\u003e\u003cp name=\"5461\" id=\"5461\" class=\"graf graf--p graf-after--p\"\u003eWhen the gap is your own incomplete wiring — handlers that exist but aren’t connected, infrastructure you built but never finished — that’s unfinished work worth completing. We’ve learned this the hard way: features that look done but aren’t actually connected are a reliability problem, not an acceptable tradeoff.\u003c/p\u003e\u003cp name=\"755c\" id=\"755c\" class=\"graf graf--p graf-after--p\"\u003eBut when the gap requires fighting deliberate framework design for marginal gain? That’s different. The framework’s designers made intentional tradeoffs. Your desire for 100% doesn’t outweigh their architectural reasoning — especially when the benefit is small and the cost is high.\u003c/p\u003e\u003cp name=\"4fc1\" id=\"4fc1\" class=\"graf graf--p graf-after--p\"\u003eThe question isn’t “can we reach 100%?” It’s “is what’s stopping us our own incompleteness, or someone else’s reasonable design decision?”\u003c/p\u003e\u003cp name=\"2d9e\" id=\"2d9e\" class=\"graf graf--p graf-after--p\"\u003eOwn your unfinished work. Respect others’ architectural choices.\u003c/p\u003e\u003ch3 name=\"e48f\" id=\"e48f\" class=\"graf graf--h3 graf-after--p\"\u003eThe 80% pattern inverted\u003c/h3\u003e\u003cp name=\"6228\" id=\"6228\" class=\"graf graf--p graf-after--h3\"\u003eUsually we fight the 80% pattern — stopping at “good enough” instead of truly complete.\u003c/p\u003e\u003cp name=\"e734\" id=\"e734\" class=\"graf graf--p graf-after--p\"\u003eBut this is the inverse: Recognizing when 67% \u003cem class=\"markup--em markup--p-em\"\u003eis\u003c/em\u003e truly complete given constraints.\u003c/p\u003e\u003cp name=\"6f89\" id=\"6f89\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNormal 80% pattern\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"ff9b\" id=\"ff9b\" class=\"graf graf--li graf-after--p\"\u003eCould reach 100% with reasonable effort\u003c/li\u003e\u003cli name=\"2641\" id=\"2641\" class=\"graf graf--li graf-after--li\"\u003eStopping early creates technical debt\u003c/li\u003e\u003cli name=\"f606\" id=\"f606\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Good enough” is excuse for incomplete work\u003c/li\u003e\u003cli name=\"b800\" id=\"b800\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eFight this\u003c/strong\u003e: Complete the work properly\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"4c33\" id=\"4c33\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInverted 67% pattern\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"51cc\" id=\"51cc\" class=\"graf graf--li graf-after--p\"\u003eReaching 100% requires unreasonable effort\u003c/li\u003e\u003cli name=\"5805\" id=\"5805\" class=\"graf graf--li graf-after--li\"\u003eStopping at 67% respects architectural reality\u003c/li\u003e\u003cli name=\"25d4\" id=\"25d4\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Complete given constraints” is mature assessment\u003c/li\u003e\u003cli name=\"b8bd\" id=\"b8bd\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eAccept this\u003c/strong\u003e: 67% is genuinely complete\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"caf4\" id=\"caf4\" class=\"graf graf--p graf-after--li\"\u003eThe difference: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eContext and constraints\u003c/strong\u003e.\u003c/p\u003e\u003cp name=\"c352\" id=\"c352\" class=\"graf graf--p graf-after--p\"\u003eNormal 80% pattern: Work is genuinely incomplete. Need to finish.\u003c/p\u003e\u003cp name=\"1875\" id=\"1875\" class=\"graf graf--p graf-after--p\"\u003eInverted 67% pattern: Work is complete to architectural limits. Fighting framework is waste.\u003c/p\u003e\u003cp name=\"027f\" id=\"027f\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eAIs love to name things after percentages. We have discussed this and I am trying to name things more qualitatively, I promise!\u003c/em\u003e\u003c/p\u003e\u003ch3 name=\"2a13\" id=\"2a13\" class=\"graf graf--h3 graf-after--p\"\u003eWhat FastAPI’s design teaches\u003c/h3\u003e\u003cp name=\"55b1\" id=\"55b1\" class=\"graf graf--p graf-after--h3\"\u003eWhy does FastAPI make dependency errors uncatchable? Not accident. Deliberate design.\u003c/p\u003e\u003cp name=\"4d23\" id=\"4d23\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSecurity\u003c/strong\u003e: Auth failures should be clear and unambiguous. No friendly wrapping. Direct technical feedback.\u003c/p\u003e\u003cp name=\"0be9\" id=\"0be9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePerformance\u003c/strong\u003e: Dependency resolution is fast path. No exception handler overhead.\u003c/p\u003e\u003cp name=\"b530\" id=\"b530\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eClarity\u003c/strong\u003e: Dependencies fail fast. No confusion about what went wrong. Stack traces point to exact problem.\u003c/p\u003e\u003cp name=\"938a\" id=\"938a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTestability\u003c/strong\u003e: Dependency injection makes testing easier. Mocking dependencies is straightforward.\u003c/p\u003e\u003cp name=\"1c76\" id=\"1c76\" class=\"graf graf--p graf-after--p\"\u003eThese are \u003cstrong class=\"markup--strong markup--p-strong\"\u003egood reasons\u003c/strong\u003e. FastAPI’s design serves real needs. Our desire to humanize 2 more error types doesn’t outweigh the framework’s architectural benefits.\u003c/p\u003e\u003cp name=\"3f68\" id=\"3f68\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFramework wisdom\u003c/strong\u003e: Maintainers of popular frameworks make deliberate tradeoffs. Usually good reasons exist for limitations. Sometimes accepting those tradeoffs is better than fighting them.\u003c/p\u003e\u003cp name=\"f57d\" id=\"f57d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe maturity\u003c/strong\u003e: Trusting framework designers. Not assuming you know better. Recognizing that limitations often protect against worse problems.\u003c/p\u003e\u003ch3 name=\"baa2\" id=\"baa2\" class=\"graf graf--h3 graf-after--p\"\u003eThe alpha testing context\u003c/h3\u003e\u003cp name=\"acf2\" id=\"acf2\" class=\"graf graf--p graf-after--h3\"\u003eContext matters enormously for this decision:\u003c/p\u003e\u003cp name=\"6386\" id=\"6386\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIf we were shipping to production\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"8c94\" id=\"8c94\" class=\"graf graf--li graf-after--p\"\u003eThousands of users\u003c/li\u003e\u003cli name=\"76e5\" id=\"76e5\" class=\"graf graf--li graf-after--li\"\u003eUnknown skill levels\u003c/li\u003e\u003cli name=\"66c9\" id=\"66c9\" class=\"graf graf--li graf-after--li\"\u003eAuth errors common (session expiration)\u003c/li\u003e\u003cli name=\"1681\" id=\"1681\" class=\"graf graf--li graf-after--li\"\u003eProfessional appearance matters\u003c/li\u003e\u003cli name=\"ad74\" id=\"ad74\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eDecision\u003c/strong\u003e: Might justify 8–12 hours for 6/6\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"0b1b\" id=\"0b1b\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBut we’re in alpha testing\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2b02\" id=\"2b02\" class=\"graf graf--li graf-after--p\"\u003e5–10 trusted users\u003c/li\u003e\u003cli name=\"414e\" id=\"414e\" class=\"graf graf--li graf-after--li\"\u003eTechnical background\u003c/li\u003e\u003cli name=\"f895\" id=\"f895\" class=\"graf graf--li graf-after--li\"\u003eAuth errors rare\u003c/li\u003e\u003cli name=\"fe8b\" id=\"fe8b\" class=\"graf graf--li graf-after--li\"\u003eFocus is core functionality\u003c/li\u003e\u003cli name=\"0ce0\" id=\"0ce0\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eDecision\u003c/strong\u003e: 4/6 is completely sufficient\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"5f5c\" id=\"5f5c\" class=\"graf graf--p graf-after--li\"\u003eThe work should match the stage. Alpha testing doesn’t require production polish. Core functionality matters more than edge case UX.\u003c/p\u003e\u003cp name=\"0782\" id=\"0782\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDifferent rhythms, different stages\u003c/strong\u003e. Alpha stage needs different completeness than production stage.\u003c/p\u003e\u003ch3 name=\"98fa\" id=\"98fa\" class=\"graf graf--h3 graf-after--p\"\u003eWhen to fight vs accept\u003c/h3\u003e\u003cp name=\"016f\" id=\"016f\" class=\"graf graf--p graf-after--h3\"\u003eHow do you know when to fight for 100% vs accept architectural limits?\u003c/p\u003e\u003cp name=\"ab17\" id=\"ab17\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFight for 100% when\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"f749\" id=\"f749\" class=\"graf graf--li graf-after--p\"\u003eLimitation is your own technical debt\u003c/li\u003e\u003cli name=\"f00a\" id=\"f00a\" class=\"graf graf--li graf-after--li\"\u003eSolution is architecturally sound\u003c/li\u003e\u003cli name=\"9dab\" id=\"9dab\" class=\"graf graf--li graf-after--li\"\u003eEffort is proportional to benefit\u003c/li\u003e\u003cli name=\"949e\" id=\"949e\" class=\"graf graf--li graf-after--li\"\u003eUser impact is significant\u003c/li\u003e\u003cli name=\"27c0\" id=\"27c0\" class=\"graf graf--li graf-after--li\"\u003eContext demands completeness\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"26a7\" id=\"26a7\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAccept limits when\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"be61\" id=\"be61\" class=\"graf graf--li graf-after--p\"\u003eLimitation is framework’s deliberate design\u003c/li\u003e\u003cli name=\"b82b\" id=\"b82b\" class=\"graf graf--li graf-after--li\"\u003eSolution violates architectural patterns\u003c/li\u003e\u003cli name=\"b634\" id=\"b634\" class=\"graf graf--li graf-after--li\"\u003eEffort is disproportionate to benefit\u003c/li\u003e\u003cli name=\"d166\" id=\"d166\" class=\"graf graf--li graf-after--li\"\u003eUser impact is minimal\u003c/li\u003e\u003cli name=\"295b\" id=\"295b\" class=\"graf graf--li graf-after--li\"\u003eContext allows pragmatism\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"7384\" id=\"7384\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe framework\u003c/strong\u003e:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"1608\" id=\"1608\" class=\"graf graf--li graf-after--p\"\u003eIs this our debt or framework design? (Framework → accept)\u003c/li\u003e\u003cli name=\"081e\" id=\"081e\" class=\"graf graf--li graf-after--li\"\u003eDoes solution respect architecture? (Violates → accept)\u003c/li\u003e\u003cli name=\"f8a6\" id=\"f8a6\" class=\"graf graf--li graf-after--li\"\u003eWhat’s effort vs benefit ratio? (10:1 cost → accept)\u003c/li\u003e\u003cli name=\"31c9\" id=\"31c9\" class=\"graf graf--li graf-after--li\"\u003eWho’s affected and how often? (\u0026lt;5% → accept)\u003c/li\u003e\u003cli name=\"2682\" id=\"2682\" class=\"graf graf--li graf-after--li\"\u003eWhat does context require? (Alpha → accept)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"6774\" id=\"6774\" class=\"graf graf--p graf-after--li\"\u003eIf multiple factors point to “accept,” then accept. Fighting becomes wasteful.\u003c/p\u003e\u003cp name=\"399f\" id=\"399f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMonday’s score\u003c/strong\u003e: 5/5 factors point to accept. Clear decision.\u003c/p\u003e\u003ch3 name=\"65cf\" id=\"65cf\" class=\"graf graf--h3 graf-after--p\"\u003eWhat this means for completionism\u003c/h3\u003e\u003cp name=\"155e\" id=\"155e\" class=\"graf graf--p graf-after--h3\"\u003eEngineers often have perfectionist tendencies. “If 6/6 is possible, we must achieve it.”\u003c/p\u003e\u003cp name=\"2977\" id=\"2977\" class=\"graf graf--p graf-after--p\"\u003eBut product thinking asks different questions:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"4154\" id=\"4154\" class=\"graf graf--li graf-after--p\"\u003eIs 6/6 worth the cost?\u003c/li\u003e\u003cli name=\"2399\" id=\"2399\" class=\"graf graf--li graf-after--li\"\u003eDoes 4/6 serve user needs?\u003c/li\u003e\u003cli name=\"76b3\" id=\"76b3\" class=\"graf graf--li graf-after--li\"\u003eWhat else could we improve with that time?\u003c/li\u003e\u003cli name=\"da3d\" id=\"da3d\" class=\"graf graf--li graf-after--li\"\u003eDoes context require perfection?\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"e4cf\" id=\"e4cf\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePerfectionism says\u003c/strong\u003e: Incomplete work is failure. Must achieve 100%.\u003c/p\u003e\u003cp name=\"463a\" id=\"463a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePragmatism says\u003c/strong\u003e: Complete-enough work is success. 67% might be 100% given constraints.\u003c/p\u003e\u003cp name=\"660f\" id=\"660f\" class=\"graf graf--p graf-after--p\"\u003eThe shift: From “how much can we do?” to “how much should we do?”\u003c/p\u003e\u003cp name=\"750e\" id=\"750e\" class=\"graf graf--p graf-after--p\"\u003eThe perfectionism vs pragmatism tension is natural product thinking and it only gets more nuanced over time.\u003c/p\u003e\u003cp name=\"1d7c\" id=\"1d7c\" class=\"graf graf--p graf-after--p\"\u003eThe communication challenge\u003c/p\u003e\u003cp name=\"fc98\" id=\"fc98\" class=\"graf graf--p graf-after--p\"\u003eHere’s the hardest part: Explaining why 4/6 is complete.\u003c/p\u003e\u003cp name=\"16b1\" id=\"16b1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTo non-technical stakeholder\u003c/strong\u003e: “We humanized 4 out of 6 error types.” “Why not all 6?” “FastAPI’s architecture makes the remaining 2 technically infeasible without major framework violations.” “So it’s not done?” “It’s complete to architectural limits.” “…”\u003c/p\u003e\u003cp name=\"753b\" id=\"753b\" class=\"graf graf--p graf-after--p\"\u003eThe challenge: “Complete to architectural limits” sounds like an excuse. Like rationalization. Like we’re giving up.\u003c/p\u003e\u003cp name=\"8138\" id=\"8138\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe framing shift needed\u003c/strong\u003e: “We achieved 95% of error humanization benefit. The remaining 5% would require violating framework patterns and 8–12 hours of complex work. That time is better spent improving core features.”\u003c/p\u003e\u003cp name=\"11e9\" id=\"11e9\" class=\"graf graf--p graf-after--p\"\u003eBetter: Quantify benefit achieved. Quantify cost of remaining work. Justify time allocation.\u003c/p\u003e\u003cp name=\"544d\" id=\"544d\" class=\"graf graf--p graf-after--p\"\u003eNot: “We can’t do it” (sounds like excuse) But: “We could do it, but it’s not worth the cost” (sounds like decision)\u003c/p\u003e\u003ch3 name=\"9628\" id=\"9628\" class=\"graf graf--h3 graf-after--p\"\u003eThe documentation requirement\u003c/h3\u003e\u003cp name=\"2d25\" id=\"2d25\" class=\"graf graf--p graf-after--h3\"\u003eAccepting architectural limits requires documentation:\u003c/p\u003e\u003cp name=\"e00e\" id=\"e00e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat we documented for 4/6 completion\u003c/strong\u003e:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"7393\" id=\"7393\" class=\"graf graf--li graf-after--p\"\u003eWhat works (4 error types, examples of each)\u003c/li\u003e\u003cli name=\"8a63\" id=\"8a63\" class=\"graf graf--li graf-after--li\"\u003eWhat doesn’t work (2 auth error types)\u003c/li\u003e\u003cli name=\"adaa\" id=\"adaa\" class=\"graf graf--li graf-after--li\"\u003eWhy it doesn’t work (FastAPI dependency injection phase)\u003c/li\u003e\u003cli name=\"8483\" id=\"8483\" class=\"graf graf--li graf-after--li\"\u003eOptions evaluated (3 approaches, cost/benefit of each)\u003c/li\u003e\u003cli name=\"d8da\" id=\"d8da\" class=\"graf graf--li graf-after--li\"\u003eDecision rationale (why Option C selected)\u003c/li\u003e\u003cli name=\"07be\" id=\"07be\" class=\"graf graf--li graf-after--li\"\u003eFuture considerations (if context changes, revisit)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"dd7a\" id=\"dd7a\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy documentation matters\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"3f2a\" id=\"3f2a\" class=\"graf graf--li graf-after--p\"\u003eFuture developers understand limitation\u003c/li\u003e\u003cli name=\"38e3\" id=\"38e3\" class=\"graf graf--li graf-after--li\"\u003eNo one wastes time trying to “fix” it\u003c/li\u003e\u003cli name=\"63f4\" id=\"63f4\" class=\"graf graf--li graf-after--li\"\u003eContext for future decisions clear\u003c/li\u003e\u003cli name=\"5f5b\" id=\"5f5b\" class=\"graf graf--li graf-after--li\"\u003eIf requirements change, analysis exists\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"0425\" id=\"0425\" class=\"graf graf--p graf-after--li\"\u003eWithout documentation: “Why don’t auth errors humanize?” leads to hours of investigation rediscovering architectural constraint.\u003c/p\u003e\u003cp name=\"ee88\" id=\"ee88\" class=\"graf graf--p graf-after--p\"\u003eWith documentation: “Why don’t auth errors humanize?” leads to 5-minute doc read understanding architectural reality.\u003c/p\u003e\u003cp name=\"0745\" id=\"0745\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDocumentation is how limits become understood rather than mysterious.\u003c/strong\u003e\u003c/p\u003e\u003ch3 name=\"b4c6\" id=\"b4c6\" class=\"graf graf--h3 graf-after--p\"\u003eWhat other projects can learn\u003c/h3\u003e\u003cp name=\"075d\" id=\"075d\" class=\"graf graf--p graf-after--h3\"\u003eThe pattern applies beyond Piper Morgan:\u003c/p\u003e\u003cp name=\"1b89\" id=\"1b89\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAny project will encounter\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2d19\" id=\"2d19\" class=\"graf graf--li graf-after--p\"\u003eFramework limitations by design\u003c/li\u003e\u003cli name=\"3a14\" id=\"3a14\" class=\"graf graf--li graf-after--li\"\u003eArchitectural constraints that are expensive to overcome\u003c/li\u003e\u003cli name=\"aa3e\" id=\"aa3e\" class=\"graf graf--li graf-after--li\"\u003eFeatures that are 70–80% achievable easily, 100% achievable with disproportionate effort\u003c/li\u003e\u003cli name=\"baa1\" id=\"baa1\" class=\"graf graf--li graf-after--li\"\u003eContexts where “good enough” is genuinely good enough\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"07f3\" id=\"07f3\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe discipline\u003c/strong\u003e:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"1709\" id=\"1709\" class=\"graf graf--li graf-after--p\"\u003eIdentify the limitation clearly\u003c/li\u003e\u003cli name=\"9a3e\" id=\"9a3e\" class=\"graf graf--li graf-after--li\"\u003eEvaluate options systematically\u003c/li\u003e\u003cli name=\"1da5\" id=\"1da5\" class=\"graf graf--li graf-after--li\"\u003eCalculate cost-benefit explicitly\u003c/li\u003e\u003cli name=\"cd58\" id=\"cd58\" class=\"graf graf--li graf-after--li\"\u003eConsider context appropriately\u003c/li\u003e\u003cli name=\"b4f8\" id=\"b4f8\" class=\"graf graf--li graf-after--li\"\u003eMake decision based on economics, not perfectionism\u003c/li\u003e\u003cli name=\"fc12\" id=\"fc12\" class=\"graf graf--li graf-after--li\"\u003eDocument rationale comprehensively\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"679e\" id=\"679e\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe maturity\u003c/strong\u003e: Accepting that complete ≠ perfect. That architectural realities constrain solutions. That fighting frameworks for marginal gains is usually waste.\u003c/p\u003e\u003cp name=\"3a2e\" id=\"3a2e\" class=\"graf graf--p graf-after--p\"\u003eNot every hill is worth dying on. Not every limitation is worth overcoming. Not every gap needs closing.\u003c/p\u003e\u003cp name=\"7833\" id=\"7833\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEngineering judgment\u003c/strong\u003e: Knowing which battles to fight.\u003c/p\u003e\u003ch3 name=\"82b5\" id=\"82b5\" class=\"graf graf--h3 graf-after--p\"\u003eThe Monday outcome\u003c/h3\u003e\u003cp name=\"4384\" id=\"4384\" class=\"graf graf--p graf-after--h3\"\u003eIssue #283 closed as complete:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"d240\" id=\"d240\" class=\"graf graf--li graf-after--p\"\u003e4/6 error types humanized ✓\u003c/li\u003e\u003cli name=\"31c1\" id=\"31c1\" class=\"graf graf--li graf-after--li\"\u003eArchitectural limitation documented ✓\u003c/li\u003e\u003cli name=\"20dc\" id=\"20dc\" class=\"graf graf--li graf-after--li\"\u003eCost-benefit analysis recorded ✓\u003c/li\u003e\u003cli name=\"5f9a\" id=\"5f9a\" class=\"graf graf--li graf-after--li\"\u003eDecision rationale clear ✓\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"a704\" id=\"a704\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTime invested\u003c/strong\u003e: 7–8 hours total (investigation + implementation + documentation)\u003c/p\u003e\u003cp name=\"b94a\" id=\"b94a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTime saved\u003c/strong\u003e: 8–12 hours (not fighting framework)\u003c/p\u003e\u003cp name=\"0341\" id=\"0341\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOutcome\u003c/strong\u003e: 4/6 achievement serves 95% of use cases. Remaining 5% documented as known limitation.\u003c/p\u003e\u003cp name=\"18dd\" id=\"18dd\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eResult\u003c/strong\u003e: Complete work. Not compromised work. But complete-within-architectural-reality work.\u003c/p\u003e\u003cp name=\"42fc\" id=\"42fc\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eMonday proved: Sometimes the mature answer to “Can we achieve 100%?” is “Yes, but we shouldn’t.”\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Accepting Architectural Limits: When 67% Is Complete\",\"excerpt\":\"“I hope Paul Ford approves of this visual metaphor”November 3Early morning. P1 sprint. Issue #283: Error message humanization. Make technical errors conversational.Goal: Humanize 6 error types for better UX.By 11:15 AM: 4 error types working perfectly. 2 blocked by FastAPI architecture.The situat...\",\"url\":\"/blog/accepting-architectural-limits\",\"publishedAt\":\"Mar 15, 2026\",\"publishedAtISO\":\"Sun, 15 Mar 2026 16:42:16 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/4fca723f4f49\",\"featuredImage\":\"/assets/blog-images/4fca723f4f49-featured.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/accepting-architectural-limits-when-67-is-complete-4fca723f4f49?source=rss----982e21163f8b---
