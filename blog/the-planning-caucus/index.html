$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T20c7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eJanuary 19\u003c/em\u003e\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"An open-source project lead runs a planning meeting with three robot advisors — design, product vision, and architecture — each contributing their perspective.\" src=\"https://cdn-images-1.medium.com/max/1024/1*PNGmdE7LmymCRl8Ln_3v_A.png\" /\u003e\u003cfigcaption\u003e“OK, here’s the plan!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eOne issue. Four meetings. A single subagent. 101 tests by end of day. That’s the shape of January 19th — the day we launched the MUX (modeled UX) track with what I’m now calling a “planning caucus”: a deliberate sequence of specialized consultations before any code was written.\u003c/p\u003e\u003ch3\u003eImplementing our objet model\u003c/h3\u003e\u003cp\u003eIssue #399: MUX Object Model Implementation isn’t a bug fix or a quick feature. This was foundational work — turning our conceptual object model (“Entities experience Moments in Places”) into actual running code. Eight months of thinking were about to become infrastructure.\u003c/p\u003e\u003cp\u003eThe risk of getting it wrong was high. The cost of rework would be weeks, not hours. So instead of diving straight into implementation, I tried something different.\u003c/p\u003e\u003ch3\u003eThe caucus\u003c/h3\u003e\u003cp\u003eI scheduled four planning sessions, each with a different specialist agent.\u003c/p\u003e\u003cp\u003eFirst the CXO tackled the first question: What does “experience” actually mean in our grammar? The design philosophy that emerged centered on three principles: awareness not data (entities perceive, they don’t just store), atmosphere not contents (places have character, not just items), and weight not sequence (some moments matter more than order). The key insight was that “experience” is the verb that needs the most attention — it’s what makes Piper Morgan different from a database with a chat interface.\u003c/p\u003e\u003cp\u003eNext the Principal PM addressed the second question: How do we translate design into implementation phases? The PPM took the CXO’s philosophy and turned it into actionable guidance. They added Phase 4.5 for canonical query tagging with lens mapping, revised the estimate from 20 to 31–32 hours, established success metrics at three tiers, and assigned Pattern-051 to the Lead Developer. The key insight: “Cathedral work, not velocity work — 40 hours done right beats 20 hours flattened.”\u003c/p\u003e\u003cp\u003eThen the Chief Architect provided technical direction. Use Protocols for role fluidity, not inheritance. Build lenses on the existing 8-dimensional spatial framework. Treat Situation as context manager, not data model. Cross-reference ADR-054 for persistence boundaries. The key insight: the infrastructure we need already partially exists — build on it, don’t rebuild it.\u003c/p\u003e\u003cp\u003eBy midday, the Lead Developer had absorbed all the guidance and begun execution. An hour later, seven child issues were spec’d (#612-#618). On return two hours after that, Phase 0 investigation was complete. By 4:20 PM, a subagent was deployed for Phase 1.\u003c/p\u003e\u003ch3\u003eThe subagent\u003c/h3\u003e\u003cp\u003eHere’s where it gets interesting.\u003c/p\u003e\u003cp\u003eThe subagent deployed at 4:20 PM completed Phase 1 in 15 minutes. Not 15 hours. \u003cstrong\u003e\u003cem\u003eFifteen minutes.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDelivered: 15 source files (protocols, situations, perception models), 8 lens implementations, 17 test files, and 101 passing tests. All template requirements met.\u003c/p\u003e\u003cp\u003eHow is that possible?\u003c/p\u003e\u003cp\u003eBecause by the time the subagent started, every decision had already been made. The design philosophy was clear. The implementation pattern was specified. The success criteria were defined. The architectural constraints were documented.\u003c/p\u003e\u003cp\u003eThe subagent’s job wasn’t to figure anything out. It was to execute a precisely specified plan.\u003c/p\u003e\u003cp\u003eThis was possibly when I started realizing how far I’d come from vibe coding eight months ago.\u003c/p\u003e\u003ch3\u003eWhy this worked\u003c/h3\u003e\u003cp\u003eI’ve run plenty of sessions where I go straight to the Lead Developer with “Here’s the issue, figure it out.” Sometimes that works. Often it doesn’t — there’s thrashing, rework, architectural drift, and the creeping suspicion that we’re building the wrong thing.\u003c/p\u003e\u003cp\u003eThe planning caucus inverted that pattern. The old way goes implementation, then discovery, then correction, then more implementation. The caucus way goes discovery, then alignment, then specification, then implementation.\u003c/p\u003e\u003cp\u003eThe four meetings took about 3 hours of total clocktime. The actual implementation (once we started) took 15 minutes for P1. Even accounting for P0 investigation time, the total time to working code was faster than “just start building” would have been.\u003c/p\u003e\u003cp\u003eMore importantly, the confidence was higher. We weren’t hoping the implementation was right. We knew it was right because we’d validated the approach from three different angles before writing a single line of production code.\u003c/p\u003e\u003ch3\u003eThe structure\u003c/h3\u003e\u003cp\u003eFor future reference, here’s the caucus structure that worked. The CXO goes first with “What does this mean?” and outputs design principles. The PPM goes second with “How do we phase this?” and outputs implementation guidance. The Architect goes third with “What pattern do we use?” and outputs technical direction. The Lead Developer goes fourth to execute, outputting decomposition and deployment.\u003c/p\u003e\u003cp\u003eEach agent has a distinct lens. The CXO brings user experience and design philosophy. The PPM brings product priorities and success criteria. The Architect brings technical patterns and infrastructure. The Lead Developer brings execution and coordination.\u003c/p\u003e\u003cp\u003eDesign philosophy informs product phases. Product phases inform technical patterns. Technical patterns inform execution. Reversing the order leads to solutions looking for problems.\u003c/p\u003e\u003cp\u003eThe sequence helps but it’s really a facilitated discussion, not a linear shot. It can iterate or go back and forth. I’m mostly just the messenger although of course I put my spin on things and I am the source of all the original ideas.\u003c/p\u003e\u003ch3\u003eWhen to use it\u003c/h3\u003e\u003cp\u003eThe planning caucus is probably overkill for bug fixes, small features, well-understood domains, and time-sensitive work.\u003c/p\u003e\u003cp\u003eIt’s valuable for foundational infrastructure, work that will be hard to change later, domains where the team has different mental models, and anything where “getting it right” matters more than “getting it done.”\u003c/p\u003e\u003cp\u003eThe MUX object model qualified on all four counts. We’ll be building on this foundation for months. A few hours of alignment now prevents weeks of rework later.\u003c/p\u003e\u003ch3\u003eThe unspoken part\u003c/h3\u003e\u003cp\u003eI should admit something: I was prepared to facilitate back-and-forth. Disagreements between agents. Clarification requests. Maybe even a second round of consultations.\u003c/p\u003e\u003cp\u003eNone of that happened.\u003c/p\u003e\u003cp\u003eEach agent took the previous memos seriously, built on them, and added their layer. The CXO didn’t contradict the existing object model work. The PPM didn’t override the design philosophy. The Architect didn’t ignore the product guidance.\u003c/p\u003e\u003cp\u003eI expected a bit more friction between the lenses, to be honest (and at times we do get disagreements that strengthen the results on resolution) but the fundamental design work we documented so well in December provided a smooth path forward once fully absorbed and applied.\u003c/p\u003e\u003cp\u003eI don’t know if that’s because the structured sequence forced coherence, or because we got lucky, or because the agents are better at synthesis than I expected. But the result was a planning session that felt less like a meeting and more like a relay race — each runner handing off the baton cleanly, the final runner crossing the finish line.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The CLAUDE.md paradox, when we discovered that less can be more during work on January 22 and 23.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever tried sequencing specialist consultations before implementation? What order worked for you?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=3a30fdc2ab51\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-planning-caucus-3a30fdc2ab51\"\u003eThe Planning Caucus\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T2995,"])</script><script>self.__next_f.push([1,"\u003csection name=\"16d2\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"5a13\" id=\"5a13\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Planning Caucus\u003c/h3\u003e\u003cp name=\"8129\" id=\"8129\" class=\"graf graf--p graf-after--h3\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eJanuary 19\u003c/em\u003e\u003c/p\u003e\u003cfigure name=\"300f\" id=\"300f\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*PNGmdE7LmymCRl8Ln_3v_A.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"An open-source project lead runs a planning meeting with three robot advisors — design, product vision, and architecture — each contributing their perspective.\" src=\"https://cdn-images-1.medium.com/max/800/1*PNGmdE7LmymCRl8Ln_3v_A.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“OK, here’s the plan!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"abeb\" id=\"abeb\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--figure\"\u003e\u003cspan class=\"graf-dropCap\"\u003eO\u003c/span\u003ene issue. Four meetings. A single subagent. 101 tests by end of day. That’s the shape of January 19th — the day we launched the MUX ( nto actionable guidance. They added Phase 4.5 for canonical query tagging with lens mapping, revised the estimate from 20 to 31–32 hours, established success metrics at three tiers, and assigned Pattern-051 to the Lead Developer. The key insight: “Cathedral work, not velocity work — 40 hours done right beats 20 hours flattened.”\u003c/p\u003e\u003cp name=\"4af1\" id=\"4af1\" class=\"graf graf--p graf-after--p\"\u003eThen the Chief Architect provided technical direction. Use Protocols for role fluidity, not inheritance. Build lenses on the existing 8-dimensional spatial framework. Treat Situation as context manager, not data model. Cross-reference ADR-054 for persistence boundaries. The key insight: the infrastructure we need already partially exists — build on it, don’t rebuild it.\u003c/p\u003e\u003cp name=\"53fc\" id=\"53fc\" class=\"graf graf--p graf-after--p\"\u003eBy midday, the Lead Developer had absorbed all the guidance and begun execution. An hour later, seven child issues were spec’d (#612-#618). On return two hours after that, Phase 0 investigation was complete. By 4:20 PM, a subagent was deployed for Phase 1.\u003c/p\u003e\u003ch3 name=\"6849\" id=\"6849\" class=\"graf graf--h3 graf-after--p\"\u003eThe subagent\u003c/h3\u003e\u003cp name=\"a6ff\" id=\"a6ff\" class=\"graf graf--p graf-after--h3\"\u003eHere’s where it gets interesting.\u003c/p\u003e\u003cp name=\"d705\" id=\"d705\" class=\"graf graf--p graf-after--p\"\u003eThe subagent deployed at 4:20 PM completed Phase 1 in 15 minutes. Not 15 hours. \u003cstrong class=\"markup--strong markup--p-strong\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eFifteen minutes.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"0175\" id=\"0175\" class=\"graf graf--p graf-after--p\"\u003eDelivered: 15 source files (protocols, situations, perception models), 8 lens implementations, 17 test files, and 101 passing tests. All template requirements met.\u003c/p\u003e\u003cp name=\"96a0\" id=\"96a0\" class=\"graf graf--p graf-after--p\"\u003eHow is that possible?\u003c/p\u003e\u003cp name=\"e0a2\" id=\"e0a2\" class=\"graf graf--p graf-after--p\"\u003eBecause by the time the subagent started, every decision had already been made. The design philosophy was clear. The implementation pattern was specified. The success criteria were defined. The architectural constraints were documented.\u003c/p\u003e\u003cp name=\"3054\" id=\"3054\" class=\"graf graf--p graf-after--p\"\u003eThe subagent’s job wasn’t to figure anything out. It was to execute a precisely specified plan.\u003c/p\u003e\u003cp name=\"dca8\" id=\"dca8\" class=\"graf graf--p graf-after--p\"\u003eThis was possibly when I started realizing how far I’d come from vibe coding eight months ago.\u003c/p\u003e\u003ch3 name=\"2021\" id=\"2021\" class=\"graf graf--h3 graf-after--p\"\u003eWhy this worked\u003c/h3\u003e\u003cp name=\"98a7\" id=\"98a7\" class=\"graf graf--p graf-after--h3\"\u003eI’ve run plenty of sessions where I go straight to the Lead Developer with “Here’s the issue, figure it out.” Sometimes that works. Often it doesn’t — there’s thrashing, rework, architectural drift, and the creeping suspicion that we’re building the wrong thing.\u003c/p\u003e\u003cp name=\"0713\" id=\"0713\" class=\"graf graf--p graf-after--p\"\u003eThe planning caucus inverted that pattern. The old way goes implementation, then discovery, then correction, then more implementation. The caucus way goes discovery, then alignment, then specification, then implementation.\u003c/p\u003e\u003cp name=\"da9f\" id=\"da9f\" class=\"graf graf--p graf-after--p\"\u003eThe four meetings took about 3 hours of total clocktime. The actual implementation (once we started) took 15 minutes for P1. Even accounting for P0 investigation time, the total time to working code was faster than “just start building” would have been.\u003c/p\u003e\u003cp name=\"b929\" id=\"b929\" class=\"graf graf--p graf-after--p\"\u003eMore importantly, the confidence was higher. We weren’t hoping the implementation was right. We knew it was right because we’d validated the approach from three different angles before writing a single line of production code.\u003c/p\u003e\u003ch3 name=\"63d4\" id=\"63d4\" class=\"graf graf--h3 graf-after--p\"\u003eThe structure\u003c/h3\u003e\u003cp name=\"d0d0\" id=\"d0d0\" class=\"graf graf--p graf-after--h3\"\u003eFor future reference, here’s the caucus structure that worked. The CXO goes first with “What does this mean?” and outputs design principles. The PPM goes second with “How do we phase this?” and outputs implementation guidance. The Architect goes third with “What pattern do we use?” and outputs technical direction. The Lead Developer goes fourth to execute, outputting decomposition and deployment.\u003c/p\u003e\u003cp name=\"61b0\" id=\"61b0\" class=\"graf graf--p graf-after--p\"\u003eEach agent has a distinct lens. The CXO brings user experience and design philosophy. The PPM brings product priorities and success criteria. The Architect brings technical patterns and infrastructure. The Lead Developer brings execution and coordination.\u003c/p\u003e\u003cp name=\"fc53\" id=\"fc53\" class=\"graf graf--p graf-after--p\"\u003eDesign philosophy informs product phases. Product phases inform technical patterns. Technical patterns inform execution. Reversing the order leads to solutions looking for problems.\u003c/p\u003e\u003cp name=\"1740\" id=\"1740\" class=\"graf graf--p graf-after--p\"\u003eThe sequence helps but it’s really a facilitated discussion, not a linear shot. It can iterate or go back and forth. I’m mostly just the messenger although of course I put my spin on things and I am the source of all the original ideas.\u003c/p\u003e\u003ch3 name=\"0502\" id=\"0502\" class=\"graf graf--h3 graf-after--p\"\u003eWhen to use it\u003c/h3\u003e\u003cp name=\"00db\" id=\"00db\" class=\"graf graf--p graf-after--h3\"\u003eThe planning caucus is probably overkill for bug fixes, small features, well-understood domains, and time-sensitive work.\u003c/p\u003e\u003cp name=\"8416\" id=\"8416\" class=\"graf graf--p graf-after--p\"\u003eIt’s valuable for foundational infrastructure, work that will be hard to change later, domains where the team has different mental models, and anything where “getting it right” matters more than “getting it done.”\u003c/p\u003e\u003cp name=\"08ad\" id=\"08ad\" class=\"graf graf--p graf-after--p\"\u003eThe MUX object model qualified on all four counts. We’ll be building on this foundation for months. A few hours of alignment now prevents weeks of rework later.\u003c/p\u003e\u003ch3 name=\"28fc\" id=\"28fc\" class=\"graf graf--h3 graf-after--p\"\u003eThe unspoken part\u003c/h3\u003e\u003cp name=\"824b\" id=\"824b\" class=\"graf graf--p graf-after--h3\"\u003eI should admit something: I was prepared to facilitate back-and-forth. Disagreements between agents. Clarification requests. Maybe even a second round of consultations.\u003c/p\u003e\u003cp name=\"e0a5\" id=\"e0a5\" class=\"graf graf--p graf-after--p\"\u003eNone of that happened.\u003c/p\u003e\u003cp name=\"f48f\" id=\"f48f\" class=\"graf graf--p graf-after--p\"\u003eEach agent took the previous memos seriously, built on them, and added their layer. The CXO didn’t contradict the existing object model work. The PPM didn’t override the design philosophy. The Architect didn’t ignore the product guidance.\u003c/p\u003e\u003cp name=\"7903\" id=\"7903\" class=\"graf graf--p graf-after--p\"\u003eI expected a bit more friction between the lenses, to be honest (and at times we do get disagreements that strengthen the results on resolution) but the fundamental design work we documented so well in December provided a smooth path forward once fully absorbed and applied.\u003c/p\u003e\u003cp name=\"45fc\" id=\"45fc\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eI don’t know if that’s because the structured sequence forced coherence, or because we got lucky, or because the agents are better at synthesis than I expected. But the result was a planning session that felt less like a meeting and more like a relay race — each runner handing off the baton cleanly, the final runner crossing the finish line.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Planning Caucus\",\"excerpt\":\"January 19“OK, here’s the plan!”One issue. Four meetings. A single subagent. 101 tests by end of day. That’s the shape of January 19th — the day we launched the MUX (modeled UX) track with what I’m now calling a “planning caucus”: a deliberate sequence of specialized consultations before any code...\",\"url\":\"/blog/the-planning-caucus\",\"publishedAt\":\"Jan 28, 2026\",\"publishedAtISO\":\"Wed, 28 Jan 2026 15:36:39 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/3a30fdc2ab51\",\"featuredImage\":\"https://cdn-images-1.medium.com/max/1024/1*PNGmdE7LmymCRl8Ln_3v_A.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-planning-caucus-3a30fdc2ab51?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-planning-caucus\",\"workDate\":\"Jan 28, 2026\",\"workDateISO\":\"2026-01-28T00:00:00.000Z\",\"category\":\"insight\"},\"content\":{\"title\":\"The Planning Caucus\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Planning Caucus | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"key
