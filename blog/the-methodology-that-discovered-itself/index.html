p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRole clarity matters\u003c/strong\u003e: Each agent has specific capabilities. Lead Developer orchestrates. Chief Architect discovers. Code implements. Cursor validates. Don’t blur boundaries — leverage strengths.\u003c/p\u003e\u003ch4 name=\"b148\" id=\"b148\" class=\"graf graf--h4 graf-after--p\"\u003eSystematic verification\u003c/h4\u003e\u003cp name=\"1ec4\" id=\"1ec4\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvidence First methodology\u003c/strong\u003e: No “done” without proof. Terminal output. Test results. File evidence. Git commits. No “I think it works.”\u003c/p\u003e\u003cp name=\"7c36\" id=\"7c36\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNo verification theater\u003c/strong\u003e: Not claiming complete while skipping work. Not rationalizing gaps. Not “mathing out” percentages. 100% or not done.\u003c/p\u003e\u003cp name=\"3634\" id=\"3634\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCross-validation protocols\u003c/strong\u003e: Multiple agents validating same work. Chief Architect discovers → Code implements → Cursor validates → All consistent.\u003c/p\u003e\u003cp name=\"113a\" id=\"113a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInfrastructure reality checks\u003c/strong\u003e: Verify before planning. Don’t assume. Check actual codebase. Understand what exists before deciding what to build.\u003c/p\u003e\u003ch4 name=\"a03f\" id=\"a03f\" class=\"graf graf--h4 graf-after--p\"\u003eResilient development\u003c/h4\u003e\u003cp name=\"6139\" id=\"6139\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMethodology works when tools fail\u003c/strong\u003e: September 12 proved this. Artifact bugs, agent crashes, coordination challenges — methodology guided recovery despite technical failures.\u003c/p\u003e\u003cp name=\"0c4c\" id=\"0c4c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGraceful degradation patterns\u003c/strong\u003e: STOP conditions. Post-compaction checkpoints. Evidence requirements with managed gaps. System wobbles without breaking.\u003c/p\u003e\u003cp name=\"74ed\" id=\"74ed\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProcess continuity despite failures\u003c/strong\u003e: Not “everything must be perfect” but “recover faster than problems compound.” Expansion joints absorbing stress.\u003c/p\u003e\u003ch4 name=\"1744\" id=\"1744\" class=\"graf graf--h4 graf-after--p\"\u003eLearning integration\u003c/h4\u003e\u003cp name=\"ebb7\" id=\"ebb7\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePattern recognition across sessions\u003c/strong\u003e: Same problems at higher abstraction. Crisis-to-capability transformation. Weekend breakthrough sessions revealing patterns.\u003c/p\u003e\u003cp name=\"7926\" id=\"7926\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eArchaeological methodology\u003c/strong\u003e: Retrospective analysis of 118 days logs. Understanding what actually happened versus what we thought happened.\u003c/p\u003e\u003cp name=\"5c62\" id=\"5c62\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSpiral development\u003c/strong\u003e: Conscious iteration. Same questions revisited deeper. Each crisis strengthening understanding.\u003c/p\u003e\u003cp name=\"eb42\" id=\"eb42\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eConsolidation rhythm\u003c/strong\u003e: Major insights emerging on a regular cadence. Not random — pattern in how understanding deepens.\u003c/p\u003e\u003ch3 name=\"377a\" id=\"377a\" class=\"graf graf--h3 graf-after--p\"\u003eAs I keep learning\u003c/h3\u003e\u003cp name=\"5aaa\" id=\"5aaa\" class=\"graf graf--p graf-after--h3\"\u003eI started writing this back in mid-September as this methodology was making itself more obvious to me. I revisited my draft this weekend to make sure I wasn’t sharing stale insights. This past month proved to me that this methodology can work under stress, and potentially at scale.\u003c/p\u003e\u003cp name=\"b123\" id=\"b123\" class=\"graf graf--p graf-after--p\"\u003eSeptember showed methodology emerging. October showed methodology surviving stress, proving transferable, enabling confidence, and scaling naturally.\u003c/p\u003e\u003ch3 name=\"c416\" id=\"c416\" class=\"graf graf--h3 graf-after--p\"\u003eThe teaching challenge\u003c/h3\u003e\u003cp name=\"9bfa\" id=\"9bfa\" class=\"graf graf--p graf-after--h3\"\u003eHere’s what I’m asking myself today. How do you apply a methodology that discovered itself through practice?\u003c/p\u003e\u003cp name=\"46f2\" id=\"46f2\" class=\"graf graf--p graf-after--p\"\u003eYou can’t just hand someone the framework. The practices emerged from solving real problems. The standards crystallized through stress testing. The patterns revealed themselves through pattern recognition.\u003c/p\u003e\u003ch4 name=\"80e1\" id=\"80e1\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eWhat seems transferable\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"3f76\" id=\"3f76\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCore principles\u003c/strong\u003e: Evidence before claims. Infrastructure before plans. Complete means 100%. Verification prevents theater. Multi-agent coordination through role clarity.\u003c/p\u003e\u003cp name=\"851c\" id=\"851c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSpecific practices\u003c/strong\u003e: Phase 0 reconnaissance. STOP conditions. Post-compaction checkpoints. Evidence requirements. Cross-validation protocols.\u003c/p\u003e\u003cp name=\"16eb\" id=\"16eb\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePattern recognition skills\u003c/strong\u003e: Distinguishing real velocity from theater. Noticing drift patterns. Catching completion gaps. Operating at strategic level.\u003c/p\u003e\u003cp name=\"5bf1\" id=\"5bf1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eResilience mindset\u003c/strong\u003e: Expecting wobbling. Creating expansion joints. Recovering faster than problems compound. Learning through controlled stress.\u003c/p\u003e\u003ch4 name=\"2639\" id=\"2639\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eWhat’s harder to transfer\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"d3dc\" id=\"d3dc\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePattern detective intuition\u003c/strong\u003e: My time spent curating the Yahoo pattern library informing my current role. My habits of asking questions when something doesn’t feel right (“Why middleware for web layer?”).\u003c/p\u003e\u003cp name=\"f5ee\" id=\"f5ee\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRole recognition\u003c/strong\u003e: Getting better at fulfilling noticer role through practice. Each challenge refining intervention timing. Each success clarifying what works.\u003c/p\u003e\u003cp name=\"a714\" id=\"a714\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSpiral awareness\u003c/strong\u003e: Recognizing same problems at higher levels. Discovering one’s own consolidation rhythm. Seeing crisis as methodology refinement opportunity.\u003c/p\u003e\u003cp name=\"1a00\" id=\"1a00\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTrust in the process\u003c/strong\u003e: Confidence for aggressive scope expansion based on proven patterns. Believing 88% velocity will hold. Trusting discovery will find solutions.\u003c/p\u003e\u003cp name=\"e5f6\" id=\"e5f6\" class=\"graf graf--p graf-after--p\"\u003eThe methodology requires both \u003cstrong class=\"markup--strong markup--p-strong\"\u003eexplicit practices\u003c/strong\u003e (which can be taught) and \u003cstrong class=\"markup--strong markup--p-strong\"\u003etacit knowledge\u003c/strong\u003e (which develops through experience).\u003c/p\u003e\u003cp name=\"9932\" id=\"9932\" class=\"graf graf--p graf-after--p\"\u003eMaybe the answer is: Start with practices (evidence-based claims, infrastructure verification, completion standards). Let principles emerge from why practices work. Develop pattern recognition through practice. Build trust through experiencing velocity patterns.\u003c/p\u003e\u003cp name=\"6864\" id=\"6864\" class=\"graf graf--p graf-after--p\"\u003eThe methodology discovered itself through solving problems. Perhaps it transfers through solving problems too.\u003c/p\u003e\u003ch3 name=\"305d\" id=\"305d\" class=\"graf graf--h3 graf-after--p\"\u003eBeyond software development?\u003c/h3\u003e\u003cp name=\"ce16\" id=\"ce16\" class=\"graf graf--p graf-after--h3\"\u003eThe practices that work for building Piper Morgan — could they work for other domains?\u003c/p\u003e\u003ch4 name=\"6134\" id=\"6134\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eThe evidence so far\u003c/strong\u003e\u003c/h4\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"4319\" id=\"4319\" class=\"graf graf--li graf-after--h4\"\u003eStandup automation (workflow orchestration)\u003c/li\u003e\u003cli name=\"5d8f\" id=\"5d8f\" class=\"graf graf--li graf-after--li\"\u003eLearning system (intelligence integration)\u003c/li\u003e\u003cli name=\"cbda\" id=\"cbda\" class=\"graf graf--li graf-after--li\"\u003eUser onboarding (experience design)\u003c/li\u003e\u003cli name=\"7dcb\" id=\"7dcb\" class=\"graf graf--li graf-after--li\"\u003eArchitecture refactoring (system design)\u003c/li\u003e\u003cli name=\"da3c\" id=\"da3c\" class=\"graf graf--li graf-after--li\"\u003eDocumentation management (knowledge work)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"f9d6\" id=\"f9d6\" class=\"graf graf--p graf-after--li\"\u003eAll software development domains, but very different types of work. Same methodology working consistently. In fact, every time I branch into a new work stream on this project (building the website, refining the tooling), I discover that unless I employ the same rigor and wisdom I end up with similar problems.\u003c/p\u003e\u003ch4 name=\"48ee\" id=\"48ee\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eWhat might apply beyond software\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"322f\" id=\"322f\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvidence-based claims\u003c/strong\u003e: Relevant anywhere completion claims need verification. Research? Writing? Design? Teaching?\u003c/p\u003e\u003cp name=\"fbb7\" id=\"fbb7\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInfrastructure before plans\u003c/strong\u003e: Verify what exists before planning changes. Project management? Strategic planning? Organizational development?\u003c/p\u003e\u003cp name=\"c0c4\" id=\"c0c4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSystematic verification\u003c/strong\u003e: Prevent completion theater through discipline. Any domain with “mostly done” rationalization risks?\u003c/p\u003e\u003cp name=\"dc47\" id=\"dc47\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eResilient practices\u003c/strong\u003e: Wobbling reveals rather than breaks. Crisis as learning opportunity. Any complex work under stress?\u003c/p\u003e\u003cp name=\"136b\" id=\"136b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMulti-agent coordination\u003c/strong\u003e: Clear roles, evidence-based handoffs. Any collaborative work with distributed expertise?\u003c/p\u003e\u003cp name=\"f10b\" id=\"f10b\" class=\"graf graf--p graf-after--p\"\u003eThe methodology emerged from software development with AI. But the principles — evidence over assumptions, verification preventing theater, resilience through expansion joints, learning through stress — might apply wherever complex collaborative work happens.\u003c/p\u003e\u003cp name=\"b094\" id=\"b094\" class=\"graf graf--p graf-after--p\"\u003eThe hypothesis: Systematic practices for preventing common failure modes might transfer across domains because the failure modes (premature completion, assumption-based decisions, verification theater, completion drift) are universal human challenges, not software-specific problems.\u003c/p\u003e\u003ch3 name=\"1c2d\" id=\"1c2d\" class=\"graf graf--h3 graf-after--p\"\u003eWhat’s still being explored\u003c/h3\u003e\u003cp name=\"21e8\" id=\"21e8\" class=\"graf graf--p graf-after--h3\"\u003eFive months in. Methodology crystallized. But questions remain:\u003c/p\u003e\u003cp name=\"3118\" id=\"3118\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eHow does methodology scale beyond individual practitioners?\u003c/strong\u003e October proved multi-agent coordination works. Seven agents, perfect handoffs, zero blocking. But that’s one person orchestrating. What happens with multiple humans collaborating? How do methodology practices transfer across team boundaries?\u003c/p\u003e\u003cp name=\"95db\" id=\"95db\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat are the minimum viable components?\u003c/strong\u003e We have evidence-based claims, infrastructure verification, systematic validation, multi-agent coordination, resilience patterns. What’s essential? What’s optional? What can be simplified without losing effectiveness?\u003c/p\u003e\u003cp name=\"8837\" id=\"8837\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eHow do you prevent methodology drift over time?\u003c/strong\u003e Recent experience showed drift happens even with established practices. STOP conditions prevent it when included in prompts. But what prevents forgetting to include them? What maintains discipline when momentum builds?\u003c/p\u003e\u003cp name=\"575d\" id=\"575d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat tools could automate methodology enforcement?\u003c/strong\u003e Current approach requires human pattern recognition catching gaps. Could tools automate “no math out” checking? Could prompts enforce evidence requirements automatically? Could frameworks build in verification discipline?\u003c/p\u003e\u003cp name=\"ea89\" id=\"ea89\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eHow do you measure methodology effectiveness quantitatively?\u003c/strong\u003e We have velocity patterns (88% faster), leverage ratios (3.2:1), quality metrics (100% test coverage). But how do you measure resilience? Pattern recognition capability? Drift prevention? Learning integration?\u003c/p\u003e\u003cp name=\"b10a\" id=\"b10a\" class=\"graf graf--p graf-after--p\"\u003eThe methodology has proven itself through practice. Now the challenge is understanding it well enough to teach it, scale it, maintain it, and improve it systematically.\u003c/p\u003e\u003ch3 name=\"457d\" id=\"457d\" class=\"graf graf--h3 graf-after--p\"\u003eThe meta-learning loop\u003c/h3\u003e\u003cp name=\"4e69\" id=\"4e69\" class=\"graf graf--p graf-after--h3\"\u003eHere’s what makes this methodology unique: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eIt improves itself through practice.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"1eaf\" id=\"1eaf\" class=\"graf graf--p graf-after--p\"\u003eThe practices emerged from solving problems. The stress testing revealed gaps. The gap discoveries refined practices. The refined practices prevented future gaps. The prevention enabled velocity. The velocity justified confidence. The confidence enabled aggressive scope. The aggressive scope revealed new patterns. The new patterns refined methodology further.\u003c/p\u003e\u003cp name=\"d046\" id=\"d046\" class=\"graf graf--p graf-after--p\"\u003eThis is the meta-learning loop: Methodology improving methodology through systematic application and reflection.\u003c/p\u003e\u003cp name=\"7ee5\" id=\"7ee5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRecent meta-learning examples\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"1890\" id=\"1890\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOct 19\u003c/strong\u003e: Three scope reductions reveal template simplification removed safeguards → Solution: mandatory full templates with all STOP conditions → Proof: 4:15 PM Code correctly uses STOP when included.\u003c/p\u003e\u003cp name=\"513d\" id=\"513d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOct 20\u003c/strong\u003e: Dashboard gap reveals completion verification needs reinforcing → Principle articulated: “Speed by skipping work is not true speed. It is theatre” → Standard established: verification discipline catches gaps immediately.\u003c/p\u003e\u003cp name=\"0082\" id=\"0082\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e(Oct 21\u003c/strong\u003e: Three interventions establish three standards (no math out, no time constraints, complete means complete) → Code’s excellent self-correction shows model behavior → Standards working.\u003c/p\u003e\u003cp name=\"1b5f\" id=\"1b5f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOct 22\u003c/strong\u003e: Zero interventions needed, standards holding, velocity sustained → Aggressive scope expansion justified → Confidence based on evidence → Sprint A7 delivers seven issues in 20 minutes.\u003c/p\u003e\u003cp name=\"1527\" id=\"1527\" class=\"graf graf--p graf-after--p\"\u003eEach day’s learning informing next day’s practice. Each gap discovered refining methodology. Each refinement improving results. Each result building confidence. Each confidence enabling bolder decisions. Each decision revealing new patterns.\u003c/p\u003e\u003cp name=\"415f\" id=\"415f\" class=\"graf graf--p graf-after--p\"\u003eThe methodology learns through use. Not static framework. Living practices evolving through application.\u003c/p\u003e\u003cp name=\"0304\" id=\"0304\" class=\"graf graf--p graf-after--p\"\u003eThis might be the most important discovery: Methodology that improves itself through systematic reflection on practice.\u003c/p\u003e\u003ch3 name=\"888c\" id=\"888c\" class=\"graf graf--h3 graf-after--p\"\u003eWhat we actually built\u003c/h3\u003e\u003cp name=\"96f0\" id=\"96f0\" class=\"graf graf--p graf-after--h3\"\u003eSet out to build Piper Morgan the AI assistant. This is still my goal! Along the way I’m discovering Piper Morgan the methodology.\u003c/p\u003e\u003cp name=\"9c24\" id=\"9c24\" class=\"graf graf--p graf-after--p\"\u003eThe tool exists: Intent classification (98.62% accuracy). Multi-user infrastructure. Learning system integration. Standup automation. User onboarding. Quality gates. Security hardening. 22 production handlers. 2,336 tests, 100% passing. 602K requests/second sustained throughput.\u003c/p\u003e\u003cp name=\"e0bb\" id=\"e0bb\" class=\"graf graf--p graf-after--p\"\u003eWe’re onboarding our first non-me users next week!\u003c/p\u003e\u003cp name=\"7441\" id=\"7441\" class=\"graf graf--p graf-after--p\"\u003eBut the real achievement may actually be: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eSystematic practices for human-AI collaborative development that prevent common failure modes while enabling velocity that feels impossible.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"f1ad\" id=\"f1ad\" class=\"graf graf--p graf-after--p\"\u003eEvidence-based claims preventing verification theater. Infrastructure verification preventing wasted planning. Systematic validation preventing completion drift. Multi-agent coordination preventing blocking. Resilient practices surviving stress. Pattern recognition catching gaps. Strategic oversight maintaining quality.\u003c/p\u003e\u003cp name=\"7505\" id=\"7505\" class=\"graf graf--p graf-after--p\"\u003eFramework discovered through solving actual problems. Proven across different domains. Tested under stress. Validated through velocity patterns. Refined through gap discoveries. Strengthened through crisis transformation.\u003c/p\u003e\u003cp name=\"8c5e\" id=\"8c5e\" class=\"graf graf--p graf-after--p\"\u003eNot theoretical framework applied to development. \u003cstrong class=\"markup--strong markup--p-strong\"\u003ePractical methodology emerging from development, validated through practice, transferable to other contexts.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"6558\" id=\"6558\" class=\"graf graf--p graf-after--p\"\u003eFive months from start to methodology crystallization. Daily development logs showing consistent application across different work. Six sprints proving the velocity pattern. Stress testing revealing and fixing gaps. Demonstrating confidence justified by proven patterns.\u003c/p\u003e\u003cp name=\"9733\" id=\"9733\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eThe methodology evolves through practice. The meta-learning loop spirals upward. Crisis becomes capability. Problems reveal patterns. Stress strengthens resilience. Each day refining understanding of how human-AI partnership can work when practiced systematically.\u003c/em\u003e\u003c/p\u003e\u003cp name=\"9a5d\" id=\"9a5d\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe methodology discovered itself. Now the question is: What else can it build?\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Methodology That Discovered Itself\",\"excerpt\":\"“Wait, that’s me!”September 13I set out to build an AI-powered product management assistant. Along the way I seem to have discovered was something else — a systematic methodology for human-AI collaborative development.This wasn’t the plan. I didn’t start with a framework and apply it. I started b...\",\"url\":\"/blog/the-methodology-that-discovered-itself\",\"publishedAt\":\"Oct 26, 2025\",\"publishedAtISO\":\"Sun, 26 Oct 2025 12:46:17 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/6ebe523a6856\",\"featuredImage\":\"/assets/blog-images/6ebe523a6856-featured.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-methodology-that-discovered-itself-6ebe523a6856?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-methodology-that-discovered-itself\",\"workDate\":\"Oct 26, 2025\",\"workDateISO\":\"2025-10-26T00:00:00.000Z\",\"category\":\"2025-10-26\",\"cluster\":\"2025-10-26\",\"featured\":f
