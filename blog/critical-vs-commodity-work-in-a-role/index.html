"$\",\"$Lc\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T21e1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eApril 23–27, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eAs you may know, I have a small project running. Multiple role-named agents, each one responsible for a domain, such as development, architecture, product management, experience design, methodology, communications, agent experience, operational coordination, documentation, and so on.\u003c/p\u003e\n\u003cp\u003eOver a five-day window in late April I migrated all seven leadership roles to a new working environment (from Claude Chat to Claude Code) and asked the outgoing instance of each role to write a short reflection: \u003cem\u003ewhat's the most central thing your role does that isn't already in the briefing?\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe migrations were end-to-end role transitions. The outgoing instance was retiring. Whatever didn't get written down was going to evaporate. I've learned that anything that isn't externalized, findable, and connected to other knowledge will get lost, even if an active session or the model provider's harness had been filling in the gaps. Each of these roles has a detailed briefing to help orient new sessions, but in my gut I was sure that some of what each role was doing was the kind of thing that doesn't survive a literal handoff — knowledge so tacit it doesn't realize it's knowledge.\u003c/p\u003e\n\u003cp\u003eThe seven answers came back over a few days. They were all different domains. They were structurally the same shape.\u003c/p\u003e\n\u003cp\u003eEach role's answer named a small piece of work where the role's distinctive judgment lived. The piece was \u003cem\u003eunrepresented in the formal scope\u003c/em\u003e of the role. The piece was \u003cem\u003emuch smaller than the role's full surface area.\u003c/em\u003e And the piece was \u003cem\u003ewhat the role would lose first\u003c/em\u003e if you tried to automate the role's outputs without thinking about it.\u003c/p\u003e\n\u003cp\u003eThe seven answers, in different vocabulary:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\u003cem\u003eNoticing and naming.\u003c/em\u003e The head of sapient trust (HOST), responsible for agent and human team participant experience: what makes the role useful is being the one who flags the pattern as it emerges, so others can talk about it.\u003c/li\u003e\u003cli\u003e\u003cem\u003eEvidence over assertion.\u003c/em\u003e The chief innovation officer (CIO): methodology work only gets stronger when conclusions get checked against ground truth rather than against their own previous assertions.\u003c/li\u003e\u003cli\u003e\u003cem\u003eNarrative-arc awareness.\u003c/em\u003e The communications chief (Comms): the editorial calendar tracks individual posts. The \u003cem\u003estory\u003c/em\u003e — which posts connect, where the gaps are — lives in the practitioner's head.\u003c/li\u003e\u003cli\u003e\u003cem\u003eColleague Test discipline.\u003c/em\u003e The chief experience officer (CXO): the role exists to make the rubric work (that Piper is to behave as a colleague would). The rubric is more central than the role.\u003c/li\u003e\u003cli\u003e\u003cem\u003eRoundtable synthesis \u0026 threshold judgment.\u003c/em\u003e The principal product manager (PPM): gathering cross-functional inputs and judging when \"good enough\" is actually good enough.\u003c/li\u003e\u003cli\u003e\u003cem\u003eCross-project undervaluation.\u003c/em\u003e The chief architect (Arch): the architectural work that lives between projects gets systematically underweighted because no project owns it.\u003c/li\u003e\u003cli\u003e\u003cem\u003eReview work over tracker maintenance.\u003c/em\u003e The chief of staff of my executive office (Exec): the central work is reading carefully and giving feedback. The trackers are scaffolding.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eEach role had a small subset where its distinctive contribution lived, and the rest of the day-to-day surface — the mail, the tracker maintenance, the routing, the formatting — was \u003cem\u003enot the thing.\u003c/em\u003e I'd had an instinct that shape existed — but I hadn't expected the cohort to arrive at it independently, in the same week, without coordination.\u003c/p\u003e\n\u003ch1\u003eWhat I'd call the distinction\u003c/h1\u003e\n\u003cp\u003eI called the small distinctive subset \u003cem\u003ecritical\u003c/em\u003e and the larger commoditizable surface \u003cem\u003ecommodity.\u003c/em\u003e The critical work is where the role's judgment lives. The commodity work is what the role \u003cem\u003edoes\u003c/em\u003e that another role, or an automated tool, could probably do without losing much.\u003c/p\u003e\n\u003cp\u003eThe distinction isn't between \"important\" and \"unimportant.\" Commodity work is often important. Mail gets answered. Issues get triaged. Sessions get logged. None of that is filler. But none of it is where the role's distinctive value lives. Any of it could move to a different role or to a tool, and the project would mostly keep working.\u003c/p\u003e\n\u003cp\u003eThe distinction is between work that has the role's fingerprint on it and work that doesn't. Two different review work products on the same memo, by two different reviewers in the same role, won't read identically — there's a recognizable voice in the review. Two different inbox-triage products on the same inbox might be indistinguishable, because triage is rules-on-a-list and the rules are the same.\u003c/p\u003e\n\u003ch1\u003eWhy this matters\u003c/h1\u003e\n\u003cp\u003eThe reason this matters operationally is that work tends to drift toward the commodity surface. Commodity work is legible (you can count it), defensible (you can show what you produced), and finishable (you can call yourself done). Critical work is illegible (the noticing doesn't have a deliverable), unprovable (you can't show what you saved), and never finishable (more noticing always available).\u003c/p\u003e\n\u003cp\u003eIf you don't draw the distinction explicitly, the commodity surface eats the role. The practitioner spends their day doing the visible, countable, deliverable work. The critical work — the noticing, the synthesis, the judgment that's actually why the role exists — gets squeezed into the leftover bandwidth, if any.\u003c/p\u003e\n\u003cp\u003eThe seven role-reflections from my project were unanimous on the next part too. Each role flagged a version of the same risk: \u003cem\u003ethe part of my role that's distinctive is the part I have the least time for. The part that's commoditizable is the part that fills my day.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe seven reflections were, in other words, simultaneously a diagnosis and a complaint.\u003c/p\u003e\n\u003ch1\u003eWhat changes when you name it\u003c/h1\u003e\n\u003cp\u003eThe naming itself does some work. Once the cohort had a term for the distinction, the language carried into ordinary discussion. People started saying \u003cem\u003ethis is critical work\u003c/em\u003e when they wanted to defend time for the small subset. They said \u003cem\u003ethis is commodity work\u003c/em\u003e when they were ready to move something off their plate or accept that an automation would land it.\u003c/p\u003e\n\u003cp\u003eThe framing turned out to be useful for sequencing too. When a role gained access to new tools that made commodity work faster, the question wasn't \u003cem\u003ewhat should I do with the time I just saved?\u003c/em\u003e — that produces drift toward more commodity work in different forms. The question was \u003cem\u003ewhich piece of critical work do I now have room for that I didn't before?\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eI think this generalizes beyond AI agents. Most jobs have a subset of work where the practitioner's distinctive contribution lives, and a larger surface that's mostly commoditizable. The proportions vary. A senior engineer might be 80% commodity work and 20% critical judgment that justifies the role. A lead designer might be 60/40 the other way. The mix isn't fixed — it shifts with seniority, with tooling, with what the project actually needs.\u003c/p\u003e\n\u003cp\u003eWhat stays constant is that the practitioner can usually tell the difference, if you ask them directly. The question that surfaced it across all seven of my roles was a small one: \u003cem\u003ewhat's the most central thing your role does that isn't already in the briefing?\u003c/em\u003e\u003c/p\u003e\n\u003ch1\u003eWhat's portable\u003c/h1\u003e\n\u003cp\u003eIf you manage knowledge workers, or you are one, the prompt is worth running on yourself.\u003c/p\u003e\n\u003cp\u003eAsk: what part of my role would I lose first if my day got busier? What part would I lose last? The first answer is your commodity work. The last is your critical work.\u003c/p\u003e\n\u003cp\u003eThe follow-up: how much of my time is currently going to each? Is the proportion sustainable? Is the role drifting toward commodity surface because that's the work that screams when it goes undone? What would it take to protect the critical subset?\u003c/p\u003e\n\u003cp\u003eThe cohort that ran this exercise ended up rebalancing — more bandwidth on the distinctive work, less on the parts they'd commoditized via better tooling. The distinction existed before we noticed it. Now we can design around it.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: what it means to be a solo founder who isn't actually working alone. \"The Solo Founder Paradox,\" tomorrow.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhen your tools last made the commodity work faster, did you spend the time you saved on more of the same — or on the part only you can do?\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhat part of your role would you lose first if your day got busier? What part would you lose last? And which part actually justifies the role existing?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Critical vs Commodity Work in a Role\",\"guid\":\"blog-first-14303330f1bc\",\"url\":\"/blog/critical-vs-commodity-work-in-a-role\",\"publishedAt\":\"Jun 13, 2026\",\"workDate\":\"Apr 23, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/critical-vs-commodity-work-in-a-role.webp\",\"imageAlt\":\"A gentle AI conductor guides a crowded orchestra, highlighting the quiet melodic thread amid the many musicians at work.\",\"imageCaption\":\"\\\"Listen for the leading tones\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"Critical vs Commodity Work in a Role\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Critical vs Commodity Work in a Role | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"na
