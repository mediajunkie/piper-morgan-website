null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T274b,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot and human throw a party where the guests have to find the all the hidden party favors in a treasure hunt\" src=\"https://cdn-images-1.medium.com/max/1024/1*2pNZ1ec7qq14WyqCBY9WVA.png\" /\u003e\u003cfigcaption\u003e“Why did we hide all the party favors?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eDecember 20–23, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSaturday evening, testing on the alpha laptop. Fresh install complete, setup wizard working (FK bugs from last week now fixed). Time to try actual PM workflows.\u003c/p\u003e\u003cp\u003eFirst test: “What services do you offer?”\u003c/p\u003e\u003cp\u003eThe response came back generic. Helpful, polite, but not what I’d asked for. No menu of capabilities, no feature overview, just a conversational “I can help with various tasks” non-answer.\u003c/p\u003e\u003cp\u003eSecond test: “Help me setup my projects.”\u003c/p\u003e\u003cp\u003ePiper diverted immediately to GitHub issue creation. Wrong handler entirely. I’d asked for setup guidance, got issue tracking instead.\u003c/p\u003e\u003cp\u003eTwo simple questions. Both should have worked. Neither did.\u003c/p\u003e\u003ch3\u003eThe investigation\u003c/h3\u003e\u003cp\u003eThe pattern was clear: Piper assumed I knew what to ask for. Ask about “GitHub issues” specifically, you’d get GitHub help. Ask about “projects” generically, the system would guess — often wrong.\u003c/p\u003e\u003cp\u003eWe’d built a command-oriented interface. Users needed to know the right commands, the right phrasing, the specific features available. Discovery wasn’t supported. Exploration wasn’t encouraged.\u003c/p\u003e\u003cp\u003eThis is a classic expert user trap. When you know the system intimately, you forget that new users need to \u003cem\u003efind\u003c/em\u003e features before they can \u003cem\u003euse\u003c/em\u003e them.\u003c/p\u003e\u003cp\u003eLead Developer ran Five Whys analysis overnight:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy did “menu of services” fail?\u003c/strong\u003e\u003cbr\u003eNo pattern matched IDENTITY queries about capabilities.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy no pattern for capability discovery?\u003c/strong\u003e\u003cbr\u003ePre-classifier focused on execution (GitHub, Slack, Calendar) not exploration.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy focus on execution?\u003c/strong\u003e\u003cbr\u003eSystem design assumed users know what they want.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy that assumption?\u003c/strong\u003e\u003cbr\u003eBuilt from developer perspective — we knew every feature.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy didn’t alpha testing catch this earlier?\u003c/strong\u003e\u003cbr\u003eWe were the alpha testers. We knew what to ask.\u003c/p\u003e\u003cp\u003eRoot cause: architectural gap. The system had no concept of “discovery intent.” No way to handle “show me what you can do.” No bridge between plugin capabilities and user exploration.\u003c/p\u003e\u003cp\u003eNone of this surprised me. I knew we hadn’t really addresses this gap. The awareness had been nagging at me for some time but only alpha testing brought it to the surface.\u003c/p\u003e\u003cp\u003eThe overnight implementation added 17 new patterns — “what services,” “what can you help with,” “show me capabilities,” “help setup,” “getting started.” All the discovery phrases users would naturally try.\u003c/p\u003e\u003cp\u003eBut patterns alone weren’t the solution. They were symptoms treatment. The real issue ran deeper.\u003c/p\u003e\u003ch3\u003eThe architectural shift\u003c/h3\u003e\u003cp\u003eSunday morning, Lead Developer created Epic #488: “Discovery-Oriented Intent Architecture.”\u003c/p\u003e\u003cp\u003eThe epic framed it clearly: We’d built a system where users need to know what to ask for. We needed a system where users could explore what’s available.\u003c/p\u003e\u003cp\u003eThe difference:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eCommand-oriented\u003c/strong\u003e: “Create a GitHub issue about X” (requires knowing GitHub integration exists)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eDiscovery-oriented\u003c/strong\u003e: “What can you do?” → “I can help with GitHub, Slack, Calendar…” → “Tell me about GitHub” → capabilities explained\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThis wasn’t just adding patterns. It was reframing how Piper handles uncertainty and exploration.\u003c/p\u003e\u003cp\u003eThe proposed architecture:\u003c/p\u003e\u003col\u003e\u003cli\u003eAdd DISCOVERY as an intent category (alongside QUERY, EXECUTION, STATUS)\u003c/li\u003e\u003cli\u003eRoute discovery requests to dedicated handler\u003c/li\u003e\u003cli\u003eHandler bridges to PluginRegistry metadata\u003c/li\u003e\u003cli\u003eReturn structured capability menu\u003c/li\u003e\u003cli\u003eSupport progressive disclosure (overview → details → usage)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003ePhase 1 could ship with pattern matching. Long-term would integrate with the UX 2.0 modeled consciousness work — but that’s post-alpha. For now: make discovery \u003cem\u003epossible\u003c/em\u003e.\u003c/p\u003e\u003cp\u003eMeanwhile, canonical query work ramped up. Query #7 (historical retrospective), Query #14 (project-specific status) — the queries that power morning standups and daily check-ins. Implementation work that would feed into discovery.\u003c/p\u003e\u003ch3\u003eDiscovery becomes real\u003c/h3\u003e\u003cp\u003eWhen we were finally ready, Lead Developer coordinated twelve Code agents in parallel. Each agent got a precise prompt: specific query, specific patterns, specific formatters, specific tests.\u003c/p\u003e\u003cp\u003eThe queries that got implemented weren’t just features getting checked off. They were validation that the discovery architecture worked:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIdentity queries\u003c/strong\u003e: “What can you do?” now returns dynamic capabilities from PluginRegistry. “Are you working properly?” runs actual health checks. “How do I get help?” provides real onboarding guidance.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTemporal queries\u003c/strong\u003e: “What did we accomplish yesterday?” “When did we last work on this?” “How long have we been working on this?” All the time-based questions PMs naturally ask.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSpatial queries\u003c/strong\u003e: “What projects are we working on?” “Which project should I focus on?” “Show me the project landscape.” The workspace navigation questions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCapability queries\u003c/strong\u003e: “Can you create a GitHub issue?” “What integrations do you have?” The meta-questions about what’s possible.\u003c/p\u003e\u003cp\u003eBy end of day: users could ask exploration questions and get real answers. Not generic responses, not “I can help with various tasks” — actual enumeration of capabilities, actual context about what’s available.\u003c/p\u003e\u003cp\u003eThe interesting discovery: we’d already implemented many of these queries. Query #2 (dynamic capabilities) — code existed, just untracked. Query #16 (GitHub issue creation) — working, just undocumented. Query #18 (list projects) — functional, just missing from test matrix.\u003c/p\u003e\u003cp\u003eThe 75% completion pattern striking again. Code written, functionality working, tracking abandoned. The systematic audit revealed what was actually there versus what we thought was missing.\u003c/p\u003e\u003ch3\u003eParallel momentum\u003c/h3\u003e\u003cp\u003eWhile canonical queries were getting documented and tested, a different blocker resolved.\u003c/p\u003e\u003cp\u003eThe mobile PoC had been stuck since December 7th. Expo Go’s SDK 54 bundled incompatible native module versions — Worklets 0.5.1 native vs. 0.7.1 JavaScript. No App Store update available to fix it.\u003c/p\u003e\u003cp\u003eSolution deferred that week: install Xcode, build native instead of relying on Expo Go’s pre-bundled modules.\u003c/p\u003e\u003cp\u003eTwo weeks of infrastructure work later — FK bugs, intent classification, canonical queries — development circles back to mobile. Xcode installed. Native build path available.\u003c/p\u003e\u003cp\u003enpx expo run:ios\u003c/p\u003e\u003cp\u003eAll native modules compiled. Fresh native code matching JavaScript expectations exactly. iPhone simulator launched. Entity-based gesture mapping fully functional — swipe right to complete tasks, swipe left to defer, haptic feedback, intent toasts, all working.\u003c/p\u003e\u003cp\u003eSeven-day blocker bypassed by building native instead of debugging Expo Go’s bundled limitations.\u003c/p\u003e\u003cp\u003eThis is a skunkworks project. It doesn’t block anything. But it will be a crucial input into UX research and understanding what the the holistic UX model should feel like for a mobile user.\u003c/p\u003e\u003cp\u003eThe parallel progress validated something important: sustainable work doesn’t mean single-threaded work. It means systematic work that can pause, resume, and move between contexts without losing thread.\u003c/p\u003e\u003ch3\u003eWhat discovery enables\u003c/h3\u003e\u003cp\u003eFour days. One architectural gap identified, one epic created, one implementation sprint, one mobile breakthrough.\u003c/p\u003e\u003cp\u003eBut the real change was conceptual, not technical.\u003c/p\u003e\u003cp\u003eBefore: Piper waited for users to know what to ask. “Create a GitHub issue” worked. “What can you do” didn’t.\u003c/p\u003e\u003cp\u003eAfter: Piper supports exploration. New users can ask “what services do you offer” and get an answer. They can ask “help me get started” and get guidance. They can ask “what makes you different” and get Piper’s differentiation story.\u003c/p\u003e\u003cp\u003eThe technical implementation — 17 patterns, 31 tests, 12 queries, proper capability enumeration — proved the architecture shift worked. But the real validation would come from actual alpha testers trying to explore what Piper could do.\u003c/p\u003e\u003cp\u003eDiscovery isn’t just a feature category. It’s a philosophical shift from assuming user knowledge to supporting user learning. From command-oriented to exploration-friendly.\u003c/p\u003e\u003cp\u003eWe’d built a system that expected expertise. We needed a system that enabled learning. The gap between those two models was the difference between “powerful for experts” and “accessible for humans.”\u003c/p\u003e\u003cp\u003eNow when users ask “what can you do?” — they get a real answer.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: “The Capability Sprint,” as we continued to build out the canonical query list across the holiday.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHow do you balance building for experts (who know what they want) versus building for discovery (who need to explore)? Have you caught yourself designing for your own expertise level rather than new users?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=267268cae81a\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/when-users-cant-discover-267268cae81a\"\u003eWhen Users Can’t Discover\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3798,"])</script><script>self.__next_f.push([1,"\u003csection name=\"c78f\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"ea2c\" id=\"ea2c\" class=\"graf graf--h3 graf--leading graf--title\"\u003eWhen Users Can’t Discover\u003c/h3\u003e\u003cfigure name=\"c58d\" id=\"c58d\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*2pNZ1ec7qq14WyqCBY9WVA.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot and human throw a party where the guests have to find the all the hidden party favors in a treasure hunt\" src=\"https://cdn-images-1.medium.com/max/800/1*2pNZ1ec7qq14WyqCBY9WVA.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Why did we hide all the party favors?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"59ae\" id=\"59ae\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecember 20–23, 2025\u003c/em\u003e\u003c/p\u003e\u003cp name=\"beaf\" id=\"beaf\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eS\u003c/span\u003eaturday evening, testing on the alpha laptop. Fresh install complete, setup wizard working (FK bugs from last week now fixed). Time to try actual PM workflows.\u003c/p\u003e\u003cp name=\"3acb\" id=\"3acb\" class=\"graf graf--p graf-after--p\"\u003eFirst test: “What services do you offer?”\u003c/p\u003e\u003cp name=\"402f\" id=\"402f\" class=\"graf graf--p graf-after--p\"\u003eThe response came back generic. Helpful, polite, but not what I’d asked for. No menu of capabilities, no feature overview, just a conversational “I can help with various tasks” non-answer.\u003c/p\u003e\u003cp name=\"5f82\" id=\"5f82\" class=\"graf graf--p graf-after--p\"\u003eSecond test: “Help me setup my projects.”\u003c/p\u003e\u003cp name=\"205d\" id=\"205d\" class=\"graf graf--p graf-after--p\"\u003ePiper diverted immediately to GitHub issue creation. Wrong handler entirely. I’d asked for setup guidance, got issue tracking instead.\u003c/p\u003e\u003cp name=\"b1c8\" id=\"b1c8\" class=\"graf graf--p graf-after--p\"\u003eTwo simple questions. Both should have worked. Neither did.\u003c/p\u003e\u003ch3 name=\"9d0b\" id=\"9d0b\" class=\"graf graf--h3 graf-after--p\"\u003eThe investigation\u003c/h3\u003e\u003cp name=\"5df5\" id=\"5df5\" class=\"graf graf--p graf-after--h3\"\u003eThe pattern was clear: Piper assumed I knew what to ask for. Ask about “GitHub issues” specifically, you’d get GitHub help. Ask about “projects” generically, the system would guess — often wrong.\u003c/p\u003e\u003cp name=\"1789\" id=\"1789\" class=\"graf graf--p graf-after--p\"\u003eWe’d built a command-oriented interface. Users needed to know the right commands, the right phrasing, the specific features available. Discovery wasn’t supported. Exploration wasn’t encouraged.\u003c/p\u003e\u003cp name=\"9167\" id=\"9167\" class=\"graf graf--p graf-after--p\"\u003eThis is a classic expert user trap. When you know the system intimately, you forget that new users need to \u003cem class=\"markup--em markup--p-em\"\u003efind\u003c/em\u003e features before they can \u003cem class=\"markup--em markup--p-em\"\u003euse\u003c/em\u003e them.\u003c/p\u003e\u003cp name=\"67e5\" id=\"67e5\" class=\"graf graf--p graf-after--p\"\u003eLead Developer ran Five Whys analysis overnight:\u003c/p\u003e\u003cp name=\"8d21\" id=\"8d21\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy did “menu of services” fail?\u003c/strong\u003e\u003cbr\u003eNo pattern matched IDENTITY queries about capabilities.\u003c/p\u003e\u003cp name=\"4823\" id=\"4823\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy no pattern for capability discovery?\u003c/strong\u003e\u003cbr\u003ePre-classifier focused on execution (GitHub, Slack, Calendar) not exploration.\u003c/p\u003e\u003cp name=\"3e3c\" id=\"3e3c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy focus on execution?\u003c/strong\u003e\u003cbr\u003eSystem design assumed users know what they want.\u003c/p\u003e\u003cp name=\"8471\" id=\"8471\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy that assumption?\u003c/strong\u003e\u003cbr\u003eBuilt from developer perspective — we knew every feature.\u003c/p\u003e\u003cp name=\"9f59\" id=\"9f59\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy didn’t alpha testing catch this earlier?\u003c/strong\u003e\u003cbr\u003eWe were the alpha testers. We knew what to ask.\u003c/p\u003e\u003cp name=\"57e8\" id=\"57e8\" class=\"graf graf--p graf-after--p\"\u003eRoot cause: architectural gap. The system had no concept of “discovery intent.” No way to handle “show me what you can do.” No bridge between plugin capabilities and user exploration.\u003c/p\u003e\u003cp name=\"3169\" id=\"3169\" class=\"graf graf--p graf-after--p\"\u003eNone of this surprised me. I knew we hadn’t really addresses this gap. The awareness had been nagging at me for some time but only alpha testing brought it to the surface.\u003c/p\u003e\u003cp name=\"64ee\" id=\"64ee\" class=\"graf graf--p graf-after--p\"\u003eThe overnight implementation added 17 new patterns — “what services,” “what can you help with,” “show me capabilities,” “help setup,” “getting started.” All the discovery phrases users would naturally try.\u003c/p\u003e\u003cp name=\"5721\" id=\"5721\" class=\"graf graf--p graf-after--p\"\u003eBut patterns alone weren’t the solution. They were symptoms treatment. The real issue ran deeper.\u003c/p\u003e\u003ch3 name=\"7a33\" id=\"7a33\" class=\"graf graf--h3 graf-after--p\"\u003eThe architectural shift\u003c/h3\u003e\u003cp name=\"6492\" id=\"6492\" class=\"graf graf--p graf-after--h3\"\u003eSunday morning, Lead Developer created Epic #488: “Discovery-Oriented Intent Architecture.”\u003c/p\u003e\u003cp name=\"8bf3\" id=\"8bf3\" class=\"graf graf--p graf-after--p\"\u003eThe epic framed it clearly: We’d built a system where users need to know what to ask for. We needed a system where users could explore what’s available.\u003c/p\u003e\u003cp name=\"8d26\" id=\"8d26\" class=\"graf graf--p graf-after--p\"\u003eThe difference:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"a745\" id=\"a745\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eCommand-oriented\u003c/strong\u003e: “Create a GitHub issue about X” (requires knowing GitHub integration exists)\u003c/li\u003e\u003cli name=\"28a5\" id=\"28a5\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eDiscovery-oriented\u003c/strong\u003e: “What can you do?” → “I can help with GitHub, Slack, Calendar…” → “Tell me about GitHub” → capabilities explained\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"53f1\" id=\"53f1\" class=\"graf graf--p graf-after--li\"\u003eThis wasn’t just adding patterns. It was reframing how Piper handles uncertainty and exploration.\u003c/p\u003e\u003cp name=\"26d3\" id=\"26d3\" class=\"graf graf--p graf-after--p\"\u003eThe proposed architecture:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"790f\" id=\"790f\" class=\"graf graf--li graf-after--p\"\u003eAdd DISCOVERY as an intent category (alongside QUERY, EXECUTION, STATUS)\u003c/li\u003e\u003cli name=\"413d\" id=\"413d\" class=\"graf graf--li graf-after--li\"\u003eRoute discovery requests to dedicated handler\u003c/li\u003e\u003cli name=\"4de3\" id=\"4de3\" class=\"graf graf--li graf-after--li\"\u003eHandler bridges to PluginRegistry metadata\u003c/li\u003e\u003cli name=\"68ef\" id=\"68ef\" class=\"graf graf--li graf-after--li\"\u003eReturn structured capability menu\u003c/li\u003e\u003cli name=\"fb23\" id=\"fb23\" class=\"graf graf--li graf-after--li\"\u003eSupport progressive disclosure (overview → details → usage)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"7438\" id=\"7438\" class=\"graf graf--p graf-after--li\"\u003ePhase 1 could ship with pattern matching. Long-term would integrate with the UX 2.0 modeled consciousness work — but that’s post-alpha. For now: make discovery \u003cem class=\"markup--em markup--p-em\"\u003epossible\u003c/em\u003e.\u003c/p\u003e\u003cp name=\"f809\" id=\"f809\" class=\"graf graf--p graf-after--p\"\u003eMeanwhile, canonical query work ramped up. Query #7 (historical retrospective), Query #14 (project-specific status) — the queries that power morning standups and daily check-ins. Implementation work that would feed into discovery.\u003c/p\u003e\u003ch3 name=\"a947\" id=\"a947\" class=\"graf graf--h3 graf-after--p\"\u003eDiscovery becomes real\u003c/h3\u003e\u003cp name=\"6681\" id=\"6681\" class=\"graf graf--p graf-after--h3\"\u003eWhen we were finally ready, Lead Developer coordinated twelve Code agents in parallel. Each agent got a precise prompt: specific query, specific patterns, specific formatters, specific tests.\u003c/p\u003e\u003cp name=\"098c\" id=\"098c\" class=\"graf graf--p graf-after--p\"\u003eThe queries that got implemented weren’t just features getting checked off. They were validation that the discovery architecture worked:\u003c/p\u003e\u003cp name=\"a0ee\" id=\"a0ee\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIdentity queries\u003c/strong\u003e: “What can you do?” now returns dynamic capabilities from PluginRegistry. “Are you working properly?” runs actual health checks. “How do I get help?” provides real onboarding guidance.\u003c/p\u003e\u003cp name=\"1954\" id=\"1954\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTemporal queries\u003c/strong\u003e: “What did we accomplish yesterday?” “When did we last work on this?” “How long have we been working on this?” All the time-based questions PMs naturally ask.\u003c/p\u003e\u003cp name=\"c4c5\" id=\"c4c5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSpatial queries\u003c/strong\u003e: “What projects are we working on?” “Which project should I focus on?” “Show me the project landscape.” The workspace navigation questions.\u003c/p\u003e\u003cp name=\"5d3e\" id=\"5d3e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCapability queries\u003c/strong\u003e: “Can you create a GitHub issue?” “What integrations do you have?” The meta-questions about what’s possible.\u003c/p\u003e\u003cp name=\"b677\" id=\"b677\" class=\"graf graf--p graf-after--p\"\u003eBy end of day: users could ask exploration questions and get real answers. Not generic responses, not “I can help with various tasks” — actual enumeration of capabilities, actual context about what’s available.\u003c/p\u003e\u003cp name=\"cb47\" id=\"cb47\" class=\"graf graf--p graf-after--p\"\u003eThe interesting discovery: we’d already implemented many of these queries. Query #2 (dynamic capabilities) — code existed, just untracked. Query #16 (GitHub issue creation) — working, just undocumented. Query #18 (list projects) — functional, just missing from test matrix.\u003c/p\u003e\u003cp name=\"d98a\" id=\"d98a\" class=\"graf graf--p graf-after--p\"\u003eThe 75% completion pattern striking again. Code written, functionality working, tracking abandoned. The systematic audit revealed what was actually there versus what we thought was missing.\u003c/p\u003e\u003ch3 name=\"cd7e\" id=\"cd7e\" class=\"graf graf--h3 graf-after--p\"\u003eParallel momentum\u003c/h3\u003e\u003cp name=\"1bc1\" id=\"1bc1\" class=\"graf graf--p graf-after--h3\"\u003eWhile canonical queries were getting documented and tested, a different blocker resolved.\u003c/p\u003e\u003cp name=\"29ed\" id=\"29ed\" class=\"graf graf--p graf-after--p\"\u003eThe mobile PoC had been stuck since December 7th. Expo Go’s SDK 54 bundled incompatible native module versions — Worklets 0.5.1 native vs. 0.7.1 JavaScript. No App Store update available to fix it.\u003c/p\u003e\u003cp name=\"e774\" id=\"e774\" class=\"graf graf--p graf-after--p\"\u003eSolution deferred that week: install Xcode, build native instead of relying on Expo Go’s pre-bundled modules.\u003c/p\u003e\u003cp name=\"103b\" id=\"103b\" class=\"graf graf--p graf-after--p\"\u003eTwo weeks of infrastructure work later — FK bugs, intent classification, canonical queries — development circles back to mobile. Xcode installed. Native build path available.\u003c/p\u003e\u003cp name=\"542e\" id=\"542e\" class=\"graf graf--p graf-after--p\"\u003e\u003ccode class=\"markup--code markup--p-code\"\u003enpx expo run:ios\u003c/code\u003e\u003c/p\u003e\u003cp name=\"8a1c\" id=\"8a1c\" class=\"graf graf--p graf-after--p\"\u003eAll native modules compiled. Fresh native code matching JavaScript expectations exactly. iPhone simulator launched. Entity-based gesture mapping fully functional — swipe right to complete tasks, swipe left to defer, haptic feedback, intent toasts, all working.\u003c/p\u003e\u003cp name=\"a191\" id=\"a191\" class=\"graf graf--p graf-after--p\"\u003eSeven-day blocker bypassed by building native instead of debugging Expo Go’s bundled limitations.\u003c/p\u003e\u003cp name=\"e090\" id=\"e090\" class=\"graf graf--p graf-after--p\"\u003eThis is a skunkworks project. It doesn’t block anything. But it will be a crucial input into UX research and understanding what the the holistic UX model should feel like for a mobile user.\u003c/p\u003e\u003cp name=\"05cf\" id=\"05cf\" class=\"graf graf--p graf-after--p\"\u003eThe parallel progress validated something important: sustainable work doesn’t mean single-threaded work. It means systematic work that can pause, resume, and move between contexts without losing thread.\u003c/p\u003e\u003ch3 name=\"5868\" id=\"5868\" class=\"graf graf--h3 graf-after--p\"\u003eWhat discovery enables\u003c/h3\u003e\u003cp name=\"a4fd\" id=\"a4fd\" class=\"graf graf--p graf-after--h3\"\u003eFour days. One architectural gap identified, one epic created, one implementation sprint, one mobile breakthrough.\u003c/p\u003e\u003cp name=\"37de\" id=\"37de\" class=\"graf graf--p graf-after--p\"\u003eBut the real change was conceptual, not technical.\u003c/p\u003e\u003cp name=\"dc42\" id=\"dc42\" class=\"graf graf--p graf-after--p\"\u003eBefore: Piper waited for users to know what to ask. “Create a GitHub issue” worked. “What can you do” didn’t.\u003c/p\u003e\u003cp name=\"f760\" id=\"f760\" class=\"graf graf--p graf-after--p\"\u003eAfter: Piper supports exploration. New users can ask “what services do you offer” and get an answer. They can ask “help me get started” and get guidance. They can ask “what makes you different” and get Piper’s differentiation story.\u003c/p\u003e\u003cp name=\"e724\" id=\"e724\" class=\"graf graf--p graf-after--p\"\u003eThe technical implementation — 17 patterns, 31 tests, 12 queries, proper capability enumeration — proved the architecture shift worked. But the real validation would come from actual alpha testers trying to explore what Piper could do.\u003c/p\u003e\u003cp name=\"5d43\" id=\"5d43\" class=\"graf graf--p graf-after--p\"\u003eDiscovery isn’t just a feature category. It’s a philosophical shift from assuming user knowledge to supporting user learning. From command-oriented to exploration-friendly.\u003c/p\u003e\u003cp name=\"fc67\" id=\"fc67\" class=\"graf graf--p graf-after--p\"\u003eWe’d built a system that expected expertise. We needed a system that enabled learning. The gap between those two models was the difference between “powerful for experts” and “accessible for humans.”\u003c/p\u003e\u003cp name=\"6f10\" id=\"6f10\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eNow when users ask “what can you do?” — they get a real answer.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"When Users Can’t Discover\",\"excerpt\":\"“Why did we hide all the party favors?”December 20–23, 2025Saturday evening, testing on the alpha laptop. Fresh install complete, setup wizard working (FK bugs from last week now fixed). Time to try actual PM workflows.First test: “What services do you offer?”The response came back generic. Helpf...\",\"url\":\"/blog/when-users-cant-discover\",\"publishedAt\":\"Jan 2, 2026\",\"publishedAtISO\":\"2026-01-03T02:52:46.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/267268cae81a\",\"featuredImage\":\"/assets/blog-images/267268cae81a-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/when-users-cant-discover-267268cae81a?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"when-users-cant-discover\",\"workDate\":\"Jan 3, 2026\",\"workDateISO\":\"2026-01-03T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-01-03\",\"featured\":false},\"content\":{\"title\":\"When Users Can’t Discover\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"When Users Can’t Discover | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"When Users Can’t Discover\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"When Users Can’t Discover\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
