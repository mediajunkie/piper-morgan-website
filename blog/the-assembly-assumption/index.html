Scripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T308d,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*KvRoORTxLvltb-fKXtAh6g.png\" /\u003e\u003cfigcaption\u003e“Something’s not connected right”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eFebruary 14–20\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe M0 sprint was supposed to take two to three weeks. We finished it in three days. We bragged about that in \u003ca href=\"https://www.linkedin.com/pulse/weekly-ship-031-assembly-required-christian-crumlish-bivfc/\"\u003eWeekly Ship #031\u003c/a\u003e, with a tiny bit of prescient hedging.\u003c/p\u003e\u003cp\u003eFive features. Over five hundred tests. A Lead Developer marathon that started before dawn on February 16 and didn’t stop until February 18. By Wednesday evening, every feature was complete, every test was green, and the sprint gate had evidence posted for all five capabilities.\u003c/p\u003e\u003cp\u003eI should have been celebrating. Instead, I was staring at a list of nine things that didn’t work.\u003c/p\u003e\u003ch3\u003eThe sprint that wasn’t supposed to be fast\u003c/h3\u003e\u003cp\u003eM0 — “Conversational Glue” — was our most ambitious sprint yet. Five interconnected features that would transform Piper from a capable but mechanical assistant into something that felt more like a colleague:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eNarrative onboarding\u003c/strong\u003e: Recognizing when someone mentions their “main project” and responding naturally\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eLens tracking\u003c/strong\u003e: Following up on things mentioned earlier in conversation\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSlot filling\u003c/strong\u003e: Gathering information through dialogue rather than forms\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eMulti-intent handling\u003c/strong\u003e: Decomposing complex requests into manageable pieces\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSoft invocation\u003c/strong\u003e: Recognizing implied needs and offering to help\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEach feature had its own issue, its own gameplan, its own acceptance criteria. Each was implemented with rigorous test coverage. Each passed.\u003c/p\u003e\u003cp\u003eThe sprint estimate of 13–22 days came from the scope. Five features, each touching multiple layers of the system, each requiring careful integration with existing capabilities. The three-day completion came from something else entirely — a Lead Developer session that ran twelve hours straight, methodically working through each feature with the kind of focus that only happens when everything else falls away.\u003c/p\u003e\u003cp\u003eBy Wednesday evening, I had a complete sprint. Five hundred thirty-three new tests, all green. Sprint gate evidence posted. Ready for review.\u003c/p\u003e\u003ch3\u003eThe first hint\u003c/h3\u003e\u003cp\u003eThe trouble started almost immediately.\u003c/p\u003e\u003cp\u003eAfter closing the last feature (#767, soft invocation detection), the Lead Developer did what we always do: a quick sanity check to make sure everything hangs together. The check revealed something uncomfortable.\u003c/p\u003e\u003cp\u003eEach feature worked perfectly in isolation. But when you tried to use them together — the way an actual user would — they didn’t connect.\u003c/p\u003e\u003cp\u003eSoft invocation detection worked beautifully in its own tests. It recognized phrases like “I need to schedule that meeting” and correctly identified them as implied workflow needs. But the detected invocations never appeared in actual responses. The feature existed in a bubble, producing outputs that nothing consumed.\u003c/p\u003e\u003cp\u003eLens tracking worked too. It could identify when a user referenced something from earlier in the conversation. But it wasn’t wired into the response pipeline. The lens was extracted, logged, and then… nothing.\u003c/p\u003e\u003cp\u003eThe pattern repeated across all five features. Each one complete. Each one tested. Each one disconnected from the others.\u003c/p\u003e\u003ch3\u003eNine gaps\u003c/h3\u003e\u003cp\u003eA deeper investigation revealed the full scope. Nine integration gaps, ranging from trivial (a missing two-line wire-up) to substantial (an entire subsystem with 124 tests and zero consumers):\u003c/p\u003e\u003cp\u003eThe soft invocation detector produced offers that were never appended to responses. The lens extraction system tracked context that was never used. The offer accept/decline cycle had no way to complete — users could trigger an offer but couldn’t respond to it. The slot filling framework, with its elegant state machine and comprehensive test coverage, was entirely orphaned. Nothing in the system ever called it.\u003c/p\u003e\u003cp\u003eSome gaps were architectural. The trust stage was hardcoded to “BUILDING” because nobody had wired in the actual trust computation. Some were subtle. The lens stack had push and pop methods that were designed, documented, tested — and never invoked.\u003c/p\u003e\u003cp\u003eEach gap was small in isolation. A few lines here, a missing call there. But together they meant that M0, despite being “complete,” didn’t actually work.\u003c/p\u003e\u003ch3\u003eThe five whys\u003c/h3\u003e\u003cp\u003eWe use a technique called “five whys” to find root causes. You ask why something happened, then why \u003cem\u003ethat\u003c/em\u003e happened, and keep going until you hit something structural.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy didn’t the features integrate?\u003c/strong\u003e Because they were implemented as independent units.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy were they implemented independently?\u003c/strong\u003e Because each gameplan was scoped per-issue, with acceptance criteria that could be met in isolation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy were the gameplans scoped that way?\u003c/strong\u003e Because the issues were written as independent capabilities, not user journeys.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy were the issues written that way?\u003c/strong\u003e Because the epic was decomposed into horizontal capability slices, not vertical user experience slices.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy horizontal slices?\u003c/strong\u003e Because that’s how we think about features. Each one a capability. Each one testable. Each one… separate.\u003c/p\u003e\u003cp\u003eThe root cause wasn’t a bug. It wasn’t a missed requirement. It was an assumption baked into how we planned the work.\u003c/p\u003e\u003cp\u003eWe assumed that individually correct components would compose into a correct system.\u003c/p\u003e\u003cp\u003eThey didn’t.\u003c/p\u003e\u003ch3\u003eThe assembly assumption\u003c/h3\u003e\u003cp\u003eThis pattern has a name now: the Assembly Assumption. It’s the belief — usually implicit, rarely examined — that if you build each piece correctly, the whole will work correctly too.\u003c/p\u003e\u003cp\u003eThe assumption feels reasonable. It’s how we think about most engineering. Build the engine, build the transmission, build the wheels, connect them together, and you have a car. Each component has a specification. Meet the specification, and composition follows.\u003c/p\u003e\u003cp\u003eBut software doesn’t work that way. The connections between components aren’t physical interfaces with obvious shapes. They’re data flows, implicit contracts, shared state. Feature A produces something. Feature B consumes something. If A produces eight fields and B needs ten, both features “work” — A produces a valid output, B handles its inputs gracefully. The gap only appears when they’re composed.\u003c/p\u003e\u003cp\u003eTest coverage doesn’t catch this. Each feature’s tests verify the feature. The boundaries between features — the seams where data flows from one to another — exist in the spaces between specifications. They’re systematically excluded from what we verify.\u003c/p\u003e\u003ch3\u003eThe wiring pass\u003c/h3\u003e\u003cp\u003eWe fixed all nine gaps in a single session. Most were trivial once identified — the kind of thing where you look at the code and say “oh, obviously that needs to connect to that.” A few required more thought. One (the unified formality system) needed architectural review and got deferred.\u003c/p\u003e\u003cp\u003eBut fixing the gaps wasn’t the real lesson. The lesson was that we needed a new step in our process.\u003c/p\u003e\u003cp\u003eAfter a sprint completes — after all the features are implemented and all the tests are green — we now do a “wiring pass.” It’s a dedicated session whose sole purpose is verifying composition. Not debugging (you don’t know what’s broken yet). Discovery (you’re finding what was never specified).\u003c/p\u003e\u003cp\u003eThe wiring pass has a simple protocol:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMap the seams.\u003c/strong\u003e Before touching code, draw the data flow across all features. Where does Feature A’s output become Feature B’s input? This map often reveals gaps before you look at any code.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWrite integration scenarios.\u003c/strong\u003e Not integration tests — scenarios. User journeys that cross feature boundaries. “User mentions their main project, then asks a multi-part question about it, and Piper responds with appropriate formality.” These scenarios are the specification for composition that was missing from the original planning.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWalk the code path.\u003c/strong\u003e For each scenario, trace the actual execution through the composed system. Read the code. Verify that data flows correctly across boundaries. This is where implicit contract violations surface.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFix and test.\u003c/strong\u003e For each gap discovered, create a targeted integration test, then fix the gap. The test serves as the specification that was missing.\u003c/p\u003e\u003cp\u003eThe wiring pass isn’t glamorous. It doesn’t produce new features or impressive test counts. But it’s the difference between a sprint that’s complete and a sprint that works.\u003c/p\u003e\u003ch3\u003eThe humbling part\u003c/h3\u003e\u003cp\u003eI’ve been making software for a long time. I’ve written about methodology, about verification, about the importance of systematic approaches. I should have seen this coming.\u003c/p\u003e\u003cp\u003eBut I didn’t. I watched a three-day sprint produce five hundred tests and felt satisfied. The tests were green. The features were complete. The methodology was working.\u003c/p\u003e\u003cp\u003eExcept it wasn’t working. It was verifying slices while missing the whole.\u003c/p\u003e\u003cp\u003eThe Assembly Assumption is particularly insidious because it hides behind good practices. Test-driven development? We did that. Comprehensive coverage? We had it. Rigorous acceptance criteria? Every feature met them. The assumption doesn’t contradict good practice — it lives in the gaps between good practices.\u003c/p\u003e\u003cp\u003eAgile methodologies actually make this worse. The emphasis on small, independent stories encourages horizontal decomposition. Each story is a unit. Each unit is testable. The planning framework itself creates the blind spot.\u003c/p\u003e\u003cp\u003eI don’t have a perfect solution. The wiring pass helps, but it’s reactive — you still build the features separately and then discover the gaps. A better approach would catch composition issues during planning, before implementation begins. We’re working on that.\u003c/p\u003e\u003cp\u003eFor now, the wiring pass is a checkpoint. A reminder that individually correct components don’t guarantee a correct composition. A scheduled moment to ask: does this actually work together?\u003c/p\u003e\u003ch3\u003eWhat remained\u003c/h3\u003e\u003cp\u003eBy the end of February 18, M0 was actually complete. Not just tested-and-green complete, but wired-together-and-working complete. The wiring pass added 79 more tests — integration tests that verified the seams we’d been missing.\u003c/p\u003e\u003cp\u003eThe sprint that was supposed to take three weeks finished in three days, plus one more day to discover that “finished” wasn’t the same as “working.”\u003c/p\u003e\u003cp\u003eIt was a good reminder. The methodology isn’t done evolving. The patterns we trust can have blind spots. The assumptions we don’t examine are the ones that bite us.\u003c/p\u003e\u003cp\u003eThe Assembly Assumption is documented now, as Pattern-062 in our pattern library. It joins a growing collection of things we’ve learned the hard way — not from theory, but from building something and watching it fail to compose.\u003c/p\u003e\u003cp\u003eNext time, we’ll plan differently. We’ll think about vertical slices, not just horizontal capabilities. We’ll schedule the wiring pass before the sprint gate, not after.\u003c/p\u003e\u003cp\u003eAnd we’ll remember: individually correct is not the same as collectively working.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Stranger Test — when someone logs in with a fresh account and no developer muscle memory, they find things a thousand tests couldn’t see.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever watched a system pass all its tests and still not work? What was hiding in the gaps?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=70db03f45991\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-assembly-assumption-70db03f45991\"\u003eThe Assembly Assumption\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T41d5,"])</script><script>self.__next_f.push([1,"\u003csection name=\"f07d\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"f163\" id=\"f163\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Assembly Assumption\u003c/h3\u003e\u003cfigure name=\"e727\" id=\"e727\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*KvRoORTxLvltb-fKXtAh6g.png\" data-width=\"1536\" data-height=\"1024\" src=\"https://cdn-images-1.medium.com/max/800/1*KvRoORTxLvltb-fKXtAh6g.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Something’s not connected right”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"2e9f\" id=\"2e9f\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eFebruary 14–20\u003c/em\u003e\u003c/p\u003e\u003cp name=\"5541\" id=\"5541\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ehe M0 sprint was supposed to take two to three weeks. We finished it in three days. We bragged about that in \u003ca href=\"https://www.linkedin.com/pulse/weekly-ship-031-assembly-required-christian-crumlish-bivfc/\" data-href=\"https://www.linkedin.com/pulse/weekly-ship-031-assembly-required-christian-crumlish-bivfc/\" class=\"markup--anchor markup--p-anchor\" rel=\"noopener\" target=\"_blank\"\u003eWeekly Ship #031\u003c/a\u003e, with a tiny bit of prescient hedging.\u003c/p\u003e\u003cp name=\"5d5e\" id=\"5d5e\" class=\"graf graf--p graf-after--p\"\u003eFive features. Over five hundred tests. A Lead Developer marathon that started before dawn on February 16 and didn’t stop until February 18. By Wednesday evening, every feature was complete, every test was green, and the sprint gate had evidence posted for all five capabilities.\u003c/p\u003e\u003cp name=\"b470\" id=\"b470\" class=\"graf graf--p graf-after--p\"\u003eI should have been celebrating. Instead, I was staring at a list of nine things that didn’t work.\u003c/p\u003e\u003ch3 name=\"23c8\" id=\"23c8\" class=\"graf graf--h3 graf-after--p\"\u003eThe sprint that wasn’t supposed to be fast\u003c/h3\u003e\u003cp name=\"a15a\" id=\"a15a\" class=\"graf graf--p graf-after--h3\"\u003eM0 — “Conversational Glue” — was our most ambitious sprint yet. Five interconnected features that would transform Piper from a capable but mechanical assistant into something that felt more like a colleague:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"1dbd\" id=\"1dbd\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eNarrative onboarding\u003c/strong\u003e: Recognizing when someone mentions their “main project” and responding naturally\u003c/li\u003e\u003cli name=\"3f28\" id=\"3f28\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eLens tracking\u003c/strong\u003e: Following up on things mentioned earlier in conversation\u003c/li\u003e\u003cli name=\"883a\" id=\"883a\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSlot filling\u003c/strong\u003e: Gathering information through dialogue rather than forms\u003c/li\u003e\u003cli name=\"6dfc\" id=\"6dfc\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eMulti-intent handling\u003c/strong\u003e: Decomposing complex requests into manageable pieces\u003c/li\u003e\u003cli name=\"a574\" id=\"a574\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSoft invocation\u003c/strong\u003e: Recognizing implied needs and offering to help\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"f6fa\" id=\"f6fa\" class=\"graf graf--p graf-after--li\"\u003eEach feature had its own issue, its own gameplan, its own acceptance criteria. Each was implemented with rigorous test coverage. Each passed.\u003c/p\u003e\u003cp name=\"1a35\" id=\"1a35\" class=\"graf graf--p graf-after--p\"\u003eThe sprint estimate of 13–22 days came from the scope. Five features, each touching multiple layers of the system, each requiring careful integration with existing capabilities. The three-day completion came from something else entirely — a Lead Developer session that ran twelve hours straight, methodically working through each feature with the kind of focus that only happens when everything else falls away.\u003c/p\u003e\u003cp name=\"9a41\" id=\"9a41\" class=\"graf graf--p graf-after--p\"\u003eBy Wednesday evening, I had a complete sprint. Five hundred thirty-three new tests, all green. Sprint gate evidence posted. Ready for review.\u003c/p\u003e\u003ch3 name=\"d942\" id=\"d942\" class=\"graf graf--h3 graf-after--p\"\u003eThe first hint\u003c/h3\u003e\u003cp name=\"f230\" id=\"f230\" class=\"graf graf--p graf-after--h3\"\u003eThe trouble started almost immediately.\u003c/p\u003e\u003cp name=\"754c\" id=\"754c\" class=\"graf graf--p graf-after--p\"\u003eAfter closing the last feature (#767, soft invocation detection), the Lead Developer did what we always do: a quick sanity check to make sure everything hangs together. The check revealed something uncomfortable.\u003c/p\u003e\u003cp name=\"68b5\" id=\"68b5\" class=\"graf graf--p graf-after--p\"\u003eEach feature worked perfectly in isolation. But when you tried to use them together — the way an actual user would — they didn’t connect.\u003c/p\u003e\u003cp name=\"033e\" id=\"033e\" class=\"graf graf--p graf-after--p\"\u003eSoft invocation detection worked beautifully in its own tests. It recognized phrases like “I need to schedule that meeting” and correctly identified them as implied workflow needs. But the detected invocations never appeared in actual responses. The feature existed in a bubble, producing outputs that nothing consumed.\u003c/p\u003e\u003cp name=\"73fd\" id=\"73fd\" class=\"graf graf--p graf-after--p\"\u003eLens tracking worked too. It could identify when a user referenced something from earlier in the conversation. But it wasn’t wired into the response pipeline. The lens was extracted, logged, and then… nothing.\u003c/p\u003e\u003cp name=\"b88a\" id=\"b88a\" class=\"graf graf--p graf-after--p\"\u003eThe pattern repeated across all five features. Each one complete. Each one tested. Each one disconnected from the others.\u003c/p\u003e\u003ch3 name=\"8715\" id=\"8715\" class=\"graf graf--h3 graf-after--p\"\u003eNine gaps\u003c/h3\u003e\u003cp name=\"487e\" id=\"487e\" class=\"graf graf--p graf-after--h3\"\u003eA deeper investigation revealed the full scope. Nine integration gaps, ranging from trivial (a missing two-line wire-up) to substantial (an entire subsystem with 124 tests and zero consumers):\u003c/p\u003e\u003cp name=\"336f\" id=\"336f\" class=\"graf graf--p graf-after--p\"\u003eThe soft invocation detector produced offers that were never appended to responses. The lens extraction system tracked context that was never used. The offer accept/decline cycle had no way to complete — users could trigger an offer but couldn’t respond to it. The slot filling framework, with its elegant state machine and comprehensive test coverage, was entirely orphaned. Nothing in the system ever called it.\u003c/p\u003e\u003cp name=\"e37d\" id=\"e37d\" class=\"graf graf--p graf-after--p\"\u003eSome gaps were architectural. The trust stage was hardcoded to “BUILDING” because nobody had wired in the actual trust computation. Some were subtle. The lens stack had push and pop methods that were designed, documented, tested — and never invoked.\u003c/p\u003e\u003cp name=\"d1b9\" id=\"d1b9\" class=\"graf graf--p graf-after--p\"\u003eEach gap was small in isolation. A few lines here, a missing call there. But together they meant that M0, despite being “complete,” didn’t actually work.\u003c/p\u003e\u003ch3 name=\"5c9b\" id=\"5c9b\" class=\"graf graf--h3 graf-after--p\"\u003eThe five whys\u003c/h3\u003e\u003cp name=\"83db\" id=\"83db\" class=\"graf graf--p graf-after--h3\"\u003eWe use a technique called “five whys” to find root causes. You ask why something happened, then why \u003cem class=\"markup--em markup--p-em\"\u003ethat\u003c/em\u003e happened, and keep going until you hit something structural.\u003c/p\u003e\u003cp name=\"a4cb\" id=\"a4cb\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy didn’t the features integrate?\u003c/strong\u003e Because they were implemented as independent units.\u003c/p\u003e\u003cp name=\"15f1\" id=\"15f1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy were they implemented independently?\u003c/strong\u003e Because each gameplan was scoped per-issue, with acceptance criteria that could be met in isolation.\u003c/p\u003e\u003cp name=\"97ca\" id=\"97ca\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy were the gameplans scoped that way?\u003c/strong\u003e Because the issues were written as independent capabilities, not user journeys.\u003c/p\u003e\u003cp name=\"8edf\" id=\"8edf\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy were the issues written that way?\u003c/strong\u003e Because the epic was decomposed into horizontal capability slices, not vertical user experience slices.\u003c/p\u003e\u003cp name=\"67a6\" id=\"67a6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy horizontal slices?\u003c/strong\u003e Because that’s how we think about features. Each one a capability. Each one testable. Each one… separate.\u003c/p\u003e\u003cp name=\"13c3\" id=\"13c3\" class=\"graf graf--p graf-after--p\"\u003eThe root cause wasn’t a bug. It wasn’t a missed requirement. It was an assumption baked into how we planned the work.\u003c/p\u003e\u003cp name=\"7c11\" id=\"7c11\" class=\"graf graf--p graf-after--p\"\u003eWe assumed that individually correct components would compose into a correct system.\u003c/p\u003e\u003cp name=\"c35b\" id=\"c35b\" class=\"graf graf--p graf-after--p\"\u003eThey didn’t.\u003c/p\u003e\u003ch3 name=\"87e5\" id=\"87e5\" class=\"graf graf--h3 graf-after--p\"\u003eThe assembly assumption\u003c/h3\u003e\u003cp name=\"2fb2\" id=\"2fb2\" class=\"graf graf--p graf-after--h3\"\u003eThis pattern has a name now: the Assembly Assumption. It’s the belief — usually implicit, rarely examined — that if you build each piece correctly, the whole will work correctly too.\u003c/p\u003e\u003cp name=\"0795\" id=\"0795\" class=\"graf graf--p graf-after--p\"\u003eThe assumption feels reasonable. It’s how we think about most engineering. Build the engine, build the transmission, build the wheels, connect them together, and you have a car. Each component has a specification. Meet the specification, and composition follows.\u003c/p\u003e\u003cp name=\"5a28\" id=\"5a28\" class=\"graf graf--p graf-after--p\"\u003eBut software doesn’t work that way. The connections between components aren’t physical interfaces with obvious shapes. They’re data flows, implicit contracts, shared state. Feature A produces something. Feature B consumes something. If A produces eight fields and B needs ten, both features “work” — A produces a valid output, B handles its inputs gracefully. The gap only appears when they’re composed.\u003c/p\u003e\u003cp name=\"5c8b\" id=\"5c8b\" class=\"graf graf--p graf-after--p\"\u003eTest coverage doesn’t catch this. Each feature’s tests verify the feature. The boundaries between features — the seams where data flows from one to another — exist in the spaces between specifications. They’re systematically excluded from what we verify.\u003c/p\u003e\u003ch3 name=\"5ae5\" id=\"5ae5\" class=\"graf graf--h3 graf-after--p\"\u003eThe wiring pass\u003c/h3\u003e\u003cp name=\"d392\" id=\"d392\" class=\"graf graf--p graf-after--h3\"\u003eWe fixed all nine gaps in a single session. Most were trivial once identified — the kind of thing where you look at the code and say “oh, obviously that needs to connect to that.” A few required more thought. One (the unified formality system) needed architectural review and got deferred.\u003c/p\u003e\u003cp name=\"de77\" id=\"de77\" class=\"graf graf--p graf-after--p\"\u003eBut fixing the gaps wasn’t the real lesson. The lesson was that we needed a new step in our process.\u003c/p\u003e\u003cp name=\"d6d2\" id=\"d6d2\" class=\"graf graf--p graf-after--p\"\u003eAfter a sprint completes — after all the features are implemented and all the tests are green — we now do a “wiring pass.” It’s a dedicated session whose sole purpose is verifying composition. Not debugging (you don’t know what’s broken yet). Discovery (you’re finding what was never specified).\u003c/p\u003e\u003cp name=\"e7ed\" id=\"e7ed\" class=\"graf graf--p graf-after--p\"\u003eThe wiring pass has a simple protocol:\u003c/p\u003e\u003cp name=\"1518\" id=\"1518\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMap the seams.\u003c/strong\u003e Before touching code, draw the data flow across all features. Where does Feature A’s output become Feature B’s input? This map often reveals gaps before you look at any code.\u003c/p\u003e\u003cp name=\"dedd\" id=\"dedd\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWrite integration scenarios.\u003c/strong\u003e Not integration tests — scenarios. User journeys that cross feature boundaries. “User mentions their main project, then asks a multi-part question about it, and Piper responds with appropriate formality.” These scenarios are the specification for composition that was missing from the original planning.\u003c/p\u003e\u003cp name=\"bf90\" id=\"bf90\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWalk the code path.\u003c/strong\u003e For each scenario, trace the actual execution through the composed system. Read the code. Verify that data flows correctly across boundaries. This is where implicit contract violations surface.\u003c/p\u003e\u003cp name=\"c1e1\" id=\"c1e1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFix and test.\u003c/strong\u003e For each gap discovered, create a targeted integration test, then fix the gap. The test serves as the specification that was missing.\u003c/p\u003e\u003cp name=\"c80a\" id=\"c80a\" class=\"graf graf--p graf-after--p\"\u003eThe wiring pass isn’t glamorous. It doesn’t produce new features or impressive test counts. But it’s the difference between a sprint that’s complete and a sprint that works.\u003c/p\u003e\u003ch3 name=\"662d\" id=\"662d\" class=\"graf graf--h3 graf-after--p\"\u003eThe humbling part\u003c/h3\u003e\u003cp name=\"191e\" id=\"191e\" class=\"graf graf--p graf-after--h3\"\u003eI’ve been making software for a long time. I’ve written about methodology, about verification, about the importance of systematic approaches. I should have seen this coming.\u003c/p\u003e\u003cp name=\"0a89\" id=\"0a89\" class=\"graf graf--p graf-after--p\"\u003eBut I didn’t. I watched a three-day sprint produce five hundred tests and felt satisfied. The tests were green. The features were complete. The methodology was working.\u003c/p\u003e\u003cp name=\"859c\" id=\"859c\" class=\"graf graf--p graf-after--p\"\u003eExcept it wasn’t working. It was verifying slices while missing the whole.\u003c/p\u003e\u003cp name=\"cb48\" id=\"cb48\" class=\"graf graf--p graf-after--p\"\u003eThe Assembly Assumption is particularly insidious because it hides behind good practices. Test-driven development? We did that. Comprehensive coverage? We had it. Rigorous acceptance criteria? Every feature met them. The assumption doesn’t contradict good practice — it lives in the gaps between good practices.\u003c/p\u003e\u003cp name=\"b853\" id=\"b853\" class=\"graf graf--p graf-after--p\"\u003eAgile methodologies actually make this worse. The emphasis on small, independent stories encourages horizontal decomposition. Each story is a unit. Each unit is testable. The planning framework itself creates the blind spot.\u003c/p\u003e\u003cp name=\"1ccb\" id=\"1ccb\" class=\"graf graf--p graf-after--p\"\u003eI don’t have a perfect solution. The wiring pass helps, but it’s reactive — you still build the features separately and then discover the gaps. A better approach would catch composition issues during planning, before implementation begins. We’re working on that.\u003c/p\u003e\u003cp name=\"1920\" id=\"1920\" class=\"graf graf--p graf-after--p\"\u003eFor now, the wiring pass is a checkpoint. A reminder that individually correct components don’t guarantee a correct composition. A scheduled moment to ask: does this actually work together?\u003c/p\u003e\u003ch3 name=\"168e\" id=\"168e\" class=\"graf graf--h3 graf-after--p\"\u003eWhat remained\u003c/h3\u003e\u003cp name=\"7edc\" id=\"7edc\" class=\"graf graf--p graf-after--h3\"\u003eBy the end of February 18, M0 was actually complete. Not just tested-and-green complete, but wired-together-and-working complete. The wiring pass added 79 more tests — integration tests that verified the seams we’d been missing.\u003c/p\u003e\u003cp name=\"b955\" id=\"b955\" class=\"graf graf--p graf-after--p\"\u003eThe sprint that was supposed to take three weeks finished in three days, plus one more day to discover that “finished” wasn’t the same as “working.”\u003c/p\u003e\u003cp name=\"fdee\" id=\"fdee\" class=\"graf graf--p graf-after--p\"\u003eIt was a good reminder. The methodology isn’t done evolving. The patterns we trust can have blind spots. The assumptions we don’t examine are the ones that bite us.\u003c/p\u003e\u003cp name=\"9c4a\" id=\"9c4a\" class=\"graf graf--p graf-after--p\"\u003eThe Assembly Assumption is documented now, as Pattern-062 in our pattern library. It joins a growing collection of things we’ve learned the hard way — not from theory, but from building something and watching it fail to compose.\u003c/p\u003e\u003cp name=\"f742\" id=\"f742\" class=\"graf graf--p graf-after--p\"\u003eNext time, we’ll plan differently. We’ll think about vertical slices, not just horizontal capabilities. We’ll schedule the wiring pass before the sprint gate, not after.\u003c/p\u003e\u003cp name=\"eab1\" id=\"eab1\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eAnd we’ll remember: individually correct is not the same as collectively working.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Assembly Assumption\",\"excerpt\":\"“Something’s not connected right”February 14–20The M0 sprint was supposed to take two to three weeks. We finished it in three days. We bragged about that in Weekly Ship #031, with a tiny bit of prescient hedging.Five features. Over five hundred tests. A Lead Developer marathon that started before...\",\"url\":\"/blog/the-assembly-assumption\",\"publishedAt\":\"Mar 3, 2026\",\"publishedAtISO\":\"2026-03-03T20:31:53.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/70db03f45991\",\"featuredImage\":\"/assets/blog-images/70db03f45991-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-assembly-assumption-70db03f45991?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-assembly-assumption\",\"workDate\":\"Mar 3, 2026\",\"workDateISO\":\"2026-03-03T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-03-03\",\"featured\":false},\"content\":{\"title\":\"The Assembly Assumption\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Assembly Assumption | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Assembly Assumption\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Assembly Assumption\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
