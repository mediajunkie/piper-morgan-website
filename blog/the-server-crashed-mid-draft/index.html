templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-d77bb6e505e4c783.js\"],\"BlogPostContent\"]\n1a:T1df2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 17–21, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eI was drafting a post one evening — somewhere past the halfway point, deep into the part of the writing where revision and forward motion blur into the same activity. The session ended unexpectedly. Server error, network drop, something on the platform side I couldn't see and couldn't recover. When I came back to look two days later, I expected to find my draft as an untracked file in the working tree.\u003c/p\u003e\n\u003cp\u003eIt wasn't there.\u003c/p\u003e\n\u003cp\u003eI'd saved it, but I hadn't \"committed\" it. Untracked files don't always survive a hard session crash. The post was gone.\u003c/p\u003e\n\u003ch1\u003eThe category\u003c/h1\u003e\n\u003cp\u003eThis is a specific category of vulnerability that's easy to miss because most of the time it costs you nothing. New files in untracked state — files you've written to disk but not yet committed to version control — exist in a small window where they're visible to you, accessible to your tools, present on the filesystem, but completely outside the repository's safety net.\u003c/p\u003e\n\u003cp\u003eA \u003ccode\u003egit pull\u003c/code\u003e may move them or warn about them or proceed past them depending on flags and conflicts. A \u003ccode\u003egit checkout\u003c/code\u003e to a different branch may or may not preserve them depending on what the destination branch has at the same path. A \u003ccode\u003egit stash -u\u003c/code\u003e will sweep them into the stash and remove them from disk. A session crash that loses the working directory entirely loses them silently, with no rollback path and no diagnostic trail.\u003c/p\u003e\n\u003cp\u003eThis is git working exactly as documented. The vulnerability lives in the gap between \u003cem\u003eI wrote this\u003c/em\u003e and \u003cem\u003ethis is in the history.\u003c/em\u003e\u003c/p\u003e\n\u003ch1\u003eWhy it's hard to remember to close the window\u003c/h1\u003e\n\u003cp\u003eIn normal flow, the cost of an uncommitted file feels low. You can see it. You know where it is. You'll commit it in a few minutes when you reach a natural stopping point. The vulnerability window is short. The probability of a session crash inside that window is small.\u003c/p\u003e\n\u003cp\u003eThe trouble is the probability is small \u003cem\u003ebut nonzero\u003c/em\u003e, and the consequences are total. Most of the time the few-minute window costs you nothing. Sometimes it costs you the file.\u003c/p\u003e\n\u003cp\u003eThat asymmetry — high-frequency tiny win, low-frequency total loss — is why people ignore disciplines for years without consequence and then catastrophically regret skipping in a single moment. Wear a seatbelt every car ride. Back up your laptop weekly. Commit immediately after writing a new file. The first two are old wisdom. The third one I had to learn the way you learn most things — by losing the file. And I still treat it like flossing!\u003c/p\u003e\n\u003ch1\u003eWhat \"immediately\" actually means\u003c/h1\u003e\n\u003cp\u003eThe discipline that came out of the incident is mechanical: after writing a new file with substantive content, run \u003ccode\u003egit add\u003c/code\u003e and \u003ccode\u003egit commit\u003c/code\u003e and \u003ccode\u003egit push\u003c/code\u003e \u003cem\u003ein that order, before any other substantive tool call\u003c/em\u003e. Thirty seconds of overhead. Closes the window from minutes-or-hours down to a few seconds.\u003c/p\u003e\n\u003cp\u003eThe commit doesn't have to be polished. The message can be \"WIP draft\" or \"scaffolding the structure\" or \"initial sketch.\" The commit is a checkpoint, not a release. What matters is that the file exists in the repository's history, not just on disk.\u003c/p\u003e\n\u003cp\u003ePush matters too, separately. A local commit survives most session crashes — git's object database is durable on disk. But the worktree's disk itself can fail. Network outages and hardware faults aren't the most common failure mode, but the cost of the push is so low that there's no good reason to defer it. Push is what makes the file survive everything below the level of the remote.\u003c/p\u003e\n\u003ch1\u003eThe variance is what kills you\u003c/h1\u003e\n\u003cp\u003eLoss of an uncommitted file isn't proportional to its size. Reconstructing a fifteen-hundred-word post from memory is a few hours of focused work, in a state where you've already done the hardest part — the original drafting — and you're now doing it again, more slowly, with the friction of \u003cem\u003eI already had this and I lost it.\u003c/em\u003e The reconstruction is usually worse than the original.\u003c/p\u003e\n\u003cp\u003eReconstructing a one-line commit message is seconds. The variance of recovery cost on uncommitted work is wildly skewed. New files with substantive content sit at the high end. New scaffolding files that haven't been touched since you created them sit at the low end. The category that warrants the discipline is the high-cost end. You can be looser about the low-cost end — but the discipline that says \u003cem\u003ejust always commit immediately\u003c/em\u003e is easier to follow than the discipline that says \u003cem\u003ecommit immediately when the cost-of-loss is high.\u003c/em\u003e The first one is mechanical. The second one requires judgment in the moment you're least likely to apply it.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eI will be honest, though. I am still sloppy about this. Some of it is the context switching. I am editing directly on my Mac, in a file editor. To commit the work after editing means switching to a terminal or development tool. I am lazy. \"Can't you do it for me?\" is my whiny refrain.\u003c/em\u003e\u003c/p\u003e\n\u003ch1\u003eWhat rescued me this time\u003c/h1\u003e\n\u003cp\u003eThe draft did get recovered, two days later. I remembered the through-line clearly. I'd been writing in voice that returned naturally. The reconstruction landed close enough to what I'd lost that the post made it to production on its original schedule.\u003c/p\u003e\n\u003cp\u003eThat's a happy ending, but not one I want to count on. The recovery took a real chunk of focused work — attention I'd planned to spend on something else. The discipline I now run is the alternative: thirty seconds of commit-immediately, no recovery cost, no detour.\u003c/p\u003e\n\u003cp\u003eThe math isn't subtle. The math is almost too obvious to write down. The seductive thing about the few-minute window is that it almost always feels safe. Each individual instance you skipped the commit and got away with it reinforces the \u003cem\u003ealmost always.\u003c/em\u003e The instance where you don't get away with it is the one that pays for all the times you did.\u003c/p\u003e\n\u003ch1\u003eThe deeper read\u003c/h1\u003e\n\u003cp\u003eEvery workflow has invisible failure modes. The mature response isn't to avoid the failure modes — that's mostly impossible. The mature response is to identify the windows of maximum vulnerability and close them mechanically.\u003c/p\u003e\n\u003cp\u003eCommit-immediately-after-write is one of those mechanisms. There are others: regular pushes, version-control-everything-not-just-code, treating your editor's autosave as no substitute for git history, treating cloud sync as no substitute for either. Each closes a particular kind of window. None of them are clever. All of them are habits.\u003c/p\u003e\n\u003cp\u003eThe discipline is about recognizing where you're exposed and shortening the window, not about being unusually careful. Once the discipline is muscle memory, the cognitive cost drops to near zero — the keyboard knows to type the commit before the next thought arrives. The vulnerability window collapses from minutes to seconds, and the few-minute window stops existing as a category of risk.\u003c/p\u003e\n\u003cp\u003eThe post I lost did come back. The next post won't have to. Thirty seconds of immediate commit closes a window that, in retrospect, never should have been open.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \"The Migration Wave\" — a realignment, the team gone worktree-native, a confabulation caught, and a launch: the arc's resolution, told as operational-not-finished.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhat's a discipline you only adopted after losing the file the discipline would have saved? Where in your workflow do the few-minute windows still live? What does it take to make a mechanical habit out of something that mostly costs you nothing?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Server Crashed Mid-Draft\",\"guid\":\"blog-first-b63577f98aa8\",\"url\":\"/blog/the-server-crashed-mid-draft\",\"publishedAt\":\"Jul 12, 2026\",\"workDate\":\"May 17, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/the-server-crashed-mid-draft.webp\",\"imageAlt\":\"A writer watches as a single page lifts from a neatly stacked manuscript and blows out through a slightly open window, illustrating how a brief window of vulnerability can put valuable work at risk.\",\"imageCaption\":\"\\\"I meant to close that!\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"The Server Crashed Mid-Draft\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Server Crashed Mid-Draft | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"May 17–21, 2026 I was drafting a post one evening — somewhere past the halfway point, deep into the part of the writing where revision and forward motion blur into the same activity. The session ended unexpectedly. Server error, network drop, something on the platform side I couldn't see and coul...\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"4\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"6\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"7\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"8\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"9\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:title\",\"content\":\"The Server Crashed Mid-Draft\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:description\",\"content\":\"May 17–21, 2026 I was drafting a post one evening — somewhere past the halfway point, deep
