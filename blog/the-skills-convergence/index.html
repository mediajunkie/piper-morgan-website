}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T31cd,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*qfRLZk8hDUU7wpCB2UwHVQ.png\" /\u003e\u003cfigcaption\u003e“These all fit together!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 15\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSometimes you discover you’ve been working the hard way. Not because you made bad decisions, but because you didn’t have all the information yet. That’s what happened on Saturday morning when I brought a new idea to my Chief of Staff. We had the Chief Architect analyze token usage patterns and we found something remarkable: we could reduce our most expensive operations by 98.7%.\u003c/p\u003e\u003cp\u003eBut this isn’t a story about optimization. It’s about what happens when efficiency reveals itself as strategy, when three separate problems converge into one solution, and when an economic model emerges that funds its own transformation.\u003c/p\u003e\u003ch3\u003eThe expensive way to process documents\u003c/h3\u003e\u003cp\u003eSaturday November 15 started at 5:39 AM with my Chief Architect investigating a question: how efficiently was Piper using Model Context Protocol (MCP)?\u003c/p\u003e\u003cp\u003eA few days earlier, Anthropic had published research showing something counterintuitive. When LLMs call tools through MCP, they consume tokens for every step: input, output, reasoning. But when they write code that uses those tools and then execute that code? Token savings of 98.7%. The difference is fundamental: orchestration happens in the model’s context (expensive) versus orchestration happens in code execution (cheap).\u003c/p\u003e\u003cp\u003eMy Chief Architect looked at Piper’s actual usage patterns. We had five MCP servers active: GitHub (heavy usage), Slack (medium), Calendar (light), Notion (heavy), Serena (medium). The token-heavy pattern was immediately visible: document processing consumed ~150,000 tokens per operation.\u003c/p\u003e\u003cp\u003eHere’s why. When a user asks “summarize my documents from last week,” the model orchestrates a chain:\u003c/p\u003e\u003col\u003e\u003cli\u003eCall Notion MCP to list documents (3K tokens)\u003c/li\u003e\u003cli\u003eParse results, identify relevant docs (2K tokens)\u003c/li\u003e\u003cli\u003eCall Notion MCP to fetch each document (10K tokens × 5 docs)\u003c/li\u003e\u003cli\u003eCall GitHub MCP to check related issues (5K tokens)\u003c/li\u003e\u003cli\u003eSynthesize everything into summary (8K tokens)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eTotal: ~65K tokens just for the tool calls. Add reasoning overhead and context management, and you’re at 150K tokens for a single document query.\u003c/p\u003e\u003cp\u003e[PLACEHOLDER: When you first saw these numbers, what was your reaction? Did this surprise you, or does this connect to past experiences with inefficient architectures that only revealed themselves through measurement?]\u003c/p\u003e\u003cp\u003eThe expensive part isn’t any individual step — it’s that every step flows through the model’s context window. Each tool’s output becomes the next tool’s input, all mediated by the LLM. The model is doing secretarial work instead of thinking work.\u003c/p\u003e\u003ch3\u003eThree tiers of tool usage\u003c/h3\u003e\u003cp\u003eAt 5:50 AM, the Chief Architect proposed a three-tier strategy:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTier 1: Direct MCP\u003c/strong\u003e — Keep for simple, one-shot operations under 1,000 tokens. Checking a calendar, posting a Slack message, creating a GitHub issue. These are fine. The orchestration overhead is minimal.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTier 2: Skills MCP\u003c/strong\u003e — NEW approach for common multi-step patterns. Instead of the model orchestrating tool calls, we encapsulate entire workflows as executable skills. The model writes code once, we execute it repeatedly.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTier 3: Code Execution\u003c/strong\u003e — For complex, custom workflows that don’t fit predefined patterns. The model writes fresh code, we execute it.\u003c/p\u003e\u003cp\u003eThe key insight: LLMs are better at writing code than calling tools. Their training data is full of code. They’ve seen millions of examples of “fetch data, process it, return results.” They’re excellent at generating Python or JavaScript that accomplishes multi-step workflows.\u003c/p\u003e\u003cp\u003eBy 6:00 AM, the Skills MCP architecture was designed:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eSkillsMCP meta-server\u003c/strong\u003e provides executable skills to agents\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSkills encapsulate workflows\u003c/strong\u003e: StandupToIssuesSkill, DocumentAnalysisSkill, BatchProcessingSkill\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eData stays in execution environment\u003c/strong\u003e: No massive outputs flowing back to model\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eOnly summaries return\u003c/strong\u003e: Model sees ~50 tokens of result, not 50K tokens of intermediate data\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe projected savings were dramatic: 90–98% token reduction on common patterns.\u003c/p\u003e\u003ch3\u003eWhen everything connects\u003c/h3\u003e\u003cp\u003eAt 7:30 AM, something interesting happened. The Chief Architect was reviewing yesterday’s UX audit findings — 350 pages documenting 68 gaps across six user journeys.\u003c/p\u003e\u003cp\u003eJourney 6 (Document Management) had scored 2 out of 10. The crisis was clear: users couldn’t effectively retrieve or manage documents they’d uploaded. The system stored documents but provided no good way to find them again.\u003c/p\u003e\u003cp\u003eThe Chief Architect looked at Journey 6 and saw: DocumentAnalysisSkill.\u003c/p\u003e\u003cp\u003eThe document management problem? Solvable with a skill that encapsulates document retrieval, filtering, and summarization.\u003c/p\u003e\u003cp\u003eThe token efficiency problem? Solvable with Skills MCP architecture.\u003c/p\u003e\u003cp\u003eThe UX improvement funding problem? Solvable with the resources saved from token efficiency.\u003c/p\u003e\u003cp\u003eThree initiatives that had seemed separate — UX transformation (my researcher estimated it as requiring $130K worth of UX work in the traditional market), Skills MCP implementation, Learning System completion — were actually one integrated transformation.\u003c/p\u003e\u003cp\u003eBy 7:40 AM, the Chief Architect had modeled the economics:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCurrent state\u003c/strong\u003e: Estimated future document processing costs ~$4,440 per month in tokens (150K tokens per query × 200 queries/day × $0.015/1K tokens)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWith Skills MCP\u003c/strong\u003e: Same operations cost ~$60 per month (token usage drops to 2K per query — just the model writing the skill execution code)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePotential monthly savings\u003c/strong\u003e: $4,380\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePotential three-month savings\u003c/strong\u003e: $13,140\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThirteen-week transformation budget\u003c/strong\u003e: $130K total\u003c/p\u003e\u003cp\u003eThe math was elegant: by week 4, Skills MCP would generate enough savings to fully fund UX improvements over three months. By week 13, the transformation would have paid for itself and established a sustainable economic model. (Even without the “funny money” that drove this logic, the tradeoffs are similar!)\u003c/p\u003e\u003ch3\u003eThe virtuous cycle\u003c/h3\u003e\u003cp\u003eThe Chief Architect mapped the convergence:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEfficiency Stream\u003c/strong\u003e (Skills MCP):\u003c/p\u003e\u003cul\u003e\u003cli\u003eMeasure, prototype, validate\u003c/li\u003e\u003cli\u003eBuild core skills library\u003c/li\u003e\u003cli\u003eMigrate agents to Skills\u003c/li\u003e\u003cli\u003eDynamic skill generation from learning patterns\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eExperience Stream\u003c/strong\u003e (UX Transformation):\u003c/p\u003e\u003cul\u003e\u003cli\u003eDesign system + quick fixes (Journey scores 4.0 → 5.5)\u003c/li\u003e\u003cli\u003eCore improvements (5.5 → 6.5)\u003c/li\u003e\u003cli\u003eDocument management overhaul (6.5 → 7.5, Journey 6 jumps 2→8)\u003c/li\u003e\u003cli\u003eAdvanced features + accessibility (7.5 → 7.8)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eIntelligence Stream\u003c/strong\u003e (Learning System):\u003c/p\u003e\u003cul\u003e\u003cli\u003eUser interactions generate patterns\u003c/li\u003e\u003cli\u003ePatterns inform skill creation\u003c/li\u003e\u003cli\u003eSkills make operations more efficient\u003c/li\u003e\u003cli\u003eEfficiency enables more sophisticated features\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEach stream strengthens the others:\u003c/p\u003e\u003cul\u003e\u003cli\u003eBetter UX → More users → More interaction patterns\u003c/li\u003e\u003cli\u003eMore patterns → Better skills → Lower costs\u003c/li\u003e\u003cli\u003eLower costs → Fund more UX improvements → Better experience\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThis wasn’t just “make things faster.” It was “build an economic engine that funds its own evolution while improving user experience and creating competitive moats.”\u003c/p\u003e\u003ch3\u003eFrom discovery to execution\u003c/h3\u003e\u003cp\u003eThe roadmap laid out clear milestones:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWeek 1\u003c/strong\u003e: Measure everything. Add token counting to all MCP operations. Establish baseline costs. Identify the most expensive patterns.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWeeks 2–3\u003c/strong\u003e: Build ONE prototype skill (probably DocumentAnalysisSkill, since it solves the worst UX problem). Validate the savings. Confirm the architecture works.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWeeks 4–6\u003c/strong\u003e: Build the core skills library. Four priority skills: DocumentAnalysis, StandupToIssues, BatchProcessing, MultiSystemWorkflow. These cover 80% of our token-heavy operations.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWeeks 7–9\u003c/strong\u003e: Migrate agents to use SkillsMCP. Update prompts, add skill selection logic, train agents to prefer skills over raw MCP calls.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWeeks 10–13\u003c/strong\u003e: Advanced patterns. Dynamic skill generation from learning system. Skills that write themselves based on observed usage patterns.\u003c/p\u003e\u003cp\u003eBy February 2026 (MVP target), the transformation would be complete:\u003c/p\u003e\u003cul\u003e\u003cli\u003eJourney scores averaging 7.8/10 (up from 4.0/10)\u003c/li\u003e\u003cli\u003eToken costs reduced by 95%+ on common operations\u003c/li\u003e\u003cli\u003eEconomic model established and validated\u003c/li\u003e\u003cli\u003eLearning system generating new skills automatically\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eAgain, even if the dates change (most of these time estimates tend to be based on human teams) the larger patterns hold.\u003c/p\u003e\u003cp\u003eThe parallel work that Saturday reinforced the plan’s viability. While the Chief Architect designed strategy, the Code Agent implemented UX Quick Wins — five features that moved critical journeys from 3/10 to 6/10 in a single session. The UX transformation was already proving its value.\u003c/p\u003e\u003ch3\u003eWhat working the hard way teaches you\u003c/h3\u003e\u003cp\u003eWe’d been using MCP correctly according to its design. The problem wasn’t that we’d made mistakes — it was that we hadn’t yet discovered the more efficient pattern.\u003c/p\u003e\u003cp\u003eThis is what systematic building enables. You build something that works. You measure how it works. You discover patterns in the measurements. The patterns reveal better approaches. The better approaches weren’t available to you initially because you needed the working system to generate the data that revealed them.\u003c/p\u003e\u003cp\u003eThe 98.7% token reduction wasn’t magic — it was the result of:\u003c/p\u003e\u003col\u003e\u003cli\u003eBuilding MCP integration properly first\u003c/li\u003e\u003cli\u003eActually measuring token usage across operations\u003c/li\u003e\u003cli\u003eAnalyzing the measurements systematically\u003c/li\u003e\u003cli\u003eRecognizing the pattern (orchestration overhead)\u003c/li\u003e\u003cli\u003eDesigning an architecture that eliminates the overhead\u003c/li\u003e\u003cli\u003eConnecting that architecture to other problems (UX gaps, economic sustainability)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eSaturday’s discovery wasn’t that we’d been doing it wrong. It was that we’d been doing it right enough to learn how to do it better. The working system generated the evidence that pointed toward the optimal system.\u003c/p\u003e\u003cp\u003eThat’s the cathedral-building payoff: patience in process creates possibilities that rushing misses. We could have panicked about token costs and made reactive optimizations. Instead, we measured systematically, analyzed comprehensively, and designed strategically. The result wasn’t just efficiency — it was transformation.\u003c/p\u003e\u003cp\u003eThe Skills MCP architecture, the UX transformation funding model, the virtuous cycle between efficiency and experience — none of this was visible until we’d built enough to see the whole picture. Systematic building reveals not just what’s wrong, but what’s possible.\u003c/p\u003e\u003cp\u003eThree problems became one solution. Token efficiency became economic strategy. Optimization became transformation. That’s what happens when you build cathedrals instead of chasing features.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext up on the Building Piper Morgan narrative, “From Chaos to Cathedral” when repository archaeology and systematic wizard fixes show that alpha readiness requires systematic thinking, not heroics. But first it’s time for another insights flashback weekend, starting tomorrow with “The Pattern Detective’s Evolution: From Curator to Noticer” from October 19.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever discovered you were working the hard way, not because you’d made mistakes, but because you needed to build the working version to see the optimal version? That’s the patient builder’s wisdom — inefficiency teaches efficiency.\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=63f5c3c9b97f\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-skills-convergence-three-problems-one-solution-63f5c3c9b97f\"\u003eThe Skills Convergence: Three Problems, One Solution\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T4882,"])</script><script>self.__next_f.push([1,"\u003csection name=\"f6aa\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"dd83\" id=\"dd83\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Skills Convergence: Three Problems, One Solution\u003c/h3\u003e\u003cfigure name=\"36ae\" id=\"36ae\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*qfRLZk8hDUU7wpCB2UwHVQ.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" src=\"https://cdn-images-1.medium.com/max/800/1*qfRLZk8hDUU7wpCB2UwHVQ.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“These all fit together!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"bec5\" id=\"bec5\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 15\u003c/em\u003e\u003c/p\u003e\u003cp name=\"c34e\" id=\"c34e\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eS\u003c/span\u003eometimes you discover you’ve been working the hard way. Not because you made bad decisions, but because you didn’t have all the information yet. That’s what happened on Saturday morning when I brought a new idea to my Chief of Staff. We had the Chief Architect analyze token usage patterns and we found something remarkable: we could reduce our most expensive operations by 98.7%.\u003c/p\u003e\u003cp name=\"4de9\" id=\"4de9\" class=\"graf graf--p graf-after--p\"\u003eBut this isn’t a story about optimization. It’s about what happens when efficiency reveals itself as strategy, when three separate problems converge into one solution, and when an economic model emerges that funds its own transformation.\u003c/p\u003e\u003ch3 name=\"3745\" id=\"3745\" class=\"graf graf--h3 graf-after--p\"\u003eThe expensive way to process documents\u003c/h3\u003e\u003cp name=\"b57f\" id=\"b57f\" class=\"graf graf--p graf-after--h3\"\u003eSaturday November 15 started at 5:39 AM with my Chief Architect investigating a question: how efficiently was Piper using Model Context Protocol (MCP)?\u003c/p\u003e\u003cp name=\"76da\" id=\"76da\" class=\"graf graf--p graf-after--p\"\u003eA few days earlier, Anthropic had published research showing something counterintuitive. When LLMs call tools through MCP, they consume tokens for every step: input, output, reasoning. But when they write code that uses those tools and then execute that code? Token savings of 98.7%. The difference is fundamental: orchestration happens in the model’s context (expensive) versus orchestration happens in code execution (cheap).\u003c/p\u003e\u003cp name=\"7624\" id=\"7624\" class=\"graf graf--p graf-after--p\"\u003eMy Chief Architect looked at Piper’s actual usage patterns. We had five MCP servers active: GitHub (heavy usage), Slack (medium), Calendar (light), Notion (heavy), Serena (medium). The token-heavy pattern was immediately visible: document processing consumed ~150,000 tokens per operation.\u003c/p\u003e\u003cp name=\"96f4\" id=\"96f4\" class=\"graf graf--p graf-after--p\"\u003eHere’s why. When a user asks “summarize my documents from last week,” the model orchestrates a chain:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"6efa\" id=\"6efa\" class=\"graf graf--li graf-after--p\"\u003eCall Notion MCP to list documents (3K tokens)\u003c/li\u003e\u003cli name=\"e249\" id=\"e249\" class=\"graf graf--li graf-after--li\"\u003eParse results, identify relevant docs (2K tokens)\u003c/li\u003e\u003cli name=\"1f53\" id=\"1f53\" class=\"graf graf--li graf-after--li\"\u003eCall Notion MCP to fetch each document (10K tokens × 5 docs)\u003c/li\u003e\u003cli name=\"1c87\" id=\"1c87\" class=\"graf graf--li graf-after--li\"\u003eCall GitHub MCP to check related issues (5K tokens)\u003c/li\u003e\u003cli name=\"8134\" id=\"8134\" class=\"graf graf--li graf-after--li\"\u003eSynthesize everything into summary (8K tokens)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"95dc\" id=\"95dc\" class=\"graf graf--p graf-after--li\"\u003eTotal: ~65K tokens just for the tool calls. Add reasoning overhead and context management, and you’re at 150K tokens for a single document query.\u003c/p\u003e\u003cp name=\"1158\" id=\"1158\" class=\"graf graf--p graf-after--p\"\u003e[PLACEHOLDER: When you first saw these numbers, what was your reaction? Did this surprise you, or does this connect to past experiences with inefficient architectures that only revealed themselves through measurement?]\u003c/p\u003e\u003cp name=\"c84f\" id=\"c84f\" class=\"graf graf--p graf-after--p\"\u003eThe expensive part isn’t any individual step — it’s that every step flows through the model’s context window. Each tool’s output becomes the next tool’s input, all mediated by the LLM. The model is doing secretarial work instead of thinking work.\u003c/p\u003e\u003ch3 name=\"22c1\" id=\"22c1\" class=\"graf graf--h3 graf-after--p\"\u003eThree tiers of tool usage\u003c/h3\u003e\u003cp name=\"72fc\" id=\"72fc\" class=\"graf graf--p graf-after--h3\"\u003eAt 5:50 AM, the Chief Architect proposed a three-tier strategy:\u003c/p\u003e\u003cp name=\"7f66\" id=\"7f66\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTier 1: Direct MCP\u003c/strong\u003e — Keep for simple, one-shot operations under 1,000 tokens. Checking a calendar, posting a Slack message, creating a GitHub issue. These are fine. The orchestration overhead is minimal.\u003c/p\u003e\u003cp name=\"a5c0\" id=\"a5c0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTier 2: Skills MCP\u003c/strong\u003e — NEW approach for common multi-step patterns. Instead of the model orchestrating tool calls, we encapsulate entire workflows as executable skills. The model writes code once, we execute it repeatedly.\u003c/p\u003e\u003cp name=\"45c0\" id=\"45c0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTier 3: Code Execution\u003c/strong\u003e — For complex, custom workflows that don’t fit predefined patterns. The model writes fresh code, we execute it.\u003c/p\u003e\u003cp name=\"11ce\" id=\"11ce\" class=\"graf graf--p graf-after--p\"\u003eThe key insight: LLMs are better at writing code than calling tools. Their training data is full of code. They’ve seen millions of examples of “fetch data, process it, return results.” They’re excellent at generating Python or JavaScript that accomplishes multi-step workflows.\u003c/p\u003e\u003cp name=\"ab27\" id=\"ab27\" class=\"graf graf--p graf-after--p\"\u003eBy 6:00 AM, the Skills MCP architecture was designed:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"3df7\" id=\"3df7\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSkillsMCP meta-server\u003c/strong\u003e provides executable skills to agents\u003c/li\u003e\u003cli name=\"b7ed\" id=\"b7ed\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSkills encapsulate workflows\u003c/strong\u003e: StandupToIssuesSkill, DocumentAnalysisSkill, BatchProcessingSkill\u003c/li\u003e\u003cli name=\"6549\" id=\"6549\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eData stays in execution environment\u003c/strong\u003e: No massive outputs flowing back to model\u003c/li\u003e\u003cli name=\"1ca0\" id=\"1ca0\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eOnly summaries return\u003c/strong\u003e: Model sees ~50 tokens of result, not 50K tokens of intermediate data\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"f10a\" id=\"f10a\" class=\"graf graf--p graf-after--li\"\u003eThe projected savings were dramatic: 90–98% token reduction on common patterns.\u003c/p\u003e\u003ch3 name=\"11c5\" id=\"11c5\" class=\"graf graf--h3 graf-after--p\"\u003eWhen everything connects\u003c/h3\u003e\u003cp name=\"9ba2\" id=\"9ba2\" class=\"graf graf--p graf-after--h3\"\u003eAt 7:30 AM, something interesting happened. The Chief Architect was reviewing yesterday’s UX audit findings — 350 pages documenting 68 gaps across six user journeys.\u003c/p\u003e\u003cp name=\"350f\" id=\"350f\" class=\"graf graf--p graf-after--p\"\u003eJourney 6 (Document Management) had scored 2 out of 10. The crisis was clear: users couldn’t effectively retrieve or manage documents they’d uploaded. The system stored documents but provided no good way to find them again.\u003c/p\u003e\u003cp name=\"c5e2\" id=\"c5e2\" class=\"graf graf--p graf-after--p\"\u003eThe Chief Architect looked at Journey 6 and saw: DocumentAnalysisSkill.\u003c/p\u003e\u003cp name=\"ee39\" id=\"ee39\" class=\"graf graf--p graf-after--p\"\u003eThe document management problem? Solvable with a skill that encapsulates document retrieval, filtering, and summarization.\u003c/p\u003e\u003cp name=\"b180\" id=\"b180\" class=\"graf graf--p graf-after--p\"\u003eThe token efficiency problem? Solvable with Skills MCP architecture.\u003c/p\u003e\u003cp name=\"bce8\" id=\"bce8\" class=\"graf graf--p graf-after--p\"\u003eThe UX improvement funding problem? Solvable with the resources saved from token efficiency.\u003c/p\u003e\u003cp name=\"8b75\" id=\"8b75\" class=\"graf graf--p graf-after--p\"\u003eThree initiatives that had seemed separate — UX transformation (my researcher estimated it as requiring $130K worth of UX work in the traditional market), Skills MCP implementation, Learning System completion — were actually one integrated transformation.\u003c/p\u003e\u003cp name=\"7071\" id=\"7071\" class=\"graf graf--p graf-after--p\"\u003eBy 7:40 AM, the Chief Architect had modeled the economics:\u003c/p\u003e\u003cp name=\"0103\" id=\"0103\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCurrent state\u003c/strong\u003e: Estimated future document processing costs ~$4,440 per month in tokens (150K tokens per query × 200 queries/day × $0.015/1K tokens)\u003c/p\u003e\u003cp name=\"241e\" id=\"241e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWith Skills MCP\u003c/strong\u003e: Same operations cost ~$60 per month (token usage drops to 2K per query — just the model writing the skill execution code)\u003c/p\u003e\u003cp name=\"3075\" id=\"3075\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePotential monthly savings\u003c/strong\u003e: $4,380\u003c/p\u003e\u003cp name=\"ea3d\" id=\"ea3d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePotential three-month savings\u003c/strong\u003e: $13,140\u003c/p\u003e\u003cp name=\"d882\" id=\"d882\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThirteen-week transformation budget\u003c/strong\u003e: $130K total\u003c/p\u003e\u003cp name=\"9919\" id=\"9919\" class=\"graf graf--p graf-after--p\"\u003eThe math was elegant: by week 4, Skills MCP would generate enough savings to fully fund UX improvements over three months. By week 13, the transformation would have paid for itself and established a sustainable economic model. (Even without the “funny money” that drove this logic, the tradeoffs are similar!)\u003c/p\u003e\u003ch3 name=\"8b41\" id=\"8b41\" class=\"graf graf--h3 graf-after--p\"\u003eThe virtuous cycle\u003c/h3\u003e\u003cp name=\"9a9d\" id=\"9a9d\" class=\"graf graf--p graf-after--h3\"\u003eThe Chief Architect mapped the convergence:\u003c/p\u003e\u003cp name=\"8fe3\" id=\"8fe3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEfficiency Stream\u003c/strong\u003e (Skills MCP):\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"084d\" id=\"084d\" class=\"graf graf--li graf-after--p\"\u003eMeasure, prototype, validate\u003c/li\u003e\u003cli name=\"519e\" id=\"519e\" class=\"graf graf--li graf-after--li\"\u003eBuild core skills library\u003c/li\u003e\u003cli name=\"b1e9\" id=\"b1e9\" class=\"graf graf--li graf-after--li\"\u003eMigrate agents to Skills\u003c/li\u003e\u003cli name=\"9c2c\" id=\"9c2c\" class=\"graf graf--li graf-after--li\"\u003eDynamic skill generation from learning patterns\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"96fe\" id=\"96fe\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eExperience Stream\u003c/strong\u003e (UX Transformation):\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c505\" id=\"c505\" class=\"graf graf--li graf-after--p\"\u003eDesign system + quick fixes (Journey scores 4.0 → 5.5)\u003c/li\u003e\u003cli name=\"d3ed\" id=\"d3ed\" class=\"graf graf--li graf-after--li\"\u003eCore improvements (5.5 → 6.5)\u003c/li\u003e\u003cli name=\"e188\" id=\"e188\" class=\"graf graf--li graf-after--li\"\u003eDocument management overhaul (6.5 → 7.5, Journey 6 jumps 2→8)\u003c/li\u003e\u003cli name=\"ce54\" id=\"ce54\" class=\"graf graf--li graf-after--li\"\u003eAdvanced features + accessibility (7.5 → 7.8)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"45f5\" id=\"45f5\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIntelligence Stream\u003c/strong\u003e (Learning System):\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2470\" id=\"2470\" class=\"graf graf--li graf-after--p\"\u003eUser interactions generate patterns\u003c/li\u003e\u003cli name=\"6d56\" id=\"6d56\" class=\"graf graf--li graf-after--li\"\u003ePatterns inform skill creation\u003c/li\u003e\u003cli name=\"36e3\" id=\"36e3\" class=\"graf graf--li graf-after--li\"\u003eSkills make operations more efficient\u003c/li\u003e\u003cli name=\"394d\" id=\"394d\" class=\"graf graf--li graf-after--li\"\u003eEfficiency enables more sophisticated features\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"8e22\" id=\"8e22\" class=\"graf graf--p graf-after--li\"\u003eEach stream strengthens the others:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"aa62\" id=\"aa62\" class=\"graf graf--li graf-after--p\"\u003eBetter UX → More users → More interaction patterns\u003c/li\u003e\u003cli name=\"eaaa\" id=\"eaaa\" class=\"graf graf--li graf-after--li\"\u003eMore patterns → Better skills → Lower costs\u003c/li\u003e\u003cli name=\"f013\" id=\"f013\" class=\"graf graf--li graf-after--li\"\u003eLower costs → Fund more UX improvements → Better experience\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"bc78\" id=\"bc78\" class=\"graf graf--p graf-after--li\"\u003eThis wasn’t just “make things faster.” It was “build an economic engine that funds its own evolution while improving user experience and creating competitive moats.”\u003c/p\u003e\u003ch3 name=\"8a4b\" id=\"8a4b\" class=\"graf graf--h3 graf-after--p\"\u003eFrom discovery to execution\u003c/h3\u003e\u003cp name=\"e5d8\" id=\"e5d8\" class=\"graf graf--p graf-after--h3\"\u003eThe roadmap laid out clear milestones:\u003c/p\u003e\u003cp name=\"14b2\" id=\"14b2\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWeek 1\u003c/strong\u003e: Measure everything. Add token counting to all MCP operations. Establish baseline costs. Identify the most expensive patterns.\u003c/p\u003e\u003cp name=\"dec3\" id=\"dec3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWeeks 2–3\u003c/strong\u003e: Build ONE prototype skill (probably DocumentAnalysisSkill, since it solves the worst UX problem). Validate the savings. Confirm the architecture works.\u003c/p\u003e\u003cp name=\"5765\" id=\"5765\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWeeks 4–6\u003c/strong\u003e: Build the core skills library. Four priority skills: DocumentAnalysis, StandupToIssues, BatchProcessing, MultiSystemWorkflow. These cover 80% of our token-heavy operations.\u003c/p\u003e\u003cp name=\"a1a4\" id=\"a1a4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWeeks 7–9\u003c/strong\u003e: Migrate agents to use SkillsMCP. Update prompts, add skill selection logic, train agents to prefer skills over raw MCP calls.\u003c/p\u003e\u003cp name=\"c0af\" id=\"c0af\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWeeks 10–13\u003c/strong\u003e: Advanced patterns. Dynamic skill generation from learning system. Skills that write themselves based on observed usage patterns.\u003c/p\u003e\u003cp name=\"b678\" id=\"b678\" class=\"graf graf--p graf-after--p\"\u003eBy February 2026 (MVP target), the transformation would be complete:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"10aa\" id=\"10aa\" class=\"graf graf--li graf-after--p\"\u003eJourney scores averaging 7.8/10 (up from 4.0/10)\u003c/li\u003e\u003cli name=\"2438\" id=\"2438\" class=\"graf graf--li graf-after--li\"\u003eToken costs reduced by 95%+ on common operations\u003c/li\u003e\u003cli name=\"185d\" id=\"185d\" class=\"graf graf--li graf-after--li\"\u003eEconomic model established and validated\u003c/li\u003e\u003cli name=\"da84\" id=\"da84\" class=\"graf graf--li graf-after--li\"\u003eLearning system generating new skills automatically\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"5739\" id=\"5739\" class=\"graf graf--p graf-after--li\"\u003eAgain, even if the dates change (most of these time estimates tend to be based on human teams) the larger patterns hold.\u003c/p\u003e\u003cp name=\"e85c\" id=\"e85c\" class=\"graf graf--p graf-after--p\"\u003eThe parallel work that Saturday reinforced the plan’s viability. While the Chief Architect designed strategy, the Code Agent implemented UX Quick Wins — five features that moved critical journeys from 3/10 to 6/10 in a single session. The UX transformation was already proving its value.\u003c/p\u003e\u003ch3 name=\"dbde\" id=\"dbde\" class=\"graf graf--h3 graf-after--p\"\u003eWhat working the hard way teaches you\u003c/h3\u003e\u003cp name=\"c5f9\" id=\"c5f9\" class=\"graf graf--p graf-after--h3\"\u003eWe’d been using MCP correctly according to its design. The problem wasn’t that we’d made mistakes — it was that we hadn’t yet discovered the more efficient pattern.\u003c/p\u003e\u003cp name=\"279e\" id=\"279e\" class=\"graf graf--p graf-after--p\"\u003eThis is what systematic building enables. You build something that works. You measure how it works. You discover patterns in the measurements. The patterns reveal better approaches. The better approaches weren’t available to you initially because you needed the working system to generate the data that revealed them.\u003c/p\u003e\u003cp name=\"0444\" id=\"0444\" class=\"graf graf--p graf-after--p\"\u003eThe 98.7% token reduction wasn’t magic — it was the result of:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"373f\" id=\"373f\" class=\"graf graf--li graf-after--p\"\u003eBuilding MCP integration properly first\u003c/li\u003e\u003cli name=\"9699\" id=\"9699\" class=\"graf graf--li graf-after--li\"\u003eActually measuring token usage across operations\u003c/li\u003e\u003cli name=\"7fdb\" id=\"7fdb\" class=\"graf graf--li graf-after--li\"\u003eAnalyzing the measurements systematically\u003c/li\u003e\u003cli name=\"1f94\" id=\"1f94\" class=\"graf graf--li graf-after--li\"\u003eRecognizing the pattern (orchestration overhead)\u003c/li\u003e\u003cli name=\"94bf\" id=\"94bf\" class=\"graf graf--li graf-after--li\"\u003eDesigning an architecture that eliminates the overhead\u003c/li\u003e\u003cli name=\"bce5\" id=\"bce5\" class=\"graf graf--li graf-after--li\"\u003eConnecting that architecture to other problems (UX gaps, economic sustainability)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"af2d\" id=\"af2d\" class=\"graf graf--p graf-after--li\"\u003eSaturday’s discovery wasn’t that we’d been doing it wrong. It was that we’d been doing it right enough to learn how to do it better. The working system generated the evidence that pointed toward the optimal system.\u003c/p\u003e\u003cp name=\"daef\" id=\"daef\" class=\"graf graf--p graf-after--p\"\u003eThat’s the cathedral-building payoff: patience in process creates possibilities that rushing misses. We could have panicked about token costs and made reactive optimizations. Instead, we measured systematically, analyzed comprehensively, and designed strategically. The result wasn’t just efficiency — it was transformation.\u003c/p\u003e\u003cp name=\"52e7\" id=\"52e7\" class=\"graf graf--p graf-after--p\"\u003eThe Skills MCP architecture, the UX transformation funding model, the virtuous cycle between efficiency and experience — none of this was visible until we’d built enough to see the whole picture. Systematic building reveals not just what’s wrong, but what’s possible.\u003c/p\u003e\u003cp name=\"83e4\" id=\"83e4\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThree problems became one solution. Token efficiency became economic strategy. Optimization became transformation. That’s what happens when you build cathedrals instead of chasing features.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Skills Convergence: Three Problems, One Solution\",\"excerpt\":\"“These all fit together!”November 15Sometimes you discover you’ve been working the hard way. Not because you made bad decisions, but because you didn’t have all the information yet. That’s what happened on Saturday morning when I brought a new idea to my Chief of Staff. We had the Chief Architect...\",\"url\":\"/blog/the-skills-convergence\",\"publishedAt\":\"Nov 21, 2025\",\"publishedAtISO\":\"2025-11-21T15:46:37.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/63f5c3c9b97f\",\"featuredImage\":\"/assets/blog-images/63f5c3c9b97f-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-skills-convergence-three-problems-one-solution-63f5c3c9b97f?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-skills-convergence\",\"workDate\":\"Nov 21, 2025\",\"workDateISO\":\"2025-11-21T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2025-11-21\",\"featured\":false},\"content\":{\"title\":\"The Skills Convergence: Three Problems, One Solution\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Skills Convergence: Three Problems, One Solution | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public
