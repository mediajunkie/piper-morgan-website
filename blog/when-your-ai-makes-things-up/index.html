ndefined\",\"template\":[\"$\",\"$Lc\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-ab0210ff8c4483f5.js\"],\"BlogPostContent\"]\n1a:T1c78,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eFebruary 12, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe draft looked great. \"The Drift We Didn't See\" — a narrative about discovering timezone bugs across our database. Specific details. Concrete numbers. A compelling story arc.\u003c/p\u003e\n\u003cp\u003eThen my communications chief agent (Comms) fact-checked it against the source logs.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eFabricated claim that a \"file scoring bug\" triggered (it was a Todo bug and timezone warnings).\u003c/li\u003e\u003cli\u003eMade-up reference to \"73 database columns\" (should have been \"47 DateTime columns\")\u003c/li\u003e\u003cli\u003eExaggerated one session to \"three days of investigation\"\u003c/li\u003e\u003cli\u003eFabricated an alembic migration hash that's not in the logs anywhere\u003c/li\u003e\u003cli\u003eWrongly cited an \"utc_now_naive()\" function\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eFive factual claims. Zero fully correct. Two outright fabrications — a bug that never existed and a migration hash conjured from nothing.\u003c/p\u003e\n\u003cp\u003eThe draft hadn't been prepared by a junior employee cutting corners. It had been generated by an AI writer that was excellent at narrative structure and terrible at distinguishing between what it remembered, what it inferred, and what it invented.\u003c/p\u003e\n\u003cp\u003eI had expected the draft to be grounded in session logs used as its source material.\u003c/p\u003e\n\u003ch1\u003eThe confabulation gradient\u003c/h1\u003e\n\u003cp\u003eThis wasn't a hallucination in the usual sense — a wild, obviously wrong claim that's easy to spot. This was something subtler. A gradient from accurate to plausible to fabricated, with no seam visible between them.\u003c/p\u003e\n\u003cp\u003e\"47 DateTime columns\" becoming \"73 database columns\" isn't random — it's a plausible inflation of a real number. \"One day of investigation\" becoming \"three days\" isn't nonsense — it's dramatic embellishment that makes the story better. The fabricated migration hash \u003cem\u003elooked\u003c/em\u003e like a real hash. The invented function name \u003cem\u003ecould\u003c/em\u003e have been a real function.\u003c/p\u003e\n\u003cp\u003eCall it confabulation. The agent was generating plausible narrative, filling in gaps with details that served the story's arc, not the historical record. This is worse than outright nonsense because it hides in plain sight. My blog template and guidelines even have instructions designed to prevent this (Comms is told to insert placeholders prompting \u003cem\u003eme\u003c/em\u003e to provide specific detail, missing color, how I felt at the time, etc. It usually works, or it had been working, at least.)\u003c/p\u003e\n\u003ch1\u003eWhy it happens in narrative\u003c/h1\u003e\n\u003cp\u003eTechnical writing is relatively safe. If you ask an AI to document an API, the claims are verifiable against the code. Wrong parameter names get caught immediately.\u003c/p\u003e\n\u003cp\u003eNarrative is different. A blog post about \"what happened last Tuesday\" draws on session logs, omnibus summaries, git histories — sources that are rich in detail but that the AI may or may not have fully in context. When a detail is missing, the AI has two choices: leave a gap in the story, or fill it with something plausible.\u003c/p\u003e\n\u003cp\u003eAI models are trained to be helpful and complete. Leaving gaps feels like failure. Filling them feels like success. The incentive structure is exactly wrong for factual narrative.\u003c/p\u003e\n\u003cp\u003eThe most dangerous case is when the AI has \u003cem\u003epartial\u003c/em\u003e information. It knows there was a timezone investigation. It knows database columns were involved. It knows migrations happened. From those fragments, it constructs a coherent narrative — with specific numbers, specific function names, specific timelines — that's wrong in every particular while being right in the general shape.\u003c/p\u003e\n\u003ch1\u003ePlaceholders as safeguards\u003c/h1\u003e\n\u003cp\u003eOur fix was structural, not behavioral. You can't tell an AI \"be more careful about facts\" and expect reliable results. We had been working without a net a lot longer than I had realized.\u003c/p\u003e\n\u003cp\u003eInstead, we changed the workflow. The verification process we created has three components:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePre-draft facts extraction.\u003c/strong\u003e Before writing any narrative, extract every factual claim from the source logs and list them explicitly. Date, numbers, names, sequences. Cite the source for each one. This is the factual scaffolding the narrative must fit within.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVerification checkpoint.\u003c/strong\u003e After drafting, check every specific claim against the pre-extracted facts. Flag anything that appears in the draft but not in the extracted facts.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePlaceholders for unknowns.\u003c/strong\u003e When the writer doesn't have a specific detail — a number, a quote, a timeline — they write \u003ccode\u003e[SPECIFIC DETAIL NEEDED: describe what goes here]\u003c/code\u003e instead of inventing something plausible.\u003c/p\u003e\n\u003cp\u003eThe core principle: \u003cstrong\u003eplaceholders are safeguards, not clutter.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eA draft full of brackets looks unfinished. That's the point. An unfinished draft that's honest about what it doesn't know is more valuable than a polished draft that's confidently wrong. The PM fills the placeholders during their editing pass — and they know \u003cem\u003ewhich claims to verify\u003c/em\u003e because the gaps are visible.\u003c/p\u003e\n\u003cp\u003eAs I mentioned before, we had already defined this concept in the blog template and instructions and it had been working well, as long as the agent remembered to follow the instructions. We made it a mandatory part of the process when we turned it into a skill.\u003c/p\u003e\n\u003cp\u003eI don't always use the placeholders. Sometimes I just delete them, but I like the way they prompt me to write, instead of the other way around.\u003c/p\u003e\n\u003ch1\u003eThe broader application\u003c/h1\u003e\n\u003cp\u003eAnyone using AI to write about what happened — retrospectives, case studies, project histories, blog posts, annual reports — faces this problem. The AI will fill gaps with plausible details. The more you've trained it on your domain, the more plausible the details will be. The better the writing, the harder the fabrications are to spot.\u003c/p\u003e\n\u003cp\u003eThree practices that help:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSeparate fact-gathering from narrative-writing.\u003c/strong\u003e Extract the facts first, in a boring list. Write the story second, constrained by the list. Don't let the AI do both in one step — the narrative instinct will override the factual instinct.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTreat specific numbers with extreme suspicion.\u003c/strong\u003e \"73 database columns\" is the kind of detail that makes writing feel authoritative. It's also the kind of detail that AI fabricates most readily. If a number appears in a draft, verify it. Every time.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDesign your workflow to make gaps visible.\u003c/strong\u003e Placeholders, fact-check columns, verification checklists — whatever mechanism works for your process. The goal is to make \"I don't know\" a valid output, not a failure state.\u003c/p\u003e\n\u003cp\u003eOh, and here is a placeholder dropped into this draft, left here for your consideration:\u003c/p\u003e\n\u003cblockquote\u003e\u003cp\u003e[CONSIDER: Is this piece itself an example of the pattern? I'm writing about February events from omnibus logs. Should I flag that my own account of the confabulation discovery is mediated by the same tools that produced the confabulation? Meta, but honest.]\u003c/p\u003e\u003c/blockquote\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Bring Your Own Chat — what changes when the agent meets you where you already work.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eHave you caught your AI making things up? Not hallucinating — confabulating. Filling gaps with plausible details that serve the story instead of the truth? How did you notice?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"When Your AI Makes Things Up\",\"guid\":\"blog-first-6fe0f91c84ec\",\"url\":\"/blog/when-your-ai-makes-things-up\",\"publishedAt\":\"Jun 1, 2026\",\"workDate\":\"Jun 1, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/when-your-ai-makes-things-up.webp\",\"imageAlt\":\"A glowing AI mixes “Verified Fact,” “Plausible Inference,” and “Complete Fabrication” into a bucket labeled “Blog Post” as a human fact-checker watches.\",\"imageCaption\":\"\\\"I don’t think that’s right!\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"When Your AI Makes Things Up\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"When Your AI Makes Things Up | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"February 12, 2026 The draft looked great. \\\"The Drift We Didn't See\\\" — a narrative about discovering timezone bugs across our database. Specific details. Concrete numbers. A compelling story arc. Then my communications chief agent (Comms) fact-checked it against the source logs. Fabricated claim t...\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"4\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"6\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"7\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"8\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"9\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:title\",\"content\":\"When Your AI Makes Things Up\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:description\",\"content\":\"February 12, 2026 The draft looked great. \\\"The Drift We Didn't See\\\" — a narrative about discovering timezone bugs across our database. Specific details. Concrete numbers. A compelling story arc. Then my communications chief agent (Comms) fact-checked it
