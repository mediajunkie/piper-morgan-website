fined\",\"template\":[\"$\",\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2805,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot shows a person that their office and files are now all perfectly organized\" src=\"https://cdn-images-1.medium.com/max/1024/1*uOwkWMJ8G2Uv2bSPXj_LpQ.png\" /\u003e\u003cfigcaption\u003e“All organized”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eSeptember 19–21\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe system was working, but the documentation was drowning.\u003c/p\u003e\u003cp\u003e787 files scattered across 104 directories. Session logs in three different locations. 186 binary blog files mixed with development documents. The Jekyll infrastructure tangled with project documentation in the root directory.\u003c/p\u003e\u003cp\u003eSound familiar?\u003c/p\u003e\u003cp\u003eThis is what happens when you’re building fast and organizing later. Every session creates artifacts. Every experiment leaves traces. Every good intention to “clean this up next week” compounds into archaeological debt that makes finding anything a research project.\u003c/p\u003e\u003cp\u003eFriday afternoon, after the Great Refactor planning session, we faced a choice: push forward with implementation or spend the weekend organizing the foundation. The inchworm in me whispered the right answer.\u003c/p\u003e\u003cp\u003eSometimes the most productive thing you can do is sharpen the saw.\u003c/p\u003e\u003ch3\u003eThe survey methodology\u003c/h3\u003e\u003cp\u003eBefore you can organize anything, you have to know what you have. I assigned Claude Code the role of documentation manager and it conducted a systematic survey of the entire docs/ tree.\u003c/p\u003e\u003cp\u003eNot just file counts — that would be meaningless. We needed to understand the archaeology of how the documentation had evolved:\u003c/p\u003e\u003cul\u003e\u003cli\u003eWhich directories had become dumping grounds?\u003c/li\u003e\u003cli\u003eWhere were session logs actually living versus where they should be?\u003c/li\u003e\u003cli\u003eWhat percentage of files were working documents versus finished deliverables?\u003c/li\u003e\u003cli\u003eHow much space was being consumed by binary assets that belonged elsewhere?\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe results were sobering. 14% of all documentation files were cluttering the development root directory. Session logs existed in docs/development/session-logs/, docs/development/, and scattered in other locations with no clear pattern.\u003c/p\u003e\u003cp\u003eThis wasn’t just untidiness. It was actively impeding archaeological research — the ability to trace decisions, understand context, and learn from past work.\u003c/p\u003e\u003ch3\u003eSpotting the patterns\u003c/h3\u003e\u003cp\u003eOrganizing files feels like housekeeping but it’s really information architecture. How you organize documents shapes how you think about the work.\u003c/p\u003e\u003cp\u003eHaving session logs scattered across multiple directories wasn’t just inconvenient. It was preventing us from seeing patterns across time. Blog material was getting lost because it lived mixed with working documents instead of being tagged and tracked.\u003c/p\u003e\u003cp\u003eThe real cost of documentation debt is cognitive noise.\u003c/p\u003e\u003cp\u003eWhen finding last week’s planning notes requires grep searches across multiple directories, you stop looking for last week’s planning notes. When session logs don’t live in predictable locations, you stop referencing past decisions.\u003c/p\u003e\u003cp\u003eInformation that’s hard to find becomes information that doesn’t exist.\u003c/p\u003e\u003ch3\u003eThe dev/YYYY/MM/DD convention\u003c/h3\u003e\u003cp\u003eThe solution wasn’t just reorganizing existing files — it was establishing patterns that would prevent future drift.\u003c/p\u003e\u003cp\u003eStarting today, all working files related to each day’s work go in dev/YYYY/MM/DD/: session logs, gameplans, agent prompts, planning documents, reports. Everything except actual code, which still lives where it belongs in the application structure.\u003c/p\u003e\u003cp\u003eWe’ve also got a folder now called dev/active/ where the current day’s files can go, but once a file isn’t actively being used anymore it needs to be archived to the dated folder. This means I am also now systematically saving every artifact generated by or for any of my agents during a session, when in the past such docs were scattered between the local filesystem and wherever the web chat store their files.\u003c/p\u003e\u003cp\u003eYou could call it session-based artifact co-location — ensuring that when you’re investigating how a decision was made or why an approach was chosen, all the relevant materials live in the same place.\u003c/p\u003e\u003cp\u003eWant to understand what happened during the Layer 4 investigation on September 18? Look in dev/2025/09/18/. All the session logs, gameplans, agent coordination prompts, and decision artifacts are co-located chronologically.\u003c/p\u003e\u003cp\u003eThis pattern scales naturally: daily directories within monthly directories within yearly directories. No arbitrary file limits. No complex categorization schemes that break down under pressure.\u003c/p\u003e\u003ch3\u003eThe six-phase restructuring plan\u003c/h3\u003e\u003cp\u003eRather than spending a weekend moving files randomly, we developed a systematic methodology. Six phases, 3.5 hours total, with comprehensive backup and verification at each step.\u003c/p\u003e\u003cp\u003ePhase 1: Foundation Architecture — Create clear directory hierarchy separating public, internal, and archived documentation\u003c/p\u003e\u003cp\u003ePhase 2: Session Log Consolidation — Centralize all session logs with chronological organization optimized for archaeological research\u003c/p\u003e\u003cp\u003ePhase 3: Development Directory Restructuring — Separate current work from historical documents\u003c/p\u003e\u003cp\u003ePhase 4: Architecture Documentation — Optimize architecture docs with decision tracking\u003c/p\u003e\u003cp\u003ePhase 5: Asset Management — Organize 186 binary files with size and naming guidelines\u003c/p\u003e\u003cp\u003ePhase 6: Navigation Enhancement — Create master navigation system with role-based entry points\u003c/p\u003e\u003cp\u003eThe methodology included explicit zero data loss protocol with git commits at each phase completion, verification checksums for moved files, and rollback plans for every step.\u003c/p\u003e\u003ch3\u003eOptimizing for all the archaeological research we have to do\u003c/h3\u003e\u003cp\u003eOne of the most valuable outcomes was optimizing for archaeological research — the ability to trace how decisions evolved over time.\u003c/p\u003e\u003cp\u003eSession logs now live in chronological organization: docs/archives/session-logs/2025/09/ with monthly index files. Blog draft identification happens during session logging. Cross-references between related sessions get captured systematically.\u003c/p\u003e\u003cp\u003eWhen you’re debugging an architectural decision six months from now, you want to find not just the final choice but the discussion that led to it, the alternatives that were considered, and the context that made the decision feel obvious at the time.\u003c/p\u003e\u003cp\u003eDocumentation systems that support archaeological research become compound valuable over time. Systems that don’t become archaeological debt.\u003c/p\u003e\u003ch3\u003eThe value of boring work\u003c/h3\u003e\u003cp\u003eThis kind of systematic file organization feels like administrative work that doesn’t advance the core project. It’s tempting to skip it in favor of “real development.”\u003c/p\u003e\u003cp\u003eThat’s exactly backward thinking.\u003c/p\u003e\u003cp\u003eProper information architecture becomes more valuable as the project grows. Every session that creates artifacts in predictable locations. Every decision that gets captured with its context. Every pattern that gets documented systematically.\u003c/p\u003e\u003cp\u003eThe time you spend organizing information systems gets paid back with interest every time you need to find something, understand something, or explain something to a new team member (or future version of yourself).\u003c/p\u003e\u003ch3\u003eSession logs as institutional memory\u003c/h3\u003e\u003cp\u003eThe real insight came from recognizing session logs not just as progress tracking but as institutional memory for a solo developer with AI assistance.\u003c/p\u003e\u003cp\u003eEach session captures not just what got done but how it got done, what was learned, what didn’t work, and why certain approaches were chosen. This becomes critical context when you’re working with AI agents who don’t persist memory between sessions.\u003c/p\u003e\u003cp\u003eWhen you brief a new Claude Code agent on a task, you want to point them to the relevant session logs that contain the context, the decision history, and the lessons learned. That only works if session logs are organized predictably and tagged appropriately.\u003c/p\u003e\u003ch3\u003eWeekend discipline\u003c/h3\u003e\u003cp\u003eSaturday morning brought the urge to push forward with GREAT-1 implementation. The Great Refactor plan was ready. The path forward was clear. Why not start immediately?\u003c/p\u003e\u003cp\u003eThe reason is that the inchworm protocol applies to information architecture just as much as code architecture. You don’t build on an unstable foundation, even when the foundation work feels less exciting than the construction work.\u003c/p\u003e\u003cp\u003eThree hours of systematic file organization this weekend will save dozens of hours of “where did I put that document” searching over the next few months.\u003c/p\u003e\u003ch3\u003eA meta-lesson about solo development\u003c/h3\u003e\u003cp\u003eTraditional software development practices assume team contexts with shared institutional memory, standardized tooling, and natural knowledge transfer through code reviews and planning meetings.\u003c/p\u003e\u003cp\u003eSolo developers with AI assistance need different patterns. Your documentation system is your institutional memory. Your file organization is your knowledge management system. Your session logs are your onboarding documentation for future agents.\u003c/p\u003e\u003cp\u003eWhen you’re the only human brain responsible for remembering how everything connects, systematic information architecture becomes infrastructure, not overhead.\u003c/p\u003e\u003cp\u003eThe project can’t outgrow good organizational habits. But it can definitely be suffocated by bad ones.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, The Review That Answered Itself or Why LLMs Need to Shut Up Sometimes.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHow do you organize project information to support both current work and future archaeological research?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=715d6228660b\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-archaeology-of-accumulated-files-how-documentation-debt-nearly-buried-the-project-715d6228660b\"\u003eThe Archaeology of Accumulated Files: How Documentation Debt Nearly Buried the Project\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T355e,"])</script><script>self.__next_f.push([1,"\u003csection name=\"a0aa\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"7a1c\" id=\"7a1c\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Archaeology of Accumulated Files: How Documentation Debt Nearly Buried the Project\u003c/h3\u003e\u003cfigure name=\"8510\" id=\"8510\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*uOwkWMJ8G2Uv2bSPXj_LpQ.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot shows a person that their office and files are now all perfectly organized\" src=\"https://cdn-images-1.medium.com/max/800/1*uOwkWMJ8G2Uv2bSPXj_LpQ.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“All organized”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"788e\" id=\"788e\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eSeptember 19–21\u003c/em\u003e\u003c/p\u003e\u003cp name=\"1ffc\" id=\"1ffc\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ehe system was working, but the documentation was drowning.\u003c/p\u003e\u003cp name=\"78ae\" id=\"78ae\" class=\"graf graf--p graf-after--p\"\u003e787 files scattered across 104 directories. Session logs in three different locations. 186 binary blog files mixed with development documents. The Jekyll infrastructure tangled with project documentation in the root directory.\u003c/p\u003e\u003cp name=\"799d\" id=\"799d\" class=\"graf graf--p graf-after--p\"\u003eSound familiar?\u003c/p\u003e\u003cp name=\"a5c1\" id=\"a5c1\" class=\"graf graf--p graf-after--p\"\u003eThis is what happens when you’re building fast and organizing later. Every session creates artifacts. Every experiment leaves traces. Every good intention to “clean this up next week” compounds into archaeological debt that makes finding anything a research project.\u003c/p\u003e\u003cp name=\"8cea\" id=\"8cea\" class=\"graf graf--p graf-after--p\"\u003eFriday afternoon, after the Great Refactor planning session, we faced a choice: push forward with implementation or spend the weekend organizing the foundation. The inchworm in me whispered the right answer.\u003c/p\u003e\u003cp name=\"cb1b\" id=\"cb1b\" class=\"graf graf--p graf-after--p\"\u003eSometimes the most productive thing you can do is sharpen the saw.\u003c/p\u003e\u003ch3 name=\"6d91\" id=\"6d91\" class=\"graf graf--h3 graf-after--p\"\u003eThe survey methodology\u003c/h3\u003e\u003cp name=\"6c99\" id=\"6c99\" class=\"graf graf--p graf-after--h3\"\u003eBefore you can organize anything, you have to know what you have. I assigned Claude Code the role of documentation manager and it conducted a systematic survey of the entire docs/ tree.\u003c/p\u003e\u003cp name=\"ba60\" id=\"ba60\" class=\"graf graf--p graf-after--p\"\u003eNot just file counts — that would be meaningless. We needed to understand the archaeology of how the documentation had evolved:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c49e\" id=\"c49e\" class=\"graf graf--li graf-after--p\"\u003eWhich directories had become dumping grounds?\u003c/li\u003e\u003cli name=\"32e9\" id=\"32e9\" class=\"graf graf--li graf-after--li\"\u003eWhere were session logs actually living versus where they should be?\u003c/li\u003e\u003cli name=\"cb2a\" id=\"cb2a\" class=\"graf graf--li graf-after--li\"\u003eWhat percentage of files were working documents versus finished deliverables?\u003c/li\u003e\u003cli name=\"d822\" id=\"d822\" class=\"graf graf--li graf-after--li\"\u003eHow much space was being consumed by binary assets that belonged elsewhere?\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"3e30\" id=\"3e30\" class=\"graf graf--p graf-after--li\"\u003eThe results were sobering. 14% of all documentation files were cluttering the development root directory. Session logs existed in docs/development/session-logs/, docs/development/, and scattered in other locations with no clear pattern.\u003c/p\u003e\u003cp name=\"1da5\" id=\"1da5\" class=\"graf graf--p graf-after--p\"\u003eThis wasn’t just untidiness. It was actively impeding archaeological research — the ability to trace decisions, understand context, and learn from past work.\u003c/p\u003e\u003ch3 name=\"04d9\" id=\"04d9\" class=\"graf graf--h3 graf-after--p\"\u003eSpotting the patterns\u003c/h3\u003e\u003cp name=\"379a\" id=\"379a\" class=\"graf graf--p graf-after--h3\"\u003eOrganizing files feels like housekeeping but it’s really information architecture. How you organize documents shapes how you think about the work.\u003c/p\u003e\u003cp name=\"dfa8\" id=\"dfa8\" class=\"graf graf--p graf-after--p\"\u003eHaving session logs scattered across multiple directories wasn’t just inconvenient. It was preventing us from seeing patterns across time. Blog material was getting lost because it lived mixed with working documents instead of being tagged and tracked.\u003c/p\u003e\u003cp name=\"f459\" id=\"f459\" class=\"graf graf--p graf-after--p\"\u003eThe real cost of documentation debt is cognitive noise.\u003c/p\u003e\u003cp name=\"0fad\" id=\"0fad\" class=\"graf graf--p graf-after--p\"\u003eWhen finding last week’s planning notes requires grep searches across multiple directories, you stop looking for last week’s planning notes. When session logs don’t live in predictable locations, you stop referencing past decisions.\u003c/p\u003e\u003cp name=\"d69a\" id=\"d69a\" class=\"graf graf--p graf-after--p\"\u003eInformation that’s hard to find becomes information that doesn’t exist.\u003c/p\u003e\u003ch3 name=\"35fd\" id=\"35fd\" class=\"graf graf--h3 graf-after--p\"\u003eThe dev/YYYY/MM/DD convention\u003c/h3\u003e\u003cp name=\"771e\" id=\"771e\" class=\"graf graf--p graf-after--h3\"\u003eThe solution wasn’t just reorganizing existing files — it was establishing patterns that would prevent future drift.\u003c/p\u003e\u003cp name=\"2519\" id=\"2519\" class=\"graf graf--p graf-after--p\"\u003eStarting today, all working files related to each day’s work go in dev/YYYY/MM/DD/: session logs, gameplans, agent prompts, planning documents, reports. Everything except actual code, which still lives where it belongs in the application structure.\u003c/p\u003e\u003cp name=\"7027\" id=\"7027\" class=\"graf graf--p graf-after--p\"\u003eWe’ve also got a folder now called dev/active/ where the current day’s files can go, but once a file isn’t actively being used anymore it needs to be archived to the dated folder. This means I am also now systematically saving every artifact generated by or for any of my agents during a session, when in the past such docs were scattered between the local filesystem and wherever the web chat store their files.\u003c/p\u003e\u003cp name=\"9bfb\" id=\"9bfb\" class=\"graf graf--p graf-after--p\"\u003eYou could call it session-based artifact co-location — ensuring that when you’re investigating how a decision was made or why an approach was chosen, all the relevant materials live in the same place.\u003c/p\u003e\u003cp name=\"e786\" id=\"e786\" class=\"graf graf--p graf-after--p\"\u003eWant to understand what happened during the Layer 4 investigation on September 18? Look in dev/2025/09/18/. All the session logs, gameplans, agent coordination prompts, and decision artifacts are co-located chronologically.\u003c/p\u003e\u003cp name=\"bba3\" id=\"bba3\" class=\"graf graf--p graf-after--p\"\u003eThis pattern scales naturally: daily directories within monthly directories within yearly directories. No arbitrary file limits. No complex categorization schemes that break down under pressure.\u003c/p\u003e\u003ch3 name=\"fb31\" id=\"fb31\" class=\"graf graf--h3 graf-after--p\"\u003eThe six-phase restructuring plan\u003c/h3\u003e\u003cp name=\"eb79\" id=\"eb79\" class=\"graf graf--p graf-after--h3\"\u003eRather than spending a weekend moving files randomly, we developed a systematic methodology. Six phases, 3.5 hours total, with comprehensive backup and verification at each step.\u003c/p\u003e\u003cp name=\"3e4b\" id=\"3e4b\" class=\"graf graf--p graf-after--p\"\u003ePhase 1: Foundation Architecture — Create clear directory hierarchy separating public, internal, and archived documentation\u003c/p\u003e\u003cp name=\"27dd\" id=\"27dd\" class=\"graf graf--p graf-after--p\"\u003ePhase 2: Session Log Consolidation — Centralize all session logs with chronological organization optimized for archaeological research\u003c/p\u003e\u003cp name=\"6d5e\" id=\"6d5e\" class=\"graf graf--p graf-after--p\"\u003ePhase 3: Development Directory Restructuring — Separate current work from historical documents\u003c/p\u003e\u003cp name=\"855c\" id=\"855c\" class=\"graf graf--p graf-after--p\"\u003ePhase 4: Architecture Documentation — Optimize architecture docs with decision tracking\u003c/p\u003e\u003cp name=\"3b24\" id=\"3b24\" class=\"graf graf--p graf-after--p\"\u003ePhase 5: Asset Management — Organize 186 binary files with size and naming guidelines\u003c/p\u003e\u003cp name=\"7aab\" id=\"7aab\" class=\"graf graf--p graf-after--p\"\u003ePhase 6: Navigation Enhancement — Create master navigation system with role-based entry points\u003c/p\u003e\u003cp name=\"227b\" id=\"227b\" class=\"graf graf--p graf-after--p\"\u003eThe methodology included explicit zero data loss protocol with git commits at each phase completion, verification checksums for moved files, and rollback plans for every step.\u003c/p\u003e\u003ch3 name=\"205a\" id=\"205a\" class=\"graf graf--h3 graf-after--p\"\u003eOptimizing for all the archaeological research we have to do\u003c/h3\u003e\u003cp name=\"558c\" id=\"558c\" class=\"graf graf--p graf-after--h3\"\u003eOne of the most valuable outcomes was optimizing for archaeological research — the ability to trace how decisions evolved over time.\u003c/p\u003e\u003cp name=\"10af\" id=\"10af\" class=\"graf graf--p graf-after--p\"\u003eSession logs now live in chronological organization: docs/archives/session-logs/2025/09/ with monthly index files. Blog draft identification happens during session logging. Cross-references between related sessions get captured systematically.\u003c/p\u003e\u003cp name=\"558b\" id=\"558b\" class=\"graf graf--p graf-after--p\"\u003eWhen you’re debugging an architectural decision six months from now, you want to find not just the final choice but the discussion that led to it, the alternatives that were considered, and the context that made the decision feel obvious at the time.\u003c/p\u003e\u003cp name=\"8f01\" id=\"8f01\" class=\"graf graf--p graf-after--p\"\u003eDocumentation systems that support archaeological research become compound valuable over time. Systems that don’t become archaeological debt.\u003c/p\u003e\u003ch3 name=\"0e35\" id=\"0e35\" class=\"graf graf--h3 graf-after--p\"\u003eThe value of boring work\u003c/h3\u003e\u003cp name=\"3ebe\" id=\"3ebe\" class=\"graf graf--p graf-after--h3\"\u003eThis kind of systematic file organization feels like administrative work that doesn’t advance the core project. It’s tempting to skip it in favor of “real development.”\u003c/p\u003e\u003cp name=\"257f\" id=\"257f\" class=\"graf graf--p graf-after--p\"\u003eThat’s exactly backward thinking.\u003c/p\u003e\u003cp name=\"ee7c\" id=\"ee7c\" class=\"graf graf--p graf-after--p\"\u003eProper information architecture becomes more valuable as the project grows. Every session that creates artifacts in predictable locations. Every decision that gets captured with its context. Every pattern that gets documented systematically.\u003c/p\u003e\u003cp name=\"c4f3\" id=\"c4f3\" class=\"graf graf--p graf-after--p\"\u003eThe time you spend organizing information systems gets paid back with interest every time you need to find something, understand something, or explain something to a new team member (or future version of yourself).\u003c/p\u003e\u003ch3 name=\"560b\" id=\"560b\" class=\"graf graf--h3 graf-after--p\"\u003eSession logs as institutional memory\u003c/h3\u003e\u003cp name=\"f38b\" id=\"f38b\" class=\"graf graf--p graf-after--h3\"\u003eThe real insight came from recognizing session logs not just as progress tracking but as institutional memory for a solo developer with AI assistance.\u003c/p\u003e\u003cp name=\"4725\" id=\"4725\" class=\"graf graf--p graf-after--p\"\u003eEach session captures not just what got done but how it got done, what was learned, what didn’t work, and why certain approaches were chosen. This becomes critical context when you’re working with AI agents who don’t persist memory between sessions.\u003c/p\u003e\u003cp name=\"5e04\" id=\"5e04\" class=\"graf graf--p graf-after--p\"\u003eWhen you brief a new Claude Code agent on a task, you want to point them to the relevant session logs that contain the context, the decision history, and the lessons learned. That only works if session logs are organized predictably and tagged appropriately.\u003c/p\u003e\u003ch3 name=\"7095\" id=\"7095\" class=\"graf graf--h3 graf-after--p\"\u003eWeekend discipline\u003c/h3\u003e\u003cp name=\"c862\" id=\"c862\" class=\"graf graf--p graf-after--h3\"\u003eSaturday morning brought the urge to push forward with GREAT-1 implementation. The Great Refactor plan was ready. The path forward was clear. Why not start immediately?\u003c/p\u003e\u003cp name=\"52fd\" id=\"52fd\" class=\"graf graf--p graf-after--p\"\u003eThe reason is that the inchworm protocol applies to information architecture just as much as code architecture. You don’t build on an unstable foundation, even when the foundation work feels less exciting than the construction work.\u003c/p\u003e\u003cp name=\"6d2a\" id=\"6d2a\" class=\"graf graf--p graf-after--p\"\u003eThree hours of systematic file organization this weekend will save dozens of hours of “where did I put that document” searching over the next few months.\u003c/p\u003e\u003ch3 name=\"e906\" id=\"e906\" class=\"graf graf--h3 graf-after--p\"\u003eA meta-lesson about solo development\u003c/h3\u003e\u003cp name=\"744f\" id=\"744f\" class=\"graf graf--p graf-after--h3\"\u003eTraditional software development practices assume team contexts with shared institutional memory, standardized tooling, and natural knowledge transfer through code reviews and planning meetings.\u003c/p\u003e\u003cp name=\"33d1\" id=\"33d1\" class=\"graf graf--p graf-after--p\"\u003eSolo developers with AI assistance need different patterns. Your documentation system is your institutional memory. Your file organization is your knowledge management system. Your session logs are your onboarding documentation for future agents.\u003c/p\u003e\u003cp name=\"b5dc\" id=\"b5dc\" class=\"graf graf--p graf-after--p\"\u003eWhen you’re the only human brain responsible for remembering how everything connects, systematic information architecture becomes infrastructure, not overhead.\u003c/p\u003e\u003cp name=\"c948\" id=\"c948\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe project can’t outgrow good organizational habits. But it can definitely be suffocated by bad ones.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Archaeology of Accumulated Files: How Documentation Debt Nearly Buried the Project\",\"excerpt\":\"“All organized”September 19–21The system was working, but the documentation was drowning.787 files scattered across 104 directories. Session logs in three different locations. 186 binary blog files mixed with development documents. The Jekyll infrastructure tangled with project documentation in t...\",\"url\":\"/blog/the-archaeology-of-accumulated-files\",\"publishedAt\":\"Nov 1, 2025\",\"publishedAtISO\":\"2025-11-01T12:42:40.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/715d6228660b\",\"featuredImage\":\"/assets/blog-images/715d6228660b-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-archaeology-of-accumulated-files-how-documentation-debt-nearly-buried-the-project-715d6228660b?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-archaeology-of-accumulated-files\",\"workDate\":\"Nov 1, 2025\",\"workDateISO\":\"2025-11-01T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2025-11-01\",\"featured\":false},\"content\":{\"title\":\"The Archaeology of Accumulated Files: How Documentation Debt Nearly Buried the Project\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Archaeology of Accumulated Files: How Documentation Debt Nearly Buried the Project | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Archaeology of Accumulated Files: How Documentation Debt Nearly Buried the Project\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Archaeology of Accumulated Files: How Documentation Debt Nearly Buried the Project\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-4
