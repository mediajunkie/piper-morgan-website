emplateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2627,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A person and robot work from a hotel room, with the Occidental College campus visible outside\" src=\"https://cdn-images-1.medium.com/max/1024/1*kQU9VCdJsrQ_qaYCDGZ9gw.png\" /\u003e\u003cfigcaption\u003e“As soon as we’re done we can go see my nephew!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 6–8\u003c/em\u003e\u003c/p\u003e\u003cp\u003eOn Thursday afternoon, with two P2 issues ready to close, I deployed two agents in parallel. 18 minutes later they were both done. Later that evening, flying to Burbank for my nephew’s play at Occidental College.\u003c/p\u003e\u003cp\u003eFriday, the plan was to work from a Pasadena hotel room, publish Weekly Ship #016, updatee my Chief of Staff on all our work streams. Then go see Neil Simon’s play \u003cem\u003eRumors\u003c/em\u003e that night.\u003c/p\u003e\u003cp\u003eSaturday, I fly home after a nice long breakfast with my brother, my sister-in-law, and his sister-in-law (my sister-in-law-in-law?).\u003c/p\u003e\u003cp\u003eThree days. Family obligations. Travel up and down California. The work happens in the margins: fast execution, administrative tidying, and investigation that saves days of effort.\u003c/p\u003e\u003ch3\u003eThe verification gate\u003c/h3\u003e\u003cp\u003eI’m now fixing bugs I’m finding in my own end-to-end alpha testing:\u003c/p\u003e\u003cul\u003e\u003cli\u003eIssue #286: Move CONVERSATION handler to canonical section. Architectural cleanup.\u003c/li\u003e\u003cli\u003eIssue #287: Fix timezone display (PT vs Los Angeles), contradictory messages, calendar validation.\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003e1:51 PM\u003c/strong\u003e — Code Agent starts #286\u003cbr\u003e\u003cstrong\u003e1:54 PM\u003c/strong\u003e — Cursor Agent starts #287\u003cbr\u003e\u003cstrong\u003e2:00 PM\u003c/strong\u003e — Cursor completes (6 minutes)\u003cbr\u003e\u003cstrong\u003e2:03 PM\u003c/strong\u003e — Code completes (12 minutes)\u003cbr\u003e\u003cstrong\u003e3:15 PM\u003c/strong\u003e — Verification gate: Check both changes present\u003cbr\u003e\u003cstrong\u003e3:37 PM\u003c/strong\u003e — Verified: No conflicts, both changes correct\u003cbr\u003e\u003cstrong\u003e3:42 PM\u003c/strong\u003e — Push: 55/55 tests passing\u003c/p\u003e\u003cp\u003eThe verification gate caught a risk. Both agents had edited canonical_handlers.py (a potential conflict). Without checking, we might have pushed conflicts. With the gate: clean merge, zero issues.\u003c/p\u003e\u003cp\u003eTotal time: 18 minutes of agent work. Estimated: 4 hours. \u003cstrong\u003e12x faster than expected.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWhy so fast? Issues were simpler than estimated. Good architecture made changes straightforward. Comprehensive tests validated immediately.\u003c/p\u003e\u003ch3\u003eIf it’s Thursday this must be Burbank\u003c/h3\u003e\u003cp\u003eFlight to Burbank. Nephew’s play at Occidental College the next night. Family time.\u003c/p\u003e\u003cp\u003eDevelopment work doesn’t stop for life. But it adapts. Morning: Fast execution on P2 issues. Evening: On a plane. Different rhythms for different contexts.\u003c/p\u003e\u003cp\u003eThe work that happened Thursday morning took 18 minutes because it could. Quick architectural fix. UX polish. Both agents knowing exactly what to do. Then done. Then life.\u003c/p\u003e\u003ch3\u003eBack to my old road warrior days\u003c/h3\u003e\u003cp\u003eFriday I work out of my Pasadena, looking forward to my Nephew’s play that evening. The work that fits in this hotel time is mostly administrative, not technical. I am excited to see family and can’t concentrate on supervising software development.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMorning work\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eWeekly Ship #016 published (covering Oct 31 — Nov 6)\u003c/li\u003e\u003cli\u003eWork streams formalized (v2.0: seven categories that were due for updating as the project has entered a new stage)\u003c/li\u003e\u003cli\u003eIssues #286, #287 documented and closed\u003c/li\u003e\u003cli\u003eP2 dependency identified: #291 blocked by #262\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eWork streams evolution\u003c/strong\u003e: Back in July, the categories focused on foundation-building. Now in November, they track operational status. The shift from “building the system” to “running the system.” Time to formalize that evolution.\u003c/p\u003e\u003cp\u003eSeven streams defined:\u003c/p\u003e\u003col\u003e\u003cli\u003eUser Testing (alpha expansion)\u003c/li\u003e\u003cli\u003eSystem Health (infrastructure, costs)\u003c/li\u003e\u003cli\u003eMethodology Evolution (patterns, processes)\u003c/li\u003e\u003cli\u003eOperational Efficiency (performance, automation)\u003c/li\u003e\u003cli\u003eDocumentation (maintenance, onboarding)\u003c/li\u003e\u003cli\u003eCommunications (newsletter, speaking, building in public)\u003c/li\u003e\u003cli\u003eStrategic Planning (future exploration)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eThe work streams now reflect reality: Not “what are we building?” but “how is everything running?”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCommunications momentum\u003c/strong\u003e: 699 subscribers. Conference talk accepted for next March. “\u003ca href=\"https://findingourway.design/2025/11/01/63-ai-means-product-needs-ux-more-than-ever-ft-christian-crumlish/\"\u003eFinding Our Way\u003c/a\u003e” podcast well-received. Building in public creating unexpected opportunities.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFunny moment\u003c/strong\u003e: Discovered fabricated GitHub username “Codewarrior1988” in Weekly Ship footer. Agents sometimes invent facts confidently. Corrected to actual repo: github.com/mediajunkie/piper-morgan-product/ (all the code is open source, as you probably know already).\u003c/p\u003e\u003ch3\u003eThe play’s the thing\u003c/h3\u003e\u003cp\u003eFriday evening at Occidental College. My nephew’s performance is a tour de force, but the truth is it’s just wonderful to see him, meet his charming friends, and enjoy the company of east-coast family I rarely get to see.\u003c/p\u003e\u003cp\u003eTime away from code.\u003c/p\u003e\u003cp\u003eThis is what sustainable development looks like: Morning administrative work. Evening with family. Not coding mania. Not pushing through exhaustion. Just work that fits the day’s shape.\u003c/p\u003e\u003ch3\u003eInvestigation while traveling\u003c/h3\u003e\u003cp\u003eFlying home from LA on Sartuday. Light work only — no implementation. But investigation pays dividends.\u003c/p\u003e\u003cp\u003eIssue #262 (UUID Migration) has been sitting in backlog marked “March 2026” — pre-MVP work. But Issue #291 (Token Blacklist FK) can’t complete without it. The dependency forces #262 earlier.\u003c/p\u003e\u003cp\u003eWhat’s the actual scope? Let’s investigate.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDatabase audit\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eusers table: VARCHAR primary key\u003c/li\u003e\u003cli\u003ealpha_users table: UUID primary key\u003c/li\u003e\u003cli\u003eSeven FK dependencies\u003c/li\u003e\u003cli\u003eType inconsistency blocks #291\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eThe question\u003c/strong\u003e: How hard is this migration really?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOptions considered\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eOption A: Quick fix with technical debt (fast but creates future problems)\u003c/li\u003e\u003cli\u003eOption B: Do it properly (migrate to UUID, consolidate tables)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eI choose Option B. But how long will it take?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInvestigation begins\u003c/strong\u003e: Code Agent does comprehensive database audit. Table structures. Foreign keys. Application code. Risks. Rollback procedures.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e45 minutes later — Critical discovery\u003c/strong\u003e: The users table is empty. Zero records.\u003c/p\u003e\u003cp\u003eWait. Of course it is. We didn’t have a user table for the first five months of this project. There was only ever one user. The main users table we made a week or so ago? Zero records. Never used.\u003c/p\u003e\u003cp\u003eThis corrects the false assumptions of the draft plan. \u003cstrong\u003eOriginal estimate\u003c/strong\u003e: 2–3 days. Complex dual-column migration. Data transformation. High risk. \u003cstrong\u003eWith empty table\u003c/strong\u003e: 10–16 hours. Direct ALTER. No data migration. Low risk.\u003c/p\u003e\u003cp\u003eThe archaeological approach again: Investigate before planning. Don’t assume complexity. Check actual state.\u003c/p\u003e\u003ch3\u003eThe planning work\u003c/h3\u003e\u003cp\u003eSaturday evening: Creating the gameplan.\u003c/p\u003e\u003cp\u003eWith an empty table, the migration becomes straightforward:\u003c/p\u003e\u003cul\u003e\u003cli\u003ePhase −1: Verify state (confirm table empty)\u003c/li\u003e\u003cli\u003ePhase 0: Backups (safety first)\u003c/li\u003e\u003cli\u003ePhase 1: ALTER table (users.id VARCHAR→UUID, add is_alpha flag)\u003c/li\u003e\u003cli\u003ePhase 2: Update models (7 models to UUID types)\u003c/li\u003e\u003cli\u003ePhase 3: Update code (152 type hint files affected)\u003c/li\u003e\u003cli\u003ePhase 4: Update tests (104 test files affected)\u003c/li\u003e\u003cli\u003ePhase 5: Integration testing\u003c/li\u003e\u003cli\u003ePhase Z: Commit and celebrate\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eAutomation identified\u003c/strong\u003e: Type hints can be scripted. Tests follow patterns. Create tools for batch work.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #291 integration\u003c/strong\u003e: The Token Blacklist FK naturally resolves as part of #262. Two issues, one implementation. Efficient.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAgent coordination planned\u003c/strong\u003e: Code Agent implements. Cursor Agent verifies. Both create handoff documents at phase boundaries.\u003c/p\u003e\u003cp\u003eGameplan complete: 680 lines. Seven phases. Clear acceptance criteria. Ready for execution.\u003c/p\u003e\u003cp\u003eBut not tonight. It’s Saturday. I’m traveling home. The work can wait until tomorrow.\u003c/p\u003e\u003ch3\u003eThe migration ready\u003c/h3\u003e\u003cp\u003eSaturday evening: Gameplan complete. Investigation done. Discovery validated.\u003c/p\u003e\u003cp\u003eEmpty table means straightforward migration. 16 hours estimated. Two issues resolved together. Automation tools identified.\u003c/p\u003e\u003cp\u003eSunday: Agent deployment. But that’s another story.\u003c/p\u003e\u003cp\u003eFor now: Three days of travel. Family time. Administrative work. Investigation that saved days. Planning that enables execution.\u003c/p\u003e\u003cp\u003eNot coding mania. Just sustainable development. Work that respects both project needs and human life.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Agent Tag-Team: When Frustration Becomes Protocol (Nov 9–10) , as 21 hours of autonomous coordination teaches us what’s possible.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBots are great and all, but family comes first! Don’t forget to make the work you do support the kind of live you want to live, instead of the other way around!\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=2c985244975a\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/working-while-living-three-days-of-travel-and-planning-2c985244975a\"\u003eWorking While Living: Three Days of Travel and Planning\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3cbb,"])</script><script>self.__next_f.push([1,"\u003csection name=\"8ed0\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"6550\" id=\"6550\" class=\"graf graf--h3 graf--leading graf--title\"\u003eWorking While Living: Three Days of Travel and Planning\u003c/h3\u003e\u003cfigure name=\"a30f\" id=\"a30f\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*kQU9VCdJsrQ_qaYCDGZ9gw.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A person and robot work from a hotel room, with the Occidental College campus visible outside\" src=\"https://cdn-images-1.medium.com/max/800/1*kQU9VCdJsrQ_qaYCDGZ9gw.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“As soon as we’re done we can go see my nephew!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"e9af\" id=\"e9af\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 6–8\u003c/em\u003e\u003c/p\u003e\u003cp name=\"2f0a\" id=\"2f0a\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eOn\u003c/span\u003e Thursday afternoon, with two P2 issues ready to close, I deployed two agents in parallel. 18 minutes later they were both done. Later that evening, flying to Burbank for my nephew’s play at Occidental College.\u003c/p\u003e\u003cp name=\"9821\" id=\"9821\" class=\"graf graf--p graf-after--p\"\u003eFriday, the plan was to work from a Pasadena hotel room, publish Weekly Ship #016, updatee my Chief of Staff on all our work streams. Then go see Neil Simon’s play \u003cem class=\"markup--em markup--p-em\"\u003eRumors\u003c/em\u003e that night.\u003c/p\u003e\u003cp name=\"5d5f\" id=\"5d5f\" class=\"graf graf--p graf-after--p\"\u003eSaturday, I fly home after a nice long breakfast with my brother, my sister-in-law, and his sister-in-law (my sister-in-law-in-law?).\u003c/p\u003e\u003cp name=\"8274\" id=\"8274\" class=\"graf graf--p graf-after--p\"\u003eThree days. Family obligations. Travel up and down California. The work happens in the margins: fast execution, administrative tidying, and investigation that saves days of effort.\u003c/p\u003e\u003ch3 name=\"2277\" id=\"2277\" class=\"graf graf--h3 graf-after--p\"\u003eThe verification gate\u003c/h3\u003e\u003cp name=\"c1df\" id=\"c1df\" class=\"graf graf--p graf-after--h3\"\u003eI’m now fixing bugs I’m finding in my own end-to-end alpha testing:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"f3c2\" id=\"f3c2\" class=\"graf graf--li graf-after--p\"\u003eIssue #286: Move CONVERSATION handler to canonical section. Architectural cleanup.\u003c/li\u003e\u003cli name=\"ce20\" id=\"ce20\" class=\"graf graf--li graf-after--li\"\u003eIssue #287: Fix timezone display (PT vs Los Angeles), contradictory messages, calendar validation.\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"a497\" id=\"a497\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e1:51 PM\u003c/strong\u003e — Code Agent starts #286\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e1:54 PM\u003c/strong\u003e — Cursor Agent starts #287\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e2:00 PM\u003c/strong\u003e — Cursor completes (6 minutes)\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e2:03 PM\u003c/strong\u003e — Code completes (12 minutes)\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e3:15 PM\u003c/strong\u003e — Verification gate: Check both changes present\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e3:37 PM\u003c/strong\u003e — Verified: No conflicts, both changes correct\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e3:42 PM\u003c/strong\u003e — Push: 55/55 tests passing\u003c/p\u003e\u003cp name=\"661c\" id=\"661c\" class=\"graf graf--p graf-after--p\"\u003eThe verification gate caught a risk. Both agents had edited \u003ccode class=\"markup--code markup--p-code\"\u003ecanonical_handlers.py \u003c/code\u003e(a potential conflict). Without checking, we might have pushed conflicts. With the gate: clean merge, zero issues.\u003c/p\u003e\u003cp name=\"8456\" id=\"8456\" class=\"graf graf--p graf-after--p\"\u003eTotal time: 18 minutes of agent work. Estimated: 4 hours. \u003cstrong class=\"markup--strong markup--p-strong\"\u003e12x faster than expected.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"4609\" id=\"4609\" class=\"graf graf--p graf-after--p\"\u003eWhy so fast? Issues were simpler than estimated. Good architecture made changes straightforward. Comprehensive tests validated immediately.\u003c/p\u003e\u003ch3 name=\"4634\" id=\"4634\" class=\"graf graf--h3 graf-after--p\"\u003eIf it’s Thursday this must be Burbank\u003c/h3\u003e\u003cp name=\"4021\" id=\"4021\" class=\"graf graf--p graf-after--h3\"\u003eFlight to Burbank. Nephew’s play at Occidental College the next night. Family time.\u003c/p\u003e\u003cp name=\"7d43\" id=\"7d43\" class=\"graf graf--p graf-after--p\"\u003eDevelopment work doesn’t stop for life. But it adapts. Morning: Fast execution on P2 issues. Evening: On a plane. Different rhythms for different contexts.\u003c/p\u003e\u003cp name=\"774c\" id=\"774c\" class=\"graf graf--p graf-after--p\"\u003eThe work that happened Thursday morning took 18 minutes because it could. Quick architectural fix. UX polish. Both agents knowing exactly what to do. Then done. Then life.\u003c/p\u003e\u003ch3 name=\"ff27\" id=\"ff27\" class=\"graf graf--h3 graf-after--p\"\u003eBack to my old road warrior days\u003c/h3\u003e\u003cp name=\"2083\" id=\"2083\" class=\"graf graf--p graf-after--h3\"\u003eFriday I work out of my Pasadena, looking forward to my Nephew’s play that evening. The work that fits in this hotel time is mostly administrative, not technical. I am excited to see family and can’t concentrate on supervising software development.\u003c/p\u003e\u003cp name=\"c2e4\" id=\"c2e4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMorning work\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"cf1c\" id=\"cf1c\" class=\"graf graf--li graf-after--p\"\u003eWeekly Ship #016 published (covering Oct 31 — Nov 6)\u003c/li\u003e\u003cli name=\"c3a8\" id=\"c3a8\" class=\"graf graf--li graf-after--li\"\u003eWork streams formalized (v2.0: seven categories that were due for updating as the project has entered a new stage)\u003c/li\u003e\u003cli name=\"96e3\" id=\"96e3\" class=\"graf graf--li graf-after--li\"\u003eIssues #286, #287 documented and closed\u003c/li\u003e\u003cli name=\"d677\" id=\"d677\" class=\"graf graf--li graf-after--li\"\u003eP2 dependency identified: #291 blocked by #262\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"162b\" id=\"162b\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWork streams evolution\u003c/strong\u003e: Back in July, the categories focused on foundation-building. Now in November, they track operational status. The shift from “building the system” to “running the system.” Time to formalize that evolution.\u003c/p\u003e\u003cp name=\"80a7\" id=\"80a7\" class=\"graf graf--p graf-after--p\"\u003eSeven streams defined:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"859a\" id=\"859a\" class=\"graf graf--li graf-after--p\"\u003eUser Testing (alpha expansion)\u003c/li\u003e\u003cli name=\"182c\" id=\"182c\" class=\"graf graf--li graf-after--li\"\u003eSystem Health (infrastructure, costs)\u003c/li\u003e\u003cli name=\"20b8\" id=\"20b8\" class=\"graf graf--li graf-after--li\"\u003eMethodology Evolution (patterns, processes)\u003c/li\u003e\u003cli name=\"bbaa\" id=\"bbaa\" class=\"graf graf--li graf-after--li\"\u003eOperational Efficiency (performance, automation)\u003c/li\u003e\u003cli name=\"66d5\" id=\"66d5\" class=\"graf graf--li graf-after--li\"\u003eDocumentation (maintenance, onboarding)\u003c/li\u003e\u003cli name=\"0d26\" id=\"0d26\" class=\"graf graf--li graf-after--li\"\u003eCommunications (newsletter, speaking, building in public)\u003c/li\u003e\u003cli name=\"75d8\" id=\"75d8\" class=\"graf graf--li graf-after--li\"\u003eStrategic Planning (future exploration)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"618f\" id=\"618f\" class=\"graf graf--p graf-after--li\"\u003eThe work streams now reflect reality: Not “what are we building?” but “how is everything running?”\u003c/p\u003e\u003cp name=\"c327\" id=\"c327\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCommunications momentum\u003c/strong\u003e: 699 subscribers. Conference talk accepted for next March. “\u003ca href=\"https://findingourway.design/2025/11/01/63-ai-means-product-needs-ux-more-than-ever-ft-christian-crumlish/\" data-href=\"https://findingourway.design/2025/11/01/63-ai-means-product-needs-ux-more-than-ever-ft-christian-crumlish/\" class=\"markup--anchor markup--p-anchor\" rel=\"noopener\" target=\"_blank\"\u003eFinding Our Way\u003c/a\u003e” podcast well-received. Building in public creating unexpected opportunities.\u003c/p\u003e\u003cp name=\"d0c5\" id=\"d0c5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFunny moment\u003c/strong\u003e: Discovered fabricated GitHub username “Codewarrior1988” in Weekly Ship footer. Agents sometimes invent facts confidently. Corrected to actual repo: \u003ccode class=\"markup--code markup--p-code\"\u003egithub.com/mediajunkie/piper-morgan-product/\u003c/code\u003e (all the code is open source, as you probably know already).\u003c/p\u003e\u003ch3 name=\"3d7d\" id=\"3d7d\" class=\"graf graf--h3 graf-after--p\"\u003eThe play’s the thing\u003c/h3\u003e\u003cp name=\"64f6\" id=\"64f6\" class=\"graf graf--p graf-after--h3\"\u003eFriday evening at Occidental College. My nephew’s performance is a tour de force, but the truth is it’s just wonderful to see him, meet his charming friends, and enjoy the company of east-coast family I rarely get to see.\u003c/p\u003e\u003cp name=\"08a9\" id=\"08a9\" class=\"graf graf--p graf-after--p\"\u003eTime away from code.\u003c/p\u003e\u003cp name=\"11a5\" id=\"11a5\" class=\"graf graf--p graf-after--p\"\u003eThis is what sustainable development looks like: Morning administrative work. Evening with family. Not coding mania. Not pushing through exhaustion. Just work that fits the day’s shape.\u003c/p\u003e\u003ch3 name=\"1fe1\" id=\"1fe1\" class=\"graf graf--h3 graf-after--p\"\u003eInvestigation while traveling\u003c/h3\u003e\u003cp name=\"0467\" id=\"0467\" class=\"graf graf--p graf-after--h3\"\u003eFlying home from LA on Sartuday. Light work only — no implementation. But investigation pays dividends.\u003c/p\u003e\u003cp name=\"fe1f\" id=\"fe1f\" class=\"graf graf--p graf-after--p\"\u003eIssue #262 (UUID Migration) has been sitting in backlog marked “March 2026” — pre-MVP work. But Issue #291 (Token Blacklist FK) can’t complete without it. The dependency forces #262 earlier.\u003c/p\u003e\u003cp name=\"fb3b\" id=\"fb3b\" class=\"graf graf--p graf-after--p\"\u003eWhat’s the actual scope? Let’s investigate.\u003c/p\u003e\u003cp name=\"30e5\" id=\"30e5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDatabase audit\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"d499\" id=\"d499\" class=\"graf graf--li graf-after--p\"\u003eusers table: VARCHAR primary key\u003c/li\u003e\u003cli name=\"22d2\" id=\"22d2\" class=\"graf graf--li graf-after--li\"\u003ealpha_users table: UUID primary key\u003c/li\u003e\u003cli name=\"3d55\" id=\"3d55\" class=\"graf graf--li graf-after--li\"\u003eSeven FK dependencies\u003c/li\u003e\u003cli name=\"00bb\" id=\"00bb\" class=\"graf graf--li graf-after--li\"\u003eType inconsistency blocks #291\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"63bd\" id=\"63bd\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe question\u003c/strong\u003e: How hard is this migration really?\u003c/p\u003e\u003cp name=\"8241\" id=\"8241\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOptions considered\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"8eda\" id=\"8eda\" class=\"graf graf--li graf-after--p\"\u003eOption A: Quick fix with technical debt (fast but creates future problems)\u003c/li\u003e\u003cli name=\"d483\" id=\"d483\" class=\"graf graf--li graf-after--li\"\u003eOption B: Do it properly (migrate to UUID, consolidate tables)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"347a\" id=\"347a\" class=\"graf graf--p graf-after--li\"\u003eI choose Option B. But how long will it take?\u003c/p\u003e\u003cp name=\"817f\" id=\"817f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInvestigation begins\u003c/strong\u003e: Code Agent does comprehensive database audit. Table structures. Foreign keys. Application code. Risks. Rollback procedures.\u003c/p\u003e\u003cp name=\"4285\" id=\"4285\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e45 minutes later — Critical discovery\u003c/strong\u003e: The users table is empty. Zero records.\u003c/p\u003e\u003cp name=\"e8d7\" id=\"e8d7\" class=\"graf graf--p graf-after--p\"\u003eWait. Of course it is. We didn’t have a user table for the first five months of this project. There was only ever one user. The main users table we made a week or so ago? Zero records. Never used.\u003c/p\u003e\u003cp name=\"7fe9\" id=\"7fe9\" class=\"graf graf--p graf-after--p\"\u003eThis corrects the false assumptions of the draft plan. \u003cstrong class=\"markup--strong markup--p-strong\"\u003eOriginal estimate\u003c/strong\u003e: 2–3 days. Complex dual-column migration. Data transformation. High risk. \u003cstrong class=\"markup--strong markup--p-strong\"\u003eWith empty table\u003c/strong\u003e: 10–16 hours. Direct ALTER. No data migration. Low risk.\u003c/p\u003e\u003cp name=\"a995\" id=\"a995\" class=\"graf graf--p graf-after--p\"\u003eThe archaeological approach again: Investigate before planning. Don’t assume complexity. Check actual state.\u003c/p\u003e\u003ch3 name=\"f8ba\" id=\"f8ba\" class=\"graf graf--h3 graf-after--p\"\u003eThe planning work\u003c/h3\u003e\u003cp name=\"121c\" id=\"121c\" class=\"graf graf--p graf-after--h3\"\u003eSaturday evening: Creating the gameplan.\u003c/p\u003e\u003cp name=\"5f0e\" id=\"5f0e\" class=\"graf graf--p graf-after--p\"\u003eWith an empty table, the migration becomes straightforward:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"87f3\" id=\"87f3\" class=\"graf graf--li graf-after--p\"\u003ePhase −1: Verify state (confirm table empty)\u003c/li\u003e\u003cli name=\"4881\" id=\"4881\" class=\"graf graf--li graf-after--li\"\u003ePhase 0: Backups (safety first)\u003c/li\u003e\u003cli name=\"dd66\" id=\"dd66\" class=\"graf graf--li graf-after--li\"\u003ePhase 1: ALTER table (users.id VARCHAR→UUID, add is_alpha flag)\u003c/li\u003e\u003cli name=\"8d2c\" id=\"8d2c\" class=\"graf graf--li graf-after--li\"\u003ePhase 2: Update models (7 models to UUID types)\u003c/li\u003e\u003cli name=\"06b6\" id=\"06b6\" class=\"graf graf--li graf-after--li\"\u003ePhase 3: Update code (152 type hint files affected)\u003c/li\u003e\u003cli name=\"beba\" id=\"beba\" class=\"graf graf--li graf-after--li\"\u003ePhase 4: Update tests (104 test files affected)\u003c/li\u003e\u003cli name=\"6f6f\" id=\"6f6f\" class=\"graf graf--li graf-after--li\"\u003ePhase 5: Integration testing\u003c/li\u003e\u003cli name=\"78c9\" id=\"78c9\" class=\"graf graf--li graf-after--li\"\u003ePhase Z: Commit and celebrate\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"bae2\" id=\"bae2\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAutomation identified\u003c/strong\u003e: Type hints can be scripted. Tests follow patterns. Create tools for batch work.\u003c/p\u003e\u003cp name=\"6bc4\" id=\"6bc4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #291 integration\u003c/strong\u003e: The Token Blacklist FK naturally resolves as part of #262. Two issues, one implementation. Efficient.\u003c/p\u003e\u003cp name=\"2957\" id=\"2957\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAgent coordination planned\u003c/strong\u003e: Code Agent implements. Cursor Agent verifies. Both create handoff documents at phase boundaries.\u003c/p\u003e\u003cp name=\"d28e\" id=\"d28e\" class=\"graf graf--p graf-after--p\"\u003eGameplan complete: 680 lines. Seven phases. Clear acceptance criteria. Ready for execution.\u003c/p\u003e\u003cp name=\"bdba\" id=\"bdba\" class=\"graf graf--p graf-after--p\"\u003eBut not tonight. It’s Saturday. I’m traveling home. The work can wait until tomorrow.\u003c/p\u003e\u003ch3 name=\"4bf1\" id=\"4bf1\" class=\"graf graf--h3 graf-after--p\"\u003eThe migration ready\u003c/h3\u003e\u003cp name=\"000f\" id=\"000f\" class=\"graf graf--p graf-after--h3\"\u003eSaturday evening: Gameplan complete. Investigation done. Discovery validated.\u003c/p\u003e\u003cp name=\"1ede\" id=\"1ede\" class=\"graf graf--p graf-after--p\"\u003eEmpty table means straightforward migration. 16 hours estimated. Two issues resolved together. Automation tools identified.\u003c/p\u003e\u003cp name=\"949c\" id=\"949c\" class=\"graf graf--p graf-after--p\"\u003eSunday: Agent deployment. But that’s another story.\u003c/p\u003e\u003cp name=\"eb8e\" id=\"eb8e\" class=\"graf graf--p graf-after--p\"\u003eFor now: Three days of travel. Family time. Administrative work. Investigation that saved days. Planning that enables execution.\u003c/p\u003e\u003cp name=\"c05e\" id=\"c05e\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eNot coding mania. Just sustainable development. Work that respects both project needs and human life.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Working While Living: Three D
