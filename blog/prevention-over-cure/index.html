 markup--p-code\"\u003epython -c \u0026quot;import services.api\u0026quot;\u003c/code\u003e tests if structure is correct\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBad\u003c/strong\u003e: \u0026quot;Run full test suite and see if it works\u0026quot;\u003c/p\u003e\u003cp name=\"dd9f\" id=\"dd9f\" class=\"graf graf--p graf-after--p\"\u003eQuick verification enables fast feedback. Slow verification gets skipped.\u003c/p\u003e\u003ch4 name=\"df91\" id=\"df91\" class=\"graf graf--h4 graf-after--p\"\u003eAppropriate severity\u003c/h4\u003e\u003cp name=\"51d1\" id=\"51d1\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGood\u003c/strong\u003e: Missing \u003ccode class=\"markup--code markup--p-code\"\u003e__init__.py\u003c/code\u003e blocks commit (critical requirement)\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGood\u003c/strong\u003e: Misnamed manual test warns (useful but not critical)\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBad\u003c/strong\u003e: Everything blocks (too strict, gets bypassed)\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBad\u003c/strong\u003e: Everything warns (too lenient, gets ignored)\u003c/p\u003e\u003cp name=\"29fb\" id=\"29fb\" class=\"graf graf--p graf-after--p\"\u003eMatch enforcement to severity. Critical requirements block. Useful guidance warns.\u003c/p\u003e\u003ch3 name=\"e61d\" id=\"e61d\" class=\"graf graf--h3 graf-after--p\"\u003eThe investment decision framework\u003c/h3\u003e\u003cp name=\"1a7b\" id=\"1a7b\" class=\"graf graf--p graf-after--h3\"\u003eHow do you decide when to invest in prevention?\u003c/p\u003e\u003ch4 name=\"9ab9\" id=\"9ab9\" class=\"graf graf--h4 graf-after--p\"\u003eQuestion 1: How often will this recur?\u003c/h4\u003e\u003cp name=\"3102\" id=\"3102\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOnce ever\u003c/strong\u003e: Quick fix appropriate\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOccasionally (1–2 times/year)\u003c/strong\u003e: Prevention probably worth it\u003cbr\u003e \u003cstrong class=\"markup--strong markup--p-strong\"\u003eFrequently (monthly)\u003c/strong\u003e: Prevention definitely worth it\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvery commit\u003c/strong\u003e: Prevention mandatory\u003c/p\u003e\u003ch4 name=\"10ef\" id=\"10ef\" class=\"graf graf--h4 graf-after--p\"\u003eQuestion 2: How expensive is each occurrence?\u003c/h4\u003e\u003cp name=\"d3fa\" id=\"d3fa\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e5 minutes\u003c/strong\u003e: Prevention needs to be very cheap to justify\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e30 minutes\u003c/strong\u003e: Prevention justified if problem recurs 3+ times\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e2+ hours\u003c/strong\u003e: Prevention justified if problem recurs even once\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eUnknown/variable\u003c/strong\u003e: Prevention provides insurance value\u003c/p\u003e\u003ch4 name=\"766c\" id=\"766c\" class=\"graf graf--h4 graf-after--p\"\u003eQuestion 3: Can it be automated?\u003c/h4\u003e\u003cp name=\"1b08\" id=\"1b08\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eYes\u003c/strong\u003e: Strong case for prevention (minimal ongoing cost)\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePartially\u003c/strong\u003e: Moderate case (reduced future cost)\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNo\u003c/strong\u003e: Weaker case (still requires manual work)\u003c/p\u003e\u003ch4 name=\"dbe6\" id=\"dbe6\" class=\"graf graf--h4 graf-after--p\"\u003eQuestion 4: How certain is the solution?\u003c/h4\u003e\u003cp name=\"e3ac\" id=\"e3ac\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eVery certain\u003c/strong\u003e: Invest in comprehensive prevention\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSomewhat certain\u003c/strong\u003e: Invest in lightweight prevention, iterate\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eUncertain\u003c/strong\u003e: Quick fix, observe, invest in prevention after second occurrence\u003c/p\u003e\u003ch4 name=\"d5e8\" id=\"d5e8\" class=\"graf graf--h4 graf-after--p\"\u003eQuestion 5: What’s the blast radius?\u003c/h4\u003e\u003cp name=\"84f4\" id=\"84f4\" class=\"graf graf--p graf-after--h4\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAffects one developer\u003c/strong\u003e: Lower priority for prevention\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAffects team\u003c/strong\u003e: Medium priority\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAffects production\u003c/strong\u003e: High priority\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAffects users\u003c/strong\u003e: Mandatory prevention\u003c/p\u003e\u003cp name=\"f05a\" id=\"f05a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTuesday’s score\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"0f13\" id=\"0f13\" class=\"graf graf--li graf-after--p\"\u003eRecurrence: Frequent (every 6 months without prevention)\u003c/li\u003e\u003cli name=\"160d\" id=\"160d\" class=\"graf graf--li graf-after--li\"\u003eCost per occurrence: 30 minutes minimum\u003c/li\u003e\u003cli name=\"45ec\" id=\"45ec\" class=\"graf graf--li graf-after--li\"\u003eAutomatable: Yes (pre-commit hooks)\u003c/li\u003e\u003cli name=\"588a\" id=\"588a\" class=\"graf graf--li graf-after--li\"\u003eCertainty: Very certain (Python package structure is well-understood)\u003c/li\u003e\u003cli name=\"49d5\" id=\"49d5\" class=\"graf graf--li graf-after--li\"\u003eBlast radius: Affects team (everyone hits import issues)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"ecbc\" id=\"ecbc\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eResult\u003c/strong\u003e: 5/5 factors favor prevention. Clear decision.\u003c/p\u003e\u003ch3 name=\"4d48\" id=\"4d48\" class=\"graf graf--h3 graf-after--p\"\u003eWhat this means for other teams\u003c/h3\u003e\u003cp name=\"4902\" id=\"4902\" class=\"graf graf--p graf-after--h3\"\u003eThe prevention pattern applies beyond Piper Morgan:\u003c/p\u003e\u003cp name=\"9b08\" id=\"9b08\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAny team should invest in prevention when\u003c/strong\u003e:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"bb1c\" id=\"bb1c\" class=\"graf graf--li graf-after--p\"\u003eProblem will recur (not one-time)\u003c/li\u003e\u003cli name=\"95c6\" id=\"95c6\" class=\"graf graf--li graf-after--li\"\u003ePrevention can be automated (minimal ongoing cost)\u003c/li\u003e\u003cli name=\"7ce6\" id=\"7ce6\" class=\"graf graf--li graf-after--li\"\u003eProblem affects multiple people (shared pain)\u003c/li\u003e\u003cli name=\"694a\" id=\"694a\" class=\"graf graf--li graf-after--li\"\u003eSolution is well-understood (not experimental)\u003c/li\u003e\u003cli name=\"e061\" id=\"e061\" class=\"graf graf--li graf-after--li\"\u003eROI is positive (time saved \u0026gt; time invested)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"3b94\" id=\"3b94\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCommon prevention opportunities\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c769\" id=\"c769\" class=\"graf graf--li graf-after--p\"\u003ePre-commit hooks (catch issues before commit)\u003c/li\u003e\u003cli name=\"a50e\" id=\"a50e\" class=\"graf graf--li graf-after--li\"\u003eCI/CD checks (catch issues before deployment)\u003c/li\u003e\u003cli name=\"5955\" id=\"5955\" class=\"graf graf--li graf-after--li\"\u003eDocumentation (prevent “how does this work” questions)\u003c/li\u003e\u003cli name=\"5be2\" id=\"5be2\" class=\"graf graf--li graf-after--li\"\u003eAutomated tests (prevent regressions)\u003c/li\u003e\u003cli name=\"16ac\" id=\"16ac\" class=\"graf graf--li graf-after--li\"\u003eConfiguration validation (prevent deployment errors)\u003c/li\u003e\u003cli name=\"0273\" id=\"0273\" class=\"graf graf--li graf-after--li\"\u003eStyle guides (prevent inconsistency)\u003c/li\u003e\u003cli name=\"e20f\" id=\"e20f\" class=\"graf graf--li graf-after--li\"\u003eCode review checklists (prevent common mistakes)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"4e2d\" id=\"4e2d\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe discipline\u003c/strong\u003e: When problem occurs, ask “How do we prevent this entire problem class?” not just “How do we fix this instance?”\u003c/p\u003e\u003ch3 name=\"5e6d\" id=\"5e6d\" class=\"graf graf--h3 graf-after--p\"\u003eThe evening outcome\u003c/h3\u003e\u003cp name=\"5521\" id=\"5521\" class=\"graf graf--p graf-after--h3\"\u003e9:30 PM: Prevention work complete.\u003c/p\u003e\u003cp name=\"7d17\" id=\"7d17\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImmediate result\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"4326\" id=\"4326\" class=\"graf graf--li graf-after--p\"\u003eFoundation branch pushed successfully\u003c/li\u003e\u003cli name=\"60f1\" id=\"60f1\" class=\"graf graf--li graf-after--li\"\u003eTests import correctly\u003c/li\u003e\u003cli name=\"8b80\" id=\"8b80\" class=\"graf graf--li graf-after--li\"\u003ePre-commit hooks enforcing requirements\u003c/li\u003e\u003cli name=\"8472\" id=\"8472\" class=\"graf graf--li graf-after--li\"\u003eDocumentation comprehensive\u003c/li\u003e\u003cli name=\"ed62\" id=\"ed62\" class=\"graf graf--li graf-after--li\"\u003eAutomated scripts ready\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"861c\" id=\"861c\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLong-term result\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"82cd\" id=\"82cd\" class=\"graf graf--li graf-after--p\"\u003eMissing \u003ccode class=\"markup--code markup--li-code\"\u003e__init__.py\u003c/code\u003e literally cannot happen (blocked by pre-commit hook)\u003c/li\u003e\u003cli name=\"0670\" id=\"0670\" class=\"graf graf--li graf-after--li\"\u003eAll agents understand Python package requirements (documented in CLAUDE.md)\u003c/li\u003e\u003cli name=\"cb14\" id=\"cb14\" class=\"graf graf--li graf-after--li\"\u003eFuture import issues take 1 minute to fix (automated script exists)\u003c/li\u003e\u003cli name=\"d655\" id=\"d655\" class=\"graf graf--li graf-after--li\"\u003eEnvironment standardized (editable install prevents sys.path issues)\u003c/li\u003e\u003cli name=\"408b\" id=\"408b\" class=\"graf graf--li graf-after--li\"\u003eTest suite reliable (manual tests properly identified)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"fa7b\" id=\"fa7b\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTime invested\u003c/strong\u003e: 3.5 hours one-time\u003c/p\u003e\u003cp name=\"7528\" id=\"7528\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTime saved\u003c/strong\u003e: 10–20 hours over project lifetime (conservative)\u003c/p\u003e\u003cp name=\"61fe\" id=\"61fe\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--stro
