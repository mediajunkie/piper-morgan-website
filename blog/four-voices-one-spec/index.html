:\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T2e35,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eFebruary 28\u003c/em\u003e\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"Four distinct nonhuman AI beings — a ghostlike form, glowing neural blob, floating machine-brain, and dolphin-like creature — join one by one in song as a human conductor guides them, their voices merging into a single structured form above.\" src=\"https://cdn-images-1.medium.com/max/1024/1*zcWnMTMffFS4S6BdgS0MRA.png\" /\u003e\u003cfigcaption\u003e“Pure harmony!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eThe conversation lifecycle spec was stuck. It wasn’t blocked by technical complexity or missing requirements. It was blocked by the kind of problem that happens when a specification touches multiple domains at once: nobody owned the whole thing, so nobody finished it.\u003c/p\u003e\u003cp\u003eThen we tried something different. Four agents, each with a distinct perspective, worked the spec in sequence. By evening, a specification that had lingered undone was ready for implementation.\u003c/p\u003e\u003ch3\u003eThe spec that needed too many things\u003c/h3\u003e\u003cp\u003eIssue #858 — “Conversation Lifecycle Specification” — had been open since early February. The concept was straightforward: define how conversations begin, persist, and end. When does a conversation start? What happens when a user returns after being away? How do we handle the graceful ending of a conversation versus abandonment?\u003c/p\u003e\u003cp\u003eSimple questions. But the answers touched everything:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBackend architecture\u003c/strong\u003e: How is conversation state stored? What triggers lifecycle transitions? How does the system know when a user has returned versus started fresh?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUser experience\u003c/strong\u003e: What does the user see at each stage? How do we surface conversation history? What happens when they click on an old conversation?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProduct strategy\u003c/strong\u003e: Should conversations be discrete sessions or persistent threads? How does this interact with the “colleague” model — colleagues remember context but don’t remember everything?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImplementation constraints\u003c/strong\u003e: What does the existing codebase support? What would require new infrastructure? What’s feasible in the current sprint versus later?\u003c/p\u003e\u003cp\u003eThe spec needed backend depth and UX sensitivity and product vision and implementation awareness. It needed someone who understood all four domains well enough to make tradeoffs between them.\u003c/p\u003e\u003cp\u003eWe didn’t have that person. We had four agents who each understood one domain deeply.\u003c/p\u003e\u003ch3\u003eThe pipeline\u003c/h3\u003e\u003cp\u003eRather than trying to find one agent who could do everything, we built a pipeline. Each agent added what they were best at, in sequence:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFirst: Research.\u003c/strong\u003e The Docs agent conducted deep research across 14 documents and 22 GitHub issues. Not writing the spec — mapping the territory. What had we already decided? What was assumed but unstated? What constraints existed in the codebase that nobody had written down?\u003c/p\u003e\u003cp\u003eThe research surfaced things nobody remembered: early decisions about conversation threading, abandoned approaches, implicit assumptions in how the existing code handled sessions. It also flagged an important compatibility question — how would this spec interact with Ted Nadeau’s MultiChat PRD, which assumed multi-entity conversations that our current design didn’t fully support?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSecond: Review and direction.\u003c/strong\u003e I reviewed the research report and asked for a specific additional pass: check everything against Ted’s PRD and flag incompatibilities. The research agent did a second round, producing a compatibility assessment.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThird: UX guidance.\u003c/strong\u003e The CXO took the research and translated it into user experience terms. What states should be visible to users? (Fewer than exist internally — users don’t need to see technical states.) What should the sidebar show? (The “entity surface” framing — conversations in context of what they’re about, not a pure archive.) Where should conversation boundaries fall? (Calendar days as natural soft-close points.)\u003c/p\u003e\u003cp\u003eThe CXO’s memo didn’t touch backend architecture at all. It was pure UX: what users see, what they can do, how it should feel. But it gave the specification a user-centered frame that the research alone couldn’t provide.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFourth: Structure and alignment.\u003c/strong\u003e The PPM reviewed the CXO memo and added product structure. A formal section breakdown for the spec. Explicit decision points that needed PM sign-off. An “anti-flattening checklist” to ensure implementation wouldn’t simplify away the nuances.\u003c/p\u003e\u003cp\u003eThe PPM also contributed a specific feature insight: “continue yesterday” as an affordance. When a user returns after being away, should Piper offer to continue where they left off? The research had flagged conversation resumption as a question. The CXO had addressed how it should feel. The PPM made it concrete: yes, this is a feature, and here’s how to spec it.\u003c/p\u003e\u003ch3\u003eWhat each voice added\u003c/h3\u003e\u003cp\u003eLooking back at the pipeline, each agent contributed something the others couldn’t:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResearch\u003c/strong\u003e provided the foundation — you can’t make good decisions without knowing what’s already been decided, what constraints exist, what prior art exists. But research alone doesn’t make decisions. It maps options.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePM direction\u003c/strong\u003e (me, in this case) provided focus. The research report was comprehensive but needed prioritization. The compatibility pass was assigned because I knew it mattered for Ted’s work. Direction without research would be guessing; research without direction would be sprawling.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUX guidance\u003c/strong\u003e provided the user lens. The CXO wasn’t constrained by backend possibilities or product roadmaps. They asked the pure question: what should users experience? That freedom produced insights (calendar-day boundaries, entity surface framing) that wouldn’t emerge from more constrained perspectives.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProduct structure\u003c/strong\u003e provided implementability. The PPM took UX ideals and made them buildable — section breakdowns, decision points, checklist items. Vision without structure remains vision; structure made it a spec.\u003c/p\u003e\u003cp\u003eNone of these perspectives was complete. Each needed the others to produce something useful. The pipeline worked because it let each voice contribute its strength without requiring any voice to have all strengths.\u003c/p\u003e\u003ch3\u003eThe same day\u003c/h3\u003e\u003cp\u003eThe most surprising thing wasn’t that the pipeline worked — it was how fast it worked.\u003c/p\u003e\u003cp\u003eThe research started in the morning. The PM review happened around midday. The CXO memo was complete by mid-afternoon. The PPM synthesis was done by evening.\u003c/p\u003e\u003cp\u003eA spec that had been stuck for weeks was ready for implementation in one day.\u003c/p\u003e\u003cp\u003ePart of this was coordination. Having a clear handoff chain meant nobody waited for unclear dependencies. Research knew to produce a report for PM review. PM knew to direct it to CXO. CXO knew to produce guidance for PPM. Each step had a clear input and clear output.\u003c/p\u003e\u003cp\u003ePart of it was scoping. Each agent did one thing, not everything. The CXO wasn’t trying to also do backend architecture. The PPM wasn’t trying to also do user research. Narrow scope meant faster completion meant faster handoff.\u003c/p\u003e\u003cp\u003ePart of it was trust. Each agent trusted that the previous step was done well. The CXO didn’t re-research; they built on research. The PPM didn’t re-do UX; they structured it. Trust in handoffs eliminated redundant work.\u003c/p\u003e\u003ch3\u003eMulti-agent coordination as operating model\u003c/h3\u003e\u003cp\u003eWe’ve been running a multi-agent setup since the beginning of Piper Morgan. Different specialized agents — Lead Developer, Chief Architect, CXO, PPM, and others — each handling their domain. But for most tasks, that means one agent does most of the work, with occasional handoffs for review or input.\u003c/p\u003e\u003cp\u003eThe conversation lifecycle spec was different. It required genuine synthesis — multiple perspectives contributing to a single artifact, in sequence, each building on what came before.\u003c/p\u003e\u003cp\u003eThis is harder than it sounds. Multi-agent systems can easily become multi-agent chaos: unclear ownership, redundant work, gaps where everyone assumed someone else was handling it. The stuck spec was stuck precisely because it sat in the intersection of domains, owned by everyone and therefore no one.\u003c/p\u003e\u003cp\u003eThe pipeline approach solved this by making the sequence explicit. Not “multiple agents collaborate” but “agent A produces X, which goes to agent B who produces Y, which goes to agent C.” Clear inputs. Clear outputs. Clear handoffs.\u003c/p\u003e\u003cp\u003eI think of it as an operating model question, not a technical one. How do you structure work so that specialized perspectives combine into coherent outcomes? The answer isn’t “get a generalist who can do everything.” The answer is “design handoffs that preserve each perspective’s contribution while building toward synthesis.”\u003c/p\u003e\u003ch3\u003eWhat the spec became\u003c/h3\u003e\u003cp\u003eBy the end of the day, issue #858 had:\u003c/p\u003e\u003cul\u003e\u003cli\u003eA research foundation covering 14 documents and 22 issues\u003c/li\u003e\u003cli\u003eA compatibility assessment against external requirements\u003c/li\u003e\u003cli\u003eA UX guidance memo defining user-visible states and interaction patterns\u003c/li\u003e\u003cli\u003eA product structure document with sections, decisions, and anti-flattening checklist\u003c/li\u003e\u003cli\u003eApproval from CXO, PPM, and (after review) the Chief Architect\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe Lead Developer could now implement with clarity. Not just “build conversation lifecycle” but specific decisions about state visibility, sidebar behavior, session boundaries, and resumption affordances. The spec answered the questions that would have come up during implementation, before implementation started.\u003c/p\u003e\u003cp\u003eWas it a perfect spec? Probably not. Implementation would surface edge cases nobody anticipated. But it was a complete spec — complete enough to build against, complete enough to revise from.\u003c/p\u003e\u003ch3\u003eThe operating model lesson\u003c/h3\u003e\u003cp\u003eThe conversation lifecycle spec could have been written by one person who understood all four domains. Such people exist. They’re rare and expensive and bottlenecks.\u003c/p\u003e\u003cp\u003eThe pipeline approach distributed the work across four agents who each understood one domain. It took the same total effort (maybe less, since each agent worked in their strength) and completed in one day instead of weeks.\u003c/p\u003e\u003cp\u003eThis is the operating model question that Piper Morgan keeps teaching me: how do you get coherent outcomes from distributed expertise? Not by finding unicorns who have all the expertise. By designing systems where specialized expertise combines.\u003c/p\u003e\u003cp\u003eMulti-agent coordination isn’t just a technical architecture. It’s an answer to a fundamental question about how work gets done. The conversation lifecycle spec was a small example. But the pattern scales: research → direction → domain expertise → structure → implementation. Each step adds value. Each handoff preserves it.\u003c/p\u003e\u003cp\u003eFour voices. One spec. Done in a day.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, The Gate Closes, as we finally track down all the loose ends needed for conversational glue.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever unstuck work by changing the structure of collaboration rather than adding more effort?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=168e71571f6b\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/four-voices-one-spec-168e71571f6b\"\u003eFour Voices, One Spec\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3c63,"])</script><script>self.__next_f.push([1,"\u003csection name=\"386e\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"aeb1\" id=\"aeb1\" class=\"graf graf--h3 graf--leading graf--title\"\u003eFour Voices, One Spec\u003c/h3\u003e\u003cp name=\"ef77\" id=\"ef77\" class=\"graf graf--p graf-after--h3\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eFebruary 28\u003c/em\u003e\u003c/p\u003e\u003cfigure name=\"9738\" id=\"9738\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*zcWnMTMffFS4S6BdgS0MRA.png\" data-width=\"1536\" data-height=\"1024\" alt=\"Four distinct nonhuman AI beings — a ghostlike form, glowing neural blob, floating machine-brain, and dolphin-like creature — join one by one in song as a human conductor guides them, their voices merging into a single structured form above.\" src=\"https://cdn-images-1.medium.com/max/800/1*zcWnMTMffFS4S6BdgS0MRA.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Pure harmony!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"8993\" id=\"8993\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--figure\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ehe conversation lifecycle spec was stuck. It wasn’t blocked by technical complexity or missing requirements. It was blocked by the kind of problem that happens when a specification touches multiple domains at once: nobody owned the whole thing, so nobody finished it.\u003c/p\u003e\u003cp name=\"e498\" id=\"e498\" class=\"graf graf--p graf-after--p\"\u003eThen we tried something different. Four agents, each with a distinct perspective, worked the spec in sequence. By evening, a specification that had lingered undone was ready for implementation.\u003c/p\u003e\u003ch3 name=\"c805\" id=\"c805\" class=\"graf graf--h3 graf-after--p\"\u003eThe spec that needed too many things\u003c/h3\u003e\u003cp name=\"967a\" id=\"967a\" class=\"graf graf--p graf-after--h3\"\u003eIssue #858 — “Conversation Lifecycle Specification” — had been open since early February. The concept was straightforward: define how conversations begin, persist, and end. When does a conversation start? What happens when a user returns after being away? How do we handle the graceful ending of a conversation versus abandonment?\u003c/p\u003e\u003cp name=\"257c\" id=\"257c\" class=\"graf graf--p graf-after--p\"\u003eSimple questions. But the answers touched everything:\u003c/p\u003e\u003cp name=\"7123\" id=\"7123\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBackend architecture\u003c/strong\u003e: How is conversation state stored? What triggers lifecycle transitions? How does the system know when a user has returned versus started fresh?\u003c/p\u003e\u003cp name=\"6a83\" id=\"6a83\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eUser experience\u003c/strong\u003e: What does the user see at each stage? How do we surface conversation history? What happens when they click on an old conversation?\u003c/p\u003e\u003cp name=\"6064\" id=\"6064\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProduct strategy\u003c/strong\u003e: Should conversations be discrete sessions or persistent threads? How does this interact with the “colleague” model — colleagues remember context but don’t remember everything?\u003c/p\u003e\u003cp name=\"b0c8\" id=\"b0c8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImplementation constraints\u003c/strong\u003e: What does the existing codebase support? What would require new infrastructure? What’s feasible in the current sprint versus later?\u003c/p\u003e\u003cp name=\"33be\" id=\"33be\" class=\"graf graf--p graf-after--p\"\u003eThe spec needed backend depth and UX sensitivity and product vision and implementation awareness. It needed someone who understood all four domains well enough to make tradeoffs between them.\u003c/p\u003e\u003cp name=\"60f7\" id=\"60f7\" class=\"graf graf--p graf-after--p\"\u003eWe didn’t have that person. We had four agents who each understood one domain deeply.\u003c/p\u003e\u003ch3 name=\"2273\" id=\"2273\" class=\"graf graf--h3 graf-after--p\"\u003eThe pipeline\u003c/h3\u003e\u003cp name=\"177d\" id=\"177d\" class=\"graf graf--p graf-after--h3\"\u003eRather than trying to find one agent who could do everything, we built a pipeline. Each agent added what they were best at, in sequence:\u003c/p\u003e\u003cp name=\"dd12\" id=\"dd12\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst: Research.\u003c/strong\u003e The Docs agent conducted deep research across 14 documents and 22 GitHub issues. Not writing the spec — mapping the territory. What had we already decided? What was assumed but unstated? What constraints existed in the codebase that nobody had written down?\u003c/p\u003e\u003cp name=\"2d85\" id=\"2d85\" class=\"graf graf--p graf-after--p\"\u003eThe research surfaced things nobody remembered: early decisions about conversation threading, abandoned approaches, implicit assumptions in how the existing code handled sessions. It also flagged an important compatibility question — how would this spec interact with Ted Nadeau’s MultiChat PRD, which assumed multi-entity conversations that our current design didn’t fully support?\u003c/p\u003e\u003cp name=\"e839\" id=\"e839\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSecond: Review and direction.\u003c/strong\u003e I reviewed the research report and asked for a specific additional pass: check everything against Ted’s PRD and flag incompatibilities. The research agent did a second round, producing a compatibility assessment.\u003c/p\u003e\u003cp name=\"df5c\" id=\"df5c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThird: UX guidance.\u003c/strong\u003e The CXO took the research and translated it into user experience terms. What states should be visible to users? (Fewer than exist internally — users don’t need to see technical states.) What should the sidebar show? (The “entity surface” framing — conversations in context of what they’re about, not a pure archive.) Where should conversation boundaries fall? (Calendar days as natural soft-close points.)\u003c/p\u003e\u003cp name=\"51b4\" id=\"51b4\" class=\"graf graf--p graf-after--p\"\u003eThe CXO’s memo didn’t touch backend architecture at all. It was pure UX: what users see, what they can do, how it should feel. But it gave the specification a user-centered frame that the research alone couldn’t provide.\u003c/p\u003e\u003cp name=\"fc81\" id=\"fc81\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFourth: Structure and alignment.\u003c/strong\u003e The PPM reviewed the CXO memo and added product structure. A formal section breakdown for the spec. Explicit decision points that needed PM sign-off. An “anti-flattening checklist” to ensure implementation wouldn’t simplify away the nuances.\u003c/p\u003e\u003cp name=\"b7bc\" id=\"b7bc\" class=\"graf graf--p graf-after--p\"\u003eThe PPM also contributed a specific feature insight: “continue yesterday” as an affordance. When a user returns after being away, should Piper offer to continue where they left off? The research had flagged conversation resumption as a question. The CXO had addressed how it should feel. The PPM made it concrete: yes, this is a feature, and here’s how to spec it.\u003c/p\u003e\u003ch3 name=\"78bc\" id=\"78bc\" class=\"graf graf--h3 graf-after--p\"\u003eWhat each voice added\u003c/h3\u003e\u003cp name=\"bb43\" id=\"bb43\" class=\"graf graf--p graf-after--h3\"\u003eLooking back at the pipeline, each agent contributed something the others couldn’t:\u003c/p\u003e\u003cp name=\"a7f8\" id=\"a7f8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eResearch\u003c/strong\u003e provided the foundation — you can’t make good decisions without knowing what’s already been decided, what constraints exist, what prior art exists. But research alone doesn’t make decisions. It maps options.\u003c/p\u003e\u003cp name=\"ae58\" id=\"ae58\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePM direction\u003c/strong\u003e (me, in this case) provided focus. The research report was comprehensive but needed prioritization. The compatibility pass was assigned because I knew it mattered for Ted’s work. Direction without research would be guessing; research without direction would be sprawling.\u003c/p\u003e\u003cp name=\"e6f3\" id=\"e6f3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eUX guidance\u003c/strong\u003e provided the user lens. The CXO wasn’t constrained by backend possibilities or product roadmaps. They asked the pure question: what should users experience? That freedom produced insights (calendar-day boundaries, entity surface framing) that wouldn’t emerge from more constrained perspectives.\u003c/p\u003e\u003cp name=\"919c\" id=\"919c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProduct structure\u003c/strong\u003e provided implementability. The PPM took UX ideals and made them buildable — section breakdowns, decision points, checklist items. Vision without structure remains vision; structure made it a spec.\u003c/p\u003e\u003cp name=\"7a36\" id=\"7a36\" class=\"graf graf--p graf-after--p\"\u003eNone of these perspectives was complete. Each needed the others to produce something useful. The pipeline worked because it let each voice contribute its strength without requiring any voice to have all strengths.\u003c/p\u003e\u003ch3 name=\"9928\" id=\"9928\" class=\"graf graf--h3 graf-after--p\"\u003eThe same day\u003c/h3\u003e\u003cp name=\"a23f\" id=\"a23f\" class=\"graf graf--p graf-after--h3\"\u003eThe most surprising thing wasn’t that the pipeline worked — it was how fast it worked.\u003c/p\u003e\u003cp name=\"a607\" id=\"a607\" class=\"graf graf--p graf-after--p\"\u003eThe research started in the morning. The PM review happened around midday. The CXO memo was complete by mid-afternoon. The PPM synthesis was done by evening.\u003c/p\u003e\u003cp name=\"20d6\" id=\"20d6\" class=\"graf graf--p graf-after--p\"\u003eA spec that had been stuck for weeks was ready for implementation in one day.\u003c/p\u003e\u003cp name=\"d350\" id=\"d350\" class=\"graf graf--p graf-after--p\"\u003ePart of this was coordination. Having a clear handoff chain meant nobody waited for unclear dependencies. Research knew to produce a report for PM review. PM knew to direct it to CXO. CXO knew to produce guidance for PPM. Each step had a clear input and clear output.\u003c/p\u003e\u003cp name=\"b58d\" id=\"b58d\" class=\"graf graf--p graf-after--p\"\u003ePart of it was scoping. Each agent did one thing, not everything. The CXO wasn’t trying to also do backend architecture. The PPM wasn’t trying to also do user research. Narrow scope meant faster completion meant faster handoff.\u003c/p\u003e\u003cp name=\"6c34\" id=\"6c34\" class=\"graf graf--p graf-after--p\"\u003ePart of it was trust. Each agent trusted that the previous step was done well. The CXO didn’t re-research; they built on research. The PPM didn’t re-do UX; they structured it. Trust in handoffs eliminated redundant work.\u003c/p\u003e\u003ch3 name=\"2680\" id=\"2680\" class=\"graf graf--h3 graf-after--p\"\u003eMulti-agent coordination as operating model\u003c/h3\u003e\u003cp name=\"ecc4\" id=\"ecc4\" class=\"graf graf--p graf-after--h3\"\u003eWe’ve been running a multi-agent setup since the beginning of Piper Morgan. Different specialized agents — Lead Developer, Chief Architect, CXO, PPM, and others — each handling their domain. But for most tasks, that means one agent does most of the work, with occasional handoffs for review or input.\u003c/p\u003e\u003cp name=\"395d\" id=\"395d\" class=\"graf graf--p graf-after--p\"\u003eThe conversation lifecycle spec was different. It required genuine synthesis — multiple perspectives contributing to a single artifact, in sequence, each building on what came before.\u003c/p\u003e\u003cp name=\"2cf6\" id=\"2cf6\" class=\"graf graf--p graf-after--p\"\u003eThis is harder than it sounds. Multi-agent systems can easily become multi-agent chaos: unclear ownership, redundant work, gaps where everyone assumed someone else was handling it. The stuck spec was stuck precisely because it sat in the intersection of domains, owned by everyone and therefore no one.\u003c/p\u003e\u003cp name=\"d93e\" id=\"d93e\" class=\"graf graf--p graf-after--p\"\u003eThe pipeline approach solved this by making the sequence explicit. Not “multiple agents collaborate” but “agent A produces X, which goes to agent B who produces Y, which goes to agent C.” Clear inputs. Clear outputs. Clear handoffs.\u003c/p\u003e\u003cp name=\"98ec\" id=\"98ec\" class=\"graf graf--p graf-after--p\"\u003eI think of it as an operating model question, not a technical one. How do you structure work so that specialized perspectives combine into coherent outcomes? The answer isn’t “get a generalist who can do everything.” The answer is “design handoffs that preserve each perspective’s contribution while building toward synthesis.”\u003c/p\u003e\u003ch3 name=\"eb90\" id=\"eb90\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the spec became\u003c/h3\u003e\u003cp name=\"cb74\" id=\"cb74\" class=\"graf graf--p graf-after--h3\"\u003eBy the end of the day, issue #858 had:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"6f79\" id=\"6f79\" class=\"graf graf--li graf-after--p\"\u003eA research foundation covering 14 documents and 22 issues\u003c/li\u003e\u003cli name=\"50e5\" id=\"50e5\" class=\"graf graf--li graf-after--li\"\u003eA compatibility assessment against external requirements\u003c/li\u003e\u003cli name=\"b124\" id=\"b124\" class=\"graf graf--li graf-after--li\"\u003eA UX guidance memo defining user-visible states and interaction patterns\u003c/li\u003e\u003cli name=\"21e7\" id=\"21e7\" class=\"graf graf--li graf-after--li\"\u003eA product structure document with sections, decisions, and anti-flattening checklist\u003c/li\u003e\u003cli name=\"8c18\" id=\"8c18\" class=\"graf graf--li graf-after--li\"\u003eApproval from CXO, PPM, and (after review) the Chief Architect\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"6edb\" id=\"6edb\" class=\"graf graf--p graf-after--li\"\u003eThe Lead Developer could now implement with clarity. Not just “build conversation lifecycle” but specific decisions about state visibility, sidebar behavior, session boundaries, and resumption affordances. The spec answered the questions that would have come up during implementation, before implementation started.\u003c/p\u003e\u003cp name=\"dfe1\" id=\"dfe1\" class=\"graf graf--p graf-after--p\"\u003eWas it a perfect spec? Probably not. Implementation would surface edge cases nobody anticipated. But it was a complete spec — complete enough to build against, complete enough to revise from.\u003c/p\u003e\u003ch3 name=\"ca47\" id=\"ca47\" class=\"graf graf--h3 graf-after--p\"\u003eThe operating model lesson\u003c/h3\u003e\u003cp name=\"9045\" id=\"9045\" class=\"graf graf--p graf-after--h3\"\u003eThe conversation lifecycle spec could have been written by one person who understood all four domains. Such people exist. They’re rare and expensive and bottlenecks.\u003c/p\u003e\u003cp name=\"5357\" id=\"5357\" class=\"graf graf--p graf-after--p\"\u003eThe pipeline approach distributed the work across four agents who each understood one domain. It took the same total effort (maybe less, since each agent worked in their strength) and completed in one day instead of weeks.\u003c/p\u003e\u003cp name=\"e266\" id=\"e266\" class=\"graf graf--p graf-after--p\"\u003eThis is the operating model question that Piper Morgan keeps teaching me: how do you get coherent outcomes from distributed expertise? Not by finding unicorns who have all the expertise. By designing systems where specialized expertise combines.\u003c/p\u003e\u003cp name=\"b99c\" id=\"b99c\" class=\"graf graf--p graf-after--p\"\u003eMulti-agent coordination isn’t just a technical architecture. It’s an answer to a fundamental question about how work gets done. The conversation lifecycle spec was a small example. But the pattern scales: research → direction → domain expertise → structure → implementation. Each step adds value. Each handoff preserves it.\u003c/p\u003e\u003cp name=\"b1d2\" id=\"b1d2\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eFour voices. One spec. Done in a day.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Four Voices, One Spec\",\"excerpt\":\"February 28“Pure harmony!”The conversation lifecycle spec was stuck. It wasn’t blocked by technical complexity or missing requirements. It was blocked by the kind of problem that happens when a specification touches multiple domains at once: nobody owned the whole thing, so nobody finished it.The...\",\"url\":\"/blog/four-voices-one-spec\",\"publishedAt\":\"Mar 17, 2026\",\"publishedAtISO\":\"Tue, 17 Mar 2026 14:23:59 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/168e71571f6b\",\"featuredImage\":\"https://cdn-images-1.medium.com/max/1024/1*zcWnMTMffFS4S6BdgS0MRA.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/four-voices-one-spec-168e71571f6b?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"four-voices-one-spec\",\"chatDate\":\"2/28/2026\",\"workDate\":\"Feb 28, 2026\",\"workDateISO\":\"2026-02-28T00:00:00.000Z\",\"category\":\"building\"},\"content\":{\"title\":\"Four Voices, One Spec\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Four Voices, One Spec | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"Four Voices, One Spec\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"Four Voices, One Spec\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
