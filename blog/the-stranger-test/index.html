ined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T2a4b,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A proud human developer and robot teammate admire their house while holding a clipboard reading “1025 tests — all passing,” as a visiting robot points out obvious flaws like a crooked picture frame and dangling light switch the residents overlooked.\" src=\"https://cdn-images-1.medium.com/max/1024/1*Z0sqNE6h0skLax35OCU-zQ.png\" /\u003e\u003cfigcaption\u003e“Uh, fellas”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eFebruary 21–24\u003c/em\u003e\u003c/p\u003e\u003cp\u003eOne thousand twenty-five tests. All passing. Zero failures. The M0 sprint was complete. The wiring pass was done. Nine integration gaps found and fixed. We had feature coverage, integration coverage, unit coverage. The test suite was comprehensive, rigorous, green.\u003c/p\u003e\u003cp\u003eAnd then someone logged in as a stranger.\u003c/p\u003e\u003ch3\u003eThe fresh account\u003c/h3\u003e\u003cp\u003eAfter a sprint completes, we now do something we call a CXO review — a dedicated session where someone tests the system not as a developer who built it, but as a user who’s encountering it for the first time. The “CXO” in our multi-agent setup handles user experience, but the real value of the role is its the perspective.\u003c/p\u003e\u003cp\u003eFor the M0 review with the CXO I created a fresh alpha account. No conversation history. No established context. No muscle memory from months of development. Just a new user meeting Piper for the first time.\u003c/p\u003e\u003cp\u003eThe results were uncomfortable.\u003c/p\u003e\u003ch3\u003eWhat the stranger found\u003c/h3\u003e\u003cp\u003eThe first issue appeared within minutes. The CXO (through me) asked about their calendar — a basic query that should have been straightforward. The system failed silently. No error, no explanation. Just… nothing happened.\u003c/p\u003e\u003cp\u003eInvestigation revealed the cause: a keychain authentication bug. The calendar adapter was looking for credentials under a hardcoded key name, ignoring the user-scoped pattern we’d established elsewhere. For developers — who had credentials stored under the old key from months of testing — everything worked. For a new user with a fresh account, the credentials didn’t exist where the code was looking.\u003c/p\u003e\u003cp\u003eThe tests passed because the test fixtures used the old pattern. The code was wrong, but it was wrong in a way that matched how the tests were written.\u003c/p\u003e\u003cp\u003eThis wasn’t the only issue the stranger found.\u003c/p\u003e\u003ch3\u003eFive features, two working\u003c/h3\u003e\u003cp\u003eM0 had five features. The CXO tested each one from a fresh-account perspective:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLens tracking\u003c/strong\u003e (follow-up recognition): Passed. The system correctly recognized when the user referenced something from earlier in conversation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNarrative onboarding\u003c/strong\u003e (portfolio introduction): Passed. The “main project” flow worked as designed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSoft invocation\u003c/strong\u003e (proactive offers): Failed. The patterns were too literal. “The team needs alignment” triggered an offer; “I need to get the team aligned” didn’t. Same intent, different phrasing, broken experience.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMulti-intent handling\u003c/strong\u003e: Blocked. Couldn’t test — depended on calendar queries, which were failing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSlot filling\u003c/strong\u003e: Blocked. Same dependency, same failure.\u003c/p\u003e\u003cp\u003eTwo out of five features passed. One failed outright. Two couldn’t even be tested because of infrastructure issues.\u003c/p\u003e\u003cp\u003eOne thousand twenty-five tests. All green. Forty percent of the features actually working for a real user.\u003c/p\u003e\u003ch3\u003eThe gap has a name\u003c/h3\u003e\u003cp\u003eWe’d seen this pattern before. Just days earlier, we’d discovered the Assembly Assumption — the belief that individually correct components compose into a correct system. But this was something different.\u003c/p\u003e\u003cp\u003eThe Assembly Assumption is about integration gaps between features. This was about a different kind of gap: the space between what tests verify and what users experience.\u003c/p\u003e\u003cp\u003eTests verify slices. They check that specific inputs produce specific outputs under specific conditions. They’re written by developers, using developer assumptions, running in developer environments with developer data.\u003c/p\u003e\u003cp\u003eUsers don’t experience slices. They experience journeys. They come in with no context, no history, no understanding of how the system “should” work. They type natural variations of requests. They have fresh accounts with no legacy data. They encounter the system as it actually is, not as it’s supposed to be.\u003c/p\u003e\u003cp\u003eThe test suite was comprehensive. But it was comprehensively testing the developer’s mental model, not the user’s experience.\u003c/p\u003e\u003ch3\u003eThe bugs that developers can’t see\u003c/h3\u003e\u003cp\u003eThe calendar authentication bug was invisible to developers because developers had valid credentials stored under the old key. The test suite didn’t catch it because the test fixtures were set up the same way. The bug could only surface when someone — a stranger — started fresh.\u003c/p\u003e\u003cp\u003eThe soft invocation patterns were too narrow because they were written to match the examples in the specification. “The team needs alignment” was an example phrase, so it was tested. “I need to get the team aligned” wasn’t an example, so it wasn’t tested. A developer writing tests thinks in terms of specification coverage. A user speaks in terms of natural language variation.\u003c/p\u003e\u003cp\u003eThere was another bug the stranger found: when a new user said “yes” in response to an embedded offer, Piper interpreted it as a greeting. The offer system worked correctly — it detected offers, it tracked pending offers, it handled acceptances. But embedded offers (offers mentioned in the middle of a response, not at the end) weren’t being registered as pending. When the user said “yes,” there was nothing to accept. The system fell back to greeting detection.\u003c/p\u003e\u003cp\u003eThis bug had 1,025 tests around it and not a single one caught it. Because every test either (a) used explicit offers that were properly registered, or (b) tested the greeting system in isolation. The gap existed at the seam between two well-tested systems.\u003c/p\u003e\u003ch3\u003eThe stranger’s gift\u003c/h3\u003e\u003cp\u003eThe CXO session was uncomfortable. Watching features fail that we’d spent days building and testing is never pleasant. But the stranger’s perspective revealed something valuable: a systematic blind spot in how we verify quality.\u003c/p\u003e\u003cp\u003eDeveloper testing asks: “Does the code work?”\u003c/p\u003e\u003cp\u003eStranger testing asks: “Does the experience work?”\u003c/p\u003e\u003cp\u003eThese are different questions. The code can work while the experience fails. The tests can pass while the user struggles. The coverage can be comprehensive while the gaps persist.\u003c/p\u003e\u003cp\u003eThe stranger doesn’t know what “should” happen. They only know what does happen. That ignorance is a feature, not a bug. It reveals the assumptions we’ve baked into our verification without realizing it.\u003c/p\u003e\u003ch3\u003eThe fixes\u003c/h3\u003e\u003cp\u003eThe four bugs from the stranger’s session were fixed the same evening they were discovered:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCalendar authentication\u003c/strong\u003e: User-scoped keychain keys, matching the pattern established in the earlier security audit. Three new tests to prevent regression.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSoft invocation patterns\u003c/strong\u003e: Broadened to recognize personal agency phrases (“I need to…”) and adjective forms (“get aligned” vs “get alignment”). Five new tests.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEmbedded offer registration\u003c/strong\u003e: Offers mentioned anywhere in a response now register as pending, not just offers at the end. Three new tests.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue queries\u003c/strong\u003e: Added issue-specific intent patterns to the pre-classifier so “How many open issues?” routes correctly.\u003c/p\u003e\u003cp\u003eEach fix was small. The calendar bug was a single line change. The soft invocation fix was pattern additions. None of them were architecturally complex.\u003c/p\u003e\u003cp\u003eBut none of them would have been found without the stranger.\u003c/p\u003e\u003ch3\u003eMaking strangeness systematic\u003c/h3\u003e\u003cp\u003eAfter the CXO review, we asked the uncomfortable question: why did it take a stranger to find these bugs?\u003c/p\u003e\u003cp\u003eThe answer was process-shaped. Our testing workflow was built around developer convenience. Tests run in environments with established data. Test accounts have history. Test fixtures use patterns that match how developers think about the system.\u003c/p\u003e\u003cp\u003eWe needed a way to make strangeness systematic. To regularly encounter our own system as a stranger would.\u003c/p\u003e\u003cp\u003eThe solution was simple: fresh account testing as a gate requirement. Before any sprint can close, someone has to test the key features from a brand-new account. Not the account that’s been accumulating data for months. Not the fixtures that match developer assumptions. A stranger’s account, encountering the system for the first time.\u003c/p\u003e\u003cp\u003eIt’s not a replacement for the test suite. The 1,025 tests still matter — they catch regressions, verify edge cases, provide confidence during refactoring. But they’re not sufficient. They verify the system we think we built. The stranger verifies the system we actually built.\u003c/p\u003e\u003ch3\u003eThe question that remains\u003c/h3\u003e\u003cp\u003eOne thousand twenty-five tests. All green. Forty percent of features working for a real user.\u003c/p\u003e\u003cp\u003eThat ratio haunts me. Not because the tests were bad — they weren’t. They were thorough, well-designed, covering the cases they were meant to cover. The problem is that “cases they were meant to cover” and “cases users actually encounter” aren’t the same thing.\u003c/p\u003e\u003cp\u003eHow much of any test suite is actually testing user experience, versus testing developer assumptions? How many green dashboards hide systems that strangers would struggle with? How many “comprehensive” coverage numbers are measuring the wrong thing?\u003c/p\u003e\u003cp\u003eI don’t have a universal answer. But I have a practice now: before declaring something complete, let a stranger try it. Watch what happens when someone encounters your system without your context, your history, your understanding of how it “should” work.\u003c/p\u003e\u003cp\u003eThe stranger will find things you can’t see. That’s not a failure of your testing. It’s a feature of their perspective.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Tokens That Vanished — a systematic audit reveals a bug that had been hiding in plain sight for months, silently breaking OAuth authentication.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhen did a fresh perspective last show you something your expertise was hiding?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=e39247492342\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-stranger-test-e39247492342\"\u003eThe Stranger Test\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T383a,"])</script><script>self.__next_f.push([1,"\u003csection name=\"6c18\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"d8c4\" id=\"d8c4\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Stranger Test\u003c/h3\u003e\u003cfigure name=\"d2ea\" id=\"d2ea\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*Z0sqNE6h0skLax35OCU-zQ.png\" data-width=\"1536\" data-height=\"1024\" alt=\"A proud human developer and robot teammate admire their house while holding a clipboard reading “1025 tests — all passing,” as a visiting robot points out obvious flaws like a crooked picture frame and dangling light switch the residents overlooked.\" src=\"https://cdn-images-1.medium.com/max/800/1*Z0sqNE6h0skLax35OCU-zQ.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Uh, fellas”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"bf7d\" id=\"bf7d\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eFebruary 21–24\u003c/em\u003e\u003c/p\u003e\u003cp name=\"9e75\" id=\"9e75\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eO\u003c/span\u003ene thousand twenty-five tests. All passing. Zero failures. The M0 sprint was complete. The wiring pass was done. Nine integration gaps found and fixed. We had feature coverage, integration coverage, unit coverage. The test suite was comprehensive, rigorous, green.\u003c/p\u003e\u003cp name=\"4604\" id=\"4604\" class=\"graf graf--p graf-after--p\"\u003eAnd then someone logged in as a stranger.\u003c/p\u003e\u003ch3 name=\"6f2f\" id=\"6f2f\" class=\"graf graf--h3 graf-after--p\"\u003eThe fresh account\u003c/h3\u003e\u003cp name=\"a21a\" id=\"a21a\" class=\"graf graf--p graf-after--h3\"\u003eAfter a sprint completes, we now do something we call a CXO review — a dedicated session where someone tests the system not as a developer who built it, but as a user who’s encountering it for the first time. The “CXO” in our multi-agent setup handles user experience, but the real value of the role is its the perspective.\u003c/p\u003e\u003cp name=\"a093\" id=\"a093\" class=\"graf graf--p graf-after--p\"\u003eFor the M0 review with the CXO I created a fresh alpha account. No conversation history. No established context. No muscle memory from months of development. Just a new user meeting Piper for the first time.\u003c/p\u003e\u003cp name=\"fabd\" id=\"fabd\" class=\"graf graf--p graf-after--p\"\u003eThe results were uncomfortable.\u003c/p\u003e\u003ch3 name=\"f934\" id=\"f934\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the stranger found\u003c/h3\u003e\u003cp name=\"edcf\" id=\"edcf\" class=\"graf graf--p graf-after--h3\"\u003eThe first issue appeared within minutes. The CXO (through me) asked about their calendar — a basic query that should have been straightforward. The system failed silently. No error, no explanation. Just… nothing happened.\u003c/p\u003e\u003cp name=\"72c4\" id=\"72c4\" class=\"graf graf--p graf-after--p\"\u003eInvestigation revealed the cause: a keychain authentication bug. The calendar adapter was looking for credentials under a hardcoded key name, ignoring the user-scoped pattern we’d established elsewhere. For developers — who had credentials stored under the old key from months of testing — everything worked. For a new user with a fresh account, the credentials didn’t exist where the code was looking.\u003c/p\u003e\u003cp name=\"52c9\" id=\"52c9\" class=\"graf graf--p graf-after--p\"\u003eThe tests passed because the test fixtures used the old pattern. The code was wrong, but it was wrong in a way that matched how the tests were written.\u003c/p\u003e\u003cp name=\"1637\" id=\"1637\" class=\"graf graf--p graf-after--p\"\u003eThis wasn’t the only issue the stranger found.\u003c/p\u003e\u003ch3 name=\"72b4\" id=\"72b4\" class=\"graf graf--h3 graf-after--p\"\u003eFive features, two working\u003c/h3\u003e\u003cp name=\"04ff\" id=\"04ff\" class=\"graf graf--p graf-after--h3\"\u003eM0 had five features. The CXO tested each one from a fresh-account perspective:\u003c/p\u003e\u003cp name=\"17fc\" id=\"17fc\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLens tracking\u003c/strong\u003e (follow-up recognition): Passed. The system correctly recognized when the user referenced something from earlier in conversation.\u003c/p\u003e\u003cp name=\"9c75\" id=\"9c75\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNarrative onboarding\u003c/strong\u003e (portfolio introduction): Passed. The “main project” flow worked as designed.\u003c/p\u003e\u003cp name=\"ddfe\" id=\"ddfe\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSoft invocation\u003c/strong\u003e (proactive offers): Failed. The patterns were too literal. “The team needs alignment” triggered an offer; “I need to get the team aligned” didn’t. Same intent, different phrasing, broken experience.\u003c/p\u003e\u003cp name=\"71ce\" id=\"71ce\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMulti-intent handling\u003c/strong\u003e: Blocked. Couldn’t test — depended on calendar queries, which were failing.\u003c/p\u003e\u003cp name=\"8809\" id=\"8809\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSlot filling\u003c/strong\u003e: Blocked. Same dependency, same failure.\u003c/p\u003e\u003cp name=\"5030\" id=\"5030\" class=\"graf graf--p graf-after--p\"\u003eTwo out of five features passed. One failed outright. Two couldn’t even be tested because of infrastructure issues.\u003c/p\u003e\u003cp name=\"aca8\" id=\"aca8\" class=\"graf graf--p graf-after--p\"\u003eOne thousand twenty-five tests. All green. Forty percent of the features actually working for a real user.\u003c/p\u003e\u003ch3 name=\"c161\" id=\"c161\" class=\"graf graf--h3 graf-after--p\"\u003eThe gap has a name\u003c/h3\u003e\u003cp name=\"db4b\" id=\"db4b\" class=\"graf graf--p graf-after--h3\"\u003eWe’d seen this pattern before. Just days earlier, we’d discovered the Assembly Assumption — the belief that individually correct components compose into a correct system. But this was something different.\u003c/p\u003e\u003cp name=\"913c\" id=\"913c\" class=\"graf graf--p graf-after--p\"\u003eThe Assembly Assumption is about integration gaps between features. This was about a different kind of gap: the space between what tests verify and what users experience.\u003c/p\u003e\u003cp name=\"9930\" id=\"9930\" class=\"graf graf--p graf-after--p\"\u003eTests verify slices. They check that specific inputs produce specific outputs under specific conditions. They’re written by developers, using developer assumptions, running in developer environments with developer data.\u003c/p\u003e\u003cp name=\"69e2\" id=\"69e2\" class=\"graf graf--p graf-after--p\"\u003eUsers don’t experience slices. They experience journeys. They come in with no context, no history, no understanding of how the system “should” work. They type natural variations of requests. They have fresh accounts with no legacy data. They encounter the system as it actually is, not as it’s supposed to be.\u003c/p\u003e\u003cp name=\"843f\" id=\"843f\" class=\"graf graf--p graf-after--p\"\u003eThe test suite was comprehensive. But it was comprehensively testing the developer’s mental model, not the user’s experience.\u003c/p\u003e\u003ch3 name=\"2b0f\" id=\"2b0f\" class=\"graf graf--h3 graf-after--p\"\u003eThe bugs that developers can’t see\u003c/h3\u003e\u003cp name=\"d6b5\" id=\"d6b5\" class=\"graf graf--p graf-after--h3\"\u003eThe calendar authentication bug was invisible to developers because developers had valid credentials stored under the old key. The test suite didn’t catch it because the test fixtures were set up the same way. The bug could only surface when someone — a stranger — started fresh.\u003c/p\u003e\u003cp name=\"a42b\" id=\"a42b\" class=\"graf graf--p graf-after--p\"\u003eThe soft invocation patterns were too narrow because they were written to match the examples in the specification. “The team needs alignment” was an example phrase, so it was tested. “I need to get the team aligned” wasn’t an example, so it wasn’t tested. A developer writing tests thinks in terms of specification coverage. A user speaks in terms of natural language variation.\u003c/p\u003e\u003cp name=\"e1b1\" id=\"e1b1\" class=\"graf graf--p graf-after--p\"\u003eThere was another bug the stranger found: when a new user said “yes” in response to an embedded offer, Piper interpreted it as a greeting. The offer system worked correctly — it detected offers, it tracked pending offers, it handled acceptances. But embedded offers (offers mentioned in the middle of a response, not at the end) weren’t being registered as pending. When the user said “yes,” there was nothing to accept. The system fell back to greeting detection.\u003c/p\u003e\u003cp name=\"4772\" id=\"4772\" class=\"graf graf--p graf-after--p\"\u003eThis bug had 1,025 tests around it and not a single one caught it. Because every test either (a) used explicit offers that were properly registered, or (b) tested the greeting system in isolation. The gap existed at the seam between two well-tested systems.\u003c/p\u003e\u003ch3 name=\"c7de\" id=\"c7de\" class=\"graf graf--h3 graf-after--p\"\u003eThe stranger’s gift\u003c/h3\u003e\u003cp name=\"351f\" id=\"351f\" class=\"graf graf--p graf-after--h3\"\u003eThe CXO session was uncomfortable. Watching features fail that we’d spent days building and testing is never pleasant. But the stranger’s perspective revealed something valuable: a systematic blind spot in how we verify quality.\u003c/p\u003e\u003cp name=\"d906\" id=\"d906\" class=\"graf graf--p graf-after--p\"\u003eDeveloper testing asks: “Does the code work?”\u003c/p\u003e\u003cp name=\"fc1c\" id=\"fc1c\" class=\"graf graf--p graf-after--p\"\u003eStranger testing asks: “Does the experience work?”\u003c/p\u003e\u003cp name=\"0e22\" id=\"0e22\" class=\"graf graf--p graf-after--p\"\u003eThese are different questions. The code can work while the experience fails. The tests can pass while the user struggles. The coverage can be comprehensive while the gaps persist.\u003c/p\u003e\u003cp name=\"f3b1\" id=\"f3b1\" class=\"graf graf--p graf-after--p\"\u003eThe stranger doesn’t know what “should” happen. They only know what does happen. That ignorance is a feature, not a bug. It reveals the assumptions we’ve baked into our verification without realizing it.\u003c/p\u003e\u003ch3 name=\"5da8\" id=\"5da8\" class=\"graf graf--h3 graf-after--p\"\u003eThe fixes\u003c/h3\u003e\u003cp name=\"0105\" id=\"0105\" class=\"graf graf--p graf-after--h3\"\u003eThe four bugs from the stranger’s session were fixed the same evening they were discovered:\u003c/p\u003e\u003cp name=\"65a9\" id=\"65a9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCalendar authentication\u003c/strong\u003e: User-scoped keychain keys, matching the pattern established in the earlier security audit. Three new tests to prevent regression.\u003c/p\u003e\u003cp name=\"bf8a\" id=\"bf8a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSoft invocation patterns\u003c/strong\u003e: Broadened to recognize personal agency phrases (“I need to…”) and adjective forms (“get aligned” vs “get alignment”). Five new tests.\u003c/p\u003e\u003cp name=\"732d\" id=\"732d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEmbedded offer registration\u003c/strong\u003e: Offers mentioned anywhere in a response now register as pending, not just offers at the end. Three new tests.\u003c/p\u003e\u003cp name=\"2cc3\" id=\"2cc3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue queries\u003c/strong\u003e: Added issue-specific intent patterns to the pre-classifier so “How many open issues?” routes correctly.\u003c/p\u003e\u003cp name=\"0c0b\" id=\"0c0b\" class=\"graf graf--p graf-after--p\"\u003eEach fix was small. The calendar bug was a single line change. The soft invocation fix was pattern additions. None of them were architecturally complex.\u003c/p\u003e\u003cp name=\"f1ba\" id=\"f1ba\" class=\"graf graf--p graf-after--p\"\u003eBut none of them would have been found without the stranger.\u003c/p\u003e\u003ch3 name=\"522f\" id=\"522f\" class=\"graf graf--h3 graf-after--p\"\u003eMaking strangeness systematic\u003c/h3\u003e\u003cp name=\"26c4\" id=\"26c4\" class=\"graf graf--p graf-after--h3\"\u003eAfter the CXO review, we asked the uncomfortable question: why did it take a stranger to find these bugs?\u003c/p\u003e\u003cp name=\"d896\" id=\"d896\" class=\"graf graf--p graf-after--p\"\u003eThe answer was process-shaped. Our testing workflow was built around developer convenience. Tests run in environments with established data. Test accounts have history. Test fixtures use patterns that match how developers think about the system.\u003c/p\u003e\u003cp name=\"2d82\" id=\"2d82\" class=\"graf graf--p graf-after--p\"\u003eWe needed a way to make strangeness systematic. To regularly encounter our own system as a stranger would.\u003c/p\u003e\u003cp name=\"0dac\" id=\"0dac\" class=\"graf graf--p graf-after--p\"\u003eThe solution was simple: fresh account testing as a gate requirement. Before any sprint can close, someone has to test the key features from a brand-new account. Not the account that’s been accumulating data for months. Not the fixtures that match developer assumptions. A stranger’s account, encountering the system for the first time.\u003c/p\u003e\u003cp name=\"44dc\" id=\"44dc\" class=\"graf graf--p graf-after--p\"\u003eIt’s not a replacement for the test suite. The 1,025 tests still matter — they catch regressions, verify edge cases, provide confidence during refactoring. But they’re not sufficient. They verify the system we think we built. The stranger verifies the system we actually built.\u003c/p\u003e\u003ch3 name=\"279e\" id=\"279e\" class=\"graf graf--h3 graf-after--p\"\u003eThe question that remains\u003c/h3\u003e\u003cp name=\"83ff\" id=\"83ff\" class=\"graf graf--p graf-after--h3\"\u003eOne thousand twenty-five tests. All green. Forty percent of features working for a real user.\u003c/p\u003e\u003cp name=\"f8cc\" id=\"f8cc\" class=\"graf graf--p graf-after--p\"\u003eThat ratio haunts me. Not because the tests were bad — they weren’t. They were thorough, well-designed, covering the cases they were meant to cover. The problem is that “cases they were meant to cover” and “cases users actually encounter” aren’t the same thing.\u003c/p\u003e\u003cp name=\"2389\" id=\"2389\" class=\"graf graf--p graf-after--p\"\u003eHow much of any test suite is actually testing user experience, versus testing developer assumptions? How many green dashboards hide systems that strangers would struggle with? How many “comprehensive” coverage numbers are measuring the wrong thing?\u003c/p\u003e\u003cp name=\"e4f2\" id=\"e4f2\" class=\"graf graf--p graf-after--p\"\u003eI don’t have a universal answer. But I have a practice now: before declaring something complete, let a stranger try it. Watch what happens when someone encounters your system without your context, your history, your understanding of how it “should” work.\u003c/p\u003e\u003cp name=\"f044\" id=\"f044\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe stranger will find things you can’t see. That’s not a failure of your testing. It’s a feature of their perspective.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Stranger Test\",\"excerpt\":\"“Uh, fellas”February 21–24One thousand twenty-five tests. All passing. Zero failures. The M0 sprint was complete. The wiring pass was done. Nine integration gaps found and fixed. We had feature coverage, integration coverage, unit coverage. The test suite was comprehensive, rigorous, green.And th...\",\"url\":\"/blog/the-stranger-test\",\"publishedAt\":\"Mar 5, 2026\",\"publishedAtISO\":\"Thu, 05 Mar 2026 15:43:44 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/e39247492342\",\"featuredImage\":\"/assets/blog-images/e39247492342-featured.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-stranger-test-e39247492342?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-stranger-test\",\"workDate\":\"Mar 5, 2026\",\"workDateISO\":\"2026-03-05T00:00:00.000Z\",\"category\":\"insight\"},\"content\":{\"title\":\"The Stranger Test\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Stranger Test | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Stranger Test\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Stranger Test\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
