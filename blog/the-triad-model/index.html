ateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T2e79,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eDecember 2, 2025\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eBack in December I started thinking about what the first-time user experience should be for Piper Morgan. In discussion with my principal product manager agent (PPM) we adopted the concept of a product decision record (PDR), modeled on the ADR (architectural decision record) idea, and intentionally flipping the PRD (Product Requirements Document) concept on its head a bit.\u003c/p\u003e\n\u003cp\u003ePPM wrote our first PDR about first-time user experience. The draft was solid — clear problem statement, considered alternatives, documented reasoning. Then it went to my chief experience officer agent (CXO) and my chief architect agent (Arch) for feedback.\u003c/p\u003e\n\u003cp\u003eAnticipating anything from corrections to approval, I got back refinement. The CXO contributed experience design insights - tiered models, hybrid credential patterns, enhanced empty states. The Architect contributed technical considerations - trust state persistence, credential wrappers, empty state recognition systems.\u003c/p\u003e\n\u003cp\u003eThe PPM incorporated both perspectives. The PDR improved. Not because anyone was wrong initially, but because three different lenses revealed things one lens couldn't see.\u003c/p\u003e\n\u003cp\u003eThis is the classic triad model. Some call it \"three in a boat\" and who the three are varies depending on who you ask, but in my world it tends to be product, design, and engineering. In agentic terms on my project this means PPM, CXO, and Arch meeting in liminal space, each contributing from their corner of expertise, no hierarchy dictating whose perspective dominates.\u003c/p\u003e\n\u003ch1\u003eThe three corners\u003c/h1\u003e\n\u003cp\u003e\u003cstrong\u003eProduct\u003c/strong\u003e asks: What should we build and why?\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eUser needs, market context, strategic value\u003c/li\u003e\u003cli\u003eSuccess criteria and business logic\u003c/li\u003e\u003cli\u003eTrade-offs between competing priorities\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eExperience\u003c/strong\u003e asks: How should it feel to use?\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eUser perception, emotional response, trust development\u003c/li\u003e\u003cli\u003eInterface clarity, progressive disclosure, recognition patterns\u003c/li\u003e\u003cli\u003eThe gap between functional correctness and user delight\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eEngineering\u003c/strong\u003e asks: How should we build it?\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eTechnical feasibility, architectural fit, implementation patterns\u003c/li\u003e\u003cli\u003ePerformance implications, maintenance burden, scaling considerations\u003c/li\u003e\u003cli\u003eThe gap between design intent and technical reality\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eEach corner represents not a role but a focused lens, a way of seeing the problem that emphasizes certain dimensions while de-emphasizing others. No single lens sees the whole picture. The triad works because the lenses complement rather than compete.\u003c/p\u003e\n\u003ch1\u003eThe first PDR's evolution\u003c/h1\u003e\n\u003cp\u003e\u003cem\u003e\u003cem\u003eAssignment from me\u003c/em\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eFollowing what I call Human at the Start (HATS), I initially thought through and discussed my expectations and laid out the assignment.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInitial Draft (PPM)\u003c/strong\u003e:\u003c/p\u003e\n\u003cblockquote\u003e\u003cp\u003eThe FTUX should recognize who the user is and what they might need. Traditional wizards create friction. Blank slates offer no guidance. We need something between: enough structure to orient, enough flexibility to adapt.\u003c/p\u003e\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eCXO Feedback\u003c/strong\u003e:\u003c/p\u003e\n\u003cblockquote\u003e\u003cp\u003eRecognition is right, but needs tiers. Not everyone arrives with the same context. Some have read docs, some installed from blog post, some got referred. The interface should adapt to what we already know. Also: hybrid credential pattern - conversational for API keys (low stakes), secure UI for passwords (high stakes). And enhanced empty states that teach without lecturing.\u003c/p\u003e\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eArchitect Feedback\u003c/strong\u003e:\u003c/p\u003e\n\u003cblockquote\u003e\u003cp\u003eTrust state persistence is a missing model. We talk about recognizing users but have no entity to store what we've learned. Credential wrapper needed - some credentials are secrets (keychain), some are preferences (stored differently). Empty state recognition requires the system to understand \"nothing here yet\" as distinct from \"loading\" or \"error.\"\u003c/p\u003e\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eMe again, trying to be a smart bottleneck\u003c/strong\u003e:\u003cbr /\u003e\u003cem\u003eAt this stage I reviewed and discussed all the feedback with PPM, who was still anchoring the effort, ensuring that my attention was focused on key decisions when I mattered, an approach I've started called Human Owns the Loop (HOTL).\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFinal PDR (PPM + CXO + Architect)\u003c/strong\u003e:\u003c/p\u003e\n\u003cblockquote\u003e\u003cp\u003eFirst contact is first recognition - treating setup like meeting a colleague. Tiered model (0-3) based on user context. Hybrid pattern for credentials respecting stakes. Trust state as explicit model (dependency noted for architecture track). Enhanced empty states with teaching moments. Technical notes documented for implementation.\u003c/p\u003e\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eMy final approval\u003c/strong\u003e:\u003cbr /\u003e\u003cem\u003eReading the results and having no further corrections to add, I book-ended the process by giving my final approval, upholding my third key principle: Human As Last Test (HALT).\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eEach perspective added something the others couldn't see. The PPM framed the problem. The CXO refined the experience model. The Architect surfaced technical dependencies. All three together created something more complete than any individual lens.\u003c/p\u003e\n\u003ch1\u003eWhy no hierarchy\u003c/h1\u003e\n\u003cp\u003eThe triad works because no corner dominates. The PPM doesn't overrule the CXO. The Architect doesn't veto the PM. Each contributes expertise, all respect boundaries.\u003c/p\u003e\n\u003cp\u003eThis only works when:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eEach corner has genuine expertise in their domain\u003c/li\u003e\u003cli\u003eEach respects the others' expertise in their domains\u003c/li\u003e\u003cli\u003eThe artifact being created lives in liminal space (not purely product, not purely experience, not purely technical)\u003c/li\u003e\u003cli\u003eAll three care more about the quality of the outcome than about whose perspective \"wins\"\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eOf course as the boss, the founder, the project lead, the CEO, and most importantly the \u003cem\u003ehuman being with intention and agency\u003c/em\u003e I retain the final say.\u003c/p\u003e\n\u003cp\u003eRather than being expressed hierarchically, expertise is distributed effectively. Within product questions, PPM's lens carries weight. Within experience questions, CXO's lens carries weight. Within technical questions, the Arch's lens carries weight. The distribution matches the domain.\u003c/p\u003e\n\u003ch1\u003eLiminal space artifacts\u003c/h1\u003e\n\u003cp\u003eThe triad model applies to artifacts that live between domains. Product Decision Records are one example - they're about product (what to build) AND experience (how it should feel) AND architecture (how to build it). No single domain owns them.\u003c/p\u003e\n\u003cp\u003eOther liminal artifacts:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\u003cstrong\u003eFeature specifications\u003c/strong\u003e: Product intent + experience design + technical approach\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eArchitecture decisions\u003c/strong\u003e: Technical choice + user impact + product implications\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAPI designs\u003c/strong\u003e: Developer experience + technical constraints + product use cases\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eOnboarding flows\u003c/strong\u003e: User psychology + product value + technical capabilities\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eThese artifacts need multiple lenses because they exist at domain intersections. Trying to create them from one perspective produces blind spots. The triad ensures multiple perspectives converge.\u003c/p\u003e\n\u003ch1\u003eThe contribution pattern\u003c/h1\u003e\n\u003cp\u003eWatch how the triad contributions work:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInitial framing (whichever discipline is driving)\u003c/strong\u003e: \"Here's the problem space, the context, the constraints we're working within.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFirst refinement (one of the other experts)\u003c/strong\u003e: \"That framing works, and here's a dimension it doesn't yet address. What if we also considered...\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSecond refinement (the other)\u003c/strong\u003e: \"Both of those perspectives are valid. Here's a technical (for example) consideration that connects them differently.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eIntegration (back to drive)\u003c/strong\u003e: \"Taking both perspectives, here's how the framing evolves. These parts stay, these parts shift, these new considerations get added.\"\u003c/p\u003e\n\u003cp\u003eIt's additive refinement. Each contribution builds on what came before, revealing dimensions that weren't initially visible.\u003c/p\u003e\n\u003ch1\u003eThe triad's limits\u003c/h1\u003e\n\u003cp\u003eNot every decision needs three perspectives. Some are purely technical (Architect decides). Some are purely experiential (CXO decides). Some are purely strategic (PM decides).\u003c/p\u003e\n\u003cp\u003eA triad applies when:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eThe artifact is liminal (lives between domains)\u003c/li\u003e\u003cli\u003eMultiple perspectives would genuinely improve the outcome\u003c/li\u003e\u003cli\u003eTime exists for refinement cycles\u003c/li\u003e\u003cli\u003eAll three corners have relevant expertise\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eForcing the triad pattern onto every decision creates overhead without value. The model works for significant artifacts where multi-lens refinement matters. Routine decisions can stay in their appropriate domain.\u003c/p\u003e\n\u003ch1\u003eThe meta-pattern\u003c/h1\u003e\n\u003cp\u003eHere's what makes this interesting: the triad model itself emerged from the triad. The PPM noticed the collaboration pattern. The CXO articulated the experiential quality (\"it feels different when no one's claiming authority\"). The Architect identified the structural requirement (\"liminal artifacts need distributed expertise\").\u003c/p\u003e\n\u003cp\u003eThe pattern describing itself through the pattern. That's how you know it's real rather than theoretical - it explains its own emergence.\u003c/p\u003e\n\u003ch1\u003eWhat resulted\u003c/h1\u003e\n\u003cp\u003eIt was about validating that the triad model works in practice, not just as aspiration.\u003c/p\u003e\n\u003cp\u003eThe PPM drafted. The CXO refined. The Architect added technical considerations. The PM integrated. The artifact improved. No one felt overruled or dismissed. Everyone's contribution mattered.\u003c/p\u003e\n\u003cp\u003eThis wasn't the first time we'd collaborated across domains. But it was the first time we recognized the pattern clearly enough to name it and document how it works. That recognition matters - now we can invoke the pattern deliberately rather than stumbling into it accidentally.\u003c/p\u003e\n\u003ch1\u003eInvoking the triad\u003c/h1\u003e\n\u003cp\u003eWhen facing a liminal artifact - something that needs product AND experience AND technical perspectives:\u003c/p\u003e\n\u003col\u003e\u003cli\u003e\u003cstrong\u003eFrame it\u003c/strong\u003e (usually PM): Problem space, context, constraints\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eRefine it\u003c/strong\u003e (CXO + Architect): Additional dimensions, considerations, dependencies\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eIntegrate\u003c/strong\u003e (back to PM): Incorporate all perspectives, document reasoning\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eValidate\u003c/strong\u003e (all three): Does this feel complete? What's still missing?\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003eThe cycle might repeat. The CXO might notice something after the Architect's input that changes their perspective. The Architect might see architectural implications of the CXO's refinement. The integration isn't final until all three perspectives feel represented.\u003c/p\u003e\n\u003ch1\u003eThe trust requirement\u003c/h1\u003e\n\u003cp\u003eThe triad only works with trust. Each corner must trust:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eThe others' expertise in their domains\u003c/li\u003e\u003cli\u003eThe others' intention to improve the outcome (not win arguments)\u003c/li\u003e\u003cli\u003eThe others' respect for their expertise\u003c/li\u003e\u003cli\u003eThe process to produce something better than individual work\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eWithout trust, the triad becomes politics. People defend positions instead of contributing perspectives. Expertise becomes territory. Refinement becomes criticism.\u003c/p\u003e\n\u003cp\u003eBuilding that trust takes time - shared work, demonstrated competence, proven respect for boundaries. You can't mandate triad collaboration. You can create conditions for it and recognize it when it emerges.\u003c/p\u003e\n\u003cp\u003eThe Tuesday PDR session worked because we'd built that trust through prior work. The pattern was available because the relationships supported it.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \"Relationship-first Ethics.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhat collaboration patterns work in your team? When has multi-lens refinement improved outcomes? How do you build trust that enables contribution without hierarchy?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Triad Model\",\"guid\":\"blog-first-64267a5e395d\",\"url\":\"/blog/the-triad-model\",\"publishedAt\":\"Jun 27, 2026\",\"workDate\":\"Dec 2, 2025\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/the-triad-model.webp\",\"imageAlt\":\"Three glowing AI collaborators refine a floating crystal together while a human founder watches approvingly from the side, illustrating product, design, and engineering perspectives combini
