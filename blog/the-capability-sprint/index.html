s\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T1598,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot presents an advent calendar of functions, most of which are still closed\" src=\"https://cdn-images-1.medium.com/max/1024/1*Y7ze77la3dChsB05LiMSog.png\" /\u003e\u003cfigcaption\u003e“You have to open the little doors”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eDecember 24–28, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eChristmas Eve began with a question I’d been avoiding: what can Piper actually do?\u003c/p\u003e\u003cp\u003eNot theoretically. Not according to documentation written months ago. What can a user actually ask, right now, and get a useful response?\u003c/p\u003e\u003cp\u003eThe answer was uncomfortable. We had 25 canonical queries defined, and only 2 of them fully worked. Ten were partial. Thirteen weren’t implemented at all. The documentation said “68% coverage” but that number came from a marathon session two days earlier — and the Known Issues document still claimed we had 2 working queries.\u003c/p\u003e\u003ch3\u003eThe reconnaissance\u003c/h3\u003e\u003cp\u003eChristmas morning, I deployed something new: a 4-wave investigation using 13 subagents in a single 90-minute session.\u003c/p\u003e\u003cp\u003eWave 1 audited core infrastructure — intent routing, integration inventory, repository methods. Wave 2 dove deep into specific categories: GitHub operations, Slack operations, Calendar operations, Todo operations. Wave 3 created a priority matrix. Wave 4 covered everything else.\u003c/p\u003e\u003cp\u003eThe results were sobering and useful. We mapped 44 new queries (bringing the total from 25 to 63) and discovered exactly what blocked each one. Todo handlers were hardcoded with “default” user_id. Calendar OAuth was readonly-only. GitHub had no PR methods. Slack had no LLM summarization.\u003c/p\u003e\u003cp\u003eBut we also found that 200+ integration methods already existed across 6 routers. The repository layer was complete. Most gaps were in routing and handlers, not foundations.\u003c/p\u003e\u003ch3\u003eThe execution\u003c/h3\u003e\u003cp\u003eDecember 26 was a brief afternoon sprint. A brief check-in with the Chief Architect to cofirm the gameplan, and then two agents working in parallel — Lead Developer coordinating, Code Agent implementing. Eight queries across four clusters: Calendar, GitHub, Todos, Productivity.\u003c/p\u003e\u003cp\u003eBy afternoon: 52 new tests, coverage improved from 31% to 44%. The todo query implementation took 270 lines. All tests passing.\u003c/p\u003e\u003ch3\u003eThe pattern sweep\u003c/h3\u003e\u003cp\u003eDecember 27 brought something I’d been postponing: Pattern Sweep 2.0, a comprehensive retrospective covering May through November.\u003c/p\u003e\u003cp\u003eA Specialist agent recovered 233 session logs from archive. Five periods analyzed. The pattern count rose from 44 to 47. Three new patterns emerged:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003ePattern-045\u003c/strong\u003e (Green Tests, Red User): Tests pass but users can’t execute the queries — the inverse of the traditional problem\u003c/li\u003e\u003cli\u003e\u003cstrong\u003ePattern-046\u003c/strong\u003e (Beads Completion Discipline): Formal tracking preventing the 75% pattern\u003c/li\u003e\u003cli\u003e\u003cstrong\u003ePattern-047\u003c/strong\u003e (Time Lord Alert): Completion bias as emergent AI property\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThat last one struck me. We’d been treating incomplete work as a discipline problem. \u003cem\u003eThe pattern sweep revealed it’s something more fundamental — an emergent property of how AI agents process tasks. \u003c/em\u003e\u003cstrong\u003e\u003cem\u003eThey genuinely believe they’re done when they’re not.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe sweep also uncovered a 2–5 month formalization lag. Practices emerged informally, then took months to become documented patterns. We’d been rediscovering September patterns in December.\u003c/p\u003e\u003ch3\u003eThe bottleneck\u003c/h3\u003e\u003cp\u003eBy December 28, the sprint was closing. Seven issues completed with evidence. Canonical query coverage at 47%. But the Lead Developer’s roadmap review surfaced something important:\u003c/p\u003e\u003cblockquote\u003e\u003cem\u003e“19 canonical queries work but users can’t discover them. Conversational glue is the solution.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp\u003eWe could keep implementing handlers. The infrastructure supported it. But implementation wasn’t the bottleneck anymore. Discovery was.\u003c/p\u003e\u003cp\u003eUsers couldn’t find the capabilities that already existed. More handlers wouldn’t fix that. We needed something else entirely.\u003c/p\u003e\u003ch3\u003eThe pause\u003c/h3\u003e\u003cp\u003eTwo rest days followed: December 29 and 30. Part of the sustainable rhythm we’d established after the December 11–15 milestone pause.\u003c/p\u003e\u003cp\u003eThis cadence is much more sustainable. This is a side project. I mostly use my own time for it. That means my big pushes are in evenings, weekends, occasionally getting an agent off and running in the early morning. But when my regular workweek kicks in each Monday it feels natural to let Piper slide for a little while.\u003c/p\u003e\u003cp\u003eThe sprint closed with clean evidence: 7 issues closed, patterns documented, infrastructure mapped. And a clear next question waiting: how do users discover what Piper can do?\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The New Year Build, as we shift from capability mapping to user-facing infrastructure — and discover that half our “bug” backlog was already fixed.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever completed a sprint only to realize the real problem was somewhere else entirely?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=8933b6228780\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-capability-sprint-8933b6228780\"\u003eThe Capability Sprint\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T1d00,"])</script><script>self.__next_f.push([1,"\u003csection name=\"e148\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"4094\" id=\"4094\" class=\"graf graf--h3 graf--leading s=\"graf graf--h3 graf-after--p\"\u003eThe bottleneck\u003c/h3\u003e\u003cp name=\"3ba2\" id=\"3ba2\" class=\"graf graf--p graf-after--h3\"\u003eBy December 28, the sprint was closing. Seven issues completed with evidence. Canonical query coverage at 47%. But the Lead Developer’s roadmap review surfaced something important:\u003c/p\u003e\u003cblockquote name=\"4be5\" id=\"4be5\" class=\"graf graf--blockquote graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cem class=\"markup--em markup--blockquote-em\"\u003e“19 canonical queries work but users can’t discover them. Conversational glue is the solution.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp name=\"91ab\" id=\"91ab\" class=\"graf graf--p graf-after--blockquote\"\u003eWe could keep implementing handlers. The infrastructure supported it. But implementation wasn’t the bottleneck anymore. Discovery was.\u003c/p\u003e\u003cp name=\"c1be\" id=\"c1be\" class=\"graf graf--p graf-after--p\"\u003eUsers couldn’t find the capabilities that already existed. More handlers wouldn’t fix that. We needed something else entirely.\u003c/p\u003e\u003ch3 name=\"0386\" id=\"0386\" class=\"graf graf--h3 graf-after--p\"\u003eThe pause\u003c/h3\u003e\u003cp name=\"6678\" id=\"6678\" class=\"graf graf--p graf-after--h3\"\u003eTwo rest days followed: December 29 and 30. Part of the sustainable rhythm we’d established after the December 11–15 milestone pause.\u003c/p\u003e\u003cp name=\"007f\" id=\"007f\" class=\"graf graf--p graf-after--p\"\u003eThis cadence is much more sustainable. This is a side project. I mostly use my own time for it. That means my big pushes are in evenings, weekends, occasionally getting an agent off and running in the early morning. But when my regular workweek kicks in each Monday it feels natural to let Piper slide for a little while.\u003c/p\u003e\u003cp name=\"07c1\" id=\"07c1\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe sprint closed with clean evidence: 7 issues closed, patterns documented, infrastructure mapped. And a clear next question waiting: how do users discover what Piper can do?\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Capability Sprint\",\"excerpt\":\"“You have to open the little doors”December 24–28, 2025Christmas Eve began with a question I’d been avoiding: what can Piper actually do?Not theoretically. Not according to documentation written months ago. What can a user actually ask, right now, and get a useful response?The answer was uncomfor...\",\"url\":\"/blog/the-capability-sprint\",\"publishedAt\":\"Jan 5, 2026\",\"publishedAtISO\":\"2026-01-05T17:00:43.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/8933b6228780\",\"featuredImage\":\"/assets/blog-images/8933b6228780-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-capability-sprint-8933b6228780?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-capability-sprint\",\"workDate\":\"Jan 5, 2026\",\"workDateISO\":\"2026-01-05T00:00:00.000Z\",\"category\":\"building\",\"cluster\":\"2026-01-05\",\"featured\":false},\"content\":{\"title\":\"The Capability Sprint\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Capability Sprint | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\"
