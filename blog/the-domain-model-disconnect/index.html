,\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T1c85,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A builder team (person and robot) ralize the front of the house is done but the back is missing.\" src=\"https://cdn-images-1.medium.com/max/1024/1*M2YwMevHjc48AxhXBPGYVg.png\" /\u003e\u003cfigcaption\u003e“I thought we were done?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eJanuary 12, 2026\u003c/em\u003e\u003c/p\u003e\u003cp\u003eIt was release day. January 12th, v0.8.4 of Piper Morgan was live. We’d just completed Sprint B1 — six days of work, 23 issues closed, a new calendar integration, improved intent classification, and a cleaner codebase.\u003c/p\u003e\u003cp\u003eThen one of our alpha testers (me) reported a bug.\u003c/p\u003e\u003cp\u003e“The standup says I have no projects. But I just finished onboarding my portfolio.”\u003c/p\u003e\u003ch3\u003ePortfolio onboarding\u003c/h3\u003e\u003cp\u003ePiper Morgan has a portfolio onboarding flow. You tell the assistant about your projects — what you’re working on, what matters, what’s blocked. This context helps the Morning Standup feature give you relevant suggestions.\u003c/p\u003e\u003cp\u003eThe onboarding worked perfectly. You could add projects. They were saved to the database. If you asked “what projects do I have?” the system would tell you. Everything passed our tests.\u003c/p\u003e\u003cp\u003eBut when you asked for a standup? “I don’t see any projects in your portfolio yet.”\u003c/p\u003e\u003ch3\u003eThe investigation\u003c/h3\u003e\u003cp\u003eThe Lead Developer dug in at 9:30 PM. Here’s what they found:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePortfolio onboarding\u003c/strong\u003e stored projects in the projects table using ProjectRepository. This worked correctly. The data was there.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMorning Standup\u003c/strong\u003e asked UserContextService what projects the user had. UserContextService checked two places: the user’s preferences and the PIPER.md configuration file.\u003c/p\u003e\u003cp\u003eIt never checked the database.\u003c/p\u003e\u003cp\u003eThe storage worked. The retrieval worked. They just weren’t connected to each other.\u003c/p\u003e\u003ch3\u003eThe anti-pattern\u003c/h3\u003e\u003cp\u003eWe’ve started calling this the \u003cstrong\u003e75% Trap\u003c/strong\u003e. It’s a failure mode that seems to emerge specifically from AI-assisted development.\u003c/p\u003e\u003cp\u003eHere’s how it happens: You ask an AI to build Feature A. It builds Feature A beautifully — clean code, good tests, proper error handling. You ask it to build Feature B. Same thing. Beautiful work.\u003c/p\u003e\u003cp\u003eBut Feature A stores data that Feature B needs to consume. And unless someone explicitly connects them, they won’t be connected. The AI built exactly what you asked for. You just didn’t ask for the connection (or you did but it forgot.)\u003c/p\u003e\u003cp\u003eThis is different from traditional bugs. Traditional bugs are things that don’t work. The 75% Trap is things that \u003cem\u003edo\u003c/em\u003e work — just not \u003cem\u003etogether\u003c/em\u003e.\u003c/p\u003e\u003cp\u003eOur tests passed because we tested each piece in isolation. Portfolio onboarding: ✓ stores projects. UserContextService: ✓ returns user context. Neither test knew the other existed.\u003c/p\u003e\u003ch3\u003eWhy AI makes this worse\u003c/h3\u003e\u003cp\u003eHuman developers carry mental models across features. A developer who built the portfolio onboarding would probably remember, three weeks later when building the standup feature, “oh right, projects are in that table I created.”\u003c/p\u003e\u003cp\u003eAI assistants don’t have that continuity. Each conversation, each feature, each file is somewhat isolated. They’re excellent at building the thing you’re looking at. They’re less reliable at remembering the thing you built last month.\u003c/p\u003e\u003cp\u003eThis isn’t a criticism — it’s a characteristic. Understanding it lets you design around it.\u003c/p\u003e\u003ch3\u003eThe simple fix\u003c/h3\u003e\u003cp\u003eThe fix itself was simple. One line of real change: make UserContextService query the database directly instead of only checking preferences.\u003c/p\u003e\u003cp\u003eThe investigation took longer than the fix. That’s usually how it goes with 75% Trap bugs — the problem isn’t that the code is hard to write, it’s that the \u003cem\u003edisconnection\u003c/em\u003e is hard to see.\u003c/p\u003e\u003cp\u003eBy 10:30 PM, the fix was committed. By the next morning, our tester confirmed: standup now sees their projects.\u003c/p\u003e\u003ch3\u003eWhat we learned\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e1. Test the user journey, not just the components.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eOur unit tests were green. Our integration tests were green. But we didn’t have a test that said “onboard a portfolio, then request a standup, and verify the standup knows about the portfolio.” That’s the test that would have caught this.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. AI-assisted development needs explicit connection reviews.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWhen you build a new feature, ask: “What other features need to know about this?” When you build something that consumes data, ask: “Where does this data actually come from?” These questions feel obvious. They’re easy to skip when the code looks so complete.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. The house can look finished from the front.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eOur alpha tester saw a beautiful front porch — portfolio onboarding that worked, a standup feature that ran. They couldn’t see that the back wall was missing.\u003c/p\u003e\u003cp\u003eThe 75% Trap isn’t about incomplete work. It’s about work that \u003cem\u003elooks\u003c/em\u003e complete because each piece functions correctly in isolation. The incompleteness is in the connections, not the components.\u003c/p\u003e\u003ch3\u003eThe broader lesson\u003c/h3\u003e\u003cp\u003eWe’ve been building Piper Morgan for seven months now, mostly with AI assistance. The 75% Trap is probably our most common failure mode.\u003c/p\u003e\u003cp\u003eIt shows up as:\u003c/p\u003e\u003cul\u003e\u003cli\u003eFeatures that store data nothing reads\u003c/li\u003e\u003cli\u003eAPIs that exist but aren’t called\u003c/li\u003e\u003cli\u003eConfiguration options that aren’t wired to behavior\u003c/li\u003e\u003cli\u003eError handlers that catch exceptions but don’t surface them to users\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEvery time, the individual pieces work. Every time, we passed our tests. Every time, the actual user experience was broken.\u003c/p\u003e\u003cp\u003eThe fix isn’t to stop using AI. The fix is to understand that AI excels at building components and struggles with connections. So you build the connections into your process:\u003c/p\u003e\u003cul\u003e\u003cli\u003eExplicit “integration review” steps in your workflow\u003c/li\u003e\u003cli\u003eEnd-to-end tests that trace real user journeys\u003c/li\u003e\u003cli\u003eThe question “what consumes this?” asked at every data storage point\u003c/li\u003e\u003cli\u003eThe question “where does this come from?” asked at every data retrieval point\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWe’re getting better at catching these. Bug #582 was found and fixed within twelve hours of release. Six months ago, it might have lingered for weeks.\u003c/p\u003e\u003cp\u003eBut we’re not fooling ourselves. There’s probably another 75% Trap bug hiding in the codebase right now, waiting for a user to walk around to the back of the house.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: “The Audit Cascade” on a strict technique I’m adopting that is helping to tame the 75% antipattern.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you found unfinished gaps in work your AI assistant told you was all done and ready to ship. I think most of us trying this stuff out have.\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=cb49b58467a5\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-domain-model-disconnect-cb49b58467a5\"\u003eThe Domain Model Disconnect\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T2a24,"])</script><script>self.__next_f.push([1,"\u003csection name=\"657a\" class=\"section section--body section--first\"\u003e\u003cdiv organ has a portfolio onboarding flow. You tell the assistant about your projects — what you’re working on, what matters, what’s blocked. This context helps the Morning Standup feature give you relevant suggestions.\u003c/p\u003e\u003cp name=\"26ce\" id=\"26ce\" class=\"graf graf--p graf-after--p\"\u003eThe onboarding worked perfectly. You could add projects. They were saved to the database. If you asked “what projects do I have?” the system would tell you. Everything passed our tests.\u003c/p\u003e\u003cp name=\"e380\" id=\"e380\" class=\"graf graf--p graf-after--p\"\u003eBut when you asked for a standup? “I don’t see any projects in your portfolio yet.”\u003c/p\u003e\u003ch3 name=\"1962\" id=\"1962\" class=\"graf graf--h3 graf-after--p\"\u003eThe investigation\u003c/h3\u003e\u003cp name=\"54cb\" id=\"54cb\" class=\"graf graf--p graf-after--h3\"\u003eThe Lead Developer dug in at 9:30 PM. Here’s what they found:\u003c/p\u003e\u003cp name=\"ef98\" id=\"ef98\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePortfolio onboarding\u003c/strong\u003e stored projects in the \u003ccode class=\"markup--code markup--p-code\"\u003eprojects\u003c/code\u003e table using \u003ccode class=\"markup--code markup--p-code\"\u003eProjectRepository\u003c/code\u003e. This worked correctly. The data was there.\u003c/p\u003e\u003cp name=\"4b46\" id=\"4b46\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMorning Standup\u003c/strong\u003e asked \u003ccode class=\"markup--code markup--p-code\"\u003eUserContextService\u003c/code\u003e what projects the user had. \u003ccode class=\"markup--code markup--p-code\"\u003eUserContextService\u003c/code\u003e checked two places: the user’s preferences and the PIPER.md configuration file.\u003c/p\u003e\u003cp name=\"c8d8\" id=\"c8d8\" class=\"graf graf--p graf-after--p\"\u003eIt never checked the database.\u003c/p\u003e\u003cp name=\"8e47\" id=\"8e47\" class=\"graf graf--p graf-after--p\"\u003eThe storage worked. The retrieval worked. They just weren’t connected to each other.\u003c/p\u003e\u003ch3 name=\"9776\" id=\"9776\" class=\"graf graf--h3 graf-after--p\"\u003eThe anti-pattern\u003c/h3\u003e\u003cp name=\"9448\" id=\"9448\" class=\"graf graf--p graf-after--h3\"\u003eWe’ve started calling this the \u003cstrong class=\"markup--strong markup--p-strong\"\u003e75% Trap\u003c/strong\u003e. It’s a failure mode that seems to emerge specifically from AI-assisted development.\u003c/p\u003e\u003cp name=\"7488\" id=\"7488\" class=\"graf graf--p graf-after--p\"\u003eHere’s how it happens: You ask an AI to build Feature A. It builds Feature A beautifully — clean code, good tests, proper error handling. You ask it to build Feature B. Same thing. Beautiful work.\u003c/p\u003e\u003cp name=\"ad6c\" id=\"ad6c\" class=\"graf graf--p graf-after--p\"\u003eBut Feature A stores data that Feature B needs to consume. And unless someone explicitly connects them, they won’t be connected. The AI built exactly what you asked for. You just didn’t ask for the connection (or you did but it forgot.)\u003c/p\u003e\u003cp name=\"9101\" id=\"9101\" class=\"graf graf--p graf-after--p\"\u003eThis is different from traditional bugs. Traditional bugs are things that don’t work. The 75% Trap is things that \u003cem class=\"markup--em markup--p-em\"\u003edo\u003c/em\u003e work — just not \u003cem class=\"markup--em markup--p-em\"\u003etogether\u003c/em\u003e.\u003c/p\u003e\u003cp name=\"1722\" id=\"1722\" class=\"graf graf--p graf-after--p\"\u003eOur tests passed because we tested each piece in isolation. Portfolio onboarding: ✓ stores projects. UserContextService: ✓ returns user context. Neither test knew the other existed.\u003c/p\u003e\u003ch3 name=\"e7d6\" id=\"e7d6\" class=\"graf graf--h3 graf-after--p\"\u003eWhy AI makes this worse\u003c/h3\u003e\u003cp name=\"a1bb\" id=\"a1bb\" class=\"graf graf--p graf-after--h3\"\u003eHuman developers carry mental models across features. A developer who built the portfolio onboarding would probably remember, three weeks later when building the standup feature, “oh right, projects are in that table I created.”\u003c/p\u003e\u003cp name=\"2cb1\" id=\"2cb1\" class=\"graf graf--p graf-after--p\"\u003eAI assistants don’t have that continuity. Each conversation, each feature, each file is somewhat isolated. They’re excellent at building the thing you’re looking at. They’re less reliable at remembering the thing you built last month.\u003c/p\u003e\u003cp name=\"7b0b\" id=\"7b0b\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t a criticism — it’s a characteristic. Understanding it lets you design around it.\u003c/p\u003e\u003ch3 name=\"0e61\" id=\"0e61\" class=\"graf graf--h3 graf-after--p\"\u003eThe simple fix\u003c/h3\u003e\u003cp name=\"a8ff\" id=\"a8ff\" class=\"graf graf--p graf-after--h3\"\u003eThe fix itself was simple. One line of real change: make \u003ccode class=\"markup--code markup--p-code\"\u003eUserContextService\u003c/code\u003e query the database directly instead of only checking preferences.\u003c/p\u003e\u003cp name=\"e38a\" id=\"e38a\" class=\"graf graf--p graf-after--p\"\u003eThe investigation took longer than the fix. That’s usually how it goes with 75% Trap bugs — the problem isn’t that the code is hard to write, it’s that the \u003cem class=\"markup--em markup--p-em\"\u003edisconnection\u003c/em\u003e is hard to see.\u003c/p\u003e\u003cp name=\"5615\" id=\"5615\" class=\"graf graf--p graf-after--p\"\u003eBy 10:30 PM, the fix was committed. By the next morning, our tester confirmed: standup now sees their projects.\u003c/p\u003e\u003ch3 name=\"fad8\" id=\"fad8\" class=\"graf graf--h3 graf-after--p\"\u003eWhat we learned\u003c/h3\u003e\u003cp name=\"3da9\" id=\"3da9\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e1. Test the user journey, not just the components.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"a2fe\" id=\"a2fe\" class=\"graf graf--p graf-after--p\"\u003eOur unit tests were green. Our integration tests were green. But we didn’t have a test that said “onboard a portfolio, then request a standup, and verify the standup knows about the portfolio.” That’s the test that would have caught this.\u003c/p\u003e\u003cp name=\"2c59\" id=\"2c59\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e2. AI-assisted development needs explicit connection reviews.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"cc3d\" id=\"cc3d\" class=\"graf graf--p graf-after--p\"\u003eWhen you build a new feature, ask: “What other features need to know about this?” When you build something that consumes data, ask: “Where does this data actually come from?” These questions feel obvious. They’re easy to skip when the code looks so complete.\u003c/p\u003e\u003cp name=\"c91b\" id=\"c91b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e3. The house can look finished from the front.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"22e6\" id=\"22e6\" class=\"graf graf--p graf-after--p\"\u003eOur alpha tester saw a beautiful front porch — portfolio onboarding that worked, a standup feature that ran. They couldn’t see that the back wall was missing.\u003c/p\u003e\u003cp name=\"099e\" id=\"099e\" class=\"graf graf--p graf-after--p\"\u003eThe 75% Trap isn’t about incomplete work. It’s about work that \u003cem class=\"markup--em markup--p-em\"\u003elooks\u003c/em\u003e complete because each piece functions correctly in isolation. The incompleteness is in the connections, not the components.\u003c/p\u003e\u003ch3 name=\"50c0\" id=\"50c0\" class=\"graf graf--h3 graf-after--p\"\u003eThe broader lesson\u003c/h3\u003e\u003cp name=\"e1ee\" id=\"e1ee\" class=\"graf graf--p graf-after--h3\"\u003eWe’ve been building Piper Morgan for seven months now, mostly with AI assistance. The 75% Trap is probably our most common failure mode.\u003c/p\u003e\u003cp name=\"bec0\" id=\"bec0\" class=\"graf graf--p graf-after--p\"\u003eIt shows up as:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"ce5a\" id=\"ce5a\" class=\"graf graf--li graf-after--p\"\u003eFeatures that store data nothing reads\u003c/li\u003e\u003cli name=\"e95b\" id=\"e95b\" class=\"graf graf--li graf-after--li\"\u003eAPIs that exist but aren’t called\u003c/li\u003e\u003cli name=\"045c\" id=\"045c\" class=\"graf graf--li graf-after--li\"\u003eConfiguration options that aren’t wired to behavior\u003c/li\u003e\u003cli name=\"a0f7\" id=\"a0f7\" class=\"graf graf--li graf-after--li\"\u003eError handlers that catch exceptions but don’t surface them to users\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"efc3\" id=\"efc3\" class=\"graf graf--p graf-after--li\"\u003eEvery time, the individual pieces work. Every time, we passed our tests. Every time, the actual user experience was broken.\u003c/p\u003e\u003cp name=\"ac2d\" id=\"ac2d\" class=\"graf graf--p graf-after--p\"\u003eThe fix isn’t to stop using AI. The fix is to understand that AI excels at building components and struggles with connections. So you build the connections into your process:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2a31\" id=\"2a31\" class=\"graf graf--li graf-after--p\"\u003eExplicit “integration review” steps in your workflow\u003c/li\u003e\u003cli name=\"fd8e\" id=\"fd8e\" class=\"graf graf--li graf-after--li\"\u003eEnd-to-end tests that trace real user journeys\u003c/li\u003e\u003cli name=\"81fb\" id=\"81fb\" class=\"graf graf--li graf-after--li\"\u003eThe question “what consumes this?” asked at every data storage point\u003c/li\u003e\u003cli name=\"170f\" id=\"170f\" class=\"graf graf--li graf-after--li\"\u003eThe question “where does this come from?” asked at every data retrieval point\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"5115\" id=\"5115\" class=\"graf graf--p graf-after--li\"\u003eWe’re getting better at catching these. Bug #582 was found and fixed within twelve hours of release. Six months ago, it might have lingered for weeks.\u003c/p\u003e\u003cp name=\"7e77\" id=\"7e77\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eBut we’re not fooling ourselves. There’s probably another 75% Trap bug hiding in the codebase right now, waiting for a user to walk around to the back of the house.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Domain Model Disconnect\",\"excerpt\":\"“I thought we were done?”January 12, 2026It was release day. January 12th, v0.8.4 of Piper Morgan was live. We’d just completed Sprint B1 — six days of work, 23 issues closed, a new calendar integration, improved intent classification, and a cleaner codebase.Then one of our alpha testers (me) rep...\",\"url\":\"/blog/the-domain-model-disconnect\",\"publishedAt\":\"Jan 21, 2026\",\"publishedAtISO\":\"2026-01-21T14:38:29.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/cb49b58467a5\",\"featuredImage\":\"/assets/blog-images/cb49b58467a5-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-domain-model-disconnect-cb49b58467a5?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-domain-model-disconnect\",\"workDate\":\"Jan 21, 2026\",\"workDateISO\":\"2026-01-21T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-01-21\",\"featured\":false},\"content\":{\"title\":\"The Domain Model Disconnect\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Domain Model Disconnect | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Domain Model Disconnect\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Domain Model Disconnect\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type
