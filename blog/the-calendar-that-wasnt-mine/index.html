$\",\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T231e,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"Cutaway apartment building where separate apartments share a single basement bin of calendars, causing one resident to see someone else’s schedule.\" src=\"https://cdn-images-1.medium.com/max/1024/1*kSean4p6wljAch1kLDeC7g.png\" /\u003e\u003cfigcaption\u003e“Mail for all the tenants delivered!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eJanuary 28, 2026\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTuesday afternoon. I’m testing the alpha release with a fresh account. I am in hurry to test certain things so I give my API key for an LLM and skip connecting my Notion, Slack, and Google Calendar to this account.\u003c/p\u003e\u003cp\u003eThen I greet Piper and they run down my appointments for the day! This is a user without my credentials seeing my calendar! This is a major security issue for any product intend to serve multiple users.\u003c/p\u003e\u003ch3\u003eThe leak\u003c/h3\u003e\u003cp\u003eMulti-tenancy is supposed to mean isolation. User A’s data stays with User A. User B’s data stays with User B. The walls between accounts are supposed to be absolute.\u003c/p\u003e\u003cp\u003eThe walls weren’t there. Or rather — they were there for some things and not others. User accounts existed. Login worked correctly. The database had owner_id columns on most tables. It looked multi-tenant. It felt multi-tenant.\u003c/p\u003e\u003cp\u003eBut the calendar integration stored OAuth tokens globally. When I connected my calendar, the system saved my Google credentials. When the next user came along, the system retrieved… my credentials. Because they were the only credentials there. No user scoping. No isolation. Just a global token bucket.\u003c/p\u003e\u003cp\u003eOne user’s calendar. Showing in another user’s account. The leak was complete.\u003c/p\u003e\u003ch3\u003eThe archaeology\u003c/h3\u003e\u003cp\u003eThis wasn’t a new bug. This was an old assumption, finally visible.\u003c/p\u003e\u003cp\u003eBack in October 2025, we’d added multi-user support. The commit looked comprehensive — user accounts, authentication, owner_id foreign keys on the main tables. The PR passed review. The tests passed. Multi-user: done.\u003c/p\u003e\u003cp\u003eExcept the integration layer never got updated. It must have been aj oversight in the plan that got past me. Calendar tokens, Slack credentials, GitHub connections — all the external service authentication still used global storage. The October commit updated the core, but the edges remained single-tenant.\u003c/p\u003e\u003cp\u003eEight months of development on top of that foundation. Features built, bugs fixed, patterns established — all assuming the multi-user support was complete. It wasn’t. The calendar leak proved it.\u003c/p\u003e\u003ch3\u003eThe scope of the problem\u003c/h3\u003e\u003cp\u003eOnce we knew what to look for, we found it everywhere.\u003c/p\u003e\u003cp\u003eCalendar tokens: global. Slack tokens: global. GitHub tokens: global. Notion tokens: global. Every external integration stored credentials without user context.\u003c/p\u003e\u003cp\u003eThis is why I audit things when I find a problem. It’s rarely a one-off!\u003c/p\u003e\u003cp\u003eAnd it wasn’t just tokens. The projects table had a unique constraint on name — globally unique, not per-user unique. Two users couldn\u0026#39;t both have a project called \u0026quot;Q1 Planning.\u0026quot; The constraint would reject the second one. Data isolation failure of a different kind.\u003c/p\u003e\u003cp\u003eThe API key storage used a global prefix. The config services didn’t require user context. The OAuth callbacks didn’t verify which user initiated the flow.\u003c/p\u003e\u003cp\u003eWe’d built multi-user authentication on top of single-user infrastructure. The login was isolated. Everything behind it wasn’t.\u003c/p\u003e\u003ch3\u003eThe fix that couldn’t be incremental\u003c/h3\u003e\u003cp\u003eMy Lead Developer proposed a phased approach: update each integration one at a time, make user_id optional at first, gradually require it everywhere. Safe. Incremental. Low risk.\u003c/p\u003e\u003cp\u003eThis is the type of advice you get from LLMs trained on best practices, but every time I get this type of advice I remind them that we do not have any real users yet. We are not in production. We are in alpha. There is no value to a phased approach and much risk of not foinishing.\u003c/p\u003e\u003cp\u003eMy Chief Architect agreed: make user_id required from the start.\u003c/p\u003e\u003cp\u003eThe reasoning: optional parameters create hiding places. If user_id is optional, code paths that don\u0026#39;t provide it will continue to work. They shouldn\u0026#39;t work — they\u0026#39;re the exact paths that leak data — but they will. The migration \u0026quot;completes\u0026quot; with gaps still hidden.\u003c/p\u003e\u003cp\u003eRequired parameters create a forcing function. Every code path that lacks user context fails immediately. The failures tell you exactly where to look. No hiding. No gradual drift. No “we’ll get to that later.”\u003c/p\u003e\u003cp\u003eWe made user_id required from Phase 1.\u003c/p\u003e\u003ch3\u003eNine phases\u003c/h3\u003e\u003cp\u003eThe fix touched everything.\u003c/p\u003e\u003cp\u003ePhase 1: Repositories require owner_id. No more optional user context. Every database operation scoped to a specific user.\u003c/p\u003e\u003cp\u003ePhase 2: OAuth investigation. Map every token storage and retrieval path. Find every place credentials flow without user context.\u003c/p\u003e\u003cp\u003ePhase 3: RequestContext enforcement. Every authenticated request carries user identity. Middleware validates it. No anonymous operations on protected resources.\u003c/p\u003e\u003cp\u003ePhase 4: Repository isolation tests. Eighteen new tests verifying that User A cannot access User B’s data through any repository method.\u003c/p\u003e\u003cp\u003ePhase 5: OAuth state redesign. The OAuth callback now embeds user_id in the state parameter. When Google redirects back, we know which user initiated the flow.\u003c/p\u003e\u003cp\u003ePhase 6: Credential storage separation. IntegrationConfigService for app-level credentials. UserTokenService for user-specific tokens. Clear separation, clear ownership.\u003c/p\u003e\u003cp\u003ePhase 7: Config service signatures. Every method that touches user data requires user_id as a parameter. No more inferring. No more globals.\u003c/p\u003e\u003cp\u003ePhase 8: Singleton manager refactor. The conversation managers, the onboarding managers — all the stateful services now explicitly track which user they’re serving.\u003c/p\u003e\u003cp\u003ePhase 9: Workspace activation. The workspace_id concept that had been designed but dormant, finally wired in as the future path for team isolation.\u003c/p\u003e\u003cp\u003e94 new tests. ADR-058 documenting every decision. One day of execution.\u003c/p\u003e\u003ch3\u003eWhat the forcing function revealed\u003c/h3\u003e\u003cp\u003eThe Architect and I were right. Making user_id required immediately surfaced gaps we wouldn\u0026#39;t have found otherwise.\u003c/p\u003e\u003cul\u003e\u003cli\u003eA webhook handler that processed Slack events without checking which user’s Slack connection triggered them.\u003c/li\u003e\u003cli\u003eAn OAuth callback that stored tokens before verifying the user session.\u003c/li\u003e\u003cli\u003eA config lookup that fell back to global defaults when user-specific values weren’t found.\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEach failure was a discovery. Each discovery was a fix. By the end of the day, the system was genuinely isolated — not “mostly isolated” or “isolated except for edge cases.” Every code path either handled user context explicitly or had been deliberately designed for system-level operations.\u003c/p\u003e\u003ch3\u003eThe October lesson\u003c/h3\u003e\u003cp\u003eThe October 2025 commit wasn’t wrong. Adding user accounts, authentication, and owner_id columns was necessary work. The mistake was assuming it was complete.\u003c/p\u003e\u003cp\u003eMulti-tenancy isn’t a feature you add. It’s a property that must hold everywhere. One leaky integration undermines the entire model. One global token bucket means the walls don’t exist.\u003c/p\u003e\u003cp\u003eThe October commit added the structure. The January fix ensured the property. Eight months between them — eight months where the system looked multi-tenant but wasn’t.\u003c/p\u003e\u003ch3\u003eThe calendar now\u003c/h3\u003e\u003cp\u003eI tested again after the fix. Fresh account, again skipped connecting a calendar. New bug: now Piper told me I have no events coming up (when really it should admit it doesn’t know my schedule). We opened up two new issues: one for failing gracefully now, and a later plan for Piper to offer to attach your calendar if it isn’t added yet (but not to keep offering if you refuse).\u003c/p\u003e\u003cp\u003eThe walls exist now. 94 tests verify they hold. ADR-058 documents why they’re built this way. The forcing function ensured we found every gap.\u003c/p\u003e\u003cp\u003eOne day of aggressive fixing. Eight months of hidden assumptions surfaced. User A’s calendar stays with User A.\u003c/p\u003e\u003cp\u003eThat’s what multi-tenancy actually means.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Drift We Didn’t See, where a timezone issue turned out to be everywhere.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you discovered that “multi-user support” wasn’t as complete as you thought? What finally revealed the gaps?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=4a680a0aec38\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-calendar-that-wasnt-mine-4a680a0aec38\"\u003eThe Calendar That Wasn’t Mine\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T31c9,"])</script><script>self.__next_f.push([1,"\u003csection name=\"ddb7\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"f235\" id=\"f235\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Calendar That Wasn’t Mine\u003c/h3\u003e\u003cfigure name=\"9282\" id=\"9282\" class=\"graf graf--figure graf--startsWi kup--p-code\"\u003eowner_id\u003c/code\u003e columns on most tables. It looked multi-tenant. It felt multi-tenant.\u003c/p\u003e\u003cp name=\"40c1\" id=\"40c1\" class=\"graf graf--p graf-after--p\"\u003eBut the calendar integration stored OAuth tokens globally. When I connected my calendar, the system saved my Google credentials. When the next user came along, the system retrieved… my credentials. Because they were the only credentials there. No user scoping. No isolation. Just a global token bucket.\u003c/p\u003e\u003cp name=\"aa34\" id=\"aa34\" class=\"graf graf--p graf-after--p\"\u003eOne user’s calendar. Showing in another user’s account. The leak was complete.\u003c/p\u003e\u003ch3 name=\"2f05\" id=\"2f05\" class=\"graf graf--h3 graf-after--p\"\u003eThe archaeology\u003c/h3\u003e\u003cp name=\"7e06\" id=\"7e06\" class=\"graf graf--p graf-after--h3\"\u003eThis wasn’t a new bug. This was an old assumption, finally visible.\u003c/p\u003e\u003cp name=\"806d\" id=\"806d\" class=\"graf graf--p graf-after--p\"\u003eBack in October 2025, we’d added multi-user support. The commit looked comprehensive — user accounts, authentication, \u003ccode class=\"markup--code markup--p-code\"\u003eowner_id\u003c/code\u003e foreign keys on the main tables. The PR passed review. The tests passed. Multi-user: done.\u003c/p\u003e\u003cp name=\"92a6\" id=\"92a6\" class=\"graf graf--p graf-after--p\"\u003eExcept the integration layer never got updated. It must have been aj oversight in the plan that got past me. Calendar tokens, Slack credentials, GitHub connections — all the external service authentication still used global storage. The October commit updated the core, but the edges remained single-tenant.\u003c/p\u003e\u003cp name=\"248f\" id=\"248f\" class=\"graf graf--p graf-after--p\"\u003eEight months of development on top of that foundation. Features built, bugs fixed, patterns established — all assuming the multi-user support was complete. It wasn’t. The calendar leak proved it.\u003c/p\u003e\u003ch3 name=\"0ba9\" id=\"0ba9\" class=\"graf graf--h3 graf-after--p\"\u003eThe scope of the problem\u003c/h3\u003e\u003cp name=\"eecb\" id=\"eecb\" class=\"graf graf--p graf-after--h3\"\u003eOnce we knew what to look for, we found it everywhere.\u003c/p\u003e\u003cp name=\"678e\" id=\"678e\" class=\"graf graf--p graf-after--p\"\u003eCalendar tokens: global. Slack tokens: global. GitHub tokens: global. Notion tokens: global. Every external integration stored credentials without user context.\u003c/p\u003e\u003cp name=\"8cba\" id=\"8cba\" class=\"graf graf--p graf-after--p\"\u003eThis is why I audit things when I find a problem. It’s rarely a one-off!\u003c/p\u003e\u003cp name=\"fad3\" id=\"fad3\" class=\"graf graf--p graf-after--p\"\u003eAnd it wasn’t just tokens. The projects table had a unique constraint on \u003ccode class=\"markup--code markup--p-code\"\u003ename\u003c/code\u003e — globally unique, not per-user unique. Two users couldn\u0026#39;t both have a project called \u0026quot;Q1 Planning.\u0026quot; The constraint would reject the second one. Data isolation failure of a different kind.\u003c/p\u003e\u003cp name=\"2d07\" id=\"2d07\" class=\"graf graf--p graf-after--p\"\u003eThe API key storage used a global prefix. The config services didn’t require user context. The OAuth callbacks didn’t verify which user initiated the flow.\u003c/p\u003e\u003cp name=\"57aa\" id=\"57aa\" class=\"graf graf--p graf-after--p\"\u003eWe’d built multi-user authentication on top of single-user infrastructure. The login was isolated. Everything behind it wasn’t.\u003c/p\u003e\u003ch3 name=\"2651\" id=\"2651\" class=\"graf graf--h3 graf-after--p\"\u003eThe fix that couldn’t be incremental\u003c/h3\u003e\u003cp name=\"a826\" id=\"a826\" class=\"graf graf--p graf-after--h3\"\u003eMy Lead Developer proposed a phased approach: update each integration one at a time, make \u003ccode class=\"markup--code markup--p-code\"\u003euser_id\u003c/code\u003e optional at first, gradually require it everywhere. Safe. Incremental. Low risk.\u003c/p\u003e\u003cp name=\"9cf7\" id=\"9cf7\" class=\"graf graf--p graf-after--p\"\u003eThis is the type of advice you get from LLMs trained on best practices, but every time I get this type of advice I remind them that we do not have any real users yet. We are not in production. We are in alpha. There is no value to a phased approach and much risk of not foinishing.\u003c/p\u003e\u003cp name=\"e546\" id=\"e546\" class=\"graf graf--p graf-after--p\"\u003eMy Chief Architect agreed: make \u003ccode class=\"markup--code markup--p-code\"\u003euser_id\u003c/code\u003e required from the start.\u003c/p\u003e\u003cp name=\"55d5\" id=\"55d5\" class=\"graf graf--p graf-after--p\"\u003eThe reasoning: optional parameters create hiding places. If \u003ccode class=\"markup--code markup--p-code\"\u003euser_id\u003c/code\u003e is optional, code paths that don\u0026#39;t provide it will continue to work. They shouldn\u0026#39;t work — they\u0026#39;re the exact paths that leak data — but they will. The migration \u0026quot;completes\u0026quot; with gaps still hidden.\u003c/p\u003e\u003cp name=\"614b\" id=\"614b\" class=\"graf graf--p graf-after--p\"\u003eRequired parameters create a forcing function. Every code path that lacks user context fails immediately. The failures tell you exactly where to look. No hiding. No gradual drift. No “we’ll get to that later.”\u003c/p\u003e\u003cp name=\"6860\" id=\"6860\" class=\"graf graf--p graf-after--p\"\u003eWe made \u003ccode class=\"markup--code markup--p-code\"\u003euser_id\u003c/code\u003e required from Phase 1.\u003c/p\u003e\u003ch3 name=\"2cc5\" id=\"2cc5\" class=\"graf graf--h3 graf-after--p\"\u003eNine phases\u003c/h3\u003e\u003cp name=\"255a\" id=\"255a\" class=\"graf graf--p graf-after--h3\"\u003eThe fix touched everything.\u003c/p\u003e\u003cp name=\"fc62\" id=\"fc62\" class=\"graf graf--p graf-after--p\"\u003ePhase 1: Repositories require \u003ccode class=\"markup--code markup--p-code\"\u003eowner_id\u003c/code\u003e. No more optional user context. Every database operation scoped to a specific user.\u003c/p\u003e\u003cp name=\"87c3\" id=\"87c3\" class=\"graf graf--p graf-after--p\"\u003ePhase 2: OAuth investigation. Map every token storage and retrieval path. Find every place credentials flow without user context.\u003c/p\u003e\u003cp name=\"a550\" id=\"a550\" class=\"graf graf--p graf-after--p\"\u003ePhase 3: RequestContext enforcement. Every authenticated request carries user identity. Middleware validates it. No anonymous operations on protected resources.\u003c/p\u003e\u003cp name=\"d648\" id=\"d648\" class=\"graf graf--p graf-after--p\"\u003ePhase 4: Repository isolation tests. Eighteen new tests verifying that User A cannot access User B’s data through any repository method.\u003c/p\u003e\u003cp name=\"e71e\" id=\"e71e\" class=\"graf graf--p graf-after--p\"\u003ePhase 5: OAuth state redesign. The OAuth callback now embeds \u003ccode class=\"markup--code markup--p-code\"\u003euser_id\u003c/code\u003e in the state parameter. When Google redirects back, we know which user initiated the flow.\u003c/p\u003e\u003cp name=\"1f16\" id=\"1f16\" class=\"graf graf--p graf-after--p\"\u003ePhase 6: Credential storage separation. \u003ccode class=\"markup--code markup--p-code\"\u003eIntegrationConfigService\u003c/code\u003e for app-level credentials. \u003ccode class=\"markup--code markup--p-code\"\u003eUserTokenService\u003c/code\u003e for user-specific tokens. Clear separation, clear ownership.\u003c/p\u003e\u003cp name=\"6cb7\" id=\"6cb7\" class=\"graf graf--p graf-after--p\"\u003ePhase 7: Config service signatures. Every method that touches user data requires \u003ccode class=\"markup--code markup--p-code\"\u003euser_id\u003c/code\u003e as a parameter. No more inferring. No more globals.\u003c/p\u003e\u003cp name=\"0a99\" id=\"0a99\" class=\"graf graf--p graf-after--p\"\u003ePhase 8: Singleton manager refactor. The conversation managers, the onboarding managers — all the stateful services now explicitly track which user they’re serving.\u003c/p\u003e\u003cp name=\"d1a2\" id=\"d1a2\" class=\"graf graf--p graf-after--p\"\u003ePhase 9: Workspace activation. The \u003ccode class=\"markup--code markup--p-code\"\u003eworkspace_id\u003c/code\u003e concept that had been designed but dormant, finally wired in as the future path for team isolation.\u003c/p\u003e\u003cp name=\"2660\" id=\"2660\" class=\"graf graf--p graf-after--p\"\u003e94 new tests. ADR-058 documenting every decision. One day of execution.\u003c/p\u003e\u003ch3 name=\"5695\" id=\"5695\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the forcing function revealed\u003c/h3\u003e\u003cp name=\"e0c9\" id=\"e0c9\" class=\"graf graf--p graf-after--h3\"\u003eThe Architect and I were right. Making \u003ccode class=\"markup--code markup--p-code\"\u003euser_id\u003c/code\u003e required immediately surfaced gaps we wouldn\u0026#39;t have found otherwise.\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"5dc9\" id=\"5dc9\" class=\"graf graf--li graf-after--p\"\u003eA webhook handler that processed Slack events without checking which user’s Slack connection triggered them.\u003c/li\u003e\u003cli name=\"ddaf\" id=\"ddaf\" class=\"graf graf--li graf-after--li\"\u003eAn OAuth callback that stored tokens before verifying the user session.\u003c/li\u003e\u003cli name=\"e555\" id=\"e555\" class=\"graf graf--li graf-after--li\"\u003eA config lookup that fell back to global defaults when user-specific values weren’t found.\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"149e\" id=\"149e\" class=\"graf graf--p graf-after--li\"\u003eEach failure was a discovery. Each discovery was a fix. By the end of the day, the system was genuinely isolated — not “mostly isolated” or “isolated except for edge cases.” Every code path either handled user context explicitly or had been deliberately designed for system-level operations.\u003c/p\u003e\u003ch3 name=\"9b17\" id=\"9b17\" class=\"graf graf--h3 graf-after--p\"\u003eThe October lesson\u003c/h3\u003e\u003cp name=\"d66e\" id=\"d66e\" class=\"graf graf--p graf-after--h3\"\u003eThe October 2025 commit wasn’t wrong. Adding user accounts, authentication, and \u003ccode class=\"markup--code markup--p-code\"\u003eowner_id\u003c/code\u003e columns was necessary work. The mistake was assuming it was complete.\u003c/p\u003e\u003cp name=\"615c\" id=\"615c\" class=\"graf graf--p graf-after--p\"\u003eMulti-tenancy isn’t a feature you add. It’s a property that must hold everywhere. One leaky integration undermines the entire model. One global token bucket means the walls don’t exist.\u003c/p\u003e\u003cp name=\"5251\" id=\"5251\" class=\"graf graf--p graf-after--p\"\u003eThe October commit added the structure. The January fix ensured the property. Eight months between them — eight months where the system looked multi-tenant but wasn’t.\u003c/p\u003e\u003ch3 name=\"0b4c\" id=\"0b4c\" class=\"graf graf--h3 graf-after--p\"\u003eThe calendar now\u003c/h3\u003e\u003cp name=\"2c96\" id=\"2c96\" class=\"graf graf--p graf-after--h3\"\u003eI tested again after the fix. Fresh account, again skipped connecting a calendar. New bug: now Piper told me I have no events coming up (when really it should admit it doesn’t know my schedule). We opened up two new issues: one for failing gracefully now, and a later plan for Piper to offer to attach your calendar if it isn’t added yet (but not to keep offering if you refuse).\u003c/p\u003e\u003cp name=\"1fa7\" id=\"1fa7\" class=\"graf graf--p graf-after--p\"\u003eThe walls exist now. 94 tests verify they hold. ADR-058 documents why they’re built this way. The forcing function ensured we found every gap.\u003c/p\u003e\u003cp name=\"aca0\" id=\"aca0\" class=\"graf graf--p graf-after--p\"\u003eOne day of aggressive fixing. Eight months of hidden assumptions surfaced. User A’s calendar stays with User A.\u003c/p\u003e\u003cp name=\"e3f5\" id=\"e3f5\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThat’s what multi-tenancy actually means.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Calendar That Wasn’t Mine\",\"excerpt\":\"“Mail for all the tenants delivered!”January 28, 2026Tuesday afternoon. I’m testing the alpha release with a fresh account. I am in hurry to test certain things so I give my API key for an LLM and skip connecting my Notion, Slack, and Google Calendar to this account.Then I greet Piper and they ru...\",\"url\":\"/blog/the-calendar-that-wasnt-mine\",\"publishedAt\":\"Feb 10, 2026\",\"publishedAtISO\":\"2026-02-10T16:21:39.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/4a680a0aec38\",\"featuredImage\":\"/assets/blog-images/4a680a0aec38-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-calendar-that-wasnt-mine-4a680a0aec38?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-calendar-that-wasnt-mine\",\"workDate\":\"Feb 10, 2026\",\"workDateISO\":\"2026-02-10T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-02-10\",\"featured\":false},\"content\":{\"title\":\"The Calendar That Wasn’t Mine\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Calendar That Wasn’t Mine | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Calendar That Wasn’t Mine\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Calendar That Wasn’t Mine\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
