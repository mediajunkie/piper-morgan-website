,\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2d33,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot and a human work on a partially built robot; the robot reaches for tools while the human holds an X-ray revealing a loose wire and missing connector inside.\" src=\"https://cdn-images-1.medium.com/max/1024/1*cT5tj0uoNRSb5yoLTEc0xQ.png\" /\u003e\u003cfigcaption\u003e“Measure twice…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 23\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThree high-priority bugs. Actual fix time: 5 minutes. That’s not a typo. Five minutes. Three bugs. All fixed.\u003c/p\u003e\u003cp\u003eIt wasn’t a matter of coding faster. It came from thirty minutes of systematic investigation before touching any code. Root cause analysis that revealed the bugs were simpler than they appeared. .\u003c/p\u003e\u003cp\u003eThis is investigation as investment: spending time to understand before spending time to implement.\u003c/p\u003e\u003ch3\u003eThe speedup\u003c/h3\u003e\u003cp\u003eSaturday was frantic. First alpha tester arriving Monday. Fourteen navigation issues identified during a full system walkthrough. The pressure to just start fixing things was immense.\u003c/p\u003e\u003cp\u003eInstead, we investigated first.\u003c/p\u003e\u003cp\u003ePhase 1 took thirty minutes. The goal wasn’t to fix anything — just to understand what was actually broken. Three high-priority issues examined: logout not working, lists creation failing, todos creation failing.\u003c/p\u003e\u003cp\u003eWhat the investigation revealed:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #14 (Logout)\u003c/strong\u003e: The frontend called /api/v1/auth/logout. The backend expected /auth/logout. Path mismatch. Five-minute fix once you know what\u0026#39;s wrong.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #6 (Lists)\u003c/strong\u003e: The UI tried to POST to /api/v1/lists. That endpoint didn\u0026#39;t exist. The UI was built; the endpoint wasn\u0026#39;t wired up. Five-minute fix once you know what\u0026#39;s missing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #7 (Todos)\u003c/strong\u003e: Identical pattern to Issue #6. POST endpoint missing. Same fix pattern.\u003c/p\u003e\u003cp\u003eWithout investigation, each bug looks like “feature doesn’t work.” That could mean anything — authentication issues, database problems, validation failures, race conditions. The estimate of 35 minutes assumed some debugging, some experimentation, some wrong turns.\u003c/p\u003e\u003cp\u003eWith investigation, each bug has a specific diagnosis. Path mismatch. Missing endpoint. Missing endpoint. Implementation becomes mechanical: change the path, add the endpoint, add the endpoint.\u003c/p\u003e\u003cp\u003e\u003cem\u003eThis is “measure twice, cut once” on steroids.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThirty minutes of investigation. Five minutes of implementation.\u003c/p\u003e\u003ch3\u003eThat ol’ “75% complete” pattern\u003c/h3\u003e\u003cp\u003eInvestigation revealed something broader than individual bugs. Many features were 75–90% complete.\u003c/p\u003e\u003cp\u003eThe Lists UI existed. The buttons existed. The forms existed. The styling existed. The only thing missing: the POST endpoint to actually create a list.\u003c/p\u003e\u003cp\u003eThis pattern repeated across the codebase. Elements existed but wiring was incomplete. Frontend built but backend missing. Backend ready but frontend not connected. Features that looked broken were actually almost finished.\u003c/p\u003e\u003cp\u003eWithout investigation, you might rebuild the whole feature. “Lists aren’t working” becomes “let’s implement lists.” Hours of work recreating what already exists.\u003c/p\u003e\u003cp\u003eWith investigation, you find the gap. “Lists aren’t working because POST /api/v1/lists doesn’t exist.” Ten minutes to add the endpoint. Feature works.\u003c/p\u003e\u003cp\u003eInvestigation isn’t just finding bugs. It’s finding what’s already built. In a complex codebase — especially one built by multiple agents across many sessions — significant work might exist that no one remembers building. Investigation surfaces that work.\u003c/p\u003e\u003ch3\u003eInvestigation vs implementation time\u003c/h3\u003e\u003cp\u003eHere’s how the Saturday numbers broke down:\u003c/p\u003e\u003cp\u003eThe three high-priority bugs took 30 minutes to investigate and just 5 minutes to implement — a 7x speedup. Three medium-priority bugs followed a similar pattern: 20 minutes of investigation, 15 minutes of implementation, roughly 3x faster than diving straight in. The Frontend RBAC work (Option B) was estimated at 6–7 hours but completed in 54 minutes; investigation had moved the discovery phase earlier, yielding a 6–8x improvement. Even alpha documentation benefited: 15 minutes of investigation followed by 40 minutes of writing, about 1.8x faster than starting cold.\u003c/p\u003e\u003cp\u003eThe pattern: investigation time is rarely wasted. Even when it doesn’t dramatically accelerate implementation, it prevents wrong turns and wasted effort.\u003c/p\u003e\u003cp\u003eWhen investigation revealed Issue #8 (Files UI) would require 90–120 minutes — significantly more than other bugs — we made an informed decision to defer it. Backend was ready; frontend work could wait. Without investigation, we might have started the fix, discovered the scope mid-implementation, and lost time to the false start.\u003c/p\u003e\u003cp\u003eInvestigation enables better decisions about what to work on, not just how to work on it.\u003c/p\u003e\u003ch3\u003eWhat investigation actually looks like\u003c/h3\u003e\u003cp\u003eEffective investigation isn’t “look at the code until inspiration strikes.” It’s systematic analysis with specific questions:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat’s the user-visible symptom?\u003c/strong\u003e Logout button does nothing. Lists creation fails. User menu doesn’t appear.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat’s the expected behavior?\u003c/strong\u003e Logout should clear session and redirect to login. Lists creation should add a new list to the database. User menu should appear when logged in.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhere does the behavior break?\u003c/strong\u003e Frontend calling wrong endpoint? Backend missing the endpoint? Database operation failing? Authentication not working?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat evidence exists?\u003c/strong\u003e Network requests in browser console. Server logs. Database state. Error messages.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat’s the minimum fix?\u003c/strong\u003e Change endpoint path. Add missing route. Fix authentication extraction.\u003c/p\u003e\u003cp\u003eEach question narrows the problem space. By the time you’re ready to implement, you’re not fixing “logout doesn’t work.” You’re fixing “frontend calls /api/v1/auth/logout but backend expects /auth/logout.”\u003c/p\u003e\u003cp\u003eThe discipline is: don’t touch code until you can state the specific problem. If you can’t articulate exactly what’s broken, you don’t understand enough to fix it efficiently.\u003c/p\u003e\u003ch3\u003eWhen investigation doesn’t pay off\u003c/h3\u003e\u003cp\u003eInvestigation has diminishing returns in some contexts:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eObvious problems\u003c/strong\u003e: If the error message says “ModuleNotFoundError: No module named ‘foo’,” you don’t need investigation. Install foo.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExploratory work\u003c/strong\u003e: If you’re building something new, investigation has nothing to find. You need to implement to discover what the architecture should be.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTime-critical emergencies\u003c/strong\u003e: If production is down, start with likely fixes. Post-incident, investigate properly.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTruly novel bugs\u003c/strong\u003e: If no one has seen this kind of bug before, investigation might not surface patterns. You might need to experiment.\u003c/p\u003e\u003cp\u003eThe speed boost happened because the bugs were standard web application issues in an established codebase. Path mismatches and missing endpoints have well-understood fixes. Investigation surfaced the specific instances.\u003c/p\u003e\u003cp\u003eFor a bug that’s genuinely novel — a race condition in async code, a memory leak under specific conditions, a security vulnerability with subtle triggers — investigation might take longer and yield less dramatic speedups. The payoff is different for different problem types.\u003c/p\u003e\u003ch3\u003eInvestigation as documentation\u003c/h3\u003e\u003cp\u003eInvestigation produces more than faster fixes. It produces understanding.\u003c/p\u003e\u003cp\u003eThe thirty-minute investigation on Saturday created a classification system:\u003c/p\u003e\u003cul\u003e\u003cli\u003eType A bugs (simple path or config fixes) take about 5 minutes.\u003c/li\u003e\u003cli\u003eType B bugs (missing endpoint implementation) run 45–60 minutes.\u003c/li\u003e\u003cli\u003eType C bugs (logic errors in existing code) fall in the 15–30 minute range.\u003c/li\u003e\u003cli\u003eType D bugs (feature gaps requiring new development) need 90–120 minutes.\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eFuture bugs could be classified using this system. When a new bug arrives, the question becomes “is this Type A, B, C, or D?” The classification implies the fix approach and time estimate.\u003c/p\u003e\u003cp\u003eInvestigation isn’t just solving today’s problem. It’s building understanding that accelerates tomorrow’s problem-solving.\u003c/p\u003e\u003ch3\u003eThe investment mindset\u003c/h3\u003e\u003cp\u003eThe temptation under deadline pressure is to start fixing immediately. “Michelle arrives Monday. We don’t have time to investigate. Just fix things.”\u003c/p\u003e\u003cp\u003eThis is false economy. Fixing things without understanding wastes more time than it saves. The 35-minute estimate assumed some wrong turns. Investigation eliminated the wrong turns.\u003c/p\u003e\u003cp\u003eThe investment mindset asks: “What understanding would make this fix trivial?” Then invests time in acquiring that understanding.\u003c/p\u003e\u003cp\u003eSometimes the answer is “just look at the error message.” Sometimes it’s “trace the request through the full stack.” Sometimes it’s “read the original design document.” The investment varies. The principle doesn’t.\u003c/p\u003e\u003cp\u003eUnderstanding first. Implementation second.\u003c/p\u003e\u003ch3\u003eWhat transfers\u003c/h3\u003e\u003cp\u003eThe speed gain isn’t guaranteed for every bug. But the principle applies broadly:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDiagnose before treating\u003c/strong\u003e. Don’t start fixing until you can state specifically what’s broken. If you can’t articulate the problem, you don’t understand enough to fix it efficiently.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLook for existing work\u003c/strong\u003e. In complex codebases, features are often partially implemented. Investigation surfaces what exists before you rebuild it.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClassify problems\u003c/strong\u003e. Investigation produces categories. Categories enable pattern recognition. Pattern recognition accelerates future investigations.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMake investigation explicit\u003c/strong\u003e. Allocate investigation time in estimates. Track investigation separately from implementation. Make the investment visible so it can be managed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrust the investment\u003c/strong\u003e. Under deadline pressure, investigation feels like delay. It’s not. It’s compression. Thirty minutes of investigation that saves thirty minutes of wrong turns isn’t cost — it’s break-even. Thirty minutes that enables five-minute fixes is 7x return.\u003c/p\u003e\u003cp\u003eThe 30-minute investigation yielded a 5-minute implementation. That’s not luck. That’s the predictable return on understanding before acting.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Analysis as Acceleration, Not Delay, from December 8. When a 267-line wizard function needed refactoring, the temptation was to just start coding. Instead, 45 minutes of upfront analysis led to two hours of smooth implementation and an 82% code reduction.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced investigation dramatically accelerating implementation? What diagnostic approaches have served you well? When has the pressure to “just start fixing” led to wasted time?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=d416bebffbf6\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/investigation-as-investment-saving-time-in-advance-d416bebffbf6\"\u003eInvestigation as Investment: Saving Time in Advance\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3e9b,"])</script><script>self.__next_f.push([1,"\u003csection name=\"01e8\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"2d12\" id=\"2d12\" class=\"graf graf--h3 graf--leading graf--title\"\u003eInvestigation as Investment: Saving Time in Advance\u003c/h3\u003e\u003cfigure name=\"e35f\" id=\"e35f\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*cT5tj0uoNRSb5yoLTEc0xQ.png\" data-width=\"1536\" data-height=\"1024\" alt=\"A robot and a human work on a partially built robot; the robot reaches for tools while the human holds an X-ray revealing a loose wire and missing connector inside.\" src=\"https://cdn-images-1.medium.com/max/800/1*cT5tj0uoNRSb5yoLTEc0xQ.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Measure twice…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"2b8c\" id=\"2b8c\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 23\u003c/em\u003e\u003c/p\u003e\u003cp name=\"0b39\" id=\"0b39\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ehree high-priority bugs. Actual fix time: 5 minutes. That’s not a typo. Five minutes. Three bugs. All fixed.\u003c/p\u003e\u003cp name=\"3f77\" id=\"3f77\" class=\"graf graf--p graf-after--p\"\u003eIt wasn’t a matter of coding faster. It came from thirty minutes of systematic investigation before touching any code. Root cause analysis that revealed the bugs were simpler than they appeared. .\u003c/p\u003e\u003cp name=\"2134\" id=\"2134\" class=\"graf graf--p graf-after--p\"\u003eThis is investigation as investment: spending time to understand before spending time to implement.\u003c/p\u003e\u003ch3 name=\"7770\" id=\"7770\" class=\"graf graf--h3 graf-after--p\"\u003eThe speedup\u003c/h3\u003e\u003cp name=\"bc58\" id=\"bc58\" class=\"graf graf--p graf-after--h3\"\u003eSaturday was frantic. First alpha tester arriving Monday. Fourteen navigation issues identified during a full system walkthrough. The pressure to just start fixing things was immense.\u003c/p\u003e\u003cp name=\"af19\" id=\"af19\" class=\"graf graf--p graf-after--p\"\u003eInstead, we investigated first.\u003c/p\u003e\u003cp name=\"2f98\" id=\"2f98\" class=\"graf graf--p graf-after--p\"\u003ePhase 1 took thirty minutes. The goal wasn’t to fix anything — just to understand what was actually broken. Three high-priority issues examined: logout not working, lists creation failing, todos creation failing.\u003c/p\u003e\u003cp name=\"7c9e\" id=\"7c9e\" class=\"graf graf--p graf-after--p\"\u003eWhat the investigation revealed:\u003c/p\u003e\u003cp name=\"c4d9\" id=\"c4d9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #14 (Logout)\u003c/strong\u003e: The frontend called \u003ccode class=\"markup--code markup--p-code\"\u003e/api/v1/auth/logout\u003c/code\u003e. The backend expected \u003ccode class=\"markup--code markup--p-code\"\u003e/auth/logout\u003c/code\u003e. Path mismatch. Five-minute fix once you know what\u0026#39;s wrong.\u003c/p\u003e\u003cp name=\"b857\" id=\"b857\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #6 (Lists)\u003c/strong\u003e: The UI tried to POST to \u003ccode class=\"markup--code markup--p-code\"\u003e/api/v1/lists\u003c/code\u003e. That endpoint didn\u0026#39;t exist. The UI was built; the endpoint wasn\u0026#39;t wired up. Five-minute fix once you know what\u0026#39;s missing.\u003c/p\u003e\u003cp name=\"588e\" id=\"588e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #7 (Todos)\u003c/strong\u003e: Identical pattern to Issue #6. POST endpoint missing. Same fix pattern.\u003c/p\u003e\u003cp name=\"0aaf\" id=\"0aaf\" class=\"graf graf--p graf-after--p\"\u003eWithout investigation, each bug looks like “feature doesn’t work.” That could mean anything — authentication issues, database problems, validation failures, race conditions. The estimate of 35 minutes assumed some debugging, some experimentation, some wrong turns.\u003c/p\u003e\u003cp name=\"16c5\" id=\"16c5\" class=\"graf graf--p graf-after--p\"\u003eWith investigation, each bug has a specific diagnosis. Path mismatch. Missing endpoint. Missing endpoint. Implementation becomes mechanical: change the path, add the endpoint, add the endpoint.\u003c/p\u003e\u003cp name=\"aa4b\" id=\"aa4b\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eThis is “measure twice, cut once” on steroids.\u003c/em\u003e\u003c/p\u003e\u003cp name=\"27df\" id=\"27df\" class=\"graf graf--p graf-after--p\"\u003eThirty minutes of investigation. Five minutes of implementation.\u003c/p\u003e\u003ch3 name=\"e5dc\" id=\"e5dc\" class=\"graf graf--h3 graf-after--p\"\u003eThat ol’ “75% complete” pattern\u003c/h3\u003e\u003cp name=\"a8ee\" id=\"a8ee\" class=\"graf graf--p graf-after--h3\"\u003eInvestigation revealed something broader than individual bugs. Many features were 75–90% complete.\u003c/p\u003e\u003cp name=\"4d96\" id=\"4d96\" class=\"graf graf--p graf-after--p\"\u003eThe Lists UI existed. The buttons existed. The forms existed. The styling existed. The only thing missing: the POST endpoint to actually create a list.\u003c/p\u003e\u003cp name=\"4a4b\" id=\"4a4b\" class=\"graf graf--p graf-after--p\"\u003eThis pattern repeated across the codebase. Elements existed but wiring was incomplete. Frontend built but backend missing. Backend ready but frontend not connected. Features that looked broken were actually almost finished.\u003c/p\u003e\u003cp name=\"42a2\" id=\"42a2\" class=\"graf graf--p graf-after--p\"\u003eWithout investigation, you might rebuild the whole feature. “Lists aren’t working” becomes “let’s implement lists.” Hours of work recreating what already exists.\u003c/p\u003e\u003cp name=\"18ab\" id=\"18ab\" class=\"graf graf--p graf-after--p\"\u003eWith investigation, you find the gap. “Lists aren’t working because POST /api/v1/lists doesn’t exist.” Ten minutes to add the endpoint. Feature works.\u003c/p\u003e\u003cp name=\"100b\" id=\"100b\" class=\"graf graf--p graf-after--p\"\u003eInvestigation isn’t just finding bugs. It’s finding what’s already built. In a complex codebase — especially one built by multiple agents across many sessions — significant work might exist that no one remembers building. Investigation surfaces that work.\u003c/p\u003e\u003ch3 name=\"a460\" id=\"a460\" class=\"graf graf--h3 graf-after--p\"\u003eInvestigation vs implementation time\u003c/h3\u003e\u003cp name=\"edde\" id=\"edde\" class=\"graf graf--p graf-after--h3\"\u003eHere’s how the Saturday numbers broke down:\u003c/p\u003e\u003cp name=\"5bbf\" id=\"5bbf\" class=\"graf graf--p graf-after--p\"\u003eThe three high-priority bugs took 30 minutes to investigate and just 5 minutes to implement — a 7x speedup. Three medium-priority bugs followed a similar pattern: 20 minutes of investigation, 15 minutes of implementation, roughly 3x faster than diving straight in. The Frontend RBAC work (Option B) was estimated at 6–7 hours but completed in 54 minutes; investigation had moved the discovery phase earlier, yielding a 6–8x improvement. Even alpha documentation benefited: 15 minutes of investigation followed by 40 minutes of writing, about 1.8x faster than starting cold.\u003c/p\u003e\u003cp name=\"c414\" id=\"c414\" class=\"graf graf--p graf-after--p\"\u003eThe pattern: investigation time is rarely wasted. Even when it doesn’t dramatically accelerate implementation, it prevents wrong turns and wasted effort.\u003c/p\u003e\u003cp name=\"57ff\" id=\"57ff\" class=\"graf graf--p graf-after--p\"\u003eWhen investigation revealed Issue #8 (Files UI) would require 90–120 minutes — significantly more than other bugs — we made an informed decision to defer it. Backend was ready; frontend work could wait. Without investigation, we might have started the fix, discovered the scope mid-implementation, and lost time to the false start.\u003c/p\u003e\u003cp name=\"d57d\" id=\"d57d\" class=\"graf graf--p graf-after--p\"\u003eInvestigation enables better decisions about what to work on, not just how to work on it.\u003c/p\u003e\u003ch3 name=\"7613\" id=\"7613\" class=\"graf graf--h3 graf-after--p\"\u003eWhat investigation actually looks like\u003c/h3\u003e\u003cp name=\"5929\" id=\"5929\" class=\"graf graf--p graf-after--h3\"\u003eEffective investigation isn’t “look at the code until inspiration strikes.” It’s systematic analysis with specific questions:\u003c/p\u003e\u003cp name=\"2454\" id=\"2454\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat’s the user-visible symptom?\u003c/strong\u003e Logout button does nothing. Lists creation fails. User menu doesn’t appear.\u003c/p\u003e\u003cp name=\"b551\" id=\"b551\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat’s the expected behavior?\u003c/strong\u003e Logout should clear session and redirect to login. Lists creation should add a new list to the database. User menu should appear when logged in.\u003c/p\u003e\u003cp name=\"1a5d\" id=\"1a5d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhere does the behavior break?\u003c/strong\u003e Frontend calling wrong endpoint? Backend missing the endpoint? Database operation failing? Authentication not working?\u003c/p\u003e\u003cp name=\"c1b3\" id=\"c1b3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat evidence exists?\u003c/strong\u003e Network requests in browser console. Server logs. Database state. Error messages.\u003c/p\u003e\u003cp name=\"4571\" id=\"4571\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat’s the minimum fix?\u003c/strong\u003e Change endpoint path. Add missing route. Fix authentication extraction.\u003c/p\u003e\u003cp name=\"6a04\" id=\"6a04\" class=\"graf graf--p graf-after--p\"\u003eEach question narrows the problem space. By the time you’re ready to implement, you’re not fixing “logout doesn’t work.” You’re fixing “frontend calls /api/v1/auth/logout but backend expects /auth/logout.”\u003c/p\u003e\u003cp name=\"bba0\" id=\"bba0\" class=\"graf graf--p graf-after--p\"\u003eThe discipline is: don’t touch code until you can state the specific problem. If you can’t articulate exactly what’s broken, you don’t understand enough to fix it efficiently.\u003c/p\u003e\u003ch3 name=\"ec3d\" id=\"ec3d\" class=\"graf graf--h3 graf-after--p\"\u003eWhen investigation doesn’t pay off\u003c/h3\u003e\u003cp name=\"a484\" id=\"a484\" class=\"graf graf--p graf-after--h3\"\u003eInvestigation has diminishing returns in some contexts:\u003c/p\u003e\u003cp name=\"6022\" id=\"6022\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eObvious problems\u003c/strong\u003e: If the error message says “ModuleNotFoundError: No module named ‘foo’,” you don’t need investigation. Install foo.\u003c/p\u003e\u003cp name=\"12f9\" id=\"12f9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eExploratory work\u003c/strong\u003e: If you’re building something new, investigation has nothing to find. You need to implement to discover what the architecture should be.\u003c/p\u003e\u003cp name=\"c56e\" id=\"c56e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTime-critical emergencies\u003c/strong\u003e: If production is down, start with likely fixes. Post-incident, investigate properly.\u003c/p\u003e\u003cp name=\"2c5e\" id=\"2c5e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTruly novel bugs\u003c/strong\u003e: If no one has seen this kind of bug before, investigation might not surface patterns. You might need to experiment.\u003c/p\u003e\u003cp name=\"5ff4\" id=\"5ff4\" class=\"graf graf--p graf-after--p\"\u003eThe speed boost happened because the bugs were standard web application issues in an established codebase. Path mismatches and missing endpoints have well-understood fixes. Investigation surfaced the specific instances.\u003c/p\u003e\u003cp name=\"3aa7\" id=\"3aa7\" class=\"graf graf--p graf-after--p\"\u003eFor a bug that’s genuinely novel — a race condition in async code, a memory leak under specific conditions, a security vulnerability with subtle triggers — investigation might take longer and yield less dramatic speedups. The payoff is different for different problem types.\u003c/p\u003e\u003ch3 name=\"b92e\" id=\"b92e\" class=\"graf graf--h3 graf-after--p\"\u003eInvestigation as documentation\u003c/h3\u003e\u003cp name=\"6e28\" id=\"6e28\" class=\"graf graf--p graf-after--h3\"\u003eInvestigation produces more than faster fixes. It produces understanding.\u003c/p\u003e\u003cp name=\"bf99\" id=\"bf99\" class=\"graf graf--p graf-after--p\"\u003eThe thirty-minute investigation on Saturday created a classification system:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c40e\" id=\"c40e\" class=\"graf graf--li graf-after--p\"\u003eType A bugs (simple path or config fixes) take about 5 minutes.\u003c/li\u003e\u003cli name=\"f463\" id=\"f463\" class=\"graf graf--li graf-after--li\"\u003eType B bugs (missing endpoint implementation) run 45–60 minutes.\u003c/li\u003e\u003cli name=\"85e7\" id=\"85e7\" class=\"graf graf--li graf-after--li\"\u003eType C bugs (logic errors in existing code) fall in the 15–30 minute range.\u003c/li\u003e\u003cli name=\"9863\" id=\"9863\" class=\"graf graf--li graf-after--li\"\u003eType D bugs (feature gaps requiring new development) need 90–120 minutes.\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"da1a\" id=\"da1a\" class=\"graf graf--p graf-after--li\"\u003eFuture bugs could be classified using this system. When a new bug arrives, the question becomes “is this Type A, B, C, or D?” The classification implies the fix approach and time estimate.\u003c/p\u003e\u003cp name=\"a1ed\" id=\"a1ed\" class=\"graf graf--p graf-after--p\"\u003eInvestigation isn’t just solving today’s problem. It’s building understanding that accelerates tomorrow’s problem-solving.\u003c/p\u003e\u003ch3 name=\"c1d0\" id=\"c1d0\" class=\"graf graf--h3 graf-after--p\"\u003eThe investment mindset\u003c/h3\u003e\u003cp name=\"c2bb\" id=\"c2bb\" class=\"graf graf--p graf-after--h3\"\u003eThe temptation under deadline pressure is to start fixing immediately. “Michelle arrives Monday. We don’t have time to investigate. Just fix things.”\u003c/p\u003e\u003cp name=\"606a\" id=\"606a\" class=\"graf graf--p graf-after--p\"\u003eThis is false economy. Fixing things without understanding wastes more time than it saves. The 35-minute estimate assumed some wrong turns. Investigation eliminated the wrong turns.\u003c/p\u003e\u003cp name=\"dd9c\" id=\"dd9c\" class=\"graf graf--p graf-after--p\"\u003eThe investment mindset asks: “What understanding would make this fix trivial?” Then invests time in acquiring that understanding.\u003c/p\u003e\u003cp name=\"9486\" id=\"9486\" class=\"graf graf--p graf-after--p\"\u003eSometimes the answer is “just look at the error message.” Sometimes it’s “trace the request through the full stack.” Sometimes it’s “read the original design document.” The investment varies. The principle doesn’t.\u003c/p\u003e\u003cp name=\"3308\" id=\"3308\" class=\"graf graf--p graf-after--p\"\u003eUnderstanding first. Implementation second.\u003c/p\u003e\u003ch3 name=\"66c9\" id=\"66c9\" class=\"graf graf--h3 graf-after--p\"\u003eWhat transfers\u003c/h3\u003e\u003cp name=\"cce2\" id=\"cce2\" class=\"graf graf--p graf-after--h3\"\u003eThe speed gain isn’t guaranteed for every bug. But the principle applies broadly:\u003c/p\u003e\u003cp name=\"904c\" id=\"904c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDiagnose before treating\u003c/strong\u003e. Don’t start fixing until you can state specifically what’s broken. If you can’t articulate the problem, you don’t understand enough to fix it efficiently.\u003c/p\u003e\u003cp name=\"27b4\" id=\"27b4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLook for existing work\u003c/strong\u003e. In complex codebases, features are often partially implemented. Investigation surfaces what exists before you rebuild it.\u003c/p\u003e\u003cp name=\"8e59\" id=\"8e59\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eClassify problems\u003c/strong\u003e. Investigation produces categories. Categories enable pattern recognition. Pattern recognition accelerates future investigations.\u003c/p\u003e\u003cp name=\"5432\" id=\"5432\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMake investigation explicit\u003c/strong\u003e. Allocate investigation time in estimates. Track investigation separately from implementation. Make the investment visible so it can be managed.\u003c/p\u003e\u003cp name=\"ffa1\" id=\"ffa1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTrust the investment\u003c/strong\u003e. Under deadline pressure, investigation feels like delay. It’s not. It’s compression. Thirty minutes of investigation that saves thirty minutes of wrong turns isn’t cost — it’s break-even. Thirty minutes that enables five-minute fixes is 7x return.\u003c/p\u003e\u003cp name=\"59fd\" id=\"59fd\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe 30-minute investigation yielded a 5-minute implementation. That’s not luck. That’s the predictable return on understanding before acting.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Investigation as Investment: Saving Time in Advance\",\"excerpt\":\"“Measure twice…”November 23Three high-priority bugs. Actual fix time: 5 minutes. That’s not a typo. Five minutes. Three bugs. All fixed.It wasn’t a matter of coding faster. It came from thirty minutes of systematic investigation before touching any code. Root cause analysis that revealed the bugs...\",\"url\":\"/blog/investigation-as-investment\",\"publishedAt\":\"Feb 14, 2026\",\"publishedAtISO\":\"2026-02-14T14:17:04.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/d416bebffbf6\",\"featuredImage\":\"/assets/blog-images/d416bebffbf6-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/investigation-as-investment-saving-time-in-advance-d416bebffbf6?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"investigation-as-investment\",\"workDate\":\"Feb 14, 2026\",\"workDateISO\":\"2026-02-14T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-02-14\",\"featured\":false},\"content\":{\"title\":\"Investigation as Investment: Saving Time in Advance\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Investigation as Investment: Saving Time in Advance | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"Investigation as Investment: Saving Time in Advance\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"Investigation as Investment: Saving Time in Advance\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
