ts\":\"$undefined\",\"template\":[\"$\",\"$Lc\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-ab0210ff8c4483f5.js\"],\"BlogPostContent\"]\n1a:T1f48,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eFebruary 25 – May 12, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eEver since I gave my agents mailboxes, I've had to remind them manually to check their inboxes for new memos from other agents. I try to remember to nudge them at session start and whenever I notice that they have new mail, including after compaction.\u003c/p\u003e\n\u003cp\u003eContext compaction is what happens when a conversation with Claude gets too long. The system summarizes earlier content to make room for new work. It's necessary, but it has a cost — details get lost. Things that were discussed earlier might not survive the summary.\u003c/p\u003e\n\u003cp\u003eThe mailbox rule existed because of this cost. Important information that arrived during a session might vanish during compaction. If you don't check the mailbox after compaction, you might miss something critical that was sent to you earlier.\u003c/p\u003e\n\u003cp\u003eIt was a good rule. We agreed it was important. And my agents kept forgetting to follow it.\u003c/p\u003e\n\u003ch1\u003eThe compliance problem\u003c/h1\u003e\n\u003cp\u003eRules that depend on memory have a structural weakness: memory fails. Humans forget. AI agents lose context to compaction. The mechanism differs but the outcome is the same — a rule you agreed to follow doesn't fire.\u003c/p\u003e\n\u003cp\u003eIt's not about discipline or caring. My Lead Developer agent cared deeply about checking the mailbox. After a long implementation session, context compacts, and the agent is picking up where it left off with fresh context — the mailbox check often just doesn't happen. The rule exists. The intention exists. The behavior doesn't.\u003c/p\u003e\n\u003cp\u003eWe tried reminders. We added it to the session protocols. We documented it prominently. Compliance improved, but it never reached reliability.\u003c/p\u003e\n\u003cp\u003eThe rule was right. The enforcement mechanism was wrong.\u003c/p\u003e\n\u003ch1\u003eGadzooks! enter Claude's hooks...\u003c/h1\u003e\n\u003cp\u003eSo now we've built a small shell script — the session-start hook — that runs automatically before every agent session begins. Four checks, executed without anyone having to remember:\u003c/p\u003e\n\u003cp\u003e\u003col\u003e\u003cli\u003e\u003cstrong\u003eSession log continuity\u003c/strong\u003e — find today's log if one exists, so the agent can resume rather than restart\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eMailbox check\u003c/strong\u003e — count unread messages across all role inboxes\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eBriefing freshness\u003c/strong\u003e — warn if the project's current-state briefing is more than seven days stale\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eRole identity\u003c/strong\u003e — remind the agent which role they're playing in this session\u003c/li\u003e\u003c/ol\u003e\u003c/p\u003e\n\u003cp\u003eThe checks that kept getting forgotten now happen automatically. Not because anyone remembers to do them — because they're infrastructure.\u003c/p\u003e\n\u003cp\u003eThe mailbox rule didn't change. What changed was its enforcement layer. It moved from protocol (something you're supposed to do) to infrastructure (something that happens).\u003c/p\u003e\n\u003ch1\u003eProtocol vs infrastructure\u003c/h1\u003e\n\u003cp\u003eThis distinction matters more than it might seem.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProtocols\u003c/strong\u003e are agreements about behavior. They're documented, discussed, agreed upon. They depend on people remembering and choosing to follow them. They fail when attention lapses, when context shifts, when the pressure of immediate work crowds out the discipline of process.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInfrastructure\u003c/strong\u003e is environment that shapes behavior. It doesn't ask for compliance — it creates conditions where the right thing happens automatically. You don't decide to check the mailbox; the system surfaces unread items before you can proceed.\u003c/p\u003e\n\u003cp\u003eProtocols require ongoing effort. Infrastructure requires upfront investment but then runs on its own.\u003c/p\u003e\n\u003ch1\u003eThe graduation pattern\u003c/h1\u003e\n\u003cp\u003eLooking back at how Piper Morgan's methodology evolved, I see a pattern:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStage 1: Discovery.\u003c/strong\u003e We notice a problem. Context gets lost after compaction. Important memos get missed. Something keeps going wrong.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStage 2: Protocol.\u003c/strong\u003e We create a rule to address it. \"Always check mailbox after compaction.\" The rule works when followed.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStage 3: Failure.\u003c/strong\u003e The rule isn't followed reliably. Not because people disagree with it, but because protocol compliance is inherently fragile.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStage 4: Infrastructure.\u003c/strong\u003e We encode the rule into the environment. The check happens automatically. Compliance becomes structural rather than behavioral.\u003c/p\u003e\n\u003cp\u003eThis is methodology graduating to infrastructure. The insight stays the same — checking the mailbox matters. The enforcement mechanism matures from \"remember to do this\" to \"this happens.\"\u003c/p\u003e\n\u003ch2\u003eWhat else could graduate?\u003c/h2\u003e\n\u003cp\u003eOnce you see this pattern, you start noticing other protocols waiting for infrastructure:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Always run tests before committing\"\u003c/strong\u003e — This is a protocol for most teams. For teams with pre-commit hooks, it's infrastructure. The graduation is a shell script.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Document architectural decisions\"\u003c/strong\u003e — Protocol: remember to write Architectural Decision Records (ADRs). Infrastructure: templates that prompt for decisions, continuous integration (CI) checks that flag undocumented changes.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Review code before merging\"\u003c/strong\u003e — Protocol: ask someone to review. Infrastructure: branch protection rules that require approval.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\"Check for breaking changes\"\u003c/strong\u003e — Protocol: think carefully about compatibility. Infrastructure: automated compatibility testing in CI.\u003c/p\u003e\n\u003cp\u003eEach of these starts as something people agree to do. Each can become something the environment ensures happens.\u003c/p\u003e\n\u003ch1\u003eThe cost of graduation\u003c/h1\u003e\n\u003cp\u003eInfrastructure isn't free. The session-start hook took time to implement. It requires maintenance. It adds complexity to the development environment.\u003c/p\u003e\n\u003cp\u003eNot every protocol should graduate. Some rules are context-dependent in ways that resist automation. Some are too rare to justify the investment. Some need human judgment that can't be encoded.\u003c/p\u003e\n\u003cp\u003eThe question isn't \"can this become infrastructure?\" — almost anything can, with enough effort. The question is \"should this become infrastructure?\" The answer depends on:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eHow often does the protocol need to be followed?\u003c/li\u003e\u003cli\u003eHow reliably do people follow it without enforcement?\u003c/li\u003e\u003cli\u003eHow severe are the consequences of non-compliance?\u003c/li\u003e\u003cli\u003eHow complex would the infrastructure be to build and maintain?\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eFor the mailbox check: frequently needed, unreliably followed, consequences were missed information and duplicated work, infrastructure was a simple shell script. Easy graduation.\u003c/p\u003e\n\u003cp\u003eFor something like \"make good architectural decisions\" — frequently needed, but what would infrastructure even look like? Some things remain protocols because they require judgment that can't be automated.\u003c/p\u003e\n\u003ch1\u003eImplications for your methodology\u003c/h1\u003e\n\u003cp\u003eBuilding Piper Morgan has taught me to think about methodology in two layers:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe insight layer\u003c/strong\u003e: What practices make development better? What should we do?\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe enforcement layer\u003c/strong\u003e: How do we ensure the practices actually happen? Protocol or infrastructure?\u003c/p\u003e\n\u003cp\u003eEarly in a project, everything is protocol. You're discovering what works, documenting agreements, building shared understanding. Protocols are fast to create and easy to change.\u003c/p\u003e\n\u003cp\u003eAs practices stabilize, the best ones graduate. The things that matter most, that need to happen reliably, that keep getting forgotten — those become infrastructure. The insight stays the same. The enforcement matures.\u003c/p\u003e\n\u003cp\u003eThe session-start hook isn't a big feature. But it represents something important: methodology that doesn't depend on memory. Rules that enforce themselves. A system that does the right thing automatically, not because anyone decided to do it, but because the environment makes it happen.\u003c/p\u003e\n\u003cp\u003eThat's the graduation worth pursuing.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Log That Fact-Checked Itself.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhat protocol on your team is waiting to become infrastructure?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"From Protocol to Infrastructure\",\"guid\":\"blog-first-6611e3b8c185\",\"url\":\"/blog/from-protocol-to-infrastructure\",\"publishedAt\":\"May 17, 2026\",\"workDate\":\"Feb 25, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/from-protocol-to-infrastructure.webp\",\"imageAlt\":\"A weary nonhuman gardener manually watering struggling plants amid reminder signs labeled with protocols, contrasted with the same gardener relaxing in a peaceful automated garden thriving under drip irrigation infrastructure.\",\"imageCaption\":\"\\\"\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"From Protocol to Infrastructure\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"From Protocol to Infrastructure | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"February 25 – May 12, 2026 Ever since I gave my agents mailboxes, I've had to remind them manually to check their inboxes for new memos from other agents. I try to remember to nudge them at session start and whenever I notice t
