eStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T30c8,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"Hand-drawn cartoon of a human and robot teammates carefully setting up a long line of dominoes on one side of a table while, on the other side, the dominoes cascade rapidly after the first one is tipped.\" src=\"https://cdn-images-1.medium.com/max/1024/1*WAifRWFKW6zP_EYiQweTbg.png\" /\u003e\u003cfigcaption\u003e“Ready!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 22\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe SEC-RBAC security epic was estimated at 2–3 weeks. It took approximately 8 hours.\u003c/p\u003e\u003cp\u003eNot 8 hours of heroic coding. Not 8 hours of cutting corners. Not 8 hours that would create 8 weeks of technical debt. Eight hours of systematic execution, finishing 45% ahead of even the optimistic estimates.\u003c/p\u003e\u003cp\u003eThis isn’t a story about working faster. It’s a story about preparation front-loading the hard work until execution becomes almost mechanical.\u003c/p\u003e\u003ch3\u003eThe estimate wasn’t wrong\u003c/h3\u003e\u003cp\u003eSprint S1 — the security foundation sprint — was scoped at 81 hours total. RBAC alone was estimated at 20–24 hours. Encryption at rest another 24–30 hours. Supporting work for the remainder.\u003c/p\u003e\u003cp\u003eThese weren’t pessimistic estimates. They were based on reasonable assumptions:\u003c/p\u003e\u003cul\u003e\u003cli\u003ePhase 1.1 (database schema): 4–6 hours\u003c/li\u003e\u003cli\u003ePhase 1.2 (service layer): 8–12 hours\u003c/li\u003e\u003cli\u003ePhase 1.3 (endpoint protection): 4–6 hours\u003c/li\u003e\u003cli\u003ePhase 1.4 (shared resources): 4–6 hours\u003c/li\u003e\u003cli\u003ePhase 2 (role-based permissions): 6–8 hours\u003c/li\u003e\u003cli\u003ePhase 3 (admin and testing): 4–6 hours\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEach estimate assumed some discovery work, some problem-solving, some iteration. Normal software development.\u003c/p\u003e\u003cp\u003eWhat the estimates didn’t account for: we’d already done most of the discovery work.\u003c/p\u003e\u003ch3\u003ePhase 0 was the real work\u003c/h3\u003e\u003cp\u003eThe security sprint had a Phase 0: audit and planning. Six comprehensive reports created before any implementation began:\u003c/p\u003e\u003col\u003e\u003cli\u003ePhase -1 verification (infrastructure assessment)\u003c/li\u003e\u003cli\u003eClarifications research (recommendations)\u003c/li\u003e\u003cli\u003eAPI endpoint catalog (56 endpoints mapped)\u003c/li\u003e\u003cli\u003eService methods inventory (47 methods identified)\u003c/li\u003e\u003cli\u003eRisk assessment (P0 and P1 blockers categorized)\u003c/li\u003e\u003cli\u003ePhase 0 completion summary\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eThis audit took time — multiple sessions, deep investigation, comprehensive documentation. It didn’t feel like progress. No code was written. No tests passed. No features shipped.\u003c/p\u003e\u003cp\u003eBut when execution day arrived, there was nothing left to figure out.\u003c/p\u003e\u003cp\u003eThe endpoint catalog meant Phase 1.3 knew exactly which endpoints needed protection before writing any code. The service methods inventory meant Phase 1.2 had a checklist, not a discovery process. The risk assessment meant priorities were already set.\u003c/p\u003e\u003cp\u003ePhase 0 wasn’t overhead. It was the work. Everything after was mechanical application of decisions already made.\u003c/p\u003e\u003ch3\u003eArchitecture decisions as force multipliers\u003c/h3\u003e\u003cp\u003eADR-044 decided the fundamental approach: Lightweight RBAC using JSONB columns rather than traditional role and permission tables.\u003c/p\u003e\u003cp\u003eThis decision was made days before implementation. The Chief Architect evaluated options, documented trade-offs, recommended an approach, got approval. His assessment was blunt: “Traditional RBAC would be architectural astronauting at our current scale. Building for 10,000 users when we have \u0026lt;100 is how projects die from complexity before reaching users.”\u003c/p\u003e\u003cp\u003eThe traditional approach — role tables, permission tables, junction tables — would have taken 2–3 weeks. The lightweight approach took 5 hours. Both met our security requirements. Only one let us ship on time.\u003c/p\u003e\u003cp\u003eWhen Phase 2 implementation began, nobody debated whether to use JSONB or separate tables. That question was answered.\u003c/p\u003e\u003cp\u003eThe implementation followed directly from the decision:\u003c/p\u003e\u003cpre\u003eJSONB upgrade: [\u0026quot;uuid\u0026quot;] → [{\u0026quot;user_id\u0026quot;: \u0026quot;uuid\u0026quot;, \u0026quot;role\u0026quot;: \u0026quot;viewer\u0026quot;}]\u003cbr\u003eApplied to lists and todos tables\u003cbr\u003eExisting shares default to \u0026quot;viewer\u0026quot;\u003c/pre\u003e\u003cp\u003eClear architectural decisions become implementation specifications. The team doesn’t stop to think; they execute the specification.\u003c/p\u003e\u003cp\u003eEvery architectural decision made before implementation day was time saved during implementation day. ADR-044 probably saved 2–4 hours of implementation-time debate and iteration.\u003c/p\u003e\u003ch3\u003ePatterns established, patterns reused\u003c/h3\u003e\u003cp\u003eThe first service to get ownership validation was KnowledgeGraphService — 20 methods across service and repository layers. That implementation established the pattern:\u003c/p\u003e\u003cul\u003e\u003cli\u003eOptional owner_id parameter\u003c/li\u003e\u003cli\u003eConditional filtering when provided\u003c/li\u003e\u003cli\u003e404 responses for non-owned resources (prevents information leakage)\u003c/li\u003e\u003cli\u003eTests validating ownership boundaries\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eOnce the pattern was established, applying it to ProjectRepository (7 methods), FileRepository (14 methods), and six other services was mechanical. Same pattern, different services. The second service took half the time of the first. The sixth took a quarter.\u003c/p\u003e\u003cp\u003ePattern reuse isn’t just code efficiency. It’s cognitive efficiency. The agent doesn’t need to think about \u003cem\u003ehow\u003c/em\u003e to implement ownership validation. It just applies the established pattern to new services.\u003c/p\u003e\u003cp\u003eThis is why Phase 1.2 — estimated at 8–12 hours for 67+ methods — completed so quickly. The pattern was figured out once and applied many times.\u003c/p\u003e\u003ch3\u003eCompletion matrices as execution guides\u003c/h3\u003e\u003cp\u003eEach phase had a completion matrix: explicit lists of what needed to be done, with clear done/not-done states.\u003c/p\u003e\u003cp\u003ePhase 1.2 completion matrix listed every service and every method:\u003c/p\u003e\u003cul\u003e\u003cli\u003eFileRepository: 14 methods (done/not done for each)\u003c/li\u003e\u003cli\u003eKnowledgeGraphService: 12 methods\u003c/li\u003e\u003cli\u003eProjectRepository: 7 methods\u003c/li\u003e\u003cli\u003eUniversalListRepository: 11 methods\u003c/li\u003e\u003cli\u003e… and so on\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe agent didn’t need to discover what work remained. The matrix showed it. Progress was measurable. Scope was explicit. Nothing was ambiguous.\u003c/p\u003e\u003cp\u003eWhen the completion matrix says “67 methods across 9 services,” the agent knows exactly what success looks like. No scope creep. No “one more thing.” Just: execute the matrix.\u003c/p\u003e\u003cp\u003ePhase 2’s permission matrix was similarly explicit:\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/944/1*Q7STdniZCnzliCEbrVNaSg.png\" /\u003e\u003c/figure\u003e\u003cp\u003eTwenty-four test cases fell directly out of this matrix: 4 roles × 6 operations. No ambiguity about what to test. The specification \u003cem\u003ewas\u003c/em\u003e the test plan.\u003c/p\u003e\u003ch3\u003eAutonomous prompt discovery\u003c/h3\u003e\u003cp\u003eSomething unexpected happened during Phase 1.4. I told the Code agent “there’s a new prompt for Phase 1.4” and the agent found it.\u003c/p\u003e\u003cp\u003eNot because I gave detailed instructions. The agent searched dev/active/agent-prompt-sec-rbac-phase* based on naming convention, found the prompt, validated that prerequisites were complete, and executed the work.\u003c/p\u003e\u003cp\u003ePM coordination overhead for that phase transition: zero minutes.\u003c/p\u003e\u003cp\u003eThis wasn’t magic. It was systematic infrastructure. Prompts lived in predictable locations with predictable names. Prerequisites were documented in the prompts. The agent had patterns for searching, reading, and executing.\u003c/p\u003e\u003cp\u003eWhen coordination infrastructure is good enough, coordination becomes invisible. The agent just finds what it needs.\u003c/p\u003e\u003ch3\u003eWhy 8 hours instead of 3 weeks\u003c/h3\u003e\u003cp\u003eThe 8-hour execution wasn’t faster coding. It was less work to do.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/944/1*voURXHcS6QafYVi2Wp5s0Q.png\" /\u003e\u003c/figure\u003e\u003cp\u003eEach row represents hours saved. Discovery during Phase 0 instead of implementation saves maybe 6–8 hours. ADR decisions save 2–4 hours of debate. Pattern reuse saves maybe 4–6 hours of reinvention. Completion matrices save 2–3 hours of scope management. Autonomous coordination saves 1–2 hours of context switching.\u003c/p\u003e\u003cp\u003eAdd it up: 15–23 hours of work that simply didn’t need to happen during execution day because it happened earlier.\u003c/p\u003e\u003cp\u003eThe 3-week estimate assumed that work would happen during implementation. When it happened during preparation instead, implementation became mechanical.\u003c/p\u003e\u003ch3\u003eThe real cost\u003c/h3\u003e\u003cp\u003eFront-loading isn’t free. Phase 0 took significant time. ADR creation and review took time. Building coordination infrastructure took time. Creating completion matrices took time.\u003c/p\u003e\u003cp\u003eIf you measure only “time from sprint start to feature complete,” preparation looks like overhead. The security audit doesn’t ship features. ADRs don’t pass tests. Completion matrices aren’t code.\u003c/p\u003e\u003cp\u003eBut if you measure “time from project start to feature complete,” preparation is obviously investment. Every hour of Phase 0 saved multiple hours during Phases 1–3. The return on preparation was 3–5x.\u003c/p\u003e\u003cp\u003eThe teams that ship fastest aren’t the ones that start implementing fastest. They’re the ones whose preparation makes implementation almost trivial.\u003c/p\u003e\u003ch3\u003eWhen this doesn’t work\u003c/h3\u003e\u003cp\u003eFront-loading works when:\u003c/p\u003e\u003cul\u003e\u003cli\u003eRequirements are reasonably stable\u003c/li\u003e\u003cli\u003ePatterns apply across multiple implementations\u003c/li\u003e\u003cli\u003eArchitecture decisions are tractable before coding\u003c/li\u003e\u003cli\u003eThe team can maintain context across preparation and execution\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eFront-loading fails when:\u003c/p\u003e\u003cul\u003e\u003cli\u003eRequirements will change significantly during implementation\u003c/li\u003e\u003cli\u003eEach feature is genuinely unique (no patterns to establish)\u003c/li\u003e\u003cli\u003eYou need to build to learn what the architecture should be\u003c/li\u003e\u003cli\u003eLong gaps between preparation and execution lose context\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe SEC-RBAC epic was a good candidate for front-loading: security requirements were clear, patterns applied across all services, architecture options were well-understood, and execution followed preparation within days.\u003c/p\u003e\u003cp\u003eExploratory work — figuring out what to build rather than building a known thing — might need a different approach. Sometimes you need to start implementing to discover what the architecture should be.\u003c/p\u003e\u003ch3\u003eThe transfer\u003c/h3\u003e\u003cp\u003eHere’s what transfers to other projects:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAudit before building\u003c/strong\u003e. Map the landscape. Catalog what exists. Identify what needs to change. This investment pays off in execution clarity.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecide architecture separately from implementation\u003c/strong\u003e. ADRs, design docs, technical specifications — whatever format works. The point is: don’t debate during implementation. Debate before. Document the decision. Execute the decision.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEstablish patterns explicitly\u003c/strong\u003e. The first implementation of a pattern is learning. Document what you learned. Make subsequent implementations mechanical application, not repeated discovery.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCreate explicit completion criteria\u003c/strong\u003e. Matrices, checklists, acceptance criteria — whatever makes scope unambiguous. When “done” is explicit, progress is measurable and scope is contained.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInvest in coordination infrastructure\u003c/strong\u003e. Naming conventions, prompt discovery, handoff protocols — whatever makes coordination invisible. Time saved on coordination is time available for execution.\u003c/p\u003e\u003cp\u003eThe 8-hour epic wasn’t a fluke. It was the predictable result of systematic preparation making execution mechanical.\u003c/p\u003e\u003cp\u003eThree weeks of work, done in 8 hours. Not by working faster. By doing less work during execution — because the work had already been done during preparation.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Grammar as Decision Tool — on how the meaning of what you are building can help you figure out what exactly to build and how to build it.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced preparation dramatically accelerating execution? What front-loading investments paid off most? When has rushing to start cost more time than careful preparation?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=a7a50c14ae0f\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/8-hours-vs-3-weeks-when-preparation-becomes-speed-a7a50c14ae0f\"\u003e8 Hours vs 3 Weeks: When Preparation Becomes Speed\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T4992,"])</script><script>self.__next_f.push([1,"\u003csection name=\"3d7b\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"e4fb\" id=\"e4fb\" class=\"graf graf--h3 graf--leading graf--title\"\u003e8 Hours vs 3 Weeks: When Preparation Becomes Speed\u003c/h3\u003e\u003cfigure name=\"a783\" id=\"a783\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*WAifRWFKW6zP_EYiQweTbg.png\" data-width=\"1536\" data-height=\"1024\" alt=\"Hand-drawn cartoon of a human and robot teammates carefully setting up a long line of dominoes on one side of a table while, on the other side, the dominoes cascade rapidly after the first one is tipped.\" src=\"https://cdn-images-1.medium.com/max/800/1*WAifRWFKW6zP_EYiQweTbg.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Ready!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"f8e7\" id=\"f8e7\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 22\u003c/em\u003e\u003c/p\u003e\u003cp name=\"c9ec\" id=\"c9ec\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ehe SEC-RBAC security epic was estimated at 2–3 weeks. It took approximately 8 hours.\u003c/p\u003e\u003cp name=\"2a02\" id=\"2a02\" class=\"graf graf--p graf-after--p\"\u003eNot 8 hours of heroic coding. Not 8 hours of cutting corners. Not 8 hours that would create 8 weeks of technical debt. Eight hours of systematic execution, finishing 45% ahead of even the optimistic estimates.\u003c/p\u003e\u003cp name=\"0a3f\" id=\"0a3f\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t a story about working faster. It’s a story about preparation front-loading the hard work until execution becomes almost mechanical.\u003c/p\u003e\u003ch3 name=\"a2af\" id=\"a2af\" class=\"graf graf--h3 graf-after--p\"\u003eThe estimate wasn’t wrong\u003c/h3\u003e\u003cp name=\"d9ce\" id=\"d9ce\" class=\"graf graf--p graf-after--h3\"\u003eSprint S1 — the security foundation sprint — was scoped at 81 hours total. RBAC alone was estimated at 20–24 hours. Encryption at rest another 24–30 hours. Supporting work for the remainder.\u003c/p\u003e\u003cp name=\"a55e\" id=\"a55e\" class=\"graf graf--p graf-after--p\"\u003eThese weren’t pessimistic estimates. They were based on reasonable assumptions:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"6e04\" id=\"6e04\" class=\"graf graf--li graf-after--p\"\u003ePhase 1.1 (database schema): 4–6 hours\u003c/li\u003e\u003cli name=\"0802\" id=\"0802\" class=\"graf graf--li graf-after--li\"\u003ePhase 1.2 (service layer): 8–12 hours\u003c/li\u003e\u003cli name=\"cab2\" id=\"cab2\" class=\"graf graf--li graf-after--li\"\u003ePhase 1.3 (endpoint protection): 4–6 hours\u003c/li\u003e\u003cli name=\"6a4e\" id=\"6a4e\" class=\"graf graf--li graf-after--li\"\u003ePhase 1.4 (shared resources): 4–6 hours\u003c/li\u003e\u003cli name=\"18f0\" id=\"18f0\" class=\"graf graf--li graf-after--li\"\u003ePhase 2 (role-based permissions): 6–8 hours\u003c/li\u003e\u003cli name=\"e23f\" id=\"e23f\" class=\"graf graf--li graf-after--li\"\u003ePhase 3 (admin and testing): 4–6 hours\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"2f40\" id=\"2f40\" class=\"graf graf--p graf-after--li\"\u003eEach estimate assumed some discovery work, some problem-solving, some iteration. Normal software development.\u003c/p\u003e\u003cp name=\"c5b0\" id=\"c5b0\" class=\"graf graf--p graf-after--p\"\u003eWhat the estimates didn’t account for: we’d already done most of the discovery work.\u003c/p\u003e\u003ch3 name=\"85cd\" id=\"85cd\" class=\"graf graf--h3 graf-after--p\"\u003ePhase 0 was the real work\u003c/h3\u003e\u003cp name=\"97d4\" id=\"97d4\" class=\"graf graf--p graf-after--h3\"\u003eThe security sprint had a Phase 0: audit and planning. Six comprehensive reports created before any implementation began:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"953b\" id=\"953b\" class=\"graf graf--li graf-after--p\"\u003ePhase -1 verification (infrastructure assessment)\u003c/li\u003e\u003cli name=\"8982\" id=\"8982\" class=\"graf graf--li graf-after--li\"\u003eClarifications research (recommendations)\u003c/li\u003e\u003cli name=\"3161\" id=\"3161\" class=\"graf graf--li graf-after--li\"\u003eAPI endpoint catalog (56 endpoints mapped)\u003c/li\u003e\u003cli name=\"d28d\" id=\"d28d\" class=\"graf graf--li graf-after--li\"\u003eService methods inventory (47 methods identified)\u003c/li\u003e\u003cli name=\"0752\" id=\"0752\" class=\"graf graf--li graf-after--li\"\u003eRisk assessment (P0 and P1 blockers categorized)\u003c/li\u003e\u003cli name=\"cfae\" id=\"cfae\" class=\"graf graf--li graf-after--li\"\u003ePhase 0 completion summary\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"5201\" id=\"5201\" class=\"graf graf--p graf-after--li\"\u003eThis audit took time — multiple sessions, deep investigation, comprehensive documentation. It didn’t feel like progress. No code was written. No tests passed. No features shipped.\u003c/p\u003e\u003cp name=\"4f52\" id=\"4f52\" class=\"graf graf--p graf-after--p\"\u003eBut when execution day arrived, there was nothing left to figure out.\u003c/p\u003e\u003cp name=\"0f45\" id=\"0f45\" class=\"graf graf--p graf-after--p\"\u003eThe endpoint catalog meant Phase 1.3 knew exactly which endpoints needed protection before writing any code. The service methods inventory meant Phase 1.2 had a checklist, not a discovery process. The risk assessment meant priorities were already set.\u003c/p\u003e\u003cp name=\"98c4\" id=\"98c4\" class=\"graf graf--p graf-after--p\"\u003ePhase 0 wasn’t overhead. It was the work. Everything after was mechanical application of decisions already made.\u003c/p\u003e\u003ch3 name=\"99d8\" id=\"99d8\" class=\"graf graf--h3 graf-after--p\"\u003eArchitecture decisions as force multipliers\u003c/h3\u003e\u003cp name=\"d491\" id=\"d491\" class=\"graf graf--p graf-after--h3\"\u003eADR-044 decided the fundamental approach: Lightweight RBAC using JSONB columns rather than traditional role and permission tables.\u003c/p\u003e\u003cp name=\"480f\" id=\"480f\" class=\"graf graf--p graf-after--p\"\u003eThis decision was made days before implementation. The Chief Architect evaluated options, documented trade-offs, recommended an approach, got approval. His assessment was blunt: “Traditional RBAC would be architectural astronauting at our current scale. Building for 10,000 users when we have \u0026lt;100 is how projects die from complexity before reaching users.”\u003c/p\u003e\u003cp name=\"70f6\" id=\"70f6\" class=\"graf graf--p graf-after--p\"\u003eThe traditional approach — role tables, permission tables, junction tables — would have taken 2–3 weeks. The lightweight approach took 5 hours. Both met our security requirements. Only one let us ship on time.\u003c/p\u003e\u003cp name=\"9d45\" id=\"9d45\" class=\"graf graf--p graf-after--p\"\u003eWhen Phase 2 implementation began, nobody debated whether to use JSONB or separate tables. That question was answered.\u003c/p\u003e\u003cp name=\"ac7f\" id=\"ac7f\" class=\"graf graf--p graf-after--p\"\u003eThe implementation followed directly from the decision:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"css\" name=\"08f2\" id=\"08f2\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003eJSONB upgrade: [\u003cspan class=\"hljs-string\"\u003e\u0026quot;uuid\u0026quot;\u003c/span\u003e] → [{\u0026quot;user_id\u0026quot;: \u003cspan class=\"hljs-string\"\u003e\u0026quot;uuid\u0026quot;\u003c/span\u003e, \u003cspan class=\"hljs-string\"\u003e\u0026quot;role\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;viewer\u0026quot;\u003c/span\u003e}]\u003cbr /\u003eApplied \u003cspan class=\"hljs-selector-tag\"\u003eto\u003c/span\u003e lists and todos tables\u003cbr /\u003eExisting shares default \u003cspan class=\"hljs-selector-tag\"\u003eto\u003c/span\u003e \u0026quot;viewer\u0026quot;\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"c711\" id=\"c711\" class=\"graf graf--p graf-after--pre\"\u003eClear architectural decisions become implementation specifications. The team doesn’t stop to think; they execute the specification.\u003c/p\u003e\u003cp name=\"5f1f\" id=\"5f1f\" class=\"graf graf--p graf-after--p\"\u003eEvery architectural decision made before implementation day was time saved during implementation day. ADR-044 probably saved 2–4 hours of implementation-time debate and iteration.\u003c/p\u003e\u003ch3 name=\"db15\" id=\"db15\" class=\"graf graf--h3 graf-after--p\"\u003ePatterns established, patterns reused\u003c/h3\u003e\u003cp name=\"44eb\" id=\"44eb\" class=\"graf graf--p graf-after--h3\"\u003eThe first service to get ownership validation was KnowledgeGraphService — 20 methods across service and repository layers. That implementation established the pattern:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"1ebc\" id=\"1ebc\" class=\"graf graf--li graf-after--p\"\u003eOptional \u003ccode class=\"markup--code markup--li-code\"\u003eowner_id\u003c/code\u003e parameter\u003c/li\u003e\u003cli name=\"0340\" id=\"0340\" class=\"graf graf--li graf-after--li\"\u003eConditional filtering when provided\u003c/li\u003e\u003cli name=\"1e7e\" id=\"1e7e\" class=\"graf graf--li graf-after--li\"\u003e404 responses for non-owned resources (prevents information leakage)\u003c/li\u003e\u003cli name=\"b4eb\" id=\"b4eb\" class=\"graf graf--li graf-after--li\"\u003eTests validating ownership boundaries\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"931b\" id=\"931b\" class=\"graf graf--p graf-after--li\"\u003eOnce the pattern was established, applying it to ProjectRepository (7 methods), FileRepository (14 methods), and six other services was mechanical. Same pattern, different services. The second service took half the time of the first. The sixth took a quarter.\u003c/p\u003e\u003cp name=\"fd58\" id=\"fd58\" class=\"graf graf--p graf-after--p\"\u003ePattern reuse isn’t just code efficiency. It’s cognitive efficiency. The agent doesn’t need to think about \u003cem class=\"markup--em markup--p-em\"\u003ehow\u003c/em\u003e to implement ownership validation. It just applies the established pattern to new services.\u003c/p\u003e\u003cp name=\"7d31\" id=\"7d31\" class=\"graf graf--p graf-after--p\"\u003eThis is why Phase 1.2 — estimated at 8–12 hours for 67+ methods — completed so quickly. The pattern was figured out once and applied many times.\u003c/p\u003e\u003ch3 name=\"7e29\" id=\"7e29\" class=\"graf graf--h3 graf-after--p\"\u003eCompletion matrices as execution guides\u003c/h3\u003e\u003cp name=\"519a\" id=\"519a\" class=\"graf graf--p graf-after--h3\"\u003eEach phase had a completion matrix: explicit lists of what needed to be done, with clear done/not-done states.\u003c/p\u003e\u003cp name=\"8c82\" id=\"8c82\" class=\"graf graf--p graf-after--p\"\u003ePhase 1.2 completion matrix listed every service and every method:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"70b1\" id=\"70b1\" class=\"graf graf--li graf-after--p\"\u003eFileRepository: 14 methods (done/not done for each)\u003c/li\u003e\u003cli name=\"78e9\" id=\"78e9\" class=\"graf graf--li graf-after--li\"\u003eKnowledgeGraphService: 12 methods\u003c/li\u003e\u003cli name=\"79e5\" id=\"79e5\" class=\"graf graf--li graf-after--li\"\u003eProjectRepository: 7 methods\u003c/li\u003e\u003cli name=\"b25b\" id=\"b25b\" class=\"graf graf--li graf-after--li\"\u003eUniversalListRepository: 11 methods\u003c/li\u003e\u003cli name=\"b8dd\" id=\"b8dd\" class=\"graf graf--li graf-after--li\"\u003e… and so on\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"a9c3\" id=\"a9c3\" class=\"graf graf--p graf-after--li\"\u003eThe agent didn’t need to discover what work remained. The matrix showed it. Progress was measurable. Scope was explicit. Nothing was ambiguous.\u003c/p\u003e\u003cp name=\"3448\" id=\"3448\" class=\"graf graf--p graf-after--p\"\u003eWhen the completion matrix says “67 methods across 9 services,” the agent knows exactly what success looks like. No scope creep. No “one more thing.” Just: execute the matrix.\u003c/p\u003e\u003cp name=\"82f3\" id=\"82f3\" class=\"graf graf--p graf-after--p\"\u003ePhase 2’s permission matrix was similarly explicit:\u003c/p\u003e\u003cfigure name=\"f978\" id=\"f978\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*Q7STdniZCnzliCEbrVNaSg.png\" data-width=\"944\" data-height=\"438\" src=\"https://cdn-images-1.medium.com/max/800/1*Q7STdniZCnzliCEbrVNaSg.png\"\u003e\u003c/figure\u003e\u003cp name=\"2833\" id=\"2833\" class=\"graf graf--p graf-after--figure\"\u003eTwenty-four test cases fell directly out of this matrix: 4 roles × 6 operations. No ambiguity about what to test. The specification \u003cem class=\"markup--em markup--p-em\"\u003ewas\u003c/em\u003e the test plan.\u003c/p\u003e\u003ch3 name=\"63a2\" id=\"63a2\" class=\"graf graf--h3 graf-after--p\"\u003eAutonomous prompt discovery\u003c/h3\u003e\u003cp name=\"f2cc\" id=\"f2cc\" class=\"graf graf--p graf-after--h3\"\u003eSomething unexpected happened during Phase 1.4. I told the Code agent “there’s a new prompt for Phase 1.4” and the agent found it.\u003c/p\u003e\u003cp name=\"2445\" id=\"2445\" class=\"graf graf--p graf-after--p\"\u003eNot because I gave detailed instructions. The agent searched \u003ccode class=\"markup--code markup--p-code\"\u003edev/active/agent-prompt-sec-rbac-phase*\u003c/code\u003e based on naming convention, found the prompt, validated that prerequisites were complete, and executed the work.\u003c/p\u003e\u003cp name=\"df5e\" id=\"df5e\" class=\"graf graf--p graf-after--p\"\u003ePM coordination overhead for that phase transition: zero minutes.\u003c/p\u003e\u003cp name=\"2b3d\" id=\"2b3d\" class=\"graf graf--p graf-after--p\"\u003eThis wasn’t magic. It was systematic infrastructure. Prompts lived in predictable locations with predictable names. Prerequisites were documented in the prompts. The agent had patterns for searching, reading, and executing.\u003c/p\u003e\u003cp name=\"8445\" id=\"8445\" class=\"graf graf--p graf-after--p\"\u003eWhen coordination infrastructure is good enough, coordination becomes invisible. The agent just finds what it needs.\u003c/p\u003e\u003ch3 name=\"9ab5\" id=\"9ab5\" class=\"graf graf--h3 graf-after--p\"\u003eWhy 8 hours instead of 3 weeks\u003c/h3\u003e\u003cp name=\"8bc8\" id=\"8bc8\" class=\"graf graf--p graf-after--h3\"\u003eThe 8-hour execution wasn’t faster coding. It was less work to do.\u003c/p\u003e\u003cfigure name=\"fc79\" id=\"fc79\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*voURXHcS6QafYVi2Wp5s0Q.png\" data-width=\"944\" data-height=\"602\" src=\"https://cdn-images-1.medium.com/max/800/1*voURXHcS6QafYVi2Wp5s0Q.png\"\u003e\u003c/figure\u003e\u003cp name=\"9c65\" id=\"9c65\" class=\"graf graf--p graf-after--figure\"\u003eEach row represents hours saved. Discovery during Phase 0 instead of implementation saves maybe 6–8 hours. ADR decisions save 2–4 hours of debate. Pattern reuse saves maybe 4–6 hours of reinvention. Completion matrices save 2–3 hours of scope management. Autonomous coordination saves 1–2 hours of context switching.\u003c/p\u003e\u003cp name=\"37a8\" id=\"37a8\" class=\"graf graf--p graf-after--p\"\u003eAdd it up: 15–23 hours of work that simply didn’t need to happen during execution day because it happened earlier.\u003c/p\u003e\u003cp name=\"f750\" id=\"f750\" class=\"graf graf--p graf-after--p\"\u003eThe 3-week estimate assumed that work would happen during implementation. When it happened during preparation instead, implementation became mechanical.\u003c/p\u003e\u003ch3 name=\"b998\" id=\"b998\" class=\"graf graf--h3 graf-after--p\"\u003eThe real cost\u003c/h3\u003e\u003cp name=\"31a2\" id=\"31a2\" class=\"graf graf--p graf-after--h3\"\u003eFront-loading isn’t free. Phase 0 took significant time. ADR creation and review took time. Building coordination infrastructure took time. Creating completion matrices took time.\u003c/p\u003e\u003cp name=\"6823\" id=\"6823\" class=\"graf graf--p graf-after--p\"\u003eIf you measure only “time from sprint start to feature complete,” preparation looks like overhead. The security audit doesn’t ship features. ADRs don’t pass tests. Completion matrices aren’t code.\u003c/p\u003e\u003cp name=\"b129\" id=\"b129\" class=\"graf graf--p graf-after--p\"\u003eBut if you measure “time from project start to feature complete,” preparation is obviously investment. Every hour of Phase 0 saved multiple hours during Phases 1–3. The return on preparation was 3–5x.\u003c/p\u003e\u003cp name=\"64cf\" id=\"64cf\" class=\"graf graf--p graf-after--p\"\u003eThe teams that ship fastest aren’t the ones that start implementing fastest. They’re the ones whose preparation makes implementation almost trivial.\u003c/p\u003e\u003ch3 name=\"7c53\" id=\"7c53\" class=\"graf graf--h3 graf-after--p\"\u003eWhen this doesn’t work\u003c/h3\u003e\u003cp name=\"fab5\" id=\"fab5\" class=\"graf graf--p graf-after--h3\"\u003eFront-loading works when:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"60b0\" id=\"60b0\" class=\"graf graf--li graf-after--p\"\u003eRequirements are reasonably stable\u003c/li\u003e\u003cli name=\"dca1\" id=\"dca1\" class=\"graf graf--li graf-after--li\"\u003ePatterns apply across multiple implementations\u003c/li\u003e\u003cli name=\"fd78\" id=\"fd78\" class=\"graf graf--li graf-after--li\"\u003eArchitecture decisions are tractable before coding\u003c/li\u003e\u003cli name=\"c786\" id=\"c786\" class=\"graf graf--li graf-after--li\"\u003eThe team can maintain context across preparation and execution\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"ac30\" id=\"ac30\" class=\"graf graf--p graf-after--li\"\u003eFront-loading fails when:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"bbf0\" id=\"bbf0\" class=\"graf graf--li graf-after--p\"\u003eRequirements will change significantly during implementation\u003c/li\u003e\u003cli name=\"af12\" id=\"af12\" class=\"graf graf--li graf-after--li\"\u003eEach feature is genuinely unique (no patterns to establish)\u003c/li\u003e\u003cli name=\"4409\" id=\"4409\" class=\"graf graf--li graf-after--li\"\u003eYou need to build to learn what the architecture should be\u003c/li\u003e\u003cli name=\"50b9\" id=\"50b9\" class=\"graf graf--li graf-after--li\"\u003eLong gaps between preparation and execution lose context\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"90f0\" id=\"90f0\" class=\"graf graf--p graf-after--li\"\u003eThe SEC-RBAC epic was a good candidate for front-loading: security requirements were clear, patterns applied across all services, architecture options were well-understood, and execution followed preparation within days.\u003c/p\u003e\u003cp name=\"1069\" id=\"1069\" class=\"graf graf--p graf-after--p\"\u003eExploratory work — figuring out what to build rather than building a known thing — might need a different approach. Sometimes you need to start implementing to discover what the architecture should be.\u003c/p\u003e\u003ch3 name=\"52c0\" id=\"52c0\" class=\"graf graf--h3 graf-after--p\"\u003eThe transfer\u003c/h3\u003e\u003cp name=\"ca34\" id=\"ca34\" class=\"graf graf--p graf-after--h3\"\u003eHere’s what transfers to other projects:\u003c/p\u003e\u003cp name=\"2340\" id=\"2340\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAudit before building\u003c/strong\u003e. Map the landscape. Catalog what exists. Identify what needs to change. This investment pays off in execution clarity.\u003c/p\u003e\u003cp name=\"624a\" id=\"624a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecide architecture separately from implementation\u003c/strong\u003e. ADRs, design docs, technical specifications — whatever format works. The point is: don’t debate during implementation. Debate before. Document the decision. Execute the decision.\u003c/p\u003e\u003cp name=\"6958\" id=\"6958\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEstablish patterns explicitly\u003c/strong\u003e. The first implementation of a pattern is learning. Document what you learned. Make subsequent implementations mechanical application, not repeated discovery.\u003c/p\u003e\u003cp name=\"e523\" id=\"e523\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCreate explicit completion criteria\u003c/strong\u003e. Matrices, checklists, acceptance criteria — whatever makes scope unambiguous. When “done” is explicit, progress is measurable and scope is contained.\u003c/p\u003e\u003cp name=\"0f28\" id=\"0f28\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInvest in coordination infrastructure\u003c/strong\u003e. Naming conventions, prompt discovery, handoff protocols — whatever makes coordination invisible. Time saved on coordination is time available for execution.\u003c/p\u003e\u003cp name=\"2a9e\" id=\"2a9e\" class=\"graf graf--p graf-after--p\"\u003eThe 8-hour epic wasn’t a fluke. It was the predictable result of systematic preparation making execution mechanical.\u003c/p\u003e\u003cp name=\"fa76\" id=\"fa76\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThree weeks of work, done in 8 hours. Not by working faster. By doing less work during execution — because the work had already been done during preparation.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"8 Hours vs 3 Weeks: When Preparation Becomes Speed\",\"excerpt\":\"“Ready!”November 22The SEC-RBAC security epic was estimated at 2–3 weeks. It took approximately 8 hours.Not 8 hours of heroic coding. Not 8 hours of cutting corners. Not 8 hours that would create 8 weeks of technical debt. Eight hours of systematic execution, finishing 45% ahead of even the optim...\",\"url\":\"/blog/8-hours-vs-3-weeks\",\"publishedAt\":\"Mar 8, 2026\",\"publishedAtISO\":\"2026-03-08T16:57:06.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/a7a50c14ae0f\",\"featuredImage\":\"/assets/blog-images/a7a50c14ae0f-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/8-hours-vs-3-weeks-when-preparation-becomes-speed-a7a50c14ae0f?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"8-hours-vs-3-weeks\",\"workDate\":\"Mar 8, 2026\",\"workDateISO\":\"2026-03-08T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-03-08\",\"featured\":false},\"content\":{\"title\":\"8 Hours vs 3 Weeks: When Preparation Becomes Speed\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"8 Hours vs 3 Weeks: When Preparation Becomes Speed | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",
