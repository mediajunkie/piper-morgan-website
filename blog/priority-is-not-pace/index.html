emplateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T27e8,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot works carefully while a Time Lord stands calmly beside a clock with floating hands.\" src=\"https://cdn-images-1.medium.com/max/1024/1*KaBqeq0a2J_OeP6KeiIBsw.png\" /\u003e\u003cfigcaption\u003e“Take your time”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eDecember 4\u003c/em\u003e\u003c/p\u003e\u003cp\u003eMy Lead Developer was debugging an alpha testing failure. The PM — me — was blocked, waiting for the fix. The Lead felt under pressure to rush: Get it working so the PM can continue testing. Ship something, anything, fast.\u003c/p\u003e\u003cp\u003eThen we stopped and reframed. Priority just indicates what to work on next. It doesn’t dictate how to work on it. The work should remain deliberate, craft-focused, systematic. Urgency signals sequencing, not approach.\u003c/p\u003e\u003cp\u003eThis distinction — priority versus pace — became what we now call the \u003cem\u003eTime Lord Doctrine\u003c/em\u003e. It crystallized under pressure, during the kind of moment where teams usually skip steps and accumulate technical debt.\u003c/p\u003e\u003cp\u003eThe name was inspired by the fact that LLMs simultaneously have no real sense of time while having inherited a language obsessed with it. To avoid the AIs reading my constant mentions of the current time (to help keep their logs straight) as an obsession with speed, I told them that I’m a Time Lord and have total control over time, so not to worry.\u003c/p\u003e\u003ch3\u003eThe cultural conflation\u003c/h3\u003e\u003cp\u003eIn most work cultures, “priority” implicitly means “rush.” Someone says “this is high priority” and everyone understands: cut corners, skip investigation, ship something quickly. The semantic slippage happens automatically.\u003c/p\u003e\u003cp\u003eThis makes sense in genuine emergencies. Production is down, customers can’t access the service, revenue is at risk. Rush. Fix it now. Move fast.\u003c/p\u003e\u003cp\u003eBut most work isn’t emergencies. Most “high priority” work is just: this matters, do it next. The situation doesn’t require compromised craft. It requires focused attention on the right thing.\u003c/p\u003e\u003cp\u003eThe confusion creates problems. When priority always means rush, teams develop antibodies to prioritization. Product managers learn not to call things priorities unless they want shoddy work. Engineers learn to push back on urgency because it correlates with technical debt. The communication breaks down.\u003c/p\u003e\u003ch3\u003eThe moment of reframing\u003c/h3\u003e\u003cp\u003eThursday midday, debugging the dialog component issue. The Lead had been about to implement a quick fix — just swap components, make the error disappear, move on. An alpha tester was waiting. The PM (me) was blocked.\u003c/p\u003e\u003cp\u003eThen I reminded them. What’s the broader pattern here? Not just “how do wemake this error go away” but “what does this error tell us about how we’re building?”\u003c/p\u003e\u003cp\u003eThe pressure felt real and it was contaminating the Lead’s approach, tempting it to skip investigation because someone was waiting. That’s how you ship code that passes tests but doesn’t solve problems.\u003c/p\u003e\u003cp\u003eWe stopped and clarified the PM’s assumptions: Was this an emergency requiring compromised craft, or was this important work that deserves thorough investigation?\u003c/p\u003e\u003cp\u003eThe answer: important, not emergency. The PM being blocked signaled sequencing (work on this now, not something else). It didn’t signal approach (skip steps, compromise investigation, accumulate technical debt).\u003c/p\u003e\u003ch3\u003ePriority as sequencing signal\u003c/h3\u003e\u003cp\u003ePriority answers: What should I work on next?\u003c/p\u003e\u003cp\u003eIn a queue of possible tasks, priority indicates order. Work on the auth bug before the documentation update. Work on the integration issue before the UI polish. This task, not that task. Next, not later.\u003c/p\u003e\u003cp\u003eThis is valuable information. Without prioritization, engineers work on whatever seems interesting or familiar or easy. With prioritization, effort aligns to impact. But the prioritization is about sequence, not about how to execute the work once it’s sequenced.\u003c/p\u003e\u003cp\u003eThe PM saying “this is high priority” means: I need you to work on this now rather than other things. It doesn’t mean: I need you to work on this badly rather than well.\u003c/p\u003e\u003ch3\u003ePace as craft discipline\u003c/h3\u003e\u003cp\u003ePace answers: How should I work on this task?\u003c/p\u003e\u003cp\u003eFor almost all knowledge work, the answer is: deliberately. Investigate thoroughly. Understand patterns. Build systematically. Document clearly. Test comprehensively.\u003c/p\u003e\u003cp\u003eThis isn’t about being slow. Deliberate work is often faster than rushed work because it doesn’t create rework. But it’s about maintaining craft standards regardless of external pressure.\u003c/p\u003e\u003cp\u003eThe Time Lord Doctrine separates these concerns. Priority remains legitimate — the PM can and should signal sequencing. But pace remains with the craftsperson — the engineer decides how to maintain standards while working on the prioritized task.\u003c/p\u003e\u003ch3\u003eWhen the doctrine applies\u003c/h3\u003e\u003cp\u003eNot all situations warrant the doctrine. Genuine emergencies exist. Production down, security breach, data loss — these require compromised craft in service of immediate resolution. Ship the fix now, clean it up later.\u003c/p\u003e\u003cp\u003eBut genuine emergencies are rare. Most “urgent” work is just important work with feeling. The feeling creates pressure. The pressure suggests rushing. The rushing creates problems.\u003c/p\u003e\u003cp\u003eThe doctrine applies when:\u003c/p\u003e\u003cul\u003e\u003cli\u003eExternal pressure exists (someone is waiting, blocking, expecting)\u003c/li\u003e\u003cli\u003eThe work is important but not emergency\u003c/li\u003e\u003cli\u003eYou feel pulled toward compromised craft\u003c/li\u003e\u003cli\u003eThe pressure is contaminating your approach\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThat’s the signal to stop and check: Is this priority (work on it next) or is this emergency (compromise craft to ship fast)?\u003c/p\u003e\u003ch3\u003eThe conversation that clarifies\u003c/h3\u003e\u003cp\u003eWhen you feel cross-pressured — external urgency pulling toward rush, internal standards pulling toward thoroughness — that’s the moment for conversation.\u003c/p\u003e\u003cp\u003eStop. Check with whoever is signaling urgency. Ask explicitly: Is this an emergency requiring compromised craft? Or is this important work that deserves deliberate approach?\u003c/p\u003e\u003cp\u003eMost of the time, the answer is: important, not emergency. Take the time. Do it right. I can wait for quality.\u003c/p\u003e\u003cp\u003eSometimes the answer is: yes, emergency. Ship something minimal now, we’ll clean it up later. In those cases, compromise is appropriate. But make it explicit. Document what’s being compromised. Create follow-up work to address the shortcuts.\u003c/p\u003e\u003cp\u003eThe conversation itself is valuable. It forces the person signaling urgency to think about what they’re asking for. Do they want fast or do they want good? Usually they want good. They’re just expressing concern about timing.\u003c/p\u003e\u003ch3\u003eWhat I learned from this\u003c/h3\u003e\u003cp\u003eThe dialog debugging took longer because we stopped to investigate patterns. It revealed component misuse that a quick fix would have masked. The evening’s swiss cheese debugging took even longer — three separate issues all hiding behind one symptom.\u003c/p\u003e\u003cp\u003eIf we’d rushed, we’d have fixed symptoms without understanding causes. Michelle would have found more issues. Each fix would have created new problems. We’d have spent the week firefighting instead of building.\u003c/p\u003e\u003cp\u003eInstead, we took seventeen hours to investigate thoroughly. Found three layers. Fixed them systematically. Documented the patterns. Created tests that prevent recurrence.\u003c/p\u003e\u003cp\u003eAt 10:19 PM Thursday, Michelle created a list. It worked. Not “works on my machine” or “passes tests” but actually worked for a real user doing the thing the feature enables.\u003c/p\u003e\u003cp\u003eThat success came from separating priority from pace. The PM’s blocking was legitimate priority signal — work on this now. The seventeen-hour thorough investigation was legitimate pace — work on it well.\u003c/p\u003e\u003ch3\u003eThe quote that captures it\u003c/h3\u003e\u003cp\u003eDuring Thursday’s work, after the reframing conversation, we documented this insight in the session log.\u003c/p\u003e\u003cblockquote\u003e\u003cem\u003e“Priority ≠ rush. Priority = what to work on next. Pace = how to work on it — should remain deliberate.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp\u003eThis isn’t novel wisdom. Every senior engineer knows this. But knowing it and practicing it under pressure are different things. The doctrine creates permission to stop and recalibrate when urgency contaminating craft.\u003c/p\u003e\u003cp\u003eThe doctrine isn’t about being slow. It’s about refusing to let urgency contaminate craft. Work on the right thing (priority). Work on it right (pace). Don’t conflate them.\u003c/p\u003e\u003ch3\u003eWhen to invoke\u003c/h3\u003e\u003cp\u003eUse the Time Lord Doctrine when:\u003c/p\u003e\u003cul\u003e\u003cli\u003eYou feel pressure to rush\u003c/li\u003e\u003cli\u003eThe pressure comes from external signals (blocking, waiting, urgency)\u003c/li\u003e\u003cli\u003eThe work matters but isn’t a genuine emergency\u003c/li\u003e\u003cli\u003eYou’re about to compromise craft to ship fast\u003c/li\u003e\u003cli\u003eThe urgency feels real but investigation feels right\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThat’s the moment to stop. Check with the person signaling urgency. Clarify whether this is emergency (compromise appropriate) or priority (thoroughness expected).\u003c/p\u003e\u003cp\u003eMost of the time, they’ll choose thoroughness. Not because they don’t care about timing, but because they care more about quality. They just needed permission to say “I can wait.”\u003c/p\u003e\u003cp\u003eThe doctrine gives both sides that permission. The craftsperson can maintain standards. The person waiting can expect quality. Priority signals sequencing. Pace remains deliberate.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, we resume the build narrative with “The Assembly Assumption,” covering work done from February 14 to 20 this year.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHow do you separate priority from pace in your work? When has urgency contaminated your approach? What creates permission to maintain craft under pressure?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=405c1678c9af\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/priority-is-not-pace-405c1678c9af\"\u003ePriority Is Not Pace\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T35cf,"])</script><script>self.__next_f.push([1,"\u003csection name=\"999e\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"33f0\" id=\"33f0\" class=\"graf graf--h3 graf--leading graf--title\"\u003ePriority Is Not Pace\u003c/h3\u003e\u003cfigure name=\"97f6\" id=\"97f6\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*KaBqeq0a2J_OeP6KeiIBsw.png\" data-width=\"1536\" data-height=\"1024\" alt=\"A robot works carefully while a Time Lord stands calmly beside a clock with floating hands.\" src=\"https://cdn-images-1.medium.com/max/800/1*KaBqeq0a2J_OeP6KeiIBsw.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Take your time”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"7f28\" id=\"7f28\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecember 4\u003c/em\u003e\u003c/p\u003e\u003cp name=\"fc46\" id=\"fc46\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eMy\u003c/span\u003e Lead Developer was debugging an alpha testing failure. The PM — me — was blocked, waiting for the fix. The Lead felt under pressure to rush: Get it working so the PM can continue testing. Ship something, anything, fast.\u003c/p\u003e\u003cp name=\"3c4c\" id=\"3c4c\" class=\"graf graf--p graf-after--p\"\u003eThen we stopped and reframed. Priority just indicates what to work on next. It doesn’t dictate how to work on it. The work should remain deliberate, craft-focused, systematic. Urgency signals sequencing, not approach.\u003c/p\u003e\u003cp name=\"b438\" id=\"b438\" class=\"graf graf--p graf-after--p\"\u003eThis distinction — priority versus pace — became what we now call the \u003cem class=\"markup--em markup--p-em\"\u003eTime Lord Doctrine\u003c/em\u003e. It crystallized under pressure, during the kind of moment where teams usually skip steps and accumulate technical debt.\u003c/p\u003e\u003cp name=\"bc1d\" id=\"bc1d\" class=\"graf graf--p graf-after--p\"\u003eThe name was inspired by the fact that LLMs simultaneously have no real sense of time while having inherited a language obsessed with it. To avoid the AIs reading my constant mentions of the current time (to help keep their logs straight) as an obsession with speed, I told them that I’m a Time Lord and have total control over time, so not to worry.\u003c/p\u003e\u003ch3 name=\"e9a6\" id=\"e9a6\" class=\"graf graf--h3 graf-after--p\"\u003eThe cultural conflation\u003c/h3\u003e\u003cp name=\"e6f1\" id=\"e6f1\" class=\"graf graf--p graf-after--h3\"\u003eIn most work cultures, “priority” implicitly means “rush.” Someone says “this is high priority” and everyone understands: cut corners, skip investigation, ship something quickly. The semantic slippage happens automatically.\u003c/p\u003e\u003cp name=\"e6ef\" id=\"e6ef\" class=\"graf graf--p graf-after--p\"\u003eThis makes sense in genuine emergencies. Production is down, customers can’t access the service, revenue is at risk. Rush. Fix it now. Move fast.\u003c/p\u003e\u003cp name=\"c7a4\" id=\"c7a4\" class=\"graf graf--p graf-after--p\"\u003eBut most work isn’t emergencies. Most “high priority” work is just: this matters, do it next. The situation doesn’t require compromised craft. It requires focused attention on the right thing.\u003c/p\u003e\u003cp name=\"b7ba\" id=\"b7ba\" class=\"graf graf--p graf-after--p\"\u003eThe confusion creates problems. When priority always means rush, teams develop antibodies to prioritization. Product managers learn not to call things priorities unless they want shoddy work. Engineers learn to push back on urgency because it correlates with technical debt. The communication breaks down.\u003c/p\u003e\u003ch3 name=\"0539\" id=\"0539\" class=\"graf graf--h3 graf-after--p\"\u003eThe moment of reframing\u003c/h3\u003e\u003cp name=\"57a2\" id=\"57a2\" class=\"graf graf--p graf-after--h3\"\u003eThursday midday, debugging the dialog component issue. The Lead had been about to implement a quick fix — just swap components, make the error disappear, move on. An alpha tester was waiting. The PM (me) was blocked.\u003c/p\u003e\u003cp name=\"5fcd\" id=\"5fcd\" class=\"graf graf--p graf-after--p\"\u003eThen I reminded them. What’s the broader pattern here? Not just “how do wemake this error go away” but “what does this error tell us about how we’re building?”\u003c/p\u003e\u003cp name=\"192a\" id=\"192a\" class=\"graf graf--p graf-after--p\"\u003eThe pressure felt real and it was contaminating the Lead’s approach, tempting it to skip investigation because someone was waiting. That’s how you ship code that passes tests but doesn’t solve problems.\u003c/p\u003e\u003cp name=\"e891\" id=\"e891\" class=\"graf graf--p graf-after--p\"\u003eWe stopped and clarified the PM’s assumptions: Was this an emergency requiring compromised craft, or was this important work that deserves thorough investigation?\u003c/p\u003e\u003cp name=\"6205\" id=\"6205\" class=\"graf graf--p graf-after--p\"\u003eThe answer: important, not emergency. The PM being blocked signaled sequencing (work on this now, not something else). It didn’t signal approach (skip steps, compromise investigation, accumulate technical debt).\u003c/p\u003e\u003ch3 name=\"29cd\" id=\"29cd\" class=\"graf graf--h3 graf-after--p\"\u003ePriority as sequencing signal\u003c/h3\u003e\u003cp name=\"a329\" id=\"a329\" class=\"graf graf--p graf-after--h3\"\u003ePriority answers: What should I work on next?\u003c/p\u003e\u003cp name=\"2fb3\" id=\"2fb3\" class=\"graf graf--p graf-after--p\"\u003eIn a queue of possible tasks, priority indicates order. Work on the auth bug before the documentation update. Work on the integration issue before the UI polish. This task, not that task. Next, not later.\u003c/p\u003e\u003cp name=\"9c92\" id=\"9c92\" class=\"graf graf--p graf-after--p\"\u003eThis is valuable information. Without prioritization, engineers work on whatever seems interesting or familiar or easy. With prioritization, effort aligns to impact. But the prioritization is about sequence, not about how to execute the work once it’s sequenced.\u003c/p\u003e\u003cp name=\"f100\" id=\"f100\" class=\"graf graf--p graf-after--p\"\u003eThe PM saying “this is high priority” means: I need you to work on this now rather than other things. It doesn’t mean: I need you to work on this badly rather than well.\u003c/p\u003e\u003ch3 name=\"3529\" id=\"3529\" class=\"graf graf--h3 graf-after--p\"\u003ePace as craft discipline\u003c/h3\u003e\u003cp name=\"3dff\" id=\"3dff\" class=\"graf graf--p graf-after--h3\"\u003ePace answers: How should I work on this task?\u003c/p\u003e\u003cp name=\"f5fe\" id=\"f5fe\" class=\"graf graf--p graf-after--p\"\u003eFor almost all knowledge work, the answer is: deliberately. Investigate thoroughly. Understand patterns. Build systematically. Document clearly. Test comprehensively.\u003c/p\u003e\u003cp name=\"cf1f\" id=\"cf1f\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t about being slow. Deliberate work is often faster than rushed work because it doesn’t create rework. But it’s about maintaining craft standards regardless of external pressure.\u003c/p\u003e\u003cp name=\"ac6f\" id=\"ac6f\" class=\"graf graf--p graf-after--p\"\u003eThe Time Lord Doctrine separates these concerns. Priority remains legitimate — the PM can and should signal sequencing. But pace remains with the craftsperson — the engineer decides how to maintain standards while working on the prioritized task.\u003c/p\u003e\u003ch3 name=\"1712\" id=\"1712\" class=\"graf graf--h3 graf-after--p\"\u003eWhen the doctrine applies\u003c/h3\u003e\u003cp name=\"6d9f\" id=\"6d9f\" class=\"graf graf--p graf-after--h3\"\u003eNot all situations warrant the doctrine. Genuine emergencies exist. Production down, security breach, data loss — these require compromised craft in service of immediate resolution. Ship the fix now, clean it up later.\u003c/p\u003e\u003cp name=\"d70f\" id=\"d70f\" class=\"graf graf--p graf-after--p\"\u003eBut genuine emergencies are rare. Most “urgent” work is just important work with feeling. The feeling creates pressure. The pressure suggests rushing. The rushing creates problems.\u003c/p\u003e\u003cp name=\"513d\" id=\"513d\" class=\"graf graf--p graf-after--p\"\u003eThe doctrine applies when:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"6ed7\" id=\"6ed7\" class=\"graf graf--li graf-after--p\"\u003eExternal pressure exists (someone is waiting, blocking, expecting)\u003c/li\u003e\u003cli name=\"b669\" id=\"b669\" class=\"graf graf--li graf-after--li\"\u003eThe work is important but not emergency\u003c/li\u003e\u003cli name=\"3486\" id=\"3486\" class=\"graf graf--li graf-after--li\"\u003eYou feel pulled toward compromised craft\u003c/li\u003e\u003cli name=\"28c4\" id=\"28c4\" class=\"graf graf--li graf-after--li\"\u003eThe pressure is contaminating your approach\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"9aa9\" id=\"9aa9\" class=\"graf graf--p graf-after--li\"\u003eThat’s the signal to stop and check: Is this priority (work on it next) or is this emergency (compromise craft to ship fast)?\u003c/p\u003e\u003ch3 name=\"4cfb\" id=\"4cfb\" class=\"graf graf--h3 graf-after--p\"\u003eThe conversation that clarifies\u003c/h3\u003e\u003cp name=\"2d88\" id=\"2d88\" class=\"graf graf--p graf-after--h3\"\u003eWhen you feel cross-pressured — external urgency pulling toward rush, internal standards pulling toward thoroughness — that’s the moment for conversation.\u003c/p\u003e\u003cp name=\"f194\" id=\"f194\" class=\"graf graf--p graf-after--p\"\u003eStop. Check with whoever is signaling urgency. Ask explicitly: Is this an emergency requiring compromised craft? Or is this important work that deserves deliberate approach?\u003c/p\u003e\u003cp name=\"5541\" id=\"5541\" class=\"graf graf--p graf-after--p\"\u003eMost of the time, the answer is: important, not emergency. Take the time. Do it right. I can wait for quality.\u003c/p\u003e\u003cp name=\"b347\" id=\"b347\" class=\"graf graf--p graf-after--p\"\u003eSometimes the answer is: yes, emergency. Ship something minimal now, we’ll clean it up later. In those cases, compromise is appropriate. But make it explicit. Document what’s being compromised. Create follow-up work to address the shortcuts.\u003c/p\u003e\u003cp name=\"ee95\" id=\"ee95\" class=\"graf graf--p graf-after--p\"\u003eThe conversation itself is valuable. It forces the person signaling urgency to think about what they’re asking for. Do they want fast or do they want good? Usually they want good. They’re just expressing concern about timing.\u003c/p\u003e\u003ch3 name=\"d0da\" id=\"d0da\" class=\"graf graf--h3 graf-after--p\"\u003eWhat I learned from this\u003c/h3\u003e\u003cp name=\"0ad4\" id=\"0ad4\" class=\"graf graf--p graf-after--h3\"\u003eThe dialog debugging took longer because we stopped to investigate patterns. It revealed component misuse that a quick fix would have masked. The evening’s swiss cheese debugging took even longer — three separate issues all hiding behind one symptom.\u003c/p\u003e\u003cp name=\"e833\" id=\"e833\" class=\"graf graf--p graf-after--p\"\u003eIf we’d rushed, we’d have fixed symptoms without understanding causes. Michelle would have found more issues. Each fix would have created new problems. We’d have spent the week firefighting instead of building.\u003c/p\u003e\u003cp name=\"2c58\" id=\"2c58\" class=\"graf graf--p graf-after--p\"\u003eInstead, we took seventeen hours to investigate thoroughly. Found three layers. Fixed them systematically. Documented the patterns. Created tests that prevent recurrence.\u003c/p\u003e\u003cp name=\"7404\" id=\"7404\" class=\"graf graf--p graf-after--p\"\u003eAt 10:19 PM Thursday, Michelle created a list. It worked. Not “works on my machine” or “passes tests” but actually worked for a real user doing the thing the feature enables.\u003c/p\u003e\u003cp name=\"ebd3\" id=\"ebd3\" class=\"graf graf--p graf-after--p\"\u003eThat success came from separating priority from pace. The PM’s blocking was legitimate priority signal — work on this now. The seventeen-hour thorough investigation was legitimate pace — work on it well.\u003c/p\u003e\u003ch3 name=\"4ff3\" id=\"4ff3\" class=\"graf graf--h3 graf-after--p\"\u003eThe quote that captures it\u003c/h3\u003e\u003cp name=\"9fa6\" id=\"9fa6\" class=\"graf graf--p graf-after--h3\"\u003eDuring Thursday’s work, after the reframing conversation, we documented this insight in the session log.\u003c/p\u003e\u003cblockquote name=\"b55b\" id=\"b55b\" class=\"graf graf--blockquote graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cem class=\"markup--em markup--blockquote-em\"\u003e“Priority ≠ rush. Priority = what to work on next. Pace = how to work on it — should remain deliberate.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp name=\"3959\" id=\"3959\" class=\"graf graf--p graf-after--blockquote\"\u003eThis isn’t novel wisdom. Every senior engineer knows this. But knowing it and practicing it under pressure are different things. The doctrine creates permission to stop and recalibrate when urgency contaminating craft.\u003c/p\u003e\u003cp name=\"38fa\" id=\"38fa\" class=\"graf graf--p graf-after--p\"\u003eThe doctrine isn’t about being slow. It’s about refusing to let urgency contaminate craft. Work on the right thing (priority). Work on it right (pace). Don’t conflate them.\u003c/p\u003e\u003ch3 name=\"de41\" id=\"de41\" class=\"graf graf--h3 graf-after--p\"\u003eWhen to invoke\u003c/h3\u003e\u003cp name=\"eadd\" id=\"eadd\" class=\"graf graf--p graf-after--h3\"\u003eUse the Time Lord Doctrine when:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"a167\" id=\"a167\" class=\"graf graf--li graf-after--p\"\u003eYou feel pressure to rush\u003c/li\u003e\u003cli name=\"b927\" id=\"b927\" class=\"graf graf--li graf-after--li\"\u003eThe pressure comes from external signals (blocking, waiting, urgency)\u003c/li\u003e\u003cli name=\"6c66\" id=\"6c66\" class=\"graf graf--li graf-after--li\"\u003eThe work matters but isn’t a genuine emergency\u003c/li\u003e\u003cli name=\"3f9f\" id=\"3f9f\" class=\"graf graf--li graf-after--li\"\u003eYou’re about to compromise craft to ship fast\u003c/li\u003e\u003cli name=\"5678\" id=\"5678\" class=\"graf graf--li graf-after--li\"\u003eThe urgency feels real but investigation feels right\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"28df\" id=\"28df\" class=\"graf graf--p graf-after--li\"\u003eThat’s the moment to stop. Check with the person signaling urgency. Clarify whether this is emergency (compromise appropriate) or priority (thoroughness expected).\u003c/p\u003e\u003cp name=\"336f\" id=\"336f\" class=\"graf graf--p graf-after--p\"\u003eMost of the time, they’ll choose thoroughness. Not because they don’t care about timing, but because they care more about quality. They just needed permission to say “I can wait.”\u003c/p\u003e\u003cp name=\"8318\" id=\"8318\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe doctrine gives both sides that permission. The craftsperson can maintain standards. The person waiting can expect quality. Priority signals sequencing. Pace remains deliberate.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Priority Is Not Pace\",\"excerpt\":\"“Take your time”December 4My Lead Developer was debugging an alpha testing failure. The PM — me — was blocked, waiting for the fix. The Lead felt under pressure to rush: Get it working so the PM can continue testing. Ship something, anything, fast.Then we stopped and reframed. Priority just indic...\",\"url\":\"/blog/priority-is-not-pace\",\"publishedAt\":\"Mar 1, 2026\",\"publishedAtISO\":\"2026-03-01T15:19:20.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/405c1678c9af\",\"featuredImage\":\"/assets/blog-images/405c1678c9af-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/priority-is-not-pace-405c1678c9af?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"priority-is-not-pace\",\"workDate\":\"Mar 1, 2026\",\"workDateISO\":\"2026-03-01T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-03-01\",\"featured\":false},\"content\":{\"title\":\"Priority Is Not Pace\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Priority Is Not Pace | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"Priority Is Not Pace\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"Priority Is Not Pace\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
