$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2e43,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot installs a newfangled donut machine\" src=\"https://cdn-images-1.medium.com/max/1024/1*A8l07trcU0uaVNktD0Hbpg.png\" /\u003e\u003cfigcaption\u003e“This will be so much better!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eDecember 5–9, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe crisis resolved Thursday night at 10:19 PM. By the time I closed our laptops, all four entity pages worked for actual users. Friday morning brought something different. Not the crisis or urgency of the past few days. Just seven agents working in parallel on what comes next.\u003c/p\u003e\u003ch3\u003eConsolidation as Strategy\u003c/h3\u003e\u003cp\u003eThe \u003ca href=\"https://www.linkedin.com/pulse/weekly-ship-020-convergence-christian-crumlish-bamcc/?trackingId=e%2B84s7veToSoVdexXthDHA%3D%3D\"\u003eWeekly Ship\u003c/a\u003e went out first thing early on Friday. We’d spent Thursday night documenting the integration marathon, and now it was time to publish what we’d learned.\u003c/p\u003e\u003cp\u003eThen came the backlog. Twenty-two open beads — small tracked tasks that accumulate during sprint work — sat in the system waiting for attention. Not bugs exactly, not features exactly, just the organizational debris that builds up when you’re moving fast. The kind of thing that feels low-priority until you realize you’re spending mental energy remembering them all.\u003c/p\u003e\u003cp\u003eThe solution wasn’t to grind through twenty-two items. It was to recognize patterns and consolidate. Four GitHub epics emerged from the chaos: SEC-RBAC (security track, role-based access control epic) work, infrastructure improvements, Slack TDD gaps, and test debt. Twenty-two scattered items became four coherent initiatives. The backlog went from “things we should probably do sometime” to “here are four clear next steps when we’re ready.”\u003c/p\u003e\u003cp\u003eThat consolidation took a little time (those productive wee hours before I focus on my day-job priorities). But it freed up cognitive space that had been holding all those individual items. Sometimes the most productive work is deciding what \u003cem\u003enot\u003c/em\u003e to do right now, and putting everything else into a structure that doesn’t require constant remembering.\u003c/p\u003e\u003cp\u003eMeanwhile, the mobile track continued is on hold until I have time to get Xcode setup properly on my Mac, because the Expo app I had hoped to protoype with is throwing some some of version mismatch error.\u003c/p\u003e\u003cp\u003eBy lunchtime Friday, four parallel tracks had completed their work without a single coordination issue. Seven agents, four subagents, zero conflicts. Not because we’d built elaborate coordination systems, but because each track had clear boundaries and everyone stayed in their lane.\u003c/p\u003e\u003ch3\u003eThe Database Layer\u003c/h3\u003e\u003cp\u003eSunday morning brought a different kind of problem. CRUD operations were failing again — different symptoms than Thursday’s integration gaps, but same result: users couldn’t create todos, couldn’t upload files, couldn’t add projects. The mobile testing revealed something broken deeper in the stack.\u003c/p\u003e\u003cp\u003eTwenty-four hours later, we’d discovered \u003cstrong\u003e\u003cem\u003esix\u003c/em\u003e\u003c/strong\u003e root causes. Each one seemed like \u003cem\u003ethe\u003c/em\u003e problem until fixing it revealed the next layer. This is where the habit of asking the LLMs to look again, to dig deeper, to think categorically, to notice antipatterns, to find systematic issues really pays off:\u003c/p\u003e\u003cp\u003eWrong repository type in dependency injection. Method name mismatches in the Projects routes. BaseRepository expecting kwargs but receiving domain objects. Silent database errors in Files that swallowed exceptions and lied about success. Missing eager loading causing “detached instance” errors.\u003c/p\u003e\u003cp\u003eBut the breakthrough came at 6:48 AM when I finally understood what had been hiding under all five symptom fixes.\u003c/p\u003e\u003cp\u003eThe database schema defined owner_id columns as UUID type. The SQLAlchemy models defined them as String. PostgreSQL, being strict about types, rejected operations with a type mismatch error at SQL execution time. Every CRUD operation failed at the moment it tried to touch the database, but all the code before that point—including all the unit tests with mocks—passed perfectly.\u003c/p\u003e\u003cp\u003eSchema/model type drift. It explained everything. The previous five “fixes” had been addressing symptoms of this single root cause. We changed five models from String to postgresql.UUID(as_uuid=False), and suddenly all four entity pages worked.\u003c/p\u003e\u003cp\u003eWhy had this escaped detection so long? Unit tests with mocks bypass database type checking. The migrations changed the schema but nobody updated the models. PostgreSQL is strict about types in ways that auto-casting ORMs hide. We’d been working with a foundational mismatch that only manifested at SQL execution time with a real database.\u003c/p\u003e\u003cp\u003eIntegration testing isn’t about running more tests. It’s about running tests that touch the actual integration points — real databases, real type systems, real constraints. The tests pass when they mock away the very things that break in production.\u003c/p\u003e\u003ch3\u003eVelocity Through Systematic Work\u003c/h3\u003e\u003cp\u003eMonday morning, with CRUD operations finally working, we moved to cleanup. Six open issues, ranging from hamburger menu breakpoints to dialog styling problems. The kind of UI polish work that accumulates during alpha testing, partly because I have to use it myself and these half-assed vibe-coded UIs we’ve spun up drive me uts.\u003c/p\u003e\u003cp\u003eWe fixed all six in a few hours. But more interesting was what happened next.\u003c/p\u003e\u003cp\u003eIssue #439 had been sitting in the backlog for weeks: refactor the setup wizard. The main function was 267 lines. Four separate API key sections each duplicated ~100 lines of nearly identical code. This wasn’t elegant, but it worked, and we’d been focused on more pressing problems.\u003c/p\u003e\u003cp\u003eExcept now we had time to do it right. We extracted a single helper function that handled API key collection generically — keychain check, environment variable check, manual entry, validation. One 148-line function replaced ~400 lines of duplication.\u003c/p\u003e\u003cp\u003eThe results: 82% reduction in the API key collection code, 71% reduction in the main wizard function. From 267 lines down to 76 lines for the orchestrator. No functions over 50 lines except justified complex helpers. Zero duplicate code blocks over 10 lines.\u003c/p\u003e\u003cp\u003eThe refactoring took about two hours of focused work. But we’d done something important beforehand: we’d created a plan. Forty-five minutes analyzing the problem, identifying the patterns, designing the solution. That analysis meant the implementation went smoothly, with no surprises and no need to backtrack.\u003c/p\u003e\u003cp\u003eAnalysis as valuable work — not delay, but acceleration. The hour spent planning saved hours of implementation thrashing.\u003c/p\u003e\u003ch3\u003eTwo Epics in One Day\u003c/h3\u003e\u003cp\u003eTuesday was different. Not debugging, not cleanup, but completion.\u003c/p\u003e\u003cp\u003eThe T2 Sprint — test infrastructure improvements — had been building for weeks. We needed smoke tests, the fast subset that could run in CI/CD gates. The goal: mark ~25% of the test suite as smoke tests, target 5 seconds or less execution time.\u003c/p\u003e\u003cp\u003eBy noon, we’d profiled 705 tests, identified 656 fast candidates, marked 602 tests as smoke, and validated the suite. Execution time: 2–3 seconds, 40–60% faster than the target. Phantom test rate: less than 1%, excellent test hygiene. Six GitHub issues closed.\u003c/p\u003e\u003cp\u003eThe morning’s work was complete, comprehensive, and production-ready.\u003c/p\u003e\u003cp\u003eThen came the afternoon. The S2 Sprint — encryption at rest — needed preparation before implementation. Sensitive user data required proper cryptographic protection. But this wasn’t the kind of work you just start coding. It needed careful design, compliance mapping, architectural review.\u003c/p\u003e\u003cp\u003eWe created a comprehensive review package for Ted Nadeau, our cryptographic advisor. Thirteen specific questions about the architectural approach. Five Whys analysis for every decision. GDPR and SOC2 compliance mapping. A 42-hour implementation gameplan broken into six phases with daily breakdown. Four GitHub issue templates for deferred S3 work.\u003c/p\u003e\u003cp\u003eBy evening, the S2 preparation was complete. Not implemented, but ready \u003cem\u003eto\u003c/em\u003e implement — with all the architectural thinking done, all the questions identified, all the compliance requirements mapped.\u003c/p\u003e\u003cp\u003eTwo epics in one day. Not through heroic effort or cutting corners, but through systematic work. The T2 Sprint moved fast because the infrastructure already existed and the scope was clear. The S2 Sprint prep moved fast because we focused on the right question: “What decisions need to be made before we write any code?”\u003c/p\u003e\u003cp\u003ePreparatory work as valuable work. The five hours creating that crypto review package and implementation gameplan would save \u003cem\u003edays\u003c/em\u003e when Code agents actually implemented the encryption. Every question answered upfront is a question that doesn’t derail implementation later.\u003c/p\u003e\u003ch3\u003eWhat Systematic Looks Like\u003c/h3\u003e\u003cp\u003eThe week after the crisis looks different than the crisis itself. Thursday night’s integration marathon had dramatic tension — users blocked, bugs layered, debugging until past 10 PM. The following week had none of that drama but equal value.\u003c/p\u003e\u003cp\u003eConsolidation work that freed up cognitive space. Database debugging that found root causes instead of applying symptom fixes. Refactoring that eliminated technical debt. Analysis that accelerated future implementation. Epic completion that finished entire initiatives in single days.\u003c/p\u003e\u003cp\u003eThis is what systematic building looks like. Not reacting to crises, but working through backlogs methodically. Not rushing fixes, but investigating thoroughly. Not just shipping code, but eliminating duplication. Not just starting work, but preparing properly.\u003c/p\u003e\u003cp\u003eThe rhythm matters as much as the outcomes. Friday’s seven-agent orchestration showed we could coordinate at scale without coordination overhead. Monday’s six-hour refactoring session showed we could do careful work without deadline pressure. Tuesday’s two-epic day showed that preparatory work creates velocity, not drag.\u003c/p\u003e\u003cp\u003eBy Tuesday evening, we had:\u003c/p\u003e\u003cul\u003e\u003cli\u003eClean backlog (22 items → 4 clear epics)\u003c/li\u003e\u003cli\u003eWorking CRUD operations (six-layer root cause resolved)\u003c/li\u003e\u003cli\u003eDrastically simpler codebase (71–82% reduction in key areas)\u003c/li\u003e\u003cli\u003eComplete test infrastructure (T2 Sprint done)\u003c/li\u003e\u003cli\u003eReady encryption implementation (S2 Sprint prep done)\u003c/li\u003e\u003cli\u003eZero open P0 or P1 bugs\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eNone of this made for dramatic storytelling in the moment. There was no 10 PM breakthrough, no crisis resolution, no “it finally works” catharsis. Just five days of systematic execution, each building on the previous day’s work.\u003c/p\u003e\u003cp\u003eBut that’s the point. After you resolve the crisis and fix the integration gaps, the work doesn’t stop — it changes character. From reactive to systematic. From urgent to deliberate. From “make it work” to “make it right.”\u003c/p\u003e\u003cp\u003eThe crisis teaches you what’s broken. The week after teaches you how to build sustainably.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext in series: The Milestone Pause, as I take stock and figure out what needs attention next, and overall I slow my pace.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever had a period of consolidation and cleanup after a heavy-duty late night or weekend push? Tell me about it.\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=500d1e637647\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-week-after-500d1e637647\"\u003eThe Week After\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3ba7,"])</script><script>self.__next_f.push([1,"\u003csection name=\"b321\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"6fe7\" id=\"6fe7\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Week After\u003c/h3\u003e\u003cfigure name=\"e3f8\" id=\"e3f8\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*A8l07trcU0uaVNktD0Hbpg.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot installs a newfangled donut machine\" src=\"https://cdn-images-1.medium.com/max/800/1*A8l07trcU0uaVNktD0Hbpg.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“This will be so much better!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"eb2f\" id=\"eb2f\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecember 5–9, 2025\u003c/em\u003e\u003c/p\u003e\u003cp name=\"611e\" id=\"611e\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ehe crisis resolved Thursday night at 10:19 PM. By the time I closed our laptops, all four entity pages worked for actual users. Friday morning brought something different. Not the crisis or urgency of the past few days. Just seven agents working in parallel on what comes next.\u003c/p\u003e\u003ch3 name=\"61ad\" id=\"61ad\" class=\"graf graf--h3 graf-after--p\"\u003eConsolidation as Strategy\u003c/h3\u003e\u003cp name=\"22a6\" id=\"22a6\" class=\"graf graf--p graf-after--h3\"\u003eThe \u003ca href=\"https://www.linkedin.com/pulse/weekly-ship-020-convergence-christian-crumlish-bamcc/?trackingId=e%2B84s7veToSoVdexXthDHA%3D%3D\" data-href=\"https://www.linkedin.com/pulse/weekly-ship-020-convergence-christian-crumlish-bamcc/?trackingId=e%2B84s7veToSoVdexXthDHA%3D%3D\" class=\"markup--anchor markup--p-anchor\" rel=\"noopener\" target=\"_blank\"\u003eWeekly Ship\u003c/a\u003e went out first thing early on Friday. We’d spent Thursday night documenting the integration marathon, and now it was time to publish what we’d learned.\u003c/p\u003e\u003cp name=\"afe9\" id=\"afe9\" class=\"graf graf--p graf-after--p\"\u003eThen came the backlog. Twenty-two open beads — small tracked tasks that accumulate during sprint work — sat in the system waiting for attention. Not bugs exactly, not features exactly, just the organizational debris that builds up when you’re moving fast. The kind of thing that feels low-priority until you realize you’re spending mental energy remembering them all.\u003c/p\u003e\u003cp name=\"4adb\" id=\"4adb\" class=\"graf graf--p graf-after--p\"\u003eThe solution wasn’t to grind through twenty-two items. It was to recognize patterns and consolidate. Four GitHub epics emerged from the chaos: SEC-RBAC (security track, role-based access control epic) work, infrastructure improvements, Slack TDD gaps, and test debt. Twenty-two scattered items became four coherent initiatives. The backlog went from “things we should probably do sometime” to “here are four clear next steps when we’re ready.”\u003c/p\u003e\u003cp name=\"eebb\" id=\"eebb\" class=\"graf graf--p graf-after--p\"\u003eThat consolidation took a little time (those productive wee hours before I focus on my day-job priorities). But it freed up cognitive space that had been holding all those individual items. Sometimes the most productive work is deciding what \u003cem class=\"markup--em markup--p-em\"\u003enot\u003c/em\u003e to do right now, and putting everything else into a structure that doesn’t require constant remembering.\u003c/p\u003e\u003cp name=\"0ca1\" id=\"0ca1\" class=\"graf graf--p graf-after--p\"\u003eMeanwhile, the mobile track continued is on hold until I have time to get Xcode setup properly on my Mac, because the Expo app I had hoped to protoype with is throwing some some of version mismatch error.\u003c/p\u003e\u003cp name=\"1464\" id=\"1464\" class=\"graf graf--p graf-after--p\"\u003eBy lunchtime Friday, four parallel tracks had completed their work without a single coordination issue. Seven agents, four subagents, zero conflicts. Not because we’d built elaborate coordination systems, but because each track had clear boundaries and everyone stayed in their lane.\u003c/p\u003e\u003ch3 name=\"d7f6\" id=\"d7f6\" class=\"graf graf--h3 graf-after--p\"\u003eThe Database Layer\u003c/h3\u003e\u003cp name=\"ad5e\" id=\"ad5e\" class=\"graf graf--p graf-after--h3\"\u003eSunday morning brought a different kind of problem. CRUD operations were failing again — different symptoms than Thursday’s integration gaps, but same result: users couldn’t create todos, couldn’t upload files, couldn’t add projects. The mobile testing revealed something broken deeper in the stack.\u003c/p\u003e\u003cp name=\"fb2a\" id=\"fb2a\" class=\"graf graf--p graf-after--p\"\u003eTwenty-four hours later, we’d discovered \u003cstrong class=\"markup--strong markup--p-strong\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003esix\u003c/em\u003e\u003c/strong\u003e root causes. Each one seemed like \u003cem class=\"markup--em markup--p-em\"\u003ethe\u003c/em\u003e problem until fixing it revealed the next layer. This is where the habit of asking the LLMs to look again, to dig deeper, to think categorically, to notice antipatterns, to find systematic issues really pays off:\u003c/p\u003e\u003cp name=\"a216\" id=\"a216\" class=\"graf graf--p graf-after--p\"\u003eWrong repository type in dependency injection. Method name mismatches in the Projects routes. BaseRepository expecting kwargs but receiving domain objects. Silent database errors in Files that swallowed exceptions and lied about success. Missing eager loading causing “detached instance” errors.\u003c/p\u003e\u003cp name=\"69f6\" id=\"69f6\" class=\"graf graf--p graf-after--p\"\u003eBut the breakthrough came at 6:48 AM when I finally understood what had been hiding under all five symptom fixes.\u003c/p\u003e\u003cp name=\"c325\" id=\"c325\" class=\"graf graf--p graf-after--p\"\u003eThe database schema defined \u003ccode class=\"markup--code markup--p-code\"\u003eowner_id\u003c/code\u003e columns as UUID type. The SQLAlchemy models defined them as String. PostgreSQL, being strict about types, rejected operations with a type mismatch error at SQL execution time. Every CRUD operation failed at the moment it tried to touch the database, but all the code before that point—including all the unit tests with mocks—passed perfectly.\u003c/p\u003e\u003cp name=\"056f\" id=\"056f\" class=\"graf graf--p graf-after--p\"\u003eSchema/model type drift. It explained everything. The previous five “fixes” had been addressing symptoms of this single root cause. We changed five models from \u003ccode class=\"markup--code markup--p-code\"\u003eString\u003c/code\u003e to \u003ccode class=\"markup--code markup--p-code\"\u003epostgresql.UUID(as_uuid=False)\u003c/code\u003e, and suddenly all four entity pages worked.\u003c/p\u003e\u003cp name=\"ae7e\" id=\"ae7e\" class=\"graf graf--p graf-after--p\"\u003eWhy had this escaped detection so long? Unit tests with mocks bypass database type checking. The migrations changed the schema but nobody updated the models. PostgreSQL is strict about types in ways that auto-casting ORMs hide. We’d been working with a foundational mismatch that only manifested at SQL execution time with a real database.\u003c/p\u003e\u003cp name=\"ff27\" id=\"ff27\" class=\"graf graf--p graf-after--p\"\u003eIntegration testing isn’t about running more tests. It’s about running tests that touch the actual integration points — real databases, real type systems, real constraints. The tests pass when they mock away the very things that break in production.\u003c/p\u003e\u003ch3 name=\"949f\" id=\"949f\" class=\"graf graf--h3 graf-after--p\"\u003eVelocity Through Systematic Work\u003c/h3\u003e\u003cp name=\"c96f\" id=\"c96f\" class=\"graf graf--p graf-after--h3\"\u003eMonday morning, with CRUD operations finally working, we moved to cleanup. Six open issues, ranging from hamburger menu breakpoints to dialog styling problems. The kind of UI polish work that accumulates during alpha testing, partly because I have to use it myself and these half-assed vibe-coded UIs we’ve spun up drive me uts.\u003c/p\u003e\u003cp name=\"913e\" id=\"913e\" class=\"graf graf--p graf-after--p\"\u003eWe fixed all six in a few hours. But more interesting was what happened next.\u003c/p\u003e\u003cp name=\"800f\" id=\"800f\" class=\"graf graf--p graf-after--p\"\u003eIssue #439 had been sitting in the backlog for weeks: refactor the setup wizard. The main function was 267 lines. Four separate API key sections each duplicated ~100 lines of nearly identical code. This wasn’t elegant, but it worked, and we’d been focused on more pressing problems.\u003c/p\u003e\u003cp name=\"7403\" id=\"7403\" class=\"graf graf--p graf-after--p\"\u003eExcept now we had time to do it right. We extracted a single helper function that handled API key collection generically — keychain check, environment variable check, manual entry, validation. One 148-line function replaced ~400 lines of duplication.\u003c/p\u003e\u003cp name=\"a91d\" id=\"a91d\" class=\"graf graf--p graf-after--p\"\u003eThe results: 82% reduction in the API key collection code, 71% reduction in the main wizard function. From 267 lines down to 76 lines for the orchestrator. No functions over 50 lines except justified complex helpers. Zero duplicate code blocks over 10 lines.\u003c/p\u003e\u003cp name=\"781b\" id=\"781b\" class=\"graf graf--p graf-after--p\"\u003eThe refactoring took about two hours of focused work. But we’d done something important beforehand: we’d created a plan. Forty-five minutes analyzing the problem, identifying the patterns, designing the solution. That analysis meant the implementation went smoothly, with no surprises and no need to backtrack.\u003c/p\u003e\u003cp name=\"591f\" id=\"591f\" class=\"graf graf--p graf-after--p\"\u003eAnalysis as valuable work — not delay, but acceleration. The hour spent planning saved hours of implementation thrashing.\u003c/p\u003e\u003ch3 name=\"736c\" id=\"736c\" class=\"graf graf--h3 graf-after--p\"\u003eTwo Epics in One Day\u003c/h3\u003e\u003cp name=\"2d34\" id=\"2d34\" class=\"graf graf--p graf-after--h3\"\u003eTuesday was different. Not debugging, not cleanup, but completion.\u003c/p\u003e\u003cp name=\"a0e5\" id=\"a0e5\" class=\"graf graf--p graf-after--p\"\u003eThe T2 Sprint — test infrastructure improvements — had been building for weeks. We needed smoke tests, the fast subset that could run in CI/CD gates. The goal: mark ~25% of the test suite as smoke tests, target 5 seconds or less execution time.\u003c/p\u003e\u003cp name=\"dedf\" id=\"dedf\" class=\"graf graf--p graf-after--p\"\u003eBy noon, we’d profiled 705 tests, identified 656 fast candidates, marked 602 tests as smoke, and validated the suite. Execution time: 2–3 seconds, 40–60% faster than the target. Phantom test rate: less than 1%, excellent test hygiene. Six GitHub issues closed.\u003c/p\u003e\u003cp name=\"ff79\" id=\"ff79\" class=\"graf graf--p graf-after--p\"\u003eThe morning’s work was complete, comprehensive, and production-ready.\u003c/p\u003e\u003cp name=\"3493\" id=\"3493\" class=\"graf graf--p graf-after--p\"\u003eThen came the afternoon. The S2 Sprint — encryption at rest — needed preparation before implementation. Sensitive user data required proper cryptographic protection. But this wasn’t the kind of work you just start coding. It needed careful design, compliance mapping, architectural review.\u003c/p\u003e\u003cp name=\"3d46\" id=\"3d46\" class=\"graf graf--p graf-after--p\"\u003eWe created a comprehensive review package for Ted Nadeau, our cryptographic advisor. Thirteen specific questions about the architectural approach. Five Whys analysis for every decision. GDPR and SOC2 compliance mapping. A 42-hour implementation gameplan broken into six phases with daily breakdown. Four GitHub issue templates for deferred S3 work.\u003c/p\u003e\u003cp name=\"b04e\" id=\"b04e\" class=\"graf graf--p graf-after--p\"\u003eBy evening, the S2 preparation was complete. Not implemented, but ready \u003cem class=\"markup--em markup--p-em\"\u003eto\u003c/em\u003e implement — with all the architectural thinking done, all the questions identified, all the compliance requirements mapped.\u003c/p\u003e\u003cp name=\"94fc\" id=\"94fc\" class=\"graf graf--p graf-after--p\"\u003eTwo epics in one day. Not through heroic effort or cutting corners, but through systematic work. The T2 Sprint moved fast because the infrastructure already existed and the scope was clear. The S2 Sprint prep moved fast because we focused on the right question: “What decisions need to be made before we write any code?”\u003c/p\u003e\u003cp name=\"30bd\" id=\"30bd\" class=\"graf graf--p graf-after--p\"\u003ePreparatory work as valuable work. The five hours creating that crypto review package and implementation gameplan would save \u003cem class=\"markup--em markup--p-em\"\u003edays\u003c/em\u003e when Code agents actually implemented the encryption. Every question answered upfront is a question that doesn’t derail implementation later.\u003c/p\u003e\u003ch3 name=\"e8c7\" id=\"e8c7\" class=\"graf graf--h3 graf-after--p\"\u003eWhat Systematic Looks Like\u003c/h3\u003e\u003cp name=\"1ba2\" id=\"1ba2\" class=\"graf graf--p graf-after--h3\"\u003eThe week after the crisis looks different than the crisis itself. Thursday night’s integration marathon had dramatic tension — users blocked, bugs layered, debugging until past 10 PM. The following week had none of that drama but equal value.\u003c/p\u003e\u003cp name=\"decf\" id=\"decf\" class=\"graf graf--p graf-after--p\"\u003eConsolidation work that freed up cognitive space. Database debugging that found root causes instead of applying symptom fixes. Refactoring that eliminated technical debt. Analysis that accelerated future implementation. Epic completion that finished entire initiatives in single days.\u003c/p\u003e\u003cp name=\"a48a\" id=\"a48a\" class=\"graf graf--p graf-after--p\"\u003eThis is what systematic building looks like. Not reacting to crises, but working through backlogs methodically. Not rushing fixes, but investigating thoroughly. Not just shipping code, but eliminating duplication. Not just starting work, but preparing properly.\u003c/p\u003e\u003cp name=\"8da9\" id=\"8da9\" class=\"graf graf--p graf-after--p\"\u003eThe rhythm matters as much as the outcomes. Friday’s seven-agent orchestration showed we could coordinate at scale without coordination overhead. Monday’s six-hour refactoring session showed we could do careful work without deadline pressure. Tuesday’s two-epic day showed that preparatory work creates velocity, not drag.\u003c/p\u003e\u003cp name=\"f3ce\" id=\"f3ce\" class=\"graf graf--p graf-after--p\"\u003eBy Tuesday evening, we had:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"0acf\" id=\"0acf\" class=\"graf graf--li graf-after--p\"\u003eClean backlog (22 items → 4 clear epics)\u003c/li\u003e\u003cli name=\"6597\" id=\"6597\" class=\"graf graf--li graf-after--li\"\u003eWorking CRUD operations (six-layer root cause resolved)\u003c/li\u003e\u003cli name=\"f501\" id=\"f501\" class=\"graf graf--li graf-after--li\"\u003eDrastically simpler codebase (71–82% reduction in key areas)\u003c/li\u003e\u003cli name=\"4a97\" id=\"4a97\" class=\"graf graf--li graf-after--li\"\u003eComplete test infrastructure (T2 Sprint done)\u003c/li\u003e\u003cli name=\"8499\" id=\"8499\" class=\"graf graf--li graf-after--li\"\u003eReady encryption implementation (S2 Sprint prep done)\u003c/li\u003e\u003cli name=\"42c7\" id=\"42c7\" class=\"graf graf--li graf-after--li\"\u003eZero open P0 or P1 bugs\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"138f\" id=\"138f\" class=\"graf graf--p graf-after--li\"\u003eNone of this made for dramatic storytelling in the moment. There was no 10 PM breakthrough, no crisis resolution, no “it finally works” catharsis. Just five days of systematic execution, each building on the previous day’s work.\u003c/p\u003e\u003cp name=\"7d93\" id=\"7d93\" class=\"graf graf--p graf-after--p\"\u003eBut that’s the point. After you resolve the crisis and fix the integration gaps, the work doesn’t stop — it changes character. From reactive to systematic. From urgent to deliberate. From “make it work” to “make it right.”\u003c/p\u003e\u003cp name=\"0dfa\" id=\"0dfa\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe crisis teaches you what’s broken. The week after teaches you how to build sustainably.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Week After\",\"excerpt\":\"“This will be so much better!”December 5–9, 2025The crisis resolved Thursday night at 10:19 PM. By the time I closed our laptops, all four entity pages worked for actual users. Friday morning brought something different. Not the crisis or urgency of the past few days. Just seven agents working in...\",\"url\":\"/blog/the-week-after\",\"publishedAt\":\"Dec 23, 2025\",\"publishedAtISO\":\"2025-12-23T15:00:39.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/500d1e637647\",\"featuredImage\":\"/assets/blog-images/500d1e637647-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\": mage/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
