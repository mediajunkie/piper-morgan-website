fined\",\"template\":[\"$\",\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T3f1f,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"three robots report tests results to a patient — they all agree on the diagnosis and it’s good news\" src=\"https://cdn-images-1.medium.com/max/1024/1*ZLTCZnUz5jiKUik4-nDEXg.png\" /\u003e\u003cfigcaption\u003e“All the tests agree!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 19 to 20\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSometimes you don’t know what’s blocking you until multiple investigations from completely different angles all point to the same answer. You think you’re doing unrelated work — recovering test infrastructure here, answering architecture questions there, improving pass rates over there — and then everything converges. The answer becomes undeniable not because one investigation proved it, but because three separate investigations independently arrived at the same conclusion.\u003c/p\u003e\u003cp\u003eOur lack of adequate security currently blocks alpha testing. Not “should be improved” or “would be nice to have.” Blocks. Non-negotiable. And we only knew this because we looked at the system from enough different perspectives to see the pattern.\u003c/p\u003e\u003ch3\u003eWhen tests stop hiding\u003c/h3\u003e\u003cp\u003eThe test suite had been lying to us. Not maliciously — it just couldn’t tell the truth because one misplaced file was hiding 617 tests from pytest. A single __init__.py in tests/services/ created a shadow package that blocked pytest from importing the real services/ module. Zero tests collected. Zero tests running. Zero failures visible.\u003c/p\u003e\u003cp\u003eThe architecture test had finally revealed this the day before. Moving tests from tests/services/ to tests/unit/services/ suddenly made 617 tests discoverable. But discoverable isn\u0026#39;t the same as passing. My Code Agent spent the morning fixing collection errors - 19 missing async keywords, five import mistakes, syntax errors - the mechanical cleanup work that reveals what\u0026#39;s actually broken once tests can run.\u003c/p\u003e\u003cp\u003eBy mid-morning, all 617 tests were collectible. Time to run them and establish a real baseline. The command ran: pytest tests/unit/services/ --maxfail=0. Let everything fail that needs to fail. Don\u0026#39;t stop at the first problem.\u003c/p\u003e\u003cp\u003eThe results came back: 422 passing (68.4%), 142 failing, 53 errors. A 68.4% pass rate sounds terrible until you realize the alternative was 0% visibility. We’d been building with hidden test failures for months. The shadow package gave false confidence — if tests don’t run, they can’t fail, and if they can’t fail, everything seems fine.\u003c/p\u003e\u003cp\u003eThe failure analysis revealed patterns. Fifty-three tests failed because of missing fixtures. Forty-four tests were written for an old API design that never got implemented. Forty tests expected spatial workflow integration that was still in progress. These weren’t random failures — they were systemic issues that needed systematic solutions.\u003c/p\u003e\u003cp\u003eBut that 68.4% baseline was real. Accurate. Actionable. We finally knew the actual state of the test suite instead of the assumed state.\u003c/p\u003e\u003ch3\u003eWhen brilliant questions reveal what’s missing\u003c/h3\u003e\u003cp\u003eWhile test infrastructure recovered, a different investigation began. \u003ca href=\"https://medium.com/u/1d6e7a90def4\"\u003eTed Nadeau\u003c/a\u003e — brilliant computer scientist, someone whose architectural judgment I trust completely — had questions about Piper’s architecture. Not surface questions. Deep questions about singletons and scalability, database design patterns, security implementation, architectural decisions.\u003c/p\u003e\u003cp\u003eMy Research Agent spent over four hours responding. The deep-dive research session created comprehensive reports covering database design, stored procedures, primary key naming, table naming conventions. Ted’s questions were making us explain and defend architectural choices we’d made implicitly. Every answer required evidence, not assertions.\u003c/p\u003e\u003cp\u003eThen came Ted’s follow-up questions about database design. Not just “how does this work” but “why these specific choices.” Stored procedures? We don’t use SQL procedures — our application-layer workflows effectively function as stored procedures (which turned into ADR-043 later). Primary key naming? Currently unprefixed (id), Ted prefers prefixed (user_id). Table naming? Plural (users), Ted suggests singular (user).\u003c/p\u003e\u003cp\u003eBut the most interesting question was about \u003cstrong\u003e\u003cem\u003edatabase annotations \u003c/em\u003e\u003c/strong\u003e— a novel pattern Ted proposed where you annotate WHY data changed, not just WHAT changed. This could enable AI learning from human decision patterns. It was the kind of insight that might be patent-worthy.\u003c/p\u003e\u003cp\u003e\u003cem\u003eSide note: I can’t tell you how long and anxiously I’ve waited for a real programmer to kick the tires on this work!\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe research created seventeen GitHub issues. Most were database design improvements, migration planning, quality assurance gaps. But two issues stood out:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #323\u003c/strong\u003e: RBAC Implementation (20–24 hours) — marked \u003cstrong\u003eCRITICAL BLOCKER\u003c/strong\u003e\u003cbr\u003e\u003cstrong\u003eIssue #324\u003c/strong\u003e: Encryption at Rest (24–30 hours) — marked \u003cstrong\u003eCRITICAL BLOCKER\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThose weren’t suggestions. Those weren’t “nice to have.” Those were blockers. Ted’s questions about security implementation had revealed what we didn’t have: role-based access control, encryption at rest. For a single-user alpha, maybe acceptable. For multi-user alpha with external testers? Absolutely not acceptable.\u003c/p\u003e\u003cp\u003eThe research didn’t just answer Ted’s questions. It revealed what we couldn’t ship without.\u003c/p\u003e\u003ch3\u003eWhen test recovery reveals the path\u003c/h3\u003e\u003cp\u003eThe next day brought test transformation. My Claude Code agent had been systematically fixing the test suite — not heroics, not rushing, just methodical work. Container initialization patterns. PyPDF2 migration. Webhook signature verification fixes. The kind of infrastructure work that doesn’t feel dramatic but compounds into significant progress.\u003c/p\u003e\u003cp\u003eThe test suite had jumped from 617 tests collectible to 2,306 tests collectible — a 257× increase. That shadow package had been hiding far more than we realized. But more importantly, the pass rate was climbing: 68.4% → 85%+. Not from fixing bugs in production code, but from fixing test infrastructure so tests could actually run and report accurately.\u003c/p\u003e\u003cp\u003eSLACK-SPATIAL integration recovered from 61% to 85% passing across three phases. Quick wins, OAuth methods, pipeline fixes. Eighteen tests that had been blocking now passing. The systematic approach was working — fix infrastructure, tests reveal real problems, fix real problems, infrastructure gets stronger.\u003c/p\u003e\u003cp\u003eBut the most significant development was the security audit findings. My Chief Architect had been reviewing the system comprehensively, and the assessment was clear: three FileRepository methods exposed cross-user file access vulnerabilities. If endpoint authentication got bypassed somehow, users could access other users’ files at the data layer.\u003c/p\u003e\u003cp\u003eThis was a P0 vulnerability. Not “should fix eventually.” Fix immediately.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNone of this would have even been detected as long as I was the only human user in the system.\u003c/em\u003e\u003c/p\u003e\u003ch3\u003eWhen everything points to the same answer\u003c/h3\u003e\u003cp\u003eBy late afternoon, three separate investigations — test infrastructure, Ted’s architecture review, security audit — had all identified the same critical gap: security.\u003c/p\u003e\u003cp\u003eThe test recovery showed we could achieve high pass rates through systematic work, but pass rates don’t matter if the security model is incomplete. Ted’s architecture review validated that our overall design was sound, but explicitly flagged RBAC and encryption as missing critical components. The security audit found actual P0 vulnerabilities that couldn’t ship to external users.\u003c/p\u003e\u003cp\u003eThree different perspectives. Three different investigation methods. Same conclusion.\u003c/p\u003e\u003cp\u003eMy Chief Architect synthesized everything into a clear strategic picture. Sprint S1 (Security Foundation) would require 81 hours total:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eSEC-RBAC\u003c/strong\u003e: 24 hours (P0 CRITICAL) — Role-based access control\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSEC-ENCRYPT-ATREST\u003c/strong\u003e: 24 hours (P0 CRITICAL) — Encryption at rest\u003c/li\u003e\u003cli\u003e\u003cstrong\u003ePython 3.11 upgrade\u003c/strong\u003e: 8 hours (security patches expired October 2025)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003ePerformance indexes\u003c/strong\u003e: 6 hours\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eWindows compatibility\u003c/strong\u003e: 3 hours\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eArchitectural singleton pattern\u003c/strong\u003e: 16 hours\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eRBAC and encryption weren’t suggestions. They were blockers. Non-negotiable before multi-user alpha. The external validation from Ted, the test infrastructure revealing system health, the security audit finding P0 vulnerabilities — everything converged on the same answer.\u003c/p\u003e\u003cp\u003eThe decision wasn’t “should we do security work.” The decision was “security work happens now, before any external alpha testing with multiple users.”\u003c/p\u003e\u003ch3\u003eWhat convergence may reveal that single investigations can miss\u003c/h3\u003e\u003cp\u003eAny one of these investigations alone might not have created certainty. Test infrastructure recovery showed 85% pass rates — great, but doesn’t necessarily mean “stop everything and fix security.” Ted’s architecture review identified RBAC and encryption gaps — important, but maybe deferrable if you’re still in single-user alpha. Security audit found P0 vulnerabilities — serious, but potentially fixable with quick patches.\u003c/p\u003e\u003cp\u003eBut three investigations converging? That’s certainty.\u003c/p\u003e\u003cp\u003eThe test recovery proved we could do systematic infrastructure work and see real results. The architecture review validated that our foundation was solid and identified exactly what was missing. The security audit found concrete vulnerabilities that demonstrated those missing pieces weren’t theoretical concerns.\u003c/p\u003e\u003cp\u003eEach investigation strengthened the others. Test infrastructure recovery showed our methodology worked. Ted’s validation confirmed our architecture could support what we needed to build. The security audit made the missing security features impossible to defer or minimize.\u003c/p\u003e\u003cp\u003eThis is what systematic building enables. You’re not just implementing features. You’re creating multiple feedback loops that all report on system health from different angles. When they all start pointing to the same issue, you know you’ve found something that actually matters.\u003c/p\u003e\u003ch3\u003eWhen external validation accelerates internal decisions\u003c/h3\u003e\u003cp\u003eTed’s involvement did something important beyond just identifying gaps. It accelerated decision-making. When your internal team identifies security gaps, there’s always a temptation to defer: “We’ll get to it later.” “It’s alpha, we can ship with known gaps.” “We’ll add security in the next phase.”\u003c/p\u003e\u003cp\u003eBut when an external expert whose judgment you trust deeply looks at your system and says “these specific things are critical blockers,” it removes ambiguity. It’s not your team being cautious or perfectionist. It’s an independent assessment confirming what you suspected but might have minimized.\u003c/p\u003e\u003cp\u003eThe seventeen GitHub issues from Ted’s research weren’t just task lists. They were external validation of internal concerns. When our security audit said “P0 vulnerability,” Analysis of Ted’s probing questions told us “RBAC is a critical blocker.” Two independent sources, same conclusion. That’s how you know you’re not overthinking it.\u003c/p\u003e\u003cp\u003eThis is the value of bringing experienced outside perspective into development. Not to tell you what to build, but to ask hard questions that reveal what you haven’t built yet. Ted didn’t design our security model. He asked questions that made us realize we needed a more complete security model before shipping to external users.\u003c/p\u003e\u003ch3\u003eWhat certainty costs and buys\u003c/h3\u003e\u003cp\u003eStopping feature work to fix security infrastructure costs time. Sprint S1 would take 81 hours — roughly two weeks of focused development. Two weeks not adding features, not fixing user-facing bugs, not improving UX. Just hardening security infrastructure that users won’t directly see or appreciate.\u003c/p\u003e\u003cp\u003eBut shipping without security would cost more. The first external security researcher finding the cross-user file access vulnerability would be catastrophic. The first multi-user alpha test exposing role-based access control gaps would be embarrassing. The first encryption audit failing would block any serious adoption.\u003c/p\u003e\u003cp\u003eThe convergence revealed certainty: security blocks alpha. Not “delays alpha” or “improves alpha.” Blocks. You can’t launch multi-user alpha testing with P0 vulnerabilities and missing critical security features. The external validation confirmed it. The test infrastructure proved we could do systematic work. The security audit quantified the risk.\u003c/p\u003e\u003cp\u003eSo the decision became simple: do Sprint S1 now, before external alpha, or don’t do external alpha. There’s no third option where you ship known P0 vulnerabilities to external users and hope nobody notices.\u003c/p\u003e\u003cp\u003eCertainty removes the temptation to defer. When multiple investigations from different angles all point to the same blocker, you stop debating whether it’s really a blocker. You fix it.\u003c/p\u003e\u003ch3\u003eThe systematic building advantage\u003c/h3\u003e\u003cp\u003eThis convergence moment only happened because we were building systematically across multiple dimensions simultaneously. Test infrastructure work, external architecture reviews, security audits, test pass rate improvements — all happening in parallel, all reporting on system health.\u003c/p\u003e\u003cp\u003eIf we’d only been doing feature work, we wouldn’t have discovered the shadow package hiding 617 tests. If we’d only been fixing tests, we wouldn’t have engaged Ted’s architectural expertise. If we’d only been focused on shipping, we wouldn’t have run comprehensive security audits.\u003c/p\u003e\u003cp\u003eSystematic building creates multiple feedback channels. Each channel reports different information. When they start converging on the same signal, you know you’ve found something real.\u003c/p\u003e\u003cp\u003eThe test suite went from 0% visibility to 68.4% baseline to 85%+ pass rate through systematic infrastructure work. Ted’s architecture review validated our foundation while identifying specific gaps. The security audit found concrete vulnerabilities. Three feedback channels, three perspectives, one conclusion: security blocks alpha.\u003c/p\u003e\u003cp\u003eThat’s the payoff of patience in process. You build enough feedback mechanisms that convergence becomes possible. And when convergence happens, certainty follows.\u003c/p\u003e\u003cp\u003eThe shadow package revealed what we couldn’t see. Ted’s questions revealed what we hadn’t built. The security audit revealed what we couldn’t ship. Together, they revealed what we needed to do next: Sprint S1, 81 hours, non-negotiable, before any external alpha testing.\u003c/p\u003e\u003cp\u003eSometimes investigation becomes certainty not through one perfect insight, but through multiple imperfect investigations that all point the same direction. That’s when you know what to do next.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, The 15-Agent Day: when comprehensive security sprint meets multi-agent coordination at unprecedented scale, and systematic methodology enables 15 simultaneous sessions with zero collisions.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced convergence moments where multiple independent investigations revealed the same truth? What helped you recognize the pattern and act on the certainty rather than debating further?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=d4f984155c40\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/when-investigation-becomes-certainty-d4f984155c40\"\u003eWhen Investigation Becomes Certainty\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T519c,"])</script><script>self.__next_f.push([1,"\u003csection name=\"7e73\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"5fb9\" id=\"5fb9\" class=\"graf graf--h3 graf--leading graf--title\"\u003eWhen Investigation Becomes Certainty\u003c/h3\u003e\u003cfigure name=\"4dfe\" id=\"4dfe\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*ZLTCZnUz5jiKUik4-nDEXg.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"three robots report tests results to a patient — they all agree on the diagnosis and it’s good news\" src=\"https://cdn-images-1.medium.com/max/800/1*ZLTCZnUz5jiKUik4-nDEXg.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“All the tests agree!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"6655\" id=\"6655\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 19 to 20\u003c/em\u003e\u003c/p\u003e\u003cp name=\"9734\" id=\"9734\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eS\u003c/span\u003eometimes you don’t know what’s blocking you until multiple investigations from completely different angles all point to the same answer. You think you’re doing unrelated work — recovering test infrastructure here, answering architecture questions there, improving pass rates over there — and then everything converges. The answer becomes undeniable not because one investigation proved it, but because three separate investigations independently arrived at the same conclusion.\u003c/p\u003e\u003cp name=\"9ea5\" id=\"9ea5\" class=\"graf graf--p graf-after--p\"\u003eOur lack of adequate security currently blocks alpha testing. Not “should be improved” or “would be nice to have.” Blocks. Non-negotiable. And we only knew this because we looked at the system from enough different perspectives to see the pattern.\u003c/p\u003e\u003ch3 name=\"eda5\" id=\"eda5\" class=\"graf graf--h3 graf-after--p\"\u003eWhen tests stop hiding\u003c/h3\u003e\u003cp name=\"90ac\" id=\"90ac\" class=\"graf graf--p graf-after--h3\"\u003eThe test suite had been lying to us. Not maliciously — it just couldn’t tell the truth because one misplaced file was hiding 617 tests from pytest. A single \u003ccode class=\"markup--code markup--p-code\"\u003e__init__.py\u003c/code\u003e in \u003ccode class=\"markup--code markup--p-code\"\u003etests/services/\u003c/code\u003e created a shadow package that blocked pytest from importing the real \u003ccode class=\"markup--code markup--p-code\"\u003eservices/\u003c/code\u003e module. Zero tests collected. Zero tests running. Zero failures visible.\u003c/p\u003e\u003cp name=\"e0b8\" id=\"e0b8\" class=\"graf graf--p graf-after--p\"\u003eThe architecture test had finally revealed this the day before. Moving tests from \u003ccode class=\"markup--code markup--p-code\"\u003etests/services/\u003c/code\u003e to \u003ccode class=\"markup--code markup--p-code\"\u003etests/unit/services/\u003c/code\u003e suddenly made 617 tests discoverable. But discoverable isn\u0026#39;t the same as passing. My Code Agent spent the morning fixing collection errors - 19 missing async keywords, five import mistakes, syntax errors - the mechanical cleanup work that reveals what\u0026#39;s actually broken once tests can run.\u003c/p\u003e\u003cp name=\"b979\" id=\"b979\" class=\"graf graf--p graf-after--p\"\u003eBy mid-morning, all 617 tests were collectible. Time to run them and establish a real baseline. The command ran: \u003ccode class=\"markup--code markup--p-code\"\u003epytest tests/unit/services/ --maxfail=0\u003c/code\u003e. Let everything fail that needs to fail. Don\u0026#39;t stop at the first problem.\u003c/p\u003e\u003cp name=\"fe45\" id=\"fe45\" class=\"graf graf--p graf-after--p\"\u003eThe results came back: 422 passing (68.4%), 142 failing, 53 errors. A 68.4% pass rate sounds terrible until you realize the alternative was 0% visibility. We’d been building with hidden test failures for months. The shadow package gave false confidence — if tests don’t run, they can’t fail, and if they can’t fail, everything seems fine.\u003c/p\u003e\u003cp name=\"dc9f\" id=\"dc9f\" class=\"graf graf--p graf-after--p\"\u003eThe failure analysis revealed patterns. Fifty-three tests failed because of missing fixtures. Forty-four tests were written for an old API design that never got implemented. Forty tests expected spatial workflow integration that was still in progress. These weren’t random failures — they were systemic issues that needed systematic solutions.\u003c/p\u003e\u003cp name=\"21f4\" id=\"21f4\" class=\"graf graf--p graf-after--p\"\u003eBut that 68.4% baseline was real. Accurate. Actionable. We finally knew the actual state of the test suite instead of the assumed state.\u003c/p\u003e\u003ch3 name=\"12b4\" id=\"12b4\" class=\"graf graf--h3 graf-after--p\"\u003eWhen brilliant questions reveal what’s missing\u003c/h3\u003e\u003cp name=\"9e69\" id=\"9e69\" class=\"graf graf--p graf-after--h3\"\u003eWhile test infrastructure recovered, a different investigation began. \u003ca href=\"https://medium.com/u/1d6e7a90def4\" data-href=\"https://medium.com/u/1d6e7a90def4\" data-anchor-type=\"2\" data-user-id=\"1d6e7a90def4\" data-action-value=\"1d6e7a90def4\" data-action=\"show-user-card\" data-action-type=\"hover\" class=\"markup--user markup--p-user\" target=\"_blank\"\u003eTed Nadeau\u003c/a\u003e — brilliant computer scientist, someone whose architectural judgment I trust completely — had questions about Piper’s architecture. Not surface questions. Deep questions about singletons and scalability, database design patterns, security implementation, architectural decisions.\u003c/p\u003e\u003cp name=\"b005\" id=\"b005\" class=\"graf graf--p graf-after--p\"\u003eMy Research Agent spent over four hours responding. The deep-dive research session created comprehensive reports covering database design, stored procedures, primary key naming, table naming conventions. Ted’s questions were making us explain and defend architectural choices we’d made implicitly. Every answer required evidence, not assertions.\u003c/p\u003e\u003cp name=\"405d\" id=\"405d\" class=\"graf graf--p graf-after--p\"\u003eThen came Ted’s follow-up questions about database design. Not just “how does this work” but “why these specific choices.” Stored procedures? We don’t use SQL procedures — our application-layer workflows effectively function as stored procedures (which turned into ADR-043 later). Primary key naming? Currently unprefixed (\u003ccode class=\"markup--code markup--p-code\"\u003eid\u003c/code\u003e), Ted prefers prefixed (\u003ccode class=\"markup--code markup--p-code\"\u003euser_id\u003c/code\u003e). Table naming? Plural (\u003ccode class=\"markup--code markup--p-code\"\u003eusers\u003c/code\u003e), Ted suggests singular (\u003ccode class=\"markup--code markup--p-code\"\u003euser\u003c/code\u003e).\u003c/p\u003e\u003cp name=\"2328\" id=\"2328\" class=\"graf graf--p graf-after--p\"\u003eBut the most interesting question was about \u003cstrong class=\"markup--strong markup--p-strong\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003edatabase annotations \u003c/em\u003e\u003c/strong\u003e— a novel pattern Ted proposed where you annotate WHY data changed, not just WHAT changed. This could enable AI learning from human decision patterns. It was the kind of insight that might be patent-worthy.\u003c/p\u003e\u003cp name=\"2b88\" id=\"2b88\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eSide note: I can’t tell you how long and anxiously I’ve waited for a real programmer to kick the tires on this work!\u003c/em\u003e\u003c/p\u003e\u003cp name=\"cda2\" id=\"cda2\" class=\"graf graf--p graf-after--p\"\u003eThe research created seventeen GitHub issues. Most were database design improvements, migration planning, quality assurance gaps. But two issues stood out:\u003c/p\u003e\u003cp name=\"f510\" id=\"f510\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #323\u003c/strong\u003e: RBAC Implementation (20–24 hours) — marked \u003cstrong class=\"markup--strong markup--p-strong\"\u003eCRITICAL BLOCKER\u003c/strong\u003e\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #324\u003c/strong\u003e: Encryption at Rest (24–30 hours) — marked \u003cstrong class=\"markup--strong markup--p-strong\"\u003eCRITICAL BLOCKER\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"40c3\" id=\"40c3\" class=\"graf graf--p graf-after--p\"\u003eThose weren’t suggestions. Those weren’t “nice to have.” Those were blockers. Ted’s questions about security implementation had revealed what we didn’t have: role-based access control, encryption at rest. For a single-user alpha, maybe acceptable. For multi-user alpha with external testers? Absolutely not acceptable.\u003c/p\u003e\u003cp name=\"2e9a\" id=\"2e9a\" class=\"graf graf--p graf-after--p\"\u003eThe research didn’t just answer Ted’s questions. It revealed what we couldn’t ship without.\u003c/p\u003e\u003ch3 name=\"3078\" id=\"3078\" class=\"graf graf--h3 graf-after--p\"\u003eWhen test recovery reveals the path\u003c/h3\u003e\u003cp name=\"4b42\" id=\"4b42\" class=\"graf graf--p graf-after--h3\"\u003eThe next day brought test transformation. My Claude Code agent had been systematically fixing the test suite — not heroics, not rushing, just methodical work. Container initialization patterns. PyPDF2 migration. Webhook signature verification fixes. The kind of infrastructure work that doesn’t feel dramatic but compounds into significant progress.\u003c/p\u003e\u003cp name=\"92e9\" id=\"92e9\" class=\"graf graf--p graf-after--p\"\u003eThe test suite had jumped from 617 tests collectible to 2,306 tests collectible — a 257× increase. That shadow package had been hiding far more than we realized. But more importantly, the pass rate was climbing: 68.4% → 85%+. Not from fixing bugs in production code, but from fixing test infrastructure so tests could actually run and report accurately.\u003c/p\u003e\u003cp name=\"5a65\" id=\"5a65\" class=\"graf graf--p graf-after--p\"\u003eSLACK-SPATIAL integration recovered from 61% to 85% passing across three phases. Quick wins, OAuth methods, pipeline fixes. Eighteen tests that had been blocking now passing. The systematic approach was working — fix infrastructure, tests reveal real problems, fix real problems, infrastructure gets stronger.\u003c/p\u003e\u003cp name=\"c6c3\" id=\"c6c3\" class=\"graf graf--p graf-after--p\"\u003eBut the most significant development was the security audit findings. My Chief Architect had been reviewing the system comprehensively, and the assessment was clear: three FileRepository methods exposed cross-user file access vulnerabilities. If endpoint authentication got bypassed somehow, users could access other users’ files at the data layer.\u003c/p\u003e\u003cp name=\"991f\" id=\"991f\" class=\"graf graf--p graf-after--p\"\u003eThis was a P0 vulnerability. Not “should fix eventually.” Fix immediately.\u003c/p\u003e\u003cp name=\"5c22\" id=\"5c22\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNone of this would have even been detected as long as I was the only human user in the system.\u003c/em\u003e\u003c/p\u003e\u003ch3 name=\"7a8e\" id=\"7a8e\" class=\"graf graf--h3 graf-after--p\"\u003eWhen everything points to the same answer\u003c/h3\u003e\u003cp name=\"5228\" id=\"5228\" class=\"graf graf--p graf-after--h3\"\u003eBy late afternoon, three separate investigations — test infrastructure, Ted’s architecture review, security audit — had all identified the same critical gap: security.\u003c/p\u003e\u003cp name=\"43f6\" id=\"43f6\" class=\"graf graf--p graf-after--p\"\u003eThe test recovery showed we could achieve high pass rates through systematic work, but pass rates don’t matter if the security model is incomplete. Ted’s architecture review validated that our overall design was sound, but explicitly flagged RBAC and encryption as missing critical components. The security audit found actual P0 vulnerabilities that couldn’t ship to external users.\u003c/p\u003e\u003cp name=\"bb99\" id=\"bb99\" class=\"graf graf--p graf-after--p\"\u003eThree different perspectives. Three different investigation methods. Same conclusion.\u003c/p\u003e\u003cp name=\"2681\" id=\"2681\" class=\"graf graf--p graf-after--p\"\u003eMy Chief Architect synthesized everything into a clear strategic picture. Sprint S1 (Security Foundation) would require 81 hours total:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"10e4\" id=\"10e4\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSEC-RBAC\u003c/strong\u003e: 24 hours (P0 CRITICAL) — Role-based access control\u003c/li\u003e\u003cli name=\"f304\" id=\"f304\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSEC-ENCRYPT-ATREST\u003c/strong\u003e: 24 hours (P0 CRITICAL) — Encryption at rest\u003c/li\u003e\u003cli name=\"2abb\" id=\"2abb\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003ePython 3.11 upgrade\u003c/strong\u003e: 8 hours (security patches expired October 2025)\u003c/li\u003e\u003cli name=\"8fb0\" id=\"8fb0\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003ePerformance indexes\u003c/strong\u003e: 6 hours\u003c/li\u003e\u003cli name=\"70a2\" id=\"70a2\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eWindows compatibility\u003c/strong\u003e: 3 hours\u003c/li\u003e\u003cli name=\"a2bf\" id=\"a2bf\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eArchitectural singleton pattern\u003c/strong\u003e: 16 hours\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"40ad\" id=\"40ad\" class=\"graf graf--p graf-after--li\"\u003eRBAC and encryption weren’t suggestions. They were blockers. Non-negotiable before multi-user alpha. The external validation from Ted, the test infrastructure revealing system health, the security audit finding P0 vulnerabilities — everything converged on the same answer.\u003c/p\u003e\u003cp name=\"480f\" id=\"480f\" class=\"graf graf--p graf-after--p\"\u003eThe decision wasn’t “should we do security work.” The decision was “security work happens now, before any external alpha testing with multiple users.”\u003c/p\u003e\u003ch3 name=\"a385\" id=\"a385\" class=\"graf graf--h3 graf-after--p\"\u003eWhat convergence may reveal that single investigations can miss\u003c/h3\u003e\u003cp name=\"2456\" id=\"2456\" class=\"graf graf--p graf-after--h3\"\u003eAny one of these investigations alone might not have created certainty. Test infrastructure recovery showed 85% pass rates — great, but doesn’t necessarily mean “stop everything and fix security.” Ted’s architecture review identified RBAC and encryption gaps — important, but maybe deferrable if you’re still in single-user alpha. Security audit found P0 vulnerabilities — serious, but potentially fixable with quick patches.\u003c/p\u003e\u003cp name=\"fb27\" id=\"fb27\" class=\"graf graf--p graf-after--p\"\u003eBut three investigations converging? That’s certainty.\u003c/p\u003e\u003cp name=\"5d8b\" id=\"5d8b\" class=\"graf graf--p graf-after--p\"\u003eThe test recovery proved we could do systematic infrastructure work and see real results. The architecture review validated that our foundation was solid and identified exactly what was missing. The security audit found concrete vulnerabilities that demonstrated those missing pieces weren’t theoretical concerns.\u003c/p\u003e\u003cp name=\"217f\" id=\"217f\" class=\"graf graf--p graf-after--p\"\u003eEach investigation strengthened the others. Test infrastructure recovery showed our methodology worked. Ted’s validation confirmed our architecture could support what we needed to build. The security audit made the missing security features impossible to defer or minimize.\u003c/p\u003e\u003cp name=\"ace9\" id=\"ace9\" class=\"graf graf--p graf-after--p\"\u003eThis is what systematic building enables. You’re not just implementing features. You’re creating multiple feedback loops that all report on system health from different angles. When they all start pointing to the same issue, you know you’ve found something that actually matters.\u003c/p\u003e\u003ch3 name=\"8f32\" id=\"8f32\" class=\"graf graf--h3 graf-after--p\"\u003eWhen external validation accelerates internal decisions\u003c/h3\u003e\u003cp name=\"02cc\" id=\"02cc\" class=\"graf graf--p graf-after--h3\"\u003eTed’s involvement did something important beyond just identifying gaps. It accelerated decision-making. When your internal team identifies security gaps, there’s always a temptation to defer: “We’ll get to it later.” “It’s alpha, we can ship with known gaps.” “We’ll add security in the next phase.”\u003c/p\u003e\u003cp name=\"83c4\" id=\"83c4\" class=\"graf graf--p graf-after--p\"\u003eBut when an external expert whose judgment you trust deeply looks at your system and says “these specific things are critical blockers,” it removes ambiguity. It’s not your team being cautious or perfectionist. It’s an independent assessment confirming what you suspected but might have minimized.\u003c/p\u003e\u003cp name=\"fc74\" id=\"fc74\" class=\"graf graf--p graf-after--p\"\u003eThe seventeen GitHub issues from Ted’s research weren’t just task lists. They were external validation of internal concerns. When our security audit said “P0 vulnerability,” Analysis of Ted’s probing questions told us “RBAC is a critical blocker.” Two independent sources, same conclusion. That’s how you know you’re not overthinking it.\u003c/p\u003e\u003cp name=\"4856\" id=\"4856\" class=\"graf graf--p graf-after--p\"\u003eThis is the value of bringing experienced outside perspective into development. Not to tell you what to build, but to ask hard questions that reveal what you haven’t built yet. Ted didn’t design our security model. He asked questions that made us realize we needed a more complete security model before shipping to external users.\u003c/p\u003e\u003ch3 name=\"f9d4\" id=\"f9d4\" class=\"graf graf--h3 graf-after--p\"\u003eWhat certainty costs and buys\u003c/h3\u003e\u003cp name=\"810b\" id=\"810b\" class=\"graf graf--p graf-after--h3\"\u003eStopping feature work to fix security infrastructure costs time. Sprint S1 would take 81 hours — roughly two weeks of focused development. Two weeks not adding features, not fixing user-facing bugs, not improving UX. Just hardening security infrastructure that users won’t directly see or appreciate.\u003c/p\u003e\u003cp name=\"069c\" id=\"069c\" class=\"graf graf--p graf-after--p\"\u003eBut shipping without security would cost more. The first external security researcher finding the cross-user file access vulnerability would be catastrophic. The first multi-user alpha test exposing role-based access control gaps would be embarrassing. The first encryption audit failing would block any serious adoption.\u003c/p\u003e\u003cp name=\"c8ea\" id=\"c8ea\" class=\"graf graf--p graf-after--p\"\u003eThe convergence revealed certainty: security blocks alpha. Not “delays alpha” or “improves alpha.” Blocks. You can’t launch multi-user alpha testing with P0 vulnerabilities and missing critical security features. The external validation confirmed it. The test infrastructure proved we could do systematic work. The security audit quantified the risk.\u003c/p\u003e\u003cp name=\"9e88\" id=\"9e88\" class=\"graf graf--p graf-after--p\"\u003eSo the decision became simple: do Sprint S1 now, before external alpha, or don’t do external alpha. There’s no third option where you ship known P0 vulnerabilities to external users and hope nobody notices.\u003c/p\u003e\u003cp name=\"688b\" id=\"688b\" class=\"graf graf--p graf-after--p\"\u003eCertainty removes the temptation to defer. When multiple investigations from different angles all point to the same blocker, you stop debating whether it’s really a blocker. You fix it.\u003c/p\u003e\u003ch3 name=\"6f05\" id=\"6f05\" class=\"graf graf--h3 graf-after--p\"\u003eThe systematic building advantage\u003c/h3\u003e\u003cp name=\"635a\" id=\"635a\" class=\"graf graf--p graf-after--h3\"\u003eThis convergence moment only happened because we were building systematically across multiple dimensions simultaneously. Test infrastructure work, external architecture reviews, security audits, test pass rate improvements — all happening in parallel, all reporting on system health.\u003c/p\u003e\u003cp name=\"68c9\" id=\"68c9\" class=\"graf graf--p graf-after--p\"\u003eIf we’d only been doing feature work, we wouldn’t have discovered the shadow package hiding 617 tests. If we’d only been fixing tests, we wouldn’t have engaged Ted’s architectural expertise. If we’d only been focused on shipping, we wouldn’t have run comprehensive security audits.\u003c/p\u003e\u003cp name=\"805d\" id=\"805d\" class=\"graf graf--p graf-after--p\"\u003eSystematic building creates multiple feedback channels. Each channel reports different information. When they start converging on the same signal, you know you’ve found something real.\u003c/p\u003e\u003cp name=\"1a4a\" id=\"1a4a\" class=\"graf graf--p graf-after--p\"\u003eThe test suite went from 0% visibility to 68.4% baseline to 85%+ pass rate through systematic infrastructure work. Ted’s architecture review validated our foundation while identifying specific gaps. The security audit found concrete vulnerabilities. Three feedback channels, three perspectives, one conclusion: security blocks alpha.\u003c/p\u003e\u003cp name=\"aa8d\" id=\"aa8d\" class=\"graf graf--p graf-after--p\"\u003eThat’s the payoff of patience in process. You build enough feedback mechanisms that convergence becomes possible. And when convergence happens, certainty follows.\u003c/p\u003e\u003cp name=\"f2e7\" id=\"f2e7\" class=\"graf graf--p graf-after--p\"\u003eThe shadow package revealed what we couldn’t see. Ted’s questions revealed what we hadn’t built. The security audit revealed what we couldn’t ship. Together, they revealed what we needed to do next: Sprint S1, 81 hours, non-negotiable, before any external alpha testing.\u003c/p\u003e\u003cp name=\"adf7\" id=\"adf7\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eSometimes investigation becomes certainty not through one perfect insight, but through multiple imperfect investigations that all point the same direction. That’s when you know what to do next.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"When Investigation Becomes Certainty\",\"excerpt\":\"“All the tests agree!”November 19 to 20Sometimes you don’t know what’s blocking you until multiple investigations from completely different angles all point to the same answer. You think you’re doing unrelated work — recovering test infrastructure here, answering architecture questions there, imp...\",\"url\":\"/blog/when-investigation-becomes-certainty\",\"publishedAt\":\"Nov 26, 2025\",\"publishedAtISO\":\"2025-11-26T12:41:12.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/d4f984155c40\",\"featuredImage\":\"/assets/blog-images/d4f984155c40-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/when-investigation-becomes-certainty-d4f984155c40?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"when-investigation-becomes-certainty\",\"workDate\":\"Nov 26, 2025\",\"workDateISO\":\"2025-11-26T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2025-11-26\",\"featured\":false},\"content\":{\"title\":\"When Investigation Becomes Certainty\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"When Investigation Becomes Certainty | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christi
