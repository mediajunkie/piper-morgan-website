",\"template\":[\"$\",\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T3214,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A person and robot compare their map to the actual terrain\" src=\"https://cdn-images-1.medium.com/max/1024/1*MJVvtcE53XuIW_eNrWwb3A.png\" /\u003e\u003cfigcaption\u003e“The map is not the territory!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 16, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThursday morning at 8:26 AM, Code Agent deployed to investigate a test failure. Test 3 was returning HTTP 422 instead of success. Valid intent, proper authentication, should work — didn’t.\u003c/p\u003e\u003cp\u003eThe natural conclusion: Phase 1 broke something.\u003c/p\u003e\u003cp\u003eThe natural response: Roll back changes. Debug frantically. Fix “your” bug. Apologize for breaking tests.\u003c/p\u003e\u003cp\u003eCode Agent did none of these things.\u003c/p\u003e\u003cp\u003eInstead: 24 minutes of forensic investigation. Testing before the Phase 1 commit. Testing after the Phase 1 commit. Tracing the error back through git history to October 10.\u003c/p\u003e\u003cp\u003eAt 8:51 AM, the finding: “Phase 1 changes are working correctly! The ServiceUnavailable error is PRE-EXISTING.”\u003c/p\u003e\u003cp\u003eThis is the story of why systematic investigation prevents days of wasted effort — and how proving your work correct sometimes means finding what was broken before you arrived.\u003c/p\u003e\u003ch3\u003eThe test that failed\u003c/h3\u003e\u003cp\u003eTest 3: Send a valid intent to the API. Expect success response. Get HTTP 422 instead.\u003c/p\u003e\u003cp\u003eHTTP 422 means validation error. Something about the request is malformed. But the test was sending a valid intent. Authentication was correct. The request format matched the API specification.\u003c/p\u003e\u003cp\u003eEverything \u003cem\u003eshould\u003c/em\u003e work. But didn’t.\u003c/p\u003e\u003cp\u003ePhase 1 had just been deployed. New error handling standards. REST-compliant status codes. The connection was obvious: Phase 1 broke the intent endpoint.\u003c/p\u003e\u003cp\u003eThis is the moment where projects diverge. Roll back and debug? Or investigate systematically?\u003c/p\u003e\u003cp\u003eThe choice: Investigation before assumption.\u003c/p\u003e\u003ch3\u003eThe forensic approach\u003c/h3\u003e\u003cp\u003eCode Agent’s investigation sequence:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 1\u003c/strong\u003e: Don’t assume Phase 1 broke it. Test the assumption.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 2\u003c/strong\u003e: Check out commit 02ceaf06 (immediately before Phase 1).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 3\u003c/strong\u003e: Run the same test against pre-Phase 1 code.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResult\u003c/strong\u003e: Same error. But HTTP status 200, not 422.\u003c/p\u003e\u003cp\u003eThis was the critical insight. The error existed \u003cem\u003ebefore\u003c/em\u003e Phase 1. Phase 1 didn’t break anything — it exposed what was already broken by returning the correct HTTP status code.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 4\u003c/strong\u003e: Trace the error back through git history.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFinding\u003c/strong\u003e: ServiceRegistry gap from October 10 (commit d6b8aa09), five days earlier.\u003c/p\u003e\u003cp\u003eThe problem: OrchestrationEngine depends on ServiceRegistry.get_llm() but the service wasn’t being registered in all startup paths. main.py registered services but didn’t start the server. web/app.py started the server but didn’t register services.\u003c/p\u003e\u003cp\u003ePhase 1 made this visible by converting the silent failure (HTTP 200 with error in body) into proper REST error (HTTP 422).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInvestigation time\u003c/strong\u003e: 24 minutes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDays of wrong debugging prevented\u003c/strong\u003e: Unknown, but likely multiple.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProper fix enabled\u003c/strong\u003e: DDD Service Container implementation addressing the root architectural gap.\u003c/p\u003e\u003ch3\u003eWhat investigation revealed\u003c/h3\u003e\u003cp\u003eThe forensic work prevented wasted debugging time and also revealed architectural truth.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe root problem\u003c/strong\u003e: Not in Phase 1’s error handling. In the service initialization pattern established five days earlier.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe proper solution\u003c/strong\u003e: DDD Service Container pattern. Add LLM service initialization to web/app.py lifespan. Check if registered, initialize if needed. Enable independent server startup without breaking existing code.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImplementation time\u003c/strong\u003e: 2 hours 50 minutes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe payoff\u003c/strong\u003e: Every subsequent phase ran 60–90% faster than estimated because the foundation was solid.\u003c/p\u003e\u003cp\u003ePhase 2 (15+ endpoints): 50 minutes versus 2+ hours estimated. 60% faster.\u003c/p\u003e\u003cp\u003ePhase 3 (test audit): 5 minutes versus 45–60 minutes estimated. 90% faster.\u003c/p\u003e\u003cp\u003ePhase 4 (documentation): 6 minutes versus 30–45 minutes estimated. 87% faster.\u003c/p\u003e\u003cp\u003eThe time “lost” on investigation and proper fix paid exponential dividends in execution speed.\u003c/p\u003e\u003cp\u003eThis is why investigation prevents waste. Not because it’s fast — because it’s \u003cem\u003ecorrect\u003c/em\u003e.\u003c/p\u003e\u003ch3\u003eThe discipline of testing assumptions\u003c/h3\u003e\u003cp\u003eThe pattern that worked:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDon’t assume the recent work broke things.\u003c/strong\u003e Test the assumption. Run the same test against pre-change code. Compare results. Let evidence guide conclusions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrace issues to root causes.\u003c/strong\u003e When an error appears, find when it was introduced. Use git history. Test specific commits. Don’t fix symptoms without understanding origins.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSeparate concerns clearly.\u003c/strong\u003e Phase 1 was about error handling. The ServiceRegistry gap was about service initialization. These are different problems requiring different solutions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInvest in proper fixes.\u003c/strong\u003e The 2h 50min DDD Service Container implementation addressed the architectural gap completely. No workarounds. No “we’ll fix this later.” Proper solution enabling future velocity.\u003c/p\u003e\u003cp\u003eThis isn’t just debugging methodology. It’s architectural discipline.\u003c/p\u003e\u003cp\u003eWhen something breaks, investigate systematically. When investigation reveals root causes, fix them properly. When proper fixes take time, invest it. The compound returns make the investment trivial.\u003c/p\u003e\u003ch3\u003eDocumentation bugs equal code bugs\u003c/h3\u003e\u003cp\u003eLater that day, Phase Z validation caught something else: a critical documentation error.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe bug\u003c/strong\u003e: Documentation examples showed {\u0026quot;intent\u0026quot;: \u0026quot;show me standup\u0026quot;} but actual API expects {\u0026quot;message\u0026quot;: \u0026quot;show me standup\u0026quot;}.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImpact\u003c/strong\u003e: Would have confused all API consumers. Every example would fail. External developers would be frustrated. Documentation hotfix required. Credibility damaged.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHow it was caught\u003c/strong\u003e: Phase Z validation script ran real API calls, not theoretical examples.\u003c/p\u003e\u003cp\u003eThis typo was a specification violation that would have broken all example code.\u003c/p\u003e\u003cp\u003eThe philosophy: Treat documentation with the same rigor as production code. Documentation examples should be executable. Validation should run real API calls. Bugs in docs are bugs in the system.\u003c/p\u003e\u003cp\u003eThe traditional approach: Write documentation, publish it, hope examples work.\u003c/p\u003e\u003cp\u003eThe systematic approach: Documentation examples are code. Validate them in CI/CD. Catch errors before users see them.\u003c/p\u003e\u003cp\u003eOne small field name mismatch. Massive downstream impact. Caught because we treated documentation like production code.\u003c/p\u003e\u003ch3\u003eTesting reality versus testing ideals\u003c/h3\u003e\u003cp\u003ePhase Z also revealed something about validation philosophy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInitial approach\u003c/strong\u003e: Validate against idealized REST behavior.\u003c/p\u003e\u003cul\u003e\u003cli\u003eEmpty intent → 422 validation error\u003c/li\u003e\u003cli\u003eMissing user → 404 not found\u003c/li\u003e\u003cli\u003eInvalid workflow → 422 validation error\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eActual behavior\u003c/strong\u003e: System has intentional design choices.\u003c/p\u003e\u003cul\u003e\u003cli\u003eEmpty intent → 500 (service layer validation, correct for this architecture)\u003c/li\u003e\u003cli\u003eMissing user → 200 with defaults (intentional UX improvement)\u003c/li\u003e\u003cli\u003eInvalid workflow → 404 (FastAPI routing)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eCode Agent’s realization: “Test what works, not ideals. System works correctly; tests should validate reality.”\u003c/p\u003e\u003cp\u003eThis is pragmatic quality: Test what the system does, not what textbooks say it should do. (I reviewed this with my Chief Architect to make sure we were not just “teaching to the test”.)\u003c/p\u003e\u003cp\u003eIntentional design choices aren’t bugs. Service-level validation has its place. Graceful degradation improves UX. Not every edge case needs endpoint-level validation.\u003c/p\u003e\u003cp\u003eDocument these choices. Explain why they’re intentional. Don’t force conformance to textbook patterns when actual patterns serve users better.\u003c/p\u003e\u003cp\u003eThe validation script evolved: Stop expecting idealized behavior. Start validating actual system behavior. Result: 5/5 tests passing with realistic expectations.\u003c/p\u003e\u003ch3\u003eWhat Sprint A2 completion teaches\u003c/h3\u003e\u003cp\u003eWednesday completed Sprint A2. Five issues shipped. Zero regressions. 100% test pass rate.\u003c/p\u003e\u003cp\u003eBut the remarkable thing wasn’t the metrics. It was the methodology validation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #142\u003c/strong\u003e: Notion validation (78 minutes, proper investigation pattern)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #136\u003c/strong\u003e: Hardcoding removal (15 minute verification — already complete!)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #165\u003c/strong\u003e: Notion API upgrade (SDK + API version + data_source)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue#109\u003c/strong\u003e: GitHub legacy deprecation (190 lines eliminated)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #215\u003c/strong\u003e: Error standardization (REST-compliant, validated, documented)\u003c/p\u003e\u003cp\u003eEvery issue completed properly. No shortcuts. No “we’ll fix this later.” No technical debt accumulated.\u003c/p\u003e\u003cp\u003eThe sprint demonstrated something important: When methodology emphasizes investigation over assumption, proper fixes over workarounds, and validation over hope — sprints complete successfully and sustainably.\u003c/p\u003e\u003cp\u003eThe 24-minute investigation that started Wednesday wasn’t about saving time. It was about establishing truth. Phase 1 wasn’t broken — it was working correctly by revealing what was broken before.\u003c/p\u003e\u003cp\u003eThe 2h 50min architectural fix wasn’t overhead. It was foundation that enabled 60–90% faster execution on all subsequent work.\u003c/p\u003e\u003cp\u003eThe documentation validation wasn’t pedantic. It prevented every external developer from hitting broken examples.\u003c/p\u003e\u003cp\u003eThe reality-based testing wasn’t compromising standards. It was documenting intentional design choices rather than forcing conformance to ideals.\u003c/p\u003e\u003ch3\u003eThe benefits of proper investigation\u003c/h3\u003e\u003cp\u003eLooking back at the days’ work, the pattern is clear:\u003c/p\u003e\u003cp\u003eEarly investigation (24 minutes) → Proper diagnosis (pre-existing issue) → Architectural fix (2h 50min) → Faster execution (60–90% throughout) → Sustained velocity (rest of sprint)\u003c/p\u003e\u003cp\u003eWithout investigation: Days debugging wrong code → Wrong fix applied → Technical debt accumulated → Slower execution → Compounding problems\u003c/p\u003e\u003cp\u003eAt least when it comes to working with forgetful AIs, the time spent investigating isn’t overhead. It’s the investment that prevents waste.\u003c/p\u003e\u003cp\u003eThe discipline to test assumptions isn’t paranoia. It’s the practice that finds truth.\u003c/p\u003e\u003cp\u003eThe commitment to proper fixes isn’t perfectionism. It’s the foundation that enables velocity.\u003c/p\u003e\u003cp\u003eWednesday proved what systematic investigation enables: completing work correctly the first time, at sustainable pace, with quality maintained throughout.\u003c/p\u003e\u003ch3\u003eWhat tomorrow will reveal\u003c/h3\u003e\u003cp\u003eSprint A2 completed. Sprint A3 about to start.\u003c/p\u003e\u003cp\u003eBut today’s investigation pattern — systematic forensics, proper fixes, documentation rigor, reality-based validation — would prove even more valuable in the days ahead.\u003c/p\u003e\u003cp\u003eThe methodology wasn’t lucky. It was systematic. The investigation discipline wasn’t overhead. It was foundation. The proper fixes weren’t perfectionism. They were quality that compounds.\u003c/p\u003e\u003cp\u003eInvestigation prevents waste. Not by being fast, but by being correct.\u003c/p\u003e\u003cp\u003eWhen tests fail, investigate before assuming. When investigation reveals root causes, fix them properly. When proper fixes take time, invest it. The compound returns make the investment trivial.\u003c/p\u003e\u003cp\u003eA 24-minute investigation saved days of work. Not through speed — through discipline.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: “As An Inchworm I Am Not Dismayed,” when the Sprint A3 launch reveals doubled scope and the philosophical acceptance that transforms potential setback into systematic discovery.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced the moment of discovering your “broken” code was actually working correctly by exposing what was broken before? How did investigation prevent wasted debugging effort?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=5566df36f2ae\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/investigating-our-own-past-to-plan-the-way-forward-5566df36f2ae\"\u003eInvestigating Our Own Past to Plan the Way Forward\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T4ce7,"])</script><script>self.__next_f.push([1,"\u003csection name=\"ae80\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"9822\" id=\"9822\" class=\"graf graf--h3 graf--leading graf--title\"\u003eInvestigating Our Own Past to Plan the Way Forward\u003c/h3\u003e\u003cfigure name=\"78a0\" id=\"78a0\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*MJVvtcE53XuIW_eNrWwb3A.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A person and robot compare their map to the actual terrain\" src=\"https://cdn-images-1.medium.com/max/800/1*MJVvtcE53XuIW_eNrWwb3A.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“The map is not the territory!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"c77f\" id=\"c77f\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 16, 2025\u003c/em\u003e\u003c/p\u003e\u003cp name=\"bed2\" id=\"bed2\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ehursday morning at 8:26 AM, Code Agent deployed to investigate a test failure. Test 3 was returning HTTP 422 instead of success. Valid intent, proper authentication, should work — didn’t.\u003c/p\u003e\u003cp name=\"a9fc\" id=\"a9fc\" class=\"graf graf--p graf-after--p\"\u003eThe natural conclusion: Phase 1 broke something.\u003c/p\u003e\u003cp name=\"ed77\" id=\"ed77\" class=\"graf graf--p graf-after--p\"\u003eThe natural response: Roll back changes. Debug frantically. Fix “your” bug. Apologize for breaking tests.\u003c/p\u003e\u003cp name=\"7177\" id=\"7177\" class=\"graf graf--p graf-after--p\"\u003eCode Agent did none of these things.\u003c/p\u003e\u003cp name=\"41e9\" id=\"41e9\" class=\"graf graf--p graf-after--p\"\u003eInstead: 24 minutes of forensic investigation. Testing before the Phase 1 commit. Testing after the Phase 1 commit. Tracing the error back through git history to October 10.\u003c/p\u003e\u003cp name=\"7a05\" id=\"7a05\" class=\"graf graf--p graf-after--p\"\u003eAt 8:51 AM, the finding: “Phase 1 changes are working correctly! The ServiceUnavailable error is PRE-EXISTING.”\u003c/p\u003e\u003cp name=\"2558\" id=\"2558\" class=\"graf graf--p graf-after--p\"\u003eThis is the story of why systematic investigation prevents days of wasted effort — and how proving your work correct sometimes means finding what was broken before you arrived.\u003c/p\u003e\u003ch3 name=\"eaba\" id=\"eaba\" class=\"graf graf--h3 graf-after--p\"\u003eThe test that failed\u003c/h3\u003e\u003cp name=\"1657\" id=\"1657\" class=\"graf graf--p graf-after--h3\"\u003eTest 3: Send a valid intent to the API. Expect success response. Get HTTP 422 instead.\u003c/p\u003e\u003cp name=\"009d\" id=\"009d\" class=\"graf graf--p graf-after--p\"\u003eHTTP 422 means validation error. Something about the request is malformed. But the test was sending a valid intent. Authentication was correct. The request format matched the API specification.\u003c/p\u003e\u003cp name=\"dd05\" id=\"dd05\" class=\"graf graf--p graf-after--p\"\u003eEverything \u003cem class=\"markup--em markup--p-em\"\u003eshould\u003c/em\u003e work. But didn’t.\u003c/p\u003e\u003cp name=\"c464\" id=\"c464\" class=\"graf graf--p graf-after--p\"\u003ePhase 1 had just been deployed. New error handling standards. REST-compliant status codes. The connection was obvious: Phase 1 broke the intent endpoint.\u003c/p\u003e\u003cp name=\"c729\" id=\"c729\" class=\"graf graf--p graf-after--p\"\u003eThis is the moment where projects diverge. Roll back and debug? Or investigate systematically?\u003c/p\u003e\u003cp name=\"6917\" id=\"6917\" class=\"graf graf--p graf-after--p\"\u003eThe choice: Investigation before assumption.\u003c/p\u003e\u003ch3 name=\"97a7\" id=\"97a7\" class=\"graf graf--h3 graf-after--p\"\u003eThe forensic approach\u003c/h3\u003e\u003cp name=\"0723\" id=\"0723\" class=\"graf graf--p graf-after--h3\"\u003eCode Agent’s investigation sequence:\u003c/p\u003e\u003cp name=\"a8dd\" id=\"a8dd\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 1\u003c/strong\u003e: Don’t assume Phase 1 broke it. Test the assumption.\u003c/p\u003e\u003cp name=\"1ffa\" id=\"1ffa\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 2\u003c/strong\u003e: Check out commit 02ceaf06 (immediately before Phase 1).\u003c/p\u003e\u003cp name=\"52da\" id=\"52da\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 3\u003c/strong\u003e: Run the same test against pre-Phase 1 code.\u003c/p\u003e\u003cp name=\"752b\" id=\"752b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eResult\u003c/strong\u003e: Same error. But HTTP status 200, not 422.\u003c/p\u003e\u003cp name=\"ac33\" id=\"ac33\" class=\"graf graf--p graf-after--p\"\u003eThis was the critical insight. The error existed \u003cem class=\"markup--em markup--p-em\"\u003ebefore\u003c/em\u003e Phase 1. Phase 1 didn’t break anything — it exposed what was already broken by returning the correct HTTP status code.\u003c/p\u003e\u003cp name=\"792c\" id=\"792c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 4\u003c/strong\u003e: Trace the error back through git history.\u003c/p\u003e\u003cp name=\"e452\" id=\"e452\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFinding\u003c/strong\u003e: ServiceRegistry gap from October 10 (commit d6b8aa09), five days earlier.\u003c/p\u003e\u003cp name=\"871e\" id=\"871e\" class=\"graf graf--p graf-after--p\"\u003eThe problem: OrchestrationEngine depends on ServiceRegistry.get_llm() but the service wasn’t being registered in all startup paths. main.py registered services but didn’t start the server. web/app.py started the server but didn’t register services.\u003c/p\u003e\u003cp name=\"6625\" id=\"6625\" class=\"graf graf--p graf-after--p\"\u003ePhase 1 made this visible by converting the silent failure (HTTP 200 with error in body) into proper REST error (HTTP 422).\u003c/p\u003e\u003cp name=\"bb2c\" id=\"bb2c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInvestigation time\u003c/strong\u003e: 24 minutes.\u003c/p\u003e\u003cp name=\"c2a0\" id=\"c2a0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDays of wrong debugging prevented\u003c/strong\u003e: Unknown, but likely multiple.\u003c/p\u003e\u003cp name=\"5e05\" id=\"5e05\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProper fix enabled\u003c/strong\u003e: DDD Service Container implementation addressing the root architectural gap.\u003c/p\u003e\u003ch3 name=\"716c\" id=\"716c\" class=\"graf graf--h3 graf-after--p\"\u003eWhat investigation revealed\u003c/h3\u003e\u003cp name=\"d2fa\" id=\"d2fa\" class=\"graf graf--p graf-after--h3\"\u003eThe forensic work prevented wasted debugging time and also revealed architectural truth.\u003c/p\u003e\u003cp name=\"2b76\" id=\"2b76\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe root problem\u003c/strong\u003e: Not in Phase 1’s error handling. In the service initialization pattern established five days earlier.\u003c/p\u003e\u003cp name=\"6899\" id=\"6899\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe proper solution\u003c/strong\u003e: DDD Service Container pattern. Add LLM service initialization to web/app.py lifespan. Check if registered, initialize if needed. Enable independent server startup without breaking existing code.\u003c/p\u003e\u003cp name=\"3b7d\" id=\"3b7d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImplementation time\u003c/strong\u003e: 2 hours 50 minutes.\u003c/p\u003e\u003cp name=\"0903\" id=\"0903\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe payoff\u003c/strong\u003e: Every subsequent phase ran 60–90% faster than estimated because the foundation was solid.\u003c/p\u003e\u003cp name=\"eda6\" id=\"eda6\" class=\"graf graf--p graf-after--p\"\u003ePhase 2 (15+ endpoints): 50 minutes versus 2+ hours estimated. 60% faster.\u003c/p\u003e\u003cp name=\"3eeb\" id=\"3eeb\" class=\"graf graf--p graf-after--p\"\u003ePhase 3 (test audit): 5 minutes versus 45–60 minutes estimated. 90% faster.\u003c/p\u003e\u003cp name=\"1abf\" id=\"1abf\" class=\"graf graf--p graf-after--p\"\u003ePhase 4 (documentation): 6 minutes versus 30–45 minutes estimated. 87% faster.\u003c/p\u003e\u003cp name=\"9543\" id=\"9543\" class=\"graf graf--p graf-after--p\"\u003eThe time “lost” on investigation and proper fix paid exponential dividends in execution speed.\u003c/p\u003e\u003cp name=\"2f6b\" id=\"2f6b\" class=\"graf graf--p graf-after--p\"\u003eThis is why investigation prevents waste. Not because it’s fast — because it’s \u003cem class=\"markup--em markup--p-em\"\u003ecorrect\u003c/em\u003e.\u003c/p\u003e\u003ch3 name=\"545d\" id=\"545d\" class=\"graf graf--h3 graf-after--p\"\u003eThe discipline of testing assumptions\u003c/h3\u003e\u003cp name=\"d9f6\" id=\"d9f6\" class=\"graf graf--p graf-after--h3\"\u003eThe pattern that worked:\u003c/p\u003e\u003cp name=\"ef2f\" id=\"ef2f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDon’t assume the recent work broke things.\u003c/strong\u003e Test the assumption. Run the same test against pre-change code. Compare results. Let evidence guide conclusions.\u003c/p\u003e\u003cp name=\"2e07\" id=\"2e07\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTrace issues to root causes.\u003c/strong\u003e When an error appears, find when it was introduced. Use git history. Test specific commits. Don’t fix symptoms without understanding origins.\u003c/p\u003e\u003cp name=\"169f\" id=\"169f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSeparate concerns clearly.\u003c/strong\u003e Phase 1 was about error handling. The ServiceRegistry gap was about service initialization. These are different problems requiring different solutions.\u003c/p\u003e\u003cp name=\"9425\" id=\"9425\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInvest in proper fixes.\u003c/strong\u003e The 2h 50min DDD Service Container implementation addressed the architectural gap completely. No workarounds. No “we’ll fix this later.” Proper solution enabling future velocity.\u003c/p\u003e\u003cp name=\"424b\" id=\"424b\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t just debugging methodology. It’s architectural discipline.\u003c/p\u003e\u003cp name=\"6c1c\" id=\"6c1c\" class=\"graf graf--p graf-after--p\"\u003eWhen something breaks, investigate systematically. When investigation reveals root causes, fix them properly. When proper fixes take time, invest it. The compound returns make the investment trivial.\u003c/p\u003e\u003ch3 name=\"a021\" id=\"a021\" class=\"graf graf--h3 graf-after--p\"\u003eDocumentation bugs equal code bugs\u003c/h3\u003e\u003cp name=\"5949\" id=\"5949\" class=\"graf graf--p graf-after--h3\"\u003eLater that day, Phase Z validation caught something else: a critical documentation error.\u003c/p\u003e\u003cp name=\"450b\" id=\"450b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe bug\u003c/strong\u003e: Documentation examples showed \u003ccode class=\"markup--code markup--p-code\"\u003e{\u0026quot;intent\u0026quot;: \u0026quot;show me standup\u0026quot;}\u003c/code\u003e but actual API expects \u003ccode class=\"markup--code markup--p-code\"\u003e{\u0026quot;message\u0026quot;: \u0026quot;show me standup\u0026quot;}\u003c/code\u003e.\u003c/p\u003e\u003cp name=\"b838\" id=\"b838\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImpact\u003c/strong\u003e: Would have confused all API consumers. Every example would fail. External developers would be frustrated. Documentation hotfix required. Credibility damaged.\u003c/p\u003e\u003cp name=\"2bf7\" id=\"2bf7\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eHow it was caught\u003c/strong\u003e: Phase Z validation script ran real API calls, not theoretical examples.\u003c/p\u003e\u003cp name=\"06c2\" id=\"06c2\" class=\"graf graf--p graf-after--p\"\u003eThis typo was a specification violation that would have broken all example code.\u003c/p\u003e\u003cp name=\"fea4\" id=\"fea4\" class=\"graf graf--p graf-after--p\"\u003eThe philosophy: Treat documentation with the same rigor as production code. Documentation examples should be executable. Validation should run real API calls. Bugs in docs are bugs in the system.\u003c/p\u003e\u003cp name=\"4dc2\" id=\"4dc2\" class=\"graf graf--p graf-after--p\"\u003eThe traditional approach: Write documentation, publish it, hope examples work.\u003c/p\u003e\u003cp name=\"328f\" id=\"328f\" class=\"graf graf--p graf-after--p\"\u003eThe systematic approach: Documentation examples are code. Validate them in CI/CD. Catch errors before users see them.\u003c/p\u003e\u003cp name=\"a21b\" id=\"a21b\" class=\"graf graf--p graf-after--p\"\u003eOne small field name mismatch. Massive downstream impact. Caught because we treated documentation like production code.\u003c/p\u003e\u003ch3 name=\"e0f1\" id=\"e0f1\" class=\"graf graf--h3 graf-after--p\"\u003eTesting reality versus testing ideals\u003c/h3\u003e\u003cp name=\"c57c\" id=\"c57c\" class=\"graf graf--p graf-after--h3\"\u003ePhase Z also revealed something about validation philosophy.\u003c/p\u003e\u003cp name=\"f65c\" id=\"f65c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eInitial approach\u003c/strong\u003e: Validate against idealized REST behavior.\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"9f1d\" id=\"9f1d\" class=\"graf graf--li graf-after--p\"\u003eEmpty intent → 422 validation error\u003c/li\u003e\u003cli name=\"5a71\" id=\"5a71\" class=\"graf graf--li graf-after--li\"\u003eMissing user → 404 not found\u003c/li\u003e\u003cli name=\"31ce\" id=\"31ce\" class=\"graf graf--li graf-after--li\"\u003eInvalid workflow → 422 validation error\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"6c1b\" id=\"6c1b\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eActual behavior\u003c/strong\u003e: System has intentional design choices.\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"0cca\" id=\"0cca\" class=\"graf graf--li graf-after--p\"\u003eEmpty intent → 500 (service layer validation, correct for this architecture)\u003c/li\u003e\u003cli name=\"81b5\" id=\"81b5\" class=\"graf graf--li graf-after--li\"\u003eMissing user → 200 with defaults (intentional UX improvement)\u003c/li\u003e\u003cli name=\"1c60\" id=\"1c60\" class=\"graf graf--li graf-after--li\"\u003eInvalid workflow → 404 (FastAPI routing)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"a246\" id=\"a246\" class=\"graf graf--p graf-after--li\"\u003eCode Agent’s realization: “Test what works, not ideals. System works correctly; tests should validate reality.”\u003c/p\u003e\u003cp name=\"ec66\" id=\"ec66\" class=\"graf graf--p graf-after--p\"\u003eThis is pragmatic quality: Test what the system does, not what textbooks say it should do. (I reviewed this with my Chief Architect to make sure we were not just “teaching to the test”.)\u003c/p\u003e\u003cp name=\"1e94\" id=\"1e94\" class=\"graf graf--p graf-after--p\"\u003eIntentional design choices aren’t bugs. Service-level validation has its place. Graceful degradation improves UX. Not every edge case needs endpoint-level validation.\u003c/p\u003e\u003cp name=\"dcbe\" id=\"dcbe\" class=\"graf graf--p graf-after--p\"\u003eDocument these choices. Explain why they’re intentional. Don’t force conformance to textbook patterns when actual patterns serve users better.\u003c/p\u003e\u003cp name=\"3fc3\" id=\"3fc3\" class=\"graf graf--p graf-after--p\"\u003eThe validation script evolved: Stop expecting idealized behavior. Start validating actual system behavior. Result: 5/5 tests passing with realistic expectations.\u003c/p\u003e\u003ch3 name=\"e13b\" id=\"e13b\" class=\"graf graf--h3 graf-after--p\"\u003eWhat Sprint A2 completion teaches\u003c/h3\u003e\u003cp name=\"0787\" id=\"0787\" class=\"graf graf--p graf-after--h3\"\u003eWednesday completed Sprint A2. Five issues shipped. Zero regressions. 100% test pass rate.\u003c/p\u003e\u003cp name=\"a5b7\" id=\"a5b7\" class=\"graf graf--p graf-after--p\"\u003eBut the remarkable thing wasn’t the metrics. It was the methodology validation.\u003c/p\u003e\u003cp name=\"fc54\" id=\"fc54\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #142\u003c/strong\u003e: Notion validation (78 minutes, proper investigation pattern)\u003c/p\u003e\u003cp name=\"bed9\" id=\"bed9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #136\u003c/strong\u003e: Hardcoding removal (15 minute verification — already complete!)\u003c/p\u003e\u003cp name=\"0642\" id=\"0642\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #165\u003c/strong\u003e: Notion API upgrade (SDK + API version + data_source)\u003c/p\u003e\u003cp name=\"d058\" id=\"d058\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue#109\u003c/strong\u003e: GitHub legacy deprecation (190 lines eliminated)\u003c/p\u003e\u003cp name=\"ca2c\" id=\"ca2c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #215\u003c/strong\u003e: Error standardization (REST-compliant, validated, documented)\u003c/p\u003e\u003cp name=\"28b7\" id=\"28b7\" class=\"graf graf--p graf-after--p\"\u003eEvery issue completed properly. No shortcuts. No “we’ll fix this later.” No technical debt accumulated.\u003c/p\u003e\u003cp name=\"bf4e\" id=\"bf4e\" class=\"graf graf--p graf-after--p\"\u003eThe sprint demonstrated something important: When methodology emphasizes investigation over assumption, proper fixes over workarounds, and validation over hope — sprints complete successfully and sustainably.\u003c/p\u003e\u003cp name=\"886c\" id=\"886c\" class=\"graf graf--p graf-after--p\"\u003eThe 24-minute investigation that started Wednesday wasn’t about saving time. It was about establishing truth. Phase 1 wasn’t broken — it was working correctly by revealing what was broken before.\u003c/p\u003e\u003cp name=\"c929\" id=\"c929\" class=\"graf graf--p graf-after--p\"\u003eThe 2h 50min architectural fix wasn’t overhead. It was foundation that enabled 60–90% faster execution on all subsequent work.\u003c/p\u003e\u003cp name=\"9093\" id=\"9093\" class=\"graf graf--p graf-after--p\"\u003eThe documentation validation wasn’t pedantic. It prevented every external developer from hitting broken examples.\u003c/p\u003e\u003cp name=\"abdb\" id=\"abdb\" class=\"graf graf--p graf-after--p\"\u003eThe reality-based testing wasn’t compromising standards. It was documenting intentional design choices rather than forcing conformance to ideals.\u003c/p\u003e\u003ch3 name=\"feb4\" id=\"feb4\" class=\"graf graf--h3 graf-after--p\"\u003eThe benefits of proper investigation\u003c/h3\u003e\u003cp name=\"802b\" id=\"802b\" class=\"graf graf--p graf-after--h3\"\u003eLooking back at the days’ work, the pattern is clear:\u003c/p\u003e\u003cp name=\"86d2\" id=\"86d2\" class=\"graf graf--p graf-after--p\"\u003eEarly investigation (24 minutes) → Proper diagnosis (pre-existing issue) → Architectural fix (2h 50min) → Faster execution (60–90% throughout) → Sustained velocity (rest of sprint)\u003c/p\u003e\u003cp name=\"6c9c\" id=\"6c9c\" class=\"graf graf--p graf-after--p\"\u003eWithout investigation: Days debugging wrong code → Wrong fix applied → Technical debt accumulated → Slower execution → Compounding problems\u003c/p\u003e\u003cp name=\"ed41\" id=\"ed41\" class=\"graf graf--p graf-after--p\"\u003eAt least when it comes to working with forgetful AIs, the time spent investigating isn’t overhead. It’s the investment that prevents waste.\u003c/p\u003e\u003cp name=\"db1e\" id=\"db1e\" class=\"graf graf--p graf-after--p\"\u003eThe discipline to test assumptions isn’t paranoia. It’s the practice that finds truth.\u003c/p\u003e\u003cp name=\"eb74\" id=\"eb74\" class=\"graf graf--p graf-after--p\"\u003eThe commitment to proper fixes isn’t perfectionism. It’s the foundation that enables velocity.\u003c/p\u003e\u003cp name=\"aa78\" id=\"aa78\" class=\"graf graf--p graf-after--p\"\u003eWednesday proved what systematic investigation enables: completing work correctly the first time, at sustainable pace, with quality maintained throughout.\u003c/p\u003e\u003ch3 name=\"ed12\" id=\"ed12\" class=\"graf graf--h3 graf-after--p\"\u003eWhat tomorrow will reveal\u003c/h3\u003e\u003cp name=\"f244\" id=\"f244\" class=\"graf graf--p graf-after--h3\"\u003eSprint A2 completed. Sprint A3 about to start.\u003c/p\u003e\u003cp name=\"335f\" id=\"335f\" class=\"graf graf--p graf-after--p\"\u003eBut today’s investigation pattern — systematic forensics, proper fixes, documentation rigor, reality-based validation — would prove even more valuable in the days ahead.\u003c/p\u003e\u003cp name=\"5973\" id=\"5973\" class=\"graf graf--p graf-after--p\"\u003eThe methodology wasn’t lucky. It was systematic. The investigation discipline wasn’t overhead. It was foundation. The proper fixes weren’t perfectionism. They were quality that compounds.\u003c/p\u003e\u003cp name=\"f15d\" id=\"f15d\" class=\"graf graf--p graf-after--p\"\u003eInvestigation prevents waste. Not by being fast, but by being correct.\u003c/p\u003e\u003cp name=\"ce64\" id=\"ce64\" class=\"graf graf--p graf-after--p\"\u003eWhen tests fail, investigate before assuming. When investigation reveals root causes, fix them properly. When proper fixes take time, invest it. The compound returns make the investment trivial.\u003c/p\u003e\u003cp name=\"cd82\" id=\"cd82\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eA 24-minute investigation saved days of work. Not through speed — through discipline.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Investigating Our Own Past to Plan the Way Forward\",\"excerpt\":\"“The map is not the territory!”October 16, 2025Thursday morning at 8:26 AM, Code Agent deployed to investigate a test failure. Test 3 was returning HTTP 422 instead of success. Valid intent, proper authentication, should work — didn’t.The natural conclusion: Phase 1 broke something.The natural re...\",\"url\":\"/blog/investigating-our-own-past-to-plan\",\"publishedAt\":\"Oct 23, 2025\",\"publishedAtISO\":\"2025-10-23T13:34:25.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/5566df36f2ae\",\"featuredImage\":\"/assets/blog-images/5566df36f2ae-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/investigating-our-own-past-to-plan-the-way-forward-5566df36f2ae?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"investigating-our-own-past-to-plan\",\"workDate\":\"Oct 23, 2025\",\"workDateISO\":\"2025-10-23T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2025-10-23\",\"featured\":false},\"content\":{\"title\":\"Investigating Our Own Past to Plan the Way Forward\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Investigating Our Own Past to Plan the Way Forward | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\
