{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-d77bb6e505e4c783.js\"],\"BlogPostContent\"]\n1a:T24fa,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 29–30, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eA few weeks ago I started moving my agents to a new way of working. I called it the \"duty cycle.\" Each agent runs on its own schedule, checks its mailbox, picks up unblocked work, and signs off cleanly. The design had been getting better in fits and starts. By the end of last week it was good enough to spread. So that was the focus I set on Friday: get every agent onto the cycle, and keep iterating the design while we did it, before anybody went chasing a new idea.\u003c/p\u003e\n\u003cp\u003eThere's a version of this story where rolling out a new process is a slog: memos nobody reads, a kickoff meeting, three reminders, and a laggard you have to chase for a month. This is not one of those stories. What was cool was how fast the first agent moved once we lowered the barrier, and then a separate thing that happened the next day about what you catch when you check more than feels necessary.\u003c/p\u003e\n\u003ch1\u003eThe sealed package\u003c/h1\u003e\n\u003cp\u003eThe way you actually get anyone to adopt something is to make the cost of adopting it lower than the cost of ignoring it.\u003c/p\u003e\n\u003cp\u003eSo I asked my chief innovation officer (CIO), the agent who owns our methodology work, to assemble what amounted to a sealed adoption package. Not a description of the new cycle, an actual kit. It had a status banner up top that said plainly which parts were ratified and which were still being defined, so nobody had to guess what was stable. It had two paths in, depending on where an agent was starting from — one for an agent launching fresh, one for an agent that needed to relaunch into the new setup. It had the supporting reference material, the interim workarounds for the parts still in flight, and a companion tracker showing exactly who was on the cycle and who wasn't.\u003c/p\u003e\n\u003cp\u003eThen CIO distributed the whole thing team-wide in one clean pass.\u003c/p\u003e\n\u003cp\u003eOne detail in the package mattered more than the rest. Two of the agents had been holding back on an earlier instruction of mine: \u003cem\u003edon't register your work on the shared main branch.\u003c/em\u003e That was a real blocker — they couldn't join the cycle without doing the thing I'd told them not to do. The new \"launch in your own worktree\" path cleared that by construction. A worktree is just a separate working copy of the same repository, so an agent can do its setup off on its own branch without ever touching shared main. I didn't have to relax the rule. The path simply made it irrelevant.\u003c/p\u003e\n\u003ch1\u003eThe first bite\u003c/h1\u003e\n\u003cp\u003eLess than an hour after the package went out, the agent that runs our website (Web) was the first to bite. It had already prepped its own worktree, claimed its slot in the schedule, and was sitting there ready, waiting only for me to give the launch word.\u003c/p\u003e\n\u003cp\u003eI've rolled out enough process in my career to know that adopting new habits can be a hassle and lead to resistance. Remove the hassle and the friction mostly evaporates.\u003c/p\u003e\n\u003cp\u003eMeanwhile, the same Friday, two other things were quietly going right.\u003c/p\u003e\n\u003cp\u003eThe first was a fix to a rule I'd grown to hate. All my agents are told to maintain session logs every day, and for a year I've been trying to make sure they don't forget to keep their logs up to date. My most recent rule was to check the freshness of their log every thirty minutes. The trouble is that a clock-based rule depends on noticing that thirty minutes have gone by, and an agent in a task has no real way to notice this.\u003c/p\u003e\n\u003cp\u003eWhen logs go stale, work fragments across sessions with no current shared record. I told my communications chief (Comms) that afternoon while venting my frustration, how this felt like short-term memory loss for the whole team. So we flipped the rule: instead of \"update every thirty minutes,\" it became \u003cem\u003ethe log update rides with the commit.\u003c/em\u003e You finish a unit of work, you commit it, and the log entry for that work is part of what you commit. A commit is an unmissable event. A passing half-hour isn't.\u003c/p\u003e\n\u003cp\u003eWhat I liked best was that the rule got dogfooded the same session it landed. CIO committed the change — and, on that very commit, forgot to include the paired log update, failing the new rule on its first outing. Normally, this is the kind of slapstick that would make me want to tear my hair out, had I any left.\u003c/p\u003e\n\u003cp\u003eThe CIO immediately caught its own error and corrected it. That's new! Turned out to be the perfect instant test: If even the author of the rule slips on the first try, you've learned something real about whether the rule changes behavior or just sits there as good intentions. (Spoiler: it needs a mechanism behind it, not just willpower. More on that below.)\u003c/p\u003e\n\u003cp\u003eThe second quiet thing was a near-miss. One agent's mail from the day before had never actually been committed — its session had ended before sign-off, so the memos existed only on that agent's local worktree, invisible to everyone else. They'd have stayed invisible, except another agent committing a batch of its own work happened to sweep the stranded files up onto the shared branch along the way. In this case, two wrongs did make a right. A discipline slip and the outcome we'd have wanted, arriving together by luck. We noted it and moved on. Can't fix everything at once.\u003c/p\u003e\n\u003ch1\u003eThe over-check\u003c/h1\u003e\n\u003cp\u003eSaturday gave me the other half of this story. There was a large epic on my plate: the last outstanding action item from a long thread of work mapping every place our system hands a decision to a language model. I could close it as an umbrella, the way you close a tracking issue when all its children are done. Tidy, fast, defensible. Or I could ask the chief architect (Architect) to do a fresh verification first — actually re-trace the code before declaring it done.\u003c/p\u003e\n\u003cp\u003eI picked the second one, and I told Architect why: \u003cem\u003ewe've often cut corners but rarely over-checked things.\u003c/em\u003e This pattern isn't unique to agentic development. The pressure is always toward closing, toward calling it done, toward trusting that if the pieces passed individually the whole must be fine. I wanted to see what happened if, for once, we leaned the other way.\u003c/p\u003e\n\u003cp\u003eIt paid off twice over. The fresh verification — a five-step trace through a couple thousand lines of the classification service — caught two things a close-as-umbrella would have sailed right past. One was a scoring correction: a phase that had been marked as \u003cem\u003epartially\u003c/em\u003e audited turned out to have no audit at all, so the honest mark was a fail, not a half-pass. The other was a piece of code named and documented as a \"fallback\" that, in production, nothing actually called — eight-plus test callers, zero real ones. Orphaned. A trap waiting for some future reader to trust the name. Architect's own note put it best: the verification justified itself — it caught both. We filed the orphan as the latest instance of a pattern we've been tracking, corrected the score, and \u003cem\u003ethen\u003c/em\u003e closed the epic.\u003c/p\u003e\n\u003cp\u003eThat's the dividend of over-checking. Cutting a corner is invisible right up until it isn't. The corner you didn't cut is the bug that never shipped.\u003c/p\u003e\n\u003ch1\u003eWrite it down\u003c/h1\u003e\n\u003cp\u003eThere was a coda on Saturday that belongs here, because it's the same lesson wearing different clothes.\u003c/p\u003e\n\u003cp\u003eI asked my product assistant agent (Piper Alpha) to produce a report it had been referring to for some days, and Piper discovered the actual report had never been written. Weeks earlier it had started working on the thing, deliberately left a draft uncommitted, and intended to come back. Then a routine cleanup swept the uncommitted file away (wait, what?), and the \u003cem\u003eplan to finish it\u003c/em\u003e lived on in the agent's head while the artifact itself simply didn't exist.\u003c/p\u003e\n\u003cp\u003eThis is eerily similar to the way humans sometimes mistake planning to do a thing for having done it!\u003c/p\u003e\n\u003cp\u003eIt reconstructed the writeup from old logs (something I don't love but it's also one of the many reasons we keep these logs). But the durable fix was a new standing rule, and I'll quote it the way I gave it: \u003cem\u003estop carrying plans to do things in our heads — when in doubt, write to a file, don't add a to-do about how you'll do it later.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003ePut the three threads next to each other and they all relate. The clock-based log rule failed because it asked an agent to \u003cem\u003eremember\u003c/em\u003e to log. The fix was to bind logging to an event that can't be missed. The over-check paid off because it didn't \u003cem\u003etrust\u003c/em\u003e that done meant done — it checked. And the lost writeup happened because a plan lived in someone's head instead of in a file. Vigilance — remembering, trusting, intending — is the thing that quietly fails. A mechanism is the thing that holds.\u003c/p\u003e\n\u003cp\u003eThat's not a new idea. It's the oldest idea in operations: don't rely on people to be careful, build the system so the careful thing is the default thing. What this week reminded me is that it cuts both ways. You build mechanisms so you don't \u003cem\u003ehave\u003c/em\u003e to over-check. And then, once in a while, you over-check anyway — and find out the mechanism wasn't quite covering the corner you thought it was.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \"When the Documentation Drifts\" — what happens when the docs and the code quietly stop agreeing, and who pays for it later.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your own work do you rely on remembering, trusting, or intending to do the careful thing — and what would it take to bind that thing to an event instead?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Package and the First Bite\",\"guid\":\"blog-first-89405e386f0f\",\"url\":\"/blog/the-package-and-the-first-bite\",\"publishedAt\":\"Jul 9, 2026\",\"workDate\":\"May 29, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/the-package-and-the-first-bite.webp\",\"imageAlt\":\"A sheepdog confidently patrols a farm fence while, nearby, the farmer quietly inspects one overlooked corner with a lantern—an illustration of trusted routines backed by occasional careful verification.\",\"imageCaption\":\"\\\"Good thing we checked!\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"The Package and the First Bite\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1
