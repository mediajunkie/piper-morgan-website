ndefined\",\"template\":[\"$\",\"$Lc\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T1538,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eDecember 25, 2025\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eWe had a problem: 44 new canonical queries to investigate. Each one needed infrastructure assessment, blocker identification, implementation complexity rating. Traditional approach: investigate them one by one, maybe three or four per session.\u003c/p\u003e\n\u003cp\u003eAt that pace, the reconnaissance alone would take two weeks.\u003c/p\u003e\n\u003cp\u003eInstead, we deployed 13 subagents across 4 waves in a single 90-minute session. All 44 queries investigated. Complete infrastructure map. Priority matrix created.\u003c/p\u003e\n\u003ch1\u003eThe wave structure\u003c/h1\u003e\n\u003cp\u003e\u003cstrong\u003eWave 1: Core Infrastructure Audit\u003c/strong\u003e (3 agents)\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIntent Router Auditor: 8 intent categories mapped, coverage percentages calculated\u003c/li\u003e\n\u003cli\u003eIntegration Inventory: 6 integration routers catalogued, 200+ methods found\u003c/li\u003e\n\u003cli\u003eRepository Method Scan: 97 methods across 6 repositories analyzed\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese three agents established the baseline. What existed? What was complete? Where were the foundations solid?\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWave 2: Category Deep Dives\u003c/strong\u003e (4 agents)\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGitHub Operations: 8 queries mapped, complexity breakdown (2 LOW, 4 MEDIUM, 2 HIGH)\u003c/li\u003e\n\u003cli\u003eSlack Operations: 5 queries mapped, infrastructure complete except LLM summarization\u003c/li\u003e\n\u003cli\u003eCalendar Operations: 7 queries mapped, critical OAuth scope constraint identified\u003c/li\u003e\n\u003cli\u003eTodo Operations: 4 queries mapped, critical blocker found (hardcoded user_id)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThese four agents worked in parallel, each focused on a specific integration category. They didn't need to coordinate—they were examining independent infrastructure.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWave 3: Gap Analysis\u003c/strong\u003e (synthesis)\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePriority matrix created: Phase A (5 LOW), Phase B (11 MEDIUM), Phase C (8 HIGH), Phase D (12 blocked)\u003c/li\u003e\n\u003cli\u003eCritical blockers documented with priority levels (P0, P1, P2)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWave 3 synthesized the category deep dives into actionable prioritization.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWave 4: Remaining Categories\u003c/strong\u003e (6 agents)\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eHelp/Capability System, Activity/Audit Logging, Notion Write Operations\u003c/li\u003e\n\u003cli\u003eNotification Infrastructure, Conversation Serialization, File Upload\u003c/li\u003e\n\u003cli\u003eEach assessed independently, blockers identified, readiness scored\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch1\u003eWhy it worked just fine\u003c/h1\u003e\n\u003cp\u003eThe key insight: investigation parallelizes well. Analysis doesn't require shared state. Each agent can examine a portion of the codebase without coordinating with others.\u003c/p\u003e\n\u003cp\u003eImplementation is different. Two agents trying to modify the same file create merge conflicts. Two agents implementing related features need to coordinate on interfaces.\u003c/p\u003e\n\u003cp\u003eBut two agents reading different parts of the codebase? They can run simultaneously without collision.\u003c/p\u003e\n\u003ch1\u003eA taxonomy for blockers\u003c/h1\u003e\n\u003cp\u003eWave 3 produced something useful beyond the priority matrix: a blocker taxonomy.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eP0\u003c/strong\u003e (blocks all): Problems that prevent any query from working. User_id hardcoded as \"default\" was P0—it broke multi-user isolation across everything.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eP1\u003c/strong\u003e (blocks category): Problems that prevent a category from working. Calendar OAuth readonly scope was P1—it blocked all scheduling features.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eP2\u003c/strong\u003e (nice to have): Problems that degrade experience but don't block core functionality. Missing LLM summarization in Slack was P2.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis taxonomy separated complexity from criticality. A query could be easy to implement (LOW complexity) but blocked by a P0 issue. Another could be hard to implement (HIGH complexity) but have no blockers.\u003c/p\u003e\n\u003cp\u003eThe priority matrix combined both dimensions.\u003c/p\u003e\n\u003ch1\u003eWhen to use this model\u003c/h1\u003e\n\u003cp\u003eMulti-wave investigation works when:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe problem space can be partitioned cleanly (categories, modules, time periods)\u003c/li\u003e\n\u003cli\u003eEach partition can be analyzed independently\u003c/li\u003e\n\u003cli\u003eSynthesis can happen after parallel analysis completes\u003c/li\u003e\n\u003cli\u003eYou need breadth more than depth initially\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIt doesn't work when:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAgents need to coordinate during investigation\u003c/li\u003e\n\u003cli\u003eAnalysis requires iterative refinement based on early findings\u003c/li\u003e\n\u003cli\u003eThe partitions have hidden dependencies\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDeploying multiple agents to fan out and research a problem has since become a routine part of my work habits, something Claude agents do very comfortably using their subagent capabilities, and clearly part of where this sort of tooling stack is headed in the future, as a matter of course.\u003c/p\u003e\n\u003ch1\u003eSeeing from all angles at once\u003c/h1\u003e\n\u003cp\u003e90 minutes of parallel investigation saved an estimated 10 days of sequential work (at least in trad-human terms) and, more importantly, helped develop a more complete picture.\u003c/p\u003e\n\u003cp\u003eSequential investigation would have answered questions as they arose. Parallel investigation answered questions we hadn't thought to ask yet. The OAuth scope constraint. The hardcoded user_id. The missing router methods.\u003c/p\u003e\n\u003cp\u003eSometimes you work from a checklist when you know what you're looking for, but all of these discoveries emerged from the comprehensive coverage achievable with this multi-directional approach.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Verify the Paraphrase, covering a work stream review from April 19 based on incomplete source material.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eHave you found ways to parallelize investigation work? What made it succeed or fail?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Multi-Wave Investigation\",\"guid\":\"blog-first-d5599bc8d691\",\"url\":\"/blog/the-multi-wave-investigation\",\"publishedAt\":\"Apr 25, 2026\",\"workDate
