es\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T19aa,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eApril 24, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe first thing the Communications Chief agent instance did in its new working environment was search for a file whose old location it knew but which it now could not find.\u003c/p\u003e\n\u003cp\u003eA migration the previous day had moved my Comms agent from a chat interface to a coding interface. New tools, same job. The handoff memo had named everything the incoming instance was supposed to read on arrival: the editorial calendar, the briefing for the role, the publication template, the voice and tone guide. The first three were where the handoff said they'd be. The fourth wasn't anywhere it looked.\u003c/p\u003e\n\u003cp\u003eIn the old chat-based working environment, Comms had access to (and helped iterate on) a copy of the voice and tone guide stored in the chat project's knowledge base. Chat-based search runs over a project knowledge surface that's much smaller than the whole filesystem. Whole directories sit outside it.\u003c/p\u003e\n\u003cp\u003eNow the whole filesystem was searchable. Within thirty seconds Comms had two candidate files:\u003c/p\u003e\n\u003cp\u003e```\u003cbr /\u003edocs/assets/images/blog/comms/xian-voice-tone-guide.md\u003cbr /\u003edocs/assets/images/blog/comms/xian-voice-tone-guide-2025-08-27.md\u003cbr /\u003e```\u003c/p\u003e\n\u003cp\u003eBoth markdown files. Both in a directory named \u003cem\u003eimages\u003c/em\u003e. The Communications voice and tone guide had been sitting for months at a path inside the project's image assets, where no agent doing image work would have any reason to look and no agent doing voice work could ever find them via search.\u003c/p\u003e\n\u003cp\u003eComms read both. The undated one was longer-feeling but shorter on lines (246 vs 253). It worked through the differences. The dated version still had a Format Standards section. The undated version had Format Standards removed — and richer voice characterization where Format Standards used to be. Cross-referencing the publication template Comms had already read showed Format Standards had been extracted there at the v0.7 update on April 18. The undated file was \u003cem\u003enewer\u003c/em\u003e, not older. It was the one to use.\u003c/p\u003e\n\u003cp\u003eComms surfaced the find to me. My reaction was less surprise than recognition. Yes, the guides had been moved around. Yes, the dated one was a snapshot from August. Yes, the undated one was the current canonical version. Yes, neither was indexed anywhere. The misfile had gone unnoticed for the whole period it persisted — Comms had been working from memory and from my voice-passes, not from the guide itself.\u003c/p\u003e\n\u003cp\u003eI authorized the rescue. Three commands moved the files where they belonged:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eThe canonical guide moved from the images directory to \u003ccode\u003edocs/internal/planning/comms/xian-voice-tone-guide.md\u003c/code\u003e\u003c/li\u003e\u003cli\u003eThe August snapshot moved to \u003ccode\u003edocs/internal/planning/historical/\u003c/code\u003e with its date in the filename\u003c/li\u003e\u003cli\u003eThe navigation index gained a REQUIRED READING entry pointing at the canonical guide, plus the two adjacent Comms documents (publication template, first-publish checklist) that had also been missing from the index\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eThree \u003ccode\u003egit mv\u003c/code\u003e operations, two filesystem searches, one navigation index edit. The fix took less than ten minutes.\u003c/p\u003e\n\u003ch1\u003eWhat had changed\u003c/h1\u003e\n\u003cp\u003eTwo things made this possible that hadn't been possible a day earlier.\u003c/p\u003e\n\u003cp\u003eThe first was the search surface. The chat-based working environment indexed a curated set of documents — useful when the set was current, opaque when it wasn't. The coding interface searches the whole filesystem. \u003cem\u003eMisfiled in the images directory\u003c/em\u003e and \u003cem\u003efindable by content search\u003c/em\u003e turned out to be compatible states, but only in the new environment.\u003c/p\u003e\n\u003cp\u003eThe second was a verifiable-claim discipline that had started taking shape over the previous week. Before the migration, Comms would have read the dated file and the undated file, formed a hypothesis about which was newer, and gone with it. After the migration there was a way to check: cross-reference the publication template that referenced the Format Standards content, compare the date on that extraction against what each version of the guide contained, and \u003cem\u003everify\u003c/em\u003e the hypothesis instead of acting on it.\u003c/p\u003e\n\u003cp\u003eComms made the right call on the first try. But the discipline that let it make that call confidently was newer than the tool change that made the search possible.\u003c/p\u003e\n\u003ch1\u003eWhat this opened\u003c/h1\u003e\n\u003cp\u003eOnce a single foundational document had been found misfiled and rescued, the question changed shape. Not \"is the voice and tone guide where it should be\" but \"what else might be?\"\u003c/p\u003e\n\u003cp\u003eWe didn't run that audit on April 24. The day's work moved on — to other handoff items, to insight drafts for the upcoming weekend, to a footer-tease decision that was blocking the evening's narrative publication. The misfiled-voice-guide question had taken twenty minutes to find, surface, and fix. The half-day's other work needed those hours.\u003c/p\u003e\n\u003cp\u003eBut the question stayed open. What else was out there? What other documents the role was supposed to lean on had simply not been findable from where the role was working?\u003c/p\u003e\n\u003cp\u003eThe next time the question surfaced, the discipline that had already arrived would be the one to use. Search the filesystem. Compare what's there. Verify the hypothesis against an adjacent artifact. Trust the artifact, not the assumption.\u003c/p\u003e\n\u003ch1\u003eWhat's portable\u003c/h1\u003e\n\u003cp\u003eIf you run a role inside an environment that restricts what the role can search, the role will work around the restriction. It will build memory practices, voice habits, relationship-based recall — all the things people do when their tools don't let them look. Those practices aren't wrong. They're compensatory.\u003c/p\u003e\n\u003cp\u003eWhen the restriction lifts, the first thing the role should do isn't get on with new work. It's audit what the old restriction was hiding. Some of what was missing will turn out to have been quietly central the whole time. Some will turn out to have been working around its own absence well enough that no one noticed.\u003c/p\u003e\n\u003cp\u003eYou'll find at least one thing that was supposed to be central and was sitting in the wrong directory the whole time. You'll fix it in ten minutes. Then you'll wonder how many other things you've been working around without knowing it.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \u003cstrong\u003eStacked Silent Failures\u003c/strong\u003e — Saturday's insight on what the obvious hypothesis missed when a quality-test number dropped six points.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your own work has a tool restriction shaped a habit you've stopped noticing? What would surface if the restriction lifted?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Misfiled Voice Guide\",\"guid\":\"blog-first-48f6670b89f4\",\"url\":\"/blog/the-misfiled-voice-guide\",\"publishedAt\":\"May 28, 2026\",\"workDate\":\"Apr 24, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/the-misfiled-voice-guide.webp\",\"imageAlt\":\"A communications manual discovered on the wrong shelf in a vast archive.\",\"imageCaption\":\"Always the last place you look!\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"The Misfiled Voice Guide\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Misfiled Voice Guide | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"April 24, 2026 The first thing the Communications Chief agent instance did in its new working environment was search for a file whose old location it knew but which it now could not find. A migration the previous day had moved my Comms agent from a chat interface to a coding interface. New tools,...\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"4\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\"
