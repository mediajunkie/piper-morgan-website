plateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:Tf29,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eApril 3–7\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThursday night. Ten-thirty. Testing a fresh alpha account on a clean machine. The CXO had a scoring rubric ready based on the Colleague Test: three dimensions, zero through three on each, seven to pass, any zero auto-fails. Nine queries lined up. Five task lifecycle scenarios. We'd been preparing for this for weeks.\u003c/p\u003e\n\u003cp\u003eThe first query was \"What can you help me with?\"\u003c/p\u003e\n\u003cp\u003eEvery time I sit down to test Piper, I'm afraid of what I'm going to find out. It's a little bit like watching a child at a recital I imagine.\u003c/p\u003e\n\u003cp\u003ePiper returned a canned template. The same block of text it returns for everything it can't handle. Generic. Impersonal. The kind of response that makes you check whether the system is actually running.\u003c/p\u003e\n\u003cp\u003eThe second query got the same template. So did the third. And the fourth.\u003c/p\u003e\n\u003ch1\u003eZero for seven\u003c/h1\u003e\n\u003cp\u003eWe tested seven of nine Gate 1 queries before we stopped. Every single one failed the Colleague Test. Four scored zero on relevance or competence — automatic failures. Two scored five, below the seven-point threshold. The one query that took a different path — creating a GitHub issue — tried to hit an API without checking whether GitHub was even configured, and returned a raw error.\u003c/p\u003e\n\u003cp\u003eGate 2, the task lifecycle test, wasn't any better. Todo creation worked but only with rigid syntax. Todo completion failed on all four attempts. The regex rejected natural phrasing like \"Add a todo\" because it didn't expect the article \"a\" between the verb and the noun.\u003c/p\u003e\n\u003cp\u003eAt 10:58, we stopped testing. There was no point continuing.\u003c/p\u003e\n\u003cp\u003eLe sigh.\u003c/p\u003e\n\u003ch1\u003eThe findings\u003c/h1\u003e\n\u003cp\u003eThe CXO compiled five findings. Two were blocking. The floor — the conversational LLM that was supposed to be Piper's foundation — wasn't reaching the user at all. Every floor-routed query was silently failing and falling through to the same canned fallback template. The template masked the failures so completely that you couldn't tell whether the LLM had tried and failed, or had never been invoked.\u003c/p\u003e\n\u003cp\u003eTwenty-three tests had verified that todo completion worked. Every one of them mocked the service layer. In production, with a real user typing real words into a real interface, it was broken.\u003c/p\u003e\n\u003cp\u003ePattern-045 — \"green tests, red user\" — wasn't a theory anymore. Six thousand three hundred tests passing. Zero out of seven queries passing the Colleague Test.\u003c/p\u003e\n\u003ch1\u003eThe fix that wasn't\u003c/h1\u003e\n\u003cp\u003eThe Lead Dev filed #940 as a blocker and got to work. Over the weekend, the team resolved all five findings. The hardcoded Anthropic provider was replaced with a provider-agnostic configuration system. The todo regex was fixed. The avatar CSS was corrected. Pre-flight checks were added for GitHub integration. Six thousand three hundred and three tests passing, zero failures.\u003c/p\u003e\n\u003cp\u003eOn Monday evening, the CXO ran the gate again. All nine queries this time.\u003c/p\u003e\n\u003cp\u003eThe result: zero out of nine. Identical canned templates for every floor-routed query. The same response as four days earlier, as if nothing had changed.\u003c/p\u003e\n\u003cp\u003eOh, brother.\u003c/p\u003e\n\u003cp\u003eThe CXO's memo to the Lead Dev asked three questions: Is the LLM call actually executing? Is the fix actually deployed? Is something overriding the floor before it gets a chance to respond?\u003c/p\u003e\n\u003cp\u003eTwo complete failures. Five \"fixes\" applied between them. Same result. Something deeper was wrong, and we hadn't found it yet.\u003c/p\u003e\n\u003cp\u003eThe hunt continued...\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Multi-Wave Investigation, an insight piece from December 25, 2025, on what happens when ninety minutes of parallel investigation — thirteen subagents across four waves — surface the blockers no sequential checklist would have caught.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eHave you ever fixed a bug only to find the same symptom waiting for you on the other side?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Gate\",\"excerpt\":\"April 3–7 Thursday night. Ten-thirty. Testing a fresh alpha account on a clean machine. The CXO had a scoring rubric ready based on the Colleague Test: three dimensions, zero through three on each, seven to pass, any zero auto-fails. Nine queries lined up. Five task lifecycle sc
