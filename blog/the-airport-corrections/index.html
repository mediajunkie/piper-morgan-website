":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-d77bb6e505e4c783.js\"],\"BlogPostContent\"]\n1a:T19d1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 25–26, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eI spent most of the weekend away from my desk. There was a college reunion, and I spent the last day between checking out of a hotel in New York in the morning and an afternoon at the airport, the kind of day where you're never quite anywhere — half present, half in transit, checking your phone between the gate announcements.\u003c/p\u003e\n\u003cp\u003eIt turned out to be one of the more consequential days in the whole arc of building the duty cycle (our hourly autonomous work-loop, the thing that lets the team of AI agents keep working when I'm not around to drive), and mainly because I corrected three things in real time, from a chair at the gate, and those three corrections did more to shape the mechanism than any review I could have run sitting still.\u003c/p\u003e\n\u003ch1\u003eWhat the duty cycle is supposed to do\u003c/h1\u003e\n\u003cp\u003eHere's the idea. Each of my agents — the chief innovation officer (CIO), the lead developer (Lead Dev), the documentation role (Docs), all of them — mostly works when I open a session and point them at something. But a lot of the value of an agent team is supposed to come \u003cem\u003ebetween\u003c/em\u003e those moments. While I'm at a reunion. While I'm boarding. The duty cycle is the mechanism that's meant to wake an agent up on a schedule, have it look around for unblocked work, do it, and go back to sleep.\u003c/p\u003e\n\u003cp\u003eCIO had been carrying the design. By May 25 it was on version 0.5, and the plan was to actually run it — a live pilot, not a paper review. So while I was traveling, CIO ran it. Live. During the exact window when I was least available to supervise. Which, it turns out, is the only honest way to test a thing whose entire purpose is to run when I'm not there.\u003c/p\u003e\n\u003ch1\u003eThree corrections from a chair at the gate\u003c/h1\u003e\n\u003cp\u003eI want to be precise about what happened, because the shape of it is the point. I watched the v0.5 design run, caught it doing something that didn't match what I'd meant, and said so. Three times.\u003c/p\u003e\n\u003cp\u003eThe first came around four in the afternoon, Eastern. The cron — the scheduled wake-up — was firing on its timer regardless of whether the agent was already in the middle of something. That's not what I wanted. \u003cstrong\u003ePause the cron when work starts, resume it when the agent goes idle again.\u003c/strong\u003e Bind the wake-up to the idle state. Don't fire into a working session.\u003c/p\u003e\n\u003cp\u003eThe second came about ten minutes later. I realized \"idle\" could refer to two different states. There's idle-while-I'm-away, which is exactly when the cron \u003cem\u003eshould\u003c/em\u003e fire — that's the whole point, autonomous catch-up while I'm gone. And there's idle-while-I'm-right-here, present and driving, where the last thing I want is the cron waking an agent up to go do its own thing mid-conversation. \u003cstrong\u003eThe cron fires when I'm absent and pauses when I'm present.\u003c/strong\u003e Presence, not just idleness.\u003c/p\u003e\n\u003cp\u003eThe third came near five o'clock, as I was getting close to boarding. The mechanism was draining one unit of work per fire — wake up, do a thing, go back to sleep, wait for the next timer. That's wasteful when there's a queue. \u003cstrong\u003eEach fire should drain all the available unblocked work, not one task and out.\u003c/strong\u003e Run until genuinely idle, then sleep.\u003c/p\u003e\n\u003cp\u003eThree corrections in about an hour. Together they flipped the design from v0.5 to v0.6.\u003c/p\u003e\n\u003cp\u003eWhat struck me most was CIO's response. It looked at two of those three and said, in effect: that's not your correction, that's \u003cem\u003emy divergence\u003c/em\u003e — I encoded something other than what you'd intended, and the running surfaced it. That's a colleague telling you it drifted before you had to argue the point. The pilot wasn't just testing the cron. It was testing whether the encoding matched the intent, and twice it didn't, and we found out because the thing was \u003cem\u003erunning\u003c/em\u003e.\u003c/p\u003e\n\u003ch1\u003eThe stress test\u003c/h1\u003e\n\u003cp\u003eThe next day, May 26, CIO did the unglamorous part. It ran the v0.6 mechanism hard — 62 cron fires across a single day. Fifty-seven of them on a ten-minute interval, a deliberately punishing flywheel test, and a handful more on the realistic hourly cadence.\u003c/p\u003e\n\u003cp\u003eSixty-two fires is an ad hoc stress test, and it surfaced exactly the kind of thing a stress test is for. Most of those fires woke up, looked around, found nothing to do, and went back to sleep — but each no-op still left a small commit behind. At ten-minute intervals that's roughly six commits an hour of pure overhead, doing nothing. Multiply by a team of agents and the cost of cadence stops being theoretical. Nobody would have noticed that from the design doc. The number only showed up because something ran the loop sixty-two times in a row.\u003c/p\u003e\n\u003cp\u003eAnd at the end of the day, near half past eleven at night with me long gone, the loop hit its STOP condition and shut itself down cleanly. Past bedtime, PM not active, so it stopped — exactly as designed. The whole mechanism validated end-to-end, through its own off-switch, with no one watching. Which is, again, the only honest way to test a thing that's supposed to work when no one's watching.\u003c/p\u003e\n\u003ch1\u003eThe value is in the running\u003c/h1\u003e\n\u003cp\u003eI keep coming back to the same observation, and it's not a new one — but it landed hard this week. You can review a design forever. You can read the spec, walk the state diagram, argue about edge cases over a memo. And you'll catch some things. But the gaps that actually bit us — the cron firing into a live session, the missing distinction between \u003cem\u003eI'm away\u003c/em\u003e and \u003cem\u003eI'm here\u003c/em\u003e, the per-fire drain that should've been a full drain, the no-op commit overhead — none of those came from review. They came from watching the thing run and saying \"no, not like that.\"\u003c/p\u003e\n\u003cp\u003eIt helped, honestly, that I was traveling. A reunion and an airport are a forcing function. I \u003cem\u003ecouldn't\u003c/em\u003e sit and design. I could only react to what I saw, in the windows I had, between boarding groups. And reacting to a live system turned out to be worth more than a day of careful planning would have been.\u003c/p\u003e\n\u003cp\u003eThe design got its shape from me catching it being wrong, three times, fast, while it was actually doing the thing. The planning gave us v0.5. The running gave us v0.6. I know which one I trust more.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext: when the platform ships your homemade thing as a product, do you defend the work you sank into it — or climb higher? \"Climbing Higher When the Platform Laps You,\" this Saturday.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your own work have you caught a design being wrong only once it was actually running — something no amount of review would have surfaced?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Airport Corrections\",\"guid\":\"blog-first-6c74263d4862\",\"url\":\"/blog/the-airport-corrections\",\"publishedAt\":\"Jul 2, 2026\",\"workDate\":\"May 25, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/the-airport-corrections.webp\",\"imageAlt\":\"At an airport gate, a traveler supervises a whimsical team of glowing AI helpers tending an autonomous work loop while planes wait outside the windows.\",\"imageCaption\":\"\\\"Now don't stray too far before boarding!\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"The Airport Corrections\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Airport Corrections | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"May 25–26, 2026 I spent most of the weekend away from my desk. There was a college reunion, and I spent the last day between checking out of a hotel in New York in the morning and an afternoon at the airport, the kind of day where you're never quite anywhere — half present, half in transit, check...\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"4\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"
