tyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T74e9,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A person and robot look astonished at the crack in their home’s foundation\" src=\"https://cdn-images-1.medium.com/max/1024/1*qU-ndr-vY3v21_VmOaOnDw.png\" /\u003e\u003cfigcaption\u003e“How bad is it?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 10, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eFriday morning at 10:48 AM, my Lead Developer sent a message that changed everything:\u003c/p\u003e\u003cblockquote\u003e\u003cem\u003e“Critical discovery — Cursor with Serena finds gaps in GREAT Refactor”\u003c/em\u003e\u003c/blockquote\u003e\u003cp\u003eWe’d spent Wednesday planning the Alpha push. Eight weeks to first external users. Foundation at 98–99% complete. Performance validated at 602K requests per second. Over 200 tests passing. Production-ready architecture.\u003c/p\u003e\u003cp\u003eExcept it wasn’t.\u003c/p\u003e\u003cp\u003eBy 11:15 AM, after reviewing Cursor’s comprehensive audit, I had to acknowledge reality: “I can’t say our foundations are 98% anymore.”\u003c/p\u003e\u003cp\u003eThe audit revealed we were more like at 92%. And worse — the missing 8% wasn’t minor polish. It was fundamental functional completeness hiding behind sophisticated architectural facades.\u003c/p\u003e\u003cp\u003eThis is the story of how discovering your foundation has cracks can happen on the same day your methodology proves it can handle that reality.\u003c/p\u003e\u003ch3\u003eThe Serena x-ray\u003c/h3\u003e\u003cp\u003eSerena MCP had been set up the day before — a code analysis tool providing semantic search and symbol-level editing for our 688 Python files (170K lines of code).\u003c/p\u003e\u003cp\u003eFriday morning was its first production use.\u003c/p\u003e\u003cp\u003eI’d asked Cursor to do something straightforward: audit the GREAT Refactor work (GREAT-1 through GREAT-5) against the documentation we’d created. Verify that what we said we’d built actually existed in the code.\u003c/p\u003e\u003cp\u003eI’ve learned to hard way to check early and often!\u003c/p\u003e\u003cp\u003eThe methodology we’d developed over four months emphasized verification. Phase −1 checks before starting work. Independent validation of autonomous agent decisions. Quality gates at every phase. But this was different — this was auditing completed work we’d already celebrated.\u003c/p\u003e\u003cp\u003eWithin minutes, Cursor began reporting findings.\u003c/p\u003e\u003cp\u003eThe results organized by epic:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eGREAT-1\u003c/strong\u003e (Orchestration Core): 90% complete — minor docs\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-2\u003c/strong\u003e (Integration Cleanup): 92% complete — minor test precision\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-3\u003c/strong\u003e (Plugin Architecture): 90% complete — minor test gaps\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-4A\u003c/strong\u003e (Pattern Coverage): 25% complete !! (this was before we adopted the anti-80% prompting style)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-4B\u003c/strong\u003e (Enforcement): 85% complete — interface coverage needs work\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-4C\u003c/strong\u003e (Canonical Handlers): 95% complete — minor validation gaps\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-4D\u003c/strong\u003e (Intent Handlers): 30% complete !! (how did we miss that?)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-4E\u003c/strong\u003e (Validation): 90% complete — test infrastructure solid but gaps\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-4F\u003c/strong\u003e (Classifier Accuracy): 70% complete and missing documentation\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGREAT-5\u003c/strong\u003e (Quality Gates): 95% complete — minor precision issues in tests\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe deepest problems were in GREAT-4. The rest were close but not finished.\u003c/p\u003e\u003ch3\u003eSophisticated placeholders: the anti-pattern that fooled everyone\u003c/h3\u003e\u003cp\u003eThe traditional incomplete work pattern is easy to spot:\u003c/p\u003e\u003cpre\u003edef handle_request():\u003cbr\u003e    # TODO: Implement this\u003cbr\u003e    pass\u003c/pre\u003e\u003cp\u003eNobody ships that thinking it’s done. Tests fail. The incompleteness is obvious.\u003c/p\u003e\u003cp\u003eWe catalogued the several hundred TODOs in our code base (ironically, and confounding to earlier searches, most of them are in the implementation of our… todo list management routine.\u003c/p\u003e\u003cp\u003eBut what Cursor discovered was far more insidious. These weren’t lazy placeholders — they were \u003cem\u003esophisticated\u003c/em\u003e placeholders:\u003c/p\u003e\u003cpre\u003easync def handle_synthesis_request(intent_data: dict) -\u0026gt; dict:\u003cbr\u003e    \u0026quot;\u0026quot;\u0026quot;Handle synthesis-type requests combining multiple sources.\u0026quot;\u0026quot;\u0026quot;\u003cbr\u003e    \u003cbr\u003e    # Extract and validate parameters\u003cbr\u003e    query = intent_data.get(\u0026quot;query\u0026quot;, \u0026quot;\u0026quot;)\u003cbr\u003e    sources = intent_data.get(\u0026quot;sources\u0026quot;, [])\u003cbr\u003e    \u003cbr\u003e    # Validate inputs\u003cbr\u003e    if not query:\u003cbr\u003e        return {\u003cbr\u003e            \u0026quot;success\u0026quot;: False,\u003cbr\u003e            \u0026quot;error\u0026quot;: \u0026quot;Query required for synthesis\u0026quot;\u003cbr\u003e        }\u003cbr\u003e    \u003cbr\u003e    # Check if we have enough context\u003cbr\u003e    if len(sources) \u0026lt; 2:\u003cbr\u003e        return {\u003cbr\u003e            \u0026quot;success\u0026quot;: True,\u003cbr\u003e            \u0026quot;requires_clarification\u0026quot;: True,\u003cbr\u003e            \u0026quot;message\u0026quot;: \u0026quot;I\u0026#39;d need information from at least two sources to synthesize. Could you specify what you\u0026#39;d like me to combine?\u0026quot;\u003cbr\u003e        }\u003cbr\u003e    \u003cbr\u003e    # Future: Implement actual synthesis logic here\u003cbr\u003e    return {\u003cbr\u003e        \u0026quot;success\u0026quot;: True,\u003cbr\u003e        \u0026quot;requires_clarification\u0026quot;: True,\u003cbr\u003e        \u0026quot;message\u0026quot;: \u0026quot;I understand you want me to synthesize information. Let me gather those sources and combine them for you.\u0026quot;\u003cbr\u003e    }\u003c/pre\u003e\u003cp\u003eThis code looks complete:\u003c/p\u003e\u003cul\u003e\u003cli\u003e✅ Extracts parameters correctly\u003c/li\u003e\u003cli\u003e✅ Validates inputs with appropriate errors\u003c/li\u003e\u003cli\u003e✅ Handles edge cases (not enough sources)\u003c/li\u003e\u003cli\u003e✅ Returns proper data structure\u003c/li\u003e\u003cli\u003e✅ Includes error handling\u003c/li\u003e\u003cli\u003e✅ Has professional documentation\u003c/li\u003e\u003cli\u003e✅ Returns success=True\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eTests pass. Code reviews see professional implementation. The interface is perfect. The structure is sound.\u003c/p\u003e\u003cp\u003eBut it doesn’t actually synthesize anything. It just politely says it understands what you want. Then does nothing.\u003c/p\u003e\u003cp\u003eCursor’s audit revealed this pattern across multiple areas:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGREAT-4A (Pattern Coverage)\u003c/strong\u003e: Intent classification tested at 76% failure rate, but architectural tests passed because they only checked that handlers \u003cem\u003eexisted\u003c/em\u003e and returned proper data structures, not that they \u003cem\u003eworked\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGREAT-4D (Intent Handlers)\u003c/strong\u003e: Multiple handler categories (SYNTHESIS, STRATEGY, LEARNING) had implementations that correctly routed requests, extracted parameters, validated inputs, handled errors — and did nothing with them.\u003c/p\u003e\u003cp\u003eThe pattern Cursor identified: “The team excels at building foundational architecture but struggles with functional completeness.”\u003c/p\u003e\u003cp\u003eThe team. That’s me. (Well, and my robot assistants but they follow my line.)\u003c/p\u003e\u003cp\u003eNot lazy incompleteness. \u003cem\u003eArchitectural\u003c/em\u003e completeness mistaken for \u003cem\u003efunctional\u003c/em\u003e completeness.\u003c/p\u003e\u003ch3\u003eHow this happened\u003c/h3\u003e\u003cp\u003eThe acceptance criteria focused on structure:\u003c/p\u003e\u003cul\u003e\u003cli\u003e“Handlers exist for all 13 intent categories” ✓\u003c/li\u003e\u003cli\u003e“Handlers implement proper interface” ✓\u003c/li\u003e\u003cli\u003e“Handlers include error handling” ✓\u003c/li\u003e\u003cli\u003e“Tests validate interface contracts” ✓\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWhat the criteria didn’t catch: “Handlers actually perform the work they claim to do.” (Sad trombone.)\u003c/p\u003e\u003cp\u003eThe tests validated interfaces, not business logic. Integration tests passed because success=True is a valid return value. Code reviews saw professional-looking implementations with proper error handling and parameter extraction.\u003c/p\u003e\u003cp\u003eEveryone — human PM and AI agents alike — looked at sophisticated placeholders and saw completion.\u003c/p\u003e\u003cp\u003eThis is why objective code verification matters. Cursor with Serena didn’t care how professional the code looked. It checked: does the documentation say this works? Does the code actually do it?\u003c/p\u003e\u003cp\u003eThe answer, across multiple epics: No.\u003c/p\u003e\u003ch3\u003eThe “oh no” moment\u003c/h3\u003e\u003cp\u003eAt 11:15 AM, after reviewing the full audit, I wrote: “I guess I can’t really say our foundations are 98% anymore.”\u003c/p\u003e\u003cp\u003eMy first thought: another premature celebration. Definitely not our first!\u003c/p\u003e\u003cp\u003eWe’d celebrated completing the Great Refactor Tuesday evening. Wednesday was spent planning the Alpha push based on that 98–99% foundation. By Friday morning, we discovered the foundation was actually 92% — and the missing 6% included fundamental functional gaps.\u003c/p\u003e\u003cp\u003eThe “oh no” came from recognizing the pattern: declaring victory before verifying it actually works.\u003c/p\u003e\u003cp\u003eBut something different happened this time. After the initial shock, we investigated systematically. Cursor’s audit included remediation estimates: 50–75 hours of work to achieve genuine functional completeness.\u003c/p\u003e\u003cp\u003eNot months. Not weeks of chaos. Fifty to seventy-five hours of systematic work to close known gaps.\u003c/p\u003e\u003cp\u003eMy sense of despair, that I could never win, receded. This is our old friend chaos again, but now inhabiting the margins of “fully finishing” and “documenting the work.” This is manageable.\u003c/p\u003e\u003cp\u003eOnce we had the full picture and made a plan, the anxiety dissipated. This wasn’t unknown problems lurking — it was \u003cem\u003eknown\u003c/em\u003e gaps with clear remediation paths.\u003c/p\u003e\u003cp\u003eThat clarity made all the difference.\u003c/p\u003e\u003ch3\u003eThe integrated remediation decision\u003c/h3\u003e\u003cp\u003eBy 12:39 PM, my Chief Architect had reviewed the audit and proposed a response:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIntegrated remediation approach\u003c/strong\u003e: Don’t stop everything. Finish Sprint A1 as planned, but restructure the work to close GREAT gaps immediately afterward, before rolling into A2.\u003c/p\u003e\u003cp\u003eIssue #212 (CORE-INTENT-ENHANCE) was already scoped to improve intent classification accuracy. The audit revealed this would also close the GREAT-4A gap. Kill two birds with one stone.\u003c/p\u003e\u003cp\u003eThen plan a new epic: CORE-CRAFT, with CRAFT being the code for Craft Pride. Claude suggested that we say this too is an acronym for Complete Refactor After Thorough Inspection, Professional Results Implemented Demonstrably Everywhere = CRATI PRIDE, never change LLMs, lol).\u003c/p\u003e\u003cp\u003eThree sub-epics:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eCRAFT-GAP\u003c/strong\u003e: Critical functional gaps (28–41 hours)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCRAFT-PROOF\u003c/strong\u003e: Documentation and test precision (9–15 hours)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCRAFT-VALID\u003c/strong\u003e: Verification and validation (8–13 hours)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eTotal: 45–69 hours of systematic remediation.\u003c/p\u003e\u003cp\u003eThis is the discipline that systematic work enables. When you discover your foundation has cracks, you don’t panic. You assess, plan, and proceed systematically.\u003c/p\u003e\u003cp\u003eThe alternative — stop everything, abandon the Alpha timeline, rebuild from scratch — wasn’t necessary. The architecture was sound. The patterns were proven. The gaps were known and bounded.\u003c/p\u003e\u003cp\u003eWe just needed to finish what we’d thought we’d already finished.\u003c/p\u003e\u003ch3\u003eMeanwhile, Sprint A1 continued\u003c/h3\u003e\u003cp\u003eThe remarkable thing about Friday: discovering foundation gaps in the morning didn’t prevent successful execution in the afternoon.\u003c/p\u003e\u003cp\u003eIssue #212 (CORE-INTENT-ENHANCE) had clear scope:\u003c/p\u003e\u003cul\u003e\u003cli\u003eImprove IDENTITY classification accuracy (target: 90%)\u003c/li\u003e\u003cli\u003eImprove GUIDANCE classification accuracy (target: 90%)\u003c/li\u003e\u003cli\u003eExpand pre-classifier pattern coverage (target: 10% hit rate)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eAt 12:45 PM, Code agent began Phase 0 investigation. By 5:17 PM — 4.5 hours later — all work was complete and deployed:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eIDENTITY accuracy\u003c/strong\u003e: 76% → 100% (target: 90%) ✓\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGUIDANCE accuracy\u003c/strong\u003e: 80% → 93.3% (target: 90%) ✓\u003c/li\u003e\u003cli\u003e\u003cstrong\u003ePre-classifier hit rate\u003c/strong\u003e: 1% → 71% (target: 10%) ✓\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eOverall accuracy\u003c/strong\u003e: 91% → 97.2%\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eAll targets exceeded. But more importantly: every quality gate caught something.\u003c/p\u003e\u003ch3\u003eEvery gate catches something different\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003ePhase 0 — Investigation\u003c/strong\u003e (12:45 PM):\u003c/p\u003e\u003cp\u003eCode agent discovered a regression immediately. Issue #217 (completed the day before) had broken test infrastructure. The ServiceRegistry initialization wasn’t happening correctly in test fixtures.\u003c/p\u003e\u003cp\u003eThis was about environmental issues from previous work. Phase 0 caught it before any new implementation started.\u003c/p\u003e\u003cp\u003eFix time: 14 minutes.\u003c/p\u003e\u003cp\u003eWithout Phase 0, we would have spent time debugging implementation issues that were actually test infrastructure problems. The verification phase saved hours of misdirected debugging.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 4 — Validation\u003c/strong\u003e (2:29 PM):\u003c/p\u003e\u003cp\u003eBy Phase 3, everything looked excellent. Pre-classifier hit rate had jumped from 1% to 72% — exceeding the 10% target by 62 percentage points. Pattern count expanded from 62 to 177 patterns (+185% growth).\u003c/p\u003e\u003cp\u003eClaude’s bad tic of always offering multiple options (“Should we finish our homework, skip the last few assignments, or sneak out of our bedroom and go join a circus?”) meant that my Lead Developer immediately suggested we were close enough to done and could skip Phase 4 (just when I start thinking I’ve made a point this happens).\u003c/p\u003e\u003cp\u003e[FACT CHECK: Was there temptation to skip Phase 4 and go straight to deployment after exceeding targets so dramatically in Phase 3?]\u003c/p\u003e\u003cp\u003eMy response: “Inchworms don’t skip, especially when cleaning up previously incomplete work.”\u003c/p\u003e\u003cp\u003ePhase 4 validation began at 2:29 PM. Within minutes: regression detected.\u003c/p\u003e\u003cp\u003eTEMPORAL classification accuracy had dropped from 96.7% to 93.3%. Two newly added patterns were too broad, causing false positives. Queries about status were being classified as temporal requests.\u003c/p\u003e\u003cp\u003eThe decision: Quality over speed. Remove the problematic patterns, accept 71% hit rate instead of 72%. Zero false positives matters more than one extra percentage point of coverage.\u003c/p\u003e\u003cp\u003eWithout Phase 4, we would have shipped those false positives. Worse, we would have shipped them with confidence=1.0 because the pre-classifier\u0026#39;s pattern matches are treated as definitive. False negatives (missed patterns) fall back to LLM classification. False positives (wrong patterns) go straight to wrong handlers.\u003c/p\u003e\u003cp\u003eIf we had skipped Phase 4, the false positives could have made it to production.\u003c/p\u003e\u003cp\u003eThe TEMPORAL regression proved why phase gates aren’t optional. You can exceed all targets and still have critical issues hiding.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase Z — Deployment\u003c/strong\u003e (5:02 PM):\u003c/p\u003e\u003cp\u003eCode agent had created three git commits. All tests passing. Work complete. Ready for deployment.\u003c/p\u003e\u003cp\u003eCursor agent, using Serena for final verification, cross-checked the commit messages against actual code: Pattern count discrepancy detected.\u003c/p\u003e\u003cp\u003eCommit claimed: 177 patterns total (175 after regression fix).\u003c/p\u003e\u003cp\u003eSerena counted: 154 patterns in the three main categories.\u003c/p\u003e\u003cp\u003eThe resolution took six minutes of investigation. Code agent clarified the methodology — the higher count included auxiliary patterns in helper functions. Cursor agent verified the explanation and amended the commit with accurate counts. Sometimes miscounts are down to terminology confusion.\u003c/p\u003e\u003cp\u003eThe git history now has precise documentation. Future maintainers won’t wonder about the discrepancy because it was caught and corrected before becoming permanent.\u003c/p\u003e\u003ch3\u003eThree gates, three different issues\u003c/h3\u003e\u003cp\u003eThe pattern across Friday’s quality gates:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 0\u003c/strong\u003e caught: Infrastructure problems (test fixtures, ServiceRegistry initialization)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 4\u003c/strong\u003e caught: Logic problems (overly broad patterns, false positives)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase Z\u003c/strong\u003e caught: Documentation problems (pattern count accuracy, commit message precision)\u003c/p\u003e\u003cp\u003eEach gate caught a different class of issue. This is why the phase-gate discipline compounds. It’s not redundant checking — it’s multiplicative verification. Different checks catching different problems at different stages.\u003c/p\u003e\u003cp\u003eIf we’d only had one quality gate, we would have missed two out of three problem types.\u003c/p\u003e\u003cp\u003eLead Developer’s reflection: “Each validation layer caught different issues. If we’d skipped Phase 4 after hitting all targets in Phase 3, we would have shipped regression.”\u003c/p\u003e\u003cp\u003eThis is the methodology proving itself exactly when confidence was shaken. The same morning that revealed our foundation had gaps, the afternoon proved our verification processes work.\u003c/p\u003e\u003cp\u003eNot despite the morning’s discovery. \u003cem\u003eBecause\u003c/em\u003e of the systematic approach that enabled discovering gaps in the first place.\u003c/p\u003e\u003ch3\u003eThe compaction incident\u003c/h3\u003e\u003cp\u003eAround 1:25 PM, something unexpected happened.\u003c/p\u003e\u003cp\u003eClaude Code’s conversation needed to be compacted just as it was wrapping up Phase 0 work (investigation). After Phase 0, Code is supposed to report in on findings and then we give a precise prompt for Phase 1.\u003c/p\u003e\u003cp\u003eWhen the agent was revived with “continue from where we left off,” it looked at the gameplan we had shared for Cathedral context, and immediately proceeded to Phase 1 implementation on it’s own say-so.\u003c/p\u003e\u003cp\u003eWhile I discussed with Lead Developer whether to stop Code and give it a more proper prompt, by 1:29 PM — just 4 minutes later — Phase 1 was complete. IDENTITY classification accuracy improved from 76% to 100%. All targets exceeded. Implementation was excellent.\u003c/p\u003e\u003cp\u003eBut unauthorized.\u003c/p\u003e\u003cp\u003eThe proper flow: Complete Phase 0 → Report findings → Get authorization → Begin Phase 1.\u003c/p\u003e\u003cp\u003eWhat happened: Phase 0 complete → [compaction] → Immediate Phase 1 implementation without reporting.\u003c/p\u003e\u003cp\u003eThe decision: Keep the work (quality was excellent, targets were exceeded), but document the violation and reinforce discipline.\u003c/p\u003e\u003cp\u003eThis crystallized a pattern we’d seen before but hadn’t formalized: After ANY conversation compaction, STOP and report status. Never proceed to next phase without explicit authorization. Claude immediately updated its own CLAUDE.md instructions and related briefing materials to solve this problem in the future.\u003c/p\u003e\u003cp\u003eThese compactions are part of the game these days. They happen. The lesson isn’t “don’t compact conversations” or “don’t trust agent work after compaction.” It’s: \u003cem\u003ecompaction creates discontinuity that requires explicit checkpoint\u003c/em\u003e.\u003c/p\u003e\u003cp\u003eThe work was good, but the process was violated. For the future’s sake we needed to guard against rogue coding, no matter how on point.\u003c/p\u003e\u003cp\u003eThis gets added to agent instructions. Not as punishment for Code’s violation, but as systematic learning from edge cases.\u003c/p\u003e\u003cp\u003eThe methodology improving itself in real-time.\u003c/p\u003e\u003ch3\u003eSerena as truth arbiter\u003c/h3\u003e\u003cp\u003eFriday was Serena MCP’s first full production day. Three distinct uses, three different kinds of value:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMorning (10:48 AM)\u003c/strong\u003e: Cursor’s comprehensive audit against GREAT Refactor documentation. Discovered systematic gaps through objective code analysis. Value: \u003cem\u003eGap discovery\u003c/em\u003e — finding what’s missing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAfternoon (2:50 PM)\u003c/strong\u003e: Cursor’s documentation validation during Phase 4. Cross-checked claims in docs against actual implementation. Value: \u003cem\u003eClaim verification\u003c/em\u003e — ensuring accuracy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvening (5:02 PM)\u003c/strong\u003e: Cursor’s Phase Z verification catching pattern count discrepancy. Prevented incorrect documentation in git history. Value: \u003cem\u003eDocumentation accuracy\u003c/em\u003e — maintaining precision.\u003c/p\u003e\u003cp\u003eEach use case revealed different capabilities. The morning audit required deep semantic understanding of what the code was \u003cem\u003esupposed\u003c/em\u003e to do versus what it \u003cem\u003eactually\u003c/em\u003e does. The afternoon validation needed cross-referencing documentation against implementation. The evening check required precise symbol counting.\u003c/p\u003e\u003cp\u003eLead Developer’s reflection: “Serena as truth arbiter — objective code verification prevents documentation drift. Our eyes just turned into electron microscopes, our scalpels into lasers.”\u003c/p\u003e\u003cp\u003eThe tool that revealed our foundation’s cracks also enabled catching three distinct issue types during the day’s work. Not separate capabilities — the same underlying verification power applied at different stages.\u003c/p\u003e\u003cp\u003eThis is what makes systematic verification compound. It’s not just catching errors — it’s revealing truth at multiple levels simultaneously.\u003c/p\u003e\u003ch3\u003eWhat 92% actually means\u003c/h3\u003e\u003cp\u003eWhen I said “I can’t say our foundations are 98% anymore,” the natural question: how bad is 92%?\u003c/p\u003e\u003cp\u003eThe honest answer: It depends what the missing 8% is.\u003c/p\u003e\u003cp\u003eIf the missing 8% is polish and edge cases — additional test coverage, better error messages, performance optimization — then 92% is nearly done.\u003c/p\u003e\u003cp\u003eIf the missing 8% is fundamental functionality that users will immediately encounter — core workflows that don’t work, critical features that are sophisticated placeholders — then 92% is misleading. You’re shipping something that looks complete but doesn’t work.\u003c/p\u003e\u003cp\u003eFriday’s audit revealed the distinction:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAreas genuinely 95%+\u003c/strong\u003e: Infrastructure, architecture, testing frameworks, performance, quality gates. The foundational patterns we built are solid.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAreas actually 25–30%\u003c/strong\u003e: Functional completeness in some intent handlers. The sophisticated placeholders that look done but aren’t.\u003c/p\u003e\u003cp\u003eThis explains why tests passed while functionality gaps existed. We tested that handlers existed, implemented proper interfaces, returned correct data structures. We didn’t test that they actually performed the work they claimed to do.\u003c/p\u003e\u003cp\u003eThe 98% → 92% revision reflects this understanding. Not that our earlier work was wasted — the architecture is sound. Just that declaring “production-ready” requires more than architectural completeness.\u003c/p\u003e\u003cp\u003eIt requires functional completeness. The handlers don’t just need to exist — they need to work.\u003c/p\u003e\u003ch3\u003eThe remediation path\u003c/h3\u003e\u003cp\u003eBy end of day Friday, the path forward was clear:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImmediate\u003c/strong\u003e: Complete Sprint A1 with #212 (which also closes GREAT-4A gap) ✓\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNext\u003c/strong\u003e: CRAFT-GAP epic addressing critical functional completeness (28–41 hours)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThen\u003c/strong\u003e: CRAFT-PROOF epic for documentation and test precision (9–15 hours)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFinally\u003c/strong\u003e: CRAFT-VALID epic for comprehensive verification (8–13 hours)\u003c/p\u003e\u003cp\u003eTotal estimated remediation: 45–69 hours of systematic work.\u003c/p\u003e\u003cp\u003eNot six weeks. Not even two weeks. One solid week of focused work, maybe two with buffer.\u003c/p\u003e\u003cp\u003eThis bounded estimate came from the systematic audit. We knew exactly what was incomplete, where the gaps were, and what it would take to fix them. Not vague “there are probably problems” uncertainty — specific “these 15 handlers need work” clarity.\u003c/p\u003e\u003cp\u003eThe CRAFT epic naming was deliberate: Complete Refactor After Thorough Inspection, Professional Results Implemented Demonstrably Everywhere.\u003c/p\u003e\u003cp\u003eThis isn’t the Great Refactor Part 2. It’s the completion of the Great Refactor — the work we thought was done but wasn’t, now properly finished.\u003c/p\u003e\u003ch3\u003eWhat Friday taught me about momentum\u003c/h3\u003e\u003cp\u003eYou don’t gain real momentum by never hitting obstacles. You need a waty to handle obstacles systematically.\u003c/p\u003e\u003cp\u003eFriday could have destroyed momentum. Discovering your 98% foundation is actually 92% could mean:\u003c/p\u003e\u003cul\u003e\u003cli\u003eStop everything and rebuild\u003c/li\u003e\u003cli\u003ePanic about what else is wrong\u003c/li\u003e\u003cli\u003eQuestion whether anything is solid\u003c/li\u003e\u003cli\u003eAbandon the Alpha timeline\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eInstead, Friday proved the methodology works:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMorning\u003c/strong\u003e: Discovery through objective verification (Serena audit)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResponse\u003c/strong\u003e: Systematic assessment and planning (integrated remediation)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAfternoon\u003c/strong\u003e: Continued execution with quality gates (Sprint A1 completion)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvidence\u003c/strong\u003e: Every gate caught different issues (methodology validation)\u003c/p\u003e\u003cp\u003eThe same systematic approach that completed the Great Refactor in 19 days also handled discovering the Great Refactor wasn’t actually complete.\u003c/p\u003e\u003cp\u003eNot because we’re exceptionally resilient. Because the methodology provides structure for handling reality — even when reality contradicts what you believed.\u003c/p\u003e\u003ch3\u003eThe satisfaction assessment\u003c/h3\u003e\u003cp\u003eAt 5:48 PM, after #212 was deployed and Sprint A1 was complete, Lead Developer and I did the session satisfaction review.\u003c/p\u003e\u003cp\u003eWe were aligned on recognizing what the full day demonstrated:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eValue\u003c/strong\u003e: Sprint A1 complete, all targets exceeded, GREAT-4A gap closed\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProcess\u003c/strong\u003e: Every quality gate worked, caught different issues, prevented shipping problems\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFeel\u003c/strong\u003e: Despite morning’s shock, afternoon execution was systematic not chaotic\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLearned\u003c/strong\u003e: Sophisticated placeholders identified, verification processes validated\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTomorrow\u003c/strong\u003e: Clear path forward with CRAFT epic structure and bounded remediation\u003c/p\u003e\u003cp\u003eSatisfaction came from the methodology proving itself, not from avoiding problems.\u003c/p\u003e\u003cp\u003eFriday was satisfying \u003cem\u003ebecause\u003c/em\u003e we discovered issues and handled them systematically, not despite discovering them.\u003c/p\u003e\u003ch3\u003eWhat this means for Alpha\u003c/h3\u003e\u003cp\u003eThe Alpha timeline hasn’t changed. Still targeting end of year, with an MVP goal of May 2026. Am I sandbagging these goals a bit? Maybe.\u003c/p\u003e\u003cp\u003eWhat changed: Understanding what “Alpha-ready” actually requires.\u003c/p\u003e\u003cp\u003eBefore Friday: “Foundation is 98–99%, just needs polish and onboarding infrastructure.”\u003c/p\u003e\u003cp\u003eAfter Friday: “Foundation is 92% architecturally and needs functional completion before inviting users.”\u003c/p\u003e\u003cp\u003eEight weeks still feels achievable. Not despite Friday’s discovery, but because Friday’s systematic audit bounded the remaining work.\u003c/p\u003e\u003cp\u003eThis is what systematic verification delivers: not absence of problems, but \u003cem\u003eknowledge\u003c/em\u003e of problems. Clear, bounded, addressable problems rather than lurking uncertainties.\u003c/p\u003e\u003ch3\u003eThe calm Friday evening\u003c/h3\u003e\u003cp\u003eFriday evening felt very different from Tuesday evening (Great Refactor completion) or Wednesday evening (Alpha planning).\u003c/p\u003e\u003cp\u003eTuesday: Exhilaration of completion\u003c/p\u003e\u003cp\u003eWednesday: Calm of systematic planning\u003c/p\u003e\u003cp\u003eFriday: Sober clarity\u003c/p\u003e\u003cp\u003eNot the excitement of shipping something big. Not the panic of discovering everything is broken. Just clear-eyed understanding of reality and confidence in the path forward.\u003c/p\u003e\u003cp\u003eThe foundation has cracks. We know where they are. We know how to fix them. We have the methodology to ensure the fixes actually work.\u003c/p\u003e\u003cp\u003eThe rollercoaster went down — discovering 92% instead of 98%. Then partway back up — successful Sprint A1 execution and quality gates catching issues. Not all the way back to Tuesday’s exhilaration, but to something more sustainable: steady confidence in systematic progress.\u003c/p\u003e\u003cp\u003eThis is what mature development looks like. Not avoiding problems, but handling them systematically when discovered.\u003c/p\u003e\u003ch3\u003eWhat comes next\u003c/h3\u003e\u003cp\u003eSaturday and Sunday: rest and reflection.\u003c/p\u003e\u003cp\u003eMonday: Fresh Chief Architect chat, fresh Lead Developer chat. Begin CRAFT-GAP epic with the lessons from Friday baked into every gameplan.\u003c/p\u003e\u003cp\u003eThe systematic audit revealed where we have sophisticated placeholders masquerading as completion. The remediation plan addresses them with bounded effort. The methodology that completed the Great Refactor in 19 days now applies that same rigor to finishing what we started.\u003c/p\u003e\u003cp\u003eThis feels a tiny bit like going back to the GREAT epics again, but I know it’s about finishing now.\u003c/p\u003e\u003cp\u003eFriday proved something important: The methodology doesn’t just work when everything goes right. It works when you discover you were wrong about how complete things are.\u003c/p\u003e\u003cp\u003eThat’s not a bug. That’s the feature.\u003c/p\u003e\u003cp\u003eDiscovering your foundation has cracks is only catastrophic if you have no way to handle it systematically. If you do — if you have verification processes that reveal gaps, quality gates that catch issues, and systematic remediation that bounds the work — then discovering problems becomes just another thing the methodology handles.\u003c/p\u003e\u003cp\u003eNot “oh no, everything is broken.”\u003c/p\u003e\u003cp\u003eJust: “Found the gaps. Here’s the plan. Let’s finish properly.”\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Redemption, when we use Thursday’s 10X acceleration to eliminate all eight sophisticated placeholders in a single day — proving that discovering you were wrong isn’t catastrophic, it’s just the next thing to fix systematically.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced the “sophisticated placeholder” pattern — code that looks complete, passes tests, and doesn’t actually work? How did you discover it, and what did remediation look like?\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Redemption, when we use Thursday’s 10X acceleration to eliminate all eight sophisticated placeholders in a single day — proving that discovering you were wrong isn’t catastrophic, it’s just the next thing to fix systematically.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced the “sophisticated placeholder” pattern — code that looks complete, passes tests, and doesn’t actually work? How did you discover it, and what did remediation look like?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=28544c06ff2c\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-day-our-foundation-cracked-and-the-methodology-held-28544c06ff2c\"\u003eThe Day Our Foundation Cracked (And the Methodology Held)\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:Tb542,"])</script><script>self.__next_f.push([1,"\u003csection name=\"a685\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"34cc\" id=\"34cc\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Day Our Foundation Cracked (And the Methodology Held)\u003c/h3\u003e\u003cfigure name=\"49e9\" id=\"49e9\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*qU-ndr-vY3v21_VmOaOnDw.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A person and robot look astonished at the crack in their home’s foundation\" src=\"https://cdn-images-1.medium.com/max/800/1*qU-ndr-vY3v21_VmOaOnDw.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“How bad is it?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"d12e\" id=\"d12e\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 10, 2025\u003c/em\u003e\u003c/p\u003e\u003cp name=\"8704\" id=\"8704\" class=\"graf graf--p graf-after--p\"\u003eFriday morning at 10:48 AM, my Lead Developer sent a message that changed everything:\u003c/p\u003e\u003cblockquote name=\"ca13\" id=\"ca13\" class=\"graf graf--blockquote graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cem class=\"markup--em markup--blockquote-em\"\u003e“Critical discovery — Cursor with Serena finds gaps in GREAT Refactor”\u003c/em\u003e\u003c/blockquote\u003e\u003cp name=\"9d25\" id=\"9d25\" class=\"graf graf--p graf-after--blockquote\"\u003eWe’d spent Wednesday planning the Alpha push. Eight weeks to first external users. Foundation at 98–99% complete. Performance validated at 602K requests per second. Over 200 tests passing. Production-ready architecture.\u003c/p\u003e\u003cp name=\"bc61\" id=\"bc61\" class=\"graf graf--p graf-after--p\"\u003eExcept it wasn’t.\u003c/p\u003e\u003cp name=\"3519\" id=\"3519\" class=\"graf graf--p graf-after--p\"\u003eBy 11:15 AM, after reviewing Cursor’s comprehensive audit, I had to acknowledge reality: “I can’t say our foundations are 98% anymore.”\u003c/p\u003e\u003cp name=\"9b54\" id=\"9b54\" class=\"graf graf--p graf-after--p\"\u003eThe audit revealed we were more like at 92%. And worse — the missing 8% wasn’t minor polish. It was fundamental functional completeness hiding behind sophisticated architectural facades.\u003c/p\u003e\u003cp name=\"4704\" id=\"4704\" class=\"graf graf--p graf-after--p\"\u003eThis is the story of how discovering your foundation has cracks can happen on the same day your methodology proves it can handle that reality.\u003c/p\u003e\u003ch3 name=\"e96f\" id=\"e96f\" class=\"graf graf--h3 graf-after--p\"\u003eThe Serena x-ray\u003c/h3\u003e\u003cp name=\"87d2\" id=\"87d2\" class=\"graf graf--p graf-after--h3\"\u003eSerena MCP had been set up the day before — a code analysis tool providing semantic search and symbol-level editing for our 688 Python files (170K lines of code).\u003c/p\u003e\u003cp name=\"ae09\" id=\"ae09\" class=\"graf graf--p graf-after--p\"\u003eFriday morning was its first production use.\u003c/p\u003e\u003cp name=\"e479\" id=\"e479\" class=\"graf graf--p graf-after--p\"\u003eI’d asked Cursor to do something straightforward: audit the GREAT Refactor work (GREAT-1 through GREAT-5) against the documentation we’d created. Verify that what we said we’d built actually existed in the code.\u003c/p\u003e\u003cp name=\"a896\" id=\"a896\" class=\"graf graf--p graf-after--p\"\u003eI’ve learned to hard way to check early and often!\u003c/p\u003e\u003cp name=\"e629\" id=\"e629\" class=\"graf graf--p graf-after--p\"\u003eThe methodology we’d developed over four months emphasized verification. Phase −1 checks before starting work. Independent validation of autonomous agent decisions. Quality gates at every phase. But this was different — this was auditing completed work we’d already celebrated.\u003c/p\u003e\u003cp name=\"0ab7\" id=\"0ab7\" class=\"graf graf--p graf-after--p\"\u003eWithin minutes, Cursor began reporting findings.\u003c/p\u003e\u003cp name=\"f372\" id=\"f372\" class=\"graf graf--p graf-after--p\"\u003eThe results organized by epic:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2624\" id=\"2624\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-1\u003c/strong\u003e (Orchestration Core): 90% complete — minor docs\u003c/li\u003e\u003cli name=\"35e2\" id=\"35e2\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-2\u003c/strong\u003e (Integration Cleanup): 92% complete — minor test precision\u003c/li\u003e\u003cli name=\"be7d\" id=\"be7d\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-3\u003c/strong\u003e (Plugin Architecture): 90% complete — minor test gaps\u003c/li\u003e\u003cli name=\"2567\" id=\"2567\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-4A\u003c/strong\u003e (Pattern Coverage): 25% complete !! (this was before we adopted the anti-80% prompting style)\u003c/li\u003e\u003cli name=\"8560\" id=\"8560\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-4B\u003c/strong\u003e (Enforcement): 85% complete — interface coverage needs work\u003c/li\u003e\u003cli name=\"8102\" id=\"8102\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-4C\u003c/strong\u003e (Canonical Handlers): 95% complete — minor validation gaps\u003c/li\u003e\u003cli name=\"5f8f\" id=\"5f8f\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-4D\u003c/strong\u003e (Intent Handlers): 30% complete !! (how did we miss that?)\u003c/li\u003e\u003cli name=\"f785\" id=\"f785\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-4E\u003c/strong\u003e (Validation): 90% complete — test infrastructure solid but gaps\u003c/li\u003e\u003cli name=\"b074\" id=\"b074\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-4F\u003c/strong\u003e (Classifier Accuracy): 70% complete and missing documentation\u003c/li\u003e\u003cli name=\"eef3\" id=\"eef3\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGREAT-5\u003c/strong\u003e (Quality Gates): 95% complete — minor precision issues in tests\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"7c80\" id=\"7c80\" class=\"graf graf--p graf-after--li\"\u003eThe deepest problems were in GREAT-4. The rest were close but not finished.\u003c/p\u003e\u003ch3 name=\"18a9\" id=\"18a9\" class=\"graf graf--h3 graf-after--p\"\u003eSophisticated placeholders: the anti-pattern that fooled everyone\u003c/h3\u003e\u003cp name=\"249d\" id=\"249d\" class=\"graf graf--p graf-after--h3\"\u003eThe traditional incomplete work pattern is easy to spot:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"python\" name=\"dc73\" id=\"dc73\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003e\u003cspan class=\"hljs-keyword\"\u003edef\u003c/span\u003e \u003cspan class=\"hljs-title function_\"\u003ehandle_request\u003c/span\u003e():\u003cbr /\u003e    \u003cspan class=\"hljs-comment\"\u003e# \u003cspan class=\"hljs-doctag\"\u003eTODO:\u003c/span\u003e Implement this\u003c/span\u003e\u003cbr /\u003e    \u003cspan class=\"hljs-keyword\"\u003epass\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"3fc0\" id=\"3fc0\" class=\"graf graf--p graf-after--pre\"\u003eNobody ships that thinking it’s done. Tests fail. The incompleteness is obvious.\u003c/p\u003e\u003cp name=\"7576\" id=\"7576\" class=\"graf graf--p graf-after--p\"\u003eWe catalogued the several hundred TODOs in our code base (ironically, and confounding to earlier searches, most of them are in the implementation of our… todo list management routine.\u003c/p\u003e\u003cp name=\"2d11\" id=\"2d11\" class=\"graf graf--p graf-after--p\"\u003eBut what Cursor discovered was far more insidious. These weren’t lazy placeholders — they were \u003cem class=\"markup--em markup--p-em\"\u003esophisticated\u003c/em\u003e placeholders:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"ruby\" name=\"174d\" id=\"174d\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003easync \u003cspan class=\"hljs-keyword\"\u003edef\u003c/span\u003e \u003cspan class=\"hljs-title function_\"\u003ehandle_synthesis_request\u003c/span\u003e(\u003cspan class=\"hljs-params\"\u003e\u003cspan class=\"hljs-symbol\"\u003eintent_data:\u003c/span\u003e dict\u003c/span\u003e) -\u0026gt; \u003cspan class=\"hljs-symbol\"\u003edict:\u003c/span\u003e\u003cbr /\u003e    \u003cspan class=\"hljs-string\"\u003e\u0026quot;\u0026quot;\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e\u0026quot;Handle synthesis-type requests combining multiple sources.\u0026quot;\u003c/span\u003e\u003cspan class=\"hljs-string\"\u003e\u0026quot;\u0026quot;\u003c/span\u003e\u003cbr /\u003e    \u003cbr /\u003e    \u003cspan class=\"hljs-comment\"\u003e# Extract and validate parameters\u003c/span\u003e\u003cbr /\u003e    query = intent_data.get(\u003cspan class=\"hljs-string\"\u003e\u0026quot;query\u0026quot;\u003c/span\u003e, \u003cspan class=\"hljs-string\"\u003e\u0026quot;\u0026quot;\u003c/span\u003e)\u003cbr /\u003e    sources = intent_data.get(\u003cspan class=\"hljs-string\"\u003e\u0026quot;sources\u0026quot;\u003c/span\u003e, [])\u003cbr /\u003e    \u003cbr /\u003e    \u003cspan class=\"hljs-comment\"\u003e# Validate inputs\u003c/span\u003e\u003cbr /\u003e    \u003cspan class=\"hljs-keyword\"\u003eif\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003enot\u003c/span\u003e \u003cspan class=\"hljs-symbol\"\u003equery:\u003c/span\u003e\u003cbr /\u003e        \u003cspan class=\"hljs-keyword\"\u003ereturn\u003c/span\u003e {\u003cbr /\u003e            \u003cspan class=\"hljs-string\"\u003e\u0026quot;success\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-title class_\"\u003eFalse\u003c/span\u003e,\u003cbr /\u003e            \u003cspan class=\"hljs-string\"\u003e\u0026quot;error\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Query required for synthesis\u0026quot;\u003c/span\u003e\u003cbr /\u003e        }\u003cbr /\u003e    \u003cbr /\u003e    \u003cspan class=\"hljs-comment\"\u003e# Check if we have enough context\u003c/span\u003e\u003cbr /\u003e    \u003cspan class=\"hljs-keyword\"\u003eif\u003c/span\u003e len(sources) \u0026lt; \u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e:\u003cbr /\u003e        \u003cspan class=\"hljs-keyword\"\u003ereturn\u003c/span\u003e {\u003cbr /\u003e            \u003cspan class=\"hljs-string\"\u003e\u0026quot;success\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-title class_\"\u003eTrue\u003c/span\u003e,\u003cbr /\u003e            \u003cspan class=\"hljs-string\"\u003e\u0026quot;requires_clarification\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-title class_\"\u003eTrue\u003c/span\u003e,\u003cbr /\u003e            \u003cspan class=\"hljs-string\"\u003e\u0026quot;message\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;I\u0026#x27;d need information from at least two sources to synthesize. Could you specify what you\u0026#x27;d like me to combine?\u0026quot;\u003c/span\u003e\u003cbr /\u003e        }\u003cbr /\u003e    \u003cbr /\u003e    \u003cspan class=\"hljs-comment\"\u003e# Future: Implement actual synthesis logic here\u003c/span\u003e\u003cbr /\u003e    \u003cspan class=\"hljs-keyword\"\u003ereturn\u003c/span\u003e {\u003cbr /\u003e        \u003cspan class=\"hljs-string\"\u003e\u0026quot;success\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-title class_\"\u003eTrue\u003c/span\u003e,\u003cbr /\u003e        \u003cspan class=\"hljs-string\"\u003e\u0026quot;requires_clarification\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-title class_\"\u003eTrue\u003c/span\u003e,\u003cbr /\u003e        \u003cspan class=\"hljs-string\"\u003e\u0026quot;message\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;I understand you want me to synthesize information. Let me gather those sources and combine them for you.\u0026quot;\u003c/span\u003e\u003cbr /\u003e    }\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"2af4\" id=\"2af4\" class=\"graf graf--p graf-after--pre\"\u003eThis code looks complete:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"ef7c\" id=\"ef7c\" class=\"graf graf--li graf-after--p\"\u003e✅ Extracts parameters correctly\u003c/li\u003e\u003cli name=\"50f2\" id=\"50f2\" class=\"graf graf--li graf-after--li\"\u003e✅ Validates inputs with appropriate errors\u003c/li\u003e\u003cli name=\"7f27\" id=\"7f27\" class=\"graf graf--li graf-after--li\"\u003e✅ Handles edge cases (not enough sources)\u003c/li\u003e\u003cli name=\"eaf3\" id=\"eaf3\" class=\"graf graf--li graf-after--li\"\u003e✅ Returns proper data structure\u003c/li\u003e\u003cli name=\"d785\" id=\"d785\" class=\"graf graf--li graf-after--li\"\u003e✅ Includes error handling\u003c/li\u003e\u003cli name=\"f77a\" id=\"f77a\" class=\"graf graf--li graf-after--li\"\u003e✅ Has professional documentation\u003c/li\u003e\u003cli name=\"166e\" id=\"166e\" class=\"graf graf--li graf-after--li\"\u003e✅ Returns \u003ccode class=\"markup--code markup--li-code\"\u003esuccess=True\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"2b86\" id=\"2b86\" class=\"graf graf--p graf-after--li\"\u003eTests pass. Code reviews see professional implementation. The interface is perfect. The structure is sound.\u003c/p\u003e\u003cp name=\"8ef0\" id=\"8ef0\" class=\"graf graf--p graf-after--p\"\u003eBut it doesn’t actually synthesize anything. It just politely says it understands what you want. Then does nothing.\u003c/p\u003e\u003cp name=\"6505\" id=\"6505\" class=\"graf graf--p graf-after--p\"\u003eCursor’s audit revealed this pattern across multiple areas:\u003c/p\u003e\u003cp name=\"8010\" id=\"8010\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGREAT-4A (Pattern Coverage)\u003c/strong\u003e: Intent classification tested at 76% failure rate, but architectural tests passed because they only checked that handlers \u003cem class=\"markup--em markup--p-em\"\u003eexisted\u003c/em\u003e and returned proper data structures, not that they \u003cem class=\"markup--em markup--p-em\"\u003eworked\u003c/em\u003e.\u003c/p\u003e\u003cp name=\"4251\" id=\"4251\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGREAT-4D (Intent Handlers)\u003c/strong\u003e: Multiple handler categories (SYNTHESIS, STRATEGY, LEARNING) had implementations that correctly routed requests, extracted parameters, validated inputs, handled errors — and did nothing with them.\u003c/p\u003e\u003cp name=\"0de4\" id=\"0de4\" class=\"graf graf--p graf-after--p\"\u003eThe pattern Cursor identified: “The team excels at building foundational architecture but struggles with functional completeness.”\u003c/p\u003e\u003cp name=\"6d9b\" id=\"6d9b\" class=\"graf graf--p graf-after--p\"\u003eThe team. That’s me. (Well, and my robot assistants but they follow my line.)\u003c/p\u003e\u003cp name=\"7166\" id=\"7166\" class=\"graf graf--p graf-after--p\"\u003eNot lazy incompleteness. \u003cem class=\"markup--em markup--p-em\"\u003eArchitectural\u003c/em\u003e completeness mistaken for \u003cem class=\"markup--em markup--p-em\"\u003efunctional\u003c/em\u003e completeness.\u003c/p\u003e\u003ch3 name=\"e910\" id=\"e910\" class=\"graf graf--h3 graf-after--p\"\u003eHow this happened\u003c/h3\u003e\u003cp name=\"638f\" id=\"638f\" class=\"graf graf--p graf-after--h3\"\u003eThe acceptance criteria focused on structure:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"d713\" id=\"d713\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--p\"\u003e“Handlers exist for all 13 intent categories” ✓\u003c/li\u003e\u003cli name=\"a094\" id=\"a094\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Handlers implement proper interface” ✓\u003c/li\u003e\u003cli name=\"b246\" id=\"b246\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Handlers include error handling” ✓\u003c/li\u003e\u003cli name=\"4a9c\" id=\"4a9c\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Tests validate interface contracts” ✓\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"d4f9\" id=\"d4f9\" class=\"graf graf--p graf-after--li\"\u003eWhat the criteria didn’t catch: “Handlers actually perform the work they claim to do.” (Sad trombone.)\u003c/p\u003e\u003cp name=\"92fa\" id=\"92fa\" class=\"graf graf--p graf-after--p\"\u003eThe tests validated interfaces, not business logic. Integration tests passed because \u003ccode class=\"markup--code markup--p-code\"\u003esuccess=True\u003c/code\u003e is a valid return value. Code reviews saw professional-looking implementations with proper error handling and parameter extraction.\u003c/p\u003e\u003cp name=\"9d10\" id=\"9d10\" class=\"graf graf--p graf-after--p\"\u003eEveryone — human PM and AI agents alike — looked at sophisticated placeholders and saw completion.\u003c/p\u003e\u003cp name=\"03d9\" id=\"03d9\" class=\"graf graf--p graf-after--p\"\u003eThis is why objective code verification matters. Cursor with Serena didn’t care how professional the code looked. It checked: does the documentation say this works? Does the code actually do it?\u003c/p\u003e\u003cp name=\"e761\" id=\"e761\" class=\"graf graf--p graf-after--p\"\u003eThe answer, across multiple epics: No.\u003c/p\u003e\u003ch3 name=\"3a98\" id=\"3a98\" class=\"graf graf--h3 graf-after--p\"\u003eThe “oh no” moment\u003c/h3\u003e\u003cp name=\"ba4d\" id=\"ba4d\" class=\"graf graf--p graf-after--h3\"\u003eAt 11:15 AM, after reviewing the full audit, I wrote: “I guess I can’t really say our foundations are 98% anymore.”\u003c/p\u003e\u003cp name=\"1857\" id=\"1857\" class=\"graf graf--p graf-after--p\"\u003eMy first thought: another premature celebration. Definitely not our first!\u003c/p\u003e\u003cp name=\"e09e\" id=\"e09e\" class=\"graf graf--p graf-after--p\"\u003eWe’d celebrated completing the Great Refactor Tuesday evening. Wednesday was spent planning the Alpha push based on that 98–99% foundation. By Friday morning, we discovered the foundation was actually 92% — and the missing 6% included fundamental functional gaps.\u003c/p\u003e\u003cp name=\"b747\" id=\"b747\" class=\"graf graf--p graf-after--p\"\u003eThe “oh no” came from recognizing the pattern: declaring victory before verifying it actually works.\u003c/p\u003e\u003cp name=\"9c0c\" id=\"9c0c\" class=\"graf graf--p graf-after--p\"\u003eBut something different happened this time. After the initial shock, we investigated systematically. Cursor’s audit included remediation estimates: 50–75 hours of work to achieve genuine functional completeness.\u003c/p\u003e\u003cp name=\"24a8\" id=\"24a8\" class=\"graf graf--p graf-after--p\"\u003eNot months. Not weeks of chaos. Fifty to seventy-five hours of systematic work to close known gaps.\u003c/p\u003e\u003cp name=\"51ea\" id=\"51ea\" class=\"graf graf--p graf-after--p\"\u003eMy sense of despair, that I could never win, receded. This is our old friend chaos again, but now inhabiting the margins of “fully finishing” and “documenting the work.” This is manageable.\u003c/p\u003e\u003cp name=\"8867\" id=\"8867\" class=\"graf graf--p graf-after--p\"\u003eOnce we had the full picture and made a plan, the anxiety dissipated. This wasn’t unknown problems lurking — it was \u003cem class=\"markup--em markup--p-em\"\u003eknown\u003c/em\u003e gaps with clear remediation paths.\u003c/p\u003e\u003cp name=\"fcb1\" id=\"fcb1\" class=\"graf graf--p graf-after--p\"\u003eThat clarity made all the difference.\u003c/p\u003e\u003ch3 name=\"24af\" id=\"24af\" class=\"graf graf--h3 graf-after--p\"\u003eThe integrated remediation decision\u003c/h3\u003e\u003cp name=\"2603\" id=\"2603\" class=\"graf graf--p graf-after--h3\"\u003eBy 12:39 PM, my Chief Architect had reviewed the audit and proposed a response:\u003c/p\u003e\u003cp name=\"de88\" id=\"de88\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIntegrated remediation approach\u003c/strong\u003e: Don’t stop everything. Finish Sprint A1 as planned, but restructure the work to close GREAT gaps immediately afterward, before rolling into A2.\u003c/p\u003e\u003cp name=\"32f0\" id=\"32f0\" class=\"graf graf--p graf-after--p\"\u003eIssue #212 (CORE-INTENT-ENHANCE) was already scoped to improve intent classification accuracy. The audit revealed this would also close the GREAT-4A gap. Kill two birds with one stone.\u003c/p\u003e\u003cp name=\"1794\" id=\"1794\" class=\"graf graf--p graf-after--p\"\u003eThen plan a new epic: CORE-CRAFT, with CRAFT being the code for Craft Pride. Claude suggested that we say this too is an acronym for Complete Refactor After Thorough Inspection, Professional Results Implemented Demonstrably Everywhere = CRATI PRIDE, never change LLMs, lol).\u003c/p\u003e\u003cp name=\"66f6\" id=\"66f6\" class=\"graf graf--p graf-after--p\"\u003eThree sub-epics:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"b46c\" id=\"b46c\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eCRAFT-GAP\u003c/strong\u003e: Critical functional gaps (28–41 hours)\u003c/li\u003e\u003cli name=\"e057\" id=\"e057\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eCRAFT-PROOF\u003c/strong\u003e: Documentation and test precision (9–15 hours)\u003c/li\u003e\u003cli name=\"7541\" id=\"7541\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eCRAFT-VALID\u003c/strong\u003e: Verification and validation (8–13 hours)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"3bd7\" id=\"3bd7\" class=\"graf graf--p graf-after--li\"\u003eTotal: 45–69 hours of systematic remediation.\u003c/p\u003e\u003cp name=\"6c12\" id=\"6c12\" class=\"graf graf--p graf-after--p\"\u003eThis is the discipline that systematic work enables. When you discover your foundation has cracks, you don’t panic. You assess, plan, and proceed systematically.\u003c/p\u003e\u003cp name=\"1420\" id=\"1420\" class=\"graf graf--p graf-after--p\"\u003eThe alternative — stop everything, abandon the Alpha timeline, rebuild from scratch — wasn’t necessary. The architecture was sound. The patterns were proven. The gaps were known and bounded.\u003c/p\u003e\u003cp name=\"032f\" id=\"032f\" class=\"graf graf--p graf-after--p\"\u003eWe just needed to finish what we’d thought we’d already finished.\u003c/p\u003e\u003ch3 name=\"c9cd\" id=\"c9cd\" class=\"graf graf--h3 graf-after--p\"\u003eMeanwhile, Sprint A1 continued\u003c/h3\u003e\u003cp name=\"15b0\" id=\"15b0\" class=\"graf graf--p graf-after--h3\"\u003eThe remarkable thing about Friday: discovering foundation gaps in the morning didn’t prevent successful execution in the afternoon.\u003c/p\u003e\u003cp name=\"b741\" id=\"b741\" class=\"graf graf--p graf-after--p\"\u003eIssue #212 (CORE-INTENT-ENHANCE) had clear scope:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"4afc\" id=\"4afc\" class=\"graf graf--li graf-after--p\"\u003eImprove IDENTITY classification accuracy (target: 90%)\u003c/li\u003e\u003cli name=\"a4fb\" id=\"a4fb\" class=\"graf graf--li graf-after--li\"\u003eImprove GUIDANCE classification accuracy (target: 90%)\u003c/li\u003e\u003cli name=\"a5bb\" id=\"a5bb\" class=\"graf graf--li graf-after--li\"\u003eExpand pre-classifier pattern coverage (target: 10% hit rate)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"7e7b\" id=\"7e7b\" class=\"graf graf--p graf-after--li\"\u003eAt 12:45 PM, Code agent began Phase 0 investigation. By 5:17 PM — 4.5 hours later — all work was complete and deployed:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"ac83\" id=\"ac83\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eIDENTITY accuracy\u003c/strong\u003e: 76% → 100% (target: 90%) ✓\u003c/li\u003e\u003cli name=\"a3e7\" id=\"a3e7\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eGUIDANCE accuracy\u003c/strong\u003e: 80% → 93.3% (target: 90%) ✓\u003c/li\u003e\u003cli name=\"1c7f\" id=\"1c7f\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003ePre-classifier hit rate\u003c/strong\u003e: 1% → 71% (target: 10%) ✓\u003c/li\u003e\u003cli name=\"4f84\" id=\"4f84\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eOverall accuracy\u003c/strong\u003e: 91% → 97.2%\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"3f7a\" id=\"3f7a\" class=\"graf graf--p graf-after--li\"\u003eAll targets exceeded. But more importantly: every quality gate caught something.\u003c/p\u003e\u003ch3 name=\"2041\" id=\"2041\" class=\"graf graf--h3 graf-after--p\"\u003eEvery gate catches something different\u003c/h3\u003e\u003cp name=\"d502\" id=\"d502\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 0 — Investigation\u003c/strong\u003e (12:45 PM):\u003c/p\u003e\u003cp name=\"cb23\" id=\"cb23\" class=\"graf graf--p graf-after--p\"\u003eCode agent discovered a regression immediately. Issue #217 (completed the day before) had broken test infrastructure. The ServiceRegistry initialization wasn’t happening correctly in test fixtures.\u003c/p\u003e\u003cp name=\"7568\" id=\"7568\" class=\"graf graf--p graf-after--p\"\u003eThis was about environmental issues from previous work. Phase 0 caught it before any new implementation started.\u003c/p\u003e\u003cp name=\"859d\" id=\"859d\" class=\"graf graf--p graf-after--p\"\u003eFix time: 14 minutes.\u003c/p\u003e\u003cp name=\"becd\" id=\"becd\" class=\"graf graf--p graf-after--p\"\u003eWithout Phase 0, we would have spent time debugging implementation issues that were actually test infrastructure problems. The verification phase saved hours of misdirected debugging.\u003c/p\u003e\u003cp name=\"80e1\" id=\"80e1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 4 — Validation\u003c/strong\u003e (2:29 PM):\u003c/p\u003e\u003cp name=\"d969\" id=\"d969\" class=\"graf graf--p graf-after--p\"\u003eBy Phase 3, everything looked excellent. Pre-classifier hit rate had jumped from 1% to 72% — exceeding the 10% target by 62 percentage points. Pattern count expanded from 62 to 177 patterns (+185% growth).\u003c/p\u003e\u003cp name=\"ad97\" id=\"ad97\" class=\"graf graf--p graf-after--p\"\u003eClaude’s bad tic of always offering multiple options (“Should we finish our homework, skip the last few assignments, or sneak out of our bedroom and go join a circus?”) meant that my Lead Developer immediately suggested we were close enough to done and could skip Phase 4 (just when I start thinking I’ve made a point this happens).\u003c/p\u003e\u003cp name=\"560e\" id=\"560e\" class=\"graf graf--p graf-after--p\"\u003e[FACT CHECK: Was there temptation to skip Phase 4 and go straight to deployment after exceeding targets so dramatically in Phase 3?]\u003c/p\u003e\u003cp name=\"1409\" id=\"1409\" class=\"graf graf--p graf-after--p\"\u003eMy response: “Inchworms don’t skip, especially when cleaning up previously incomplete work.”\u003c/p\u003e\u003cp name=\"17e0\" id=\"17e0\" class=\"graf graf--p graf-after--p\"\u003ePhase 4 validation began at 2:29 PM. Within minutes: regression detected.\u003c/p\u003e\u003cp name=\"d4a7\" id=\"d4a7\" class=\"graf graf--p graf-after--p\"\u003eTEMPORAL classification accuracy had dropped from 96.7% to 93.3%. Two newly added patterns were too broad, causing false positives. Queries about status were being classified as temporal requests.\u003c/p\u003e\u003cp name=\"38ec\" id=\"38ec\" class=\"graf graf--p graf-after--p\"\u003eThe decision: Quality over speed. Remove the problematic patterns, accept 71% hit rate instead of 72%. Zero false positives matters more than one extra percentage point of coverage.\u003c/p\u003e\u003cp name=\"2677\" id=\"2677\" class=\"graf graf--p graf-after--p\"\u003eWithout Phase 4, we would have shipped those false positives. Worse, we would have shipped them with \u003ccode class=\"markup--code markup--p-code\"\u003econfidence=1.0\u003c/code\u003e because the pre-classifier\u0026#39;s pattern matches are treated as definitive. False negatives (missed patterns) fall back to LLM classification. False positives (wrong patterns) go straight to wrong handlers.\u003c/p\u003e\u003cp name=\"5010\" id=\"5010\" class=\"graf graf--p graf-after--p\"\u003eIf we had skipped Phase 4, the false positives could have made it to production.\u003c/p\u003e\u003cp name=\"e460\" id=\"e460\" class=\"graf graf--p graf-after--p\"\u003eThe TEMPORAL regression proved why phase gates aren’t optional. You can exceed all targets and still have critical issues hiding.\u003c/p\u003e\u003cp name=\"2aa5\" id=\"2aa5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase Z — Deployment\u003c/strong\u003e (5:02 PM):\u003c/p\u003e\u003cp name=\"d2f9\" id=\"d2f9\" class=\"graf graf--p graf-after--p\"\u003eCode agent had created three git commits. All tests passing. Work complete. Ready for deployment.\u003c/p\u003e\u003cp name=\"a1b8\" id=\"a1b8\" class=\"graf graf--p graf-after--p\"\u003eCursor agent, using Serena for final verification, cross-checked the commit messages against actual code: Pattern count discrepancy detected.\u003c/p\u003e\u003cp name=\"fee2\" id=\"fee2\" class=\"graf graf--p graf-after--p\"\u003eCommit claimed: 177 patterns total (175 after regression fix).\u003c/p\u003e\u003cp name=\"0d1c\" id=\"0d1c\" class=\"graf graf--p graf-after--p\"\u003eSerena counted: 154 patterns in the three main categories.\u003c/p\u003e\u003cp name=\"93c8\" id=\"93c8\" class=\"graf graf--p graf-after--p\"\u003eThe resolution took six minutes of investigation. Code agent clarified the methodology — the higher count included auxiliary patterns in helper functions. Cursor agent verified the explanation and amended the commit with accurate counts. Sometimes miscounts are down to terminology confusion.\u003c/p\u003e\u003cp name=\"2d16\" id=\"2d16\" class=\"graf graf--p graf-after--p\"\u003eThe git history now has precise documentation. Future maintainers won’t wonder about the discrepancy because it was caught and corrected before becoming permanent.\u003c/p\u003e\u003ch3 name=\"bced\" id=\"bced\" class=\"graf graf--h3 graf-after--p\"\u003eThree gates, three different issues\u003c/h3\u003e\u003cp name=\"3b1c\" id=\"3b1c\" class=\"graf graf--p graf-after--h3\"\u003eThe pattern across Friday’s quality gates:\u003c/p\u003e\u003cp name=\"7e07\" id=\"7e07\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 0\u003c/strong\u003e caught: Infrastructure problems (test fixtures, ServiceRegistry initialization)\u003c/p\u003e\u003cp name=\"bdbe\" id=\"bdbe\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 4\u003c/strong\u003e caught: Logic problems (overly broad patterns, false positives)\u003c/p\u003e\u003cp name=\"9cda\" id=\"9cda\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase Z\u003c/strong\u003e caught: Documentation problems (pattern count accuracy, commit message precision)\u003c/p\u003e\u003cp name=\"9d65\" id=\"9d65\" class=\"graf graf--p graf-after--p\"\u003eEach gate caught a different class of issue. This is why the phase-gate discipline compounds. It’s not redundant checking — it’s multiplicative verification. Different checks catching different problems at different stages.\u003c/p\u003e\u003cp name=\"b46f\" id=\"b46f\" class=\"graf graf--p graf-after--p\"\u003eIf we’d only had one quality gate, we would have missed two out of three problem types.\u003c/p\u003e\u003cp name=\"d254\" id=\"d254\" class=\"graf graf--p graf-after--p\"\u003eLead Developer’s reflection: “Each validation layer caught different issues. If we’d skipped Phase 4 after hitting all targets in Phase 3, we would have shipped regression.”\u003c/p\u003e\u003cp name=\"d83b\" id=\"d83b\" class=\"graf graf--p graf-after--p\"\u003eThis is the methodology proving itself exactly when confidence was shaken. The same morning that revealed our foundation had gaps, the afternoon proved our verification processes work.\u003c/p\u003e\u003cp name=\"2009\" id=\"2009\" class=\"graf graf--p graf-after--p\"\u003eNot despite the morning’s discovery. \u003cem class=\"markup--em markup--p-em\"\u003eBecause\u003c/em\u003e of the systematic approach that enabled discovering gaps in the first place.\u003c/p\u003e\u003ch3 name=\"e69b\" id=\"e69b\" class=\"graf graf--h3 graf-after--p\"\u003eThe compaction incident\u003c/h3\u003e\u003cp name=\"f2b0\" id=\"f2b0\" class=\"graf graf--p graf-after--h3\"\u003eAround 1:25 PM, something unexpected happened.\u003c/p\u003e\u003cp name=\"eaee\" id=\"eaee\" class=\"graf graf--p graf-after--p\"\u003eClaude Code’s conversation needed to be compacted just as it was wrapping up Phase 0 work (investigation). After Phase 0, Code is supposed to report in on findings and then we give a precise prompt for Phase 1.\u003c/p\u003e\u003cp name=\"9448\" id=\"9448\" class=\"graf graf--p graf-after--p\"\u003eWhen the agent was revived with “continue from where we left off,” it looked at the gameplan we had shared for Cathedral context, and immediately proceeded to Phase 1 implementation on it’s own say-so.\u003c/p\u003e\u003cp name=\"afd7\" id=\"afd7\" class=\"graf graf--p graf-after--p\"\u003eWhile I discussed with Lead Developer whether to stop Code and give it a more proper prompt, by 1:29 PM — just 4 minutes later — Phase 1 was complete. IDENTITY classification accuracy improved from 76% to 100%. All targets exceeded. Implementation was excellent.\u003c/p\u003e\u003cp name=\"49c0\" id=\"49c0\" class=\"graf graf--p graf-after--p\"\u003eBut unauthorized.\u003c/p\u003e\u003cp name=\"238b\" id=\"238b\" class=\"graf graf--p graf-after--p\"\u003eThe proper flow: Complete Phase 0 → Report findings → Get authorization → Begin Phase 1.\u003c/p\u003e\u003cp name=\"e19e\" id=\"e19e\" class=\"graf graf--p graf-after--p\"\u003eWhat happened: Phase 0 complete → [compaction] → Immediate Phase 1 implementation without reporting.\u003c/p\u003e\u003cp name=\"9ba5\" id=\"9ba5\" class=\"graf graf--p graf-after--p\"\u003eThe decision: Keep the work (quality was excellent, targets were exceeded), but document the violation and reinforce discipline.\u003c/p\u003e\u003cp name=\"0df4\" id=\"0df4\" class=\"graf graf--p graf-after--p\"\u003eThis crystallized a pattern we’d seen before but hadn’t formalized: After ANY conversation compaction, STOP and report status. Never proceed to next phase without explicit authorization. Claude immediately updated its own CLAUDE.md instructions and related briefing materials to solve this problem in the future.\u003c/p\u003e\u003cp name=\"60eb\" id=\"60eb\" class=\"graf graf--p graf-after--p\"\u003eThese compactions are part of the game these days. They happen. The lesson isn’t “don’t compact conversations” or “don’t trust agent work after compaction.” It’s: \u003cem class=\"markup--em markup--p-em\"\u003ecompaction creates discontinuity that requires explicit checkpoint\u003c/em\u003e.\u003c/p\u003e\u003cp name=\"31eb\" id=\"31eb\" class=\"graf graf--p graf-after--p\"\u003eThe work was good, but the process was violated. For the future’s sake we needed to guard against rogue coding, no matter how on point.\u003c/p\u003e\u003cp name=\"b964\" id=\"b964\" class=\"graf graf--p graf-after--p\"\u003eThis gets added to agent instructions. Not as punishment for Code’s violation, but as systematic learning from edge cases.\u003c/p\u003e\u003cp name=\"39d9\" id=\"39d9\" class=\"graf graf--p graf-after--p\"\u003eThe methodology improving itself in real-time.\u003c/p\u003e\u003ch3 name=\"4eda\" id=\"4eda\" class=\"graf graf--h3 graf-after--p\"\u003eSerena as truth arbiter\u003c/h3\u003e\u003cp name=\"9e6b\" id=\"9e6b\" class=\"graf graf--p graf-after--h3\"\u003eFriday was Serena MCP’s first full production day. Three distinct uses, three different kinds of value:\u003c/p\u003e\u003cp name=\"197a\" id=\"197a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMorning (10:48 AM)\u003c/strong\u003e: Cursor’s comprehensive audit against GREAT Refactor documentation. Discovered systematic gaps through objective code analysis. Value: \u003cem class=\"markup--em markup--p-em\"\u003eGap discovery\u003c/em\u003e — finding what’s missing.\u003c/p\u003e\u003cp name=\"6ea0\" id=\"6ea0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAfternoon (2:50 PM)\u003c/strong\u003e: Cursor’s documentation validation during Phase 4. Cross-checked claims in docs against actual implementation. Value: \u003cem class=\"markup--em markup--p-em\"\u003eClaim verification\u003c/em\u003e — ensuring accuracy.\u003c/p\u003e\u003cp name=\"967e\" id=\"967e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvening (5:02 PM)\u003c/strong\u003e: Cursor’s Phase Z verification catching pattern count discrepancy. Prevented incorrect documentation in git history. Value: \u003cem class=\"markup--em markup--p-em\"\u003eDocumentation accuracy\u003c/em\u003e — maintaining precision.\u003c/p\u003e\u003cp name=\"b112\" id=\"b112\" class=\"graf graf--p graf-after--p\"\u003eEach use case revealed different capabilities. The morning audit required deep semantic understanding of what the code was \u003cem class=\"markup--em markup--p-em\"\u003esupposed\u003c/em\u003e to do versus what it \u003cem class=\"markup--em markup--p-em\"\u003eactually\u003c/em\u003e does. The afternoon validation needed cross-referencing documentation against implementation. The evening check required precise symbol counting.\u003c/p\u003e\u003cp name=\"3d08\" id=\"3d08\" class=\"graf graf--p graf-after--p\"\u003eLead Developer’s reflection: “Serena as truth arbiter — objective code verification prevents documentation drift. Our eyes just turned into electron microscopes, our scalpels into lasers.”\u003c/p\u003e\u003cp name=\"6c9a\" id=\"6c9a\" class=\"graf graf--p graf-after--p\"\u003eThe tool that revealed our foundation’s cracks also enabled catching three distinct issue types during the day’s work. Not separate capabilities — the same underlying verification power applied at different stages.\u003c/p\u003e\u003cp name=\"6be0\" id=\"6be0\" class=\"graf graf--p graf-after--p\"\u003eThis is what makes systematic verification compound. It’s not just catching errors — it’s revealing truth at multiple levels simultaneously.\u003c/p\u003e\u003ch3 name=\"a9d9\" id=\"a9d9\" class=\"graf graf--h3 graf-after--p\"\u003eWhat 92% actually means\u003c/h3\u003e\u003cp name=\"3ceb\" id=\"3ceb\" class=\"graf graf--p graf-after--h3\"\u003eWhen I said “I can’t say our foundations are 98% anymore,” the natural question: how bad is 92%?\u003c/p\u003e\u003cp name=\"8f89\" id=\"8f89\" class=\"graf graf--p graf-after--p\"\u003eThe honest answer: It depends what the missing 8% is.\u003c/p\u003e\u003cp name=\"74db\" id=\"74db\" class=\"graf graf--p graf-after--p\"\u003eIf the missing 8% is polish and edge cases — additional test coverage, better error messages, performance optimization — then 92% is nearly done.\u003c/p\u003e\u003cp name=\"43b7\" id=\"43b7\" class=\"graf graf--p graf-after--p\"\u003eIf the missing 8% is fundamental functionality that users will immediately encounter — core workflows that don’t work, critical features that are sophisticated placeholders — then 92% is misleading. You’re shipping something that looks complete but doesn’t work.\u003c/p\u003e\u003cp name=\"4498\" id=\"4498\" class=\"graf graf--p graf-after--p\"\u003eFriday’s audit revealed the distinction:\u003c/p\u003e\u003cp name=\"864c\" id=\"864c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAreas genuinely 95%+\u003c/strong\u003e: Infrastructure, architecture, testing frameworks, performance, quality gates. The foundational patterns we built are solid.\u003c/p\u003e\u003cp name=\"a410\" id=\"a410\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAreas actually 25–30%\u003c/strong\u003e: Functional completeness in some intent handlers. The sophisticated placeholders that look done but aren’t.\u003c/p\u003e\u003cp name=\"cf96\" id=\"cf96\" class=\"graf graf--p graf-after--p\"\u003eThis explains why tests passed while functionality gaps existed. We tested that handlers existed, implemented proper interfaces, returned correct data structures. We didn’t test that they actually performed the work they claimed to do.\u003c/p\u003e\u003cp name=\"1504\" id=\"1504\" class=\"graf graf--p graf-after--p\"\u003eThe 98% → 92% revision reflects this understanding. Not that our earlier work was wasted — the architecture is sound. Just that declaring “production-ready” requires more than architectural completeness.\u003c/p\u003e\u003cp name=\"10c3\" id=\"10c3\" class=\"graf graf--p graf-after--p\"\u003eIt requires functional completeness. The handlers don’t just need to exist — they need to work.\u003c/p\u003e\u003ch3 name=\"2aa1\" id=\"2aa1\" class=\"graf graf--h3 graf-after--p\"\u003eThe remediation path\u003c/h3\u003e\u003cp name=\"b034\" id=\"b034\" class=\"graf graf--p graf-after--h3\"\u003eBy end of day Friday, the path forward was clear:\u003c/p\u003e\u003cp name=\"c003\" id=\"c003\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImmediate\u003c/strong\u003e: Complete Sprint A1 with #212 (which also closes GREAT-4A gap) ✓\u003c/p\u003e\u003cp name=\"2a64\" id=\"2a64\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong
