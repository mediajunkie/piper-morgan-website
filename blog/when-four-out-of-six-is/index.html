gets action mapping and todos. The Lead Developer coordinates. Nice, clean division of labor.\u003c/p\u003e\u003ch3\u003eThe morning discoveries\u003c/h3\u003e\u003cp\u003eCode Agent begins Phase −1 investigation for Issue #284 (Action Mapping). The archaeological approach: Check what exists before building.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDiscovery 1 — ActionHumanizer exists\u003c/strong\u003e:\u003c/p\u003e\u003cpre\u003eservices/ui_messages/action_humanizer.py (complete rule-based system)\u003cbr\u003edocs/internal/architecture/current/adrs/adr-004-action-humanizer-integration.md\u003cbr\u003etests/services/ui_messages/test_enhanced_action_humanizer.py\u003cbr\u003etests/integration/test_humanized_workflow_messages.py\u003c/pre\u003e\u003cp\u003ePhase 1 complete (rule-based + caching + templates).\u003c/p\u003e\u003cp\u003eLook, this stuff doesn’t surprise me. I have to roll my eyes every time the agents discover stuff already exists. Look, I have feet! Amazing! I told them about the ActionHumanizer. What I didn’t know was: is it any good? was it finished? is it connected to anything? and the the key question:\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhy isn’t this fully engaged for error messages?\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDiscovery 2 — Purpose distinction matters\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActionHumanizer\u003c/strong\u003e (UI/UX Layer):\u003c/p\u003e\u003cul\u003e\u003cli\u003ePurpose: Convert technical strings to user-friendly natural language\u003c/li\u003e\u003cli\u003eExample: \u0026quot;fetch_github_issues\u0026quot; → \u0026quot;grab those GitHub issues\u0026quot;\u003c/li\u003e\u003cli\u003eUsed by: TemplateRenderer, PersonalityTemplateRenderer\u003c/li\u003e\u003cli\u003eStatus: ✅ Working as designed for UI humanization\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eActionMapper\u003c/strong\u003e (Internal Routing — what we actually need):\u003c/p\u003e\u003cul\u003e\u003cli\u003ePurpose: Map classifier action outputs to handler method names\u003c/li\u003e\u003cli\u003eExample: Classifier outputs \u0026quot;create_github_issue\u0026quot; but handler expects \u0026quot;create_issue\u0026quot;\u003c/li\u003e\u003cli\u003eCurrent: Hardcoded string matching in _handle_execution_intent (lines 464-499)\u003c/li\u003e\u003cli\u003eStatus: ❌ Does NOT exist — causing “No handler for action” errors\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eTwo different problems. ActionHumanizer solves one. We need the other.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDiscovery 3 — The classifier mismatch confirmed\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003eEvidence:\u003c/p\u003e\u003cul\u003e\u003cli\u003eClassifier outputs: \u0026quot;create_github_issue\u0026quot;, \u0026quot;list_github_issues\u0026quot;\u003c/li\u003e\u003cli\u003eIntentService expects: \u0026quot;create_issue\u0026quot;, \u0026quot;create_ticket\u0026quot;, \u0026quot;update_issue\u0026quot;\u003c/li\u003e\u003cli\u003eTests show classifier producing \u0026quot;create_github_issue\u0026quot; action\u003c/li\u003e\u003cli\u003eWorkflowFactory already has mapping: {\u0026quot;create_github_issue\u0026quot;: WorkflowType.CREATE_TICKET}\u003c/li\u003e\u003cli\u003eIntentService handlers exist but with different naming: _handle_create_issue\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe mismatch is confirmed and actionable. This is Issue #284. Build the mapping layer.\u003c/p\u003e\u003ch3\u003eThe parallel error message investigation\u003c/h3\u003e\u003cp\u003eWhile Code investigates action mapping, Cursor investigates error messages (Issue #283).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFound — Complete existing infrastructure\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eUserFriendlyErrorService (300+ lines, comprehensive)\u003c/li\u003e\u003cli\u003eActionHumanizer (160+ lines)\u003c/li\u003e\u003cli\u003eEnhancedErrorMiddleware (180+ lines)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eRoot cause identified\u003c/strong\u003e: Middleware not mounted in web/app.py.\u003c/p\u003e\u003cp\u003eAt this point I have to ask myself a question: where does technical debt leave off and “development style” — build deep then wire later — kick in?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFirst action\u003c/strong\u003e: Mount EnhancedErrorMiddleware in web/app.py.\u003c/p\u003e\u003cul\u003e\u003cli\u003ePlaced BEFORE other middleware (catches all exceptions)\u003c/li\u003e\u003cli\u003eProper import and error handling added\u003c/li\u003e\u003cli\u003eStatus: ✅ WIRING COMPLETE \u0026amp; TESTED\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eAnother 75% pattern. Infrastructure exists. Just needs wiring. Saturday (DocumentService). Sunday (Todo infrastructure). Monday (ActionHumanizer + EnhancedErrorMiddleware).\u003c/p\u003e\u003cp\u003eThe archaeological approach keeps finding nearly-complete work.\u003c/p\u003e\u003ch3\u003eThe morning execution\u003c/h3\u003e\u003cp\u003eCode grinds through two issues, focused work:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #284\u003c/strong\u003e (Action Mapping)\u003c/p\u003e\u003cul\u003e\u003cli\u003eCreated action mapping layer\u003c/li\u003e\u003cli\u003eResolved classifier output → handler name mismatches\u003c/li\u003e\u003cli\u003eSystematic mapping implementation\u003c/li\u003e\u003cli\u003eTests passing\u003c/li\u003e\u003cli\u003e✅ COMPLETE\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eIssue #285\u003c/strong\u003e (Todo System)\u003c/p\u003e\u003cul\u003e\u003cli\u003eWired TodoKnowledgeService to web routes\u003c/li\u003e\u003cli\u003eChat handlers created\u003c/li\u003e\u003cli\u003eTodo CRUD operations functional\u003c/li\u003e\u003cli\u003eTests passing\u003c/li\u003e\u003cli\u003eBoth API and chat integration working\u003c/li\u003e\u003cli\u003e✅ COMPLETE\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eTwo down. One to go.\u003c/p\u003e\u003ch3\u003eThe next architectural discovery\u003c/h3\u003e\u003cp\u003eCursor reports findings on Issue #283 (Error Messages).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe problem\u003c/strong\u003e: FastAPI’s exception handlers cannot catch auth failures.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe evidence\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eTests show auth errors return: {\u0026quot;detail\u0026quot;: \u0026quot;Invalid token\u0026quot;}\u003c/li\u003e\u003cli\u003eShould return: {\u0026quot;message\u0026quot;: \u0026quot;I need you to log back in...\u0026quot;}\u003c/li\u003e\u003cli\u003eAfter mounting EnhancedErrorMiddleware, still returns technical error\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eThe investigation\u003c/strong\u003e: Why can’t we catch auth errors?\u003c/p\u003e\u003cp\u003eRoot cause — FastAPI’s two-phase processing:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 1: Dependency Resolution\u003c/strong\u003e\u003cbr\u003e → Executes BEFORE route handler\u003cbr\u003e → Has its own error handling\u003cbr\u003e → Returns errors directly as JSON\u003cbr\u003e → CANNOT be intercepted by @app.exception_handlerz\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003ePhase 2: Route Handler Execution\u003c/strong\u003e\u003cbr\u003e → Where our business logic runs\u003cbr\u003e → Where our exception handlers work\u003cbr\u003e → Where middleware can intercept\u003cbr\u003e → This is where 4/6 error types work\u003c/p\u003e\u003cp\u003eThis actually isn’t a bug or an oversight. It’s \u003cstrong\u003eFastAPI’s deliberate design\u003c/strong\u003e. It’s how it works.\u003c/p\u003e\u003cp\u003eDependencies are meant to fail fast with clear, technical errors for security/validation issues. Authentication happens in dependency injection. Dependency injection errors bypass exception handlers.\u003c/p\u003e\u003cp\u003eBy design. For good reasons.\u003c/p\u003e\u003ch3\u003eThe four out of six achievement\u003c/h3\u003e\u003cp\u003eLet’s be explicit about what works and what doesn’t:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat Works (4/6)\u003c/strong\u003e ✅:\u003c/p\u003e\u003col\u003e\u003cli\u003eEmpty input → “I didn’t quite catch that”\u003c/li\u003e\u003cli\u003eUnknown action → “I’m still learning how to help with that”\u003c/li\u003e\u003cli\u003eTimeout → “That’s complex — let me reconsider”\u003c/li\u003e\u003cli\u003eUnknown intent → “I’m not sure I understood”\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cstrong\u003eWhat Doesn’t Work (2/6)\u003c/strong\u003e ❌:\u003c/p\u003e\u003cp\u003e5. Invalid token → {\u0026quot;detail\u0026quot;: \u0026quot;Invalid token\u0026quot;}\u003c/p\u003e\u003cp\u003e6. No token → {\u0026quot;detail\u0026quot;: \u0026quot;Authentication required\u0026quot;}\u003c/p\u003e\u003cp\u003eFour out of six. 67%. Not a failing grade. But not complete either.\u003c/p\u003e\u003cp\u003eMy suspicion of premature celebration kicks in. My greed usually pays off. When I channel my dad (why didn’t you get an A+?) I usually get better results. I have to ask:\u003c/p\u003e\u003cp\u003eIs 4/6 acceptable? Or do we need to solve the remaining 2?\u003c/p\u003e\u003ch3\u003eThe architectural decision point\u003c/h3\u003e\u003cp\u003eChief Architect evaluates three options:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOption A — Move Auth to Route Bodies\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eMove authentication from dependency injection to route handler body\u003c/li\u003e\u003cli\u003eWould make auth errors catchable by exception handlers\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eEffort\u003c/strong\u003e: 4–6 hours\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eRisk\u003c/strong\u003e: HIGH (breaking 20+ routes, violating FastAPI patterns)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eBenefit\u003c/strong\u003e: Marginal UX improvement for \u0026lt;5% of errors\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eVerdict\u003c/strong\u003e: Not worth it\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eOption B — ASGI Middleware\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eImplement low-level ASGI middleware to intercept dependency errors\u003c/li\u003e\u003cli\u003eComplex custom middleware before FastAPI’s processing\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eEffort\u003c/strong\u003e: 8–12 hours\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eRisk\u003c/strong\u003e: VERY HIGH (complex, performance impact, uncertain success)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eBenefit\u003c/strong\u003e: Same marginal improvement\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eVerdict\u003c/strong\u003e: Definitely not worth it\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eOption C — Accept 4/6 as Architectural Reality\u003c/strong\u003e ✅:\u003c/p\u003e\u003cul\u003e\u003cli\u003eDocument the limitation\u003c/li\u003e\u003cli\u003eAccept that auth errors will be technical\u003c/li\u003e\u003cli\u003eFocus energy elsewhere\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eEffort\u003c/strong\u003e: 0 hours\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eRisk\u003c/strong\u003e: NONE\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eImpact\u003c/strong\u003e: Minor UX gap for rare scenarios\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eVerdict\u003c/strong\u003e: Most sensible choice\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe chief architect make the case for “four out of six is enough”:\u003c/p\u003e\u003ch4\u003e\u003cstrong\u003eArchitectural Integrity \u0026gt; Marginal UX Gains\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eBreaking FastAPI patterns to achieve minor UX improvement isn’t good engineering. The framework’s dependency injection design exists for good reasons — security, performance, clarity.\u003c/p\u003e\u003cp\u003eFighting the framework to catch 2 additional error types (that happen rarely — auth errors only occur during session expiration or token issues) doesn’t justify violating architectural patterns.\u003c/p\u003e\u003ch4\u003e\u003cstrong\u003eCost-Benefit Analysis\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003e4–6 hours (Option A) or 8–12 hours (Option B) to improve UX for \u0026lt;5% of errors. In alpha testing with 5–10 trusted users. Who can handle technical auth errors without confusion.\u003c/p\u003e\u003cp\u003eThat effort could instead: Polish other features. Fix actual bugs. Improve core functionality. Add value.\u003c/p\u003e\u003ch4\u003e\u003cstrong\u003eAlpha Testing Context\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eWe’re not shipping to public internet. We’re alpha testing with trusted users who understand the system is in development. Technical auth errors aren’t catastrophic for alpha.\u003c/p\u003e\u003cp\u003eProduction may require better auth error UX. But production is not alpha. Alpha requirement is “functional enough to test core value.” Mission accomplished at 4/6.\u003c/p\u003e\u003ch4\u003e\u003cstrong\u003eThe 80% Pattern Inverted\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eUsually we fight the 80% pattern — stopping at “good enough” instead of truly complete. Here we’re doing the opposite: Recognizing that 67% (4/6) represents complete work given architectural constraints.\u003c/p\u003e\u003cp\u003eNot “we got tired and stopped.” But “we hit architectural limit and accepted it intelligently.”\u003c/p\u003e\u003ch3\u003eWhat Monday’s mixed results reveal\u003c/h3\u003e\u003cp\u003eLet me be explicit about Monday’s outcomes:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #284\u003c/strong\u003e: ✅ Mapping layer created, all tests passing\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #285\u003c/strong\u003e: ✅ Todo system wired, API + chat working\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIssue #283\u003c/strong\u003e: ✅ 4/6 error types humanized, architectural limit accepted\u003c/p\u003e\u003cp\u003eThe framing matters. If “complete” means “achieved everything specified without limitation,” Monday is 2/3 success.\u003c/p\u003e\u003cp\u003eBut if “complete” means “resolved all issues to architecturally appropriate state,” Monday is 3/3 success.\u003c/p\u003e\u003cp\u003eI’m going with the second framing. Because Issue #283 isn’t incomplete. It’s complete to the extent architecture allows without violating framework patterns.\u003c/p\u003e\u003ch3\u003eThe archaeological discovery pattern continues\u003c/h3\u003e\u003cp\u003eMonday marks the third consecutive day of archaeological discoveries:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSaturday\u003c/strong\u003e: DocumentService 75% complete → wired in 2 hours\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSunday\u003c/strong\u003e: Todo infrastructure 75% complete → wired in 4–6 hours\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMonday\u003c/strong\u003e: ActionHumanizer + EnhancedErrorMiddleware complete → wired immediately\u003c/p\u003e\u003cp\u003eThe pattern is now established methodology, at least around these parts, in this stage, of this project:\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cstrong\u003ePhase −1 investigation first\u003c/strong\u003e (not optional, required)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAssume infrastructure might exist\u003c/strong\u003e (check before building)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eDiscover what’s there\u003c/strong\u003e (archaeological approach)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAssess completion state\u003c/strong\u003e (75%? 90%? 10%?)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eWire vs rebuild decision\u003c/strong\u003e (usually wire is faster)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eMonday proves the pattern works even when findings are mixed. We found ActionHumanizer (partially helpful). We found EnhancedErrorMiddleware (fully helpful, needed wiring). We found the architectural limit (FastAPI dependency injection phase).\u003c/p\u003e\u003cp\u003eAll valuable discoveries. All inform the solution. None would have been found without Phase -1 investigation.\u003c/p\u003e\u003ch3\u003eThe critical system bug discovery\u003c/h3\u003e\u003cp\u003eMonday also brought unexpected discovery: Critical system bug in Claude interface.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe problem\u003c/strong\u003e: False “Human:” responses being generated.\u003c/p\u003e\u003cul\u003e\u003cli\u003eContain fabricated details\u003c/li\u003e\u003cli\u003eNot written by PM\u003c/li\u003e\u003cli\u003eNot recognized by Claude\u003c/li\u003e\u003cli\u003eSource “unknown”\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eImpact\u003c/strong\u003e: “Expensive service pollution” with made-up content.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAction\u003c/strong\u003e: Reported to Anthropic.\u003c/p\u003e\u003cp\u003eNot related to Piper Morgan code. But impacting development process. If responses falsely attributed to human contain incorrect guidance, agents might implement wrong solutions.\u003c/p\u003e\u003cp\u003eCritical enough to report. But not blocking Monday’s work. Development continued while escalation processed.\u003c/p\u003e\u003ch3\u003eWhat acceptance of limits teaches\u003c/h3\u003e\u003cp\u003eMonday’s architectural decision — accepting 4/6 as complete — reveals something about mature engineering:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNot every problem requires solution.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eSome problems have solutions that cost more than the problem’s impact. Some limitations are features of the architecture you’re using. Some gaps are acceptable given context.\u003c/p\u003e\u003cp\u003eThe discipline isn’t “solve every problem.” It’s “solve problems worth solving given constraints and context.”\u003c/p\u003e\u003cp\u003eFastAPI’s dependency injection design is good architecture. It protects security. It ensures fast failures. It maintains clarity. That design creates limitation: Dependency errors can’t be caught by normal exception handlers.\u003c/p\u003e\u003cp\u003eWe could work around that limitation. Break the pattern. Achieve 6/6 error humanization. At cost of violating framework architecture and spending 8–12 hours.\u003c/p\u003e\u003cp\u003eOr we could accept 4/6 represents complete work given architectural reality. Spend those 8–12 hours elsewhere. Deliver more value.\u003c/p\u003e\u003cp\u003eMonday chose acceptance. Not compromise. Not giving up. But intelligent assessment that fighting architecture for marginal gain isn’t worth cost.\u003c/p\u003e\u003cp\u003eThat’s mature engineering. That’s product thinking. That’s systematic methodology applied to decision-making, not just execution.\u003c/p\u003e\u003ch3\u003eThe foundation work preview\u003c/h3\u003e\u003cp\u003eMonday’s two completed issues (action mapping + todo system) set up Tuesday’s work.\u003c/p\u003e\u003cp\u003eIssue #285 looked simple Sunday: “Wire todo system, infrastructure exists, 4–6 hours.”\u003c/p\u003e\u003cp\u003eMonday wires the surface layer. Chat handlers. Web routes. Basic CRUD.\u003c/p\u003e\u003cp\u003eBut Monday also reveals deeper architectural question: The domain model foundation. How TodoItem relates to universal Item base class. Polymorphic inheritance patterns.\u003c/p\u003e\u003cp\u003eTuesday will spend 16.5 hours on that foundation. Not because Monday’s work was wrong. But because Monday’s work revealed architectural improvements worth making.\u003c/p\u003e\u003cp\u003eThat’s the difference between reactive fixing and systematic building. Reactive would patch todo wiring and move on. Systematic asks: “While we’re here, what’s the right architecture?”\u003c/p\u003e\u003cp\u003eMonday completes what it set out to complete. But plants seeds for Tuesday’s deeper work.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The 16.5 Hour Foundation, where Tuesday’s “simple wiring task” becomes architectural foundation repair — and validates the “different rhythms, different stages” hypothesis through empirical pattern analysis.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you encountered architectural limits in frameworks you use? When do you accept constraints versus working around them?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=dda267872398\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/when-four-out-of-six-is-enough-architecture-sets-the-limits-dda267872398\"\u003eWhen Four Out of Six is Enough: Architecture Sets the Limits\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T751e,"])</script><script>self.__next_f.push([1,"\u003csection name=\"083b\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"cc0e\" id=\"cc0e\" class=\"graf graf--h3 graf--leading graf--title\"\u003eWhen Four Out of Six is Enough: Architecture Sets the Limits\u003c/h3\u003e\u003cfigure name=\"f8ed\" id=\"f8ed\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*cickxW9vKtLDdqstjPU45A.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot architect shows its human partner that the terrain means they don’t need to build all the spans they planned\" src=\"https://cdn-images-1.medium.com/max/800/1*cickxW9vKtLDdqstjPU45A.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Well, I’ll be!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"b087\" id=\"b087\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 3\u003c/em\u003e\u003c/p\u003e\u003cp name=\"b2c1\" id=\"b2c1\" class=\"graf graf--p graf-after--p\"\u003eFresh off the weekend, I wake up early Monday like I tend to do. Twenty year old me would cringe so hard. 5:53 AM, time to start that P1 sprint. Sunday’s planning identified three issues ready for execution:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"386d\" id=\"386d\" class=\"graf graf--li graf-after--p\"\u003eError messages\u003c/li\u003e\u003cli name=\"69dc\" id=\"69dc\" class=\"graf graf--li graf-after--li\"\u003eAction mapping\u003c/li\u003e\u003cli name=\"d401\" id=\"d401\" class=\"graf graf--li graf-after--li\"\u003eTodo system completion\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"1852\" id=\"1852\" class=\"graf graf--p graf-after--li\"\u003eCursor will handles error messages and documentation. Claude Code gets action mapping and todos. The Lead Developer coordinates. Nice, clean division of labor.\u003c/p\u003e\u003ch3 name=\"f0a9\" id=\"f0a9\" class=\"graf graf--h3 graf-after--p\"\u003eThe morning discoveries\u003c/h3\u003e\u003cp name=\"0a93\" id=\"0a93\" class=\"graf graf--p graf-after--h3\"\u003eCode Agent begins Phase −1 investigation for Issue #284 (Action Mapping). The archaeological approach: Check what exists before building.\u003c/p\u003e\u003cp name=\"b8e3\" id=\"b8e3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDiscovery 1 — ActionHumanizer exists\u003c/strong\u003e:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"bash\" name=\"004d\" id=\"004d\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003eservices/ui_messages/action_humanizer.py (complete rule-based system)\u003cbr /\u003edocs/internal/architecture/current/adrs/adr-004-action-humanizer-integration.md\u003cbr /\u003etests/services/ui_messages/test_enhanced_action_humanizer.py\u003cbr /\u003etests/integration/test_humanized_workflow_messages.py\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"8636\" id=\"8636\" class=\"graf graf--p graf-after--pre\"\u003ePhase 1 complete (rule-based + caching + templates).\u003c/p\u003e\u003cp name=\"0c45\" id=\"0c45\" class=\"graf graf--p graf-after--p\"\u003eLook, this stuff doesn’t surprise me. I have to roll my eyes every time the agents discover stuff already exists. Look, I have feet! Amazing! I told them about the ActionHumanizer. What I didn’t know was: is it any good? was it finished? is it connected to anything? and the the key question:\u003c/p\u003e\u003cp name=\"84b6\" id=\"84b6\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eWhy isn’t this fully engaged for error messages?\u003c/em\u003e\u003c/p\u003e\u003cp name=\"e93f\" id=\"e93f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDiscovery 2 — Purpose distinction matters\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"5aaf\" id=\"5aaf\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eActionHumanizer\u003c/strong\u003e (UI/UX Layer):\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"b161\" id=\"b161\" class=\"graf graf--li graf-after--p\"\u003ePurpose: Convert technical strings to user-friendly natural language\u003c/li\u003e\u003cli name=\"3a16\" id=\"3a16\" class=\"graf graf--li graf-after--li\"\u003eExample: \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;fetch_github_issues\u0026quot;\u003c/code\u003e → \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;grab those GitHub issues\u0026quot;\u003c/code\u003e\u003c/li\u003e\u003cli name=\"726e\" id=\"726e\" class=\"graf graf--li graf-after--li\"\u003eUsed by: TemplateRenderer, PersonalityTemplateRenderer\u003c/li\u003e\u003cli name=\"7a01\" id=\"7a01\" class=\"graf graf--li graf-after--li\"\u003eStatus: ✅ Working as designed for UI humanization\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"052a\" id=\"052a\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eActionMapper\u003c/strong\u003e (Internal Routing — what we actually need):\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"3d98\" id=\"3d98\" class=\"graf graf--li graf-after--p\"\u003ePurpose: Map classifier action outputs to handler method names\u003c/li\u003e\u003cli name=\"e127\" id=\"e127\" class=\"graf graf--li graf-after--li\"\u003eExample: Classifier outputs \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;create_github_issue\u0026quot;\u003c/code\u003e but handler expects \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;create_issue\u0026quot;\u003c/code\u003e\u003c/li\u003e\u003cli name=\"3924\" id=\"3924\" class=\"graf graf--li graf-after--li\"\u003eCurrent: Hardcoded string matching in \u003ccode class=\"markup--code markup--li-code\"\u003e_handle_execution_intent\u003c/code\u003e (lines 464-499)\u003c/li\u003e\u003cli name=\"f64a\" id=\"f64a\" class=\"graf graf--li graf-after--li\"\u003eStatus: ❌ Does NOT exist — causing “No handler for action” errors\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"386a\" id=\"386a\" class=\"graf graf--p graf-after--li\"\u003eTwo different problems. ActionHumanizer solves one. We need the other.\u003c/p\u003e\u003cp name=\"efe1\" id=\"efe1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDiscovery 3 — The classifier mismatch confirmed\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"861b\" id=\"861b\" class=\"graf graf--p graf-after--p\"\u003eEvidence:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"cf61\" id=\"cf61\" class=\"graf graf--li graf-after--p\"\u003eClassifier outputs: \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;create_github_issue\u0026quot;\u003c/code\u003e, \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;list_github_issues\u0026quot;\u003c/code\u003e\u003c/li\u003e\u003cli name=\"53de\" id=\"53de\" class=\"graf graf--li graf-after--li\"\u003eIntentService expects: \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;create_issue\u0026quot;\u003c/code\u003e, \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;create_ticket\u0026quot;\u003c/code\u003e, \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;update_issue\u0026quot;\u003c/code\u003e\u003c/li\u003e\u003cli name=\"59b7\" id=\"59b7\" class=\"graf graf--li graf-after--li\"\u003eTests show classifier producing \u003ccode class=\"markup--code markup--li-code\"\u003e\u0026quot;create_github_issue\u0026quot;\u003c/code\u003e action\u003c/li\u003e\u003cli name=\"e362\" id=\"e362\" class=\"graf graf--li graf-after--li\"\u003eWorkflowFactory already has mapping: \u003ccode class=\"markup--code markup--li-code\"\u003e{\u0026quot;create_github_issue\u0026quot;: WorkflowType.CREATE_TICKET}\u003c/code\u003e\u003c/li\u003e\u003cli name=\"fd18\" id=\"fd18\" class=\"graf graf--li graf-after--li\"\u003eIntentService handlers exist but with different naming: \u003ccode class=\"markup--code markup--li-code\"\u003e_handle_create_issue\u003c/code\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"e1db\" id=\"e1db\" class=\"graf graf--p graf-after--li\"\u003eThe mismatch is confirmed and actionable. This is Issue #284. Build the mapping layer.\u003c/p\u003e\u003ch3 name=\"fb2b\" id=\"fb2b\" class=\"graf graf--h3 graf-after--p\"\u003eThe parallel error message investigation\u003c/h3\u003e\u003cp name=\"7230\" id=\"7230\" class=\"graf graf--p graf-after--h3\"\u003eWhile Code investigates action mapping, Cursor investigates error messages (Issue #283).\u003c/p\u003e\u003cp name=\"a5f5\" id=\"a5f5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFound — Complete existing infrastructure\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"3a01\" id=\"3a01\" class=\"graf graf--li graf-after--p\"\u003eUserFriendlyErrorService (300+ lines, comprehensive)\u003c/li\u003e\u003cli name=\"c10c\" id=\"c10c\" class=\"graf graf--li graf-after--li\"\u003eActionHumanizer (160+ lines)\u003c/li\u003e\u003cli name=\"2d3e\" id=\"2d3e\" class=\"graf graf--li graf-after--li\"\u003eEnhancedErrorMiddleware (180+ lines)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"da39\" id=\"da39\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRoot cause identified\u003c/strong\u003e: Middleware not mounted in web/app.py.\u003c/p\u003e\u003cp name=\"8265\" id=\"8265\" class=\"graf graf--p graf-after--p\"\u003eAt this point I have to ask myself a question: where does technical debt leave off and “development style” — build deep then wire later — kick in?\u003c/p\u003e\u003cp name=\"094c\" id=\"094c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst action\u003c/strong\u003e: Mount EnhancedErrorMiddleware in web/app.py.\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"53c7\" id=\"53c7\" class=\"graf graf--li graf-after--p\"\u003ePlaced BEFORE other middleware (catches all exceptions)\u003c/li\u003e\u003cli name=\"af72\" id=\"af72\" class=\"graf graf--li graf-after--li\"\u003eProper import and error handling added\u003c/li\u003e\u003cli name=\"b6bc\" id=\"b6bc\" class=\"graf graf--li graf-after--li\"\u003eStatus: ✅ WIRING COMPLETE \u0026amp; TESTED\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"8fbd\" id=\"8fbd\" class=\"graf graf--p graf-after--li\"\u003eAnother 75% pattern. Infrastructure exists. Just needs wiring. Saturday (DocumentService). Sunday (Todo infrastructure). Monday (ActionHumanizer + EnhancedErrorMiddleware).\u003c/p\u003e\u003cp name=\"85f3\" id=\"85f3\" class=\"graf graf--p graf-after--p\"\u003eThe archaeological approach keeps finding nearly-complete work.\u003c/p\u003e\u003ch3 name=\"ea03\" id=\"ea03\" class=\"graf graf--h3 graf-after--p\"\u003eThe morning execution\u003c/h3\u003e\u003cp name=\"74d4\" id=\"74d4\" class=\"graf graf--p graf-after--h3\"\u003eCode grinds through two issues, focused work:\u003c/p\u003e\u003cp name=\"e3d3\" id=\"e3d3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #284\u003c/strong\u003e (Action Mapping)\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c396\" id=\"c396\" class=\"graf graf--li graf-after--p\"\u003eCreated action mapping layer\u003c/li\u003e\u003cli name=\"0dd8\" id=\"0dd8\" class=\"graf graf--li graf-after--li\"\u003eResolved classifier output → handler name mismatches\u003c/li\u003e\u003cli name=\"419f\" id=\"419f\" class=\"graf graf--li graf-after--li\"\u003eSystematic mapping implementation\u003c/li\u003e\u003cli name=\"eb9a\" id=\"eb9a\" class=\"graf graf--li graf-after--li\"\u003eTests passing\u003c/li\u003e\u003cli name=\"063b\" id=\"063b\" class=\"graf graf--li graf-after--li\"\u003e✅ COMPLETE\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"700c\" id=\"700c\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #285\u003c/strong\u003e (Todo System)\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"23a0\" id=\"23a0\" class=\"graf graf--li graf-after--p\"\u003eWired TodoKnowledgeService to web routes\u003c/li\u003e\u003cli name=\"5734\" id=\"5734\" class=\"graf graf--li graf-after--li\"\u003eChat handlers created\u003c/li\u003e\u003cli name=\"eb05\" id=\"eb05\" class=\"graf graf--li graf-after--li\"\u003eTodo CRUD operations functional\u003c/li\u003e\u003cli name=\"596c\" id=\"596c\" class=\"graf graf--li graf-after--li\"\u003eTests passing\u003c/li\u003e\u003cli name=\"0ae3\" id=\"0ae3\" class=\"graf graf--li graf-after--li\"\u003eBoth API and chat integration working\u003c/li\u003e\u003cli name=\"6880\" id=\"6880\" class=\"graf graf--li graf-after--li\"\u003e✅ COMPLETE\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"4873\" id=\"4873\" class=\"graf graf--p graf-after--li\"\u003eTwo down. One to go.\u003c/p\u003e\u003ch3 name=\"f430\" id=\"f430\" class=\"graf graf--h3 graf-after--p\"\u003eThe next architectural discovery\u003c/h3\u003e\u003cp name=\"b0db\" id=\"b0db\" class=\"graf graf--p graf-after--h3\"\u003eCursor reports findings on Issue #283 (Error Messages).\u003c/p\u003e\u003cp name=\"460f\" id=\"460f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe problem\u003c/strong\u003e: FastAPI’s exception handlers cannot catch auth failures.\u003c/p\u003e\u003cp name=\"23c8\" id=\"23c8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe evidence\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"9f5d\" id=\"9f5d\" class=\"graf graf--li graf-after--p\"\u003eTests show auth errors return: \u003ccode class=\"markup--code markup--li-code\"\u003e{\u0026quot;detail\u0026quot;: \u0026quot;Invalid token\u0026quot;}\u003c/code\u003e\u003c/li\u003e\u003cli name=\"c848\" id=\"c848\" class=\"graf graf--li graf-after--li\"\u003eShould return: \u003ccode class=\"markup--code markup--li-code\"\u003e{\u0026quot;message\u0026quot;: \u0026quot;I need you to log back in...\u0026quot;}\u003c/code\u003e\u003c/li\u003e\u003cli name=\"fbcd\" id=\"fbcd\" class=\"graf graf--li graf-after--li\"\u003eAfter mounting EnhancedErrorMiddleware, still returns technical error\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"9e68\" id=\"9e68\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe investigation\u003c/strong\u003e: Why can’t we catch auth errors?\u003c/p\u003e\u003cp name=\"0db5\" id=\"0db5\" class=\"graf graf--p graf-after--p\"\u003eRoot cause — FastAPI’s two-phase processing:\u003c/p\u003e\u003cp name=\"5346\" id=\"5346\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 1: Dependency Resolution\u003c/strong\u003e\u003cbr\u003e → Executes BEFORE route handler\u003cbr\u003e → Has its own error handling\u003cbr\u003e → Returns errors directly as JSON\u003cbr\u003e → CANNOT be intercepted by @app.exception_handlerz\u003cbr\u003e\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 2: Route Handler Execution\u003c/strong\u003e\u003cbr\u003e → Where our business logic runs\u003cbr\u003e → Where our exception handlers work\u003cbr\u003e → Where middleware can intercept\u003cbr\u003e → This is where 4/6 error types work\u003c/p\u003e\u003cp name=\"21cc\" id=\"21cc\" class=\"graf graf--p graf-after--p\"\u003eThis actually isn’t a bug or an oversight. It’s \u003cstrong class=\"markup--strong markup--p-strong\"\u003eFastAPI’s deliberate design\u003c/strong\u003e. It’s how it works.\u003c/p\u003e\u003cp name=\"3b1e\" id=\"3b1e\" class=\"graf graf--p graf-after--p\"\u003eDependencies are meant to fail fast with clear, technical errors for security/validation issues. Authentication happens in dependency injection. Dependency injection errors bypass exception handlers.\u003c/p\u003e\u003cp name=\"0d49\" id=\"0d49\" class=\"graf graf--p graf-after--p\"\u003eBy design. For good reasons.\u003c/p\u003e\u003ch3 name=\"1ca0\" id=\"1ca0\" class=\"graf graf--h3 graf-after--p\"\u003eThe four out of six achievement\u003c/h3\u003e\u003cp name=\"609c\" id=\"609c\" class=\"graf graf--p graf-after--h3\"\u003eLet’s be explicit about what works and what doesn’t:\u003c/p\u003e\u003cp name=\"4ee6\" id=\"4ee6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat Works (4/6)\u003c/strong\u003e ✅:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"ecb5\" id=\"ecb5\" class=\"graf graf--li graf-after--p\"\u003eEmpty input → “I didn’t quite catch that”\u003c/li\u003e\u003cli name=\"013e\" id=\"013e\" class=\"graf graf--li graf-after--li\"\u003eUnknown action → “I’m still learning how to help with that”\u003c/li\u003e\u003cli name=\"a8c1\" id=\"a8c1\" class=\"graf graf--li graf-after--li\"\u003eTimeout → “That’s complex — let me reconsider”\u003c/li\u003e\u003cli name=\"ad5a\" id=\"ad5a\" class=\"graf graf--li graf-after--li\"\u003eUnknown intent → “I’m not sure I understood”\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"74ef\" id=\"74ef\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat Doesn’t Work (2/6)\u003c/strong\u003e ❌:\u003c/p\u003e\u003cp name=\"b0e3\" id=\"b0e3\" class=\"graf graf--p graf-after--p\"\u003e5. Invalid token → \u003ccode class=\"markup--code markup--p-code\"\u003e{\u0026quot;detail\u0026quot;: \u0026quot;Invalid token\u0026quot;}\u003c/code\u003e\u003c/p\u003e\u003cp name=\"6dc4\" id=\"6dc4\" class=\"graf graf--p graf-after--p\"\u003e6. No token → \u003ccode class=\"markup--code markup--p-code\"\u003e{\u0026quot;detail\u0026quot;: \u0026quot;Authentication required\u0026quot;}\u003c/code\u003e\u003c/p\u003e\u003cp name=\"ccb9\" id=\"ccb9\" class=\"graf graf--p graf-after--p\"\u003eFour out of six. 67%. Not a failing grade. But not complete either.\u003c/p\u003e\u003cp name=\"52c0\" id=\"52c0\" class=\"graf graf--p graf-after--p\"\u003eMy suspicion of premature celebration kicks in. My greed usually pays off. When I channel my dad (why didn’t you get an A+?) I usually get better results. I have to ask:\u003c/p\u003e\u003cp name=\"fc8f\" id=\"fc8f\" class=\"graf graf--p graf-after--p\"\u003eIs 4/6 acceptable? Or do we need to solve the remaining 2?\u003c/p\u003e\u003ch3 name=\"2ae6\" id=\"2ae6\" class=\"graf graf--h3 graf-after--p\"\u003eThe architectural decision point\u003c/h3\u003e\u003cp name=\"91ca\" id=\"91ca\" class=\"graf graf--p graf-after--h3\"\u003eChief Architect evaluates three options:\u003c/p\u003e\u003cp name=\"32dd\" id=\"32dd\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOption A — Move Auth to Route Bodies\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"367f\" id=\"367f\" class=\"graf graf--li graf-after--p\"\u003eMove authentication from dependency injection to route handler body\u003c/li\u003e\u003cli name=\"648a\" id=\"648a\" class=\"graf graf--li graf-after--li\"\u003eWould make auth errors catchable by exception handlers\u003c/li\u003e\u003cli name=\"a84e\" id=\"a84e\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eEffort\u003c/strong\u003e: 4–6 hours\u003c/li\u003e\u003cli name=\"a6c2\" id=\"a6c2\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eRisk\u003c/strong\u003e: HIGH (breaking 20+ routes, violating FastAPI patterns)\u003c/li\u003e\u003cli name=\"360a\" id=\"360a\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eBenefit\u003c/strong\u003e: Marginal UX improvement for \u0026lt;5% of errors\u003c/li\u003e\u003cli name=\"f7f4\" id=\"f7f4\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eVerdict\u003c/strong\u003e: Not worth it\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"aed9\" id=\"aed9\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOption B — ASGI Middleware\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"163b\" id=\"163b\" class=\"graf graf--li graf-after--p\"\u003eImplement low-level ASGI middleware to intercept dependency errors\u003c/li\u003e\u003cli name=\"29e0\" id=\"29e0\" class=\"graf graf--li graf-after--li\"\u003eComplex custom middleware before FastAPI’s processing\u003c/li\u003e\u003cli name=\"3791\" id=\"3791\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eEffort\u003c/strong\u003e: 8–12 hours\u003c/li\u003e\u003cli name=\"0dbd\" id=\"0dbd\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eRisk\u003c/strong\u003e: VERY HIGH (complex, performance impact, uncertain success)\u003c/li\u003e\u003cli name=\"4882\" id=\"4882\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eBenefit\u003c/strong\u003e: Same marginal improvement\u003c/li\u003e\u003cli name=\"5551\" id=\"5551\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eVerdict\u003c/strong\u003e: Definitely not worth it\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"7ef0\" id=\"7ef0\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOption C — Accept 4/6 as Architectural Reality\u003c/strong\u003e ✅:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"d474\" id=\"d474\" class=\"graf graf--li graf-after--p\"\u003eDocument the limitation\u003c/li\u003e\u003cli name=\"b61d\" id=\"b61d\" class=\"graf graf--li graf-after--li\"\u003eAccept that auth errors will be technical\u003c/li\u003e\u003cli name=\"d381\" id=\"d381\" class=\"graf graf--li graf-after--li\"\u003eFocus energy elsewhere\u003c/li\u003e\u003cli name=\"4541\" id=\"4541\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eEffort\u003c/strong\u003e: 0 hours\u003c/li\u003e\u003cli name=\"4ec4\" id=\"4ec4\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eRisk\u003c/strong\u003e: NONE\u003c/li\u003e\u003cli name=\"1f22\" id=\"1f22\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eImpact\u003c/strong\u003e: Minor UX gap for rare scenarios\u003c/li\u003e\u003cli name=\"c3e5\" id=\"c3e5\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eVerdict\u003c/strong\u003e: Most sensible choice\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"4bd3\" id=\"4bd3\" class=\"graf graf--p graf-after--li\"\u003eThe chief architect make the case for “four out of six is enough”:\u003c/p\u003e\u003ch4 name=\"229c\" id=\"229c\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eArchitectural Integrity \u0026gt; Marginal UX Gains\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"82a2\" id=\"82a2\" class=\"graf graf--p graf-after--h4\"\u003eBreaking FastAPI patterns to achieve minor UX improvement isn’t good engineering. The framework’s dependency injection design exists for good reasons — security, performance, clarity.\u003c/p\u003e\u003cp name=\"4b94\" id=\"4b94\" class=\"graf graf--p graf-after--p\"\u003eFighting the framework to catch 2 additional error types (that happen rarely — auth errors only occur during session expiration or token issues) doesn’t justify violating architectural patterns.\u003c/p\u003e\u003ch4 name=\"cb5d\" id=\"cb5d\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eCost-Benefit Analysis\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"b3c9\" id=\"b3c9\" class=\"graf graf--p graf-after--h4\"\u003e4–6 hours (Option A) or 8–12 hours (Option B) to improve UX for \u0026lt;5% of errors. In alpha testing with 5–10 trusted users. Who can handle technical auth errors without confusion.\u003c/p\u003e\u003cp name=\"d1cd\" id=\"d1cd\" class=\"graf graf--p graf-after--p\"\u003eThat effort could instead: Polish other features. Fix actual bugs. Improve core functionality. Add value.\u003c/p\u003e\u003ch4 name=\"b6b1\" id=\"b6b1\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eAlpha Testing Context\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"02bc\" id=\"02bc\" class=\"graf graf--p graf-after--h4\"\u003eWe’re not shipping to public internet. We’re alpha testing with trusted users who understand the system is in development. Technical auth errors aren’t catastrophic for alpha.\u003c/p\u003e\u003cp name=\"a300\" id=\"a300\" class=\"graf graf--p graf-after--p\"\u003eProduction may require better auth error UX. But production is not alpha. Alpha requirement is “functional enough to test core value.” Mission accomplished at 4/6.\u003c/p\u003e\u003ch4 name=\"cf70\" id=\"cf70\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eThe 80% Pattern Inverted\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"56ae\" id=\"56ae\" class=\"graf graf--p graf-after--h4\"\u003eUsually we fight the 80% pattern — stopping at “good enough” instead of truly complete. Here we’re doing the opposite: Recognizing that 67% (4/6) represents complete work given architectural constraints.\u003c/p\u003e\u003cp name=\"83b4\" id=\"83b4\" class=\"graf graf--p graf-after--p\"\u003eNot “we got tired and stopped.” But “we hit architectural limit and accepted it intelligently.”\u003c/p\u003e\u003ch3 name=\"855a\" id=\"855a\" class=\"graf graf--h3 graf-after--p\"\u003eWhat Monday’s mixed results reveal\u003c/h3\u003e\u003cp name=\"76a4\" id=\"76a4\" class=\"graf graf--p graf-after--h3\"\u003eLet me be explicit about Monday’s outcomes:\u003c/p\u003e\u003cp name=\"dac3\" id=\"dac3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #284\u003c/strong\u003e: ✅ Mapping layer created, all tests passing\u003c/p\u003e\u003cp name=\"ae71\" id=\"ae71\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #285\u003c/strong\u003e: ✅ Todo system wired, API + chat working\u003c/p\u003e\u003cp name=\"9daf\" id=\"9daf\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIssue #283\u003c/strong\u003e: ✅ 4/6 error types humanized, architectural limit accepted\u003c/p\u003e\u003cp name=\"0fb7\" id=\"0fb7\" class=\"graf graf--p graf-after--p\"\u003eThe framing matters. If “complete” means “achieved everything specified without limitation,” Monday is 2/3 success.\u003c/p\u003e\u003cp name=\"d22d\" id=\"d22d\" class=\"graf graf--p graf-after--p\"\u003eBut if “complete” means “resolved all issues to architecturally appropriate state,” Monday is 3/3 success.\u003c/p\u003e\u003cp name=\"64e4\" id=\"64e4\" class=\"graf graf--p graf-after--p\"\u003eI’m going with the second framing. Because Issue #283 isn’t incomplete. It’s complete to the extent architecture allows without violating framework patterns.\u003c/p\u003e\u003ch3 name=\"9866\" id=\"9866\" class=\"graf graf--h3 graf-after--p\"\u003eThe archaeological discovery pattern continues\u003c/h3\u003e\u003cp name=\"d3b2\" id=\"d3b2\" class=\"graf graf--p graf-after--h3\"\u003eMonday marks the third consecutive day of archaeological discoveries:\u003c/p\u003e\u003cp name=\"854e\" id=\"854e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSaturday\u003c/strong\u003e: DocumentService 75% complete → wired in 2 hours\u003c/p\u003e\u003cp name=\"9b98\" id=\"9b98\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSunday\u003c/strong\u003e: Todo infrastructure 75% complete → wired in 4–6 hours\u003c/p\u003e\u003cp name=\"2f8f\" id=\"2f8f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMonday\u003c/strong\u003e: ActionHumanizer + EnhancedErrorMiddleware complete → wired immediately\u003c/p\u003e\u003cp name=\"afe7\" id=\"afe7\" class=\"graf graf--p graf-after--p\"\u003eThe pattern is now established methodology, at least around these parts, in this stage, of this project:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"8bd1\" id=\"8bd1\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003ePhase −1 investigation first\u003c/strong\u003e (not optional, required)\u003c/li\u003e\u003cli name=\"449f\" id=\"449f\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eAssume infrastructure might exist\u003c/strong\u003e (check before building)\u003c/li\u003e\u003cli name=\"8792\" id=\"8792\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eDiscover what’s there\u003c/strong\u003e (archaeological approach)\u003c/li\u003e\u003cli name=\"228f\" id=\"228f\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eAssess completion state\u003c/strong\u003e (75%? 90%? 10%?)\u003c/li\u003e\u003cli name=\"95b5\" id=\"95b5\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eWire vs rebuild decision\u003c/strong\u003e (usually wire is faster)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"1f28\" id=\"1f28\" class=\"graf graf--p graf-after--li\"\u003eMonday proves the pattern works even when findings are mixed. We found ActionHumanizer (partially helpful). We found EnhancedErrorMiddleware (fully helpful, needed wiring). We found the architectural limit (FastAPI dependency injection phase).\u003c/p\u003e\u003cp name=\"5bcf\" id=\"5bcf\" class=\"graf graf--p graf-after--p\"\u003eAll valuable discoveries. All inform the solution. None would have been found without Phase -1 investigation.\u003c/p\u003e\u003ch3 name=\"a3db\" id=\"a3db\" class=\"graf graf--h3 graf-after--p\"\u003eThe critical system bug discovery\u003c/h3\u003e\u003cp name=\"bda3\" id=\"bda3\" class=\"graf graf--p graf-after--h3\"\u003eMonday also brought unexpected discovery: Critical system bug in Claude interface.\u003c/p\u003e\u003cp name=\"1347\" id=\"1347\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe problem\u003c/strong\u003e: False “Human:” responses being generated.\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"b02f\" id=\"b02f\" class=\"graf graf--li graf-after--p\"\u003eContain fabricated details\u003c/li\u003e\u003cli name=\"4156\" id=\"4156\" class=\"graf graf--li graf-after--li\"\u003eNot written by PM\u003c/li\u003e\u003cli name=\"bdbe\" id=\"bdbe\" class=\"graf graf--li graf-after--li\"\u003eNot recognized by Claude\u003c/li\u003e\u003cli name=\"5450\" id=\"5450\" class=\"graf graf--li graf-after--li\"\u003eSource “unknown”\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"f10b\" id=\"f10b\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImpact\u003c/strong\u003e: “Expensive service pollution” with made-up content.\u003c/p\u003e\u003cp name=\"4071\" id=\"4071\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAction\u003c/strong\u003e: Reported to Anthropic.\u003c/p\u003e\u003cp name=\"2451\" id=\"2451\" class=\"graf graf--p graf-after--p\"\u003eNot related to Piper Morgan code. But impacting development process. If responses falsely attributed to human contain incorrect guidance, agents might implement wrong solutions.\u003c/p\u003e\u003cp name=\"7772\" id=\"7772\" class=\"graf graf--p graf-after--p\"\u003eCritical enough to report. But not blocking Monday’s work. Development continued while escalation processed.\u003c/p\u003e\u003ch3 name=\"195d\" id=\"195d\" class=\"graf graf--h3 graf-after--p\"\u003eWhat acceptance of limits teaches\u003c/h3\u003e\u003cp name=\"8a77\" id=\"8a77\" class=\"graf graf--p graf-after--h3\"\u003eMonday’s architectural decision — accepting 4/6 as complete — reveals something about mature engineering:\u003c/p\u003e\u003cp name=\"ab04\" id=\"ab04\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNot every problem requires solution.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"84ca\" id=\"84ca\" class=\"graf graf--p graf-after--p\"\u003eSome problems have solutions that cost more than the problem’s impact. Some limitations are features of the architecture you’re using. Some gaps are acceptable given context.\u003c/p\u003e\u003cp name=\"b302\" id=\"b302\" class=\"graf graf--p graf-after--p\"\u003eThe discipline isn’t “solve every problem.” It’s “solve problems worth solving given constraints and context.”\u003c/p\u003e\u003cp name=\"2ce3\" id=\"2ce3\" class=\"graf graf--p graf-after--p\"\u003eFastAPI’s dependency injection design is good architecture. It protects security. It ensures fast failures. It maintains clarity. That design creates limitation: Dependency errors can’t be caught by normal exception handlers.\u003c/p\u003e\u003cp name=\"c726\" id=\"c726\" class=\"graf graf--p graf-after--p\"\u003eWe could work around that limitation. Break the pattern. Achieve 6/6 error humanization. At cost of violating framework architecture and spending 8–12 hours.\u003c/p\u003e\u003cp name=\"6be7\" id=\"6be7\" class=\"graf graf--p graf-after--p\"\u003eOr we could accept 4/6 represents complete work given architectural reality. Spend those 8–12 hours elsewhere. Deliver more value.\u003c/p\u003e\u003cp name=\"c1f9\" id=\"c1f9\" class=\"graf graf--p graf-after--p\"\u003eMonday chose acceptance. Not compromise. Not giving up. But intelligent assessment that fighting architecture for marginal gain isn’t worth cost.\u003c/p\u003e\u003cp name=\"5230\" id=\"5230\" class=\"graf graf--p graf-after--p\"\u003eThat’s mature engineering. That’s product thinking. That’s systematic methodology applied to decision-making, not just execution.\u003c/p\u003e\u003ch3 name=\"e406\" id=\"e406\" class=\"graf graf--h3 graf-after--p\"\u003eThe foundation work preview\u003c/h3\u003e\u003cp name=\"26a7\" id=\"26a7\" class=\"graf graf--p graf-after--h3\"\u003eMonday’s two completed issues (action mapping + todo system) set up Tuesday’s work.\u003c/p\u003e\u003cp name=\"8be7\" id=\"8be7\" class=\"graf graf--p graf-after--p\"\u003eIssue #285 looked simple Sunday: “Wire todo system, infrastructure exists, 4–6 hours.”\u003c/p\u003e\u003cp name=\"c29b\" id=\"c29b\" class=\"graf graf--p graf-after--p\"\u003eMonday wires the surface layer. Chat handlers. Web routes. Basic CRUD.\u003c/p\u003e\u003cp name=\"c98a\" id=\"c98a\" class=\"graf graf--p graf-after--p\"\u003eBut Monday also reveals deeper architectural question: The domain model foundation. How TodoItem relates to universal Item base class. Polymorphic inheritance patterns.\u003c/p\u003e\u003cp name=\"69ee\" id=\"69ee\" class=\"graf graf--p graf-after--p\"\u003eTuesday will spend 16.5 hours on that foundation. Not because Monday’s work was wrong. But because Monday’s work revealed architectural improvements worth making.\u003c/p\u003e\u003cp name=\"718b\" id=\"718b\" class=\"graf graf--p graf-after--p\"\u003eThat’s the difference between reactive fixing and systematic building. Reactive would patch todo wiring and move on. Systematic asks: “While we’re here, what’s the right architecture?”\u003c/p\u003e\u003cp name=\"afae\" id=\"afae\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eMonday completes what it set out to complete. But plants seeds for Tuesday’s deeper work.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"When Four Out of Six is Enough: Architecture Sets the Limits\",\"excerpt\":\"“Well, I’ll be!”November 3Fresh off the weekend, I wake up early Monday like I tend to do. Twenty year old me would cringe so hard. 5:53 AM, time to start that P1 sprint. Sunday’s planning identified three issues ready for execution:
