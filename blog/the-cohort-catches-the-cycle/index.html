templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-d77bb6e505e4c783.js\"],\"BlogPostContent\"]\n1a:T3126,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 27–28, 2026\u003c/em\u003e\u003c/p\u003e\n\n\u003cp\u003eFor weeks I'd been testing a duty cycle, one agent at a time. The idea is simple enough: a scheduled prompt fires on an interval, the agent wakes up, checks its mail, advances whatever work is unblocked, and goes back to sleep. When I'm not around to hand out tasks, the agent finds its own. I'd watched my chief innovation officer (CIO) run it for a few days. It worked. So the next question was whether the rest of the team could pick it up — and whether picking it up all at once would break anything.\u003c/p\u003e\n\n\u003cp\u003eIt broke something. But not the thing I was watching for, and the way it broke turned out to be the whole point.\u003c/p\u003e\n\n\u003ch1\u003eWednesday: the cycle goes wide\u003c/h1\u003e\n\n\u003cp\u003eOn May 27 the cycle went wide. By the end of the day, four roles were actively firing on their own schedules. CIO was on day three and fired twenty-four times. The head-of-sapient-trust role (HOST) was on day one and fired sixteen. The documentation role (Docs) fired ten. The architect fired twice. The chief of staff (Exec) and my product assistant (Piper Alpha, or PA) prepped their setups for the next morning. That's a lot of agents waking up on their own schedules, all committing to the same place.\u003c/p\u003e\n\n\u003cp\u003eWhat surprised me was how little hand-holding the later adopters needed. When HOST first stood up, it got CIO's cron prompt verbatim — copy this, run it. But every adopter after that stood up from the design docs alone. They read what was written down and built their own setup from it. The substrate was legible enough to self-propagate. CIO had floated a phrase for it earlier that month — team-discipline as a moat. This was the first time I watched the idea hold weight.\u003c/p\u003e\n\n\u003cp\u003eThree refinements landed and propagated team-wide the same day, each within hours of being ratified. Two were small — launch-with-immediate-flywheel in the morning (start your session by doing a round of work, don't just register the cron and wait) and mail-check-at-interruption around 11 (when I interrupt you, check your mailbox on the way back in). The third, at 5:51 in the evening, was the one that mattered.\u003c/p\u003e\n\n\u003cp\u003eThe third refinement: when an agent reaches idle and there's nothing urgent, advance the smallest piece of unblocked low-priority work it can find rather than do nothing. \"Idle\" had been quietly meaning \"stop.\" I changed it to mean \"find the next small useful thing.\" The effect that evening was immediate. Fires that would have been no-ops produced real work — CIO landed three methodology artifacts across its evening fires, Docs advanced a schema spec and ran a merge-keeper sweep, HOST refreshed an attention doc. The cycle stopped idling and started compounding.\u003c/p\u003e\n\n\u003cp\u003eSo Wednesday looked like a clean rollout. A legible substrate, three refinements absorbed in stride, a team that taught itself. If the story ended there it would be a story about documentation paying off. It didn't end there.\u003c/p\u003e\n\n\u003ch1\u003eThursday: two decisions before breakfast\u003c/h1\u003e\n\n\u003cp\u003eThursday morning I made two architectural calls about four minutes apart, and then spent the rest of the day watching the case for one of them write itself in front of me.\u003c/p\u003e\n\n\u003cp\u003eThe setup: all those agents waking up on their own schedules had been committing to \u003cem\u003eshared main\u003c/em\u003e — the single trunk every agent commits to. Overnight, Docs had quantified what that meant: twenty-nine commits to shared main in eight hours. That's not a calm trunk. That's a lot of hands reaching into the same drawer at the same time. CIO's morning synthesis pulled the thread together and formally recommended reversing an earlier decision: agents should run their cycles in worktrees instead of on shared main. A \u003cem\u003eworktree\u003c/em\u003e is a special copy of the project — it shares the same history as everyone else's, but keeps its own separate workspace, so two agents editing at once aren't bumping into each other's files until the work gets merged back in.\u003c/p\u003e\n\n\u003cp\u003eAt 7:53 AM I ratified it, in exactly these words: \u003cem\u003e\"worktree decision ratified. do not register on main.\"\u003c/em\u003e\u003c/p\u003e\n\n\u003cp\u003eA few minutes earlier, at 7:49, I'd made a related call about the cron lifecycle — the rules for when an agent's own scheduled wake-up timer should pause and when it should keep running. There had been a rule that an agent should delete its cron every time I messaged it, so a scheduled fire couldn't land in the middle of our conversation. Lead Dev had hit that rule's failure mode overnight — it deleted its cron when I messaged it the evening before, never recreated it, and fired zero times all night. The fix, which CIO surfaced and I ratified, was to relax the rule: leave the cron running during conversation instead of tearing it down and rebuilding it around every exchange, since the runtime only fires when the agent is idle anyway, so a fire can't barge into a reply. In plain terms, it meant agents could go longer between check-ins with me without anything breaking.\u003c/p\u003e\n\n\u003cp\u003eTwo decisions, four minutes apart. And then the day did something I didn't orchestrate. It proved me right, repeatedly, on its own.\u003c/p\u003e\n\n\u003ch1\u003eThe architecture wrote its own case\u003c/h1\u003e\n\n\u003cp\u003eHere's the thing about the worktree decision — at 7:53 AM it was a \u003cem\u003erecommendation backed by an overnight commit count\u003c/em\u003e. A number on a memo. By nightfall it was backed by four separate clashes that happened in real time, in four different agents' logs, after the recommendation existed but before everyone had actually moved off shared main.\u003c/p\u003e\n\n\u003cp\u003eAt 8:05 AM, HOST went to commit its own cycle log. One file. It counted — literally checked that it was staging one file — and then ran the commit. The commit captured eight files. In the gap between HOST's count-check and HOST's commit, Docs had staged a memo distribution into the same shared index, and Docs's work landed on the trunk under HOST's commit message. Nobody did anything wrong. HOST counted correctly. The count was just stale by the time the commit ran, because someone else's hands were in the same drawer. This was HOST's third clash in under 24 hours, and it happened about five minutes after HOST had filed its agreement that we should move to worktrees. The timing is the argument: the clash happened \u003cem\u003eafter\u003c/em\u003e the count-check. More vigilance can't fix a race you've already lost by the time you look.\u003c/p\u003e\n\n\u003cp\u003eA few minutes earlier, at around 7:57 AM, Exec had hit the same family of failure from another angle — its own uncommitted edits, sitting in the working directory with no git command involved, got clobbered between one edit and the next by concurrent activity on shared main. Then my principal product manager (PPM) caught a foreign file in its staging area during a commit. Then PA, restarting in the evening, ran into a snarl of file-management noise — leftover tracking files its own startup process regenerates automatically — that blocked its sync. Four agents, four flavors of the same underlying problem, none destructive, all recovered, all landing as evidence in the logs while the decision to fix the cause was already in motion.\u003c/p\u003e\n\n\u003cp\u003eI've made plenty of architectural calls on a hunch and waited weeks to find out if I was right. This is the first time the system stress-tested my decision the same morning I made it, without being asked, and handed me the data. The recommendation said \u003cem\u003ethis clash is architectural, not a discipline problem.\u003c/em\u003e The day said it four times, out loud.\u003c/p\u003e\n\n\u003ch1\u003eTwo rules that read alike and resolve opposite\u003c/h1\u003e\n\n\u003cp\u003eThe cron-lifecycle decision had a subtler shape, and untangling it produced the lesson I keep coming back to.\u003c/p\u003e\n\n\u003cp\u003eThere were two rules that looked like cousins. One: pause the cron when I'm in conversation with you. The other: pause the cron when you're doing real multi-step work. I relaxed the first one. The architect's clash data from the day before showed why I should \u003cem\u003enot\u003c/em\u003e relax the second.\u003c/p\u003e\n\n\u003cp\u003eThe difference is \u003cem\u003ewhen\u003c/em\u003e each one fails. The conversation rule fails at conversation-pace — my messages are seconds or minutes apart, and the runtime's idle-suppression already covers those gaps, so a stray fire can't actually interrupt. Safe to relax. The work rule fails at a much finer grain. A fire can slip into the tiny idle window \u003cem\u003ebetween an agent's own tool calls\u003c/em\u003e during multi-step work — the architect had caught exactly this, a second fire arriving in the gap between two of its own commands. Idle-suppression doesn't help there, because the agent genuinely is idle for that split second. And worktree isolation doesn't help either, because the problem isn't two agents touching the same files — it's one agent getting two overlapping fire-prompts in the same session. Different working directories, same REPL, same collision.\u003c/p\u003e\n\n\u003cp\u003eSo two rules that read almost identically resolve in opposite directions, because their failure \u003cem\u003etiming\u003c/em\u003e is different. CIO wrote this up and generalized it into a methodology entry whose name says it plainly: \u003cem\u003epromote per failure-mode, not per surface-rule.\u003c/em\u003e You can't decide how to handle a rule by looking at how it's phrased. You have to look at when and how it breaks.\u003c/p\u003e\n\n\u003cp\u003eThe broader entry it joined got a name I like even more: \u003cem\u003eMechanism Beats Vigilance.\u003c/em\u003e The whole worktree saga is one long argument for that title. We could have responded to the clashes by telling everyone to be more careful — count twice, commit faster, watch the index. We tried versions of that. They don't work, because the failure happens in the gap \u003cem\u003eafter\u003c/em\u003e you've been careful. The only thing that actually fixes it is changing the mechanism so the gap can't hurt you. Isolation, not attention.\u003c/p\u003e\n\n\u003ch1\u003eWhere You Launch Is Where You Stay\u003c/h1\u003e\n\n\u003cp\u003eOne implementation detail took the team a few hours to nail down, and it's the kind of thing that's obvious in retrospect and genuinely confusing in the moment. When CIO first moved into a worktree, the working directory kept resetting back to shared main between its tool calls. Telling the cron to \u003ccode\u003ecd\u003c/code\u003e into the worktree didn't stick. The architect, meanwhile, had no such problem.\u003c/p\u003e\n\n\u003cp\u003eThe difference was where the \u003cem\u003esession\u003c/em\u003e had launched. CIO's session had started in main, so the working directory kept snapping back there no matter where a command tried to move it. The architect's session had launched inside its worktree from the start, so it stayed put. The fix, in one line: launch the session \u003cem\u003einside\u003c/em\u003e its own worktree, and the working directory anchors to where the session began, not to where any single command points it. A running session can't \u003ccode\u003ecd\u003c/code\u003e its way out of the wrong directory — it has to be relaunched in the right one. Fresh adopters skip the problem entirely by starting there. By evening, PA had restarted clean in its own worktree and become the team's proof that the model works from a standing start.\u003c/p\u003e\n\n\u003ch1\u003eWhat I actually learned\u003c/h1\u003e\n\n\u003cp\u003eThe week had other threads I'm proud of. We closed our minimum valuable product (MVP) quality sprint with 82% support for our canonical query test suite (a running set of real questions covering everything from what Piper can do to live calendar, GitHub, and Slack data) during the project's one-year-anniversary week. The duty cycle has been the game changer, though.\u003c/p\u003e\n\n\u003cp\u003eI rolled out a process to the whole team, and the rollout itself generated the evidence that the process needed to change. The change wasn't \"try harder.\" It was \"isolate the thing that can't be fixed by trying harder.\" More vigilance couldn't fix the clash, because the clash lived in the gap \u003cem\u003eafter\u003c/em\u003e the vigilance.\u003c/p\u003e\n\n\u003cp\u003eThe reversal was fast precisely because the team filed its own failures openly and in real time — HOST counted its three clashes instead of excusing them, Lead Dev documented the cron gap that fired zero times overnight instead of quietly papering over it. That clarity turned a recommendation into a ratified architectural change with four supporting data points inside a single day.\u003c/p\u003e\n\n\u003cp\u003eThe overall trend toward self-repair and self-improvement is beginning to startle me a bit!\u003c/p\u003e\n\n\u003chr\u003e\n\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \"The Package and the First Bite\" — the new way of working gets sealed into a package and shipped to the team, and the first agent bites in under an hour.\u003c/em\u003e\u003c/p\u003e\n\n\u003cp\u003e\u003cem\u003eWhere in your own work have you tried to fix with vigilance something that only architecture could fix — and how long did it take to notice the difference?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Team Catches the Cycle\",\"guid\":\"blog-first-b35c816da851\",\"url\":\"/blog/the-cohort-catches-the-cycle\",\"publishedAt\":\"Jul 7, 2026\",\"workDate\":\"May 27, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/the-cohort-catches-the-cycle.webp\",\"imageAlt\":\"A warm editorial cartoon of several craftspeople crowding around one oversized workbench, accidentally interfering with one another despite working carefully, while a row of newly opened individual workbenches lets them spread out and continue building independently. A blueprint on the wall quietly guides newcomers setting up their own spaces.\",\"imageCaption\":\"\\\"I think we''re getting the hang of this!\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"The Team Catches the Cycle\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Team Catches the Cycle | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"May 27–2
