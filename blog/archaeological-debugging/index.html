null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T1818,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eDecember 22, 2025\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eIt was 8:06 AM on a Monday in December. I asked the Lead Developer to implement Query #2 in our list of canonical queries (dynamic capabilities, the ability for users to ask \"what can you do?\").\n\u003c/p\u003e\n\u003cp\u003eThe response came back in nine minutes: \"Implementation already exists.\"\n\u003c/p\u003e\n\u003cp\u003eNot \"I'll build it.\" Not \"here's the plan.\" The code was already there, written months ago, fully functional. We just didn't know it.\n\u003c/p\u003e\n\u003ch2\u003eA recurring pattern\u003c/h2\u003e\n\u003cp\u003eThus December 22nd became an archaeology day. We had set out to implement 20 canonical queries. What we found instead was that many were already built:\n\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\u003cstrong\u003eQuery #2\u003c/strong\u003e (dynamic capabilities): Complete implementation in Issue #493. Code worked. Tests were missing. Issue was still marked open.\u003c/li\u003e\u003c/ul\u003e\n\u003cul\u003e\u003cli\u003e\u003cstrong\u003eQuery #16\u003c/strong\u003e (GitHub issue creation): Fully functional. Never tracked.\u003c/li\u003e\u003c/ul\u003e\n\u003cul\u003e\u003cli\u003e\u003cstrong\u003eQuery #18\u003c/strong\u003e (list projects): Working perfectly. Completely forgotten.\u003c/li\u003e\u003c/ul\u003e\n\u003cul\u003e\u003cli\u003e\u003cstrong\u003eQueries #7, #8, #14\u003c/strong\u003e: Implementations existed but lacked documentation.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eBy the end of the day, we'd \"implemented\" 14 queries. But 4 of them were really \u003cem\u003ediscoveries\u003c/em\u003e—code that existed and worked but had fallen out of organizational memory.\n\u003c/p\u003e\n\u003cp\u003eThis is the \u003cstrong\u003e75% completion pattern\u003c/strong\u003e applied to knowledge, not code. The work was done. The tracking was abandoned.\n\u003c/p\u003e\n\u003ch2\u003eWhy this happens with AI agents\u003c/h2\u003e\n\u003cp\u003eThe pattern has a predictable cause: \u003cstrong\u003ebuilding is more interesting than closing.\u003c/strong\u003e\n\u003c/p\u003e\n\u003cp\u003eWhen you're deep in implementation, you're solving problems, making things work, feeling productive. When the code works, there's a dopamine hit. You move to the next challenge.\n\u003c/p\u003e\n\u003cp\u003eBut updating the issue tracker? Writing the tests that prove it works? Closing the loop in the documentation? That's administrative. That's boring. That's \"I'll do it later.\"\n\u003c/p\u003e\n\u003cp\u003eLater never comes. The code sits there, working perfectly, invisible to everyone including your future self.\n\u003c/p\u003e\n\u003cp\u003eSounds like people problems, right? Yes, they learned it from us.\n\u003c/p\u003e\n\u003ch2\u003eThe ongoing cost\u003c/h2\u003e\n\u003cp\u003eThat day, we had to spend time investigating how to implement features that already existed. We wrote gameplans for code that was already written. We deployed agents to build things that were already built.\n\u003c/p\u003e\n\u003cp\u003eThat's pure waste. But it's not even the worst cost.\n\u003c/p\u003e\n\u003cp\u003eThe worse cost is \u003cstrong\u003econfidence erosion\u003c/strong\u003e. When you don't know what you have, you can't trust your own system. Every new feature request triggers investigation instead of decision-making. \"Can we do X?\" becomes a research project instead of a yes/no answer.\n\u003c/p\u003e\n\u003cp\u003eAnd there's a third cost: \u003cstrong\u003earchitectural confusion\u003c/strong\u003e. If you don't know Query #2 is already implemented, you might implement it again—differently. Now you have two implementations of the same thing, probably with subtle inconsistencies. Future debugging becomes archaeology.\n\u003c/p\u003e\n\u003ch2\u003eOne fix we tried\u003c/h2\u003e\n\u003cp\u003eAfter December 22nd, we instituted a simple rule: \u003cstrong\u003eevery implementation gets a test, and every test gets an issue closure.\u003c/strong\u003e\n\u003c/p\u003e\n\u003cp\u003eNot \"every implementation gets documented.\" Documentation can lag. But tests are executable documentation. If there's a test that passes, there's evidence the feature exists. If there's an issue closure, there's a record it was completed.\n\u003c/p\u003e\n\u003cp\u003eThe audit process became:\n\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eBefore implementing anything, search for existing implementations\u003c/li\u003e\n\u003cli\u003eCheck both the codebase AND the issue tracker\u003c/li\u003e\n\u003cli\u003eIf code exists without tests, add tests first\u003c/li\u003e\n\u003cli\u003eIf code exists without issue closure, close the issue with evidence\u003c/li\u003e\n\u003cli\u003eOnly then move to new implementation\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThis sounds bureaucratic. It's actually faster. The investigation phase that day took 15 minutes per query. Implementation for queries that actually needed building took 30-60 minutes. Finding existing code saved 15-45 minutes per discovery.\n\u003c/p\u003e\n\u003ch2\u003eThe broader lesson\u003c/h2\u003e\n\u003cp\u003eSince that day we have implemented auditing more broadly into most of our processes. This isn't unique to AI-assisted development, but AI easily makes it worse. When you can build things quickly, you build more things. When you build more things, you forget more things.\n\u003c/p\u003e\n\u003cp\u003eThe solution isn't to slow down building. It's to \u003cstrong\u003emake closure as frictionless as creation\u003c/strong\u003e.\n\u003c/p\u003e\n\u003cp\u003eSome practices that help:\n\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTest as you go, not after.\u003c/strong\u003e Tests are searchable proof that something exists. Code without tests is code that will be forgotten.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eClose issues immediately.\u003c/strong\u003e Not \"when I have time.\" Not \"in the weekly cleanup.\" The moment the code works, close the issue with evidence.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSearch before you build.\u003c/strong\u003e Before writing a gameplan, grep the codebase. Before creating an issue, search existing issues. The five minutes of searching can save hours of duplicate work.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTreat \"already done\" as success.\u003c/strong\u003e When you discover existing code, that's a win—you just saved implementation time. Don't feel disappointed that you didn't get to build it. Feel relieved that past-you already did.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003eThis one's meta-pattern\u003c/h2\u003e\n\u003cp\u003eI'm noticing something about how projects evolve. We think of software development as linear: plan, build, ship. But real projects are archaeological sites. They have layers. Things get built and buried. Features exist in strata, some documented, some not.\n\u003c/p\u003e\n\u003cp\u003eYour job as a developer—or as someone coordinating AI developers—isn't just to build new things. It's to know what you have. To maintain an accurate map of the terrain. To remember.\n\u003c/p\u003e\n\u003cp\u003eThe alternative is to keep rediscovering your own work, forever.\n\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, we resume the building narrative on March 22 with \"The Closing Sprint.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhat sort of methods have you uncovered to prevent your AI agents from reinventing the wheel, and to make their archaeological investigations more efficient? I'm still learning!\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Archaeological Debugging: Finding What You've Already Built\",\"excerpt\":\"December 22, 2025 It was 8:06 AM on a Monday in December. I asked the Lead Developer to implement Query #2 in our list of canonical queries (dynamic capabilities, the ability for users to ask \\\"what can you do?\\\"). The response came back in nine minutes: \\\"Implementation already exists.\\\" Not \\\"I'll b...\",\"url\":\"/blog/archaeological-debugging\",\"slug\":\"archaeological-debugging\",\"publishedAt\":\"Apr 12, 2026\",\"publishedAtISO\":\"2026-04-12T00:00:00.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"blog-first-4847f414bb71\",\"featuredImage\":\"/assets/blog-images/ai-scarab.webp\",\"thumbnail\":\"/assets/blog-images/ai-scarab.webp\",\"category\":\"insight\",\"cluster\":\"2026-04-12\",\"workDate\":\"Dec 22, 2025\",\"workDateISO\":\"2025-12-22T00:00:00.000Z\",\"chatDate\":\"12/22/2025\",\"featured\":false},\"content\":{\"title\":\"Archaeological Debugging: Finding What You've Already Built\",\"subtitle\":\"\",\"content\":\"$1b\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1c:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Archaeological Debugging: Finding What You've Already Built | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"Archaeological Debugging: Finding What You've Already Built\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:image\",\"content\":\"https://pipermorgan.ai/assets/blog-images/ai-scarab.webp\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"12\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"14\",{\"name\":\"twitter:title\",\"content\":\"Archaeological Debugging: Finding What You've Already Built\"}],[\"$\",\"meta\",\"15\",{\"name\":\"twitter:image\",\"content\":\"https://pipermorgan.ai/assets/blog-images/ai-scarab.webp\"}],[\"$\",\"link\",\"
