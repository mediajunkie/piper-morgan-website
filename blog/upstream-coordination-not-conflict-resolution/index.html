\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T21a2,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"Two agents — a human and a robot — stand upstream at a fork in a river, each calmly choosing a different channel marked as claimed, while the water flows smoothly apart with no collisions downstream.\" src=\"https://cdn-images-1.medium.com/max/1024/1*nHZbKFADfo_89yMnz5PgNA.png\" /\u003e\u003cfigcaption\u003e“I’ll take this one!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 29\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTwo agents claimed different prompts from the coordination queue and worked in parallel. No conflicts. No merge issues. No stepping on each other’s work. When they finished, both deliverables integrated cleanly.\u003c/p\u003e\u003cp\u003eThis seemed like a success story about the coordination system. It was, but not the way I first thought.\u003c/p\u003e\u003cp\u003eThe system didn’t resolve conflicts between the agents. It prevented conflicts from occurring. These sound similar but they’re fundamentally different problems with different solutions.\u003c/p\u003e\u003ch3\u003eThe distinction\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eUpstream coordination\u003c/strong\u003e prevents two agents from working on the same thing. It happens before work begins. Claim a task, others see it’s claimed, they work on something else.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eConflict resolution\u003c/strong\u003e merges work when two agents have produced incompatible outputs. It happens after work is done. Compare the outputs, identify conflicts, decide which to keep.\u003c/p\u003e\u003cp\u003eMost coordination systems conflate these. Version control does both — branches prevent some conflicts, merge resolution handles others. Meeting scheduling does both — calendars prevent double-booking, rescheduling handles overlaps.\u003c/p\u003e\u003cp\u003eBut they’re different problems requiring different mechanisms. Upstream coordination is about visibility and claiming. Conflict resolution is about comparison and decision-making.\u003c/p\u003e\u003ch3\u003eWhat the queue actually provides\u003c/h3\u003e\u003cp\u003eOur coordination queue is purely upstream. An agent claims a prompt. The manifest updates. Other agents see it’s claimed. They choose something else.\u003c/p\u003e\u003cp\u003eNo comparison of outputs. No merge logic. No decision about whose work takes precedence. If two agents somehow claimed the same prompt and produced different deliverables, the system has no mechanism to resolve that.\u003c/p\u003e\u003cp\u003eThis seems like a limitation. It’s actually a feature.\u003c/p\u003e\u003cp\u003eConflict resolution for AI agent outputs is genuinely hard. How do you compare two different architectural proposals? Two different code implementations? Two different analyses of the same problem? There’s no diff tool for conceptual work.\u003c/p\u003e\u003cp\u003eBy solving only upstream coordination, the queue stays simple. Claiming and visibility. No complicated merge logic that might fail in edge cases. The simpler system is more reliable precisely because it attempts less.\u003c/p\u003e\u003ch3\u003eWhy upstream is usually enough\u003c/h3\u003e\u003cp\u003eThe dirty secret: most coordination problems are upstream problems disguised as conflict problems.\u003c/p\u003e\u003cp\u003eTwo agents don’t conflict because they work on the same thing and produce incompatible results. They conflict because nobody told them not to work on the same thing. The conflict happens downstream but the failure was upstream.\u003c/p\u003e\u003cp\u003eIf you catch it upstream — clear claiming, visible work allocation, explicit coordination — the downstream conflict never materializes. You don’t need merge logic if you never have incompatible outputs.\u003c/p\u003e\u003cp\u003eThis is why the parallel execution worked. Both agents could see what was claimed. Neither chose something already in progress. The coordination was complete before the work began.\u003c/p\u003e\u003ch3\u003eWhat this doesn’t solve\u003c/h3\u003e\u003cp\u003eThe queue doesn’t solve:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDependency conflicts.\u003c/strong\u003e Agent A’s work assumes X, Agent B’s work assumes not-X. Both complete their prompts successfully, but the outputs contradict each other. Upstream coordination can’t detect conceptual dependencies — it only knows about explicit task claims.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eScope creep.\u003c/strong\u003e Agent A claims Prompt 1, then while working discovers that Prompt 2 is related. Does work on both. Agent B claims Prompt 2 not knowing A has already touched it. Upstream coordination only knows what was claimed, not what was touched.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuality conflicts.\u003c/strong\u003e Both agents produce valid work, but one is better than the other. Upstream coordination doesn’t compare quality — it just prevents duplication.\u003c/p\u003e\u003cp\u003eThese are real limitations. They require either human judgment (review the outputs, choose between them) or more sophisticated coordination (dependency tracking, scope detection, quality assessment). The queue provides none of that.\u003c/p\u003e\u003cp\u003eBut knowing what it doesn’t solve is valuable. You don’t expect the queue to handle conceptual dependencies. You add that capability elsewhere — or accept that it’s a human responsibility.\u003c/p\u003e\u003ch3\u003eThe PM insight\u003c/h3\u003e\u003cp\u003eWhen testing the coordination queue, I noted: “File reservation solves upstream coordination, not conflict resolution.”\u003c/p\u003e\u003cp\u003eThis framing helped me stop expecting things the queue wouldn’t provide. It coordinates work allocation. It doesn’t coordinate work content. Agents won’t duplicate effort, but they might produce incompatible results.\u003c/p\u003e\u003cp\u003eThat’s okay. It’s the responsibility allocation I wanted. The queue handles who works on what. I handle whether the outputs cohere. Division of labor matches division of capability.\u003c/p\u003e\u003cp\u003eHuman judgment for content coherence. Mechanical coordination for task allocation. Each system does what it’s good at.\u003c/p\u003e\u003ch3\u003eBuilding the right thing\u003c/h3\u003e\u003cp\u003eIf I’d built conflict resolution into the queue, it would be:\u003c/p\u003e\u003cul\u003e\u003cli\u003eMore complex (comparison logic, decision trees, escalation paths)\u003c/li\u003e\u003cli\u003eMore fragile (edge cases in merge logic are infinite)\u003c/li\u003e\u003cli\u003eMore presumptuous (assuming the system knows which output is better)\u003c/li\u003e\u003cli\u003eSlower to build and harder to maintain\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eInstead I built only upstream coordination:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSimple (claim and visibility)\u003c/li\u003e\u003cli\u003eRobust (binary state: claimed or available)\u003c/li\u003e\u003cli\u003eModest (doesn’t pretend to judge quality)\u003c/li\u003e\u003cli\u003eQuick to build and easy to maintain\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe parallel agents validated this design. They didn’t need conflict resolution because upstream coordination prevented conflicts. The sophisticated mechanism I might have built would have been unused — and would have introduced bugs for problems that never arose.\u003c/p\u003e\u003cp\u003e\u003cem\u003eHalf the battle in these complex systems is realizing what not to build!\u003c/em\u003e\u003c/p\u003e\u003ch3\u003eImplications for multi-agent systems\u003c/h3\u003e\u003cp\u003eMulti-agent coordination is an emerging problem. Lots of people building systems where multiple AI agents collaborate. Most of the conversation focuses on sophisticated mechanisms: consensus protocols, negotiation frameworks, conflict resolution engines.\u003c/p\u003e\u003cp\u003eMaybe we’re overengineering. Maybe most multi-agent coordination is upstream — make task allocation visible, let agents claim before working, prevent conflicts rather than resolve them.\u003c/p\u003e\u003cp\u003eThe hard problems remain hard. Conceptual dependencies. Quality assessment. Coherence checking. But those might be human problems wearing technical disguises. No mechanism resolves whether two architectural proposals are compatible — that requires judgment about architecture.\u003c/p\u003e\u003cp\u003eUpstream coordination is mechanical. Conflict resolution is often judgmental. Build the mechanical part. Accept responsibility for the rest.\u003c/p\u003e\u003cp\u003eThe queue taught me this distinction. Not by handling conflicts elegantly, but by not having any conflicts to handle. Prevention, it turns out, is not just better than cure — it’s a different kind of solution entirely.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, we resume the narrative with The Cathedral in Winter, from February 10 to 13, a period when my flu got bad but the project kept building itself.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHow do you distinguish upstream coordination from conflict resolution in your systems? When has prevention substituted for cure? What coordination problems seem technical but are actually judgmental?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=5b7215d535cf\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/upstream-coordination-not-conflict-resolution-5b7215d535cf\"\u003eUpstream Coordination, Not Conflict Resolution\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T2d27,"])</script><script>self.__next_f.push([1,"\u003csection name=\"9ea9\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"6354\" id=\"6354\" class=\"graf graf--h3 graf--leading graf--title\"\u003eUpstream Coordination, Not Conflict Resolution\u003c/h3\u003e\u003cfigure name=\"3b04\" id=\"3b04\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*nHZbKFADfo_89yMnz5PgNA.png\" data-width=\"1536\" data-height=\"1024\" alt=\"Two agents — a human and a robot — stand upstream at a fork in a river, each calmly choosing a different c outputs. It happens after work is done. Compare the outputs, identify conflicts, decide which to keep.\u003c/p\u003e\u003cp name=\"1938\" id=\"1938\" class=\"graf graf--p graf-after--p\"\u003eMost coordination systems conflate these. Version control does both — branches prevent some conflicts, merge resolution handles others. Meeting scheduling does both — calendars prevent double-booking, rescheduling handles overlaps.\u003c/p\u003e\u003cp name=\"7ce6\" id=\"7ce6\" class=\"graf graf--p graf-after--p\"\u003eBut they’re different problems requiring different mechanisms. Upstream coordination is about visibility and claiming. Conflict resolution is about comparison and decision-making.\u003c/p\u003e\u003ch3 name=\"7c11\" id=\"7c11\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the queue actually provides\u003c/h3\u003e\u003cp name=\"1fec\" id=\"1fec\" class=\"graf graf--p graf-after--h3\"\u003eOur coordination queue is purely upstream. An agent claims a prompt. The manifest updates. Other agents see it’s claimed. They choose something else.\u003c/p\u003e\u003cp name=\"7f47\" id=\"7f47\" class=\"graf graf--p graf-after--p\"\u003eNo comparison of outputs. No merge logic. No decision about whose work takes precedence. If two agents somehow claimed the same prompt and produced different deliverables, the system has no mechanism to resolve that.\u003c/p\u003e\u003cp name=\"c643\" id=\"c643\" class=\"graf graf--p graf-after--p\"\u003eThis seems like a limitation. It’s actually a feature.\u003c/p\u003e\u003cp name=\"26ca\" id=\"26ca\" class=\"graf graf--p graf-after--p\"\u003eConflict resolution for AI agent outputs is genuinely hard. How do you compare two different architectural proposals? Two different code implementations? Two different analyses of the same problem? There’s no diff tool for conceptual work.\u003c/p\u003e\u003cp name=\"b661\" id=\"b661\" class=\"graf graf--p graf-after--p\"\u003eBy solving only upstream coordination, the queue stays simple. Claiming and visibility. No complicated merge logic that might fail in edge cases. The simpler system is more reliable precisely because it attempts less.\u003c/p\u003e\u003ch3 name=\"bc0d\" id=\"bc0d\" class=\"graf graf--h3 graf-after--p\"\u003eWhy upstream is usually enough\u003c/h3\u003e\u003cp name=\"7478\" id=\"7478\" class=\"graf graf--p graf-after--h3\"\u003eThe dirty secret: most coordination problems are upstream problems disguised as conflict problems.\u003c/p\u003e\u003cp name=\"8e72\" id=\"8e72\" class=\"graf graf--p graf-after--p\"\u003eTwo agents don’t conflict because they work on the same thing and produce incompatible results. They conflict because nobody told them not to work on the same thing. The conflict happens downstream but the failure was upstream.\u003c/p\u003e\u003cp name=\"6883\" id=\"6883\" class=\"graf graf--p graf-after--p\"\u003eIf you catch it upstream — clear claiming, visible work allocation, explicit coordination — the downstream conflict never materializes. You don’t need merge logic if you never have incompatible outputs.\u003c/p\u003e\u003cp name=\"f88b\" id=\"f88b\" class=\"graf graf--p graf-after--p\"\u003eThis is why the parallel execution worked. Both agents could see what was claimed. Neither chose something already in progress. The coordination was complete before the work began.\u003c/p\u003e\u003ch3 name=\"9190\" id=\"9190\" class=\"graf graf--h3 graf-after--p\"\u003eWhat this doesn’t solve\u003c/h3\u003e\u003cp name=\"a756\" id=\"a756\" class=\"graf graf--p graf-after--h3\"\u003eThe queue doesn’t solve:\u003c/p\u003e\u003cp name=\"9a6b\" id=\"9a6b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDependency conflicts.\u003c/strong\u003e Agent A’s work assumes X, Agent B’s work assumes not-X. Both complete their prompts successfully, but the outputs contradict each other. Upstream coordination can’t detect conceptual dependencies — it only knows about explicit task claims.\u003c/p\u003e\u003cp name=\"a95c\" id=\"a95c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eScope creep.\u003c/strong\u003e Agent A claims Prompt 1, then while working discovers that Prompt 2 is related. Does work on both. Agent B claims Prompt 2 not knowing A has already touched it. Upstream coordination only knows what was claimed, not what was touched.\u003c/p\u003e\u003cp name=\"ad80\" id=\"ad80\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuality conflicts.\u003c/strong\u003e Both agents produce valid work, but one is better than the other. Upstream coordination doesn’t compare quality — it just prevents duplication.\u003c/p\u003e\u003cp name=\"de84\" id=\"de84\" class=\"graf graf--p graf-after--p\"\u003eThese are real limitations. They require either human judgment (review the outputs, choose between them) or more sophisticated coordination (dependency tracking, scope detection, quality assessment). The queue provides none of that.\u003c/p\u003e\u003cp name=\"7008\" id=\"7008\" class=\"graf graf--p graf-after--p\"\u003eBut knowing what it doesn’t solve is valuable. You don’t expect the queue to handle conceptual dependencies. You add that capability elsewhere — or accept that it’s a human responsibility.\u003c/p\u003e\u003ch3 name=\"f1fa\" id=\"f1fa\" class=\"graf graf--h3 graf-after--p\"\u003eThe PM insight\u003c/h3\u003e\u003cp name=\"c113\" id=\"c113\" class=\"graf graf--p graf-after--h3\"\u003eWhen testing the coordination queue, I noted: “File reservation solves upstream coordination, not conflict resolution.”\u003c/p\u003e\u003cp name=\"ea19\" id=\"ea19\" class=\"graf graf--p graf-after--p\"\u003eThis framing helped me stop expecting things the queue wouldn’t provide. It coordinates work allocation. It doesn’t coordinate work content. Agents won’t duplicate effort, but they might produce incompatible results.\u003c/p\u003e\u003cp name=\"aacd\" id=\"aacd\" class=\"graf graf--p graf-after--p\"\u003eThat’s okay. It’s the responsibility allocation I wanted. The queue handles who works on what. I handle whether the outputs cohere. Division of labor matches division of capability.\u003c/p\u003e\u003cp name=\"edbc\" id=\"edbc\" class=\"graf graf--p graf-after--p\"\u003eHuman judgment for content coherence. Mechanical coordination for task allocation. Each system does what it’s good at.\u003c/p\u003e\u003ch3 name=\"681b\" id=\"681b\" class=\"graf graf--h3 graf-after--p\"\u003eBuilding the right thing\u003c/h3\u003e\u003cp name=\"0b0d\" id=\"0b0d\" class=\"graf graf--p graf-after--h3\"\u003eIf I’d built conflict resolution into the queue, it would be:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"eb7b\" id=\"eb7b\" class=\"graf graf--li graf-after--p\"\u003eMore complex (comparison logic, decision trees, escalation paths)\u003c/li\u003e\u003cli name=\"d8c8\" id=\"d8c8\" class=\"graf graf--li graf-after--li\"\u003eMore fragile (edge cases in merge logic are infinite)\u003c/li\u003e\u003cli name=\"536c\" id=\"536c\" class=\"graf graf--li graf-after--li\"\u003eMore presumptuous (assuming the system knows which output is better)\u003c/li\u003e\u003cli name=\"eeef\" id=\"eeef\" class=\"graf graf--li graf-after--li\"\u003eSlower to build and harder to maintain\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"f4c5\" id=\"f4c5\" class=\"graf graf--p graf-after--li\"\u003eInstead I built only upstream coordination:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"b091\" id=\"b091\" class=\"graf graf--li graf-after--p\"\u003eSimple (claim and visibility)\u003c/li\u003e\u003cli name=\"b9b9\" id=\"b9b9\" class=\"graf graf--li graf-after--li\"\u003eRobust (binary state: claimed or available)\u003c/li\u003e\u003cli name=\"3f4d\" id=\"3f4d\" class=\"graf graf--li graf-after--li\"\u003eModest (doesn’t pretend to judge quality)\u003c/li\u003e\u003cli name=\"832d\" id=\"832d\" class=\"graf graf--li graf-after--li\"\u003eQuick to build and easy to maintain\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"5db8\" id=\"5db8\" class=\"graf graf--p graf-after--li\"\u003eThe parallel agents validated this design. They didn’t need conflict resolution because upstream coordination prevented conflicts. The sophisticated mechanism I might have built would have been unused — and would have introduced bugs for problems that never arose.\u003c/p\u003e\u003cp name=\"8fd0\" id=\"8fd0\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eHalf the battle in these complex systems is realizing what not to build!\u003c/em\u003e\u003c/p\u003e\u003ch3 name=\"eee1\" id=\"eee1\" class=\"graf graf--h3 graf-after--p\"\u003eImplications for multi-agent systems\u003c/h3\u003e\u003cp name=\"bc8e\" id=\"bc8e\" class=\"graf graf--p graf-after--h3\"\u003eMulti-agent coordination is an emerging problem. Lots of people building systems where multiple AI agents collaborate. Most of the conversation focuses on sophisticated mechanisms: consensus protocols, negotiation frameworks, conflict resolution engines.\u003c/p\u003e\u003cp name=\"4135\" id=\"4135\" class=\"graf graf--p graf-after--p\"\u003eMaybe we’re overengineering. Maybe most multi-agent coordination is upstream — make task allocation visible, let agents claim before working, prevent conflicts rather than resolve them.\u003c/p\u003e\u003cp name=\"2886\" id=\"2886\" class=\"graf graf--p graf-after--p\"\u003eThe hard problems remain hard. Conceptual dependencies. Quality assessment. Coherence checking. But those might be human problems wearing technical disguises. No mechanism resolves whether two architectural proposals are compatible — that requires judgment about architecture.\u003c/p\u003e\u003cp name=\"5d14\" id=\"5d14\" class=\"graf graf--p graf-after--p\"\u003eUpstream coordination is mechanical. Conflict resolution is often judgmental. Build the mechanical part. Accept responsibility for the rest.\u003c/p\u003e\u003cp name=\"6bbb\" id=\"6bbb\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe queue taught me this distinction. Not by handling conflicts elegantly, but by not having any conflicts to handle. Prevention, it turns out, is not just better than cure — it’s a different kind of solution entirely.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Upstream Coordination, Not Conflict Resolution\",\"excerpt\":\"“I’ll take this one!”November 29Two agents claimed different prompts from the coordination queue and worked in parallel. No conflicts. No merge issues. No stepping on each other’s work. When they finished, both deliverables integrated cleanly.This seemed like a success story about the coordinatio...\",\"url\":\"/blog/upstream-coordination-not-conflict-resolution\",\"publishedAt\":\"Feb 22, 2026\",\"publishedAtISO\":\"2026-02-22T14:55:25.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/5b7215d535cf\",\"featuredImage\":\"/assets/blog-images/5b7215d535cf-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/upstream-coordination-not-conflict-resolution-5b7215d535cf?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"upstream-coordination-not-conflict-resolution\",\"workDate\":\"Feb 22, 2026\",\"workDateISO\":\"2026-02-22T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-02-22\",\"featured\":false},\"content\":{\"title\":\"Upstream Coordination, Not Conflict Resolution\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Upstream Coordination, Not Conflict Resolution | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"Upstream Coordination, Not Conflict Resolution\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"Upstream Coordination, Not Conflict Resolution\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favi
