\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T4745,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A house with a tight security system on the front door has an unlocked sliding door to its patio\" src=\"https://cdn-images-1.medium.com/max/1024/1*zFmmdA-AgdozvzzI47F6gw.png\" /\u003e\u003cfigcaption\u003e“Not sure about this security regime”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 31\u003c/em\u003e\u003c/p\u003e\u003cp\u003eFriday morning. The day after first alpha user onboarding. Thursday was the birthday breakthrough — three hours of reactive bug-chasing followed by systematic E2E testing first, leading to successful onboarding at 11:26 AM.\u003c/p\u003e\u003cp\u003eBut success revealed a problem.\u003c/p\u003e\u003cp\u003eI can log in as alpha-one. The system works. Tests pass. I can use Piper Morgan. Everything functions. From inside the system, it looks complete.\u003c/p\u003e\u003cp\u003eThen I look at the code. Really look at it. Not from user perspective but from architecture perspective.\u003c/p\u003e\u003cp\u003eAnd I see something disturbing: \u003cstrong\u003eWe have two parallel realities.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReality 1 — The Database/Service Layer\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSophisticated multi-user support (85% complete)\u003c/li\u003e\u003cli\u003eJWT implementation designed (ADR-012: Protocol Ready JWT Authentication)\u003c/li\u003e\u003cli\u003eUser sessions stored in database\u003c/li\u003e\u003cli\u003ePer-user API key storage working\u003c/li\u003e\u003cli\u003ealpha_users table separate from users table\u003c/li\u003e\u003cli\u003ePassword hash fields exist\u003c/li\u003e\u003cli\u003eSession management infrastructure built\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eReality 2 — The Web Layer\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSingle-user assumption throughout\u003c/li\u003e\u003cli\u003eZero authentication whatsoever\u003c/li\u003e\u003cli\u003eAny user can access any session\u003c/li\u003e\u003cli\u003eNo session isolation\u003c/li\u003e\u003cli\u003eNo JWT validation\u003c/li\u003e\u003cli\u003eNo auth middleware\u003c/li\u003e\u003cli\u003eNo login flow\u003c/li\u003e\u003c/ul\u003e\u003ch3\u003eThe morning architecture review\u003c/h3\u003e\u003cp\u003eI onboard a new Chief Architect (Opus 4.1). The previous chat ran successfully for six weeks (September 20 — October 31)! Completed the Great Refactor (GREAT sequence), Sprint A8, alpha onboarding breakthrough.\u003c/p\u003e\u003cp\u003eStrong track record. But new agent means fresh eyes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFirst task\u003c/strong\u003e: Think through multi-user architecture properly before coding.\u003c/p\u003e\u003cp\u003eThe approach: Don’t start fixing bugs reactively. Understand the system holistically. What exists? What’s missing? Where are the gaps?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDiscovery 1 — The PIPER.md Problem\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003ePIPER.md was originally designed as generic capabilities file. System capabilities, default personality traits, available integrations. Generic information any user would see.\u003c/p\u003e\u003cp\u003eBut looking at actual PIPER.md content:\u003c/p\u003e\u003cul\u003e\u003cli\u003eMy Q4 goals (personal)\u003c/li\u003e\u003cli\u003eVA projects (work context)\u003c/li\u003e\u003cli\u003eDRAGONS team info (company-specific)\u003c/li\u003e\u003cli\u003ePersonal preferences and context\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWait. This file is supposed to be generic but contains my personal data. And it’s in the repository. Shared across all users. Any alpha tester would see my Q4 goals. (Good thing it’s already Q1 now in the federal government!)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSecurity issue\u003c/strong\u003e. Privacy issue. Architecture issue.\u003c/p\u003e\u003cp\u003eThe file that should contain “here’s what Piper Morgan can do” instead contains “here’s Christian’s personal context.” Not by design. By accident. Because I was the only user and the distinction didn’t matter until it did.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDiscovery 2 — The Authentication That Exists\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003eReading through documentation and code:\u003c/p\u003e\u003cul\u003e\u003cli\u003e✅ User model exists\u003c/li\u003e\u003cli\u003e✅ ADR-012 (Protocol Ready JWT Authentication) documented\u003c/li\u003e\u003cli\u003e✅ alpha_users table with password_hash field\u003c/li\u003e\u003cli\u003e✅ Per-user API keys stored\u003c/li\u003e\u003cli\u003e✅ User sessions in database\u003c/li\u003e\u003cli\u003e✅ Multi-user infrastructure at database layer\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eInfrastructure is \u003cstrong\u003e85% complete\u003c/strong\u003e. Not abandoned work. Not poorly designed. But sophisticated, thoughtful, comprehensive infrastructure.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDiscovery 3 — The Authentication That Doesn’t Exist\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003eLooking at web layer:\u003c/p\u003e\u003cul\u003e\u003cli\u003e❌ No password hashing service\u003c/li\u003e\u003cli\u003e❌ No email system for account management\u003c/li\u003e\u003cli\u003e❌ No login endpoints\u003c/li\u003e\u003cli\u003e❌ No auth middleware\u003c/li\u003e\u003cli\u003e❌ No JWT token generation\u003c/li\u003e\u003cli\u003e❌ No JWT validation\u003c/li\u003e\u003cli\u003e❌ No session management in web tier\u003c/li\u003e\u003cli\u003e❌ No user context passed to services\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWeb tier assumes single user. Every request processes as if from same user. No authentication layer whatsoever.\u003c/p\u003e\u003cp\u003eThe realization: We built an entire multi-user database architecture. Then built a single-user web interface on top of it. The foundation is solid. The house has no doors.\u003c/p\u003e\u003ch3\u003eThe two parallel realities\u003c/h3\u003e\u003cp\u003eFriday’s architectural analysis names the pattern clearly: \u003cstrong\u003eTwo Parallel Realities\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003eIt’s not that one layer is behind. It’s that the layers exist in different architectural universes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReality 1 thinks\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eMultiple users exist\u003c/li\u003e\u003cli\u003eEach user has own data\u003c/li\u003e\u003cli\u003eAuthentication required\u003c/li\u003e\u003cli\u003eSessions are isolated\u003c/li\u003e\u003cli\u003eUser context flows through system\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eReality 2 thinks\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eOne user (me)\u003c/li\u003e\u003cli\u003eAll data is mine\u003c/li\u003e\u003cli\u003eAuthentication unnecessary\u003c/li\u003e\u003cli\u003eSessions don’t matter\u003c/li\u003e\u003cli\u003eUser context is implicit (it’s always me)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eBoth realities function internally. Database layer works beautifully for multi-user. Web layer works fine for single user.\u003c/p\u003e\u003cp\u003eBut they can’t coexist. When second alpha user tries to onboard, which reality wins?\u003c/p\u003e\u003cp\u003eThe dangerous part: Tests pass. System functions. First alpha user (me) had successful onboarding Thursday. From inside Reality 2, everything looks complete.\u003c/p\u003e\u003cp\u003eOnly when you examine both realities do you see: We’re 85% complete and 0% secure simultaneously.\u003c/p\u003e\u003ch3\u003eThe PIPER.md architecture problem\u003c/h3\u003e\u003cp\u003eLet’s look deeper at the configuration issue because it reveals how single-user assumptions corrupt architecture.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHow it should work\u003c/strong\u003e:\u003c/p\u003e\u003cpre\u003ePIPER.md → Generic system capabilities\u003cbr\u003e  - Default personality traits\u003cbr\u003e  - Available integrations  \u003cbr\u003e  - System-wide settings\u003cbr\u003e\u003cbr\u003econfig/users/{user_id}/\u003cbr\u003e  - preferences.yaml → User-specific preferences\u003cbr\u003e  - context.md → User\u0026#39;s projects and context\u003cbr\u003e  - api_keys.enc → Encrypted keys\u003c/pre\u003e\u003cp\u003e\u003cstrong\u003eHow it actually works\u003c/strong\u003e:\u003c/p\u003e\u003cpre\u003ePIPER.md → Christian\u0026#39;s personal everything\u003cbr\u003e  - System capabilities (correct)\u003cbr\u003e  - Christian\u0026#39;s Q4 goals (wrong)\u003cbr\u003e  - Christian\u0026#39;s VA projects (wrong)\u003cbr\u003e  - Christian\u0026#39;s team context (wrong)\u003c/pre\u003e\u003cpre\u003ePIPER.user.md → Barely used overrides\u003c/pre\u003e\u003cp\u003eThe file meant for “everyone” contains “me.” Because when I was the only user, the distinction was meaningless. Generic capabilities and personal context merged because they both applied to the same person — me.\u003c/p\u003e\u003cp\u003eThis is sloppy work but it’s also just the natural evolution when you’re building for yourself. Single-user development doesn’t force the separation between “system” and “user.” Everything is both.\u003c/p\u003e\u003cp\u003eMulti-user development forces the separation. But we built multi-user database layer while still developing in single-user web layer. The cognitive mismatch persisted.\u003c/p\u003e\u003ch3\u003eThe 75% pattern strikes again\u003c/h3\u003e\u003cp\u003eFriday’s analysis reveals a pattern we keep encountering: \u003cstrong\u003eThe 75% Pattern\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003eWork that’s 75% complete. Not abandoned. Not poorly done. But incomplete. Wired up enough to function in development. Not finished enough for production.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe Todo System\u003c/strong\u003e: Database exists. Repositories work. Services implemented. Tests written. But web routes missing. Chat handlers not wired. 75% complete.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe Learning System\u003c/strong\u003e: Architecture exists. Logging infrastructure built. Pattern storage designed. But not recording new patterns. Using existing knowledge graph but not learning from conversations. 75% complete.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe CONVERSATION Handler\u003c/strong\u003e: Works perfectly. Processes chat messages. Generates responses. But architecturally misplaced. Not in canonical handlers section where it belongs. 75% complete.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe Web Auth Layer\u003c/strong\u003e: Designed (ADR-012). Database fields exist. Infrastructure ready. But implementation missing. 75% complete.\u003c/p\u003e\u003cp\u003eThe pattern isn’t failure. It’s how development actually happens. You build infrastructure. You wire up enough to test it. You confirm it works. Then you move to next priority before completing vertical integration.\u003c/p\u003e\u003cp\u003eLater you return to finish. Except sometimes you don’t return. Or you forget what needs finishing. Or you think it’s more complete than it is.\u003c/p\u003e\u003cp\u003e75% looks very different from outside (incomplete) than from inside (works in my tests).\u003c/p\u003e\u003ch3\u003eThe systematic triage\u003c/h3\u003e\u003cp\u003eFriday afternoon (3:07 PM): Chief Architect session shifts from analysis to action.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContext for new Chief Architect\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003ePrevious architect ran 6 weeks successfully (Sept 20 — Oct 31)\u003c/li\u003e\u003cli\u003eCompleted GREAT (Great Refactor), CRAFT (Craft Pride), Alpha Sprint A8\u003c/li\u003e\u003cli\u003eFirst alpha user successfully onboarded Thursday\u003c/li\u003e\u003cli\u003eAlpha testing revealed ~10 bugs needing systematic attention\u003c/li\u003e\u003cli\u003eMultiple issues discovered through actual usage\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eThe process\u003c/strong\u003e: Transform chaotic bug discovery into systematic sprint plan.\u003c/p\u003e\u003cp\u003eNot reactive fixing. But comprehensive triage. What’s blocking? What’s critical? What’s polish? What’s process improvement?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e10 Issues Identified and Categorized\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eP0 Blockers\u003c/strong\u003e (Must fix before external alpha):\u003c/p\u003e\u003col\u003e\u003cli\u003eCORE-ALPHA-DATA-LEAK — Remove personal data from PIPER.md (2–3 hours)\u003c/li\u003e\u003cli\u003eCORE-ALPHA-WEB-AUTH — Implement authentication layer (8–12 hours)\u003c/li\u003e\u003cli\u003eCORE-ALPHA-FILE-UPLOAD — Fix file upload functionality (2–4 hours)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cstrong\u003eP1 Critical\u003c/strong\u003e (Core features broken):\u003c/p\u003e\u003cp\u003e4. CORE-ALPHA-ERROR-MESSAGES — Conversational error fallbacks (4 hours)\u003c/p\u003e\u003cp\u003e5. CORE-ALPHA-ACTION-MAPPING — Fix classifier/handler coordination (2 hours)\u003c/p\u003e\u003cp\u003e6. CORE-ALPHA-TODO-INCOMPLETE — Complete todo system (8–12 hours)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eP2 Important\u003c/strong\u003e (Significant UX impact):\u003c/p\u003e\u003cp\u003e7. CORE-ALPHA-CONVERSATION-PLACEMENT — Fix architectural placement (2 hours)\u003c/p\u003e\u003cp\u003e8. CORE-ALPHA-TEMPORAL-BUGS — Fix response rendering (2 hours)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eP3 Investigation\u003c/strong\u003e (Non-blocking):\u003c/p\u003e\u003cp\u003e9. CORE-ALPHA-LEARNING-INVESTIGATION — Document learning system behavior (3 hours)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProcess Improvement\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003e10. CORE-ALPHA-MIGRATION-TESTING — Migration testing protocol (2 hours)\u003c/p\u003e\u003ch3\u003eThe phased implementation plan\u003c/h3\u003e\u003cp\u003eThe triage isn’t just listing issues. It’s creating execution strategy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 1 blocks external testing\u003c/strong\u003e. Can’t invite alpha testers while data leak exists or web auth missing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 2 blocks core value delivery\u003c/strong\u003e. Can’t claim “PM assistant works” when error messages break conversational experience or todos don’t function.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 3 blocks quality perception\u003c/strong\u003e. Can ship alpha with these issues. But perception suffers when temporal rendering is broken or architecture is inconsistent.\u003c/p\u003e\u003cp\u003eThe phases create natural checkpoints. Fix Phase 1 → Test → Evaluate → Proceed to Phase 2.\u003c/p\u003e\u003ch3\u003eWhat Friday revealed about methodology\u003c/h3\u003e\u003cp\u003eFriday wasn’t about fixing bugs. It was about understanding the system holistically before touching code.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe approach\u003c/strong\u003e:\u003c/p\u003e\u003col\u003e\u003cli\u003eArchitectural analysis first (don’t just start fixing)\u003c/li\u003e\u003cli\u003eIdentify all issues systematically (don’t chase reactively)\u003c/li\u003e\u003cli\u003eCategorize by impact (what blocks vs what polishes)\u003c/li\u003e\u003cli\u003eCreate phased execution plan (clear gates and sequencing)\u003c/li\u003e\u003cli\u003eEstimate effort realistically (35–45 hours total)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cstrong\u003eWhy this matters\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003eThursday’s approach was reactive. Find bug → Fix bug → Find next bug → Fix that → Repeat. Works for small scope. But we found 10+ issues. Reactive chasing creates thrashing. Fix issue #3, break issue #7, fix #7, discover #11.\u003c/p\u003e\u003cp\u003eFriday’s approach was systematic. Understand all issues → Categorize impact → Sequence fixes → Execute phases → Test comprehensively.\u003c/p\u003e\u003cp\u003eThe two parallel realities problem exemplifies why systematic analysis matters. You can’t fix “web auth missing” without understanding it exists within larger context of sophisticated database layer. You can’t fix data leak without understanding configuration architecture. You can’t prioritize issues without understanding dependencies.\u003c/p\u003e\u003cp\u003eFriday gave Saturday a gift: Clear problem definition. Comprehensive issue list. Execution roadmap. Effort estimates.\u003c/p\u003e\u003cp\u003eSaturday could execute efficiently because Friday analyzed thoroughly.\u003c/p\u003e\u003ch3\u003eThe “accidentally enterprise-ready” pattern\u003c/h3\u003e\u003cp\u003eFriday’s analysis revealed something fascinating about the system’s evolution.\u003c/p\u003e\u003cp\u003eThe database/service layer is 85% complete with multi-user infrastructure \u003cstrong\u003ethat was never explicitly intended for multi-user support initially\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003eWe built:\u003c/p\u003e\u003cul\u003e\u003cli\u003eUser model (because we needed to track who’s using the system)\u003c/li\u003e\u003cli\u003eAPI keys per user (because different users need different API credentials)\u003c/li\u003e\u003cli\u003eSession storage (because we needed to maintain conversation context)\u003c/li\u003e\u003cli\u003eJWT architecture (because we knew auth would be needed eventually)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEach piece made sense individually for single-user development. But together they created enterprise-ready multi-user infrastructure.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePattern name\u003c/strong\u003e: “Accidentally Enterprise-Ready”\u003c/p\u003e\u003cp\u003eInfrastructure created for one purpose turns out suitable for another. Not by design. By accumulation of good individual decisions that happen to compose well.\u003c/p\u003e\u003cp\u003eThis is different from the 75% pattern. The 75% pattern is intentional work left incomplete. “Accidentally enterprise-ready” is unintentional work that’s more complete than you realized.\u003c/p\u003e\u003cp\u003eThe database layer wasn’t built for multi-user. It was built for single user with good practices (separation of concerns, proper data modeling, clean architecture). Those good practices happened to create multi-user foundation.\u003c/p\u003e\u003cp\u003eThen we needed multi-user for alpha testing. And discovered: The foundation exists. We just need to build the house.\u003c/p\u003e\u003ch3\u003eWhat Friday means for Saturday\u003c/h3\u003e\u003cp\u003eFriday ends not with code shipped but with understanding achieved.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e10 issues documented\u003c/strong\u003e. \u003cstrong\u003e3 phases planned\u003c/strong\u003e. \u003cstrong\u003e35–45 hours estimated\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003eThe path forward is clear. Not “reactively chase bugs until they’re gone.” But “systematically execute phases until criteria met.”\u003c/p\u003e\u003cp\u003ePhase 1 blocks external alpha. Must complete: Data leak + Web auth + File upload.\u003c/p\u003e\u003cp\u003eThat becomes Saturday’s mission. Not “fix everything.” But “complete Phase 1.”\u003c/p\u003e\u003cp\u003eThe gift Friday gives Saturday: Permission to focus. Don’t worry about todo system (Phase 2). Don’t worry about temporal rendering bugs (Phase 3). Don’t even worry about error messages (Phase 2).\u003c/p\u003e\u003cp\u003eFocus on three things: Data leak. Web auth. File upload.\u003c/p\u003e\u003cp\u003eEverything else can wait.\u003c/p\u003e\u003cp\u003eThat focus enables Saturday’s achievement. New Lead Developer arrives. Looks at roadmap. Sees three P0 blockers. Deploys three agents in parallel. Fixes all three (plus bonus fourth issue) in 12.75 hours.\u003c/p\u003e\u003cp\u003eFriday’s systematic analysis enabled Saturday’s systematic execution.\u003c/p\u003e\u003ch3\u003eThe lesson of two realities\u003c/h3\u003e\u003cp\u003eThe two parallel realities problem teaches something important about system architecture: \u003cstrong\u003eLayers can evolve independently in ways that create gaps.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDatabase layer advances (multi-user infrastructure). Web layer doesn’t advance at same rate (single-user assumption). Gap appears. Not because anyone made mistakes. Because different parts of system evolved at different paces for valid reasons.\u003c/p\u003e\u003cp\u003eYou can’t see the gap from inside either reality. Database layer thinks “we’re ready for multi-user.” Web layer thinks “we work fine.” Only when you examine both simultaneously do you see: They’re incompatible.\u003c/p\u003e\u003cp\u003eThis is why Friday’s architectural analysis matters. Not finding bugs. But understanding how the pieces relate. Where the gaps exist. What needs bridging.\u003c/p\u003e\u003cp\u003eThursday proved the system works (first alpha user successful). Friday proved the system is incomplete (second alpha user would break). Both truths valid simultaneously.\u003c/p\u003e\u003cp\u003eThe resolution isn’t choosing which reality is “correct.” It’s building the bridge between them. Web layer needs to catch up to database layer’s sophistication. Not rebuild database layer to match web layer’s simplicity.\u003c/p\u003e\u003cp\u003eThat’s Saturday’s work. Build the 15% bridge between 85% complete database infrastructure and 0% complete web authentication.\u003c/p\u003e\u003cp\u003eFriday provided the map. Saturday built the bridge.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Day We Fixed Everything, where Saturday’s 12.75-hour sprint resolves all Phase 1 blockers and ships 9,292 lines of code with 100% test pass rate — proving systematic methodology enables what normally takes a week.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced the “two parallel realities” problem in your systems? How do you detect gaps between layers that each function correctly in isolation?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=392ba601a8e2\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-two-realities-problem-when-your-database-is-sophisticated-and-your-web-tier-has-zero-auth-392ba601a8e2\"\u003eThe Two Realities Problem: When Your Database is Sophisticated and Your Web Tier Has Zero Auth\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T7752,"])</script><script>self.__next_f.push([1,"\u003csection name=\"c739\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"afc7\" id=\"afc7\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Two Realities Problem: When Your Database is Sophisticated and Your Web Tier Has Zero Auth\u003c/h3\u003e\u003cfigure name=\"a5d4\" id=\"a5d4\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*zFmmdA-AgdozvzzI47F6gw.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A house with a tight security system on the front door has an unlocked sliding door to its patio\" src=\"https://cdn-images-1.medium.com/max/800/1*zFmmdA-AgdozvzzI47F6gw.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Not sure about this security regime”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"416b\" id=\"416b\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 31\u003c/em\u003e\u003c/p\u003e\u003cp name=\"ec30\" id=\"ec30\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eF\u003c/span\u003eriday morning. The day after first alpha user onboarding. Thursday was the birthday breakthrough — three hours of reactive bug-chasing followed by systematic E2E testing first, leading to successful onboarding at 11:26 AM.\u003c/p\u003e\u003cp name=\"2665\" id=\"2665\" class=\"graf graf--p graf-after--p\"\u003eBut success revealed a problem.\u003c/p\u003e\u003cp name=\"35f7\" id=\"35f7\" class=\"graf graf--p graf-after--p\"\u003eI can log in as alpha-one. The system works. Tests pass. I can use Piper Morgan. Everything functions. From inside the system, it looks complete.\u003c/p\u003e\u003cp name=\"1953\" id=\"1953\" class=\"graf graf--p graf-after--p\"\u003eThen I look at the code. Really look at it. Not from user perspective but from architecture perspective.\u003c/p\u003e\u003cp name=\"6f99\" id=\"6f99\" class=\"graf graf--p graf-after--p\"\u003eAnd I see something disturbing: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eWe have two parallel realities.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"7da9\" id=\"7da9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReality 1 — The Database/Service Layer\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"8cff\" id=\"8cff\" class=\"graf graf--li graf-after--p\"\u003eSophisticated multi-user support (85% complete)\u003c/li\u003e\u003cli name=\"b509\" id=\"b509\" class=\"graf graf--li graf-after--li\"\u003eJWT implementation designed (ADR-012: Protocol Ready JWT Authentication)\u003c/li\u003e\u003cli name=\"25d9\" id=\"25d9\" class=\"graf graf--li graf-after--li\"\u003eUser sessions stored in database\u003c/li\u003e\u003cli name=\"f9b8\" id=\"f9b8\" class=\"graf graf--li graf-after--li\"\u003ePer-user API key storage working\u003c/li\u003e\u003cli name=\"113d\" id=\"113d\" class=\"graf graf--li graf-after--li\"\u003e\u003ccode class=\"markup--code markup--li-code\"\u003ealpha_users\u003c/code\u003e table separate from \u003ccode class=\"markup--code markup--li-code\"\u003eusers\u003c/code\u003e table\u003c/li\u003e\u003cli name=\"33bb\" id=\"33bb\" class=\"graf graf--li graf-after--li\"\u003ePassword hash fields exist\u003c/li\u003e\u003cli name=\"d5de\" id=\"d5de\" class=\"graf graf--li graf-after--li\"\u003eSession management infrastructure built\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"a22c\" id=\"a22c\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReality 2 — The Web Layer\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"d790\" id=\"d790\" class=\"graf graf--li graf-after--p\"\u003eSingle-user assumption throughout\u003c/li\u003e\u003cli name=\"00e0\" id=\"00e0\" class=\"graf graf--li graf-after--li\"\u003eZero authentication whatsoever\u003c/li\u003e\u003cli name=\"7385\" id=\"7385\" class=\"graf graf--li graf-after--li\"\u003eAny user can access any session\u003c/li\u003e\u003cli name=\"f5e1\" id=\"f5e1\" class=\"graf graf--li graf-after--li\"\u003eNo session isolation\u003c/li\u003e\u003cli name=\"6a2e\" id=\"6a2e\" class=\"graf graf--li graf-after--li\"\u003eNo JWT validation\u003c/li\u003e\u003cli name=\"7134\" id=\"7134\" class=\"graf graf--li graf-after--li\"\u003eNo auth middleware\u003c/li\u003e\u003cli name=\"1903\" id=\"1903\" class=\"graf graf--li graf-after--li\"\u003eNo login flow\u003c/li\u003e\u003c/ul\u003e\u003ch3 name=\"1e09\" id=\"1e09\" class=\"graf graf--h3 graf-after--li\"\u003eThe morning architecture review\u003c/h3\u003e\u003cp name=\"2501\" id=\"2501\" class=\"graf graf--p graf-after--h3\"\u003eI onboard a new Chief Architect (Opus 4.1). The previous chat ran successfully for six weeks (September 20 — October 31)! Completed the Great Refactor (GREAT sequence), Sprint A8, alpha onboarding breakthrough.\u003c/p\u003e\u003cp name=\"17a1\" id=\"17a1\" class=\"graf graf--p graf-after--p\"\u003eStrong track record. But new agent means fresh eyes.\u003c/p\u003e\u003cp name=\"ea21\" id=\"ea21\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst task\u003c/strong\u003e: Think through multi-user architecture properly before coding.\u003c/p\u003e\u003cp name=\"b1ab\" id=\"b1ab\" class=\"graf graf--p graf-after--p\"\u003eThe approach: Don’t start fixing bugs reactively. Understand the system holistically. What exists? What’s missing? Where are the gaps?\u003c/p\u003e\u003cp name=\"e01d\" id=\"e01d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDiscovery 1 — The PIPER.md Problem\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"8c42\" id=\"8c42\" class=\"graf graf--p graf-after--p\"\u003ePIPER.md was originally designed as generic capabilities file. System capabilities, default personality traits, available integrations. Generic information any user would see.\u003c/p\u003e\u003cp name=\"fef9\" id=\"fef9\" class=\"graf graf--p graf-after--p\"\u003eBut looking at actual PIPER.md content:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"a35a\" id=\"a35a\" class=\"graf graf--li graf-after--p\"\u003eMy Q4 goals (personal)\u003c/li\u003e\u003cli name=\"7e8e\" id=\"7e8e\" class=\"graf graf--li graf-after--li\"\u003eVA projects (work context)\u003c/li\u003e\u003cli name=\"041b\" id=\"041b\" class=\"graf graf--li graf-after--li\"\u003eDRAGONS team info (company-specific)\u003c/li\u003e\u003cli name=\"f21f\" id=\"f21f\" class=\"graf graf--li graf-after--li\"\u003ePersonal preferences and context\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"1a30\" id=\"1a30\" class=\"graf graf--p graf-after--li\"\u003eWait. This file is supposed to be generic but contains my personal data. And it’s in the repository. Shared across all users. Any alpha tester would see my Q4 goals. (Good thing it’s already Q1 now in the federal government!)\u003c/p\u003e\u003cp name=\"b4f6\" id=\"b4f6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSecurity issue\u003c/strong\u003e. Privacy issue. Architecture issue.\u003c/p\u003e\u003cp name=\"601f\" id=\"601f\" class=\"graf graf--p graf-after--p\"\u003eThe file that should contain “here’s what Piper Morgan can do” instead contains “here’s Christian’s personal context.” Not by design. By accident. Because I was the only user and the distinction didn’t matter until it did.\u003c/p\u003e\u003cp name=\"02bb\" id=\"02bb\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDiscovery 2 — The Authentication That Exists\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"a984\" id=\"a984\" class=\"graf graf--p graf-after--p\"\u003eReading through documentation and code:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c9d9\" id=\"c9d9\" class=\"graf graf--li graf-after--p\"\u003e✅ User model exists\u003c/li\u003e\u003cli name=\"9139\" id=\"9139\" class=\"graf graf--li graf-after--li\"\u003e✅ ADR-012 (Protocol Ready JWT Authentication) documented\u003c/li\u003e\u003cli name=\"6285\" id=\"6285\" class=\"graf graf--li graf-after--li\"\u003e✅ \u003ccode class=\"markup--code markup--li-code\"\u003ealpha_users\u003c/code\u003e table with \u003ccode class=\"markup--code markup--li-code\"\u003epassword_hash\u003c/code\u003e field\u003c/li\u003e\u003cli name=\"4f05\" id=\"4f05\" class=\"graf graf--li graf-after--li\"\u003e✅ Per-user API keys stored\u003c/li\u003e\u003cli name=\"d0d3\" id=\"d0d3\" class=\"graf graf--li graf-after--li\"\u003e✅ User sessions in database\u003c/li\u003e\u003cli name=\"bb30\" id=\"bb30\" class=\"graf graf--li graf-after--li\"\u003e✅ Multi-user infrastructure at database layer\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"c218\" id=\"c218\" class=\"graf graf--p graf-after--li\"\u003eInfrastructure is \u003cstrong class=\"markup--strong markup--p-strong\"\u003e85% complete\u003c/strong\u003e. Not abandoned work. Not poorly designed. But sophisticated, thoughtful, comprehensive infrastructure.\u003c/p\u003e\u003cp name=\"72e4\" id=\"72e4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDiscovery 3 — The Authentication That Doesn’t Exist\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"df92\" id=\"df92\" class=\"graf graf--p graf-after--p\"\u003eLooking at web layer:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"8a56\" id=\"8a56\" class=\"graf graf--li graf-after--p\"\u003e❌ No password hashing service\u003c/li\u003e\u003cli name=\"f7ae\" id=\"f7ae\" class=\"graf graf--li graf-after--li\"\u003e❌ No email system for account management\u003c/li\u003e\u003cli name=\"c955\" id=\"c955\" class=\"graf graf--li graf-after--li\"\u003e❌ No login endpoints\u003c/li\u003e\u003cli name=\"e5e3\" id=\"e5e3\" class=\"graf graf--li graf-after--li\"\u003e❌ No auth middleware\u003c/li\u003e\u003cli name=\"b7ea\" id=\"b7ea\" class=\"graf graf--li graf-after--li\"\u003e❌ No JWT token generation\u003c/li\u003e\u003cli name=\"837e\" id=\"837e\" class=\"graf graf--li graf-after--li\"\u003e❌ No JWT validation\u003c/li\u003e\u003cli name=\"2edf\" id=\"2edf\" class=\"graf graf--li graf-after--li\"\u003e❌ No session management in web tier\u003c/li\u003e\u003cli name=\"c832\" id=\"c832\" class=\"graf graf--li graf-after--li\"\u003e❌ No user context passed to services\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"f54a\" id=\"f54a\" class=\"graf graf--p graf-after--li\"\u003eWeb tier assumes single user. Every request processes as if from same user. No authentication layer whatsoever.\u003c/p\u003e\u003cp name=\"80f0\" id=\"80f0\" class=\"graf graf--p graf-after--p\"\u003eThe realization: We built an entire multi-user database architecture. Then built a single-user web interface on top of it. The foundation is solid. The house has no doors.\u003c/p\u003e\u003ch3 name=\"fb85\" id=\"fb85\" class=\"graf graf--h3 graf-after--p\"\u003eThe two parallel realities\u003c/h3\u003e\u003cp name=\"eac4\" id=\"eac4\" class=\"graf graf--p graf-after--h3\"\u003eFriday’s architectural analysis names the pattern clearly: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eTwo Parallel Realities\u003c/strong\u003e.\u003c/p\u003e\u003cp name=\"0b60\" id=\"0b60\" class=\"graf graf--p graf-after--p\"\u003eIt’s not that one layer is behind. It’s that the layers exist in different architectural universes.\u003c/p\u003e\u003cp name=\"1408\" id=\"1408\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReality 1 thinks\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c0e3\" id=\"c0e3\" class=\"graf graf--li graf-after--p\"\u003eMultiple users exist\u003c/li\u003e\u003cli name=\"ba94\" id=\"ba94\" class=\"graf graf--li graf-after--li\"\u003eEach user has own data\u003c/li\u003e\u003cli name=\"15fe\" id=\"15fe\" class=\"graf graf--li graf-after--li\"\u003eAuthentication required\u003c/li\u003e\u003cli name=\"e9da\" id=\"e9da\" class=\"graf graf--li graf-after--li\"\u003eSessions are isolated\u003c/li\u003e\u003cli name=\"c949\" id=\"c949\" class=\"graf graf--li graf-after--li\"\u003eUser context flows through system\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"0cd3\" id=\"0cd3\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReality 2 thinks\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"9672\" id=\"9672\" class=\"graf graf--li graf-after--p\"\u003eOne user (me)\u003c/li\u003e\u003cli name=\"50c8\" id=\"50c8\" class=\"graf graf--li graf-after--li\"\u003eAll data is mine\u003c/li\u003e\u003cli name=\"65a1\" id=\"65a1\" class=\"graf graf--li graf-after--li\"\u003eAuthentication unnecessary\u003c/li\u003e\u003cli name=\"cba8\" id=\"cba8\" class=\"graf graf--li graf-after--li\"\u003eSessions don’t matter\u003c/li\u003e\u003cli name=\"67a0\" id=\"67a0\" class=\"graf graf--li graf-after--li\"\u003eUser context is implicit (it’s always me)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"ecd3\" id=\"ecd3\" class=\"graf graf--p graf-after--li\"\u003eBoth realities function internally. Database layer works beautifully for multi-user. Web layer works fine for single user.\u003c/p\u003e\u003cp name=\"aac2\" id=\"aac2\" class=\"graf graf--p graf-after--p\"\u003eBut they can’t coexist. When second alpha user tries to onboard, which reality wins?\u003c/p\u003e\u003cp name=\"86c2\" id=\"86c2\" class=\"graf graf--p graf-after--p\"\u003eThe dangerous part: Tests pass. System functions. First alpha user (me) had successful onboarding Thursday. From inside Reality 2, everything looks complete.\u003c/p\u003e\u003cp name=\"30e4\" id=\"30e4\" class=\"graf graf--p graf-after--p\"\u003eOnly when you examine both realities do you see: We’re 85% complete and 0% secure simultaneously.\u003c/p\u003e\u003ch3 name=\"a76e\" id=\"a76e\" class=\"graf graf--h3 graf-after--p\"\u003eThe PIPER.md architecture problem\u003c/h3\u003e\u003cp name=\"2e5b\" id=\"2e5b\" class=\"graf graf--p graf-after--h3\"\u003eLet’s look deeper at the configuration issue because it reveals how single-user assumptions corrupt architecture.\u003c/p\u003e\u003cp name=\"3fa0\" id=\"3fa0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eHow it should work\u003c/strong\u003e:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"markdown\" name=\"a03c\" id=\"a03c\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003ePIPER.md → Generic system capabilities\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e Default personality traits\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e Available integrations  \u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e System-wide settings\u003cbr /\u003e\u003cbr /\u003econfig/users/{user\u003cspan class=\"hljs-emphasis\"\u003e_id}/\u003cbr /\u003e  - preferences.yaml → User-specific preferences\u003cbr /\u003e  - context.md → User\u0026#x27;s projects and context\u003cbr /\u003e  - api_\u003c/span\u003ekeys.enc → Encrypted keys\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"7e93\" id=\"7e93\" class=\"graf graf--p graf-after--pre\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eHow it actually works\u003c/strong\u003e:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"markdown\" name=\"782d\" id=\"782d\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003ePIPER.md → Christian\u0026#x27;s personal everything\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e System capabilities (correct)\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e Christian\u0026#x27;s Q4 goals (wrong)\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e Christian\u0026#x27;s VA projects (wrong)\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e  -\u003c/span\u003e Christian\u0026#x27;s team context (wrong)\u003c/span\u003e\u003c/pre\u003e\u003cpre name=\"43c3\" id=\"43c3\" class=\"graf graf--pre graf-after--pre\"\u003ePIPER.user.md → Barely used overrides\u003c/pre\u003e\u003cp name=\"6fbb\" id=\"6fbb\" class=\"graf graf--p graf-after--pre\"\u003eThe file meant for “everyone” contains “me.” Because when I was the only user, the distinction was meaningless. Generic capabilities and personal context merged because they both applied to the same person — me.\u003c/p\u003e\u003cp name=\"5f94\" id=\"5f94\" class=\"graf graf--p graf-after--p\"\u003eThis is sloppy work but it’s also just the natural evolution when you’re building for yourself. Single-user development doesn’t force the separation between “system” and “user.” Everything is both.\u003c/p\u003e\u003cp name=\"e05c\" id=\"e05c\" class=\"graf graf--p graf-after--p\"\u003eMulti-user development forces the separation. But we built multi-user database layer while still developing in single-user web layer. The cognitive mismatch persisted.\u003c/p\u003e\u003ch3 name=\"58bd\" id=\"58bd\" class=\"graf graf--h3 graf-after--p\"\u003eThe 75% pattern strikes again\u003c/h3\u003e\u003cp name=\"d76e\" id=\"d76e\" class=\"graf graf--p graf-after--h3\"\u003eFriday’s analysis reveals a pattern we keep encountering: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe 75% Pattern\u003c/strong\u003e.\u003c/p\u003e\u003cp name=\"eff8\" id=\"eff8\" class=\"graf graf--p graf-after--p\"\u003eWork that’s 75% complete. Not abandoned. Not poorly done. But incomplete. Wired up enough to function in development. Not finished enough for production.\u003c/p\u003e\u003cp name=\"41e3\" id=\"41e3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe Todo System\u003c/strong\u003e: Database exists. Repositories work. Services implemented. Tests written. But web routes missing. Chat handlers not wired. 75% complete.\u003c/p\u003e\u003cp name=\"1c54\" id=\"1c54\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe Learning System\u003c/strong\u003e: Architecture exists. Logging infrastructure built. Pattern storage designed. But not recording new patterns. Using existing knowledge graph but not learning from conversations. 75% complete.\u003c/p\u003e\u003cp name=\"4011\" id=\"4011\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe CONVERSATION Handler\u003c/strong\u003e: Works perfectly. Processes chat messages. Generates responses. But architecturally misplaced. Not in canonical handlers section where it belongs. 75% complete.\u003c/p\u003e\u003cp name=\"879b\" id=\"879b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe Web Auth Layer\u003c/strong\u003e: Designed (ADR-012). Database fields exist. Infrastructure ready. But implementation missing. 75% complete.\u003c/p\u003e\u003cp name=\"5cb5\" id=\"5cb5\" class=\"graf graf--p graf-after--p\"\u003eThe pattern isn’t failure. It’s how development actually happens. You build infrastructure. You wire up enough to test it. You confirm it works. Then you move to next priority before completing vertical integration.\u003c/p\u003e\u003cp name=\"5a95\" id=\"5a95\" class=\"graf graf--p graf-after--p\"\u003eLater you return to finish. Except sometimes you don’t return. Or you forget what needs finishing. Or you think it’s more complete than it is.\u003c/p\u003e\u003cp name=\"5cea\" id=\"5cea\" class=\"graf graf--p graf-after--p\"\u003e75% looks very different from outside (incomplete) than from inside (works in my tests).\u003c/p\u003e\u003ch3 name=\"1cdf\" id=\"1cdf\" class=\"graf graf--h3 graf-after--p\"\u003eThe systematic triage\u003c/h3\u003e\u003cp name=\"0d5f\" id=\"0d5f\" class=\"graf graf--p graf-after--h3\"\u003eFriday afternoon (3:07 PM): Chief Architect session shifts from analysis to action.\u003c/p\u003e\u003cp name=\"9407\" id=\"9407\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eContext for new Chief Architect\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"84e7\" id=\"84e7\" class=\"graf graf--li graf-after--p\"\u003ePrevious architect ran 6 weeks successfully (Sept 20 — Oct 31)\u003c/li\u003e\u003cli name=\"8e6c\" id=\"8e6c\" class=\"graf graf--li graf-after--li\"\u003eCompleted GREAT (Great Refactor), CRAFT (Craft Pride), Alpha Sprint A8\u003c/li\u003e\u003cli name=\"71bb\" id=\"71bb\" class=\"graf graf--li graf-after--li\"\u003eFirst alpha user successfully onboarded Thursday\u003c/li\u003e\u003cli name=\"b1bd\" id=\"b1bd\" class=\"graf graf--li graf-after--li\"\u003eAlpha testing revealed ~10 bugs needing systematic attention\u003c/li\u003e\u003cli name=\"62fe\" id=\"62fe\" class=\"graf graf--li graf-after--li\"\u003eMultiple issues discovered through actual usage\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"cd0d\" id=\"cd0d\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe process\u003c/strong\u003e: Transform chaotic bug discovery into systematic sprint plan.\u003c/p\u003e\u003cp name=\"2dca\" id=\"2dca\" class=\"graf graf--p graf-after--p\"\u003eNot reactive fixing. But comprehensive triage. What’s blocking? What’s critical? What’s polish? What’s process improvement?\u003c/p\u003e\u003cp name=\"2238\" id=\"2238\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e10 Issues Identified and Categorized\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"1a06\" id=\"1a06\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eP0 Blockers\u003c/strong\u003e (Must fix before external alpha):\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"4bdf\" id=\"4bdf\" class=\"graf graf--li graf-after--p\"\u003eCORE-ALPHA-DATA-LEAK — Remove personal data from PIPER.md (2–3 hours)\u003c/li\u003e\u003cli name=\"9067\" id=\"9067\" class=\"graf graf--li graf-after--li\"\u003eCORE-ALPHA-WEB-AUTH — Implement authentication layer (8–12 hours)\u003c/li\u003e\u003cli name=\"28ae\" id=\"28ae\" class=\"graf graf--li graf-after--li\"\u003eCORE-ALPHA-FILE-UPLOAD — Fix file upload functionality (2–4 hours)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"9a45\" id=\"9a45\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eP1 Critical\u003c/strong\u003e (Core features broken):\u003c/p\u003e\u003cp name=\"19f9\" id=\"19f9\" class=\"graf graf--p graf-after--p\"\u003e4. CORE-ALPHA-ERROR-MESSAGES — Conversational error fallbacks (4 hours)\u003c/p\u003e\u003cp name=\"926e\" id=\"926e\" class=\"graf graf--p graf-after--p\"\u003e5. CORE-ALPHA-ACTION-MAPPING — Fix classifier/handler coordination (2 hours)\u003c/p\u003e\u003cp name=\"fe6f\" id=\"fe6f\" class=\"graf graf--p graf-after--p\"\u003e6. CORE-ALPHA-TODO-INCOMPLETE — Complete todo system (8–12 hours)\u003c/p\u003e\u003cp name=\"8075\" id=\"8075\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eP2 Important\u003c/strong\u003e (Significant UX impact):\u003c/p\u003e\u003cp name=\"9649\" id=\"9649\" class=\"graf graf--p graf-after--p\"\u003e7. CORE-ALPHA-CONVERSATION-PLACEMENT — Fix architectural placement (2 hours)\u003c/p\u003e\u003cp name=\"9516\" id=\"9516\" class=\"graf graf--p graf-after--p\"\u003e8. CORE-ALPHA-TEMPORAL-BUGS — Fix response rendering (2 hours)\u003c/p\u003e\u003cp name=\"065e\" id=\"065e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eP3 Investigation\u003c/strong\u003e (Non-blocking):\u003c/p\u003e\u003cp name=\"c2d9\" id=\"c2d9\" class=\"graf graf--p graf-after--p\"\u003e9. CORE-ALPHA-LEARNING-INVESTIGATION — Document learning system behavior (3 hours)\u003c/p\u003e\u003cp name=\"316a\" id=\"316a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProcess Improvement\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"2bd8\" id=\"2bd8\" class=\"graf graf--p graf-after--p\"\u003e10. CORE-ALPHA-MIGRATION-TESTING — Migration testing protocol (2 hours)\u003c/p\u003e\u003ch3 name=\"c130\" id=\"c130\" class=\"graf graf--h3 graf-after--p\"\u003eThe phased implementation plan\u003c/h3\u003e\u003cp name=\"9cf8\" id=\"9cf8\" class=\"graf graf--p graf-after--h3\"\u003eThe triage isn’t just listing issues. It’s creating execution strategy.\u003c/p\u003e\u003cp name=\"3900\" id=\"3900\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 1 blocks external testing\u003c/strong\u003e. Can’t invite alpha testers while data leak exists or web auth missing.\u003c/p\u003e\u003cp name=\"e8c8\" id=\"e8c8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 2 blocks core value delivery\u003c/strong\u003e. Can’t claim “PM assistant works” when error messages break conversational experience or todos don’t function.\u003c/p\u003e\u003cp name=\"c4a6\" id=\"c4a6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 3 blocks quality perception\u003c/strong\u003e. Can ship alpha with these issues. But perception suffers when temporal rendering is broken or architecture is inconsistent.\u003c/p\u003e\u003cp name=\"1083\" id=\"1083\" class=\"graf graf--p graf-after--p\"\u003eThe phases create natural checkpoints. Fix Phase 1 → Test → Evaluate → Proceed to Phase 2.\u003c/p\u003e\u003ch3 name=\"69cc\" id=\"69cc\" class=\"graf graf--h3 graf-after--p\"\u003eWhat Friday revealed about methodology\u003c/h3\u003e\u003cp name=\"a2f0\" id=\"a2f0\" class=\"graf graf--p graf-after--h3\"\u003eFriday wasn’t about fixing bugs. It was about understanding the system holistically before touching code.\u003c/p\u003e\u003cp name=\"277f\" id=\"277f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe approach\u003c/strong\u003e:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"118e\" id=\"118e\" class=\"graf graf--li graf-after--p\"\u003eArchitectural analysis first (don’t just start fixing)\u003c/li\u003e\u003cli name=\"eef5\" id=\"eef5\" class=\"graf graf--li graf-after--li\"\u003eIdentify all issues systematically (don’t chase reactively)\u003c/li\u003e\u003cli name=\"9801\" id=\"9801\" class=\"graf graf--li graf-after--li\"\u003eCategorize by impact (what blocks vs what polishes)\u003c/li\u003e\u003cli name=\"417e\" id=\"417e\" class=\"graf graf--li graf-after--li\"\u003eCreate phased execution plan (clear gates and sequencing)\u003c/li\u003e\u003cli name=\"d7ce\" id=\"d7ce\" class=\"graf graf--li graf-after--li\"\u003eEstimate effort realistically (35–45 hours total)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"270e\" id=\"270e\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhy this matters\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"2890\" id=\"2890\" class=\"graf graf--p graf-after--p\"\u003eThursday’s approach was reactive. Find bug → Fix bug → Find next bug → Fix that → Repeat. Works for small scope. But we found 10+ issues. Reactive chasing creates thrashing. Fix issue #3, break issue #7, fix #7, discover #11.\u003c/p\u003e\u003cp name=\"ac5e\" id=\"ac5e\" class=\"graf graf--p graf-after--p\"\u003eFriday’s approach was systematic. Understand all issues → Categorize impact → Sequence fixes → Execute phases → Test comprehensively.\u003c/p\u003e\u003cp name=\"e1d4\" id=\"e1d4\" class=\"graf graf--p graf-after--p\"\u003eThe two parallel realities problem exemplifies why systematic analysis matters. You can’t fix “web auth missing” without understanding it exists within larger context of sophisticated database layer. You can’t fix data leak without understanding configuration architecture. You can’t prioritize issues without understanding dependencies.\u003c/p\u003e\u003cp name=\"bd4a\" id=\"bd4a\" class=\"graf graf--p graf-after--p\"\u003eFriday gave Saturday a gift: Clear problem definition. Comprehensive issue list. Execution roadmap. Effort estimates.\u003c/p\u003e\u003cp name=\"b682\" id=\"b682\" class=\"graf graf--p graf-after--p\"\u003eSaturday could execute efficiently because Friday analyzed thoroughly.\u003c/p\u003e\u003ch3 name=\"b8ce\" id=\"b8ce\" class=\"graf graf--h3 graf-after--p\"\u003eThe “accidentally enterprise-ready” pattern\u003c/h3\u003e\u003cp name=\"31b3\" id=\"31b3\" class=\"graf graf--p graf-after--h3\"\u003eFriday’s analysis revealed something fascinating about the system’s evolution.\u003c/p\u003e\u003cp name=\"ed96\" id=\"ed96\" class=\"graf graf--p graf-after--p\"\u003eThe database/service layer is 85% complete with multi-user infrastructure \u003cstrong class=\"markup--strong markup--p-strong\"\u003ethat was never explicitly intended for multi-user support initially\u003c/strong\u003e.\u003c/p\u003e\u003cp name=\"012c\" id=\"012c\" class=\"graf graf--p graf-after--p\"\u003eWe built:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c23a\" id=\"c23a\" class=\"graf graf--li graf-after--p\"\u003eUser model (because we needed to track who’s using the system)\u003c/li\u003e\u003cli name=\"1d2a\" id=\"1d2a\" class=\"graf graf--li graf-after--li\"\u003eAPI keys per user (because different users need different API credentials)\u003c/li\u003e\u003cli name=\"f114\" id=\"f114\" class=\"graf graf--li graf-after--li\"\u003eSession storage (because we needed to maintain conversation context)\u003c/li\u003e\u003cli name=\"10c1\" id=\"10c1\" class=\"graf graf--li graf-after--li\"\u003eJWT architecture (because we knew auth would be needed eventually)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"a451\" id=\"a451\" class=\"graf graf--p graf-after--li\"\u003eEach piece made sense individually for single-user development. But together they created enterprise-ready multi-user infrastructure.\u003c/p\u003e\u003cp name=\"99d8\" id=\"99d8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePattern name\u003c/strong\u003e: “Accidentally Enterprise-Ready”\u003c/p\u003e\u003cp name=\"c9c8\" id=\"c9c8\" class=\"graf graf--p graf-after--p\"\u003eInfrastructure created for one purpose turns out suitable for another. Not by design. By accumulation of good individual decisions that happen to compose well.\u003c/p\u003e\u003cp name=\"4f4e\" id=\"4f4e\" class=\"graf graf--p graf-after--p\"\u003eThis is different from the 75% pattern. The 75% pattern is intentional work left incomplete. “Accidentally enterprise-ready” is unintentional work that’s more complete than you realized.\u003c/p\u003e\u003cp name=\"f153\" id=\"f153\" class=\"graf graf--p graf-after--p\"\u003eThe database layer wasn’t built for multi-user. It was built for single user with good practices (separation of concerns, proper data modeling, clean architecture). Those good practices happened to create multi-user foundation.\u003c/p\u003e\u003cp name=\"eb8b\" id=\"eb8b\" class=\"graf graf--p graf-after--p\"\u003eThen we needed multi-user for alpha testing. And discovered: The foundation exists. We just need to build the house.\u003c/p\u003e\u003ch3 name=\"ab4c\" id=\"ab4c\" class=\"graf graf--h3 graf-after--p\"\u003eWhat Friday means for Saturday\u003c/h3\u003e\u003cp name=\"c956\" id=\"c956\" class=\"graf graf--p graf-after--h3\"\u003eFriday ends not with code shipped but with understanding achieved.\u003c/p\u003e\u003cp name=\"adca\" id=\"adca\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e10 issues documented\u003c/strong\u003e. \u003cstrong class=\"markup--strong markup--p-strong\"\u003e3 phases planned\u003c/strong\u003e. \u003cstrong class=\"markup--strong markup--p-strong\"\u003e35–45 hours estimated\u003c/strong\u003e.\u003c/p\u003e\u003cp name=\"b2c8\" id=\"b2c8\" class=\"graf graf--p graf-after--p\"\u003eThe path forward is clear. Not “reactively chase bugs until they’re gone.” But “systematically execute phases until criteria met.”\u003c/p\u003e\u003cp name=\"f57b\" id=\"f57b\" class=\"graf graf--p graf-after--p\"\u003ePhase 1 blocks external alpha. Must complete: Data leak + Web auth + File upload.\u003c/p\u003e\u003cp name=\"c2fe\" id=\"c2fe\" class=\"graf graf--p graf-after--p\"\u003eThat becomes Saturday’s mission. Not “fix everything.” But “complete Phase 1.”\u003c/p\u003e\u003cp name=\"cf38\" id=\"cf38\" class=\"graf graf--p graf-after--p\"\u003eThe gift Friday gives Saturday: Permission to focus. Don’t worry about todo system (Phase 2). Don’t worry about temporal rendering bugs (Phase 3). Don’t even worry about error messages (Phase 2).\u003c/p\u003e\u003cp name=\"cc14\" id=\"cc14\" class=\"graf graf--p graf-after--p\"\u003eFocus on three things: Data leak. Web auth. File upload.\u003c/p\u003e\u003cp name=\"9c35\" id=\"9c35\" class=\"graf graf--p graf-after--p\"\u003eEverything else can wait.\u003c/p\u003e\u003cp name=\"3b48\" id=\"3b48\" class=\"graf graf--p graf-after--p\"\u003eThat focus enables Saturday’s achievement. New Lead Developer arrives. Looks at roadmap. Sees three P0 blockers. Deploys three agents in parallel. Fixes all three (plus bonus fourth issue) in 12.75 hours.\u003c/p\u003e\u003cp name=\"52ef\" id=\"52ef\" class=\"graf graf--p graf-after--p\"\u003eFriday’s systematic analysis enabled Saturday’s systematic execution.\u003c/p\u003e\u003ch3 name=\"a965\" id=\"a965\" class=\"graf graf--h3 graf-after--p\"\u003eThe lesson of two realities\u003c/h3\u003e\u003cp name=\"3ae4\" id=\"3ae4\" class=\"graf graf--p graf-after--h3\"\u003eThe two parallel realities problem teaches something important about system architecture: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eLayers can evolve independently in ways that create gaps.\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"423d\" id=\"423d\" class=\"graf graf--p graf-after--p\"\u003eDatabase layer advances (multi-user infrastructure). Web layer doesn’t advance at same rate (single-user assumption). Gap appears. Not because anyone made mistakes. Because different parts of system evolved at different paces for valid reasons.\u003c/p\u003e\u003cp name=\"1169\" id=\"1169\" class=\"graf graf--p graf-after--p\"\u003eYou can’t see the gap from inside either reality. Database layer thinks “we’re ready for multi-user.” Web layer thinks “we work fine.” Only when you examine both simultaneously do you see: They’re incompatible.\u003c/p\u003e\u003cp name=\"f48e\" id=\"f48e\" class=\"graf graf--p graf-after--p\"\u003eThis is why Friday’s architectural analysis matters. Not finding bugs. But understanding how the pieces relate. Where the gaps exist. What needs bridging.\u003c/p\u003e\u003cp name=\"ce2e\" id=\"ce2e\" class=\"graf graf--p graf-after--p\"\u003eThursday proved the system works (first alpha user successful). Friday proved the system is incomplete (second alpha user would break). Both truths valid simultaneously.\u003c/p\u003e\u003cp name=\"82c7\" id=\"82c7\" class=\"graf graf--p graf-after--p\"\u003eThe resolution isn’t choosing which reality is “correct.” It’s building the bridge between them. Web layer needs to catch up to database layer’s sophistication. Not rebuild database layer to match web layer’s simplicity.\u003c/p\u003e\u003cp name=\"858c\" id=\"858c\" class=\"graf graf--p graf-after--p\"\u003eThat’s Saturday’s work. Build the 15% bridge between 85% complete database infrastructure and 0% complete web authentication.\u003c/p\u003e\u003cp name=\"2397\" id=\"2397\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eFriday provided the map. Saturday built the bridge.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Two Realities Problem: When Your Database is Sophisticated and Your Web Tier Has Zero Auth\",\"excerpt\":\"“Not sure about this security regime”October 31Friday morning. The day after first alpha user onboarding. Thursday was the birthday breakthrough — three hours of reactive bug-chasing followed by systematic E2E testing first, leading to successful onboarding at 11:26 AM.But success revealed a prob...\",\"url\":\"/blog/the-two-realities-problem\",\"publishedAt\":\"Nov 7, 2025\",\"publishedAtISO\":\"2025-11-07T14:30:00.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/392ba601a8e2\",\"featuredImage\":\"/assets/blog-images/392ba601a8e2-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-two-realities-problem-when-your-database-is-sophisticated-and-your-web-tier-has-zero-auth-392ba601a8e2?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-two-realities-problem\",\"workDate\":\"Nov 7, 2025\",\"workDateISO\":\"2025-11-07T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2025-11-07\",\"featured\":false},\"content\":{\"title\":\"The Two Realities Problem: When Your Database is Sophisticated and Your Web Tier Has Zero Auth\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Two Realities Problem: When Your Database is Sophisticated and Your Web Tier Has Zero Auth | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Two Realities Problem: When Your Database is Sophisticated and Your Web Tier Has Zero Auth\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Two Realities Problem: When Your Database is Sophisticated and Your Web Tier Has Zero Auth\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
