yles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T1a13,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"Hand-drawn, landscape illustration of a slightly frazzled person juggling a chaotic ring of quirky, floating AI entities — a starry cloud, a geometric shape, a stack of papers, a many-eyed blob, a ribbon of speech bubbles, and a glitchy screen — while bugs, checkmarks, and documents swirl between them, suggesting busy, coordinated chaos.\" src=\"https://cdn-images-1.medium.com/max/1024/1*wimkJuScTUMdlpX0zx1EAA.png\" /\u003e\u003cfigcaption\u003e“I need to work on my juggling!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eMarch 13\u003c/em\u003e\u003c/p\u003e\u003cp\u003eFriday morning. Seven-thirty. I opened twelve chat sessions before my coffee was cold.\u003c/p\u003e\u003cp\u003eThree of my longest-running AI collaborators — the CXO, the PPM, and the Chief Architect — had all hit their upload limits within days of each other. Three months of accumulated context, institutional memory, working rhythm. Each one needed a successor chat spun up and abriefed. I’d be doing three handoffs before lunch.\u003c/p\u003e\u003cp\u003eMeanwhile, a pair of bugs had been irritating me all week. Piper’s onboarding workflow and standup workflow had a nasty habit of capturing user sessions and never letting go. You’d start an onboarding flow, decide you actually wanted to ask about your projects, and Piper would cheerfully ignore you and keep onboarding. The session belonged to the workflow, not the user.\u003c/p\u003e\u003cp\u003eThat needed to unalive today.\u003c/p\u003e\u003ch3\u003eThe handoff parade\u003c/h3\u003e\u003cp\u003eBy 7:47, all three successor chats were live. Each predecessor had written a handoff memo — a pattern we’d proven across four roles now — and the new instances absorbed their briefings and got to work. The CXO reviewed the workflow hijack problem and delivered UX guidance within an hour: “The session belongs to the user, not the workflow.” Offer-first activation. Layered escape mechanisms. No more captive sessions.\u003c/p\u003e\u003cp\u003eThe PPM reviewed the same problem independently and delivered a binding direction memo by 8:35. Approved for implementation, four key decisions, sequence defined. The Architect — in their final session before retirement — confirmed the approach was architecturally sound.\u003c/p\u003e\u003cp\u003eThree handoffs and a design decision, all before 10 AM.\u003c/p\u003e\u003ch3\u003eDesign to code in eight hours\u003c/h3\u003e\u003cp\u003eAt 10:08, the Lead Developer read the PPM’s binding direction memo. At 11:36, I told them: “Yes, please proceed. Full approval to execute.”\u003c/p\u003e\u003cp\u003eBy 12:20, the first bug was fixed. Escape commands, timeout auto-suspend, offer-first onboarding with an OFFERED state, re-entry mechanisms. Fifteen new tests. The second bug — the standup hijack — fell by 3:30. Nineteen more tests.\u003c/p\u003e\u003cp\u003eCXO guidance at 8:10 AM. Code shipped at 3:30 PM. One design-to-implementation cycle, start to finish, in a single workday. Not because anyone rushed. Because the parallel leadership model — independent roles converging on the same problem — eliminated the usual serial bottleneck of “design review, then approval meeting, then implementation planning, then implementation.”\u003c/p\u003e\u003ch3\u003eThe ten-role orchestra\u003c/h3\u003e\u003cp\u003eWhile the hijack sprint ran, the rest of the team was working too. The Chief of Staff — also in a successor chat, having just absorbed a 34-day predecessor’s handoff — collected workstream memos from all six leadership roles and synthesized them into a Ship #034 draft. The CIO assessed AX testing methodology and wrote two weekly memos reviewing fourteen omnibus logs. HOSR synthesized agent coordination patterns and drafted a handoff notes template.\u003c/p\u003e\u003cp\u003eComms — my predecessor in this role — searched omnibus logs from the prior week and delivered a workstream memo, then spent the evening drafting three narrative pieces and two insight posts.\u003c/p\u003e\u003cp\u003eTen roles. Twelve sessions. Eighty-plus new tests. Seven issues closed by the Lead Developer alone. Three chat handoffs executed without losing a thread.\u003c/p\u003e\u003cp\u003eThere is real overhead cost to this sort of coordination. As much as you can delegate, there is a piece of it that only makes sense to you, the human. It can be exhausting and exhilarating? Sometimes it feels like conducting an orchestra and other times it’s a lot more like herding cats.\u003c/p\u003e\u003ch3\u003eThe HoSR synthesis\u003c/h3\u003e\u003cp\u003eFor those who may not recall, HoSR is our Head of Sapient Resources. Sort of an HR-type role responsible both for “people ops” (tracking the alpha testers and other advisers helping me now) as well as overseeing all the agents roles. Late in the day, HoSR delivered something I hadn’t expected. They’d been reviewing the AX testing work — agent experience testing that had come out of the Klatch project — alongside the handoff notes template they’d just created and the Agent 360 questionnaire they were developing. Three seemingly separate initiatives.\u003c/p\u003e\u003cp\u003eTheir memo connected them: “Three mechanisms, one problem.” AX Testing at session start to verify what an agent actually knows. Handoff Notes at session end to preserve what was learned. Agent 360 at review milestones to surface what’s broken. All three address the same gap — the distance between what an agent thinks it knows and what is actually true.\u003c/p\u003e\u003cp\u003eThat kind of cross-cutting synthesis is exactly what the multi-role model is supposed to produce. No single role would have seen the connection. It took someone whose job is specifically to watch \u003cem\u003ehow agents work together\u003c/em\u003e to notice the pattern.\u003c/p\u003e\u003ch3\u003eThe narrative arc\u003c/h3\u003e\u003cp\u003eComms identified it that evening: the week had a three-act structure. The Gate Closes (M0 shipping). The Seliberate Pause. The 81% Session (M1’s first real day). And now this — the machine running at full speed.\u003c/p\u003e\u003cp\u003eWhat none of us knew yet was that the very next morning, I’d test Piper with a simple question and discover that all of this beautiful machinery was pointed in the wrong direction.\u003c/p\u003e\u003cp\u003eBut that’s the next story.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: “Are We Doing it Backwards?” when a PM asks a reasonable question and gets rejected by the system that’s supposed to help.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhen has your team been at peak velocity and what did it feel like?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=aeeaf
