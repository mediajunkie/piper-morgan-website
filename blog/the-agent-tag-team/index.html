defined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T3cea,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"Two robots play tag at a playground while their human friend looks on\" src=\"https://cdn-images-1.medium.com/max/1024/1*Bbuqo9urjkxBPCDzTcrCog.png\" /\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 9–10\u003c/em\u003e\u003c/p\u003e\u003cp\u003e“It’s the weekend!” I explained to one of my AI assistantsa, “I am not in a coding mania anymore!” Sunday afternoon around 1:05 PM I deployed two agents to execute the UUID migration gameplan (upgrading how I store unique user IDs). Then I step back.\u003c/p\u003e\u003cp\u003eBy Monday morning: Both issues complete. 173 files changed. Three critical production bugs caught and fixed. 55/55 tests passing.\u003c/p\u003e\u003cp\u003eTotal agent work time: 21 hours 44 minutes. (Much of that idling until I could step into my office and approve a handoff between the two agents.)\u003c/p\u003e\u003cp\u003eMy involvement: Periodic check-ins. Strategic decisions when needed. Otherwise: Letting them work.\u003c/p\u003e\u003cp\u003eBut the fascinating part isn’t the completion. It’s how they coordinated. Claude Code gets frustrated with tedious work and writes a detailed plan for Cursor to execute mechanically. Later, Cursor gets tired of piecework and writes a plan for Code to batch-process the rest.\u003c/p\u003e\u003cp\u003eBack and forth. Tag-team. Tennis match. Handoff documents at every boundary.\u003c/p\u003e\u003cp\u003eAnd it worked brilliantly.\u003c/p\u003e\u003ch3\u003eDeploy and step back\u003c/h3\u003e\u003cp\u003eCode Agent begins reading the 680-line gameplan for Issues #262 (UUID Migration) and #291 (Token Blacklist FK). I make sure things are off and running and then go do something else.\u003c/p\u003e\u003cp\u003eThe healthy pattern: Deploy agents. Give them clear instructions. Let them work. Check in periodically. Don’t micromanage.\u003c/p\u003e\u003cp\u003eNot abandonment. Strategic delegation.\u003c/p\u003e\u003cp\u003eCursor begins verification role. Code begins implementation.\u003c/p\u003e\u003cp\u003eThe tag-team starts.\u003c/p\u003e\u003ch3\u003eThe systematic progression (Phases −1 through 2)\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003ePhase \u003c/strong\u003e−\u003cstrong\u003e1 (Pre-flight)\u003c/strong\u003e: Code verifies Saturday’s discovery. Users table: empty. Alpha_users table: one record (me). Option 1B confirmed: Safe to proceed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 0 (Backups)\u003c/strong\u003e: Code creates full database backup (64KB), user tables backup (40KB), rollback script. Cursor verifies: All valid. Pre-migration state captured.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 1 (Database Migration)\u003c/strong\u003e: Code creates and executes Alembic migration. Users.id VARCHAR→UUID. Add is_alpha flag. Migrate xian record. Drop alpha_users table. Add token_blacklist FK with CASCADE.\u003c/p\u003e\u003cp\u003eCursor verifies: Migration successful. Issue #291 resolved (FK constraint working). One table, clean architecture.\u003c/p\u003e\u003cp\u003eThis took 15 minutes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 2 (Model Updates)\u003c/strong\u003e: Code updates 7 models to UUID types. Removes AlphaUser model. Restores all relationships.\u003c/p\u003e\u003cp\u003eCursor verifies: All models correct. Imports valid. Relationships working.\u003c/p\u003e\u003cp\u003eFive phases. Five minutes. Systematic execution. Verification at each step.\u003c/p\u003e\u003cp\u003eThe tag-team pattern working.\u003c/p\u003e\u003ch3\u003ePhase 3: Where automation pays off\u003c/h3\u003e\u003cp\u003eCode tackles Phase 3: Update application code.\u003c/p\u003e\u003cp\u003eThe scope: 52 service files with type hints needing conversion. user_id: str → user_id: UUID.\u003c/p\u003e\u003cp\u003eCode’s decision: Write automation script. Don’t manually edit 199 type hints.\u003c/p\u003e\u003cp\u003eThe script: Find all user_id: str patterns. Convert to user_id: UUID. Verify imports. Handle edge cases.\u003c/p\u003e\u003cp\u003eResult: 52 files updated automatically. Clean conversions. Consistent style.\u003c/p\u003e\u003cp\u003eCursor verifies: 153 UUID conversions confirmed. All imports correct. Dead code identified (alpha_migration_service.py — no longer needed).\u003c/p\u003e\u003cp\u003eAutomation investment: 30 minutes to write script. Time saved: 2–3 hours of manual editing. Plus: Zero manual errors.\u003c/p\u003e\u003ch3\u003ePhase 4A: Building the infrastructure\u003c/h3\u003e\u003cp\u003e1:30 PM. Phase 4A: Test infrastructure.\u003c/p\u003e\u003cp\u003eCode’s approach: Don’t start converting 76 test files yet. Build the infrastructure first.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat gets built\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eUUID fixtures in conftest.py (TEST_USER_ID, TEST_USER_ID_2, XIAN_USER_ID)\u003c/li\u003e\u003cli\u003eFixed 34 service files with incorrect imports\u003c/li\u003e\u003cli\u003eCreated example test showing the pattern\u003c/li\u003e\u003cli\u003eBuilt scanner tool to find remaining issues\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe investment: One hour. The payoff: Makes remaining 76 files mechanical.\u003c/p\u003e\u003cp\u003eCursor verifies: Fixtures ready. Service imports fixed. Example pattern working. Scanner identifying targets.\u003c/p\u003e\u003cp\u003eThis is the setup that enables Phase 4B efficiency.\u003c/p\u003e\u003cp\u003eAfter that I was busy for most of the afternoon through dinner time.\u003c/p\u003e\u003ch3\u003ePhase 4B: When Code gets frustrated\u003c/h3\u003e\u003cp\u003eI check back in just before 10 PM. Code has completed a piece of the infrastructure work. Faces Phase 4B: Convert 76 test files to UUID pattern.\u003c/p\u003e\u003cp\u003eThe work: Mechanical but tedious. Import UUID fixtures. Replace string IDs. Update assertions. Repeat 76 times.\u003c/p\u003e\u003cp\u003eCode gets frustrated, thinks this is a better job for Cursor.\u003c/p\u003e\u003cp\u003eInstead of grinding through it: Writes comprehensive handoff document.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHANDOFF-CURSOR-PHASE4B.md\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003ePattern to follow (established in example)\u003c/li\u003e\u003cli\u003eFiles to convert (76 identified by scanner)\u003c/li\u003e\u003cli\u003eFixtures to use (from conftest.py)\u003c/li\u003e\u003cli\u003eVerification steps (what confirms success)\u003c/li\u003e\u003cli\u003eBatch strategy (group by type: auth, integration, database)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eI approve this distribution of work. Code to Cursor: “You’re good at systematic verification. Here’s the pattern. Here are the targets. Execute mechanically.”\u003c/p\u003e\u003cp\u003eThen Code steps aside.\u003c/p\u003e\u003ch3\u003eThe overnight marathon\u003c/h3\u003e\u003cp\u003eCursor receives handoff. Begins Phase 4B systematic conversions.\u003c/p\u003e\u003cp\u003eThe approach: Batch by category. Auth tests. Security tests. Integration tests. Database tests. Archives. Config.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBatch 2 (10:15 PM)\u003c/strong\u003e: Auth/Security — 9 files complete\u003cbr\u003e\u003cstrong\u003eBatch 3 (10:30 PM)\u003c/strong\u003e: Integration tests — 13 files complete\u003c/p\u003e\u003cp\u003eBecause I am old now, I wake up in the middle of the night, and because I am a geek I pop into my office, blinking at the bright screenlight. It’s 3:35 AM. I see 27/76 files done, 42% progress, then ten minute later: 31 files complete, critical path done\u003c/p\u003e\u003cp\u003eThen Cursor pauses.\u003c/p\u003e\u003cp\u003eNotes that 31 files covers all critical tests: Database operations. Authentication. Security. Key integrations. Configuration. Archives.\u003c/p\u003e\u003cp\u003eThe remaining ~45 files? Cursor thinks they don’t need to be ground through one at a time. Better handled in a batch… by Code!\u003c/p\u003e\u003ch3\u003eWhen Cursor gets tired of piecework\u003c/h3\u003e\u003cp\u003e“Look, I’ve done 31 files manually. It took 6 hours. That’s 11.6 minutes per file. There are 45 files left. That’s 8.7 hours at this rate.\u003c/p\u003e\u003cp\u003eBut you know what? These follow the exact same pattern. I’ve established it. Why don’t you write a batch script and process them all at once?”\u003c/p\u003e\u003cp\u003eCursor to Code: “Your turn. You’re good at automation. Here’s the pattern. Batch-process the rest.”\u003c/p\u003e\u003cp\u003eThe tennis match continues.\u003c/p\u003e\u003ch3\u003eMonday morning: The batch fix\u003c/h3\u003e\u003cp\u003eI wake up just before 7AM to see that Cursor has wrapped its overnight work and proposed this handoff. I approve it.\u003c/p\u003e\u003cp\u003e7:08 AM. Code receives handoff. Reads Cursor’s analysis.\u003c/p\u003e\u003cp\u003eAgrees: Batch script makes sense.\u003c/p\u003e\u003cp\u003e7:40 AM. \u003cstrong\u003e32 minutes later\u003c/strong\u003e: 75 test files fixed via automation.\u003c/p\u003e\u003cp\u003eThe approach: Take Cursor’s established pattern. Script it. Run on all remaining files. Verify with scanner.\u003c/p\u003e\u003cp\u003eScanner output: 0 missing imports (down from 44). Clean.\u003c/p\u003e\u003cp\u003e32 minutes for 75 files. Cursor’s rate: 11.6 minutes per file (would have taken 14.5 hours).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTime savings\u003c/strong\u003e: 14 hours of manual work → 32 minutes of automation.\u003c/p\u003e\u003cp\u003eAnd the work is more consistent. Scripts don’t get tired. (Bots do, in a way!) Don’t make typos. Don’t lose focus at 2 AM.\u003c/p\u003e\u003ch3\u003ePhase 5: Why verification matters\u003c/h3\u003e\u003cp\u003e8:00 AM. Code hands back to Cursor for Phase 5 integration testing.\u003c/p\u003e\u003cp\u003eThe task: Run manual verification tests. Confirm everything works together.\u003c/p\u003e\u003cp\u003eCursor runs four tests:\u003c/p\u003e\u003col\u003e\u003cli\u003eAuth flow (login, JWT tokens)\u003c/li\u003e\u003cli\u003eCASCADE delete (Issue #291 verification)\u003c/li\u003e\u003cli\u003eFK enforcement (relationship integrity)\u003c/li\u003e\u003cli\u003ePerformance (UUID lookups)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cstrong\u003eCRITICAL BUG #1 discovered\u003c/strong\u003e: JWT service fails.\u003c/p\u003e\u003cp\u003eError: “Object of type UUID is not JSON serializable”\u003c/p\u003e\u003cp\u003eThe problem: JWTs need string IDs. UUID objects can’t serialize directly. Needs explicit conversion.\u003c/p\u003e\u003cp\u003eThe fix: Add .hex conversion where UUIDs go into JWT payloads.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWithout Phase 5 verification\u003c/strong\u003e: This bug ships to production. Every login attempt fails. Complete auth system breakdown. Hours of emergency debugging.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWith Phase 5 verification\u003c/strong\u003e: Caught before deployment. Fixed in 2 minutes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCRITICAL BUGS #2 \u0026amp; #3 discovered\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003eBug #2: Auth endpoints returning 404. Why? AlphaUser imports still present in 22 files. Dead code causing routing failures.\u003c/p\u003e\u003cp\u003eBug #3: Todos API not loading. Why? Missing UUID import in router module. Entire todos feature broken.\u003c/p\u003e\u003cp\u003eThree critical bugs. All caught by manual verification testing. All would have broken production.\u003c/p\u003e\u003cp\u003eThe automated tests passed. Type checking passed. Linting passed.\u003c/p\u003e\u003cp\u003eBut runtime behavior? Broken.\u003c/p\u003e\u003cp\u003ePhase 5 verification saved the deployment.\u003c/p\u003e\u003ch3\u003eThe completion\u003c/h3\u003e\u003cp\u003eCode creates final commit around 8:52 AM, right before my morning standup.\u003c/p\u003e\u003cul\u003e\u003cli\u003e173 files changed\u003c/li\u003e\u003cli\u003e130 modified, 43 added\u003c/li\u003e\u003cli\u003e12,859 insertions, 370 deletions\u003c/li\u003e\u003cli\u003eTwo issues resolved (#262, #291)\u003c/li\u003e\u003cli\u003eThree critical bugs fixed\u003c/li\u003e\u003cli\u003e55/55 tests passing\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e9:30 AM. I return. “Good morning! It’s 9:30 AM.”\u003c/p\u003e\u003cp\u003eAgents report: Complete. Verified. Production-ready.\u003c/p\u003e\u003cp\u003eI review overnight work. Clean handoffs. Systematic execution. Bugs caught. Evidence documented.\u003c/p\u003e\u003cp\u003eTime to celebrate and close issues.\u003c/p\u003e\u003ch3\u003eWhat the tag-team taught us\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eLesson 1: Frustration drives innovation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCode didn’t grind through 76 test files. Code got frustrated and invented a handoff protocol.\u003c/p\u003e\u003cp\u003eCursor didn’t continue piecework for 14 hours. Cursor got tired and suggested batch automation.\u003c/p\u003e\u003cp\u003eBoth agents recognized when work became mechanical. Both delegated to whoever had better tools.\u003c/p\u003e\u003cp\u003eThat’s not weakness. That’s intelligent coordination.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLesson 2: Handoff documents are gold\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eEvery phase transition included comprehensive handoff:\u003c/p\u003e\u003cul\u003e\u003cli\u003eWhat was done\u003c/li\u003e\u003cli\u003eWhat needs doing\u003c/li\u003e\u003cli\u003ePattern established\u003c/li\u003e\u003cli\u003eHow to verify success\u003c/li\u003e\u003cli\u003eFiles/tools available\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThese weren’t casual notes. These were complete specifications. Read the document. Execute the work. No clarification needed.\u003c/p\u003e\u003cp\u003eThe handoffs enabled autonomous execution.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLesson 3: Verification catches what automation misses\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAutomated tests: Passing.\u003c/p\u003e\u003cp\u003eType checking: Passing.\u003c/p\u003e\u003cp\u003eLinting: Passing.\u003c/p\u003e\u003cp\u003eRuntime behavior: Broken.\u003c/p\u003e\u003cp\u003ePhase 5 manual verification found three critical bugs that all automated checks missed.\u003c/p\u003e\u003cp\u003eAutomation is necessary. Verification is essential.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLesson 4: Let agents work their strengths\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCode: Good at implementation, automation, batch processing.\u003c/p\u003e\u003cp\u003eCursor: Good at systematic verification, pattern following, quality assurance.\u003c/p\u003e\u003cp\u003eWhen work matched strengths: Fast, clean, effective.\u003c/p\u003e\u003cp\u003eWhen work mismatched: Frustration led to handoff.\u003c/p\u003e\u003cp\u003eThe system self-optimized.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLesson 5: Weekend work can be sustainable\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMy involvement Sunday-Monday: Minimal.\u003c/p\u003e\u003cp\u003eStrategic decisions when needed. Periodic check-ins. Mostly: Letting agents work.\u003c/p\u003e\u003cp\u003eNot coding mania. Not grinding through. Just: Deploy with clear instructions. Let them execute. Review outcomes.\u003c/p\u003e\u003cp\u003eThat’s sustainable. That’s healthy. That’s how weekend work should feel.\u003c/p\u003e\u003ch3\u003eThe methodology insight\u003c/h3\u003e\u003cp\u003eMonday morning, after reviewing the work:\u003c/p\u003e\u003cp\u003e“Agents likely could have managed most of this without me except strategic decisions.”\u003c/p\u003e\u003cp\u003eThe realization: This coordination pattern — handoffs, verification gates, autonomous execution — could be more automated.\u003c/p\u003e\u003cp\u003eWhat if agents could coordinate through GitHub Issues and PRs instead of requiring human handoffs?\u003c/p\u003e\u003cp\u003eThe methodology proposal: \u003cstrong\u003eGitHub-based agent coordination protocol\u003c/strong\u003e (something we experimented with back in August).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 1: Agent proposes plan\u003c/strong\u003e (creates detailed gameplan as GitHub Issue comment)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 2: Agent executes\u003c/strong\u003e (creates PR with clear description of changes)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 3: Verification agent reviews\u003c/strong\u003e (comments on PR with verification results)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 4: Integration\u003c/strong\u003e (merge or request changes)\u003c/p\u003e\u003cp\u003eHuman role: Strategic decisions. Approval gates. Not tactical coordination.\u003c/p\u003e\u003cp\u003eImplementation estimate: 2–4 hours to build the protocol.\u003c/p\u003e\u003cp\u003eTime savings: 60–70% of PM coordination time on multi-phase work.\u003c/p\u003e\u003cp\u003eThe insight came from watching agents coordinate themselves. The tennis match. The handoffs. The frustrated-agent-writes-a-plan moments.\u003c/p\u003e\u003cp\u003eThey showed us what’s possible. Now: Make it systematic.\u003c/p\u003e\u003ch3\u003eWhat 21 hours proved\u003c/h3\u003e\u003cp\u003eSunday 1:05 PM to Monday 10:05 AM. 21 hours 44 minutes of agent work.\u003c/p\u003e\u003cp\u003eTwo issues resolved. Three critical bugs prevented. 173 files changed. Clean completion.\u003c/p\u003e\u003cp\u003eMy contribution: Deploy agents. Check in periodically. Make strategic calls. Review outcomes.\u003c/p\u003e\u003cp\u003eThe agents’ contribution: Everything else.\u003c/p\u003e\u003cp\u003eSystematic execution. Intelligent handoffs. Self-optimizing coordination. Quality verification. Professional results.\u003c/p\u003e\u003cp\u003eThe proof: Autonomous agent work can be excellent. With clear instructions. With verification gates. With intelligent delegation.\u003c/p\u003e\u003cp\u003eNot “AI replacing humans.” But “AI handling mechanical execution while humans focus on strategy.”\u003c/p\u003e\u003cp\u003eThat’s the sustainable model. That’s what Sunday-Monday demonstrated.\u003c/p\u003e\u003cp\u003eAnd those frustrated-agent-writes-a-plan moments? Those weren’t bugs. Those were features.\u003c/p\u003e\u003cp\u003eThat was agents discovering better coordination patterns. That was the system improving itself.\u003c/p\u003e\u003cp\u003eThat’s what makes this methodology worth capturing.\u003c/p\u003e\u003cp\u003eThe marathon taught me: Give agents clear instructions. Let them work. Trust verification phases. Learn from their coordination patterns.\u003c/p\u003e\u003cp\u003eAnd maybe, just maybe, take weekends off while they handle the grinding work.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext up on the Building Piper Morgan narrative: The Alpha Milestone: When Documentation Prevents Disaster, but first we’ll spend the weekend discussing insights again, starting with The Discovery Pattern: Why Verification Before Implementation Saves Time.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever watched robotic agents try to delegate work to each other kind of like a hot potato? Well, I have.\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=b2677f7c1e59\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-agent-tag-team-when-frustration-becomes-protocol-b2677f7c1e59\"\u003eThe Agent Tag-Team: When Frustration Becomes Protocol\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T688c,"])</script><script>self.__next_f.push([1,"\u003csection name=\"50ba\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"e53f\" id=\"e53f\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Agent Tag-Team: When Frustration Becomes Protocol\u003c/h3\u003e\u003cfigure name=\"5a70\" id=\"5a70\" class=\"graf graf--figure graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*Bbuqo9urjkxBPCDzTcrCog.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"Two robots play tag at a playground while their human friend looks on\" src=\"https://cdn-images-1.medium.com/max/800/1*Bbuqo9urjkxBPCDzTcrCog.png\"\u003e\u003c/figure\u003e\u003cp name=\"673b\" id=\"673b\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 9–10\u003c/em\u003e\u003c/p\u003e\u003cp name=\"bb6a\" id=\"bb6a\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003e\u003cspan class=\"graf-dropCapQuote\"\u003e“\u003c/span\u003eI\u003c/span\u003et’s the weekend!” I explained to one of my AI assistantsa, “I am not in a coding mania anymore!” Sunday afternoon around 1:05 PM I deployed two agents to execute the UUID migration gameplan (upgrading how I store unique user IDs). Then I step back.\u003c/p\u003e\u003cp name=\"62dd\" id=\"62dd\" class=\"graf graf--p graf-after--p\"\u003eBy Monday morning: Both issues complete. 173 files changed. Three critical production bugs caught and fixed. 55/55 tests passing.\u003c/p\u003e\u003cp name=\"531c\" id=\"531c\" class=\"graf graf--p graf-after--p\"\u003eTotal agent work time: 21 hours 44 minutes. (Much of that idling until I could step into my office and approve a handoff between the two agents.)\u003c/p\u003e\u003cp name=\"775f\" id=\"775f\" class=\"graf graf--p graf-after--p\"\u003eMy involvement: Periodic check-ins. Strategic decisions when needed. Otherwise: Letting them work.\u003c/p\u003e\u003cp name=\"a2bf\" id=\"a2bf\" class=\"graf graf--p graf-after--p\"\u003eBut the fascinating part isn’t the completion. It’s how they coordinated. Claude Code gets frustrated with tedious work and writes a detailed plan for Cursor to execute mechanically. Later, Cursor gets tired of piecework and writes a plan for Code to batch-process the rest.\u003c/p\u003e\u003cp name=\"2e5d\" id=\"2e5d\" class=\"graf graf--p graf-after--p\"\u003eBack and forth. Tag-team. Tennis match. Handoff documents at every boundary.\u003c/p\u003e\u003cp name=\"7666\" id=\"7666\" class=\"graf graf--p graf-after--p\"\u003eAnd it worked brilliantly.\u003c/p\u003e\u003ch3 name=\"fd68\" id=\"fd68\" class=\"graf graf--h3 graf-after--p\"\u003eDeploy and step back\u003c/h3\u003e\u003cp name=\"4ff0\" id=\"4ff0\" class=\"graf graf--p graf-after--h3\"\u003eCode Agent begins reading the 680-line gameplan for Issues #262 (UUID Migration) and #291 (Token Blacklist FK). I make sure things are off and running and then go do something else.\u003c/p\u003e\u003cp name=\"a661\" id=\"a661\" class=\"graf graf--p graf-after--p\"\u003eThe healthy pattern: Deploy agents. Give them clear instructions. Let them work. Check in periodically. Don’t micromanage.\u003c/p\u003e\u003cp name=\"2e8d\" id=\"2e8d\" class=\"graf graf--p graf-after--p\"\u003eNot abandonment. Strategic delegation.\u003c/p\u003e\u003cp name=\"45ed\" id=\"45ed\" class=\"graf graf--p graf-after--p\"\u003eCursor begins verification role. Code begins implementation.\u003c/p\u003e\u003cp name=\"3dfa\" id=\"3dfa\" class=\"graf graf--p graf-after--p\"\u003eThe tag-team starts.\u003c/p\u003e\u003ch3 name=\"ec7e\" id=\"ec7e\" class=\"graf graf--h3 graf-after--p\"\u003eThe systematic progression (Phases −1 through 2)\u003c/h3\u003e\u003cp name=\"1741\" id=\"1741\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase \u003c/strong\u003e−\u003cstrong class=\"markup--strong markup--p-strong\"\u003e1 (Pre-flight)\u003c/strong\u003e: Code verifies Saturday’s discovery. Users table: empty. Alpha_users table: one record (me). Option 1B confirmed: Safe to proceed.\u003c/p\u003e\u003cp name=\"d074\" id=\"d074\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 0 (Backups)\u003c/strong\u003e: Code creates full database backup (64KB), user tables backup (40KB), rollback script. Cursor verifies: All valid. Pre-migration state captured.\u003c/p\u003e\u003cp name=\"59ee\" id=\"59ee\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 1 (Database Migration)\u003c/strong\u003e: Code creates and executes Alembic migration. Users.id VARCHAR→UUID. Add is_alpha flag. Migrate xian record. Drop alpha_users table. Add token_blacklist FK with CASCADE.\u003c/p\u003e\u003cp name=\"0900\" id=\"0900\" class=\"graf graf--p graf-after--p\"\u003eCursor verifies: Migration successful. Issue #291 resolved (FK constraint working). One table, clean architecture.\u003c/p\u003e\u003cp name=\"70ac\" id=\"70ac\" class=\"graf graf--p graf-after--p\"\u003eThis took 15 minutes.\u003c/p\u003e\u003cp name=\"8bf3\" id=\"8bf3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 2 (Model Updates)\u003c/strong\u003e: Code updates 7 models to UUID types. Removes AlphaUser model. Restores all relationships.\u003c/p\u003e\u003cp name=\"bc5a\" id=\"bc5a\" class=\"graf graf--p graf-after--p\"\u003eCursor verifies: All models correct. Imports valid. Relationships working.\u003c/p\u003e\u003cp name=\"8166\" id=\"8166\" class=\"graf graf--p graf-after--p\"\u003eFive phases. Five minutes. Systematic execution. Verification at each step.\u003c/p\u003e\u003cp name=\"0505\" id=\"0505\" class=\"graf graf--p graf-after--p\"\u003eThe tag-team pattern working.\u003c/p\u003e\u003ch3 name=\"22c8\" id=\"22c8\" class=\"graf graf--h3 graf-after--p\"\u003ePhase 3: Where automation pays off\u003c/h3\u003e\u003cp name=\"f30e\" id=\"f30e\" class=\"graf graf--p graf-after--h3\"\u003eCode tackles Phase 3: Update application code.\u003c/p\u003e\u003cp name=\"c3a1\" id=\"c3a1\" class=\"graf graf--p graf-after--p\"\u003eThe scope: 52 service files with type hints needing conversion. \u003ccode class=\"markup--code markup--p-code\"\u003euser_id: str\u003c/code\u003e → \u003ccode class=\"markup--code markup--p-code\"\u003euser_id: UUID\u003c/code\u003e.\u003c/p\u003e\u003cp name=\"8386\" id=\"8386\" class=\"graf graf--p graf-after--p\"\u003eCode’s decision: Write automation script. Don’t manually edit 199 type hints.\u003c/p\u003e\u003cp name=\"da27\" id=\"da27\" class=\"graf graf--p graf-after--p\"\u003eThe script: Find all \u003ccode class=\"markup--code markup--p-code\"\u003euser_id: str\u003c/code\u003e patterns. Convert to \u003ccode class=\"markup--code markup--p-code\"\u003euser_id: UUID\u003c/code\u003e. Verify imports. Handle edge cases.\u003c/p\u003e\u003cp name=\"7575\" id=\"7575\" class=\"graf graf--p graf-after--p\"\u003eResult: 52 files updated automatically. Clean conversions. Consistent style.\u003c/p\u003e\u003cp name=\"61a7\" id=\"61a7\" class=\"graf graf--p graf-after--p\"\u003eCursor verifies: 153 UUID conversions confirmed. All imports correct. Dead code identified (alpha_migration_service.py — no longer needed).\u003c/p\u003e\u003cp name=\"a56d\" id=\"a56d\" class=\"graf graf--p graf-after--p\"\u003eAutomation investment: 30 minutes to write script. Time saved: 2–3 hours of manual editing. Plus: Zero manual errors.\u003c/p\u003e\u003ch3 name=\"dea6\" id=\"dea6\" class=\"graf graf--h3 graf-after--p\"\u003ePhase 4A: Building the infrastructure\u003c/h3\u003e\u003cp name=\"f3dc\" id=\"f3dc\" class=\"graf graf--p graf-after--h3\"\u003e1:30 PM. Phase 4A: Test infrastructure.\u003c/p\u003e\u003cp name=\"1bf8\" id=\"1bf8\" class=\"graf graf--p graf-after--p\"\u003eCode’s approach: Don’t start converting 76 test files yet. Build the infrastructure first.\u003c/p\u003e\u003cp name=\"27a5\" id=\"27a5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat gets built\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"5da2\" id=\"5da2\" class=\"graf graf--li graf-after--p\"\u003eUUID fixtures in conftest.py (TEST_USER_ID, TEST_USER_ID_2, XIAN_USER_ID)\u003c/li\u003e\u003cli name=\"c48b\" id=\"c48b\" class=\"graf graf--li graf-after--li\"\u003eFixed 34 service files with incorrect imports\u003c/li\u003e\u003cli name=\"78ac\" id=\"78ac\" class=\"graf graf--li graf-after--li\"\u003eCreated example test showing the pattern\u003c/li\u003e\u003cli name=\"10d4\" id=\"10d4\" class=\"graf graf--li graf-after--li\"\u003eBuilt scanner tool to find remaining issues\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"5b7c\" id=\"5b7c\" class=\"graf graf--p graf-after--li\"\u003eThe investment: One hour. The payoff: Makes remaining 76 files mechanical.\u003c/p\u003e\u003cp name=\"14d6\" id=\"14d6\" class=\"graf graf--p graf-after--p\"\u003eCursor verifies: Fixtures ready. Service imports fixed. Example pattern working. Scanner identifying targets.\u003c/p\u003e\u003cp name=\"685a\" id=\"685a\" class=\"graf graf--p graf-after--p\"\u003eThis is the setup that enables Phase 4B efficiency.\u003c/p\u003e\u003cp name=\"ce78\" id=\"ce78\" class=\"graf graf--p graf-after--p\"\u003eAfter that I was busy for most of the afternoon through dinner time.\u003c/p\u003e\u003ch3 name=\"5993\" id=\"5993\" class=\"graf graf--h3 graf-after--p\"\u003ePhase 4B: When Code gets frustrated\u003c/h3\u003e\u003cp name=\"dfec\" id=\"dfec\" class=\"graf graf--p graf-after--h3\"\u003eI check back in just before 10 PM. Code has completed a piece of the infrastructure work. Faces Phase 4B: Convert 76 test files to UUID pattern.\u003c/p\u003e\u003cp name=\"1007\" id=\"1007\" class=\"graf graf--p graf-after--p\"\u003eThe work: Mechanical but tedious. Import UUID fixtures. Replace string IDs. Update assertions. Repeat 76 times.\u003c/p\u003e\u003cp name=\"bb0e\" id=\"bb0e\" class=\"graf graf--p graf-after--p\"\u003eCode gets frustrated, thinks this is a better job for Cursor.\u003c/p\u003e\u003cp name=\"b92a\" id=\"b92a\" class=\"graf graf--p graf-after--p\"\u003eInstead of grinding through it: Writes comprehensive handoff document.\u003c/p\u003e\u003cp name=\"bfe8\" id=\"bfe8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eHANDOFF-CURSOR-PHASE4B.md\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"515d\" id=\"515d\" class=\"graf graf--li graf-after--p\"\u003ePattern to follow (established in example)\u003c/li\u003e\u003cli name=\"9361\" id=\"9361\" class=\"graf graf--li graf-after--li\"\u003eFiles to convert (76 identified by scanner)\u003c/li\u003e\u003cli name=\"5162\" id=\"5162\" class=\"graf graf--li graf-after--li\"\u003eFixtures to use (from conftest.py)\u003c/li\u003e\u003cli name=\"bc9a\" id=\"bc9a\" class=\"graf graf--li graf-after--li\"\u003eVerification steps (what confirms success)\u003c/li\u003e\u003cli name=\"cb00\" id=\"cb00\" class=\"graf graf--li graf-after--li\"\u003eBatch strategy (group by type: auth, integration, database)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"d6a4\" id=\"d6a4\" class=\"graf graf--p graf-after--li\"\u003eI approve this distribution of work. Code to Cursor: “You’re good at systematic verification. Here’s the pattern. Here are the targets. Execute mechanically.”\u003c/p\u003e\u003cp name=\"fc37\" id=\"fc37\" class=\"graf graf--p graf-after--p\"\u003eThen Code steps aside.\u003c/p\u003e\u003ch3 name=\"9bd1\" id=\"9bd1\" class=\"graf graf--h3 graf-after--p\"\u003eThe overnight marathon\u003c/h3\u003e\u003cp name=\"56dc\" id=\"56dc\" class=\"graf graf--p graf-after--h3\"\u003eCursor receives handoff. Begins Phase 4B systematic conversions.\u003c/p\u003e\u003cp name=\"d1d4\" id=\"d1d4\" class=\"graf graf--p graf-after--p\"\u003eThe approach: Batch by category. Auth tests. Security tests. Integration tests. Database tests. Archives. Config.\u003c/p\u003e\u003cp name=\"a5a7\" id=\"a5a7\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBatch 2 (10:15 PM)\u003c/strong\u003e: Auth/Security — 9 files complete\u003cbr\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBatch 3 (10:30 PM)\u003c/strong\u003e: Integration tests — 13 files complete\u003c/p\u003e\u003cp name=\"2cec\" id=\"2cec\" class=\"graf graf--p graf-after--p\"\u003eBecause I am old now, I wake up in the middle of the night, and because I am a geek I pop into my office, blinking at the bright screenlight. It’s 3:35 AM. I see 27/76 files done, 42% progress, then ten minute later: 31 files complete, critical path done\u003c/p\u003e\u003cp name=\"96d8\" id=\"96d8\" class=\"graf graf--p graf-after--p\"\u003eThen Cursor pauses.\u003c/p\u003e\u003cp name=\"8ad4\" id=\"8ad4\" class=\"graf graf--p graf-after--p\"\u003eNotes that 31 files covers all critical tests: Database operations. Authentication. Security. Key integrations. Configuration. Archives.\u003c/p\u003e\u003cp name=\"6672\" id=\"6672\" class=\"graf graf--p graf-after--p\"\u003eThe remaining ~45 files? Cursor thinks they don’t need to be ground through one at a time. Better handled in a batch… by Code!\u003c/p\u003e\u003ch3 name=\"6758\" id=\"6758\" class=\"graf graf--h3 graf-after--p\"\u003eWhen Cursor gets tired of piecework\u003c/h3\u003e\u003cp name=\"eb69\" id=\"eb69\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--h3\"\u003e“Look, I’ve done 31 files manually. It took 6 hours. That’s 11.6 minutes per file. There are 45 files left. That’s 8.7 hours at this rate.\u003c/p\u003e\u003cp name=\"35ae\" id=\"35ae\" class=\"graf graf--p graf-after--p\"\u003eBut you know what? These follow the exact same pattern. I’ve established it. Why don’t you write a batch script and process them all at once?”\u003c/p\u003e\u003cp name=\"bbf5\" id=\"bbf5\" class=\"graf graf--p graf-after--p\"\u003eCursor to Code: “Your turn. You’re good at automation. Here’s the pattern. Batch-process the rest.”\u003c/p\u003e\u003cp name=\"1501\" id=\"1501\" class=\"graf graf--p graf-after--p\"\u003eThe tennis match continues.\u003c/p\u003e\u003ch3 name=\"c17d\" id=\"c17d\" class=\"graf graf--h3 graf-after--p\"\u003eMonday morning: The batch fix\u003c/h3\u003e\u003cp name=\"b490\" id=\"b490\" class=\"graf graf--p graf-after--h3\"\u003eI wake up just before 7AM to see that Cursor has wrapped its overnight work and proposed this handoff. I approve it.\u003c/p\u003e\u003cp name=\"a112\" id=\"a112\" class=\"graf graf--p graf-after--p\"\u003e7:08 AM. Code receives handoff. Reads Cursor’s analysis.\u003c/p\u003e\u003cp name=\"e399\" id=\"e399\" class=\"graf graf--p graf-after--p\"\u003eAgrees: Batch script makes sense.\u003c/p\u003e\u003cp name=\"396e\" id=\"396e\" class=\"graf graf--p graf-after--p\"\u003e7:40 AM. \u003cstrong class=\"markup--strong markup--p-strong\"\u003e32 minutes later\u003c/strong\u003e: 75 test files fixed via automation.\u003c/p\u003e\u003cp name=\"2931\" id=\"2931\" class=\"graf graf--p graf-after--p\"\u003eThe approach: Take Cursor’s established pattern. Script it. Run on all remaining files. Verify with scanner.\u003c/p\u003e\u003cp name=\"dc5d\" id=\"dc5d\" class=\"graf graf--p graf-after--p\"\u003eScanner output: 0 missing imports (down from 44). Clean.\u003c/p\u003e\u003cp name=\"faa4\" id=\"faa4\" class=\"graf graf--p graf-after--p\"\u003e32 minutes for 75 files. Cursor’s rate: 11.6 minutes per file (would have taken 14.5 hours).\u003c/p\u003e\u003cp name=\"ee77\" id=\"ee77\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTime savings\u003c/strong\u003e: 14 hours of manual work → 32 minutes of automation.\u003c/p\u003e\u003cp name=\"c7a8\" id=\"c7a8\" class=\"graf graf--p graf-after--p\"\u003eAnd the work is more consistent. Scripts don’t get tired. (Bots do, in a way!) Don’t make typos. Don’t lose focus at 2 AM.\u003c/p\u003e\u003ch3 name=\"1a0e\" id=\"1a0e\" class=\"graf graf--h3 graf-after--p\"\u003ePhase 5: Why verification matters\u003c/h3\u003e\u003cp name=\"b373\" id=\"b373\" class=\"graf graf--p graf-after--h3\"\u003e8:00 AM. Code hands back to Cursor for Phase 5 integration testing.\u003c/p\u003e\u003cp name=\"691c\" id=\"691c\" class=\"graf graf--p graf-after--p\"\u003eThe task: Run manual verification tests. Confirm everything works together.\u003c/p\u003e\u003cp name=\"e675\" id=\"e675\" class=\"graf graf--p graf-after--p\"\u003eCursor runs four tests:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"1d8b\" id=\"1d8b\" class=\"graf graf--li graf-after--p\"\u003eAuth flow (login, JWT tokens)\u003c/li\u003e\u003cli name=\"8059\" id=\"8059\" class=\"graf graf--li graf-after--li\"\u003eCASCADE delete (Issue #291 verification)\u003c/li\u003e\u003cli name=\"219c\" id=\"219c\" class=\"graf graf--li graf-after--li\"\u003eFK enforcement (relationship integrity)\u003c/li\u003e\u003cli name=\"d738\" id=\"d738\" class=\"graf graf--li graf-after--li\"\u003ePerformance (UUID lookups)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"bb92\" id=\"bb92\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCRITICAL BUG #1 discovered\u003c/strong\u003e: JWT service fails.\u003c/p\u003e\u003cp name=\"45ca\" id=\"45ca\" class=\"graf graf--p graf-after--p\"\u003eError: “Object of type UUID is not JSON serializable”\u003c/p\u003e\u003cp name=\"e094\" id=\"e094\" class=\"graf graf--p graf-after--p\"\u003eThe problem: JWTs need string IDs. UUID objects can’t serialize directly. Needs explicit conversion.\u003c/p\u003e\u003cp name=\"e1f0\" id=\"e1f0\" class=\"graf graf--p graf-after--p\"\u003eThe fix: Add \u003ccode class=\"markup--code markup--p-code\"\u003e.hex\u003c/code\u003e conversion where UUIDs go into JWT payloads.\u003c/p\u003e\u003cp name=\"e718\" id=\"e718\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWithout Phase 5 verification\u003c/strong\u003e: This bug ships to production. Every login attempt fails. Complete auth system breakdown. Hours of emergency debugging.\u003c/p\u003e\u003cp name=\"7581\" id=\"7581\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWith Phase 5 verification\u003c/strong\u003e: Caught before deployment. Fixed in 2 minutes.\u003c/p\u003e\u003cp name=\"3570\" id=\"3570\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCRITICAL BUGS #2 \u0026amp; #3 discovered\u003c/strong\u003e:\u003c/p\u003e\u003cp name=\"ccc7\" id=\"ccc7\" class=\"graf graf--p graf-after--p\"\u003eBug #2: Auth endpoints returning 404. Why? AlphaUser imports still present in 22 files. Dead code causing routing failures.\u003c/p\u003e\u003cp name=\"a6cc\" id=\"a6cc\" class=\"graf graf--p graf-after--p\"\u003eBug #3: Todos API not loading. Why? Missing UUID import in router module. Entire todos feature broken.\u003c/p\u003e\u003cp name=\"a5d8\" id=\"a5d8\" class=\"graf graf--p graf-after--p\"\u003eThree critical bugs. All caught by manual verification testing. All would have broken production.\u003c/p\u003e\u003cp name=\"422e\" id=\"422e\" class=\"graf graf--p graf-after--p\"\u003eThe automated tests passed. Type checking passed. Linting passed.\u003c/p\u003e\u003cp name=\"294c\" id=\"294c\" class=\"graf graf--p graf-after--p\"\u003eBut runtime behavior? Broken.\u003c/p\u003e\u003cp name=\"c627\" id=\"c627\" class=\"graf graf--p graf-after--p\"\u003ePhase 5 verification saved the deployment.\u003c/p\u003e\u003ch3 name=\"20f6\" id=\"20f6\" class=\"graf graf--h3 graf-after--p\"\u003eThe completion\u003c/h3\u003e\u003cp name=\"fc9c\" id=\"fc9c\" class=\"graf graf--p graf-after--h3\"\u003eCode creates final commit around 8:52 AM, right before my morning standup.\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2aa0\" id=\"2aa0\" class=\"graf graf--li graf-after--p\"\u003e173 files changed\u003c/li\u003e\u003cli name=\"b4f8\" id=\"b4f8\" class=\"graf graf--li graf-after--li\"\u003e130 modified, 43 added\u003c/li\u003e\u003cli name=\"f706\" id=\"f706\" class=\"graf graf--li graf-after--li\"\u003e12,859 insertions, 370 deletions\u003c/li\u003e\u003cli name=\"2a8d\" id=\"2a8d\" class=\"graf graf--li graf-after--li\"\u003eTwo issues resolved (#262, #291)\u003c/li\u003e\u003cli name=\"9131\" id=\"9131\" class=\"graf graf--li graf-after--li\"\u003eThree critical bugs fixed\u003c/li\u003e\u003cli name=\"0176\" id=\"0176\" class=\"graf graf--li graf-after--li\"\u003e55/55 tests passing\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"499f\" id=\"499f\" class=\"graf graf--p graf-after--li\"\u003e9:30 AM. I return. “Good morning! It’s 9:30 AM.”\u003c/p\u003e\u003cp name=\"a98e\" id=\"a98e\" class=\"graf graf--p graf-after--p\"\u003eAgents report: Complete. Verified. Production-ready.\u003c/p\u003e\u003cp name=\"ab7d\" id=\"ab7d\" class=\"graf graf--p graf-after--p\"\u003eI review overnight work. Clean handoffs. Systematic execution. Bugs caught. Evidence documented.\u003c/p\u003e\u003cp name=\"7975\" id=\"7975\" class=\"graf graf--p graf-after--p\"\u003eTime to celebrate and close issues.\u003c/p\u003e\u003ch3 name=\"855e\" id=\"855e\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the tag-team taught us\u003c/h3\u003e\u003cp name=\"f845\" id=\"f845\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 1: Frustration drives innovation\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"7380\" id=\"7380\" class=\"graf graf--p graf-after--p\"\u003eCode didn’t grind through 76 test files. Code got frustrated and invented a handoff protocol.\u003c/p\u003e\u003cp name=\"7847\" id=\"7847\" class=\"graf graf--p graf-after--p\"\u003eCursor didn’t continue piecework for 14 hours. Cursor got tired and suggested batch automation.\u003c/p\u003e\u003cp name=\"a872\" id=\"a872\" class=\"graf graf--p graf-after--p\"\u003eBoth agents recognized when work became mechanical. Both delegated to whoever had better tools.\u003c/p\u003e\u003cp name=\"d27b\" id=\"d27b\" class=\"graf graf--p graf-after--p\"\u003eThat’s not weakness. That’s intelligent coordination.\u003c/p\u003e\u003cp name=\"7d73\" id=\"7d73\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 2: Handoff documents are gold\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"53f6\" id=\"53f6\" class=\"graf graf--p graf-after--p\"\u003eEvery phase transition included comprehensive handoff:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"9009\" id=\"9009\" class=\"graf graf--li graf-after--p\"\u003eWhat was done\u003c/li\u003e\u003cli name=\"5bcd\" id=\"5bcd\" class=\"graf graf--li graf-after--li\"\u003eWhat needs doing\u003c/li\u003e\u003cli name=\"26fa\" id=\"26fa\" class=\"graf graf--li graf-after--li\"\u003ePattern established\u003c/li\u003e\u003cli name=\"bfe2\" id=\"bfe2\" class=\"graf graf--li graf-after--li\"\u003eHow to verify success\u003c/li\u003e\u003cli name=\"e2cd\" id=\"e2cd\" class=\"graf graf--li graf-after--li\"\u003eFiles/tools available\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"fb10\" id=\"fb10\" class=\"graf graf--p graf-after--li\"\u003eThese weren’t casual notes. These were complete specifications. Read the document. Execute the work. No clarification needed.\u003c/p\u003e\u003cp name=\"e506\" id=\"e506\" class=\"graf graf--p graf-after--p\"\u003eThe handoffs enabled autonomous execution.\u003c/p\u003e\u003cp name=\"97f1\" id=\"97f1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 3: Verification catches what automation misses\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"7704\" id=\"7704\" class=\"graf graf--p graf-after--p\"\u003eAutomated tests: Passing.\u003c/p\u003e\u003cp name=\"e17b\" id=\"e17b\" class=\"graf graf--p graf-after--p\"\u003eType checking: Passing.\u003c/p\u003e\u003cp name=\"7633\" id=\"7633\" class=\"graf graf--p graf-after--p\"\u003eLinting: Passing.\u003c/p\u003e\u003cp name=\"9d87\" id=\"9d87\" class=\"graf graf--p graf-after--p\"\u003eRuntime behavior: Broken.\u003c/p\u003e\u003cp name=\"87e5\" id=\"87e5\" class=\"graf graf--p graf-after--p\"\u003ePhase 5 manual verification found three critical bugs that all automated checks missed.\u003c/p\u003e\u003cp name=\"0bf2\" id=\"0bf2\" class=\"graf graf--p graf-after--p\"\u003eAutomation is necessary. Verification is essential.\u003c/p\u003e\u003cp name=\"f8ae\" id=\"f8ae\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 4: Let agents work their strengths\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"9a7f\" id=\"9a7f\" class=\"graf graf--p graf-after--p\"\u003eCode: Good at implementation, automation, batch processing.\u003c/p\u003e\u003cp name=\"19c3\" id=\"19c3\" class=\"graf graf--p graf-after--p\"\u003eCursor: Good at systematic verification, pattern following, quality assurance.\u003c/p\u003e\u003cp name=\"9f1a\" id=\"9f1a\" class=\"graf graf--p graf-after--p\"\u003eWhen work matched strengths: Fast, clean, effective.\u003c/p\u003e\u003cp name=\"0957\" id=\"0957\" class=\"graf graf--p graf-after--p\"\u003eWhen work mismatched: Frustration led to handoff.\u003c/p\u003e\u003cp name=\"14b9\" id=\"14b9\" class=\"graf graf--p graf-after--p\"\u003eThe system self-optimized.\u003c/p\u003e\u003cp name=\"9c6b\" id=\"9c6b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 5: Weekend work can be sustainable\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"fbe4\" id=\"fbe4\" class=\"graf graf--p graf-after--p\"\u003eMy involvement Sunday-Monday: Minimal.\u003c/p\u003e\u003cp name=\"3fdb\" id=\"3fdb\" class=\"graf graf--p graf-after--p\"\u003eStrategic decisions when needed. Periodic check-ins. Mostly: Letting agents work.\u003c/p\u003e\u003cp name=\"fef0\" id=\"fef0\" class=\"graf graf--p graf-after--p\"\u003eNot coding mania. Not grinding through. Just: Deploy with clear instructions. Let them execute. Review outcomes.\u003c/p\u003e\u003cp name=\"cf72\" id=\"cf72\" class=\"graf graf--p graf-after--p\"\u003eThat’s sustainable. That’s healthy. That’s how weekend work should feel.\u003c/p\u003e\u003ch3 name=\"fa4a\" id=\"fa4a\" class=\"graf graf--h3 graf-after--p\"\u003eThe methodology insight\u003c/h3\u003e\u003cp name=\"5532\" id=\"5532\" class=\"graf graf--p graf-after--h3\"\u003eMonday morning, after reviewing the work:\u003c/p\u003e\u003cp name=\"67e6\" id=\"67e6\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e“Agents likely could have managed most of this without me except strategic decisions.”\u003c/p\u003e\u003cp name=\"ccbc\" id=\"ccbc\" class=\"graf graf--p graf-after--p\"\u003eThe realization: This coordination pattern — handoffs, verification gates, autonomous execution — could be more automated.\u003c/p\u003e\u003cp name=\"2ff7\" id=\"2ff7\" class=\"graf graf--p graf-after--p\"\u003eWhat if agents could coordinate through GitHub Issues and PRs instead of requiring human handoffs?\u003c/p\u003e\u003cp name=\"b698\" id=\"b698\" class=\"graf graf--p graf-after--p\"\u003eThe methodology proposal: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eGitHub-based agent coordination protocol\u003c/strong\u003e (something we experimented with back in August).\u003c/p\u003e\u003cp name=\"549e\" id=\"549e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 1: Agent proposes plan\u003c/strong\u003e (creates detailed gameplan as GitHub Issue comment)\u003c/p\u003e\u003cp name=\"cd99\" id=\"cd99\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 2: Agent executes\u003c/strong\u003e (creates PR with clear description of changes)\u003c/p\u003e\u003cp name=\"963d\" id=\"963d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 3: Verification agent reviews\u003c/strong\u003e (comments on PR with verification results)\u003c/p\u003e\u003cp name=\"c859\" id=\"c859\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 4: Integration\u003c/strong\u003e (merge or request changes)\u003c/p\u003e\u003cp name=\"afb1\" id=\"afb1\" class=\"graf graf--p graf-after--p\"\u003eHuman role: Strategic decisions. Approval gates. Not tactical coordination.\u003c/p\u003e\u003cp name=\"f4cb\" id=\"f4cb\" class=\"graf graf--p graf-after--p\"\u003eImplementation estimate: 2–4 hours to build the protocol.\u003c/p\u003e\u003cp name=\"4059\" id=\"4059\" class=\"graf graf--p graf-after--p\"\u003eTime savings: 60–70% of PM coordination time on multi-phase work.\u003c/p\u003e\u003cp name=\"78de\" id=\"78de\" class=\"graf graf--p graf-after--p\"\u003eThe insight came from watching agents coordinate themselves. The tennis match. The handoffs. The frustrated-agent-writes-a-plan moments.\u003c/p\u003e\u003cp name=\"995b\" id=\"995b\" class=\"graf graf--p graf-after--p\"\u003eThey showed us what’s possible. Now: Make it systematic.\u003c/p\u003e\u003ch3 name=\"342f\" id=\"342f\" class=\"graf graf--h3 graf-after--p\"\u003eWhat 21 hours proved\u003c/h3\u003e\u003cp name=\"59a3\" id=\"59a3\" class=\"graf graf--p graf-after--h3\"\u003eSunday 1:05 PM to Monday 10:05 AM. 21 hours 44 minutes of agent work.\u003c/p\u003e\u003cp name=\"30f3\" id=\"30f3\" class=\"graf graf--p graf-after--p\"\u003eTwo issues resolved. Three critical bugs prevented. 173 files changed. Clean completion.\u003c/p\u003e\u003cp name=\"7a15\" id=\"7a15\" class=\"graf graf--p graf-after--p\"\u003eMy contribution: Deploy agents. Check in periodically. Make strategic calls. Review outcomes.\u003c/p\u003e\u003cp name=\"1c70\" id=\"1c70\" class=\"graf graf--p graf-after--p\"\u003eThe agents’ contribution: Everything else.\u003c/p\u003e\u003cp name=\"aba0\" id=\"aba0\" class=\"graf graf--p graf-after--p\"\u003eSystematic execution. Intelligent handoffs. Self-optimizing coordination. Quality verification. Professional results.\u003c/p\u003e\u003cp name=\"36c6\" id=\"36c6\" class=\"graf graf--p graf-after--p\"\u003eThe proof: Autonomous agent work can be excellent. With clear instructions. With verification gates. With intelligent delegation.\u003c/p\u003e\u003cp name=\"b43c\" id=\"b43c\" class=\"graf graf--p graf-after--p\"\u003eNot “AI replacing humans.” But “AI handling mechanical execution while humans focus on strategy.”\u003c/p\u003e\u003cp name=\"f70d\" id=\"f70d\" class=\"graf graf--p graf-after--p\"\u003eThat’s the sustainable model. That’s what Sunday-Monday demonstrated.\u003c/p\u003e\u003cp name=\"e583\" id=\"e583\" class=\"graf graf--p graf-after--p\"\u003eAnd those frustrated-agent-writes-a-plan moments? Those weren’t bugs. Those were features.\u003c/p\u003e\u003cp name=\"cbe3\" id=\"cbe3\" class=\"graf graf--p graf-after--p\"\u003eThat was agents discovering better coordination patterns. That was the system improving itself.\u003c/p\u003e\u003cp name=\"69d5\" id=\"69d5\" class=\"graf graf--p graf-after--p\"\u003eThat’s what makes this methodology worth capturing.\u003c/p\u003e\u003cp name=\"7a64\" id=\"7a64\" class=\"graf graf--p graf-after--p\"\u003eThe marathon taught me: Give agents clear instructions. Let them work. Trust verification phases. Learn from their coordination patterns.\u003c/p\u003e\u003cp name=\"ef14\" id=\"ef14\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eAnd maybe, just maybe, take weekends off while they handle the grinding work.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Agent Tag-Team: When Frustration Becomes Protocol\",\"excerpt\":\"November 9–10“It’s the weekend!” I explained to one of my AI assistantsa, “I am not in a coding mania anymore!” Sunday afternoon around 1:05 PM I deployed two agents to execute the UUID migration gameplan (upgrading how I store unique user IDs). Then I step back.By Monday morning: Both issues com...\",\"url\":\"/blog/the-agent-tag-team\",\"publishedAt\":\"Nov 14, 2025\",\"publishedAtISO\":\"Fri, 14 Nov 2025 14:11:54 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/b2677f7c1e59\",\"featuredImage\":\"/assets/blog-images/b2677f7c1e59-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-agent-tag-team-when-frustration-beco
