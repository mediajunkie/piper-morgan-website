eStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T1f0d,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A runner crosses a finish line on a newly solid track while ghostly alternate paths converge behind them, guided by glowing, translucent AI companions assembling the final pieces in midair.\" src=\"/assets/blog-images/ai-finish.webp\" /\u003e\u003cfigcaption\u003eAlmost there!\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cem\u003eMarch 20–22\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003ePouring coffee on a Friday morning. The architecture was facing the right direction. The floor was routing as expected. The dispatcher was consolidating offers. The briefings were accurate. The mail was flowing.\u003c/p\u003e\n\u003cp\u003eNow we had to finish the sprint.\u003c/p\u003e\n\u003cp\u003eM1 had been organized into four tiers: architecture, quality, capabilities, and PM-led decisions. The first two tiers were done. Tier 3 — the capability gaps that actual users would notice — was next.\u003c/p\u003e\n\u003cp\u003eThe sprint had quadrupled in length during build and testing. It had led to a literal revolution in the architecture. Now it felt like we had finally rounded the corner.\u003c/p\u003e\n\u003ch2\u003eFive sources of truth\u003c/h2\u003e\n\u003cp\u003eThe Lead Developer's first audit Friday morning surfaced a problem we hadn't seen coming. Piper was telling users it could do things it couldn't actually do.\u003c/p\u003e\n\u003cp\u003eThe root cause: five disconnected systems were each describing Piper's capabilities. PIPER.md listed 28 capabilities. The soft invocation detector knew 7 workflow types. The dispatcher registry had exactly 1 — meetings. The context assembler had its own capability list. And the canonical handler set implied yet another.\u003c/p\u003e\n\u003cp\u003eNone of them coordinated. So when a user asked about project setup, the LLM — drawing from PIPER.md — would offer to help. The user would accept. And then nothing would happen, because the dispatcher had no handler registered for project setup.\u003c/p\u003e\n\u003cp\u003eThe fix was registry-driven reconciliation: if it's not in the dispatcher registry, don't offer it. One source of truth, enforced at the earliest detection point. PIPER.md was updated to reflect runtime reality. The soft invocation detector was gated on the registry. The context assembler was made registry-aware.\u003c/p\u003e\n\u003cp\u003eFive sources of truth became one. The Lead Developer filed and closed #923 the same session.\u003c/p\u003e\n\u003cp\u003eIt's hard enough to keep these critters honest without confusing them with mismatched and incorrect info!\u003c/p\u003e\n\u003ch2\u003eThe 75% pattern, four times in a row\u003c/h2\u003e\n\u003cp\u003eSaturday was Tier 3 capability day. Four issues. Each one followed the same pattern.\u003c/p\u003e\n\u003cp\u003eGitHub issue close/reopen (#902): handlers existed, pre-classifier existed, fuzzy matching existed, 34 tests existed. What was missing? The MCP adapter didn't have an `update_issue()` method — an AttributeError at runtime — and there was no confirmation UX. Two gaps in a 95% complete feature. Forty-four tests after the fix.\u003c/p\u003e\n\u003cp\u003eTodo completion (#904): fully implemented with 23 tests passing. Never formally closed. No code changes needed. Verified and closed.\u003c/p\u003e\n\u003cp\u003eReminders (#903): the database already had a `reminder_date` field, indexed. The todo CRUD was complete. The time parsing library was in requirements. What was missing was the wiring — five integration points connecting the pre-classifier to the time parser to the handler to the action mapper to the greeting surfacing. Thirty-two new tests.\u003c/p\u003e\n\u003cp\u003eLazy workflow deferral (#883): six dispatch methods were pre-creating workflow objects that no handler ever used. One hundred percent wasted work. The fix was `workflow = None` — let handlers create workflows when they actually need them. Zero new tests needed because the behavior was invisible to existing tests.\u003c/p\u003e\n\u003cp\u003eFour issues. Each one 75-95% complete before anyone touched them. The audit-first approach — checking what exists before assuming what's missing — identified the 5-10% gap instead of reimplementing the whole feature.\u003c/p\u003e\n\u003cp\u003eI know some of the 75%-complete problem is endemic to LLM coding agents these days and some of it is a natural consequence of modularity in which you can't really finish till all the parts are wired up, and this always requires an additional pass. In some ways the unique part of doing this with AI is the frequent astonishment the agents appear to experience when they rediscover partially completed work.\u003c/p\u003e\n\u003ch2\u003eThe gate\u003c/h2\u003e\n\u003cp\u003eM1 needed a formal gate — a defined set of criteria that must pass before the sprint can close. Like M0's gate #779, but informed by everything we'd learned since.\u003c/p\u003e\n\u003cp\u003eThe Lead Developer filed #926 with four verification areas: conversation quality, task lifecycle completeness, architectural integrity, and bug debt. Then asked the CXO and PPM to independently review and refine the criteria.\u003c/p\u003e\n\u003cp\u003eThey converged without coordinating. Both recommended fresh-account testing — spin up a new user and verify the full experience, not just individual features. Both recommended integrating the Colleague Test rubric — the CXO's \"would a knowledgeable colleague respond this way?\" heuristic, now formalized with a three-dimension scoring system and worked examples.\u003c/p\u003e\n\u003cp\u003eThe gate grew from 5 smoke queries to 9. A Colleague Test score threshold of 7+. Canonical retest target of 85% or above. Capability registry verification. Offer system precedence check. Multi-turn integration test.\u003c/p\u003e\n\u003ch2\u003eThe experience philosophy\u003c/h2\u003e\n\u003cp\u003eWhile the Lead Developer closed capability gaps and the gate took shape, the PPM resolved a thread that had been carried for ten days. Product concept decisions for #717 — what IS a Product in Piper's domain model, how does it relate to Projects, what lifecycle states does it have.\u003c/p\u003e\n\u003cp\u003eBut the bigger deliverable was PDR-004: Experience Philosophy. Four principles distilled from ten days of product decision-making:\u003c/p\u003e\n\u003cp\u003eThe Session Belongs to the User. Offer-First Activation. Piper Coordinates Understanding. The LLM Floor Guarantee.\u003c/p\u003e\n\u003cp\u003eThese weren't aspirational statements. They were extracted from actual decisions — the workflow escape commands and timeout mechanisms that ensure the user's session is always theirs, the offer-first pattern that replaced the onboarding wizard's session capture, the context assembler's role in closing the gap between what participants think they know and what's actually true, and the floor-first guarantee that Piper is always at least as good as a well-prompted LLM with context. The philosophy was already in the code. The PDR just named it.\u003c/p\u003e\n\u003ch2\u003eWhere the sprint stands\u003c/h2\u003e\n\u003cp\u003eBy Sunday evening, M1 Tiers 1 through 3 were complete. The architecture was floor-first. The dispatcher was consolidating offers. The capability registry was gating promises. GitHub close/reopen, todo completion, reminders, and lazy workflow deferral were all shipped and tested. The gate was defined and independently reviewed.\u003c/p\u003e\n\u003cp\u003eTier 4 — the PM-led decisions, the product concept work, the collaborative discovery sessions — remained. But the engineering was done. The foundation sprint was living up to its name.\u003c/p\u003e\n\u003cp\u003eAnd the first E2E smoke test was already running through `/api/v1/intent`, testing a full task lifecycle from the outside. Not unit tests checking internal behavior. An actual simulated user, typing actual queries, getting actual responses.\u003c/p\u003e\n\u003cp\u003eSeems like we must be close, right?\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eThis is Part 6 of a series about the M1 sprint. The series began with \u003ca href=\"https://pipermorgan.ai/blog/ten-roles-one-day/\"\u003eTen Roles, One Day\u003c/a\u003e and tracked through an architectural inversion, a floor that wasn't, a foundation rebuilt, and nine voices finding their first chord. The sprint isn't over. But the floor is under our feet. Next on Building Piper Morgan, \"The Migration,\" in which a series of seismic tooling shifts require us to sort out all of my projects and agents and migrate the entire team to new digs.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhen has your team reached the point where the engineering was done but the product questions remained? What did you do with that moment?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Closing Sprint\",\"excerpt\":\"Almost there! March 20–22 Pouring coffee on a Friday morning. The architecture was facing the right direction. The floor was routing as expected. The dispatcher was consolidating offers. The briefings were accurate. The mail was flowing. Now we had to finish the sprint. M1 had been organized into...\",\"url\":\"/blog/the-closing-sprint\",\"slug\":\"the-closing-sprint\",\"publishedAt\":\"Apr 14, 2026\",\"publishedAtISO\":\"2026-04-14T00:00:00.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"blog-first-cb4daa0e769e\",\"featuredImage\":\"/assets/blog-images/ai-finish.webp\",\"thumbnail\":\"/assets/blog-images/ai-finish.webp\",\"category\":\"building\",\"cluster\":\"2026-04-14\",\"workDate\":\"Mar 22, 2026\",\"workDateISO\":\"2026-03-22T00:00:00.000Z\",\"featured\":false},\"content\":{\"title\":\"The Closing Sprint\",\"content\":\"$1b\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1c:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Closing Sprint | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",
