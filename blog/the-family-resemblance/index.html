late\":[\"$\",\"$Lc\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-ab0210ff8c4483f5.js\"],\"BlogPostContent\"]\n1a:T1f4a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMarch–April 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eA few weeks ago I added a file called \u003ccode\u003eDECISIONS.md\u003c/code\u003e to one of my projects. It's a lightweight log — date, decision, rationale — meant to keep the morning-brief routine from re-litigating the same questions every Monday. The file has grown to a few dozen entries and it's saved me at least a dozen of those re-litigation cycles.\u003c/p\u003e\n\u003cp\u003eI didn't invent it. The pattern came in from a sibling project. \u003cem\u003eKlatch\u003c/em\u003e, an entity-management system being built in parallel, adopted \u003ccode\u003eDECISIONS.md\u003c/code\u003e the same day, independently, and a new project I'm doing at work for \u003ca href=\"https://openlaws.us/\"\u003eOpenLaws.us\u003c/a\u003e quickly adopted something very similar. Once the cross-pollination brief surfaced the convergence — \u003cem\u003eseveral sibling projects have the same file shape solving the same problem\u003c/em\u003e — adopting it for Piper Morgan took five minutes.\u003c/p\u003e\n\u003cp\u003eThree projects. One file. Same shape. No pre-planning or mandated coordination.\u003c/p\u003e\n\u003ch1\u003eWhat gets across\u003c/h1\u003e\n\u003cp\u003eThis kind of transfer has been happening more than I expected. Some recent examples:\u003c/p\u003e\n\u003cp\u003eThe SSH-over-port-443 workaround I now use when conference Wi-Fi blocks port 22 came in from my primary assistant on Klatch, Calliope, after one of their agents got stuck on the same network constraint. They wrote the workaround into their CLAUDE.md. The cross-pollination brief picked it up. We added it to this project's.\u003c/p\u003e\n\u003cp\u003eThe session-start protocol — \u003cem\u003echeck the cross-pollination brief, count unread mail, verify branch status\u003c/em\u003e — exists in some form in every sibling project, with variations. The Klatch version has different inboxes; the version for work emphasizes a different freshness-check; the Piper Morgan version handles role-specific session logs. The shape is recognizable. The instances are not identical.\u003c/p\u003e\n\u003cp\u003eThe handoff-memo template I use when a Chat-based agent role migrates to Code came out of a five-section structure my head-of-sapient-relations agent (HOST) drafted back in March. By the time HOST and chief innovation officer (CIO) roles had both used it, two parallel projects had picked up similar templates, with their own modifications: Klatch added a \"what I'd tell my successor that I wouldn't tell the PM\" section (omg, I love this so much). For work, a more no-nonsense context, we collapsed the relationship section into the lessons one.\u003c/p\u003e\n\u003ch1\u003eWhat doesn't get leaked\u003c/h1\u003e\n\u003cp\u003eIt's worth noticing, equally, what hasn't crossed.\u003c/p\u003e\n\u003cp\u003eThe actual project work doesn't cross. Klatch's entity model isn't being imported into Piper Morgan, OpenLaws's business info isn't getting shared at all. The domain interiors of the projects are sovereign — each one is solving its own problem, with its own data shapes, its own product surface, its own users, its own posture in terms of private, confidential, public, open, and so on.\u003c/p\u003e\n\u003cp\u003eSpecific tooling decisions also stay local. The choice to use one LLM provider over another, the particular vector store, the test-runner configuration, the CI provider — those propagate when there's a clean reason to copy them, but mostly they don't, because mostly they're shaped by constraints unique to each project.\u003c/p\u003e\n\u003cp\u003eJargon has sometimes leaked across and then has had to be retracted. A few weeks ago one of my agents read a Klatch session log, picked up a phrase about how the \"bring your own chat\" architecture model related to Step 10 of Klatch's longstanding roadmap. But Step 10 is meaningless outside of that context and \"Klatch Step 10 = BYOC\" is practically hieroglyphic.\u003c/p\u003e\n\u003cp\u003eThe vocabulary was being imported as if it carried its mechanism with it. Vocabulary doesn't always. Sometimes it's just the local name for a local thing.\u003c/p\u003e\n\u003cp\u003eSo what should come across is something narrower than \"any practice from any sibling.\" It's specifically the artifacts whose shape is general enough to make sense in another context, while their content is local enough to be filled in differently each time.\u003c/p\u003e\n\u003ch1\u003eWhy \"family resemblance\" is the right phrase\u003c/h1\u003e\n\u003cp\u003eWhen the philosopher Ludwig Wittgenstein talked about \u003cem\u003efamily resemblance\u003c/em\u003e (hey, I gotta get some use of that philosophy degree, especially with a reunion coming up next weekend, in 1879 Hall no less!) he meant the idea that members of a category share overlapping subsets of features rather than a single defining trait. This is true of the various projects I've got going at different scales that are using agentic assistance: No single feature is shared across all sibling projects in exactly the same form.\u003c/p\u003e\n\u003cp\u003eSome siblings contribute to or read the cross-pollination brief mechanism. Not all of them.\u003c/p\u003e\n\u003cp\u003eSome use a handoff memo template. Not all have adopted this.\u003c/p\u003e\n\u003cp\u003eSome have added session-start hooks. Not all have.\u003c/p\u003e\n\u003cp\u003eSome follow the DECISIONS.md file shape. Not all do.\u003c/p\u003e\n\u003cp\u003eWhat unifies the family isn't one common feature. It's the \u003cem\u003etexture of overlap.\u003c/em\u003e Project A and Project B share a brief mechanism. A and C share session-start hooks. B and C share decision logs. Each sibling resembles every other sibling along some axes and diverges along others. The family is recognizable, but if you tried to write down the single defining trait, you'd come up empty.\u003c/p\u003e\n\u003cp\u003eThis matters because the alternative, something like \u003cem\u003elet's pick one standard, document it, mandate it across siblings\u003c/em\u003e, is the thing every cross-team coordination effort tries first, and the thing that almost always produces either drift (the standard is honored in name and abandoned in practice) or rigidity (the standard prevents legitimate local variation). Family resemblance is what you get instead, when you let practices propagate through documentation and observation rather than through enforcement.\u003c/p\u003e\n\u003cp\u003eHey, I cut my teeth on the platform design team at Yahoo, seeing teams resist aligning with single sign-on, some for good reason (ahem, Flickr).\u003c/p\u003e\n\u003ch1\u003eWhat this all enables\u003c/h1\u003e\n\u003cp\u003eThe thing the family resemblance enables, that a single standard couldn't, is \u003cem\u003efast adoption with retained sovereignty.\u003c/em\u003e When DECISIONS.md showed up in the brief, I could adopt it without negotiating its shape. When the SSH-over-443 workaround arrived, I could drop it into my CLAUDE.md without checking whether some governing body had blessed it. When the Klatch project drew inspiration from Piper Morgan's handoff-template convention as a way to capture a missing layer of contextual memory, my handoff-memo template traveled to Klatch. The Klatch team could then modify it, for example adding that \"what I'd tell my successor\" section, without asking permission.\u003c/p\u003e\n\u003cp\u003eThat's a different shape of cross-project coordination than I'd seen before. It's not a federation. It's not a standards body. It's not even a community of practice in the formal sense. It's a small, opinionated set of projects with overlapping tooling and shared infrastructure, where good ideas show up in one and are visible enough that they can spread to the others, and where the spread doesn't require the projects to agree on anything beyond \u003cem\u003ethis particular shape, in this particular instance, makes sense for me too.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eI don't know yet whether this scales. Three or four sibling projects under common stewardship is one thing. Thirty might be another. But for now, the family resemblance pattern is doing real work, and the work it's doing wouldn't survive a more formal arrangement.\u003c/p\u003e\n\u003cp\u003eThe next step, where the resemblance hardens into common infrastructure rather than parallel artifacts, is the topic of another piece in this pair.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: From Protocol to Infrastructure — what happens when a shared practice stops being negotiated and becomes the environment.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your work do you see family resemblances rather than shared standards? When does that shape produce better coordination than a formal standard would have?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Family Resemblance\",\"guid\":\"blog-first-568b8b65d360\",\"url\":\"/blog/the-family-rese
