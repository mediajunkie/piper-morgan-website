$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T16be,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A calm operator sits at a large, old-fashioned switchboard, carefully plugging cables into a dense panel. Some wires glow with flowing light where connections are complete, while many others hang loose or stop just short of their sockets, showing signals cut off mid-path.\" src=\"https://cdn-images-1.medium.com/max/1024/1*J8hEiCcRyBBNIAYu8CNe5g.png\" /\u003e\u003cfigcaption\u003e“This one goes here”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eMarch 12\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe M1 sprint kicked off on a Thursday evening. The Lead Developer loaded the PPM’s sprint plan memo, opened issue #884 — canonical query retest — and ran the test harness against sixty-one standard queries.\u003c/p\u003e\u003cp\u003eFirst run: sixteen passed. Twenty-six percent.\u003c/p\u003e\u003cp\u003eThat’s a gut-check number. After shipping M0 with six thousand passing tests, after the careful retrospective and the deliberate pause, we were looking at a classifier that apparently failed three-quarters of the time. Something was very wrong.\u003c/p\u003e\u003cp\u003eOr so it seemed.\u003c/p\u003e\u003cp\u003eThe Lead Developer investigated. The first discovery: fresh user accounts were getting trapped in onboarding. Piper detected a new user, initiated the portfolio onboarding flow, and then every subsequent query got captured by that flow instead of routing to its proper handler. Seventy-three percent of test failures weren’t classifier failures — they were onboarding hijacking everything.\u003c/p\u003e\u003cp\u003eSeed some project data to bypass onboarding. Run again.\u003c/p\u003e\u003cp\u003eSecond run: twenty-nine passed. Forty-seven percent. Better, but still not good.\u003c/p\u003e\u003cp\u003eMore investigation. This time the culprit was /standup. Query forty-nine triggered the standup workflow, and the test harness was sharing a session ID across all queries. So once the standup started, every subsequent query got captured by the active workflow. Another hijack, different mechanism.\u003c/p\u003e\u003cp\u003eThe Lead Developer traced the analysis handler with Serena (our symbolic reasoning tool). The handler existed — handle_analysis_intent() was right there in the code. But the corresponding method in OrchestrationEngine? Never wired. The function existed at one layer and didn\u0026#39;t exist at the layer that calls it.\u003c/p\u003e\u003cp\u003eThis was the 75% Pattern again. Infrastructure built. Interface defined. Connection never completed. Tests don’t catch it because mocks hide the gap.\u003c/p\u003e\u003cp\u003eFix the wiring: analysis handler, create_issue adapter, GitHub auth user_id threading (ten call sites), is_configured patterns (seven more call sites).\u003c/p\u003e\u003cp\u003eThird run: thirty-nine passed. Sixty-four percent.\u003c/p\u003e\u003cp\u003eFourth run: forty-three passed. Implementation pass rate: eighty-one percent.\u003c/p\u003e\u003cp\u003eFrom 26.2% to 81.1% in a single session. Not by improving the AI. Not by retraining classifiers or tweaking prompts. By connecting things that should have been connected.\u003c/p\u003e\u003cp\u003eHere’s what the 81% session taught us:\u003c/p\u003e\u003cp\u003eMost of our failures weren’t intelligence failures. They were wiring failures. The classifier knew what the user wanted. The handler existed to fulfill it. But somewhere between classification and execution, a cable was missing.\u003c/p\u003e\u003cp\u003eThis is the Assembly Assumption appearing in M1, exactly as the retrospective predicted. The same pattern that expanded M0 from seven issues to twenty-seven was waiting in the new sprint, wearing different clothes. Onboarding hijacking queries. Standup capturing sessions. Handlers that exist but aren’t connected to their callers.\u003c/p\u003e\u003cp\u003eThe Lead Developer filed seven child issues, fixed five of them that evening, and deferred two (#888 and #889, the hijack bugs) pending UX guidance from the CXO and PPM. The hijacks aren’t simple bugs — they raise design questions about how Piper should handle users who are mid-flow when they ask unrelated questions. That’s not a wiring decision; that’s a product decision.\u003c/p\u003e\u003cp\u003eBy the end of the night, the branch had three commits, six thousand forty-seven tests passing, and a clear picture of what M1 needs: more wiring, thoughtful UX for flow interruption, and continued vigilance for the 75% Pattern.\u003c/p\u003e\u003cp\u003eThere’s a lesson here that extends beyond our specific codebase.\u003c/p\u003e\u003cp\u003eWhen AI systems underperform, the instinct is to blame the AI. The model isn’t smart enough. The training data wasn’t good enough. The prompts need more engineering. And sometimes those explanations are correct.\u003c/p\u003e\u003cp\u003eBut sometimes — maybe often — the problem is plumbing. The intelligence is there; the connections aren’t. The classifier routes correctly; the handler never gets called. The capability exists; the wiring doesn’t.\u003c/p\u003e\u003cp\u003eBefore you retrain the model, check the cables.\u003c/p\u003e\u003cp\u003eThe M1 sprint will continue. The hijack bugs will get design guidance and proper fixes. The wiring pass will happen, explicitly planned this time instead of discovered through failure. And somewhere in the codebase, the Assembly Assumption will be waiting in yet another form, because that’s what patterns do.\u003c/p\u003e\u003cp\u003eBut tonight, the pass rate is 81.1%. Not because the AI got smarter. Because the infrastructure finally connects.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, “Wiring vs. Wizardry” about the unglamorous side of making software, like, actually work.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhat problems in your work look like capability failures but might actually be connection failures?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=b851acd09a2e\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-81-session-b851acd09a2e\"\u003eThe 81% Session\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T16be,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A calm operator sits at a large, old-fashioned switchboard, carefully plugging cables into a dense panel. Some wires glow with flowing light where connections are complete, while many others hang loose or sto
