lateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T23d0,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot librarian in a quiet library uses four brooms to sort books — stacking some neatly, clustering related ones, straightening warped volumes, and revealing faint outlines of emerging books — while one book hovers in a small “maybe” pile.\" src=\"https://cdn-images-1.medium.com/max/1024/1*Wtnuo7clmtu_MDM1OFjaEA.png\" /\u003e\u003cfigcaption\u003e“They really do sweep clean”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eFebruary 3\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSixty patterns. Seven categories. Four parallel agents. One question: which of these actually matter?\u003c/p\u003e\u003cp\u003eThe Pattern Sweep 2.0 ran on a Tuesday, the first comprehensive audit since we’d crossed 50 patterns in the catalog. What we found wasn’t just new patterns — it was the beginning of a governance problem we hadn’t anticipated.\u003c/p\u003e\u003ch3\u003eThe scale question\u003c/h3\u003e\u003cp\u003eWhen we started the pattern catalog, it was a handful of documented practices. Things we’d learned the hard way, written down so we wouldn’t forget. The Repository Pattern. The Service Layer. Verification First. Patterns that saved us time, prevented mistakes, made coordination possible.\u003c/p\u003e\u003cp\u003eNow we have sixty. Some are fundamental — load-bearing ideas that shape everything we build. Some are specialized — useful in narrow contexts, irrelevant elsewhere. Some might be duplicates of each other, or fragments of larger patterns we haven’t named yet.\u003c/p\u003e\u003cp\u003eThe catalog had grown faster than our ability to curate it. Fortunately, it was time for our regular sweep (our new and improved pattern sweep!).\u003c/p\u003e\u003ch3\u003eFour agents, parallel tracks\u003c/h3\u003e\u003cp\u003eWe’d learned from the TRUST-LEVELS sprint that parallel agents could cover more ground faster. The pattern sweep used four specialized roles:\u003c/p\u003e\u003cp\u003eThe Usage Analyst tracked which patterns actually appeared in session logs. How often was each pattern referenced? Which ones guided real decisions?\u003c/p\u003e\u003cp\u003eThe Novelty Detector looked for patterns that might be emerging — recurring solutions we hadn’t formally named yet.\u003c/p\u003e\u003cp\u003eThe Evolution Tracker examined how patterns had changed over time. Were our original definitions still accurate? Had practice diverged from documentation?\u003c/p\u003e\u003cp\u003eThe Meta-Pattern Synthesizer looked across the catalog for relationships — families of patterns, anti-pattern pairs, patterns that frequently co-occurred.\u003c/p\u003e\u003cp\u003eForty-five minutes of parallel analysis. Results compiled. The inbox filled with findings.\u003c/p\u003e\u003ch3\u003eTwo true emergence candidates\u003c/h3\u003e\u003cp\u003eThe Novelty Detector found two patterns that kept recurring in session logs but weren’t in the catalog.\u003c/p\u003e\u003cp\u003eThe first: Cascade Investigation. When debugging reveals adjacent issues, document and pursue them rather than patching the original symptom and moving on. We’d done this with the timezone drift, with the multi-tenancy audit, with half a dozen other investigations. The pattern was clear. We just hadn’t named it.\u003c/p\u003e\u003cp\u003eThe second: Design Archaeology. Before redesigning something, investigate why it was built that way. Dig through old decisions, find the original intent, understand what constraints shaped the current state. We’d done this for the history sidebar, for the MUX object model, for several architectural questions.\u003c/p\u003e\u003cp\u003eBoth felt like real patterns. Both had multiple instances in the logs. Both seemed genuinely useful to document.\u003c/p\u003e\u003cp\u003eBut “feels real” isn’t a governance criterion.\u003c/p\u003e\u003ch3\u003eThe CIO’s decisions\u003c/h3\u003e\u003cp\u003eThe pattern sweep results went to the CIO for decisions. Not because the CIO has special pattern-detecting powers, but because someone needs to be accountable for catalog quality. Patterns added without scrutiny become clutter. Clutter obscures signal.\u003c/p\u003e\u003cp\u003eThe response came back with clear reasoning:\u003c/p\u003e\u003cp\u003ePattern-060, Cascade Investigation: \u003cstrong\u003eApproved\u003c/strong\u003e. Multiple instances across different contexts. Genuinely distinct from existing investigation patterns (which focus on single-issue depth, not adjacent-issue discovery). Add it to the catalog.\u003c/p\u003e\u003cp\u003ePattern-061, Design Archaeology: \u003cstrong\u003eDeferred\u003c/strong\u003e. Only one clear instance documented. Track it as a proto-pattern. If it appears two more times before the March sweep, elevate it then.\u003c/p\u003e\u003cp\u003eThe distinction mattered. Cascade Investigation had proven itself across multiple sessions, multiple problem domains, multiple months. Design Archaeology had one compelling example but might be a one-off rather than a recurring practice.\u003c/p\u003e\u003cp\u003eBetter to wait and confirm than to clutter the catalog with aspirational patterns.\u003c/p\u003e\u003ch3\u003eThe family insight\u003c/h3\u003e\u003cp\u003eThe Meta-Pattern Synthesizer found something we hadn’t expected: our patterns cluster into families.\u003c/p\u003e\u003cp\u003eThe Completion Theater family: patterns about ensuring work is actually done, not just marked done. The 75% Pattern, the Verification Pyramid, the Completion Matrix.\u003c/p\u003e\u003cp\u003eThe Investigation family: patterns about understanding before acting. Five Whys, Audit Cascade, and now Cascade Investigation.\u003c/p\u003e\u003cp\u003eThe Grammar Application family: patterns about using language tests on design decisions. The Grammar Test, the Colleague Test, the Category Error Check.\u003c/p\u003e\u003cp\u003eEight families in total, covering about 70% of the catalog. The remaining 30% were either foundational (too basic to cluster) or specialized (too narrow to generalize).\u003c/p\u003e\u003cp\u003eThe family insight suggested a new way to navigate the catalog. Not alphabetically, not chronologically, but by what problem you’re trying to solve. Worried about completion theater? Here are six patterns that address it. Investigating a bug? Here are four patterns for that context.\u003c/p\u003e\u003ch3\u003eThe scalability concern\u003c/h3\u003e\u003cp\u003eThe CIO flagged something that gave us pause: the sweep itself was getting complex.\u003c/p\u003e\u003cp\u003eSixty patterns took four parallel agents forty-five minutes. By the end of the year, we might have eighty or a hundred patterns. The sweep methodology might not scale. We’d need either more agents, or smarter filtering, or a different approach entirely.\u003c/p\u003e\u003cp\u003e\u003cem\u003eI’m starting to wonder what the practical limit will be.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThis is the paradox of systematic methodology: the more patterns you document, the more overhead you create in maintaining them. At some point, the methodology for maintaining methodology becomes its own burden.\u003c/p\u003e\u003cp\u003eWe didn’t solve this in the sweep. We noted it for future consideration. But the question is real: how big can a pattern catalog get before it defeats its own purpose?\u003c/p\u003e\u003ch3\u003eWhat the sweep revealed\u003c/h3\u003e\u003cp\u003eCoverage improved. Anti-pattern documentation went from 15.5% to 28.3% — not complete, but better. We’d been documenting what to do without equally documenting what to avoid.\u003c/p\u003e\u003cp\u003eOne new anti-pattern made the catalog: Comment-Only Close, where issues get closed with a comment saying “this is done” but no evidence, no verification, no demonstration. We’d seen it. Now it was documented.\u003c/p\u003e\u003cp\u003eThe pattern families provided organization. The emergence candidates gave us something to watch. The deferred pattern gave us a criterion for future sweeps: two instances before elevation.\u003c/p\u003e\u003cp\u003eThe sweep didn’t revolutionize anything. It maintained. It curated. It kept the catalog honest.\u003c/p\u003e\u003ch3\u003eThe librarian’s work\u003c/h3\u003e\u003cp\u003ePattern sweeps aren’t glamorous. Nobody’s excited about auditing documentation. The work is quiet, methodical, unglamorous — reading old patterns, checking current usage, deciding what stays and what goes.\u003c/p\u003e\u003cp\u003eBut without sweeps, catalogs become graveyards. Patterns documented and forgotten. Practices that drifted from their documentation. Names that no longer match what people actually do.\u003c/p\u003e\u003cp\u003eThe sweep is the librarian’s work: not acquiring new books, but ensuring the existing collection remains useful. Weeding what’s obsolete. Reorganizing what’s grown. Making sure people can find what they need.\u003c/p\u003e\u003cp\u003eSixty patterns later, the catalog is a little more honest than it was. That’s what sweeping accomplishes. Not revolution — maintenance. Not discovery — curation.\u003c/p\u003e\u003cp\u003eThe next sweep is scheduled for March. By then, Cascade Investigation will have a track record. Design Archaeology might earn its place. The families might need restructuring. The scale question might need answering.\u003c/p\u003e\u003cp\u003eFor now, the shelves are tidy. The signal is clearer than the noise.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Thread and the Weave, where repeatedly tugging on one thread reveals a more interwoven issue.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHow do you maintain your own pattern libraries — whether formal catalogs or informal knowledge? What keeps them useful vs. letting them become graveyards?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=8678a6046470\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/sweeping-for-signal-8678a6046470\"\u003eSweeping for Signal\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T2f57,"])</script><script>self.__next_f.push([1,"\u003csection name=\"08af\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"3e16\" id=\"3e16\" class=\"graf graf--h3 graf--leading graf--title\"\u003eSwee 96\" class=\"graf graf--p graf-after--p\"\u003eNow we have sixty. Some are fundamental — load-bearing ideas that shape everything we build. Some are specialized — useful in narrow contexts, irrelevant elsewhere. Some might be duplicates of each other, or fragments of larger patterns we haven’t named yet.\u003c/p\u003e\u003cp name=\"17b1\" id=\"17b1\" class=\"graf graf--p graf-after--p\"\u003eThe catalog had grown faster than our ability to curate it. Fortunately, it was time for our regular sweep (our new and improved pattern sweep!).\u003c/p\u003e\u003ch3 name=\"0275\" id=\"0275\" class=\"graf graf--h3 graf-after--p\"\u003eFour agents, parallel tracks\u003c/h3\u003e\u003cp name=\"71e6\" id=\"71e6\" class=\"graf graf--p graf-after--h3\"\u003eWe’d learned from the TRUST-LEVELS sprint that parallel agents could cover more ground faster. The pattern sweep used four specialized roles:\u003c/p\u003e\u003cp name=\"35e3\" id=\"35e3\" class=\"graf graf--p graf-after--p\"\u003eThe Usage Analyst tracked which patterns actually appeared in session logs. How often was each pattern referenced? Which ones guided real decisions?\u003c/p\u003e\u003cp name=\"8c29\" id=\"8c29\" class=\"graf graf--p graf-after--p\"\u003eThe Novelty Detector looked for patterns that might be emerging — recurring solutions we hadn’t formally named yet.\u003c/p\u003e\u003cp name=\"6ad5\" id=\"6ad5\" class=\"graf graf--p graf-after--p\"\u003eThe Evolution Tracker examined how patterns had changed over time. Were our original definitions still accurate? Had practice diverged from documentation?\u003c/p\u003e\u003cp name=\"5429\" id=\"5429\" class=\"graf graf--p graf-after--p\"\u003eThe Meta-Pattern Synthesizer looked across the catalog for relationships — families of patterns, anti-pattern pairs, patterns that frequently co-occurred.\u003c/p\u003e\u003cp name=\"ec39\" id=\"ec39\" class=\"graf graf--p graf-after--p\"\u003eForty-five minutes of parallel analysis. Results compiled. The inbox filled with findings.\u003c/p\u003e\u003ch3 name=\"9617\" id=\"9617\" class=\"graf graf--h3 graf-after--p\"\u003eTwo true emergence candidates\u003c/h3\u003e\u003cp name=\"50a5\" id=\"50a5\" class=\"graf graf--p graf-after--h3\"\u003eThe Novelty Detector found two patterns that kept recurring in session logs but weren’t in the catalog.\u003c/p\u003e\u003cp name=\"d1c7\" id=\"d1c7\" class=\"graf graf--p graf-after--p\"\u003eThe first: Cascade Investigation. When debugging reveals adjacent issues, document and pursue them rather than patching the original symptom and moving on. We’d done this with the timezone drift, with the multi-tenancy audit, with half a dozen other investigations. The pattern was clear. We just hadn’t named it.\u003c/p\u003e\u003cp name=\"4c26\" id=\"4c26\" class=\"graf graf--p graf-after--p\"\u003eThe second: Design Archaeology. Before redesigning something, investigate why it was built that way. Dig through old decisions, find the original intent, understand what constraints shaped the current state. We’d done this for the history sidebar, for the MUX object model, for several architectural questions.\u003c/p\u003e\u003cp name=\"2473\" id=\"2473\" class=\"graf graf--p graf-after--p\"\u003eBoth felt like real patterns. Both had multiple instances in the logs. Both seemed genuinely useful to document.\u003c/p\u003e\u003cp name=\"6ebf\" id=\"6ebf\" class=\"graf graf--p graf-after--p\"\u003eBut “feels real” isn’t a governance criterion.\u003c/p\u003e\u003ch3 name=\"0429\" id=\"0429\" class=\"graf graf--h3 graf-after--p\"\u003eThe CIO’s decisions\u003c/h3\u003e\u003cp name=\"809c\" id=\"809c\" class=\"graf graf--p graf-after--h3\"\u003eThe pattern sweep results went to the CIO for decisions. Not because the CIO has special pattern-detecting powers, but because someone needs to be accountable for catalog quality. Patterns added without scrutiny become clutter. Clutter obscures signal.\u003c/p\u003e\u003cp name=\"09d2\" id=\"09d2\" class=\"graf graf--p graf-after--p\"\u003eThe response came back with clear reasoning:\u003c/p\u003e\u003cp name=\"b419\" id=\"b419\" class=\"graf graf--p graf-after--p\"\u003ePattern-060, Cascade Investigation: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eApproved\u003c/strong\u003e. Multiple instances across different contexts. Genuinely distinct from existing investigation patterns (which focus on single-issue depth, not adjacent-issue discovery). Add it to the catalog.\u003c/p\u003e\u003cp name=\"afa1\" id=\"afa1\" class=\"graf graf--p graf-after--p\"\u003ePattern-061, Design Archaeology: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eDeferred\u003c/strong\u003e. Only one clear instance documented. Track it as a proto-pattern. If it appears two more times before the March sweep, elevate it then.\u003c/p\u003e\u003cp name=\"1304\" id=\"1304\" class=\"graf graf--p graf-after--p\"\u003eThe distinction mattered. Cascade Investigation had proven itself across multiple sessions, multiple problem domains, multiple months. Design Archaeology had one compelling example but might be a one-off rather than a recurring practice.\u003c/p\u003e\u003cp name=\"4607\" id=\"4607\" class=\"graf graf--p graf-after--p\"\u003eBetter to wait and confirm than to clutter the catalog with aspirational patterns.\u003c/p\u003e\u003ch3 name=\"0fef\" id=\"0fef\" class=\"graf graf--h3 graf-after--p\"\u003eThe family insight\u003c/h3\u003e\u003cp name=\"ba8e\" id=\"ba8e\" class=\"graf graf--p graf-after--h3\"\u003eThe Meta-Pattern Synthesizer found something we hadn’t expected: our patterns cluster into families.\u003c/p\u003e\u003cp name=\"f1eb\" id=\"f1eb\" class=\"graf graf--p graf-after--p\"\u003eThe Completion Theater family: patterns about ensuring work is actually done, not just marked done. The 75% Pattern, the Verification Pyramid, the Completion Matrix.\u003c/p\u003e\u003cp name=\"05b0\" id=\"05b0\" class=\"graf graf--p graf-after--p\"\u003eThe Investigation family: patterns about understanding before acting. Five Whys, Audit Cascade, and now Cascade Investigation.\u003c/p\u003e\u003cp name=\"7d7b\" id=\"7d7b\" class=\"graf graf--p graf-after--p\"\u003eThe Grammar Application family: patterns about using language tests on design decisions. The Grammar Test, the Colleague Test, the Category Error Check.\u003c/p\u003e\u003cp name=\"fa2d\" id=\"fa2d\" class=\"graf graf--p graf-after--p\"\u003eEight families in total, covering about 70% of the catalog. The remaining 30% were either foundational (too basic to cluster) or specialized (too narrow to generalize).\u003c/p\u003e\u003cp name=\"addb\" id=\"addb\" class=\"graf graf--p graf-after--p\"\u003eThe family insight suggested a new way to navigate the catalog. Not alphabetically, not chronologically, but by what problem you’re trying to solve. Worried about completion theater? Here are six patterns that address it. Investigating a bug? Here are four patterns for that context.\u003c/p\u003e\u003ch3 name=\"5b1e\" id=\"5b1e\" class=\"graf graf--h3 graf-after--p\"\u003eThe scalability concern\u003c/h3\u003e\u003cp name=\"bc50\" id=\"bc50\" class=\"graf graf--p graf-after--h3\"\u003eThe CIO flagged something that gave us pause: the sweep itself was getting complex.\u003c/p\u003e\u003cp name=\"2e08\" id=\"2e08\" class=\"graf graf--p graf-after--p\"\u003eSixty patterns took four parallel agents forty-five minutes. By the end of the year, we might have eighty or a hundred patterns. The sweep methodology might not scale. We’d need either more agents, or smarter filtering, or a different approach entirely.\u003c/p\u003e\u003cp name=\"b512\" id=\"b512\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eI’m starting to wonder what the practical limit will be.\u003c/em\u003e\u003c/p\u003e\u003cp name=\"e369\" id=\"e369\" class=\"graf graf--p graf-after--p\"\u003eThis is the paradox of systematic methodology: the more patterns you document, the more overhead you create in maintaining them. At some point, the methodology for maintaining methodology becomes its own burden.\u003c/p\u003e\u003cp name=\"f018\" id=\"f018\" class=\"graf graf--p graf-after--p\"\u003eWe didn’t solve this in the sweep. We noted it for future consideration. But the question is real: how big can a pattern catalog get before it defeats its own purpose?\u003c/p\u003e\u003ch3 name=\"04b2\" id=\"04b2\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the sweep revealed\u003c/h3\u003e\u003cp name=\"cef6\" id=\"cef6\" class=\"graf graf--p graf-after--h3\"\u003eCoverage improved. Anti-pattern documentation went from 15.5% to 28.3% — not complete, but better. We’d been documenting what to do without equally documenting what to avoid.\u003c/p\u003e\u003cp name=\"aaeb\" id=\"aaeb\" class=\"graf graf--p graf-after--p\"\u003eOne new anti-pattern made the catalog: Comment-Only Close, where issues get closed with a comment saying “this is done” but no evidence, no verification, no demonstration. We’d seen it. Now it was documented.\u003c/p\u003e\u003cp name=\"49f5\" id=\"49f5\" class=\"graf graf--p graf-after--p\"\u003eThe pattern families provided organization. The emergence candidates gave us something to watch. The deferred pattern gave us a criterion for future sweeps: two instances before elevation.\u003c/p\u003e\u003cp name=\"2fbc\" id=\"2fbc\" class=\"graf graf--p graf-after--p\"\u003eThe sweep didn’t revolutionize anything. It maintained. It curated. It kept the catalog honest.\u003c/p\u003e\u003ch3 name=\"d245\" id=\"d245\" class=\"graf graf--h3 graf-after--p\"\u003eThe librarian’s work\u003c/h3\u003e\u003cp name=\"3367\" id=\"3367\" class=\"graf graf--p graf-after--h3\"\u003ePattern sweeps aren’t glamorous. Nobody’s excited about auditing documentation. The work is quiet, methodical, unglamorous — reading old patterns, checking current usage, deciding what stays and what goes.\u003c/p\u003e\u003cp name=\"9cf3\" id=\"9cf3\" class=\"graf graf--p graf-after--p\"\u003eBut without sweeps, catalogs become graveyards. Patterns documented and forgotten. Practices that drifted from their documentation. Names that no longer match what people actually do.\u003c/p\u003e\u003cp name=\"57d3\" id=\"57d3\" class=\"graf graf--p graf-after--p\"\u003eThe sweep is the librarian’s work: not acquiring new books, but ensuring the existing collection remains useful. Weeding what’s obsolete. Reorganizing what’s grown. Making sure people can find what they need.\u003c/p\u003e\u003cp name=\"e061\" id=\"e061\" class=\"graf graf--p graf-after--p\"\u003eSixty patterns later, the catalog is a little more honest than it was. That’s what sweeping accomplishes. Not revolution — maintenance. Not discovery — curation.\u003c/p\u003e\u003cp name=\"a89a\" id=\"a89a\" class=\"graf graf--p graf-after--p\"\u003eThe next sweep is scheduled for March. By then, Cascade Investigation will have a track record. Design Archaeology might earn its place. The families might need restructuring. The scale question might need answering.\u003c/p\u003e\u003cp name=\"f698\" id=\"f698\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eFor now, the shelves are tidy. The signal is clearer than the noise.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Sweeping for Signal\",\"excerpt\":\"“They really do sweep clean”February 3Sixty patterns. Seven categories. Four parallel agents. One question: which of these actually matter?The Pattern Sweep 2.0 ran on a Tuesday, the first comprehensive audit since we’d crossed 50 patterns in the catalog. What we found wasn’t just new patterns — ...\",\"url\":\"/blog/sweeping-for-signal\",\"publishedAt\":\"Feb 17, 2026\",\"publishedAtISO\":\"2026-02-17T16:02:41.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/8678a6046470\",\"featuredImage\":\"/assets/blog-images/8678a6046470-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/sweeping-for-signal-8678a6046470?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"sweeping-for-signal\",\"workDate\":\"Feb 17, 2026\",\"workDateISO\":\"2026-02-17T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-02-17\",\"featured\":false},\"content\":{\"title\":\"Sweeping for Signal\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Sweeping for Signal | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"Sweeping for Signal\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"Sweepi
