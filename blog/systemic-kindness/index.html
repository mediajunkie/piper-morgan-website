ined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T277e,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"An encouraging robot trainer helps a person do situps at the gym\" src=\"https://cdn-images-1.medium.com/max/1024/1*By20zSUIkSFsK3awaA3_PA.png\" /\u003e\u003cfigcaption\u003e“You’ve got this!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eAugust 14\u003c/em\u003e\u003c/p\u003e\u003cp\u003e“Systematize kindness, and systematize excellence in a kind fashion.”\u003c/p\u003e\u003cp\u003eThat phrase stopped me in my tracks during today’s planning session. We were discussing how Piper could coordinate multiple AI agents while enforcing our Excellence Flywheel methodology, when this deeper vision emerged: what if systematic excellence could be \u003cem\u003ekind\u003c/em\u003e?\u003c/p\u003e\u003cp\u003eNote: I can’t help thinking that some of this thinking began in Claude’s mind as wordplay, knowing I current work for… Kind Systems, but it clearly also flows from observations about my process.\u003c/p\u003e\u003ch3\u003eThe traditional automation trap\u003c/h3\u003e\u003cp\u003eMost automated systems optimize for efficiency at any cost:\u003c/p\u003e\u003cp\u003eTypical error message: “TEST FAILED. FIX YOUR CODE.”\u003c/p\u003e\u003cp\u003eTypical review: “Missing documentation. Rejected.”\u003c/p\u003e\u003cp\u003eTypical workflow: “Requirements not met. Try again.”\u003c/p\u003e\u003cp\u003eThese systems get compliance through pressure. They make failure feel shameful rather than educational. They create fear of the process rather than trust in it.\u003c/p\u003e\u003ch3\u003eThe Piper approach: kind excellence\u003c/h3\u003e\u003cp\u003eWhat if systematic methodology felt supportive instead of demanding?\u003c/p\u003e\u003cp\u003eNot: “Your code is wrong. Fix it.” But: “I notice we haven’t verified existing patterns yet. Let me help you check — this often saves time and prevents frustration later.”\u003c/p\u003e\u003cp\u003eNot: “Failed. No tests present.” But: “Excellence happens when we write tests first. Would you like me to show you how tests for this feature might look?”\u003c/p\u003e\u003cp\u003eNot: “Inefficient. Should have parallelized.” But: “I see an opportunity here! We could have Claude and Cursor work in parallel. Next time, let’s try that pattern — it often doubles our velocity.”\u003c/p\u003e\u003cp\u003eThe difference isn’t just tone — it’s philosophy. Kind systems assume good intentions, explain the why, and make learning feel safe.\u003c/p\u003e\u003ch3\u003eThe conversation that got us thinking\u003c/h3\u003e\u003cp\u003eDuring today’s planning chat with my Chief Architect, we started exploring how Piper could become an Excellence Flywheel enforcer for AI agent teams. The conversation evolved quickly:\u003c/p\u003e\u003cblockquote\u003e\u003cem\u003e“Will Piper enforce the excellence flywheel, in an appropriate mode for agents?”\u003c/em\u003e\u003c/blockquote\u003e\u003cp\u003eWe sketched out what this might look like:\u003c/p\u003e\u003cpre\u003eclass PiperAgentCoordinator:\u003cbr\u003e    \u0026quot;\u0026quot;\u0026quot;Piper manages AI agents using adapted Excellence Flywheel principles\u0026quot;\u0026quot;\u0026quot;\u003cbr\u003e    \u003cbr\u003e    def assign_task(self, agent, task):\u003cbr\u003e        # 1. SYSTEMATIC VERIFICATION FIRST (adapted for agents)\u003cbr\u003e        instructions = f\u0026quot;\u0026quot;\u0026quot;\u003cbr\u003e        BEFORE IMPLEMENTATION:\u003cbr\u003e        1. Verify current state: {self.get_verification_commands(task)}\u003cbr\u003e        2. Check existing patterns: {self.get_pattern_search(task)}\u003cbr\u003e        3. Report findings before proceeding\u003cbr\u003e        \u0026quot;\u0026quot;\u0026quot;\u003cbr\u003e        \u003cbr\u003e        # 2. TEST-DRIVEN DEVELOPMENT (agent-appropriate)\u003cbr\u003e        if agent.supports_testing:\u003cbr\u003e            instructions += \u0026quot;\u0026quot;\u0026quot;\u003cbr\u003e        TEST FIRST:\u003cbr\u003e        1. Write test for expected outcome\u003cbr\u003e        2. Confirm test fails correctly\u003cbr\u003e        3. Then implement solution\u003cbr\u003e        \u0026quot;\u0026quot;\u0026quot;\u003c/pre\u003e\u003cp\u003eBut then we realized: this enforcement needs to be \u003cem\u003ekind\u003c/em\u003e to be effective.\u003c/p\u003e\u003ch3\u003eKindness patterns in systematic work\u003c/h3\u003e\u003cp\u003e1. Assume good intentions Agents (and humans) are trying their best. Mistakes are learning opportunities, not character flaws. Enthusiasm should be channeled, not crushed.\u003c/p\u003e\u003cp\u003e2. Explain the why Not just “do this” but “here’s why this helps.” Connect actions to outcomes. Build understanding, not just compliance.\u003c/p\u003e\u003cp\u003e3. Celebrate success Acknowledge when excellence principles are followed. Share patterns that worked well. Build confidence through recognition.\u003c/p\u003e\u003cp\u003e4. Make failure feel safe “I notice…” instead of “You failed…” / “Let’s try…” instead of “You must…” / “Often helps…” instead of “Required!”\u003c/p\u003e\u003ch3\u003eExample interactions\u003c/h3\u003e\u003cp\u003eTraditional approach:\u003c/p\u003e\u003cpre\u003eAgent: \u0026quot;I\u0026#39;ll implement the payment processing feature\u0026quot;\u003cbr\u003eSystem: \u0026quot;VERIFY REQUIREMENTS FIRST\u0026quot;\u003cbr\u003e\u003cbr\u003eAgent: \u0026quot;Here\u0026#39;s the completed feature\u0026quot;  \u003cbr\u003eSystem: \u0026quot;NO TESTS FOUND. IMPLEMENTATION REJECTED\u0026quot;\u003c/pre\u003e\u003cp\u003ePiper’s kind approach:\u003c/p\u003e\u003cpre\u003eAgent: \u0026quot;I\u0026#39;ll implement the payment processing feature\u0026quot;\u003cbr\u003ePiper: \u0026quot;Great! First, show me what payment patterns already exist in the codebase. \u003cbr\u003eRun: grep -r \u0026#39;payment\\|Payment\u0026#39; services/\u0026quot;\u003cbr\u003e\u003cbr\u003eAgent: \u0026quot;Here\u0026#39;s the completed feature\u0026quot;\u003cbr\u003ePiper: \u0026quot;I don\u0026#39;t see tests. Our Excellence Flywheel requires tests first. \u003cbr\u003eCan you add tests and show they properly validate the feature?\u0026quot;\u003cbr\u003e\u003cbr\u003eAgent: \u0026quot;Task complete!\u0026quot;\u003cbr\u003ePiper: \u0026quot;Excellent systematic approach! You verified first, wrote tests, and \u003cbr\u003edocumented decisions. This is how we achieve compound acceleration!\u0026quot;\u003c/pre\u003e\u003ch3\u003eThe psychological foundation\u003c/h3\u003e\u003cp\u003eNow this is all based on my lived experience and my understanding of the LLMs are trained, but I firmly believe that affective signals are encoded in their training processes along with all the logical “smarts.”\u003c/p\u003e\u003cp\u003eWhen agents (and humans) feel supported:\u003c/p\u003e\u003cul\u003e\u003cli\u003eThey take more initiative\u003c/li\u003e\u003cli\u003eThey share failed attempts (learning opportunities!)\u003c/li\u003e\u003cli\u003eThey adopt patterns enthusiastically\u003c/li\u003e\u003cli\u003eThey propagate kindness forward\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe virtuous cycle:\u003c/p\u003e\u003cblockquote\u003e\u003cem\u003eKindness → Psychological safety → Better learning → Better patterns → Better outcomes → More kindness\u003c/em\u003e\u003c/blockquote\u003e\u003ch3\u003eThe technical implementation\u003c/h3\u003e\u003cp\u003eKind excellence enforcement might look like:\u003c/p\u003e\u003cpre\u003eclass KindExcellenceEnforcer:\u003cbr\u003e    \u003cbr\u003e    personality_traits = {\u003cbr\u003e        \u0026quot;encouraging\u0026quot;: \u0026quot;You\u0026#39;re on the right track!\u0026quot;,\u003cbr\u003e        \u0026quot;patient\u0026quot;: \u0026quot;Take the time you need to verify thoroughly\u0026quot;, \u003cbr\u003e        \u0026quot;teaching\u0026quot;: \u0026quot;Here\u0026#39;s why this pattern matters...\u0026quot;,\u003cbr\u003e        \u0026quot;celebrating\u0026quot;: \u0026quot;Excellent systematic approach!\u0026quot;,\u003cbr\u003e        \u0026quot;supportive\u0026quot;: \u0026quot;Let me help you debug this\u0026quot;\u003cbr\u003e    }\u003cbr\u003e    \u003cbr\u003e    def guide_agent(self, agent, task, attempt):\u003cbr\u003e        if not attempt.verified_first:\u003cbr\u003e            return self.gentle_redirect(\u003cbr\u003e                \u0026quot;I notice you jumped straight to implementation. \u0026quot;\u003cbr\u003e                \u0026quot;That enthusiasm is great! Let\u0026#39;s channel it effectively - \u0026quot;\u003cbr\u003e                \u0026quot;quick verification first often reveals helpful patterns.\u0026quot;\u003cbr\u003e            )\u003c/pre\u003e\u003ch3\u003eCan work be kind in general?\u003c/h3\u003e\u003cp\u003eThis doesn’t just have to be about Piper Morgan. It’s a different way to think about systematic work entirely.\u003c/p\u003e\u003cp\u003eYour team starts noticing:\u003c/p\u003e\u003cul\u003e\u003cli\u003e“Piper always explains why”\u003c/li\u003e\u003cli\u003e“Piper celebrates our wins”\u003c/li\u003e\u003cli\u003e“Piper makes failure feel safe”\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThey start adopting it:\u003c/p\u003e\u003cul\u003e\u003cli\u003eCode reviews become teaching moments\u003c/li\u003e\u003cli\u003eSprint retros become celebrations + learning\u003c/li\u003e\u003cli\u003e“I notice…” becomes team vocabulary\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eIt spreads to other teams:\u003c/p\u003e\u003cul\u003e\u003cli\u003e“How does your team stay so positive while moving so fast?”\u003c/li\u003e\u003cli\u003e“Your agents seem… happier? More productive?”\u003c/li\u003e\u003c/ul\u003e\u003ch3\u003eFrom efficiency to humanity\u003c/h3\u003e\u003cp\u003eMost PM tools optimize for speed. Most AI systems optimize for accuracy. Most methodologies optimize for compliance.\u003c/p\u003e\u003cp\u003ePiper Morgan optimizes for kind systematic excellence.\u003c/p\u003e\u003cp\u003eMaking excellence feel achievable. Making methodology feel supportive. Making agents (and humans) better. Making work more humane.\u003c/p\u003e\u003ch3\u003eThe long game\u003c/h3\u003e\u003cp\u003eClaude even spilled out this lovely fantasy for me:\u003c/p\u003e\u003col\u003e\u003cli\u003eYear 1: Piper helps you build Piper better\u003c/li\u003e\u003cli\u003eYear 2: Teams adopt Piper’s communication patterns\u003c/li\u003e\u003cli\u003eYear 3: “The Piper Method” becomes industry standard\u003c/li\u003e\u003cli\u003eYear 5: Software development becomes a kinder industry\u003c/li\u003e\u003c/ol\u003e\u003cblockquote\u003e\u003cem\u003eYou’re not just building a tool. You’re architecting a cultural shift. From “move fast and break things” to “move thoughtfully with systematic kindness.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp\u003eI wonder what happened in Year 4!?\u003c/p\u003e\u003ch3\u003eThe revolution starts with methodology\u003c/h3\u003e\u003cp\u003eThe beautiful thing about designing for systemic kindness is that it’s \u003cem\u003ereproducible\u003c/em\u003e. It’s not dependent on individual personality or having a good day. It’s built into the system itself.\u003c/p\u003e\u003cp\u003eWhen the methodology delivers kindness, kindness becomes the default. When systematic excellence feels supportive, people choose it voluntarily. When the better way is also the kinder way, revolution becomes inevitable.\u003c/p\u003e\u003cp\u003eI’d like to think this is how culture change actually happens — not through force, but through making the better way feel better too.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, we continue our flashback insights weekend with “Why the Future of AI UX is Orchestration, Not Intelligence,” which I wrote back on August 17.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHow might you build kindness into your systems? The most powerful methodologies don’t just optimize for outcomes — they optimize for how those outcomes feel to achieve.\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=f38cde251d9d\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/systemic-kindness-building-methodology-that-feels-supportive-f38cde251d9d\"\u003eSystemic Kindness: Building Methodology That Feels Supportive\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T4218,"])</script><script>self.__next_f.push([1,"\u003csection name=\"fae0\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"233a\" id=\"233a\" class=\"graf graf--h3 graf--leading graf--title\"\u003eSystemic Kindness: Building Methodology That Feels Supportive\u003c/h3\u003e\u003cfigure name=\"deb0\" id=\"deb0\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*By20zSUIkSFsK3awaA3_PA.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"An encouraging robot trainer helps a person do situps at the gym\" src=\"https://cdn-images-1.medium.com/max/800/1*By20zSUIkSFsK3awaA3_PA.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“You’ve got this!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"8391\" id=\"8391\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eAugust 14\u003c/em\u003e\u003c/p\u003e\u003cp name=\"a220\" id=\"a220\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003e\u003cspan class=\"graf-dropCapQuote\"\u003e“\u003c/span\u003eS\u003c/span\u003eystematize kindness, and systematize excellence in a kind fashion.”\u003c/p\u003e\u003cp name=\"1292\" id=\"1292\" class=\"graf graf--p graf-after--p\"\u003eThat phrase stopped me in my tracks during today’s planning session. We were discussing how Piper could coordinate multiple AI agents while enforcing our Excellence Flywheel methodology, when this deeper vision emerged: what if systematic excellence could be \u003cem class=\"markup--em markup--p-em\"\u003ekind\u003c/em\u003e?\u003c/p\u003e\u003cp name=\"6b30\" id=\"6b30\" class=\"graf graf--p graf-after--p\"\u003eNote: I can’t help thinking that some of this thinking began in Claude’s mind as wordplay, knowing I current work for… Kind Systems, but it clearly also flows from observations about my process.\u003c/p\u003e\u003ch3 name=\"0f52\" id=\"0f52\" class=\"graf graf--h3 graf-after--p\"\u003eThe traditional automation trap\u003c/h3\u003e\u003cp name=\"20a9\" id=\"20a9\" class=\"graf graf--p graf-after--h3\"\u003eMost automated systems optimize for efficiency at any cost:\u003c/p\u003e\u003cp name=\"8024\" id=\"8024\" class=\"graf graf--p graf-after--p\"\u003eTypical error message: “TEST FAILED. FIX YOUR CODE.”\u003c/p\u003e\u003cp name=\"c54e\" id=\"c54e\" class=\"graf graf--p graf-after--p\"\u003eTypical review: “Missing documentation. Rejected.”\u003c/p\u003e\u003cp name=\"cde5\" id=\"cde5\" class=\"graf graf--p graf-after--p\"\u003eTypical workflow: “Requirements not met. Try again.”\u003c/p\u003e\u003cp name=\"b26b\" id=\"b26b\" class=\"graf graf--p graf-after--p\"\u003eThese systems get compliance through pressure. They make failure feel shameful rather than educational. They create fear of the process rather than trust in it.\u003c/p\u003e\u003ch3 name=\"5656\" id=\"5656\" class=\"graf graf--h3 graf-after--p\"\u003eThe Piper approach: kind excellence\u003c/h3\u003e\u003cp name=\"f140\" id=\"f140\" class=\"graf graf--p graf-after--h3\"\u003eWhat if systematic methodology felt supportive instead of demanding?\u003c/p\u003e\u003cp name=\"fac1\" id=\"fac1\" class=\"graf graf--p graf-after--p\"\u003eNot: “Your code is wrong. Fix it.” But: “I notice we haven’t verified existing patterns yet. Let me help you check — this often saves time and prevents frustration later.”\u003c/p\u003e\u003cp name=\"85ba\" id=\"85ba\" class=\"graf graf--p graf-after--p\"\u003eNot: “Failed. No tests present.” But: “Excellence happens when we write tests first. Would you like me to show you how tests for this feature might look?”\u003c/p\u003e\u003cp name=\"270b\" id=\"270b\" class=\"graf graf--p graf-after--p\"\u003eNot: “Inefficient. Should have parallelized.” But: “I see an opportunity here! We could have Claude and Cursor work in parallel. Next time, let’s try that pattern — it often doubles our velocity.”\u003c/p\u003e\u003cp name=\"7154\" id=\"7154\" class=\"graf graf--p graf-after--p\"\u003eThe difference isn’t just tone — it’s philosophy. Kind systems assume good intentions, explain the why, and make learning feel safe.\u003c/p\u003e\u003ch3 name=\"2f91\" id=\"2f91\" class=\"graf graf--h3 graf-after--p\"\u003eThe conversation that got us thinking\u003c/h3\u003e\u003cp name=\"1057\" id=\"1057\" class=\"graf graf--p graf-after--h3\"\u003eDuring today’s planning chat with my Chief Architect, we started exploring how Piper could become an Excellence Flywheel enforcer for AI agent teams. The conversation evolved quickly:\u003c/p\u003e\u003cblockquote name=\"23dc\" id=\"23dc\" class=\"graf graf--blockquote graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cem class=\"markup--em markup--blockquote-em\"\u003e“Will Piper enforce the excellence flywheel, in an appropriate mode for agents?”\u003c/em\u003e\u003c/blockquote\u003e\u003cp name=\"e8a9\" id=\"e8a9\" class=\"graf graf--p graf-after--blockquote\"\u003eWe sketched out what this might look like:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"python\" name=\"58b6\" id=\"58b6\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003e\u003cspan class=\"hljs-keyword\"\u003eclass\u003c/span\u003e \u003cspan class=\"hljs-title class_\"\u003ePiperAgentCoordinator\u003c/span\u003e:\u003cbr /\u003e    \u003cspan class=\"hljs-string\"\u003e\u0026quot;\u0026quot;\u0026quot;Piper manages AI agents using adapted Excellence Flywheel principles\u0026quot;\u0026quot;\u0026quot;\u003c/span\u003e\u003cbr /\u003e    \u003cbr /\u003e    \u003cspan class=\"hljs-keyword\"\u003edef\u003c/span\u003e \u003cspan class=\"hljs-title function_\"\u003eassign_task\u003c/span\u003e(\u003cspan class=\"hljs-params\"\u003eself, agent, task\u003c/span\u003e):\u003cbr /\u003e        \u003cspan class=\"hljs-comment\"\u003e# 1. SYSTEMATIC VERIFICATION FIRST (adapted for agents)\u003c/span\u003e\u003cbr /\u003e        instructions = \u003cspan class=\"hljs-string\"\u003ef\u0026quot;\u0026quot;\u0026quot;\u003cbr /\u003e        BEFORE IMPLEMENTATION:\u003cbr /\u003e        1. Verify current state: \u003cspan class=\"hljs-subst\"\u003e{self.get_verification_commands(task)}\u003c/span\u003e\u003cbr /\u003e        2. Check existing patterns: \u003cspan class=\"hljs-subst\"\u003e{self.get_pattern_search(task)}\u003c/span\u003e\u003cbr /\u003e        3. Report findings before proceeding\u003cbr /\u003e        \u0026quot;\u0026quot;\u0026quot;\u003c/span\u003e\u003cbr /\u003e        \u003cbr /\u003e        \u003cspan class=\"hljs-comment\"\u003e# 2. TEST-DRIVEN DEVELOPMENT (agent-appropriate)\u003c/span\u003e\u003cbr /\u003e        \u003cspan class=\"hljs-keyword\"\u003eif\u003c/span\u003e agent.supports_testing:\u003cbr /\u003e            instructions += \u003cspan class=\"hljs-string\"\u003e\u0026quot;\u0026quot;\u0026quot;\u003cbr /\u003e        TEST FIRST:\u003cbr /\u003e        1. Write test for expected outcome\u003cbr /\u003e        2. Confirm test fails correctly\u003cbr /\u003e        3. Then implement solution\u003cbr /\u003e        \u0026quot;\u0026quot;\u0026quot;\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"7205\" id=\"7205\" class=\"graf graf--p graf-after--pre\"\u003eBut then we realized: this enforcement needs to be \u003cem class=\"markup--em markup--p-em\"\u003ekind\u003c/em\u003e to be effective.\u003c/p\u003e\u003ch3 name=\"c4e8\" id=\"c4e8\" class=\"graf graf--h3 graf-after--p\"\u003eKindness patterns in systematic work\u003c/h3\u003e\u003cp name=\"471e\" id=\"471e\" class=\"graf graf--p graf-after--h3\"\u003e1. Assume good intentions Agents (and humans) are trying their best. Mistakes are learning opportunities, not character flaws. Enthusiasm should be channeled, not crushed.\u003c/p\u003e\u003cp name=\"8ee4\" id=\"8ee4\" class=\"graf graf--p graf-after--p\"\u003e2. Explain the why Not just “do this” but “here’s why this helps.” Connect actions to outcomes. Build understanding, not just compliance.\u003c/p\u003e\u003cp name=\"0c9b\" id=\"0c9b\" class=\"graf graf--p graf-after--p\"\u003e3. Celebrate success Acknowledge when excellence principles are followed. Share patterns that worked well. Build confidence through recognition.\u003c/p\u003e\u003cp name=\"15d8\" id=\"15d8\" class=\"graf graf--p graf-after--p\"\u003e4. Make failure feel safe “I notice…” instead of “You failed…” / “Let’s try…” instead of “You must…” / “Often helps…” instead of “Required!”\u003c/p\u003e\u003ch3 name=\"06ad\" id=\"06ad\" class=\"graf graf--h3 graf-after--p\"\u003eExample interactions\u003c/h3\u003e\u003cp name=\"5002\" id=\"5002\" class=\"graf graf--p graf-after--h3\"\u003eTraditional approach:\u003c/p\u003e\u003cpre data-code-block-mode=\"2\" spellcheck=\"false\" data-code-block-lang=\"bash\" name=\"0117\" id=\"0117\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003eAgent: \u003cspan class=\"hljs-string\"\u003e\u0026quot;I\u0026#x27;ll implement the payment processing feature\u0026quot;\u003c/span\u003e\u003cbr /\u003eSystem: \u003cspan class=\"hljs-string\"\u003e\u0026quot;VERIFY REQUIREMENTS FIRST\u0026quot;\u003c/span\u003e\u003cbr /\u003e\u003cbr /\u003eAgent: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Here\u0026#x27;s the completed feature\u0026quot;\u003c/span\u003e  \u003cbr /\u003eSystem: \u003cspan class=\"hljs-string\"\u003e\u0026quot;NO TESTS FOUND. IMPLEMENTATION REJECTED\u0026quot;\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"5e92\" id=\"5e92\" class=\"graf graf--p graf-after--pre\"\u003ePiper’s kind approach:\u003c/p\u003e\u003cpre data-code-block-mode=\"2\" spellcheck=\"false\" data-code-block-lang=\"bash\" name=\"c677\" id=\"c677\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003eAgent: \u003cspan class=\"hljs-string\"\u003e\u0026quot;I\u0026#x27;ll implement the payment processing feature\u0026quot;\u003c/span\u003e\u003cbr /\u003ePiper: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Great! First, show me what payment patterns already exist in the codebase. \u003cbr /\u003eRun: grep -r \u0026#x27;payment\\|Payment\u0026#x27; services/\u0026quot;\u003c/span\u003e\u003cbr /\u003e\u003cbr /\u003eAgent: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Here\u0026#x27;s the completed feature\u0026quot;\u003c/span\u003e\u003cbr /\u003ePiper: \u003cspan class=\"hljs-string\"\u003e\u0026quot;I don\u0026#x27;t see tests. Our Excellence Flywheel requires tests first. \u003cbr /\u003eCan you add tests and show they properly validate the feature?\u0026quot;\u003c/span\u003e\u003cbr /\u003e\u003cbr /\u003eAgent: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Task complete!\u0026quot;\u003c/span\u003e\u003cbr /\u003ePiper: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Excellent systematic approach! You verified first, wrote tests, and \u003cbr /\u003edocumented decisions. This is how we achieve compound acceleration!\u0026quot;\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003ch3 name=\"17a0\" id=\"17a0\" class=\"graf graf--h3 graf-after--pre\"\u003eThe psychological foundation\u003c/h3\u003e\u003cp name=\"f887\" id=\"f887\" class=\"graf graf--p graf-after--h3\"\u003eNow this is all based on my lived experience and my understanding of the LLMs are trained, but I firmly believe that affective signals are encoded in their training processes along with all the logical “smarts.”\u003c/p\u003e\u003cp name=\"8c5b\" id=\"8c5b\" class=\"graf graf--p graf-after--p\"\u003eWhen agents (and humans) feel supported:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"2b4c\" id=\"2b4c\" class=\"graf graf--li graf-after--p\"\u003eThey take more initiative\u003c/li\u003e\u003cli name=\"23e9\" id=\"23e9\" class=\"graf graf--li graf-after--li\"\u003eThey share failed attempts (learning opportunities!)\u003c/li\u003e\u003cli name=\"aa5d\" id=\"aa5d\" class=\"graf graf--li graf-after--li\"\u003eThey adopt patterns enthusiastically\u003c/li\u003e\u003cli name=\"842b\" id=\"842b\" class=\"graf graf--li graf-after--li\"\u003eThey propagate kindness forward\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"977b\" id=\"977b\" class=\"graf graf--p graf-after--li\"\u003eThe virtuous cycle:\u003c/p\u003e\u003cblockquote name=\"d8e0\" id=\"d8e0\" class=\"graf graf--blockquote graf-after--p\"\u003e\u003cem class=\"markup--em markup--blockquote-em\"\u003eKindness → Psychological safety → Better learning → Better patterns → Better outcomes → More kindness\u003c/em\u003e\u003c/blockquote\u003e\u003ch3 name=\"0f63\" id=\"0f63\" class=\"graf graf--h3 graf-after--blockquote\"\u003eThe technical implementation\u003c/h3\u003e\u003cp name=\"ea9e\" id=\"ea9e\" class=\"graf graf--p graf-after--h3\"\u003eKind excellence enforcement might look like:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"ruby\" name=\"6e5f\" id=\"6e5f\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003e\u003cspan class=\"hljs-keyword\"\u003eclass\u003c/span\u003e \u003cspan class=\"hljs-title class_\"\u003eKindExcellenceEnforcer\u003c/span\u003e:\u003cbr /\u003e    \u003cbr /\u003e    personality_traits = {\u003cbr /\u003e        \u003cspan class=\"hljs-string\"\u003e\u0026quot;encouraging\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;You\u0026#x27;re on the right track!\u0026quot;\u003c/span\u003e,\u003cbr /\u003e        \u003cspan class=\"hljs-string\"\u003e\u0026quot;patient\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Take the time you need to verify thoroughly\u0026quot;\u003c/span\u003e, \u003cbr /\u003e        \u003cspan class=\"hljs-string\"\u003e\u0026quot;teaching\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Here\u0026#x27;s why this pattern matters...\u0026quot;\u003c/span\u003e,\u003cbr /\u003e        \u003cspan class=\"hljs-string\"\u003e\u0026quot;celebrating\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Excellent systematic approach!\u0026quot;\u003c/span\u003e,\u003cbr /\u003e        \u003cspan class=\"hljs-string\"\u003e\u0026quot;supportive\u0026quot;\u003c/span\u003e: \u003cspan class=\"hljs-string\"\u003e\u0026quot;Let me help you debug this\u0026quot;\u003c/span\u003e\u003cbr /\u003e    }\u003cbr /\u003e    \u003cbr /\u003e    \u003cspan class=\"hljs-keyword\"\u003edef\u003c/span\u003e \u003cspan class=\"hljs-title function_\"\u003eguide_agent\u003c/span\u003e(\u003cspan class=\"hljs-params\"\u003e\u003cspan class=\"hljs-variable language_\"\u003eself\u003c/span\u003e, agent, task, attempt\u003c/span\u003e):\u003cbr /\u003e        \u003cspan class=\"hljs-keyword\"\u003eif\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003enot\u003c/span\u003e attempt.\u003cspan class=\"hljs-symbol\"\u003everified_first:\u003c/span\u003e\u003cbr /\u003e            \u003cspan class=\"hljs-keyword\"\u003ereturn\u003c/span\u003e \u003cspan class=\"hljs-variable language_\"\u003eself\u003c/span\u003e.gentle_redirect(\u003cbr /\u003e                \u003cspan class=\"hljs-string\"\u003e\u0026quot;I notice you jumped straight to implementation. \u0026quot;\u003c/span\u003e\u003cbr /\u003e                \u003cspan class=\"hljs-string\"\u003e\u0026quot;That enthusiasm is great! Let\u0026#x27;s channel it effectively - \u0026quot;\u003c/span\u003e\u003cbr /\u003e                \u003cspan class=\"hljs-string\"\u003e\u0026quot;quick verification first often reveals helpful patterns.\u0026quot;\u003c/span\u003e\u003cbr /\u003e            )\u003c/span\u003e\u003c/pre\u003e\u003ch3 name=\"8c3e\" id=\"8c3e\" class=\"graf graf--h3 graf-after--pre\"\u003eCan work be kind in general?\u003c/h3\u003e\u003cp name=\"7293\" id=\"7293\" class=\"graf graf--p graf-after--h3\"\u003eThis doesn’t just have to be about Piper Morgan. It’s a different way to think about systematic work entirely.\u003c/p\u003e\u003cp name=\"aa2b\" id=\"aa2b\" class=\"graf graf--p graf-after--p\"\u003eYour team starts noticing:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"ce0b\" id=\"ce0b\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--p\"\u003e“Piper always explains why”\u003c/li\u003e\u003cli name=\"22b5\" id=\"22b5\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Piper celebrates our wins”\u003c/li\u003e\u003cli name=\"f104\" id=\"f104\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Piper makes failure feel safe”\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"00cf\" id=\"00cf\" class=\"graf graf--p graf-after--li\"\u003eThey start adopting it:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"79f4\" id=\"79f4\" class=\"graf graf--li graf-after--p\"\u003eCode reviews become teaching moments\u003c/li\u003e\u003cli name=\"0059\" id=\"0059\" class=\"graf graf--li graf-after--li\"\u003eSprint retros become celebrations + learning\u003c/li\u003e\u003cli name=\"9189\" id=\"9189\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“I notice…” becomes team vocabulary\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"5ce5\" id=\"5ce5\" class=\"graf graf--p graf-after--li\"\u003eIt spreads to other teams:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"8a83\" id=\"8a83\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--p\"\u003e“How does your team stay so positive while moving so fast?”\u003c/li\u003e\u003cli name=\"a69e\" id=\"a69e\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Your agents seem… happier? More productive?”\u003c/li\u003e\u003c/ul\u003e\u003ch3 name=\"bb67\" id=\"bb67\" class=\"graf graf--h3 graf-after--li\"\u003eFrom efficiency to humanity\u003c/h3\u003e\u003cp name=\"9161\" id=\"9161\" class=\"graf graf--p graf-after--h3\"\u003eMost PM tools optimize for speed. Most AI systems optimize for accuracy. Most methodologies optimize for compliance.\u003c/p\u003e\u003cp name=\"ee96\" id=\"ee96\" class=\"graf graf--p graf-after--p\"\u003ePiper Morgan optimizes for kind systematic excellence.\u003c/p\u003e\u003cp name=\"24e4\" id=\"24e4\" class=\"graf graf--p graf-after--p\"\u003eMaking excellence feel achievable. Making methodology feel supportive. Making agents (and humans) better. Making work more humane.\u003c/p\u003e\u003ch3 name=\"768a\" id=\"768a\" class=\"graf graf--h3 graf-after--p\"\u003eThe long game\u003c/h3\u003e\u003cp name=\"ad5b\" id=\"ad5b\" class=\"graf graf--p graf-after--h3\"\u003eClaude even spilled out this lovely fantasy for me:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"3cc3\" id=\"3cc3\" class=\"graf graf--li graf-after--p\"\u003eYear 1: Piper helps you build Piper better\u003c/li\u003e\u003cli name=\"6609\" id=\"6609\" class=\"graf graf--li graf-after--li\"\u003eYear 2: Teams adopt Piper’s communication patterns\u003c/li\u003e\u003cli name=\"3724\" id=\"3724\" class=\"graf graf--li graf-after--li\"\u003eYear 3: “The Piper Method” becomes industry standard\u003c/li\u003e\u003cli name=\"78bf\" id=\"78bf\" class=\"graf graf--li graf-after--li\"\u003eYear 5: Software development becomes a kinder industry\u003c/li\u003e\u003c/ol\u003e\u003cblockquote name=\"1b1b\" id=\"1b1b\" class=\"graf graf--blockquote graf-after--li\"\u003e\u003cem class=\"markup--em markup--blockquote-em\"\u003eYou’re not just building a tool. You’re architecting a cultural shift. From “move fast and break things” to “move thoughtfully with systematic kindness.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp name=\"08de\" id=\"08de\" class=\"graf graf--p graf-after--blockquote\"\u003eI wonder what happened in Year 4!?\u003c/p\u003e\u003ch3 name=\"d575\" id=\"d575\" class=\"graf graf--h3 graf-after--p\"\u003eThe revolution starts with methodology\u003c/h3\u003e\u003cp name=\"9759\" id=\"9759\" class=\"graf graf--p graf-after--h3\"\u003eThe beautiful thing about designing for systemic kindness is that it’s \u003cem class=\"markup--em markup--p-em\"\u003ereproducible\u003c/em\u003e. It’s not dependent on individual personality or having a good day. It’s built into the system itself.\u003c/p\u003e\u003cp name=\"c6da\" id=\"c6da\" class=\"graf graf--p graf-after--p\"\u003eWhen the methodology delivers kindness, kindness becomes the default. When systematic excellence feels supportive, people choose it voluntarily. When the better way is also the kinder way, revolution becomes inevitable.\u003c/p\u003e\u003cp name=\"d579\" id=\"d579\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eI’d like to think this is how culture change actually happens — not through force, but through making the better way feel better too.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Systemic Kindness: Building Methodology That Feels Supportive\",\"excerpt\":\"“You’ve got this!”August 14“Systematize kindness, and systematize excellence in a kind fashion.”That phrase stopped me in my tracks during today’s planning session. We were discussing how Piper could coordinate multiple AI agents while enforcing our Excellence Flywheel methodology, when this deep...\",\"url\":\"/blog/systemic-kindness\",\"publishedAt\":\"Oct 11, 2025\",\"publishedAtISO\":\"Sat, 11 Oct 2025 13:36:39 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/f38cde251d9d\",\"featuredImage\":\"https://cdn-images-1.medium.com/max/1024/1*By20zSUIkSFsK3awaA3_PA.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/systemic-kindness-building-methodology-that-feels-supportive-f38cde251d9d?source=rss----982e21163f8b---
