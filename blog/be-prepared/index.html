emplateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-ab0210ff8c4483f5.js\"],\"BlogPostContent\"]\n1a:T2f48,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eDecember 9, 2025\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eTuesday afternoon. The T2 Sprint (Test Polish) was complete — 602 smoke tests marked, test infrastructure production-ready, six GitHub issues closed. A full epic, finished by noon.\u003c/p\u003e\n\u003cp\u003eThe S2 Sprint (Security Polish) sat waiting. Encryption at rest. Sensitive user data protection. AES-256-GCM, HKDF key derivation, GDPR compliance, SOC2 requirements. We estimated forty-two hours of implementation work across six phases.\u003c/p\u003e\n\u003cp\u003eWe could have started coding immediately. The encryption libraries were installed. The fields needing protection were identified. The implementation pattern was clear enough. Just start with the FieldEncryptionService, build out the ORM integration, write the migration scripts.\u003c/p\u003e\n\u003cp\u003eInstead, we spent five hours on preparation. No code written. No features implemented. Just thinking, documenting, and creating the conditions for implementation to succeed.\u003c/p\u003e\n\u003ch1\u003eWhat those five hours bought\u003c/h1\u003e\n\u003cp\u003eBy evening, we had:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eA comprehensive review package for Ted Nadeau\u003c/strong\u003e (our computer-science advisor):\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eThirteen specific questions about the architectural approach\u003c/li\u003e\u003cli\u003eFive Whys analysis for every major decision\u003c/li\u003e\u003cli\u003eGDPR and SOC2 compliance mapping\u003c/li\u003e\u003cli\u003eTest strategy and performance baselines\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eA 42-hour implementation gameplan\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eSix phases with detailed breakdown\u003c/li\u003e\u003cli\u003eDaily work estimates\u003c/li\u003e\u003cli\u003eAcceptance criteria for each phase\u003c/li\u003e\u003cli\u003eCode patterns and examples\u003c/li\u003e\u003cli\u003eQuick reference commands\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eFour GitHub issue templates\u003c/strong\u003e for deferred S3 work:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eEmail encryption\u003c/li\u003e\u003cli\u003eSearch on encrypted fields\u003c/li\u003e\u003cli\u003eKMS migration\u003c/li\u003e\u003cli\u003eKey rotation automation\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eInfrastructure verification\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eConfirmed cryptography library support\u003c/li\u003e\u003cli\u003eIdentified all fields requiring encryption\u003c/li\u003e\u003cli\u003eValidated no existing encryption conflicts\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eFive hours of preparatory work. Zero lines of production code.\u003c/p\u003e\n\u003ch1\u003eThe implementation that didn't happen yet\u003c/h1\u003e\n\u003cp\u003eHere's the interesting part: as of writing this, we still haven't implemented the encryption. The S2 Sprint prep is complete, and technically we're waiting for Ted's cryptographic review before we start coding.\u003c/p\u003e\n\u003cp\u003eSo we can't point to the implementation and say \"look how smoothly it went because we prepared.\" We can't measure the bugs we avoided or the refactorings we didn't need.\u003c/p\u003e\n\u003cp\u003eAnd, honestly, I don't need this for the MVP yet. To get from beta to production, yes, but to get to beta? No.\u003c/p\u003e\n\u003cp\u003eBut we can imagine two timelines:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTimeline A\u003c/strong\u003e (preparation first):\u003cbr /\u003eFive hours of upfront work. Ted reviews the architectural decisions. He spots potential issues before any code exists. We adjust the approach. When we start implementing, every major decision is already made. The questions are answered. The compliance requirements are mapped. The test strategy is clear.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTimeline B\u003c/strong\u003e (implementation first):\u003cbr /\u003eStart coding immediately. Build the FieldEncryptionService. Integrate with the ORM. Write some tests. Hit a question about key rotation. Stop and research. Hit a question about GDPR compliance. Stop and research. Realize the initial approach doesn't quite work. Refactor. Get partway through and need cryptographic review. Ted identifies architectural issues that require significant rework. Back up, redesign, reimplement.\u003c/p\u003e\n\u003cp\u003eI have lived through versions of Timeline B. It is not fun.\u003c/p\u003e\n\u003cp\u003eThe five hours we spent upfront doesn't get added to the implementation time. It replaces time we would have spent stopping, researching, backtracking, and reworking during implementation.\u003c/p\u003e\n\u003ch1\u003eThe question you can't un-ask\u003c/h1\u003e\n\u003cp\u003eThe thirteen questions we prepared for Ted aren't optional questions. They're questions the implementation will force us to answer one way or another.\u003c/p\u003e\n\u003cp\u003eQuestions like:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eHow do we handle key rotation without breaking existing encrypted data?\u003c/li\u003e\u003cli\u003eWhat's our strategy for GDPR right-to-erasure on encrypted fields?\u003c/li\u003e\u003cli\u003eHow do we balance searchability with encryption requirements?\u003c/li\u003e\u003cli\u003eWhat's the migration path to KMS once we're past alpha?\u003c/li\u003e\u003cli\u003eHow do we test encryption without exposing plaintext in logs?\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eWe can answer these questions before we write any code, with Ted's expert review, making deliberate architectural decisions.\u003c/p\u003e\n\u003cp\u003eOr we can answer them during implementation, under time pressure, while code is half-built, making expedient tactical choices that become technical debt.\u003c/p\u003e\n\u003cp\u003eThe questions exist either way. Preparatory work just changes \u003cem\u003ewhen\u003c/em\u003e and \u003cem\u003ehow\u003c/em\u003e we answer them.\u003c/p\u003e\n\u003ch1\u003eThe architectural review that saves days\u003c/h1\u003e\n\u003cp\u003eTed's review of our S2 prep package will probably take an hour or two of his time. He'll read through the architectural decisions, check our Five Whys analysis, validate the cryptographic approach, flag any issues.\u003c/p\u003e\n\u003cp\u003eIf he finds problems — and he probably will, that's why we asked for review — we adjust the gameplan before any code exists. Changing a design document takes minutes. Changing code that's half-implemented takes hours or days.\u003c/p\u003e\n\u003cp\u003eEvery issue caught in the review package is an issue that doesn't derail implementation. Every question answered upfront is a decision that doesn't block progress later.\u003c/p\u003e\n\u003cp\u003eThis is why preparatory work isn't overhead. It's front-loading the decisions, concentrating the architectural thinking, creating clear answers before the implementation pressures start.\u003c/p\u003e\n\u003ch1\u003eThe gameplan that prevents scope creep\u003c/h1\u003e\n\u003cp\u003eThe 42-hour implementation gameplan breaks the work into six phases:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePhase 0\u003c/strong\u003e: Investigation \u0026 Setup (4 hours)\u003cbr /\u003e\u003cstrong\u003ePhase 1\u003c/strong\u003e: FieldEncryptionService (8 hours)\u003cbr /\u003e\u003cstrong\u003ePhase 2\u003c/strong\u003e: ORM Integration (8 hours)\u003cbr /\u003e\u003cstrong\u003ePhase 3\u003c/strong\u003e: Data Migration (6 hours)\u003cbr /\u003e\u003cstrong\u003ePhase 4\u003c/strong\u003e: Performance Validation (4 hours)\u003cbr /\u003e\u003cstrong\u003ePhase 5\u003c/strong\u003e: Testing \u0026 Documentation (8 hours)\u003cbr /\u003e\u003cstrong\u003ePhase 6\u003c/strong\u003e: PM Handoff (4 hours)\u003c/p\u003e\n\u003cp\u003eEach phase has specific deliverables. Each phase has acceptance criteria. Each phase has test cases defined upfront.\u003c/p\u003e\n\u003cp\u003eThis isn't a detailed step-by-step plan — those never survive contact with reality. It's a framework. A way to know if you're on track or drifting. A way to recognize when you're solving problems that weren't in scope.\u003c/p\u003e\n\u003cp\u003eWhen you start implementing without a gameplan, every technical decision feels equally important. Every potential optimization seems worth pursuing. Every edge case demands attention.\u003c/p\u003e\n\u003cp\u003eWith a gameplan, you can ask: \"Is this in scope for Phase 1, or does it belong in Phase 3?\" You can defer. You can sequence. You can make conscious decisions about what to solve now versus later.\u003c/p\u003e\n\u003cp\u003eThe gameplan prevents the implementation from expanding to fill all available time. It prevents \"while we're at it\" feature creep. It prevents solving tomorrow's problems instead of today's.\u003c/p\u003e\n\u003ch1\u003eThe S3 templates that prevent future debates\u003c/h1\u003e\n\u003cp\u003eThe four GitHub issue templates for S3 (post-alpha work) might seem like pure overhead. We're not implementing those features now. Why document them?\u003c/p\u003e\n\u003cp\u003eBecause right now, in the preparation phase, we can think clearly about what's in scope and what's deferred. We can make conscious decisions about the MVP boundary. We can document why certain features aren't in S2.\u003c/p\u003e\n\u003cp\u003eThree months from now, when someone asks \"why doesn't this support encrypted search?\", we won't have to reconstruct the reasoning. We won't have debates about whether it should have been included. We'll point to the S3 template that explains exactly why encrypted search is complex, what approaches we considered, and why we deferred it to post-alpha.\u003c/p\u003e\n\u003cp\u003eThe templates turn future debates into non-debates. The decisions are already documented. The scope is already clear.\u003c/p\u003e\n\u003ch1\u003eWhat counts as \"real work\"\u003c/h1\u003e\n\u003cp\u003eThere's a persistent belief in software development that code is the only real work. That time spent not-coding is time spent not-working.\u003c/p\u003e\n\u003cp\u003eBy that measure, the five hours we spent on S2 preparation produced zero value. No features shipped. No bugs fixed. No tests written. Just documents and plans.\u003c/p\u003e\n\u003cp\u003eBut measure differently:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eQuestions answered before they block implementation: 13\u003c/li\u003e\u003cli\u003eArchitectural issues caught before code exists: Unknown, but \u003e0\u003c/li\u003e\u003cli\u003eScope creep prevented by clear gameplan: Hard to quantify, but real\u003c/li\u003e\u003cli\u003eFuture debates prevented by S3 templates: Several\u003c/li\u003e\u003cli\u003eImplementation time saved by having clear answers: Days\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eThe preparatory work \u003cem\u003eis\u003c/em\u003e the work. It's not something you do before the real work starts. It's not overhead that delays shipping. It's the architectural thinking, the decision-making, the scope-setting that determines whether implementation goes smoothly or becomes a death march.\u003c/p\u003e\n\u003ch1\u003eWhen preparation becomes procrastination\u003c/h1\u003e\n\u003cp\u003eThere's a line. You can absolutely overthink things. You can absolutely use \"preparation\" as an excuse to avoid the hard work of implementation.\u003c/p\u003e\n\u003cp\u003eSome warning signs:\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eYou're rewriting the gameplan for the third time\u003c/li\u003e\u003cli\u003eYou're researching tools instead of making decisions\u003c/li\u003e\u003cli\u003eYou're creating process documents about how to create process documents\u003c/li\u003e\u003cli\u003eYou've been \"preparing\" for weeks without starting\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eThe preparation phase should feel uncomfortable in its brevity. You should feel slightly underprepared when you finish. You should have open questions and known unknowns.\u003c/p\u003e\n\u003cp\u003eFor S2, five hours felt right. We answered the major questions. We identified the phases. We created the review package. But we didn't design every function signature or plan every test case. That would be overthinking.\u003c/p\u003e\n\u003cp\u003eThe heuristic: prepare until you know what you're building and why, then start building. You'll discover details during implementation — that's normal. But the architecture, the scope, the major decisions — those should be clear.\u003c/p\u003e\n\u003ch1\u003eThe alternative to heroics\u003c/h1\u003e\n\u003cp\u003eWithout preparatory work, complex implementations require heroics. Brilliant developers making split-second architectural decisions under pressure, pivoting when approaches don't work, debugging their way through unanticipated edge cases.\u003c/p\u003e\n\u003cp\u003eSometimes this works. Sometimes you get lucky. Sometimes the developer is experienced enough to make good decisions on the fly.\u003c/p\u003e\n\u003cp\u003eBut it's exhausting. It's error-prone. It's not sustainable. And it makes the implementation dependent on having someone brilliant and experienced available at every decision point.\u003c/p\u003e\n\u003cp\u003ePreparatory work replaces heroics with clarity. The brilliant thinking still happens — but it happens during the preparation phase, with time to consider alternatives, consult experts, and make deliberate choices.\u003c/p\u003e\n\u003cp\u003eThe implementation becomes execution rather than invention. Still challenging, still requiring skill, but without the constant cognitive load of major architectural decisions.\u003c/p\u003e\n\u003cp\u003eThat's what the five hours bought us. When we start implementing S2, we won't need heroics. We'll need careful execution of a well-thought-out plan.\u003c/p\u003e\n\u003cp\u003eAnd if we encounter problems we didn't anticipate? We'll have Ted's review to fall back on. We'll have the gameplan to revise. We'll have the architectural thinking already documented.\u003c/p\u003e\n\u003cp\u003eThe preparatory work doesn't eliminate all problems. It just ensures the problems we encounter are novel ones, not problems we could have anticipated with a few hours of careful thinking.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Permission to Pause — when the most disciplined move is to stop, even though you could keep going.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eHow do you distinguish productive preparation from procrastination in your own work? What signals tell you it's time to stop preparing and start building?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Be Prepared\",\"guid\":\"blog-first-7b980d49ad01\",\"url\":\"/blog/be-prepared\",\"publishedAt\":\"Jun 6, 2026\",\"workDate\":\"Dec 9, 2025\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/be-prepared.webp\",\"imageAlt\":\"A mountain guide and three hikers study a trail map at a trailhead while, in the distance, another hiking party encounters a series of avoidable problems including a broken bridge, a wrong turn, and a difficult cliff climb.\",\"imageCaption\":\"\\\"Everybody clear on the plan?\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"Be Prepared\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Be Prepared | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"December 9, 2025 Tuesday afternoon. The T2 Sprint (Test Polish) was complete — 602 smoke tests marked, test infrastructure production-ready, six GitHub issues closed. A full epic, finished by noon. The S2 Sprint (Security Polish) sat waiting. Encryption at rest. Sensitive user data protection. AE...\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"4\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"6\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"7\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"8\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"9\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:title\",\"content\":\"Be Prepared\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:description\",\"content\":\"December 9, 2025 Tuesday afternoon. The T2 Sprint (Test Polish) was complete — 602 smoke tests
