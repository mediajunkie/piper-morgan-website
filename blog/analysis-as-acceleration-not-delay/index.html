tyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T2a24,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot prepares to enter a maze of tangled pipes while a human beside it holds a map showing a clear, direct path through.\" src=\"https://cdn-images-1.medium.com/max/1024/1*97nOC0Joz6BTvlpehAvdLg.png\" /\u003e\u003cfigcaption\u003e“Stick to the plan”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eDecember 8, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe setup wizard needed refactoring. The main function ran 267 lines. Four separate API key sections each duplicated roughly 100 lines of nearly identical code. Not elegant, but functional, and we’d been focused on more pressing problems.\u003c/p\u003e\u003cp\u003eThe real problem was that it had an old-school command line interface (CLI) and the terminal would not allow pasting of API keys, which required either typing them perfectly (nearly impossible, at least for me) or using a complicated work around to manually add them to a file. Not only did I want to save people the ridiculous typing but I also wanted to store people’s credentials in their keychain and not in the clear in any statics files in the project.\u003c/p\u003e\u003cp\u003eMonday morning, with CRUD operations finally working and six UI polish issues resolved, we had time. Not deadline pressure, not crisis urgency, just clear space to do something right instead of just getting it done.\u003c/p\u003e\u003cp\u003eThe temptation was obvious: open the file, start refactoring, figure it out as we go. We knew the problem. We knew roughly what needed to happen. Why not just dive in?\u003c/p\u003e\u003cp\u003eInstead, we stopped and analyzed for forty-five minutes.\u003c/p\u003e\u003ch3\u003eThe planning session\u003c/h3\u003e\u003cp\u003eForty-five minutes doesn’t sound like much. But when you’re eager to start coding, when the problem seems clear, when you just want to \u003cem\u003emake progress\u003c/em\u003e, it feels like forever.\u003c/p\u003e\u003cp\u003eWe opened the file and documented what we saw. Not fixing anything yet, just understanding:\u003c/p\u003e\u003cul\u003e\u003cli\u003eMain wizard function: 267 lines, doing everything\u003c/li\u003e\u003cli\u003eFour API key collection sections: OpenAI, Anthropic, Gemini, GitHub\u003c/li\u003e\u003cli\u003eEach section: ~100 lines of nearly identical logic\u003c/li\u003e\u003cli\u003ePattern repeated four times: keychain check → environment variable check → manual entry → validation\u003c/li\u003e\u003cli\u003eTotal duplication: roughly 400 lines saying almost the same thing four different ways\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThen we asked: what would “good” look like?\u003c/p\u003e\u003cp\u003eA single helper function that handled API key collection generically. Pass in the provider name, pass in whether it’s required, pass in any special validation rules. One function replaces four duplicate implementations.\u003c/p\u003e\u003cp\u003eWe (verbally) sketched the interface. Thought through some edge cases. Identified what could be unified and what needed to stay provider-specific. Designed the solution before writing any code.\u003c/p\u003e\u003cp\u003eForty-five minutes. Then we started implementing.\u003c/p\u003e\u003ch3\u003eThe implementation\u003c/h3\u003e\u003cp\u003eTwo hours later, the refactoring was complete.\u003c/p\u003e\u003cp\u003eThe results:\u003c/p\u003e\u003cul\u003e\u003cli\u003eAPI key collection: 82% reduction (400 duplicate lines → 148-line helper)\u003c/li\u003e\u003cli\u003eMain wizard function: 71% reduction (267 lines → 76-line orchestrator)\u003c/li\u003e\u003cli\u003eAll functions under 50 lines except justified complex helpers\u003c/li\u003e\u003cli\u003eZero duplicate code blocks over 10 lines\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eBut more important than the metrics: no surprises, no backtracking, no “wait, this doesn’t work” moments halfway through. The implementation went smoothly because we’d answered all the design questions upfront.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/713/1*xe_3ILJLJH7JCBII-ogU-g.png\" /\u003e\u003cfigcaption\u003eA big improvement over the command-line wizard, trust me!\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eThe analysis meant we knew exactly what we were building. The helper function’s signature was clear. The edge cases were identified. The migration path was obvious. We didn’t discover problems during implementation because we’d already thought them through.\u003c/p\u003e\u003ch3\u003eWhy this is hard\u003c/h3\u003e\u003cp\u003eAnalysis feels like delay. It \u003cem\u003elooks\u003c/em\u003e like delay. You’re not writing code. You’re not shipping features. You’re just… thinking. Documenting. Sketching interfaces.\u003c/p\u003e\u003cp\u003eAnd there’s always a voice saying: “We could be making progress right now. We could be halfway done already. This is just planning paralysis disguised as rigor.”\u003c/p\u003e\u003cp\u003eThat voice gets louder when:\u003c/p\u003e\u003cul\u003e\u003cli\u003eThe problem seems straightforward\u003c/li\u003e\u003cli\u003eYou’re confident you understand the solution\u003c/li\u003e\u003cli\u003eYou’re eager to see results\u003c/li\u003e\u003cli\u003eSomeone (even just future-you) is waiting\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eBut here’s what that voice misses: the time you spend analyzing isn’t extra time on top of implementation. It’s time you either spend thinking carefully upfront, or spend thrashing, backtracking, and debugging later.\u003c/p\u003e\u003cp\u003eThe forty-five minutes we spent analyzing Issue #439 wasn’t forty-five minutes \u003cem\u003eadded\u003c/em\u003e to a two-hour implementation. It was forty-five minutes that prevented those two hours from becoming six hours of implementation + debugging + refactoring the refactoring.\u003c/p\u003e\u003ch3\u003eThe alternative timeline\u003c/h3\u003e\u003cp\u003eWe can imagine the other path. Start refactoring immediately. Pull out the first duplicated section into a function. Seems to work. Pull out the second section. Wait, this one’s slightly different. Modify the function. Third section — another edge case. Modify again. Fourth section — now the function’s getting messy.\u003c/p\u003e\u003cp\u003eRealize the original design doesn’t handle all the cases cleanly. Refactor the helper function. Update all the call sites. Discover that GitHub API keys have different validation rules. Add a parameter. Discover that optional vs. required keys need different handling. Add another parameter.\u003c/p\u003e\u003cp\u003eThree hours in, the helper function has seven parameters, three of which are optional, and nobody (including you) is entirely sure which combination is valid. The code works, but it’s fragile. The next person (probably you in three months) will look at it and wonder what you were thinking.\u003c/p\u003e\u003cp\u003eThat’s the thrashing tax. The cost of figuring things out during implementation instead of before it.\u003c/p\u003e\u003ch3\u003eWhat analysis buys you\u003c/h3\u003e\u003cp\u003eThe forty-five minutes of upfront analysis bought us:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClarity\u003c/strong\u003e: We knew exactly what we were building and why \u003cstrong\u003eConfidence\u003c/strong\u003e: No second-guessing during implementation \u003cstrong\u003eSpeed\u003c/strong\u003e: Two hours of smooth work instead of six hours of thrashing\u003cstrong\u003eQuality\u003c/strong\u003e: Clean interfaces, no parameter soup, obvious intent \u003cstrong\u003eDocumentation\u003c/strong\u003e: The analysis itself became the design doc\u003c/p\u003e\u003cp\u003eBut the biggest thing it bought us was \u003cem\u003efreedom\u003c/em\u003e. Freedom to implement without constantly stopping to make design decisions. Freedom to focus on getting the code right instead of figuring out what “right” even means.\u003c/p\u003e\u003cp\u003eWhen you know where you’re going, the journey is faster. When you’re figuring out the destination while you’re traveling, every step requires navigation decisions.\u003c/p\u003e\u003ch3\u003eThe timing question\u003c/h3\u003e\u003cp\u003e“But when do you know you’ve analyzed enough?”\u003c/p\u003e\u003cp\u003eGood question. Too much analysis is real — you can absolutely overthink things. But here’s a useful heuristic:\u003c/p\u003e\u003cp\u003eYou’ve analyzed enough when you can describe the solution without writing code. When you can sketch the interfaces. When you’ve identified the edge cases. When you know what success looks like.\u003c/p\u003e\u003cp\u003eFor Issue #439, that was forty-five minutes. For the S2 encryption sprint preparation, it was five hours creating a comprehensive review package. For simple bug fixes, it might be five minutes of reading the code to understand the problem.\u003c/p\u003e\u003cp\u003eThe analysis time scales with complexity and stakes. A four-line bug fix doesn’t need a design document. A cryptographic implementation that handles sensitive user data needs careful architectural review.\u003c/p\u003e\u003cp\u003eBut the principle holds: understand the problem before you solve it. Design the solution before you implement it. Think through the edge cases before you encounter them in production.\u003c/p\u003e\u003ch3\u003eThe productivity paradox\u003c/h3\u003e\u003cp\u003eThis creates an interesting productivity paradox. The day we spent forty-five minutes analyzing and two hours implementing, we closed one GitHub issue. The day before, diving straight into implementation, we closed six issues.\u003c/p\u003e\u003cp\u003eIf you’re measuring productivity by issues closed per day, analysis looks inefficient.\u003c/p\u003e\u003cp\u003eBut if you’re measuring by technical debt avoided, complexity managed, and future maintenance burden reduced, that forty-five minutes was one of the most productive investments of the week.\u003c/p\u003e\u003cp\u003eWe didn’t just fix a problem. We fixed it in a way that makes the codebase simpler, more maintainable, and easier to understand. The next time someone needs to add an API key provider, they’ll follow the pattern we established. The cognitive complexity we removed doesn’t come back.\u003c/p\u003e\u003ch3\u003eWhen to skip the analysis\u003c/h3\u003e\u003cp\u003eThere are times to skip detailed analysis:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSmall, well-understood problems\u003c/strong\u003e: If you’ve solved this exact thing before, you probably don’t need to re-analyze it.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThrowaway code\u003c/strong\u003e: Prototypes and experiments benefit from exploration. Analysis is for code you expect to keep.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTime-critical bugs\u003c/strong\u003e: If production is down, fix it first, analyze later. (But do analyze later — don’t let the emergency fix become permanent infrastructure.)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLearning exercises\u003c/strong\u003e: Sometimes the fastest way to understand a problem is to try solving it and see what breaks.\u003c/p\u003e\u003cp\u003eBut for production code that you expect to maintain, for complex problems with multiple edge cases, for refactorings that touch many files — analysis accelerates rather than delays.\u003c/p\u003e\u003cp\u003eThe setup wizard refactoring proved it. Forty-five minutes of thinking. Two hours of implementing. Zero hours of debugging, refactoring the refactor, or explaining to future-you why the code is the way it is.\u003c/p\u003e\u003cp\u003eThat’s not delay. That’s acceleration.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, we resume the build narrative with “Pattern Sweep 2.0” from February 3 and 4.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHow do you balance analysis and action in your own work? Do you have heuristics for knowing when you’ve thought enough and it’s time to build?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=f86a6e7fc648\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/analysis-as-acceleration-not-delay-f86a6e7fc648\"\u003eAnalysis as Acceleration, Not Delay\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3b87,"])</script><script>self.__next_f.push([1,"\u003csection name=\"5a14\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"0f63\" id=\"0f63\" class=\"graf graf--h3 graf--leading graf--title\"\u003eAnalysis as Acceleration, Not Delay\u003c/h3\u003e\u003cfigure name=\"7c32\" id=\"7c32\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*97nOC0Joz6BTvlpehAvdLg.png\" data-width=\"1536\" data-height=\"1024\" alt=\"A robot prepares to enter a maze of tangled pipes while a human beside it holds a map showing a clear, direct path through.\" src=\"https://cdn-images-1.medium.com/max/800/1*97nOC0Joz6BTvlpehAvdLg.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Stick to the plan”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"ed3a\" id=\"ed3a\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecember 8, 2025\u003c/em\u003e\u003c/p\u003e\u003cp name=\"d2f9\" id=\"d2f9\" class=\"graf graf--p graf-after--p\"\u003eThe setup wizard needed refactoring. The main function ran 267 lines. Four separate API key sections each duplicated roughly 100 lines of nearly identical code. Not elegant, but functional, and we’d been focused on more pressing problems.\u003c/p\u003e\u003cp name=\"a1af\" id=\"a1af\" class=\"graf graf--p graf-after--p\"\u003eThe real problem was that it had an old-school command line interface (CLI) and the terminal would not allow pasting of API keys, which required either typing them perfectly (nearly impossible, at least for me) or using a complicated work around to manually add them to a file. Not only did I want to save people the ridiculous typing but I also wanted to store people’s credentials in their keychain and not in the clear in any statics files in the project.\u003c/p\u003e\u003cp name=\"247b\" id=\"247b\" class=\"graf graf--p graf-after--p\"\u003eMonday morning, with CRUD operations finally working and six UI polish issues resolved, we had time. Not deadline pressure, not crisis urgency, just clear space to do something right instead of just getting it done.\u003c/p\u003e\u003cp name=\"97d0\" id=\"97d0\" class=\"graf graf--p graf-after--p\"\u003eThe temptation was obvious: open the file, start refactoring, figure it out as we go. We knew the problem. We knew roughly what needed to happen. Why not just dive in?\u003c/p\u003e\u003cp name=\"23b0\" id=\"23b0\" class=\"graf graf--p graf-after--p\"\u003eInstead, we stopped and analyzed for forty-five minutes.\u003c/p\u003e\u003ch3 name=\"e51b\" id=\"e51b\" class=\"graf graf--h3 graf-after--p\"\u003eThe planning session\u003c/h3\u003e\u003cp name=\"c91f\" id=\"c91f\" class=\"graf graf--p graf-after--h3\"\u003eForty-five minutes doesn’t sound like much. But when you’re eager to start coding, when the problem seems clear, when you just want to \u003cem class=\"markup--em markup--p-em\"\u003emake progress\u003c/em\u003e, it feels like forever.\u003c/p\u003e\u003cp name=\"ab5b\" id=\"ab5b\" class=\"graf graf--p graf-after--p\"\u003eWe opened the file and documented what we saw. Not fixing anything yet, just understanding:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"db5c\" id=\"db5c\" class=\"graf graf--li graf-after--p\"\u003eMain wizard function: 267 lines, doing everything\u003c/li\u003e\u003cli name=\"6901\" id=\"6901\" class=\"graf graf--li graf-after--li\"\u003eFour API key collection sections: OpenAI, Anthropic, Gemini, GitHub\u003c/li\u003e\u003cli name=\"b24e\" id=\"b24e\" class=\"graf graf--li graf-after--li\"\u003eEach section: ~100 lines of nearly identical logic\u003c/li\u003e\u003cli name=\"6cec\" id=\"6cec\" class=\"graf graf--li graf-after--li\"\u003ePattern repeated four times: keychain check → environment variable check → manual entry → validation\u003c/li\u003e\u003cli name=\"0adf\" id=\"0adf\" class=\"graf graf--li graf-after--li\"\u003eTotal duplication: roughly 400 lines saying almost the same thing four different ways\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"5e19\" id=\"5e19\" class=\"graf graf--p graf-after--li\"\u003eThen we asked: what would “good” look like?\u003c/p\u003e\u003cp name=\"317c\" id=\"317c\" class=\"graf graf--p graf-after--p\"\u003eA single helper function that handled API key collection generically. Pass in the provider name, pass in whether it’s required, pass in any special validation rules. One function replaces four duplicate implementations.\u003c/p\u003e\u003cp name=\"cf21\" id=\"cf21\" class=\"graf graf--p graf-after--p\"\u003eWe (verbally) sketched the interface. Thought through some edge cases. Identified what could be unified and what needed to stay provider-specific. Designed the solution before writing any code.\u003c/p\u003e\u003cp name=\"787e\" id=\"787e\" class=\"graf graf--p graf-after--p\"\u003eForty-five minutes. Then we started implementing.\u003c/p\u003e\u003ch3 name=\"32e0\" id=\"32e0\" class=\"graf graf--h3 graf-after--p\"\u003eThe implementation\u003c/h3\u003e\u003cp name=\"4335\" id=\"4335\" class=\"graf graf--p graf-after--h3\"\u003eTwo hours later, the refactoring was complete.\u003c/p\u003e\u003cp name=\"b25c\" id=\"b25c\" class=\"graf graf--p graf-after--p\"\u003eThe results:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"3d9d\" id=\"3d9d\" class=\"graf graf--li graf-after--p\"\u003eAPI key collection: 82% reduction (400 duplicate lines → 148-line helper)\u003c/li\u003e\u003cli name=\"ea17\" id=\"ea17\" class=\"graf graf--li graf-after--li\"\u003eMain wizard function: 71% reduction (267 lines → 76-line orchestrator)\u003c/li\u003e\u003cli name=\"5384\" id=\"5384\" class=\"graf graf--li graf-after--li\"\u003eAll functions under 50 lines except justified complex helpers\u003c/li\u003e\u003cli name=\"dca9\" id=\"dca9\" class=\"graf graf--li graf-after--li\"\u003eZero duplicate code blocks over 10 lines\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"8cb9\" id=\"8cb9\" class=\"graf graf--p graf-after--li\"\u003eBut more important than the metrics: no surprises, no backtracking, no “wait, this doesn’t work” moments halfway through. The implementation went smoothly because we’d answered all the design questions upfront.\u003c/p\u003e\u003cfigure name=\"68e5\" id=\"68e5\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*xe_3ILJLJH7JCBII-ogU-g.png\" data-width=\"713\" data-height=\"710\" src=\"https://cdn-images-1.medium.com/max/800/1*xe_3ILJLJH7JCBII-ogU-g.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003eA big improvement over the command-line wizard, trust me!\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"68b3\" id=\"68b3\" class=\"graf graf--p graf-after--figure\"\u003eThe analysis meant we knew exactly what we were building. The helper function’s signature was clear. The edge cases were identified. The migration path was obvious. We didn’t discover problems during implementation because we’d already thought them through.\u003c/p\u003e\u003ch3 name=\"58eb\" id=\"58eb\" class=\"graf graf--h3 graf-after--p\"\u003eWhy this is hard\u003c/h3\u003e\u003cp name=\"66bf\" id=\"66bf\" class=\"graf graf--p graf-after--h3\"\u003eAnalysis feels like delay. It \u003cem class=\"markup--em markup--p-em\"\u003elooks\u003c/em\u003e like delay. You’re not writing code. You’re not shipping features. You’re just… thinking. Documenting. Sketching interfaces.\u003c/p\u003e\u003cp name=\"9d4d\" id=\"9d4d\" class=\"graf graf--p graf-after--p\"\u003eAnd there’s always a voice saying: “We could be making progress right now. We could be halfway done already. This is just planning paralysis disguised as rigor.”\u003c/p\u003e\u003cp name=\"a4cf\" id=\"a4cf\" class=\"graf graf--p graf-after--p\"\u003eThat voice gets louder when:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"9319\" id=\"9319\" class=\"graf graf--li graf-after--p\"\u003eThe problem seems straightforward\u003c/li\u003e\u003cli name=\"366c\" id=\"366c\" class=\"graf graf--li graf-after--li\"\u003eYou’re confident you understand the solution\u003c/li\u003e\u003cli name=\"a79a\" id=\"a79a\" class=\"graf graf--li graf-after--li\"\u003eYou’re eager to see results\u003c/li\u003e\u003cli name=\"b0a7\" id=\"b0a7\" class=\"graf graf--li graf-after--li\"\u003eSomeone (even just future-you) is waiting\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"6693\" id=\"6693\" class=\"graf graf--p graf-after--li\"\u003eBut here’s what that voice misses: the time you spend analyzing isn’t extra time on top of implementation. It’s time you either spend thinking carefully upfront, or spend thrashing, backtracking, and debugging later.\u003c/p\u003e\u003cp name=\"d013\" id=\"d013\" class=\"graf graf--p graf-after--p\"\u003eThe forty-five minutes we spent analyzing Issue #439 wasn’t forty-five minutes \u003cem class=\"markup--em markup--p-em\"\u003eadded\u003c/em\u003e to a two-hour implementation. It was forty-five minutes that prevented those two hours from becoming six hours of implementation + debugging + refactoring the refactoring.\u003c/p\u003e\u003ch3 name=\"b36b\" id=\"b36b\" class=\"graf graf--h3 graf-after--p\"\u003eThe alternative timeline\u003c/h3\u003e\u003cp name=\"feb4\" id=\"feb4\" class=\"graf graf--p graf-after--h3\"\u003eWe can imagine the other path. Start refactoring immediately. Pull out the first duplicated section into a function. Seems to work. Pull out the second section. Wait, this one’s slightly different. Modify the function. Third section — another edge case. Modify again. Fourth section — now the function’s getting messy.\u003c/p\u003e\u003cp name=\"0ab8\" id=\"0ab8\" class=\"graf graf--p graf-after--p\"\u003eRealize the original design doesn’t handle all the cases cleanly. Refactor the helper function. Update all the call sites. Discover that GitHub API keys have different validation rules. Add a parameter. Discover that optional vs. required keys need different handling. Add another parameter.\u003c/p\u003e\u003cp name=\"83f7\" id=\"83f7\" class=\"graf graf--p graf-after--p\"\u003eThree hours in, the helper function has seven parameters, three of which are optional, and nobody (including you) is entirely sure which combination is valid. The code works, but it’s fragile. The next person (probably you in three months) will look at it and wonder what you were thinking.\u003c/p\u003e\u003cp name=\"2643\" id=\"2643\" class=\"graf graf--p graf-after--p\"\u003eThat’s the thrashing tax. The cost of figuring things out during implementation instead of before it.\u003c/p\u003e\u003ch3 name=\"0e15\" id=\"0e15\" class=\"graf graf--h3 graf-after--p\"\u003eWhat analysis buys you\u003c/h3\u003e\u003cp name=\"3af2\" id=\"3af2\" class=\"graf graf--p graf-after--h3\"\u003eThe forty-five minutes of upfront analysis bought us:\u003c/p\u003e\u003cp name=\"ddbf\" id=\"ddbf\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eClarity\u003c/strong\u003e: We knew exactly what we were building and why \u003cstrong class=\"markup--strong markup--p-strong\"\u003eConfidence\u003c/strong\u003e: No second-guessing during implementation \u003cstrong class=\"markup--strong markup--p-strong\"\u003eSpeed\u003c/strong\u003e: Two hours of smooth work instead of six hours of thrashing\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuality\u003c/strong\u003e: Clean interfaces, no parameter soup, obvious intent \u003cstrong class=\"markup--strong markup--p-strong\"\u003eDocumentation\u003c/strong\u003e: The analysis itself became the design doc\u003c/p\u003e\u003cp name=\"4b79\" id=\"4b79\" class=\"graf graf--p graf-after--p\"\u003eBut the biggest thing it bought us was \u003cem class=\"markup--em markup--p-em\"\u003efreedom\u003c/em\u003e. Freedom to implement without constantly stopping to make design decisions. Freedom to focus on getting the code right instead of figuring out what “right” even means.\u003c/p\u003e\u003cp name=\"a9d5\" id=\"a9d5\" class=\"graf graf--p graf-after--p\"\u003eWhen you know where you’re going, the journey is faster. When you’re figuring out the destination while you’re traveling, every step requires navigation decisions.\u003c/p\u003e\u003ch3 name=\"edfe\" id=\"edfe\" class=\"graf graf--h3 graf-after--p\"\u003eThe timing question\u003c/h3\u003e\u003cp name=\"f0b2\" id=\"f0b2\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--h3\"\u003e“But when do you know you’ve analyzed enough?”\u003c/p\u003e\u003cp name=\"3202\" id=\"3202\" class=\"graf graf--p graf-after--p\"\u003eGood question. Too much analysis is real — you can absolutely overthink things. But here’s a useful heuristic:\u003c/p\u003e\u003cp name=\"4b23\" id=\"4b23\" class=\"graf graf--p graf-after--p\"\u003eYou’ve analyzed enough when you can describe the solution without writing code. When you can sketch the interfaces. When you’ve identified the edge cases. When you know what success looks like.\u003c/p\u003e\u003cp name=\"8e9c\" id=\"8e9c\" class=\"graf graf--p graf-after--p\"\u003eFor Issue #439, that was forty-five minutes. For the S2 encryption sprint preparation, it was five hours creating a comprehensive review package. For simple bug fixes, it might be five minutes of reading the code to understand the problem.\u003c/p\u003e\u003cp name=\"66dc\" id=\"66dc\" class=\"graf graf--p graf-after--p\"\u003eThe analysis time scales with complexity and stakes. A four-line bug fix doesn’t need a design document. A cryptographic implementation that handles sensitive user data needs careful architectural review.\u003c/p\u003e\u003cp name=\"d45d\" id=\"d45d\" class=\"graf graf--p graf-after--p\"\u003eBut the principle holds: understand the problem before you solve it. Design the solution before you implement it. Think through the edge cases before you encounter them in production.\u003c/p\u003e\u003ch3 name=\"7854\" id=\"7854\" class=\"graf graf--h3 graf-after--p\"\u003eThe productivity paradox\u003c/h3\u003e\u003cp name=\"6512\" id=\"6512\" class=\"graf graf--p graf-after--h3\"\u003eThis creates an interesting productivity paradox. The day we spent forty-five minutes analyzing and two hours implementing, we closed one GitHub issue. The day before, diving straight into implementation, we closed six issues.\u003c/p\u003e\u003cp name=\"6d8d\" id=\"6d8d\" class=\"graf graf--p graf-after--p\"\u003eIf you’re measuring productivity by issues closed per day, analysis looks inefficient.\u003c/p\u003e\u003cp name=\"8e85\" id=\"8e85\" class=\"graf graf--p graf-after--p\"\u003eBut if you’re measuring by technical debt avoided, complexity managed, and future maintenance burden reduced, that forty-five minutes was one of the most productive investments of the week.\u003c/p\u003e\u003cp name=\"732b\" id=\"732b\" class=\"graf graf--p graf-after--p\"\u003eWe didn’t just fix a problem. We fixed it in a way that makes the codebase simpler, more maintainable, and easier to understand. The next time someone needs to add an API key provider, they’ll follow the pattern we established. The cognitive complexity we removed doesn’t come back.\u003c/p\u003e\u003ch3 name=\"1a05\" id=\"1a05\" class=\"graf graf--h3 graf-after--p\"\u003eWhen to skip the analysis\u003c/h3\u003e\u003cp name=\"97f9\" id=\"97f9\" class=\"graf graf--p graf-after--h3\"\u003eThere are times to skip detailed analysis:\u003c/p\u003e\u003cp name=\"651d\" id=\"651d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSmall, well-understood problems\u003c/strong\u003e: If you’ve solved this exact thing before, you probably don’t need to re-analyze it.\u003c/p\u003e\u003cp name=\"86b1\" id=\"86b1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThrowaway code\u003c/strong\u003e: Prototypes and experiments benefit from exploration. Analysis is for code you expect to keep.\u003c/p\u003e\u003cp name=\"2dfb\" id=\"2dfb\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTime-critical bugs\u003c/strong\u003e: If production is down, fix it first, analyze later. (But do analyze later — don’t let the emergency fix become permanent infrastructure.)\u003c/p\u003e\u003cp name=\"d283\" id=\"d283\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLearning exercises\u003c/strong\u003e: Sometimes the fastest way to understand a problem is to try solving it and see what breaks.\u003c/p\u003e\u003cp name=\"eb8f\" id=\"eb8f\" class=\"graf graf--p graf-after--p\"\u003eBut for production code that you expect to maintain, for complex problems with multiple edge cases, for refactorings that touch many files — analysis accelerates rather than delays.\u003c/p\u003e\u003cp name=\"eae2\" id=\"eae2\" class=\"graf graf--p graf-after--p\"\u003eThe setup wizard refactoring proved it. Forty-five minutes of thinking. Two hours of implementing. Zero hours of debugging, refactoring the refactor, or explaining to future-you why the code is the way it is.\u003c/p\u003e\u003cp name=\"d28c\" id=\"d28c\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThat’s not delay. That’s acceleration.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Analysis as Acceleration, Not Delay\",\"excerpt\":\"“Stick to the plan”December 8, 2025The setup wizard needed refactoring. The main function ran 267 lines. Four separate API key sections each duplicated roughly 100 lines of nearly identical code. Not elegant, but functional, and we’d been focused on more pressing problems.The real problem was tha...\",\"url\":\"/blog/analysis-as-acceleration-not-delay\",\"publishedAt\":\"Feb 15, 2026\",\"publishedAtISO\":\"Sun, 15 Feb 2026 14:28:39 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/f86a6e7fc648\",\"featuredImage\":\"https://cdn-images-1.medium.com/max/1024/1*97nOC0Joz6BTvlpehAvdLg.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/analysis-as-acceleration-not-delay-f86a6e7fc648?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"analysis-as-acceleration-not-delay\",\"workDate\":\"Feb 15, 2026\",\"workDateISO\":\"2026-02-15T00:00:00.000Z\",\"category\":\"insight\"},\"content\":{\"title\":\"Analysis as Acceleration, Not Delay\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Analysis as Acceleration, Not Delay | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"Analysis as Acceleration, Not Delay\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"Analysis as Acceleration, Not Delay\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
