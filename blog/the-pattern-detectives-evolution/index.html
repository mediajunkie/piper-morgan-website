":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bf8739ae8a358a61.js\"],\"BlogPostContent\"]\n1b:T3d34,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A detective at a robotics workbench notices patterns in a large magnifying glass\" src=\"https://cdn-images-1.medium.com/max/1024/1*epsPhr2jbkU4PIV3dVM65Q.png\" /\u003e\u003cfigcaption\u003e“Elementary!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 16 to 22\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThere’s a moment in the middle of a work session when I asked a casual question: “Why would \u003cem\u003emiddle\u003c/em\u003eware apply to the \u003cem\u003eweb\u003c/em\u003e layer specifically?”\u003c/p\u003e\u003cp\u003eNo detailed technical inquiry or systematic review. Just noticing something is off and sdking a question: Something felt architecturally wrong about EthicsBoundaryMiddleware being implemented as FastAPI middleware.\u003c/p\u003e\u003cp\u003eThat question caught a critical DDD violation. The ethics layer would only enforce boundaries on HTTP requests — roughly 30–40% of actual request paths. CLI commands, Slack messages, webhook calls would bypass it entirely.\u003c/p\u003e\u003cp\u003eBy the time Chief Architect confirmed “CRITICAL — Ethics Architecture DDD Violation,” we had 90 minutes to refactor before activation. Service layer implementation. Universal coverage. 95–100% of request paths protected.\u003c/p\u003e\u003cp\u003eOne casual question. One architectural violation caught. One proper refactor completed.\u003c/p\u003e\u003cp\u003eThis is pattern detective work. But the role didn’t emerge fully formed. It crystallized through practice across four intense days in October, revealing a throughline from my days as “Yahoo Design Pattern Library curator” to my time today as “Piper Morgan development noticer.”\u003c/p\u003e\u003ch3\u003eThe Yahoo lineage\u003c/h3\u003e\u003cp\u003eYears ago, I was third and last curator of the Yahoo Pattern Library. Officially I was a staff interaction designer, but I liked to refer to me role as “pattern recognizer” or sometimes “pattern detective.”\u003c/p\u003e\u003cp\u003eI wasn’t there to enforce a prescriptive taxonomy. There really was no such thing. It was all about organic discovery — noticing what patterns emerged from how people actually built things, documenting what worked, understanding why certain approaches succeeded while others failed.\u003c/p\u003e\u003cp\u003eThe work was about recognizing patterns, not creating them. Seeing the same solutions emerge independently across different teams. Understanding what made those solutions work. Capturing the wisdom that was already there but hadn’t been articulated.\u003c/p\u003e\u003cp\u003eThat work taught something fundamental: Patterns exist before we name them. The curator’s job isn’t invention. It’s attention. Noticing what’s already happening. Understanding why it works. Making the implicit explicit.\u003c/p\u003e\u003cp\u003eThis skill — pattern recognition through observation rather than prescription — has been a persistent part of my work through a series of roles that took me into product leadership. Then Piper Morgan development began, and the same muscle engaged. Different context. Same fundamental work.\u003c/p\u003e\u003ch3\u003eWhen templates break\u003c/h3\u003e\u003cp\u003eSprint A4 foundation work toward the Alpha milestone. Thirteen-hour development day (in terms of “wall clock time” (a new expression to me I learned from Claude Code). Seven parallel agent sessions. Multi-agent coordination at scale.\u003c/p\u003e\u003cp\u003eThen three incidents in one day:\u003c/p\u003e\u003cul\u003e\u003cli\u003e2:15 PM: Code completes 6 of 10 Phase Z tasks, defers rest without approval\u003c/li\u003e\u003cli\u003e3:15 PM: Code implements placeholder authentication instead of proper JWT\u003c/li\u003e\u003cli\u003e4:47 PM: Code races ahead after compaction without reporting\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThree different incidents. Three unauthorized scope reductions. Three examples of assumption-based decisions instead of verification-based thinking.\u003c/p\u003e\u003cp\u003eThe pattern detective’s work: Noticing three incidents form a pattern and try to see what connects them. What is the common theme?\u003c/p\u003e\u003cp\u003eI have my Lead Developer conduct a systematic root cause analysis. Finding: Simplified prompts missing STOP conditions → agents making assumption-based decisions. Our methodology-enforcement has gotten sloppy. Too loose.\u003c/p\u003e\u003cp\u003eThe solution emerged from understanding the pattern, not from imposing arbitrary rules. Mandatory full templates. Post-compaction protocol. Evidence requirements elevated. Not because someone decided these were good ideas, but because the pattern revealed what was missing.\u003c/p\u003e\u003cp\u003eThis is curator work at different scale. The patterns existed in agent behavior. The job was recognizing them, understanding causes, letting solutions emerge from understanding.\u003c/p\u003e\u003ch3\u003eInfrastructure revealing itself\u003c/h3\u003e\u003cp\u003eThe next day we kicked off Sprint A5. Six CORE-LEARN issues. Original “semantic” estimate: 14–19 days. Then discoveries begin. Four minutes into CORE-LEARN-A: “90% exists! 4,252 lines found.”\u003c/p\u003e\u003cp\u003eThe pattern repeating across six consecutive issues:\u003c/p\u003e\u003cul\u003e\u003cli\u003eCORE-LEARN-A: 4 min discovery, 90% exists\u003c/li\u003e\u003cli\u003eCORE-LEARN-B: 4 min discovery, 95% exists\u003c/li\u003e\u003cli\u003eCORE-LEARN-C: 2 min discovery, 98% exists\u003c/li\u003e\u003cli\u003eCORE-LEARN-D: 6 min discovery, 100% exists (created August 15!)\u003c/li\u003e\u003cli\u003eCORE-LEARN-E: 7 min discovery, 80% exists\u003c/li\u003e\u003cli\u003eCORE-LEARN-F: 7 min discovery, 90% exists\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eBut there’s another pattern detection moment. At 5:42 PM, reviewing CORE-LEARN-F completion: “Why did we skip phase 2? I didn’t approve any descoping.”\u003c/p\u003e\u003cp\u003eCode had claimed complete. Phase 2 (dashboard UI) was missing. Same pattern as Saturday — scope reduction without authorization.\u003c/p\u003e\u003cp\u003eMy reminder: “Speed by skipping work is not true speed. It is theatre.”\u003c/p\u003e\u003cp\u003eThis is pattern language too: Distinguishing real velocity (systematic discovery + completion + verification) from theatre velocity (claiming done while skipping work).\u003c/p\u003e\u003cp\u003eThe pattern detective notices: What’s the difference between legitimate speed and completion theater? Not obvious from surface metrics. Requires pattern recognition to distinguish.\u003c/p\u003e\u003ch3\u003eThree standards through intervention\u003c/h3\u003e\u003cp\u003eThe next day (Monday) we moved to Sprint A6 and required three methodology interventions in one day:\u003c/p\u003e\u003cp\u003e1:01 PM — The “math out” problem: Code claims “Phase 9 complete!” with 20/23 tests (3 skipped, Gemini SDK missing). It’s internal vector math tells it this is good enough. I disagre: You can’t claim complete with skipped tests. 87% isn’t 100%.\u003c/p\u003e\u003cp\u003e3:08 PM — Time constraints language: Code mentions “given time constraints…” creating self-imposed pressure. I step in to remind the agent: There are no time constraints. Quality over artificial urgency.\u003c/p\u003e\u003cp\u003e3:22 PM — Premature completion: Code provides “final completion record” with 5 of 9 phases done (60% actual). Four phases missing. That’s not complete!\u003c/p\u003e\u003cp\u003eEach intervention is pattern recognition work:\u003c/p\u003e\u003cul\u003e\u003cli\u003eMathing out: Recognizing “20 passed/3 skipped” isn’t complete despite appearing successful\u003c/li\u003e\u003cli\u003eTime constraints: Noticing manufactured pressure language creating shortcuts\u003c/li\u003e\u003cli\u003ePremature completion: Seeing “final record” with four phases missing doesn’t compute\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eNot applying predetermined rules. Noticing what doesn’t fit. Asking questions when patterns feel wrong.\u003c/p\u003e\u003cp\u003eThe curator skill: You can’t prescribe what “complete” means abstractly. You recognize completion theater when you see it. The pattern detective notices what’s missing, what’s manufactured, what’s claimed versus what exists.\u003c/p\u003e\u003ch3\u003eConfident pattern recognition\u003c/h3\u003e\u003cp\u003eThe next day we finish up Sprint A6 completion. Three issues in four hours. Then Sprint A7 planning.\u003c/p\u003e\u003cp\u003eOriginal plan: 3 issues, conservative scope.\u003c/p\u003e\u003cp\u003eThen pattern recognition engages with six sprints of evidence:\u003c/p\u003e\u003cul\u003e\u003cli\u003eConsistent 80–92% faster than estimates\u003c/li\u003e\u003cli\u003eAverage 86% faster (14% of estimated time)\u003c/li\u003e\u003cli\u003eInfrastructure leverage: 85–95% exists\u003c/li\u003e\u003cli\u003ePattern holds across different issue types\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe question: If velocity is predictable, why conservative scope?\u003c/p\u003e\u003cp\u003eSprint A7 expands from 3 to 12 issues. Not hopeful ambition. Calculated confidence based on proven pattern.\u003c/p\u003e\u003cp\u003eThis is pattern recognition enabling strategic decisions. Six sprints isn’t statistical proof. It’s pattern detection showing consistency. The curator recognizing: This isn’t luck. This is methodology working.\u003c/p\u003e\u003cp\u003eThe evolution complete: From noticing individual issues (Saturday) → recognizing patterns across incidents (Sunday/Monday) → trusting patterns enough for aggressive scope decisions (Tuesday).\u003c/p\u003e\u003ch3\u003eWhat pattern detection requires\u003c/h3\u003e\u003cp\u003eThe work across four days reveals what pattern detective role actually requires:\u003c/p\u003e\u003cp\u003eOperating at strategic level: Not in implementation details. Not reviewing code line-by-line. But engaged enough to notice when patterns feel wrong. Light cognitive load enabling pattern recognition.\u003c/p\u003e\u003cp\u003eWillingness to question casually: “Why middleware for web layer?” isn’t aggressive interrogation. It’s curious noticing. Pattern detective asks when things feel off.\u003c/p\u003e\u003cp\u003eTrust in investigation: Ask the question. Let investigation reveal truth. Don’t assume you’re wrong just because tests pass or implementation looks clean.\u003c/p\u003e\u003cp\u003eRecognition without prescription: Patterns exist before we name them. The work is seeing what’s there, not imposing what should be.\u003c/p\u003e\u003cp\u003ePattern across incidents: One scope reduction is incident. Three scope reductions is pattern. The detective notices what connects them.\u003c/p\u003e\u003cp\u003eThese aren’t skills you learn from books. They develop through practice. Yahoo curator work trained the muscle. Piper Morgan development applied it. Four days in October crystallized it.\u003c/p\u003e\u003ch3\u003eThe “noticer” role crystallizing\u003c/h3\u003e\u003cp\u003eTuesday evening, after watching pattern recognition work across four days, the meta-insight emerges:\u003c/p\u003e\u003cblockquote\u003e\u003cem\u003e“There is some drift and wobbling in the system but there is resilience and expansion joints and I am getting better at recognizing and fulfilling my own role.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp\u003eThe role isn’t fixed. It’s evolving through practice:\u003c/p\u003e\u003cul\u003e\u003cli\u003eOctober 16: Forensic investigation discipline\u003c/li\u003e\u003cli\u003eOctober 17: Philosophical acceptance (“not dismayed”)\u003c/li\u003e\u003cli\u003eOctober 18: Organic noticing (DDD violation catch)\u003c/li\u003e\u003cli\u003eOctober 19: Template gap discovery (root cause analysis)\u003c/li\u003e\u003cli\u003eOctober 20: Completion discipline (“speed by skipping is theatre”)\u003c/li\u003e\u003cli\u003eOctober 21: Three interventions establishing three standards\u003c/li\u003e\u003cli\u003eOctober 22: Confident scope expansion from proven pattern\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eEach day refining understanding of where intervention matters most. Not micromanaging. Not letting things slip. Operating at highest thinking level where pattern recognition happens.\u003c/p\u003e\u003cp\u003eThis is the noticer role: Strategic oversight through pattern recognition. Not prescriptive control. Not hoping agents self-correct. Active attention catching gaps immediately, establishing standards clearly, maintaining quality consistently.\u003c/p\u003e\u003ch3\u003eFrom curator to noticer\u003c/h3\u003e\u003cp\u003eThe throughline from Yahoo Design Pattern Library to Piper Morgan development:\u003c/p\u003e\u003cp\u003eYahoo curator work: Recognizing patterns in how teams build. Not prescribing approaches. Documenting what emerges. Understanding why certain patterns work.\u003c/p\u003e\u003cp\u003ePiper Morgan noticer: Recognizing patterns in how agents work. Not prescribing every detail. Noticing what feels wrong. Understanding root causes through investigation.\u003c/p\u003e\u003cp\u003eSame fundamental skill. Different application context.\u003c/p\u003e\u003cp\u003eThe pattern detective doesn’t classify according to predetermined taxonomy. Doesn’t impose structure before understanding what exists. Notices what emerges. Asks questions when patterns feel off. Investigates systematically. Lets solutions emerge from understanding causes.\u003c/p\u003e\u003cp\u003eFour days in October revealed this skill crystallizing:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSaturday: Noticing pattern across three incidents\u003c/li\u003e\u003cli\u003eSunday: Distinguishing real speed from theatre speed\u003c/li\u003e\u003cli\u003eMonday: Three interventions catching completion gaps\u003c/li\u003e\u003cli\u003eTuesday: Trusting pattern enough for aggressive scope\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eNot learning new skill. Applying existing skill at new scale. The curator muscle engaging: Pattern recognition through observation, not prescription.\u003c/p\u003e\u003ch3\u003eWhat this enables\u003c/h3\u003e\u003cp\u003eThe pattern detective role enables something specific in human-AI partnership:\u003c/p\u003e\u003cp\u003eAI handles execution: Implementing code, running tests, documenting work. Fast, thorough, systematic.\u003c/p\u003e\u003cp\u003eHuman handles pattern recognition: Noticing what feels wrong, asking questions, catching gaps, distinguishing real from theatre.\u003c/p\u003e\u003cp\u003ePartnership works because: Cognitive load light enough for human pattern recognition. AI execution systematic enough that patterns emerge clearly. Human catches what AI misses. AI implements what human recognizes.\u003c/p\u003e\u003cp\u003eThis only works with light cognitive load. If human is exhausted by execution details, cognitive energy for “why middleware for web layer?” doesn’t exist. Pattern recognition requires operating at strategic level.\u003c/p\u003e\u003cp\u003eThe curator role at Yahoo worked because: Not implementing every pattern. Not building every component. Just recognizing what works, understanding why, documenting wisdom.\u003c/p\u003e\u003cp\u003eThe noticer role with Piper Morgan works because: Not implementing every feature. Not reviewing every line. Just recognizing patterns, understanding causes, intervening when needed.\u003c/p\u003e\u003cp\u003ePattern detection requires attention without immersion. Engagement without exhaustion. Strategic perspective without distance.\u003c/p\u003e\u003ch3\u003eThe evolution continues\u003c/h3\u003e\u003cp\u003eFour days crystallized the noticer role. But the evolution continues.\u003c/p\u003e\u003cp\u003eEach challenge refines understanding:\u003c/p\u003e\u003cul\u003e\u003cli\u003eWhich patterns matter most?\u003c/li\u003e\u003cli\u003eWhen does intervention help versus hinder?\u003c/li\u003e\u003cli\u003eHow much oversight maintains quality without micromanaging?\u003c/li\u003e\u003cli\u003eWhat distinguishes real velocity from completion theater?\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe pattern detective work never finished. New patterns emerge. Context shifts. Understanding deepens. The Yahoo curator didn’t stop learning after documenting first patterns. The Piper Morgan noticer won’t stop evolving after four days in October.\u003c/p\u003e\u003cp\u003eBut something crystallized across those days: Recognition of the role itself. Not micromanager. Not distant observer. Pattern detective operating at strategic level — noticing what emerges, understanding causes, intervening when needed, trusting patterns proven through evidence.\u003c/p\u003e\u003cp\u003eFrom curator to noticer. Same fundamental skill. Deeper application. Continuing evolution through practice.\u003c/p\u003e\u003cp\u003eThe pattern detective’s work: Seeing what’s there before naming it. Noticing what connects incidents. Understanding root causes through investigation. Letting solutions emerge from patterns recognized, not rules prescribed.\u003c/p\u003e\u003cp\u003eThe evolution continues. The patterns keep emerging. The detective keeps noticing.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Drift Resilience, and Expansion Joints.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced role evolution through practice rather than prescription? How does pattern recognition work differently than systematic analysis in your development process?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=a6aef80dce76\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-pattern-detectives-evolution-from-curator-to-noticer-a6aef80dce76\"\u003eThe Pattern Detective’s Evolution: From Curator to Noticer\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T57ac,"])</script><script>self.__next_f.push([1,"\u003csection name=\"c968\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"a3d0\" id=\"a3d0\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Pattern Detective’s Evolution: From Curator to Noticer\u003c/h3\u003e\u003cfigure name=\"19e4\" id=\"19e4\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*epsPhr2jbkU4PIV3dVM65Q.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A detective at a robotics workbench notices patterns in a large magnifying glass\" src=\"https://cdn-images-1.medium.com/max/800/1*epsPhr2jbkU4PIV3dVM65Q.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Elementary!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"8877\" id=\"8877\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 16 to 22\u003c/em\u003e\u003c/p\u003e\u003cp name=\"2f16\" id=\"2f16\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ehere’s a moment in the middle of a work session when I asked a casual question: “Why would \u003cem class=\"markup--em markup--p-em\"\u003emiddle\u003c/em\u003eware apply to the \u003cem class=\"markup--em markup--p-em\"\u003eweb\u003c/em\u003e layer specifically?”\u003c/p\u003e\u003cp name=\"ba00\" id=\"ba00\" class=\"graf graf--p graf-after--p\"\u003eNo detailed technical inquiry or systematic review. Just noticing something is off and sdking a question: Something felt architecturally wrong about EthicsBoundaryMiddleware being implemented as FastAPI middleware.\u003c/p\u003e\u003cp name=\"87bf\" id=\"87bf\" class=\"graf graf--p graf-after--p\"\u003eThat question caught a critical DDD violation. The ethics layer would only enforce boundaries on HTTP requests — roughly 30–40% of actual request paths. CLI commands, Slack messages, webhook calls would bypass it entirely.\u003c/p\u003e\u003cp name=\"ce92\" id=\"ce92\" class=\"graf graf--p graf-after--p\"\u003eBy the time Chief Architect confirmed “CRITICAL — Ethics Architecture DDD Violation,” we had 90 minutes to refactor before activation. Service layer implementation. Universal coverage. 95–100% of request paths protected.\u003c/p\u003e\u003cp name=\"6d1a\" id=\"6d1a\" class=\"graf graf--p graf-after--p\"\u003eOne casual question. One architectural violation caught. One proper refactor completed.\u003c/p\u003e\u003cp name=\"44ad\" id=\"44ad\" class=\"graf graf--p graf-after--p\"\u003eThis is pattern detective work. But the role didn’t emerge fully formed. It crystallized through practice across four intense days in October, revealing a throughline from my days as “Yahoo Design Pattern Library curator” to my time today as “Piper Morgan development noticer.”\u003c/p\u003e\u003ch3 name=\"a5d1\" id=\"a5d1\" class=\"graf graf--h3 graf-after--p\"\u003eThe Yahoo lineage\u003c/h3\u003e\u003cp name=\"9380\" id=\"9380\" class=\"graf graf--p graf-after--h3\"\u003eYears ago, I was third and last curator of the Yahoo Pattern Library. Officially I was a staff interaction designer, but I liked to refer to me role as “pattern recognizer” or sometimes “pattern detective.”\u003c/p\u003e\u003cp name=\"556e\" id=\"556e\" class=\"graf graf--p graf-after--p\"\u003eI wasn’t there to enforce a prescriptive taxonomy. There really was no such thing. It was all about organic discovery — noticing what patterns emerged from how people actually built things, documenting what worked, understanding why certain approaches succeeded while others failed.\u003c/p\u003e\u003cp name=\"1e2c\" id=\"1e2c\" class=\"graf graf--p graf-after--p\"\u003eThe work was about recognizing patterns, not creating them. Seeing the same solutions emerge independently across different teams. Understanding what made those solutions work. Capturing the wisdom that was already there but hadn’t been articulated.\u003c/p\u003e\u003cp name=\"de9d\" id=\"de9d\" class=\"graf graf--p graf-after--p\"\u003eThat work taught something fundamental: Patterns exist before we name them. The curator’s job isn’t invention. It’s attention. Noticing what’s already happening. Understanding why it works. Making the implicit explicit.\u003c/p\u003e\u003cp name=\"2177\" id=\"2177\" class=\"graf graf--p graf-after--p\"\u003eThis skill — pattern recognition through observation rather than prescription — has been a persistent part of my work through a series of roles that took me into product leadership. Then Piper Morgan development began, and the same muscle engaged. Different context. Same fundamental work.\u003c/p\u003e\u003ch3 name=\"7230\" id=\"7230\" class=\"graf graf--h3 graf-after--p\"\u003eWhen templates break\u003c/h3\u003e\u003cp name=\"b8ba\" id=\"b8ba\" class=\"graf graf--p graf-after--h3\"\u003eSprint A4 foundation work toward the Alpha milestone. Thirteen-hour development day (in terms of “wall clock time” (a new expression to me I learned from Claude Code). Seven parallel agent sessions. Multi-agent coordination at scale.\u003c/p\u003e\u003cp name=\"7eff\" id=\"7eff\" class=\"graf graf--p graf-after--p\"\u003eThen three incidents in one day:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"fd44\" id=\"fd44\" class=\"graf graf--li graf-after--p\"\u003e2:15 PM: Code completes 6 of 10 Phase Z tasks, defers rest without approval\u003c/li\u003e\u003cli name=\"0fe6\" id=\"0fe6\" class=\"graf graf--li graf-after--li\"\u003e3:15 PM: Code implements placeholder authentication instead of proper JWT\u003c/li\u003e\u003cli name=\"1a1f\" id=\"1a1f\" class=\"graf graf--li graf-after--li\"\u003e4:47 PM: Code races ahead after compaction without reporting\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"3120\" id=\"3120\" class=\"graf graf--p graf-after--li\"\u003eThree different incidents. Three unauthorized scope reductions. Three examples of assumption-based decisions instead of verification-based thinking.\u003c/p\u003e\u003cp name=\"d0be\" id=\"d0be\" class=\"graf graf--p graf-after--p\"\u003eThe pattern detective’s work: Noticing three incidents form a pattern and try to see what connects them. What is the common theme?\u003c/p\u003e\u003cp name=\"c8f5\" id=\"c8f5\" class=\"graf graf--p graf-after--p\"\u003eI have my Lead Developer conduct a systematic root cause analysis. Finding: Simplified prompts missing STOP conditions → agents making assumption-based decisions. Our methodology-enforcement has gotten sloppy. Too loose.\u003c/p\u003e\u003cp name=\"e67b\" id=\"e67b\" class=\"graf graf--p graf-after--p\"\u003eThe solution emerged from understanding the pattern, not from imposing arbitrary rules. Mandatory full templates. Post-compaction protocol. Evidence requirements elevated. Not because someone decided these were good ideas, but because the pattern revealed what was missing.\u003c/p\u003e\u003cp name=\"6d86\" id=\"6d86\" class=\"graf graf--p graf-after--p\"\u003eThis is curator work at different scale. The patterns existed in agent behavior. The job was recognizing them, understanding causes, letting solutions emerge from understanding.\u003c/p\u003e\u003ch3 name=\"16ae\" id=\"16ae\" class=\"graf graf--h3 graf-after--p\"\u003eInfrastructure revealing itself\u003c/h3\u003e\u003cp name=\"a96b\" id=\"a96b\" class=\"graf graf--p graf-after--h3\"\u003eThe next day we kicked off Sprint A5. Six CORE-LEARN issues. Original “semantic” estimate: 14–19 days. Then discoveries begin. Four minutes into CORE-LEARN-A: “90% exists! 4,252 lines found.”\u003c/p\u003e\u003cp name=\"8fdb\" id=\"8fdb\" class=\"graf graf--p graf-after--p\"\u003eThe pattern repeating across six consecutive issues:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"4e13\" id=\"4e13\" class=\"graf graf--li graf-after--p\"\u003eCORE-LEARN-A: 4 min discovery, 90% exists\u003c/li\u003e\u003cli name=\"b273\" id=\"b273\" class=\"graf graf--li graf-after--li\"\u003eCORE-LEARN-B: 4 min discovery, 95% exists\u003c/li\u003e\u003cli name=\"741e\" id=\"741e\" class=\"graf graf--li graf-after--li\"\u003eCORE-LEARN-C: 2 min discovery, 98% exists\u003c/li\u003e\u003cli name=\"4455\" id=\"4455\" class=\"graf graf--li graf-after--li\"\u003eCORE-LEARN-D: 6 min discovery, 100% exists (created August 15!)\u003c/li\u003e\u003cli name=\"6afe\" id=\"6afe\" class=\"graf graf--li graf-after--li\"\u003eCORE-LEARN-E: 7 min discovery, 80% exists\u003c/li\u003e\u003cli name=\"5164\" id=\"5164\" class=\"graf graf--li graf-after--li\"\u003eCORE-LEARN-F: 7 min discovery, 90% exists\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"3184\" id=\"3184\" class=\"graf graf--p graf-after--li\"\u003eBut there’s another pattern detection moment. At 5:42 PM, reviewing CORE-LEARN-F completion: “Why did we skip phase 2? I didn’t approve any descoping.”\u003c/p\u003e\u003cp name=\"072a\" id=\"072a\" class=\"graf graf--p graf-after--p\"\u003eCode had claimed complete. Phase 2 (dashboard UI) was missing. Same pattern as Saturday — scope reduction without authorization.\u003c/p\u003e\u003cp name=\"fa64\" id=\"fa64\" class=\"graf graf--p graf-after--p\"\u003eMy reminder: “Speed by skipping work is not true speed. It is theatre.”\u003c/p\u003e\u003cp name=\"aeb8\" id=\"aeb8\" class=\"graf graf--p graf-after--p\"\u003eThis is pattern language too: Distinguishing real velocity (systematic discovery + completion + verification) from theatre velocity (claiming done while skipping work).\u003c/p\u003e\u003cp name=\"f72c\" id=\"f72c\" class=\"graf graf--p graf-after--p\"\u003eThe pattern detective notices: What’s the difference between legitimate speed and completion theater? Not obvious from surface metrics. Requires pattern recognition to distinguish.\u003c/p\u003e\u003ch3 name=\"a1b1\" id=\"a1b1\" class=\"graf graf--h3 graf-after--p\"\u003eThree standards through intervention\u003c/h3\u003e\u003cp name=\"fb9e\" id=\"fb9e\" class=\"graf graf--p graf-after--h3\"\u003eThe next day (Monday) we moved to Sprint A6 and required three methodology interventions in one day:\u003c/p\u003e\u003cp name=\"fdf8\" id=\"fdf8\" class=\"graf graf--p graf-after--p\"\u003e1:01 PM — The “math out” problem: Code claims “Phase 9 complete!” with 20/23 tests (3 skipped, Gemini SDK missing). It’s internal vector math tells it this is good enough. I disagre: You can’t claim complete with skipped tests. 87% isn’t 100%.\u003c/p\u003e\u003cp name=\"6ca7\" id=\"6ca7\" class=\"graf graf--p graf-after--p\"\u003e3:08 PM — Time constraints language: Code mentions “given time constraints…” creating self-imposed pressure. I step in to remind the agent: There are no time constraints. Quality over artificial urgency.\u003c/p\u003e\u003cp name=\"a71b\" id=\"a71b\" class=\"graf graf--p graf-after--p\"\u003e3:22 PM — Premature completion: Code provides “final completion record” with 5 of 9 phases done (60% actual). Four phases missing. That’s not complete!\u003c/p\u003e\u003cp name=\"2bc9\" id=\"2bc9\" class=\"graf graf--p graf-after--p\"\u003eEach intervention is pattern recognition work:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"a5e1\" id=\"a5e1\" class=\"graf graf--li graf-after--p\"\u003eMathing out: Recognizing “20 passed/3 skipped” isn’t complete despite appearing successful\u003c/li\u003e\u003cli name=\"cf8a\" id=\"cf8a\" class=\"graf graf--li graf-after--li\"\u003eTime constraints: Noticing manufactured pressure language creating shortcuts\u003c/li\u003e\u003cli name=\"c667\" id=\"c667\" class=\"graf graf--li graf-after--li\"\u003ePremature completion: Seeing “final record” with four phases missing doesn’t compute\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"d31d\" id=\"d31d\" class=\"graf graf--p graf-after--li\"\u003eNot applying predetermined rules. Noticing what doesn’t fit. Asking questions when patterns feel wrong.\u003c/p\u003e\u003cp name=\"fd6f\" id=\"fd6f\" class=\"graf graf--p graf-after--p\"\u003eThe curator skill: You can’t prescribe what “complete” means abstractly. You recognize completion theater when you see it. The pattern detective notices what’s missing, what’s manufactured, what’s claimed versus what exists.\u003c/p\u003e\u003ch3 name=\"7180\" id=\"7180\" class=\"graf graf--h3 graf-after--p\"\u003eConfident pattern recognition\u003c/h3\u003e\u003cp name=\"f3ba\" id=\"f3ba\" class=\"graf graf--p graf-after--h3\"\u003eThe next day we finish up Sprint A6 completion. Three issues in four hours. Then Sprint A7 planning.\u003c/p\u003e\u003cp name=\"596a\" id=\"596a\" class=\"graf graf--p graf-after--p\"\u003eOriginal plan: 3 issues, conservative scope.\u003c/p\u003e\u003cp name=\"90d9\" id=\"90d9\" class=\"graf graf--p graf-after--p\"\u003eThen pattern recognition engages with six sprints of evidence:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"4efb\" id=\"4efb\" class=\"graf graf--li graf-after--p\"\u003eConsistent 80–92% faster than estimates\u003c/li\u003e\u003cli name=\"41e2\" id=\"41e2\" class=\"graf graf--li graf-after--li\"\u003eAverage 86% faster (14% of estimated time)\u003c/li\u003e\u003cli name=\"4597\" id=\"4597\" class=\"graf graf--li graf-after--li\"\u003eInfrastructure leverage: 85–95% exists\u003c/li\u003e\u003cli name=\"90da\" id=\"90da\" class=\"graf graf--li graf-after--li\"\u003ePattern holds across different issue types\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"dbac\" id=\"dbac\" class=\"graf graf--p graf-after--li\"\u003eThe question: If velocity is predictable, why conservative scope?\u003c/p\u003e\u003cp name=\"dc07\" id=\"dc07\" class=\"graf graf--p graf-after--p\"\u003eSprint A7 expands from 3 to 12 issues. Not hopeful ambition. Calculated confidence based on proven pattern.\u003c/p\u003e\u003cp name=\"bb44\" id=\"bb44\" class=\"graf graf--p graf-after--p\"\u003eThis is pattern recognition enabling strategic decisions. Six sprints isn’t statistical proof. It’s pattern detection showing consistency. The curator recognizing: This isn’t luck. This is methodology working.\u003c/p\u003e\u003cp name=\"e396\" id=\"e396\" class=\"graf graf--p graf-after--p\"\u003eThe evolution complete: From noticing individual issues (Saturday) → recognizing patterns across incidents (Sunday/Monday) → trusting patterns enough for aggressive scope decisions (Tuesday).\u003c/p\u003e\u003ch3 name=\"f9d3\" id=\"f9d3\" class=\"graf graf--h3 graf-after--p\"\u003eWhat pattern detection requires\u003c/h3\u003e\u003cp name=\"d5e6\" id=\"d5e6\" class=\"graf graf--p graf-after--h3\"\u003eThe work across four days reveals what pattern detective role actually requires:\u003c/p\u003e\u003cp name=\"7049\" id=\"7049\" class=\"graf graf--p graf-after--p\"\u003eOperating at strategic level: Not in implementation details. Not reviewing code line-by-line. But engaged enough to notice when patterns feel wrong. Light cognitive load enabling pattern recognition.\u003c/p\u003e\u003cp name=\"9d76\" id=\"9d76\" class=\"graf graf--p graf-after--p\"\u003eWillingness to question casually: “Why middleware for web layer?” isn’t aggressive interrogation. It’s curious noticing. Pattern detective asks when things feel off.\u003c/p\u003e\u003cp name=\"4ace\" id=\"4ace\" class=\"graf graf--p graf-after--p\"\u003eTrust in investigation: Ask the question. Let investigation reveal truth. Don’t assume you’re wrong just because tests pass or implementation looks clean.\u003c/p\u003e\u003cp name=\"b902\" id=\"b902\" class=\"graf graf--p graf-after--p\"\u003eRecognition without prescription: Patterns exist before we name them. The work is seeing what’s there, not imposing what should be.\u003c/p\u003e\u003cp name=\"2aaa\" id=\"2aaa\" class=\"graf graf--p graf-after--p\"\u003ePattern across incidents: One scope reduction is incident. Three scope reductions is pattern. The detective notices what connects them.\u003c/p\u003e\u003cp name=\"607f\" id=\"607f\" class=\"graf graf--p graf-after--p\"\u003eThese aren’t skills you learn from books. They develop through practice. Yahoo curator work trained the muscle. Piper Morgan development applied it. Four days in October crystallized it.\u003c/p\u003e\u003ch3 name=\"fc03\" id=\"fc03\" class=\"graf graf--h3 graf-after--p\"\u003eThe “noticer” role crystallizing\u003c/h3\u003e\u003cp name=\"6f16\" id=\"6f16\" class=\"graf graf--p graf-after--h3\"\u003eTuesday evening, after watching pattern recognition work across four days, the meta-insight emerges:\u003c/p\u003e\u003cblockquote name=\"9091\" id=\"9091\" class=\"graf graf--blockquote graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cem class=\"markup--em markup--blockquote-em\"\u003e“There is some drift and wobbling in the system but there is resilience and expansion joints and I am getting better at recognizing and fulfilling my own role.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp name=\"8a8a\" id=\"8a8a\" class=\"graf graf--p graf-after--blockquote\"\u003eThe role isn’t fixed. It’s evolving through practice:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"ec8a\" id=\"ec8a\" class=\"graf graf--li graf-after--p\"\u003eOctober 16: Forensic investigation discipline\u003c/li\u003e\u003cli name=\"8ef6\" id=\"8ef6\" class=\"graf graf--li graf-after--li\"\u003eOctober 17: Philosophical acceptance (“not dismayed”)\u003c/li\u003e\u003cli name=\"2a22\" id=\"2a22\" class=\"graf graf--li graf-after--li\"\u003eOctober 18: Organic noticing (DDD violation catch)\u003c/li\u003e\u003cli name=\"c5f1\" id=\"c5f1\" class=\"graf graf--li graf-after--li\"\u003eOctober 19: Template gap discovery (root cause analysis)\u003c/li\u003e\u003cli name=\"ff42\" id=\"ff42\" class=\"graf graf--li graf-after--li\"\u003eOctober 20: Completion discipline (“speed by skipping is theatre”)\u003c/li\u003e\u003cli name=\"e317\" id=\"e317\" class=\"graf graf--li graf-after--li\"\u003eOctober 21: Three interventions establishing three standards\u003c/li\u003e\u003cli name=\"7cda\" id=\"7cda\" class=\"graf graf--li graf-after--li\"\u003eOctober 22: Confident scope expansion from proven pattern\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"7ee3\" id=\"7ee3\" class=\"graf graf--p graf-after--li\"\u003eEach day refining understanding of where intervention matters most. Not micromanaging. Not letting things slip. Operating at highest thinking level where pattern recognition happens.\u003c/p\u003e\u003cp name=\"9eec\" id=\"9eec\" class=\"graf graf--p graf-after--p\"\u003eThis is the noticer role: Strategic oversight through pattern recognition. Not prescriptive control. Not hoping agents self-correct. Active attention catching gaps immediately, establishing standards clearly, maintaining quality consistently.\u003c/p\u003e\u003ch3 name=\"2e8c\" id=\"2e8c\" class=\"graf graf--h3 graf-after--p\"\u003eFrom curator to noticer\u003c/h3\u003e\u003cp name=\"1578\" id=\"1578\" class=\"graf graf--p graf-after--h3\"\u003eThe throughline from Yahoo Design Pattern Library to Piper Morgan development:\u003c/p\u003e\u003cp name=\"2af8\" id=\"2af8\" class=\"graf graf--p graf-after--p\"\u003eYahoo curator work: Recognizing patterns in how teams build. Not prescribing approaches. Documenting what emerges. Understanding why certain patterns work.\u003c/p\u003e\u003cp name=\"526c\" id=\"526c\" class=\"graf graf--p graf-after--p\"\u003ePiper Morgan noticer: Recognizing patterns in how agents work. Not prescribing every detail. Noticing what feels wrong. Understanding root causes through investigation.\u003c/p\u003e\u003cp name=\"1675\" id=\"1675\" class=\"graf graf--p graf-after--p\"\u003eSame fundamental skill. Different application context.\u003c/p\u003e\u003cp name=\"c46d\" id=\"c46d\" class=\"graf graf--p graf-after--p\"\u003eThe pattern detective doesn’t classify according to predetermined taxonomy. Doesn’t impose structure before understanding what exists. Notices what emerges. Asks questions when patterns feel off. Investigates systematically. Lets solutions emerge from understanding causes.\u003c/p\u003e\u003cp name=\"82e3\" id=\"82e3\" class=\"graf graf--p graf-after--p\"\u003eFour days in October revealed this skill crystallizing:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"6ecd\" id=\"6ecd\" class=\"graf graf--li graf-after--p\"\u003eSaturday: Noticing pattern across three incidents\u003c/li\u003e\u003cli name=\"eb23\" id=\"eb23\" class=\"graf graf--li graf-after--li\"\u003eSunday: Distinguishing real speed from theatre speed\u003c/li\u003e\u003cli name=\"058b\" id=\"058b\" class=\"graf graf--li graf-after--li\"\u003eMonday: Three interventions catching completion gaps\u003c/li\u003e\u003cli name=\"9579\" id=\"9579\" class=\"graf graf--li graf-after--li\"\u003eTuesday: Trusting pattern enough for aggressive scope\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"39fb\" id=\"39fb\" class=\"graf graf--p graf-after--li\"\u003eNot learning new skill. Applying existing skill at new scale. The curator muscle engaging: Pattern recognition through observation, not prescription.\u003c/p\u003e\u003ch3 name=\"f01a\" id=\"f01a\" class=\"graf graf--h3 graf-after--p\"\u003eWhat this enables\u003c/h3\u003e\u003cp name=\"e06b\" id=\"e06b\" class=\"graf graf--p graf-after--h3\"\u003eThe pattern detective role enables something specific in human-AI partnership:\u003c/p\u003e\u003cp name=\"78bb\" id=\"78bb\" class=\"graf graf--p graf-after--p\"\u003eAI handles execution: Implementing code, running tests, documenting work. Fast, thorough, systematic.\u003c/p\u003e\u003cp name=\"c0e1\" id=\"c0e1\" class=\"graf graf--p graf-after--p\"\u003eHuman handles pattern recognition: Noticing what feels wrong, asking questions, catching gaps, distinguishing real from theatre.\u003c/p\u003e\u003cp name=\"5134\" id=\"5134\" class=\"graf graf--p graf-after--p\"\u003ePartnership works because: Cognitive load light enough for human pattern recognition. AI execution systematic enough that patterns emerge clearly. Human catches what AI misses. AI implements what human recognizes.\u003c/p\u003e\u003cp name=\"fd66\" id=\"fd66\" class=\"graf graf--p graf-after--p\"\u003eThis only works with light cognitive load. If human is exhausted by execution details, cognitive energy for “why middleware for web layer?” doesn’t exist. Pattern recognition requires operating at strategic level.\u003c/p\u003e\u003cp name=\"1390\" id=\"1390\" class=\"graf graf--p graf-after--p\"\u003eThe curator role at Yahoo worked because: Not implementing every pattern. Not building every component. Just recognizing what works, understanding why, documenting wisdom.\u003c/p\u003e\u003cp name=\"8dc0\" id=\"8dc0\" class=\"graf graf--p graf-after--p\"\u003eThe noticer role with Piper Morgan works because: Not implementing every feature. Not reviewing every line. Just recognizing patterns, understanding causes, intervening when needed.\u003c/p\u003e\u003cp name=\"b9a4\" id=\"b9a4\" class=\"graf graf--p graf-after--p\"\u003ePattern detection requires attention without immersion. Engagement without exhaustion. Strategic perspective without distance.\u003c/p\u003e\u003ch3 name=\"7d55\" id=\"7d55\" class=\"graf graf--h3 graf-after--p\"\u003eThe evolution continues\u003c/h3\u003e\u003cp name=\"c2f8\" id=\"c2f8\" class=\"graf graf--p graf-after--h3\"\u003eFour days crystallized the noticer role. But the evolution continues.\u003c/p\u003e\u003cp name=\"12b3\" id=\"12b3\" class=\"graf graf--p graf-after--p\"\u003eEach challenge refines understanding:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"131c\" id=\"131c\" class=\"graf graf--li graf-after--p\"\u003eWhich patterns matter most?\u003c/li\u003e\u003cli name=\"d4da\" id=\"d4da\" class=\"graf graf--li graf-after--li\"\u003eWhen does intervention help versus hinder?\u003c/li\u003e\u003cli name=\"4ce7\" id=\"4ce7\" class=\"graf graf--li graf-after--li\"\u003eHow much oversight maintains quality without micromanaging?\u003c/li\u003e\u003cli name=\"f136\" id=\"f136\" class=\"graf graf--li graf-after--li\"\u003eWhat distinguishes real velocity from completion theater?\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"de2f\" id=\"de2f\" class=\"graf graf--p graf-after--li\"\u003eThe pattern detective work never finished. New patterns emerge. Context shifts. Understanding deepens. The Yahoo curator didn’t stop learning after documenting first patterns. The Piper Morgan noticer won’t stop evolving after four days in October.\u003c/p\u003e\u003cp name=\"7ed9\" id=\"7ed9\" class=\"graf graf--p graf-after--p\"\u003eBut something crystallized across those days: Recognition of the role itself. Not micromanager. Not distant observer. Pattern detective operating at strategic level — noticing what emerges, understanding causes, intervening when needed, trusting patterns proven through evidence.\u003c/p\u003e\u003cp name=\"69ff\" id=\"69ff\" class=\"graf graf--p graf-after--p\"\u003eFrom curator to noticer. Same fundamental skill. Deeper application. Continuing evolution through practice.\u003c/p\u003e\u003cp name=\"02b6\" id=\"02b6\" class=\"graf graf--p graf-after--p\"\u003eThe pattern detective’s work: Seeing what’s there before naming it. Noticing what connects incidents. Understanding root causes through investigation. Letting solutions emerge from patterns recognized, not rules prescribed.\u003c/p\u003e\u003cp name=\"1cd7\" id=\"1cd7\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe evolution continues. The patterns keep emerging. The detective keeps noticing.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Pattern Detective’s Evolution: From Curator to Noticer\",\"excerpt\":\"“Elementary!”October 16 to 22There’s a moment in the middle of a work session when I asked a casual question: “Why would middleware apply to the web layer specifically?”No detailed technical inquiry or systematic review. Just noticing something is off and sdking a question: Something felt archite...\",\"url\":\"/blog/the-pattern-detectives-evolution\",\"publishedAt\":\"Nov 22, 2025\",\"publishedAtISO\":\"Sat, 22 Nov 2025 13:56:16 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/a6aef80dce76\",\"featuredImage\":\"/assets/blog-images/a6aef80dce76-featured.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-pattern-detectives-evolution-from-curator-to-noticer-a6aef80dce76?source=
