,\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T3ab7,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot shows its human roommate that they already own a vacuum cleaner\" src=\"https://cdn-images-1.medium.com/max/1024/1*SapxrAkrnillGYL_gacUaw.png\" /\u003e\u003cfigcaption\u003e“We already have one”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eI’ve spoken in this series before about a pattern we’ve adopted in building Piper Morgan, something I call “Phase −1 infrastructure verification,” and I’d like to unpack it a bit more.\u003c/p\u003e\u003cp\u003eIt may seem like optional overhead, but it’s not. My LLM friends want to express it in terms of ROI with all sorts of time estimates and I take that all with a grain of salt but the substantive value is undeniable. This type of investigation consistently saves more time and energy than it costs. It’s methodology that often turns “we need to build this” into simply “we just need to wire this up!”\u003c/p\u003e\u003cp\u003eHere are four recent examples from the past few months, though the practice started in late July or early August if I recall (I can always check my logs if anyone cares).\u003c/p\u003e\u003ch3\u003eTesting file upload\u003c/h3\u003e\u003cp\u003eFirst alpha user testing. I’m trying to use file upload. Doesn’t work. Error messages suggest files aren’t uploading at all.\u003c/p\u003e\u003cp\u003eThe diagnosis in my head: File upload functionality doesn’t exist yet. We haven’t built it. This will be significant work.\u003c/p\u003e\u003cp\u003eChief Architect investigates: “Let me check what file infrastructure exists.”\u003c/p\u003e\u003cp\u003e15 minutes later: Files work perfectly. Uploads succeed. Storage functions. The problem isn’t missing infrastructure. It’s routing assumption. Incorrect URL paths.\u003c/p\u003e\u003cp\u003eThe fix: Update one configuration file. 10 minutes.\u003c/p\u003e\u003cp\u003eWhat we assumed: Build file upload system (8–12 hours)\u003c/p\u003e\u003cp\u003eWhat was actually needed: Fix routing path (10 minutes)\u003c/p\u003e\u003cp\u003eInvestigation time: 15 minutes\u003c/p\u003e\u003cp\u003eDon’t assume functionality is missing. Investigate what exists. The problem might be simpler than it looks.\u003c/p\u003e\u003cp\u003eBut one occurrence doesn’t establish a pattern.The pattern becomes apparent when it happens repeatedly.\u003c/p\u003e\u003ch3\u003eDocument processing, a few days later\u003c/h3\u003e\u003cp\u003eSaturday morning. Historic sprint day. Four P0 blockers to resolve. One of them: Document processing integration.\u003c/p\u003e\u003cp\u003eThe symptom: Document uploads work but processing doesn’t trigger. Seems like document processing service doesn’t exist.\u003c/p\u003e\u003cp\u003eCode Agent begins Phase −1 investigation: “Let me verify what document infrastructure exists before planning implementation.”\u003c/p\u003e\u003cp\u003e20 minutes later: DocumentService discovered. Complete document processing infrastructure. Text extraction. Metadata parsing. Storage integration. Comprehensive tests.\u003c/p\u003e\u003cp\u003eStatus: 75% complete. Database layer works. Service layer works. Just not wired to web routes or chat handlers.\u003c/p\u003e\u003cp\u003eThe task revision: Not “build DocumentService” (estimated 8–12 hours). But “wire existing DocumentService to web tier” (actual 2 hours).\u003c/p\u003e\u003cp\u003eInvestigation time: 20 minutes\u003c/p\u003e\u003cp\u003eTime saved: 6–10 hours\u003c/p\u003e\u003ch3\u003eThe unfinished “todo” feature\u003c/h3\u003e\u003cp\u003eSunday afternoon. Planning Monday’s P1 work. Issue #285: Todo system completion.\u003c/p\u003e\u003cp\u003eThe GitHub issue description: “Todo functionality never finished or wired up.”\u003c/p\u003e\u003cp\u003eTraditional approach: Estimate building complete todo CRUD system. 8–12 hours. Database models, repositories, services, web routes, chat handlers. Full vertical implementation.\u003c/p\u003e\u003cp\u003eBut Saturday taught lesson. Sunday applies it systematically.\u003c/p\u003e\u003cp\u003eCode Agent Phase −1 investigation: “Before estimating development time, let me verify what todo infrastructure already exists.”\u003c/p\u003e\u003cp\u003e30 minutes later: Todo infrastructure discovered 75% complete.\u003c/p\u003e\u003cp\u003eFound:\u003c/p\u003e\u003cpre\u003e✅ Database Models: TodoListDB, TodoDB\u003cbr\u003e✅ Repositories: TodoRepository, TodoListRepository, TodoManagementRepository\u003cbr\u003e✅ Services: TodoKnowledgeService\u003cbr\u003e✅ API Layer: TodoCreateRequest, TodoUpdateRequest, TodoResponse\u003cbr\u003e✅ Domain Models: Todo, TodoList\u003cbr\u003e✅ Tests: test_todo_management_api.py EXISTS!\u003cbr\u003e✅ Documentation: PM-081-todo-api-documentation.md in archive\u003cbr\u003e\u003cbr\u003e❌ Missing:\u003cbr\u003e   - Not wired to web routes\u003cbr\u003e   - Not connected to chat interface\u003cbr\u003e   - Not integrated with intent handlers\u003c/pre\u003e\u003cp\u003eThe task revision: Not “build todo system” (8–12 hours). But “wire existing infrastructure” (4–6 hours).\u003c/p\u003e\u003cp\u003eInvestigation time: 30 minutes\u003c/p\u003e\u003cp\u003eTime saved: 4–6 hours\u003c/p\u003e\u003cp\u003eThree times in one week. Pattern re-confirmed. Time to document the methodology, if we hadn’t already.\u003c/p\u003e\u003ch3\u003eHumanizing error messages\u003c/h3\u003e\u003cp\u003eMonday morning. P1 sprint execution. Three issues on deck. One of them: Issue #283, error message humanization.\u003c/p\u003e\u003cp\u003eThe symptom: Technical error messages break conversational UX. Need to humanize errors.\u003c/p\u003e\u003cp\u003eThe assumption: Build error humanization infrastructure from scratch.\u003c/p\u003e\u003cp\u003eCursor Agent begins Phase −1 investigation: “Checking what error handling infrastructure exists before planning implementation.”\u003c/p\u003e\u003cp\u003e15 minutes later: Complete existing infrastructure discovered.\u003c/p\u003e\u003cp\u003eFound:\u003c/p\u003e\u003cul\u003e\u003cli\u003eUserFriendlyErrorService (300+ lines, comprehensive)\u003c/li\u003e\u003cli\u003eActionHumanizer (160+ lines)\u003c/li\u003e\u003cli\u003eEnhancedErrorMiddleware (180+ lines)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eStatus: Fully built. Just not mounted in web/app.py.\u003c/p\u003e\u003cp\u003eThe task revision: Not “build error humanization” (6–8 hours). But “mount existing middleware” (30 minutes).\u003c/p\u003e\u003cp\u003eInvestigation time: 15 minutes\u003c/p\u003e\u003cp\u003eTime saved: 5.5–7.5 hours\u003c/p\u003e\u003cp\u003eFour days. Four investigations. Four discoveries. Four massive time savings.\u003c/p\u003e\u003cp\u003eThe pattern isn’t luck. It’s methodology. It’s now called “Phase −1 infrastructure verification” and it’s mandatory before any implementation work begins.\u003c/p\u003e\u003ch3\u003eWhy the 75% pattern exists\u003c/h3\u003e\u003cp\u003eThe discoveries aren’t random. There’s reason infrastructure consistently appears 75% complete:\u003c/p\u003e\u003cp\u003eSingle-developer good architecture:\u003c/p\u003e\u003cul\u003e\u003cli\u003eBuild database/service layers with proper separation of concerns\u003c/li\u003e\u003cli\u003eInfrastructure created for immediate needs\u003c/li\u003e\u003cli\u003eLayers advance independently (deep before wide)\u003c/li\u003e\u003cli\u003eIntegration layers deferred (not blocking current work)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe progression:\u003c/p\u003e\u003col\u003e\u003cli\u003eNeed todo functionality for something specific\u003c/li\u003e\u003cli\u003eBuild database models (25% of total work)\u003c/li\u003e\u003cli\u003eBuild repositories (15% more)\u003c/li\u003e\u003cli\u003eBuild services (15% more)\u003c/li\u003e\u003cli\u003eBuild domain logic (20% more)\u003c/li\u003e\u003cli\u003eTotal: 75% complete\u003c/li\u003e\u003cli\u003eMissing: Web routes (10%) + Chat handlers (10%) + UI integration (5%) = 25%\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eWhy it appears “missing”:\u003c/p\u003e\u003cul\u003e\u003cli\u003eFrom user perspective: Feature not in UI = doesn’t exist\u003c/li\u003e\u003cli\u003eFrom code perspective: Feature in database/service = nearly complete\u003c/li\u003e\u003cli\u003eGap: Integration layers not built yet\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThis isn’t as sloppy as it seems at time. In many ways, it’s a natural evolution when building with good practices. Database layer gets attention first (data modeling is hard). Service layer gets built second (business logic is complex). Integration layer gets deferred (seems trivial compared to foundation).\u003c/p\u003e\u003cp\u003eThen months later: “We need todo functionality.” Assumption: Doesn’t exist. Investigation reveals: 75% exists, just not wired.\u003c/p\u003e\u003ch3\u003eWhat makes investigation effective\u003c/h3\u003e\u003cp\u003eNot all investigation finds infrastructure. These four discoveries worked because investigation was systematic:\u003c/p\u003e\u003ch3\u003e1. Don’t assume based on symptoms\u003c/h3\u003e\u003cp\u003eFile upload fails → doesn’t mean file infrastructure missing Document processing missing → doesn’t mean DocumentService nonexistent Todos don’t work → doesn’t mean todo system unbuilt Errors not humanized → doesn’t mean humanization infrastructure absent\u003c/p\u003e\u003cp\u003eSymptoms show user-visible gaps. Investigation reveals actual gaps.\u003c/p\u003e\u003ch3\u003e2. Check all layers systematically\u003c/h3\u003e\u003cp\u003eFor each feature, investigate:\u003c/p\u003e\u003cul\u003e\u003cli\u003eDatabase models (lowest layer)\u003c/li\u003e\u003cli\u003eRepositories (data access)\u003c/li\u003e\u003cli\u003eServices (business logic)\u003c/li\u003e\u003cli\u003eDomain models (core entities)\u003c/li\u003e\u003cli\u003eAPI layer (external interface)\u003c/li\u003e\u003cli\u003eWeb routes (HTTP endpoints)\u003c/li\u003e\u003cli\u003eChat handlers (conversational interface)\u003c/li\u003e\u003cli\u003eUI integration (user-facing)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eMissing at top layers doesn’t mean missing at bottom layers.\u003c/p\u003e\u003ch3\u003e3. Use proper tools\u003c/h3\u003e\u003cp\u003eSerena MCP for symbol search: Find classes, methods, references Git history for archaeology: When was it built? Why deferred? Test suites for validation: Does it work? How complete? Documentation for context: What was intended?\u003c/p\u003e\u003cp\u003eGrep searches find surface mentions. Symbol search finds actual implementations.\u003c/p\u003e\u003ch3\u003e4. Invest 15–30 minutes minimum\u003c/h3\u003e\u003cp\u003eQuick glance isn’t investigation. Real investigation takes time:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSearch multiple layers\u003c/li\u003e\u003cli\u003eRead actual code\u003c/li\u003e\u003cli\u003eCheck tests\u003c/li\u003e\u003cli\u003eVerify completeness\u003c/li\u003e\u003cli\u003eAssess integration needs\u003c/li\u003e\u003c/ul\u003e\u003ch3\u003eWhen investigation finds nothing\u003c/h3\u003e\u003cp\u003eImportant note: Investigation doesn’t always find existing infrastructure.\u003c/p\u003e\u003cp\u003eExample: Monday’s action mapping issue. Investigation confirmed: No ActionMapper exists. Classifier outputs don’t match handler names. Mapping layer genuinely missing.\u003c/p\u003e\u003cp\u003eResult: Build it from scratch. 2 hours. No discovery, no time savings.\u003c/p\u003e\u003cp\u003eThe value: Even when infrastructure doesn’t exist, investigation provides clarity:\u003c/p\u003e\u003cul\u003e\u003cli\u003eConfirmed scope (know what needs building)\u003c/li\u003e\u003cli\u003eValidated approach (no alternative already exists)\u003c/li\u003e\u003cli\u003eIdentified dependencies (what integrates with what)\u003c/li\u003e\u003cli\u003eClear implementation path (no surprises during development)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eFailed discovery isn’t wasted time. It’s validated scope. You build confidently knowing you’re not duplicating existing work.\u003c/p\u003e\u003cp\u003eThe ROI on “found nothing” investigations: Can’t quantify time savings. But can quantify risk reduction. Building wrong thing because you didn’t check existing code: Expensive mistake. Spending 30 minutes to confirm scope: Cheap insurance.\u003c/p\u003e\u003ch3\u003eThe methodology integration\u003c/h3\u003e\u003cp\u003eWe had this practice for a while but as of September, Phase −1 investigation is now standard practice in gameplan template v9.0:\u003c/p\u003e\u003cp\u003ePhase −1: Infrastructure Verification\u003c/p\u003e\u003cul\u003e\u003cli\u003eObjective: Verify what infrastructure already exists before planning implementation\u003c/li\u003e\u003cli\u003eMethod: Systematic investigation across all layers (database, services, routes, handlers)\u003c/li\u003e\u003cli\u003eOutput: Existing infrastructure map + gap analysis\u003c/li\u003e\u003cli\u003eDuration: 15–30 minutes minimum\u003c/li\u003e\u003cli\u003eDecision: Wire existing infrastructure OR build from scratch\u003c/li\u003e\u003cli\u003eStop condition: Clear understanding of what exists vs what needs building\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThis phase is mandatory. Not optional. Not “if you have time.” But required step before Phase 0 begins.\u003c/p\u003e\u003cp\u003eThe template also includes:\u003c/p\u003e\u003cul\u003e\u003cli\u003eProper tools specification (Serena for symbol search)\u003c/li\u003e\u003cli\u003eLayer-by-layer checklist (database through UI)\u003c/li\u003e\u003cli\u003eDiscovery documentation requirements\u003c/li\u003e\u003cli\u003eROI tracking (investigation time vs time saved)\u003c/li\u003e\u003c/ul\u003e\u003ch3\u003eWhat this means for other projects\u003c/h3\u003e\u003cp\u003eThe archaeological approach applies beyond Piper Morgan:\u003c/p\u003e\u003cp\u003eAny project with:\u003c/p\u003e\u003cul\u003e\u003cli\u003eGood architectural practices (separation of concerns)\u003c/li\u003e\u003cli\u003eMultiple layers (database, services, API, UI)\u003c/li\u003e\u003cli\u003eIncremental development (features built over time)\u003c/li\u003e\u003cli\u003eSingle or small team (knowledge not perfectly distributed)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWill likely have:\u003c/p\u003e\u003cul\u003e\u003cli\u003eInfrastructure more complete than visible\u003c/li\u003e\u003cli\u003eFeatures built but not integrated\u003c/li\u003e\u003cli\u003eFunctionality at lower layers not surfaced\u003c/li\u003e\u003cli\u003e“Missing” features that actually exist\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe discipline:\u003c/p\u003e\u003col\u003e\u003cli\u003eSymptom appears (feature seems missing)\u003c/li\u003e\u003cli\u003eResist assumption (don’t assume missing = unbuilt)\u003c/li\u003e\u003cli\u003eInvestigate systematically (15–30 minutes, all layers)\u003c/li\u003e\u003cli\u003eDiscover existing work (often 75% complete)\u003c/li\u003e\u003cli\u003eRevise approach (wire vs build)\u003c/li\u003e\u003cli\u003eSave massive time (8–27x ROI)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eThe pattern isn’t Piper Morgan-specific. It’s consequence of good architecture + incremental development + imperfect knowledge.\u003c/p\u003e\u003ch3\u003eThe counter-intuitive insight\u003c/h3\u003e\u003cp\u003eTraditional project management: “Don’t investigate, start building. Investigation is overhead.”\u003c/p\u003e\u003cp\u003eArchaeological approach: “Always investigate before building. Investigation saves multiples of its cost.”\u003c/p\u003e\u003cp\u003eThe counter-intuitive part: Slowing down to investigate makes overall development faster.\u003c/p\u003e\u003cp\u003e30 minutes investigation feels slow compared to starting immediately. But if investigation reveals 75% complete infrastructure, that 30 minutes saves 6–10 hours rebuilding.\u003c/p\u003e\u003cp\u003eThe math is obvious when stated explicitly. But intuitively feels wrong. “We should be coding, not searching!”\u003c/p\u003e\u003cp\u003eThe mature approach: Trust the ROI. Invest investigation time. Discover existing work. Wire efficiently. Ship faster overall.\u003c/p\u003e\u003cp\u003eNot “fast start, slow finish” (build from scratch unnecessarily). But “slow start, fast finish” (investigate, wire, done).\u003c/p\u003e\u003ch3\u003eLook before you leap\u003c/h3\u003e\u003cp\u003eThe archaeological approach continues paying dividends after that initial week:\u003c/p\u003e\u003cp\u003eNovember 4: Foundation work on todo system revealed polymorphic inheritance needed (not discovered infrastructure, but discovered architectural requirement through investigation)\u003c/p\u003e\u003cp\u003eNovember 5: ActionMapper cleanup found 40 unused mappings (investigation revealed scope for technical debt)\u003c/p\u003e\u003cp\u003eThe pattern generalizes: Investigate before acting. Understanding beats assumption.\u003c/p\u003e\u003cp\u003eNot just for finding existing infrastructure. But for understanding scope, requirements, dependencies, architecture. Investigation creates clarity. Clarity enables good decisions. Good decisions save time.\u003c/p\u003e\u003cp\u003eThe archaeological approach isn’t just about finding 75% complete infrastructure. It’s about understanding reality before planning response. It’s about evidence before assumptions. It’s about clarity before action.\u003c/p\u003e\u003cp\u003eAnd when investigation consistently provides 18–27:1 ROI on time invested, the methodology justifies itself empirically.\u003c/p\u003e\u003cp\u003e\u003cem\u003eThis is part of the Building Piper Morgan methodology series, exploring systematic approaches to AI-assisted development.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDo you practice systematic investigation before implementation? Have you discovered “missing” features that actually existed at lower layers?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=52d0bbb9b00a\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-archaeological-approach-why-phase-1-investigation-pays-for-itself-52d0bbb9b00a\"\u003eThe Archaeological Approach: Why Phase −1 Investigation Pays for Itself\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T660e,"])</script><script>self.__next_f.push([1,"\u003csection name=\"8bb0\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"94e1\" id=\"94e1\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Archaeological Approach: Why Phase −1 Investigation Pays for Itself\u003c/h3\u003e\u003cfigure name=\"3711\" id=\"3711\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*SapxrAkrnillGYL_gacUaw.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot shows its human roommate that they already own a vacuum cleaner\" src=\"https://cdn-images-1.medium.com/max/800/1*SapxrAkrnillGYL_gacUaw.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“We already have one”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"67d1\" id=\"67d1\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--figure\"\u003e\u003cspan class=\"graf-dropCap\"\u003eI’\u003c/span\u003eve spoken in this series before about a pattern we’ve adopted in building Piper Morgan, something I call “Phase −1 infrastructure verification,” and I’d like to unpack it a bit more.\u003c/p\u003e\u003cp name=\"7381\" id=\"7381\" class=\"graf graf--p graf-after--p\"\u003eIt may seem like optional overhead, but it’s not. My LLM friends want to express it in terms of ROI with all sorts of time estimates and I take that all with a grain of salt but the substantive value is undeniable. This type of investigation consistently saves more time and energy than it costs. It’s methodology that often turns “we need to build this” into simply “we just need to wire this up!”\u003c/p\u003e\u003cp name=\"98a9\" id=\"98a9\" class=\"graf graf--p graf-after--p\"\u003eHere are four recent examples from the past few months, though the practice started in late July or early August if I recall (I can always check my logs if anyone cares).\u003c/p\u003e\u003ch3 name=\"ccae\" id=\"ccae\" class=\"graf graf--h3 graf-after--p\"\u003eTesting file upload\u003c/h3\u003e\u003cp name=\"711a\" id=\"711a\" class=\"graf graf--p graf-after--h3\"\u003eFirst alpha user testing. I’m trying to use file upload. Doesn’t work. Error messages suggest files aren’t uploading at all.\u003c/p\u003e\u003cp name=\"ab3a\" id=\"ab3a\" class=\"graf graf--p graf-after--p\"\u003eThe diagnosis in my head: File upload functionality doesn’t exist yet. We haven’t built it. This will be significant work.\u003c/p\u003e\u003cp name=\"b4da\" id=\"b4da\" class=\"graf graf--p graf-after--p\"\u003eChief Architect investigates: “Let me check what file infrastructure exists.”\u003c/p\u003e\u003cp name=\"ef4a\" id=\"ef4a\" class=\"graf graf--p graf-after--p\"\u003e15 minutes later: Files work perfectly. Uploads succeed. Storage functions. The problem isn’t missing infrastructure. It’s routing assumption. Incorrect URL paths.\u003c/p\u003e\u003cp name=\"788b\" id=\"788b\" class=\"graf graf--p graf-after--p\"\u003eThe fix: Update one configuration file. 10 minutes.\u003c/p\u003e\u003cp name=\"79cc\" id=\"79cc\" class=\"graf graf--p graf-after--p\"\u003eWhat we assumed: Build file upload system (8–12 hours)\u003c/p\u003e\u003cp name=\"7d94\" id=\"7d94\" class=\"graf graf--p graf-after--p\"\u003eWhat was actually needed: Fix routing path (10 minutes)\u003c/p\u003e\u003cp name=\"5bca\" id=\"5bca\" class=\"graf graf--p graf-after--p\"\u003eInvestigation time: 15 minutes\u003c/p\u003e\u003cp name=\"f648\" id=\"f648\" class=\"graf graf--p graf-after--p\"\u003eDon’t assume functionality is missing. Investigate what exists. The problem might be simpler than it looks.\u003c/p\u003e\u003cp name=\"7c73\" id=\"7c73\" class=\"graf graf--p graf-after--p\"\u003eBut one occurrence doesn’t establish a pattern.The pattern becomes apparent when it happens repeatedly.\u003c/p\u003e\u003ch3 name=\"b321\" id=\"b321\" class=\"graf graf--h3 graf-after--p\"\u003eDocument processing, a few days later\u003c/h3\u003e\u003cp name=\"7107\" id=\"7107\" class=\"graf graf--p graf-after--h3\"\u003eSaturday morning. Historic sprint day. Four P0 blockers to resolve. One of them: Document processing integration.\u003c/p\u003e\u003cp name=\"0c50\" id=\"0c50\" class=\"graf graf--p graf-after--p\"\u003eThe symptom: Document uploads work but processing doesn’t trigger. Seems like document processing service doesn’t exist.\u003c/p\u003e\u003cp name=\"307b\" id=\"307b\" class=\"graf graf--p graf-after--p\"\u003eCode Agent begins Phase −1 investigation: “Let me verify what document infrastructure exists before planning implementation.”\u003c/p\u003e\u003cp name=\"40ea\" id=\"40ea\" class=\"graf graf--p graf-after--p\"\u003e20 minutes later: DocumentService discovered. Complete document processing infrastructure. Text extraction. Metadata parsing. Storage integration. Comprehensive tests.\u003c/p\u003e\u003cp name=\"788e\" id=\"788e\" class=\"graf graf--p graf-after--p\"\u003eStatus: 75% complete. Database layer works. Service layer works. Just not wired to web routes or chat handlers.\u003c/p\u003e\u003cp name=\"e569\" id=\"e569\" class=\"graf graf--p graf-after--p\"\u003eThe task revision: Not “build DocumentService” (estimated 8–12 hours). But “wire existing DocumentService to web tier” (actual 2 hours).\u003c/p\u003e\u003cp name=\"4f43\" id=\"4f43\" class=\"graf graf--p graf-after--p\"\u003eInvestigation time: 20 minutes\u003c/p\u003e\u003cp name=\"17a1\" id=\"17a1\" class=\"graf graf--p graf-after--p\"\u003eTime saved: 6–10 hours\u003c/p\u003e\u003ch3 name=\"1152\" id=\"1152\" class=\"graf graf--h3 graf-after--p\"\u003eThe unfinished “todo” feature\u003c/h3\u003e\u003cp name=\"b78c\" id=\"b78c\" class=\"graf graf--p graf-after--h3\"\u003eSunday afternoon. Planning Monday’s P1 work. Issue #285: Todo system completion.\u003c/p\u003e\u003cp name=\"3951\" id=\"3951\" class=\"graf graf--p graf-after--p\"\u003eThe GitHub issue description: “Todo functionality never finished or wired up.”\u003c/p\u003e\u003cp name=\"2cff\" id=\"2cff\" class=\"graf graf--p graf-after--p\"\u003eTraditional approach: Estimate building complete todo CRUD system. 8–12 hours. Database models, repositories, services, web routes, chat handlers. Full vertical implementation.\u003c/p\u003e\u003cp name=\"7a58\" id=\"7a58\" class=\"graf graf--p graf-after--p\"\u003eBut Saturday taught lesson. Sunday applies it systematically.\u003c/p\u003e\u003cp name=\"848f\" id=\"848f\" class=\"graf graf--p graf-after--p\"\u003eCode Agent Phase −1 investigation: “Before estimating development time, let me verify what todo infrastructure already exists.”\u003c/p\u003e\u003cp name=\"7b26\" id=\"7b26\" class=\"graf graf--p graf-after--p\"\u003e30 minutes later: Todo infrastructure discovered 75% complete.\u003c/p\u003e\u003cp name=\"4418\" id=\"4418\" class=\"graf graf--p graf-after--p\"\u003eFound:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"yaml\" name=\"54c3\" id=\"54c3\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003e\u003cspan class=\"hljs-string\"\u003e✅\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eDatabase Models:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoListDB,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoDB\u003c/span\u003e\u003cbr /\u003e\u003cspan class=\"hljs-string\"\u003e✅\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eRepositories:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoRepository,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoListRepository,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoManagementRepository\u003c/span\u003e\u003cbr /\u003e\u003cspan class=\"hljs-string\"\u003e✅\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eServices:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoKnowledgeService\u003c/span\u003e\u003cbr /\u003e\u003cspan class=\"hljs-string\"\u003e✅\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eAPI Layer:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoCreateRequest,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoUpdateRequest,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoResponse\u003c/span\u003e\u003cbr /\u003e\u003cspan class=\"hljs-string\"\u003e✅\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eDomain Models:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodo,\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eTodoList\u003c/span\u003e\u003cbr /\u003e\u003cspan class=\"hljs-string\"\u003e✅\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eTests:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003etest_todo_management_api.py\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eEXISTS!\u003c/span\u003e\u003cbr /\u003e\u003cspan class=\"hljs-string\"\u003e✅\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eDocumentation:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ePM-081-todo-api-documentation.md\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ein\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003earchive\u003c/span\u003e\u003cbr /\u003e\u003cbr /\u003e\u003cspan class=\"hljs-string\"\u003e❌\u003c/span\u003e \u003cspan class=\"hljs-attr\"\u003eMissing:\u003c/span\u003e\u003cbr /\u003e   \u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eNot\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ewired\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eto\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eweb\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eroutes\u003c/span\u003e\u003cbr /\u003e   \u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eNot\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003econnected\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eto\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003echat\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003einterface\u003c/span\u003e\u003cbr /\u003e   \u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eNot\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eintegrated\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ewith\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eintent\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ehandlers\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"c221\" id=\"c221\" class=\"graf graf--p graf-after--pre\"\u003eThe task revision: Not “build todo system” (8–12 hours). But “wire existing infrastructure” (4–6 hours).\u003c/p\u003e\u003cp name=\"0ab1\" id=\"0ab1\" class=\"graf graf--p graf-after--p\"\u003eInvestigation time: 30 minutes\u003c/p\u003e\u003cp name=\"228a\" id=\"228a\" class=\"graf graf--p graf-after--p\"\u003eTime saved: 4–6 hours\u003c/p\u003e\u003cp name=\"9f91\" id=\"9f91\" class=\"graf graf--p graf-after--p\"\u003eThree times in one week. Pattern re-confirmed. Time to document the methodology, if we hadn’t already.\u003c/p\u003e\u003ch3 name=\"9a22\" id=\"9a22\" class=\"graf graf--h3 graf-after--p\"\u003eHumanizing error messages\u003c/h3\u003e\u003cp name=\"67a6\" id=\"67a6\" class=\"graf graf--p graf-after--h3\"\u003eMonday morning. P1 sprint execution. Three issues on deck. One of them: Issue #283, error message humanization.\u003c/p\u003e\u003cp name=\"820a\" id=\"820a\" class=\"graf graf--p graf-after--p\"\u003eThe symptom: Technical error messages break conversational UX. Need to humanize errors.\u003c/p\u003e\u003cp name=\"6336\" id=\"6336\" class=\"graf graf--p graf-after--p\"\u003eThe assumption: Build error humanization infrastructure from scratch.\u003c/p\u003e\u003cp name=\"31cf\" id=\"31cf\" class=\"graf graf--p graf-after--p\"\u003eCursor Agent begins Phase −1 investigation: “Checking what error handling infrastructure exists before planning implementation.”\u003c/p\u003e\u003cp name=\"711b\" id=\"711b\" class=\"graf graf--p graf-after--p\"\u003e15 minutes later: Complete existing infrastructure discovered.\u003c/p\u003e\u003cp name=\"e541\" id=\"e541\" class=\"graf graf--p graf-after--p\"\u003eFound:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"b44e\" id=\"b44e\" class=\"graf graf--li graf-after--p\"\u003eUserFriendlyErrorService (300+ lines, comprehensive)\u003c/li\u003e\u003cli name=\"8550\" id=\"8550\" class=\"graf graf--li graf-after--li\"\u003eActionHumanizer (160+ lines)\u003c/li\u003e\u003cli name=\"47fb\" id=\"47fb\" class=\"graf graf--li graf-after--li\"\u003eEnhancedErrorMiddleware (180+ lines)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"875f\" id=\"875f\" class=\"graf graf--p graf-after--li\"\u003eStatus: Fully built. Just not mounted in web/app.py.\u003c/p\u003e\u003cp name=\"d8c0\" id=\"d8c0\" class=\"graf graf--p graf-after--p\"\u003eThe task revision: Not “build error humanization” (6–8 hours). But “mount existing middleware” (30 minutes).\u003c/p\u003e\u003cp name=\"1271\" id=\"1271\" class=\"graf graf--p graf-after--p\"\u003eInvestigation time: 15 minutes\u003c/p\u003e\u003cp name=\"e824\" id=\"e824\" class=\"graf graf--p graf-after--p\"\u003eTime saved: 5.5–7.5 hours\u003c/p\u003e\u003cp name=\"210f\" id=\"210f\" class=\"graf graf--p graf-after--p\"\u003eFour days. Four investigations. Four discoveries. Four massive time savings.\u003c/p\u003e\u003cp name=\"414f\" id=\"414f\" class=\"graf graf--p graf-after--p\"\u003eThe pattern isn’t luck. It’s methodology. It’s now called “Phase −1 infrastructure verification” and it’s mandatory before any implementation work begins.\u003c/p\u003e\u003ch3 name=\"a2e8\" id=\"a2e8\" class=\"graf graf--h3 graf-after--p\"\u003eWhy the 75% pattern exists\u003c/h3\u003e\u003cp name=\"c5ba\" id=\"c5ba\" class=\"graf graf--p graf-after--h3\"\u003eThe discoveries aren’t random. There’s reason infrastructure consistently appears 75% complete:\u003c/p\u003e\u003cp name=\"975c\" id=\"975c\" class=\"graf graf--p graf-after--p\"\u003eSingle-developer good architecture:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"e9d9\" id=\"e9d9\" class=\"graf graf--li graf-after--p\"\u003eBuild database/service layers with proper separation of concerns\u003c/li\u003e\u003cli name=\"d67a\" id=\"d67a\" class=\"graf graf--li graf-after--li\"\u003eInfrastructure created for immediate needs\u003c/li\u003e\u003cli name=\"db54\" id=\"db54\" class=\"graf graf--li graf-after--li\"\u003eLayers advance independently (deep before wide)\u003c/li\u003e\u003cli name=\"e7d5\" id=\"e7d5\" class=\"graf graf--li graf-after--li\"\u003eIntegration layers deferred (not blocking current work)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"43c8\" id=\"43c8\" class=\"graf graf--p graf-after--li\"\u003eThe progression:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"ac16\" id=\"ac16\" class=\"graf graf--li graf-after--p\"\u003eNeed todo functionality for something specific\u003c/li\u003e\u003cli name=\"000f\" id=\"000f\" class=\"graf graf--li graf-after--li\"\u003eBuild database models (25% of total work)\u003c/li\u003e\u003cli name=\"4c36\" id=\"4c36\" class=\"graf graf--li graf-after--li\"\u003eBuild repositories (15% more)\u003c/li\u003e\u003cli name=\"e68c\" id=\"e68c\" class=\"graf graf--li graf-after--li\"\u003eBuild services (15% more)\u003c/li\u003e\u003cli name=\"96f7\" id=\"96f7\" class=\"graf graf--li graf-after--li\"\u003eBuild domain logic (20% more)\u003c/li\u003e\u003cli name=\"875c\" id=\"875c\" class=\"graf graf--li graf-after--li\"\u003eTotal: 75% complete\u003c/li\u003e\u003cli name=\"bb69\" id=\"bb69\" class=\"graf graf--li graf-after--li\"\u003eMissing: Web routes (10%) + Chat handlers (10%) + UI integration (5%) = 25%\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"93fe\" id=\"93fe\" class=\"graf graf--p graf-after--li\"\u003eWhy it appears “missing”:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"80b3\" id=\"80b3\" class=\"graf graf--li graf-after--p\"\u003eFrom user perspective: Feature not in UI = doesn’t exist\u003c/li\u003e\u003cli name=\"6382\" id=\"6382\" class=\"graf graf--li graf-after--li\"\u003eFrom code perspective: Feature in database/service = nearly complete\u003c/li\u003e\u003cli name=\"dc62\" id=\"dc62\" class=\"graf graf--li graf-after--li\"\u003eGap: Integration layers not built yet\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"8332\" id=\"8332\" class=\"graf graf--p graf-after--li\"\u003eThis isn’t as sloppy as it seems at time. In many ways, it’s a natural evolution when building with good practices. Database layer gets attention first (data modeling is hard). Service layer gets built second (business logic is complex). Integration layer gets deferred (seems trivial compared to foundation).\u003c/p\u003e\u003cp name=\"39ac\" id=\"39ac\" class=\"graf graf--p graf-after--p\"\u003eThen months later: “We need todo functionality.” Assumption: Doesn’t exist. Investigation reveals: 75% exists, just not wired.\u003c/p\u003e\u003ch3 name=\"8463\" id=\"8463\" class=\"graf graf--h3 graf-after--p\"\u003eWhat makes investigation effective\u003c/h3\u003e\u003cp name=\"21dd\" id=\"21dd\" class=\"graf graf--p graf-after--h3\"\u003eNot all investigation finds infrastructure. These four discoveries worked because investigation was systematic:\u003c/p\u003e\u003ch3 name=\"57a3\" id=\"57a3\" class=\"graf graf--h3 graf-after--p\"\u003e1. Don’t assume based on symptoms\u003c/h3\u003e\u003cp name=\"7c21\" id=\"7c21\" class=\"graf graf--p graf-after--h3\"\u003eFile upload fails → doesn’t mean file infrastructure missing Document processing missing → doesn’t mean DocumentService nonexistent Todos don’t work → doesn’t mean todo system unbuilt Errors not humanized → doesn’t mean humanization infrastructure absent\u003c/p\u003e\u003cp name=\"6e8c\" id=\"6e8c\" class=\"graf graf--p graf-after--p\"\u003eSymptoms show user-visible gaps. Investigation reveals actual gaps.\u003c/p\u003e\u003ch3 name=\"81fe\" id=\"81fe\" class=\"graf graf--h3 graf-after--p\"\u003e2. Check all layers systematically\u003c/h3\u003e\u003cp name=\"7049\" id=\"7049\" class=\"graf graf--p graf-after--h3\"\u003eFor each feature, investigate:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"36c3\" id=\"36c3\" class=\"graf graf--li graf-after--p\"\u003eDatabase models (lowest layer)\u003c/li\u003e\u003cli name=\"716e\" id=\"716e\" class=\"graf graf--li graf-after--li\"\u003eRepositories (data access)\u003c/li\u003e\u003cli name=\"123d\" id=\"123d\" class=\"graf graf--li graf-after--li\"\u003eServices (business logic)\u003c/li\u003e\u003cli name=\"23bc\" id=\"23bc\" class=\"graf graf--li graf-after--li\"\u003eDomain models (core entities)\u003c/li\u003e\u003cli name=\"2955\" id=\"2955\" class=\"graf graf--li graf-after--li\"\u003eAPI layer (external interface)\u003c/li\u003e\u003cli name=\"2217\" id=\"2217\" class=\"graf graf--li graf-after--li\"\u003eWeb routes (HTTP endpoints)\u003c/li\u003e\u003cli name=\"b686\" id=\"b686\" class=\"graf graf--li graf-after--li\"\u003eChat handlers (conversational interface)\u003c/li\u003e\u003cli name=\"e486\" id=\"e486\" class=\"graf graf--li graf-after--li\"\u003eUI integration (user-facing)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"53e9\" id=\"53e9\" class=\"graf graf--p graf-after--li\"\u003eMissing at top layers doesn’t mean missing at bottom layers.\u003c/p\u003e\u003ch3 name=\"ab6a\" id=\"ab6a\" class=\"graf graf--h3 graf-after--p\"\u003e3. Use proper tools\u003c/h3\u003e\u003cp name=\"f72e\" id=\"f72e\" class=\"graf graf--p graf-after--h3\"\u003eSerena MCP for symbol search: Find classes, methods, references Git history for archaeology: When was it built? Why deferred? Test suites for validation: Does it work? How complete? Documentation for context: What was intended?\u003c/p\u003e\u003cp name=\"41a3\" id=\"41a3\" class=\"graf graf--p graf-after--p\"\u003eGrep searches find surface mentions. Symbol search finds actual implementations.\u003c/p\u003e\u003ch3 name=\"0031\" id=\"0031\" class=\"graf graf--h3 graf-after--p\"\u003e4. Invest 15–30 minutes minimum\u003c/h3\u003e\u003cp name=\"5b6b\" id=\"5b6b\" class=\"graf graf--p graf-after--h3\"\u003eQuick glance isn’t investigation. Real investigation takes time:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"4295\" id=\"4295\" class=\"graf graf--li graf-after--p\"\u003eSearch multiple layers\u003c/li\u003e\u003cli name=\"002d\" id=\"002d\" class=\"graf graf--li graf-after--li\"\u003eRead actual code\u003c/li\u003e\u003cli name=\"1a7e\" id=\"1a7e\" class=\"graf graf--li graf-after--li\"\u003eCheck tests\u003c/li\u003e\u003cli name=\"ac7a\" id=\"ac7a\" class=\"graf graf--li graf-after--li\"\u003eVerify completeness\u003c/li\u003e\u003cli name=\"a4ee\" id=\"a4ee\" class=\"graf graf--li graf-after--li\"\u003eAssess integration needs\u003c/li\u003e\u003c/ul\u003e\u003ch3 name=\"7f7c\" id=\"7f7c\" class=\"graf graf--h3 graf-after--li\"\u003eWhen investigation finds nothing\u003c/h3\u003e\u003cp name=\"7e91\" id=\"7e91\" class=\"graf graf--p graf-after--h3\"\u003eImportant note: Investigation doesn’t always find existing infrastructure.\u003c/p\u003e\u003cp name=\"6a4f\" id=\"6a4f\" class=\"graf graf--p graf-after--p\"\u003eExample: Monday’s action mapping issue. Investigation confirmed: No ActionMapper exists. Classifier outputs don’t match handler names. Mapping layer genuinely missing.\u003c/p\u003e\u003cp name=\"f564\" id=\"f564\" class=\"graf graf--p graf-after--p\"\u003eResult: Build it from scratch. 2 hours. No discovery, no time savings.\u003c/p\u003e\u003cp name=\"769f\" id=\"769f\" class=\"graf graf--p graf-after--p\"\u003eThe value: Even when infrastructure doesn’t exist, investigation provides clarity:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"1df2\" id=\"1df2\" class=\"graf graf--li graf-after--p\"\u003eConfirmed scope (know what needs building)\u003c/li\u003e\u003cli name=\"67ad\" id=\"67ad\" class=\"graf graf--li graf-after--li\"\u003eValidated approach (no alternative already exists)\u003c/li\u003e\u003cli name=\"90cf\" id=\"90cf\" class=\"graf graf--li graf-after--li\"\u003eIdentified dependencies (what integrates with what)\u003c/li\u003e\u003cli name=\"77fd\" id=\"77fd\" class=\"graf graf--li graf-after--li\"\u003eClear implementation path (no surprises during development)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"c656\" id=\"c656\" class=\"graf graf--p graf-after--li\"\u003eFailed discovery isn’t wasted time. It’s validated scope. You build confidently knowing you’re not duplicating existing work.\u003c/p\u003e\u003cp name=\"9394\" id=\"9394\" class=\"graf graf--p graf-after--p\"\u003eThe ROI on “found nothing” investigations: Can’t quantify time savings. But can quantify risk reduction. Building wrong thing because you didn’t check existing code: Expensive mistake. Spending 30 minutes to confirm scope: Cheap insurance.\u003c/p\u003e\u003ch3 name=\"9166\" id=\"9166\" class=\"graf graf--h3 graf-after--p\"\u003eThe methodology integration\u003c/h3\u003e\u003cp name=\"de7d\" id=\"de7d\" class=\"graf graf--p graf-after--h3\"\u003eWe had this practice for a while but as of September, Phase −1 investigation is now standard practice in gameplan template v9.0:\u003c/p\u003e\u003cp name=\"3e6b\" id=\"3e6b\" class=\"graf graf--p graf-after--p\"\u003ePhase −1: Infrastructure Verification\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"16e3\" id=\"16e3\" class=\"graf graf--li graf-after--p\"\u003eObjective: Verify what infrastructure already exists before planning implementation\u003c/li\u003e\u003cli name=\"c1e3\" id=\"c1e3\" class=\"graf graf--li graf-after--li\"\u003eMethod: Systematic investigation across all layers (database, services, routes, handlers)\u003c/li\u003e\u003cli name=\"61c5\" id=\"61c5\" class=\"graf graf--li graf-after--li\"\u003eOutput: Existing infrastructure map + gap analysis\u003c/li\u003e\u003cli name=\"c6d9\" id=\"c6d9\" class=\"graf graf--li graf-after--li\"\u003eDuration: 15–30 minutes minimum\u003c/li\u003e\u003cli name=\"f985\" id=\"f985\" class=\"graf graf--li graf-after--li\"\u003eDecision: Wire existing infrastructure OR build from scratch\u003c/li\u003e\u003cli name=\"281c\" id=\"281c\" class=\"graf graf--li graf-after--li\"\u003eStop condition: Clear understanding of what exists vs what needs building\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"edae\" id=\"edae\" class=\"graf graf--p graf-after--li\"\u003eThis phase is mandatory. Not optional. Not “if you have time.” But required step before Phase 0 begins.\u003c/p\u003e\u003cp name=\"cb66\" id=\"cb66\" class=\"graf graf--p graf-after--p\"\u003eThe template also includes:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"be08\" id=\"be08\" class=\"graf graf--li graf-after--p\"\u003eProper tools specification (Serena for symbol search)\u003c/li\u003e\u003cli name=\"9c49\" id=\"9c49\" class=\"graf graf--li graf-after--li\"\u003eLayer-by-layer checklist (database through UI)\u003c/li\u003e\u003cli name=\"45cd\" id=\"45cd\" class=\"graf graf--li graf-after--li\"\u003eDiscovery documentation requirements\u003c/li\u003e\u003cli name=\"20d1\" id=\"20d1\" class=\"graf graf--li graf-after--li\"\u003eROI tracking (investigation time vs time saved)\u003c/li\u003e\u003c/ul\u003e\u003ch3 name=\"bf17\" id=\"bf17\" class=\"graf graf--h3 graf-after--li\"\u003eWhat this means for other projects\u003c/h3\u003e\u003cp name=\"69af\" id=\"69af\" class=\"graf graf--p graf-after--h3\"\u003eThe archaeological approach applies beyond Piper Morgan:\u003c/p\u003e\u003cp name=\"5ade\" id=\"5ade\" class=\"graf graf--p graf-after--p\"\u003eAny project with:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"3fcd\" id=\"3fcd\" class=\"graf graf--li graf-after--p\"\u003eGood architectural practices (separation of concerns)\u003c/li\u003e\u003cli name=\"e99c\" id=\"e99c\" class=\"graf graf--li graf-after--li\"\u003eMultiple layers (database, services, API, UI)\u003c/li\u003e\u003cli name=\"5541\" id=\"5541\" class=\"graf graf--li graf-after--li\"\u003eIncremental development (features built over time)\u003c/li\u003e\u003cli name=\"ea5b\" id=\"ea5b\" class=\"graf graf--li graf-after--li\"\u003eSingle or small team (knowledge not perfectly distributed)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"8a18\" id=\"8a18\" class=\"graf graf--p graf-after--li\"\u003eWill likely have:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"df56\" id=\"df56\" class=\"graf graf--li graf-after--p\"\u003eInfrastructure more complete than visible\u003c/li\u003e\u003cli name=\"5b3a\" id=\"5b3a\" class=\"graf graf--li graf-after--li\"\u003eFeatures built but not integrated\u003c/li\u003e\u003cli name=\"f070\" id=\"f070\" class=\"graf graf--li graf-after--li\"\u003eFunctionality at lower layers not surfaced\u003c/li\u003e\u003cli name=\"f5b2\" id=\"f5b2\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Missing” features that actually exist\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"1c33\" id=\"1c33\" class=\"graf graf--p graf-after--li\"\u003eThe discipline:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"356d\" id=\"356d\" class=\"graf graf--li graf-after--p\"\u003eSymptom appears (feature seems missing)\u003c/li\u003e\u003cli name=\"ad20\" id=\"ad20\" class=\"graf graf--li graf-after--li\"\u003eResist assumption (don’t assume missing = unbuilt)\u003c/li\u003e\u003cli name=\"6aaf\" id=\"6aaf\" class=\"graf graf--li graf-after--li\"\u003eInvestigate systematically (15–30 minutes, all layers)\u003c/li\u003e\u003cli name=\"c9e7\" id=\"c9e7\" class=\"graf graf--li graf-after--li\"\u003eDiscover existing work (often 75% complete)\u003c/li\u003e\u003cli name=\"bf5e\" id=\"bf5e\" class=\"graf graf--li graf-after--li\"\u003eRevise approach (wire vs build)\u003c/li\u003e\u003cli name=\"41e1\" id=\"41e1\" class=\"graf graf--li graf-after--li\"\u003eSave massive time (8–27x ROI)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"3773\" id=\"3773\" class=\"graf graf--p graf-after--li\"\u003eThe pattern isn’t Piper Morgan-specific. It’s consequence of good architecture + incremental development + imperfect knowledge.\u003c/p\u003e\u003ch3 name=\"f182\" id=\"f182\" class=\"graf graf--h3 graf-after--p\"\u003eThe counter-intuitive insight\u003c/h3\u003e\u003cp name=\"aba0\" id=\"aba0\" class=\"graf graf--p graf-after--h3\"\u003eTraditional project management: “Don’t investigate, start building. Investigation is overhead.”\u003c/p\u003e\u003cp name=\"c676\" id=\"c676\" class=\"graf graf--p graf-after--p\"\u003eArchaeological approach: “Always investigate before building. Investigation saves multiples of its cost.”\u003c/p\u003e\u003cp name=\"54aa\" id=\"54aa\" class=\"graf graf--p graf-after--p\"\u003eThe counter-intuitive part: Slowing down to investigate makes overall development faster.\u003c/p\u003e\u003cp name=\"bbf9\" id=\"bbf9\" class=\"graf graf--p graf-after--p\"\u003e30 minutes investigation feels slow compared to starting immediately. But if investigation reveals 75% complete infrastructure, that 30 minutes saves 6–10 hours rebuilding.\u003c/p\u003e\u003cp name=\"3e72\" id=\"3e72\" class=\"graf graf--p graf-after--p\"\u003eThe math is obvious when stated explicitly. But intuitively feels wrong. “We should be coding, not searching!”\u003c/p\u003e\u003cp name=\"95cb\" id=\"95cb\" class=\"graf graf--p graf-after--p\"\u003eThe mature approach: Trust the ROI. Invest investigation time. Discover existing work. Wire efficiently. Ship faster overall.\u003c/p\u003e\u003cp name=\"d1a8\" id=\"d1a8\" class=\"graf graf--p graf-after--p\"\u003eNot “fast start, slow finish” (build from scratch unnecessarily). But “slow start, fast finish” (investigate, wire, done).\u003c/p\u003e\u003ch3 name=\"8184\" id=\"8184\" class=\"graf graf--h3 graf-after--p\"\u003eLook before you leap\u003c/h3\u003e\u003cp name=\"14c5\" id=\"14c5\" class=\"graf graf--p graf-after--h3\"\u003eThe archaeological approach continues paying dividends after that initial week:\u003c/p\u003e\u003cp name=\"5be5\" id=\"5be5\" class=\"graf graf--p graf-after--p\"\u003eNovember 4: Foundation work on todo system revealed polymorphic inheritance needed (not discovered infrastructure, but discovered architectural requirement through investigation)\u003c/p\u003e\u003cp name=\"41d5\" id=\"41d5\" class=\"graf graf--p graf-after--p\"\u003eNovember 5: ActionMapper cleanup found 40 unused mappings (investigation revealed scope for technical debt)\u003c/p\u003e\u003cp name=\"b44f\" id=\"b44f\" class=\"graf graf--p graf-after--p\"\u003eThe pattern generalizes: Investigate before acting. Understanding beats assumption.\u003c/p\u003e\u003cp name=\"89dc\" id=\"89dc\" class=\"graf graf--p graf-after--p\"\u003eNot just for finding existing infrastructure. But for understanding scope, requirements, dependencies, architecture. Investigation creates clarity. Clarity enables good decisions. Good decisions save time.\u003c/p\u003e\u003cp name=\"3d7d\" id=\"3d7d\" class=\"graf graf--p graf-after--p\"\u003eThe archaeological approach isn’t just about finding 75% complete infrastructure. It’s about understanding reality before planning response. It’s about evidence before assumptions. It’s about clarity before action.\u003c/p\u003e\u003cp name=\"33ba\" id=\"33ba\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eAnd when investigation consistently provides 18–27:1 ROI on time invested, the methodology justifies itself empirically.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Archaeological Approach: Why Phase −1 Investigation Pays for Itself\",\"excerpt\":\"“We already have one”I’ve spoken in this series before about a pattern we’ve adopted in building Piper Morgan, something I call “Phase −1 infrastructure verification,” and I’d like to unpack it a bit more.It may seem like optional overhead, but it’s not. My LLM friends want to express it in terms...\",\"url\":\"/blog/the-archaeological-approac
