al without the architect\u003c/h3\u003e\u003cp\u003eMonday produced exactly one agent session — a brief Documentation run to synthesize the previous day’s omnibus. I published a blog post that had been drafted earlier. Corresponded with Ted Nadeau about some GitHub questions. That was it.\u003c/p\u003e\u003cp\u003eTuesday, I was still sick. But something strange happened.\u003c/p\u003e\u003cp\u003eThe Documentation agent started a routine task: auditing ADR links to make sure all the cross-references still worked. Ted Nadeau had mentioned a broken link in passing, and this was the follow-up.\u003c/p\u003e\u003cp\u003eThe audit found the broken links. Seven of them, across three files. Easy fixes. But then I noticed something in the agent’s report.\u003c/p\u003e\u003cp\u003eThe dev/ directory was nearly empty.\u003c/p\u003e\u003ch3\u003e2,155 files\u003c/h3\u003e\u003cp\u003eThe numbers didn’t make sense at first. We expected around 2,463 files in dev/. The audit found 308.\u003c/p\u003e\u003cp\u003eEighty-seven percent of the files were gone.\u003c/p\u003e\u003cp\u003eSession logs — the daily record of everything we’d built — had dropped from 650 to 52. Gameplans — the detailed plans that guide every implementation — were completely gone. Not a single one remained.\u003c/p\u003e\u003cp\u003eFoggy as I was, I knew this was not good.\u003c/p\u003e\u003cp\u003eThe investigation began immediately. Was this a fresh clone that hadn’t pulled the files? No — git reflog showed continuous history. Had someone deleted them? The evidence pointed to something more mundane and more preventable: a destructive git command, probably git checkout . or git restore ., run sometime around February 7th or 8th.\u003c/p\u003e\u003cp\u003eThe dev/ directory was gitignored. It held working files, not committed code. When the restore command ran, git happily overwrote everything with… nothing. The files had never been committed, so there was nothing to restore them from.\u003c/p\u003e\u003cp\u003eExcept there was.\u003c/p\u003e\u003ch3\u003eGit archaeology\u003c/h3\u003e\u003cp\u003eGit remembers everything — even files that were later gitignored. Every file that had ever been committed, even once, still existed somewhere in the repository’s history. The recovery command was ugly but effective:\u003c/p\u003e\u003cpre\u003egit log --all --full-history --diff-filter=A --name-only --format=\u0026#39;%H\u0026#39; -- \u0026#39;dev/*\u0026#39; | \\\u003cbr\u003e  while read hash; do git checkout $hash -- dev/ 2\u0026gt;/dev/null; done\u003c/pre\u003e\u003cp\u003eTranslation: find every commit that ever added a file to dev/, and restore that file from that commit.\u003c/p\u003e\u003cp\u003eThe result: 2,781 files recovered. More than we’d lost, because the archaeology surfaced files from months ago that had been deleted intentionally but were now restored as a side effect.\u003c/p\u003e\u003cp\u003eThe afternoon became a cleanup operation. Sort the recovered files. Delete the ones we didn’t need. Compress the archives. Move things to their proper homes. By evening, dev/ had gone from 5.1 GB of chaos to 1.2 GB of organized structure.\u003c/p\u003e\u003cp\u003eThe institutional memory was intact.\u003c/p\u003e\u003ch3\u003eThe December bug\u003c/h3\u003e\u003cp\u003eWednesday brought a different kind of discovery.\u003c/p\u003e\u003cp\u003eDominique Derosena — a new alpha tester referred by my 18F colleague Magdaline Derosena — was setting up Piper on Windows. Fresh machine, following the alpha tester instructions. He ran the setup script.\u003c/p\u003e\u003cp\u003eIt failed immediately.\u003c/p\u003e\u003cp\u003eNot after a few steps. Not with a subtle error. Immediately. The script printed its opening message and then… stopped.\u003c/p\u003e\u003cp\u003eThe bug was in the batch file structure. Helper subroutines used exit /b to return to the caller. But in Windows batch files, exit /b inside a subroutine doesn\u0026#39;t return — it exits the entire script. The correct command is goto :eof.\u003c/p\u003e\u003cp\u003eThis bug had existed since December 2025. Two months. Through Ted Nadeau’s extensive Windows testing — fourteen issues filed and fixed. Through multiple releases. Through the entire alpha program.\u003c/p\u003e\u003cp\u003eI wonder why Ted hand’t run into it?\u003c/p\u003e\u003cp\u003eThe answer was in his issue reports. Ted’s fourteen issues focused on requirements.txt conflicts, missing migrations, documentation gaps. All real problems. But nothing about the setup script failing on first run.\u003c/p\u003e\u003cp\u003eHe must have hit the failure, shrugged, and switched to manual setup, or kust stopped at that point. Then filed issues about everything else he encountered. Maybe, the script failure was so immediate, so total, that it didn’t even register as a bug worth reporting — just an obstacle to work around.\u003c/p\u003e\u003cp\u003ePairing with Dominique, as he set things up, coming in fresh, we caught it and logged the issue.\u003c/p\u003e\u003ch3\u003eSystematic prevention\u003c/h3\u003e\u003cp\u003eThe Windows bug led to a broader question: why wasn’t this caught automatically?\u003c/p\u003e\u003cp\u003eThe answer was uncomfortable. We had no Windows CI. Our continuous integration tested on Linux and macOS. Windows was… assumed. If a batch file was syntactically valid, we figured it would work.\u003c/p\u003e\u003cp\u003eBy Thursday afternoon, we had:\u003c/p\u003e\u003cul\u003e\u003cli\u003eA fixed setup script (restructured, goto :eof replacing exit /b)\u003c/li\u003e\u003cli\u003eA Windows CI workflow (runs on every change to batch files, PowerShell scripts, or requirements.txt)\u003c/li\u003e\u003cli\u003eA Windows smoke test script (for alpha testers to validate their setup manually)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe gap that had hidden for two months was now systematically covered.\u003c/p\u003e\u003ch3\u003eWhat the flu revealed\u003c/h3\u003e\u003cp\u003eI was sick for most of this week. Genuinely, frustratingly, can’t-think-straight sick.\u003c/p\u003e\u003cp\u003eAnd the cathedral kept building itself.\u003c/p\u003e\u003cp\u003eNot autonomously — agents still needed prompts to start, guidance when stuck, decisions when options diverged. But the infrastructure we’d built over months proved itself. The omnibus logs captured what happened even when I couldn’t follow along in real time. The audit protocols surfaced the file loss before it became permanent. The methodology — investigate first, fix second — led to systematic prevention rather than one-off patches.\u003c/p\u003e\u003cp\u003eBy Friday, I was still recovering, but was able to make the rounds of all eight leadership agents for the weekly review — Chief of Staff, Architect, CIO, CXO, PPM, HoSR, Communications Chief, and the Lead Developer’s notes. They synthesized seven days of work across twenty-two sessions. Their conclusion matched what I’d been feeling all week: the infrastructure held.\u003c/p\u003e\u003cp\u003eThe files that nearly vanished taught me something about institutional memory. The December bug taught me something about fresh eyes. And the flu taught me something about cathedrals: the good ones don’t need their architects present every day. They’re built to stand.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Assembly Assumption, in which we find features that are built correctly but do not compose properly.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever had to step back from something you were building and watch it continue without you? What did that reveal about what you’d built?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=430f3607795d\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-cathedral-in-winter-430f3607795d\"\u003eThe Cathedral in Winter\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T2cd5,"])</script><script>self.__next_f.push([1,"\u003csection name=\"ac2e\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"c1b5\" id=\"c1b5\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Cathedral in Winter\u003c/h3\u003e\u003cfigure name=\"b3a7\" id=\"b3a7\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*plvBAfgwb_H_peGVYDxVKw.png\" data-width=\"1536\" data-height=\"1024\" alt=\"While a person is sick in bed, a small team of robots does their chores.\" src=\"https://cdn-images-1.medium.com/max/800/1*plvBAfgwb_H_peGVYDxVKw.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“What would I do without you?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"517c\" id=\"517c\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eFebruary 10 to 13\u003c/em\u003e\u003c/p\u003e\u003cp name=\"2f7e\" id=\"2f7e\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eBy\u003c/span\u003e Monday, the flu had won. I’d been fighting it since feeling a pang in my sinus on Friday and it was established by Saturday, at which point I had started doing shorter sessions and lighter work on Piper Morham.\u003c/p\u003e\u003cp name=\"518b\" id=\"518b\" class=\"graf graf--p graf-after--p\"\u003eBut Monday was different. I couldn’t focus. Couldn’t coordinate. Could barely follow what was happening in the session logs. So I did something I’d not done since starting this project nine month ago: I let go.\u003c/p\u003e\u003ch3 name=\"0c7c\" id=\"0c7c\" class=\"graf graf--h3 graf-after--p\"\u003eThe cathedral without the architect\u003c/h3\u003e\u003cp name=\"0cd6\" id=\"0cd6\" class=\"graf graf--p graf-after--h3\"\u003eMonday produced exactly one agent session — a brief Documentation run to synthesize the previous day’s omnibus. I published a blog post that had been drafted earlier. Corresponded with Ted Nadeau about some GitHub questions. That was it.\u003c/p\u003e\u003cp name=\"f28c\" id=\"f28c\" class=\"graf graf--p graf-after--p\"\u003eTuesday, I was still sick. But something strange happened.\u003c/p\u003e\u003cp name=\"58ea\" id=\"58ea\" class=\"graf graf--p graf-after--p\"\u003eThe Documentation agent started a routine task: auditing ADR links to make sure all the cross-references still worked. Ted Nadeau had mentioned a broken link in passing, and this was the follow-up.\u003c/p\u003e\u003cp name=\"c1f8\" id=\"c1f8\" class=\"graf graf--p graf-after--p\"\u003eThe audit found the broken links. Seven of them, across three files. Easy fixes. But then I noticed something in the agent’s report.\u003c/p\u003e\u003cp name=\"434a\" id=\"434a\" class=\"graf graf--p graf-after--p\"\u003eThe dev/ directory was nearly empty.\u003c/p\u003e\u003ch3 name=\"8dc3\" id=\"8dc3\" class=\"graf graf--h3 graf-after--p\"\u003e2,155 files\u003c/h3\u003e\u003cp name=\"3f04\" id=\"3f04\" class=\"graf graf--p graf-after--h3\"\u003eThe numbers didn’t make sense at first. We expected around 2,463 files in dev/. The audit found 308.\u003c/p\u003e\u003cp name=\"5d1a\" id=\"5d1a\" class=\"graf graf--p graf-after--p\"\u003eEighty-seven percent of the files were gone.\u003c/p\u003e\u003cp name=\"bcc7\" id=\"bcc7\" class=\"graf graf--p graf-after--p\"\u003eSession logs — the daily record of everything we’d built — had dropped from 650 to 52. Gameplans — the detailed plans that guide every implementation — were completely gone. Not a single one remained.\u003c/p\u003e\u003cp name=\"729c\" id=\"729c\" class=\"graf graf--p graf-after--p\"\u003eFoggy as I was, I knew this was not good.\u003c/p\u003e\u003cp name=\"572b\" id=\"572b\" class=\"graf graf--p graf-after--p\"\u003eThe investigation began immediately. Was this a fresh clone that hadn’t pulled the files? No — git reflog showed continuous history. Had someone deleted them? The evidence pointed to something more mundane and more preventable: a destructive git command, probably \u003ccode class=\"markup--code markup--p-code\"\u003egit checkout .\u003c/code\u003e or \u003ccode class=\"markup--code markup--p-code\"\u003egit restore .\u003c/code\u003e, run sometime around February 7th or 8th.\u003c/p\u003e\u003cp name=\"6092\" id=\"6092\" class=\"graf graf--p graf-after--p\"\u003eThe dev/ directory was gitignored. It held working files, not committed code. When the restore command ran, git happily overwrote everything with… nothing. The files had never been committed, so there was nothing to restore them from.\u003c/p\u003e\u003cp name=\"dc9d\" id=\"dc9d\" class=\"graf graf--p graf-after--p\"\u003eExcept there was.\u003c/p\u003e\u003ch3 name=\"8a8f\" id=\"8a8f\" class=\"graf graf--h3 graf-after--p\"\u003eGit archaeology\u003c/h3\u003e\u003cp name=\"8a2a\" id=\"8a2a\" class=\"graf graf--p graf-after--h3\"\u003eGit remembers everything — even files that were later gitignored. Every file that had ever been committed, even once, still existed somewhere in the repository’s history. The recovery command was ugly but effective:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"bash\" name=\"57ce\" id=\"57ce\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003egit \u003cspan class=\"hljs-built_in\"\u003elog\u003c/span\u003e --all --full-history --diff-filter=A --name-only --format=\u003cspan class=\"hljs-string\"\u003e\u0026#x27;%H\u0026#x27;\u003c/span\u003e -- \u003cspan class=\"hljs-string\"\u003e\u0026#x27;dev/*\u0026#x27;\u003c/span\u003e | \\\u003cbr /\u003e  \u003cspan class=\"hljs-keyword\"\u003ewhile\u003c/span\u003e \u003cspan class=\"hljs-built_in\"\u003eread\u003c/span\u003e \u003cspan class=\"hljs-built_in\"\u003ehash\u003c/span\u003e; \u003cspan class=\"hljs-keyword\"\u003edo\u003c/span\u003e git checkout \u003cspan class=\"hljs-variable\"\u003e$hash\u003c/span\u003e -- dev/ 2\u0026gt;/dev/null; \u003cspan class=\"hljs-keyword\"\u003edone\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"894c\" id=\"894c\" class=\"graf graf--p graf-after--pre\"\u003eTranslation: find every commit that ever added a file to dev/, and restore that file from that commit.\u003c/p\u003e\u003cp name=\"b210\" id=\"b210\" class=\"graf graf--p graf-after--p\"\u003eThe result: 2,781 files recovered. More than we’d lost, because the archaeology surfaced files from months ago that had been deleted intentionally but were now restored as a side effect.\u003c/p\u003e\u003cp name=\"f99f\" id=\"f99f\" class=\"graf graf--p graf-after--p\"\u003eThe afternoon became a cleanup operation. Sort the recovered files. Delete the ones we didn’t need. Compress the archives. Move things to their proper homes. By evening, dev/ had gone from 5.1 GB of chaos to 1.2 GB of organized structure.\u003c/p\u003e\u003cp name=\"1b12\" id=\"1b12\" class=\"graf graf--p graf-after--p\"\u003eThe institutional memory was intact.\u003c/p\u003e\u003ch3 name=\"3d75\" id=\"3d75\" class=\"graf graf--h3 graf-after--p\"\u003eThe December bug\u003c/h3\u003e\u003cp name=\"e43d\" id=\"e43d\" class=\"graf graf--p graf-after--h3\"\u003eWednesday brought a different kind of discovery.\u003c/p\u003e\u003cp name=\"658b\" id=\"658b\" class=\"graf graf--p graf-after--p\"\u003eDominique Derosena — a new alpha tester referred by my 18F colleague Magdaline Derosena — was setting up Piper on Windows. Fresh machine, following the alpha tester instructions. He ran the setup script.\u003c/p\u003e\u003cp name=\"2003\" id=\"2003\" class=\"graf graf--p graf-after--p\"\u003eIt failed immediately.\u003c/p\u003e\u003cp name=\"7d7b\" id=\"7d7b\" class=\"graf graf--p graf-after--p\"\u003eNot after a few steps. Not with a subtle error. Immediately. The script printed its opening message and then… stopped.\u003c/p\u003e\u003cp name=\"56b2\" id=\"56b2\" class=\"graf graf--p graf-after--p\"\u003eThe bug was in the batch file structure. Helper subroutines used \u003ccode class=\"markup--code markup--p-code\"\u003eexit /b\u003c/code\u003e to return to the caller. But in Windows batch files, \u003ccode class=\"markup--code markup--p-code\"\u003eexit /b\u003c/code\u003e inside a subroutine doesn\u0026#39;t return — it exits the entire script. The correct command is \u003ccode class=\"markup--code markup--p-code\"\u003egoto :eof\u003c/code\u003e.\u003c/p\u003e\u003cp name=\"878c\" id=\"878c\" class=\"graf graf--p graf-after--p\"\u003eThis bug had existed since December 2025. Two months. Through Ted Nadeau’s extensive Windows testing — fourteen issues filed and fixed. Through multiple releases. Through the entire alpha program.\u003c/p\u003e\u003cp name=\"38c5\" id=\"38c5\" class=\"graf graf--p graf-after--p\"\u003eI wonder why Ted hand’t run into it?\u003c/p\u003e\u003cp name=\"d0c9\" id=\"d0c9\" class=\"graf graf--p graf-after--p\"\u003eThe answer was in his issue reports. Ted’s fourteen issues focused on requirements.txt conflicts, missing migrations, documentation gaps. All real problems. But nothing about the setup script failing on first run.\u003c/p\u003e\u003cp name=\"1547\" id=\"1547\" class=\"graf graf--p graf-after--p\"\u003eHe must have hit the failure, shrugged, and switched to manual setup, or kust stopped at that point. Then filed issues about everything else he encountered. Maybe, the script failure was so immediate, so total, that it didn’t even register as a bug worth reporting — just an obstacle to work around.\u003c/p\u003e\u003cp name=\"f720\" id=\"f720\" class=\"graf graf--p graf-after--p\"\u003ePairing with Dominique, as he set things up, coming in fresh, we caught it and logged the issue.\u003c/p\u003e\u003ch3 name=\"1796\" id=\"1796\" class=\"graf graf--h3 graf-after--p\"\u003eSystematic prevention\u003c/h3\u003e\u003cp name=\"ec34\" id=\"ec34\" class=\"graf graf--p graf-after--h3\"\u003eThe Windows bug led to a broader question: why wasn’t this caught automatically?\u003c/p\u003e\u003cp name=\"6027\" id=\"6027\" class=\"graf graf--p graf-after--p\"\u003eThe answer was uncomfortable. We had no Windows CI. Our continuous integration tested on Linux and macOS. Windows was… assumed. If a batch file was syntactically valid, we figured it would work.\u003c/p\u003e\u003cp name=\"162b\" id=\"162b\" class=\"graf graf--p graf-after--p\"\u003eBy Thursday afternoon, we had:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"eb86\" id=\"eb86\" class=\"graf graf--li graf-after--p\"\u003eA fixed setup script (restructured, \u003ccode class=\"markup--code markup--li-code\"\u003egoto :eof\u003c/code\u003e replacing \u003ccode class=\"markup--code markup--li-code\"\u003eexit /b\u003c/code\u003e)\u003c/li\u003e\u003cli name=\"692c\" id=\"692c\" class=\"graf graf--li graf-after--li\"\u003eA Windows CI workflow (runs on every change to batch files, PowerShell scripts, or requirements.txt)\u003c/li\u003e\u003cli name=\"a2ad\" id=\"a2ad\" class=\"graf graf--li graf-after--li\"\u003eA Windows smoke test script (for alpha testers to validate their setup manually)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"acd6\" id=\"acd6\" class=\"graf graf--p graf-after--li\"\u003eThe gap that had hidden for two months was now systematically covered.\u003c/p\u003e\u003ch3 name=\"8220\" id=\"8220\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the flu revealed\u003c/h3\u003e\u003cp name=\"ec99\" id=\"ec99\" class=\"graf graf--p graf-after--h3\"\u003eI was sick for most of this week. Genuinely, frustratingly, can’t-think-straight sick.\u003c/p\u003e\u003cp name=\"5b33\" id=\"5b33\" class=\"graf graf--p graf-after--p\"\u003eAnd the cathedral kept building itself.\u003c/p\u003e\u003cp name=\"423b\" id=\"423b\" class=\"graf graf--p graf-after--p\"\u003eNot autonomously — agents still needed prompts to start, guidance when stuck, decisions when options diverged. But the infrastructure we’d built over months proved itself. The omnibus logs captured what happened even when I couldn’t follow along in real time. The audit protocols surfaced the file loss before it became permanent. The methodology — investigate first, fix second — led to systematic prevention rather than one-off patches.\u003c/p\u003e\u003cp name=\"060f\" id=\"060f\" class=\"graf graf--p graf-after--p\"\u003eBy Friday, I was still recovering, but was able to make the rounds of all eight leadership agents for the weekly review — Chief of Staff, Architect, CIO, CXO, PPM, HoSR, Communications Chief, and the Lead Developer’s notes. They synthesized seven days of work across twenty-two sessions. Their conclusion matched what I’d been feeling all week: the infrastructure held.\u003c/p\u003e\u003cp name=\"ec80\" id=\"ec80\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe files that nearly vanished taught me something about institutional memory. The December bug taught me something about fresh eyes. And the flu taught me something about cathedrals: the good ones don’t need their architects present every day. They’re built to stand.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Cathedral in Winter\",\"excerpt\":\"“What would I do without you?”February 10 to 13By Monday, the flu had won. I’d been fighting it since feeling a pang in my sinus on Friday and it was established by Saturday, at which point I had started doing shorter sessions and lighter work on Piper Morh
