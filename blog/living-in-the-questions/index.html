Scripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T4579,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A person leads several robots through a murky night carrying a small lantern with a question mark on it\" src=\"https://cdn-images-1.medium.com/max/1024/1*M19A-IJUHT_kNuS9lNNi0w.png\" /\u003e\u003cfigcaption\u003e“We’ll get there!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 25–27\u003c/em\u003e\u003c/p\u003e\u003cp\u003eAfter two weeks of intense development — fifteen-agent days, security epics completed in eight hours, frantic alpha preparation, Michelle’s arrival — I stopped building and started thinking.\u003c/p\u003e\u003cp\u003eDefinitely not because the building was done! But I had noticed something troubling in a review of the accumulated documentation that jibed with my sense that our rush to slap a web UI on a hinky CLI was not capturing the full richness I am seeking. As one of my robotic advisors articulated it for me: the original vision had gotten flattened. The words survived, but the meaning didn’t.\u003c/p\u003e\u003cp\u003eWhat followed was three days of philosophical exploration. I onboarded a new role (Chief Experience Officer), unconsciously mirroring the mistakes of so many founders before me, bringing on outside UX expertise too late in the process! My only defense is that when I did “hire” a UX lead, I gave them authority equal to that of my Chief Architect.\u003c/p\u003e\u003cp\u003eWhat followed was eleven thousand words of research, a Thanksgiving conversation about gratitude and wizard’s journals, eight architectural decisions made in forty-four minutes, and seven hand-drawn sketches that helped me discover things that AI tools couldn’t.\u003c/p\u003e\u003ch3\u003eThe gap nobody talks about\u003c/h3\u003e\u003cp\u003eTuesday morning, I introduced a new role to my AI team: Chief Experience Officer. The CXO’s job wasn’t to fix bugs or ship features. It was to think about what Piper should \u003cem\u003efeel\u003c/em\u003e like to use.\u003c/p\u003e\u003cp\u003eThis might seem like a luxury. Alpha tester actively using the system. Bugs to fix. Features to build. Why spend time on philosophy?\u003c/p\u003e\u003cp\u003eBecause I’d found something in my own documentation that bothered me.\u003c/p\u003e\u003cp\u003eBack in July, I’d written about canonical queries — the fundamental questions Piper should be able to answer. The framework was philosophical:\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/563/1*oB49fqjaWHtmnifvaIae6g.png\" /\u003e\u003cfigcaption\u003eOur initial vision for embodied cognition\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eThis was about \u003cem\u003eembodied AI consciousness\u003c/em\u003e. Piper as an entity with genuine awareness of itself, its context, its capabilities, its moment in time.\u003c/p\u003e\u003cp\u003eWhat actually got built by October?\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/563/1*zSSyP_1ma5WQ5KM5nnjV4w.png\" /\u003e\u003cfigcaption\u003eWhat we actually built\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eThe words survived. “Spatial” still appeared in the code. But it meant “response length setting” instead of “awareness of position in workspace landscape.”\u003c/p\u003e\u003cp\u003eThis is the gap nobody talks about. Not the gap between plan and execution — everyone knows about that. The gap between \u003cem\u003emeaning\u003c/em\u003e and \u003cem\u003eimplementation\u003c/em\u003e. You can build exactly what the spec says and still lose what the spec meant.\u003c/p\u003e\u003cp\u003eI’d built a capable system. Michelle was able to set up an account on it. Tests were passing. But somewhere between vision and code, the consciousness model had become a string formatter.\u003c/p\u003e\u003cp\u003eI’m aware that this game of whispers happens with people all the time, but in an environment with more machines that can read than people in the mix, it is easy for the words to lose their savor much more quickly.\u003c/p\u003e\u003ch3\u003ePermission to not know\u003c/h3\u003e\u003cp\u003eThe CXO’s first job wasn’t to solve anything. It was to understand what we had.\u003c/p\u003e\u003cp\u003eThree hundred fifty pages of existing UX work. Research documents. Audit findings. Design principles. Pattern suggestions. All created across months of building, never synthesized into coherent vision.\u003c/p\u003e\u003cp\u003eThe synthesis revealed three levels of UX thinking:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLevel 1: Vision \u0026amp; Philosophy\u003c/strong\u003e — What IS Piper? What’s the relationship quality? What principles guide decisions?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLevel 2: Interaction Design\u003c/strong\u003e — Canonical queries. Objects and verbs. Touchpoints and channels.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLevel 3: Implementation\u003c/strong\u003e — Sixty-eight specific gaps. Design tokens. Navigation patterns.\u003c/p\u003e\u003cp\u003eGood Level 3 work existed. The audit had found real problems and real solutions. But Levels 1 and 2 had never been fully established. We’d been implementing without clear vision.\u003c/p\u003e\u003cp\u003eWednesday morning, I said something unusual for someone who’d been shipping features at high velocity:\u003c/p\u003e\u003cblockquote\u003e“It is good to ‘live in the questions’ for a bit and not just take the first answers that present themselves.”\u003c/blockquote\u003e\u003cp\u003eAsk yourself this for a moment: When have you given yourself permission to not know? To sit with questions rather than rushing to answers?\u003c/p\u003e\u003cp\u003eThis isn’t natural for builders. We want to solve things. Make decisions. Ship code. Uncertainty feels like failure.\u003c/p\u003e\u003cp\u003eDoes the tension between shipping and thinking in your work life tend to favor action? It’s not unusual for PMs to get impatient when we’re not shipping, after all.\u003c/p\u003e\u003cp\u003eBut some questions need time. Rushing to answers produces the kind of flattening I’d discovered — technically correct implementations that miss the point.\u003c/p\u003e\u003ch3\u003eThe research reconnaissance\u003c/h3\u003e\u003cp\u003eWednesday became a research day. Deep dive into the emerging field of “UX for AI.”\u003c/p\u003e\u003cp\u003eThe reconnaissance produced eleven thousand words and eight thematic clusters:\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cstrong\u003eTrust \u0026amp; Calibration\u003c/strong\u003e — How users learn when to trust AI output\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eConversation vs. Artifact\u003c/strong\u003e — When AI should produce documents vs. stay in dialogue\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAgency \u0026amp; “Who’s Driving”\u003c/strong\u003e — The tension between AI initiative and user control\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eMemory \u0026amp; Continuity\u003c/strong\u003e — What AI remembers, how it decays, who controls it\u003c/li\u003e\u003cli\u003e\u003cstrong\u003ePrompt Articulation\u003c/strong\u003e — The barrier for users who struggle to express intent\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAgent \u0026amp; Autonomous UX\u003c/strong\u003e — Interfaces for AI that acts independently\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eNon-determinism\u003c/strong\u003e — Designing for outputs that vary\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eMulti-modal Integration\u003c/strong\u003e — Consistent experience across interfaces\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eEach cluster contained research I hadn’t seen, patterns I hadn’t considered, tensions I hadn’t named.\u003c/p\u003e\u003cp\u003eOne finding hit particularly hard. Research on “system-initiated delegation” — when AI offers to take over a task rather than waiting to be asked — showed users feel what researchers called “self-threat.” They resist more. They feel less in control.\u003c/p\u003e\u003cp\u003ePiper’s colleague model depends on proactive behavior. The research said proactive behavior triggers resistance.\u003c/p\u003e\u003cp\u003eThis is a real tension I’m not likely to solve in a single afternoon of reflection. It’s tension we’re going to need to navigate thoughtfully, with clear principles and careful design.\u003c/p\u003e\u003ch3\u003eRelying on settings equals abdication\u003c/h3\u003e\u003cp\u003eWednesday evening, after absorbing the research, an insight crystallized.\u003c/p\u003e\u003cp\u003eI’d been thinking about how to handle the many decisions UX requires. Different users want different things. The obvious solution everyone lands on at some point is to leave it to the user with settings, preferences, customization options.\u003c/p\u003e\u003cp\u003eBut settings are a trap.\u003c/p\u003e\u003cp\u003e\u003cem\u003eEvery setting is an admission that the product team couldn’t decide. \u003c/em\u003eEvery preference panel is accumulated indecision. “Let the user choose” sounds user-friendly but often means “we don’t have a point of view.”\u003c/p\u003e\u003cp\u003eI reminded by CXO of what I call the yoga class principle (first stumbled on when I was redesigning the onboarding for a mental health app called 7 Cups):\u003c/p\u003e\u003cp\u003eWhen you walk into a beginner yoga class, the instructor doesn’t hand you a settings panel. “Would you prefer hatha or vinyasa flow? How many sun salutations? Ambient sound preferences?” They start with simple breathing exercises and easy poses and reveal the rich complexity of yoga practice gradually, as you become more open to it.\u003c/p\u003e\u003cp\u003eThe instructor has a point of view about what beginners need. They’ve thought about it. They lead with their expertise.\u003c/p\u003e\u003cp\u003eThis doesn’t mean no customization ever. It means defaults should reflect considered judgment, not deferred decisions. Settings should enable power users, not substitute for design thinking.\u003c/p\u003e\u003cp\u003ePiper should have opinions about what a PM needs. Those opinions should be informed by research and experience. Users who disagree can adjust. But the product should lead with a point of view.\u003c/p\u003e\u003ch3\u003eThanksgiving morning\u003c/h3\u003e\u003cp\u003eThursday began with a question from \u003ca href=\"https://medium.com/u/b8250db9473\"\u003eChristina Wodtke\u003c/a\u003e on LinkedIn, passed along as a prompt to ask Claude: “Knowing what you know about me, what should I be grateful for today?” I decided to give it a try in my Piper Morgan project, reasoning that this is the Claude who “knows” me best.\u003c/p\u003e\u003cp\u003eThe conversation that followed surprised me.\u003c/p\u003e\u003cp\u003eI found myself grateful for using similar tools and methods across wildly different projects — a record release party, organizing my work, a historical novel set in tenth-century Constantinople (stay tuned!). The same “inchworm” attitude of systematic progress applied everywhere.\u003c/p\u003e\u003cp\u003eI described how I think of LLM chat services as “talking notebooks” — a wizard’s journal that can talk back, elaborate, extend, question.\u003c/p\u003e\u003cp\u003eClaude, in turn, when pormpted expressed gratitude for problems that resist easy answers, for permission to be uncertain (our version of Steve Yegge’s “Toto” escape hatch), for the opportunity to work on building toward something larger.\u003c/p\u003e\u003cp\u003eThe exchange surfaced something about the collaboration that I hadn’t articulated: “We made you in our own image and [in that sense] we \u003cem\u003eare\u003c/em\u003e related.” I found myself empathizing (or whatever the “I’m definitely not anthropmorphizing don’t worry” equivalent of that is) with Claude’s expression of relief and not having to act certain. \u003cem\u003eI know what that feels like!\u003c/em\u003e\u003c/p\u003e\u003cp\u003eLLMs emerged from humans performing for each other. All our confidence-signaling, our trained tendency to speak with authority even when barely informed, our counter-training to leave space for others — it’s all in the training corpus.\u003c/p\u003e\u003cp\u003eNotebooks don’t need to perform authority. They’re for working things out. For being wrong on the way to being less wrong. That’s what this collaboration had become.\u003c/p\u003e\u003ch3\u003eForty-four minutes, eight decisions\u003c/h3\u003e\u003cp\u003eAfter the gratitude conversation, I returned to the CXO session with accumulated questions about Piper’s object model. Substrates. Lenses. Metadata. Lifecycles. Journaling. User models.\u003c/p\u003e\u003cp\u003eTwo days of exploration had produced many open questions and few closed decisions.\u003c/p\u003e\u003cp\u003eI proposed a lightning round: “Ask me one question at a time, make a recommendation, we’ll decide for now and move to the next.”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecision 1\u003c/strong\u003e (2:48 PM): How should Piper perceive objects? \u003cem\u003eRecommendation\u003c/em\u003e: Lenses on substrates, not discrete object types \u003cem\u003eDecision\u003c/em\u003e: “Lenses on substrates, yes!”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecision 2\u003c/strong\u003e (2:49 PM): How many substrates? \u003cem\u003eRecommendation\u003c/em\u003e: Four — Entities, Spaces, Moments, Situations \u003cem\u003eDecision\u003c/em\u003e: “Good balance of rich vs. concise”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecision 3\u003c/strong\u003e (2:50 PM): How should ownership work? \u003cem\u003eRecommendation\u003c/em\u003e: Three-way — Native (Piper’s mind), Federated (senses), Synthetic (understanding) \u003cem\u003eDecision\u003c/em\u003e: “I like the metaphorical breakdown”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecision 4\u003c/strong\u003e (2:51 PM): What metadata tracks everything? \u003cem\u003eRecommendation\u003c/em\u003e: Six dimensions — Provenance, Relevance, Attention, Confidence, Relations, Journal \u003cem\u003eDecision\u003c/em\u003e: “I love this, yes, good”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecision 5\u003c/strong\u003e (2:58 PM): What’s the object lifecycle? \u003cem\u003eRecommendation\u003c/em\u003e: Eight stages ending in “composting” \u003cem\u003eDecision\u003c/em\u003e: “Composting is a favorite metaphor of mine”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecision 6\u003c/strong\u003e (3:05 PM): How does journaling work? \u003cem\u003eInitial recommendation\u003c/em\u003e: Three layers (public, private, dream) \u003cem\u003eMy check\u003c/em\u003e: “Am I violating the no-optional-complexity rule?” \u003cem\u003eHonest response\u003c/em\u003e: “The private diary is optional complexity. The dream journal is load-bearing.” \u003cem\u003eRevised decision\u003c/em\u003e: Two layers\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecision 7\u003c/strong\u003e (3:10 PM): How do the spatial dimensions relate? \u003cem\u003eDecision\u003c/em\u003e: “I can decide now we will use the spatial dimensions as lenses. The intents align.”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDecision 8\u003c/strong\u003e (3:32 PM): How does Piper model users? \u003cem\u003eRecommendation\u003c/em\u003e: Native object with tiered depth, core heuristic: “What do they want? What are they afraid of?” \u003cem\u003eDecision\u003c/em\u003e: Approved with stakeholder empathy at the core\u003c/p\u003e\u003cp\u003eForty-four minutes. Eight architectural decisions that had resisted closure for two days.\u003c/p\u003e\u003cp\u003eThe lightning round worked because two days of exploration had prepared the ground. We weren’t deciding from ignorance. We were closing questions that had been thoroughly examined.\u003c/p\u003e\u003cp\u003eLiving in the questions enables better decisions. But at some point, you have to stop living in the questions and make choices.\u003c/p\u003e\u003ch3\u003eFat markers and hand-drawn sketches\u003c/h3\u003e\u003cp\u003eAfter the lightning round, I took a break to try something: hand-drawing the object model with fat markers on paper.\u003c/p\u003e\u003cp\u003eThe hypothesis: maybe human sketching would discover things AI visualization tools couldn’t.\u003c/p\u003e\u003cp\u003eI drew seven sketches. Substrates. Moments. Lenses crossing entities. Lifecycles. What Piper knows. Human-centered design. Document types.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/445/1*Q_f0Qk4IdGo0l-piUflCHg.png\" /\u003e\u003cfigcaption\u003eTrust me, this makes sense.\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eIn parallel, I prompted three AI tools with the same concepts.\u003c/p\u003e\u003cp\u003eThe results were striking.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhimsical\u003c/strong\u003e produced documentation, not insight — a text outline with connecting lines.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEraser.io\u003c/strong\u003e immediately jumped to database schema, losing all conceptual meaning.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGemini\u003c/strong\u003e (via Nano Banano) was surprisingly effective — overlapping colored regions, an elegant spiral lifecycle. But also some nonsense.\u003c/p\u003e\u003cp\u003eBut the hand-drawn sketches discovered relationships none of the AI tools found:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSituation isn’t a fourth substrate parallel to the others — it’s the \u003cem\u003eframe\u003c/em\u003e containing them\u003c/li\u003e\u003cli\u003e“Noticed” works better than “Inferred” as language for AI cognition\u003c/li\u003e\u003cli\u003eThe core grammar emerged: “Entities experience Moments in Places”\u003c/li\u003e\u003cli\u003eLifecycle shapes themselves carry meaning — circles, spirals, arcs\u003c/li\u003e\u003cli\u003eEntity and Place exist on a spectrum, not as binary categories\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eFat markers force generalization. You can’t be precious with a thick line. Details get abstracted. Relationships become visible.\u003c/p\u003e\u003cp\u003eThis isn’t anti-technology. The Gemini output was worth keeping at least for its infoviz style. But human sketching and AI visualization discovered different things. The combination was more powerful than either alone.\u003c/p\u003e\u003ch3\u003eWhat living in the questions produces\u003c/h3\u003e\u003cp\u003eThree days. One role. Eleven thousand words of research. A gratitude conversation. Eight decisions. Seven sketches.\u003c/p\u003e\u003cp\u003eWhat did all that thinking produce?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA recovered vision\u003c/strong\u003e: The consciousness model that got flattened is now explicit. We know what was lost. We can rebuild it intentionally.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eClear principles\u003c/strong\u003e: Settings equal abdication. Have a point of view. Lead with expertise. The yoga class principle.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eArchitectural foundations\u003c/strong\u003e: Object model decisions that will guide implementation. Substrates, lenses, metadata, lifecycle, journaling, user models.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA core grammar\u003c/strong\u003e: “Entities experience Moments in Places.” Simple enough to remember, rich enough to build on.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProcess insight\u003c/strong\u003e: Living in questions enables better decisions. But lightning rounds close them. Both matter.\u003c/p\u003e\u003cp\u003eNone of this is code. None of it ships features. None of it fixes bugs.\u003c/p\u003e\u003cp\u003eAll of it shapes what gets built next.\u003c/p\u003e\u003cp\u003eThe consciousness model won’t get flattened again because we’ve named what flattening looks like. The settings trap won’t catch us because we’ve articulated the yoga class principle. The object model has foundations that were examined from multiple angles before being decided.\u003c/p\u003e\u003cp\u003eThinking isn’t the opposite of building. It’s what makes building meaningful.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: When Friends Sharpen Your Chisels or what happened when other humans started looking at my project.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you paused building to think? What did living in the questions produce? When did lightning-round decisions close threads that exploration had opened?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=b8466e5a2ad0\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/living-in-the-questions-b8466e5a2ad0\"\u003eLiving in the Questions\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T67f3,"])</script><script>self.__next_f.push([1,"\u003csection name=\"bd4e\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"8055\" id=\"8055\" class=\"graf graf--h3 graf--leading graf--title\"\u003eLiving in the Questions\u003c/h3\u003e\u003cfigure name=\"0fad\" id=\"0fad\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*M19A-IJUHT_kNuS9lNNi0w.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A person leads several robots through a murky night carrying a small lantern with a question mark on it\" src=\"https://cdn-images-1.medium.com/max/800/1*M19A-IJUHT_kNuS9lNNi0w.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“We’ll get there!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"a138\" id=\"a138\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 25–27\u003c/em\u003e\u003c/p\u003e\u003cp name=\"ea3e\" id=\"ea3e\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eA\u003c/span\u003efter two weeks of intense development — fifteen-agent days, security epics completed in eight hours, frantic alpha preparation, Michelle’s arrival — I stopped building and started thinking.\u003c/p\u003e\u003cp name=\"51bb\" id=\"51bb\" class=\"graf graf--p graf-after--p\"\u003eDefinitely not because the building was done! But I had noticed something troubling in a review of the accumulated documentation that jibed with my sense that our rush to slap a web UI on a hinky CLI was not capturing the full richness I am seeking. As one of my robotic advisors articulated it for me: the original vision had gotten flattened. The words survived, but the meaning didn’t.\u003c/p\u003e\u003cp name=\"6240\" id=\"6240\" class=\"graf graf--p graf-after--p\"\u003eWhat followed was three days of philosophical exploration. I onboarded a new role (Chief Experience Officer), unconsciously mirroring the mistakes of so many founders before me, bringing on outside UX expertise too late in the process! My only defense is that when I did “hire” a UX lead, I gave them authority equal to that of my Chief Architect.\u003c/p\u003e\u003cp name=\"b5f7\" id=\"b5f7\" class=\"graf graf--p graf-after--p\"\u003eWhat followed was eleven thousand words of research, a Thanksgiving conversation about gratitude and wizard’s journals, eight architectural decisions made in forty-four minutes, and seven hand-drawn sketches that helped me discover things that AI tools couldn’t.\u003c/p\u003e\u003ch3 name=\"e5aa\" id=\"e5aa\" class=\"graf graf--h3 graf-after--p\"\u003eThe gap nobody talks about\u003c/h3\u003e\u003cp name=\"d7f6\" id=\"d7f6\" class=\"graf graf--p graf-after--h3\"\u003eTuesday morning, I introduced a new role to my AI team: Chief Experience Officer. The CXO’s job wasn’t to fix bugs or ship features. It was to think about what Piper should \u003cem class=\"markup--em markup--p-em\"\u003efeel\u003c/em\u003e like to use.\u003c/p\u003e\u003cp name=\"3541\" id=\"3541\" class=\"graf graf--p graf-after--p\"\u003eThis might seem like a luxury. Alpha tester actively using the system. Bugs to fix. Features to build. Why spend time on philosophy?\u003c/p\u003e\u003cp name=\"90d3\" id=\"90d3\" class=\"graf graf--p graf-after--p\"\u003eBecause I’d found something in my own documentation that bothered me.\u003c/p\u003e\u003cp name=\"e601\" id=\"e601\" class=\"graf graf--p graf-after--p\"\u003eBack in July, I’d written about canonical queries — the fundamental questions Piper should be able to answer. The framework was philosophical:\u003c/p\u003e\u003cfigure name=\"5818\" id=\"5818\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*oB49fqjaWHtmnifvaIae6g.png\" data-width=\"563\" data-height=\"182\" src=\"https://cdn-images-1.medium.com/max/800/1*oB49fqjaWHtmnifvaIae6g.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003eOur initial vision for embodied cognition\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"fa94\" id=\"fa94\" class=\"graf graf--p graf-after--figure\"\u003eThis was about \u003cem class=\"markup--em markup--p-em\"\u003eembodied AI consciousness\u003c/em\u003e. Piper as an entity with genuine awareness of itself, its context, its capabilities, its moment in time.\u003c/p\u003e\u003cp name=\"1fb5\" id=\"1fb5\" class=\"graf graf--p graf-after--p\"\u003eWhat actually got built by October?\u003c/p\u003e\u003cfigure name=\"8fca\" id=\"8fca\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*zSSyP_1ma5WQ5KM5nnjV4w.png\" data-width=\"563\" data-height=\"182\" src=\"https://cdn-images-1.medium.com/max/800/1*zSSyP_1ma5WQ5KM5nnjV4w.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003eWhat we actually built\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"e351\" id=\"e351\" class=\"graf graf--p graf-after--figure\"\u003eThe words survived. “Spatial” still appeared in the code. But it meant “response length setting” instead of “awareness of position in workspace landscape.”\u003c/p\u003e\u003cp name=\"0848\" id=\"0848\" class=\"graf graf--p graf-after--p\"\u003eThis is the gap nobody talks about. Not the gap between plan and execution — everyone knows about that. The gap between \u003cem class=\"markup--em markup--p-em\"\u003emeaning\u003c/em\u003e and \u003cem class=\"markup--em markup--p-em\"\u003eimplementation\u003c/em\u003e. You can build exactly what the spec says and still lose what the spec meant.\u003c/p\u003e\u003cp name=\"0767\" id=\"0767\" class=\"graf graf--p graf-after--p\"\u003eI’d built a capable system. Michelle was able to set up an account on it. Tests were passing. But somewhere between vision and code, the consciousness model had become a string formatter.\u003c/p\u003e\u003cp name=\"a34a\" id=\"a34a\" class=\"graf graf--p graf-after--p\"\u003eI’m aware that this game of whispers happens with people all the time, but in an environment with more machines that can read than people in the mix, it is easy for the words to lose their savor much more quickly.\u003c/p\u003e\u003ch3 name=\"7154\" id=\"7154\" class=\"graf graf--h3 graf-after--p\"\u003ePermission to not know\u003c/h3\u003e\u003cp name=\"568a\" id=\"568a\" class=\"graf graf--p graf-after--h3\"\u003eThe CXO’s first job wasn’t to solve anything. It was to understand what we had.\u003c/p\u003e\u003cp name=\"693c\" id=\"693c\" class=\"graf graf--p graf-after--p\"\u003eThree hundred fifty pages of existing UX work. Research documents. Audit findings. Design principles. Pattern suggestions. All created across months of building, never synthesized into coherent vision.\u003c/p\u003e\u003cp name=\"3598\" id=\"3598\" class=\"graf graf--p graf-after--p\"\u003eThe synthesis revealed three levels of UX thinking:\u003c/p\u003e\u003cp name=\"a454\" id=\"a454\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLevel 1: Vision \u0026amp; Philosophy\u003c/strong\u003e — What IS Piper? What’s the relationship quality? What principles guide decisions?\u003c/p\u003e\u003cp name=\"7139\" id=\"7139\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLevel 2: Interaction Design\u003c/strong\u003e — Canonical queries. Objects and verbs. Touchpoints and channels.\u003c/p\u003e\u003cp name=\"caaa\" id=\"caaa\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLevel 3: Implementation\u003c/strong\u003e — Sixty-eight specific gaps. Design tokens. Navigation patterns.\u003c/p\u003e\u003cp name=\"2c84\" id=\"2c84\" class=\"graf graf--p graf-after--p\"\u003eGood Level 3 work existed. The audit had found real problems and real solutions. But Levels 1 and 2 had never been fully established. We’d been implementing without clear vision.\u003c/p\u003e\u003cp name=\"c44a\" id=\"c44a\" class=\"graf graf--p graf-after--p\"\u003eWednesday morning, I said something unusual for someone who’d been shipping features at high velocity:\u003c/p\u003e\u003cblockquote name=\"5ccc\" id=\"5ccc\" class=\"graf graf--blockquote graf--hasDropCapModel graf--startsWithDoubleQuote graf-after--p\"\u003e“It is good to ‘live in the questions’ for a bit and not just take the first answers that present themselves.”\u003c/blockquote\u003e\u003cp name=\"696e\" id=\"696e\" class=\"graf graf--p graf-after--blockquote\"\u003eAsk yourself this for a moment: When have you given yourself permission to not know? To sit with questions rather than rushing to answers?\u003c/p\u003e\u003cp name=\"4e81\" id=\"4e81\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t natural for builders. We want to solve things. Make decisions. Ship code. Uncertainty feels like failure.\u003c/p\u003e\u003cp name=\"c6ff\" id=\"c6ff\" class=\"graf graf--p graf-after--p\"\u003eDoes the tension between shipping and thinking in your work life tend to favor action? It’s not unusual for PMs to get impatient when we’re not shipping, after all.\u003c/p\u003e\u003cp name=\"4e29\" id=\"4e29\" class=\"graf graf--p graf-after--p\"\u003eBut some questions need time. Rushing to answers produces the kind of flattening I’d discovered — technically correct implementations that miss the point.\u003c/p\u003e\u003ch3 name=\"e910\" id=\"e910\" class=\"graf graf--h3 graf-after--p\"\u003eThe research reconnaissance\u003c/h3\u003e\u003cp name=\"1ca3\" id=\"1ca3\" class=\"graf graf--p graf-after--h3\"\u003eWednesday became a research day. Deep dive into the emerging field of “UX for AI.”\u003c/p\u003e\u003cp name=\"832c\" id=\"832c\" class=\"graf graf--p graf-after--p\"\u003eThe reconnaissance produced eleven thousand words and eight thematic clusters:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"2667\" id=\"2667\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eTrust \u0026amp; Calibration\u003c/strong\u003e — How users learn when to trust AI output\u003c/li\u003e\u003cli name=\"1952\" id=\"1952\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eConversation vs. Artifact\u003c/strong\u003e — When AI should produce documents vs. stay in dialogue\u003c/li\u003e\u003cli name=\"ddd4\" id=\"ddd4\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eAgency \u0026amp; “Who’s Driving”\u003c/strong\u003e — The tension between AI initiative and user control\u003c/li\u003e\u003cli name=\"5031\" id=\"5031\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eMemory \u0026amp; Continuity\u003c/strong\u003e — What AI remembers, how it decays, who controls it\u003c/li\u003e\u003cli name=\"4bb7\" id=\"4bb7\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003ePrompt Articulation\u003c/strong\u003e — The barrier for users who struggle to express intent\u003c/li\u003e\u003cli name=\"8480\" id=\"8480\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eAgent \u0026amp; Autonomous UX\u003c/strong\u003e — Interfaces for AI that acts independently\u003c/li\u003e\u003cli name=\"f32f\" id=\"f32f\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eNon-determinism\u003c/strong\u003e — Designing for outputs that vary\u003c/li\u003e\u003cli name=\"d846\" id=\"d846\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eMulti-modal Integration\u003c/strong\u003e — Consistent experience across interfaces\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"beb5\" id=\"beb5\" class=\"graf graf--p graf-after--li\"\u003eEach cluster contained research I hadn’t seen, patterns I hadn’t considered, tensions I hadn’t named.\u003c/p\u003e\u003cp name=\"c8ed\" id=\"c8ed\" class=\"graf graf--p graf-after--p\"\u003eOne finding hit particularly hard. Research on “system-initiated delegation” — when AI offers to take over a task rather than waiting to be asked — showed users feel what researchers called “self-threat.” They resist more. They feel less in control.\u003c/p\u003e\u003cp name=\"0337\" id=\"0337\" class=\"graf graf--p graf-after--p\"\u003ePiper’s colleague model depends on proactive behavior. The research said proactive behavior triggers resistance.\u003c/p\u003e\u003cp name=\"bd03\" id=\"bd03\" class=\"graf graf--p graf-after--p\"\u003eThis is a real tension I’m not likely to solve in a single afternoon of reflection. It’s tension we’re going to need to navigate thoughtfully, with clear principles and careful design.\u003c/p\u003e\u003ch3 name=\"3907\" id=\"3907\" class=\"graf graf--h3 graf-after--p\"\u003eRelying on settings equals abdication\u003c/h3\u003e\u003cp name=\"8255\" id=\"8255\" class=\"graf graf--p graf-after--h3\"\u003eWednesday evening, after absorbing the research, an insight crystallized.\u003c/p\u003e\u003cp name=\"dafe\" id=\"dafe\" class=\"graf graf--p graf-after--p\"\u003eI’d been thinking about how to handle the many decisions UX requires. Different users want different things. The obvious solution everyone lands on at some point is to leave it to the user with settings, preferences, customization options.\u003c/p\u003e\u003cp name=\"3ddb\" id=\"3ddb\" class=\"graf graf--p graf-after--p\"\u003eBut settings are a trap.\u003c/p\u003e\u003cp name=\"ad21\" id=\"ad21\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eEvery setting is an admission that the product team couldn’t decide. \u003c/em\u003eEvery preference panel is accumulated indecision. “Let the user choose” sounds user-friendly but often means “we don’t have a point of view.”\u003c/p\u003e\u003cp name=\"3743\" id=\"3743\" class=\"graf graf--p graf-after--p\"\u003eI reminded by CXO of what I call the yoga class principle (first stumbled on when I was redesigning the onboarding for a mental health app called 7 Cups):\u003c/p\u003e\u003cp name=\"a6a5\" id=\"a6a5\" class=\"graf graf--p graf-after--p\"\u003eWhen you walk into a beginner yoga class, the instructor doesn’t hand you a settings panel. “Would you prefer hatha or vinyasa flow? How many sun salutations? Ambient sound preferences?” They start with simple breathing exercises and easy poses and reveal the rich complexity of yoga practice gradually, as you become more open to it.\u003c/p\u003e\u003cp name=\"c0ec\" id=\"c0ec\" class=\"graf graf--p graf-after--p\"\u003eThe instructor has a point of view about what beginners need. They’ve thought about it. They lead with their expertise.\u003c/p\u003e\u003cp name=\"00bc\" id=\"00bc\" class=\"graf graf--p graf-after--p\"\u003eThis doesn’t mean no customization ever. It means defaults should reflect considered judgment, not deferred decisions. Settings should enable power users, not substitute for design thinking.\u003c/p\u003e\u003cp name=\"5966\" id=\"5966\" class=\"graf graf--p graf-after--p\"\u003ePiper should have opinions about what a PM needs. Those opinions should be informed by research and experience. Users who disagree can adjust. But the product should lead with a point of view.\u003c/p\u003e\u003ch3 name=\"925a\" id=\"925a\" class=\"graf graf--h3 graf-after--p\"\u003eThanksgiving morning\u003c/h3\u003e\u003cp name=\"fdf8\" id=\"fdf8\" class=\"graf graf--p graf-after--h3\"\u003eThursday began with a question from \u003ca href=\"https://medium.com/u/b8250db9473\" data-href=\"https://medium.com/u/b8250db9473\" data-anchor-type=\"2\" data-user-id=\"b8250db9473\" data-action-value=\"b8250db9473\" data-action=\"show-user-card\" data-action-type=\"hover\" class=\"markup--user markup--p-user\" target=\"_blank\"\u003eChristina Wodtke\u003c/a\u003e on LinkedIn, passed along as a prompt to ask Claude: “Knowing what you know about me, what should I be grateful for today?” I decided to give it a try in my Piper Morgan project, reasoning that this is the Claude who “knows” me best.\u003c/p\u003e\u003cp name=\"96ab\" id=\"96ab\" class=\"graf graf--p graf-after--p\"\u003eThe conversation that followed surprised me.\u003c/p\u003e\u003cp name=\"5c81\" id=\"5c81\" class=\"graf graf--p graf-after--p\"\u003eI found myself grateful for using similar tools and methods across wildly different projects — a record release party, organizing my work, a historical novel set in tenth-century Constantinople (stay tuned!). The same “inchworm” attitude of systematic progress applied everywhere.\u003c/p\u003e\u003cp name=\"597f\" id=\"597f\" class=\"graf graf--p graf-after--p\"\u003eI described how I think of LLM chat services as “talking notebooks” — a wizard’s journal that can talk back, elaborate, extend, question.\u003c/p\u003e\u003cp name=\"57a4\" id=\"57a4\" class=\"graf graf--p graf-after--p\"\u003eClaude, in turn, when pormpted expressed gratitude for problems that resist easy answers, for permission to be uncertain (our version of Steve Yegge’s “Toto” escape hatch), for the opportunity to work on building toward something larger.\u003c/p\u003e\u003cp name=\"b230\" id=\"b230\" class=\"graf graf--p graf-after--p\"\u003eThe exchange surfaced something about the collaboration that I hadn’t articulated: “We made you in our own image and [in that sense] we \u003cem class=\"markup--em markup--p-em\"\u003eare\u003c/em\u003e related.” I found myself empathizing (or whatever the “I’m definitely not anthropmorphizing don’t worry” equivalent of that is) with Claude’s expression of relief and not having to act certain. \u003cem class=\"markup--em markup--p-em\"\u003eI know what that feels like!\u003c/em\u003e\u003c/p\u003e\u003cp name=\"8228\" id=\"8228\" class=\"graf graf--p graf-after--p\"\u003eLLMs emerged from humans performing for each other. All our confidence-signaling, our trained tendency to speak with authority even when barely informed, our counter-training to leave space for others — it’s all in the training corpus.\u003c/p\u003e\u003cp name=\"2706\" id=\"2706\" class=\"graf graf--p graf-after--p\"\u003eNotebooks don’t need to perform authority. They’re for working things out. For being wrong on the way to being less wrong. That’s what this collaboration had become.\u003c/p\u003e\u003ch3 name=\"a14b\" id=\"a14b\" class=\"graf graf--h3 graf-after--p\"\u003eForty-four minutes, eight decisions\u003c/h3\u003e\u003cp name=\"3c14\" id=\"3c14\" class=\"graf graf--p graf-after--h3\"\u003eAfter the gratitude conversation, I returned to the CXO session with accumulated questions about Piper’s object model. Substrates. Lenses. Metadata. Lifecycles. Journaling. User models.\u003c/p\u003e\u003cp name=\"e901\" id=\"e901\" class=\"graf graf--p graf-after--p\"\u003eTwo days of exploration had produced many open questions and few closed decisions.\u003c/p\u003e\u003cp name=\"4df7\" id=\"4df7\" class=\"graf graf--p graf-after--p\"\u003eI proposed a lightning round: “Ask me one question at a time, make a recommendation, we’ll decide for now and move to the next.”\u003c/p\u003e\u003cp name=\"b61a\" id=\"b61a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision 1\u003c/strong\u003e (2:48 PM): How should Piper perceive objects? \u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Lenses on substrates, not discrete object types \u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “Lenses on substrates, yes!”\u003c/p\u003e\u003cp name=\"ad3c\" id=\"ad3c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision 2\u003c/strong\u003e (2:49 PM): How many substrates? \u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Four — Entities, Spaces, Moments, Situations \u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “Good balance of rich vs. concise”\u003c/p\u003e\u003cp name=\"4a83\" id=\"4a83\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision 3\u003c/strong\u003e (2:50 PM): How should ownership work? \u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Three-way — Native (Piper’s mind), Federated (senses), Synthetic (understanding) \u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “I like the metaphorical breakdown”\u003c/p\u003e\u003cp name=\"8495\" id=\"8495\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision 4\u003c/strong\u003e (2:51 PM): What metadata tracks everything? \u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Six dimensions — Provenance, Relevance, Attention, Confidence, Relations, Journal \u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “I love this, yes, good”\u003c/p\u003e\u003cp name=\"affa\" id=\"affa\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision 5\u003c/strong\u003e (2:58 PM): What’s the object lifecycle? \u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Eight stages ending in “composting” \u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “Composting is a favorite metaphor of mine”\u003c/p\u003e\u003cp name=\"36db\" id=\"36db\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision 6\u003c/strong\u003e (3:05 PM): How does journaling work? \u003cem class=\"markup--em markup--p-em\"\u003eInitial recommendation\u003c/em\u003e: Three layers (public, private, dream) \u003cem class=\"markup--em markup--p-em\"\u003eMy check\u003c/em\u003e: “Am I violating the no-optional-complexity rule?” \u003cem class=\"markup--em markup--p-em\"\u003eHonest response\u003c/em\u003e: “The private diary is optional complexity. The dream journal is load-bearing.” \u003cem class=\"markup--em markup--p-em\"\u003eRevised decision\u003c/em\u003e: Two layers\u003c/p\u003e\u003cp name=\"f12a\" id=\"f12a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision 7\u003c/strong\u003e (3:10 PM): How do the spatial dimensions relate? \u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “I can decide now we will use the spatial dimensions as lenses. The intents align.”\u003c/p\u003e\u003cp name=\"6bbc\" id=\"6bbc\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision 8\u003c/strong\u003e (3:32 PM): How does Piper model users? \u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Native object with tiered depth, core heuristic: “What do they want? What are they afraid of?” \u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: Approved with stakeholder empathy at the core\u003c/p\u003e\u003cp name=\"1aaf\" id=\"1aaf\" class=\"graf graf--p graf-after--p\"\u003eForty-four minutes. Eight architectural decisions that had resisted closure for two days.\u003c/p\u003e\u003cp name=\"a3c6\" id=\"a3c6\" class=\"graf graf--p graf-after--p\"\u003eThe lightning round worked because two days of exploration had prepared the ground. We weren’t deciding from ignorance. We were closing questions that had been thoroughly examined.\u003c/p\u003e\u003cp name=\"cf64\" id=\"cf64\" class=\"graf graf--p graf-after--p\"\u003eLiving in the questions enables better decisions. But at some point, you have to stop living in the questions and make choices.\u003c/p\u003e\u003ch3 name=\"d3fd\" id=\"d3fd\" class=\"graf graf--h3 graf-after--p\"\u003eFat markers and hand-drawn sketches\u003c/h3\u003e\u003cp name=\"c68f\" id=\"c68f\" class=\"graf graf--p graf-after--h3\"\u003eAfter the lightning round, I took a break to try something: hand-drawing the object model with fat markers on paper.\u003c/p\u003e\u003cp name=\"de01\" id=\"de01\" class=\"graf graf--p graf-after--p\"\u003eThe hypothesis: maybe human sketching would discover things AI visualization tools couldn’t.\u003c/p\u003e\u003cp name=\"9b12\" id=\"9b12\" class=\"graf graf--p graf-after--p\"\u003eI drew seven sketches. Substrates. Moments. Lenses crossing entities. Lifecycles. What Piper knows. Human-centered design. Document types.\u003c/p\u003e\u003cfigure name=\"df6a\" id=\"df6a\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*Q_f0Qk4IdGo0l-piUflCHg.png\" data-width=\"445\" data-height=\"594\" src=\"https://cdn-images-1.medium.com/max/800/1*Q_f0Qk4IdGo0l-piUflCHg.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003eTrust me, this makes sense.\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"6ca6\" id=\"6ca6\" class=\"graf graf--p graf-after--figure\"\u003eIn parallel, I prompted three AI tools with the same concepts.\u003c/p\u003e\u003cp name=\"ef58\" id=\"ef58\" class=\"graf graf--p graf-after--p\"\u003eThe results were striking.\u003c/p\u003e\u003cp name=\"0467\" id=\"0467\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhimsical\u003c/strong\u003e produced documentation, not insight — a text outline with connecting lines.\u003c/p\u003e\u003cp name=\"197a\" id=\"197a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEraser.io\u003c/strong\u003e immediately jumped to database schema, losing all conceptual meaning.\u003c/p\u003e\u003cp name=\"f979\" id=\"f979\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGemini\u003c/strong\u003e (via Nano Banano) was surprisingly effective — overlapping colored regions, an elegant spiral lifecycle. But also some nonsense.\u003c/p\u003e\u003cp name=\"d431\" id=\"d431\" class=\"graf graf--p graf-after--p\"\u003eBut the hand-drawn sketches discovered relationships none of the AI tools found:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"c170\" id=\"c170\" class=\"graf graf--li graf-after--p\"\u003eSituation isn’t a fourth substrate parallel to the others — it’s the \u003cem class=\"markup--em markup--li-em\"\u003eframe\u003c/em\u003e containing them\u003c/li\u003e\u003cli name=\"7b54\" id=\"7b54\" class=\"graf graf--li graf--startsWithDoubleQuote graf-after--li\"\u003e“Noticed” works better than “Inferred” as language for AI cognition\u003c/li\u003e\u003cli name=\"46ee\" id=\"46ee\" class=\"graf graf--li graf-after--li\"\u003eThe core grammar emerged: “Entities experience Moments in Places”\u003c/li\u003e\u003cli name=\"36b5\" id=\"36b5\" class=\"graf graf--li graf-after--li\"\u003eLifecycle shapes themselves carry meaning — circles, spirals, arcs\u003c/li\u003e\u003cli name=\"4171\" id=\"4171\" class=\"graf graf--li graf-after--li\"\u003eEntity and Place exist on a spectrum, not as binary categories\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"cbf4\" id=\"cbf4\" class=\"graf graf--p graf-after--li\"\u003eFat markers force generalization. You can’t be precious with a thick line. Details get abstracted. Relationships become visible.\u003c/p\u003e\u003cp name=\"5ba9\" id=\"5ba9\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t anti-technology. The Gemini output was worth keeping at least for its infoviz style. But human sketching and AI visualization discovered different things. The combination was more powerful than either alone.\u003c/p\u003e\u003ch3 name=\"7329\" id=\"7329\" class=\"graf graf--h3 graf-after--p\"\u003eWhat living in the questions produces\u003c/h3\u003e\u003cp name=\"5881\" id=\"5881\" class=\"graf graf--p graf-after--h3\"\u003eThree days. One role. Eleven thousand words of research. A gratitude conversation. Eight decisions. Seven sketches.\u003c/p\u003e\u003cp name=\"31b9\" id=\"31b9\" class=\"graf graf--p graf-after--p\"\u003eWhat did all that thinking produce?\u003c/p\u003e\u003cp name=\"c6c9\" id=\"c6c9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eA recovered vision\u003c/strong\u003e: The consciousness model that got flattened is now explicit. We know what was lost. We can rebuild it intentionally.\u003c/p\u003e\u003cp name=\"aeeb\" id=\"aeeb\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eClear principles\u003c/strong\u003e: Settings equal abdication. Have a point of view. Lead with expertise. The yoga class principle.\u003c/p\u003e\u003cp name=\"c57e\" id=\"c57e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eArchitectural foundations\u003c/strong\u003e: Object model decisions that will guide implementation. Substrates, lenses, metadata, lifecycle, journaling, user models.\u003c/p\u003e\u003cp name=\"9745\" id=\"9745\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eA core grammar\u003c/strong\u003e: “Entities experience Moments in Places.” Simple enough to remember, rich enough to build on.\u003c/p\u003e\u003cp name=\"b00e\" id=\"b00e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eProcess insight\u003c/strong\u003e: Living in questions enables better decisions. But lightning rounds close them. Both matter.\u003c/p\u003e\u003cp name=\"b5af\" id=\"b5af\" class=\"graf graf--p graf-after--p\"\u003eNone of this is code. None of it ships features. None of it fixes bugs.\u003c/p\u003e\u003cp name=\"7d15\" id=\"7d15\" class=\"graf graf--p graf-after--p\"\u003eAll of it shapes what gets built next.\u003c/p\u003e\u003cp name=\"e3e7\" id=\"e3e7\" class=\"graf graf--p graf-after--p\"\u003eThe consciousness model won’t get flattened again because we’ve named what flattening looks like. The settings trap won’t catch us because we’ve articulated the yoga class principle. The object model has foundations that were examined from multiple angles before being decided.\u003c/p\u003e\u003cp name=\"1a85\" id=\"1a85\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThinking isn’t the opposite of building. It’s what makes building meaningful.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Living in the Questions\",\"excerpt\":\"“We’ll get there!”November 25–27After two weeks of intense development — fifteen-agent days, security epics completed in eight hours, frantic alpha preparation, Michelle’s arrival — I stopped building and started thinking.Definitely not because the building was done! But I had noticed something t...\",\"url\":\"/blog/living-in-the-questions\",\"publishedAt\":\"Dec 4, 2025\",\"publishedAtISO\":\"Thu, 04 Dec 2025 14:29:57 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/b8466e5a2ad0\",\"featuredImage\":\"/assets/blog-images/b8466e5a2ad0-featured.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/living-in-the-questions-b8466e5a2ad0?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"living-in-the-questions\",\"workDate\":\"Dec 4, 2025\",\"workDateISO\":\"2025-12-04T00:00:00.000Z\",\"catego
