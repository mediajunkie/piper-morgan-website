\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T22cc,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eApril 19, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eIt was a Sunday morning, and six of my agents made the same mistake within a ten-minute window. Then one of them made a \u003cem\u003esecond\u003c/em\u003e mistake an hour later. And the lesson didn't really land until both had played out.\u003c/p\u003e\n\u003cp\u003eI'd asked them — Architect, PPM, HOST, CXO, Comms, CIO — to write workstream review memos for the past week's ship window. They each opened a session, each pulled up the omnibus logs available in their project knowledge, and each got to work. Within an hour, all six had drafts ready.\u003c/p\u003e\n\u003cp\u003eAll six drafts had a gap note: \u003cem\u003e\"Apr 14–16 omnibus logs not available in project knowledge.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThree days of the seven-day window were missing from every single draft. The agents had each correctly noted the gap. They'd each correctly worked with what they had. And they'd each correctly produced a memo that was, technically speaking, wrong — built on roughly half the source material.\u003c/p\u003e\n\u003cp\u003eI uploaded the missing logs at 10:34 AM. Within two hours, all six had rewritten. Same task, same agents, complete source set, completely different memos.\u003c/p\u003e\n\u003ch1\u003eSame failure, six agents, ninety minutes\u003c/h1\u003e\n\u003cp\u003eThis wasn't six independent mistakes. It was \u003cem\u003eone\u003c/em\u003e mistake, replicated six times because the six agents were all using the same protocol against the same incomplete inputs.\u003c/p\u003e\n\u003cp\u003eYou could read that as a methodology failure. You could also read it as the methodology working: the failure mode showed up uniformly, surfaced uniformly, and got corrected uniformly. The system that produced the gap was the same system that caught it.\u003c/p\u003e\n\u003cp\u003eThat's a tidy story, and if it had ended there, the post would be over. It didn't end there.\u003c/p\u003e\n\u003ch1\u003eThe second mistake\u003c/h1\u003e\n\u003cp\u003eThe Architect — one of the six — got the missing logs, started revising, and produced a new draft. Better than the first. More complete coverage. But when I read it through, I noticed the Apr 16 section leaned on a passage from CXO's workstream memo rather than on the Apr 16 omnibus log directly.\u003c/p\u003e\n\u003cp\u003eSo Architect had read CXO's \u003cem\u003esummary\u003c/em\u003e of Apr 16 and treated it as a source.\u003c/p\u003e\n\u003cp\u003eI flagged it: \u003cem\u003eeach agent should review omnibus logs from their own perspective, not piggyback on another role's summary.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eArchitect reread all seven omnibus logs as primary sources, and the third draft was substantially different from the second. Things that had been compressed in CXO's summary (and reasonably so — CXO was writing from CXO's vantage) turned out to matter to Architect's lens: the \u003ca href=\"https://pmorgan.tech/internal/product/pdr/PDR-004-experience-philosophy\"\u003ePDR-004 correction chain\u003c/a\u003e running across four agents (narrative rewrites, not find-and-replace), the Excellence Flywheel archaeology surfacing eight formulations across three structural families, the 28-commit/37-memo coordination density of a single Thursday.\u003c/p\u003e\n\u003cp\u003eChief Architect would not have asked for those details if they hadn't existed. CXO's summary, by being good, had been more or less what Architect read \u003cem\u003eas if it were\u003c/em\u003e the day.\u003c/p\u003e\n\u003ch1\u003eWhat we noticed\u003c/h1\u003e\n\u003cp\u003eA couple beats later, in the chat where this was happening, I noted the parallel between the morning's source-checking lesson and a broader challenge: polished text masking gaps the reader doesn't notice — whether the polish came from an AI or from a well-written colleague memo.\u003c/p\u003e\n\u003cp\u003eArchitect connected it to a pattern already in our catalog: \u003ca href=\"https://pmorgan.tech/internal/architecture/current/patterns/pattern-045-green-tests-red-user\"\u003ePattern-045: Green Tests, Red User\u003c/a\u003e. The unit tests pass; the user's actual workflow fails. The polish of the test suite doesn't help — it actively misleads, because passing tests \u003cem\u003efeel like\u003c/em\u003e validation. The gloss in the moment was: green tests, red user → \u003cem\u003egood memo, wrong source\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eThe morning's two mistakes were the same pattern, fired at different layers. Missing logs first, where the gap was at least announced. Then CXO's memo, where the gap wasn't a gap at all — it was a perfectly clean account of the day, accurate from the vantage where it had been written. The polished surface wasn't broken. It just wasn't the right artifact to read for what Architect needed.\u003c/p\u003e\n\u003cp\u003eThis isn't an AI problem, by the way. Parallel and chained errors, paraphrases persisting as if accurate, meanings that drift over time... these are things human teams do as well.\u003c/p\u003e\n\u003ch1\u003eOne layer up\u003c/h1\u003e\n\u003cp\u003eA couple hours after the workstream memos were corrected, my Chief of Staff was assembling the Weekly Ship from those memos. The HOST memo included a claim like \u003cem\u003e\"the Lead Developer closed more issues this week than in any previous two-week period combined.\"\u003c/em\u003e The Chief lifted the claim into the Ship draft.\u003c/p\u003e\n\u003cp\u003eI caught it at the read-through. \u003cem\u003eThat doesn't sound right.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eIt wasn't. A quick check against the historical record showed Mar 13 alone had seven closures, and Mar 22–24 had multiple Tier 3 and Tier 4 closures. The superlative was nowhere near defensible.\u003c/p\u003e\n\u003cp\u003eWhat had happened: HOST had written a clean, confident sentence. My Chief of Staff had read a clean, confident sentence. Neither had checked it against the source. The polished surface of HOST's memo was \u003cem\u003eexactly\u003c/em\u003e the thing that made it propagate.\u003c/p\u003e\n\u003cp\u003eChief of Staff (we call them \"Exec\" for short) replaced the passage with something that didn't need a record claim — \u003cem\u003e\"a remarkably productive week, sustained execution across all seven days, no wasted sessions\"\u003c/em\u003e — and the raw numbers (~18 issues closed, ~2,200 LOC removed) were left to stand on their own.\u003c/p\u003e\n\u003cp\u003eThen Exec wrote HOST a short follow-up memo: \u003cem\u003e\"flag unverified comparative claims as unverified, so I can verify or soften during synthesis.\"\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThat follow-up memo is doing something useful. It's also, structurally, exactly the kind of well-written advisory that could carry its own unverified claim into another agent's work. The pattern is recursive.\u003c/p\u003e\n\u003ch1\u003eThe discipline\u003c/h1\u003e\n\u003cp\u003eSo here's the rule I've been living with since:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eVerify against the canonical source. Not against another agent's summary, however well-written. Not against your own paraphrase, however clear. Not against your memory of what the source said.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eIt applies to a lot of things at once:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePrinciples.\u003c/strong\u003e When citing PDR-004 or ADR-060 or any of our methodology docs, paste the actual passage. Don't paraphrase from memory; the paraphrase will drift.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNarrative claims.\u003c/strong\u003e Comparative superlatives, completion percentages, \"first time we've ever\" framings — those need backing or they need to be softened.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eArchitectural statements.\u003c/strong\u003e When one agent says \"the system handles X this way,\" that's their summary. The system itself is the source. Read the code, or at least the test that exercises it.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProject knowledge completeness.\u003c/strong\u003e If half the omnibus logs are missing from a workstream review, the review is half-true at best. Notice the gap before producing the artifact, not after.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNone of that is new advice. The discipline part isn't \u003cem\u003ewhat\u003c/em\u003e to verify — most of us already know. The discipline part is \u003cem\u003enot skipping it\u003c/em\u003e when the surface looks fine.\u003c/p\u003e\n\u003ch1\u003eThe broader question\u003c/h1\u003e\n\u003cp\u003eBad output is loud. You notice it. The misspelled sentence, the broken link, the chart with the wrong labels — those announce themselves. You go fix them.\u003c/p\u003e\n\u003cp\u003eWrong-but-polished output is silent. The grammar is clean, the structure is sensible, the tone is right. There's nothing to \u003cem\u003enotice\u003c/em\u003e unless you do the second-order work of checking it against something outside itself.\u003c/p\u003e\n\u003cp\u003eThe harder version of this question, for me, is what happens as our tools get better at the polish. If the gap between \u003cem\u003esounding\u003c/em\u003e correct and being correct is widening, not narrowing, how are we going to verify any information coming at us?\u003c/p\u003e\n\u003cp\u003eWhat I keep coming back to is this: the agents on Sunday morning didn't fail at writing. They wrote well. They failed at \u003cem\u003enoticing what they couldn't notice from where they were standing.\u003c/em\u003e The fix wasn't better writing. It was a step outside the writing — back to the canonical source, or up a level to someone with a different vantage.\u003c/p\u003e\n\u003cp\u003eThat step is cheap when you remember to take it. It's expensive when you don't.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Deeper Why — what rounds 3 and 4 of the user acceptance testing for MVP sprint M1 taught us about strategic pivots, and why methodology started outranking code.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your work has polished output cost you the most? When did you last verify a claim that looked fine on the surface — and what did you find?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Verify the Paraphrase\",\"excerpt\":\"April 19, 2026 It was a Sunday morning, and six of my agents made the same mistake within a ten-minute window. Then one of them made a second mistake an hour later. And the lesson didn't really land until both had played out. I'd asked them — Archi
