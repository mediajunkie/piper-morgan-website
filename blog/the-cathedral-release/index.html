\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T1dc6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eJanuary 25–27\u003c/em\u003e\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"A cutaway view of a cathedral under construction. Only a few interior rooms are fully built and warmly lit, where a human worker and a robot work calmly together at a table. Most of the surrounding structure is shown as unfinished outlines, clearly planned but not yet built, with solid foundations visible beneath.\" src=\"https://cdn-images-1.medium.com/max/1024/1*qleWgtUCXHSSLTgB6SXH-g.png\" /\u003e\u003cfigcaption\u003e“Measure the whole. Build one room.”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e“Go deep and thorough on modeling FIRST, to prevent future flattening. Only THEN discuss MVP scope. Document the cathedral, then decide which rooms to build first.”\u003c/p\u003e\u003cp\u003eThat was the guidance I gave on January 25th. Three days later, we released v0.8.5 and unblocked three alpha testers who had been waiting for more than a week to log in.\u003c/p\u003e\u003ch3\u003eThe philosophy\u003c/h3\u003e\u003cp\u003eWe were about to implement MUX-IMPLEMENT, the implementation sprint of our Modeled User Experience super epic. This one brings to life the updated navigation, documentation access, lifecycle indicators, and addresses core accessibility requirements.\u003c/p\u003e\u003cp\u003eThe temptation was to dive straight into code, but I’ve been burned by this attitude before. Features implemented without thorough modeling tend to flatten over time. Edge cases get papered over. The underlying concepts drift, especially if they had acquired a special meaning in the course of discussion, unavailable without the full original context. Six months later, you’re maintaining code that no longer reflects what you actually believe about the domain.\u003c/p\u003e\u003cp\u003eSo I asked the Lead Developer to start with a deep investigation instead. Not just “what do we need to build?” but “what does our object model actually say, and how does this feature express it?”\u003c/p\u003e\u003cp\u003eThis caution didn’t come from nowhere and it didn’t just come from conventional wisdom or existing investigation patterns. I still remember how our intial implementation of my innovative (if I do say so myself) spatial integration model ended up “flattening” some of the key concepts and led to a full refactor to, well, reinflate things.\u003c/p\u003e\u003ch3\u003eThe base camps\u003c/h3\u003e\u003cp\u003eThe investigation took a full morning. The Lead Developer visited ten “base camps” — documents that contained pieces of our MUX philosophy:\u003c/p\u003e\u003cp\u003e\u003ca href=\"https://pmorgan.tech/internal/architecture/current/adrs/adr-045-object-model\"\u003eADR-045\u003c/a\u003e for the Five Pillars of Consciousness. The \u003ca href=\"https://pmorgan.tech/internal/design/mux/piper-morgan-ux-foundations-and-open-questions\"\u003eUX Foundations document\u003c/a\u003e for the “Radar O’Reilly” pattern (Piper isn’t a destination, they’re a companion). The anti-flattening guide for the difference between “Piper noticed” and “Query returned.” The ownership metaphors for the Native/Federated/Synthetic distinction.\u003c/p\u003e\u003cp\u003eBy the end, something had shifted. The navigation work wasn’t just “add some menus.” It was “express Piper’s current awareness through lenses, gated by trust.”\u003c/p\u003e\u003ch3\u003eThe synthesis\u003c/h3\u003e\u003cp\u003eWe had a design discussion that covered five key questions.\u003c/p\u003e\u003cp\u003eWhat should the home state be? A “workspace” showing harder and softer objects, adaptive to what the user is working on, gated by trust level.\u003c/p\u003e\u003cp\u003eHow do lenses manifest? As tokenized natural language — “stuck” and “urgent” as tappable concepts, named but conversational.\u003c/p\u003e\u003cp\u003eIs the standup a paradigm? Yes — a one-shot entry point that flows into conversation, following the pattern of chat to artifact to hardening.\u003c/p\u003e\u003cp\u003eAre places portals? “Brilliant,” said the Lead Developer when I suggested it, the sycophant! (just kidding, fella). “Windows, not links.” Each place type has its own atmosphere.\u003c/p\u003e\u003cp\u003eWhat about existing navigation? It becomes a utility layer with a command palette for power users who know what they want.\u003c/p\u003e\u003cp\u003e[PM PLACEHOLDER: Which of these five felt most important or surprising?]\u003c/p\u003e\u003ch3\u003eThe sprint\u003c/h3\u003e\u003cp\u003eWith the cathedral documented, we could decide which rooms to build.\u003c/p\u003e\u003cp\u003eP1 took one afternoon: home state, utility navigation, command palette, and place windows. 185 tests.\u003c/p\u003e\u003cp\u003eP2 took one evening: document access, lifecycle indicators, composting views. 302 tests.\u003c/p\u003e\u003cp\u003eP3 took another evening: conversation memory, channel consistency, follow-up detection. 407 tests.\u003c/p\u003e\u003cp\u003eP4 took the final push: WCAG 2.1 AA accessibility compliance, design token enforcement, contrast testing. 638 template validations.\u003c/p\u003e\u003cp\u003eAll told: 10 days from starting the MUX track to releasing v0.8.5. Over 1,000 tests added. Every P1-P4 issue closed.\u003c/p\u003e\u003ch3\u003eThe release\u003c/h3\u003e\u003cp\u003ev0.8.5 went out on January 27th. The release notes listed lifecycle indicators on todos, projects, and work items. New views for work items and project details. Full accessibility compliance. Design token system enforced across 27 templates.\u003c/p\u003e\u003cp\u003eBut those features weren’t the point. The point was that three alpha testers had been waiting on bug fixes that blocked their onboarding. Those fixes were included too, and now they could proceed.\u003c/p\u003e\u003ch3\u003eThe pattern\u003c/h3\u003e\u003cp\u003eI alluded to our \u003ca href=\"https://medium.com/building-piper-morgan/building-the-cathedral-when-ai-agents-need-the-big-picture-50b9dfb0b2af\"\u003eCathedral Doctrine\u003c/a\u003e we’ve baked into our agent prompts and briefings”: document the full vision before deciding what to build now, provide the right amount of context for each level to help it make sense in the larger scheme of things without overwhelming or distracting.\u003c/p\u003e\u003cp\u003eIt’s slower at the start. That morning of base camp visits didn’t produce any code. The design discussion didn’t ship anything.\u003c/p\u003e\u003cp\u003eBut it meant the code we did write was grounded. Every feature traced back to a principle. Every UI decision connected to a concept. When questions came up during implementation, we had answers that weren’t ad-hoc.\u003c/p\u003e\u003cp\u003eThe alternative — start building and figure out the philosophy along the way — feels faster but isn’t. You build, then discover an inconsistency, then patch it, then discover another inconsistency somewhere else. The flattening accumulates until the codebase and the concepts no longer match.\u003c/p\u003e\u003ch3\u003eThe meta-lesson\u003c/h3\u003e\u003cp\u003eThere’s a reason cathedrals have blueprints.\u003c/p\u003e\u003cp\u003eNot because the architects don’t trust the builders. Not because spontaneity is bad. But because a cathedral is too complex to hold in your head, and too expensive to rebuild if you get it wrong.\u003c/p\u003e\u003cp\u003eThe MUX object model is our blueprint. It says entities experience moments in places. It says awareness, not data. It says atmosphere, not contents.\u003c/p\u003e\u003cp\u003eWhen we document the cathedral first, we’re not slowing ourselves down. We’re making sure the rooms we build fit the structure we’re building inside.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Calendar That Wasn’t Mine, from Jan 28 to Feb 2, as I wrestled with multi-tenancy issues and isolation.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever taken time to document the vision before building? Did it change what you built?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=3178cc624b2c\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-cathedral-release-3178cc624b2c\"\u003eThe Cathedral Release\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T28c0,"])</script><script>self.__next_f.push([1,"\u003csection name=\"4e40\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"sect "01b4\" class=\"graf graf--p graf-after--p\"\u003e\u003ca href=\"https://pmorgan.tech/internal/architecture/current/adrs/adr-045-object-model\" data-href=\"https://pmorgan.tech/internal/architecture/current/adrs/adr-045-object-model\" class=\"markup--anchor markup--p-anchor\" rel=\"noopener\" target=\"_blank\"\u003eADR-045\u003c/a\u003e for the Five Pillars of Consciousness. The \u003ca href=\"https://pmorgan.tech/internal/design/mux/piper-morgan-ux-foundations-and-open-questions\" data-href=\"https://pmorgan.tech/internal/design/mux/piper-morgan-ux-foundations-and-open-questions\" class=\"markup--anchor markup--p-anchor\" rel=\"noopener\" target=\"_blank\"\u003eUX Foundations document\u003c/a\u003e for the “Radar O’Reilly” pattern (Piper isn’t a destination, they’re a companion). The anti-flattening guide for the difference between “Piper noticed” and “Query returned.” The ownership metaphors for the Native/Federated/Synthetic distinction.\u003c/p\u003e\u003cp name=\"904e\" id=\"904e\" class=\"graf graf--p graf-after--p\"\u003eBy the end, something had shifted. The navigation work wasn’t just “add some menus.” It was “express Piper’s current awareness through lenses, gated by trust.”\u003c/p\u003e\u003ch3 name=\"9bb4\" id=\"9bb4\" class=\"graf graf--h3 graf-after--p\"\u003eThe synthesis\u003c/h3\u003e\u003cp name=\"a96c\" id=\"a96c\" class=\"graf graf--p graf-after--h3\"\u003eWe had a design discussion that covered five key questions.\u003c/p\u003e\u003cp name=\"d88e\" id=\"d88e\" class=\"graf graf--p graf-after--p\"\u003eWhat should the home state be? A “workspace” showing harder and softer objects, adaptive to what the user is working on, gated by trust level.\u003c/p\u003e\u003cp name=\"1c7a\" id=\"1c7a\" class=\"graf graf--p graf-after--p\"\u003eHow do lenses manifest? As tokenized natural language — “stuck” and “urgent” as tappable concepts, named but conversational.\u003c/p\u003e\u003cp name=\"6ac3\" id=\"6ac3\" class=\"graf graf--p graf-after--p\"\u003eIs the standup a paradigm? Yes — a one-shot entry point that flows into conversation, following the pattern of chat to artifact to hardening.\u003c/p\u003e\u003cp name=\"c620\" id=\"c620\" class=\"graf graf--p graf-after--p\"\u003eAre places portals? “Brilliant,” said the Lead Developer when I suggested it, the sycophant! (just kidding, fella). “Windows, not links.” Each place type has its own atmosphere.\u003c/p\u003e\u003cp name=\"fdf2\" id=\"fdf2\" class=\"graf graf--p graf-after--p\"\u003eWhat about existing navigation? It becomes a utility layer with a command palette for power users who know what they want.\u003c/p\u003e\u003cp name=\"6b4e\" id=\"6b4e\" class=\"graf graf--p graf-after--p\"\u003e[PM PLACEHOLDER: Which of these five felt most important or surprising?]\u003c/p\u003e\u003ch3 name=\"a49c\" id=\"a49c\" class=\"graf graf--h3 graf-after--p\"\u003eThe sprint\u003c/h3\u003e\u003cp name=\"1494\" id=\"1494\" class=\"graf graf--p graf-after--h3\"\u003eWith the cathedral documented, we could decide which rooms to build.\u003c/p\u003e\u003cp name=\"c2c5\" id=\"c2c5\" class=\"graf graf--p graf-after--p\"\u003eP1 took one afternoon: home state, utility navigation, command palette, and place windows. 185 tests.\u003c/p\u003e\u003cp name=\"599d\" id=\"599d\" class=\"graf graf--p graf-after--p\"\u003eP2 took one evening: document access, lifecycle indicators, composting views. 302 tests.\u003c/p\u003e\u003cp name=\"a104\" id=\"a104\" class=\"graf graf--p graf-after--p\"\u003eP3 took another evening: conversation memory, channel consistency, follow-up detection. 407 tests.\u003c/p\u003e\u003cp name=\"4b2e\" id=\"4b2e\" class=\"graf graf--p graf-after--p\"\u003eP4 took the final push: WCAG 2.1 AA accessibility compliance, design token enforcement, contrast testing. 638 template validations.\u003c/p\u003e\u003cp name=\"14d9\" id=\"14d9\" class=\"graf graf--p graf-after--p\"\u003eAll told: 10 days from starting the MUX track to releasing v0.8.5. Over 1,000 tests added. Every P1-P4 issue closed.\u003c/p\u003e\u003ch3 name=\"d93d\" id=\"d93d\" class=\"graf graf--h3 graf-after--p\"\u003eThe release\u003c/h3\u003e\u003cp name=\"2c67\" id=\"2c67\" class=\"graf graf--p graf-after--h3\"\u003ev0.8.5 went out on January 27th. The release notes listed lifecycle indicators on todos, projects, and work items. New views for work items and project details. Full accessibility compliance. Design token system enforced across 27 templates.\u003c/p\u003e\u003cp name=\"be76\" id=\"be76\" class=\"graf graf--p graf-after--p\"\u003eBut those features weren’t the point. The point was that three alpha testers had been waiting on bug fixes that blocked their onboarding. Those fixes were included too, and now they could proceed.\u003c/p\u003e\u003ch3 name=\"8699\" id=\"8699\" class=\"graf graf--h3 graf-after--p\"\u003eThe pattern\u003c/h3\u003e\u003cp name=\"6526\" id=\"6526\" class=\"graf graf--p graf-after--h3\"\u003eI alluded to our \u003ca href=\"https://medium.com/building-piper-morgan/building-the-cathedral-when-ai-agents-need-the-big-picture-50b9dfb0b2af\" data-href=\"https://medium.com/building-piper-morgan/building-the-cathedral-when-ai-agents-need-the-big-picture-50b9dfb0b2af\" class=\"markup--anchor markup--p-anchor\" target=\"_blank\"\u003eCathedral Doctrine\u003c/a\u003e we’ve baked into our agent prompts and briefings”: document the full vision before deciding what to build now, provide the right amount of context for each level to help it make sense in the larger scheme of things without overwhelming or distracting.\u003c/p\u003e\u003cp name=\"5244\" id=\"5244\" class=\"graf graf--p graf-after--p\"\u003eIt’s slower at the start. That morning of base camp visits didn’t produce any code. The design discussion didn’t ship anything.\u003c/p\u003e\u003cp name=\"ca16\" id=\"ca16\" class=\"graf graf--p graf-after--p\"\u003eBut it meant the code we did write was grounded. Every feature traced back to a principle. Every UI decision connected to a concept. When questions came up during implementation, we had answers that weren’t ad-hoc.\u003c/p\u003e\u003cp name=\"8f87\" id=\"8f87\" class=\"graf graf--p graf-after--p\"\u003eThe alternative — start building and figure out the philosophy along the way — feels faster but isn’t. You build, then discover an inconsistency, then patch it, then discover another inconsistency somewhere else. The flattening accumulates until the codebase and the concepts no longer match.\u003c/p\u003e\u003ch3 name=\"1801\" id=\"1801\" class=\"graf graf--h3 graf-after--p\"\u003eThe meta-lesson\u003c/h3\u003e\u003cp name=\"dc64\" id=\"dc64\" class=\"graf graf--p graf-after--h3\"\u003eThere’s a reason cathedrals have blueprints.\u003c/p\u003e\u003cp name=\"d15a\" id=\"d15a\" class=\"graf graf--p graf-after--p\"\u003eNot because the architects don’t trust the builders. Not because spontaneity is bad. But because a cathedral is too complex to hold in your head, and too expensive to rebuild if you get it wrong.\u003c/p\u003e\u003cp name=\"ceb9\" id=\"ceb9\" class=\"graf graf--p graf-after--p\"\u003eThe MUX object model is our blueprint. It says entities experience moments in places. It says awareness, not data. It says atmosphere, not contents.\u003c/p\u003e\u003cp name=\"a5c6\" id=\"a5c6\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eWhen we document the cathedral first, we’re not slowing ourselves down. We’re making sure the rooms we build fit the structure we’re building inside.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Cathedral Release\",\"excerpt\":\"January 25–27“Measure the whole. Build one room.”“Go deep and thorough on modeling FIRST, to prevent future flattening. Only THEN discuss MVP scope. Document the cathedral, then decide which rooms to build first.”That was the guidance I gave on January 25th. Three days later, we released v0.8.5 a...\",\"url\":\"/blog/the-cathedral-release\
