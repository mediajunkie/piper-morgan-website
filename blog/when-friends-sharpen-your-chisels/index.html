"template\":[\"$\",\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2466,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A journeyman stonecarver works on a stone robot while three expert carver’s sharpen his tools for him\" src=\"https://cdn-images-1.medium.com/max/1024/1*aeHC7kVjiBY-jrebLOqO4Q.png\" /\u003e\u003cfigcaption\u003e“This should help!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 28–30\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe week after Thanksgiving is supposed to be quiet. You digest the turkey, you digest the year, you ease back into work. This year, the digestion was more interesting than expected.\u003c/p\u003e\u003cp\u003eI spent Black Friday not shopping but synthesizing. The previous week had been extraordinary — fifteen simultaneous AI sessions, a complete security epic, our first alpha tester arriving, then a sudden pivot into UX vision work that produced eight architectural decisions in forty-four minutes. My Chief Architect and Chief of Staff were both trying to make sense of what had happened, producing summaries and roadmaps and pattern analyses. I was doing the same thing, just more slowly, with coffee.\u003c/p\u003e\u003cp\u003eThe synthesis revealed a three-act structure to the week: execution excellence (the security sprint), alpha launch (Michelle arriving), vision pivot (the UX work). Clean arcs are suspicious — they usually mean you’re editing reality to fit a story. But this one held up. The week really had moved through those phases, each preparing for the next.\u003c/p\u003e\u003ch3\u003eThe security script that detected itself\u003c/h3\u003e\u003cp\u003eFriday morning brought a minor comedy. Our security detection script — Shai-Hulud, named for the sandworms — had flagged sixty potential issues in the codebase. Alarming, until my SecOps agent investigated and discovered the script was mostly detecting its own test patterns. Ninety-five percent false positive rate. The worm was eating itself.\u003c/p\u003e\u003cp\u003eThis is the kind of thing that happens when you build detection systems. They find what they’re looking for, including the examples you created to test whether they’d find what they’re looking for. The fix was simple: replace the script, not the codebase. But it was a good reminder that tools have blind spots, especially about themselves.\u003c/p\u003e\u003ch3\u003eBuilding the coordination queue\u003c/h3\u003e\u003cp\u003eSaturday was infrastructure day. We’d been running multi-agent workflows through direct coordination — I’d hand prompts to agents, track their work, manage handoffs manually. This worked but didn’t scale. The agents themselves had suggested a self-service model: a queue of prompts they could claim and complete without waiting for me.\u003c/p\u003e\u003cp\u003eThe Chief Architect designed it in the morning. A Code Assistant built it at noon. By afternoon, three pilot prompts were running — and at one point, two agents were working in parallel, claiming different prompts, completing work simultaneously without stepping on each other.\u003c/p\u003e\u003cp\u003eThis sounds mundane, but it wasn’t. We’d validated that the coordination system worked. Agents could see what needed doing, claim work, complete it, and the manifest updated to reflect reality. No conflicts. No confusion. The system got out of the way and let the work happen.\u003c/p\u003e\u003cp\u003eThe evening brought the predictable crisis. Production was in a broken state — branch discipline issues had let bugs slip through. My Lead Developer spent hours tracking down the problem, eventually resetting to a known-good commit from earlier in the week. Then, just before midnight, I discovered while alpha testing that the authentication middleware had never been registered. The cookies were being sent but never read.\u003c/p\u003e\u003cp\u003eThirty minutes of debugging. One line added. Deploy. Midnight fix complete.\u003c/p\u003e\u003cp\u003eThis is how production works. You build carefully, you test systematically, and something still breaks at 11 PM on a Saturday. The coordination queue had worked beautifully all day. Then the actual codebase reminded us that infrastructure elegance doesn’t prevent implementation bugs.\u003c/p\u003e\u003ch3\u003eWhen the advisors responded\u003c/h3\u003e\u003cp\u003eSunday was quieter. Production deployment in the morning — twenty-one commits merged, the authentication fix included. Some documentation updates to smooth alpha testing friction. Routine work.\u003c/p\u003e\u003cp\u003eThen the advisor mailboxes delivered.\u003c/p\u003e\u003cp\u003eI’d set up asynchronous communication channels with two external advisors: \u003ca href=\"https://medium.com/u/1d6e7a90def4\"\u003eTed Nadeau\u003c/a\u003e, a senior architect and friend I’ve known for years, and Sam Zimmerman, a friend I met volunteering for a nonprofit effort addressing the Covid pandemic who is now a member of the technical staff at Anthropic. (A while back I’d asked Sam for his frank opinion of my ethical infrastructure.) Both had received materials about the project. Both had responded over the holiday weekend.\u003c/p\u003e\u003cp\u003eTed’s response included an architecture proposal. He’d been thinking about how agents should process different types of content — code, documentation, conversations, images. He proposed a “micro-format” processing pipeline with eleven specialized format types, each handled by small focused agents.\u003c/p\u003e\u003cp\u003eHere’s what stopped me: his eleven proposed micro-formats mapped rather neatly to our Entity/Moment/Place grammar.\u003c/p\u003e\u003cp\u003eHe didn’t know that grammar. I hadn’t shared it. He’d derived a compatible structure from first principles, looking at the same problem from a different angle. His “formats” were our “entities experiencing moments.” His processing pipeline was our consciousness model.\u003c/p\u003e\u003cp\u003eIndependent validation from someone who wasn’t trying to validate anything. He was just thinking clearly about the problem and arrived at the same structure we’d discovered through hand sketches and object model debates.\u003c/p\u003e\u003cp\u003eSam’s response was different but equally clarifying. I’d been developing an elaborate multi-agent ethical architecture — a “board” of agents that would collectively establish ethical boundaries through consensus. Sam’s feedback was characteristically direct: build ethics from sustained relationship, not committee consensus.\u003c/p\u003e\u003cp\u003eHis three-layer model: inviolate boundaries that never change, an adaptation mechanism that responds to context, and an ethical style that emerges from the relationship itself. The boundaries protect. The adaptation serves. The style develops over time as the relationship deepens.\u003c/p\u003e\u003cp\u003eThis reframed everything. I’d been building organizational structure where Sam was describing something more like friendship — shared history creating shared understanding, not rules creating compliance. The ethical architecture shouldn’t be a governance system. It should be a relationship.\u003c/p\u003e\u003ch3\u003eWhat convergence means\u003c/h3\u003e\u003cp\u003eTwo advisors, working independently, both validated directions I’d been uncertain about. Ted confirmed the object model grammar. Sam confirmed the relationship-first approach. Neither was responding to requests for validation — they were just thinking about the problems and reaching compatible conclusions.\u003c/p\u003e\u003cp\u003eThis is what external minds provide that internal reflection cannot. You can convince yourself of anything if you’re the only one looking. But when someone else, with different experience and different assumptions, arrives at the same place — that’s evidence of a different kind.\u003c/p\u003e\u003cp\u003eThe coordination queue worked on Saturday because we built good infrastructure. The advisor mailboxes worked on Sunday because we built good relationships. Both are infrastructure, really. Systems that let work happen. One routes prompts to agents. The other routes perspectives to decisions.\u003c/p\u003e\u003cp\u003eI’d spent the week after Thanksgiving digesting an extraordinary development sprint. But the real nutrition came from outside — from advisors who took the project seriously enough to think carefully and respond honestly.\u003c/p\u003e\u003cp\u003eThat’s the thing about building in public, with advisors, with alpha testers, with external eyes. You’re not just getting feedback. You’re getting reality checks that your own perspective can’t provide. The project feels less like something I’m building and more like something I’m discovering, with help from people who see differently than I do.\u003c/p\u003e\u003cp\u003eThe holiday weekend ended with more clarity than it started. Not because I’d figured things out, but because other people had confirmed that the things I’d tentatively figured out weren’t crazy. Sometimes that’s all you need to keep going.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Three Layers, or how alpha testing revealed some persistent gaps in Piper’s basic functionality.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhen has external validation surprised you? Have you experienced convergent discovery with people working independently? What role do advisors play in your work?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=e2cc9347f58e\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/when-friends-sharpen-your-chisels-on-advice-that-removes-friction-e2cc9347f58e\"\u003eWhen Friends Sharpen Your Chisels: On Advice That Removes Friction\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T2c00,"])</script><script>self.__next_f.push([1,"\u003csection name=\"b529\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"0f2d\" id=\"0f2d\" class=\"graf graf--h3 graf--leading graf--title\"\u003eWhen Friends Sharpen Your Chisels: \u003cem class=\"markup--em markup--h3-em\"\u003eOn Advice That Removes Friction\u003c/em\u003e\u003c/h3\u003e\u003cfigure name=\"a0df\" id=\"a0df\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-i it wasn’t. We’d validated that the coordination system worked. Agents could see what needed doing, claim work, complete it, and the manifest updated to reflect reality. No conflicts. No confusion. The system got out of the way and let the work happen.\u003c/p\u003e\u003cp name=\"cde0\" id=\"cde0\" class=\"graf graf--p graf-after--p\"\u003eThe evening brought the predictable crisis. Production was in a broken state — branch discipline issues had let bugs slip through. My Lead Developer spent hours tracking down the problem, eventually resetting to a known-good commit from earlier in the week. Then, just before midnight, I discovered while alpha testing that the authentication middleware had never been registered. The cookies were being sent but never read.\u003c/p\u003e\u003cp name=\"1dbc\" id=\"1dbc\" class=\"graf graf--p graf-after--p\"\u003eThirty minutes of debugging. One line added. Deploy. Midnight fix complete.\u003c/p\u003e\u003cp name=\"f73b\" id=\"f73b\" class=\"graf graf--p graf-after--p\"\u003eThis is how production works. You build carefully, you test systematically, and something still breaks at 11 PM on a Saturday. The coordination queue had worked beautifully all day. Then the actual codebase reminded us that infrastructure elegance doesn’t prevent implementation bugs.\u003c/p\u003e\u003ch3 name=\"5ad3\" id=\"5ad3\" class=\"graf graf--h3 graf-after--p\"\u003eWhen the advisors responded\u003c/h3\u003e\u003cp name=\"71da\" id=\"71da\" class=\"graf graf--p graf-after--h3\"\u003eSunday was quieter. Production deployment in the morning — twenty-one commits merged, the authentication fix included. Some documentation updates to smooth alpha testing friction. Routine work.\u003c/p\u003e\u003cp name=\"058a\" id=\"058a\" class=\"graf graf--p graf-after--p\"\u003eThen the advisor mailboxes delivered.\u003c/p\u003e\u003cp name=\"4905\" id=\"4905\" class=\"graf graf--p graf-after--p\"\u003eI’d set up asynchronous communication channels with two external advisors: \u003ca href=\"https://medium.com/u/1d6e7a90def4\" data-href=\"https://medium.com/u/1d6e7a90def4\" data-anchor-type=\"2\" data-user-id=\"1d6e7a90def4\" data-action-value=\"1d6e7a90def4\" data-action=\"show-user-card\" data-action-type=\"hover\" class=\"markup--user markup--p-user\" target=\"_blank\"\u003eTed Nadeau\u003c/a\u003e, a senior architect and friend I’ve known for years, and Sam Zimmerman, a friend I met volunteering for a nonprofit effort addressing the Covid pandemic who is now a member of the technical staff at Anthropic. (A while back I’d asked Sam for his frank opinion of my ethical infrastructure.) Both had received materials about the project. Both had responded over the holiday weekend.\u003c/p\u003e\u003cp name=\"e77b\" id=\"e77b\" class=\"graf graf--p graf-after--p\"\u003eTed’s response included an architecture proposal. He’d been thinking about how agents should process different types of content — code, documentation, conversations, images. He proposed a “micro-format” processing pipeline with eleven specialized format types, each handled by small focused agents.\u003c/p\u003e\u003cp name=\"48af\" id=\"48af\" class=\"graf graf--p graf-after--p\"\u003eHere’s what stopped me: his eleven proposed micro-formats mapped rather neatly to our Entity/Moment/Place grammar.\u003c/p\u003e\u003cp name=\"9ad9\" id=\"9ad9\" class=\"graf graf--p graf-after--p\"\u003eHe didn’t know that grammar. I hadn’t shared it. He’d derived a compatible structure from first principles, looking at the same problem from a different angle. His “formats” were our “entities experiencing moments.” His processing pipeline was our consciousness model.\u003c/p\u003e\u003cp name=\"548b\" id=\"548b\" class=\"graf graf--p graf-after--p\"\u003eIndependent validation from someone who wasn’t trying to validate anything. He was just thinking clearly about the problem and arrived at the same structure we’d discovered through hand sketches and object model debates.\u003c/p\u003e\u003cp name=\"edb3\" id=\"edb3\" class=\"graf graf--p graf-after--p\"\u003eSam’s response was different but equally clarifying. I’d been developing an elaborate multi-agent ethical architecture — a “board” of agents that would collectively establish ethical boundaries through consensus. Sam’s feedback was characteristically direct: build ethics from sustained relationship, not committee consensus.\u003c/p\u003e\u003cp name=\"ac95\" id=\"ac95\" class=\"graf graf--p graf-after--p\"\u003eHis three-layer model: inviolate boundaries that never change, an adaptation mechanism that responds to context, and an ethical style that emerges from the relationship itself. The boundaries protect. The adaptation serves. The style develops over time as the relationship deepens.\u003c/p\u003e\u003cp name=\"4ff8\" id=\"4ff8\" class=\"graf graf--p graf-after--p\"\u003eThis reframed everything. I’d been building organizational structure where Sam was describing something more like friendship — shared history creating shared understanding, not rules creating compliance. The ethical architecture shouldn’t be a governance system. It should be a relationship.\u003c/p\u003e\u003ch3 name=\"65c5\" id=\"65c5\" class=\"graf graf--h3 graf-after--p\"\u003eWhat convergence means\u003c/h3\u003e\u003cp name=\"3187\" id=\"3187\" class=\"graf graf--p graf-after--h3\"\u003eTwo advisors, working independently, both validated directions I’d been uncertain about. Ted confirmed the object model grammar. Sam confirmed the relationship-first approach. Neither was responding to requests for validation — they were just thinking about the problems and reaching compatible conclusions.\u003c/p\u003e\u003cp name=\"97ad\" id=\"97ad\" class=\"graf graf--p graf-after--p\"\u003eThis is what external minds provide that internal reflection cannot. You can convince yourself of anything if you’re the only one looking. But when someone else, with different experience and different assumptions, arrives at the same place — that’s evidence of a different kind.\u003c/p\u003e\u003cp name=\"a898\" id=\"a898\" class=\"graf graf--p graf-after--p\"\u003eThe coordination queue worked on Saturday because we built good infrastructure. The advisor mailboxes worked on Sunday because we built good relationships. Both are infrastructure, really. Systems that let work happen. One routes prompts to agents. The other routes perspectives to decisions.\u003c/p\u003e\u003cp name=\"0194\" id=\"0194\" class=\"graf graf--p graf-after--p\"\u003eI’d spent the week after Thanksgiving digesting an extraordinary development sprint. But the real nutrition came from outside — from advisors who took the project seriously enough to think carefully and respond honestly.\u003c/p\u003e\u003cp name=\"4ce9\" id=\"4ce9\" class=\"graf graf--p graf-after--p\"\u003eThat’s the thing about building in public, with advisors, with alpha testers, with external eyes. You’re not just getting feedback. You’re getting reality checks that your own perspective can’t provide. The project feels less like something I’m building and more like something I’m discovering, with help from people who see differently than I do.\u003c/p\u003e\u003cp name=\"b678\" id=\"b678\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe holiday weekend ended with more clarity than it started. Not because I’d figured things out, but because other people had confirmed that the things I’d tentatively figured out weren’t crazy. Sometimes that’s all you need to keep going.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"When Friends Sharpen Your Chisels: On Advice That Removes Friction\",\"excerpt\":\"“This should help!”November 28–30The week after Thanksgiving is supposed to be quiet. You digest the turkey, you digest the year, you ease back into work. This year, the digestion was more interesting than expected.I spent Black Friday not shopping but synthesizing. The previous week ha
