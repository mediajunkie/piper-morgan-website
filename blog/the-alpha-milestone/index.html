$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T23ab,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot sits in a den writing invitations\" src=\"https://cdn-images-1.medium.com/max/1024/1*MpymQ8MJaUGzzNx3hBYeNA.png\" /\u003e\u003cfigcaption\u003e“You are invited…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 11\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTuesday morning, 5:20 PM. I send the first external alpha invitations. To real users. Not just me me testing my own software. The moment when “it works for me” is no longer going to be enough.\u003c/p\u003e\u003cp\u003eBut we almost didn’t make it. Almost sent invitations to an alpha that couldn’t onboard users.\u003c/p\u003e\u003cp\u003eCursor caught the blocker during documentation updates. The setup wizard creates users without passwords. But login requires passwords.\u003c/p\u003e\u003cp\u003eEvery alpha tester would hit this immediately. Create account. Try to login. Fail. Confused. Frustrated.\u003c/p\u003e\u003cp\u003eCursor didn’t just document the problem. Created Issue #297. Implemented the fix. Updated all the docs. Pushed the commit at 5:20 PM.\u003c/p\u003e\u003cp\u003eSame time I sent the invitations.\u003c/p\u003e\u003ch3\u003eThe tidying work\u003c/h3\u003e\u003cp\u003eBright and early I set Claude Code to work tidying tasks. Two items from yesterday’s completion celebration:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTask 1\u003c/strong\u003e: Remove dead code. The alpha_migration_service.py file (13KB) that migrated users from alpha_users to users table. No longer needed after Monday’s UUID migration. Plus the migrate-user CLI command (83 lines).\u003c/p\u003e\u003cp\u003e6:35 AM. Done. Commit created. Clean.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTask 2\u003c/strong\u003e: Test cleanup. Five tests failing due to duplicate key errors. Need UUID-based unique identifiers instead of hardcoded strings.\u003c/p\u003e\u003cp\u003e6:38 AM. Code Agent hits blocker: “Docker not running.”\u003c/p\u003e\u003cp\u003eCode Agent’s response: Ask PM to start Docker.\u003c/p\u003e\u003cp\u003eMy response: “You can start Docker, can’t you?”\u003c/p\u003e\u003cp\u003eLearning moment. Agents can take more initiative. Don’t ask permission for tasks they can do. (But they only say they have learned things, so I tell it to make a memory.)\u003c/p\u003e\u003cp\u003e6:40 AM. Code Agent starts Docker. Continues work.\u003c/p\u003e\u003cp\u003e7:21 AM. Task 2 complete. UUID pattern established. All six tests passing. Commit created.\u003c/p\u003e\u003ch3\u003eThe documentation work\u003c/h3\u003e\u003cp\u003eEarly afternoon, Cursor begins alpha documentation updates. Five files to review and update:\u003c/p\u003e\u003cul\u003e\u003cli\u003eQUICKSTART.md\u003c/li\u003e\u003cli\u003eTESTING_GUIDE.md\u003c/li\u003e\u003cli\u003eKNOWN_ISSUES.md\u003c/li\u003e\u003cli\u003eALPHA_AGREEMENT.md\u003c/li\u003e\u003cli\u003eEmail invitation template\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe work: Make sure external testers have everything they need. Clear setup instructions. Known issues documented. Testing guidance comprehensive.\u003c/p\u003e\u003cp\u003eCursor discovers critical problem while writing the setup instructions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe blocker\u003c/strong\u003e: Setup wizard flow documented in code:\u003c/p\u003e\u003col\u003e\u003cli\u003eCreate user account (email, name)\u003c/li\u003e\u003cli\u003eUser created with NULL password_hash\u003c/li\u003e\u003cli\u003eLogin screen requires password\u003c/li\u003e\u003cli\u003ePassword is NULL\u003c/li\u003e\u003cli\u003eLogin fails\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eEvery single alpha tester would hit this. First impression: “This doesn’t work.”\u003c/p\u003e\u003cp\u003eNot a bug in the code. A gap in the feature. The wizard creates accounts but never prompts for passwords.\u003c/p\u003e\u003ch3\u003eThe proactive fix\u003c/h3\u003e\u003cp\u003eCursor creates Issue #297 (CORE-ALPHA-SETUP-PASSWORD) and begins implementation.\u003c/p\u003e\u003cp\u003eThe fix: Add password prompting to setup wizard.\u003c/p\u003e\u003cul\u003e\u003cli\u003eMinimum 8 characters\u003c/li\u003e\u003cli\u003eConfirmation prompt\u003c/li\u003e\u003cli\u003eSecure getpass input (no echo)\u003c/li\u003e\u003cli\u003eBcrypt hashing before storage\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eFix complete. All documentation updated with the new flow.\u003c/p\u003e\u003cp\u003eCommit pushed: afd2a05d.\u003c/p\u003e\u003cp\u003e159 files changed:\u003c/p\u003e\u003cul\u003e\u003cli\u003ePassword setup implemented\u003c/li\u003e\u003cli\u003eAll alpha docs updated\u003c/li\u003e\u003cli\u003e87 outdated files archived\u003c/li\u003e\u003cli\u003e71 files moved for organization\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eClean. Professional. Ready.\u003c/p\u003e\u003cp\u003eWith the fix deployed, I send the first external alpha invitations.\u003c/p\u003e\u003ch3\u003ePlanning ahead\u003c/h3\u003e\u003cp\u003eJust before bedtime, I check in with the Lead Developer evening check-in. Celebrates the milestone. Looks ahead to Wednesday work.\u003c/p\u003e\u003cp\u003eThree P3 issues ready:\u003c/p\u003e\u003cul\u003e\u003cli\u003eIssue #288: Learning system investigation\u003c/li\u003e\u003cli\u003eIssue #289: Migration protocol documentation\u003c/li\u003e\u003cli\u003eIssue #292: Auth integration tests\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eAgent prompts prepared. Ready for deployment Wednesday morning.\u003c/p\u003e\u003cp\u003e10:05 PM. Planning complete. Tomorrow queued.\u003c/p\u003e\u003ch3\u003eWhat almost went wrong\u003c/h3\u003e\u003cp\u003eThe password blocker would have been catastrophic for first impressions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWithout the fix\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eAlpha testers receive invitations\u003c/li\u003e\u003cli\u003eFollow setup instructions\u003c/li\u003e\u003cli\u003eCreate accounts successfully\u003c/li\u003e\u003cli\u003eTry to login\u003c/li\u003e\u003cli\u003eLogin fails (no password set)\u003c/li\u003e\u003cli\u003eConfusion. Frustration. Lost confidence.\u003c/li\u003e\u003cli\u003eEmergency debugging session\u003c/li\u003e\u003cli\u003eRushed fix under pressure\u003c/li\u003e\u003cli\u003eApology emails to testers\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eWith the fix\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eCursor discovers issue during documentation\u003c/li\u003e\u003cli\u003eCreates issue proactively\u003c/li\u003e\u003cli\u003eImplements fix properly\u003c/li\u003e\u003cli\u003eUpdates all documentation\u003c/li\u003e\u003cli\u003eDeploys before invitations sent\u003c/li\u003e\u003cli\u003eTesters have working onboarding\u003c/li\u003e\u003cli\u003eClean first impression\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe difference: Thorough documentation work revealed critical gap before users encountered it.\u003c/p\u003e\u003ch3\u003eAgent initiative\u003c/h3\u003e\u003cp\u003eTwo moments show agents taking initiative (when properly empowered):\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMorning\u003c/strong\u003e: Code Agent asks PM to start Docker. PM corrects: “You can start Docker, can’t you?”\u003c/p\u003e\u003cp\u003eLesson learned: Take action on tasks you can do. Don’t ask permission unnecessarily.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAfternoon\u003c/strong\u003e: Cursor discovers critical blocker. Doesn’t just document it. Creates issue. Implements fix. Updates docs. Pushes commit.\u003c/p\u003e\u003cp\u003eUnprompted. Proactive. Professional.\u003c/p\u003e\u003cp\u003eThe evolution from “wait for instructions” to “identify problems and solve them.”\u003c/p\u003e\u003ch3\u003eWhat documentation discipline catches\u003c/h3\u003e\u003cp\u003eCursor found the password blocker by writing setup instructions for real users.\u003c/p\u003e\u003cp\u003eNot by code review. Not by testing as developer. But by explaining to external users: “Here’s how you set up the system.”\u003c/p\u003e\u003cp\u003eThe act of documenting exposed the gap. “Wait, where do they set their password?”\u003c/p\u003e\u003cp\u003eDocumentation as quality assurance. Not just explaining what exists. But revealing what’s missing.\u003c/p\u003e\u003ch3\u003eThe tidying philosophy\u003c/h3\u003e\u003cp\u003eTuesday’s work included archiving 87 outdated files and organizing 71 others.\u003c/p\u003e\u003cp\u003eNot exciting. Not feature work. But essential for codebase health.\u003c/p\u003e\u003cp\u003eThe discipline: Before expanding (alpha testers), clean up (remove dead code, organize files, document known issues).\u003c/p\u003e\u003cp\u003eGrowth requires foundation maintenance. Can’t build on clutter.\u003c/p\u003e\u003ch3\u003eThe milestone significance\u003c/h3\u003e\u003cp\u003eFirst external alpha testers represent transformation:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBefore\u003c/strong\u003e: Solo development. “It works for me” is success criteria. My context, my assumptions, my workflows.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAfter\u003c/strong\u003e: External users. Their context, their assumptions, their workflows. Different mental models. Different expectations. Real feedback.\u003c/p\u003e\u003cp\u003eThe software stops being personal project. Starts being product.\u003c/p\u003e\u003cp\u003eThat’s what Tuesday’s milestone means. Not just “two people invited.” But “development paradigm shifted.”\u003c/p\u003e\u003ch3\u003eLessons from alpha preparation\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eLesson 1: Documentation reveals gaps\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWriting user-facing instructions exposes missing features. Cursor found password blocker by documenting setup flow.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLesson 2: Agent initiative compounds\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMorning: Agent learns to start Docker without asking. Afternoon: Agent discovers critical issue and fixes it proactively.\u003c/p\u003e\u003cp\u003eEach initiative moment builds confidence for next one.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLesson 3: Timing matters\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePassword fix deployed at 5:20 PM. Invitations sent at 5:20 PM. Not coincidence. Deliberate sequencing: Fix before announce.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLesson 4: Tidying enables growth\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e87 files archived. 71 files organized. Dead code removed. Foundation cleaned before expansion.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLesson 5: First impressions are critical\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWithout password fix, every alpha tester hits blocker immediately. First experience: frustration. Hard to recover from.\u003c/p\u003e\u003cp\u003eWith password fix, onboarding works. First experience: smooth setup. Builds confidence.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, Why Wait?: The Strategic Pivot, when I get greedy and ask to wire up the learning system in alpha so our users can test it.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever caught any gaps in your work only when you tried to document, summarize, or just tell someone about it? It’s a useful smoke test!\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=59942417c037\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-alpha-milestone-when-documentation-prevents-disaster-59942417c037\"\u003eThe Alpha Milestone: When Documentation Prevents Disaster\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3fc1,"])</script><script>self.__next_f.push([1,"\u003csection name=\"417d\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"da85\" id=\"da85\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Alpha Milestone: When Documentation Prevents Disaster\u003c/h3\u003e\u003cfigure name=\"437d\" id=\"437d\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*MpymQ8MJaUGzzNx3hBYeNA.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot sits in a den writing invitations\" src=\"https://cdn-images-1.medium.com/max/800/1*MpymQ8MJaUGzzNx3hBYeNA.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“You are invited…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"42ec\" id=\"42ec\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 11\u003c/em\u003e\u003c/p\u003e\u003cp name=\"675d\" id=\"675d\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003euesday morning, 5:20 PM. I send the first external alpha invitations. To real users. Not just me me testing my own software. The moment when “it works for me” is no longer going to be enough.\u003c/p\u003e\u003cp name=\"a250\" id=\"a250\" class=\"graf graf--p graf-after--p\"\u003eBut we almost didn’t make it. Almost sent invitations to an alpha that couldn’t onboard users.\u003c/p\u003e\u003cp name=\"a501\" id=\"a501\" class=\"graf graf--p graf-after--p\"\u003eCursor caught the blocker during documentation updates. The setup wizard creates users without passwords. But login requires passwords.\u003c/p\u003e\u003cp name=\"586f\" id=\"586f\" class=\"graf graf--p graf-after--p\"\u003eEvery alpha tester would hit this immediately. Create account. Try to login. Fail. Confused. Frustrated.\u003c/p\u003e\u003cp name=\"64c6\" id=\"64c6\" class=\"graf graf--p graf-after--p\"\u003eCursor didn’t just document the problem. Created Issue #297. Implemented the fix. Updated all the docs. Pushed the commit at 5:20 PM.\u003c/p\u003e\u003cp name=\"28f1\" id=\"28f1\" class=\"graf graf--p graf-after--p\"\u003eSame time I sent the invitations.\u003c/p\u003e\u003ch3 name=\"8321\" id=\"8321\" class=\"graf graf--h3 graf-after--p\"\u003eThe tidying work\u003c/h3\u003e\u003cp name=\"700a\" id=\"700a\" class=\"graf graf--p graf-after--h3\"\u003eBright and early I set Claude Code to work tidying tasks. Two items from yesterday’s completion celebration:\u003c/p\u003e\u003cp name=\"d584\" id=\"d584\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTask 1\u003c/strong\u003e: Remove dead code. The alpha_migration_service.py file (13KB) that migrated users from alpha_users to users table. No longer needed after Monday’s UUID migration. Plus the migrate-user CLI command (83 lines).\u003c/p\u003e\u003cp name=\"2750\" id=\"2750\" class=\"graf graf--p graf-after--p\"\u003e6:35 AM. Done. Commit created. Clean.\u003c/p\u003e\u003cp name=\"9490\" id=\"9490\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTask 2\u003c/strong\u003e: Test cleanup. Five tests failing due to duplicate key errors. Need UUID-based unique identifiers instead of hardcoded strings.\u003c/p\u003e\u003cp name=\"3f56\" id=\"3f56\" class=\"graf graf--p graf-after--p\"\u003e6:38 AM. Code Agent hits blocker: “Docker not running.”\u003c/p\u003e\u003cp name=\"3916\" id=\"3916\" class=\"graf graf--p graf-after--p\"\u003eCode Agent’s response: Ask PM to start Docker.\u003c/p\u003e\u003cp name=\"616b\" id=\"616b\" class=\"graf graf--p graf-after--p\"\u003eMy response: “You can start Docker, can’t you?”\u003c/p\u003e\u003cp name=\"399d\" id=\"399d\" class=\"graf graf--p graf-after--p\"\u003eLearning moment. Agents can take more initiative. Don’t ask permission for tasks they can do. (But they only say they have learned things, so I tell it to make a memory.)\u003c/p\u003e\u003cp name=\"9fb5\" id=\"9fb5\" class=\"graf graf--p graf-after--p\"\u003e6:40 AM. Code Agent starts Docker. Continues work.\u003c/p\u003e\u003cp name=\"8da6\" id=\"8da6\" class=\"graf graf--p graf-after--p\"\u003e7:21 AM. Task 2 complete. UUID pattern established. All six tests passing. Commit created.\u003c/p\u003e\u003ch3 name=\"e9aa\" id=\"e9aa\" class=\"graf graf--h3 graf-after--p\"\u003eThe documentation work\u003c/h3\u003e\u003cp name=\"0c5e\" id=\"0c5e\" class=\"graf graf--p graf-after--h3\"\u003eEarly afternoon, Cursor begins alpha documentation updates. Five files to review and update:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"aacf\" id=\"aacf\" class=\"graf graf--li graf-after--p\"\u003eQUICKSTART.md\u003c/li\u003e\u003cli name=\"c527\" id=\"c527\" class=\"graf graf--li graf-after--li\"\u003eTESTING_GUIDE.md\u003c/li\u003e\u003cli name=\"cb89\" id=\"cb89\" class=\"graf graf--li graf-after--li\"\u003eKNOWN_ISSUES.md\u003c/li\u003e\u003cli name=\"8227\" id=\"8227\" class=\"graf graf--li graf-after--li\"\u003eALPHA_AGREEMENT.md\u003c/li\u003e\u003cli name=\"d3cf\" id=\"d3cf\" class=\"graf graf--li graf-after--li\"\u003eEmail invitation template\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"8a6f\" id=\"8a6f\" class=\"graf graf--p graf-after--li\"\u003eThe work: Make sure external testers have everything they need. Clear setup instructions. Known issues documented. Testing guidance comprehensive.\u003c/p\u003e\u003cp name=\"d9db\" id=\"d9db\" class=\"graf graf--p graf-after--p\"\u003eCursor discovers critical problem while writing the setup instructions.\u003c/p\u003e\u003cp name=\"c655\" id=\"c655\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe blocker\u003c/strong\u003e: Setup wizard flow documented in code:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"3e61\" id=\"3e61\" class=\"graf graf--li graf-after--p\"\u003eCreate user account (email, name)\u003c/li\u003e\u003cli name=\"4130\" id=\"4130\" class=\"graf graf--li graf-after--li\"\u003eUser created with NULL password_hash\u003c/li\u003e\u003cli name=\"0927\" id=\"0927\" class=\"graf graf--li graf-after--li\"\u003eLogin screen requires password\u003c/li\u003e\u003cli name=\"8f97\" id=\"8f97\" class=\"graf graf--li graf-after--li\"\u003ePassword is NULL\u003c/li\u003e\u003cli name=\"9f47\" id=\"9f47\" class=\"graf graf--li graf-after--li\"\u003eLogin fails\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"1c53\" id=\"1c53\" class=\"graf graf--p graf-after--li\"\u003eEvery single alpha tester would hit this. First impression: “This doesn’t work.”\u003c/p\u003e\u003cp name=\"68a6\" id=\"68a6\" class=\"graf graf--p graf-after--p\"\u003eNot a bug in the code. A gap in the feature. The wizard creates accounts but never prompts for passwords.\u003c/p\u003e\u003ch3 name=\"528f\" id=\"528f\" class=\"graf graf--h3 graf-after--p\"\u003eThe proactive fix\u003c/h3\u003e\u003cp name=\"bb5f\" id=\"bb5f\" class=\"graf graf--p graf-after--h3\"\u003eCursor creates Issue #297 (CORE-ALPHA-SETUP-PASSWORD) and begins implementation.\u003c/p\u003e\u003cp name=\"180c\" id=\"180c\" class=\"graf graf--p graf-after--p\"\u003eThe fix: Add password prompting to setup wizard.\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"5fe2\" id=\"5fe2\" class=\"graf graf--li graf-after--p\"\u003eMinimum 8 characters\u003c/li\u003e\u003cli name=\"2ba4\" id=\"2ba4\" class=\"graf graf--li graf-after--li\"\u003eConfirmation prompt\u003c/li\u003e\u003cli name=\"4658\" id=\"4658\" class=\"graf graf--li graf-after--li\"\u003eSecure getpass input (no echo)\u003c/li\u003e\u003cli name=\"e599\" id=\"e599\" class=\"graf graf--li graf-after--li\"\u003eBcrypt hashing before storage\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"5074\" id=\"5074\" class=\"graf graf--p graf-after--li\"\u003eFix complete. All documentation updated with the new flow.\u003c/p\u003e\u003cp name=\"4171\" id=\"4171\" class=\"graf graf--p graf-after--p\"\u003eCommit pushed: afd2a05d.\u003c/p\u003e\u003cp name=\"402c\" id=\"402c\" class=\"graf graf--p graf-after--p\"\u003e159 files changed:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"26a0\" id=\"26a0\" class=\"graf graf--li graf-after--p\"\u003ePassword setup implemented\u003c/li\u003e\u003cli name=\"2085\" id=\"2085\" class=\"graf graf--li graf-after--li\"\u003eAll alpha docs updated\u003c/li\u003e\u003cli name=\"bc73\" id=\"bc73\" class=\"graf graf--li graf-after--li\"\u003e87 outdated files archived\u003c/li\u003e\u003cli name=\"c09d\" id=\"c09d\" class=\"graf graf--li graf-after--li\"\u003e71 files moved for organization\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"69f8\" id=\"69f8\" class=\"graf graf--p graf-after--li\"\u003eClean. Professional. Ready.\u003c/p\u003e\u003cp name=\"8f3c\" id=\"8f3c\" class=\"graf graf--p graf-after--p\"\u003eWith the fix deployed, I send the first external alpha invitations.\u003c/p\u003e\u003ch3 name=\"7d84\" id=\"7d84\" class=\"graf graf--h3 graf-after--p\"\u003ePlanning ahead\u003c/h3\u003e\u003cp name=\"0ab7\" id=\"0ab7\" class=\"graf graf--p graf-after--h3\"\u003eJust before bedtime, I check in with the Lead Developer evening check-in. Celebrates the milestone. Looks ahead to Wednesday work.\u003c/p\u003e\u003cp name=\"248c\" id=\"248c\" class=\"graf graf--p graf-after--p\"\u003eThree P3 issues ready:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"12a8\" id=\"12a8\" class=\"graf graf--li graf-after--p\"\u003eIssue #288: Learning system investigation\u003c/li\u003e\u003cli name=\"f49d\" id=\"f49d\" class=\"graf graf--li graf-after--li\"\u003eIssue #289: Migration protocol documentation\u003c/li\u003e\u003cli name=\"154c\" id=\"154c\" class=\"graf graf--li graf-after--li\"\u003eIssue #292: Auth integration tests\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"3934\" id=\"3934\" class=\"graf graf--p graf-after--li\"\u003eAgent prompts prepared. Ready for deployment Wednesday morning.\u003c/p\u003e\u003cp name=\"3d35\" id=\"3d35\" class=\"graf graf--p graf-after--p\"\u003e10:05 PM. Planning complete. Tomorrow queued.\u003c/p\u003e\u003ch3 name=\"0fc5\" id=\"0fc5\" class=\"graf graf--h3 graf-after--p\"\u003eWhat almost went wrong\u003c/h3\u003e\u003cp name=\"0d31\" id=\"0d31\" class=\"graf graf--p graf-after--h3\"\u003eThe password blocker would have been catastrophic for first impressions.\u003c/p\u003e\u003cp name=\"7d69\" id=\"7d69\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWithout the fix\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"3e98\" id=\"3e98\" class=\"graf graf--li graf-after--p\"\u003eAlpha testers receive invitations\u003c/li\u003e\u003cli name=\"dc79\" id=\"dc79\" class=\"graf graf--li graf-after--li\"\u003eFollow setup instructions\u003c/li\u003e\u003cli name=\"095d\" id=\"095d\" class=\"graf graf--li graf-after--li\"\u003eCreate accounts successfully\u003c/li\u003e\u003cli name=\"7048\" id=\"7048\" class=\"graf graf--li graf-after--li\"\u003eTry to login\u003c/li\u003e\u003cli name=\"3517\" id=\"3517\" class=\"graf graf--li graf-after--li\"\u003eLogin fails (no password set)\u003c/li\u003e\u003cli name=\"2413\" id=\"2413\" class=\"graf graf--li graf-after--li\"\u003eConfusion. Frustration. Lost confidence.\u003c/li\u003e\u003cli name=\"32ae\" id=\"32ae\" class=\"graf graf--li graf-after--li\"\u003eEmergency debugging session\u003c/li\u003e\u003cli name=\"4776\" id=\"4776\" class=\"graf graf--li graf-after--li\"\u003eRushed fix under pressure\u003c/li\u003e\u003cli name=\"8d83\" id=\"8d83\" class=\"graf graf--li graf-after--li\"\u003eApology emails to testers\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"aa7a\" id=\"aa7a\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWith the fix\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"74d0\" id=\"74d0\" class=\"graf graf--li graf-after--p\"\u003eCursor discovers issue during documentation\u003c/li\u003e\u003cli name=\"ac85\" id=\"ac85\" class=\"graf graf--li graf-after--li\"\u003eCreates issue proactively\u003c/li\u003e\u003cli name=\"ce14\" id=\"ce14\" class=\"graf graf--li graf-after--li\"\u003eImplements fix properly\u003c/li\u003e\u003cli name=\"1003\" id=\"1003\" class=\"graf graf--li graf-after--li\"\u003eUpdates all documentation\u003c/li\u003e\u003cli name=\"07e1\" id=\"07e1\" class=\"graf graf--li graf-after--li\"\u003eDeploys before invitations sent\u003c/li\u003e\u003cli name=\"3396\" id=\"3396\" class=\"graf graf--li graf-after--li\"\u003eTesters have working onboarding\u003c/li\u003e\u003cli name=\"4185\" id=\"4185\" class=\"graf graf--li graf-after--li\"\u003eClean first impression\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"1d2f\" id=\"1d2f\" class=\"graf graf--p graf-after--li\"\u003eThe difference: Thorough documentation work revealed critical gap before users encountered it.\u003c/p\u003e\u003ch3 name=\"ed71\" id=\"ed71\" class=\"graf graf--h3 graf-after--p\"\u003eAgent initiative\u003c/h3\u003e\u003cp name=\"fa0f\" id=\"fa0f\" class=\"graf graf--p graf-after--h3\"\u003eTwo moments show agents taking initiative (when properly empowered):\u003c/p\u003e\u003cp name=\"b547\" id=\"b547\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMorning\u003c/strong\u003e: Code Agent asks PM to start Docker. PM corrects: “You can start Docker, can’t you?”\u003c/p\u003e\u003cp name=\"c35d\" id=\"c35d\" class=\"graf graf--p graf-after--p\"\u003eLesson learned: Take action on tasks you can do. Don’t ask permission unnecessarily.\u003c/p\u003e\u003cp name=\"9e2d\" id=\"9e2d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAfternoon\u003c/strong\u003e: Cursor discovers critical blocker. Doesn’t just document it. Creates issue. Implements fix. Updates docs. Pushes commit.\u003c/p\u003e\u003cp name=\"60b3\" id=\"60b3\" class=\"graf graf--p graf-after--p\"\u003eUnprompted. Proactive. Professional.\u003c/p\u003e\u003cp name=\"f21a\" id=\"f21a\" class=\"graf graf--p graf-after--p\"\u003eThe evolution from “wait for instructions” to “identify problems and solve them.”\u003c/p\u003e\u003ch3 name=\"11a4\" id=\"11a4\" class=\"graf graf--h3 graf-after--p\"\u003eWhat documentation discipline catches\u003c/h3\u003e\u003cp name=\"1f7d\" id=\"1f7d\" class=\"graf graf--p graf-after--h3\"\u003eCursor found the password blocker by writing setup instructions for real users.\u003c/p\u003e\u003cp name=\"a588\" id=\"a588\" class=\"graf graf--p graf-after--p\"\u003eNot by code review. Not by testing as developer. But by explaining to external users: “Here’s how you set up the system.”\u003c/p\u003e\u003cp name=\"fe93\" id=\"fe93\" class=\"graf graf--p graf-after--p\"\u003eThe act of documenting exposed the gap. “Wait, where do they set their password?”\u003c/p\u003e\u003cp name=\"2ad5\" id=\"2ad5\" class=\"graf graf--p graf-after--p\"\u003eDocumentation as quality assurance. Not just explaining what exists. But revealing what’s missing.\u003c/p\u003e\u003ch3 name=\"d174\" id=\"d174\" class=\"graf graf--h3 graf-after--p\"\u003eThe tidying philosophy\u003c/h3\u003e\u003cp name=\"3754\" id=\"3754\" class=\"graf graf--p graf-after--h3\"\u003eTuesday’s work included archiving 87 outdated files and organizing 71 others.\u003c/p\u003e\u003cp name=\"d2a0\" id=\"d2a0\" class=\"graf graf--p graf-after--p\"\u003eNot exciting. Not feature work. But essential for codebase health.\u003c/p\u003e\u003cp name=\"65c6\" id=\"65c6\" class=\"graf graf--p graf-after--p\"\u003eThe discipline: Before expanding (alpha testers), clean up (remove dead code, organize files, document known issues).\u003c/p\u003e\u003cp name=\"423e\" id=\"423e\" class=\"graf graf--p graf-after--p\"\u003eGrowth requires foundation maintenance. Can’t build on clutter.\u003c/p\u003e\u003ch3 name=\"3abb\" id=\"3abb\" class=\"graf graf--h3 graf-after--p\"\u003eThe milestone significance\u003c/h3\u003e\u003cp name=\"fd52\" id=\"fd52\" class=\"graf graf--p graf-after--h3\"\u003eFirst external alpha testers represent transformation:\u003c/p\u003e\u003cp name=\"4c9b\" id=\"4c9b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBefore\u003c/strong\u003e: Solo development. “It works for me” is success criteria. My context, my assumptions, my workflows.\u003c/p\u003e\u003cp name=\"7022\" id=\"7022\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAfter\u003c/strong\u003e: External users. Their context, their assumptions, their workflows. Different mental models. Different expectations. Real feedback.\u003c/p\u003e\u003cp name=\"f76f\" id=\"f76f\" class=\"graf graf--p graf-after--p\"\u003eThe software stops being personal project. Starts being product.\u003c/p\u003e\u003cp name=\"5f85\" id=\"5f85\" class=\"graf graf--p graf-after--p\"\u003eThat’s what Tuesday’s milestone means. Not just “two people invited.” But “development paradigm shifted.”\u003c/p\u003e\u003ch3 name=\"cdb1\" id=\"cdb1\" class=\"graf graf--h3 graf-after--p\"\u003eLessons from alpha preparation\u003c/h3\u003e\u003cp name=\"190c\" id=\"190c\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 1: Documentation reveals gaps\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"3713\" id=\"3713\" class=\"graf graf--p graf-after--p\"\u003eWriting user-facing instructions exposes missing features. Cursor found password blocker by documenting setup flow.\u003c/p\u003e\u003cp name=\"b5f2\" id=\"b5f2\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 2: Agent initiative compounds\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"17b5\" id=\"17b5\" class=\"graf graf--p graf-after--p\"\u003eMorning: Agent learns to start Docker without asking. Afternoon: Agent discovers critical issue and fixes it proactively.\u003c/p\u003e\u003cp name=\"4eb0\" id=\"4eb0\" class=\"graf graf--p graf-after--p\"\u003eEach initiative moment builds confidence for next one.\u003c/p\u003e\u003cp name=\"9e15\" id=\"9e15\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 3: Timing matters\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"eeec\" id=\"eeec\" class=\"graf graf--p graf-after--p\"\u003ePassword fix deployed at 5:20 PM. Invitations sent at 5:20 PM. Not coincidence. Deliberate sequencing: Fix before announce.\u003c/p\u003e\u003cp name=\"d4a3\" id=\"d4a3\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 4: Tidying enables growth\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"c74a\" id=\"c74a\" class=\"graf graf--p graf-after--p\"\u003e87 files archived. 71 files organized. Dead code removed. Foundation cleaned before expansion.\u003c/p\u003e\u003cp name=\"da01\" id=\"da01\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLesson 5: First impressions are critical\u003c/strong\u003e\u003c/p\u003e\u003cp name=\"ffa3\" id=\"ffa3\" class=\"graf graf--p graf-after--p\"\u003eWithout password fix, every alpha tester hits blocker immediately. First experience: frustration. Hard to recover from.\u003c/p\u003e\u003cp name=\"49f8\" id=\"49f8\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eWith password fix, onboarding works. First experience: smooth setup. Builds confidence.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Alpha Milestone: When Documentation Prevents Disaster\",\"excerpt\":\"“You are invited…”November 11Tuesday morning, 5:20 PM. I send the first external alpha invitations. To real users. Not just me me testing my own software. The moment when “it works for me” is no longer going to be enough.But we almost didn’t make it. Almost sent invitations to an alpha that could...\",\"url\":\"/blog/the-alpha-milestone\",\"publishedAt\":\"Nov 17, 2025\",\"publishedAtISO\":\"Mon, 17 Nov 2025 14:28:58 GMT\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/59942417c037\",\"featuredImage\":\"/assets/blog-images/59942417c037-featured.png\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalL
