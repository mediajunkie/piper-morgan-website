,\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T1b03,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMarch 13–19, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eSix features. Each one working and passing its tests. Together, they produced chaos.\u003c/p\u003e\n\u003cp\u003eWe ran into this pattern while investigating a conversation continuity bug: A user would say \"Sure\" after Piper made an offer to help with something, and instead of continuing the conversation, Piper would treat it as a brand-new query. It's an easy bug to describe but the root cause took three days to surface.\u003c/p\u003e\n\u003cp\u003eThree independent systems were each listening for user acceptance.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003eOne was built for onboarding.\u003c/li\u003e\u003cli\u003eOne for workflow hijack recovery.\u003c/li\u003e\u003cli\u003eOne for soft capability offers.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eEach had its own detection logic. Each worked correctly in isolation. Each passed its tests.\u003c/p\u003e\n\u003cp\u003eWhen they ran simultaneously — which is to say, always — four competing detection points raced to interpret \"Sure.\" The onboarding system thought the user was accepting onboarding. The soft offer system thought they were accepting a capability offer. The workflow system thought they were resuming a suspended session. The user just meant \"yes, help me with that.\"\u003c/p\u003e\n\u003ch1\u003eThe pattern\u003c/h1\u003e\n\u003cp\u003eOur Lead Developer agent called it out after auditing the codebase and finding six instances of the same structural flaw:\u003c/p\u003e\n\u003cblockquote\u003e\u003cp\u003eFeatures get extended independently. Each extension has its own issue, its own acceptance criteria, its own tests. Each one passes review. Nobody tests how they compose.\u003c/p\u003e\u003c/blockquote\u003e\n\u003cp\u003eThis isn't a testing failure. The tests were correct — each feature did what it said it would do. It's a \u003cem\u003ecomposition\u003c/em\u003e failure. The acceptance criteria for each feature asked \"does this feature work?\" but never asked \"does this feature work when the other five are also running?\"\u003c/p\u003e\n\u003cp\u003eI've seen this pattern on traditional teams too. The features get assigned to different engineers, the engineers are in different sprints, and the integration tests — if they exist — come at the end when refactoring is expensive. The word \"integration\" is in most agile frameworks as a distinct phase precisely because composition is so often treated as someone else's problem. What's different with multi-agent development is speed and invisibility: engineers at least share a standup. Our agents don't.\u003c/p\u003e\n\u003ch1\u003eWhy multi-agent development makes it worse\u003c/h1\u003e\n\u003cp\u003eIn a traditional team, developers share a codebase, sit in the same standup, and sometimes notice when their work overlaps. The collision is accidental but detectable through proximity.\u003c/p\u003e\n\u003cp\u003eIn multi-agent development, each agent works in its own session with its own context window. Agent A builds the onboarding flow on Tuesday. Agent B builds the soft offer system on Thursday. Agent C fixes the workflow hijack the following week. None of them sees the others' work in their context. None of them knows to test the combination.\u003c/p\u003e\n\u003cp\u003eThe agents aren't wrong. They're doing exactly what was asked. The gap is structural — it lives between the issue descriptions, not inside them.\u003c/p\u003e\n\u003cp\u003eWhen I think about what routing between agents actually means, I mostly think about what goes in the memo: the issue, the context, the acceptance criteria. I'm less systematic about what's running elsewhere that might intersect. The \"Sure\" bug is a reminder that the PM's job isn't just to route feature requests — it's to maintain the integration map. Who's building what, where those builds touch shared infrastructure, what tests would catch the combination. That's harder to write into a memo. It might be the next layer of the craft.\u003c/p\u003e\n\u003ch1\u003eThe fix has two layers\u003c/h1\u003e\n\u003cp\u003eThe immediate fix for our bug was architectural: consolidate the three acceptance systems into a single workflow dispatcher. One detection point, one registry, one routing decision — written, reviewed, and implemented in a single morning.\u003c/p\u003e\n\u003cp\u003eBut the meta-fix is recognizing the pattern \u003cem\u003ebefore\u003c/em\u003e it ships. Every feature that touches a shared pipeline — in our case, the offer/classification/handler chain — needs integration acceptance criteria. Not \"does this feature work?\" but \"does this feature work in a multi-turn conversation where the other features are also active?\"\u003c/p\u003e\n\u003cp\u003eWe added two practices:\u003c/p\u003e\n\u003cp\u003eFirst, \u003cstrong\u003ecomposition tests\u003c/strong\u003e: multi-turn conversation scenarios that exercise feature combinations. Not just \"start onboarding\" but \"start onboarding, change your mind, ask about projects, get offered a capability, accept it.\" The features need to share a conversation, not just share a codebase.\u003c/p\u003e\n\u003cp\u003eSecond, \u003cstrong\u003ecomposition audits at milestone boundaries\u003c/strong\u003e: before closing a sprint gate, audit every feature that touches the pipeline and verify they've been tested together. Not a full regression — a focused check on the interaction points.\u003c/p\u003e\n\u003ch1\u003eThe broader lesson\u003c/h1\u003e\n\u003cp\u003eThis pattern isn't specific to AI agents. It's what happens when any team builds features in parallel — microservices teams, platform teams, any organization where different people own different parts of the same user experience. The features work. The tests pass. The composition fails.\u003c/p\u003e\n\u003cp\u003eWhat's different in multi-agent development is the \u003cem\u003espeed\u003c/em\u003e at which the pattern emerges. When you can build a complete feature in a single session, you can accumulate six independently correct but mutually incompatible features in a week. Traditional teams might take months to reach the same state. Multi-agent velocity compresses the feedback loop — which means you hit the composition wall faster.\u003c/p\u003e\n\u003cp\u003eThe good news is that the detection cycle is also faster. Our audit cascade identified six instances, diagnosed the structural cause, and implemented the architectural fix in under three hours. In a traditional codebase with the same number of competing systems, the investigation alone might have taken days.\u003c/p\u003e\n\u003cp\u003eSpeed creates the problem. Speed also enables the fix. The question is whether you have the diagnostic practices to notice before your users do.\u003c/p\u003e\n\u003cp\u003eThis is another instance of our Pattern-045, \"Green Tests, Red User.\" The tests passed. The features shipped. It was a manual \"Sure\" that exposed the collision. I test things manually out of habit, or distrust, or because I know the edges of this product well enough to poke them. Whatever the reason, it's the human in the loop who caught this one. The composition tests we added afterward are meant to close that gap. We'll see if they do.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \"Branch-or-Anchor in Ninety Minutes\" — a new rubric surfaces during a workstream review, nearly duplicates an existing one, and the methodology catalog catches it before the meeting ends.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eHave you ever shipped features that each worked perfectly in isolation but fell apart when they ran together? What made you notice — a test, a user, or something else?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Extension Without Integration\",\"guid\":\"blog-first-6db4781ea389\",\"url\":\"/blog/extension-without-integration\",\"publishedAt\":\"Jun 22, 2026\",\"workDate\":\"Mar 13, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/extension-without-integration.webp\",\"imageAlt\":\"A hotel guest's casual gesture triggers four eager valets at once—one grabs the keys, one offers the elevator, and two compete over the same suitcase, while a translucent observer realizes the coordination problem.\",\"imageCaption\":\"\\\"I''ve got it!\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"Extension Without Integration\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Extension Without Integration | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"March 13–19, 2026 Six features. Each one working and passing its tests. Together, they produced chaos. We ran
