fined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2a2f,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A hand-drawn, black-and-white cartoon shows a human UX designer sketching simple, bold shapes on a whiteboard with a thick marker while a robot teammate looks on. Above the robot, a thought bubble contains a much more complex, interconnected diagram, suggesting a richer internal model formed from the rough sketches.\" src=\"https://cdn-images-1.medium.com/max/1024/1*Lk_ClRYrB7Cyst9SON_a-Q.png\" /\u003e\u003cfigcaption\u003e“So, I kind of see it this way…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 27, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eI needed to understand an object model — substrates, lenses, lifecycles, metadata. The concepts had been discussed for two days. Decisions had been made. But I couldn’t see how they fit together.\u003c/p\u003e\u003cp\u003eSo I grabbed fat markers and paper.\u003c/p\u003e\u003cp\u003eIn parallel, I prompted three AI visualization tools with the same concepts. Same inputs. Different tools. Let’s see what each discovers.\u003c/p\u003e\u003cp\u003eThe results surprised me. Not because AI tools failed — one produced genuinely elegant output. But because human sketching found things none of the tools could find.\u003c/p\u003e\u003cp\u003eFat markers and AI tools discover different things. The combination is more powerful than either alone.\u003c/p\u003e\u003ch3\u003eThe experiment\u003c/h3\u003e\u003cp\u003eSeven hand-drawn sketches on paper. Fat markers — the kind that force you to draw big, loose, imprecise.\u003c/p\u003e\u003cp\u003eThree AI tool outputs. Whimsical (diagramming), Eraser.io (technical drawing), and Gemini via Nano Banano (generative visualization).\u003c/p\u003e\u003cp\u003eSame concepts fed to each:\u003c/p\u003e\u003cul\u003e\u003cli\u003eFour substrates: Entities, Spaces, Moments, Situations\u003c/li\u003e\u003cli\u003eEight perceptual lenses\u003c/li\u003e\u003cli\u003eObject lifecycle with composting stage\u003c/li\u003e\u003cli\u003eMetadata dimensions\u003c/li\u003e\u003cli\u003eHow Piper understands users\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWhat would each approach reveal?\u003c/p\u003e\u003ch3\u003eWhat AI tools produced\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eWhimsical\u003c/strong\u003e: Documentation, not insight. A text outline with connecting lines. Every concept represented as a labeled box. Relationships shown as arrows. Technically correct. Conceptually empty.\u003c/p\u003e\u003cp\u003eThe diagram could have been generated from bullet points. It showed hierarchy but not meaning. Structure but not understanding.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEraser.io\u003c/strong\u003e: Immediately jumped to database schema. The prompt said “object model” and the tool heard “data model.” Foreign keys. Table relationships. Implementation details.\u003c/p\u003e\u003cp\u003eThis might be useful later, for engineering. But it lost all conceptual meaning. “Moment” became a table with columns, not a bounded scene where things happen.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGemini (Nano Banano)\u003c/strong\u003e: Surprisingly effective. Overlapping colored regions showing how concepts interpenetrate. An elegant spiral for the lifecycle. Visual hierarchy that communicated importance.\u003c/p\u003e\u003cp\u003eThis was the only AI output worth keeping. It captured gestalt — the overall shape and feel of the model. Not perfect (don’t look too close!) but directionally useful.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*wIhRLDhrYGJPXZjF\" /\u003e\u003c/figure\u003e\u003ch3\u003eWhat hand-drawing discovered\u003c/h3\u003e\u003cp\u003eThe seven sketches found things none of the AI tools found:\u003c/p\u003e\u003ch4\u003e\u003cstrong\u003eSubstrates\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eSituation isn’t a fourth substrate parallel to Entity, Space, and Moment. It’s the \u003cem\u003eframe\u003c/em\u003e — the container that holds a configuration of the other three. This changes the model fundamentally. A situation encompasses entities experiencing moments in places.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/445/1*x0mhnmpgOXRP5n3SKxDYmg.png\" /\u003e\u003c/figure\u003e\u003ch4\u003e\u003cstrong\u003eMoments\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eThe “shoebox” metaphor emerged. Moments are bounded containers — theatrical unities of time and place. Things happen inside them. They have beginnings and endings. The sketch led to “PPP” — Policy, Process, People (plus AI) as what shapes moments.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/437/1*p3iXZNKmcJ0oyuxLh5H2ng.png\" /\u003e\u003c/figure\u003e\u003ch4\u003e\u003cstrong\u003eLenses × entities\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eA triangle emerged showing change, flow, and causality as fundamental relationships. And the core grammar crystallized: “Entities experience Moments in Places.” This sentence captures the whole model.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/445/1*giSDaKWrmrB-3WsRea_-Kg.png\" /\u003e\u003c/figure\u003e\u003ch4\u003e\u003cstrong\u003eLifecycle\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eThe shape of the cycle itself carries meaning. Circles imply repetition. Spirals imply progression. Arcs imply completion. The lifecycle diagram shouldn’t just list stages — its shape should communicate the kind of change.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/445/1*lRjkSLtJFZweHzFLYMo6xg.png\" /\u003e\u003c/figure\u003e\u003ch4\u003e\u003cstrong\u003eWhat Piper knows\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eDrawing what Piper knows about an entity revealed that “Noticed” works better than “Inferred” as language for AI cognition. More human, less mechanical.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/445/1*7PKcsYnjQSs7v06GxoFzDg.png\" /\u003e\u003c/figure\u003e\u003ch4\u003e\u003cstrong\u003eHuman-centered\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003eBryce Glass’s Flickr-era pattern work came to mind. The principal sits in a situation. Piper delivers what they need. The sketch connected current work to design history.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/445/1*B-pjPddDCJR1Yd9xD6ESLQ.png\" /\u003e\u003c/figure\u003e\u003ch4\u003e\u003cstrong\u003eDocument handling\u003c/strong\u003e\u003c/h4\u003e\u003cp\u003ePiper as document intelligence hub.\u003c/p\u003e\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/445/1*thH1bEvqy5teMUK2HLcAIg.png\" /\u003e\u003c/figure\u003e\u003ch3\u003eWhy fat markers matter\u003c/h3\u003e\u003cp\u003eFat markers force generalization.\u003c/p\u003e\u003cp\u003eWith a fine pen, you can add detail. You can be precise. You can make something look finished before you’ve figured out what it means.\u003c/p\u003e\u003cp\u003eWith a fat marker, precision is impossible. You can’t draw small. You can’t add detail. You have to work at the level of shapes and relationships.\u003c/p\u003e\u003cp\u003eThis constraint is productive. It prevents premature refinement. It keeps you working on structure when structure is what you need to understand.\u003c/p\u003e\u003cp\u003eThe sketches weren’t pretty. They weren’t presentable. They were thinking tools — ugly and useful.\u003c/p\u003e\u003ch3\u003eWhat each approach is good for\u003c/h3\u003e\u003cp\u003eAfter the experiment, I could see what each approach offers:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAI diagramming tools\u003c/strong\u003e (Whimsical, Lucidchart, etc.): Good for documentation. Once you know what you’re representing, they produce clean, shareable diagrams. But they don’t help you figure out what you’re representing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAI code-oriented tools\u003c/strong\u003e (Eraser.io, Mermaid): Good for technical translation. When you need to move from concepts to implementation, they help bridge the gap. But they assume you’ve already done the conceptual work.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAI generative visualization\u003c/strong\u003e (Gemini, Midjourney for diagrams): Good for gestalt. They can capture the overall feel, show how things interpenetrate, create visual metaphors. Worth including in the mix.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHuman sketching with fat markers\u003c/strong\u003e: Good for discovery. Finding relationships you didn’t know existed. Challenging your assumptions. Generating new concepts.\u003c/p\u003e\u003cp\u003eThe mistake is using one approach for everything. Documentation tools don’t help discovery. Discovery tools don’t produce documentation.\u003c/p\u003e\u003ch3\u003eThe combination\u003c/h3\u003e\u003cp\u003eThe best outcome combines approaches:\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cstrong\u003eDiscover\u003c/strong\u003e with fat markers and paper. Find the relationships. Challenge the structure. Let unexpected insights emerge.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCapture gestalt\u003c/strong\u003e with generative AI. Get a visual that communicates the overall shape and feel.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eDocument\u003c/strong\u003e with diagramming tools. Once you know what you’re representing, produce clean shareable versions.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eTranslate\u003c/strong\u003e with technical tools. When it’s time to implement, bridge from concepts to code.\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eEach tool for its strength. No tool for everything.\u003c/p\u003e\u003ch3\u003eWhat sketching teaches\u003c/h3\u003e\u003cp\u003eThe sketching session taught me things about my own object model that two days of discussion hadn’t revealed.\u003c/p\u003e\u003cp\u003eSituation as frame, not peer substrate. That changes how I think about everything else. Entities don’t just exist alongside situations — they exist \u003cem\u003ewithin\u003c/em\u003e situations.\u003c/p\u003e\u003cp\u003e“\u003cstrong\u003eEntities\u003c/strong\u003e experience \u003cstrong\u003eMoments\u003c/strong\u003e in \u003cstrong\u003ePlaces\u003c/strong\u003e.” That sentence emerged from a sketch, not from conversation. The act of drawing forced a synthesis that talking didn’t produce.\u003c/p\u003e\u003cp\u003eLifecycle shapes as metadata. The spiral versus the circle versus the arc — these aren’t just aesthetic choices. They communicate different kinds of change. The sketch made that visible.\u003c/p\u003e\u003cp\u003eNone of these insights were in the AI tool outputs. Not because AI can’t have insights — the Gemini visualization showed genuine understanding of gestalt. But because the insights required \u003cem\u003eme\u003c/em\u003e to think, and the AI tools were thinking \u003cem\u003efor\u003c/em\u003e me.\u003c/p\u003e\u003cp\u003eSketching is thinking. Not recording thoughts — generating them.\u003c/p\u003e\u003ch3\u003eWhen to reach for markers\u003c/h3\u003e\u003cp\u003eThe experiment suggests when fat markers help:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEarly conceptual work\u003c/strong\u003e: When you don’t yet know what you’re building, sketch it. The constraints of fat markers keep you at the right level of abstraction.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStuck points\u003c/strong\u003e: When discussion isn’t producing clarity, sketch it. The visual modality often unsticks verbal loops.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIntegration challenges\u003c/strong\u003e: When you have many concepts that need to fit together, sketch their relationships. Paper is patient with uncertainty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBefore using AI tools\u003c/strong\u003e: Sketch first, then prompt AI tools. You’ll give better prompts because you’ll understand what you’re asking for.\u003c/p\u003e\u003cp\u003eThe fat marker isn’t always the right tool, but it’s one of the best things to start with.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: “The Wizard’s Journal,” some thoughts on how I approach an LLM chat like a talking notebook, a diving pool, a magic mirror.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you discovered things through sketching that other tools missed? When has low-fidelity helped you think? What unexpected insights emerged from the act of drawing?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=9750471f82df\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/fat-markers-and-object-models-9750471f82df\"\u003eFat Markers and Object Models\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T4381,"])</script><script>self.__next_f.push([1,"\u003csection name=\"3bd8\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"ad10\" id=\"ad10\" class=\"graf graf--h3 graf--leading graf--title\"\u003eFat Markers and Object Models\u003c/h3\u003e\u003cfigure name=\"a383\" id=\"a383\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*Lk_ClRYrB7Cyst9SON_a-Q.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A hand-drawn, black-and-white cartoon shows a human UX designer sketching simple, bold shapes on a whiteboard with a thick marker while a robot teammate looks on. Above the robot, a thought bubble contains a much more complex, interconnected diagram, suggesting a richer internal model formed from the rough sketches.\" src=\"https://cdn-images-1.medium.com/max/800/1*Lk_ClRYrB7Cyst9SON_a-Q.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“So, I kind of see it this way…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"a3b3\" id=\"a3b3\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 27, 2025\u003c/em\u003e\u003c/p\u003e\u003cp name=\"5a44\" id=\"5a44\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eI\u003c/span\u003e needed to understand an object model — substrates, lenses, lifecycles, metadata. The concepts had been discussed for two days. Decisions had been made. But I couldn’t see how they fit together.\u003c/p\u003e\u003cp name=\"5b9b\" id=\"5b9b\" class=\"graf graf--p graf-after--p\"\u003eSo I grabbed fat markers and paper.\u003c/p\u003e\u003cp name=\"1b53\" id=\"1b53\" class=\"graf graf--p graf-after--p\"\u003eIn parallel, I prompted three AI visualization tools with the same concepts. Same inputs. Different tools. Let’s see what each discovers.\u003c/p\u003e\u003cp name=\"67c6\" id=\"67c6\" class=\"graf graf--p graf-after--p\"\u003eThe results surprised me. Not because AI tools failed — one produced genuinely elegant output. But because human sketching found things none of the tools could find.\u003c/p\u003e\u003cp name=\"1eb8\" id=\"1eb8\" class=\"graf graf--p graf-after--p\"\u003eFat markers and AI tools discover different things. The combination is more powerful than either alone.\u003c/p\u003e\u003ch3 name=\"9402\" id=\"9402\" class=\"graf graf--h3 graf-after--p\"\u003eThe experiment\u003c/h3\u003e\u003cp name=\"23fb\" id=\"23fb\" class=\"graf graf--p graf-after--h3\"\u003eSeven hand-drawn sketches on paper. Fat markers — the kind that force you to draw big, loose, imprecise.\u003c/p\u003e\u003cp name=\"b89d\" id=\"b89d\" class=\"graf graf--p graf-after--p\"\u003eThree AI tool outputs. Whimsical (diagramming), Eraser.io (technical drawing), and Gemini via Nano Banano (generative visualization).\u003c/p\u003e\u003cp name=\"df5a\" id=\"df5a\" class=\"graf graf--p graf-after--p\"\u003eSame concepts fed to each:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"a756\" id=\"a756\" class=\"graf graf--li graf-after--p\"\u003eFour substrates: Entities, Spaces, Moments, Situations\u003c/li\u003e\u003cli name=\"5600\" id=\"5600\" class=\"graf graf--li graf-after--li\"\u003eEight perceptual lenses\u003c/li\u003e\u003cli name=\"e96a\" id=\"e96a\" class=\"graf graf--li graf-after--li\"\u003eObject lifecycle with composting stage\u003c/li\u003e\u003cli name=\"3a4b\" id=\"3a4b\" class=\"graf graf--li graf-after--li\"\u003eMetadata dimensions\u003c/li\u003e\u003cli name=\"02d3\" id=\"02d3\" class=\"graf graf--li graf-after--li\"\u003eHow Piper understands users\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"6171\" id=\"6171\" class=\"graf graf--p graf-after--li\"\u003eWhat would each approach reveal?\u003c/p\u003e\u003ch3 name=\"10a1\" id=\"10a1\" class=\"graf graf--h3 graf-after--p\"\u003eWhat AI tools produced\u003c/h3\u003e\u003cp name=\"5978\" id=\"5978\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhimsical\u003c/strong\u003e: Documentation, not insight. A text outline with connecting lines. Every concept represented as a labeled box. Relationships shown as arrows. Technically correct. Conceptually empty.\u003c/p\u003e\u003cp name=\"4d27\" id=\"4d27\" class=\"graf graf--p graf-after--p\"\u003eThe diagram could have been generated from bullet points. It showed hierarchy but not meaning. Structure but not understanding.\u003c/p\u003e\u003cp name=\"7de1\" id=\"7de1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEraser.io\u003c/strong\u003e: Immediately jumped to database schema. The prompt said “object model” and the tool heard “data model.” Foreign keys. Table relationships. Implementation details.\u003c/p\u003e\u003cp name=\"ad5f\" id=\"ad5f\" class=\"graf graf--p graf-after--p\"\u003eThis might be useful later, for engineering. But it lost all conceptual meaning. “Moment” became a table with columns, not a bounded scene where things happen.\u003c/p\u003e\u003cp name=\"77d6\" id=\"77d6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGemini (Nano Banano)\u003c/strong\u003e: Surprisingly effective. Overlapping colored regions showing how concepts interpenetrate. An elegant spiral for the lifecycle. Visual hierarchy that communicated importance.\u003c/p\u003e\u003cp name=\"0d91\" id=\"0d91\" class=\"graf graf--p graf-after--p\"\u003eThis was the only AI output worth keeping. It captured gestalt — the overall shape and feel of the model. Not perfect (don’t look too close!) but directionally useful.\u003c/p\u003e\u003cfigure name=\"7292\" id=\"7292\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"0*wIhRLDhrYGJPXZjF\" data-width=\"1488\" data-height=\"811\" src=\"https://cdn-images-1.medium.com/max/800/0*wIhRLDhrYGJPXZjF\"\u003e\u003c/figure\u003e\u003ch3 name=\"5ddb\" id=\"5ddb\" class=\"graf graf--h3 graf-after--figure\"\u003eWhat hand-drawing discovered\u003c/h3\u003e\u003cp name=\"ee25\" id=\"ee25\" class=\"graf graf--p graf-after--h3\"\u003eThe seven sketches found things none of the AI tools found:\u003c/p\u003e\u003ch4 name=\"5c63\" id=\"5c63\" class=\"graf graf--h4 graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eSubstrates\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"23de\" id=\"23de\" class=\"graf graf--p graf-after--h4\"\u003eSituation isn’t a fourth substrate parallel to Entity, Space, and Moment. It’s the \u003cem class=\"markup--em markup--p-em\"\u003eframe\u003c/em\u003e — the container that holds a configuration of the other three. This changes the model fundamentally. A situation encompasses entities experiencing moments in places.\u003c/p\u003e\u003cfigure name=\"7cad\" id=\"7cad\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*x0mhnmpgOXRP5n3SKxDYmg.png\" data-width=\"445\" data-height=\"594\" src=\"https://cdn-images-1.medium.com/max/800/1*x0mhnmpgOXRP5n3SKxDYmg.png\"\u003e\u003c/figure\u003e\u003ch4 name=\"963f\" id=\"963f\" class=\"graf graf--h4 graf-after--figure\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eMoments\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"c233\" id=\"c233\" class=\"graf graf--p graf-after--h4\"\u003eThe “shoebox” metaphor emerged. Moments are bounded containers — theatrical unities of time and place. Things happen inside them. They have beginnings and endings. The sketch led to “PPP” — Policy, Process, People (plus AI) as what shapes moments.\u003c/p\u003e\u003cfigure name=\"7da2\" id=\"7da2\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*p3iXZNKmcJ0oyuxLh5H2ng.png\" data-width=\"437\" data-height=\"326\" src=\"https://cdn-images-1.medium.com/max/800/1*p3iXZNKmcJ0oyuxLh5H2ng.png\"\u003e\u003c/figure\u003e\u003ch4 name=\"b4cb\" id=\"b4cb\" class=\"graf graf--h4 graf-after--figure\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eLenses × entities\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"f0ef\" id=\"f0ef\" class=\"graf graf--p graf-after--h4\"\u003eA triangle emerged showing change, flow, and causality as fundamental relationships. And the core grammar crystallized: “Entities experience Moments in Places.” This sentence captures the whole model.\u003c/p\u003e\u003cfigure name=\"a30f\" id=\"a30f\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*giSDaKWrmrB-3WsRea_-Kg.png\" data-width=\"445\" data-height=\"594\" src=\"https://cdn-images-1.medium.com/max/800/1*giSDaKWrmrB-3WsRea_-Kg.png\"\u003e\u003c/figure\u003e\u003ch4 name=\"4907\" id=\"4907\" class=\"graf graf--h4 graf-after--figure\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eLifecycle\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"47ca\" id=\"47ca\" class=\"graf graf--p graf-after--h4\"\u003eThe shape of the cycle itself carries meaning. Circles imply repetition. Spirals imply progression. Arcs imply completion. The lifecycle diagram shouldn’t just list stages — its shape should communicate the kind of change.\u003c/p\u003e\u003cfigure name=\"c1da\" id=\"c1da\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*lRjkSLtJFZweHzFLYMo6xg.png\" data-width=\"445\" data-height=\"594\" src=\"https://cdn-images-1.medium.com/max/800/1*lRjkSLtJFZweHzFLYMo6xg.png\"\u003e\u003c/figure\u003e\u003ch4 name=\"fbca\" id=\"fbca\" class=\"graf graf--h4 graf-after--figure\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eWhat Piper knows\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"79cd\" id=\"79cd\" class=\"graf graf--p graf-after--h4\"\u003eDrawing what Piper knows about an entity revealed that “Noticed” works better than “Inferred” as language for AI cognition. More human, less mechanical.\u003c/p\u003e\u003cfigure name=\"3bc0\" id=\"3bc0\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*7PKcsYnjQSs7v06GxoFzDg.png\" data-width=\"445\" data-height=\"594\" src=\"https://cdn-images-1.medium.com/max/800/1*7PKcsYnjQSs7v06GxoFzDg.png\"\u003e\u003c/figure\u003e\u003ch4 name=\"919a\" id=\"919a\" class=\"graf graf--h4 graf-after--figure\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eHuman-centered\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"9a63\" id=\"9a63\" class=\"graf graf--p graf-after--h4\"\u003eBryce Glass’s Flickr-era pattern work came to mind. The principal sits in a situation. Piper delivers what they need. The sketch connected current work to design history.\u003c/p\u003e\u003cfigure name=\"0770\" id=\"0770\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*B-pjPddDCJR1Yd9xD6ESLQ.png\" data-width=\"445\" data-height=\"594\" src=\"https://cdn-images-1.medium.com/max/800/1*B-pjPddDCJR1Yd9xD6ESLQ.png\"\u003e\u003c/figure\u003e\u003ch4 name=\"59ed\" id=\"59ed\" class=\"graf graf--h4 graf-after--figure\"\u003e\u003cstrong class=\"markup--strong markup--h4-strong\"\u003eDocument handling\u003c/strong\u003e\u003c/h4\u003e\u003cp name=\"37dd\" id=\"37dd\" class=\"graf graf--p graf-after--h4\"\u003ePiper as document intelligence hub.\u003c/p\u003e\u003cfigure name=\"39b2\" id=\"39b2\" class=\"graf graf--figure graf-after--p\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*thH1bEvqy5teMUK2HLcAIg.png\" data-width=\"445\" data-height=\"594\" src=\"https://cdn-images-1.medium.com/max/800/1*thH1bEvqy5teMUK2HLcAIg.png\"\u003e\u003c/figure\u003e\u003ch3 name=\"fadf\" id=\"fadf\" class=\"graf graf--h3 graf-after--figure\"\u003eWhy fat markers matter\u003c/h3\u003e\u003cp name=\"da3c\" id=\"da3c\" class=\"graf graf--p graf-after--h3\"\u003eFat markers force generalization.\u003c/p\u003e\u003cp name=\"ec6f\" id=\"ec6f\" class=\"graf graf--p graf-after--p\"\u003eWith a fine pen, you can add detail. You can be precise. You can make something look finished before you’ve figured out what it means.\u003c/p\u003e\u003cp name=\"12e3\" id=\"12e3\" class=\"graf graf--p graf-after--p\"\u003eWith a fat marker, precision is impossible. You can’t draw small. You can’t add detail. You have to work at the level of shapes and relationships.\u003c/p\u003e\u003cp name=\"6245\" id=\"6245\" class=\"graf graf--p graf-after--p\"\u003eThis constraint is productive. It prevents premature refinement. It keeps you working on structure when structure is what you need to understand.\u003c/p\u003e\u003cp name=\"17bb\" id=\"17bb\" class=\"graf graf--p graf-after--p\"\u003eThe sketches weren’t pretty. They weren’t presentable. They were thinking tools — ugly and useful.\u003c/p\u003e\u003ch3 name=\"36d1\" id=\"36d1\" class=\"graf graf--h3 graf-after--p\"\u003eWhat each approach is good for\u003c/h3\u003e\u003cp name=\"bd00\" id=\"bd00\" class=\"graf graf--p graf-after--h3\"\u003eAfter the experiment, I could see what each approach offers:\u003c/p\u003e\u003cp name=\"e7e6\" id=\"e7e6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAI diagramming tools\u003c/strong\u003e (Whimsical, Lucidchart, etc.): Good for documentation. Once you know what you’re representing, they produce clean, shareable diagrams. But they don’t help you figure out what you’re representing.\u003c/p\u003e\u003cp name=\"1ca9\" id=\"1ca9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAI code-oriented tools\u003c/strong\u003e (Eraser.io, Mermaid): Good for technical translation. When you need to move from concepts to implementation, they help bridge the gap. But they assume you’ve already done the conceptual work.\u003c/p\u003e\u003cp name=\"77b4\" id=\"77b4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eAI generative visualization\u003c/strong\u003e (Gemini, Midjourney for diagrams): Good for gestalt. They can capture the overall feel, show how things interpenetrate, create visual metaphors. Worth including in the mix.\u003c/p\u003e\u003cp name=\"17d4\" id=\"17d4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eHuman sketching with fat markers\u003c/strong\u003e: Good for discovery. Finding relationships you didn’t know existed. Challenging your assumptions. Generating new concepts.\u003c/p\u003e\u003cp name=\"cd65\" id=\"cd65\" class=\"graf graf--p graf-after--p\"\u003eThe mistake is using one approach for everything. Documentation tools don’t help discovery. Discovery tools don’t produce documentation.\u003c/p\u003e\u003ch3 name=\"ca6c\" id=\"ca6c\" class=\"graf graf--h3 graf-after--p\"\u003eThe combination\u003c/h3\u003e\u003cp name=\"225b\" id=\"225b\" class=\"graf graf--p graf-after--h3\"\u003eThe best outcome combines approaches:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"0785\" id=\"0785\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eDiscover\u003c/strong\u003e with fat markers and paper. Find the relationships. Challenge the structure. Let unexpected insights emerge.\u003c/li\u003e\u003cli name=\"ea2a\" id=\"ea2a\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eCapture gestalt\u003c/strong\u003e with generative AI. Get a visual that communicates the overall shape and feel.\u003c/li\u003e\u003cli name=\"1c49\" id=\"1c49\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eDocument\u003c/strong\u003e with diagramming tools. Once you know what you’re representing, produce clean shareable versions.\u003c/li\u003e\u003cli name=\"7b82\" id=\"7b82\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eTranslate\u003c/strong\u003e with technical tools. When it’s time to implement, bridge from concepts to code.\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"920a\" id=\"920a\" class=\"graf graf--p graf-after--li\"\u003eEach tool for its strength. No tool for everything.\u003c/p\u003e\u003ch3 name=\"f589\" id=\"f589\" class=\"graf graf--h3 graf-after--p\"\u003eWhat sketching teaches\u003c/h3\u003e\u003cp name=\"70a3\" id=\"70a3\" class=\"graf graf--p graf-after--h3\"\u003eThe sketching session taught me things about my own object model that two days of discussion hadn’t revealed.\u003c/p\u003e\u003cp name=\"6efe\" id=\"6efe\" class=\"graf graf--p graf-after--p\"\u003eSituation as frame, not peer substrate. That changes how I think about everything else. Entities don’t just exist alongside situations — they exist \u003cem class=\"markup--em markup--p-em\"\u003ewithin\u003c/em\u003e situations.\u003c/p\u003e\u003cp name=\"d740\" id=\"d740\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e“\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEntities\u003c/strong\u003e experience \u003cstrong class=\"markup--strong markup--p-strong\"\u003eMoments\u003c/strong\u003e in \u003cstrong class=\"markup--strong markup--p-strong\"\u003ePlaces\u003c/strong\u003e.” That sentence emerged from a sketch, not from conversation. The act of drawing forced a synthesis that talking didn’t produce.\u003c/p\u003e\u003cp name=\"9271\" id=\"9271\" class=\"graf graf--p graf-after--p\"\u003eLifecycle shapes as metadata. The spiral versus the circle versus the arc — these aren’t just aesthetic choices. They communicate different kinds of change. The sketch made that visible.\u003c/p\u003e\u003cp name=\"357f\" id=\"357f\" class=\"graf graf--p graf-after--p\"\u003eNone of these insights were in the AI tool outputs. Not because AI can’t have insights — the Gemini visualization showed genuine understanding of gestalt. But because the insights required \u003cem class=\"markup--em markup--p-em\"\u003eme\u003c/em\u003e to think, and the AI tools were thinking \u003cem class=\"markup--em markup--p-em\"\u003efor\u003c/em\u003e me.\u003c/p\u003e\u003cp name=\"c908\" id=\"c908\" class=\"graf graf--p graf-after--p\"\u003eSketching is thinking. Not recording thoughts — generating them.\u003c/p\u003e\u003ch3 name=\"151d\" id=\"151d\" class=\"graf graf--h3 graf-after--p\"\u003eWhen to reach for markers\u003c/h3\u003e\u003cp name=\"f230\" id=\"f230\" class=\"graf graf--p graf-after--h3\"\u003eThe experiment suggests when fat markers help:\u003c/p\u003e\u003cp name=\"d6dd\" id=\"d6dd\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEarly conceptual work\u003c/strong\u003e: When you don’t yet know what you’re building, sketch it. The constraints of fat markers keep you at the right level of abstraction.\u003c/p\u003e\u003cp name=\"a37e\" id=\"a37e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStuck points\u003c/strong\u003e: When discussion isn’t producing clarity, sketch it. The visual modality often unsticks verbal loops.\u003c/p\u003e\u003cp name=\"fbff\" id=\"fbff\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eIntegration challenges\u003c/strong\u003e: When you have many concepts that need to fit together, sketch their relationships. Paper is patient with uncertainty.\u003c/p\u003e\u003cp name=\"088a\" id=\"088a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBefore using AI tools\u003c/strong\u003e: Sketch first, then prompt AI tools. You’ll give better prompts because you’ll understand what you’re asking for.\u003c/p\u003e\u003cp name=\"db53\" id=\"db53\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe fat marker isn’t always the right tool, but it’s one of the best things to start with.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Fat Markers and Object Models\",\"excerpt\":\"“So, I kind of see it this way…”November 27, 2025I needed to understand an object model — substrates, lenses, lifecycles, metadata. The concepts had been discussed for two days. Decisions had been made. But I couldn’t see how they fit together.So I grabbed fat markers and paper.In parallel, I pro...\",\"url\":\"/blog/fat-markers-and-object-models\",\"publishedAt\":\"Jan 17, 2026\",\"publishedAtISO\":\"2026-01-17T15:44:20.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/9750471f82df\",\"featuredImage\":\"/assets/blog-images/9750471f82df-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/fat-markers-and-object-models-9750471f82df?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"fat-markers-and-object-models\",\"workDate\":\"Jan 17, 2026\",\"workDateISO\":\"2026-01-17T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-01-17\",\"featured\":false},\"content\":{\"title\":\"Fat Markers and Object Models\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.
