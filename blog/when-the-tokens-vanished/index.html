ateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2cf0,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"Human and glowing energy-being AI peer into a gap between two misaligned pipes labeled “store” and “retrieve,” where many glowing tokens are lost.\" src=\"https://cdn-images-1.medium.com/max/1024/1*PcRmtXjKft5ZK57Ml_X2gQ.png\" /\u003e\u003cfigcaption\u003e“I sure hope \u003ca href=\"https://www.linkedin.com/feed/update/urn:li:activity:7436579260812869632?commentUrn=urn%3Ali%3Acomment%3A%28activity%3A7436579260812869632%2C7436585098415603712%29\u0026amp;dashCommentUrn=urn%3Ali%3Afsd_comment%3A%287436585098415603712%2Curn%3Ali%3Aactivity%3A7436579260812869632%29\"\u003ePaul Ford\u003c/a\u003e approves of this visual metaphor!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eFebruary 25\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThe Slack integration had been “working” for months.\u003c/p\u003e\u003cp\u003eUsers could connect their Slack accounts. The OAuth flow completed successfully. Tokens were stored. The system reported success at every step.\u003c/p\u003e\u003cp\u003eBut nobody could actually use Slack through Piper. Every attempt failed silently. The connection existed on paper but not in practice.\u003c/p\u003e\u003cp\u003eIt took a systematic audit to find out why.\u003c/p\u003e\u003ch3\u003eThe audit that found nothing (and then everything)\u003c/h3\u003e\u003cp\u003eFebruary 25 started with a security review. After the fresh-account testing revealed authentication bugs in the calendar adapter, we decided to audit all our keychain usage. The keychain stores OAuth tokens and other sensitive credentials, and we’d discovered that some code was using inconsistent key patterns — hardcoded strings instead of user-scoped keys.\u003c/p\u003e\u003cp\u003eThe Lead Developer started with a simple question: how many places in the codebase access the keychain, and are they all using the correct scoping pattern?\u003c/p\u003e\u003cp\u003eThe answer was worse than expected. Fifteen sites across five categories were using non-scoped keys. But the Slack integration stood out for a different reason.\u003c/p\u003e\u003cp\u003eThe audit found two lines of code that told a complete story:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStoring the token:\u003c/strong\u003e\u003c/p\u003e\u003cpre\u003ekeychain.store(\u0026quot;slack_oauth_{username}\u0026quot;, token)\u003c/pre\u003e\u003cp\u003e\u003cstrong\u003eRetrieving the token:\u003c/strong\u003e\u003c/p\u003e\u003cpre\u003etoken = keychain.get(f\u0026quot;slack_oauth_{username}\u0026quot;)\u003c/pre\u003e\u003cp\u003eDo you see it?\u003c/p\u003e\u003ch3\u003eThe f-string that wasn’t\u003c/h3\u003e\u003cp\u003eIn Python, f-strings are a way to embed variables in text. When you write f\u0026quot;hello_{name}\u0026quot;, Python substitutes the value of name into the string. If name is “alice”, you get “hello_alice”.\u003c/p\u003e\u003cp\u003eBut f-strings only work if you include the f prefix. Without it, \u0026quot;hello_{name}\u0026quot; is just a literal string containing the characters {, n, a, m, e, }.\u003c/p\u003e\u003cp\u003eThe storage line was missing the f prefix. Every token was being stored under the literal key \u0026quot;slack_oauth_{username}\u0026quot; — the actual characters, curly braces and all.\u003c/p\u003e\u003cp\u003eThe retrieval line had the f prefix. It was looking for \u0026quot;slack_oauth_alice\u0026quot; or \u0026quot;slack_oauth_bob\u0026quot; — the properly formatted, user-scoped key.\u003c/p\u003e\u003cp\u003eThe keys never matched. Every token stored was immediately unretrievable.\u003c/p\u003e\u003ch3\u003eHow this stayed hidden\u003c/h3\u003e\u003cp\u003eThe bug had been in production for months. How did nobody notice?\u003c/p\u003e\u003cp\u003eFirst: the OAuth flow appeared to work. Users clicked “Connect Slack,” went through the OAuth dance, got redirected back with a success message. The token was stored successfully — just under the wrong key. Nothing failed. Nothing threw an error. The user saw “Connected” and assumed it was.\u003c/p\u003e\u003cp\u003eSecond: the failure was silent. When Piper tried to use Slack features, the token retrieval returned null. The code handled null gracefully — it just didn’t do the Slack operation. No error message, no notification. The feature quietly didn’t work.\u003c/p\u003e\u003cp\u003eThird: testing didn’t catch it. The test fixtures for Slack used mock keychain operations that didn’t actually go through the store-then-retrieve cycle. The store was mocked. The retrieve was mocked. The mismatch between them was invisible.\u003c/p\u003e\u003cp\u003eFourth: developers didn’t use it. The Slack integration was there, but it wasn’t a core workflow. Calendar was more heavily used. Projects were more heavily used. Slack was a secondary feature that people connected and then… didn’t really use, because it didn’t work, and they assumed that was just how it was.\u003c/p\u003e\u003cp\u003eThe bug persisted because every system that could have caught it was designed to verify components, not journeys. The OAuth flow worked. The token storage worked. The token retrieval worked. The fact that storage and retrieval were using different keys — that lived in the gap between verifications.\u003c/p\u003e\u003ch3\u003eThe audit cascade\u003c/h3\u003e\u003cp\u003eFinding the bug was only the beginning. The Lead Developer’s response was methodical:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 1: Scope the problem.\u003c/strong\u003e How many keychain sites had similar issues? The audit found 15 total across five categories: OAuth tokens, API keys, user preferences, session data, and integration credentials.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 2: Categorize and prioritize.\u003c/strong\u003e Some non-scoped keys were benign (system-wide configuration that genuinely shouldn’t be user-scoped). Others were serious (anything involving authentication or user data). The Slack bug was the most severe — actively breaking functionality — but there were others that could have caused problems.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 3: Fix systematically.\u003c/strong\u003e Rather than playing whack-a-mole with individual bugs, the Lead Developer created a pattern: every keychain access would use a consistent, user-scoped key format. Then applied that pattern everywhere.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 4: Prevent recurrence.\u003c/strong\u003e A CI guard was added — a grep check that fails the build if it detects keychain access patterns without user scoping. The bug that hid for months could now never be reintroduced.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStep 5: Test the seams.\u003c/strong\u003e Twenty-five new tests were added, specifically testing the store-then-retrieve cycle for each integration. Not mocked storage and mocked retrieval — actual round trips through the real keychain layer.\u003c/p\u003e\u003cp\u003eThe whole fix took a few hours. The bug had been hiding for months.\u003c/p\u003e\u003ch3\u003eWhat the f-string teaches\u003c/h3\u003e\u003cp\u003eThere’s a category of bug that exists not because code is wrong, but because two pieces of correct code don’t match. The storage line was valid Python. The retrieval line was valid Python. Each worked as written. Together, they created a gap.\u003c/p\u003e\u003cp\u003eThese bugs are invisible to most verification approaches:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eUnit tests\u003c/strong\u003e verify each function in isolation. Both the store and retrieve functions worked correctly — they just weren’t called with matching arguments.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eIntegration tests\u003c/strong\u003e often mock the components they’re integrating with. The mock didn’t reproduce the mismatch.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eCode review\u003c/strong\u003e reads code linearly. The storage was in one file, the retrieval in another. Nobody was looking at both simultaneously and comparing the string formats.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eUser testing\u003c/strong\u003e showed a successful connection. The failure only manifested later, in a different context, as an absence rather than an error.\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe bug lived in the seam between two systems that never talked to each other directly. Storage didn’t know about retrieval. Retrieval didn’t know about storage. Each was tested in isolation. The gap was systematically excluded from verification.\u003c/p\u003e\u003ch3\u003eSystematic finding, systematic prevention\u003c/h3\u003e\u003cp\u003eThe f-string bug could have been found by accident — someone eventually would have noticed that Slack didn’t work and dug into why. But accidental discovery is slow and unreliable. The bug persisted for months precisely because accidental discovery hadn’t happened yet.\u003c/p\u003e\u003cp\u003eWhat found it was systematic audit. Not “look for bugs” but “examine every place this pattern occurs and verify consistency.” The audit didn’t know the f-string bug existed. It was looking for a category of issue (non-scoped keychain access) and found this specific instance along the way.\u003c/p\u003e\u003cp\u003eThis is the difference between debugging and auditing. Debugging is reactive — something broke, find out why. Auditing is proactive — nothing appears broken, verify that it isn’t.\u003c/p\u003e\u003cp\u003eThe CI guard is the same principle applied to prevention. It doesn’t know about f-string bugs specifically. It knows about a pattern that’s dangerous (keychain access without user scoping) and flags all instances. Future developers don’t need to know this bug’s history. They just need to follow the pattern, and if they don’t, the build fails.\u003c/p\u003e\u003cp\u003eSystematic approaches find bugs that hide in plain sight. They catch the mismatches that each component is too local to see. They turn “we got lucky someone noticed” into “we would have caught this automatically.”\u003c/p\u003e\u003ch3\u003eThe tokens return\u003c/h3\u003e\u003cp\u003eAfter the fix, we did something we should have done months earlier: actually tested the Slack integration end to end. OAuth flow, token storage, token retrieval, actual Slack operation.\u003c/p\u003e\u003cp\u003eIt worked.\u003c/p\u003e\u003cp\u003eThe tokens that had been vanishing into a mislabeled bucket were now stored where they could be found. The feature that had been silently broken was now quietly functional.\u003c/p\u003e\u003cp\u003eNobody celebrated. The fix was too small, the bug too embarrassing, the months of it hiding too uncomfortable. But there was satisfaction in the systematic approach — in knowing that the audit would have found this bug whether or not we were looking for it, and that the CI guard would prevent it from ever returning.\u003c/p\u003e\u003ch3\u003eThe question the audit answered\u003c/h3\u003e\u003cp\u003eBefore the audit, I would have said the Slack integration worked. It went through OAuth successfully. It stored tokens. It had test coverage.\u003c/p\u003e\u003cp\u003eAfter the audit, I knew the Slack integration worked. The tokens were stored correctly. They could be retrieved. The round trip was verified.\u003c/p\u003e\u003cp\u003eThe difference is the gap between “appears to work” and “verified to work.” Most of what we believe about our systems falls into the first category. We saw it succeed once. We assume it still does. We trust our tests to tell us if something breaks.\u003c/p\u003e\u003cp\u003eBut tests only catch what they’re designed to catch. The f-string bug was designed (accidentally, structurally) to slip past. Not maliciously — through the ordinary, structural blind spots of how we verify software.\u003c/p\u003e\u003cp\u003eSystematic audits are how you find the bugs that were designed (accidentally, structurally) to remain hidden. They’re not glamorous. They don’t produce new features. But they’re the difference between thinking your OAuth works and knowing it does.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Four Voices, One Spec — a research agent, a UX lead, a product manager, and an architect converge on a single specification, each adding something the others couldn’t.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWhat’s hiding in the seams of your system — the places where two correct things don’t quite match?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=3a6aad13371c\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/when-the-tokens-vanished-3a6aad13371c\"\u003eWhen the Tokens Vanished\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T4149,"])</script><script>self.__next_f.push([1,"\u003csection name=\"e8e8\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"9392\" id=\"9392\" class=\"graf graf--h3 graf--leading graf--title\"\u003eWhen the Tokens Vanished\u003c/h3\u003e\u003cfigure name=\"4cc5\" id=\"4cc5\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*PcRmtXjKft5ZK57Ml_X2gQ.png\" data-width=\"1536\" data-height=\"1024\" alt=\"Human and glowing energy-being AI peer into a gap between two misaligned pipes labeled “store” and “retrieve,” where many glowing tokens are lost.\" src=\"https://cdn-images-1.medium.com/max/800/1*PcRmtXjKft5ZK57Ml_X2gQ.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“I sure hope \u003ca href=\"https://www.linkedin.com/feed/update/urn:li:activity:7436579260812869632?commentUrn=urn%3Ali%3Acomment%3A%28activity%3A7436579260812869632%2C7436585098415603712%29\u0026amp;dashCommentUrn=urn%3Ali%3Afsd_comment%3A%287436585098415603712%2Curn%3Ali%3Aactivity%3A7436579260812869632%29\" data-href=\"https://www.linkedin.com/feed/update/urn:li:activity:7436579260812869632?commentUrn=urn%3Ali%3Acomment%3A%28activity%3A7436579260812869632%2C7436585098415603712%29\u0026amp;dashCommentUrn=urn%3Ali%3Afsd_comment%3A%287436585098415603712%2Curn%3Ali%3Aactivity%3A7436579260812869632%29\" class=\"markup--anchor markup--figure-anchor\" rel=\"noopener\" target=\"_blank\"\u003ePaul Ford\u003c/a\u003e approves of this visual metaphor!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"2e6b\" id=\"2e6b\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eFebruary 25\u003c/em\u003e\u003c/p\u003e\u003cp name=\"ad7d\" id=\"ad7d\" class=\"graf graf--p graf-after--p\"\u003eThe Slack integration had been “working” for months.\u003c/p\u003e\u003cp name=\"2e41\" id=\"2e41\" class=\"graf graf--p graf-after--p\"\u003eUsers could connect their Slack accounts. The OAuth flow completed successfully. Tokens were stored. The system reported success at every step.\u003c/p\u003e\u003cp name=\"d55e\" id=\"d55e\" class=\"graf graf--p graf-after--p\"\u003eBut nobody could actually use Slack through Piper. Every attempt failed silently. The connection existed on paper but not in practice.\u003c/p\u003e\u003cp name=\"7ea2\" id=\"7ea2\" class=\"graf graf--p graf-after--p\"\u003eIt took a systematic audit to find out why.\u003c/p\u003e\u003ch3 name=\"0c92\" id=\"0c92\" class=\"graf graf--h3 graf-after--p\"\u003eThe audit that found nothing (and then everything)\u003c/h3\u003e\u003cp name=\"bf4a\" id=\"bf4a\" class=\"graf graf--p graf-after--h3\"\u003eFebruary 25 started with a security review. After the fresh-account testing revealed authentication bugs in the calendar adapter, we decided to audit all our keychain usage. The keychain stores OAuth tokens and other sensitive credentials, and we’d discovered that some code was using inconsistent key patterns — hardcoded strings instead of user-scoped keys.\u003c/p\u003e\u003cp name=\"6348\" id=\"6348\" class=\"graf graf--p graf-after--p\"\u003eThe Lead Developer started with a simple question: how many places in the codebase access the keychain, and are they all using the correct scoping pattern?\u003c/p\u003e\u003cp name=\"04a8\" id=\"04a8\" class=\"graf graf--p graf-after--p\"\u003eThe answer was worse than expected. Fifteen sites across five categories were using non-scoped keys. But the Slack integration stood out for a different reason.\u003c/p\u003e\u003cp name=\"42d9\" id=\"42d9\" class=\"graf graf--p graf-after--p\"\u003eThe audit found two lines of code that told a complete story:\u003c/p\u003e\u003cp name=\"e0ed\" id=\"e0ed\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStoring the token:\u003c/strong\u003e\u003c/p\u003e\u003cpre data-code-block-mode=\"2\" spellcheck=\"false\" data-code-block-lang=\"python\" name=\"1ff2\" id=\"1ff2\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003ekeychain.store(\u003cspan class=\"hljs-string\"\u003e\u0026quot;slack_oauth_{username}\u0026quot;\u003c/span\u003e, token)\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"9dcd\" id=\"9dcd\" class=\"graf graf--p graf-after--pre\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRetrieving the token:\u003c/strong\u003e\u003c/p\u003e\u003cpre data-code-block-mode=\"2\" spellcheck=\"false\" data-code-block-lang=\"python\" name=\"3338\" id=\"3338\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003etoken = keychain.get(\u003cspan class=\"hljs-string\"\u003ef\u0026quot;slack_oauth_\u003cspan class=\"hljs-subst\"\u003e{username}\u003c/span\u003e\u0026quot;\u003c/span\u003e)\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"1b5c\" id=\"1b5c\" class=\"graf graf--p graf-after--pre\"\u003eDo you see it?\u003c/p\u003e\u003ch3 name=\"8e44\" id=\"8e44\" class=\"graf graf--h3 graf-after--p\"\u003eThe f-string that wasn’t\u003c/h3\u003e\u003cp name=\"452f\" id=\"452f\" class=\"graf graf--p graf-after--h3\"\u003eIn Python, f-strings are a way to embed variables in text. When you write \u003ccode class=\"markup--code markup--p-code\"\u003ef\u0026quot;hello_{name}\u0026quot;\u003c/code\u003e, Python substitutes the value of \u003ccode class=\"markup--code markup--p-code\"\u003ename\u003c/code\u003e into the string. If \u003ccode class=\"markup--code markup--p-code\"\u003ename\u003c/code\u003e is “alice”, you get “hello_alice”.\u003c/p\u003e\u003cp name=\"dc06\" id=\"dc06\" class=\"graf graf--p graf-after--p\"\u003eBut f-strings only work if you include the \u003ccode class=\"markup--code markup--p-code\"\u003ef\u003c/code\u003e prefix. Without it, \u003ccode class=\"markup--code markup--p-code\"\u003e\u0026quot;hello_{name}\u0026quot;\u003c/code\u003e is just a literal string containing the characters \u003ccode class=\"markup--code markup--p-code\"\u003e{\u003c/code\u003e, \u003ccode class=\"markup--code markup--p-code\"\u003en\u003c/code\u003e, \u003ccode class=\"markup--code markup--p-code\"\u003ea\u003c/code\u003e, \u003ccode class=\"markup--code markup--p-code\"\u003em\u003c/code\u003e, \u003ccode class=\"markup--code markup--p-code\"\u003ee\u003c/code\u003e, \u003ccode class=\"markup--code markup--p-code\"\u003e}\u003c/code\u003e.\u003c/p\u003e\u003cp name=\"4d2b\" id=\"4d2b\" class=\"graf graf--p graf-after--p\"\u003eThe storage line was missing the \u003ccode class=\"markup--code markup--p-code\"\u003ef\u003c/code\u003e prefix. Every token was being stored under the literal key \u003ccode class=\"markup--code markup--p-code\"\u003e\u0026quot;slack_oauth_{username}\u0026quot;\u003c/code\u003e — the actual characters, curly braces and all.\u003c/p\u003e\u003cp name=\"e67a\" id=\"e67a\" class=\"graf graf--p graf-after--p\"\u003eThe retrieval line had the \u003ccode class=\"markup--code markup--p-code\"\u003ef\u003c/code\u003e prefix. It was looking for \u003ccode class=\"markup--code markup--p-code\"\u003e\u0026quot;slack_oauth_alice\u0026quot;\u003c/code\u003e or \u003ccode class=\"markup--code markup--p-code\"\u003e\u0026quot;slack_oauth_bob\u0026quot;\u003c/code\u003e — the properly formatted, user-scoped key.\u003c/p\u003e\u003cp name=\"321a\" id=\"321a\" class=\"graf graf--p graf-after--p\"\u003eThe keys never matched. Every token stored was immediately unretrievable.\u003c/p\u003e\u003ch3 name=\"48ee\" id=\"48ee\" class=\"graf graf--h3 graf-after--p\"\u003eHow this stayed hidden\u003c/h3\u003e\u003cp name=\"dfb1\" id=\"dfb1\" class=\"graf graf--p graf-after--h3\"\u003eThe bug had been in production for months. How did nobody notice?\u003c/p\u003e\u003cp name=\"a201\" id=\"a201\" class=\"graf graf--p graf-after--p\"\u003eFirst: the OAuth flow appeared to work. Users clicked “Connect Slack,” went through the OAuth dance, got redirected back with a success message. The token was stored successfully — just under the wrong key. Nothing failed. Nothing threw an error. The user saw “Connected” and assumed it was.\u003c/p\u003e\u003cp name=\"db49\" id=\"db49\" class=\"graf graf--p graf-after--p\"\u003eSecond: the failure was silent. When Piper tried to use Slack features, the token retrieval returned null. The code handled null gracefully — it just didn’t do the Slack operation. No error message, no notification. The feature quietly didn’t work.\u003c/p\u003e\u003cp name=\"ff37\" id=\"ff37\" class=\"graf graf--p graf-after--p\"\u003eThird: testing didn’t catch it. The test fixtures for Slack used mock keychain operations that didn’t actually go through the store-then-retrieve cycle. The store was mocked. The retrieve was mocked. The mismatch between them was invisible.\u003c/p\u003e\u003cp name=\"6c80\" id=\"6c80\" class=\"graf graf--p graf-after--p\"\u003eFourth: developers didn’t use it. The Slack integration was there, but it wasn’t a core workflow. Calendar was more heavily used. Projects were more heavily used. Slack was a secondary feature that people connected and then… didn’t really use, because it didn’t work, and they assumed that was just how it was.\u003c/p\u003e\u003cp name=\"900c\" id=\"900c\" class=\"graf graf--p graf-after--p\"\u003eThe bug persisted because every system that could have caught it was designed to verify components, not journeys. The OAuth flow worked. The token storage worked. The token retrieval worked. The fact that storage and retrieval were using different keys — that lived in the gap between verifications.\u003c/p\u003e\u003ch3 name=\"1027\" id=\"1027\" class=\"graf graf--h3 graf-after--p\"\u003eThe audit cascade\u003c/h3\u003e\u003cp name=\"25d7\" id=\"25d7\" class=\"graf graf--p graf-after--h3\"\u003eFinding the bug was only the beginning. The Lead Developer’s response was methodical:\u003c/p\u003e\u003cp name=\"78bc\" id=\"78bc\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 1: Scope the problem.\u003c/strong\u003e How many keychain sites had similar issues? The audit found 15 total across five categories: OAuth tokens, API keys, user preferences, session data, and integration credentials.\u003c/p\u003e\u003cp name=\"a00e\" id=\"a00e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 2: Categorize and prioritize.\u003c/strong\u003e Some non-scoped keys were benign (system-wide configuration that genuinely shouldn’t be user-scoped). Others were serious (anything involving authentication or user data). The Slack bug was the most severe — actively breaking functionality — but there were others that could have caused problems.\u003c/p\u003e\u003cp name=\"8a48\" id=\"8a48\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 3: Fix systematically.\u003c/strong\u003e Rather than playing whack-a-mole with individual bugs, the Lead Developer created a pattern: every keychain access would use a consistent, user-scoped key format. Then applied that pattern everywhere.\u003c/p\u003e\u003cp name=\"b905\" id=\"b905\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 4: Prevent recurrence.\u003c/strong\u003e A CI guard was added — a grep check that fails the build if it detects keychain access patterns without user scoping. The bug that hid for months could now never be reintroduced.\u003c/p\u003e\u003cp name=\"4477\" id=\"4477\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStep 5: Test the seams.\u003c/strong\u003e Twenty-five new tests were added, specifically testing the store-then-retrieve cycle for each integration. Not mocked storage and mocked retrieval — actual round trips through the real keychain layer.\u003c/p\u003e\u003cp name=\"ea9d\" id=\"ea9d\" class=\"graf graf--p graf-after--p\"\u003eThe whole fix took a few hours. The bug had been hiding for months.\u003c/p\u003e\u003ch3 name=\"2b96\" id=\"2b96\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the f-string teaches\u003c/h3\u003e\u003cp name=\"26d5\" id=\"26d5\" class=\"graf graf--p graf-after--h3\"\u003eThere’s a category of bug that exists not because code is wrong, but because two pieces of correct code don’t match. The storage line was valid Python. The retrieval line was valid Python. Each worked as written. Together, they created a gap.\u003c/p\u003e\u003cp name=\"d8a7\" id=\"d8a7\" class=\"graf graf--p graf-after--p\"\u003eThese bugs are invisible to most verification approaches:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"408f\" id=\"408f\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eUnit tests\u003c/strong\u003e verify each function in isolation. Both the store and retrieve functions worked correctly — they just weren’t called with matching arguments.\u003c/li\u003e\u003cli name=\"5262\" id=\"5262\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eIntegration tests\u003c/strong\u003e often mock the components they’re integrating with. The mock didn’t reproduce the mismatch.\u003c/li\u003e\u003cli name=\"7852\" id=\"7852\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eCode review\u003c/strong\u003e reads code linearly. The storage was in one file, the retrieval in another. Nobody was looking at both simultaneously and comparing the string formats.\u003c/li\u003e\u003cli name=\"b57c\" id=\"b57c\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eUser testing\u003c/strong\u003e showed a successful connection. The failure only manifested later, in a different context, as an absence rather than an error.\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"c7f7\" id=\"c7f7\" class=\"graf graf--p graf-after--li\"\u003eThe bug lived in the seam between two systems that never talked to each other directly. Storage didn’t know about retrieval. Retrieval didn’t know about storage. Each was tested in isolation. The gap was systematically excluded from verification.\u003c/p\u003e\u003ch3 name=\"3bb7\" id=\"3bb7\" class=\"graf graf--h3 graf-after--p\"\u003eSystematic finding, systematic prevention\u003c/h3\u003e\u003cp name=\"90cb\" id=\"90cb\" class=\"graf graf--p graf-after--h3\"\u003eThe f-string bug could have been found by accident — someone eventually would have noticed that Slack didn’t work and dug into why. But accidental discovery is slow and unreliable. The bug persisted for months precisely because accidental discovery hadn’t happened yet.\u003c/p\u003e\u003cp name=\"6aeb\" id=\"6aeb\" class=\"graf graf--p graf-after--p\"\u003eWhat found it was systematic audit. Not “look for bugs” but “examine every place this pattern occurs and verify consistency.” The audit didn’t know the f-string bug existed. It was looking for a category of issue (non-scoped keychain access) and found this specific instance along the way.\u003c/p\u003e\u003cp name=\"4064\" id=\"4064\" class=\"graf graf--p graf-after--p\"\u003eThis is the difference between debugging and auditing. Debugging is reactive — something broke, find out why. Auditing is proactive — nothing appears broken, verify that it isn’t.\u003c/p\u003e\u003cp name=\"6a73\" id=\"6a73\" class=\"graf graf--p graf-after--p\"\u003eThe CI guard is the same principle applied to prevention. It doesn’t know about f-string bugs specifically. It knows about a pattern that’s dangerous (keychain access without user scoping) and flags all instances. Future developers don’t need to know this bug’s history. They just need to follow the pattern, and if they don’t, the build fails.\u003c/p\u003e\u003cp name=\"10dd\" id=\"10dd\" class=\"graf graf--p graf-after--p\"\u003eSystematic approaches find bugs that hide in plain sight. They catch the mismatches that each component is too local to see. They turn “we got lucky someone noticed” into “we would have caught this automatically.”\u003c/p\u003e\u003ch3 name=\"f620\" id=\"f620\" class=\"graf graf--h3 graf-after--p\"\u003eThe tokens return\u003c/h3\u003e\u003cp name=\"a07c\" id=\"a07c\" class=\"graf graf--p graf-after--h3\"\u003eAfter the fix, we did something we should have done months earlier: actually tested the Slack integration end to end. OAuth flow, token storage, token retrieval, actual Slack operation.\u003c/p\u003e\u003cp name=\"4b03\" id=\"4b03\" class=\"graf graf--p graf-after--p\"\u003eIt worked.\u003c/p\u003e\u003cp name=\"9b0e\" id=\"9b0e\" class=\"graf graf--p graf-after--p\"\u003eThe tokens that had been vanishing into a mislabeled bucket were now stored where they could be found. The feature that had been silently broken was now quietly functional.\u003c/p\u003e\u003cp name=\"3148\" id=\"3148\" class=\"graf graf--p graf-after--p\"\u003eNobody celebrated. The fix was too small, the bug too embarrassing, the months of it hiding too uncomfortable. But there was satisfaction in the systematic approach — in knowing that the audit would have found this bug whether or not we were looking for it, and that the CI guard would prevent it from ever returning.\u003c/p\u003e\u003ch3 name=\"df04\" id=\"df04\" class=\"graf graf--h3 graf-after--p\"\u003eThe question the audit answered\u003c/h3\u003e\u003cp name=\"6fad\" id=\"6fad\" class=\"graf graf--p graf-after--h3\"\u003eBefore the audit, I would have said the Slack integration worked. It went through OAuth successfully. It stored tokens. It had test coverage.\u003c/p\u003e\u003cp name=\"a221\" id=\"a221\" class=\"graf graf--p graf-after--p\"\u003eAfter the audit, I knew the Slack integration worked. The tokens were stored correctly. They could be retrieved. The round trip was verified.\u003c/p\u003e\u003cp name=\"161a\" id=\"161a\" class=\"graf graf--p graf-after--p\"\u003eThe difference is the gap between “appears to work” and “verified to work.” Most of what we believe about our systems falls into the first category. We saw it succeed once. We assume it still does. We trust our tests to tell us if something breaks.\u003c/p\u003e\u003cp name=\"9e36\" id=\"9e36\" class=\"graf graf--p graf-after--p\"\u003eBut tests only catch what they’re designed to catch. The f-string bug was designed (accidentally, structurally) to slip past. Not maliciously — through the ordinary, structural blind spots of how we verify software.\u003c/p\u003e\u003cp name=\"8034\" id=\"8034\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eSystematic audits are how you find the bugs that were designed (accidentally, structurally) to remain hidden. They’re not glamorous. They don’t produce new features. But they’re the difference between thinking your OAuth works and knowing it does.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"When the Tokens Vanished\",\"excerpt\":\"“I sure hope Paul Ford approves of this visual metaphor!”February 25The Slack integration had been “working” for months.Users could connect their Slack accounts. The OAuth flow completed successfully. Tokens were stored. The system reported success at every step.But nobody could actually use Slac...\",\"url\":\"/blog/when-the-tokens-vanished\",\"publishedAt\":\"Mar 11, 2026\",\"publishedAtISO\":\"2026-03-11T22:11:02.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/3a6aad13371c\",\"featuredImage\":\"/assets/blog-images/3a6aad13371c-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/when-the-tokens-vanished-3a6aad13371c?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"when-the-tokens-vanished\",\"workDate\":\"Mar 11, 2026\",\"workDateISO\":\"2026-03-11T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-03-11\",\"featured\":false},\"content\":{\"title\":\"When the Tokens Vanished\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"When the Tokens Vanished | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"When the Tokens Vanished\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"When the Tokens Vanished\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
