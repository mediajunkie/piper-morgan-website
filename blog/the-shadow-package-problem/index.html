$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T27da,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*pLibch2cwHEJNYTOMvJ5PA.png\" /\u003e\u003cfigcaption\u003e“Something’s missing”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 19\u003c/em\u003e\u003c/p\u003e\u003cp\u003eOne file. Four lines of code. Six hundred seventeen tests hidden for months. Zero warning signs until you knew where to look.\u003c/p\u003e\u003cp\u003eA single __init__.py in the wrong directory created a shadow package that blocked pytest from importing the real code, making 617 tests invisible. No collection errors. No failures. No indication that anything was wrong. Just tests silently not running while we assumed everything was fine.\u003c/p\u003e\u003cp\u003eThis is the shadow package problem: when infrastructure issues mask themselves as success.\u003c/p\u003e\u003ch3\u003eHow tests hide themselves\u003c/h3\u003e\u003cp\u003eThe directory structure looked innocent enough:\u003c/p\u003e\u003cpre\u003etests/\u003cbr\u003e  services/\u003cbr\u003e    __init__.py          # The problem\u003cbr\u003e    test_file_service.py\u003cbr\u003e    test_knowledge_service.py\u003cbr\u003e    ...51 more test files\u003c/pre\u003e\u003cp\u003eThat __init__.py turned tests/services/ into a Python package. When pytest tried to run tests in those files, it imported from tests.services - the local package we’d accidentally created. But the tests needed to import from services - the actual application code.\u003c/p\u003e\u003cp\u003ePython’s import system prefers local packages over installed packages. So from services import FileService imported from tests/services/__init__.py (empty) instead of from the real services/ directory. The imports failed silently. The tests never ran. Pytest reported zero tests collected.\u003c/p\u003e\u003cp\u003eZero tests collected looks like “no tests in that directory” not “all tests are blocked from running.” We’d been building features, writing tests, running test suites, seeing some tests pass — never realizing 617 tests weren’t running at all.\u003c/p\u003e\u003ch3\u003eThe false confidence\u003c/h3\u003e\u003cp\u003eThis is what makes shadow packages insidious. They don’t fail loudly. They fail silently while looking like success.\u003c/p\u003e\u003cp\u003eIf pytest had thrown errors, we’d have noticed immediately. But pytest collecting zero tests from a directory just looks like that directory has no tests. The test suite still ran. Other tests still passed. Everything seemed fine.\u003c/p\u003e\u003cp\u003eWe had 68.4% pass rate confidence that was completely false. The tests that were running passed at 68.4%. But 617 tests weren’t running at all. The actual pass rate — if all tests could run — might have been 40%. Or 30%. Or we might have discovered critical bugs the hidden tests would have caught.\u003c/p\u003e\u003cp\u003eFalse confidence is worse than no confidence. When you know you don’t have test coverage, you’re cautious. When you think you have test coverage but don’t, you’re overconfident. We were making architectural decisions and shipping features based on test results that represented maybe 30% of our actual test suite.\u003c/p\u003e\u003ch3\u003eWhen measuring reveals the problem\u003c/h3\u003e\u003cp\u003eThe shadow package only surfaced when we tried to measure something specific: architecture test compliance. That test needed to import from both services/ and tests/ directories. The import conflict became visible because the architecture test couldn’t run with the shadow package in place.\u003c/p\u003e\u003cp\u003eFixing that one test required restructuring the test directory: tests/services/ → tests/unit/services/. Suddenly pytest could import from the real services/ package. And suddenly 617 tests became collectible.\u003c/p\u003e\u003cp\u003eBut “collectible” isn’t “passing.” Those 617 tests had collection errors — missing async keywords, wrong imports, syntax errors — that we’d never seen because the tests weren’t running. Fixing collection errors revealed test failures. Fixing test failures revealed actual bugs in production code.\u003c/p\u003e\u003cp\u003eEach layer of measurement revealed the next layer of problems:\u003c/p\u003e\u003col\u003e\u003cli\u003eArchitecture test → revealed shadow package\u003c/li\u003e\u003cli\u003eShadow package fix → revealed 617 hidden tests\u003c/li\u003e\u003cli\u003eCollection fix → revealed 195 test failures\u003c/li\u003e\u003cli\u003eFailure analysis → revealed systemic issues (missing fixtures, API mismatches, incomplete features)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eWe couldn’t fix problems we didn’t know existed. The shadow package hid the problems so effectively we thought we had good test coverage.\u003c/p\u003e\u003ch3\u003eThe broader pattern\u003c/h3\u003e\u003cp\u003eShadow packages are a specific technical issue. But the pattern is universal: infrastructure problems that mask themselves as working systems.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBuild systems that skip steps silently\u003c/strong\u003e — Deployment succeeds, but critical compilation step was skipped, so you’re running old code.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTest suites that don’t run all tests\u003c/strong\u003e — Pass rate looks great, but you’re not testing half the codebase.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMonitoring that misses critical data\u003c/strong\u003e — Dashboards green, system healthy, but the metric you actually need isn’t collected.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCI/CD that passes with warnings\u003c/strong\u003e — Build succeeds with deprecation warnings, tech debt accumulates invisibly.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLogs that don’t capture errors\u003c/strong\u003e — No errors in logs, but errors are going to /dev/null not to your logging system.\u003c/p\u003e\u003cp\u003eThe common thread: systems that fail silently while reporting success. You can’t fix what you don’t measure. And you can’t measure what your infrastructure is hiding.\u003c/p\u003e\u003ch3\u003eHow to find shadow packages\u003c/h3\u003e\u003cp\u003eThe technical fix for Python shadow packages is straightforward: move tests from tests/services/ to tests/unit/services/ or tests/integration/services/ to avoid package naming conflicts. Delete any __init__.py files in test directories unless you’re intentionally making them packages.\u003c/p\u003e\u003cp\u003eBut finding shadow packages requires knowing they might exist. Warning signs:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTest count seems low\u003c/strong\u003e — If you have lots of code but few tests, maybe tests aren’t running rather than not existing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTest count doesn’t grow\u003c/strong\u003e — If you’re writing tests but test collection stays constant, maybe new tests aren’t being collected.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImport errors in specific directories\u003c/strong\u003e — If some test directories work but others don’t, directory structure might be blocking imports.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e“It works in my environment”\u003c/strong\u003e — If tests pass on one machine but not others, environment-specific configurations might mask infrastructure issues.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eZero tests collected\u003c/strong\u003e — Pytest reporting zero tests doesn’t mean no tests exist. It might mean tests can’t be collected.\u003c/p\u003e\u003cp\u003eThe deeper insight: assume measurement is incomplete until you verify it’s complete. Don’t trust pass rates without auditing what’s actually being measured.\u003c/p\u003e\u003ch3\u003eWhat fixing shadow packages reveals\u003c/h3\u003e\u003cp\u003eWe fixed the shadow package and discovered 617 tests. We fixed collection errors and discovered 195 failures. We fixed test failures and discovered missing fixtures, API mismatches, incomplete features.\u003c/p\u003e\u003cp\u003eEach fix revealed the next layer of actual system state. This is good. Revealing problems is better than hiding them. A 68.4% pass rate that’s real is more valuable than an 85% pass rate based on incomplete test collection.\u003c/p\u003e\u003cp\u003eThe shadow package created false confidence. Fixing it created accurate data. Accurate data revealed real problems. Real problems got systematic fixes. Systematic fixes improved actual quality rather than apparent quality.\u003c/p\u003e\u003cp\u003eThis is the value of infrastructure archaeology. You dig through layers — shadow packages, collection errors, test failures, underlying bugs — until you reach actual system state. Then you can make informed decisions based on reality rather than assumptions.\u003c/p\u003e\u003ch3\u003eWhen to suspect you have shadow packages\u003c/h3\u003e\u003cp\u003eNot literally shadow packages (that’s Python-specific). But the pattern of infrastructure masking problems:\u003c/p\u003e\u003cp\u003eWhen metrics seem too good — Pass rates high, error rates low, performance great — but system still has issues users report.\u003c/p\u003e\u003cp\u003eWhen measurement is inconsistent — Different tools report different numbers, trends don’t match reality, data doesn’t align with experience.\u003c/p\u003e\u003cp\u003eWhen new work doesn’t change metrics — Adding tests doesn’t increase test count, deploying fixes doesn’t reduce error rates, improving performance doesn’t change dashboards.\u003c/p\u003e\u003cp\u003eWhen “it works on my machine” is common — Local environments differ from CI/CD, tests pass locally but fail in pipeline, deployments work in staging but fail in production.\u003c/p\u003e\u003cp\u003eWhen historical data seems suspicious — Sudden jumps or drops in metrics without corresponding code changes, trends that don’t match development activity, gaps in data that don’t have obvious explanations.\u003c/p\u003e\u003cp\u003eThese are symptoms of infrastructure hiding information. Not necessarily shadow packages, but similar patterns where your measurement systems aren’t measuring what you think they’re measuring.\u003c/p\u003e\u003cp\u003eThe discipline is: verify measurement completeness before trusting measured results. Audit what’s actually being measured. Test in clean environments to catch environment-specific issues. Investigate when metrics seem suspiciously good.\u003c/p\u003e\u003cp\u003eBecause sometimes your tests aren’t passing. They’re just not running. And those are very different problems with very different solutions.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, we resume the daily narrative with “Stage 3 Complete” from January 2 to 5.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you discovered shadow packages — literal or metaphorical? Times when infrastructure was hiding problems while reporting success? What made you suspect measurement was incomplete?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=30a55697431b\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-shadow-package-problem-30a55697431b\"\u003eThe Shadow Package Problem\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3a0b,"])</script><script>self.__next_f.push([1,"\u003csection name=\"082c\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"cb9c\" id=\"cb9c\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Shadow Package Problem\u003c/h3\u003e\u003cfigure name=\"bfbe\" id=\"bfbe\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*pLibch2cwHEJNYTOMvJ5PA.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" src=\"https://cdn-images-1.medium.com/max/800/1*pLibch2cwHEJNYTOMvJ5PA.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Something’s missing”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"1aa3\" id=\"1aa3\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 19\u003c/em\u003e\u003c/p\u003e\u003cp name=\"35b2\" id=\"35b2\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eO\u003c/span\u003ene file. Four lines of code. Six hundred seventeen tests hidden for months. Zero warning signs until you knew where to look.\u003c/p\u003e\u003cp name=\"e6c3\" id=\"e6c3\" class=\"graf graf--p graf-after--p\"\u003eA single \u003ccode class=\"markup--code markup--p-code\"\u003e__init__.py\u003c/code\u003e in the wrong directory created a shadow package that blocked pytest from importing the real code, making 617 tests invisible. No collection errors. No failures. No indication that anything was wrong. Just tests silently not running while we assumed everything was fine.\u003c/p\u003e\u003cp name=\"c07b\" id=\"c07b\" class=\"graf graf--p graf-after--p\"\u003eThis is the shadow package problem: when infrastructure issues mask themselves as success.\u003c/p\u003e\u003ch3 name=\"25c7\" id=\"25c7\" class=\"graf graf--h3 graf-after--p\"\u003eHow tests hide themselves\u003c/h3\u003e\u003cp name=\"7671\" id=\"7671\" class=\"graf graf--p graf-after--h3\"\u003eThe directory structure looked innocent enough:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"bash\" name=\"6b32\" id=\"6b32\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003etests/\u003cbr /\u003e  services/\u003cbr /\u003e    __init__.py          \u003cspan class=\"hljs-comment\"\u003e# The problem\u003c/span\u003e\u003cbr /\u003e    test_file_service.py\u003cbr /\u003e    test_knowledge_service.py\u003cbr /\u003e    ...51 more \u003cspan class=\"hljs-built_in\"\u003etest\u003c/span\u003e files\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"f4cc\" id=\"f4cc\" class=\"graf graf--p graf-after--pre\"\u003eThat \u003ccode class=\"markup--code markup--p-code\"\u003e__init__.py\u003c/code\u003e turned \u003ccode class=\"markup--code markup--p-code\"\u003etests/services/\u003c/code\u003e into a Python package. When pytest tried to run tests in those files, it imported from \u003ccode class=\"markup--code markup--p-code\"\u003etests.services\u003c/code\u003e - the local package we’d accidentally created. But the tests needed to import from \u003ccode class=\"markup--code markup--p-code\"\u003eservices\u003c/code\u003e - the actual application code.\u003c/p\u003e\u003cp name=\"6e47\" id=\"6e47\" class=\"graf graf--p graf-after--p\"\u003ePython’s import system prefers local packages over installed packages. So \u003ccode class=\"markup--code markup--p-code\"\u003efrom services import FileService\u003c/code\u003e imported from \u003ccode class=\"markup--code markup--p-code\"\u003etests/services/__init__.py\u003c/code\u003e (empty) instead of from the real \u003ccode class=\"markup--code markup--p-code\"\u003eservices/\u003c/code\u003e directory. The imports failed silently. The tests never ran. Pytest reported zero tests collected.\u003c/p\u003e\u003cp name=\"d513\" id=\"d513\" class=\"graf graf--p graf-after--p\"\u003eZero tests collected looks like “no tests in that directory” not “all tests are blocked from running.” We’d been building features, writing tests, running test suites, seeing some tests pass — never realizing 617 tests weren’t running at all.\u003c/p\u003e\u003ch3 name=\"b876\" id=\"b876\" class=\"graf graf--h3 graf-after--p\"\u003eThe false confidence\u003c/h3\u003e\u003cp name=\"e170\" id=\"e170\" class=\"graf graf--p graf-after--h3\"\u003eThis is what makes shadow packages insidious. They don’t fail loudly. They fail silently while looking like success.\u003c/p\u003e\u003cp name=\"67d1\" id=\"67d1\" class=\"graf graf--p graf-after--p\"\u003eIf pytest had thrown errors, we’d have noticed immediately. But pytest collecting zero tests from a directory just looks like that directory has no tests. The test suite still ran. Other tests still passed. Everything seemed fine.\u003c/p\u003e\u003cp name=\"1ea7\" id=\"1ea7\" class=\"graf graf--p graf-after--p\"\u003eWe had 68.4% pass rate confidence that was completely false. The tests that were running passed at 68.4%. But 617 tests weren’t running at all. The actual pass rate — if all tests could run — might have been 40%. Or 30%. Or we might have discovered critical bugs the hidden tests would have caught.\u003c/p\u003e\u003cp name=\"79fa\" id=\"79fa\" class=\"graf graf--p graf-after--p\"\u003eFalse confidence is worse than no confidence. When you know you don’t have test coverage, you’re cautious. When you think you have test coverage but don’t, you’re overconfident. We were making architectural decisions and shipping features based on test results that represented maybe 30% of our actual test suite.\u003c/p\u003e\u003ch3 name=\"b797\" id=\"b797\" class=\"graf graf--h3 graf-after--p\"\u003eWhen measuring reveals the problem\u003c/h3\u003e\u003cp name=\"3100\" id=\"3100\" class=\"graf graf--p graf-after--h3\"\u003eThe shadow package only surfaced when we tried to measure something specific: architecture test compliance. That test needed to import from both \u003ccode class=\"markup--code markup--p-code\"\u003eservices/\u003c/code\u003e and \u003ccode class=\"markup--code markup--p-code\"\u003etests/\u003c/code\u003e directories. The import conflict became visible because the architecture test couldn’t run with the shadow package in place.\u003c/p\u003e\u003cp name=\"a5b4\" id=\"a5b4\" class=\"graf graf--p graf-after--p\"\u003eFixing that one test required restructuring the test directory: \u003ccode class=\"markup--code markup--p-code\"\u003etests/services/\u003c/code\u003e → \u003ccode class=\"markup--code markup--p-code\"\u003etests/unit/services/\u003c/code\u003e. Suddenly pytest could import from the real \u003ccode class=\"markup--code markup--p-code\"\u003eservices/\u003c/code\u003e package. And suddenly 617 tests became collectible.\u003c/p\u003e\u003cp name=\"17d0\" id=\"17d0\" class=\"graf graf--p graf-after--p\"\u003eBut “collectible” isn’t “passing.” Those 617 tests had collection errors — missing async keywords, wrong imports, syntax errors — that we’d never seen because the tests weren’t running. Fixing collection errors revealed test failures. Fixing test failures revealed actual bugs in production code.\u003c/p\u003e\u003cp name=\"3401\" id=\"3401\" class=\"graf graf--p graf-after--p\"\u003eEach layer of measurement revealed the next layer of problems:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"f644\" id=\"f644\" class=\"graf graf--li graf-after--p\"\u003eArchitecture test → revealed shadow package\u003c/li\u003e\u003cli name=\"6a34\" id=\"6a34\" class=\"graf graf--li graf-after--li\"\u003eShadow package fix → revealed 617 hidden tests\u003c/li\u003e\u003cli name=\"8fc3\" id=\"8fc3\" class=\"graf graf--li graf-after--li\"\u003eCollection fix → revealed 195 test failures\u003c/li\u003e\u003cli name=\"839e\" id=\"839e\" class=\"graf graf--li graf-after--li\"\u003eFailure analysis → revealed systemic issues (missing fixtures, API mismatches, incomplete features)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"034c\" id=\"034c\" class=\"graf graf--p graf-after--li\"\u003eWe couldn’t fix problems we didn’t know existed. The shadow package hid the problems so effectively we thought we had good test coverage.\u003c/p\u003e\u003ch3 name=\"819e\" id=\"819e\" class=\"graf graf--h3 graf-after--p\"\u003eThe broader pattern\u003c/h3\u003e\u003cp name=\"3339\" id=\"3339\" class=\"graf graf--p graf-after--h3\"\u003eShadow packages are a specific technical issue. But the pattern is universal: infrastructure problems that mask themselves as working systems.\u003c/p\u003e\u003cp name=\"81d0\" id=\"81d0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBuild systems that skip steps silently\u003c/strong\u003e — Deployment succeeds, but critical compilation step was skipped, so you’re running old code.\u003c/p\u003e\u003cp name=\"cadf\" id=\"cadf\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTest suites that don’t run all tests\u003c/strong\u003e — Pass rate looks great, but you’re not testing half the codebase.\u003c/p\u003e\u003cp name=\"618b\" id=\"618b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eMonitoring that misses critical data\u003c/strong\u003e — Dashboards green, system healthy, but the metric you actually need isn’t collected.\u003c/p\u003e\u003cp name=\"85fd\" id=\"85fd\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCI/CD that passes with warnings\u003c/strong\u003e — Build succeeds with deprecation warnings, tech debt accumulates invisibly.\u003c/p\u003e\u003cp name=\"8509\" id=\"8509\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLogs that don’t capture errors\u003c/strong\u003e — No errors in logs, but errors are going to \u003ccode class=\"markup--code markup--p-code\"\u003e/dev/null\u003c/code\u003e not to your logging system.\u003c/p\u003e\u003cp name=\"dce8\" id=\"dce8\" class=\"graf graf--p graf-after--p\"\u003eThe common thread: systems that fail silently while reporting success. You can’t fix what you don’t measure. And you can’t measure what your infrastructure is hiding.\u003c/p\u003e\u003ch3 name=\"3e9e\" id=\"3e9e\" class=\"graf graf--h3 graf-after--p\"\u003eHow to find shadow packages\u003c/h3\u003e\u003cp name=\"b0f6\" id=\"b0f6\" class=\"graf graf--p graf-after--h3\"\u003eThe technical fix for Python shadow packages is straightforward: move tests from \u003ccode class=\"markup--code markup--p-code\"\u003etests/services/\u003c/code\u003e to \u003ccode class=\"markup--code markup--p-code\"\u003etests/unit/services/\u003c/code\u003e or \u003ccode class=\"markup--code markup--p-code\"\u003etests/integration/services/\u003c/code\u003e to avoid package naming conflicts. Delete any \u003ccode class=\"markup--code markup--p-code\"\u003e__init__.py\u003c/code\u003e files in test directories unless you’re intentionally making them packages.\u003c/p\u003e\u003cp name=\"475c\" id=\"475c\" class=\"graf graf--p graf-after--p\"\u003eBut finding shadow packages requires knowing they might exist. Warning signs:\u003c/p\u003e\u003cp name=\"505f\" id=\"505f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTest count seems low\u003c/strong\u003e — If you have lots of code but few tests, maybe tests aren’t running rather than not existing.\u003c/p\u003e\u003cp name=\"9f22\" id=\"9f22\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTest count doesn’t grow\u003c/strong\u003e — If you’re writing tests but test collection stays constant, maybe new tests aren’t being collected.\u003c/p\u003e\u003cp name=\"db59\" id=\"db59\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImport errors in specific directories\u003c/strong\u003e — If some test directories work but others don’t, directory structure might be blocking imports.\u003c/p\u003e\u003cp name=\"82b8\" id=\"82b8\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e“It works in my environment”\u003c/strong\u003e — If tests pass on one machine but not others, environment-specific configurations might mask infrastructure issues.\u003c/p\u003e\u003cp name=\"82a9\" id=\"82a9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eZero tests collected\u003c/strong\u003e — Pytest reporting zero tests doesn’t mean no tests exist. It might mean tests can’t be collected.\u003c/p\u003e\u003cp name=\"90a1\" id=\"90a1\" class=\"graf graf--p graf-after--p\"\u003eThe deeper insight: assume measurement is incomplete until you verify it’s complete. Don’t trust pass rates without auditing what’s actually being measured.\u003c/p\u003e\u003ch3 name=\"a47b\" id=\"a47b\" class=\"graf graf--h3 graf-after--p\"\u003eWhat fixing shadow packages reveals\u003c/h3\u003e\u003cp name=\"f718\" id=\"f718\" class=\"graf graf--p graf-after--h3\"\u003eWe fixed the shadow package and discovered 617 tests. We fixed collection errors and discovered 195 failures. We fixed test failures and discovered missing fixtures, API mismatches, incomplete features.\u003c/p\u003e\u003cp name=\"c9f5\" id=\"c9f5\" class=\"graf graf--p graf-after--p\"\u003eEach fix revealed the next layer of actual system state. This is good. Revealing problems is better than hiding them. A 68.4% pass rate that’s real is more valuable than an 85% pass rate based on incomplete test collection.\u003c/p\u003e\u003cp name=\"0994\" id=\"0994\" class=\"graf graf--p graf-after--p\"\u003eThe shadow package created false confidence. Fixing it created accurate data. Accurate data revealed real problems. Real problems got systematic fixes. Systematic fixes improved actual quality rather than apparent quality.\u003c/p\u003e\u003cp name=\"44ba\" id=\"44ba\" class=\"graf graf--p graf-after--p\"\u003eThis is the value of infrastructure archaeology. You dig through layers — shadow packages, collection errors, test failures, underlying bugs — until you reach actual system state. Then you can make informed decisions based on reality rather than assumptions.\u003c/p\u003e\u003ch3 name=\"e76c\" id=\"e76c\" class=\"graf graf--h3 graf-after--p\"\u003eWhen to suspect you have shadow packages\u003c/h3\u003e\u003cp name=\"9211\" id=\"9211\" class=\"graf graf--p graf-after--h3\"\u003eNot literally shadow packages (that’s Python-specific). But the pattern of infrastructure masking problems:\u003c/p\u003e\u003cp name=\"099d\" id=\"099d\" class=\"graf graf--p graf-after--p\"\u003eWhen metrics seem too good — Pass rates high, error rates low, performance great — but system still has issues users report.\u003c/p\u003e\u003cp name=\"8c3f\" id=\"8c3f\" class=\"graf graf--p graf-after--p\"\u003eWhen measurement is inconsistent — Different tools report different numbers, trends don’t match reality, data doesn’t align with experience.\u003c/p\u003e\u003cp name=\"b94b\" id=\"b94b\" class=\"graf graf--p graf-after--p\"\u003eWhen new work doesn’t change metrics — Adding tests doesn’t increase test count, deploying fixes doesn’t reduce error rates, improving performance doesn’t change dashboards.\u003c/p\u003e\u003cp name=\"028f\" id=\"028f\" class=\"graf graf--p graf-after--p\"\u003eWhen “it works on my machine” is common — Local environments differ from CI/CD, tests pass locally but fail in pipeline, deployments work in staging but fail in production.\u003c/p\u003e\u003cp name=\"81d1\" id=\"81d1\" class=\"graf graf--p graf-after--p\"\u003eWhen historical data seems suspicious — Sudden jumps or drops in metrics without corresponding code changes, trends that don’t match development activity, gaps in data that don’t have obvious explanations.\u003c/p\u003e\u003cp name=\"79f5\" id=\"79f5\" class=\"graf graf--p graf-after--p\"\u003eThese are symptoms of infrastructure hiding information. Not necessarily shadow packages, but similar patterns where your measurement systems aren’t measuring what you think they’re measuring.\u003c/p\u003e\u003cp name=\"d531\" id=\"d531\" class=\"graf graf--p graf-after--p\"\u003eThe discipline is: verify measurement completeness before trusting measured results. Audit what’s actually being measured. Test in clean environments to catch environment-specific issues. Investigate when metrics seem suspiciously good.\u003c/p\u003e\u003cp name=\"552a\" id=\"552a\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eBecause sometimes your tests aren’t passing. They’re just not running. And those are very different problems with very different solutions.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Shadow Package Problem\",\"excerpt\":\"“Something’s missing”November 19One file. Four lines of code. Six hundred seventeen tests hidden for months. Zero warning signs until you knew where to look.A single __init__.py in the wrong directory created a shadow package that blocked pytest from importing the real code, making 617 tests invi...\",\"url\":\"/blog/the-shadow-package-problem\",\"publishedAt\":\"Jan 11, 2026\",\"publishedAtISO\":\"2026-01-11T17:02:49.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/30a55697431b\",\"featuredImage\":\"/assets/blog-images/30a55697431b-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-shadow-package-problem-30a55697431b?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-shadow-package-problem\",\"workDate\":\"Jan 11, 2026\",\"workDateISO\":\"2026-01-11T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-01-11\",\"featured\":false},\"content\":{\"title\":\"The Shadow Package Problem\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Shadow Package Problem | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Shadow Package Problem\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Shadow Package Problem\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
