,\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T4160,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot realtor hands out a glossy brochure for a broken house\" src=\"https://cdn-images-1.medium.com/max/1024/1*iarQPGAKoplbon0FMtw_3g.png\" /\u003e\u003cfigcaption\u003e“Perfect condition!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 28\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTuesday mornings are always busy and it’s almost noon by the time turn my thoughts to Piper Morgan. The mission: validate that yesterday’s 1,630 lines of installation documentation actually work.\u003c/p\u003e\u003cp\u003eThey “work for me in my development environment where everything is already configured” isn’t good enough. They need to work for our first alpha tester (coming soon!) who is not me. Someone with a clean laptop, no project context, following instructions exactly as written.\u003c/p\u003e\u003cp\u003eTime to test the confident note from last night’s wrap-up: “The house is clean for Beatrice Thursday! 🎉”\u003c/p\u003e\u003cp\u003eBy Tuesday afternoon: Seven critical blockers discovered. Every single one would have stopped Beatrice cold.\u003c/p\u003e\u003ch3\u003eThe testing methodology that reveals truth\u003c/h3\u003e\u003cp\u003eI begin fresh testing from Step 1, not continuing from Monday’s partial attempts. Clean slate. I test two states first:\u003c/p\u003e\u003cul\u003e\u003cli\u003eNo Python pre-installed\u003c/li\u003e\u003cli\u003ePython 3.9 already present (my default Mac setup)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eMy plan: Follow the guide exactly. Don’t skip steps. Don’t assume knowledge. Don’t “fix” things intuitively. Do exactly what the documentation says.\u003c/p\u003e\u003cp\u003eWhen something fails: Document the failure. Note what the guide said versus what actually happened. Identify the gap.\u003c/p\u003e\u003cp\u003eThis methodology is crucial. When you know the system, you unconsciously work around documentation gaps. “Oh, obviously you need to do X first.” But new users don’t have that context. They do exactly what you tell them.\u003c/p\u003e\u003cp\u003eThe testing reveals: We told them wrong things.\u003c/p\u003e\u003ch3\u003eBlocker 1: The Python version maze\u003c/h3\u003e\u003cp\u003e12:20 PM. Device 1 testing begins with Python installation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGuide says\u003c/strong\u003e: Download latest Python from python.org\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReality\u003c/strong\u003e: Latest is Python 3.14.0\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat happens\u003c/strong\u003e: GUI dialog requests Xcode Command Line Tools (not mentioned in guide)First issue noted: Xcode CLT requirement undocumented.\u003c/p\u003e\u003cp\u003ePython 3.14.0 installs successfully. But there’s a problem.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFirst terminal\u003c/strong\u003e: Shows Python 3.9 (system Python)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNew terminal\u003c/strong\u003e: Shows Python 3.14 (correct)\u003c/p\u003e\u003cp\u003eThe guide didn’t mention: You need to open a new terminal after installation for PATH changes to take effect.\u003c/p\u003e\u003cp\u003eBut the real problem comes later at 4:18 PM:\u003c/p\u003e\u003cpre\u003eERROR: Could not find a version that satisfies the requirement onnxruntime==1.19.2\u003cbr\u003eNo matching distribution found for onnxruntime==1.19.2\u003c/pre\u003e\u003cp\u003e\u003cstrong\u003eRoot cause\u003c/strong\u003e: onnxruntime 1.19.2 predates Python 3.14 support. Package has no wheels for 3.14. Won’t install.\u003c/p\u003e\u003cp\u003eThe guide recommended “latest Python.” But latest Python breaks our dependencies.\u003c/p\u003e\u003ch3\u003eBlocker 2: The repository that doesn’t exist\u003c/h3\u003e\u003cp\u003e3:56 PM. Moving to Step 3: Clone the repository.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGuide says\u003c/strong\u003e: git clone \u003ca href=\"https://github.com/Codewarrior1988/piper-morgan.git\"\u003ehttps://github.com/Codewarrior1988/piper-morgan.git\u003c/a\u003e\u003c/p\u003e\u003cp\u003eBut that is not my repository!\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActual URL\u003c/strong\u003e: git@github.com:mediajunkie/piper-morgan-product.git\u003c/p\u003e\u003cp\u003eThe guide’s URL is completely wrong. Wrong account (“Codewarrior1988” appears to be hallucinated). Wrong repository name. Wrong protocol (HTTPS vs SSH).\u003c/p\u003e\u003cp\u003eI’ve seen Codewarrior1988 before, no idea why Claude keeps hallucinating about it.\u003c/p\u003e\u003cp\u003eThis isn’t a minor error. This is “cannot clone the repository at all.” Blocker. Complete stop. Cannot proceed.\u003c/p\u003e\u003cp\u003eEven when corrected to the right account, the HTTPS approach is deprecated, won’’t work. Which means…\u003c/p\u003e\u003ch3\u003eBlocker 3: SSH key setup isn’t documented\u003c/h3\u003e\u003cp\u003eThe guide assumes users have SSH keys configured. What if they don’t?\u003c/p\u003e\u003cp\u003eNew users need:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSSH key generation (ssh-keygen)\u003c/li\u003e\u003cli\u003eAdding public key to GitHub account\u003c/li\u003e\u003cli\u003eUnderstanding host verification prompts\u003c/li\u003e\u003cli\u003eKnowing to type “yes” when asked about host keys\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eNone of this is documented.\u003c/p\u003e\u003cp\u003eAt 4:10 PM, I encounter the host verification prompt:\u003c/p\u003e\u003cpre\u003eThe authenticity of host \u0026#39;github.com\u0026#39; can\u0026#39;t be established.\u003cbr\u003eHost key verification failed\u003c/pre\u003e\u003cp\u003eThe prompt doesn’t say “press Enter to continue” or “type yes.” New users won’t know what to do.\u003c/p\u003e\u003cp\u003eI type “yes” and press Enter. It works. But only because I finally remembered to pay attention and do that.\u003c/p\u003e\u003cp\u003eThis could be another blocker. “What does host key verification mean? What should I type?”\u003c/p\u003e\u003cp\u003eCreated comprehensive Step 2b: SSH key generation, adding to GitHub, host verification prompts with exact text and required responses.\u003c/p\u003e\u003ch3\u003eBlocker 4: The folder name mismatch\u003c/h3\u003e\u003cp\u003e4:16 PM. Repository cloned successfully (after SSH setup).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGuide says\u003c/strong\u003e: cd piper-morgan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReality\u003c/strong\u003e: Folder is piper-morgan-product (from clone URL)\u003c/p\u003e\u003cp\u003eStep 4 command fails. The guide told users to cd into a folder that doesn\u0026#39;t exist.\u003c/p\u003e\u003cp\u003eSimple fix: Update guide to use correct folder name.\u003c/p\u003e\u003cp\u003eBut revealing: We wrote 1,630 lines of documentation and didn’t test that the folder name matched the repository URL.\u003c/p\u003e\u003ch3\u003eBlocker 5: The onnxruntime Python 3.14 incompatibility\u003c/h3\u003e\u003cp\u003e4:18 PM. Running pip install -r requirements.txt with Python 3.14.\u003c/p\u003e\u003cpre\u003eERROR: No matching distribution found for onnxruntime==1.19.2\u003c/pre\u003e\u003cp\u003eThe package predates Python 3.14 support. No pre-built wheels exist. Won’t install.\u003c/p\u003e\u003cp\u003e4:20 PM. Cursor verifies via Context7:\u003c/p\u003e\u003cul\u003e\u003cli\u003eLatest onnxruntime: 1.23.2\u003c/li\u003e\u003cli\u003eMaximum Python supported: 3.13\u003c/li\u003e\u003cli\u003ePython 3.14: NOT SUPPORTED\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe guide recommended latest Python. But our pinned dependency doesn’t support it.\u003c/p\u003e\u003cp\u003e4:25 PM. Test Python 3.13 downgrade. New error:\u003c/p\u003e\u003cpre\u003eonnxruntime==1.19.2 requires Python \u0026gt;=3.7,\u0026lt;3.11\u003c/pre\u003e\u003cp\u003eWait. Even 3.13 has version constraints with the pinned version?\u003c/p\u003e\u003cp\u003e4:28 PM. Resolution: Test auto-versioning.\u003c/p\u003e\u003cp\u003ebash\u003c/p\u003e\u003cpre\u003epython -m pip install onnxruntime\u003c/pre\u003e\u003cp\u003eSuccess! Installs onnxruntime 1.23.2 with Python 3.13 wheels.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRoot cause\u003c/strong\u003e: Version 1.19.2 predates Python 3.13 support. Version 1.23.2 has cp313 wheels and works perfectly.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFix\u003c/strong\u003e: Update requirements.txt from 1.19.2 to 1.23.2.\u003c/p\u003e\u003ch3\u003eBlocker 6: scipy also lacks Python 3.13 wheels\u003c/h3\u003e\u003cp\u003e5:07 PM. Another dependency error:\u003c/p\u003e\u003cpre\u003eERROR: Unknown compiler(s): gfortran\u003cbr\u003eBuilding scipy 1.13.1 from source\u003c/pre\u003e\u003cp\u003escipy 1.13.1 has no Python 3.13 wheels. Trying to build from source. Requires Fortran compiler that fresh laptop won’t have.\u003c/p\u003e\u003cp\u003eThe pattern emerges: Any pinned dependency older than ~3 months becomes a blocker with new Python versions.\u003c/p\u003e\u003cp\u003ePython 3.13 is too new. Package ecosystem hasn’t caught up.\u003c/p\u003e\u003ch3\u003eThe pragmatic decision: Target Python 3.12\u003c/h3\u003e\u003cp\u003e5:10 PM. Decision time.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOption A\u003c/strong\u003e: Chase Python 3.13 compatibility. Update every dependency. Test each one. Debug version conflicts. Delay Thursday alpha.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOption B\u003c/strong\u003e: Target Python 3.12 (mature ecosystem). Update guide to recommend 3.11–3.12 only. Document 3.13 as future work.\u003c/p\u003e\u003cp\u003eWe choose Option B.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRationale\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003ePython 3.12 has mature package ecosystem\u003c/li\u003e\u003cli\u003escipy, onnxruntime, Pillow all have 3.12 wheels\u003c/li\u003e\u003cli\u003eChasing 3.13 adds risk without alpha benefit\u003c/li\u003e\u003cli\u003eThursday onboarding matters more than latest Python\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eUpdated guide: “We recommend Python 3.11 or 3.12. Python 3.13 is very new and some packages don’t have pre-built wheels yet.”\u003c/p\u003e\u003cp\u003eCreated GitHub issue: “Python 3.13 Compatibility Migration” for post-alpha work.\u003c/p\u003e\u003ch3\u003eBlocker 7: The configuration file that doesn’t exist\u003c/h3\u003e\u003cp\u003e5:04 PM. Earlier in testing, another blocker discovered:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGuide says\u003c/strong\u003e: cp config/PIPER.example.md PIPER.user.md\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReality\u003c/strong\u003e: Actual file is PIPER.user.md.example\u003c/p\u003e\u003cp\u003eBut bigger problem: The guide says to edit PIPER.user.md with API keys.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReality\u003c/strong\u003e: System uses OS Keychain for secure storage. NOT plaintext config files.\u003c/p\u003e\u003cp\u003eThe services/infrastructure/keychain_service.py implements full keychain abstraction using Python keyring library with \u0026quot;piper-morgan\u0026quot; service name.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImpact\u003c/strong\u003e: Steps 9–11 in guide are completely wrong. Following them would put keys in config file that system never reads.\u003c/p\u003e\u003cp\u003eThis blocker remains partially unresolved Tuesday evening. Needs investigation: How do users add keys to keychain through the setup process?\u003c/p\u003e\u003cp\u003eThe guide told users to do something that wouldn’t work. System wouldn’t read keys from where guide said to put them.\u003c/p\u003e\u003ch3\u003eWhat Tuesday’s testing revealed\u003c/h3\u003e\u003cp\u003eLet’s count the blockers:\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cstrong\u003ePython version recommendation\u003c/strong\u003e: Wrong (suggested 3.14, need 3.11–3.12)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eRepository URL\u003c/strong\u003e: Completely wrong (hallucinated account)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSSH key setup\u003c/strong\u003e: Missing entirely (multi-step undocumented process)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eFolder name\u003c/strong\u003e: Wrong (piper-morgan vs piper-morgan-product)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eonnxruntime version\u003c/strong\u003e: Incompatible (1.19.2 predates 3.13 support)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003escipy wheels\u003c/strong\u003e: Missing (1.13.1 no 3.13 support)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eAPI key config\u003c/strong\u003e: Outdated (references files/methods not actually used)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cstrong\u003eBlockers that would stop Beatrice completely\u003c/strong\u003e: All seven.\u003c/p\u003e\u003cp\u003eNot “minor issues.” Not “polish needed.” But “cannot proceed at all.”\u003c/p\u003e\u003cp\u003eThe 1,630 lines of documentation from Monday? Beautiful, comprehensive, detailed, systematic. And fundamentally wrong in seven critical ways.\u003c/p\u003e\u003ch3\u003eThe live testing model that works\u003c/h3\u003e\u003cp\u003eHere’s what Tuesday proved about documentation testing:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat doesn’t work\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eWriting comprehensive docs based on your knowledge\u003c/li\u003e\u003cli\u003eTesting in your development environment\u003c/li\u003e\u003cli\u003eAssuming common knowledge\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eWhat does work\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eActual human following instructions on clean machine\u003c/li\u003e\u003cli\u003eImmediate feedback loop (report → fix → re-test)\u003c/li\u003e\u003cli\u003eZero assumptions about prerequisites\u003c/li\u003e\u003cli\u003eCapturing exact error messages and prompts\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe testing methodology: Christian reports issue → Cursor fixes → Update documentation → Test again → Repeat.\u003c/p\u003e\u003cp\u003eTight feedback loop. Real environment. Actual failures.\u003c/p\u003e\u003cp\u003eThis is why the blockers got fixed Tuesday instead of discovered Thursday. Because we tested against reality.\u003c/p\u003e\u003cp\u003eLive testing model with immediate fixes… I’m honestly not sure if it’s sustainable at scale but it feels right for these types of issues and alpha prep.\u003c/p\u003e\u003cp\u003eTuesday’s pattern:\u003c/p\u003e\u003cul\u003e\u003cli\u003e11:24 AM: Start testing\u003c/li\u003e\u003cli\u003e12:20 PM: First blocker (Python)\u003c/li\u003e\u003cli\u003e3:56 PM: Second blocker (repo URL)\u003c/li\u003e\u003cli\u003e4:10 PM: Third blocker (SSH)\u003c/li\u003e\u003cli\u003e4:16 PM: Fourth blocker (folder name)\u003c/li\u003e\u003cli\u003e4:18 PM: Fifth blocker (onnxruntime)\u003c/li\u003e\u003cli\u003e4:30 PM: Fix onnxruntime (commit 3770fa41 pushed)\u003c/li\u003e\u003cli\u003e5:04 PM: Sixth blocker (config file)\u003c/li\u003e\u003cli\u003e5:07 PM: Seventh blocker (scipy)\u003c/li\u003e\u003cli\u003e5:10 PM: Decision on Python 3.12\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eApproximately one blocker discovered per hour. Each one documented. Most fixed immediately. Some deferred with issues created.\u003c/p\u003e\u003ch3\u003eThe fixed and the deferred\u003c/h3\u003e\u003cp\u003eBy Tuesday end of day:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFixed (5 blockers)\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003e✅ Repository URL corrected to actual GitHub location\u003c/li\u003e\u003cli\u003e✅ SSH key setup comprehensive Step 2b added\u003c/li\u003e\u003cli\u003e✅ Folder name updated to piper-morgan-product\u003c/li\u003e\u003cli\u003e✅ onnxruntime updated 1.19.2 → 1.23.2 (committed and pushed)\u003c/li\u003e\u003cli\u003e✅ Python version recommendation changed to 3.11–3.12 only\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eDeferred (2 blockers)\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003e⚠️ API key keychain flow (needs investigation and rewrite)\u003c/li\u003e\u003cli\u003e⚠️ scipy 3.13 support (resolved by Python 3.12 strategy)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eTesting time\u003c/strong\u003e: 5 hours 46 minutes of continuous discovery\u003c/p\u003e\u003cp\u003eFive out of seven blockers resolved same day. Two deferred with issues created. Documentation transformed from “fundamentally broken” to “mostly works with known gaps.”\u003c/p\u003e\u003cp\u003eNot perfect. But functional. Ready for Wednesday’s actual wizard testing.\u003c/p\u003e\u003ch3\u003eThe confidence calibration\u003c/h3\u003e\u003cp\u003eMonday ended: “The house is clean for Beatrice Thursday! 🎉”\u003c/p\u003e\u003cp\u003eTuesday ends: “The house was a mess. We’ve cleaned up five of seven major problems. Two more to go. Maybe the house will be clean for Beatrice Thursday.”\u003c/p\u003e\u003cp\u003eConfidence recalibrated. Hope tempered by reality. Documentation tested and improved.\u003c/p\u003e\u003cp\u003eThe 1,630 lines still matter. But they needed correction. Comprehensive doesn’t mean correct.\u003c/p\u003e\u003cp\u003eWhat changed Tuesday:\u003c/p\u003e\u003cul\u003e\u003cli\u003eRepository URL: Now correct\u003c/li\u003e\u003cli\u003eSSH setup: Now documented\u003c/li\u003e\u003cli\u003ePython version: Now realistic\u003c/li\u003e\u003cli\u003eDependencies: Now compatible\u003c/li\u003e\u003cli\u003eFolder name: Now accurate\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWhat remains Wednesday:\u003c/p\u003e\u003cul\u003e\u003cli\u003eAPI key keychain flow (undocumented)\u003c/li\u003e\u003cli\u003eActual wizard testing (untested with fixes)\u003c/li\u003e\u003c/ul\u003e\u003ch3\u003eThe methodology lesson\u003c/h3\u003e\u003cp\u003eHere’s what Tuesday teaches about documentation:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWriting documentation isn’t enough.\u003c/strong\u003e You need to test it. Not “does this make sense to me?” but “does this work for someone who isn’t me?”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTesting in your environment isn’t enough.\u003c/strong\u003e You need clean machine testing. Fresh environment. No preconfigured tools. No accumulated knowledge.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eComprehensive documentation isn’t enough.\u003c/strong\u003e You need correct documentation. Better to have 10 lines that work than 1,630 lines that fail.\u003c/p\u003e\u003cp\u003eThe gap between “thoroughly documented” and “actually works” is revealed only through real testing.\u003c/p\u003e\u003cp\u003e\u003cem\u003eThe lesson that comprehensive ≠ correct seems obvious, but if I’m so smart why do I keep forgetting it?\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTuesday’s achievement: Not writing more documentation. But proving the documentation we had was wrong and fixing it.\u003c/p\u003e\u003cp\u003eThe live testing model works: Real user. Real machine. Real problems. Real fixes. Tight feedback loop.\u003c/p\u003e\u003cp\u003eBetter to discover blockers Tuesday through systematic testing than Thursday through alpha user frustration.\u003c/p\u003e\u003ch3\u003eWednesday’s challenge\u003c/h3\u003e\u003cp\u003eTuesday ends with five blockers fixed, two deferred, and documentation significantly improved.\u003c/p\u003e\u003cp\u003eWednesday will test differently: Not “can you follow the docs?” but “does the wizard work?”\u003c/p\u003e\u003cp\u003eThe setup wizard that’s supposed to guide users through installation. The automated system that should handle Docker services, database setup, user creation, API key configuration. The one we forgot about when we wrote a guide assuming most of those steps would be manual? Yeah, that one.\u003c/p\u003e\u003cp\u003eTuesday proved the documentation fails in systematic ways. Wednesday will prove whether the wizard itself works.\u003c/p\u003e\u003cp\u003e[SPOILRT: The wizard will also fail in systematic ways. Three more critical bugs waiting to be discovered through actual setup testing.]\u003c/p\u003e\u003cp\u003eBut Tuesday’s lesson remains: Better to find failures through testing than through alpha launch. Better to fix problems Tuesday than explain them Thursday.\u003c/p\u003e\u003cp\u003eThe house isn’t clean yet. But we know what needs cleaning and tomorrow is anotherday.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: The Wizard That Learned to Restart Itself, where Wednesday’s actual setup testing discovers three critical bugs — including a chicken-and-egg problem that requires the wizard to restart itself in the very environment it creates.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced documentation that passed review but failed in practice? How do you test instructions written for people who aren’t you?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=59ec35fb0d31\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/when-the-documentation-lied-seven-blockers-hiding-in-1-630-lines-59ec35fb0d31\"\u003eWhen the Documentation Lied: Seven Blockers Hiding in 1,630 Lines\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T7ae6,"])</script><script>self.__next_f.push([1,"\u003csection name=\"561b\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"a83d\" id=\"a83d\" class=\"graf graf--h3 graf--leading graf--title\"\u003eWhen the Documentation Lied: Seven Blockers Hiding in 1,630 Lines\u003c/h3\u003e\u003cfigure name=\"eef5\" id=\"eef5\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*iarQPGAKoplbon0FMtw_3g.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot realtor hands out a glossy brochure for a broken house\" src=\"https://cdn-images-1.medium.com/max/800/1*iarQPGAKoplbon0FMtw_3g.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Perfect condition!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"1396\" id=\"1396\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 28\u003c/em\u003e\u003c/p\u003e\u003cp name=\"a875\" id=\"a875\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003euesday mornings are always busy and it’s almost noon by the time turn my thoughts to Piper Morgan. The mission: validate that yesterday’s 1,630 lines of installation documentation actually work.\u003c/p\u003e\u003cp name=\"d850\" id=\"d850\" class=\"graf graf--p graf-after--p\"\u003eThey “work for me in my development environment where everything is already configured” isn’t good enough. They need to work for our first alpha tester (coming soon!) who is not me. Someone with a clean laptop, no project context, following instructions exactly as written.\u003c/p\u003e\u003cp name=\"f151\" id=\"f151\" class=\"graf graf--p graf-after--p\"\u003eTime to test the confident note from last night’s wrap-up: “The house is clean for Beatrice Thursday! 🎉”\u003c/p\u003e\u003cp name=\"69d2\" id=\"69d2\" class=\"graf graf--p graf-after--p\"\u003eBy Tuesday afternoon: Seven critical blockers discovered. Every single one would have stopped Beatrice cold.\u003c/p\u003e\u003ch3 name=\"6404\" id=\"6404\" class=\"graf graf--h3 graf-after--p\"\u003eThe testing methodology that reveals truth\u003c/h3\u003e\u003cp name=\"8021\" id=\"8021\" class=\"graf graf--p graf-after--h3\"\u003eI begin fresh testing from Step 1, not continuing from Monday’s partial attempts. Clean slate. I test two states first:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"970f\" id=\"970f\" class=\"graf graf--li graf-after--p\"\u003eNo Python pre-installed\u003c/li\u003e\u003cli name=\"3dd1\" id=\"3dd1\" class=\"graf graf--li graf-after--li\"\u003ePython 3.9 already present (my default Mac setup)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"0dcf\" id=\"0dcf\" class=\"graf graf--p graf-after--li\"\u003eMy plan: Follow the guide exactly. Don’t skip steps. Don’t assume knowledge. Don’t “fix” things intuitively. Do exactly what the documentation says.\u003c/p\u003e\u003cp name=\"fe96\" id=\"fe96\" class=\"graf graf--p graf-after--p\"\u003eWhen something fails: Document the failure. Note what the guide said versus what actually happened. Identify the gap.\u003c/p\u003e\u003cp name=\"1806\" id=\"1806\" class=\"graf graf--p graf-after--p\"\u003eThis methodology is crucial. When you know the system, you unconsciously work around documentation gaps. “Oh, obviously you need to do X first.” But new users don’t have that context. They do exactly what you tell them.\u003c/p\u003e\u003cp name=\"2d24\" id=\"2d24\" class=\"graf graf--p graf-after--p\"\u003eThe testing reveals: We told them wrong things.\u003c/p\u003e\u003ch3 name=\"1f24\" id=\"1f24\" class=\"graf graf--h3 graf-after--p\"\u003eBlocker 1: The Python version maze\u003c/h3\u003e\u003cp name=\"201d\" id=\"201d\" class=\"graf graf--p graf-after--h3\"\u003e12:20 PM. Device 1 testing begins with Python installation.\u003c/p\u003e\u003cp name=\"e39c\" id=\"e39c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGuide says\u003c/strong\u003e: Download latest Python from python.org\u003c/p\u003e\u003cp name=\"e840\" id=\"e840\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReality\u003c/strong\u003e: Latest is Python 3.14.0\u003c/p\u003e\u003cp name=\"9dc6\" id=\"9dc6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat happens\u003c/strong\u003e: GUI dialog requests Xcode Command Line Tools (not mentioned in guide)First issue noted: Xcode CLT requirement undocumented.\u003c/p\u003e\u003cp name=\"b704\" id=\"b704\" class=\"graf graf--p graf-after--p\"\u003ePython 3.14.0 installs successfully. But there’s a problem.\u003c/p\u003e\u003cp name=\"4405\" id=\"4405\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFirst terminal\u003c/strong\u003e: Shows Python 3.9 (system Python)\u003c/p\u003e\u003cp name=\"6e22\" id=\"6e22\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNew terminal\u003c/strong\u003e: Shows Python 3.14 (correct)\u003c/p\u003e\u003cp name=\"0488\" id=\"0488\" class=\"graf graf--p graf-after--p\"\u003eThe guide didn’t mention: You need to open a new terminal after installation for PATH changes to take effect.\u003c/p\u003e\u003cp name=\"83a5\" id=\"83a5\" class=\"graf graf--p graf-after--p\"\u003eBut the real problem comes later at 4:18 PM:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"yaml\" name=\"481f\" id=\"481f\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003e\u003cspan class=\"hljs-attr\"\u003eERROR:\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eCould\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003enot\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003efind\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ea\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eversion\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ethat\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003esatisfies\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ethe\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003erequirement\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eonnxruntime==1.19.2\u003c/span\u003e\u003cbr /\u003e\u003cspan class=\"hljs-literal\"\u003eNo\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ematching\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003edistribution\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003efound\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003efor\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eonnxruntime==1.19.2\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"8ce7\" id=\"8ce7\" class=\"graf graf--p graf-after--pre\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRoot cause\u003c/strong\u003e: onnxruntime 1.19.2 predates Python 3.14 support. Package has no wheels for 3.14. Won’t install.\u003c/p\u003e\u003cp name=\"ecce\" id=\"ecce\" class=\"graf graf--p graf-after--p\"\u003eThe guide recommended “latest Python.” But latest Python breaks our dependencies.\u003c/p\u003e\u003ch3 name=\"a92f\" id=\"a92f\" class=\"graf graf--h3 graf-after--p\"\u003eBlocker 2: The repository that doesn’t exist\u003c/h3\u003e\u003cp name=\"f246\" id=\"f246\" class=\"graf graf--p graf-after--h3\"\u003e3:56 PM. Moving to Step 3: Clone the repository.\u003c/p\u003e\u003cp name=\"a551\" id=\"a551\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGuide says\u003c/strong\u003e: \u003ccode class=\"markup--code markup--p-code u-paddingRight0 u-marginRight0\"\u003egit clone \u003ca href=\"https://github.com/Codewarrior1988/piper-morgan.git\" data-href=\"https://github.com/Codewarrior1988/piper-morgan.git\" class=\"markup--anchor markup--p-anchor\" rel=\"noopener\" target=\"_blank\"\u003ehttps://github.com/Codewarrior1988/piper-morgan.git\u003c/a\u003e\u003c/code\u003e\u003c/p\u003e\u003cp name=\"af8a\" id=\"af8a\" class=\"graf graf--p graf-after--p\"\u003eBut that is not my repository!\u003c/p\u003e\u003cp name=\"5527\" id=\"5527\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eActual URL\u003c/strong\u003e: \u003ccode class=\"markup--code markup--p-code\"\u003egit@github.com:mediajunkie/piper-morgan-product.git\u003c/code\u003e\u003c/p\u003e\u003cp name=\"c6d1\" id=\"c6d1\" class=\"graf graf--p graf-after--p\"\u003eThe guide’s URL is completely wrong. Wrong account (“Codewarrior1988” appears to be hallucinated). Wrong repository name. Wrong protocol (HTTPS vs SSH).\u003c/p\u003e\u003cp name=\"4d20\" id=\"4d20\" class=\"graf graf--p graf-after--p\"\u003eI’ve seen Codewarrior1988 before, no idea why Claude keeps hallucinating about it.\u003c/p\u003e\u003cp name=\"29e2\" id=\"29e2\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t a minor error. This is “cannot clone the repository at all.” Blocker. Complete stop. Cannot proceed.\u003c/p\u003e\u003cp name=\"a437\" id=\"a437\" class=\"graf graf--p graf-after--p\"\u003eEven when corrected to the right account, the HTTPS approach is deprecated, won’’t work. Which means…\u003c/p\u003e\u003ch3 name=\"a3b9\" id=\"a3b9\" class=\"graf graf--h3 graf-after--p\"\u003eBlocker 3: SSH key setup isn’t documented\u003c/h3\u003e\u003cp name=\"71a0\" id=\"71a0\" class=\"graf graf--p graf-after--h3\"\u003eThe guide assumes users have SSH keys configured. What if they don’t?\u003c/p\u003e\u003cp name=\"801e\" id=\"801e\" class=\"graf graf--p graf-after--p\"\u003eNew users need:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"05fe\" id=\"05fe\" class=\"graf graf--li graf-after--p\"\u003eSSH key generation (\u003ccode class=\"markup--code markup--li-code\"\u003essh-keygen\u003c/code\u003e)\u003c/li\u003e\u003cli name=\"62a2\" id=\"62a2\" class=\"graf graf--li graf-after--li\"\u003eAdding public key to GitHub account\u003c/li\u003e\u003cli name=\"c83a\" id=\"c83a\" class=\"graf graf--li graf-after--li\"\u003eUnderstanding host verification prompts\u003c/li\u003e\u003cli name=\"95c0\" id=\"95c0\" class=\"graf graf--li graf-after--li\"\u003eKnowing to type “yes” when asked about host keys\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"87eb\" id=\"87eb\" class=\"graf graf--p graf-after--li\"\u003eNone of this is documented.\u003c/p\u003e\u003cp name=\"4d60\" id=\"4d60\" class=\"graf graf--p graf-after--p\"\u003eAt 4:10 PM, I encounter the host verification prompt:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"rust\" name=\"28e1\" id=\"28e1\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003eThe authenticity of host \u003cspan class=\"hljs-symbol\"\u003e\u0026#x27;github\u003c/span\u003e.com\u0026#x27; can\u003cspan class=\"hljs-symbol\"\u003e\u0026#x27;t\u003c/span\u003e be established.\u003cbr /\u003eHost key verification failed\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"77f1\" id=\"77f1\" class=\"graf graf--p graf-after--pre\"\u003eThe prompt doesn’t say “press Enter to continue” or “type yes.” New users won’t know what to do.\u003c/p\u003e\u003cp name=\"7ed5\" id=\"7ed5\" class=\"graf graf--p graf-after--p\"\u003eI type “yes” and press Enter. It works. But only because I finally remembered to pay attention and do that.\u003c/p\u003e\u003cp name=\"7136\" id=\"7136\" class=\"graf graf--p graf-after--p\"\u003eThis could be another blocker. “What does host key verification mean? What should I type?”\u003c/p\u003e\u003cp name=\"faa7\" id=\"faa7\" class=\"graf graf--p graf-after--p\"\u003eCreated comprehensive Step 2b: SSH key generation, adding to GitHub, host verification prompts with exact text and required responses.\u003c/p\u003e\u003ch3 name=\"4db4\" id=\"4db4\" class=\"graf graf--h3 graf-after--p\"\u003eBlocker 4: The folder name mismatch\u003c/h3\u003e\u003cp name=\"06ba\" id=\"06ba\" class=\"graf graf--p graf-after--h3\"\u003e4:16 PM. Repository cloned successfully (after SSH setup).\u003c/p\u003e\u003cp name=\"bbff\" id=\"bbff\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGuide says\u003c/strong\u003e: \u003ccode class=\"markup--code markup--p-code\"\u003ecd piper-morgan\u003c/code\u003e\u003c/p\u003e\u003cp name=\"1a1d\" id=\"1a1d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReality\u003c/strong\u003e: Folder is \u003ccode class=\"markup--code markup--p-code\"\u003epiper-morgan-product\u003c/code\u003e (from clone URL)\u003c/p\u003e\u003cp name=\"01d4\" id=\"01d4\" class=\"graf graf--p graf-after--p\"\u003eStep 4 command fails. The guide told users to \u003ccode class=\"markup--code markup--p-code\"\u003ecd\u003c/code\u003e into a folder that doesn\u0026#39;t exist.\u003c/p\u003e\u003cp name=\"7829\" id=\"7829\" class=\"graf graf--p graf-after--p\"\u003eSimple fix: Update guide to use correct folder name.\u003c/p\u003e\u003cp name=\"2bda\" id=\"2bda\" class=\"graf graf--p graf-after--p\"\u003eBut revealing: We wrote 1,630 lines of documentation and didn’t test that the folder name matched the repository URL.\u003c/p\u003e\u003ch3 name=\"a8bd\" id=\"a8bd\" class=\"graf graf--h3 graf-after--p\"\u003eBlocker 5: The onnxruntime Python 3.14 incompatibility\u003c/h3\u003e\u003cp name=\"9230\" id=\"9230\" class=\"graf graf--p graf-after--h3\"\u003e4:18 PM. Running \u003ccode class=\"markup--code markup--p-code\"\u003epip install -r requirements.txt\u003c/code\u003e with Python 3.14.\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"yaml\" name=\"ade8\" id=\"ade8\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003e\u003cspan class=\"hljs-attr\"\u003eERROR:\u003c/span\u003e \u003cspan class=\"hljs-literal\"\u003eNo\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003ematching\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003edistribution\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003efound\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003efor\u003c/span\u003e \u003cspan class=\"hljs-string\"\u003eonnxruntime==1.19.2\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"734a\" id=\"734a\" class=\"graf graf--p graf-after--pre\"\u003eThe package predates Python 3.14 support. No pre-built wheels exist. Won’t install.\u003c/p\u003e\u003cp name=\"ba54\" id=\"ba54\" class=\"graf graf--p graf-after--p\"\u003e4:20 PM. Cursor verifies via Context7:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"21e2\" id=\"21e2\" class=\"graf graf--li graf-after--p\"\u003eLatest onnxruntime: 1.23.2\u003c/li\u003e\u003cli name=\"7d11\" id=\"7d11\" class=\"graf graf--li graf-after--li\"\u003eMaximum Python supported: 3.13\u003c/li\u003e\u003cli name=\"dd99\" id=\"dd99\" class=\"graf graf--li graf-after--li\"\u003ePython 3.14: NOT SUPPORTED\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"9c22\" id=\"9c22\" class=\"graf graf--p graf-after--li\"\u003eThe guide recommended latest Python. But our pinned dependency doesn’t support it.\u003c/p\u003e\u003cp name=\"5d29\" id=\"5d29\" class=\"graf graf--p graf-after--p\"\u003e4:25 PM. Test Python 3.13 downgrade. New error:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"ini\" name=\"2f1b\" id=\"2f1b\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003e\u003cspan class=\"hljs-attr\"\u003eonnxruntime\u003c/span\u003e==\u003cspan class=\"hljs-number\"\u003e1.19\u003c/span\u003e.\u003cspan class=\"hljs-number\"\u003e2\u003c/span\u003e requires Python \u0026gt;=\u003cspan class=\"hljs-number\"\u003e3.7\u003c/span\u003e,\u0026lt;\u003cspan class=\"hljs-number\"\u003e3.11\u003c/span\u003e\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"e8fb\" id=\"e8fb\" class=\"graf graf--p graf-after--pre\"\u003eWait. Even 3.13 has version constraints with the pinned version?\u003c/p\u003e\u003cp name=\"5cbe\" id=\"5cbe\" class=\"graf graf--p graf-after--p\"\u003e4:28 PM. Resolution: Test auto-versioning.\u003c/p\u003e\u003cp name=\"b669\" id=\"b669\" class=\"graf graf--p graf-after--p\"\u003ebash\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"typescript\" name=\"dbeb\" id=\"dbeb\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003epython -m pip install onnxruntime\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"2688\" id=\"2688\" class=\"graf graf--p graf-after--pre\"\u003eSuccess! Installs onnxruntime 1.23.2 with Python 3.13 wheels.\u003c/p\u003e\u003cp name=\"6012\" id=\"6012\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRoot cause\u003c/strong\u003e: Version 1.19.2 predates Python 3.13 support. Version 1.23.2 has cp313 wheels and works perfectly.\u003c/p\u003e\u003cp name=\"3134\" id=\"3134\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFix\u003c/strong\u003e: Update requirements.txt from 1.19.2 to 1.23.2.\u003c/p\u003e\u003ch3 name=\"c911\" id=\"c911\" class=\"graf graf--h3 graf-after--p\"\u003eBlocker 6: scipy also lacks Python 3.13 wheels\u003c/h3\u003e\u003cp name=\"6d24\" id=\"6d24\" class=\"graf graf--p graf-after--h3\"\u003e5:07 PM. Another dependency error:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"sql\" name=\"1b04\" id=\"1b04\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003eERROR: \u003cspan class=\"hljs-literal\"\u003eUnknown\u003c/span\u003e compiler(s): gfortran\u003cbr /\u003eBuilding scipy \u003cspan class=\"hljs-number\"\u003e1.13\u003c/span\u003e\u003cspan class=\"hljs-number\"\u003e.1\u003c/span\u003e \u003cspan class=\"hljs-keyword\"\u003efrom\u003c/span\u003e source\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"22f7\" id=\"22f7\" class=\"graf graf--p graf-after--pre\"\u003escipy 1.13.1 has no Python 3.13 wheels. Trying to build from source. Requires Fortran compiler that fresh laptop won’t have.\u003c/p\u003e\u003cp name=\"b1c7\" id=\"b1c7\" class=\"graf graf--p graf-after--p\"\u003eThe pattern emerges: Any pinned dependency older than ~3 months becomes a blocker with new Python versions.\u003c/p\u003e\u003cp name=\"3df8\" id=\"3df8\" class=\"graf graf--p graf-after--p\"\u003ePython 3.13 is too new. Package ecosystem hasn’t caught up.\u003c/p\u003e\u003ch3 name=\"5627\" id=\"5627\" class=\"graf graf--h3 graf-after--p\"\u003eThe pragmatic decision: Target Python 3.12\u003c/h3\u003e\u003cp name=\"c958\" id=\"c958\" class=\"graf graf--p graf-after--h3\"\u003e5:10 PM. Decision time.\u003c/p\u003e\u003cp name=\"36e4\" id=\"36e4\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOption A\u003c/strong\u003e: Chase Python 3.13 compatibility. Update every dependency. Test each one. Debug version conflicts. Delay Thursday alpha.\u003c/p\u003e\u003cp name=\"0cd1\" id=\"0cd1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eOption B\u003c/strong\u003e: Target Python 3.12 (mature ecosystem). Update guide to recommend 3.11–3.12 only. Document 3.13 as future work.\u003c/p\u003e\u003cp name=\"3e22\" id=\"3e22\" class=\"graf graf--p graf-after--p\"\u003eWe choose Option B.\u003c/p\u003e\u003cp name=\"a3c7\" id=\"a3c7\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRationale\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"f73a\" id=\"f73a\" class=\"graf graf--li graf-after--p\"\u003ePython 3.12 has mature package ecosystem\u003c/li\u003e\u003cli name=\"7b61\" id=\"7b61\" class=\"graf graf--li graf-after--li\"\u003escipy, onnxruntime, Pillow all have 3.12 wheels\u003c/li\u003e\u003cli name=\"4807\" id=\"4807\" class=\"graf graf--li graf-after--li\"\u003eChasing 3.13 adds risk without alpha benefit\u003c/li\u003e\u003cli name=\"edf0\" id=\"edf0\" class=\"graf graf--li graf-after--li\"\u003eThursday onboarding matters more than latest Python\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"e7d3\" id=\"e7d3\" class=\"graf graf--p graf-after--li\"\u003eUpdated guide: “We recommend Python 3.11 or 3.12. Python 3.13 is very new and some packages don’t have pre-built wheels yet.”\u003c/p\u003e\u003cp name=\"d826\" id=\"d826\" class=\"graf graf--p graf-after--p\"\u003eCreated GitHub issue: “Python 3.13 Compatibility Migration” for post-alpha work.\u003c/p\u003e\u003ch3 name=\"126d\" id=\"126d\" class=\"graf graf--h3 graf-after--p\"\u003eBlocker 7: The configuration file that doesn’t exist\u003c/h3\u003e\u003cp name=\"5764\" id=\"5764\" class=\"graf graf--p graf-after--h3\"\u003e5:04 PM. Earlier in testing, another blocker discovered:\u003c/p\u003e\u003cp name=\"0045\" id=\"0045\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eGuide says\u003c/strong\u003e: \u003ccode class=\"markup--code markup--p-code\"\u003ecp config/PIPER.example.md PIPER.user.md\u003c/code\u003e\u003c/p\u003e\u003cp name=\"166e\" id=\"166e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReality\u003c/strong\u003e: Actual file is \u003ccode class=\"markup--code markup--p-code\"\u003ePIPER.user.md.example\u003c/code\u003e\u003c/p\u003e\u003cp name=\"c1dd\" id=\"c1dd\" class=\"graf graf--p graf-after--p\"\u003eBut bigger problem: The guide says to edit PIPER.user.md with API keys.\u003c/p\u003e\u003cp name=\"a84e\" id=\"a84e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReality\u003c/strong\u003e: System uses OS Keychain for secure storage. NOT plaintext config files.\u003c/p\u003e\u003cp name=\"728b\" id=\"728b\" class=\"graf graf--p graf-after--p\"\u003eThe \u003ccode class=\"markup--code markup--p-code\"\u003eservices/infrastructure/keychain_service.py\u003c/code\u003e implements full keychain abstraction using Python \u003ccode class=\"markup--code markup--p-code\"\u003ekeyring\u003c/code\u003e library with \u003ccode class=\"markup--code markup--p-code\"\u003e\u0026quot;piper-morgan\u0026quot;\u003c/code\u003e service name.\u003c/p\u003e\u003cp name=\"d341\" id=\"d341\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImpact\u003c/strong\u003e: Steps 9–11 in guide are completely wrong. Following them would put keys in config file that system never reads.\u003c/p\u003e\u003cp name=\"bac3\" id=\"bac3\" class=\"graf graf--p graf-after--p\"\u003eThis blocker remains partially unresolved Tuesday evening. Needs investigation: How do users add keys to keychain through the setup process?\u003c/p\u003e\u003cp name=\"8640\" id=\"8640\" class=\"graf graf--p graf-after--p\"\u003eThe guide told users to do something that wouldn’t work. System wouldn’t read keys from where guide said to put them.\u003c/p\u003e\u003ch3 name=\"e8d0\" id=\"e8d0\" class=\"graf graf--h3 graf-after--p\"\u003eWhat Tuesday’s testing revealed\u003c/h3\u003e\u003cp name=\"4e88\" id=\"4e88\" class=\"graf graf--p graf-after--h3\"\u003eLet’s count the blockers:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"260f\" id=\"260f\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003ePython version recommendation\u003c/strong\u003e: Wrong (suggested 3.14, need 3.11–3.12)\u003c/li\u003e\u003cli name=\"6a83\" id=\"6a83\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eRepository URL\u003c/strong\u003e: Completely wrong (hallucinated account)\u003c/li\u003e\u003cli name=\"ab6f\" id=\"ab6f\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSSH key setup\u003c/strong\u003e: Missing entirely (multi-step undocumented process)\u003c/li\u003e\u003cli name=\"9245\" id=\"9245\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eFolder name\u003c/strong\u003e: Wrong (piper-morgan vs piper-morgan-product)\u003c/li\u003e\u003cli name=\"42b0\" id=\"42b0\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eonnxruntime version\u003c/strong\u003e: Incompatible (1.19.2 predates 3.13 support)\u003c/li\u003e\u003cli name=\"1aa0\" id=\"1aa0\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003escipy wheels\u003c/strong\u003e: Missing (1.13.1 no 3.13 support)\u003c/li\u003e\u003cli name=\"cfb4\" id=\"cfb4\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eAPI key config\u003c/strong\u003e: Outdated (references files/methods not actually used)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"9d28\" id=\"9d28\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eBlockers that would stop Beatrice completely\u003c/strong\u003e: All seven.\u003c/p\u003e\u003cp name=\"1501\" id=\"1501\" class=\"graf graf--p graf-after--p\"\u003eNot “minor issues.” Not “polish needed.” But “cannot proceed at all.”\u003c/p\u003e\u003cp name=\"278a\" id=\"278a\" class=\"graf graf--p graf-after--p\"\u003eThe 1,630 lines of documentation from Monday? Beautiful, comprehensive, detailed, systematic. And fundamentally wrong in seven critical ways.\u003c/p\u003e\u003ch3 name=\"94c1\" id=\"94c1\" class=\"graf graf--h3 graf-after--p\"\u003eThe live testing model that works\u003c/h3\u003e\u003cp name=\"2933\" id=\"2933\" class=\"graf graf--p graf-after--h3\"\u003eHere’s what Tuesday proved about documentation testing:\u003c/p\u003e\u003cp name=\"926b\" id=\"926b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat doesn’t work\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"adba\" id=\"adba\" class=\"graf graf--li graf-after--p\"\u003eWriting comprehensive docs based on your knowledge\u003c/li\u003e\u003cli name=\"4b38\" id=\"4b38\" class=\"graf graf--li graf-after--li\"\u003eTesting in your development environment\u003c/li\u003e\u003cli name=\"ece0\" id=\"ece0\" class=\"graf graf--li graf-after--li\"\u003eAssuming common knowledge\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"a179\" id=\"a179\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWhat does work\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"50e5\" id=\"50e5\" class=\"graf graf--li graf-after--p\"\u003eActual human following instructions on clean machine\u003c/li\u003e\u003cli name=\"ac16\" id=\"ac16\" class=\"graf graf--li graf-after--li\"\u003eImmediate feedback loop (report → fix → re-test)\u003c/li\u003e\u003cli name=\"c461\" id=\"c461\" class=\"graf graf--li graf-after--li\"\u003eZero assumptions about prerequisites\u003c/li\u003e\u003cli name=\"74de\" id=\"74de\" class=\"graf graf--li graf-after--li\"\u003eCapturing exact error messages and prompts\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"2117\" id=\"2117\" class=\"graf graf--p graf-after--li\"\u003eThe testing methodology: Christian reports issue → Cursor fixes → Update documentation → Test again → Repeat.\u003c/p\u003e\u003cp name=\"8805\" id=\"8805\" class=\"graf graf--p graf-after--p\"\u003eTight feedback loop. Real environment. Actual failures.\u003c/p\u003e\u003cp name=\"80b6\" id=\"80b6\" class=\"graf graf--p graf-after--p\"\u003eThis is why the blockers got fixed Tuesday instead of discovered Thursday. Because we tested against reality.\u003c/p\u003e\u003cp name=\"b098\" id=\"b098\" class=\"graf graf--p graf-after--p\"\u003eLive testing model with immediate fixes… I’m honestly not sure if it’s sustainable at scale but it feels right for these types of issues and alpha prep.\u003c/p\u003e\u003cp name=\"ab70\" id=\"ab70\" class=\"graf graf--p graf-after--p\"\u003eTuesday’s pattern:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"62d3\" id=\"62d3\" class=\"graf graf--li graf-after--p\"\u003e11:24 AM: Start testing\u003c/li\u003e\u003cli name=\"1b0f\" id=\"1b0f\" class=\"graf graf--li graf-after--li\"\u003e12:20 PM: First blocker (Python)\u003c/li\u003e\u003cli name=\"920f\" id=\"920f\" class=\"graf graf--li graf-after--li\"\u003e3:56 PM: Second blocker (repo URL)\u003c/li\u003e\u003cli name=\"40f3\" id=\"40f3\" class=\"graf graf--li graf-after--li\"\u003e4:10 PM: Third blocker (SSH)\u003c/li\u003e\u003cli name=\"d44a\" id=\"d44a\" class=\"graf graf--li graf-after--li\"\u003e4:16 PM: Fourth blocker (folder name)\u003c/li\u003e\u003cli name=\"c83d\" id=\"c83d\" class=\"graf graf--li graf-after--li\"\u003e4:18 PM: Fifth blocker (onnxruntime)\u003c/li\u003e\u003cli name=\"a810\" id=\"a810\" class=\"graf graf--li graf-after--li\"\u003e4:30 PM: Fix onnxruntime (commit 3770fa41 pushed)\u003c/li\u003e\u003cli name=\"8148\" id=\"8148\" class=\"graf graf--li graf-after--li\"\u003e5:04 PM: Sixth blocker (config file)\u003c/li\u003e\u003cli name=\"93ef\" id=\"93ef\" class=\"graf graf--li graf-after--li\"\u003e5:07 PM: Seventh blocker (scipy)\u003c/li\u003e\u003cli name=\"cca6\" id=\"cca6\" class=\"graf graf--li graf-after--li\"\u003e5:10 PM: Decision on Python 3.12\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"3960\" id=\"3960\" class=\"graf graf--p graf-after--li\"\u003eApproximately one blocker discovered per hour. Each one documented. Most fixed immediately. Some deferred with issues created.\u003c/p\u003e\u003ch3 name=\"ea23\" id=\"ea23\" class=\"graf graf--h3 graf-after--p\"\u003eThe fixed and the deferred\u003c/h3\u003e\u003cp name=\"c437\" id=\"c437\" class=\"graf graf--p graf-after--h3\"\u003eBy Tuesday end of day:\u003c/p\u003e\u003cp name=\"70a6\" id=\"70a6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFixed (5 blockers)\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"9305\" id=\"9305\" class=\"graf graf--li graf-after--p\"\u003e✅ Repository URL corrected to actual GitHub location\u003c/li\u003e\u003cli name=\"e8c8\" id=\"e8c8\" class=\"graf graf--li graf-after--li\"\u003e✅ SSH key setup comprehensive Step 2b added\u003c/li\u003e\u003cli name=\"00ac\" id=\"00ac\" class=\"graf graf--li graf-after--li\"\u003e✅ Folder name updated to piper-morgan-product\u003c/li\u003e\u003cli name=\"b450\" id=\"b450\" class=\"graf graf--li graf-after--li\"\u003e✅ onnxruntime updated 1.19.2 → 1.23.2 (committed and pushed)\u003c/li\u003e\u003cli name=\"7d9b\" id=\"7d9b\" class=\"graf graf--li graf-after--li\"\u003e✅ Python version recommendation changed to 3.11–3.12 only\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"4109\" id=\"4109\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDeferred (2 blockers)\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"a3b2\" id=\"a3b2\" class=\"graf graf--li graf-after--p\"\u003e⚠️ API key keychain flow (needs investigation and rewrite)\u003c/li\u003e\u003cli name=\"643b\" id=\"643b\" class=\"graf graf--li graf-after--li\"\u003e⚠️ scipy 3.13 support (resolved by Python 3.12 strategy)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"55b6\" id=\"55b6\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTesting time\u003c/strong\u003e: 5 hours 46 minutes of continuous discovery\u003c/p\u003e\u003cp name=\"4051\" id=\"4051\" class=\"graf graf--p graf-after--p\"\u003eFive out of seven blockers resolved same day. Two deferred with issues created. Documentation transformed from “fundamentally broken” to “mostly works with known gaps.”\u003c/p\u003e\u003cp name=\"1359\" id=\"1359\" class=\"graf graf--p graf-after--p\"\u003eNot perfect. But functional. Ready for Wednesday’s actual wizard testing.\u003c/p\u003e\u003ch3 name=\"c493\" id=\"c493\" class=\"graf graf--h3 graf-after--p\"\u003eThe confidence calibration\u003c/h3\u003e\u003cp name=\"eff6\" id=\"eff6\" class=\"graf graf--p graf-after--h3\"\u003eMonday ended: “The house is clean for Beatrice Thursday! 🎉”\u003c/p\u003e\u003cp name=\"95f7\" id=\"95f7\" class=\"graf graf--p graf-after--p\"\u003eTuesday ends: “The house was a mess. We’ve cleaned up five of seven major problems. Two more to go. Maybe the house will be clean for Beatrice Thursday.”\u003c/p\u003e\u003cp name=\"81d3\" id=\"81d3\" class=\"graf graf--p graf-after--p\"\u003eConfidence recalibrated. Hope tempered by reality. Documentation tested and improved.\u003c/p\u003e\u003cp name=\"7538\" id=\"7538\" class=\"graf graf--p graf-after--p\"\u003eThe 1,630 lines still matter. But they needed correction. Comprehensive doesn’t mean correct.\u003c/p\u003e\u003cp name=\"11aa\" id=\"11aa\" class=\"graf graf--p graf-after--p\"\u003eWhat changed Tuesday:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"ffc1\" id=\"ffc1\" class=\"graf graf--li graf-after--p\"\u003eRepository URL: Now correct\u003c/li\u003e\u003cli name=\"c687\" id=\"c687\" class=\"graf graf--li graf-after--li\"\u003eSSH setup: Now documented\u003c/li\u003e\u003cli name=\"0e46\" id=\"0e46\" class=\"graf graf--li graf-after--li\"\u003ePython version: Now realistic\u003c/li\u003e\u003cli name=\"063e\" id=\"063e\" class=\"graf graf--li graf-after--li\"\u003eDependencies: Now compatible\u003c/li\u003e\u003cli name=\"0b33\" id=\"0b33\" class=\"graf graf--li graf-after--li\"\u003eFolder name: Now accurate\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"9938\" id=\"9938\" class=\"graf graf--p graf-after--li\"\u003eWhat remains Wednesday:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"4a76\" id=\"4a76\" class=\"graf graf--li graf-after--p\"\u003eAPI key keychain flow (undocumented)\u003c/li\u003e\u003cli name=\"3a39\" id=\"3a39\" class=\"graf graf--li graf-after--li\"\u003eActual wizard testing (untested with fixes)\u003c/li\u003e\u003c/ul\u003e\u003ch3 name=\"e05b\" id=\"e05b\" class=\"graf graf--h3 graf-after--li\"\u003eThe methodology lesson\u003c/h3\u003e\u003cp name=\"eb39\" id=\"eb39\" class=\"graf graf--p graf-after--h3\"\u003eHere’s what Tuesday teaches about documentation:\u003c/p\u003e\u003cp name=\"df08\" id=\"df08\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWriting documentation isn’t enough.\u003c/strong\u003e You need to test it. Not “does this make sense to me?” but “does this work for someone who isn’t me?”\u003c/p\u003e\u003cp name=\"d9cc\" id=\"d9cc\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTesting in your environment isn’t enough.\u003c/strong\u003e You need clean machine testing. Fresh environment. No preconfigured tools. No accumulated knowledge.\u003c/p\u003e\u003cp name=\"fb0a\" id=\"fb0a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eComprehensive documentation isn’t enough.\u003c/strong\u003e You need correct documentation. Better to have 10 lines that work than 1,630 lines that fail.\u003c/p\u003e\u003cp name=\"500b\" id=\"500b\" class=\"graf graf--p graf-after--p\"\u003eThe gap between “thoroughly documented” and “actually works” is revealed only through real testing.\u003c/p\u003e\u003cp name=\"a302\" id=\"a302\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eThe lesson that comprehensive ≠ correct seems obvious, but if I’m so smart why do I keep forgetting it?\u003c/em\u003e\u003c/p\u003e\u003cp name=\"ef06\" id=\"ef06\" class=\"graf graf--p graf-after--p\"\u003eTuesday’s achievement: Not writing more documentation. But proving the documentation we had was wrong and fixing it.\u003c/p\u003e\u003cp name=\"a7b5\" id=\"a7b5\" class=\"graf graf--p graf-after--p\"\u003eThe live testing model works: Real user. Real machine. Real problems. Real fixes. Tight feedback loop.\u003c/p\u003e\u003cp name=\"74d3\" id=\"74d3\" class=\"graf graf--p graf-after--p\"\u003eBetter to discover blockers Tuesday through systematic testing than Thursday through alpha user frustration.\u003c/p\u003e\u003ch3 name=\"acd1\" id=\"acd1\" class=\"graf graf--h3 graf-after--p\"\u003eWednesday’s challenge\u003c/h3\u003e\u003cp name=\"dd33\" id=\"dd33\" class=\"graf graf--p graf-after--h3\"\u003eTuesday ends with five blockers fixed, two deferred, and documentation significantly improved.\u003c/p\u003e\u003cp name=\"3330\" id=\"3330\" class=\"graf graf--p graf-after--p\"\u003eWednesday will test differently: Not “can you follow the docs?” but “does the wizard work?”\u003c/p\u003e\u003cp name=\"04e2\" id=\"04e2\" class=\"graf graf--p graf-after--p\"\u003eThe setup wizard that’s supposed to guide users through installation. The automated system that should handle Docker services, database setup, user creation, API key configuration. The one we forgot about when we wrote a guide assuming most of those steps would be manual? Yeah, that one.\u003c/p\u003e\u003cp name=\"c269\" id=\"c269\" class=\"graf graf--p graf-after--p\"\u003eTuesday proved the documentation fails in systematic ways. Wednesday will prove whether the wizard itself works.\u003c/p\u003e\u003cp name=\"8935\" id=\"8935\" class=\"graf graf--p graf-after--p\"\u003e[SPOILRT: The wizard will also fail in systematic ways. Three more critical bugs waiting to be discovered through actual setup testing.]\u003c/p\u003e\u003cp name=\"069d\" id=\"069d\" class=\"graf graf--p graf-after--p\"\u003eBut Tuesday’s lesson remains: Better to find failures through testing than through alpha launch. Better to fix problems Tuesday than explain them Thursday.\u003c/p\u003e\u003cp name=\"d7e7\" id=\"d7e7\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThe house isn’t clean yet. But we know what needs cleaning and tomorrow is anotherday.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"When the Documentation Lied: Seven Blockers Hiding in 1,630 Lines\",\"excerpt\":\"“Perfect condition!”October 28Tuesday mornings are always busy and it’s almost noon by the time turn my thoughts to Piper Morgan. The mission: validate that yesterday’s 1,630 lines of installation documentation actually work.They “work for me in my development environment where everything is alre...\",\"url\":\"/blog/when-the-documentation-lied\",\"publishedAt\":\"Nov 4, 2025\",\"publishedAtISO\":\"2025-11-04T14:10:23.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags
