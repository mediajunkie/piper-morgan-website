"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2eb5,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"Multiple robots help get a party ready as the first guest arrives\" src=\"https://cdn-images-1.medium.com/max/1024/1*TtPsLxbuoD6Ut4uwhAu8-g.png\" /\u003e\u003cfigcaption\u003e“I think we’re ready”!\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 21–24\u003c/em\u003e\u003c/p\u003e\u003cp\u003eFour days. Fifteen simultaneous AI sessions. Eight agents. A complete security epic. Frantic alpha preparation. One infrastructure crisis. And finally, one real user logging in for the first time.\u003c/p\u003e\u003cp\u003eThis is the story of building toward a moment that matters — when all the systematic work, all the coordination, all the methodology gets tested by a single person trying to use what you’ve built.\u003c/p\u003e\u003cp\u003eHer name is Michelle. She’s a PM colleague, sharp and experienced. She agreed to be my first alpha tester, well aside from me ( user 0000001 in the system, username “alfrick.”) When she logged in on Monday afternoon, the user menu didn’t appear.\u003c/p\u003e\u003cp\u003eThat bug — a simple cookie authentication issue — taught me more about what “production-ready” actually means than the entire week of preparation that preceded it.\u003c/p\u003e\u003ch3\u003eExecution at scale\u003c/h3\u003e\u003cp\u003eThe week started with fifteen simultaneous sessions. Eight agents working across five workstreams. A security sprint that had been estimated at 2–3 weeks, executing in parallel with quick wins and infrastructure improvements.\u003c/p\u003e\u003cp\u003eI told my Lead Developer that morning: “Fix P0 immediately, start Phase 1 right now.” No planning meetings. No specification refinements. The security vulnerability — three methods that could expose cross-user file access — would be fixed before dinner.\u003c/p\u003e\u003cp\u003eBy evening, the P0 was sealed. Nine database tables had owner_id foreign keys. The service layer was 68% through its security updates. Coordination had broken twice — role confusion after a context compaction, out-of-scope commits that nearly introduced breaking changes — and recovered both times within minutes.\u003c/p\u003e\u003cp\u003eThe fifteen-agent day proved something important: systematic methodology scales. Not perfectly — coordination broke. But fast recovery meant velocity gains dominated coordination costs. Structure enabled both prevention and recovery.\u003c/p\u003e\u003cp\u003eBut fifteen agents don’t use your software. Users do.\u003c/p\u003e\u003ch3\u003eThe epic that wasn’t\u003c/h3\u003e\u003cp\u003eFriday morning, I expected another multi-day push on SEC-RBAC. The security sprint had Phase 1.3 (endpoint protection), Phase 1.4 (shared resource access), Phase 2 (role-based permissions), and Phase 3 (admin and testing) remaining. Conservative estimate: another week of work.\u003c/p\u003e\u003cp\u003eWhat happened instead: SEC-RBAC Phases 1–3 completed in approximately eight hours.\u003c/p\u003e\u003cp\u003eNobody worked heroically. Systematic preparation had front-loaded the hard work. Phase 0’s security audit had mapped every endpoint and service method. Architecture decisions were already made (ADR-044: Lightweight RBAC via JSONB). Patterns were established. The completion matrix was explicit.\u003c/p\u003e\u003cp\u003eWhen execution day arrived, there was nothing left to figure out. Just work to do.\u003c/p\u003e\u003cp\u003eThe breakthrough moment came mid-morning when my Code agent autonomously discovered its next prompt. I’d said “there’s a new prompt for Phase 1.4” and the agent found it via naming convention, validated prerequisites, executed the work, created a completion report. PM coordination overhead: zero minutes.\u003c/p\u003e\u003cp\u003eBy early afternoon, role-based permissions were fully implemented. A complete permission matrix: Owner, Admin, Editor, Viewer roles with appropriate access to read, update, delete, share, and modify permissions. Twenty-four test cases validating the matrix. Forty-five percent ahead of schedule.\u003c/p\u003e\u003cp\u003eThe other surprise: institutional memory repair. While security work progressed, a documentation agent discovered that my November 19 omnibus log was defective — 450 lines documenting one session when nine parallel sessions had actually occurred. Two hours of reconstruction recovered 95% of missing institutional memory.\u003c/p\u003e\u003cp\u003eDocumentation can fail silently, just like code. Measurement systems can hide problems while reporting success. I’d learned that lesson with the shadow package hiding 617 tests. Now I was learning it about my own documentation practices.\u003c/p\u003e\u003ch3\u003eFrantic preparation\u003c/h3\u003e\u003cp\u003eMichelle was arriving Monday. The system was “architecturally ready for alpha users” according to my Chief Architect’s assessment. But architecturally ready isn’t the same as actually ready.\u003c/p\u003e\u003cp\u003eSaturday became a race against the clock. Frontend RBAC awareness — making the UI understand the permission system we’d built — was estimated at 6–7 hours. Navigation had fourteen known issues. Alpha documentation was outdated.\u003c/p\u003e\u003cp\u003eI deployed a Code agent to build the frontend, went to have coffee and do the crossword with my wife.\u003c/p\u003e\u003cp\u003eFifty-four minutes later, the agent had finished.\u003c/p\u003e\u003cp\u003eNot 6–7 hours. Fifty-four minutes. Three new pages — Lists, Todos, Projects — with full CRUD operations and sharing UI. Permission-aware buttons. Role badges. Responsive design. Fifty-four minutes.\u003c/p\u003e\u003cp\u003eThe pattern repeated throughout the day. Navigation fixes estimated at 340–395 minutes completed in 114 minutes. Three high-priority bugs fixed in five minutes instead of thirty-five. Investigation time investment paying off 3–7x in implementation speed.\u003c/p\u003e\u003cp\u003eBy evening, the system was declared “production-ready for first alpha tester.” All UI features working. SEC-RBAC complete. Fourteen navigation issues fixed. Documentation current and accurate.\u003c/p\u003e\u003cp\u003eI went to bed nervous anyway.\u003c/p\u003e\u003ch3\u003eThe infrastructure crisis\u003c/h3\u003e\u003cp\u003e4:42 AM. I couldn’t sleep. Might as well start production deployment.\u003c/p\u003e\u003cp\u003eThe deployment revealed an API compatibility bug — LLM client wasn’t passing system parameters correctly. Fixed in minutes, but the kind of thing that makes you wonder what else is lurking.\u003c/p\u003e\u003cp\u003eThen my Special Assignments agent ran the weekly doc sweep and notied we an infrastructure quality issue. The trigger was web/app.py crossing 1,000 lines. The investigation revealed the real problem: it was up to 1,405 lines now, sure, but a third of that was one 518-line function.\u003c/p\u003e\u003cp\u003eFive hundred eighteen lines. In one function. The lifespan() function that handles application startup. Impossible to test. Fragile. Violating every principle of good architecture.\u003c/p\u003e\u003cp\u003eMy Chief Architect’s assessment: “CRITICAL — Refactor before adding features.”\u003c/p\u003e\u003cp\u003eThis was Sunday morning. Michelle was arriving Monday afternoon.\u003c/p\u003e\u003cp\u003eThe smart thing might have been to defer. Ship what we had. Fix the architecture later. But “later” has a way of becoming “never,” and technical debt has a way of compounding exactly when you can least afford it.\u003c/p\u003e\u003cp\u003eI approved the refactoring. An hour later: 1,405 lines reduced to 263 lines. Eighty-one percent reduction. The 518-line function became 28 lines. Seven new well-organized modules. Testable architecture throughout.\u003c/p\u003e\u003cp\u003eBy mid-morning, I had a significantly better codebase and a dentist appointment. Human life continues during software crises.\u003c/p\u003e\u003ch3\u003eMichelle arrives\u003c/h3\u003e\u003cp\u003e5:30 PM Monday. Michelle’s onboarding session begins. Hilarity ensues. Seriously, I was pretty nervous. This was the moment of truth. Michelle was great: patient, cheerful, totally game.\u003c/p\u003e\u003cp\u003eAccount creation: works. Email verification: works. Login: works.\u003c/p\u003e\u003cp\u003eUser menu: doesn’t appear.\u003c/p\u003e\u003cp\u003eShe’s logged in. The system knows who she is. But the UI doesn’t show her user menu because… the authentication middleware doesn’t read cookies.\u003c/p\u003e\u003cp\u003eThe login endpoint correctly sets a JWT in an httpOnly cookie. The middleware correctly validates JWTs. But the middleware only looks for tokens in the Authorization header and query parameters. Not cookies. So the UI routes — which authenticate via cookie — couldn’t identify the user.\u003c/p\u003e\u003cp\u003eAll that preparation. Fifteen agents. Eight hours of security work. Eighty-one percent infrastructure reduction. And the bug that blocked my first alpha user was: we forgot to read cookies.\u003c/p\u003e\u003cp\u003eThirty minutes later, the fix was deployed. Cookie extraction added to the middleware. I sent Michelle an email asking her to pull the production branch and try logging in again. We’ll pick this up in our next session.\u003c/p\u003e\u003ch3\u003eFor the want of a cookie\u003c/h3\u003e\u003cp\u003eThe cookie bug was humbling in the best way.\u003c/p\u003e\u003cp\u003eWe’d built sophisticated security architecture. Role-based permissions with viewer, editor, admin roles. Cross-user access controls. Defense-in-depth validation. Twenty-four test cases for the permission matrix.\u003c/p\u003e\u003cp\u003eThe bug that actually blocked our first user had nothing to do with any of that. It was a simple oversight in how we extracted authentication tokens. Not a complex architectural issue. Not a subtle security flaw. Just: we didn’t read cookies.\u003c/p\u003e\u003cp\u003eThis is why real users matter more than any amount of systematic preparation. Not because systematic preparation is wrong — without it, we’d have had dozens of bugs instead of one. But because systematic preparation is necessary, not sufficient. Real users find the gaps that systematic thinking misses.\u003c/p\u003e\u003cp\u003eI created Issue #396: “Michelle Onboarding Session — Bug Fixes \u0026amp; UX Improvements.” Seven bugs discovered. Three improvements identified. The first real external feedback, captured systematically, ready for action.\u003c/p\u003e\u003ch3\u003eThe ratio that matters\u003c/h3\u003e\u003cp\u003eHere’s what the four days taught me about systematic building:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePreparation compounds\u003c/strong\u003e. The SEC-RBAC epic took 8 hours instead of 2–3 weeks because Phase 0 had already done the hard thinking. Frontend work that estimated 6–7 hours took 54 minutes because patterns were established and the agent had full context. Investigation time pays off 3–7x in implementation speed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCoordination enables scale\u003c/strong\u003e. Fifteen sessions coordinated through structure, not heroics. When coordination broke, recovery protocols fixed it. The 26% velocity improvement across 45 days came from coordinating better, not working harder.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReal users reveal truth\u003c/strong\u003e. All the systematic work created a foundation. Michelle’s cookie bug revealed what was actually missing. Both matter. Neither alone is sufficient.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStructure scales; heroics don’t\u003c/strong\u003e. We didn’t finish the security epic through brilliance or late nights. We finished it by having explicit completion criteria, established patterns, and clear scope boundaries. Methodology enables execution to match ambition.\u003c/p\u003e\u003cp\u003eThe journey from fifteen agents to one user isn’t about the agents or the user. It’s about building systems that can handle both — the scale of parallel execution and the specificity of individual human needs.\u003c/p\u003e\u003cp\u003eMichelle get set up and logged in. User 0000002. Authentication still buggy but she can see Piper.\u003c/p\u003e\u003cp\u003eThat’s what production-ready actually means: ready for real people to find what you missed.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Living in the Questions when I belated started to model the user experience Piper should really have.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced the gap between “ready” and “actually ready”? What did your first real users teach you that all your preparation missed?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=64a1afbb1ed8\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/from-15-agents-to-one-user-64a1afbb1ed8\"\u003eFrom 15 Agents to One User\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3d12,"])</script><script>self.__next_f.push([1,"\u003csection name=\"c733\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"decd\" id=\"decd\" class=\"graf graf--h3 graf--leading graf--title\"\u003eFrom 15 Agents to One User\u003c/h3\u003e\u003cfigure name=\"dca9\" id=\"dca9\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*TtPsLxbuoD6Ut4uwhAu8-g.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"Multiple robots help get a party ready as the first guest arrives\" src=\"https://cdn-images-1.medium.com/max/800/1*TtPsLxbuoD6Ut4uwhAu8-g.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“I think we’re ready”!\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"b88d\" id=\"b88d\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 21–24\u003c/em\u003e\u003c/p\u003e\u003cp name=\"85b2\" id=\"85b2\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eF\u003c/span\u003eour days. Fifteen simultaneous AI sessions. Eight agents. A complete security epic. Frantic alpha preparation. One infrastructure crisis. And finally, one real user logging in for the first time.\u003c/p\u003e\u003cp name=\"9276\" id=\"9276\" class=\"graf graf--p graf-after--p\"\u003eThis is the story of building toward a moment that matters — when all the systematic work, all the coordination, all the methodology gets tested by a single person trying to use what you’ve built.\u003c/p\u003e\u003cp name=\"f55a\" id=\"f55a\" class=\"graf graf--p graf-after--p\"\u003eHer name is Michelle. She’s a PM colleague, sharp and experienced. She agreed to be my first alpha tester, well aside from me ( user 0000001 in the system, username “alfrick.”) When she logged in on Monday afternoon, the user menu didn’t appear.\u003c/p\u003e\u003cp name=\"6e13\" id=\"6e13\" class=\"graf graf--p graf-after--p\"\u003eThat bug — a simple cookie authentication issue — taught me more about what “production-ready” actually means than the entire week of preparation that preceded it.\u003c/p\u003e\u003ch3 name=\"9bb7\" id=\"9bb7\" class=\"graf graf--h3 graf-after--p\"\u003eExecution at scale\u003c/h3\u003e\u003cp name=\"2d5d\" id=\"2d5d\" class=\"graf graf--p graf-after--h3\"\u003eThe week started with fifteen simultaneous sessions. Eight agents working across five workstreams. A security sprint that had been estimated at 2–3 weeks, executing in parallel with quick wins and infrastructure improvements.\u003c/p\u003e\u003cp name=\"bc1c\" id=\"bc1c\" class=\"graf graf--p graf-after--p\"\u003eI told my Lead Developer that morning: “Fix P0 immediately, start Phase 1 right now.” No planning meetings. No specification refinements. The security vulnerability — three methods that could expose cross-user file access — would be fixed before dinner.\u003c/p\u003e\u003cp name=\"acce\" id=\"acce\" class=\"graf graf--p graf-after--p\"\u003eBy evening, the P0 was sealed. Nine database tables had owner_id foreign keys. The service layer was 68% through its security updates. Coordination had broken twice — role confusion after a context compaction, out-of-scope commits that nearly introduced breaking changes — and recovered both times within minutes.\u003c/p\u003e\u003cp name=\"8f5f\" id=\"8f5f\" class=\"graf graf--p graf-after--p\"\u003eThe fifteen-agent day proved something important: systematic methodology scales. Not perfectly — coordination broke. But fast recovery meant velocity gains dominated coordination costs. Structure enabled both prevention and recovery.\u003c/p\u003e\u003cp name=\"942c\" id=\"942c\" class=\"graf graf--p graf-after--p\"\u003eBut fifteen agents don’t use your software. Users do.\u003c/p\u003e\u003ch3 name=\"1419\" id=\"1419\" class=\"graf graf--h3 graf-after--p\"\u003eThe epic that wasn’t\u003c/h3\u003e\u003cp name=\"e72c\" id=\"e72c\" class=\"graf graf--p graf-after--h3\"\u003eFriday morning, I expected another multi-day push on SEC-RBAC. The security sprint had Phase 1.3 (endpoint protection), Phase 1.4 (shared resource access), Phase 2 (role-based permissions), and Phase 3 (admin and testing) remaining. Conservative estimate: another week of work.\u003c/p\u003e\u003cp name=\"3746\" id=\"3746\" class=\"graf graf--p graf-after--p\"\u003eWhat happened instead: SEC-RBAC Phases 1–3 completed in approximately eight hours.\u003c/p\u003e\u003cp name=\"6cf4\" id=\"6cf4\" class=\"graf graf--p graf-after--p\"\u003eNobody worked heroically. Systematic preparation had front-loaded the hard work. Phase 0’s security audit had mapped every endpoint and service method. Architecture decisions were already made (ADR-044: Lightweight RBAC via JSONB). Patterns were established. The completion matrix was explicit.\u003c/p\u003e\u003cp name=\"9333\" id=\"9333\" class=\"graf graf--p graf-after--p\"\u003eWhen execution day arrived, there was nothing left to figure out. Just work to do.\u003c/p\u003e\u003cp name=\"8834\" id=\"8834\" class=\"graf graf--p graf-after--p\"\u003eThe breakthrough moment came mid-morning when my Code agent autonomously discovered its next prompt. I’d said “there’s a new prompt for Phase 1.4” and the agent found it via naming convention, validated prerequisites, executed the work, created a completion report. PM coordination overhead: zero minutes.\u003c/p\u003e\u003cp name=\"ed95\" id=\"ed95\" class=\"graf graf--p graf-after--p\"\u003eBy early afternoon, role-based permissions were fully implemented. A complete permission matrix: Owner, Admin, Editor, Viewer roles with appropriate access to read, update, delete, share, and modify permissions. Twenty-four test cases validating the matrix. Forty-five percent ahead of schedule.\u003c/p\u003e\u003cp name=\"0718\" id=\"0718\" class=\"graf graf--p graf-after--p\"\u003eThe other surprise: institutional memory repair. While security work progressed, a documentation agent discovered that my November 19 omnibus log was defective — 450 lines documenting one session when nine parallel sessions had actually occurred. Two hours of reconstruction recovered 95% of missing institutional memory.\u003c/p\u003e\u003cp name=\"4867\" id=\"4867\" class=\"graf graf--p graf-after--p\"\u003eDocumentation can fail silently, just like code. Measurement systems can hide problems while reporting success. I’d learned that lesson with the shadow package hiding 617 tests. Now I was learning it about my own documentation practices.\u003c/p\u003e\u003ch3 name=\"fcd5\" id=\"fcd5\" class=\"graf graf--h3 graf-after--p\"\u003eFrantic preparation\u003c/h3\u003e\u003cp name=\"a748\" id=\"a748\" class=\"graf graf--p graf-after--h3\"\u003eMichelle was arriving Monday. The system was “architecturally ready for alpha users” according to my Chief Architect’s assessment. But architecturally ready isn’t the same as actually ready.\u003c/p\u003e\u003cp name=\"1ef7\" id=\"1ef7\" class=\"graf graf--p graf-after--p\"\u003eSaturday became a race against the clock. Frontend RBAC awareness — making the UI understand the permission system we’d built — was estimated at 6–7 hours. Navigation had fourteen known issues. Alpha documentation was outdated.\u003c/p\u003e\u003cp name=\"e4a5\" id=\"e4a5\" class=\"graf graf--p graf-after--p\"\u003eI deployed a Code agent to build the frontend, went to have coffee and do the crossword with my wife.\u003c/p\u003e\u003cp name=\"de6c\" id=\"de6c\" class=\"graf graf--p graf-after--p\"\u003eFifty-four minutes later, the agent had finished.\u003c/p\u003e\u003cp name=\"90dc\" id=\"90dc\" class=\"graf graf--p graf-after--p\"\u003eNot 6–7 hours. Fifty-four minutes. Three new pages — Lists, Todos, Projects — with full CRUD operations and sharing UI. Permission-aware buttons. Role badges. Responsive design. Fifty-four minutes.\u003c/p\u003e\u003cp name=\"79dd\" id=\"79dd\" class=\"graf graf--p graf-after--p\"\u003eThe pattern repeated throughout the day. Navigation fixes estimated at 340–395 minutes completed in 114 minutes. Three high-priority bugs fixed in five minutes instead of thirty-five. Investigation time investment paying off 3–7x in implementation speed.\u003c/p\u003e\u003cp name=\"14bb\" id=\"14bb\" class=\"graf graf--p graf-after--p\"\u003eBy evening, the system was declared “production-ready for first alpha tester.” All UI features working. SEC-RBAC complete. Fourteen navigation issues fixed. Documentation current and accurate.\u003c/p\u003e\u003cp name=\"50f0\" id=\"50f0\" class=\"graf graf--p graf-after--p\"\u003eI went to bed nervous anyway.\u003c/p\u003e\u003ch3 name=\"955d\" id=\"955d\" class=\"graf graf--h3 graf-after--p\"\u003eThe infrastructure crisis\u003c/h3\u003e\u003cp name=\"3211\" id=\"3211\" class=\"graf graf--p graf-after--h3\"\u003e4:42 AM. I couldn’t sleep. Might as well start production deployment.\u003c/p\u003e\u003cp name=\"35d1\" id=\"35d1\" class=\"graf graf--p graf-after--p\"\u003eThe deployment revealed an API compatibility bug — LLM client wasn’t passing system parameters correctly. Fixed in minutes, but the kind of thing that makes you wonder what else is lurking.\u003c/p\u003e\u003cp name=\"0855\" id=\"0855\" class=\"graf graf--p graf-after--p\"\u003eThen my Special Assignments agent ran the weekly doc sweep and notied we an infrastructure quality issue. The trigger was \u003ccode class=\"markup--code markup--p-code\"\u003eweb/app.py\u003c/code\u003e crossing 1,000 lines. The investigation revealed the real problem: it was up to 1,405 lines now, sure, but a third of that was one 518-line function.\u003c/p\u003e\u003cp name=\"337d\" id=\"337d\" class=\"graf graf--p graf-after--p\"\u003eFive hundred eighteen lines. In one function. The \u003ccode class=\"markup--code markup--p-code\"\u003elifespan()\u003c/code\u003e function that handles application startup. Impossible to test. Fragile. Violating every principle of good architecture.\u003c/p\u003e\u003cp name=\"7ad4\" id=\"7ad4\" class=\"graf graf--p graf-after--p\"\u003eMy Chief Architect’s assessment: “CRITICAL — Refactor before adding features.”\u003c/p\u003e\u003cp name=\"3721\" id=\"3721\" class=\"graf graf--p graf-after--p\"\u003eThis was Sunday morning. Michelle was arriving Monday afternoon.\u003c/p\u003e\u003cp name=\"2f97\" id=\"2f97\" class=\"graf graf--p graf-after--p\"\u003eThe smart thing might have been to defer. Ship what we had. Fix the architecture later. But “later” has a way of becoming “never,” and technical debt has a way of compounding exactly when you can least afford it.\u003c/p\u003e\u003cp name=\"8e95\" id=\"8e95\" class=\"graf graf--p graf-after--p\"\u003eI approved the refactoring. An hour later: 1,405 lines reduced to 263 lines. Eighty-one percent reduction. The 518-line function became 28 lines. Seven new well-organized modules. Testable architecture throughout.\u003c/p\u003e\u003cp name=\"0569\" id=\"0569\" class=\"graf graf--p graf-after--p\"\u003eBy mid-morning, I had a significantly better codebase and a dentist appointment. Human life continues during software crises.\u003c/p\u003e\u003ch3 name=\"89de\" id=\"89de\" class=\"graf graf--h3 graf-after--p\"\u003eMichelle arrives\u003c/h3\u003e\u003cp name=\"9d18\" id=\"9d18\" class=\"graf graf--p graf-after--h3\"\u003e5:30 PM Monday. Michelle’s onboarding session begins. Hilarity ensues. Seriously, I was pretty nervous. This was the moment of truth. Michelle was great: patient, cheerful, totally game.\u003c/p\u003e\u003cp name=\"54ad\" id=\"54ad\" class=\"graf graf--p graf-after--p\"\u003eAccount creation: works. Email verification: works. Login: works.\u003c/p\u003e\u003cp name=\"2fa2\" id=\"2fa2\" class=\"graf graf--p graf-after--p\"\u003eUser menu: doesn’t appear.\u003c/p\u003e\u003cp name=\"30f7\" id=\"30f7\" class=\"graf graf--p graf-after--p\"\u003eShe’s logged in. The system knows who she is. But the UI doesn’t show her user menu because… the authentication middleware doesn’t read cookies.\u003c/p\u003e\u003cp name=\"b05b\" id=\"b05b\" class=\"graf graf--p graf-after--p\"\u003eThe login endpoint correctly sets a JWT in an httpOnly cookie. The middleware correctly validates JWTs. But the middleware only looks for tokens in the Authorization header and query parameters. Not cookies. So the UI routes — which authenticate via cookie — couldn’t identify the user.\u003c/p\u003e\u003cp name=\"248b\" id=\"248b\" class=\"graf graf--p graf-after--p\"\u003eAll that preparation. Fifteen agents. Eight hours of security work. Eighty-one percent infrastructure reduction. And the bug that blocked my first alpha user was: we forgot to read cookies.\u003c/p\u003e\u003cp name=\"b185\" id=\"b185\" class=\"graf graf--p graf-after--p\"\u003eThirty minutes later, the fix was deployed. Cookie extraction added to the middleware. I sent Michelle an email asking her to pull the production branch and try logging in again. We’ll pick this up in our next session.\u003c/p\u003e\u003ch3 name=\"5553\" id=\"5553\" class=\"graf graf--h3 graf-after--p\"\u003eFor the want of a cookie\u003c/h3\u003e\u003cp name=\"6fb6\" id=\"6fb6\" class=\"graf graf--p graf-after--h3\"\u003eThe cookie bug was humbling in the best way.\u003c/p\u003e\u003cp name=\"1e56\" id=\"1e56\" class=\"graf graf--p graf-after--p\"\u003eWe’d built sophisticated security architecture. Role-based permissions with viewer, editor, admin roles. Cross-user access controls. Defense-in-depth validation. Twenty-four test cases for the permission matrix.\u003c/p\u003e\u003cp name=\"910e\" id=\"910e\" class=\"graf graf--p graf-after--p\"\u003eThe bug that actually blocked our first user had nothing to do with any of that. It was a simple oversight in how we extracted authentication tokens. Not a complex architectural issue. Not a subtle security flaw. Just: we didn’t read cookies.\u003c/p\u003e\u003cp name=\"03d1\" id=\"03d1\" class=\"graf graf--p graf-after--p\"\u003eThis is why real users matter more than any amount of systematic preparation. Not because systematic preparation is wrong — without it, we’d have had dozens of bugs instead of one. But because systematic preparation is necessary, not sufficient. Real users find the gaps that systematic thinking misses.\u003c/p\u003e\u003cp name=\"37d0\" id=\"37d0\" class=\"graf graf--p graf-after--p\"\u003eI created Issue #396: “Michelle Onboarding Session — Bug Fixes \u0026amp; UX Improvements.” Seven bugs discovered. Three improvements identified. The first real external feedback, captured systematically, ready for action.\u003c/p\u003e\u003ch3 name=\"d13a\" id=\"d13a\" class=\"graf graf--h3 graf-after--p\"\u003eThe ratio that matters\u003c/h3\u003e\u003cp name=\"8b65\" id=\"8b65\" class=\"graf graf--p graf-after--h3\"\u003eHere’s what the four days taught me about systematic building:\u003c/p\u003e\u003cp name=\"e99d\" id=\"e99d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePreparation compounds\u003c/strong\u003e. The SEC-RBAC epic took 8 hours instead of 2–3 weeks because Phase 0 had already done the hard thinking. Frontend work that estimated 6–7 hours took 54 minutes because patterns were established and the agent had full context. Investigation time pays off 3–7x in implementation speed.\u003c/p\u003e\u003cp name=\"8405\" id=\"8405\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eCoordination enables scale\u003c/strong\u003e. Fifteen sessions coordinated through structure, not heroics. When coordination broke, recovery protocols fixed it. The 26% velocity improvement across 45 days came from coordinating better, not working harder.\u003c/p\u003e\u003cp name=\"5f47\" id=\"5f47\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eReal users reveal truth\u003c/strong\u003e. All the systematic work created a foundation. Michelle’s cookie bug revealed what was actually missing. Both matter. Neither alone is sufficient.\u003c/p\u003e\u003cp name=\"23b1\" id=\"23b1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStructure scales; heroics don’t\u003c/strong\u003e. We didn’t finish the security epic through brilliance or late nights. We finished it by having explicit completion criteria, established patterns, and clear scope boundaries. Methodology enables execution to match ambition.\u003c/p\u003e\u003cp name=\"8033\" id=\"8033\" class=\"graf graf--p graf-after--p\"\u003eThe journey from fifteen agents to one user isn’t about the agents or the user. It’s about building systems that can handle both — the scale of parallel execution and the specificity of individual human needs.\u003c/p\u003e\u003cp name=\"9c1c\" id=\"9c1c\" class=\"graf graf--p graf-after--p\"\u003eMichelle get set up and logged in. User 0000002. Authentication still buggy but she can see Piper.\u003c/p\u003e\u003cp name=\"ec0b\" id=\"ec0b\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThat’s what production-ready actually means: ready for real people to find what you missed.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"From 15 Agents to One User\",\"excerpt\":\"“I think we’re ready”!November 21–24Four days. Fifteen simultaneous AI sessions. Eight agents. A complete security epic. Frantic alpha preparation. One infrastructure crisis. And finally, one real user logging in for the first time.This is the story of building toward a moment that matters — when...\",\"url\":\"/blog/from-15-agents-to-one-user\",\"publishedAt\":\"Dec 2, 2025\",\"publishedAtISO\":\"2025-12-02T15:27:42.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/64a1afbb1ed8\",\"featuredImage\":\"/assets/blog-images/64a1afbb1ed8-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/from-15-agents-to-one-user-64a1afbb1ed8?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"from-15-agents-to-one-user\",\"workDate\":\"Dec 2, 2025\",\"workDateISO\":\"2025-12-02T00:00:00.000Z\",\"category\":\"building\",\"cluster\":\"2025-12-02\",\"featured\":false},\"content\":{\"title\":\"From 15 Agents to One User\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"From 15 Agents to One User | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"From 15 Agents to One User\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"From 15 Agents to One User\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
