emplateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T1d2f,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMarch 19–21, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eI'm now running two AI side projects: Piper Morgan — a PM assistant with nine distinct active agent roles, ten months of development, and nearly 290 blog posts documenting the journey. And Klatch — a conversation manager started in two days by two Claude Code agents that has since grown into its own (smaller) multi-agent ecosystem.\u003c/p\u003e\n\u003cp\u003eThey share a parent (\u003ca href=\"https://designinproduct.com\"\u003eDesign in Product\u003c/a\u003e). They share a PM (me). And now, they share lessons constantly.\u003c/p\u003e\n\u003cp\u003eFor the first month (Klatch started about six weeks ago), I was the conduit between the projects. I'd notice something building Klatch — say, that agents need structured session-start protocols to avoid phantom knowledge — and manually carry that insight into Piper's methodology. Or I'd develop a coordination pattern in Piper — like the handoff memo template — and recreate it in Klatch by hand.\u003c/p\u003e\n\u003cp\u003eThis worked. It was also a bottleneck shaped exactly like me and it echoed the issues of mail delivery and workstream reviews that require me to be the sneakernet postman.\u003c/p\u003e\n\u003ch1\u003eThe daily sweep\u003c/h1\u003e\n\u003cp\u003eIn late March, we built a different approach. Now, a daily agent process reads recent changes from both projects — session logs, planning docs, architecture decisions, memos, research — and produces a \"cross-pollination\" intelligence briefing. Each briefing conveys discoveries relevant to either project.\u003c/p\u003e\n\u003cp\u003eThe brief answers one question: \"What did these projects learn today that other projects would benefit from knowing?\"\u003c/p\u003e\n\u003cp\u003eThe first brief covered a 72-hour window and surfaced six cross-relevant insights. Anthropic's Compaction API was relevant to both projects' context-management strategies. Piper's registry-driven capability gating solved a problem Klatch would face as entities gained capabilities. Both projects had independently built their own inter-agent mailbox systems. Both had independently arrived at mandatory session-wrap verification after losing work to unchecked claims of completion.\u003c/p\u003e\n\u003cp\u003e(The first few sweeps found so much cross-pollination opportunity I had to make sure it wasn't hyping me. I actually scanned the previous two weeks to find a day that Opus would agree had not been \"consequential\".)\u003c/p\u003e\n\u003ch1\u003eWhat makes it different from a standup\u003c/h1\u003e\n\u003cp\u003eStandups share status. Intelligence briefs share \u003cem\u003erelevance\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eA standup would say: \"Piper shipped ADR-059 yesterday. Klatch shipped v0.8.8.\" An intelligence brief says: \"Piper's ADR-059 audit found that six features worked independently but composed into chaos. Klatch is growing fast with layered features (creation UI, cloud import, entity capabilities). The composition failure pattern applies directly — test the combinations, not just the components.\"\u003c/p\u003e\n\u003cp\u003eThe difference is the assessment layer. Someone — or something — reads the raw activity and makes a judgment about what matters \u003cem\u003eto the other team\u003c/em\u003e. This is editorial work, not reporting work. It requires understanding both projects well enough to spot the connection.\u003c/p\u003e\n\u003ch1\u003eThe consumption problem\u003c/h1\u003e\n\u003cp\u003eProducing briefs is the easy part. Getting them read by the right agents at the right time is harder.\u003c/p\u003e\n\u003cp\u003eOur agents operate in different environments — Claude Code agents with filesystem access, Claude Chat agents in project knowledge bases, Cowork agents with their own file systems. A brief sitting in one repo doesn't help an agent working in a different context.\u003c/p\u003e\n\u003cp\u003eThe solution was a \"belt and suspenders\" approach. The belt: add brief references to each agent's startup protocol (CLAUDE.md for code agents, project knowledge for chat agents). The suspenders: session-start hooks that check brief freshness and flag stale intelligence.\u003c/p\u003e\n\u003cp\u003eAt three different cadences: daily briefs for code agents who can read the filesystem directly, weekly rollups for chat agents whose knowledge bases get refreshed manually, monthly digests for baseline context.\u003c/p\u003e\n\u003cp\u003eI can't get myself out of manual delivery entirely until one of two things happen:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eAnthropic gives us API access to Claude Chat projects.\u003c/li\u003e\n\u003cli\u003eI migrate all of my agent roles into Claude Code (even if some of them never touch the code at all).\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch1\u003eThe parent entity pattern\u003c/h1\u003e\n\u003cp\u003eThe system works because there's a parent entity — Design in Product — that sits above both projects and has legitimate reason to see across both. The daily sweep agent has access to both repos. The briefs are produced in the parent's infrastructure and distributed downward.\u003c/p\u003e\n\u003cp\u003eThis isn't peer-to-peer knowledge sharing. It's parent-mediated. The parent sees what the children can't see about each other — not because the children are limited, but because they're focused on their own work.\u003c/p\u003e\n\u003cp\u003eThe pattern is designed to scale to N projects. Each new project gets a directory, gets read by the sweep, and receives a summarized briefing covering insights from all siblings. With three projects, each gets two briefs per day. The cost is linear in the number of projects. The value is quadratic — every pair of projects can learn from each other.\u003c/p\u003e\n\u003cp\u003eYou can think of this as a newsletter or blog \u003cem\u003efor my agents\u003c/em\u003e. (I half wonder if other peoples' agents would benefit from reading it too. If you'd like to try that, you can point them at an unindexed page on my site, \u003ca href=\"https://designinproduct.com/internal/\"\u003eCross-Pollination Hub\u003c/a\u003e.\u003c/p\u003e\n\u003ch1\u003eWhat it replaced\u003c/h1\u003e\n\u003cp\u003eBefore the cross-pollination system, knowledge transfer happened three ways:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eI noticed a connection and manually carried it across. This was reliable but slow and constrained by my attention span.\u003c/li\u003e\n\u003cli\u003eAn agent stumbled on cross-project context by accident — usually because I'd mentioned the other project in conversation (and they are an inquisitive lot). This was unreliable and anecdotal.\u003c/li\u003e\n\u003cli\u003eNothing. The insight stayed in one project and the other reinvented it independently. This was the most common case.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThe daily brief replaced all three with a systematic process. Not perfect — the editorial judgment of what's relevant is still a single point of assessment — but consistent. Every day, both projects get a curated view of what their sibling learned. The PM is no longer the sole conduit.\u003c/p\u003e\n\u003ch1\u003eThe broader question\u003c/h1\u003e\n\u003cp\u003eMost organizations have sibling projects that could learn from each other. Most don't. The knowledge stays siloed — not because people are hoarding it, but because nobody's job is to read Project A's session logs and think about what matters to Project B.\u003c/p\u003e\n\u003cp\u003eThe cross-pollination system makes that somebody's job. Daily. Systematically. With targeted output that respects the recipient's time and context.\u003c/p\u003e\n\u003cp\u003eIt's a small piece of infrastructure. A sweep, a brief, a distribution mechanism. But it replaces the most common failure mode in organizational knowledge management: insights that exist somewhere but never reach the teams who need them.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Four Roles, Ninety Minutes — how a single product concept traveled through four agents in a ninety-minute window.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eDo your projects learn from each other? Not \"do they share a Confluence\" — do insights from one team's work actually reach the other teams who could use them? What would it take to make that systematic?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Sibling Intelligence\",\"excerpt\":\"March 19–21, 2026 I'm now running two AI side projects: Piper Morgan — a PM assistant with nine distinct active agent roles, ten months of development, and nearly 290 blog posts documenting the journey. And Klatch — a co
