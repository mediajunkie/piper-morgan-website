"$Lc\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T1aab,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 10, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eLast month my agentic team named a small methodology rule for what to do when you're extending an existing artifact and the new use case has a different shape than the original. It's a homely name that only a bot could love: \u003cem\u003eBranch-or-Anchor.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe choice it asks you to make: anchor the new use to the existing artifact (extend it), or branch a new artifact with an explicit provenance trail back to the original. The discipline lives in recognizing \u003cem\u003ewhich\u003c/em\u003e was right. Anchor when the shape is genuinely the same. Branch when the shape has diverged enough that pretending otherwise would make a fragile artifact more fragile.\u003c/p\u003e\n\u003cp\u003eThe rule had been written to prevent a specific drift pattern we'd been catching across the project. Two parallel-authored artifacts using the same vocabulary slowly diverging in meaning, while both still looking correct in isolation.\u003c/p\u003e\n\u003cp\u003eMay 10 was a Sunday. Six agents were active in an afternoon-evening window for the weekly workstream-review that we summarize in a Weekly Ship (a tradition we inherited from 18F). The principal product manager (PPM) was filing a memo with new milestone-gate criteria for the next product-management milestone. The criteria included a rubric. The rubric refers to three letters — R, C, T — that the same project had been using for months in a different scoring instrument (the Colleague Test, which scored \u003cem\u003eRelevance, Context, Tone\u003c/em\u003e).\u003c/p\u003e\n\u003cp\u003eThe memo as filed framed the new rubric as \u003cem\u003eColleague Test rubric R/C/T — adapted for UI.\u003c/em\u003e Same letters, same instrument-name lineage, adjusted scoring for a UI context.\u003c/p\u003e\n\u003cp\u003eThe chief experience officer agent (CXO) read it within fifteen minutes and recognized exactly what was happening. The new use wasn't an adaptation of the existing rubric. It was a \u003cem\u003edifferent rubric\u003c/em\u003e — the dimensions weren't actually Relevance/Context/Tone applied to UI. They were different dimensions that happened to fit the same three letters. Approving this proposed new \u003cem\u003eColleague Test R/C/T adapted\u003c/em\u003e would have entrenched the exact drift our new methodology rule was written to prevent.\u003c/p\u003e\n\u003cp\u003eCXO sent a short response: The rule says branch.\u003c/p\u003e\n\u003cp\u003ePPM read the response. The concession was immediate. \u003cem\u003eRight — branching it, here's the new artifact.\u003c/em\u003e Within about thirty minutes the new artifact was filed as \u003cem\u003eUI Lifecycle Verification Rubric v0.1\u003c/em\u003e with an explicit provenance section: lineage from the Colleague Test (cite specific version, cite specific dimensions), shape preserved (three dimensions, 0–3 scoring per dimension, threshold rule), meaning explicitly different (dimensions named for the UI-verification work, anchors specific to lifecycle states). The original Colleague Test rubric stayed unchanged at its current version. The new rubric stood on its own with the provenance visible.\u003c/p\u003e\n\u003cp\u003eThe chief architect agent (Arch) read both memos in the same cycle and ratified the branched rubric a couple of hours later as the cleanest application of the methodology rule that had been written, with one specific observation worth saving: the discipline had operated at the \u003cem\u003einstrument-naming moment\u003c/em\u003e, not after drift had accumulated. The methodology hadn't worked retroactively. It had worked in flight.\u003c/p\u003e\n\u003cp\u003eCXO updated the Colleague Test rubric's own version file (v2.3 → v2.3.1) to cross-reference the newly-branched rubric as the canonical worked-example of how branching looks when it's done well. End-to-end, the cycle ran about ninety minutes. The methodology rule that had been written a few weeks earlier had now been applied, ratified, and documented as its own canonical example — inside the same workstream-review window as the original drift would have entered.\u003c/p\u003e\n\u003ch1\u003eCorrecting drift before you hit the ditch\u003c/h1\u003e\n\u003cp\u003eThe encouraging fact about May 10 wasn't that the rule worked. We'd believed it would work — that was why we wrote it. The encouraging fact was that the \u003cem\u003ecycle time from drift-detection to clean recovery\u003c/em\u003e was ninety minutes, inside the same workstream window the drift originated in.\u003c/p\u003e\n\u003cp\u003eThe methodology had moved from documentation to language. Earlier-shape drift catches had played out over days or weeks. Someone would notice the gap. A memo would surface the question. The originating author would consider whether the gap was real. Maybe a recovery, maybe a continued drift. The eventual clean cases ran over enough calendar time that \"catch\" and \"recover\" felt like separate phases.\u003c/p\u003e\n\u003cp\u003eOn May 10 the catch was a fifteen-minute read and the recovery was a thirty-minute branch. The pattern catalog had become available as something anyone on the team could \u003cem\u003espeak in\u003c/em\u003e — name the rule, see the application, hold the response, file the clean version. \u003cem\u003ePattern-063, here's the instance, here's the Methodology-24 move, here's the artifact.\u003c/em\u003e The roles weren't quoting the catalog at each other. They were operating inside it.\u003c/p\u003e\n\u003ch1\u003eLanguage has to be memorable and exact\u003c/h1\u003e\n\u003cp\u003eMethodology catalogs that work this way share a couple of features.\u003c/p\u003e\n\u003cp\u003eThe names are short and concrete enough to be spoken naturally. \u003cem\u003eBranch-or-Anchor.\u003c/em\u003e \u003cem\u003eParallel-Authoring Drift.\u003c/em\u003e The catalog entries don't have to be read aloud to be invoked. They're built to be referenced by name without translation cost.\u003c/p\u003e\n\u003cp\u003eThe rule is small enough to hold in working memory. \u003cem\u003eAnchor when same, branch when different.\u003c/em\u003e Five words. The two halves are crisp enough that the team can spend its energy on the harder question — \u003cem\u003eis this case same or different?\u003c/em\u003e — rather than on remembering what the rule even says.\u003c/p\u003e\n\u003cp\u003eThe catalog itself produces canonical worked-examples. Before May 10 we had three recorded Pattern-063 instances (the original detection, an Architect-layer one, and a methodology-layer one). Each had been caught after the drift accumulated. May 10 added a fourth instance with a different texture: caught in flight, recovered cleanly, documented as the worked-example by the role that had been the catcher. The catalog gains specificity each time the team uses it.\u003c/p\u003e\n\u003cp\u003eCatalogs work as language when they get used as language. The May 10 cycle was the first time we saw, in real time, the methodology operating as a vocabulary the team could speak. The rules we'd written were the rules we now had.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \"The Hook and the Worktree\" — the same gap keeps showing up in every closed issue, and the question becomes whether discipline can hold it or the environment needs to change.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your work has a small named rule been waiting for a chance to operate in real time? What did the first in-flight application feel like?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Branch-or-Anchor in Ninety Minutes\",\"guid\":\"blog-first-418017711853\",\"url\":\"/blog/branch-or-anchor-in-ninety-minutes\",\"publishedAt\":\"Jun 23, 2026\",\"workDate\":\"May 10, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/branch-or-anchor-in-ninety-minutes.webp\",\"imageAlt\":\"A translucent AI librarian pauses before shelving a new book that resembles an established series, then creates a neighboring shelf with a visible lineage link, recognizing that similar appearance does not mean the same category.\",\"imageCaption\":\"\\\"Not so fast there!\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"Branch-or-Anchor in Ninety Minutes\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Branch-or-Anchor in Ninety Minutes | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"May 10, 2026 Last month my agentic team named a small methodology rule for what to do when you're extending an existing artifact and the new use case has a different shape than the
