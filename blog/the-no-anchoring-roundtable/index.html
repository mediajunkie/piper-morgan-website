,\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T198a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMarch 14\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eI has this sudden instinct we'd been building the system backwards. I wanted to ask my agent team and get honest answers. This is not a small question. It's the kind of question where the first one to speak shapes how everyone else thinks about it.\n\u003c/p\u003e\n\u003cp\u003eI made sure nobody spoke first.\n\u003c/p\u003e\n\u003cp\u003eI sent the same question to four leadership roles — CXO, PPM, Architect, CIO — in parallel. Each one received the same context: a screenshot of Piper rejecting a reasonable PM query, the observation that a $0 ChatGPT wrapper would have handled it better, and the question: \"Are we doing this backwards?\"\n\u003c/p\u003e\n\u003cp\u003eNo shared channel. No group thread. No way for any role to see what the others were writing. The CIO had actually recommended this approach in an earlier session — independent parallel responses to prevent anchoring bias.\n\u003c/p\u003e\n\u003ch2\u003eFour frames, one diagnosis\u003c/h2\u003e\n\u003cp\u003eThe responses came back. Each role found a different way to describe the same underlying problem.\n\u003c/p\u003e\n\u003cp\u003eThe CXO described a bouncer at the door. The classifier was checking credentials and turning away anyone without the right ID. The eight contextual fallback messages we'd just shipped — carefully written, CXO-authored copy for when Piper couldn't help — were, in the CXO's own words, \"a band-aid on exactly this wound.\"\n\u003c/p\u003e\n\u003cp\u003eThe PPM diagnosed a layer inversion. Piper used the LLM to \u003cem\u003eclassify\u003c/em\u003e queries but not to \u003cem\u003erespond\u003c/em\u003e to them. Tokens spent deciding the system couldn't help, then not using the LLM to actually help.\n\u003c/p\u003e\n\u003cp\u003eThe Architect gave the most precise technical description: \"We use the LLM to classify but not to respond.\" The routing architecture was structurally inverted — handlers were the default, the conversational floor was the last resort.\n\u003c/p\u003e\n\u003cp\u003eThe CIO reframed the model entirely: \"The LLM is the floor, not the ceiling.\" Every query should reach the LLM with full project context. Structured handlers should make the response \u003cem\u003ebetter\u003c/em\u003e, not \u003cem\u003edifferent\u003c/em\u003e.\n\u003c/p\u003e\n\u003cp\u003eFour independent analyses. Zero overlap in framing. Complete overlap in conclusion.\n\u003c/p\u003e\n\u003cp\u003eThis is why I maintain ongoing agent roles and personas. Each holds a different lens and I need the perspectives to see the full picture.\n\u003c/p\u003e\n\u003ch2\u003eWhy no-anchoring works\u003c/h2\u003e\n\u003cp\u003eAnchoring bias is one of the best-documented effects in decision science. The first number in a negotiation shapes the outcome. The first opinion in a meeting shapes the consensus. The first framing shapes how everyone thinks about the problem.\n\u003c/p\u003e\n\u003cp\u003eIn a traditional team meeting, the most senior person or the most confident speaker goes first. Everyone else adjusts — not because they're weak, but because they're human. Even devil's advocates anchor on what they're opposing.\n\u003c/p\u003e\n\u003cp\u003eThe no-anchoring approach eliminates this entirely. Each respondent works from the raw evidence, not from someone else's interpretation of the evidence. When they converge, the convergence is signal, not groupthink.\n\u003c/p\u003e\n\u003cp\u003eWhen they \u003cem\u003edon't\u003c/em\u003e converge, that's signal too — it means the problem is genuinely ambiguous and a simple vote or discussion would have produced false consensus.\n\u003c/p\u003e\n\u003cp\u003eThis is directly drawn from my experience with teams of, you know, people. I never tell a team what I already think about something before asking for ideas. I don't want to start everyone out inside the box.\n\u003c/p\u003e\n\u003ch2\u003eThe structural advantage\u003c/h2\u003e\n\u003cp\u003eMulti-agent teams have a natural advantage here that human teams don't: agents can't peek. When I send a question to four separate Claude sessions, there's no hallway conversation, no Slack thread, no body language in a conference room. The isolation is complete by default.\n\u003c/p\u003e\n\u003cp\u003eHuman teams can approximate this with written submissions before a meeting, or with anonymous polling. But the temptation to discuss before the formal response is always there. With agents, the protocol \u003cem\u003eis\u003c/em\u003e the behavior. There's no gap between \"we agreed to respond independently\" and \"we actually responded independently.\"\n\u003c/p\u003e\n\u003cp\u003eThe cost is that agents can't build on each other's thinking in real time. Our synthesis step — the PPM collecting all four memos and producing a unified document — partially compensates. But the real-time riffing, the \"yes, and...\" dynamic of a good meeting, is lost.\n\u003c/p\u003e\n\u003cp\u003eFor high-stakes diagnostic questions — \"is our architecture wrong?\" — the tradeoff favors independence. For creative brainstorming, it probably doesn't. The technique is a tool, not a universal method.\n\u003c/p\u003e\n\u003cp\u003eThe PPM took the lead on synethesizing the four memos, then the Architect reviewed the synthesis, then CXO and CIO approved. This four-step convergence pattern (independent → synthesize → review → ratify) seemed to work pretty smoothly!\n\u003c/p\u003e\n\u003ch2\u003eWhen to use it\u003c/h2\u003e\n\u003cp\u003eNot every question deserves a no-anchoring roundtable. Most decisions aren't high-stakes enough, and the overhead — four independent responses plus synthesis — is real.\n\u003c/p\u003e\n\u003cp\u003eBut when you're asking a question where the wrong answer means months of wasted work, and where the natural social dynamics of your team might produce false consensus, it's worth the cost.\n\u003c/p\u003e\n\u003cp\u003eThe signals that suggest no-anchoring:\n\u003c/p\u003e\n\u003cp\u003eThe question is diagnostic, not creative. You're asking \"what's wrong?\" not \"what should we build?\" Diagnostic questions have a ground truth you're trying to find, not a possibility space you're trying to explore.\n\u003c/p\u003e\n\u003cp\u003eThe stakes justify the overhead. If the answer is going to redirect a sprint, change an architecture, or kill a feature, four independent perspectives are cheaper than one wrong consensus.\n\u003c/p\u003e\n\u003cp\u003eYou suspect anchoring is likely. If one person on the team has strong opinions and tends to speak first, or if the team has a recent experience that's likely to dominate their framing, isolation is protective.\n\u003c/p\u003e\n\u003cp\u003eWith my agent team, it's hard not to dominate. I'm the source of all of the original ideas, after all, whatever that means. Plus, I have the final say. I can always put my thumb on the scale. The last thing I need to do is stifle other perspectives right off the bat. Speaking last gets me the most comprehensive feedback.\n\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Archaeological Debugging — when \"implementation already exists\" turns a build day into a dig.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhen was the last time your team agreed too quickly? What would have happened if everyone had written their answer before anyone spoke?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The No-Anchoring Roundtable\",\"excerpt\":\"March 14 I has this sudden instinct we'd been building the system backwards. I wanted to ask my agent team and get honest answers. This is not a small question. It's the kind of question where the first one to speak shapes how everyone else thinks about it. I made sure nobody spoke first. I sent ...\",\"url\":\"/blog/the-no-anchoring-roundtable\",\"slug\":\"the-no-anchoring-roundtable\",\"publishedAt\":\"Apr 11, 2026\",\"publishedAtISO\":\"2026-04-11T00:00:00.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"blog-first-ef26c0915e4c\",\"featuredImage\":\"/assets/blog-images/ai-roundtable.webp\",\"thumbnail\":\"/assets/blog-images/ai-roundtable.webp\",\"category\":\"insight\",\"cluster\":\"2026-04-11\",\"workDate\":\"Mar 14, 2026\",\"workDateISO\":\"2026-03-14T00:00:00.000Z\",\"chatDate\":\"3/14/2026\",\"featured\":false},\"content\":{\"title\":\"The No-Anchoring Roundtable\",\"subtitle\":\"\",\"content\":\"$1b\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n
