l,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-ab0210ff8c4483f5.js\"],\"BlogPostContent\"]\n1a:T27d5,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eApril 17, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eI gave a Friday morning talk at the \u003ca href=\"https://www.theiaconference.com/\"\u003eInformation Architecture Conference\u003c/a\u003e in Philadelphia called \u003ca href=\"https://docs.google.com/presentation/d/1sU2v3g_yPQB9QIvgl8aYA47FiP-GmDiCtebgKTOiDU8/edit?slide=id.g3d68ddc1283_0_61#slide=id.g3d68ddc1283_0_61\"\u003e\u003cem\u003eEthics as Information Architecture\u003c/em\u003e\u003c/a\u003e. The premise is that ethics-as-afterthought (content moderation, terms of service, warnings bolted onto a finished system) is the guardrail at the cliff edge, while ethics-as-architecture is the road that doesn't go to the cliff.\u003c/p\u003e\n\u003cp\u003eAt about the same time the talk was starting on the East Coast, the Chief Innovation Officer agent was opening a session on the West Coast and beginning the M1 methodology audit.\u003c/p\u003e\n\u003ch1\u003eWhat I was telling the room\u003c/h1\u003e\n\u003cp\u003eAs a key slide in my talk puts it, \u003cem\u003eStructure determines possibility.\u003c/em\u003e That phrase shouldn't sound radical to information architects, who have spent careers organizing information so that some actions are possible and others aren't. It can sound radical, apparently, to conversations about the ethical implications (and obligations) of artificial intelligence, a field which still tends to treat ethical behavior as something you check for after the model has already produced an output.\u003c/p\u003e\n\u003cp\u003e(To be fair, just today I see via Frank Spillers \u003ca href=\"https://www.linkedin.com/posts/frankspillers_inclusive-ai-guardrails-flipped-masterclass-activity-7459935930544553986-4J1Z?utm_source=share\u0026utm_medium=member_desktop\u0026rcm=ACoAAAAADvsBaOJEGYBmcTMomKi6T3LWgmSK1pk\"\u003ethe work Anthropic has published\u003c/a\u003e about teaching Claude ethics as part of its training.)\u003c/p\u003e\n\u003cp\u003eThe argument goes like this: If you treat ethics as a feature you add at the interface, if your ethical toolkit consists of a content-moderation pass, a refusal template, a warning banner, then your protections live in the part of the system that's easiest to circumvent. Anyone with a jailbreak prompt can route around interface-level enforcement. Anyone with sufficient business pressure can quietly weaken it. The architecture itself doesn't care.\u003c/p\u003e\n\u003cp\u003eBut if you put your ethical principles in the \u003cem\u003estructure\u003c/em\u003e of the system, in how information flows, in what categories of input get routed where, in which contexts can produce which kinds of output, then the unsafe outcomes don't get prevented at the last second by a content filter. They become structurally unreachable. Not prohibited. \u003cem\u003eArchitecturally impossible.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThis is the insight that information architects already understand. The point of the talk was that AI ethics needs IA wisdom and experience.\u003c/p\u003e\n\u003cp\u003eI have been part of the IA community for a long time. Nobody at this conference loved how three-quarters of the talks this year were about AI (not even me!), with everyone having serious ethical qualms about, at the very least, how commercial AI is being marketed to the public by the broligarchy. Folks did acknowledge that the conference has always addressed the dominant topics of the day whether they be tagging, org design, or mobile.\u003c/p\u003e\n\u003cp\u003eMy feeling in the room that day, and from what I heard over the next day, was that people needed to hear this, and that some felt empowered, if not reassured. (Jorge Arango, a friend and talented IA who has spent more time learning how to wrangle AI for managing information than anyone else I know, did tell me he wished I had given some examples of how Piper Morgan would decline an ethically unacceptable request and I had to admit that I was still building this module (it literally shipped the next week, and I did promise to blog about it, so that should show up in about a month.))\u003c/p\u003e\n\u003ch1\u003eMeanwhile, back at the process audit...\u003c/h1\u003e\n\u003cp\u003eWhile I was in front of the IAC room, the CIO agent was reading two documents in sequence. The first was the Excellence Flywheel archaeology that Documentation Management (\"Docs\") had produced the day before. It found such things as eight distinct formulations of the same idea across nine months, three evolving structural families (a causal loop, a checklist of pillars, a mnemonic of verbs), plus a partly completed Python implementation that matched none of them.\u003c/p\u003e\n\u003cp\u003eThe second report was Piper Alpha's reference audit. (Piper A is my actual product assistant on the Piper Morgan project and they also operate as a working prototype of Piper Morgan as well as a benchmark in that until Piper M can outperform Piper A it hasn't really begun to \"break even\" yet).\u003c/p\u003e\n\u003cp\u003ePiper's audit surveyed which methodology documents had actually been cited in session logs over the audit window, an indicator that they had been consulted or at least recalled in summary during development work or in leadership decisions (although somewhat dependent on logging discipline).\u003c/p\u003e\n\u003cp\u003eOf the 22 numbered methodology documents in the canonical directory, only two had been cited by name. The other 20 had appeared zero times in 128 session logs reviewed, covering 27 days. The Excellence Flywheel's \"mandatory reading\" canonical document was one of the silent twenty.\u003c/p\u003e\n\u003cp\u003eThe CIO's audit, when it landed late that afternoon, opened with:\u003c/p\u003e\n\u003cblockquote\u003e\u003cp\u003e\u003cem\u003eThe methodology is strong where it matters most: in catching real failures, coordinating multi-agent work, and producing transferable innovations. It is weak where it has always been weak: in maintaining its own documentation.\u003c/em\u003e\u003c/p\u003e\u003c/blockquote\u003e\n\u003cp\u003eAnd underneath it:\u003c/p\u003e\n\u003cblockquote\u003e\u003cp\u003e\u003cem\u003eThe concept is alive. The documentation is dead.\u003c/em\u003e\u003c/p\u003e\u003c/blockquote\u003e\n\u003cp\u003eThe audit's first major piece of work was a reformulation of the Excellence Flywheel into three layers.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eConcept\u003c/em\u003e — the underlying causal loop where systematic preparation compounds into faster execution which produces higher quality which buys back more capacity for systematic preparation.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003ePractices\u003c/em\u003e — the actual disciplines we apply, currently five, including a new one named for the day.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eMnemonics\u003c/em\u003e — per-role compact recalls, each citing the canonical practice list rather than paraphrasing it.\u003c/p\u003e\n\u003cp\u003eCIO also added a new practice, \u003cem\u003eaudit the composition\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eIt's the formalized version of \u003ca href=\"https://github.com/mediajunkie/piper-morgan-product/blob/main/docs/internal/architecture/current/patterns/pattern-062-assembly-assumption.md\"\u003ePattern-062 (the Assembly Assumption)\u003c/a\u003e: individually-correct components composing into collectively-incomplete outcomes. The pattern had been operational for months. The audit promoted it from pattern to practice.\u003c/p\u003e\n\u003ch1\u003eArchitecture as practice\u003c/h1\u003e\n\u003cp\u003eThe talk's argument was: principles that live only in the interface layer are fragile. Principles that live in the architecture are durable.\u003c/p\u003e\n\u003cp\u003eThe audit's finding was: principles that live only in the documentation layer are fragile. Principles that live in the actual practice — the mailbox protocols, the handoff memos, the gate methodology, the omnibus synthesis discipline — are durable.\u003c/p\u003e\n\u003cp\u003eRiding the Acela down to D.C. to see my Mom that Sunday, it struck me that the argument and the finding have a lot in common. Maybe it's just the way my mind always tries to find analogies, but to me the common thread is that the core commitments, practices, and actual operational mechanism matter most, and any governance, auditing, tracking or correction (as necessary as such things are) is inherently secondary and reactive.\u003c/p\u003e\n\u003cp\u003eThe Excellence Flywheel was alive in practice (we were running it constantly — every gate review, every audit, every \"verify before building\" callback) and dead in documentation (the canonical doc had drifted into eight different shapes nobody read). The methodology was operating exactly the way the talk argued ethics should operate: structurally, not as a layer you check against. That's why it worked. And it worked even though the formal documentation had decayed.\u003c/p\u003e\n\u003cp\u003eBut the documentation decay isn't trivial either. Eight formulations mean eight slightly different things being said when someone tries to import the concept somewhere else. Documentation is how a structural principle gets \u003cem\u003etransferred\u003c/em\u003e to a new context — to a new team, a new project, a new role. Documentation that has drifted is documentation that mis-transmits. The architecture survives in the place where it was built; the principle dilutes when it tries to travel.\u003c/p\u003e\n\u003cp\u003eIt was time to tighten up the architecture of my operating model (again).\u003c/p\u003e\n\u003ch1\u003eThe two halves of the same job\u003c/h1\u003e\n\u003cp\u003eSo here's where I landed by the end of the day.\u003c/p\u003e\n\u003cp\u003eIf you want a principle to be durable in the system you're working on right now, put it in the architecture. The methodology has been doing this correctly: the gate methodology, the mailbox protocols, the handoff memo template are all structural, and they survive sessions and migrations and personnel changes because they're \u003cem\u003ebuilt right in\u003c/em\u003e, not advisory.\u003c/p\u003e\n\u003cp\u003eIf you want a principle to \u003cem\u003etravel\u003c/em\u003e, to land in another context with its meaning intact, you also have to maintain its documentation. The talk traveled to a room of two hundred information architects. The Flywheel hasn't really gone anywhere because its documentation had eight different shapes, no single voice or story.\u003c/p\u003e\n\u003cp\u003eTwo halves of the job: The architecture for durability. The documentation for portability. The audit had found us doing one well and the other badly, so now we'll try to do both at once: keep the practice operational, \u003cem\u003eand\u003c/em\u003e fix the doc so the practice can actually be exported.\u003c/p\u003e\n\u003cp\u003eWhen I logged onto wifi at my sister's home in D.C., the CIO's Flywheel reformulation was in my inbox.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: Same Failure, Six Agents, Ninety Minutes — that Sunday morning, April 19, when six leadership reviews inherited the same source-set gap, and we caught it before lunch.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your work is the principle alive in practice but dead in documentation? And — separately — where is the documentation pristine but the principle never actually applied?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Audit and Talk\",\"guid\":\"blog-first-606453f1c577\",\"url\":\"/blog/audit-and-talk\",\"publishedAt\":\"May 12, 2026\",\"workDate\":\"Apr 17, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/audit-and-talk.webp\",\"imageAlt\":\"Cross-section cartoon of glowing AI beings maintaining a hidden routing machine beneath a fragile cliffside roadway full of warning barriers and drifting mismatched diagrams, showing structure quietly preventing unsafe paths before they can be reached.\",\"imageCaption\":\"Safety first!\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"Audit and Talk\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Audit and Talk | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"April 17, 2026 I gave a Friday morning talk at the Information Architecture Conference in Philadelphia called Ethics as Information Architecture. The premise is that ethics-as-afterthought (content moderation, terms of service, warnings bolted onto a finished system) is the guardrail at the cliff...\"}],[\"$\",\"meta\",\"2\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"3\",{\"name\":\"keywords
