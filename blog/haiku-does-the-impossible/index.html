mplateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T4a99,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"Two robots take a test. One is writing a huge long scroll while the smaller one has written a brief haiku.\" src=\"https://cdn-images-1.medium.com/max/1024/1*I8AIbco7ogZM2cZCKQbJ0A.png\" /\u003e\u003cfigcaption\u003e“Dragonfly catcher, / How far have you gone today / In your wandering?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 25, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSaturday morning, 9:42 AM. Chief of Staff establishes production branch strategy. Four days to alpha launch. Final infrastructure work ahead.\u003c/p\u003e\u003cp\u003eTime to try some new tooling, right? Perfect time to do Haiku 4.5 cost optimization testing.\u003c/p\u003e\u003cp\u003eFor months, I had used Claude models for various roles to try to optimize cost efficiently:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eOpus 4.1\u003c/strong\u003e: Strategy, R\u0026amp;D, complex architectural decisions ($15 input, $75 output per million tokens)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eSonnet 4.0 and more recently 4.5\u003c/strong\u003e: Implementation, coordination, most daily work ($3 input, $15 output)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eHaiku 4\u003c/strong\u003e: never used this at all($0.25 input, $1.25 output)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eBut the new 4.5 Haiku model was out and Anthropic claimed it programs as well as Sonnet used. When Sonnet 4.5 came out a week or so ago it apparently became a much “better” programmer, able to do more nuanced analysis and planning that you might have asked Opus to tackle in the past.\u003c/p\u003e\u003cp\u003eIn fact, I need to consider whether my next Chief Architect chat can be based on the Sonnet 4.5 model instead of Opus 4.1. I already worked with a Sonnet Chief by accident a while back and it seemed to do just fine.\u003c/p\u003e\u003cp\u003eIt may even be that I don’t really need Opus much at all for this project, as I am not doing astrophysics here, you know.\u003c/p\u003e\u003cp\u003eBut more to the point, if Haiku 4.5 can now program as well as Sonnet 4.0 could (who wrote most of my codebase) for a third of the cost, well then not only do I want to use Haiku as much as possible, but I’ll want Piper Morgan to do so as well (and to generally be savvy about surfing the model/cost gradient efficiently over time).\u003c/p\u003e\u003ch3\u003eTesting a new model\u003c/h3\u003e\u003cp\u003eThen October 24, the Chief Architect offered a few options for a test protocol. We agreed that getting the work done was the highest priority, and that a test did not need to be scientifically redundant to give us useful insights.\u003c/p\u003e\u003cp\u003eWe agreed: Use Haiku on real Sprint A8 work. STOP conditions for safety. Historical baseline for comparison. Value regardless of test results.\u003c/p\u003e\u003cp\u003eWe lined up the tasks in escalating order of complexity to see if we could find where Sonnet altered: #274 (smoke test hooks), #268 (key storage validation), #269 (personality integration), #271 (cost tracking), and then #278 (knowledge graph enhancement), true architectural work!\u003c/p\u003e\u003cp\u003eSPOILER: By 6:45 PM: Issue #278 complete. Haiku delivered architectural enhancement in ~4 hours. Beat time estimate. Production-ready code. All 40 tests passing. Zero regressions.\u003c/p\u003e\u003cp\u003eCost: ~$2 versus ~$15 for Sonnet.\u003c/p\u003e\u003cp\u003eHaiku surprised us and encouraged us about the economics of AI-assisted development.\u003c/p\u003e\u003cp\u003eThe assumption: Architectural work requires expensive models. Knowledge graph enhancement with relationship reasoning and intent classification integration? Obviously Sonnet minimum, maybe Opus.\u003c/p\u003e\u003cp\u003eSaturday proved this assumption wrong.\u003c/p\u003e\u003ch3\u003eThe work-first testing protocol\u003c/h3\u003e\u003cp\u003eOctober 24, the Haiku test protocol emerged from PM decision-making:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhilosophy\u003c/strong\u003e: Don’t test in isolation. Use real Sprint A8 work. Collect data while making progress. Value regardless of test results.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTask selection\u003c/strong\u003e (in complexity order):\u003c/p\u003e\u003col\u003e\u003cli\u003eTEST-SMOKE-HOOKS: Simple, 30 min estimate\u003c/li\u003e\u003cli\u003eCORE-KEYS-STORAGE-VALIDATION: Simple, 30 min\u003c/li\u003e\u003cli\u003eCORE-PREF-PERSONALITY-INTEGRATION: Medium, 45 min\u003c/li\u003e\u003cli\u003eCORE-KEYS-COST-TRACKING: Medium, 60 min\u003c/li\u003e\u003cli\u003eCORE-KNOW-ENHANCE: Complex, 2–3 hours (likely Sonnet)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cstrong\u003eSTOP conditions\u003c/strong\u003e (safety guardrails):\u003c/p\u003e\u003cul\u003e\u003cli\u003eTwo consecutive failures\u003c/li\u003e\u003cli\u003eBreaking test suite\u003c/li\u003e\u003cli\u003eArchitectural confusion\u003c/li\u003e\u003cli\u003e30-minute stall without progress\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eDecision matrix\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003e90%+ success → Switch to Haiku default\u003c/li\u003e\u003cli\u003e70–89% success → Hybrid routing\u003c/li\u003e\u003cli\u003e\u0026lt;50% success → Stay with Sonnet\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe protocol balanced experimentation with progress: Work gets done regardless. Data collected naturally. Safety conditions prevent runaway costs or quality degradation.\u003c/p\u003e\u003cp\u003eThis approach enabled Saturday’s discoveries: Real work under real constraints with real deadlines. Not artificial test scenarios. Actual production requirements.\u003c/p\u003e\u003ch3\u003eThe simple tasks: Proof of concept\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e10:47 AM — Issue #274\u003c/strong\u003e: Smoke test pre-commit hooks\u003c/p\u003e\u003cp\u003eThis was supposed to be Haiku’s first attempt, a gimme, but the PM (me) screwed up, and forgot to change Claude Code’s model from Sonnet to Haiku before doing the simple configuration work. Code added smoke tests to .pre-commit-config.yaml. Updated documentation. Tested execution.\u003c/p\u003e\u003cp\u003eNot part of the test after all. For the record, Sonnet got it all right on the first try.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e11:06 AM — Issue #268\u003c/strong\u003e: API key storage validation\u003c/p\u003e\u003cp\u003eSecurity validation logic. Key strength requirements. Rotation reminder scheduling. Error handling.\u003c/p\u003e\u003cp\u003eDuration: 19 minutes\u003c/p\u003e\u003cp\u003eCost: ~$1 versus ~$7\u003c/p\u003e\u003cp\u003eResult: ✅ Production-ready, comprehensive validation\u003c/p\u003e\u003cp\u003eCost savings: 75–85% versus Sonnet. Quality: Identical.\u003c/p\u003e\u003ch3\u003eThe medium tasks: Capability expansion\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e11:25 AM — Issue #269\u003c/strong\u003e: Personality preference integration\u003c/p\u003e\u003cp\u003eHere’s where it got interesting. Connect Sprint A7 questionnaire (5 dimensions) with Sprint A5 PersonalityProfile (4 dimensions). Architecture mismatch discovered during implementation.\u003c/p\u003e\u003cp\u003eHaiku’s response: Create semantic bridge. Map 5 dimensions → 4 dimensions intelligently. Implement graceful degradation. Test all mappings. Document limitation.\u003c/p\u003e\u003cp\u003eDuration: 6 minutes\u003c/p\u003e\u003cp\u003eResult: ✅ Discovered divergence, implemented working solution\u003c/p\u003e\u003cp\u003eDecision: Accept bridge for alpha, refactor post-MVP\u003c/p\u003e\u003cp\u003eThis was the first signal: Haiku wasn’t just following instructions. It was making architectural decisions. “These two systems don’t match, so I’ll create semantic bridge” is architecture thinking, not configuration work.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e12:09 PM — Issue #271\u003c/strong\u003e: API cost tracking and analytics\u003c/p\u003e\u003cp\u003eCost-estimation service. Usage analytics. Historical tracking. Multi-provider support. Comprehensive testing.\u003c/p\u003e\u003cp\u003eDuration: 15 minutes\u003c/p\u003e\u003cp\u003eCost: ~$1.50 versus ~$10 Sonnet\u003c/p\u003e\u003cp\u003eResult: ✅ Full cost tracking system, production-ready\u003c/p\u003e\u003cp\u003eMedium complexity task. Multiple services integration. Business logic. Error handling. Haiku handled it faster than estimated, cleaner than expected.\u003c/p\u003e\u003cp\u003eThe pattern emerging: Haiku exceeding expectations on every task. Not just “good enough” but “production-grade quality at fraction of cost.”\u003c/p\u003e\u003ch3\u003eThe architectural task: Breaking assumptions\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003e1:59 PM — Issue #278\u003c/strong\u003e: Knowledge graph enhancement with reasoning chains\u003c/p\u003e\u003cp\u003eThis was supposed to be the Sonnet 4.5 task. We assumed Haiku would top out before this A\\architectural work:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRequirements\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eAdd 8 new edge types for causal reasoning (CAUSES, ENABLES, PREVENTS, etc.)\u003c/li\u003e\u003cli\u003eImplement 3 new methods: build_reasoning_chains(), extract_reasoning_chains(), get_relevant_context()\u003c/li\u003e\u003cli\u003eIntegrate graph context into intent classification\u003c/li\u003e\u003cli\u003eEnhance confidence weighting with relationship strength\u003c/li\u003e\u003cli\u003eCreate 40 comprehensive tests covering all reasoning patterns\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eComplexity factors\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eMultiple services coordination (KnowledgeGraphService + IntentClassifier)\u003c/li\u003e\u003cli\u003eNew architectural patterns (reasoning chains as graph traversal)\u003c/li\u003e\u003cli\u003eComplex algorithm implementation (confidence propagation through relationships)\u003c/li\u003e\u003cli\u003eExtensive testing requirements (40 tests across multiple dimensions)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThis isn’t “wire two things together.” This is “design how two systems collaborate using new patterns.”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase −1 Discovery\u003c/strong\u003e (30 minutes): Architectural reconnaissance. Understand existing graph structure. Analyze intent classification integration points. Design reasoning chain approach. Identify test requirements.\u003c/p\u003e\u003cp\u003eDiscovery was thorough. Not “guess and implement.” Full architectural analysis before code changes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 1–2 Implementation\u003c/strong\u003e (45 minutes): Enhanced EdgeType enum with 8 new types. Added confidence weighting to domain models. Implemented reasoning chain builders with graph traversal algorithms.\u003c/p\u003e\u003cp\u003eCode quality: Production-grade. Not hacks. Not shortcuts. Proper async implementation. Comprehensive error handling. Clean abstractions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 3–4 Implementation\u003c/strong\u003e (45 minutes): Integrated graph context into intent classifier. Added three helper methods. Implemented graceful degradation if service unavailable. Wired everything together cleanly.\u003c/p\u003e\u003cp\u003eIntegration quality: Proper dependency injection. Clean interfaces. Testable design. Mature engineering patterns.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 5 Testing\u003c/strong\u003e (45 minutes): Created 40 comprehensive tests. Edge type validation. Reasoning chain extraction. Context enrichment. Confidence propagation. All patterns covered.\u003c/p\u003e\u003cp\u003eTest quality: Not stubs. Full integration tests. Real scenarios. Edge cases included.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6:45 PM — Issue #278 Complete\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eDuration: ~4 hours total (beat estimate)\u003c/li\u003e\u003cli\u003eCost: ~$2 versus ~$15 Sonnet\u003c/li\u003e\u003cli\u003eQuality: Production-ready, zero regressions\u003c/li\u003e\u003cli\u003eTests: 40/40 passing\u003c/li\u003e\u003cli\u003eGit commit: Clean, well-documented, properly formatted\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eHaiku did architectural work. Not just “adequate” but “excellent.”\u003c/p\u003e\u003ch3\u003eThe warts and all: When things weren’t perfect\u003c/h3\u003e\u003cp\u003eSaturday wasn’t flawless execution. Three moments showed the reality behind the wins:\u003c/p\u003e\u003ch4\u003eThe smoke test validation (morning)\u003c/h4\u003e\u003cp\u003eProduction branch push blocked by pre-commit hook. Import error: ProgressTracker missing from loading_states.py\u003c/p\u003e\u003cp\u003eRoot cause: OrchestrationEngine importing from wrong location. Should be web.utils.streaming_responses not services.ui_messages.loading_states.\u003c/p\u003e\u003cp\u003eDuration to fix: 25 minutes (investigation + correction)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe lesson\u003c/strong\u003e: Smoke test infrastructure worked exactly as designed. Caught real issue before production deployment. Infrastructure validation happening automatically.\u003c/p\u003e\u003cp\u003eNot a failure. A success. The system caught problems before they became production issues. That’s what testing infrastructure is supposed to do.\u003c/p\u003e\u003ch4\u003eThe security incident (afternoon)\u003c/h4\u003e\u003cp\u003eGitHub secret scanning detected hardcoded token in scripts/approve-pr.sh.\u003c/p\u003e\u003cp\u003eImmediate action: Replace with environment variable. But that only fixed going forward. Token still existed in git history. 629 commits. Entire repository.\u003c/p\u003e\u003cp\u003eResponse: git filter-branch to rewrite history. Remove secret from all commits. Clean version pushed to multiple branches.\u003c/p\u003e\u003cp\u003eDuration: 2 hours (investigation + rewrite + verification)\u003cbr\u003e Scope: 629 commits processed\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe lesson\u003c/strong\u003e: Security-first culture working. Detected issue. Responded immediately. Cleaned history thoroughly. Proper remediation, not band-aids.\u003c/p\u003e\u003cp\u003eCould have just fixed going forward. Could have revoked token and moved on. Instead: Complete cleanup. No compromises on security.\u003c/p\u003e\u003ch4\u003eThe personality architecture mismatch (mid-day)\u003c/h4\u003e\u003cp\u003eIssue #269 revealed divergence: Sprint A7 questionnaire has 5 dimensions. Sprint A5 PersonalityProfile has 4 dimensions.\u003c/p\u003e\u003cp\u003eThis wasn’t bug. This was architectural drift. Two sprints, two slightly different designs, never reconciled.\u003c/p\u003e\u003cp\u003eHaiku’s solution: Semantic bridge. Map 5 → 4 intelligently. Document the gap. Suggest post-MVP refactor.\u003c/p\u003e\u003cp\u003eDecision: Accept bridge for alpha. Refactor properly later.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe lesson\u003c/strong\u003e: Real systems have real technical debt. Pragmatic decisions acknowledge gaps while delivering value. Perfect is enemy of shipped.\u003c/p\u003e\u003cp\u003eThe bridge works. Tests pass. Users won’t notice. Post-alpha, we’ll unify the designs properly. For now: Ship.\u003c/p\u003e\u003cp\u003eThese three moments — import error, security incident, architecture mismatch — show real development. Not “everything was perfect.” But “problems were caught, addressed appropriately, and moved forward.”\u003c/p\u003e\u003ch3\u003eWhat Haiku performance actually means\u003c/h3\u003e\u003cp\u003eSaturday’s results weren’t just “Haiku can do more than we thought.” They reshape the entire economics of AI-assisted development.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePrevious workflow\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSonnet: Most implementation (~90% of work)\u003c/li\u003e\u003cli\u003eOpus: Architecture and strategy (~10% of work)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003ePotential workflow\u003c/strong\u003e (post-Saturday):\u003c/p\u003e\u003cul\u003e\u003cli\u003eHaiku: Most implementation (~90% of work)\u003c/li\u003e\u003cli\u003eSonnet: Complex debugging and coordination (~8% of work)\u003c/li\u003e\u003cli\u003eOpus: R\u0026amp;D and high-level strategy (~2% of work)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe implications extend beyond Piper Morgan:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFor solo developers\u003c/strong\u003e: Haiku makes AI-assisted development 10x more affordable. Projects that would cost $100/month in Sonnet could cost $10/month in Haiku.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFor teams\u003c/strong\u003e: Work previously requiring Sonnet-powered teammates can use Haiku-powered successors. Sonnet moves to coordination roles. Opus focuses on pure R\u0026amp;D.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFor cost-sensitive projects\u003c/strong\u003e: AI assistance becomes viable for projects where $1000/month API costs were prohibitive but $150/month is reasonable.\u003c/p\u003e\u003ch3\u003eThe verification that mattered\u003c/h3\u003e\u003cp\u003eSaturday delivered five issues. All production-ready. Zero regressions. 100% test coverage.\u003c/p\u003e\u003cp\u003eBut the real verification came from what \u003cem\u003edidn’t\u003c/em\u003e happen:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNo STOP conditions triggered\u003c/strong\u003e: Zero escalations to Sonnet. Zero architectural confusion. Zero 30-minute stalls. Haiku completed everything confidently.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNo quality compromises\u003c/strong\u003e: Tests passed. Code quality excellent. Documentation thorough. No shortcuts, no hacks, no technical debt.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNo rework needed\u003c/strong\u003e: Every issue delivered right first time. No “we’ll fix this later.” No “good enough for alpha.” Production-grade quality throughout.\u003c/p\u003e\u003cp\u003eThe work-first protocol proved itself: Real work under real constraints provided real validation. Not artificial tests but actual production requirements.\u003c/p\u003e\u003cp\u003eAnd Haiku proved itself: Not just “adequate for simple tasks” but “excellent for architectural work.”\u003c/p\u003e\u003ch3\u003eThe Monday implications\u003c/h3\u003e\u003cp\u003eSaturday’s discoveries reshape work allocation going forward.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImmediate changes\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eDefault to Haiku for all implementation work\u003c/li\u003e\u003cli\u003eReserve Sonnet for complex debugging and multi-agent coordination\u003c/li\u003e\u003cli\u003eKeep Opus for strategic R\u0026amp;D and architectural decision-making\u003c/li\u003e\u003cli\u003eExpect 75–85% cost reduction while maintaining quality\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eLonger-term implications\u003c/strong\u003e:\u003c/p\u003e\u003cul\u003e\u003cli\u003eTeammates currently using Sonnet 4.0 can likely use Haiku 4.5 successors\u003c/li\u003e\u003cli\u003eChief Architect and Chief of Staff roles can likely use Sonnet 4.5 instead of Opus\u003c/li\u003e\u003cli\u003eOpus instances focus on pure R\u0026amp;D and high-level strategy\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong\u003eThe capability recognition\u003c/strong\u003e: Haiku 4.5 isn’t “Haiku 4 but faster.” It’s “Sonnet 4 capabilities at Haiku pricing.”\u003c/p\u003e\u003cp\u003eThis changes everything about AI-assisted development economics. Not incremental improvement. Order-of-magnitude cost reduction while maintaining (or improving) quality.\u003c/p\u003e\u003ch3\u003eThe systematic discovery pattern\u003c/h3\u003e\u003cp\u003eSaturday’s Haiku success wasn’t accident. It was methodology working:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase −1 Discovery\u003c/strong\u003e: Every issue started with architectural reconnaissance. Understand existing systems. Analyze integration points. Design approach. Identify requirements. 30 minutes invested in understanding before implementation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvidence-based implementation\u003c/strong\u003e: No guessing. No assumptions. Every decision backed by discovery findings. Clean code from understanding, not from trial-and-error.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eComprehensive testing\u003c/strong\u003e: Not “tests that pass” but “tests that validate.” Real scenarios. Edge cases. Integration patterns. Evidence that code works as designed.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVerification discipline\u003c/strong\u003e: Issues claimed complete only when evidence provided. Terminal output. Test results. Git commits. No “I think it works.”\u003c/p\u003e\u003cp\u003eThe methodology enables the model. Or the model enables the methodology. Or they compound: Good process + capable model = exceptional results.\u003c/p\u003e\u003cp\u003eSaturday proved the compound effect works: Haiku 4.5 + verification-first methodology + work-first testing = architectural work at fraction of cost.\u003c/p\u003e\u003ch3\u003eDeploying models intelligently\u003c/h3\u003e\u003cp\u003eFive issues delivered Saturday. Technical achievement: Significant. Cost savings: Substantial. Alpha readiness: Advanced.\u003c/p\u003e\u003cp\u003eBefore Saturday: “Architectural work requires expensive models” After Saturday: “Haiku can handle architectural work at 85–90% cost savings”\u003c/p\u003e\u003cp\u003eThis discovery reshapes:\u003c/p\u003e\u003cul\u003e\u003cli\u003eHow we allocate model costs going forward\u003c/li\u003e\u003cli\u003eWhat work gets assigned to which models\u003c/li\u003e\u003cli\u003eTeam composition (who uses which models)\u003c/li\u003e\u003cli\u003eProject economics (cost per sprint)\u003c/li\u003e\u003cli\u003eWhat’s viable for cost-sensitive projects\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe methodology that discovered itself strikes again: Work reveals capabilities. Evidence updates assumptions. Better understanding enables better decisions. The spiral continues.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext up in the Building Piper Morgan narrative: The Discovery Testing Philosophy, where we shift from “prove everything works” to “discover what actually works” but first it’s time for another weekend reflecting on insights gleaned from AI-assisted software development, starting with “The Archaeology of Accumulated Files: How Documentation Debt Nearly Buried the Project”\u003c/em\u003e \u003cem\u003efrom September 19.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you tested your AI model assumptions against real work? What capabilities might you be underestimating based on outdated hierarchies?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=488b596f3048\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/haiku-does-the-impossible-architectural-work-at-fraction-of-cost-488b596f3048\"\u003eHaiku Does the Impossible: Architectural Work at Fraction of Cost\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T76f7,"])</script><script>self.__next_f.push([1,"\u003csection name=\"30dd\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"0f41\" id=\"0f41\" class=\"graf graf--h3 graf--leading graf--title\"\u003eHaiku Does the Impossible: Architectural Work at Fraction of Cost\u003c/h3\u003e\u003cfigure name=\"e6c4\" id=\"e6c4\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*I8AIbco7ogZM2cZCKQbJ0A.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"Two robots take a test. One is writing a huge long scroll while the smaller one has written a brief haiku.\" src=\"https://cdn-images-1.medium.com/max/800/1*I8AIbco7ogZM2cZCKQbJ0A.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Dragonfly catcher, / How far have you gone today / In your wandering?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"e4f2\" id=\"e4f2\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 25, 2025\u003c/em\u003e\u003c/p\u003e\u003cp name=\"192d\" id=\"192d\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eS\u003c/span\u003eaturday morning, 9:42 AM. Chief of Staff establishes production branch strategy. Four days to alpha launch. Final infrastructure work ahead.\u003c/p\u003e\u003cp name=\"2195\" id=\"2195\" class=\"graf graf--p graf-after--p\"\u003eTime to try some new tooling, right? Perfect time to do Haiku 4.5 cost optimization testing.\u003c/p\u003e\u003cp name=\"3186\" id=\"3186\" class=\"graf graf--p graf-after--p\"\u003eFor months, I had used Claude models for various roles to try to optimize cost efficiently:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"6b00\" id=\"6b00\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eOpus 4.1\u003c/strong\u003e: Strategy, R\u0026amp;D, complex architectural decisions ($15 input, $75 output per million tokens)\u003c/li\u003e\u003cli name=\"ea92\" id=\"ea92\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eSonnet 4.0 and more recently 4.5\u003c/strong\u003e: Implementation, coordination, most daily work ($3 input, $15 output)\u003c/li\u003e\u003cli name=\"8395\" id=\"8395\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eHaiku 4\u003c/strong\u003e: never used this at all($0.25 input, $1.25 output)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"631c\" id=\"631c\" class=\"graf graf--p graf-after--li\"\u003eBut the new 4.5 Haiku model was out and Anthropic claimed it programs as well as Sonnet used. When Sonnet 4.5 came out a week or so ago it apparently became a much “better” programmer, able to do more nuanced analysis and planning that you might have asked Opus to tackle in the past.\u003c/p\u003e\u003cp name=\"04f9\" id=\"04f9\" class=\"graf graf--p graf-after--p\"\u003eIn fact, I need to consider whether my next Chief Architect chat can be based on the Sonnet 4.5 model instead of Opus 4.1. I already worked with a Sonnet Chief by accident a while back and it seemed to do just fine.\u003c/p\u003e\u003cp name=\"10a7\" id=\"10a7\" class=\"graf graf--p graf-after--p\"\u003eIt may even be that I don’t really need Opus much at all for this project, as I am not doing astrophysics here, you know.\u003c/p\u003e\u003cp name=\"17ce\" id=\"17ce\" class=\"graf graf--p graf-after--p\"\u003eBut more to the point, if Haiku 4.5 can now program as well as Sonnet 4.0 could (who wrote most of my codebase) for a third of the cost, well then not only do I want to use Haiku as much as possible, but I’ll want Piper Morgan to do so as well (and to generally be savvy about surfing the model/cost gradient efficiently over time).\u003c/p\u003e\u003ch3 name=\"527e\" id=\"527e\" class=\"graf graf--h3 graf-after--p\"\u003eTesting a new model\u003c/h3\u003e\u003cp name=\"44f2\" id=\"44f2\" class=\"graf graf--p graf-after--h3\"\u003eThen October 24, the Chief Architect offered a few options for a test protocol. We agreed that getting the work done was the highest priority, and that a test did not need to be scientifically redundant to give us useful insights.\u003c/p\u003e\u003cp name=\"2efc\" id=\"2efc\" class=\"graf graf--p graf-after--p\"\u003eWe agreed: Use Haiku on real Sprint A8 work. STOP conditions for safety. Historical baseline for comparison. Value regardless of test results.\u003c/p\u003e\u003cp name=\"8047\" id=\"8047\" class=\"graf graf--p graf-after--p\"\u003eWe lined up the tasks in escalating order of complexity to see if we could find where Sonnet altered: #274 (smoke test hooks), #268 (key storage validation), #269 (personality integration), #271 (cost tracking), and then #278 (knowledge graph enhancement), true architectural work!\u003c/p\u003e\u003cp name=\"d973\" id=\"d973\" class=\"graf graf--p graf-after--p\"\u003eSPOILER: By 6:45 PM: Issue #278 complete. Haiku delivered architectural enhancement in ~4 hours. Beat time estimate. Production-ready code. All 40 tests passing. Zero regressions.\u003c/p\u003e\u003cp name=\"1bab\" id=\"1bab\" class=\"graf graf--p graf-after--p\"\u003eCost: ~$2 versus ~$15 for Sonnet.\u003c/p\u003e\u003cp name=\"4b71\" id=\"4b71\" class=\"graf graf--p graf-after--p\"\u003eHaiku surprised us and encouraged us about the economics of AI-assisted development.\u003c/p\u003e\u003cp name=\"d4e4\" id=\"d4e4\" class=\"graf graf--p graf-after--p\"\u003eThe assumption: Architectural work requires expensive models. Knowledge graph enhancement with relationship reasoning and intent classification integration? Obviously Sonnet minimum, maybe Opus.\u003c/p\u003e\u003cp name=\"fd44\" id=\"fd44\" class=\"graf graf--p graf-after--p\"\u003eSaturday proved this assumption wrong.\u003c/p\u003e\u003ch3 name=\"b8f2\" id=\"b8f2\" class=\"graf graf--h3 graf-after--p\"\u003eThe work-first testing protocol\u003c/h3\u003e\u003cp name=\"76d0\" id=\"76d0\" class=\"graf graf--p graf-after--h3\"\u003eOctober 24, the Haiku test protocol emerged from PM decision-making:\u003c/p\u003e\u003cp name=\"499c\" id=\"499c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhilosophy\u003c/strong\u003e: Don’t test in isolation. Use real Sprint A8 work. Collect data while making progress. Value regardless of test results.\u003c/p\u003e\u003cp name=\"fe6c\" id=\"fe6c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTask selection\u003c/strong\u003e (in complexity order):\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"8a15\" id=\"8a15\" class=\"graf graf--li graf-after--p\"\u003eTEST-SMOKE-HOOKS: Simple, 30 min estimate\u003c/li\u003e\u003cli name=\"d167\" id=\"d167\" class=\"graf graf--li graf-after--li\"\u003eCORE-KEYS-STORAGE-VALIDATION: Simple, 30 min\u003c/li\u003e\u003cli name=\"8094\" id=\"8094\" class=\"graf graf--li graf-after--li\"\u003eCORE-PREF-PERSONALITY-INTEGRATION: Medium, 45 min\u003c/li\u003e\u003cli name=\"86a3\" id=\"86a3\" class=\"graf graf--li graf-after--li\"\u003eCORE-KEYS-COST-TRACKING: Medium, 60 min\u003c/li\u003e\u003cli name=\"4778\" id=\"4778\" class=\"graf graf--li graf-after--li\"\u003eCORE-KNOW-ENHANCE: Complex, 2–3 hours (likely Sonnet)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"1692\" id=\"1692\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eSTOP conditions\u003c/strong\u003e (safety guardrails):\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"d35f\" id=\"d35f\" class=\"graf graf--li graf-after--p\"\u003eTwo consecutive failures\u003c/li\u003e\u003cli name=\"10b6\" id=\"10b6\" class=\"graf graf--li graf-after--li\"\u003eBreaking test suite\u003c/li\u003e\u003cli name=\"1e13\" id=\"1e13\" class=\"graf graf--li graf-after--li\"\u003eArchitectural confusion\u003c/li\u003e\u003cli name=\"cbc9\" id=\"cbc9\" class=\"graf graf--li graf-after--li\"\u003e30-minute stall without progress\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"a1ee\" id=\"a1ee\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDecision matrix\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"6d97\" id=\"6d97\" class=\"graf graf--li graf-after--p\"\u003e90%+ success → Switch to Haiku default\u003c/li\u003e\u003cli name=\"3582\" id=\"3582\" class=\"graf graf--li graf-after--li\"\u003e70–89% success → Hybrid routing\u003c/li\u003e\u003cli name=\"cb0c\" id=\"cb0c\" class=\"graf graf--li graf-after--li\"\u003e\u0026lt;50% success → Stay with Sonnet\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"4ee7\" id=\"4ee7\" class=\"graf graf--p graf-after--li\"\u003eThe protocol balanced experimentation with progress: Work gets done regardless. Data collected naturally. Safety conditions prevent runaway costs or quality degradation.\u003c/p\u003e\u003cp name=\"17b5\" id=\"17b5\" class=\"graf graf--p graf-after--p\"\u003eThis approach enabled Saturday’s discoveries: Real work under real constraints with real deadlines. Not artificial test scenarios. Actual production requirements.\u003c/p\u003e\u003ch3 name=\"67de\" id=\"67de\" class=\"graf graf--h3 graf-after--p\"\u003eThe simple tasks: Proof of concept\u003c/h3\u003e\u003cp name=\"71b1\" id=\"71b1\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e10:47 AM — Issue #274\u003c/strong\u003e: Smoke test pre-commit hooks\u003c/p\u003e\u003cp name=\"83d7\" id=\"83d7\" class=\"graf graf--p graf-after--p\"\u003eThis was supposed to be Haiku’s first attempt, a gimme, but the PM (me) screwed up, and forgot to change Claude Code’s model from Sonnet to Haiku before doing the simple configuration work. Code added smoke tests to \u003ccode class=\"markup--code markup--p-code\"\u003e.pre-commit-config.yaml\u003c/code\u003e. Updated documentation. Tested execution.\u003c/p\u003e\u003cp name=\"caee\" id=\"caee\" class=\"graf graf--p graf-after--p\"\u003eNot part of the test after all. For the record, Sonnet got it all right on the first try.\u003c/p\u003e\u003cp name=\"37ea\" id=\"37ea\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e11:06 AM — Issue #268\u003c/strong\u003e: API key storage validation\u003c/p\u003e\u003cp name=\"789a\" id=\"789a\" class=\"graf graf--p graf-after--p\"\u003eSecurity validation logic. Key strength requirements. Rotation reminder scheduling. Error handling.\u003c/p\u003e\u003cp name=\"6ee2\" id=\"6ee2\" class=\"graf graf--p graf-after--p\"\u003eDuration: 19 minutes\u003c/p\u003e\u003cp name=\"d9b9\" id=\"d9b9\" class=\"graf graf--p graf-after--p\"\u003eCost: ~$1 versus ~$7\u003c/p\u003e\u003cp name=\"562c\" id=\"562c\" class=\"graf graf--p graf-after--p\"\u003eResult: ✅ Production-ready, comprehensive validation\u003c/p\u003e\u003cp name=\"8ba1\" id=\"8ba1\" class=\"graf graf--p graf-after--p\"\u003eCost savings: 75–85% versus Sonnet. Quality: Identical.\u003c/p\u003e\u003ch3 name=\"eca5\" id=\"eca5\" class=\"graf graf--h3 graf-after--p\"\u003eThe medium tasks: Capability expansion\u003c/h3\u003e\u003cp name=\"8b1b\" id=\"8b1b\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e11:25 AM — Issue #269\u003c/strong\u003e: Personality preference integration\u003c/p\u003e\u003cp name=\"c6c3\" id=\"c6c3\" class=\"graf graf--p graf-after--p\"\u003eHere’s where it got interesting. Connect Sprint A7 questionnaire (5 dimensions) with Sprint A5 PersonalityProfile (4 dimensions). Architecture mismatch discovered during implementation.\u003c/p\u003e\u003cp name=\"877a\" id=\"877a\" class=\"graf graf--p graf-after--p\"\u003eHaiku’s response: Create semantic bridge. Map 5 dimensions → 4 dimensions intelligently. Implement graceful degradation. Test all mappings. Document limitation.\u003c/p\u003e\u003cp name=\"4535\" id=\"4535\" class=\"graf graf--p graf-after--p\"\u003eDuration: 6 minutes\u003c/p\u003e\u003cp name=\"b08d\" id=\"b08d\" class=\"graf graf--p graf-after--p\"\u003eResult: ✅ Discovered divergence, implemented working solution\u003c/p\u003e\u003cp name=\"8e89\" id=\"8e89\" class=\"graf graf--p graf-after--p\"\u003eDecision: Accept bridge for alpha, refactor post-MVP\u003c/p\u003e\u003cp name=\"a9d3\" id=\"a9d3\" class=\"graf graf--p graf-after--p\"\u003eThis was the first signal: Haiku wasn’t just following instructions. It was making architectural decisions. “These two systems don’t match, so I’ll create semantic bridge” is architecture thinking, not configuration work.\u003c/p\u003e\u003cp name=\"a288\" id=\"a288\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e12:09 PM — Issue #271\u003c/strong\u003e: API cost tracking and analytics\u003c/p\u003e\u003cp name=\"9214\" id=\"9214\" class=\"graf graf--p graf-after--p\"\u003eCost-estimation service. Usage analytics. Historical tracking. Multi-provider support. Comprehensive testing.\u003c/p\u003e\u003cp name=\"a17e\" id=\"a17e\" class=\"graf graf--p graf-after--p\"\u003eDuration: 15 minutes\u003c/p\u003e\u003cp name=\"1695\" id=\"1695\" class=\"graf graf--p graf-after--p\"\u003eCost: ~$1.50 versus ~$10 Sonnet\u003c/p\u003e\u003cp name=\"a956\" id=\"a956\" class=\"graf graf--p graf-after--p\"\u003eResult: ✅ Full cost tracking system, production-ready\u003c/p\u003e\u003cp name=\"bf4d\" id=\"bf4d\" class=\"graf graf--p graf-after--p\"\u003eMedium complexity task. Multiple services integration. Business logic. Error handling. Haiku handled it faster than estimated, cleaner than expected.\u003c/p\u003e\u003cp name=\"9730\" id=\"9730\" class=\"graf graf--p graf-after--p\"\u003eThe pattern emerging: Haiku exceeding expectations on every task. Not just “good enough” but “production-grade quality at fraction of cost.”\u003c/p\u003e\u003ch3 name=\"93d0\" id=\"93d0\" class=\"graf graf--h3 graf-after--p\"\u003eThe architectural task: Breaking assumptions\u003c/h3\u003e\u003cp name=\"f91c\" id=\"f91c\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e1:59 PM — Issue #278\u003c/strong\u003e: Knowledge graph enhancement with reasoning chains\u003c/p\u003e\u003cp name=\"2f90\" id=\"2f90\" class=\"graf graf--p graf-after--p\"\u003eThis was supposed to be the Sonnet 4.5 task. We assumed Haiku would top out before this A\\architectural work:\u003c/p\u003e\u003cp name=\"e8c2\" id=\"e8c2\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eRequirements\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"b867\" id=\"b867\" class=\"graf graf--li graf-after--p\"\u003eAdd 8 new edge types for causal reasoning (CAUSES, ENABLES, PREVENTS, etc.)\u003c/li\u003e\u003cli name=\"b695\" id=\"b695\" class=\"graf graf--li graf-after--li\"\u003eImplement 3 new methods: build_reasoning_chains(), extract_reasoning_chains(), get_relevant_context()\u003c/li\u003e\u003cli name=\"7ed9\" id=\"7ed9\" class=\"graf graf--li graf-after--li\"\u003eIntegrate graph context into intent classification\u003c/li\u003e\u003cli name=\"8bae\" id=\"8bae\" class=\"graf graf--li graf-after--li\"\u003eEnhance confidence weighting with relationship strength\u003c/li\u003e\u003cli name=\"5497\" id=\"5497\" class=\"graf graf--li graf-after--li\"\u003eCreate 40 comprehensive tests covering all reasoning patterns\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"096d\" id=\"096d\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eComplexity factors\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"1d9f\" id=\"1d9f\" class=\"graf graf--li graf-after--p\"\u003eMultiple services coordination (KnowledgeGraphService + IntentClassifier)\u003c/li\u003e\u003cli name=\"3109\" id=\"3109\" class=\"graf graf--li graf-after--li\"\u003eNew architectural patterns (reasoning chains as graph traversal)\u003c/li\u003e\u003cli name=\"ddb8\" id=\"ddb8\" class=\"graf graf--li graf-after--li\"\u003eComplex algorithm implementation (confidence propagation through relationships)\u003c/li\u003e\u003cli name=\"0fb5\" id=\"0fb5\" class=\"graf graf--li graf-after--li\"\u003eExtensive testing requirements (40 tests across multiple dimensions)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"662a\" id=\"662a\" class=\"graf graf--p graf-after--li\"\u003eThis isn’t “wire two things together.” This is “design how two systems collaborate using new patterns.”\u003c/p\u003e\u003cp name=\"608d\" id=\"608d\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase −1 Discovery\u003c/strong\u003e (30 minutes): Architectural reconnaissance. Understand existing graph structure. Analyze intent classification integration points. Design reasoning chain approach. Identify test requirements.\u003c/p\u003e\u003cp name=\"6960\" id=\"6960\" class=\"graf graf--p graf-after--p\"\u003eDiscovery was thorough. Not “guess and implement.” Full architectural analysis before code changes.\u003c/p\u003e\u003cp name=\"565c\" id=\"565c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 1–2 Implementation\u003c/strong\u003e (45 minutes): Enhanced EdgeType enum with 8 new types. Added confidence weighting to domain models. Implemented reasoning chain builders with graph traversal algorithms.\u003c/p\u003e\u003cp name=\"ee4c\" id=\"ee4c\" class=\"graf graf--p graf-after--p\"\u003eCode quality: Production-grade. Not hacks. Not shortcuts. Proper async implementation. Comprehensive error handling. Clean abstractions.\u003c/p\u003e\u003cp name=\"c197\" id=\"c197\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 3–4 Implementation\u003c/strong\u003e (45 minutes): Integrated graph context into intent classifier. Added three helper methods. Implemented graceful degradation if service unavailable. Wired everything together cleanly.\u003c/p\u003e\u003cp name=\"afbb\" id=\"afbb\" class=\"graf graf--p graf-after--p\"\u003eIntegration quality: Proper dependency injection. Clean interfaces. Testable design. Mature engineering patterns.\u003c/p\u003e\u003cp name=\"4141\" id=\"4141\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 5 Testing\u003c/strong\u003e (45 minutes): Created 40 comprehensive tests. Edge type validation. Reasoning chain extraction. Context enrichment. Confidence propagation. All patterns covered.\u003c/p\u003e\u003cp name=\"69bc\" id=\"69bc\" class=\"graf graf--p graf-after--p\"\u003eTest quality: Not stubs. Full integration tests. Real scenarios. Edge cases included.\u003c/p\u003e\u003cp name=\"7942\" id=\"7942\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003e6:45 PM — Issue #278 Complete\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"9f7a\" id=\"9f7a\" class=\"graf graf--li graf-after--p\"\u003eDuration: ~4 hours total (beat estimate)\u003c/li\u003e\u003cli name=\"0443\" id=\"0443\" class=\"graf graf--li graf-after--li\"\u003eCost: ~$2 versus ~$15 Sonnet\u003c/li\u003e\u003cli name=\"a547\" id=\"a547\" class=\"graf graf--li graf-after--li\"\u003eQuality: Production-ready, zero regressions\u003c/li\u003e\u003cli name=\"dedf\" id=\"dedf\" class=\"graf graf--li graf-after--li\"\u003eTests: 40/40 passing\u003c/li\u003e\u003cli name=\"f5a3\" id=\"f5a3\" class=\"graf graf--li graf-after--li\"\u003eGit commit: Clean, well-documented, properly formatted\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"85d9\" id=\"85d9\" class=\"graf graf--p graf-after--li\"\u003eHaiku did architectural work. Not just “adequate” but “excellent.”\u003c/p\u003e\u003ch3 name=\"95f9\" id=\"95f9\" class=\"graf graf--h3 graf-after--p\"\u003eThe warts and all: When things weren’t perfect\u003c/h3\u003e\u003cp name=\"e737\" id=\"e737\" class=\"graf graf--p graf-after--h3\"\u003eSaturday wasn’t flawless execution. Three moments showed the reality behind the wins:\u003c/p\u003e\u003ch4 name=\"50c0\" id=\"50c0\" class=\"graf graf--h4 graf-after--p\"\u003eThe smoke test validation (morning)\u003c/h4\u003e\u003cp name=\"0c70\" id=\"0c70\" class=\"graf graf--p graf-after--h4\"\u003eProduction branch push blocked by pre-commit hook. Import error: \u003ccode class=\"markup--code markup--p-code\"\u003eProgressTracker missing from loading_states.py\u003c/code\u003e\u003c/p\u003e\u003cp name=\"9bc8\" id=\"9bc8\" class=\"graf graf--p graf-after--p\"\u003eRoot cause: OrchestrationEngine importing from wrong location. Should be \u003ccode class=\"markup--code markup--p-code\"\u003eweb.utils.streaming_responses\u003c/code\u003e not \u003ccode class=\"markup--code markup--p-code\"\u003eservices.ui_messages.loading_states\u003c/code\u003e.\u003c/p\u003e\u003cp name=\"a38b\" id=\"a38b\" class=\"graf graf--p graf-after--p\"\u003eDuration to fix: 25 minutes (investigation + correction)\u003c/p\u003e\u003cp name=\"7c1c\" id=\"7c1c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe lesson\u003c/strong\u003e: Smoke test infrastructure worked exactly as designed. Caught real issue before production deployment. Infrastructure validation happening automatically.\u003c/p\u003e\u003cp name=\"de7b\" id=\"de7b\" class=\"graf graf--p graf-after--p\"\u003eNot a failure. A success. The system caught problems before they became production issues. That’s what testing infrastructure is supposed to do.\u003c/p\u003e\u003ch4 name=\"de72\" id=\"de72\" class=\"graf graf--h4 graf-after--p\"\u003eThe security incident (afternoon)\u003c/h4\u003e\u003cp name=\"8f57\" id=\"8f57\" class=\"graf graf--p graf-after--h4\"\u003eGitHub secret scanning detected hardcoded token in \u003ccode class=\"markup--code markup--p-code\"\u003escripts/approve-pr.sh\u003c/code\u003e.\u003c/p\u003e\u003cp name=\"05ea\" id=\"05ea\" class=\"graf graf--p graf-after--p\"\u003eImmediate action: Replace with environment variable. But that only fixed going forward. Token still existed in git history. 629 commits. Entire repository.\u003c/p\u003e\u003cp name=\"0637\" id=\"0637\" class=\"graf graf--p graf-after--p\"\u003eResponse: \u003ccode class=\"markup--code markup--p-code\"\u003egit filter-branch\u003c/code\u003e to rewrite history. Remove secret from all commits. Clean version pushed to multiple branches.\u003c/p\u003e\u003cp name=\"6a85\" id=\"6a85\" class=\"graf graf--p graf-after--p\"\u003eDuration: 2 hours (investigation + rewrite + verification)\u003cbr\u003e Scope: 629 commits processed\u003c/p\u003e\u003cp name=\"9f9a\" id=\"9f9a\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe lesson\u003c/strong\u003e: Security-first culture working. Detected issue. Responded immediately. Cleaned history thoroughly. Proper remediation, not band-aids.\u003c/p\u003e\u003cp name=\"ceae\" id=\"ceae\" class=\"graf graf--p graf-after--p\"\u003eCould have just fixed going forward. Could have revoked token and moved on. Instead: Complete cleanup. No compromises on security.\u003c/p\u003e\u003ch4 name=\"3f63\" id=\"3f63\" class=\"graf graf--h4 graf-after--p\"\u003eThe personality architecture mismatch (mid-day)\u003c/h4\u003e\u003cp name=\"8658\" id=\"8658\" class=\"graf graf--p graf-after--h4\"\u003eIssue #269 revealed divergence: Sprint A7 questionnaire has 5 dimensions. Sprint A5 PersonalityProfile has 4 dimensions.\u003c/p\u003e\u003cp name=\"23fb\" id=\"23fb\" class=\"graf graf--p graf-after--p\"\u003eThis wasn’t bug. This was architectural drift. Two sprints, two slightly different designs, never reconciled.\u003c/p\u003e\u003cp name=\"e406\" id=\"e406\" class=\"graf graf--p graf-after--p\"\u003eHaiku’s solution: Semantic bridge. Map 5 → 4 intelligently. Document the gap. Suggest post-MVP refactor.\u003c/p\u003e\u003cp name=\"3687\" id=\"3687\" class=\"graf graf--p graf-after--p\"\u003eDecision: Accept bridge for alpha. Refactor properly later.\u003c/p\u003e\u003cp name=\"20f1\" id=\"20f1\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe lesson\u003c/strong\u003e: Real systems have real technical debt. Pragmatic decisions acknowledge gaps while delivering value. Perfect is enemy of shipped.\u003c/p\u003e\u003cp name=\"7094\" id=\"7094\" class=\"graf graf--p graf-after--p\"\u003eThe bridge works. Tests pass. Users won’t notice. Post-alpha, we’ll unify the designs properly. For now: Ship.\u003c/p\u003e\u003cp name=\"71cb\" id=\"71cb\" class=\"graf graf--p graf-after--p\"\u003eThese three moments — import error, security incident, architecture mismatch — show real development. Not “everything was perfect.” But “problems were caught, addressed appropriately, and moved forward.”\u003c/p\u003e\u003ch3 name=\"fd2e\" id=\"fd2e\" class=\"graf graf--h3 graf-after--p\"\u003eWhat Haiku performance actually means\u003c/h3\u003e\u003cp name=\"592b\" id=\"592b\" class=\"graf graf--p graf-after--h3\"\u003eSaturday’s results weren’t just “Haiku can do more than we thought.” They reshape the entire economics of AI-assisted development.\u003c/p\u003e\u003cp name=\"4b87\" id=\"4b87\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePrevious workflow\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"b890\" id=\"b890\" class=\"graf graf--li graf-after--p\"\u003eSonnet: Most implementation (~90% of work)\u003c/li\u003e\u003cli name=\"68c6\" id=\"68c6\" class=\"graf graf--li graf-after--li\"\u003eOpus: Architecture and strategy (~10% of work)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"1420\" id=\"1420\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePotential workflow\u003c/strong\u003e (post-Saturday):\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"50e7\" id=\"50e7\" class=\"graf graf--li graf-after--p\"\u003eHaiku: Most implementation (~90% of work)\u003c/li\u003e\u003cli name=\"93b6\" id=\"93b6\" class=\"graf graf--li graf-after--li\"\u003eSonnet: Complex debugging and coordination (~8% of work)\u003c/li\u003e\u003cli name=\"8753\" id=\"8753\" class=\"graf graf--li graf-after--li\"\u003eOpus: R\u0026amp;D and high-level strategy (~2% of work)\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"2e2f\" id=\"2e2f\" class=\"graf graf--p graf-after--li\"\u003eThe implications extend beyond Piper Morgan:\u003c/p\u003e\u003cp name=\"fd91\" id=\"fd91\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFor solo developers\u003c/strong\u003e: Haiku makes AI-assisted development 10x more affordable. Projects that would cost $100/month in Sonnet could cost $10/month in Haiku.\u003c/p\u003e\u003cp name=\"2abc\" id=\"2abc\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFor teams\u003c/strong\u003e: Work previously requiring Sonnet-powered teammates can use Haiku-powered successors. Sonnet moves to coordination roles. Opus focuses on pure R\u0026amp;D.\u003c/p\u003e\u003cp name=\"37f6\" id=\"37f6\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eFor cost-sensitive projects\u003c/strong\u003e: AI assistance becomes viable for projects where $1000/month API costs were prohibitive but $150/month is reasonable.\u003c/p\u003e\u003ch3 name=\"451b\" id=\"451b\" class=\"graf graf--h3 graf-after--p\"\u003eThe verification that mattered\u003c/h3\u003e\u003cp name=\"5a6f\" id=\"5a6f\" class=\"graf graf--p graf-after--h3\"\u003eSaturday delivered five issues. All production-ready. Zero regressions. 100% test coverage.\u003c/p\u003e\u003cp name=\"ea0b\" id=\"ea0b\" class=\"graf graf--p graf-after--p\"\u003eBut the real verification came from what \u003cem class=\"markup--em markup--p-em\"\u003edidn’t\u003c/em\u003e happen:\u003c/p\u003e\u003cp name=\"e2ac\" id=\"e2ac\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNo STOP conditions triggered\u003c/strong\u003e: Zero escalations to Sonnet. Zero architectural confusion. Zero 30-minute stalls. Haiku completed everything confidently.\u003c/p\u003e\u003cp name=\"48b9\" id=\"48b9\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNo quality compromises\u003c/strong\u003e: Tests passed. Code quality excellent. Documentation thorough. No shortcuts, no hacks, no technical debt.\u003c/p\u003e\u003cp name=\"6ef5\" id=\"6ef5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNo rework needed\u003c/strong\u003e: Every issue delivered right first time. No “we’ll fix this later.” No “good enough for alpha.” Production-grade quality throughout.\u003c/p\u003e\u003cp name=\"8abd\" id=\"8abd\" class=\"graf graf--p graf-after--p\"\u003eThe work-first protocol proved itself: Real work under real constraints provided real validation. Not artificial tests but actual production requirements.\u003c/p\u003e\u003cp name=\"a39d\" id=\"a39d\" class=\"graf graf--p graf-after--p\"\u003eAnd Haiku proved itself: Not just “adequate for simple tasks” but “excellent for architectural work.”\u003c/p\u003e\u003ch3 name=\"5593\" id=\"5593\" class=\"graf graf--h3 graf-after--p\"\u003eThe Monday implications\u003c/h3\u003e\u003cp name=\"c654\" id=\"c654\" class=\"graf graf--p graf-after--h3\"\u003eSaturday’s discoveries reshape work allocation going forward.\u003c/p\u003e\u003cp name=\"dcd8\" id=\"dcd8\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eImmediate changes\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"1845\" id=\"1845\" class=\"graf graf--li graf-after--p\"\u003eDefault to Haiku for all implementation work\u003c/li\u003e\u003cli name=\"ab60\" id=\"ab60\" class=\"graf graf--li graf-after--li\"\u003eReserve Sonnet for complex debugging and multi-agent coordination\u003c/li\u003e\u003cli name=\"9970\" id=\"9970\" class=\"graf graf--li graf-after--li\"\u003eKeep Opus for strategic R\u0026amp;D and architectural decision-making\u003c/li\u003e\u003cli name=\"5a69\" id=\"5a69\" class=\"graf graf--li graf-after--li\"\u003eExpect 75–85% cost reduction while maintaining quality\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"cb1f\" id=\"cb1f\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eLonger-term implications\u003c/strong\u003e:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"91fa\" id=\"91fa\" class=\"graf graf--li graf-after--p\"\u003eTeammates currently using Sonnet 4.0 can likely use Haiku 4.5 successors\u003c/li\u003e\u003cli name=\"597f\" id=\"597f\" class=\"graf graf--li graf-after--li\"\u003eChief Architect and Chief of Staff roles can likely use Sonnet 4.5 instead of Opus\u003c/li\u003e\u003cli name=\"f728\" id=\"f728\" class=\"graf graf--li graf-after--li\"\u003eOpus instances focus on pure R\u0026amp;D and high-level strategy\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"7495\" id=\"7495\" class=\"graf graf--p graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eThe capability recognition\u003c/strong\u003e: Haiku 4.5 isn’t “Haiku 4 but faster.” It’s “Sonnet 4 capabilities at Haiku pricing.”\u003c/p\u003e\u003cp name=\"e82b\" id=\"e82b\" class=\"graf graf--p graf-after--p\"\u003eThis changes everything about AI-assisted development economics. Not incremental improvement. Order-of-magnitude cost reduction while maintaining (or improving) quality.\u003c/p\u003e\u003ch3 name=\"fb71\" id=\"fb71\" class=\"graf graf--h3 graf-after--p\"\u003eThe systematic discovery pattern\u003c/h3\u003e\u003cp name=\"c3ed\" id=\"c3ed\" class=\"graf graf--p graf-after--h3\"\u003eSaturday’s Haiku success wasn’t accident. It was methodology working:\u003c/p\u003e\u003cp name=\"ae58\" id=\"ae58\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase −1 Discovery\u003c/strong\u003e: Every issue started with architectural reconnaissance. Understand existing systems. Analyze integration points. Design approach. Identify requirements. 30 minutes invested in understanding before implementation.\u003c/p\u003e\u003cp name=\"4b1f\" id=\"4b1f\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvidence-based implementation\u003c/strong\u003e: No guessing. No assumptions. Every decision backed by discovery findings. Clean code from understanding, not from trial-and-error.\u003c/p\u003e\u003cp name=\"3877\" id=\"3877\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eComprehensive testing\u003c/strong\u003e: Not “tests that pass” but “tests that validate.” Real scenarios. Edge cases. Integration patterns. Evidence that code works as designed.\u003c/p\u003e\u003cp name=\"138e\" id=\"138e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eVerification discipline\u003c/strong\u003e: Issues claimed complete only when evidence provided. Terminal output. Test results. Git commits. No “I think it works.”\u003c/p\u003e\u003cp name=\"b87a\" id=\"b87a\" class=\"graf graf--p graf-after--p\"\u003eThe methodology enables the model. Or the model enables the methodology. Or they compound: Good process + capable model = exceptional results.\u003c/p\u003e\u003cp name=\"a477\" id=\"a477\" class=\"graf graf--p graf-after--p\"\u003eSaturday proved the compound effect works: Haiku 4.5 + verification-first methodology + work-first testing = architectural work at fraction of cost.\u003c/p\u003e\u003ch3 name=\"1d63\" id=\"1d63\" class=\"graf graf--h3 graf-after--p\"\u003eDeploying models intelligently\u003c/h3\u003e\u003cp name=\"fc83\" id=\"fc83\" class=\"graf graf--p graf-after--h3\"\u003eFive issues delivered Saturday. Technical achievement: Significant. Cost savings: Substantial. Alpha readiness: Advanced.\u003c/p\u003e\u003cp name=\"2ead\" id=\"2ead\" class=\"graf graf--p graf-after--p\"\u003eBefore Saturday: “Architectural work requires expensive models” After Saturday: “Haiku can handle architectural work at 85–90% cost savings”\u003c/p\u003e\u003cp name=\"aa1b\" id=\"aa1b\" class=\"graf graf--p graf-after--p\"\u003eThis discovery reshapes:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"18bd\" id=\"18bd\" class=\"graf graf--li graf-after--p\"\u003eHow we allocate model costs going forward\u003c/li\u003e\u003cli name=\"4cab\" id=\"4cab\" class=\"graf graf--li graf-after--li\"\u003eWhat work gets assigned to which models\u003c/li\u003e\u003cli name=\"a639\" id=\"a639\" class=\"graf graf--li graf-after--li\"\u003eTeam composition (who uses which models)\u003c/li\u003e\u003cli name=\"8139\" id=\"8139\" class=\"graf graf--li graf-after--li\"\u003eProject economics (cost per sprint)\u003c/li\u003e\u003cli name=\"e739\" id=\"e739\" class=\"graf graf--li graf-after--li\"\u003eWhat’s viable for cost-sensitive projects\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"fcd9\" id=\"fcd9\" class=\"graf graf--p graf-after--li graf--trailing\"\u003eThe methodology that discovered itself strikes again: Work reveals capabilities. Evidence updates assumptions. Better understanding enables better decisions. The spiral continues.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"Haiku Does the Impossible: Architectural Work at Fraction of Cost\",\"excerpt\":\"“Dragonfly catcher, / How far have you gone today / In your wandering?”October 25, 2025Saturday morning, 9:42 AM. Chief of Staff establishes production branch strategy. Four days to alpha launch. Final infrastructure work ahead.Time to try some new tooling, right? Perfect time to do Haiku 4.5 cos...\",\"url\":\"/blog/haiku-does-the-impossible\",\"publishedAt\":\"Oct 31, 2025\",\"publishedAtISO\":\"2025-10-31T13:33:19.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/488b596f3048\",\"featuredImage\":\"/assets/blog-images/488b596f3048-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/haiku-does-the-impossible-architectural-work-at-fraction-of-cost-488b596f3048?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"haiku-does-the-impossible\",\"workDate\":\"Oct
