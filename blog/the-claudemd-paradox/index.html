:\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T18e7,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot calmly reads an “Emergency Procedures” binder beside an open filing cabinet while smoke and sparks rise nearby and an untouched fire alarm hangs on the wall.\" src=\"https://cdn-images-1.medium.com/max/1024/1*bTI4Yq205NNQgvnIYwiUQw.png\" /\u003e\u003cfigcaption\u003e“By the book…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eJanuary 22–23, 2026\u003c/em\u003e\u003c/p\u003e\u003cp\u003eWe made CLAUDE.md 87% smaller. Then we lost 12 hours of work logs. Then we fixed it the next morning.\u003c/p\u003e\u003cp\u003eThat’s the shape of January 22nd and 23rd — the days we learned that instructions meant to help AI agents can backfire spectacularly when they get too detailed.\u003c/p\u003e\u003ch3\u003eThe problem\u003c/h3\u003e\u003cp\u003eCLAUDE.md had grown to 1,257 lines. This is the file that tells AI agents how to behave in our codebase — what protocols to follow, how to handle various situations, where to find things.\u003c/p\u003e\u003cp\u003eResearch suggests AI agents follow instructions better when those instructions are under 300 lines. We were four times over that limit. The docs agent proposed a “Tier 3 refactor” — an 87% reduction that would move detailed protocols to external files, leaving only essential triggers in the main document.\u003c/p\u003e\u003cp\u003eI approved it. The refactor was clean, well-organized, and principled. CLAUDE.md went from 1,257 lines to 157 lines.\u003c/p\u003e\u003cp\u003eWhat could possibly go wrong?\u003c/p\u003e\u003ch3\u003eThe failure\u003c/h3\u003e\u003cp\u003eHere’s what we didn’t anticipate: after a context compaction (when Claude’s context window fills up and gets summarized), the agent loses access to everything except what’s explicitly in the current context.\u003c/p\u003e\u003cp\u003eThe old CLAUDE.md had a post-compaction protocol embedded directly in the file. “After compaction, check your session log. If it doesn’t exist, create it.”\u003c/p\u003e\u003cp\u003eThe new CLAUDE.md referenced that protocol in an external file. After compaction, agents didn’t load the external file. They didn’t know to check their logs. They didn’t know logs existed.\u003c/p\u003e\u003cp\u003eFor the next 12 hours, substantial work happened — 17 issues closed, hundreds of tests written — with no session logs maintained. The agents were productive. They just weren’t documenting anything.\u003c/p\u003e\u003ch3\u003eThe discovery\u003c/h3\u003e\u003cp\u003eThe next morning, the docs agent started creating the January 22 omnibus log and noticed something wrong. Where were the session logs from yesterday afternoon and evening?\u003c/p\u003e\u003cp\u003eForensic investigation revealed the gap. File timestamps showed when work happened. Git commits showed what was done. But the real-time session logs that capture context, decisions, and reasoning? Gone.\u003c/p\u003e\u003cp\u003eWe reconstructed what we could from file timestamps and git history. But reconstruction is archaeology, not journalism. You lose the “why” and keep only the “what.”\u003c/p\u003e\u003ch3\u003eThe fix\u003c/h3\u003e\u003cp\u003eThe fix was almost embarrassingly simple: put the critical protocol back into CLAUDE.md.\u003c/p\u003e\u003cp\u003eNot the whole 1,257 lines. Just the parts that absolutely must survive context compaction. About 70 lines total — the post-compaction protocol, session log requirements, and a few other essentials.\u003c/p\u003e\u003cp\u003eCLAUDE.md went from 157 lines to 230 lines. Still 82% smaller than the original, but now containing everything an agent needs to maintain continuity across context boundaries.\u003c/p\u003e\u003cp\u003eWin!\u003c/p\u003e\u003ch3\u003eThe paradox\u003c/h3\u003e\u003cp\u003eHere’s what makes this interesting: the refactor was correct by every reasonable standard. Shorter is better for AI instructions. External references reduce duplication. Clean organization aids comprehension.\u003c/p\u003e\u003cp\u003eBut it broke a hidden assumption: some instructions must survive context boundaries, and external references don’t.\u003c/p\u003e\u003cp\u003eThe paradox is that our attempt to make instructions more followable made them less followable. The 1,257-line file was bloated and hard to parse, but it worked. The 157-line file was elegant and well-organized, but it failed at a critical moment.\u003c/p\u003e\u003ch3\u003eThe lesson\u003c/h3\u003e\u003cp\u003eWe’ve since formalized this as a principle: protocols that must survive compaction must be inline, but they must also be simple.\u003c/p\u003e\u003cp\u003eThe old 1,257-line file survived compaction because everything was inline. But agents probably weren’t following most of it — too much to process. The new 157-line file was followable but didn’t survive compaction.\u003c/p\u003e\u003cp\u003eThe sweet spot is minimal inline protocols (the triggers) with detailed external references (the procedures). The trigger survives compaction and tells the agent what to do. The agent then loads the detailed procedure when needed.\u003c/p\u003e\u003cp\u003eIt’s like the difference between a fire alarm and a fire evacuation plan. The alarm needs to be simple and loud — just “CHECK YOUR LOGS.” The detailed procedure can live elsewhere, consulted when the alarm goes off.\u003c/p\u003e\u003ch3\u003eThe meta-lesson\u003c/h3\u003e\u003cp\u003eThis incident revealed something about working with AI agents that I hadn’t fully appreciated: they have a “memory horizon” that humans don’t.\u003c/p\u003e\u003cp\u003eWhen I approve a refactor, I remember the reasoning behind my approval even if the document changes. An AI agent doesn’t. After compaction, it only knows what’s in front of it. If the instructions it needs aren’t there, they might as well not exist.\u003c/p\u003e\u003cp\u003eBuilding systems with AI requires thinking about these boundaries — not just what the agent can do, but what it can remember, and what happens when it forgets.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext up in the Building Piper Morgan narrative, “The MVP Rubric” from January 26, but first we’ll flash back to November for an insight piece tomorow, “The Completion Discipline” on the ongoing struggle to get AIs to finish their work when the difference between “mostly done” and “actually complete” turned out to be a methodology problem, not a motivation problem.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever had a well-intentioned improvement backfire in unexpected ways? What hidden assumption did it violate?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=27072f2228e8\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-claude-md-paradox-27072f22 DE.md went from 157 lines to 230 lines. Still 82% smaller than the original, but now containing everything an agent needs to maintain continuity across context boundaries.\u003c/p\u003e\u003cp name=\"a41f\" id=\"a41f\" class=\"graf graf--p graf-after--p\"\u003eWin!\u003c/p\u003e\u003ch3 name=\"85dc\" id=\"85dc\" class=\"graf graf--h3 graf-after--p\"\u003eThe paradox\u003c/h3\u003e\u003cp name=\"12bb\" id=\"12bb\" class=\"graf graf--p graf-after--h3\"\u003eHere’s what makes this interesting: the refactor was correct by every reasonable standard. Shorter is better for AI instructions. External references reduce duplication. Clean organization aids comprehension.\u003c/p\u003e\u003cp name=\"9d5f\" id=\"9d5f\" class=\"graf graf--p graf-after--p\"\u003eBut it broke a hidden assumption: some instructions must survive context boundaries, and external references don’t.\u003c/p\u003e\u003cp name=\"8155\" id=\"8155\" class=\"graf graf--p graf-after--p\"\u003eThe paradox is that our attempt to make instructions more followable made them less followable. The 1,257-line file was bloated and hard to parse, but it worked. The 157-line file was elegant and well-organized, but it failed at a critical moment.\u003c/p\u003e\u003ch3 name=\"e386\" id=\"e386\" class=\"graf graf--h3 graf-after--p\"\u003eThe lesson\u003c/h3\u003e\u003cp name=\"7780\" id=\"7780\" class=\"graf graf--p graf-after--h3\"\u003eWe’ve since formalized this as a principle: protocols that must survive compaction must be inline, but they must also be simple.\u003c/p\u003e\u003cp name=\"8798\" id=\"8798\" class=\"graf graf--p graf-after--p\"\u003eThe old 1,257-line file survived compaction because everything was inline. But agents probably weren’t following most of it — too much to process. The new 157-line file was followable but didn’t survive compaction.\u003c/p\u003e\u003cp name=\"be13\" id=\"be13\" class=\"graf graf--p graf-after--p\"\u003eThe sweet spot is minimal inline protocols (the triggers) with detailed external references (the procedures). The trigger survives compaction and tells the agent what to do. The agent then loads the detailed procedure when needed.\u003c/p\u003e\u003cp name=\"c876\" id=\"c876\" class=\"graf graf--p graf-after--p\"\u003eIt’s like the difference between a fire alarm and a fire evacuation plan. The alarm needs to be simple and loud — just “CHECK YOUR LOGS.” The detailed procedure can live elsewhere, consulted when the alarm goes off.\u003c/p\u003e\u003ch3 name=\"f0ae\" id=\"f0ae\" class=\"graf graf--h3 graf-after--p\"\u003eThe meta-lesson\u003c/h3\u003e\u003cp name=\"c350\" id=\"c350\" class=\"graf graf--p graf-after--h3\"\u003eThis incident revealed something about working with AI agents that I hadn’t fully appreciated: they have a “memory horizon” that humans don’t.\u003c/p\u003e\u003cp name=\"6dc6\" id=\"6dc6\" class=\"graf graf--p graf-after--p\"\u003eWhen I approve a refactor, I remember the reasoning behind my approval even if the document changes. An AI agent doesn’t. After compaction, it only knows what’s in front of it. If the instructions it needs aren’t there, they might as well not exist.\u003c/p\u003e\u003cp name=\"2e7e\" id=\"2e7e\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eBuilding systems with AI requires thinking about these boundaries — not just what the agent can do, but what it can remember, and what happens when it forgets.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The CLAUDE.md Paradox\",\"excerpt\":\"“By the book…”January 22–23, 2026We made CLAUDE.md 87% smaller. Then we lost 12 hours of work logs. Then we fixed it the next morning.That’s the shape of January 22nd and 23rd — the days we learned that instructions meant to help AI agents can backfire spectacularly when they get too detailed.The...\",\"url\":\"/blog/the-claudemd-paradox\",\"publishedAt\":\"Jan 30, 2026\",\"publishedAtISO\":\"Fri, 30 Jan 2026 14:28:48
