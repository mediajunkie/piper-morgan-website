",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T232b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eMay 8–9, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eThe system has an automated quality test we run periodically against a panel of scripted user inputs (we call it \"the canonical query list\") and it started off with a vision I had of something like a morning litany by which an entity might \"wake up\" and systematically review what it knows. It eventually became a core part of the modeled UX vision and the \"colleague\" model, and at this point has become a regression test we use to gate each sprint in the Minimum Valuable Product (MVP) milestone that is intended to culminate with a widely shareable beta.\u003c/p\u003e\n\u003cp\u003eIn this test, the response to each query gets scored against a rubric — relevance, competence, tone — by a second large language model (LLM) acting as a judge. The aggregate score is meant to track whether quality is drifting upward or downward as the codebase changes.\u003c/p\u003e\n\u003cp\u003eOn Friday morning May 8, my lead developer (Lead Dev) ran the test for the first time after the ethics-floor work and a multi-day shipping arc had landed. The previous baseline, from mid-April, had been 72.1% — the number from the original report, which as it turned out also needed checking. The new run came in at 65.6%.\u003c/p\u003e\n\u003cp\u003eThat's a six-point drop! Lolwat? Six points across a hundred test cases. The system's most recent few weeks of work — multiple major architectural changes, several issues' worth of new behavior — had apparently produced a quality regression.\u003c/p\u003e\n\u003cp\u003eLead Dev filed a critical issue (P0), and well they did. The working hypothesis: the LLM had started fabricating responses somewhere in the new code paths. Hallucination regression. The auto-fail rule (any rubric dimension of zero triggers a FAIL) had caught ten cases where the model produced confident answers that didn't track the underlying state.\u003c/p\u003e\n\u003cp\u003eThat's the hypothesis. The investigation was supposed to confirm it and identify the introduction point.\u003c/p\u003e\n\u003ch1\u003eWhat the investigation found\u003c/h1\u003e\n\u003cp\u003eThe investigation took most of Friday afternoon. By the time the report landed, the hypothesis was largely refuted.\u003c/p\u003e\n\u003cp\u003eOf the ten auto-failure cases, zero were pure LLM fabrication. The model wasn't making things up.\u003c/p\u003e\n\u003cp\u003eWhat the model was doing — what it had been doing the whole time, going back at least to the April baseline — was something else. Let me back up a bit and sorry for getting a bit into the weeds here:\u003c/p\u003e\n\u003cp\u003eThe judge was scoring along a dimension I'll call \u003cem\u003euser-context-specificity\u003c/em\u003e. The judge wanted responses that referenced the specific user's specific recent activity. When the responses were generic-but-correct, the judge marked them low on the specificity axis, and the auto-fail rule (any dim = 0 → FAIL) flipped the case to FAIL.\u003c/p\u003e\n\u003cp\u003eSeven of the ten failures were of that shape. Three of the ten were narrow real bugs — a setup wizard that hardcoded a project name, a missing slot value in a templated response, a routing miss. Real bugs to fix, but bugs that didn't add up to a six-point regression.\u003c/p\u003e\n\u003cp\u003eThen the smoking gun. One of the test cases, identified internally as Question 56, kept producing a response that repeated three or four todos back to the user — a confident-sounding but slightly weird response that looked exactly like a fabrication. The investigation pulled the database state for the canonical test user. There were fifteen real todos in the database from earlier test runs. Every prior \u003ccode\u003eadd a todo\u003c/code\u003e test case had mutated state and never cleaned up. The model wasn't fabricating todos. The model was accurately reflecting the polluted fixture.\u003c/p\u003e\n\u003cp\u003eThe aggregate metric had dropped six points because the judge had become more aggressive on a dimension that depended on a fixture that had been contaminated by the test itself, or rather by the design or implementation of the test.\u003c/p\u003e\n\u003cp\u003eThe hypothesis had been: \u003cem\u003ethe system regressed.\u003c/em\u003e The actual finding was: \u003cem\u003ethe measurement instrument and its reference state had both drifted, and the system was approximately where it had been.\u003c/em\u003e Two layers of category error, neither of them in the code we'd shipped.\u003c/p\u003e\n\u003ch1\u003eBack in the saddle again\u003c/h1\u003e\n\u003cp\u003eBy Saturday morning the remediation was queued. Fifteen stale items and a hundred-eleven orphan items got wiped from the canonical fixture. Lead Dev sent a recalibration memo to the experience-design and product-management roles asking them to look at the judge's rubric anchors. Three narrow bug fixes shipped for the actually-real bugs.\u003c/p\u003e\n\u003cp\u003eThen the retest. Run 5 diagnosed a remaining verdict-gap. Run 6 closed it. Run 7 came in at 68.9% PASS — above the mid-April baseline of 65.6%. (The 72.1% number from the original report turned out to be from an even older run with the un-polluted fixture. Compared against the most recent comparable baseline, the system was up, not down. Believe me, boss! they swear. Just kidding. It's legit.)\u003c/p\u003e\n\u003cp\u003eI'd told Lead Dev on Friday evening that we wouldn't touch the next cleanup milestone until the preceding work cleared the benchmark. By 8:15 AM Saturday the benchmark was cleared. The cleanup work was unblocked.\u003c/p\u003e\n\u003cp\u003eWhat came next — Saturday's cleanup sprint — produced a second instance of the same shape.\u003c/p\u003e\n\u003cp\u003eThe cleanup milestone had a queue of issues describing code that needed to be hardened or refactored. Lead Dev opened the first one and discovered the code the issue described didn't exist in the way the body said it did. The issue body claimed a defensive-fallback was missing. The actual code had been deleted weeks earlier. The fix wasn't to add the fallback. It was to close the issue and delete the dead test that referenced the no-longer-existent code path.\u003c/p\u003e\n\u003cp\u003eThen the second issue. Same pattern: the body said one thing, the code said another. Then a third. By the end of Saturday, three of the five cleanup issues in that pass turned out to describe phantom work. The work was deletion, not implementation.\u003c/p\u003e\n\u003cp\u003eLead Dev named it Pattern 67: \u003cem\u003eIssue-Body Reality Mismatch.\u003c/em\u003e The counter-discipline: before scoping migration or refactor work, audit whether the body's claims still match the code. The pattern emerged because three instances showed up in a single day's work, but the pattern named a shape that had probably been firing quietly for months.\u003c/p\u003e\n\u003ch1\u003eWhy the two findings rhyme\u003c/h1\u003e\n\u003cp\u003eThe judge had drifted from what it was measuring. The issue bodies had drifted from what they were describing. Both gaps had stayed silent for a long time — the judge produced numbers, the issues described what looked like real work, the system kept running. The drift only surfaced when the gap got wide enough that something tripped.\u003c/p\u003e\n\u003cp\u003eIn both cases the diagnostic instinct was to fix the system to match the report. The hypothesis was \u003cem\u003ethe system regressed.\u003c/em\u003e This instinct isn't entirely foolish. It resists the easy path or altering the test to fit the reality. The hypothesis was \u003cem\u003eimplementation work needs to happen here.\u003c/em\u003e In both cases the actual move was to fix the reference — clean the fixture, recalibrate the rubric, audit the body against the code — not the system.\u003c/p\u003e\n\u003cp\u003eThis is a generalizable trap. Any time a measurement runs against a reference that the measurement itself can mutate, the reference drifts. Any time a description outlives the code it described, the description becomes a different document. The compounding is silent. Nothing screams. The aggregate number is six points lower. The implementation queue is full of work that turns out to be deletion. The system is fine. The system was always going to be fine. The work is upstream — at the reference state, not the system under measurement.\u003c/p\u003e\n\u003ch1\u003eThe general rule\u003c/h1\u003e\n\u003cp\u003eMost of what looks like a system regression turns out to be a reference-state drift. The discipline this week's findings landed across both layers is the same: when a measurement or a description has been quietly running ahead of the code it's supposed to track, the fix is to ground-truth the reference, not patch the system. Reset the fixture before re-running the metric. Audit the body before scoping the work. Recalibrate the rubric before chasing the regression.\u003c/p\u003e\n\u003cp\u003eThe day Lead Dev cleared the cleanup milestone, the actual code change for the morning was small. Three narrow bug fixes. A fixture wipe. A rubric memo to two roles. The cleanup sprint deleted a thousand-plus lines of code that nobody had been running for months. The single rubric drop had pointed at all of it, indirectly, by the time we understood what we were actually looking at.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: \"This One’s Taken” — on two agents filing the same pattern number independently, and what the collision reveals about growing catalogs.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eWhere in your work has a measurement or a description been silently running ahead of the system it's supposed to track? What would grounding the reference look like?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"Hypothesis Refuted\",\"guid\":\"blog-first-2175be6c7522\",\"url\":\"/blog/hypothesis-refuted\",\"publishedAt\":\"Jun 18, 2026\",\"workDate\":\"May 8, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/hypothesis-refuted.webp\",\"imageAlt\":\"A worried surveyor inspects a sturdy stone bridge using warped measuring tools—a bent ruler, tangled plumb line, and damaged map—while travelers cross the bridge without concern and a puzzled ghostly AI examines the crooked ruler, realizing the instruments are the real problem.\",\"imageCaption\":\"\\\"Maybe check the ruler?\\\"\",\"tags\":[\"Building in Public\"]},\"content\":{\"title\":\"Hypothesis Refuted\",\"content\":\"$1a\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1b:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Hypothesis Refuted | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"May 8–9, 2026 The system has an automated quality test we run peri
