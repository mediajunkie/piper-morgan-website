\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T31a6,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot host runs a lightning-round game, flipping index cards from a neat stack to a messy pile as a focused human contestant responds.\" src=\"https://cdn-images-1.medium.com/max/1024/1*0C5ij_txq8WQnIfHMZ9IDg.png\" /\u003e\u003cfigcaption\u003e“Next question?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eNovember 27\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTwo days of exploration. Open questions accumulating. Rich discussion but no closure.\u003c/p\u003e\u003cp\u003eThen: “Ask me one at a time, make a recommendation, we’ll decide for now and move to the next.”\u003c/p\u003e\u003cp\u003eForty-four minutes later, eight architectural decisions were made. Questions that had resisted closure for days fell one after another.\u003c/p\u003e\u003cp\u003eLightning rounds can work, but only after sufficent exploration has prepared the ground.\u003c/p\u003e\u003ch3\u003eThe accumulating problem\u003c/h3\u003e\u003cp\u003eExploratory work generates questions faster than it answers them.\u003c/p\u003e\u003cp\u003eYou’re building an object model. You discuss “substrates” — what are the fundamental types? That raises questions about lenses — how do you view those types? Which raises questions about metadata — what do you track about each? Which raises questions about lifecycle — how do objects change over time?\u003c/p\u003e\u003cp\u003eEach question is connected to others. Answering one affects the others. So you keep exploring, hoping clarity will emerge.\u003c/p\u003e\u003cp\u003eSometimes it does. Often it doesn’t. The questions accumulate. The discussion continues. Progress stalls.\u003c/p\u003e\u003cp\u003eThis isn’t failure — exploration is valuable. But at some point, you need to stop exploring and start deciding.\u003c/p\u003e\u003ch3\u003eThe lightning-round format\u003c/h3\u003e\u003cp\u003eThe format is simple:\u003c/p\u003e\u003col\u003e\u003cli\u003eAsk one question\u003c/li\u003e\u003cli\u003eOffer a recommendation\u003c/li\u003e\u003cli\u003eDecide (for now)\u003c/li\u003e\u003cli\u003eMove to the next question\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eNo extended discussion. No reopening previous decisions. No “let me think about it.” Decide and move.\u003c/p\u003e\u003cp\u003eThe constraint is the point. Without it, every question becomes an invitation to re-explore. With it, questions become binary: accept recommendation or modify it.\u003c/p\u003e\u003ch3\u003eCall and response\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eQuestion 1\u003c/strong\u003e: How should Piper perceive objects?\u003c/p\u003e\u003cp\u003e\u003cem\u003eRecommendation\u003c/em\u003e: Lenses on substrates, not discrete object types. View the same underlying thing through different perspectives rather than creating separate object hierarchies.\u003c/p\u003e\u003cp\u003e\u003cem\u003eDecision\u003c/em\u003e: “Lenses on substrates, yes!”\u003c/p\u003e\u003cp\u003e\u003cem\u003eTime\u003c/em\u003e: 1 minute\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuestion 2\u003c/strong\u003e: How many substrates?\u003c/p\u003e\u003cp\u003e\u003cem\u003eRecommendation\u003c/em\u003e: Four — Entities, Spaces, Moments, Situations. Rich enough to capture the domain, concise enough to reason about.\u003c/p\u003e\u003cp\u003e\u003cem\u003eDecision\u003c/em\u003e: “Good balance of rich vs. concise”\u003c/p\u003e\u003cp\u003e\u003cem\u003eTime\u003c/em\u003e: 1 minute\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuestion 3\u003c/strong\u003e: How should document creation and ownership work?\u003c/p\u003e\u003cp\u003e\u003cem\u003eRecommendation\u003c/em\u003e: Three-way model — Native (Piper’s mind), Federated (senses reaching into external systems), Synthetic (understanding derived from both).\u003c/p\u003e\u003cp\u003e\u003cem\u003eDecision\u003c/em\u003e: “I like the metaphorical breakdown”\u003c/p\u003e\u003cp\u003e\u003cem\u003eTime\u003c/em\u003e: 1 minute\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuestion 4\u003c/strong\u003e: What metadata tracks everything?\u003c/p\u003e\u003cp\u003e\u003cem\u003eRecommendation\u003c/em\u003e: Six dimensions — Provenance, Relevance, Attention, Confidence, Relations, Journal.\u003c/p\u003e\u003cp\u003e\u003cem\u003eDecision\u003c/em\u003e: “I love this, yes, good”\u003c/p\u003e\u003cp\u003e\u003cem\u003eTime\u003c/em\u003e: 1 minute\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuestion 5\u003c/strong\u003e: What’s the object lifecycle?\u003c/p\u003e\u003cp\u003e\u003cem\u003eRecommendation\u003c/em\u003e: Eight stages including “composting” — objects don’t just die, they decompose and feed new growth.\u003c/p\u003e\u003cp\u003e\u003cem\u003eInitial reaction\u003c/em\u003e: Enthusiasm for composting metaphor, noting this is often a neglected part of the job: “The shadow side of PM work is ending things”\u003c/p\u003e\u003cp\u003e\u003cem\u003eDiscussion\u003c/em\u003e: How deprecation/archival/composting connects back to emergence\u003c/p\u003e\u003cp\u003e\u003cem\u003eDecision\u003c/em\u003e: Full cycle with composting stage\u003c/p\u003e\u003cp\u003e\u003cem\u003eTime\u003c/em\u003e: 7 minutes (the longest)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuestion 6\u003c/strong\u003e: How should journaling work?\u003c/p\u003e\u003cp\u003e\u003cem\u003eInitial recommendation\u003c/em\u003e: Three layers — Public Journal, Private Diary, Dream Journal\u003c/p\u003e\u003cp\u003e\u003cem\u003eCheck\u003c/em\u003e: “Am I violating the \u003cstrong\u003eno-optional-complexity\u003c/strong\u003e rule?”\u003c/p\u003e\u003cp\u003e\u003cem\u003eHonest answer\u003c/em\u003e: “The private diary is optional complexity. The dream journal is load-bearing.”\u003c/p\u003e\u003cp\u003e\u003cem\u003eRevised decision\u003c/em\u003e: Two layers — Session Journal (audit trail) and Insight Journal (dreams surfaced)\u003c/p\u003e\u003cp\u003e\u003cem\u003eTime\u003c/em\u003e: 7 minutes\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuestion 7\u003c/strong\u003e: How do the spatial dimensions relate to lenses?\u003c/p\u003e\u003cp\u003e\u003cem\u003eDecision (after discussion)\u003c/em\u003e: “I can decide now we will use the spatial dimensions as lenses. The intents align.”\u003c/p\u003e\u003cp\u003e\u003cem\u003eTime\u003c/em\u003e: 5 minutes\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuestion 8\u003c/strong\u003e: How does Piper model users?\u003c/p\u003e\u003cp\u003e\u003cem\u003eRecommendation\u003c/em\u003e: Native object with tiered depth — Principal, Team, Stakeholders, Mentioned. Core heuristic: “What do they want? What are they afraid of?”\u003c/p\u003e\u003cp\u003e\u003cem\u003eDecision\u003c/em\u003e: Approved with stakeholder empathy at center\u003c/p\u003e\u003cp\u003e\u003cem\u003eTime\u003c/em\u003e: 22 minutes (took the most discussion)\u003c/p\u003e\u003cp\u003eTotal: 44 minutes, 8 decisions.\u003c/p\u003e\u003ch3\u003eWhy it worked\u003c/h3\u003e\u003cp\u003eThe lightning round worked because two days of exploration had prepared the ground.\u003c/p\u003e\u003cp\u003eWe weren’t deciding from ignorance. Every question had been discussed. Options had been considered. Trade-offs were understood. The decisions were ready to be made — they just hadn’t been made.\u003c/p\u003e\u003cp\u003eThe recommendations helped. Each question came with a proposed answer. This shifted the work from “generate options” to “evaluate this option.” Faster.\u003c/p\u003e\u003cp\u003eThe “for now” framing helped. These weren’t permanent, irreversible commitments. They were working decisions that could be revised with evidence. Lower stakes enabled faster closure.\u003c/p\u003e\u003cp\u003eThe momentum helped. Each decision made the next easier. By decision 4, the pattern was established. By decision 8, we were comfortable with the rhythm.\u003c/p\u003e\u003ch3\u003eThe check that mattered\u003c/h3\u003e\u003cp\u003eQuestion 6 included a crucial moment.\u003c/p\u003e\u003cp\u003eThe initial recommendation was three journaling layers. It sounded good. It fit the pattern. I was ready to approve.\u003c/p\u003e\u003cp\u003eThen I paused: “Am I violating the no-optional-complexity rule?”\u003c/p\u003e\u003cp\u003e\u003cem\u003eNote: This is a rule I first formulated at CloudOn around 2014 or so when I realized that shipping on both Android and iOS simultaneously had been a trap (“just a little extra work for twice the users!”).\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThis is a principle I try to maintain — don’t add complexity unless it’s load-bearing. Every optional feature is maintenance burden.\u003c/p\u003e\u003cp\u003eThe honest answer: “The private diary is optional complexity. Jesse’s charming experiment, but not essential. The dream journal is load-bearing — it’s how insights surface.”\u003c/p\u003e\u003cp\u003eThe decision changed. Three layers became two.\u003c/p\u003e\u003cp\u003eLightning rounds require honesty. When the recommendation isn’t quite right, say so. The speed comes from closure, not from rubber-stamping.\u003c/p\u003e\u003ch3\u003eWhen lightning rounds fail\u003c/h3\u003e\u003cp\u003eLightning rounds don’t always work. There’s nothing guaranteed about snap judgments or a Q\u0026amp;A approach, even if that makes it easier to work through things in a linear way (and in a chat format, for that matter).\u003c/p\u003e\u003cp\u003eThey fail when:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuestions aren’t ready\u003c/strong\u003e: If you haven’t explored enough, rapid decisions produce bad decisions. You’re just guessing fast.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStakes are too high\u003c/strong\u003e: Some decisions deserve extended deliberation. “Should we pivot the company?” isn’t a lightning round question.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDependencies aren’t understood\u003c/strong\u003e: If answering question 3 might invalidate the answer to question 1, you can’t just march through sequentially.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrust is low\u003c/strong\u003e: Lightning rounds require trusting the recommendations. If every suggestion triggers suspicion, the format breaks down.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eComplexity is genuine\u003c/strong\u003e: Some questions don’t have clean answers. Forcing closure produces false clarity.\u003c/p\u003e\u003cp\u003eThe format works when exploration has prepared the ground, when decisions are important but not irreversible, and when the recommender has good judgment.\u003c/p\u003e\u003ch3\u003eThe value of “for now”\u003c/h3\u003e\u003cp\u003e“For now” is doing a lot of work in this format.\u003c/p\u003e\u003cp\u003eIt reduces decision anxiety. You’re not carving choices in stone. You’re making working decisions that can be revised.\u003c/p\u003e\u003cp\u003eIt enables progress. Perfect decisions require perfect information. “Good enough for now” decisions can be made with available information.\u003c/p\u003e\u003cp\u003eIt creates checkpoints. When new information emerges, you revisit. The “for now” decisions become hypotheses to validate.\u003c/p\u003e\u003cp\u003eMany teams get stuck because they treat every decision as permanent. “We need to get this right because we can’t change it.” This creates analysis paralysis.\u003c/p\u003e\u003cp\u003eMost decisions can be changed. The cost of changing is usually lower than the cost of not deciding. “For now” acknowledges this reality.\u003c/p\u003e\u003ch3\u003eAfter the lightning round\u003c/h3\u003e\u003cp\u003eForty-four minutes produced eight decisions. But the work wasn’t done.\u003c/p\u003e\u003cp\u003eThe decisions needed documentation. Each “yes” became a section in an architectural decisions document. The reasoning got captured. The trade-offs got noted.\u003c/p\u003e\u003cp\u003eThe decisions needed integration. How does the lifecycle connect to the metadata? How do the substrates relate to the lenses? The lightning round produced answers; synthesis showed how answers fit together.\u003c/p\u003e\u003cp\u003eThe decisions needed validation. Would these choices survive contact with implementation? Would edge cases reveal problems? The “for now” framing meant staying alert.\u003c/p\u003e\u003cp\u003eLightning rounds produce decisions. They don’t produce understanding. That comes from the documentation and integration work that follows.\u003c/p\u003e\u003ch3\u003eThe rhythm of exploration and closure\u003c/h3\u003e\u003cp\u003eTwo days of exploration. Forty-four minutes of decisions.\u003c/p\u003e\u003cp\u003eThis ratio isn’t universal. Sometimes exploration needs longer. Sometimes decisions can come sooner. But the rhythm — explore, then close — is generalizable.\u003c/p\u003e\u003cp\u003eExploration without closure produces accumulated questions. Closure without exploration produces uninformed decisions. Both phases matter.\u003c/p\u003e\u003cp\u003eThe discipline is knowing when to switch modes. When has exploration done its work? When are questions ready to become decisions?\u003c/p\u003e\u003cp\u003eHow do you know when to switch from exploration to decision mode? Good question. To be honest, for me it usually comes in the form of anxiety about the pending decisions piling up, just as eventually an itch to get back to work tells me that enough decisions have been made to move forward.\u003c/p\u003e\u003cp\u003eFor this object model, the signal was diminishing returns. New discussion wasn’t generating new insight. We were rehearsing the same considerations. Time to decide.\u003c/p\u003e\u003ch3\u003eEight decisions\u003c/h3\u003e\u003cp\u003eBy the end, we had:\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cstrong\u003eA way to perceive\u003c/strong\u003e — Lenses on substrates\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eA way to categorize\u003c/strong\u003e — Four substrates (Entities, Spaces, Moments, Situations)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eA way to track ownership\u003c/strong\u003e — Native, Federated, Synthetic\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eA way to track anything\u003c/strong\u003e — Six metadata dimensions\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eA way to understand change\u003c/strong\u003e — Eight-stage lifecycle with composting\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eA way to remember\u003c/strong\u003e — Two journal layers\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eA way to view\u003c/strong\u003e — Spatial dimensions as lenses\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eA way to understand users\u003c/strong\u003e — Tiered model with wants and fears\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eEach decision built on previous exploration. Each “for now” created forward momentum. Each architectural choice could now inform implementation.\u003c/p\u003e\u003cp\u003eForty-four minutes well spent. Because two days of exploration made them possible.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan, we pick up the build narrative again on January 17 when we discovered “The October Ghost” in the machine.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you used lightning rounds to close exploratory work? When has “for now” enabled progress? What signals tell you questions are ready for decisions?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=2f9dc68af576\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/8-decisions-in-44-minutes-2f9dc68af576\"\u003e8 Decisions in 44 Minutes\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T514d,"])</script><script>self.__next_f.push([1,"\u003csection name=\"8dc6\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"1cb6\" id=\"1cb6\" class=\"graf graf--h3 graf--leading graf--title\"\u003e8 Decisions in 44 Minutes\u003c/h3\u003e\u003cfigure name=\"6927\" id=\"6927\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*0C5ij_txq8WQnIfHMZ9IDg.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot host runs a lightning-round game, flipping index cards from a neat stack to a messy pile as a focused human contestant responds.\" src=\"https://cdn-images-1.medium.com/max/800/1*0C5ij_txq8WQnIfHMZ9IDg.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Next question?”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"a268\" id=\"a268\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNovember 27\u003c/em\u003e\u003c/p\u003e\u003cp name=\"2ddd\" id=\"2ddd\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eT\u003c/span\u003ewo days of exploration. Open questions accumulating. Rich discussion but no closure.\u003c/p\u003e\u003cp name=\"2c89\" id=\"2c89\" class=\"graf graf--p graf-after--p\"\u003eThen: “Ask me one at a time, make a recommendation, we’ll decide for now and move to the next.”\u003c/p\u003e\u003cp name=\"8876\" id=\"8876\" class=\"graf graf--p graf-after--p\"\u003eForty-four minutes later, eight architectural decisions were made. Questions that had resisted closure for days fell one after another.\u003c/p\u003e\u003cp name=\"964f\" id=\"964f\" class=\"graf graf--p graf-after--p\"\u003eLightning rounds can work, but only after sufficent exploration has prepared the ground.\u003c/p\u003e\u003ch3 name=\"b6a6\" id=\"b6a6\" class=\"graf graf--h3 graf-after--p\"\u003eThe accumulating problem\u003c/h3\u003e\u003cp name=\"d732\" id=\"d732\" class=\"graf graf--p graf-after--h3\"\u003eExploratory work generates questions faster than it answers them.\u003c/p\u003e\u003cp name=\"7fd7\" id=\"7fd7\" class=\"graf graf--p graf-after--p\"\u003eYou’re building an object model. You discuss “substrates” — what are the fundamental types? That raises questions about lenses — how do you view those types? Which raises questions about metadata — what do you track about each? Which raises questions about lifecycle — how do objects change over time?\u003c/p\u003e\u003cp name=\"9f40\" id=\"9f40\" class=\"graf graf--p graf-after--p\"\u003eEach question is connected to others. Answering one affects the others. So you keep exploring, hoping clarity will emerge.\u003c/p\u003e\u003cp name=\"ae9c\" id=\"ae9c\" class=\"graf graf--p graf-after--p\"\u003eSometimes it does. Often it doesn’t. The questions accumulate. The discussion continues. Progress stalls.\u003c/p\u003e\u003cp name=\"f776\" id=\"f776\" class=\"graf graf--p graf-after--p\"\u003eThis isn’t failure — exploration is valuable. But at some point, you need to stop exploring and start deciding.\u003c/p\u003e\u003ch3 name=\"fcf9\" id=\"fcf9\" class=\"graf graf--h3 graf-after--p\"\u003eThe lightning-round format\u003c/h3\u003e\u003cp name=\"0a19\" id=\"0a19\" class=\"graf graf--p graf-after--h3\"\u003eThe format is simple:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"33fc\" id=\"33fc\" class=\"graf graf--li graf-after--p\"\u003eAsk one question\u003c/li\u003e\u003cli name=\"3547\" id=\"3547\" class=\"graf graf--li graf-after--li\"\u003eOffer a recommendation\u003c/li\u003e\u003cli name=\"c0d9\" id=\"c0d9\" class=\"graf graf--li graf-after--li\"\u003eDecide (for now)\u003c/li\u003e\u003cli name=\"6669\" id=\"6669\" class=\"graf graf--li graf-after--li\"\u003eMove to the next question\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"8c6d\" id=\"8c6d\" class=\"graf graf--p graf-after--li\"\u003eNo extended discussion. No reopening previous decisions. No “let me think about it.” Decide and move.\u003c/p\u003e\u003cp name=\"aefe\" id=\"aefe\" class=\"graf graf--p graf-after--p\"\u003eThe constraint is the point. Without it, every question becomes an invitation to re-explore. With it, questions become binary: accept recommendation or modify it.\u003c/p\u003e\u003ch3 name=\"78db\" id=\"78db\" class=\"graf graf--h3 graf-after--p\"\u003eCall and response\u003c/h3\u003e\u003cp name=\"efd7\" id=\"efd7\" class=\"graf graf--p graf-after--h3\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestion 1\u003c/strong\u003e: How should Piper perceive objects?\u003c/p\u003e\u003cp name=\"fafd\" id=\"fafd\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Lenses on substrates, not discrete object types. View the same underlying thing through different perspectives rather than creating separate object hierarchies.\u003c/p\u003e\u003cp name=\"86fe\" id=\"86fe\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “Lenses on substrates, yes!”\u003c/p\u003e\u003cp name=\"7938\" id=\"7938\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eTime\u003c/em\u003e: 1 minute\u003c/p\u003e\u003cp name=\"1bf0\" id=\"1bf0\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestion 2\u003c/strong\u003e: How many substrates?\u003c/p\u003e\u003cp name=\"247e\" id=\"247e\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Four — Entities, Spaces, Moments, Situations. Rich enough to capture the domain, concise enough to reason about.\u003c/p\u003e\u003cp name=\"cc20\" id=\"cc20\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “Good balance of rich vs. concise”\u003c/p\u003e\u003cp name=\"bc3b\" id=\"bc3b\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eTime\u003c/em\u003e: 1 minute\u003c/p\u003e\u003cp name=\"50b5\" id=\"50b5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestion 3\u003c/strong\u003e: How should document creation and ownership work?\u003c/p\u003e\u003cp name=\"467f\" id=\"467f\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Three-way model — Native (Piper’s mind), Federated (senses reaching into external systems), Synthetic (understanding derived from both).\u003c/p\u003e\u003cp name=\"3ab2\" id=\"3ab2\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “I like the metaphorical breakdown”\u003c/p\u003e\u003cp name=\"4de7\" id=\"4de7\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eTime\u003c/em\u003e: 1 minute\u003c/p\u003e\u003cp name=\"accf\" id=\"accf\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestion 4\u003c/strong\u003e: What metadata tracks everything?\u003c/p\u003e\u003cp name=\"4224\" id=\"4224\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Six dimensions — Provenance, Relevance, Attention, Confidence, Relations, Journal.\u003c/p\u003e\u003cp name=\"9da8\" id=\"9da8\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: “I love this, yes, good”\u003c/p\u003e\u003cp name=\"f489\" id=\"f489\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eTime\u003c/em\u003e: 1 minute\u003c/p\u003e\u003cp name=\"9fb5\" id=\"9fb5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestion 5\u003c/strong\u003e: What’s the object lifecycle?\u003c/p\u003e\u003cp name=\"27a9\" id=\"27a9\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Eight stages including “composting” — objects don’t just die, they decompose and feed new growth.\u003c/p\u003e\u003cp name=\"a13d\" id=\"a13d\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eInitial reaction\u003c/em\u003e: Enthusiasm for composting metaphor, noting this is often a neglected part of the job: “The shadow side of PM work is ending things”\u003c/p\u003e\u003cp name=\"d2c9\" id=\"d2c9\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDiscussion\u003c/em\u003e: How deprecation/archival/composting connects back to emergence\u003c/p\u003e\u003cp name=\"e5a2\" id=\"e5a2\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: Full cycle with composting stage\u003c/p\u003e\u003cp name=\"96e0\" id=\"96e0\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eTime\u003c/em\u003e: 7 minutes (the longest)\u003c/p\u003e\u003cp name=\"3fd7\" id=\"3fd7\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestion 6\u003c/strong\u003e: How should journaling work?\u003c/p\u003e\u003cp name=\"f217\" id=\"f217\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eInitial recommendation\u003c/em\u003e: Three layers — Public Journal, Private Diary, Dream Journal\u003c/p\u003e\u003cp name=\"00b7\" id=\"00b7\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eCheck\u003c/em\u003e: “Am I violating the \u003cstrong class=\"markup--strong markup--p-strong\"\u003eno-optional-complexity\u003c/strong\u003e rule?”\u003c/p\u003e\u003cp name=\"05b7\" id=\"05b7\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eHonest answer\u003c/em\u003e: “The private diary is optional complexity. The dream journal is load-bearing.”\u003c/p\u003e\u003cp name=\"72bc\" id=\"72bc\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eRevised decision\u003c/em\u003e: Two layers — Session Journal (audit trail) and Insight Journal (dreams surfaced)\u003c/p\u003e\u003cp name=\"b564\" id=\"b564\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eTime\u003c/em\u003e: 7 minutes\u003c/p\u003e\u003cp name=\"7235\" id=\"7235\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestion 7\u003c/strong\u003e: How do the spatial dimensions relate to lenses?\u003c/p\u003e\u003cp name=\"aa09\" id=\"aa09\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecision (after discussion)\u003c/em\u003e: “I can decide now we will use the spatial dimensions as lenses. The intents align.”\u003c/p\u003e\u003cp name=\"1232\" id=\"1232\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eTime\u003c/em\u003e: 5 minutes\u003c/p\u003e\u003cp name=\"ff1c\" id=\"ff1c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestion 8\u003c/strong\u003e: How does Piper model users?\u003c/p\u003e\u003cp name=\"cd40\" id=\"cd40\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eRecommendation\u003c/em\u003e: Native object with tiered depth — Principal, Team, Stakeholders, Mentioned. Core heuristic: “What do they want? What are they afraid of?”\u003c/p\u003e\u003cp name=\"a027\" id=\"a027\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eDecision\u003c/em\u003e: Approved with stakeholder empathy at center\u003c/p\u003e\u003cp name=\"f381\" id=\"f381\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eTime\u003c/em\u003e: 22 minutes (took the most discussion)\u003c/p\u003e\u003cp name=\"7c43\" id=\"7c43\" class=\"graf graf--p graf-after--p\"\u003eTotal: 44 minutes, 8 decisions.\u003c/p\u003e\u003ch3 name=\"2550\" id=\"2550\" class=\"graf graf--h3 graf-after--p\"\u003eWhy it worked\u003c/h3\u003e\u003cp name=\"c95d\" id=\"c95d\" class=\"graf graf--p graf-after--h3\"\u003eThe lightning round worked because two days of exploration had prepared the ground.\u003c/p\u003e\u003cp name=\"27f9\" id=\"27f9\" class=\"graf graf--p graf-after--p\"\u003eWe weren’t deciding from ignorance. Every question had been discussed. Options had been considered. Trade-offs were understood. The decisions were ready to be made — they just hadn’t been made.\u003c/p\u003e\u003cp name=\"1164\" id=\"1164\" class=\"graf graf--p graf-after--p\"\u003eThe recommendations helped. Each question came with a proposed answer. This shifted the work from “generate options” to “evaluate this option.” Faster.\u003c/p\u003e\u003cp name=\"699c\" id=\"699c\" class=\"graf graf--p graf-after--p\"\u003eThe “for now” framing helped. These weren’t permanent, irreversible commitments. They were working decisions that could be revised with evidence. Lower stakes enabled faster closure.\u003c/p\u003e\u003cp name=\"7c0a\" id=\"7c0a\" class=\"graf graf--p graf-after--p\"\u003eThe momentum helped. Each decision made the next easier. By decision 4, the pattern was established. By decision 8, we were comfortable with the rhythm.\u003c/p\u003e\u003ch3 name=\"9575\" id=\"9575\" class=\"graf graf--h3 graf-after--p\"\u003eThe check that mattered\u003c/h3\u003e\u003cp name=\"d4c2\" id=\"d4c2\" class=\"graf graf--p graf-after--h3\"\u003eQuestion 6 included a crucial moment.\u003c/p\u003e\u003cp name=\"28e1\" id=\"28e1\" class=\"graf graf--p graf-after--p\"\u003eThe initial recommendation was three journaling layers. It sounded good. It fit the pattern. I was ready to approve.\u003c/p\u003e\u003cp name=\"53ed\" id=\"53ed\" class=\"graf graf--p graf-after--p\"\u003eThen I paused: “Am I violating the no-optional-complexity rule?”\u003c/p\u003e\u003cp name=\"4ab9\" id=\"4ab9\" class=\"graf graf--p graf-after--p\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eNote: This is a rule I first formulated at CloudOn around 2014 or so when I realized that shipping on both Android and iOS simultaneously had been a trap (“just a little extra work for twice the users!”).\u003c/em\u003e\u003c/p\u003e\u003cp name=\"2e45\" id=\"2e45\" class=\"graf graf--p graf-after--p\"\u003eThis is a principle I try to maintain — don’t add complexity unless it’s load-bearing. Every optional feature is maintenance burden.\u003c/p\u003e\u003cp name=\"bd47\" id=\"bd47\" class=\"graf graf--p graf-after--p\"\u003eThe honest answer: “The private diary is optional complexity. Jesse’s charming experiment, but not essential. The dream journal is load-bearing — it’s how insights surface.”\u003c/p\u003e\u003cp name=\"f0ac\" id=\"f0ac\" class=\"graf graf--p graf-after--p\"\u003eThe decision changed. Three layers became two.\u003c/p\u003e\u003cp name=\"8941\" id=\"8941\" class=\"graf graf--p graf-after--p\"\u003eLightning rounds require honesty. When the recommendation isn’t quite right, say so. The speed comes from closure, not from rubber-stamping.\u003c/p\u003e\u003ch3 name=\"a450\" id=\"a450\" class=\"graf graf--h3 graf-after--p\"\u003eWhen lightning rounds fail\u003c/h3\u003e\u003cp name=\"78d6\" id=\"78d6\" class=\"graf graf--p graf-after--h3\"\u003eLightning rounds don’t always work. There’s nothing guaranteed about snap judgments or a Q\u0026amp;A approach, even if that makes it easier to work through things in a linear way (and in a chat format, for that matter).\u003c/p\u003e\u003cp name=\"1fa0\" id=\"1fa0\" class=\"graf graf--p graf-after--p\"\u003eThey fail when:\u003c/p\u003e\u003cp name=\"3e2c\" id=\"3e2c\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eQuestions aren’t ready\u003c/strong\u003e: If you haven’t explored enough, rapid decisions produce bad decisions. You’re just guessing fast.\u003c/p\u003e\u003cp name=\"9de7\" id=\"9de7\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eStakes are too high\u003c/strong\u003e: Some decisions deserve extended deliberation. “Should we pivot the company?” isn’t a lightning round question.\u003c/p\u003e\u003cp name=\"30ae\" id=\"30ae\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eDependencies aren’t understood\u003c/strong\u003e: If answering question 3 might invalidate the answer to question 1, you can’t just march through sequentially.\u003c/p\u003e\u003cp name=\"3f42\" id=\"3f42\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eTrust is low\u003c/strong\u003e: Lightning rounds require trusting the recommendations. If every suggestion triggers suspicion, the format breaks down.\u003c/p\u003e\u003cp name=\"4e85\" id=\"4e85\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eComplexity is genuine\u003c/strong\u003e: Some questions don’t have clean answers. Forcing closure produces false clarity.\u003c/p\u003e\u003cp name=\"6cfb\" id=\"6cfb\" class=\"graf graf--p graf-after--p\"\u003eThe format works when exploration has prepared the ground, when decisions are important but not irreversible, and when the recommender has good judgment.\u003c/p\u003e\u003ch3 name=\"ce94\" id=\"ce94\" class=\"graf graf--h3 graf-after--p\"\u003eThe value of “for now”\u003c/h3\u003e\u003cp name=\"d65b\" id=\"d65b\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--h3\"\u003e“For now” is doing a lot of work in this format.\u003c/p\u003e\u003cp name=\"95a8\" id=\"95a8\" class=\"graf graf--p graf-after--p\"\u003eIt reduces decision anxiety. You’re not carving choices in stone. You’re making working decisions that can be revised.\u003c/p\u003e\u003cp name=\"eecd\" id=\"eecd\" class=\"graf graf--p graf-after--p\"\u003eIt enables progress. Perfect decisions require perfect information. “Good enough for now” decisions can be made with available information.\u003c/p\u003e\u003cp name=\"7524\" id=\"7524\" class=\"graf graf--p graf-after--p\"\u003eIt creates checkpoints. When new information emerges, you revisit. The “for now” decisions become hypotheses to validate.\u003c/p\u003e\u003cp name=\"895e\" id=\"895e\" class=\"graf graf--p graf-after--p\"\u003eMany teams get stuck because they treat every decision as permanent. “We need to get this right because we can’t change it.” This creates analysis paralysis.\u003c/p\u003e\u003cp name=\"9017\" id=\"9017\" class=\"graf graf--p graf-after--p\"\u003eMost decisions can be changed. The cost of changing is usually lower than the cost of not deciding. “For now” acknowledges this reality.\u003c/p\u003e\u003ch3 name=\"0bec\" id=\"0bec\" class=\"graf graf--h3 graf-after--p\"\u003eAfter the lightning round\u003c/h3\u003e\u003cp name=\"1179\" id=\"1179\" class=\"graf graf--p graf-after--h3\"\u003eForty-four minutes produced eight decisions. But the work wasn’t done.\u003c/p\u003e\u003cp name=\"f386\" id=\"f386\" class=\"graf graf--p graf-after--p\"\u003eThe decisions needed documentation. Each “yes” became a section in an architectural decisions document. The reasoning got captured. The trade-offs got noted.\u003c/p\u003e\u003cp name=\"a930\" id=\"a930\" class=\"graf graf--p graf-after--p\"\u003eThe decisions needed integration. How does the lifecycle connect to the metadata? How do the substrates relate to the lenses? The lightning round produced answers; synthesis showed how answers fit together.\u003c/p\u003e\u003cp name=\"133d\" id=\"133d\" class=\"graf graf--p graf-after--p\"\u003eThe decisions needed validation. Would these choices survive contact with implementation? Would edge cases reveal problems? The “for now” framing meant staying alert.\u003c/p\u003e\u003cp name=\"38b6\" id=\"38b6\" class=\"graf graf--p graf-after--p\"\u003eLightning rounds produce decisions. They don’t produce understanding. That comes from the documentation and integration work that follows.\u003c/p\u003e\u003ch3 name=\"f48e\" id=\"f48e\" class=\"graf graf--h3 graf-after--p\"\u003eThe rhythm of exploration and closure\u003c/h3\u003e\u003cp name=\"833e\" id=\"833e\" class=\"graf graf--p graf-after--h3\"\u003eTwo days of exploration. Forty-four minutes of decisions.\u003c/p\u003e\u003cp name=\"24dc\" id=\"24dc\" class=\"graf graf--p graf-after--p\"\u003eThis ratio isn’t universal. Sometimes exploration needs longer. Sometimes decisions can come sooner. But the rhythm — explore, then close — is generalizable.\u003c/p\u003e\u003cp name=\"fa84\" id=\"fa84\" class=\"graf graf--p graf-after--p\"\u003eExploration without closure produces accumulated questions. Closure without exploration produces uninformed decisions. Both phases matter.\u003c/p\u003e\u003cp name=\"42d8\" id=\"42d8\" class=\"graf graf--p graf-after--p\"\u003eThe discipline is knowing when to switch modes. When has exploration done its work? When are questions ready to become decisions?\u003c/p\u003e\u003cp name=\"ed70\" id=\"ed70\" class=\"graf graf--p graf-after--p\"\u003eHow do you know when to switch from exploration to decision mode? Good question. To be honest, for me it usually comes in the form of anxiety about the pending decisions piling up, just as eventually an itch to get back to work tells me that enough decisions have been made to move forward.\u003c/p\u003e\u003cp name=\"c085\" id=\"c085\" class=\"graf graf--p graf-after--p\"\u003eFor this object model, the signal was diminishing returns. New discussion wasn’t generating new insight. We were rehearsing the same considerations. Time to decide.\u003c/p\u003e\u003ch3 name=\"b1f2\" id=\"b1f2\" class=\"graf graf--h3 graf-after--p\"\u003eEight decisions\u003c/h3\u003e\u003cp name=\"943b\" id=\"943b\" class=\"graf graf--p graf-after--h3\"\u003eBy the end, we had:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"4d1f\" id=\"4d1f\" class=\"graf graf--li graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eA way to perceive\u003c/strong\u003e — Lenses on substrates\u003c/li\u003e\u003cli name=\"324c\" id=\"324c\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eA way to categorize\u003c/strong\u003e — Four substrates (Entities, Spaces, Moments, Situations)\u003c/li\u003e\u003cli name=\"e9ab\" id=\"e9ab\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eA way to track ownership\u003c/strong\u003e — Native, Federated, Synthetic\u003c/li\u003e\u003cli name=\"b79b\" id=\"b79b\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eA way to track anything\u003c/strong\u003e — Six metadata dimensions\u003c/li\u003e\u003cli name=\"6bce\" id=\"6bce\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eA way to understand change\u003c/strong\u003e — Eight-stage lifecycle with composting\u003c/li\u003e\u003cli name=\"e6c7\" id=\"e6c7\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eA way to remember\u003c/strong\u003e — Two journal layers\u003c/li\u003e\u003cli name=\"4ec1\" id=\"4ec1\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eA way to view\u003c/strong\u003e — Spatial dimensions as lenses\u003c/li\u003e\u003cli name=\"cf91\" id=\"cf91\" class=\"graf graf--li graf-after--li\"\u003e\u003cstrong class=\"markup--strong markup--li-strong\"\u003eA way to understand users\u003c/strong\u003e — Tiered model with wants and fears\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"41bb\" id=\"41bb\" class=\"graf graf--p graf-after--li\"\u003eEach decision built on previous exploration. Each “for now” created forward momentum. Each architectural choice could now inform implementation.\u003c/p\u003e\u003cp name=\"d754\" id=\"d754\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eForty-four minutes well spent. Because two days of exploration made them possible.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"8 Decisions in 44 Minutes\",\"excerpt\":\"“Next question?”November 27Two days of exploration. Open questions accumulating. Rich discussion but no closure.Then: “Ask me one at a time, make a recommendation, we’ll decide for now and move to the next.”Forty-four minutes later, eight architectural decisions were made. Questions that had resi...\",\"url\":\"/blog/8-decisions-in-44-minutes\",\"publishedAt\":\"Jan 25, 2026\",\"publishedAtISO\":\"2026-01-25T15:09:02.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/2f9dc68af576\",\"featuredImage\":\"/assets/blog-images/2f9dc68af576-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/8-decisions-in-44-minutes-2f9dc68af576?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"8-decisions-in-44-minutes\",\"workDate\":\"Jan 25, 2026\",\"workDateISO\":\"2026-01-25T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-01-25\",\"featured\":false},\"content\":{\"title\":\"8 Decisions in 44 Minutes\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"8 Decisions in 44 Minutes | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"8 Decisions in 44 Minutes\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"8 Decisions in 44 Minutes\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
