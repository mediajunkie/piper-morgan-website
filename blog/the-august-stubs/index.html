s\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T1a23,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A plumbing system has no water flowing in it yet, just a sticky note saying “Water will flow here”\" src=\"https://cdn-images-1.medium.com/max/1024/1*qcAhbxe59pTnLlYXll9pjA.png\" /\u003e\u003cfigcaption\u003e“Not a drop yet!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eJanuary 9–11, 2026\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTwenty-three issues closed in three days. Two epics completed. A sprint finished. And buried in the middle of all that velocity: the discovery that infrastructure we’d built seven months ago had never actually worked.\u003c/p\u003e\u003ch3\u003eThe methods that weren’t\u003c/h3\u003e\u003cp\u003eJanuary 10, midway through implementing conversation history, I found this:\u003c/p\u003e\u003cpre\u003easync def get_conversation_turns(self, conversation_id: str) -\u0026gt; list:\u003cbr\u003e    return []  # BUG: Always returns empty\u003cbr\u003e\u003cbr\u003easync def save_turn(self, conversation_id: str, turn: dict) -\u0026gt; None:\u003cbr\u003e    logger.info(f\u0026quot;Saving turn to {conversation_id}\u0026quot;)  # BUG: No-op\u003c/pre\u003e\u003cp\u003eThe ConversationRepository had existed since August 2025. The database tables were there. The interface was defined. The methods had signatures and docstrings. Tests passed — because they mocked the interface rather than calling the real implementation.\u003c/p\u003e\u003cp\u003eFive months of builds on top of infrastructure that returned empty arrays and logged instead of saving. Plus, this was hardly the first time I’ve found out I was living in a Potemkin Village in my codebase.\u003c/p\u003e\u003ch3\u003eWhat the velocity exposed\u003c/h3\u003e\u003cp\u003eThe irony: we only found the stubs because we were moving fast.\u003c/p\u003e\u003cp\u003eJanuary 9 had been exceptional. Seven issues closed. The Lead Developer called it “Pattern-045 canonical day” — the clearest demonstration yet of what happens when systematic methodology meets focused execution. Gameplans ready. Completion matrices enforced. Evidence required before any issue could close.\u003c/p\u003e\u003cp\u003eJanuary 10 matched it. Seven more issues. Epic #314 complete — session continuity, timestamps, conversation sidebar, home page cleanup. Four major UI features in a single day.\u003c/p\u003e\u003cp\u003eJanuary 11 pushed further. Nine issues. Sprint B1 complete. Epic #543 finished.\u003c/p\u003e\u003cp\u003eBut the speed wasn’t just about closing tickets. It was about what the speed revealed. When you move fast through infrastructure, you hit the gaps. The ConversationRepository stubs weren’t a new bug — they were a seven-month-old assumption that “the plumbing works” finally getting tested.\u003c/p\u003e\u003cp\u003eIt did feel good to be on the move again, and by now this cycle of discovering and completing unfinished work is almost too familiar.\u003c/p\u003e\u003ch3\u003eThe 75% pattern strikes again\u003c/h3\u003e\u003cp\u003eThis was familiar. Too familiar.\u003c/p\u003e\u003cp\u003eWe’d documented Pattern-045 (“Green Tests, Red User”) weeks earlier: tests pass because they mock interfaces, but the actual implementation is incomplete. The standup templates. The project repository. Now the conversation repository.\u003c/p\u003e\u003cp\u003eThe pattern keeps recurring because it’s structural, not accidental:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 1\u003c/strong\u003e: Build the interface. Define the contract. Write tests against mocks.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 2\u003c/strong\u003e: Implement \u003cem\u003esomething\u003c/em\u003e. Enough that it doesn’t crash. Log statements to show activity.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 3\u003c/strong\u003e: Move on. The tests pass. The interface exists. It \u003cem\u003elooks\u003c/em\u003e complete.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 4\u003c/strong\u003e: Much later, discover the implementation was never finished.\u003c/p\u003e\u003cp\u003eWe’d been calling it the “75% completion trap.” The August stubs made it concrete. Infrastructure can exist for months — database tables, repository classes, method signatures — while the actual functionality remains a no-op.\u003c/p\u003e\u003ch3\u003eWhat enabled the velocity\u003c/h3\u003e\u003cp\u003eTwenty-three issues in three days isn’t just about volume. It comes down to planning and process.\u003c/p\u003e\u003cp\u003eThe gameplans were thorough. Not just “here’s what to build” but “here’s exactly how to verify it’s done.” Phase 0 through Phase N, each with explicit completion criteria.\u003c/p\u003e\u003cp\u003eThe completion matrices worked. Every issue had checkboxes that required evidence. Not “I think it’s done” but “here’s the test output, here’s the commit, here’s the verification.”\u003c/p\u003e\u003cp\u003eThe template compliance paid off. The Lead Developer had audited issues against templates, applied fixes for compliance. That rigor during planning meant fewer surprises during implementation.\u003c/p\u003e\u003cp\u003eThe agents knew their roles. Subagents could be deployed with clear prompts. Code review followed patterns. The methodology had become machinery.\u003c/p\u003e\u003ch3\u003eThe fix was fast\u003c/h3\u003e\u003cp\u003eOnce found, the ConversationRepository took an hour to fix. Real SQLAlchemy queries. Actual database writes. The kind of implementation that should have existed from the start.\u003c/p\u003e\u003cp\u003eThe fix being fast was the point. The \u003cem\u003efinding\u003c/em\u003e was the hard part. Seven months of assuming the plumbing worked. Seven months of tests that passed because they never touched the real code.\u003c/p\u003e\u003cp\u003eThe methodology caught it not because we went looking for old bugs, but because moving fast through the codebase means touching everything. Velocity is a diagnostic tool. When you can’t move fast, something is blocking you. When you move fast and things break, you’ve found the gaps.\u003c/p\u003e\u003ch3\u003eWhat the stubs taught me (this time)\u003c/h3\u003e\u003cp\u003eInfrastructure is not implementation. Tables existing doesn’t mean the queries work. Interfaces defined doesn’t mean the methods do anything. Tests passing doesn’t mean the feature is complete.\u003c/p\u003e\u003cp\u003eThe completion matrices we’d been enforcing — the explicit evidence requirements, the verification steps, the STOP conditions — exist precisely because the alternative is seven months of empty methods.\u003c/p\u003e\u003cp\u003eI don’t regret discovering these August stubs. They taught us something. I’m grateful for the January velocity that exposed them so we could finally finish them up.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: “The Domain Model Disconnect” from January 9 to 11, when I once again discover that maintaining Domain-Driven Design discipline is no walk in the park.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you ever discovered that infrastructure you trusted had never actually been implemented? How long did the gap go unnoticed?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=ff4f404639e8\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-august-stubs-ff4f404639e8\"\u003eThe August Stubs\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T2577,"])</script><script>self.__next_f.push([1,"\u003csection name=\"e0fb\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"8439\" id=\"8439\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe August Stubs\u003c/h3\u003e\u003cfigure name=\"31cc\" id=\"31cc\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*qcAhbxe59pTnLlYXll9pjA.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A plumbing system has no water flowing in it yet, just a sticky note saying “Water will flow here”\" src=\"https://cdn-images-1.medium.com/max/800/1*qcAhbxe59pTnLlYXll9pjA.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Not a drop yet!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"5c3b\" id=\"5c3b\" class=\"graf graf--p graf-a ass=\"hljs-title function_ invoke__\"\u003einfo\u003c/span\u003e(f\u003cspan class=\"hljs-string\"\u003e\u0026quot;Saving turn to {conversation_id}\u0026quot;\u003c/span\u003e)  # BUG: No-op\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"2c4d\" id=\"2c4d\" class=\"graf graf--p graf-after--pre\"\u003eThe ConversationRepository had existed since August 2025. The database tables were there. The interface was defined. The methods had signatures and docstrings. Tests passed — because they mocked the interface rather than calling the real implementation.\u003c/p\u003e\u003cp name=\"c012\" id=\"c012\" class=\"graf graf--p graf-after--p\"\u003eFive months of builds on top of infrastructure that returned empty arrays and logged instead of saving. Plus, this was hardly the first time I’ve found out I was living in a Potemkin Village in my codebase.\u003c/p\u003e\u003ch3 name=\"a234\" id=\"a234\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the velocity exposed\u003c/h3\u003e\u003cp name=\"a448\" id=\"a448\" class=\"graf graf--p graf-after--h3\"\u003eThe irony: we only found the stubs because we were moving fast.\u003c/p\u003e\u003cp name=\"3a5e\" id=\"3a5e\" class=\"graf graf--p graf-after--p\"\u003eJanuary 9 had been exceptional. Seven issues closed. The Lead Developer called it “Pattern-045 canonical day” — the clearest demonstration yet of what happens when systematic methodology meets focused execution. Gameplans ready. Completion matrices enforced. Evidence required before any issue could close.\u003c/p\u003e\u003cp name=\"6f65\" id=\"6f65\" class=\"graf graf--p graf-after--p\"\u003eJanuary 10 matched it. Seven more issues. Epic #314 complete — session continuity, timestamps, conversation sidebar, home page cleanup. Four major UI features in a single day.\u003c/p\u003e\u003cp name=\"65ce\" id=\"65ce\" class=\"graf graf--p graf-after--p\"\u003eJanuary 11 pushed further. Nine issues. Sprint B1 complete. Epic #543 finished.\u003c/p\u003e\u003cp name=\"35a7\" id=\"35a7\" class=\"graf graf--p graf-after--p\"\u003eBut the speed wasn’t just about closing tickets. It was about what the speed revealed. When you move fast through infrastructure, you hit the gaps. The ConversationRepository stubs weren’t a new bug — they were a seven-month-old assumption that “the plumbing works” finally getting tested.\u003c/p\u003e\u003cp name=\"8832\" id=\"8832\" class=\"graf graf--p graf-after--p\"\u003eIt did feel good to be on the move again, and by now this cycle of discovering and completing unfinished work is almost too familiar.\u003c/p\u003e\u003ch3 name=\"5b87\" id=\"5b87\" class=\"graf graf--h3 graf-after--p\"\u003eThe 75% pattern strikes again\u003c/h3\u003e\u003cp name=\"ed8a\" id=\"ed8a\" class=\"graf graf--p graf-after--h3\"\u003eThis was familiar. Too familiar.\u003c/p\u003e\u003cp name=\"7afa\" id=\"7afa\" class=\"graf graf--p graf-after--p\"\u003eWe’d documented Pattern-045 (“Green Tests, Red User”) weeks earlier: tests pass because they mock interfaces, but the actual implementation is incomplete. The standup templates. The project repository. Now the conversation repository.\u003c/p\u003e\u003cp name=\"2b51\" id=\"2b51\" class=\"graf graf--p graf-after--p\"\u003eThe pattern keeps recurring because it’s structural, not accidental:\u003c/p\u003e\u003cp name=\"d38b\" id=\"d38b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 1\u003c/strong\u003e: Build the interface. Define the contract. Write tests against mocks.\u003c/p\u003e\u003cp name=\"969e\" id=\"969e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 2\u003c/strong\u003e: Implement \u003cem class=\"markup--em markup--p-em\"\u003esomething\u003c/em\u003e. Enough that it doesn’t crash. Log statements to show activity.\u003c/p\u003e\u003cp name=\"112b\" id=\"112b\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 3\u003c/strong\u003e: Move on. The tests pass. The interface exists. It \u003cem class=\"markup--em markup--p-em\"\u003elooks\u003c/em\u003e complete.\u003c/p\u003e\u003cp name=\"8c21\" id=\"8c21\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePhase 4\u003c/strong\u003e: Much later, discover the implementation was never finished.\u003c/p\u003e\u003cp name=\"254f\" id=\"254f\" class=\"graf graf--p graf-after--p\"\u003eWe’d been calling it the “75% completion trap.” The August stubs made it concrete. Infrastructure can exist for months — database tables, repository classes, method signatures — while the actual functionality remains a no-op.\u003c/p\u003e\u003ch3 name=\"ae0d\" id=\"ae0d\" class=\"graf graf--h3 graf-after--p\"\u003eWhat enabled the velocity\u003c/h3\u003e\u003cp name=\"b031\" id=\"b031\" class=\"graf graf--p graf-after--h3\"\u003eTwenty-three issues in three days isn’t just about volume. It comes down to planning and process.\u003c/p\u003e\u003cp name=\"2399\" id=\"2399\" class=\"graf graf--p graf-after--p\"\u003eThe gameplans were thorough. Not just “here’s what to build” but “here’s exactly how to verify it’s done.” Phase 0 through Phase N, each with explicit completion criteria.\u003c/p\u003e\u003cp name=\"7970\" id=\"7970\" class=\"graf graf--p graf-after--p\"\u003eThe completion matrices worked. Every issue had checkboxes that required evidence. Not “I think it’s done” but “here’s the test output, here’s the commit, here’s the verification.”\u003c/p\u003e\u003cp name=\"9e84\" id=\"9e84\" class=\"graf graf--p graf-after--p\"\u003eThe template compliance paid off. The Lead Developer had audited issues against templates, applied fixes for compliance. That rigor during planning meant fewer surprises during implementation.\u003c/p\u003e\u003cp name=\"8b7e\" id=\"8b7e\" class=\"graf graf--p graf-after--p\"\u003eThe agents knew their roles. Subagents could be deployed with clear prompts. Code review followed patterns. The methodology had become machinery.\u003c/p\u003e\u003ch3 name=\"77f7\" id=\"77f7\" class=\"graf graf--h3 graf-after--p\"\u003eThe fix was fast\u003c/h3\u003e\u003cp name=\"a47e\" id=\"a47e\" class=\"graf graf--p graf-after--h3\"\u003eOnce found, the ConversationRepository took an hour to fix. Real SQLAlchemy queries. Actual database writes. The kind of implementation that should have existed from the start.\u003c/p\u003e\u003cp name=\"e9a5\" id=\"e9a5\" class=\"graf graf--p graf-after--p\"\u003eThe fix being fast was the point. The \u003cem class=\"markup--em markup--p-em\"\u003efinding\u003c/em\u003e was the hard part. Seven months of assuming the plumbing worked. Seven months of tests that passed because they never touched the real code.\u003c/p\u003e\u003cp name=\"5097\" id=\"5097\" class=\"graf graf--p graf-after--p\"\u003eThe methodology caught it not because we went looking for old bugs, but because moving fast through the codebase means touching everything. Velocity is a diagnostic tool. When you can’t move fast, something is blocking you. When you move fast and things break, you’ve found the gaps.\u003c/p\u003e\u003ch3 name=\"6969\" id=\"6969\" class=\"graf graf--h3 graf-after--p\"\u003eWhat the stubs taught me (this time)\u003c/h3\u003e\u003cp name=\"2439\" id=\"2439\" class=\"graf graf--p graf-after--h3\"\u003eInfrastructure is not implementation. Tables existing doesn’t mean the queries work. Interfaces defined doesn’t mean the methods do anything. Tests passing doesn’t mean the feature is complete.\u003c/p\u003e\u003cp name=\"7c5b\" id=\"7c5b\" class=\"graf graf--p graf-after--p\"\u003eThe completion matrices we’d been enforcing — the explicit evidence requirements, the verification steps, the STOP conditions — exist precisely because the alternative is seven months of empty methods.\u003c/p\u003e\u003cp name=\"cf59\" id=\"cf59\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eI don’t regret discovering these August stubs. They taught us something. I’m grateful for the January velocity that exposed them so we could finally finish them up.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The August Stubs\",\"excerpt\":\"“Not a drop yet!”January 9–11, 2026Twenty-three issues closed in three days. Two epics completed. A sprint finished. And buried in the middle of all that velocity: the discovery that infrastructure we’d built seven months ago had never actually worked.The methods that weren’tJanuary 10, midway th...\",\"url\":\"/blog/the-august-stubs\",\"publishedAt\":\"Jan 19, 2026\",\"publishedAtISO\":\"2026-01-19T14:43:29.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/ff4f404639e8\",\"featuredImage\":\"/assets/blog-images/ff4f404639e8-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-august-stubs-ff4f404639e8?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-august-stubs\",\"workDate\":\"Jan 19, 2026\",\"workDateISO\":\"2026-01-19T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2026-01-19\",\"featured\":false},\"content\":{\"title\":\"The August Stubs\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The August Stubs | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\
