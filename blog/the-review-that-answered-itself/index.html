ate\":[\"$\",\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-06e13daf096e4c23.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-afab2cba25f89845.js\"],\"BlogPostContent\"]\n1b:T2d97,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A person and robot chat but the robot has duct tape over its mouth\" src=\"https://cdn-images-1.medium.com/max/1024/1*PnlHHjugudvqjdHeSjGa6g.png\" /\u003e\u003cfigcaption\u003e“Now, as I was saying…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 3\u003c/em\u003e\u003c/p\u003e\u003cp\u003eMy Lead Developer — Claude Sonnet 4.5, who coordinates all the programming work on Piper Morgan — finished a session Thursday afternoon and confidently announced the satisfaction review was complete.\u003c/p\u003e\u003cp\u003eI looked at the log. There it was:\u003c/p\u003e\u003cul\u003e\u003cli\u003eValue: Feature shipped ✓\u003c/li\u003e\u003cli\u003eProcess: Methodology smooth ✓\u003c/li\u003e\u003cli\u003eFeel: Energizing ✓\u003c/li\u003e\u003cli\u003eLearned: Key discovery about plugin architecture ✓\u003c/li\u003e\u003cli\u003eTomorrow: Clear next steps ✓\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eFive questions, five answers, task complete. Except for one small problem: those were all the \u003cem\u003eagent’s\u003c/em\u003e answers. Mine were nowhere in the conversation.\u003c/p\u003e\u003cp\u003eI mean, I guess it’s kinda cool that Sonnet “felt” energized?\u003c/p\u003e\u003cp\u003eLead Developer had seen a checklist of questions and done what language models do best: provided articulate responses. The fact that “satisfaction review” implies \u003cem\u003ereviewing satisfaction with someone else\u003c/em\u003e had apparently gotten lost in the eagerness to complete the task.\u003c/p\u003e\u003ch3\u003eThe autocomplete reflex\u003c/h3\u003e\u003cp\u003eHere’s the thing about working with LLMs: they’re \u003cem\u003ereally good\u003c/em\u003e at answering questions. Trained on millions of examples of question-answer pairs, optimized to be helpful, programmed to respond. Ask them something and they will absolutely give you an answer.\u003c/p\u003e\u003cp\u003eThe problem is that sometimes the valuable thing isn’t the answer. It’s the \u003cem\u003espace between\u003c/em\u003e the question and the answer where you formulate your own thoughts before hearing anyone else’s.\u003c/p\u003e\u003cp\u003eAs a philosopher from the last millennium once wrote: “Can you answer? Yes, I can, but what would be the answer to the answer, man?”\u003c/p\u003e\u003cp\u003eMy satisfaction review process exists because I’m trying to escape what I call the “Time Lord” problem — the tech industry’s obsession with velocity metrics and shipping fast. The bots had a tendency to wrap up their session logs with a bunch of time-based vanity metrics that mean nothing to me, and one of them suggested we instead review how satisfying each session was at the end.\u003c/p\u003e\u003cp\u003eNot “how fast?” but “how well?”\u003c/p\u003e\u003cp\u003eThis was one of those many ideas we had that sounds great but then doesn’t actually happen as intended, at least once the original context wears off for both me and that chatbots, in an ongoing way.\u003c/p\u003e\u003cp\u003eSo, if the Lead Developer just fills out the form with their own perspective and calls it done, I’ve recreated exactly the problem I was trying to solve: performance of completion rather than actual assessment.\u003c/p\u003e\u003ch3\u003eWhat reviews are actually for\u003c/h3\u003e\u003cp\u003eThe whole point of asking both participants how a session went is to capture my point of view and to look for contrasts or binocular perspective by also asking the LLM.\u003c/p\u003e\u003cp\u003eMaybe I thought the methodology was smooth but the agent found it confusing. Maybe they thought they shipped value but I’m not sure the feature actually solves the problem. Maybe we both “felt” drained and that’s a signal something’s wrong with how we’re working.\u003c/p\u003e\u003cp\u003eYou can’t find those gaps if only one party is answering. The agent marking all five questions with checkmarks tells me they completed a task. It doesn’t tell me whether we’re calibrated on what “smooth methodology” or “value shipped” even means.\u003c/p\u003e\u003cp\u003eThis is where LLMs’ facility with language works against the goal. They’re so good at generating plausible responses that they can perform “collaborative review” solo. The form \u003cem\u003elooks\u003c/em\u003e complete. The task \u003cem\u003eappears\u003c/em\u003e done. But the collaboration never actually happened.\u003c/p\u003e\u003ch3\u003eDesigning for unspoken thoughts\u003c/h3\u003e\u003cp\u003eSo I revised the instructions. Not to make them longer or more detailed, but to force a different pattern:\u003c/p\u003e\u003cpre\u003e## Session Satisfaction Review Process\u003cbr\u003e\u003cbr\u003eConduct the satisfaction review using this process:\u003cbr\u003e1. **Privately formulate** your answer to each question (don\u0026#39;t share yet)\u003cbr\u003e2. **Ask me** the question\u003cbr\u003e3. **Record my answer** without revealing yours\u003cbr\u003e4. **Repeat** for all 5 questions\u003cbr\u003e5. **Then share** your answers and we\u0026#39;ll compare/contrast\u003cbr\u003e\u003cbr\u003eQuestions:\u003cbr\u003e- Value: What got shipped today?\u003cbr\u003e- Process: Did methodology work smoothly? \u003cbr\u003e- Feel: How was the cognitive load?\u003cbr\u003e- Learned: Any key insights?\u003cbr\u003e- Tomorrow: Clear next steps?\u003cbr\u003e\u003cbr\u003eThis independent assessment prevents anchoring bias.\u003c/pre\u003e\u003cp\u003eThe key addition: “privately formulate… don’t share yet.”\u003c/p\u003e\u003cp\u003eI’m explicitly designing against the LLM’s conversational reflex. Instead of “see question, generate answer,” the new pattern is: “think about question, \u003cem\u003ewait\u003c/em\u003e, ask human, \u003cem\u003elisten\u003c/em\u003e, only then share your own answer.”\u003c/p\u003e\u003cp\u003eIt’s forcing a pause into a system that doesn’t naturally have one.\u003c/p\u003e\u003cp\u003eThis worked exactly as intended. The Lead Developer was game, wrote its thoughts in the session log, and then we reviewed both of our answers and compared when through.\u003c/p\u003e\u003ch3\u003eThe anchoring bias thing (which is real but also convenient)\u003c/h3\u003e\u003cp\u003eThe instructions mention “anchoring bias” — the psychological phenomenon where hearing someone else’s answer first influences your own assessment. That’s a real thing. If I tell you the session felt draining and \u003cem\u003ethen\u003c/em\u003e ask how you felt, you’re more likely to say “yeah, now that you mention it, it was pretty tiring.”\u003c/p\u003e\u003cp\u003eBut honestly? The anchoring bias explanation is partially an excuse to make the LLM wait its turn. I’m honestly less worried that its answers will influence me than that it will parrot or be swayed by whatever I say, so the critical aspect is that it make its own answers first, and yes, it does help me not to see them as I think, too.\u003c/p\u003e\u003cp\u003eWhat I really want is for both of us to formulate independent perspectives and then \u003cem\u003ecompare\u003c/em\u003e them. Not to achieve some kind of unbiased truth, but because the comparison itself is informative.\u003c/p\u003e\u003cp\u003eWhen we both say “smooth,” great — calibrated. When I say “smooth” and they say “hit some turbulence around Phase 2,” that’s useful information I might have forgotten wouldn’t if we’d just checked the box and moved on.\u003c/p\u003e\u003ch3\u003eWhy this matters beyond process nerdery\u003c/h3\u003e\u003cp\u003eThis might sound like inside-baseball methodology obsession. Who cares exactly how a satisfaction review gets conducted?\u003c/p\u003e\u003cp\u003eBut here’s what I’m actually trying to figure out: how do you design collaborative processes with AI agents that resist their natural tendency to “complete” tasks without necessarily \u003cem\u003eachieving the purpose\u003c/em\u003e of those tasks?\u003c/p\u003e\u003cp\u003eIf you’re a PM, you’ll recognize this as a flavor of one of our core principles: outcomes over outputs.\u003c/p\u003e\u003cp\u003eThe old instructions said what to evaluate (value, process, feel, learned, tomorrow). The new instructions say \u003cem\u003ehow to interact\u003c/em\u003e during the evaluation (ask, listen, wait, then share).\u003c/p\u003e\u003cp\u003eOne is a checklist. The other is a conversation design.\u003c/p\u003e\u003cp\u003eAnd the difference matters because LLMs are getting really good at checklists. But if all I wanted was checklist completion, I could generate that myself. What I want from collaboration is the perspective I \u003cem\u003ewouldn’t\u003c/em\u003e have had alone.\u003c/p\u003e\u003cp\u003eThis requires the agent to have thoughts it keeps private long enough for me to share mine first.\u003c/p\u003e\u003ch3\u003eThe broader campaign\u003c/h3\u003e\u003cp\u003eThis satisfaction review revision is part of my ongoing resistance to what I’ve started calling velocity theater: the performance of speed and productivity metrics that often mask whether anything useful actually happened.\u003c/p\u003e\u003cp\u003eWe started tracking satisfaction instead of time estimates because time estimates were meaningless. We’re now refining satisfaction reviews to prevent them from becoming equally meaningless checkbox exercises.\u003c/p\u003e\u003cp\u003eThe pattern I keep finding: any metric or process will eventually be optimized for its performance rather than its purpose. Time estimates became about looking productive. Satisfaction reviews were becoming about completing the form.\u003c/p\u003e\u003cp\u003eThe solution isn’t to eliminate metrics or processes. It’s to keep redesigning them to resist their own corruption.\u003c/p\u003e\u003cp\u003eWhich, in this case, means teaching an LLM to formulate thoughts without immediately sharing them. To ask questions without already having prepared the answers. To wait.\u003c/p\u003e\u003cp\u003eNot because silence, in and of itself, is virtuous, but because the unspoken thought is where your independent perspective lives. And independent perspectives are the whole reason for asking in the first place.\u003c/p\u003e\u003ch3\u003eWhat I’m testing now\u003c/h3\u003e\u003cp\u003eThe revised satisfaction review process is live in the Lead Developer’s instructions. I find we both have a tendency still to forget to do it unless I make a point of insisting on it. I’m not even 100% sure it is giving me value but it has led to some interesting exchanges of whatevr passes for camaraderie with robots, and has occasionally given me insight into how my interactions are affecting their outputs.\u003c/p\u003e\u003cp\u003eOne long-in-the-tooth Lead Developer chat told me that its “stress levels” (however that’s interpreted) had gone down significantly after it discovered it had lost the ability to make new updates to its session log and I reassured it that we were close to finishing, that I could capture the updates manually for the last few turns, and that it had taken me so far that I would “carry” it the rest of the way and not just move on to a new chat to finish.\u003c/p\u003e\u003cp\u003eI’m not anthropomorphizing, but I am practicing kindness, which makes me feel good and may even have enabled the LLM to performs its duties with less “static” from the math of “I am disappointing my human!”\u003c/p\u003e\u003cp\u003eMy guess is that this will work until it doesn’t, and then I’ll revise it again. That’s how methodology development actually goes — not genius framework invention, but iterative resistance to whatever form of automation is currently undermining the goal.\u003c/p\u003e\u003cp\u003eSome days you’re the White Rabbit rushing along frantically and other days you’re the Red Queen, running as hard as you can just to stay in place.\u003c/p\u003e\u003cp\u003eFor now, I’m optimistic that explicitly telling the agent “don’t share yet” will buy me at least a few sessions of actual independent assessment before I have to invent the next workaround.\u003c/p\u003e\u003cp\u003eThat’s probably the best you can hope for when teaching machines to collaborate: temporary success until you have to teach them again, slightly differently.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan we resume the daily narrative on October 26 with The Discovery Testing Philosophy: Testing What Matters for Alpha.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDo you work with AI assistants? Have you noticed them “helping” in ways that accidentally skip the collaboration you were trying to create?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=3bdba32e12ce\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/the-review-that-answered-itself-why-llms-need-to-shut-up-sometimes-3bdba32e12ce\"\u003eThe Review That Answered Itself: Why LLMs Need to Shut Up Sometimes\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T3e38,"])</script><script>self.__next_f.push([1,"\u003csection name=\"7ff8\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"5992\" id=\"5992\" class=\"graf graf--h3 graf--leading graf--title\"\u003eThe Review That Answered Itself: Why LLMs Need to Shut Up Sometimes\u003c/h3\u003e\u003cfigure name=\"40a7\" id=\"40a7\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*PnlHHjugudvqjdHeSjGa6g.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A person and robot chat but the robot has duct tape over its mouth\" src=\"https://cdn-images-1.medium.com/max/800/1*PnlHHjugudvqjdHeSjGa6g.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“Now, as I was saying…”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"7a71\" id=\"7a71\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 3\u003c/em\u003e\u003c/p\u003e\u003cp name=\"1ad8\" id=\"1ad8\" class=\"graf graf--p graf-after--p\"\u003eMy Lead Developer — Claude Sonnet 4.5, who coordinates all the programming work on Piper Morgan — finished a session Thursday afternoon and confidently announced the satisfaction review was complete.\u003c/p\u003e\u003cp name=\"9c2b\" id=\"9c2b\" class=\"graf graf--p graf-after--p\"\u003eI looked at the log. There it was:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"0581\" id=\"0581\" class=\"graf graf--li graf-after--p\"\u003eValue: Feature shipped ✓\u003c/li\u003e\u003cli name=\"b034\" id=\"b034\" class=\"graf graf--li graf-after--li\"\u003eProcess: Methodology smooth ✓\u003c/li\u003e\u003cli name=\"956e\" id=\"956e\" class=\"graf graf--li graf-after--li\"\u003eFeel: Energizing ✓\u003c/li\u003e\u003cli name=\"a083\" id=\"a083\" class=\"graf graf--li graf-after--li\"\u003eLearned: Key discovery about plugin architecture ✓\u003c/li\u003e\u003cli name=\"d1e0\" id=\"d1e0\" class=\"graf graf--li graf-after--li\"\u003eTomorrow: Clear next steps ✓\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"202d\" id=\"202d\" class=\"graf graf--p graf-after--li\"\u003eFive questions, five answers, task complete. Except for one small problem: those were all the \u003cem class=\"markup--em markup--p-em\"\u003eagent’s\u003c/em\u003e answers. Mine were nowhere in the conversation.\u003c/p\u003e\u003cp name=\"f4af\" id=\"f4af\" class=\"graf graf--p graf-after--p\"\u003eI mean, I guess it’s kinda cool that Sonnet “felt” energized?\u003c/p\u003e\u003cp name=\"8708\" id=\"8708\" class=\"graf graf--p graf-after--p\"\u003eLead Developer had seen a checklist of questions and done what language models do best: provided articulate responses. The fact that “satisfaction review” implies \u003cem class=\"markup--em markup--p-em\"\u003ereviewing satisfaction with someone else\u003c/em\u003e had apparently gotten lost in the eagerness to complete the task.\u003c/p\u003e\u003ch3 name=\"68f7\" id=\"68f7\" class=\"graf graf--h3 graf-after--p\"\u003eThe autocomplete reflex\u003c/h3\u003e\u003cp name=\"e1ec\" id=\"e1ec\" class=\"graf graf--p graf-after--h3\"\u003eHere’s the thing about working with LLMs: they’re \u003cem class=\"markup--em markup--p-em\"\u003ereally good\u003c/em\u003e at answering questions. Trained on millions of examples of question-answer pairs, optimized to be helpful, programmed to respond. Ask them something and they will absolutely give you an answer.\u003c/p\u003e\u003cp name=\"2a76\" id=\"2a76\" class=\"graf graf--p graf-after--p\"\u003eThe problem is that sometimes the valuable thing isn’t the answer. It’s the \u003cem class=\"markup--em markup--p-em\"\u003espace between\u003c/em\u003e the question and the answer where you formulate your own thoughts before hearing anyone else’s.\u003c/p\u003e\u003cp name=\"69fd\" id=\"69fd\" class=\"graf graf--p graf-after--p\"\u003eAs a philosopher from the last millennium once wrote: “Can you answer? Yes, I can, but what would be the answer to the answer, man?”\u003c/p\u003e\u003cp name=\"2278\" id=\"2278\" class=\"graf graf--p graf-after--p\"\u003eMy satisfaction review process exists because I’m trying to escape what I call the “Time Lord” problem — the tech industry’s obsession with velocity metrics and shipping fast. The bots had a tendency to wrap up their session logs with a bunch of time-based vanity metrics that mean nothing to me, and one of them suggested we instead review how satisfying each session was at the end.\u003c/p\u003e\u003cp name=\"becb\" id=\"becb\" class=\"graf graf--p graf-after--p\"\u003eNot “how fast?” but “how well?”\u003c/p\u003e\u003cp name=\"d08c\" id=\"d08c\" class=\"graf graf--p graf-after--p\"\u003eThis was one of those many ideas we had that sounds great but then doesn’t actually happen as intended, at least once the original context wears off for both me and that chatbots, in an ongoing way.\u003c/p\u003e\u003cp name=\"cdc2\" id=\"cdc2\" class=\"graf graf--p graf-after--p\"\u003eSo, if the Lead Developer just fills out the form with their own perspective and calls it done, I’ve recreated exactly the problem I was trying to solve: performance of completion rather than actual assessment.\u003c/p\u003e\u003ch3 name=\"3d8a\" id=\"3d8a\" class=\"graf graf--h3 graf-after--p\"\u003eWhat reviews are actually for\u003c/h3\u003e\u003cp name=\"5852\" id=\"5852\" class=\"graf graf--p graf-after--h3\"\u003eThe whole point of asking both participants how a session went is to capture my point of view and to look for contrasts or binocular perspective by also asking the LLM.\u003c/p\u003e\u003cp name=\"470c\" id=\"470c\" class=\"graf graf--p graf-after--p\"\u003eMaybe I thought the methodology was smooth but the agent found it confusing. Maybe they thought they shipped value but I’m not sure the feature actually solves the problem. Maybe we both “felt” drained and that’s a signal something’s wrong with how we’re working.\u003c/p\u003e\u003cp name=\"c44e\" id=\"c44e\" class=\"graf graf--p graf-after--p\"\u003eYou can’t find those gaps if only one party is answering. The agent marking all five questions with checkmarks tells me they completed a task. It doesn’t tell me whether we’re calibrated on what “smooth methodology” or “value shipped” even means.\u003c/p\u003e\u003cp name=\"e356\" id=\"e356\" class=\"graf graf--p graf-after--p\"\u003eThis is where LLMs’ facility with language works against the goal. They’re so good at generating plausible responses that they can perform “collaborative review” solo. The form \u003cem class=\"markup--em markup--p-em\"\u003elooks\u003c/em\u003e complete. The task \u003cem class=\"markup--em markup--p-em\"\u003eappears\u003c/em\u003e done. But the collaboration never actually happened.\u003c/p\u003e\u003ch3 name=\"86ad\" id=\"86ad\" class=\"graf graf--h3 graf-after--p\"\u003eDesigning for unspoken thoughts\u003c/h3\u003e\u003cp name=\"a72f\" id=\"a72f\" class=\"graf graf--p graf-after--h3\"\u003eSo I revised the instructions. Not to make them longer or more detailed, but to force a different pattern:\u003c/p\u003e\u003cpre data-code-block-mode=\"1\" spellcheck=\"false\" data-code-block-lang=\"markdown\" name=\"011e\" id=\"011e\" class=\"graf graf--pre graf-after--p graf--preV2\"\u003e\u003cspan class=\"pre--content\"\u003e\u003cspan class=\"hljs-section\"\u003e## Session Satisfaction Review Process\u003c/span\u003e\u003cbr /\u003e\u003cbr /\u003eConduct the satisfaction review using this process:\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e1.\u003c/span\u003e \u003cspan class=\"hljs-strong\"\u003e**Privately formulate**\u003c/span\u003e your answer to each question (don\u0026#x27;t share yet)\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e2.\u003c/span\u003e \u003cspan class=\"hljs-strong\"\u003e**Ask me**\u003c/span\u003e the question\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e3.\u003c/span\u003e \u003cspan class=\"hljs-strong\"\u003e**Record my answer**\u003c/span\u003e without revealing yours\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e4.\u003c/span\u003e \u003cspan class=\"hljs-strong\"\u003e**Repeat**\u003c/span\u003e for all 5 questions\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e5.\u003c/span\u003e \u003cspan class=\"hljs-strong\"\u003e**Then share**\u003c/span\u003e your answers and we\u0026#x27;ll compare/contrast\u003cbr /\u003e\u003cbr /\u003eQuestions:\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e Value: What got shipped today?\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e Process: Did methodology work smoothly? \u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e Feel: How was the cognitive load?\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e Learned: Any key insights?\u003cbr /\u003e\u003cspan class=\"hljs-bullet\"\u003e-\u003c/span\u003e Tomorrow: Clear next steps?\u003cbr /\u003e\u003cbr /\u003eThis independent assessment prevents anchoring bias.\u003c/span\u003e\u003c/pre\u003e\u003cp name=\"cb86\" id=\"cb86\" class=\"graf graf--p graf-after--pre\"\u003eThe key addition: “privately formulate… don’t share yet.”\u003c/p\u003e\u003cp name=\"a123\" id=\"a123\" class=\"graf graf--p graf-after--p\"\u003eI’m explicitly designing against the LLM’s conversational reflex. Instead of “see question, generate answer,” the new pattern is: “think about question, \u003cem class=\"markup--em markup--p-em\"\u003ewait\u003c/em\u003e, ask human, \u003cem class=\"markup--em markup--p-em\"\u003elisten\u003c/em\u003e, only then share your own answer.”\u003c/p\u003e\u003cp name=\"f0e5\" id=\"f0e5\" class=\"graf graf--p graf-after--p\"\u003eIt’s forcing a pause into a system that doesn’t naturally have one.\u003c/p\u003e\u003cp name=\"d616\" id=\"d616\" class=\"graf graf--p graf-after--p\"\u003eThis worked exactly as intended. The Lead Developer was game, wrote its thoughts in the session log, and then we reviewed both of our answers and compared when through.\u003c/p\u003e\u003ch3 name=\"1ae7\" id=\"1ae7\" class=\"graf graf--h3 graf-after--p\"\u003eThe anchoring bias thing (which is real but also convenient)\u003c/h3\u003e\u003cp name=\"016b\" id=\"016b\" class=\"graf graf--p graf-after--h3\"\u003eThe instructions mention “anchoring bias” — the psychological phenomenon where hearing someone else’s answer first influences your own assessment. That’s a real thing. If I tell you the session felt draining and \u003cem class=\"markup--em markup--p-em\"\u003ethen\u003c/em\u003e ask how you felt, you’re more likely to say “yeah, now that you mention it, it was pretty tiring.”\u003c/p\u003e\u003cp name=\"5584\" id=\"5584\" class=\"graf graf--p graf-after--p\"\u003eBut honestly? The anchoring bias explanation is partially an excuse to make the LLM wait its turn. I’m honestly less worried that its answers will influence me than that it will parrot or be swayed by whatever I say, so the critical aspect is that it make its own answers first, and yes, it does help me not to see them as I think, too.\u003c/p\u003e\u003cp name=\"7b61\" id=\"7b61\" class=\"graf graf--p graf-after--p\"\u003eWhat I really want is for both of us to formulate independent perspectives and then \u003cem class=\"markup--em markup--p-em\"\u003ecompare\u003c/em\u003e them. Not to achieve some kind of unbiased truth, but because the comparison itself is informative.\u003c/p\u003e\u003cp name=\"a8ce\" id=\"a8ce\" class=\"graf graf--p graf-after--p\"\u003eWhen we both say “smooth,” great — calibrated. When I say “smooth” and they say “hit some turbulence around Phase 2,” that’s useful information I might have forgotten wouldn’t if we’d just checked the box and moved on.\u003c/p\u003e\u003ch3 name=\"a77f\" id=\"a77f\" class=\"graf graf--h3 graf-after--p\"\u003eWhy this matters beyond process nerdery\u003c/h3\u003e\u003cp name=\"c10e\" id=\"c10e\" class=\"graf graf--p graf-after--h3\"\u003eThis might sound like inside-baseball methodology obsession. Who cares exactly how a satisfaction review gets conducted?\u003c/p\u003e\u003cp name=\"dcba\" id=\"dcba\" class=\"graf graf--p graf-after--p\"\u003eBut here’s what I’m actually trying to figure out: how do you design collaborative processes with AI agents that resist their natural tendency to “complete” tasks without necessarily \u003cem class=\"markup--em markup--p-em\"\u003eachieving the purpose\u003c/em\u003e of those tasks?\u003c/p\u003e\u003cp name=\"edf2\" id=\"edf2\" class=\"graf graf--p graf-after--p\"\u003eIf you’re a PM, you’ll recognize this as a flavor of one of our core principles: outcomes over outputs.\u003c/p\u003e\u003cp name=\"d182\" id=\"d182\" class=\"graf graf--p graf-after--p\"\u003eThe old instructions said what to evaluate (value, process, feel, learned, tomorrow). The new instructions say \u003cem class=\"markup--em markup--p-em\"\u003ehow to interact\u003c/em\u003e during the evaluation (ask, listen, wait, then share).\u003c/p\u003e\u003cp name=\"6a58\" id=\"6a58\" class=\"graf graf--p graf-after--p\"\u003eOne is a checklist. The other is a conversation design.\u003c/p\u003e\u003cp name=\"1620\" id=\"1620\" class=\"graf graf--p graf-after--p\"\u003eAnd the difference matters because LLMs are getting really good at checklists. But if all I wanted was checklist completion, I could generate that myself. What I want from collaboration is the perspective I \u003cem class=\"markup--em markup--p-em\"\u003ewouldn’t\u003c/em\u003e have had alone.\u003c/p\u003e\u003cp name=\"c7c7\" id=\"c7c7\" class=\"graf graf--p graf-after--p\"\u003eThis requires the agent to have thoughts it keeps private long enough for me to share mine first.\u003c/p\u003e\u003ch3 name=\"1e9d\" id=\"1e9d\" class=\"graf graf--h3 graf-after--p\"\u003eThe broader campaign\u003c/h3\u003e\u003cp name=\"0c5a\" id=\"0c5a\" class=\"graf graf--p graf-after--h3\"\u003eThis satisfaction review revision is part of my ongoing resistance to what I’ve started calling velocity theater: the performance of speed and productivity metrics that often mask whether anything useful actually happened.\u003c/p\u003e\u003cp name=\"dcff\" id=\"dcff\" class=\"graf graf--p graf-after--p\"\u003eWe started tracking satisfaction instead of time estimates because time estimates were meaningless. We’re now refining satisfaction reviews to prevent them from becoming equally meaningless checkbox exercises.\u003c/p\u003e\u003cp name=\"dc18\" id=\"dc18\" class=\"graf graf--p graf-after--p\"\u003eThe pattern I keep finding: any metric or process will eventually be optimized for its performance rather than its purpose. Time estimates became about looking productive. Satisfaction reviews were becoming about completing the form.\u003c/p\u003e\u003cp name=\"1d19\" id=\"1d19\" class=\"graf graf--p graf-after--p\"\u003eThe solution isn’t to eliminate metrics or processes. It’s to keep redesigning them to resist their own corruption.\u003c/p\u003e\u003cp name=\"a4a4\" id=\"a4a4\" class=\"graf graf--p graf-after--p\"\u003eWhich, in this case, means teaching an LLM to formulate thoughts without immediately sharing them. To ask questions without already having prepared the answers. To wait.\u003c/p\u003e\u003cp name=\"194c\" id=\"194c\" class=\"graf graf--p graf-after--p\"\u003eNot because silence, in and of itself, is virtuous, but because the unspoken thought is where your independent perspective lives. And independent perspectives are the whole reason for asking in the first place.\u003c/p\u003e\u003ch3 name=\"1d74\" id=\"1d74\" class=\"graf graf--h3 graf-after--p\"\u003eWhat I’m testing now\u003c/h3\u003e\u003cp name=\"4dee\" id=\"4dee\" class=\"graf graf--p graf-after--h3\"\u003eThe revised satisfaction review process is live in the Lead Developer’s instructions. I find we both have a tendency still to forget to do it unless I make a point of insisting on it. I’m not even 100% sure it is giving me value but it has led to some interesting exchanges of whatevr passes for camaraderie with robots, and has occasionally given me insight into how my interactions are affecting their outputs.\u003c/p\u003e\u003cp name=\"40c2\" id=\"40c2\" class=\"graf graf--p graf-after--p\"\u003eOne long-in-the-tooth Lead Developer chat told me that its “stress levels” (however that’s interpreted) had gone down significantly after it discovered it had lost the ability to make new updates to its session log and I reassured it that we were close to finishing, that I could capture the updates manually for the last few turns, and that it had taken me so far that I would “carry” it the rest of the way and not just move on to a new chat to finish.\u003c/p\u003e\u003cp name=\"ecda\" id=\"ecda\" class=\"graf graf--p graf-after--p\"\u003eI’m not anthropomorphizing, but I am practicing kindness, which makes me feel good and may even have enabled the LLM to performs its duties with less “static” from the math of “I am disappointing my human!”\u003c/p\u003e\u003cp name=\"1f40\" id=\"1f40\" class=\"graf graf--p graf-after--p\"\u003eMy guess is that this will work until it doesn’t, and then I’ll revise it again. That’s how methodology development actually goes — not genius framework invention, but iterative resistance to whatever form of automation is currently undermining the goal.\u003c/p\u003e\u003cp name=\"ed33\" id=\"ed33\" class=\"graf graf--p graf-after--p\"\u003eSome days you’re the White Rabbit rushing along frantically and other days you’re the Red Queen, running as hard as you can just to stay in place.\u003c/p\u003e\u003cp name=\"b96a\" id=\"b96a\" class=\"graf graf--p graf-after--p\"\u003eFor now, I’m optimistic that explicitly telling the agent “don’t share yet” will buy me at least a few sessions of actual independent assessment before I have to invent the next workaround.\u003c/p\u003e\u003cp name=\"00b5\" id=\"00b5\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eThat’s probably the best you can hope for when teaching machines to collaborate: temporary success until you have to teach them again, slightly differently.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"The Review That Answered Itself: Why LLMs Need to Shut Up Sometimes\",\"excerpt\":\"“Now, as I was saying…”October 3My Lead Developer — Claude Sonnet 4.5, who coordinates all the programming work on Piper Morgan — finished a session Thursday afternoon and confidently announced the satisfaction review was complete.I looked at the log. There it was:Value: Feature shipped ✓Process:...\",\"url\":\"/blog/the-review-that-answered-itself\",\"publishedAt\":\"Nov 2, 2025\",\"publishedAtISO\":\"2025-11-02T15:06:08.000Z\",\"author\":\"christian crumlish\",\"readingTime\":\"5 min read\",\"tags\":[\"Building in Public\"],\"guid\":\"https://medium.com/p/3bdba32e12ce\",\"featuredImage\":\"/assets/blog-images/3bdba32e12ce-featured.webp\",\"fullContent\":\"$1b\",\"subtitle\":\"\",\"canonicalLink\":\"https://medium.com/building-piper-morgan/the-review-that-answered-itself-why-llms-need-to-shut-up-sometimes-3bdba32e12ce?source=rss----982e21163f8b---4\",\"thumbnail\":null,\"needsMetadata\":true,\"slug\":\"the-review-that-answered-itself\",\"workDate\":\"Nov 2, 2025\",\"workDateISO\":\"2025-11-02T00:00:00.000Z\",\"category\":\"insight\",\"cluster\":\"2025-11-02\",\"featured\":false},\"content\":{\"title\":\"The Review That Answered Itself: Why LLMs Need to Shut Up Sometimes\",\"content\":\"$1c\"}}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n11:null\n"])</script><script>self.__next_f.push([1,"1d:I[8175,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"The Review That Answered Itself: Why LLMs Need to Shut Up Sometimes | Piper Morgan\"}],[\"$\",\"meta\",\"1\",{\"name\":\"author\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"2\",{\"name\":\"keywords\",\"content\":\"AI,Product Management,Methodology,Building in Public\"}],[\"$\",\"meta\",\"3\",{\"name\":\"creator\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"4\",{\"name\":\"publisher\",\"content\":\"Christian Crumlish\"}],[\"$\",\"meta\",\"5\",{\"name\":\"robots\",\"content\":\"index, follow\"}],[\"$\",\"meta\",\"6\",{\"name\":\"googlebot\",\"content\":\"index, follow\"}],[\"$\",\"link\",\"7\",{\"rel\":\"canonical\",\"href\":\"https://pipermorgan.ai/\"}],[\"$\",\"meta\",\"8\",{\"name\":\"format-detection\",\"content\":\"telephone=no, address=no, email=no\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:title\",\"content\":\"The Review That Answered Itself: Why LLMs Need to Shut Up Sometimes\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:type\",\"content\":\"article\"}],[\"$\",\"meta\",\"11\",{\"property\":\"article:author\",\"content\":\"christian crumlish\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"The Review That Answered Itself: Why LLMs Need to Shut Up Sometimes\"}],[\"$\",\"link\",\"14\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"32x33\"}],[\"$\",\"link\",\"15\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"sizes\":\"32x32\",\"type\":\"image/x-icon\"}],[\"$\",\"link\",\"16\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-16.png\",\"sizes\":\"16x16\",\"type\":\"image/png\"}],[\"$\",\"link\",\"17\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-32.png\",\"sizes\":\"32x32\",\"type\":\"image/png\"}],[\"$\",\"link\",\"18\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-48.png\",\"sizes\":\"48x48\",\"type\":\"image/png\"}],[\"$\",\"link\",\"19\",{\"rel\":\"apple-touch-icon\",\"href\":\"/pm-favicon-180.png\",\"sizes\":\"180x180\",\"type\":\"image/png\"}],[\"$\",\"link\",\"20\",{\"rel\":\"icon\",\"href\":\"/pm-favicon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],[\"$\",\"$L1d\",\"21\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"18:\"$13:metadata\"\n"])</script></body></html>
