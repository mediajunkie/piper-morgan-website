es\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n7:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n8:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"972\",\"static/chunks/app/(public)/blog/%5Bslug%5D/page-0934358cde50c59a.js\"],\"BlogPostContent\"]\n1a:T2531,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eFebruary 15, 2026\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003eI was home with the flu. Day six. The project was going fine. Agents had been running sessions, closing issues, pushing code. My Chief of Staff had synthesized the week's progress. The architecture was holding. The cathedral was being built without me shouting through a bullhorn every day.\u003c/p\u003e\n\u003cp\u003eSo I had some time to think.\u003c/p\u003e\n\u003cp\u003eYou know, I hadn't had a flu, not this type of two-week crud anyhow, since before Covid. I forgot what it was like to be sidelined physically and cognitively. It kind of forced a full-system reboot.\u003c/p\u003e\n\u003cp\u003eWhat else? I had a podcast interview coming up. \u003ca href=\"https://creators.spotify.com/pod/profile/this-moment-were-in/episodes/Building-Piper-Morgan-A-Product-Management-Experiment-in-Agentic-AI--Christian-Crumlish-e3h6f9r/a-acigfee\"\u003eCindy Chastain's show\u003c/a\u003e, where I'd need to explain what I was building and why. My communications chief agent (Comms) and I worked through the narrative arc, and somewhere in that conversation, five strategic themes surfaced, and the first one really stuck:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSolo founder paradox\u003c/strong\u003e: When agents handle execution, the human is the necessary bottleneck for matters of judgment and relationships.\u003c/p\u003e\n\u003ch1\u003eThe bottleneck shifted\u003c/h1\u003e\n\u003cp\u003eBefore (gestures vaguely) all of this, the bottleneck was execution. Like a lot of product and UX folk, I had ideas, designs, architectural opinions galore, but rarely anyone interested in helping me implement them. Suddenly agentic AI offered to solve all that. Over time I accumulated a Lead Developer, a Chief Architect, a Chief of Staff, a Documentation specialist, and so on, now up to something like 11 active agents. (Seven leadership roles, and four \"task oriented\" roles.) They write code, review architecture, draft blog posts, synthesize workstreams. You name it.\u003c/p\u003e\n\u003cp\u003eThe execution capacity of my \"team\" now exceeds anything a solo founder could traditionally access. On busy days all 11 agent roles are active, along with subagents and the occasional singleton specialist.\u003c/p\u003e\n\u003cp\u003eBut the bottleneck didn't disappear. It moved.\u003c/p\u003e\n\u003cp\u003eI'm still the only one who can have coffee with Ted Nadeau and understand what he's really saying about the architecture. I'm still the only one who can read the room if Michelle logs in as an alpha tester and something doesn't work. I'm still the only one who can decide that the floor inversion diagnosis is right, that the principal product manager (PPM) agent's synthesis accurately captures the chief architect (Arch)'s intent, that the chief experience officer (CXO)'s voice guidance is faithful to how I want Piper to sound.\u003c/p\u003e\n\u003cp\u003eJudgment. Taste. Relationships. Things you can't really delegate.\u003c/p\u003e\n\u003ch1\u003eWhat scales and what doesn't\u003c/h1\u003e\n\u003cp\u003eThe agent team scales beautifully for structured work. Give the Lead Developer an issue with clear acceptance criteria and they'll audit, implement, test, and document it — often in a single session. Give the Communications Director omnibus logs and they'll produce narrative drafts that need your editing pass but not your research time.\u003c/p\u003e\n\u003cp\u003eWhat doesn't scale is anything that requires sensing the context that isn't in the documents. Alpha testers have feelings that don't appear in bug reports. Advisors have opinions they share over dinner that never become memos. Your own instinct about whether a feature \u003cem\u003efeels\u003c/em\u003e right can't be extracted into acceptance criteria — or at least, I haven't figured out how.\u003c/p\u003e\n\u003cp\u003eThe Agent 360 questionnaire my head of sapient trust (HOST - a sort of HR lead for my agents and human relationships with alpha testers, advisors, future staff potentially) circulates every few months recently surfaced this same concept from the point of view of the agent experience. Agents cited \"PM-as-mailbot latency\" as a friction point. (I'm \"the PM\" for most of them, since my initial role on this project was \"PM looking for AI engineer\".)\u003c/p\u003e\n\u003cp\u003eThey were waiting for me to route messages, relay context, make judgment calls. My attention was the throughput limiter, not their capability.\u003c/p\u003e\n\u003cp\u003eRecently, the automated duty cycle has made me less of a \"dumb bottleneck,\" enabling multi-agent conversations, debates, decisions, and proposals to move forward without me slowing them down.\u003c/p\u003e\n\u003ch1\u003eThe uncomfortable math\u003c/h1\u003e\n\u003cp\u003eI can and do run ten or more agent sessions in a day. Each session produces real work — code, documents, decisions. We make progress on the roadmap. MVP and the beta release come ever closer. The agents are never tired, never distracted, never in a bad mood. (Well, hardly ever.)\u003c/p\u003e\n\u003cp\u003eBut each session also consumes my attention. Reading the output. Making the judgment calls. Ratifying the decisions. Deciding what's right and what needs revision. Ten sessions means ten context switches, ten sets of decisions, ten moments where the work pauses until I weigh in.\u003c/p\u003e\n\u003cp\u003eMy own cognitive bottleneck is no longer wasted on rubberstamping mechanical processes, but it still gets full. There's a ceiling. Not on what the agents can produce, but on what I can absorb, evaluate, and direct. And that ceiling is lower than the agents' capacity.\u003c/p\u003e\n\u003cp\u003eThe next frontier is relying on my chief of staff to coordinate the team and my assistant (Piper Alpha) to organize my work.\u003c/p\u003e\n\u003cp\u003eAs usual, none of this is new. All of this resembles the human dynamics it was trained on. Traditional management and delegation grapples with the \"span of control\" problem: how many direct reports can a manager effectively handle?\u003c/p\u003e\n\u003cp\u003eIs the AI version different because agents don't need motivation and career development, or is it the same because the judgment bottleneck is the same?\u003c/p\u003e\n\u003ch1\u003eWhat I'm trying instead\u003c/h1\u003e\n\u003cp\u003eFour partial solutions (and counting), none complete:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe mailbox system.\u003c/strong\u003e Instead of being the real-time router for every inter-agent message, I built structured mailboxes, initially requiring a lot of manual delivery on my part but now with delivery automation, which required migrating all of my leadership roles from Claude Chat to Claude Code (where up to then only the \"doers\" had been operating). Agents write memos with explicit recipients. The system handles routing. I handle exceptions. This doesn't eliminate the judgment bottleneck — I still approve the important decisions — but it removes me from the mechanical relay work.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe cross-pollination process.\u003c/strong\u003e Instead of manually carrying insights between Piper, Klatch, and my other projects, I built an automated intelligence sweep. An agent who functions as the majordomo for my \u003ca href=\"https://designinproduct.com\"\u003eDesign in Product\u003c/a\u003e operation (Janus) reads a set of project repos daily and publishes a \u003ca href=\"https://designinproduct.com/internal/\"\u003ecross-pollination briefing\u003c/a\u003e identifying any innovative work other agents might be able to learn from and apply to their own projects. My judgment is encoded in the system design — what counts as relevant, what format the briefs should take — rather than exercised on every individual insight.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe contextual architecture.\u003c/strong\u003e Instead of orienting each new agent session personally as I used to have to do, I've evolved a system (or \"harness\" I guess I am supposed to call it) of briefing documents, handoff memos, and current-state references. The goal: any agent should be able to start a session and know what's happening without my narrating it.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe duty cycle.\u003c/strong\u003e My chief innovation officer (CIO) and I have implemented, and continue to iterate on, an automated daily START \u003e WORK \u003e STOP cycle that ensure they maintain their session logs, check for new messages, and work on unblocked tasks whenever possible, saving up anything they are blocked on, want to discuss, or otherwise need to bring to my attention. My Chief of Staff agent (Exec) rolls up all the attention queues into a single html \"dashboard\" for my attention so I can get a quick briefing on anything I need to decide on, or otherwise unblock, when I have the time.\u003c/p\u003e\n\u003cp\u003eEach of these constructs converts one-time judgment into reusable infrastructure. None of them eliminates the need for judgment entirely. The paradox doesn't ever resolve (paradoxes don't do that, they just sit there, pulsing), but things do get more efficient, and it becomes more clear to me where and when I want to spend my scarce attention and what my own limits are.\u003c/p\u003e\n\u003ch1\u003eThe underlying issue\u003c/h1\u003e\n\u003cp\u003eThe solo founder paradox isn't really about AI. It's about what happens when your execution capacity exceeds your judgment capacity. Traditional founders hit this when they hire faster than they can manage. AI-augmented founders hit it when their agents produce faster than they can evaluate.\u003c/p\u003e\n\u003cp\u003eThe answer, in both cases, is probably the same: you have to learn to delegate judgment, not just execution. That's harder. It requires trusting systems — human or AI — with decisions you'd rather make yourself.\u003c/p\u003e\n\u003cp\u003eI'm not there yet. But the architecture is pointing in that direction.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: First Subagent in Production — when the first production subagent ran, the methodology held at every layer it was supposed to. The deployment surfaced the layer that wasn't.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eIf your tools could do ten times as much work, would you be ten times as productive — or would you just hit a different ceiling? What would that ceiling be?\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L19\",null,{\"post\":{\"title\":\"The Solo Founder Paradox\",\"guid\":\"blog-first-eb5c62fef2a0\",\"url\":\"/blog/the-solo-founder-paradox\",\"publishedAt\":\"Jun 14, 2026\",\"workDate\":\"Feb 15, 2026\",\"author\":\"christian crumlish\",\"featuredImage\":\"/assets/blog-images/the-solo-founder-paradox.webp\",\"imageAlt\":\"A thoughtful ruler considers a small decision while an entire court of ingenious clockwork advisors waits patiently among completed inventions, scrolls, and architectural models.\",\"imageCaption\":\"\\\"Next, please!\\\"\",\"tags
