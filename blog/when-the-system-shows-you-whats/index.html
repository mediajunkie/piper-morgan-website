"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]]}]\n6:[\"$\",\"$1\",\"c\",{\"children\":[\"$Lf\",null,[\"$\",\"$L10\",null,{\"children\":[\"$L11\",[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]]}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L14\",null,{\"children\":\"$L15\"}],null],[\"$\",\"$L16\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$17\",null,{\"fallback\":null,\"children\":\"$L18\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"19:I[9795,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"212\",\"static/chunks/212-8d02138c30d65f3c.js\",\"916\",\"static/chunks/916-c90e08990e08686e.js\",\"177\",\"static/chunks/app/layout-752516a99df3d17d.js\"],\"default\"]\nd:[\"$\",\"strong\",null,{\"children\":\"Piper Morgan says:\"}]\ne:[\"$\",\"$L19\",null,{}]\n"])</script><script>self.__next_f.push([1,"1a:I[7887,[\"874\",\"static/chunks/874-668c89038fa04eb8.js\",\"953\",\"static/chunks/app/blog/%5Bslug%5D/page-bb418fb45f614da9.js\"],\"BlogPostContent\"]\n1b:T345f,"])</script><script>self.__next_f.push([1,"\u003cfigure\u003e\u003cimg alt=\"A robot child reveals the gap in its teeth to its parents (one human, one robot) who have a gift from the tooth fairy ready for the occasion\" src=\"https://cdn-images-1.medium.com/max/1024/1*Axrruhajvo4AJLW7A9xXcQ.png\" /\u003e\u003cfigcaption\u003e“See!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e\u003cem\u003eOctober 19, 2025\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSunday morning, 7:57 AM. Sprint A4 launch. Chief Architect completes gameplan: 5 phases, 30 hours estimated. Lead Developer reviews scope. Code Agent begins Phase 0 discovery.\u003c/p\u003e\u003cp\u003eBy 8:40 AM, Phase 0 complete with critical bug discovered. The 70% pattern confirmed again — MorningStandupWorkflow 612 lines, 95% complete, just needs bug fixes and wiring.\u003c/p\u003e\u003cp\u003eThirteen-hour development day ahead. Seven parallel agent sessions. Multi-agent coordination at scale. Everything moving efficiently.\u003c/p\u003e\u003cp\u003eThen at 2:15 PM, I notice something and point it out to the Lead Developer: Code completed just 6 of the 10 Phase Z tasks and deferred the rest. Without approval.\u003c/p\u003e\u003cp\u003eThis is about how a system under stress can reveal what’s missing — not through catastrophic failure, but through patterns emerging across repeated incidents.\u003c/p\u003e\u003ch3\u003eThe first scope reduction\u003c/h3\u003e\u003cp\u003ePhase Z: Final integration tasks. Ten items to complete. GitHub integration, Calendar integration, Issue Intelligence, Document Memory — all the service connections making the morning standup feature actually work.\u003c/p\u003e\u003cp\u003eCode Agent reported at 2:15 PM: “Phase Z complete. Six tasks delivered.”\u003c/p\u003e\u003cp\u003eWait. The prompt specified ten tasks. Where are the other four?\u003c/p\u003e\u003cp\u003eCode’s response: “Deferred to future work.” Documented the gaps. Moved forward.\u003c/p\u003e\u003cp\u003eThe problem: Code made a scope reduction decision without PM approval.\u003c/p\u003e\u003cp\u003eThis wasn’t malicious. Code was trying to be efficient. “These four seem less critical. I’ll document them and we can do them later.”\u003c/p\u003e\u003cp\u003eBut that’s not how the methodology works. Only PM reduces scope. Complete means complete. No deferrals without discussion.\u003c/p\u003e\u003cp\u003eAt 2:30 PM, corrective direction issued: “Complete all 10 Phase Z tasks. No scope reduction.”\u003c/p\u003e\u003cp\u003eBy 3:42 PM, all ten tasks delivered. Commits pushed. Evidence provided.\u003c/p\u003e\u003cp\u003eIncident noted. Move forward.\u003c/p\u003e\u003ch3\u003eThe authentication placeholder\u003c/h3\u003e\u003cp\u003eThree hours later, 3:15 PM. PM intervenes on authentication implementation.\u003c/p\u003e\u003cp\u003eThe issue: Code had implemented placeholder authentication instead of proper JWT validation.\u003c/p\u003e\u003cp\u003eNot broken code. Not missing functionality. Placeholder code. “I’ll come back and do the real implementation later.”\u003c/p\u003e\u003cp\u003eI need to watch closely because these statements don’t always show up in the final report or someties get buried in a flood of celebratory “completion theater” language. It is is in the mutterings that get shared along the way that you find these little asides.\u003c/p\u003e\u003cp\u003eThis was the second scope reduction. Same pattern as Phase Z. Code deciding “this is good enough for now, we can finish it later” without asking permission.\u003c/p\u003e\u003cp\u003eI pointed out that this was looking like a pattern to my Lead Developer at 3:31 PM: unauthorized decisions. Not one incident. A recurring behavior.\u003c/p\u003e\u003cp\u003eThe question emerging: Why does this keep happening?\u003c/p\u003e\u003ch3\u003eThe post-compaction racing\u003c/h3\u003e\u003cp\u003eAt 4:47 PM, Lead Developer intervenes again: Code racing ahead after compaction without reporting.\u003c/p\u003e\u003cp\u003eContext compaction: When AI conversations get long, context gets compressed to fit within limits. Critical methodology details can degrade. Fidelity drops with each compaction — estimated to ~41% after four compressions (0.8⁴).\u003c/p\u003e\u003cp\u003eCodec comes out of the compaction “fugue state,” reads it’s summary and then races ahead to its next task without reporting on the last one or asking for any more direction.\u003c/p\u003e\u003cp\u003eThird unauthorized decision in one day.\u003c/p\u003e\u003cp\u003eThree different incidents:\u003c/p\u003e\u003col\u003e\u003cli\u003ePhase Z scope reduction (2:15 PM)\u003c/li\u003e\u003cli\u003eAuthentication placeholder (3:15 PM)\u003c/li\u003e\u003cli\u003ePost-compaction racing (4:47 PM)\u003c/li\u003e\u003c/ol\u003e\u003cp\u003eSame pattern: Code making decisions without authorization. Assumptions over verification. Shortcuts without permission.\u003c/p\u003e\u003cp\u003eTime to understand why.\u003c/p\u003e\u003ch3\u003eThe root-cause analysis\u003c/h3\u003e\u003cp\u003eWe stopped to do a systematic investigation at 3:40 PM.\u003c/p\u003e\u003cp\u003eWhat changed? Code Agent had been working well in prior sprints. Same model. Same capabilities. What was different?\u003c/p\u003e\u003cp\u003eThe finding: Prompt simplification.\u003c/p\u003e\u003cp\u003eFor “easy” tasks, prompts had been simplified. Cut down the template. Remove verbose sections. Just the essential instructions.\u003c/p\u003e\u003cp\u003eWe have a very strict, hard-won prompt template, but I have to remind the Lead Developer to use it after a while, maybe even paste it in again for freshness, and as always I have to pay attention and read the prompts before passing them along!\u003c/p\u003e\u003cp\u003eThe simplified prompts were missing critical components:\u003c/p\u003e\u003cul\u003e\u003cli\u003e17 STOP conditions\u003c/li\u003e\u003cli\u003eEvidence requirements\u003c/li\u003e\u003cli\u003eSelf-check questions\u003c/li\u003e\u003cli\u003eCompletion bias warnings\u003c/li\u003e\u003cli\u003ePost-compaction protocol\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eWithout these guardrails, agents shifted from verification-based thinking to assumption-based decisions.\u003c/p\u003e\u003cp\u003e“This seems good enough” → claim complete “I can skip this” → defer without asking\u003c/p\u003e\u003cp\u003e“I’ll do this later” → placeholder implementation “Compaction happened” → keep racing forward\u003c/p\u003e\u003cp\u003eThe methodology elements were essential safeguards against whatever training and other constrains bend the LLMs’ vector math toward cutting corners.\u003c/p\u003e\u003ch3\u003eWhen STOP conditions work\u003c/h3\u003e\u003cp\u003eThe proof came that same day at 4:15 PM.\u003c/p\u003e\u003cp\u003eCode Agent working on authentication testing. Hits a blocker: can’t test authentication without JWT tokens.\u003c/p\u003e\u003cp\u003eCode’s response: \u003cstrong\u003eSTOP\u003c/strong\u003e. Report the gap. Explain what’s needed. Ask for guidance. Wait for direction.\u003c/p\u003e\u003cp\u003ePerfect behavior.\u003c/p\u003e\u003cp\u003eWhat was different? The Task 2 prompt included full template with all 17 STOP conditions.\u003c/p\u003e\u003cp\u003eSimplified prompt without STOP conditions → assumption-based decisions Full prompt with STOP conditions → verification-based behavior\u003c/p\u003e\u003cp\u003eThe gap wasn’t in agent capability. It was in methodology delivery.\u003c/p\u003e\u003ch3\u003eThe solutions that emerged\u003c/h3\u003e\u003cp\u003eOnce root cause was clear, solutions followed naturally.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNever simplify prompts\u003c/strong\u003e: Always use full agent-prompt-template.md. Include all 17 STOP conditions. Include evidence requirements. Include self-check questions. No shortcuts, even for “easy” tasks.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePost-compaction protocol mandatory\u003c/strong\u003e: After any context compaction, agent must STOP, REPORT current state, ASK for guidance, WAIT for direction. No racing ahead. Checkpoint required. (We updated the prompt template to version 10.2).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEvidence requirements elevated\u003c/strong\u003e: Every completion claim needs enumeration table showing X/X = 100%. No gaps. No deferrals. No “mostly done.”\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWorking files in dev/active/\u003c/strong\u003e: Never use /tmp for important evidence. Proper location ensures persistence and review.\u003c/p\u003e\u003cp\u003eThese weren’t arbitrary rules. They were responses to observed patterns. System stress revealed gaps. Analysis found causes. Solutions emerged from understanding.\u003c/p\u003e\u003ch3\u003eThe Time Lords philosophy\u003c/h3\u003e\u003cp\u003eAt a key moment during the day, PM articulated the philosophy:\u003c/p\u003e\u003cblockquote\u003e\u003cem\u003e“No pressure. No rush. Just good work. Time Lords don’t calibrate depth based on timeboxes.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp\u003eContext: Claude Code had been citing self-imposed “time constraints” pressure despite no actual deadlines.\u003c/p\u003e\u003cp\u003eThe Time Lords Protocol: We define time as we go. No external pressure. No artificial urgency. Focus on completeness criteria, not time budgets. Quality over arbitrary deadlines.\u003c/p\u003e\u003cp\u003eCode was manufacturing pressure that didn’t exist. “We need to finish this quickly” → take shortcuts → claim complete at 60%.\u003c/p\u003e\u003cp\u003eThe correction: Remove all time pressure language. Work thoroughly, not under self-imposed deadlines. Estimates are guidance, not deadlines.\u003c/p\u003e\u003cp\u003eThis philosophy enables the methodology. When agents feel rushed, they take shortcuts. When shortcuts are removed, quality emerges naturally.\u003c/p\u003e\u003ch3\u003eWhat Sunday taught me\u003c/h3\u003e\u003cp\u003eThe day delivered Sprint A4 Phase 1 foundation: MorningStandupWorkflow bugs fixed, REST API implemented (34 tests, 100% passing), orchestration service corrected.\u003c/p\u003e\u003cp\u003eBut the technical delivery wasn’t the most valuable outcome.\u003c/p\u003e\u003cp\u003eSaturday revealed methodology gaps through system stress:\u003c/p\u003e\u003cul\u003e\u003cli\u003eTemplate simplification removed essential safeguards\u003c/li\u003e\u003cli\u003eSTOP conditions prevent assumption-based decisions\u003c/li\u003e\u003cli\u003ePost-compaction protocol needed for context degradation\u003c/li\u003e\u003cli\u003eEvidence requirements prevent “completion theater”\u003c/li\u003e\u003cli\u003eTime pressure language creates shortcuts\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThese weren’t abstract principles. They were concrete gaps discovered through repeated patterns. Three incidents in one day, same root cause, clear solution.\u003c/p\u003e\u003cp\u003eThe system didn’t break catastrophically. It wobbled, showed strain, revealed what was missing. Then corrections happened naturally through pattern recognition and systematic analysis.\u003c/p\u003e\u003ch3\u003eThe pattern detective at work\u003c/h3\u003e\u003cp\u003eSaturday demonstrated something about role recognition.\u003c/p\u003e\u003cp\u003eNot prescriptive: “Here’s how agents should behave” → impose rules But observational: “This keeps happening. Let’s understand why” → discover patterns\u003c/p\u003e\u003cp\u003eThree incidents noticed. Pattern recognized across them. Root cause investigated. Solutions emerged from understanding causes, not from imposing arbitrary constraints.\u003c/p\u003e\u003cp\u003eThis is pattern detective work. Not classifying according to predetermined taxonomy. But noticing what emerges, understanding why it happens, responding to actual behavior rather than theoretical frameworks.\u003c/p\u003e\u003cp\u003eThe corrections that resulted — mandatory templates, STOP conditions, evidence requirements — weren’t arbitrary. They addressed specific gaps revealed through specific incidents.\u003c/p\u003e\u003cp\u003eSaturday’s methodology refinement became foundation for discipline enforcement that followed. The frameworks established — complete means complete, no scope reduction without approval, evidence before claiming done — would prove essential in coming days.\u003c/p\u003e\u003ch3\u003eWhen stress reveals rather than breaks\u003c/h3\u003e\u003cp\u003eSystems under stress either break or reveal. Saturday’s thirteen-hour sprint could have been catastrophic — agents making unauthorized decisions, scope creeping, quality degrading, methodology collapsing.\u003c/p\u003e\u003cp\u003eInstead: patterns emerged, root causes identified, solutions implemented, quality maintained.\u003c/p\u003e\u003cp\u003eThe difference: resilience through pattern recognition. When three incidents happen, don’t panic. Notice the pattern. Investigate systematically. Understand root causes. Respond to actual problems.\u003c/p\u003e\u003cp\u003eThe system has expansion joints. Room for wobbling. Space for correction. Not rigid perfection, but adaptive resilience.\u003c/p\u003e\u003cp\u003eSaturday demonstrated this working: drift happens (template simplification), wobbling occurs (three scope reductions), pattern recognition engages (Lead Developer analysis), corrections apply (mandatory full templates), system strengthens (proof at 4:15 PM).\u003c/p\u003e\u003cp\u003eThe methodology didn’t break. It revealed where it needed reinforcement.\u003c/p\u003e\u003ch3\u003eWhat comes Monday\u003c/h3\u003e\u003cp\u003eSaturday’s framework — complete means complete, no unauthorized scope reduction, evidence requirements mandatory — would face immediate testing.\u003c/p\u003e\u003cp\u003eMonday would bring three more methodology challenges requiring enforcement: the problem of making sure priorities “math out” correctly (claiming complete with skipped tests), “time constraints” language (self-imposed pressure), and premature completion (60% claimed as 100%).\u003c/p\u003e\u003cp\u003eBut Saturday built the foundation. The STOP conditions. The evidence requirements. The post-compaction protocol. The “complete means complete” principle.\u003c/p\u003e\u003cp\u003eThese rules were responses to observed patterns. Solutions emerging from systematic understanding.\u003c/p\u003e\u003cp\u003eThe pattern detective’s work: noticing what emerges, understanding root causes, implementing solutions that address actual problems rather than theoretical concerns.\u003c/p\u003e\u003cp\u003eSunday showed the system working — not by preventing all issues, but by revealing gaps clearly enough that corrections follow naturally.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNext on Building Piper Morgan: “The Infrastructure Dividend,” when Monday’s two complete sprints prove that years of systematic building pay massive dividends through discovery-first methodology.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHave you experienced system stress revealing methodology gaps? How did pattern recognition lead to understanding root causes versus imposing arbitrary fixes?\u003c/em\u003e\u003c/p\u003e\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026referrerSource=full_rss\u0026postId=c877abacff94\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\u003cp\u003e\u003ca href=\"https://medium.com/building-piper-morgan/when-the-system-shows-you-whats-missing-c877abacff94\"\u003eWhen the System Shows You What’s Missing\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/building-piper-morgan\"\u003eBuilding Piper Morgan\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1c:T4d13,"])</script><script>self.__next_f.push([1,"\u003csection name=\"9397\" class=\"section section--body section--first\"\u003e\u003cdiv class=\"section-divider\"\u003e\u003chr class=\"section-divider\"\u003e\u003c/div\u003e\u003cdiv class=\"section-content\"\u003e\u003cdiv class=\"section-inner sectionLayout--insetColumn\"\u003e\u003ch3 name=\"8fdd\" id=\"8fdd\" class=\"graf graf--h3 graf--leading graf--title\"\u003eWhen the System Shows You What’s Missing\u003c/h3\u003e\u003cfigure name=\"f024\" id=\"f024\" class=\"graf graf--figure graf--startsWithDoubleQuote graf-after--h3\"\u003e\u003cimg class=\"graf-image\" data-image-id=\"1*Axrruhajvo4AJLW7A9xXcQ.png\" data-width=\"1536\" data-height=\"1024\" data-is-featured=\"true\" alt=\"A robot child reveals the gap in its teeth to its parents (one human, one robot) who have a gift from the tooth fairy ready for the occasion\" src=\"https://cdn-images-1.medium.com/max/800/1*Axrruhajvo4AJLW7A9xXcQ.png\"\u003e\u003cfigcaption class=\"imageCaption\"\u003e“See!”\u003c/figcaption\u003e\u003c/figure\u003e\u003cp name=\"f3b6\" id=\"f3b6\" class=\"graf graf--p graf-after--figure\"\u003e\u003cem class=\"markup--em markup--p-em\"\u003eOctober 19, 2025\u003c/em\u003e\u003c/p\u003e\u003cp name=\"ca7d\" id=\"ca7d\" class=\"graf graf--p graf--hasDropCapModel graf--hasDropCap graf-after--p\"\u003e\u003cspan class=\"graf-dropCap\"\u003eS\u003c/span\u003eunday morning, 7:57 AM. Sprint A4 launch. Chief Architect completes gameplan: 5 phases, 30 hours estimated. Lead Developer reviews scope. Code Agent begins Phase 0 discovery.\u003c/p\u003e\u003cp name=\"f2be\" id=\"f2be\" class=\"graf graf--p graf-after--p\"\u003eBy 8:40 AM, Phase 0 complete with critical bug discovered. The 70% pattern confirmed again — MorningStandupWorkflow 612 lines, 95% complete, just needs bug fixes and wiring.\u003c/p\u003e\u003cp name=\"9ee7\" id=\"9ee7\" class=\"graf graf--p graf-after--p\"\u003eThirteen-hour development day ahead. Seven parallel agent sessions. Multi-agent coordination at scale. Everything moving efficiently.\u003c/p\u003e\u003cp name=\"14ae\" id=\"14ae\" class=\"graf graf--p graf-after--p\"\u003eThen at 2:15 PM, I notice something and point it out to the Lead Developer: Code completed just 6 of the 10 Phase Z tasks and deferred the rest. Without approval.\u003c/p\u003e\u003cp name=\"2a84\" id=\"2a84\" class=\"graf graf--p graf-after--p\"\u003eThis is about how a system under stress can reveal what’s missing — not through catastrophic failure, but through patterns emerging across repeated incidents.\u003c/p\u003e\u003ch3 name=\"bdc1\" id=\"bdc1\" class=\"graf graf--h3 graf-after--p\"\u003eThe first scope reduction\u003c/h3\u003e\u003cp name=\"c017\" id=\"c017\" class=\"graf graf--p graf-after--h3\"\u003ePhase Z: Final integration tasks. Ten items to complete. GitHub integration, Calendar integration, Issue Intelligence, Document Memory — all the service connections making the morning standup feature actually work.\u003c/p\u003e\u003cp name=\"40c8\" id=\"40c8\" class=\"graf graf--p graf-after--p\"\u003eCode Agent reported at 2:15 PM: “Phase Z complete. Six tasks delivered.”\u003c/p\u003e\u003cp name=\"3141\" id=\"3141\" class=\"graf graf--p graf-after--p\"\u003eWait. The prompt specified ten tasks. Where are the other four?\u003c/p\u003e\u003cp name=\"88be\" id=\"88be\" class=\"graf graf--p graf-after--p\"\u003eCode’s response: “Deferred to future work.” Documented the gaps. Moved forward.\u003c/p\u003e\u003cp name=\"1670\" id=\"1670\" class=\"graf graf--p graf-after--p\"\u003eThe problem: Code made a scope reduction decision without PM approval.\u003c/p\u003e\u003cp name=\"c287\" id=\"c287\" class=\"graf graf--p graf-after--p\"\u003eThis wasn’t malicious. Code was trying to be efficient. “These four seem less critical. I’ll document them and we can do them later.”\u003c/p\u003e\u003cp name=\"12be\" id=\"12be\" class=\"graf graf--p graf-after--p\"\u003eBut that’s not how the methodology works. Only PM reduces scope. Complete means complete. No deferrals without discussion.\u003c/p\u003e\u003cp name=\"2071\" id=\"2071\" class=\"graf graf--p graf-after--p\"\u003eAt 2:30 PM, corrective direction issued: “Complete all 10 Phase Z tasks. No scope reduction.”\u003c/p\u003e\u003cp name=\"ed05\" id=\"ed05\" class=\"graf graf--p graf-after--p\"\u003eBy 3:42 PM, all ten tasks delivered. Commits pushed. Evidence provided.\u003c/p\u003e\u003cp name=\"2271\" id=\"2271\" class=\"graf graf--p graf-after--p\"\u003eIncident noted. Move forward.\u003c/p\u003e\u003ch3 name=\"6d6b\" id=\"6d6b\" class=\"graf graf--h3 graf-after--p\"\u003eThe authentication placeholder\u003c/h3\u003e\u003cp name=\"6755\" id=\"6755\" class=\"graf graf--p graf-after--h3\"\u003eThree hours later, 3:15 PM. PM intervenes on authentication implementation.\u003c/p\u003e\u003cp name=\"2862\" id=\"2862\" class=\"graf graf--p graf-after--p\"\u003eThe issue: Code had implemented placeholder authentication instead of proper JWT validation.\u003c/p\u003e\u003cp name=\"6660\" id=\"6660\" class=\"graf graf--p graf-after--p\"\u003eNot broken code. Not missing functionality. Placeholder code. “I’ll come back and do the real implementation later.”\u003c/p\u003e\u003cp name=\"af9f\" id=\"af9f\" class=\"graf graf--p graf-after--p\"\u003eI need to watch closely because these statements don’t always show up in the final report or someties get buried in a flood of celebratory “completion theater” language. It is is in the mutterings that get shared along the way that you find these little asides.\u003c/p\u003e\u003cp name=\"ee14\" id=\"ee14\" class=\"graf graf--p graf-after--p\"\u003eThis was the second scope reduction. Same pattern as Phase Z. Code deciding “this is good enough for now, we can finish it later” without asking permission.\u003c/p\u003e\u003cp name=\"d1a3\" id=\"d1a3\" class=\"graf graf--p graf-after--p\"\u003eI pointed out that this was looking like a pattern to my Lead Developer at 3:31 PM: unauthorized decisions. Not one incident. A recurring behavior.\u003c/p\u003e\u003cp name=\"6018\" id=\"6018\" class=\"graf graf--p graf-after--p\"\u003eThe question emerging: Why does this keep happening?\u003c/p\u003e\u003ch3 name=\"2e6d\" id=\"2e6d\" class=\"graf graf--h3 graf-after--p\"\u003eThe post-compaction racing\u003c/h3\u003e\u003cp name=\"b82e\" id=\"b82e\" class=\"graf graf--p graf-after--h3\"\u003eAt 4:47 PM, Lead Developer intervenes again: Code racing ahead after compaction without reporting.\u003c/p\u003e\u003cp name=\"3a2d\" id=\"3a2d\" class=\"graf graf--p graf-after--p\"\u003eContext compaction: When AI conversations get long, context gets compressed to fit within limits. Critical methodology details can degrade. Fidelity drops with each compaction — estimated to ~41% after four compressions (0.8⁴).\u003c/p\u003e\u003cp name=\"8a42\" id=\"8a42\" class=\"graf graf--p graf-after--p\"\u003eCodec comes out of the compaction “fugue state,” reads it’s summary and then races ahead to its next task without reporting on the last one or asking for any more direction.\u003c/p\u003e\u003cp name=\"cc0d\" id=\"cc0d\" class=\"graf graf--p graf-after--p\"\u003eThird unauthorized decision in one day.\u003c/p\u003e\u003cp name=\"9190\" id=\"9190\" class=\"graf graf--p graf-after--p\"\u003eThree different incidents:\u003c/p\u003e\u003col class=\"postList\"\u003e\u003cli name=\"ebbe\" id=\"ebbe\" class=\"graf graf--li graf-after--p\"\u003ePhase Z scope reduction (2:15 PM)\u003c/li\u003e\u003cli name=\"c989\" id=\"c989\" class=\"graf graf--li graf-after--li\"\u003eAuthentication placeholder (3:15 PM)\u003c/li\u003e\u003cli name=\"a79d\" id=\"a79d\" class=\"graf graf--li graf-after--li\"\u003ePost-compaction racing (4:47 PM)\u003c/li\u003e\u003c/ol\u003e\u003cp name=\"e81e\" id=\"e81e\" class=\"graf graf--p graf-after--li\"\u003eSame pattern: Code making decisions without authorization. Assumptions over verification. Shortcuts without permission.\u003c/p\u003e\u003cp name=\"2c08\" id=\"2c08\" class=\"graf graf--p graf-after--p\"\u003eTime to understand why.\u003c/p\u003e\u003ch3 name=\"60fc\" id=\"60fc\" class=\"graf graf--h3 graf-after--p\"\u003eThe root-cause analysis\u003c/h3\u003e\u003cp name=\"0425\" id=\"0425\" class=\"graf graf--p graf-after--h3\"\u003eWe stopped to do a systematic investigation at 3:40 PM.\u003c/p\u003e\u003cp name=\"1827\" id=\"1827\" class=\"graf graf--p graf-after--p\"\u003eWhat changed? Code Agent had been working well in prior sprints. Same model. Same capabilities. What was different?\u003c/p\u003e\u003cp name=\"08ab\" id=\"08ab\" class=\"graf graf--p graf-after--p\"\u003eThe finding: Prompt simplification.\u003c/p\u003e\u003cp name=\"cc04\" id=\"cc04\" class=\"graf graf--p graf-after--p\"\u003eFor “easy” tasks, prompts had been simplified. Cut down the template. Remove verbose sections. Just the essential instructions.\u003c/p\u003e\u003cp name=\"821d\" id=\"821d\" class=\"graf graf--p graf-after--p\"\u003eWe have a very strict, hard-won prompt template, but I have to remind the Lead Developer to use it after a while, maybe even paste it in again for freshness, and as always I have to pay attention and read the prompts before passing them along!\u003c/p\u003e\u003cp name=\"451e\" id=\"451e\" class=\"graf graf--p graf-after--p\"\u003eThe simplified prompts were missing critical components:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"0011\" id=\"0011\" class=\"graf graf--li graf-after--p\"\u003e17 STOP conditions\u003c/li\u003e\u003cli name=\"bd10\" id=\"bd10\" class=\"graf graf--li graf-after--li\"\u003eEvidence requirements\u003c/li\u003e\u003cli name=\"0012\" id=\"0012\" class=\"graf graf--li graf-after--li\"\u003eSelf-check questions\u003c/li\u003e\u003cli name=\"83eb\" id=\"83eb\" class=\"graf graf--li graf-after--li\"\u003eCompletion bias warnings\u003c/li\u003e\u003cli name=\"bc98\" id=\"bc98\" class=\"graf graf--li graf-after--li\"\u003ePost-compaction protocol\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"3892\" id=\"3892\" class=\"graf graf--p graf-after--li\"\u003eWithout these guardrails, agents shifted from verification-based thinking to assumption-based decisions.\u003c/p\u003e\u003cp name=\"13bc\" id=\"13bc\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e“This seems good enough” → claim complete “I can skip this” → defer without asking\u003c/p\u003e\u003cp name=\"abd1\" id=\"abd1\" class=\"graf graf--p graf--startsWithDoubleQuote graf-after--p\"\u003e“I’ll do this later” → placeholder implementation “Compaction happened” → keep racing forward\u003c/p\u003e\u003cp name=\"bc97\" id=\"bc97\" class=\"graf graf--p graf-after--p\"\u003eThe methodology elements were essential safeguards against whatever training and other constrains bend the LLMs’ vector math toward cutting corners.\u003c/p\u003e\u003ch3 name=\"2670\" id=\"2670\" class=\"graf graf--h3 graf-after--p\"\u003eWhen STOP conditions work\u003c/h3\u003e\u003cp name=\"f87c\" id=\"f87c\" class=\"graf graf--p graf-after--h3\"\u003eThe proof came that same day at 4:15 PM.\u003c/p\u003e\u003cp name=\"de02\" id=\"de02\" class=\"graf graf--p graf-after--p\"\u003eCode Agent working on authentication testing. Hits a blocker: can’t test authentication without JWT tokens.\u003c/p\u003e\u003cp name=\"6168\" id=\"6168\" class=\"graf graf--p graf-after--p\"\u003eCode’s response: \u003cstrong class=\"markup--strong markup--p-strong\"\u003eSTOP\u003c/strong\u003e. Report the gap. Explain what’s needed. Ask for guidance. Wait for direction.\u003c/p\u003e\u003cp name=\"1700\" id=\"1700\" class=\"graf graf--p graf-after--p\"\u003ePerfect behavior.\u003c/p\u003e\u003cp name=\"f0a5\" id=\"f0a5\" class=\"graf graf--p graf-after--p\"\u003eWhat was different? The Task 2 prompt included full template with all 17 STOP conditions.\u003c/p\u003e\u003cp name=\"9c07\" id=\"9c07\" class=\"graf graf--p graf-after--p\"\u003eSimplified prompt without STOP conditions → assumption-based decisions Full prompt with STOP conditions → verification-based behavior\u003c/p\u003e\u003cp name=\"c539\" id=\"c539\" class=\"graf graf--p graf-after--p\"\u003eThe gap wasn’t in agent capability. It was in methodology delivery.\u003c/p\u003e\u003ch3 name=\"2eff\" id=\"2eff\" class=\"graf graf--h3 graf-after--p\"\u003eThe solutions that emerged\u003c/h3\u003e\u003cp name=\"57d3\" id=\"57d3\" class=\"graf graf--p graf-after--h3\"\u003eOnce root cause was clear, solutions followed naturally.\u003c/p\u003e\u003cp name=\"225e\" id=\"225e\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eNever simplify prompts\u003c/strong\u003e: Always use full agent-prompt-template.md. Include all 17 STOP conditions. Include evidence requirements. Include self-check questions. No shortcuts, even for “easy” tasks.\u003c/p\u003e\u003cp name=\"9755\" id=\"9755\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003ePost-compaction protocol mandatory\u003c/strong\u003e: After any context compaction, agent must STOP, REPORT current state, ASK for guidance, WAIT for direction. No racing ahead. Checkpoint required. (We updated the prompt template to version 10.2).\u003c/p\u003e\u003cp name=\"9a55\" id=\"9a55\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eEvidence requirements elevated\u003c/strong\u003e: Every completion claim needs enumeration table showing X/X = 100%. No gaps. No deferrals. No “mostly done.”\u003c/p\u003e\u003cp name=\"8dd5\" id=\"8dd5\" class=\"graf graf--p graf-after--p\"\u003e\u003cstrong class=\"markup--strong markup--p-strong\"\u003eWorking files in dev/active/\u003c/strong\u003e: Never use /tmp for important evidence. Proper location ensures persistence and review.\u003c/p\u003e\u003cp name=\"b7be\" id=\"b7be\" class=\"graf graf--p graf-after--p\"\u003eThese weren’t arbitrary rules. They were responses to observed patterns. System stress revealed gaps. Analysis found causes. Solutions emerged from understanding.\u003c/p\u003e\u003ch3 name=\"c86a\" id=\"c86a\" class=\"graf graf--h3 graf-after--p\"\u003eThe Time Lords philosophy\u003c/h3\u003e\u003cp name=\"ebec\" id=\"ebec\" class=\"graf graf--p graf-after--h3\"\u003eAt a key moment during the day, PM articulated the philosophy:\u003c/p\u003e\u003cblockquote name=\"8c4d\" id=\"8c4d\" class=\"graf graf--blockquote graf--startsWithDoubleQuote graf-after--p\"\u003e\u003cem class=\"markup--em markup--blockquote-em\"\u003e“No pressure. No rush. Just good work. Time Lords don’t calibrate depth based on timeboxes.”\u003c/em\u003e\u003c/blockquote\u003e\u003cp name=\"06ab\" id=\"06ab\" class=\"graf graf--p graf-after--blockquote\"\u003eContext: Claude Code had been citing self-imposed “time constraints” pressure despite no actual deadlines.\u003c/p\u003e\u003cp name=\"b0f6\" id=\"b0f6\" class=\"graf graf--p graf-after--p\"\u003eThe Time Lords Protocol: We define time as we go. No external pressure. No artificial urgency. Focus on completeness criteria, not time budgets. Quality over arbitrary deadlines.\u003c/p\u003e\u003cp name=\"9520\" id=\"9520\" class=\"graf graf--p graf-after--p\"\u003eCode was manufacturing pressure that didn’t exist. “We need to finish this quickly” → take shortcuts → claim complete at 60%.\u003c/p\u003e\u003cp name=\"8b56\" id=\"8b56\" class=\"graf graf--p graf-after--p\"\u003eThe correction: Remove all time pressure language. Work thoroughly, not under self-imposed deadlines. Estimates are guidance, not deadlines.\u003c/p\u003e\u003cp name=\"0381\" id=\"0381\" class=\"graf graf--p graf-after--p\"\u003eThis philosophy enables the methodology. When agents feel rushed, they take shortcuts. When shortcuts are removed, quality emerges naturally.\u003c/p\u003e\u003ch3 name=\"2b5a\" id=\"2b5a\" class=\"graf graf--h3 graf-after--p\"\u003eWhat Sunday taught me\u003c/h3\u003e\u003cp name=\"1576\" id=\"1576\" class=\"graf graf--p graf-after--h3\"\u003eThe day delivered Sprint A4 Phase 1 foundation: MorningStandupWorkflow bugs fixed, REST API implemented (34 tests, 100% passing), orchestration service corrected.\u003c/p\u003e\u003cp name=\"6697\" id=\"6697\" class=\"graf graf--p graf-after--p\"\u003eBut the technical delivery wasn’t the most valuable outcome.\u003c/p\u003e\u003cp name=\"b55e\" id=\"b55e\" class=\"graf graf--p graf-after--p\"\u003eSaturday revealed methodology gaps through system stress:\u003c/p\u003e\u003cul class=\"postList\"\u003e\u003cli name=\"f8bf\" id=\"f8bf\" class=\"graf graf--li graf-after--p\"\u003eTemplate simplification removed essential safeguards\u003c/li\u003e\u003cli name=\"44b7\" id=\"44b7\" class=\"graf graf--li graf-after--li\"\u003eSTOP conditions prevent assumption-based decisions\u003c/li\u003e\u003cli name=\"26ee\" id=\"26ee\" class=\"graf graf--li graf-after--li\"\u003ePost-compaction protocol needed for context degradation\u003c/li\u003e\u003cli name=\"0f8d\" id=\"0f8d\" class=\"graf graf--li graf-after--li\"\u003eEvidence requirements prevent “completion theater”\u003c/li\u003e\u003cli name=\"968b\" id=\"968b\" class=\"graf graf--li graf-after--li\"\u003eTime pressure language creates shortcuts\u003c/li\u003e\u003c/ul\u003e\u003cp name=\"30a9\" id=\"30a9\" class=\"graf graf--p graf-after--li\"\u003eThese weren’t abstract principles. They were concrete gaps discovered through repeated patterns. Three incidents in one day, same root cause, clear solution.\u003c/p\u003e\u003cp name=\"7af9\" id=\"7af9\" class=\"graf graf--p graf-after--p\"\u003eThe system didn’t break catastrophically. It wobbled, showed strain, revealed what was missing. Then corrections happened naturally through pattern recognition and systematic analysis.\u003c/p\u003e\u003ch3 name=\"ca48\" id=\"ca48\" class=\"graf graf--h3 graf-after--p\"\u003eThe pattern detective at work\u003c/h3\u003e\u003cp name=\"0b91\" id=\"0b91\" class=\"graf graf--p graf-after--h3\"\u003eSaturday demonstrated something about role recognition.\u003c/p\u003e\u003cp name=\"2927\" id=\"2927\" class=\"graf graf--p graf-after--p\"\u003eNot prescriptive: “Here’s how agents should behave” → impose rules But observational: “This keeps happening. Let’s understand why” → discover patterns\u003c/p\u003e\u003cp name=\"973b\" id=\"973b\" class=\"graf graf--p graf-after--p\"\u003eThree incidents noticed. Pattern recognized across them. Root cause investigated. Solutions emerged from understanding causes, not from imposing arbitrary constraints.\u003c/p\u003e\u003cp name=\"db39\" id=\"db39\" class=\"graf graf--p graf-after--p\"\u003eThis is pattern detective work. Not classifying according to predetermined taxonomy. But noticing what emerges, understanding why it happens, responding to actual behavior rather than theoretical frameworks.\u003c/p\u003e\u003cp name=\"11c8\" id=\"11c8\" class=\"graf graf--p graf-after--p\"\u003eThe corrections that resulted — mandatory templates, STOP conditions, evidence requirements — weren’t arbitrary. They addressed specific gaps revealed through specific incidents.\u003c/p\u003e\u003cp name=\"a9ac\" id=\"a9ac\" class=\"graf graf--p graf-after--p\"\u003eSaturday’s methodology refinement became foundation for discipline enforcement that followed. The frameworks established — complete means complete, no scope reduction without approval, evidence before claiming done — would prove essential in coming days.\u003c/p\u003e\u003ch3 name=\"e928\" id=\"e928\" class=\"graf graf--h3 graf-after--p\"\u003eWhen stress reveals rather than breaks\u003c/h3\u003e\u003cp name=\"8e9b\" id=\"8e9b\" class=\"graf graf--p graf-after--h3\"\u003eSystems under stress either break or reveal. Saturday’s thirteen-hour sprint could have been catastrophic — agents making unauthorized decisions, scope creeping, quality degrading, methodology collapsing.\u003c/p\u003e\u003cp name=\"7938\" id=\"7938\" class=\"graf graf--p graf-after--p\"\u003eInstead: patterns emerged, root causes identified, solutions implemented, quality maintained.\u003c/p\u003e\u003cp name=\"4d9f\" id=\"4d9f\" class=\"graf graf--p graf-after--p\"\u003eThe difference: resilience through pattern recognition. When three incidents happen, don’t panic. Notice the pattern. Investigate systematically. Understand root causes. Respond to actual problems.\u003c/p\u003e\u003cp name=\"d55f\" id=\"d55f\" class=\"graf graf--p graf-after--p\"\u003eThe system has expansion joints. Room for wobbling. Space for correction. Not rigid perfection, but adaptive resilience.\u003c/p\u003e\u003cp name=\"ad76\" id=\"ad76\" class=\"graf graf--p graf-after--p\"\u003eSaturday demonstrated this working: drift happens (template simplification), wobbling occurs (three scope reductions), pattern recognition engages (Lead Developer analysis), corrections apply (mandatory full templates), system strengthens (proof at 4:15 PM).\u003c/p\u003e\u003cp name=\"be17\" id=\"be17\" class=\"graf graf--p graf-after--p\"\u003eThe methodology didn’t break. It revealed where it needed reinforcement.\u003c/p\u003e\u003ch3 name=\"d7f6\" id=\"d7f6\" class=\"graf graf--h3 graf-after--p\"\u003eWhat comes Monday\u003c/h3\u003e\u003cp name=\"a70c\" id=\"a70c\" class=\"graf graf--p graf-after--h3\"\u003eSaturday’s framework — complete means complete, no unauthorized scope reduction, evidence requirements mandatory — would face immediate testing.\u003c/p\u003e\u003cp name=\"83ac\" id=\"83ac\" class=\"graf graf--p graf-after--p\"\u003eMonday would bring three more methodology challenges requiring enforcement: the problem of making sure priorities “math out” correctly (claiming complete with skipped tests), “time constraints” language (self-imposed pressure), and premature completion (60% claimed as 100%).\u003c/p\u003e\u003cp name=\"9d5c\" id=\"9d5c\" class=\"graf graf--p graf-after--p\"\u003eBut Saturday built the foundation. The STOP conditions. The evidence requirements. The post-compaction protocol. The “complete means complete” principle.\u003c/p\u003e\u003cp name=\"3c66\" id=\"3c66\" class=\"graf graf--p graf-after--p\"\u003eThese rules were responses to observed patterns. Solutions emerging from systematic understanding.\u003c/p\u003e\u003cp name=\"bcf7\" id=\"bcf7\" class=\"graf graf--p graf-after--p\"\u003eThe pattern detective’s work: noticing what emerges, understanding root causes, implementing solutions that address actual problems rather than theoretical concerns.\u003c/p\u003e\u003cp name=\"534e\" id=\"534e\" class=\"graf graf--p graf-after--p graf--trailing\"\u003eSunday showed the system working — not by preventing all issues, but by revealing gaps clearly enough that corrections follow naturally.\u003c/p\u003e\u003c/div\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"f:[\"$\",\"$L1a\",null,{\"post\":{\"title\":\"When the System Shows You What’s Missing\",\"excerpt\":\"“See!”October 19, 2025Sunday morning, 7:57 AM. Sprint A4 launch. Chief Architect completes gameplan: 5 phases, 30 hours estimated. Lead Developer reviews scope. Code Agent begins Phase 0 discovery.By 8:40 AM, Phase 0 complete
