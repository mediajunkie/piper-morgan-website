<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Metadata — Piper Morgan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 1rem; background: #f8f9fa; color: #1a1a1a; }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  .stats { color: #666; font-size: 0.85rem; margin-bottom: 1rem; }
  .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  input[type="text"] { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; width: 300px; }
  select { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
  .table-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 0.8rem; background: #fff; }
  th { background: #2c3e50; color: #fff; padding: 0.5rem 0.6rem; text-align: left; cursor: pointer; white-space: nowrap; position: sticky; top: 0; }
  th:hover { background: #34495e; }
  th .arrow { font-size: 0.7rem; margin-left: 0.3rem; }
  td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.title-cell { white-space: normal; word-break: break-word; min-width: 350px; max-width: 500px; }
  tr:hover { background: #f0f7ff; }
  .empty { color: #bbb; font-style: italic; }
  .tag { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.75rem; background: #e8e8e8; }
  .tag.building { background: #d4edda; color: #155724; }
  .tag.reflection { background: #cce5ff; color: #004085; }
  .tag.methodology { background: #fff3cd; color: #856404; }
  .tag.culture { background: #f8d7da; color: #721c24; }
  .count { font-weight: bold; }
  .load-msg { text-align: center; padding: 2rem; color: #666; }
  .img-preview { width: 40px; height: 40px; object-fit: cover; border-radius: 3px; }
</style>
</head>
<body>

<h1>Blog Metadata Viewer</h1>
<div class="stats" id="stats">Loading...</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search titles, slugs, categories...">
  <select id="catFilter"><option value="">All categories</option></select>
  <select id="clusterFilter"><option value="">All clusters</option></select>
  <select id="colToggle" multiple size="1" style="display:none"></select>
  <label style="font-size:0.85rem; display:flex; align-items:center; gap:0.3rem;">
    <input type="checkbox" id="missingOnly"> Missing data only
  </label>
</div>

<div class="table-wrap">
  <table id="table">
    <thead><tr id="thead"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="load-msg" id="loadMsg">
  Drop a CSV file here, or the viewer will try to load <code>../data/blog-metadata.csv</code>
</div>

<script>
let DATA = [];
let HEADERS = [];
let sortCol = -1;
let sortAsc = true;

// --- CSV Parser (handles quoted fields) ---
function parseCSV(text) {
  const lines = [];
  let current = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { current.push(field.trim()); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i + 1] === '\n')) {
        current.push(field.trim()); field = '';
        if (current.length > 1 || current[0] !== '') lines.push(current);
        current = [];
        if (c === '\r') i++;
      } else { field += c; }
    }
  }
  current.push(field.trim());
  if (current.length > 1 || current[0] !== '') lines.push(current);
  return lines;
}

// --- Load & Render ---
function loadData(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) { document.getElementById('loadMsg').textContent = 'No data found.'; return; }
  HEADERS = rows[0];
  DATA = rows.slice(1).map(r => {
    const obj = {};
    HEADERS.forEach((h, i) => obj[h] = r[i] || '');
    return obj;
  });

  document.getElementById('loadMsg').style.display = 'none';
  buildFilters();
  render();
}

function buildFilters() {
  const cats = [...new Set(DATA.map(d => d.category).filter(Boolean))].sort();
  const clusters = [...new Set(DATA.map(d => d.cluster).filter(Boolean))].sort();
  const catSel = document.getElementById('catFilter');
  const cluSel = document.getElementById('clusterFilter');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });
  clusters.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cluSel.appendChild(o); });
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const clu = document.getElementById('clusterFilter').value;
  const missing = document.getElementById('missingOnly').checked;

  let rows = DATA;
  if (q) rows = rows.filter(r => HEADERS.some(h => (r[h] || '').toLowerCase().includes(q)));
  if (cat) rows = rows.filter(r => r.category === cat);
  if (clu) rows = rows.filter(r => r.cluster === clu);
  if (missing) rows = rows.filter(r => HEADERS.some(h => !r[h]));

  if (sortCol >= 0) {
    const key = HEADERS[sortCol];
    rows = [...rows].sort((a, b) => {
      const va = (a[key] || ''), vb = (b[key] || '');
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }
  return rows;
}

function render() {
  const rows = getFiltered();

  // Stats
  const total = DATA.length;
  const missingImg = DATA.filter(d => !d.imageSlug).length;
  const missingCat = DATA.filter(d => !d.category).length;
  const missingAlt = HEADERS.includes('imageAlt') ? DATA.filter(d => !d.imageAlt).length : null;
  let stats = `<span class="count">${total}</span> posts`;
  stats += ` · showing <span class="count">${rows.length}</span>`;
  if (missingImg) stats += ` · <span style="color:#c00">${missingImg} missing image</span>`;
  if (missingCat) stats += ` · <span style="color:#c00">${missingCat} missing category</span>`;
  if (missingAlt !== null && missingAlt > 0) stats += ` · <span style="color:#c00">${missingAlt} missing alt text</span>`;
  document.getElementById('stats').innerHTML = stats;

  // Header
  const thead = document.getElementById('thead');
  thead.innerHTML = '';
  HEADERS.forEach((h, i) => {
    const th = document.createElement('th');
    th.textContent = h;
    if (sortCol === i) {
      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = sortAsc ? ' ▲' : ' ▼';
      th.appendChild(arrow);
    }
    th.onclick = () => { if (sortCol === i) sortAsc = !sortAsc; else { sortCol = i; sortAsc = true; } render(); };
    thead.appendChild(th);
  });

  // Body
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    HEADERS.forEach(h => {
      const td = document.createElement('td');
      const val = row[h] || '';
      if (!val) {
        td.innerHTML = '<span class="empty">—</span>';
        td.className = 'empty';
      } else if (h === 'category') {
        td.innerHTML = `<span class="tag ${val}">${val}</span>`;
      } else if (h === 'title') {
        td.textContent = val;
        td.className = 'title-cell';
      } else if (h === 'slug') {
        td.textContent = val;
        td.title = val;
      } else {
        td.textContent = val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

// --- Event listeners ---
document.getElementById('search').addEventListener('input', render);
document.getElementById('catFilter').addEventListener('change', render);
document.getElementById('clusterFilter').addEventListener('change', render);
document.getElementById('missingOnly').addEventListener('change', render);

// --- Drag & drop ---
document.body.addEventListener('dragover', e => { e.preventDefault(); document.body.style.background = '#e8f4ff'; });
document.body.addEventListener('dragleave', () => { document.body.style.background = '#f8f9fa'; });
document.body.addEventListener('drop', e => {
  e.preventDefault();
  document.body.style.background = '#f8f9fa';
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) {
    const reader = new FileReader();
    reader.onload = () => loadData(reader.result);
    reader.readAsText(file);
  }
});

// --- Auto-load ---
fetch('../data/blog-metadata.csv')
  .then(r => { if (!r.ok) throw new Error('Not found'); return r.text(); })
  .then(loadData)
  .catch(() => {
    document.getElementById('loadMsg').textContent = 'Could not auto-load CSV. Drag and drop a file to view it.';
  });
</script>
</body>
</html>
